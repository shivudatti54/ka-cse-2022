<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="linked-lists-using-c">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8ed"/>
      <stop offset="100%" style="stop-color:#c2dce6"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9c4"/>
      <stop offset="100%" style="stop-color:#fff59d"/>
    </linearGradient>
    <linearGradient id="pointerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#81d4fa"/>
      <stop offset="100%" style="stop-color:#4fc3f7"/>
    </linearGradient>
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#263238"/>
      <stop offset="100%" style="stop-color:#37474f"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s infinite; }
    .arrow-anim { stroke-dasharray: 50; stroke-dashoffset: 50; animation: drawArrow 1.5s ease-out forwards; }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #1565c0; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #333; }
    .code-text { font-family: 'Courier New', monospace; font-size: 11px; fill: #a5d6a7; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #666; }
    .section-box { fill: white; stroke: #b0bec5; stroke-width: 1; rx: 8; }
    .node-box { fill: url(#nodeGradient); stroke: #f9a825; stroke-width: 2; rx: 4; }
    .pointer-box { fill: url(#pointerGradient); stroke: #0288d1; stroke-width: 2; rx: 4; }
    .arrow-line { stroke: #ef5350; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .title-section { opacity: 0; animation: fadeIn 0.8s ease-out 0.2s forwards; }
    .section-1 { opacity: 0; animation: slideIn 0.6s ease-out 0.4s forwards; }
    .section-2 { opacity: 0; animation: slideIn 0.6s ease-out 0.6s forwards; }
    .section-3 { opacity: 0; animation: slideIn 0.6s ease-out 0.8s forwards; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="title-section">
    <text x="210" y="30" text-anchor="middle" class="title">Linked Lists Using C</text>
    <line x1="100" y1="40" x2="320" y2="40" stroke="#1565c0" stroke-width="2"/>
  </g>
  
  <!-- Section 1: Node Structure -->
  <g class="section-1" data-narration="The fundamental building block of a linked list is a node structure containing data and a pointer to the next node">
    <rect x="10" y="55" width="130" height="85" class="section-box"/>
    <text x="20" y="72" class="label" font-weight="bold">Node Structure</text>
    <!-- Data box -->
    <rect x="20" y="82" width="55" height="25" class="node-box"/>
    <text x="47" y="97" text-anchor="middle" class="label" font-size="12">data</text>
    <!-- Next pointer box -->
    <rect x="80" y="82" width="50" height="25" class="pointer-box"/>
    <text x="105" y="97" text-anchor="middle" class="label" font-size="12">next</text>
    <!-- NULL indicator -->
    <rect x="30" y="115" width="40" height="18" fill="#ffccbc" rx="3"/>
    <text x="50" y="128" text-anchor="middle" class="detail" font-size="10">NULL</text>
  </g>
  
  <!-- Section 2: Code Example -->
  <g class="section-2" data-narration="The struct Node definition in C shows how data and pointer are combined with malloc for heap allocation">
    <rect x="150" y="55" width="150" height="85" class="section-box"/>
    <text x="160" y="72" class="label" font-weight="bold">C Structure Definition</text>
    <rect x="160" y="80" width="130" height="55" fill="url(#codeGradient)" rx="4"/>
    <text x="165" y="95" class="code-text">struct Node {</text>
    <text x="175" y="110" class="code-text">int data;</text>
    <text x="175" y="125" class="code-text">struct Node* next;</text>
    <text x="165" y="140" class="code-text">};</text>
  </g>
  
  <!-- Section 3: Singly Linked List Visual -->
  <g class="section-3" data-narration="A singly linked list shows nodes connected in one direction with the last node pointing to NULL">
    <rect x="10" y="150" width="200" height="100" class="section-box"/>
    <text x="20" y="167" class="label" font-weight="bold">Singly Linked List</text>
    <!-- Node 1 -->
    <rect x="20" y="180" width="45" height="30" class="node-box"/>
    <text x="42" y="200" text-anchor="middle" class="label" font-size="11">10</text>
    <rect x="65" y="180" width="35" height="30" class="pointer-box"/>
    <path d="M75 195 L90 195" class="arrow-line arrow-anim"/>
    <!-- Node 2 -->
    <rect x="95" y="180" width="45" height="30" class="node-box"/>
    <text x="117" y="200" text-anchor="middle" class="label" font-size="11">20</text>
    <rect x="140" y="180" width="35" height="30" class="pointer-box"/>
    <path d="M150 195 L165 195" class="arrow-line arrow-anim"/>
    <!-- Node 3 -->
    <rect x="170" y="180" width="35" height="30" class="node-box" style="animation: pulse 2s infinite 1.5s;"/>
    <text x="187" y="200" text-anchor="middle" class="label" font-size="11">NULL</text>
    
    <text x="110" y="230" text-anchor="middle" class="detail">Head →</text>
  </g>
  
  <!-- Section 4: Operations -->
  <g class="section-1" data-narration="Core operations include insertion at head (O(1)) and traversal using temporary pointers">
    <rect x="220" y="150" width="190" height="100" class="section-box"/>
    <text x="230" y="167" class="label" font-weight="bold">Core Operations</text>
    <!-- Insertion -->
    <rect x="230" y="178" width="80" height="30" fill="#c8e6c9" rx="4"/>
    <text x="270" y="197" text-anchor="middle" class="label" font-size="11">Insert Head</text>
    <text x="270" y="212" text-anchor="middle" class="detail">O(1) complexity</text>
    <!-- Deletion -->
    <rect x="320" y="178" width="80" height="30" fill="#ffccbc" rx="4"/>
    <text x="360" y="197" text-anchor="middle" class="label" font-size="11">Delete</text>
    <text x="360" y="212" text-anchor="middle" class="detail">Free memory</text>
    <!-- Traversal -->
    <rect x="230" y="218" width="80" height="25" fill="#bbdefb" rx="4"/>
    <text x="270" y="234" text-anchor="middle" class="label" font-size="11">Traverse</text>
    <!-- Search -->
    <rect x="320" y="218" width="80" height="25" fill="#e1bee7" rx="4"/>
    <text x="360" y="234" text-anchor="middle" class="label" font-size="11">Search</text>
  </g>
  
  <!-- Section 5: Types of Linked Lists -->
  <g class="section-2" data-narration="Three main types: Singly (unidirectional), Doubly (bidirectional with prev/next), Circular (loops back to head)">
    <rect x="10" y="260" width="400" height="60" class="section-box"/>
    <text x="20" y="277" class="label" font-weight="bold">Types of Linked Lists</text>
    <!-- Singly -->
    <rect x="20" y="288" width="120" height="25" fill="#fff9c4" stroke="#f9a825" rx="4"/>
    <text x="80" y="305" text-anchor="middle" class="label" font-size="11">Singly Linked</text>
    <text x="140" y="305" class="detail">Unidirectional</text>
    <!-- Doubly -->
    <rect x="180" y="288" width="120" height="25" fill="#b3e5fc" stroke="#0288d1" rx="4"/>
    <text x="240" y="305" text-anchor="middle" class="label" font-size="11">Doubly Linked</text>
    <text x="300" y="305" class="detail">Bidirectional</text>
    <!-- Circular -->
    <rect x="330" y="288" width="70" height="25" fill="#f8bbd9" stroke="#c2185b" rx="4"/>
    <text x="365" y="305" text-anchor="middle" class="label" font-size="11">Circular</text>
  </g>
  
  <!-- Section 6: Memory Management -->
  <g class="section-3" data-narration="Proper memory management using malloc for allocation and free for deallocation prevents memory leaks">
    <rect x="10" y="330" width="400" height="60" class="section-box"/>
    <text x="20" y="347" class="label" font-weight="bold">Memory Management</text>
    <!-- malloc -->
    <rect x="20" y="355" width="180" height="30" fill="#dcedc8" rx="4"/>
    <text x="110" y="368" text-anchor="middle" class="label" font-size="11">newNode = (struct Node*)malloc(sizeof(struct Node))</text>
    <!-- free -->
    <rect x="210" y="355" width="90" height="30" fill="#ffcdd2" rx="4"/>
    <text x="255" y="368" text-anchor="middle" class="label" font-size="11">free(node)</text>
    <!-- leak prevention -->
    <rect x="310" y="355" width="90" height="30" fill="#e0e0e0" rx="4"/>
    <text x="355" y="368" text-anchor="middle" class="label" font-size="11">No leaks!</text>
    <path d="M340 355 L350 340 L360 355" fill="none" stroke="#4caf50" stroke-width="2"/>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef5350"/>
    </marker>
  </defs>
</svg>