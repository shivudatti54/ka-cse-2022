<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="structures-unions-enumerations" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="structGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="unionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="enumGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0b2;stop-opacity:1" />
    </linearGradient>
    <style>
      @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes slideInLeft {
        0% { transform: translateX(-20px); opacity: 0; }
        100% { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInRight {
        0% { transform: translateX(20px); opacity: 0; }
        100% { transform: translateX(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.02); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }
      .title { animation: fadeIn 0.8s ease-out forwards; }
      .section { animation: fadeIn 0.6s ease-out forwards; }
      .struct-box { animation: slideInLeft 0.5s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
      .union-box { animation: slideInRight 0.5s ease-out forwards; animation-delay: 0.3s; opacity: 0; }
      .enum-box { animation: slideInLeft 0.5s ease-out forwards; animation-delay: 0.4s; opacity: 0; }
      .code-block { animation: fadeIn 0.6s ease-out forwards; animation-delay: 0.5s; opacity: 0; }
      .memory-visual { animation: pulse 2s ease-in-out infinite; }
      .arrow { animation: fadeIn 0.4s ease-out forwards; animation-delay: 0.6s; opacity: 0; }
      .label { font-family: Arial, sans-serif; }
      .title-text { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
      .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
      .label-text { font-family: monospace; font-size: 11px; fill: #2c3e50; }
      .detail-text { font-family: Arial, sans-serif; font-size: 10px; fill: #5d6d7e; }
      .code-text { font-family: monospace; font-size: 9px; fill: #2c3e50; }
      .highlight { animation: float 2s ease-in-out infinite; }
    </style>
  </defs>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text title">Structures, Unions &amp; Enumerations</text>
  <line x1="30" y1="38" x2="390" y2="38" stroke="#3498db" stroke-width="2" class="title"/>
  
  <!-- Structures Section -->
  <g class="struct-box" data-narration="Structures combine different data types under one name">
    <rect x="20" y="50" width="115" height="85" rx="6" fill="url(#structGrad)" stroke="#1976d2" stroke-width="1.5"/>
    <text x="77" y="68" text-anchor="middle" class="section-title">STRUCTURE</text>
    <text x="77" y="85" text-anchor="middle" class="label-text">struct Student {</text>
    <text x="77" y="98" text-anchor="middle" class="detail-text">  char name[50]</text>
    <text x="77" y="110" text-anchor="middle" class="detail-text">  int roll_no</text>
    <text x="77" y="122" text-anchor="middle" class="detail-text">  float marks</text>
    <text x="77" y="134" text-anchor="middle" class="label-text">};</text>
  </g>
  
  <!-- Union Section -->
  <g class="union-box" data-narration="Unions share memory between members - only one value at a time">
    <rect x="150" y="50" width="115" height="85" rx="6" fill="url(#unionGrad)" stroke="#388e3c" stroke-width="1.5"/>
    <text x="207" y="68" text-anchor="middle" class="section-title">UNION</text>
    <text x="207" y="85" text-anchor="middle" class="label-text">union Data {</text>
    <text x="207" y="98" text-anchor="middle" class="detail-text">  int temp</text>
    <text x="207" y="110" text-anchor="middle" class="detail-text">  float pressure</text>
    <text x="207" y="122" text-anchor="middle" class="detail-text">  char status</text>
    <text x="207" y="134" text-anchor="middle" class="label-text">};</text>
  </g>
  
  <!-- Enumeration Section -->
  <g class="enum-box" data-narration="Enumerations provide named integer constants for better code readability">
    <rect x="280" y="50" width="115" height="85" rx="6" fill="url(#enumGrad)" stroke="#f57c00" stroke-width="1.5"/>
    <text x="337" y="68" text-anchor="middle" class="section-title">ENUMERATION</text>
    <text x="337" y="85" text-anchor="middle" class="label-text">enum Weekdays {</text>
    <text x="337" y="98" text-anchor="middle" class="detail-text">  MON=1, TUE, WED</text>
    <text x="337" y="110" text-anchor="middle" class="detail-text">  THU, FRI, SAT</text>
    <text x="337" y="125" text-anchor="middle" class="label-text">};</text>
  </g>
  
  <!-- Memory Comparison Visual -->
  <g class="section" data-narration="Memory layout comparison: Struct allocates separate space, Union overlays members">
    <text x="210" y="155" text-anchor="middle" class="section-title">Memory Layout Comparison</text>
    
    <!-- Struct Memory -->
    <rect x="40" y="165" width="80" height="12" rx="2" fill="#64b5f6" stroke="#1565c0" stroke-width="1"/>
    <text x="80" y="174" text-anchor="middle" class="code-text" fill="white">name[50]</text>
    <rect x="40" y="177" width="80" height="12" rx="2" fill="#42a5f5" stroke="#1565c0" stroke-width="1"/>
    <text x="80" y="186" text-anchor="middle" class="code-text" fill="white">roll_no</text>
    <rect x="40" y="189" width="80" height="12" rx="2" fill="#2196f3" stroke="#1565c0" stroke-width="1"/>
    <text x="80" y="198" text-anchor="middle" class="code-text" fill="white">marks</text>
    <text x="80" y="215" text-anchor="middle" class="detail-text">Total: 60+ bytes</text>
    
    <!-- Arrow between -->
    <path d="M130 185 L145 185" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
    <text x="137" y="175" text-anchor="middle" class="detail-text" fill="#7f8c8d">vs</text>
    
    <!-- Union Memory -->
    <rect x="160" y="165" width="80" height="36" rx="2" fill="#81c784" stroke="#2e7d32" stroke-width="1" class="memory-visual"/>
    <text x="200" y="178" text-anchor="middle" class="code-text" fill="white">temp (4B)</text>
    <text x="200" y="190" text-anchor="middle" class="code-text" fill="white">pressure (4B)</text>
    <text x="200" y="202" text-anchor="middle" class="code-text" fill="white">status (1B)</text>
    <text x="200" y="215" text-anchor="middle" class="detail-text">Size: 4 bytes</text>
    
    <!-- Labels -->
    <text x="80" y="160" text-anchor="middle" class="section-title" fill="#1565c0">STRUCT</text>
    <text x="200" y="160" text-anchor="middle" class="section-title" fill="#2e7d32">UNION</text>
  </g>
  
  <!-- Key Points Section -->
  <g class="section" data-narration="Key differences and use cases for each construct">
    <rect x="20" y="230" width="180" height="75" rx="5" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1"/>
    <text x="110" y="248" text-anchor="middle" class="section-title" fill="#2c3e50">Structure Key Points</text>
    <circle cx="35" cy="265" r="4" fill="#3498db"/>
    <text x="45" y="268" class="detail-text">Each member has own memory</text>
    <circle cx="35" cy="282" r="4" fill="#3498db"/>
    <text x="45" y="285" class="detail-text">Size = sum of all members + padding</text>
    <circle cx="35" cy="299" r="4" fill="#3498db"/>
    <text x="45" y="302" class="detail-text">Access all members simultaneously</text>
  </g>
  
  <g class="section" data-narration="Union advantages include memory efficiency and type punning">
    <rect x="220" y="230" width="180" height="75" rx="5" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1"/>
    <text x="310" y="248" text-anchor="middle" class="section-title" fill="#2c3e50">Union Key Points</text>
    <circle cx="235" cy="265" r="4" fill="#27ae60"/>
    <text x="245" y="268" class="detail-text">All members share same memory</text>
    <circle cx="235" cy="282" r="4" fill="#27ae60"/>
    <text x="245" y="285" class="detail-text">Size = largest member only</text>
    <circle cx="235" cy="299" r="4" fill="#27ae60"/>
    <text x="245" y="302" class="detail-text">Use for memory-efficient storage</text>
  </g>
  
  <!-- Enum Visual -->
  <g class="code-block" data-narration="Enumerations map names to integer values automatically">
    <rect x="20" y="315" width="380" height="70" rx="5" fill="#fff8e1" stroke="#ffc107" stroke-width="1"/>
    <text x="210" y="335" text-anchor="middle" class="section-title">Enumeration Values</text>
    
    <!-- Enum visual representation -->
    <rect x="35" y="345" width="55" height="18" rx="3" fill="#ffcc80" stroke="#f57c00" stroke-width="1"/>
    <text x="62" y="357" text-anchor="middle" class="code-text">MON=1</text>
    
    <rect x="95" y="345" width="55" height="18" rx="3" fill="#ffcc80" stroke="#f57c00" stroke-width="1"/>
    <text x="122" y="357" text-anchor="middle" class="code-text">TUE=2</text>
    
    <rect x="155" y="345" width="55" height="18" rx="3" fill="#ffcc80" stroke="#f57c00" stroke-width="1"/>
    <text x="182" y="357" text-anchor="middle" class="code-text">WED=3</text>
    
    <rect x="215" y="345" width="55" height="18" rx="3" fill="#ffcc80" stroke="#f57c00" stroke-width="1"/>
    <text x="242" y="357" text-anchor="middle" class="code-text">THU=4</text>
    
    <rect x="275" y="345" width="55" height="18" rx="3" fill="#ffcc80" stroke="#f57c00" stroke-width="1"/>
    <text x="302" y="357" text-anchor="middle" class="code-text">FRI=5</text>
    
    <rect x="335" y="345" width="55" height="18" rx="3" fill="#ffcc80" stroke="#f57c00" stroke-width="1"/>
    <text x="362" y="357" text-anchor="middle" class="code-text">SAT=6</text>
    
    <text x="210" y="380" text-anchor="middle" class="detail-text">Auto-increment from start value (default 0)</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="400" cy="30" r="15" fill="#e8eaf6" stroke="#c5cae9" stroke-width="1" class="highlight"/>
  <text x="400" y="35" text-anchor="middle" class="detail-text" fill="#5c6bc0">C</text>
  
  <circle cx="20" cy="380" r="10" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1"/>
  <text x="20" y="384" text-anchor="middle" class="detail-text" fill="#8e24aa">{}</text>
  
  <circle cx="400" cy="380" r="10" fill="#e0f2f1" stroke="#80cbc4" stroke-width="1"/>
  <text x="400" y="384" text-anchor="middle" class="detail-text" fill="#00695c">=</text>
</svg>