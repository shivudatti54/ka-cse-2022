<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="operators-and-expressions">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="section1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="section2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cce9ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="section3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6ffe6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccffcc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="section4Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff0e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd9cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="section5Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0ccff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="section6Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe6f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffccdd;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .operator-text { font-family: Consolas, monospace; font-size: 13px; fill: #2c3e50; }
    .label-text { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .box { stroke: #888; stroke-width: 1; rx: 6; ry: 6; }
    .arrow { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3 { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box4 { animation: slideIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .box5 { animation: slideIn 0.6s ease-out 1.0s forwards; opacity: 0; }
    .box6 { animation: slideIn 0.6s ease-out 1.2s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text title-anim">Operators &amp; Expressions</text>
  <text x="210" y="50" text-anchor="middle" class="label-text" style="animation: fadeIn 0.8s ease-out 0.3s forwards; opacity: 0;">Operator Precedence Hierarchy (C)</text>
  
  <!-- Precedence Level 1: Parentheses -->
  <g class="box1" data-narration="Parentheses have the highest precedence. They are used to group expressions and override the default operator precedence.">
    <rect x="140" y="65" width="140" height="40" fill="url(#section1Grad)" class="box" />
    <text x="210" y="82" text-anchor="middle" class="section-title">1. Parentheses ()</text>
    <text x="210" y="98" text-anchor="middle" class="operator-text">Highest Priority</text>
  </g>
  
  <!-- Arrow down -->
  <line x1="210" y1="105" x2="210" y2="120" class="arrow" />
  
  <!-- Precedence Level 2: Unary -->
  <g class="box2" data-narration="Unary operators include increment (++), decrement (--), and logical NOT (!). They operate on a single operand.">
    <rect x="120" y="120" width="180" height="45" fill="url(#section2Grad)" class="box" />
    <text x="210" y="138" text-anchor="middle" class="section-title">2. Unary Operators</text>
    <text x="210" y="155" text-anchor="middle" class="operator-text">++  --  !  (negation)</text>
  </g>
  
  <!-- Arrow down -->
  <line x1="210" y1="165" x2="210" y2="180" class="arrow" />
  
  <!-- Precedence Level 3: Multiplicative -->
  <g class="box3" data-narration="Multiplicative operators perform multiplication, division, and modulus operations. They have higher precedence than additive operators.">
    <rect x="90" y="180" width="240" height="45" fill="url(#section3Grad)" class="box" />
    <text x="210" y="198" text-anchor="middle" class="section-title">3. Multiplicative Operators</text>
    <text x="210" y="215" text-anchor="middle" class="operator-text">*  /  %</text>
  </g>
  
  <!-- Arrow down -->
  <line x1="210" y1="225" x2="210" y2="240" class="arrow" />
  
  <!-- Precedence Level 4: Additive -->
  <g class="box4" data-narration="Additive operators perform addition and subtraction. They come after multiplicative in precedence.">
    <rect x="90" y="240" width="240" height="45" fill="url(#section4Grad)" class="box" />
    <text x="210" y="258" text-anchor="middle" class="section-title">4. Additive Operators</text>
    <text x="210" y="275" text-anchor="middle" class="operator-text">+  -</text>
  </g>
  
  <!-- Arrow down -->
  <line x1="210" y1="285" x2="210" y2="300" class="arrow" />
  
  <!-- Precedence Level 5: Shift -->
  <g class="box5" data-narration="Shift operators move bits left or right. They operate on integer types at the bit level.">
    <rect x="100" y="300" width="220" height="40" fill="url(#section5Grad)" class="box" />
    <text x="210" y="318" text-anchor="middle" class="section-title">5. Shift Operators</text>
    <text x="210" y="332" text-anchor="middle" class="operator-text">&lt;&lt;  &gt;&gt;</text>
  </g>
  
  <!-- Arrow down -->
  <line x1="210" y1="340" x2="210" y2="355" class="arrow" />
  
  <!-- Precedence Level 6: Relational -->
  <g class="box6" data-narration="Relational operators compare values. They evaluate to boolean results (true/false).">
    <rect x="80" y="355" width="260" height="40" fill="url(#section6Grad)" class="box pulse-anim" />
    <text x="210" y="373" text-anchor="middle" class="section-title">6. Relational Operators</text>
    <text x="210" y="387" text-anchor="middle" class="operator-text">&lt;  &gt;  &lt;=  &gt;=</text>
  </g>
  
  <!-- Decorative element: Examples sidebar -->
  <g transform="translate(340, 70)" data-narration="Examples showing how expressions are evaluated based on operator precedence.">
    <rect x="0" y="0" width="75" height="140" fill="#fff" stroke="#ddd" rx="4" />
    <text x="37" y="18" text-anchor="middle" class="section-title" style="font-size:10px;">Examples</text>
    <text x="5" y="38" class="label-text" style="font-size:9px;">2+3*4 = 14</text>
    <text x="5" y="52" class="label-text" style="font-size:9px;">(2+3)*4 = 20</text>
    <text x="5" y="66" class="label-text" style="font-size:9px;">10/2+3 = 8</text>
    <text x="5" y="80" class="label-text" style="font-size:9px;">10/(2+3) = 2</text>
    <text x="5" y="94" class="label-text" style="font-size:9px;">5&gt;3 = true</text>
    <text x="5" y="108" class="label-text" style="font-size:9px;">!false = true</text>
    <text x="5" y="122" class="label-text" style="font-size:9px;">5==5 = true</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(10, 365)" data-narration="Color legend indicating the six levels of operator precedence in C language.">
    <text x="0" y="0" class="label-text" style="font-size:9px;">▼ Lower Precedence</text>
  </g>
</svg>