<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="functions-recursion">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stackGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5" />
      <stop offset="100%" style="stop-color:#41719c" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#70ad47" />
      <stop offset="100%" style="stop-color:#548235" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes stackPush {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section2 { animation: slideInRight 0.6s ease-out 0.3s forwards; opacity: 0; }
    .section3 { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .stack-frame { animation: stackPush 0.4s ease-out forwards; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .arrow { animation: fadeIn 0.5s ease-out 0.8s forwards; opacity: 0; }
    .label { font-family: Arial, sans-serif; }
    .title-text { font-family: Arial, sans-serif; font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text label" font-size="20" fill="#2e5a88" data-narration="Main title showing topic name">Functions &amp; Recursion</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#5b9bd5" stroke-width="2" class="title" style="animation-delay: 0.3s"/>
  
  <!-- Section 1: Function Anatomy -->
  <g class="section1" data-narration="Function anatomy showing declaration, parameters, and return">
    <rect x="15" y="55" width="180" height="85" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="25" y="72" class="title-text label" font-size="14" fill="#2e5a88">Function Anatomy</text>
    <text x="25" y="90" class="label" font-size="11" fill="#555">Declaration:</text>
    <text x="25" y="103" class="label" font-size="10" fill="#666" font-style="italic">int fact(int n)</text>
    <text x="25" y="118" class="label" font-size="11" fill="#555">Parameters: n (input)</text>
    <text x="25" y="131" class="label" font-size="11" fill="#555">Return: result</text>
  </g>
  
  <!-- Section 2: Recursion Fundamentals -->
  <g class="section2" data-narration="Key components of recursive functions: base case and recursive case">
    <rect x="225" y="55" width="180" height="85" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="235" y="72" class="title-text label" font-size="14" fill="#2e5a88">Recursion Basics</text>
    <rect x="235" y="82" width="160" height="22" fill="#e8f5e9" rx="4"/>
    <text x="242" y="96" class="label" font-size="11" fill="#2e7d32" font-weight="bold">Base Case:</text>
    <text x="305" y="96" class="label" font-size="10" fill="#2e7d32">if n&lt;=1 return 1</text>
    <rect x="235" y="108" width="160" height="22" fill="#fff3e0" rx="4"/>
    <text x="242" y="122" class="label" font-size="11" fill="#e65100" font-weight="bold">Recursive Case:</text>
    <text x="325" y="122" class="label" font-size="10" fill="#e65100">n*fact(n-1)</text>
  </g>
  
  <!-- Section 3: Call Stack Visualization -->
  <g class="section3" data-narration="Visual representation of call stack frames for factorial(3)">
    <text x="210" y="158" text-anchor="middle" class="title-text label" font-size="14" fill="#2e5a88">Call Stack: fact(3)</text>
    
    <!-- Stack frames -->
    <g class="stack-frame" style="animation-delay: 0.5s">
      <rect x="270" y="170" width="130" height="28" fill="url(#stackGradient)" rx="4" filter="url(#shadow)"/>
      <text x="280" y="188" class="label" font-size="12" fill="white" font-weight="bold">fact(3) → 6</text>
      <text x="330" y="188" class="label" font-size="10" fill="#e0e0e0">frame #3</text>
    </g>
    
    <g class="stack-frame" style="animation-delay: 0.7s">
      <rect x="270" y="202" width="130" height="28" fill="url(#stackGradient)" rx="4" filter="url(#shadow)"/>
      <text x="280" y="220" class="label" font-size="12" fill="white" font-weight="bold">fact(2) → 2</text>
      <text x="330" y="220" class="label" font-size="10" fill="#e0e0e0">frame #2</text>
    </g>
    
    <g class="stack-frame" style="animation-delay: 0.9s">
      <rect x="270" y="234" width="130" height="28" fill="url(#stackGradient)" rx="4" filter="url(#shadow)"/>
      <text x="280" y="252" class="label" font-size="12" fill="white" font-weight="bold">fact(1) → 1</text>
      <text x="330" y="252" class="label" font-size="10" fill="#e0e0e0">frame #1</text>
    </g>
    
    <!-- Arrow showing push direction -->
    <text x="395" y="215" class="label pulse-anim" font-size="14" fill="#e65100">↓ PUSH</text>
    <text x="395" y="280" class="label" font-size="12" fill="#2e7d32">↑ POP</text>
    
    <!-- Stack label -->
    <text x="400" y="320" class="label" font-size="11" fill="#555" transform="rotate(90, 400, 320)">LIFO Stack</text>
    
    <!-- Code representation on left -->
    <g data-narration="Code showing recursive factorial implementation">
      <rect x="20" y="170" width="140" height="130" fill="white" rx="8" filter="url(#shadow)"/>
      <text x="30" y="188" class="title-text label" font-size="12" fill="#2e5a88">factorial(n)</text>
      <text x="30" y="208" class="label" font-size="10" fill="#333">if n &lt;= 1:</text>
      <text x="45" y="222" class="label" font-size="10" fill="#2e7d32">return 1</text>
      <text x="30" y="242" class="label" font-size="10" fill="#333">else:</text>
      <text x="45" y="256" class="label" font-size="10" fill="#e65100">return n *</text>
      <text x="60" y="270" class="label" font-size="10" fill="#e65100">fact(n-1)</text>
      <text x="30" y="290" class="label" font-size="9" fill="#888" font-style="italic">// Stack grows down</text>
    </g>
  </g>
  
  <!-- Section 4: Memory & Tail Recursion -->
  <g class="section3" style="animation-delay: 0.6s" data-narration="Memory complexity and tail recursion optimization explanation">
    <rect x="165" y="310" width="250" height="80" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="175" y="330" class="title-text label" font-size="13" fill="#2e5a88">Memory &amp; Tail Recursion</text>
    
    <!-- Memory info -->
    <g>
      <circle cx="190" cy="355" r="10" fill="#e3f2fd"/>
      <text x="190" y="359" text-anchor="middle" class="label" font-size="12" fill="#1565c0">O(n)</text>
    </g>
    <text x="210" y="359" class="label" font-size="11" fill="#555">Space (linear)</text>
    <text x="210" y="372" class="label" font-size="10" fill="#888">Stack frames accumulate</text>
    
    <!-- Tail recursion -->
    <rect x="270" y="340" width="130" height="40" fill="#f3e5f5" rx="4"/>
    <text x="280" y="355" class="label" font-size="11" fill="#7b1fa2" font-weight="bold">Tail Recursion</text>
    <text x="280" y="370" class="label" font-size="10" fill="#7b1fa2">Last op = recursive call</text>
    <text x="340" y="355" class="label" font-size="9" fill="#888">(optimizable)</text>
  </g>
  
  <!-- Arrow connecting sections -->
  <g class="arrow">
    <path d="M195 140 L225 140" stroke="#5b9bd5" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5b9bd5"/>
    </marker>
  </defs>
  
  <!-- Bottom note -->
  <text x="210" y="395" text-anchor="middle" class="label" font-size="9" fill="#888" font-style="italic">Stack Overflow Risk: ~10⁴ calls depth limit</text>
</svg>