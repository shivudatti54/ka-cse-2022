<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="loops-break-continue">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e9f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5e0f4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="breakGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcccc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9999;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="continueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ccffcc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#99ff99;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="loopGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b3b3ff;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d63031" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00b894" />
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2d3436; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #2d3436; }
    .code { font-family: 'Consolas', 'Monaco', monospace; font-size: 11px; fill: #333; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #636e72; }
    .section-box { rx: 8; ry: 8; stroke-width: 2; }
    .animate-fade { animation: fadeIn 0.6s ease-out forwards; }
    .animate-slide-left { animation: slideInLeft 0.5s ease-out forwards; }
    .animate-slide-right { animation: slideInRight 0.5s ease-out forwards; }
    .animate-slide-up { animation: slideInUp 0.5s ease-out forwards; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .flow-line { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 1s ease-out forwards; animation-delay: 0.5s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title animate-fade" data-narration="Title showing the topic: Loops Break and Continue">Loops: Break &amp; Continue</text>
  
  <!-- Main Loop Flow Diagram -->
  <g class="animate-slide-up" style="animation-delay: 0.2s;" data-narration="Main loop structure showing condition check and iteration flow">
    <!-- Loop Box -->
    <rect x="120" y="50" width="180" height="70" rx="10" fill="url(#loopGradient)" stroke="#6c5ce7" class="section-box" />
    <text x="210" y="75" text-anchor="middle" class="label" font-weight="bold">Loop Condition</text>
    <text x="210" y="95" text-anchor="middle" class="detail">(i &lt; n) or while(cond)</text>
    
    <!-- Arrow down from loop -->
    <path d="M210 120 L210 145" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="flow-line" />
    
    <!-- Loop Body -->
    <rect x="80" y="150" width="260" height="80" rx="10" fill="#f8f9fa" stroke="#b2bec3" stroke-width="2" stroke-dasharray="5,3" />
    <text x="210" y="170" text-anchor="middle" class="label" font-weight="bold">Loop Body - Execute Code</text>
    <text x="210" y="190" text-anchor="middle" class="detail">Process each iteration</text>
    <text x="210" y="210" text-anchor="middle" class="detail">Update counter/variable</text>
  </g>
  
  <!-- Continue Path (Right Side) -->
  <g class="animate-slide-right" style="animation-delay: 0.4s;" data-narration="Continue statement skips current iteration and goes to next">
    <rect x="290" y="245" width="115" height="70" rx="8" fill="url(#continueGradient)" stroke="#00b894" class="section-box" />
    <text x="347" y="265" text-anchor="middle" class="label" font-weight="bold">CONTINUE</text>
    <text x="347" y="285" text-anchor="middle" class="detail">Skip this iteration</text>
    <text x="347" y="300" text-anchor="middle" class="detail">Go to next loop</text>
    
    <!-- Arrow from body to continue -->
    <path d="M240 190 L290 200" stroke="#00b894" stroke-width="2" marker-end="url(#arrowGreen)" />
    <text x="260" y="185" class="detail" fill="#00b894">if condition</text>
    
    <!-- Continue arrow back to loop -->
    <path d="M347 315 L347 335 L210 335 L210 120" stroke="#00b894" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" stroke-dasharray="5,3" />
    <text x="270" y="325" class="detail" fill="#00b894">jump to next</text>
  </g>
  
  <!-- Break Path (Left Side) -->
  <g class="animate-slide-left" style="animation-delay: 0.4s;" data-narration="Break statement exits the loop entirely">
    <rect x="15" y="245" width="115" height="70" rx="8" fill="url(#breakGradient)" stroke="#d63031" class="section-box" />
    <text x="72" y="265" text-anchor="middle" class="label" font-weight="bold">BREAK</text>
    <text x="72" y="285" text-anchor="middle" class="detail">Exit loop</text>
    <text x="72" y="300" text-anchor="middle" class="detail">completely</text>
    
    <!-- Arrow from body to break -->
    <path d="M180 190 L130 200" stroke="#d63031" stroke-width="2" marker-end="url(#arrowRed)" />
    <text x="145" y="185" class="detail" fill="#d63031">if found</text>
    
    <!-- Break arrow exiting -->
    <path d="M72 315 L72 355" stroke="#d63031" stroke-width="2" marker-end="url(#arrowRed)" />
    <text x="50" y="340" class="detail" fill="#d63031">Loop Ends</text>
  </g>
  
  <!-- Code Examples Box -->
  <g class="animate-fade" style="animation-delay: 0.6s;" data-narration="Code examples showing break and continue usage">
    <rect x="10" y="360" width="195" height="35" rx="5" fill="#fff5f5" stroke="#ff7675" stroke-width="1" />
    <text x="20" y="375" class="code">for i in range(n):</text>
    <text x="30" y="388" class="code">if found: break</text>
  </g>
  
  <g class="animate-fade" style="animation-delay: 0.7s;" data-narration="Continue code example showing skip pattern">
    <rect x="215" y="360" width="195" height="35" rx="5" fill="#f0fff0" stroke="#55efc4" stroke-width="1" />
    <text x="225" y="375" class="code">while hasNext():</text>
    <text x="235" y="388" class="code">if invalid: continue</text>
  </g>
  
  <!-- Legend -->
  <g class="animate-fade" style="animation-delay: 0.8s;" data-narration="Legend explaining the visual elements">
    <circle cx="170" cy="248" r="5" fill="#d63031" />
    <text x="180" y="252" class="detail">Break (exit)</text>
    <circle cx="275" cy="248" r="5" fill="#00b894" />
    <text x="285" y="252" class="detail">Continue (skip)</text>
  </g>
  
  <!-- Key Points -->
  <g class="animate-pulse" style="transform-origin: 210px 130px;" data-narration="Animated highlight on loop body">
    <circle cx="210" cy="190" r="45" fill="none" stroke="#a29bfe" stroke-width="2" stroke-dasharray="8,4" />
  </g>
</svg>