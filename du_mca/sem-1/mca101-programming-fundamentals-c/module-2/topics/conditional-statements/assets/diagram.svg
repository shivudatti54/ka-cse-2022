<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="conditional-statements">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e8fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95c9b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5a5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c48888;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a5c4d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#85aab8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: -10; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Consolas', monospace; font-size: 12px; fill: #34495e; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #2c3e50; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .section { opacity: 0; animation: fadeIn 0.6s ease-out forwards; }
    .section:nth-child(1) { animation-delay: 0.1s; }
    .section:nth-child(2) { animation-delay: 0.3s; }
    .section:nth-child(3) { animation-delay: 0.5s; }
    .section:nth-child(4) { animation-delay: 0.7s; }
    .flowchart { opacity: 0; animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.9s; }
    .diamond { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow-line { stroke: #7f8c8d; stroke-width: 2; stroke-dasharray: 5,3; animation: arrowPulse 1.5s linear infinite; }
    .arrow-head { fill: #7f8c8d; }
    .true-path { stroke: #27ae60; stroke-width: 2; fill: none; }
    .false-path { stroke: #e74c3c; stroke-width: 2; fill: none; }
    .true-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #27ae60; font-weight: bold; }
    .false-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #e74c3c; font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" data-narration="Title: Conditional Statements - Key programming concepts for decision making">Conditional Statements</text>
  <line x1="30" y1="42" x2="390" y2="42" stroke="#bdc3c7" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Section 1: If Statement -->
  <g class="section" data-narration="If Statement: Checks a condition, executes code if true">
    <rect x="15" y="55" width="120" height="75" rx="8" ry="8" fill="url(#cardGradient1)" filter="url(#shadow)"/>
    <text x="75" y="72" text-anchor="middle" class="section-title">If Statement</text>
    <text x="22" y="90" class="code">if (condition) {</text>
    <text x="30" y="105" class="detail">// code executes</text>
    <text x="30" y="118" class="detail">// if TRUE</text>
  </g>
  
  <!-- Section 2: If-Else Statement -->
  <g class="section" data-narration="If-Else Statement: Executes different code based on true or false">
    <rect x="150" y="55" width="120" height="75" rx="8" ry="8" fill="url(#cardGradient2)" filter="url(#shadow)"/>
    <text x="210" y="72" text-anchor="middle" class="section-title">If-Else Statement</text>
    <text x="157" y="90" class="code">if (condition) {</text>
    <text x="165" y="105" class="detail">// TRUE path</text>
    <text x="165" y="118" class="detail">} else { // FALSE }</text>
  </g>
  
  <!-- Section 3: If-Else If Statement -->
  <g class="section" data-narration="If-Else If Statement: Checks multiple conditions in sequence">
    <rect x="285" y="55" width="120" height="75" rx="8" ry="8" fill="url(#cardGradient3)" filter="url(#shadow)"/>
    <text x="345" y="72" text-anchor="middle" class="section-title">If-Else If</text>
    <text x="292" y="90" class="code">if (cond1) { }</text>
    <text x="300" y="105" class="detail">else if (cond2)</text>
    <text x="300" y="118" class="detail">else { fallback }</text>
  </g>
  
  <!-- Flowchart Section -->
  <g class="flowchart" data-narration="Flowchart: Decision diamond with True and False paths leading to different outcomes">
    <text x="210" y="150" text-anchor="middle" class="section-title" data-narration="Decision Flow Visualization">Decision Flow</text>
    
    <!-- Decision Diamond -->
    <polygon points="210,165 250,190 210,215 170,190" fill="#f39c12" stroke="#e67e22" stroke-width="2" class="diamond"/>
    <text x="210" y="195" text-anchor="middle" font-family='Segoe UI' font-size='10' font-weight='bold' fill="#fff">?</text>
    
    <!-- Start arrow -->
    <line x1="210" y1="140" x2="210" y2="165" stroke="#7f8c8d" stroke-width="2"/>
    <polygon points="210,160 206,152 214,152" fill="#7f8c8d"/>
    
    <!-- True path (right) -->
    <path d="M 250 190 Q 280 190 300 180" class="true-path" fill="none" stroke-width="2"/>
    <polygon points="300,180 293,177 295,185" fill="#27ae60"/>
    <text x="265" y="178" class="true-label">TRUE</text>
    
    <!-- True action box -->
    <rect x="300" y="160" width="80" height="40" rx="4" ry="4" fill="#d5f4e6" stroke="#27ae60" stroke-width="1.5"/>
    <text x="340" y="178" text-anchor="middle" class="label" fill="#27ae60">Execute</text>
    <text x="340" y="192" text-anchor="middle" class="label" fill="#27ae60">Code A</text>
    
    <!-- False path (left) -->
    <path d="M 170 190 Q 140 190 120 180" class="false-path" fill="none" stroke-width="2"/>
    <polygon points="120,180 127,177 125,185" fill="#e74c3c"/>
    <text x="155" y="178" class="false-label" text-anchor="end">FALSE</text>
    
    <!-- False action box -->
    <rect x="40" y="160" width="80" height="40" rx="4" ry="4" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="80" y="178" text-anchor="middle" class="label" fill="#e74c3c">Execute</text>
    <text x="80" y="192" text-anchor="middle" class="label" fill="#e74c3c">Code B</text>
    
    <!-- Merge back -->
    <line x1="120" y1="200" x2="120" y2="230" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="380" y1="200" x2="380" y2="230" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="120" y1="230" x2="380" y2="230" stroke="#7f8c8d" stroke-width="2"/>
    <path d="M 300 200 Q 340 230 340 245" stroke="#7f8c8d" stroke-width="2" fill="none"/>
    <line x1="340" y1="230" x2="340" y2="245" stroke="#7f8c8d" stroke-width="2"/>
    <polygon points="340,250 336,242 344,242" fill="#7f8c8d"/>
    
    <!-- Continue -->
    <text x="210" y="262" text-anchor="middle" class="detail">Continue Program</text>
  </g>
  
  <!-- Key Concept Box -->
  <g class="section" data-narration="Key Takeaway: Conditional statements enable dynamic, decision-based program flow">
    <rect x="30" y="275" width="360" height="45" rx="6" ry="6" fill="#fff9e6" stroke="#f1c40f" stroke-width="1.5"/>
    <text x="210" y="292" text-anchor="middle" class="section-title" fill="#f39c12" font-size="13">Key Concept</text>
    <text x="210" y="308" text-anchor="middle" class="detail">Conditional statements control program flow based on true/false conditions</text>
  </g>
  
  <!-- Legend -->
  <g class="section" data-narration="Legend: Green represents true path, Red represents false path">
    <rect x="30" y="330" width="360" height="55" rx="6" ry="6" fill="#fff" stroke="#bdc3c7" stroke-width="1"/>
    <circle cx="60" cy="350" r="8" fill="#27ae60"/>
    <text x="75" y="354" class="label">TRUE - Condition met</text>
    <circle cx="60" cy="370" r="8" fill="#e74c3c"/>
    <text x="75" y="374" class="label">FALSE - Condition not met</text>
    <circle cx="230" cy="350" r="8" fill="#f39c12"/>
    <text x="245" y="354" class="label">Decision point</text>
    <circle cx="230" cy="370" r="6" fill="#b8e0d2"/>
    <rect x="222" y="363" width="16" height="14" rx="2" fill="#95c9b6"/>
    <text x="245" y="374" class="label">Code block</text>
  </g>
</svg>