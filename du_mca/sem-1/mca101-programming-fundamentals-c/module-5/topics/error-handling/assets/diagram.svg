<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="error-handling">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0e8fc"/>
      <stop offset="100%" style="stop-color:#fce8f0"/>
    </linearGradient>
    <linearGradient id="tryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4edda"/>
      <stop offset="100%" style="stop-color:#c3e6cb"/>
    </linearGradient>
    <linearGradient id="catchGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe5d0"/>
      <stop offset="100%" style="stop-color:#ffd6a5"/>
    </linearGradient>
    <linearGradient id="exceptionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8d7da"/>
      <stop offset="100%" style="stop-color:#f5c6cb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideInRight 0.6s ease-out 0.3s both; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.4s both; }
    .section-4 { animation: slideInUp 0.6s ease-out 0.5s both; }
    .section-5 { animation: fadeIn 0.6s ease-out 0.6s both; }
    .try-box { animation: pulse 3s ease-in-out infinite 1s; }
    .catch-box { animation: pulse 3s ease-in-out infinite 1.5s; }
    .exception { animation: pulse 2s ease-in-out infinite 0.5s; }
    .flow-arrow { animation: arrowPulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50" class="title">Error Handling</text>
  <line x1="100" y1="42" x2="320" y2="42" stroke="#3498db" stroke-width="2" class="title"/>
  
  <!-- Error Types Section - Left -->
  <g class="section-1" data-narration="Three main types of errors in programming: Syntax, Runtime, and Logical errors">
    <rect x="15" y="55" width="120" height="75" rx="8" fill="#d6eaf8" stroke="#85c1e9" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="75" y="70" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a5276">Types of Errors</text>
    <text x="25" y="88" font-family="Arial" font-size="11" fill="#1a5276">• Syntax</text>
    <text x="25" y="102" font-family="Arial" font-size="11" fill="#1a5276">• Runtime</text>
    <text x="25" y="116" font-family="Arial" font-size="11" fill="#1a5276">• Logical</text>
  </g>
  
  <!-- Mechanisms Section - Right -->
  <g class="section-2" data-narration="Error handling mechanisms include Try-Catch blocks, Error codes, and Assertions">
    <rect x="285" y="55" width="120" height="75" rx="8" fill="#d5f5e3" stroke="#82e0aa" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="345" y="70" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#186a3b">Mechanisms</text>
    <text x="295" y="88" font-family="Arial" font-size="11" fill="#186a3b">• Try-Catch</text>
    <text x="295" y="102" font-family="Arial" font-size="11" fill="#186a3b">• Error Codes</text>
    <text x="295" y="116" font-family="Arial" font-size="11" fill="#186a3b">• Assertions</text>
  </g>
  
  <!-- Try Block -->
  <g class="section-3" data-narration="The Try block contains code that may throw an exception during execution">
    <rect x="30" y="145" width="150" height="90" rx="10" fill="url(#tryGradient)" stroke="#28a745" stroke-width="2" filter="url(#shadow)" class="try-box"/>
    <text x="105" y="165" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#155724">TRY</text>
    <text x="105" y="185" text-anchor="middle" font-family="Arial" font-size="11" fill="#155724">Code that may</text>
    <text x="105" y="198" text-anchor="middle" font-family="Arial" font-size="11" fill="#155724">throw an exception</text>
    <text x="105" y="220" text-anchor="middle" font-family="Arial" font-size="10" fill="#155724">{ ... }</text>
  </g>
  
  <!-- Exception -->
  <g class="section-4" data-narration="When an error occurs in the try block, an exception object is created">
    <rect x="195" y="175" width="70" height="40" rx="20" fill="url(#exceptionGradient)" stroke="#dc3545" stroke-width="2" filter="url(#shadow)" class="exception"/>
    <text x="230" y="195" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#721c24">Exception!</text>
  </g>
  
  <!-- Arrow from Try to Exception -->
  <path d="M180 190 L195 190" stroke="#dc3545" stroke-width="2" fill="none" class="flow-arrow"/>
  
  <!-- Arrow from Exception to Catch -->
  <path d="M265 190 L280 190" stroke="#28a745" stroke-width="2" fill="none" class="flow-arrow"/>
  
  <!-- Catch Block -->
  <g class="section-5" data-narration="The Catch block receives and handles the exception, allowing graceful error recovery">
    <rect x="280" y="145" width="130" height="90" rx="10" fill="url(#catchGradient)" stroke="#fd7e14" stroke-width="2" filter="url(#shadow)" class="catch-box"/>
    <text x="345" y="165" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#7f4800">CATCH</text>
    <text x="345" y="185" text-anchor="middle" font-family="Arial" font-size="11" fill="#7f4800">Handle the</text>
    <text x="345" y="198" text-anchor="middle" font-family="Arial" font-size="11" fill="#7f4800">exception here</text>
    <text x="345" y="220" text-anchor="middle" font-family="Arial" font-size="10" fill="#7f4800">{ ... }</text>
  </g>
  
  <!-- Arrow from Try down to Catch -->
  <path d="M105 235 L105 260 L345 260 L345 235" stroke="#6c757d" stroke-width="2" fill="none" stroke-dasharray="5,3" class="flow-arrow"/>
  <polygon points="345,230 340,238 350,238" fill="#6c757d"/>
  <text x="225" y="275" text-anchor="middle" font-family="Arial" font-size="10" fill="#6c757d">Normal Flow</text>
  
  <!-- Best Practices Box -->
  <g class="section-5" data-narration="Best practices: anticipate errors, use specific error messages, and never ignore exceptions">
    <rect x="30" y="295" width="360" height="45" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="50" y="315" font-family="Arial" font-size="13" font-weight="bold" fill="#856404">Best Practices:</text>
    <text x="150" y="315" font-family="Arial" font-size="11" fill="#856404">Anticipate Errors</text>
    <text x="250" y="315" font-family="Arial" font-size="11" fill="#856404">Specific Messages</text>
    <text x="350" y="315" font-family="Arial" font-size="11" fill="#856404">Handle Gracefully</text>
    <circle cx="145" cy="312" r="3" fill="#856404"/>
    <circle cx="240" cy="312" r="3" fill="#856404"/>
    <circle cx="335" cy="312" r="3" fill="#856404"/>
  </g>
  
  <!-- Flow indicator arrows -->
  <g class="flow-arrow">
    <text x="230" y="160" text-anchor="middle" font-family="Arial" font-size="9" fill="#dc3545">Error!</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="395" cy="370" r="15" fill="#e8f4fc" stroke="#3498db" stroke-width="1" opacity="0.5"/>
  <circle cx="25" cy="370" r="10" fill="#e8f4fc" stroke="#3498db" stroke-width="1" opacity="0.5"/>
  <circle cx="400" cy="30" r="8" fill="#e8f4fc" stroke="#3498db" stroke-width="1" opacity="0.5"/>
</svg>