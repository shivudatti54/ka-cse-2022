<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="file-operations-in-c">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4"/>
      <stop offset="100%" style="stop-color:#2d5a6b"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c"/>
      <stop offset="100%" style="stop-color:#3d8b3d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: slideIn 0.8s ease-out forwards; }
    .box { animation: fadeIn 0.6s ease-out forwards; }
    .arrow { animation: arrowPulse 2s infinite; }
    .highlight { animation: pulse 2s infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d5a6b" class="title">File Operations In C</text>
  
  <!-- Flowchart Section -->
  <g data-narration="The main flowchart showing the sequence of file operations: open, check, process, close">
    <!-- Start Box -->
    <rect x="20" y="55" width="70" height="30" rx="15" fill="#5cb85c" filter="url(#shadow)"/>
    <text x="55" y="75" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">START</text>
    
    <!-- Arrow 1 -->
    <line x1="90" y1="70" x2="115" y2="70" stroke="#2d5a6b" stroke-width="2" class="arrow"/>
    <polygon points="115,70 108,66 108,74" fill="#2d5a6b"/>
    
    <!-- fopen Box -->
    <rect x="120" y="55" width="80" height="30" rx="5" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="160" y="70" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">fopen()</text>
    <text x="160" y="82" text-anchor="middle" font-family="Arial" font-size="9" fill="#e8f4f8">Open File</text>
    
    <!-- Arrow 2 -->
    <line x1="200" y1="70" x2="220" y2="70" stroke="#2d5a6b" stroke-width="2" class="arrow"/>
    <polygon points="220,70 213,66 213,74" fill="#2d5a6b"/>
    
    <!-- NULL Check Diamond -->
    <polygon points="260,50 290,70 260,90 230,70" fill="#f0ad4e" filter="url(#shadow)"/>
    <text x="260" y="68" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">NULL?</text>
    <text x="260" y="80" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Check</text>
    
    <!-- Arrow from NULL to Error -->
    <line x1="230" y1="70" x2="210" y2="70" stroke="#d9534f" stroke-width="2" stroke-dasharray="4"/>
    <text x="205" y="60" font-family="Arial" font-size="9" fill="#d9534f">Yes</text>
    <polygon points="210,70 217,66 217,74" fill="#d9534f"/>
    
    <!-- Error Box -->
    <rect x="140" y="55" width="60" height="25" rx="3" fill="#d9534f" opacity="0.9"/>
    <text x="170" y="70" text-anchor="middle" font-family="Arial" font-size="10" fill="white">perror()</text>
    
    <!-- Arrow from NULL to Process -->
    <line x1="290" y1="70" x2="310" y2="70" stroke="#2d5a6b" stroke-width="2" class="arrow"/>
    <polygon points="310,70 303,66 303,74" fill="#2d5a6b"/>
    <text x="300" y="60" font-family="Arial" font-size="9" fill="#2d5a6b">No</text>
    
    <!-- Process Box -->
    <rect x="315" y="55" width="90" height="30" rx="5" fill="#5bc0de" filter="url(#shadow)"/>
    <text x="360" y="67" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">Read/Write</text>
    <text x="360" y="79" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Operations</text>
    
    <!-- Arrow to fclose -->
    <line x1="360" y1="85" x2="360" y2="110" stroke="#2d5a6b" stroke-width="2" class="arrow"/>
    <polygon points="360,110 356,103 364,103" fill="#2d5a6b"/>
    
    <!-- fclose Box -->
    <rect x="325" y="115" width="70" height="25" rx="5" fill="url(#accentGradient)" filter="url(#shadow)"/>
    <text x="360" y="132" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">fclose()</text>
    
    <!-- Arrow to End -->
    <line x1="360" y1="140" x2="360" y2="160" stroke="#2d5a6b" stroke-width="2" class="arrow"/>
    <polygon points="360,160 356,153 364,153" fill="#2d5a6b"/>
    
    <!-- End Box -->
    <rect x="330" y="165" width="60" height="25" rx="12" fill="#5cb85c" filter="url(#shadow)"/>
    <text x="360" y="182" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">END</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g data-narration="Key concepts include FILE pointer, opening modes, core functions, and error handling">
    <!-- File Pointer Box -->
    <rect x="10" y="210" width="125" height="55" rx="5" fill="white" stroke="#4a90a4" stroke-width="2" filter="url(#shadow)" class="box"/>
    <text x="72" y="228" text-anchor="middle" font-family="Arial" font-size="12" fill="#2d5a6b" font-weight="bold">File Pointer</text>
    <text x="72" y="243" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">FILE *fp;</text>
    <text x="72" y="256" text-anchor="middle" font-family="Arial" font-size="9" fill="#777">Handle for operations</text>
    
    <!-- Opening Modes Box -->
    <rect x="145" y="210" width="125" height="55" rx="5" fill="white" stroke="#5cb85c" stroke-width="2" filter="url(#shadow)" class="box" style="animation-delay: 0.2s"/>
    <text x="207" y="228" text-anchor="middle" font-family="Arial" font-size="12" fill="#2d5a6b" font-weight="bold">Opening Modes</text>
    <text x="207" y="243" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">r  w  a  r+  w+  a+</text>
    <text x="207" y="256" text-anchor="middle" font-family="Arial" font-size="9" fill="#777">Read, Write, Append</text>
    
    <!-- Core Functions Box -->
    <rect x="280" y="210" width="130" height="55" rx="5" fill="white" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)" class="box" style="animation-delay: 0.4s"/>
    <text x="345" y="228" text-anchor="middle" font-family="Arial" font-size="12" fill="#2d5a6b" font-weight="bold">Core Functions</text>
    <text x="345" y="243" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">fprintf fscanf fgetc</text>
    <text x="345" y="256" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">fputc fread fwrite</text>
    
    <!-- Error Handling Box -->
    <rect x="75" y="275" width="270" height="40" rx="5" fill="#fff3cd" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)" class="box" style="animation-delay: 0.6s"/>
    <text x="210" y="290" text-anchor="middle" font-family="Arial" font-size="11" fill="#2d5a6b" font-weight="bold">Error Handling</text>
    <text x="210" y="305" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">if ((fp = fopen("file", "r")) == NULL) { perror("Error"); exit(EXIT_FAILURE); }</text>
  </g>
  
  <!-- Cycle Arrow showing the flow continues -->
  <g data-narration="The file operations form a cycle that can be repeated">
    <path d="M 395 185 Q 410 200 395 215" stroke="#4a90a4" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
    <text x="405" y="205" font-family="Arial" font-size="8" fill="#4a90a4" transform="rotate(90, 405, 205)">Repeat</text>
  </g>
  
  <!-- Highlighted Example Code -->
  <g data-narration="Example showing binary write operation for student records">
    <rect x="10" y="325" width="400" height="65" rx="5" fill="#2d3e50" filter="url(#shadow)" class="box" style="animation-delay: 0.8s"/>
    <text x="210" y="342" text-anchor="middle" font-family="Courier New" font-size="10" fill="#5cb85c">struct Student s = {101, "Rahul", 85.5};</text>
    <text x="210" y="357" text-anchor="middle" font-family="Courier New" font-size="10" fill="#5bc0de">FILE *fp = fopen("students.dat", "wb");</text>
    <text x="210" y="372" text-anchor="middle" font-family="Courier New" font-size="10" fill="#f0ad4e">fwrite(&s, sizeof(struct Student), 1, fp);</text>
    <text x="210" y="385" text-anchor="middle" font-family="Courier New" font-size="10" fill="#e8f4f8">fclose(fp);</text>
  </g>
  
  <!-- Connection Lines -->
  <line x1="55" y1="85" x2="55" y2="210" stroke="#ddd" stroke-width="1" stroke-dasharray="3"/>
  <line x1="207" y1="85" x2="207" y2="210" stroke="#ddd" stroke-width="1" stroke-dasharray="3"/>
  <line x1="345" y1="85" x2="345" y2="210" stroke="#ddd" stroke-width="1" stroke-dasharray="3"/>
</svg>