<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="risc-cisc-architectures">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4e8ec"/>
    </linearGradient>
    <linearGradient id="riscGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf"/>
      <stop offset="100%" style="stop-color:#88d8b0"/>
    </linearGradient>
    <linearGradient id="ciscGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb7b2"/>
      <stop offset="100%" style="stop-color:#ff9a8b"/>
    </linearGradient>
    <linearGradient id="hybridGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5ff"/>
      <stop offset="100%" style="stop-color:#b388ff"/>
    </linearGradient>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInLeft {
        from { transform: translateX(-20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInRight {
        from { transform: translateX(20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes flowRight {
        from { stroke-dashoffset: 60; }
        to { stroke-dashoffset: 0; }
      }
      .title-anim { animation: fadeIn 0.8s ease-out forwards; }
      .risc-anim { animation: slideInLeft 0.6s ease-out forwards; }
      .cisc-anim { animation: slideInRight 0.6s ease-out forwards; }
      .hybrid-anim { animation: slideInUp 0.6s ease-out forwards; }
      .pulse-anim { animation: pulse 2s ease-in-out infinite; }
      .flow-line { stroke-dasharray: 6 4; animation: flowRight 1s linear infinite; }
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .title { font-size: 18px; font-weight: bold; fill: #2c3e50; }
      .label { font-size: 14px; font-weight: 600; fill: #34495e; }
      .detail { font-size: 11px; fill: #5d6d7e; }
      .metric { font-size: 10px; fill: #7f8c8d; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <g class="title-anim">
    <text x="210" y="28" text-anchor="middle" class="title">RISC vs CISC Architectures</text>
    <line x1="100" y1="38" x2="320" y2="38" stroke="#bdc3c7" stroke-width="2"/>
  </g>
  
  <!-- RISC Section (Left) -->
  <g class="risc-anim" data-narration="RISC Architecture: Fixed-length instructions with load-store design">
    <rect x="15" y="55" width="185" height="145" rx="8" fill="url(#riscGradient)" stroke="#27ae60" stroke-width="1.5"/>
    <text x="107" y="75" text-anchor="middle" class="label" fill="#1e8449">RISC</text>
    <text x="107" y="90" text-anchor="middle" class="detail">Reduced Instruction Set</text>
    
    <!-- Pipeline stages -->
    <g transform="translate(25, 100)">
      <rect x="0" y="0" width="30" height="18" rx="2" fill="#ecf0f1" stroke="#27ae60"/>
      <text x="15" y="13" text-anchor="middle" class="metric">IF</text>
      <rect x="35" y="0" width="30" height="18" rx="2" fill="#ecf0f1" stroke="#27ae60"/>
      <text x="50" y="13" text-anchor="middle" class="metric">ID</text>
      <rect x="70" y="0" width="30" height="18" rx="2" fill="#ecf0f1" stroke="#27ae60"/>
      <text x="85" y="13" text-anchor="middle" class="metric">EX</text>
      <rect x="105" y="0" width="30" height="18" rx="2" fill="#ecf0f1" stroke="#27ae60"/>
      <text x="120" y="13" text-anchor="middle" class="metric">MEM</text>
      <rect x="140" y="0" width="30" height="18" rx="2" fill="#ecf0f1" stroke="#27ae60"/>
      <text x="155" y="13" text-anchor="middle" class="metric">WB</text>
    </g>
    
    <!-- Characteristics -->
    <g transform="translate(25, 128)">
      <text x="0" y="0" class="detail">• Fixed 32-bit instr</text>
      <text x="0" y="14" class="detail">• Load-Store architecture</text>
      <text x="0" y="28" class="detail">• Hardwired control</text>
      <text x="95" y="0" class="detail">• 32+ registers</text>
      <text x="95" y="14" class="detail">• 1 CPI (ideal)</text>
    </g>
  </g>
  
  <!-- CISC Section (Right) -->
  <g class="cisc-anim" data-narration="CISC Architecture: Variable-length complex instructions with microprogrammed control">
    <rect x="220" y="55" width="185" height="145" rx="8" fill="url(#ciscGradient)" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="312" y="75" text-anchor="middle" class="label" fill="#c0392b">CISC</text>
    <text x="312" y="90" text-anchor="middle" class="detail">Complex Instruction Set</text>
    
    <!-- Variable Pipeline stages -->
    <g transform="translate(230, 100)">
      <rect x="0" y="0" width="40" height="18" rx="2" fill="#ecf0f1" stroke="#e74c3c"/>
      <text x="20" y="13" text-anchor="middle" class="metric">F</text>
      <rect x="45" y="0" width="28" height="18" rx="2" fill="#ecf0f1" stroke="#e74c3c"/>
      <text x="59" y="13" text-anchor="middle" class="metric">D</text>
      <rect x="78" y="0" width="50" height="18" rx="2" fill="#ecf0f1" stroke="#e74c3c"/>
      <text x="103" y="13" text-anchor="middle" class="metric">EX</text>
      <rect x="133" y="0" width="55" height="18" rx="2" fill="#ecf0f1" stroke="#e74c3c"/>
      <text x="160" y="13" text-anchor="middle" class="metric">MEM</text>
    </g>
    
    <!-- Characteristics -->
    <g transform="translate(230, 128)">
      <text x="0" y="0" class="detail">• Variable length</text>
      <text x="0" y="14" class="detail">• Memory-to-memory</text>
      <text x="0" y="28" class="detail">• Microprogrammed</text>
      <text x="95" y="0" class="detail">• Few registers</text>
      <text x="95" y="14" class="detail">• 2-20 CPI</text>
    </g>
  </g>
  
  <!-- VS indicator -->
  <g class="pulse-anim">
    <circle cx="210" cy="127" r="22" fill="#fff" stroke="#3498db" stroke-width="2"/>
    <text x="210" y="132" text-anchor="middle" class="label" fill="#3498db">VS</text>
  </g>
  
  <!-- Performance Metrics -->
  <g class="hybrid-anim" data-narration="Performance metrics comparing both architectures">
    <rect x="15" y="210" width="185" height="75" rx="6" fill="#fff" stroke="#95a5a6" stroke-width="1" opacity="0.9"/>
    <text x="107" y="228" text-anchor="middle" class="label" fill="#2c3e50">Performance Metrics</text>
    <g transform="translate(25, 240)">
      <text x="0" y="0" class="metric">CPI: Cycles Per Instruction</text>
      <text x="0" y="12" class="metric">ILP: Instruction-Level Parallelism</text>
      <text x="0" y="24" class="metric">Energy Efficiency (MIPS/W)</text>
      <text x="0" y="36" class="metric">Memory Hierarchy Impact</text>
    </g>
  </g>
  
  <!-- Modern Hybrid -->
  <g class="hybrid-anim" data-narration="Modern hybrid approaches combining RISC and CISC benefits">
    <rect x="220" y="210" width="185" height="75" rx="6" fill="url(#hybridGradient)" stroke="#8e44ad" stroke-width="1"/>
    <text x="312" y="228" text-anchor="middle" class="label" fill="#6c3483">Modern Hybrid</text>
    <g transform="translate(230, 240)">
      <text x="0" y="0" class="detail">• ARMv8 + SIMD extensions</text>
      <text x="0" y="14" class="detail">• RISC-V customizable ISA</text>
      <text x="0" y="28" class="detail">• x86-64 µ-ops (Pentium Pro)</text>
      <text x="0" y="42" class="detail">• big.LITTLE (ARM)</text>
    </g>
  </g>
  
  <!-- Examples Section -->
  <g class="hybrid-anim" data-narration="Real-world examples of RISC and CISC processors">
    <rect x="15" y="295" width="390" height="55" rx="6" fill="#fff" stroke="#bdc3c7" stroke-width="1" opacity="0.95"/>
    <text x="210" y="315" text-anchor="middle" class="label" fill="#2c3e50">Examples</text>
    
    <!-- RISC Examples -->
    <g transform="translate(35, 328)">
      <text x="0" y="0" class="metric" fill="#27ae60" font-weight="600">RISC:</text>
      <text x="35" y="0" class="detail">ARM (mobile), RISC-V, MIPS</text>
    </g>
    
    <!-- CISC Examples -->
    <g transform="translate(220, 328)">
      <text x="0" y="0" class="metric" fill="#e74c3c" font-weight="600">CISC:</text>
      <text x="35" y="0" class="detail">Intel x86, AMD64 (desktop)</text>
    </g>
    
    <!-- Arrow indicator -->
    <path d="M 107 355 Q 210 370 312 355" fill="none" stroke="#3498db" stroke-width="1.5" class="flow-line" stroke-dasharray="4 2"/>
  </g>
  
  <!-- Summary Box -->
  <g class="hybrid-anim" data-narration="Summary: RISC optimizes for simplicity and speed, CISC for code density">
    <rect x="120" y="355" width="180" height="28" rx="4" fill="#ecf0f1" stroke="#7f8c8d" stroke-width="0.5"/>
    <text x="210" y="372" text-anchor="middle" class="detail" fill="#34495e">RISC: Simple • Fast | CISC: Dense • Complex</text>
  </g>
</svg>