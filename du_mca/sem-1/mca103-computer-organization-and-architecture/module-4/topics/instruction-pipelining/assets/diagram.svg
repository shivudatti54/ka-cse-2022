<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="instruction-pipelining">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="stage1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba"/>
      <stop offset="100%" style="stop-color:#ff8080"/>
    </linearGradient>
    <linearGradient id="stage2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#baffc9"/>
      <stop offset="100%" style="stop-color:#80ff80"/>
    </linearGradient>
    <linearGradient id="stage3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bae1ff"/>
      <stop offset="100%" style="stop-color:#80b3ff"/>
    </linearGradient>
    <linearGradient id="stage4Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffba"/>
      <stop offset="100%" style="stop-color:#ffff80"/>
    </linearGradient>
    <linearGradient id="stage5Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0bbff"/>
      <stop offset="100%" style="stop-color:#b380ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowRight {
      from { transform: translateX(0); }
      to { transform: translateX(20px); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .section-3 { animation: fadeIn 0.6s ease-out 0.6s both; }
    .stage-box { animation: pulse 3s ease-in-out infinite; animation-delay: 1s; }
    .instruction { animation: fadeIn 0.5s ease-out; }
    .arrow-line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1s ease-out 0.8s forwards; }
    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }
    .legend-item { animation: fadeIn 0.5s ease-out both; }
    .legend-item:nth-child(1) { animation-delay: 0.3s; }
    .legend-item:nth-child(2) { animation-delay: 0.4s; }
    .legend-item:nth-child(3) { animation-delay: 0.5s; }
    .legend-item:nth-child(4) { animation-delay: 0.6s; }
    .legend-item:nth-child(5) { animation-delay: 0.7s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Instruction Pipelining</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5d6d7e" class="title">5-Stage Pipeline Execution</text>
  
  <!-- Pipeline Stages Header -->
  <g class="section-1" data-narration="The five pipeline stages: Fetch, Decode, Execute, Memory, Write Back">
    <rect x="30" y="70" width="340" height="25" fill="#34495e" rx="4"/>
    <text x="55" y="87" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">IF</text>
    <text x="115" y="87" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">ID</text>
    <text x="175" y="87" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">EX</text>
    <text x="235" y="87" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">MEM</text>
    <text x="295" y="87" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">WB</text>
    <text x="345" y="87" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">→</text>
  </g>
  
  <!-- Pipeline Diagram - Instructions overlapping -->
  <g class="section-2" data-narration="Instructions I1-I5 executing in parallel across different stages">
    <!-- Clock cycle labels -->
    <text x="15" y="105" font-family="Arial" font-size="10" fill="#5d6d7e">CC1</text>
    <text x="15" y="135" font-family="Arial" font-size="10" fill="#5d6d7e">CC2</text>
    <text x="15" y="165" font-family="Arial" font-size="10" fill="#5d6d7e">CC3</text>
    <text x="15" y="195" font-family="Arial" font-size="10" fill="#5d6d7e">CC4</text>
    <text x="15" y="225" font-family="Arial" font-size="10" fill="#5d6d7e">CC5</text>
    <text x="15" y="255" font-family="Arial" font-size="10" fill="#5d6d7e">CC6</text>
    <text x="15" y="285" font-family="Arial" font-size="10" fill="#5d6d7e">CC7</text>
    
    <!-- Instruction I1 -->
    <rect x="40" y="92" width="55" height="24" fill="url(#stage1Grad)" rx="3" class="stage-box"/>
    <text x="67" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">I1-F</text>
    <rect x="100" y="92" width="55" height="24" fill="url(#stage2Grad)" rx="3"/>
    <text x="127" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">I1-D</text>
    <rect x="160" y="92" width="55" height="24" fill="url(#stage3Grad)" rx="3"/>
    <text x="187" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">I1-E</text>
    <rect x="220" y="92" width="55" height="24" fill="url(#stage4Grad)" rx="3"/>
    <text x="247" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">I1-M</text>
    <rect x="280" y="92" width="55" height="24" fill="url(#stage5Grad)" rx="3"/>
    <text x="307" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">I1-W</text>
    
    <!-- Instruction I2 -->
    <rect x="40" y="122" width="55" height="24" fill="#ddd" rx="3" opacity="0.5"/>
    <rect x="100" y="122" width="55" height="24" fill="url(#stage1Grad)" rx="3" class="stage-box"/>
    <text x="127" y="138" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">I2-F</text>
    <rect x="160" y="122" width="55" height="24" fill="url(#stage2Grad)" rx="3"/>
    <text x="187" y="138" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">I2-D</text>
    <rect x="220" y="122" width="55" height="24" fill="url(#stage3Grad)" rx="3"/>
    <text x="247" y="138" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">I2-E</text>
    <rect x="280" y="122" width="55" height="24" fill="url(#stage4Grad)" rx="3"/>
    <text x="307" y="138" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">I2-M</text>
    
    <!-- Instruction I3 -->
    <rect x="40" y="152" width="55" height="24" fill="#ddd" rx="3" opacity="0.5"/>
    <rect x="100" y="152" width="55" height="24" fill="#ddd" rx="3" opacity="0.5"/>
    <rect x="160" y="152" width="55" height="24" fill="url(#stage1Grad)" rx="3" class="stage-box"/>
    <text x="187" y="168" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">I3-F</text>
    <rect x="220" y="152" width="55" height="24" fill="url(#stage2Grad)" rx="3"/>
    <text x="247" y="168" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">I3-D</text>
    <rect x="280" y="152" width="55" height="24" fill="url(#stage3Grad)" rx="3"/>
    <text x="307" y="168" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">I3-E</text>
    
    <!-- Instruction I4 -->
    <rect x="40" y="182" width="55" height="24" fill="#ddd" rx="3" opacity="0.5"/>
    <rect x="100" y="182" width="55" height="24" fill="#ddd" rx="3" opacity="0.5"/>
    <rect x="160" y="182" width="55" height="24" fill="#ddd" rx="3" opacity="0.5"/>
    <rect x="220" y="182" width="55" height="24" fill="url(#stage1Grad)" rx="3" class="stage-box"/>
    <text x="247" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">I4-F</text>
    <rect x="280" y="182" width="55" height="24" fill="url(#stage2Grad)" rx="3"/>
    <text x="307" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">I4-D</text>
    
    <!-- Instruction I5 -->
    <rect x="40" y="212" width="55" height="24" fill="#ddd" rx="3" opacity="0.5"/>
    <rect x="100" y="212" width="55" height="24" fill="#ddd" rx="3" opacity="0.5"/>
    <rect x="160" y="212" width="55" height="24" fill="#ddd" rx="3" opacity="0.5"/>
    <rect x="220" y="212" width="55" height="24" fill="#ddd" rx="3" opacity="0.5"/>
    <rect x="280" y="212" width="55" height="24" fill="url(#stage1Grad)" rx="3" class="stage-box"/>
    <text x="307" y="228" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">I5-F</text>
    
    <!-- Completed I1 -->
    <rect x="310" y="242" width="55" height="20" fill="#27ae60" rx="3"/>
    <text x="337" y="256" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">DONE</text>
  </g>
  
  <!-- Stage Legend -->
  <g class="section-3" data-narration="Legend showing full form of each pipeline stage">
    <rect x="30" y="300" width="360" height="85" fill="white" rx="5" stroke="#bdc3c7" stroke-width="1" filter="url(#shadow)"/>
    <text x="45" y="320" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">Pipeline Stages:</text>
    
    <g class="legend-item">
      <rect x="45" y="330" width="18" height="12" fill="url(#stage1Grad)" rx="2"/>
      <text x="68" y="340" font-family="Arial" font-size="10" fill="#333">IF - Fetch</text>
    </g>
    <g class="legend-item">
      <rect x="150" y="330" width="18" height="12" fill="url(#stage2Grad)" rx="2"/>
      <text x="173" y="340" font-family="Arial" font-size="10" fill="#333">ID - Decode</text>
    </g>
    <g class="legend-item">
      <rect x="270" y="330" width="18" height="12" fill="url(#stage3Grad)" rx="2"/>
      <text x="293" y="340" font-family="Arial" font-size="10" fill="#333">EX - Execute</text>
    </g>
    <g class="legend-item">
      <rect x="45" y="355" width="18" height="12" fill="url(#stage4Grad)" rx="2"/>
      <text x="68" y="365" font-family="Arial" font-size="10" fill="#333">MEM - Memory</text>
    </g>
    <g class="legend-item">
      <rect x="160" y="355" width="18" height="12" fill="url(#stage5Grad)" rx="2"/>
      <text x="183" y="365" font-family="Arial" font-size="10" fill="#333">WB - Write Back</text>
    </g>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section-3" data-narration="Key concepts: Hazards include structural, data, and control hazards">
    <rect x="250" y="70" width="140" height="55" fill="#fef9e7" rx="4" stroke="#f39c12" stroke-width="1" filter="url(#shadow)"/>
    <text x="260" y="85" font-family="Arial" font-size="10" font-weight="bold" fill="#d35400">⚡ Pipeline Hazards</text>
    <text x="260" y="100" font-family="Arial" font-size="9" fill="#5d6d7e">• Structural</text>
    <text x="260" y="112" font-family="Arial" font-size="9" fill="#5d6d7e">• Data (RAW/WAR/WAW)</text>
    <text x="260" y="124" font-family="Arial" font-size="9" fill="#5d6d7e">• Control</text>
  </g>
  
  <!-- Performance Metrics -->
  <g class="section-3" data-narration="Performance improvement shown: Without pipeline takes 25 cycles, with pipeline takes 9 cycles">
    <rect x="250" y="130" width="140" height="50" fill="#e8f8f5" rx="4" stroke="#1abc9c" stroke-width="1" filter="url(#shadow)"/>
    <text x="260" y="145" font-family="Arial" font-size="10" font-weight="bold" fill="#16a085">📊 Performance</text>
    <text x="260" y="160" font-family="Arial" font-size="9" fill="#5d6d7e">Non-pipelined: 25 cycles</text>
    <text x="260" y="172" font-family="Arial" font-size="9" fill="#5d6d7e">Pipelined: 9 cycles</text>
    <text x="260" y="182" font-family="Arial" font-size="9" font-weight="bold" fill="#27ae60">Speedup: ~2.8x</text>
  </g>
  
  <!-- Arrow showing flow -->
  <g class="section-3">
    <path d="M 40 250 L 40 280" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
      </marker>
    </defs>
    <text x="20" y="270" font-family="Arial" font-size="9" fill="#e74c3c" transform="rotate(-90, 20, 270)">Time →</text>
  </g>
  
  <!-- Resolution Techniques -->
  <g class="section-3" data-narration="Hazard resolution techniques: Forwarding, Stalling, Branch Prediction">
    <rect x="30" y="355" width="210" height="30" fill="#f5eef8" rx="4" stroke="#9b59b6" stroke-width="1" filter="url(#shadow)"/>
    <text x="40" y="370" font-family="Arial" font-size="10" font-weight="bold" fill="#8e44ad">🔧 Resolution: Forwarding | Stalling | Prediction</text>
  </g>
</svg>