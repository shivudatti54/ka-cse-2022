<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="io-organization-interrupts-dma">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="deviceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3"/>
      <stop offset="100%" style="stop-color:#5ba3c6"/>
    </linearGradient>
    <linearGradient id="controllerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8a9c9"/>
      <stop offset="100%" style="stop-color:#9583ad"/>
    </linearGradient>
    <linearGradient id="cpuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d5ba"/>
      <stop offset="100%" style="stop-color:#7cb890"/>
    </linearGradient>
    <linearGradient id="dmaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c6d6"/>
      <stop offset="100%" style="stop-color:#e89baf"/>
    </linearGradient>
    <linearGradient id="memGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7"/>
      <stop offset="100%" style="stop-color:#f9d56e"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowPulse {
      0%, 100% { stroke-opacity: 1; }
      50% { stroke-opacity: 0.5; }
    }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
    .section-box { rx: 8; ry: 8; stroke: #888; stroke-width: 1; }
    .flow-line { stroke: #555; stroke-width: 2; fill: none; marker-end: url(#arrowhead); animation: flowPulse 2s infinite; }
    .irq-line { stroke: #e74c3c; stroke-width: 2; stroke-dasharray: 4,2; }
    .dma-line { stroke: #9b59b6; stroke-width: 2; stroke-dasharray: 6,3; }
    .section-anim { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <text x="210" y="25" text-anchor="middle" class="title section-anim">I/O Organization: Interrupts &amp; DMA</text>
  
  <!-- I/O Devices Section -->
  <g class="section-anim delay-1" data-narration="I/O Devices: External hardware devices that generate interrupt requests (IRQ) to signal CPU for attention">
    <rect x="20" y="50" width="80" height="90" fill="url(#deviceGrad)" class="section-box"/>
    <text x="60" y="65" text-anchor="middle" class="label" font-weight="bold">I/O Devices</text>
    <rect x="30" y="75" width="60" height="20" fill="#fff" rx="3"/>
    <text x="60" y="88" text-anchor="middle" class="detail">Keyboard</text>
    <rect x="30" y="100" width="60" height="20" fill="#fff" rx="3"/>
    <text x="60" y="113" text-anchor="middle" class="detail">Disk</text>
    <text x="60" y="132" text-anchor="middle" class="detail" font-size="9">IRQ Lines</text>
  </g>
  
  <!-- IRQ Lines to Controller -->
  <path d="M100 85 L140 85" class="irq-line section-anim delay-2"/>
  <path d="M100 110 L140 110" class="irq-line section-anim delay-2"/>
  
  <!-- Interrupt Controller -->
  <g class="section-anim delay-2" data-narration="Interrupt Controller: Hardware that prioritizes and manages interrupt requests from multiple devices before signaling CPU">
    <rect x="140" y="55" width="90" height="80" fill="url(#controllerGrad)" class="section-box"/>
    <text x="185" y="72" text-anchor="middle" class="label" font-weight="bold">Interrupt</text>
    <text x="185" y="85" text-anchor="middle" class="label" font-weight="bold">Controller</text>
    <rect x="150" y="95" width="70" height="15" fill="#fff" rx="2"/>
    <text x="185" y="106" text-anchor="middle" class="detail">Priority Logic</text>
    <rect x="150" y="113" width="70" height="15" fill="#fff" rx="2"/>
    <text x="185" y="124" text-anchor="middle" class="detail">Vector Table</text>
  </g>
  
  <!-- INT signal to CPU -->
  <path d="M230 95 L270 95" class="flow-line section-anim delay-3"/>
  <text x="250" y="90" class="detail" font-size="9">INT</text>
  
  <!-- CPU Section -->
  <g class="section-anim delay-3" data-narration="CPU: Saves program counter, fetches ISR address from vector table, and executes the interrupt service routine">
    <rect x="270" y="50" width="130" height="120" fill="url(#cpuGrad)" class="section-box"/>
    <text x="335" y="68" text-anchor="middle" class="label" font-weight="bold">CPU</text>
    <rect x="280" y="78" width="110" height="25" fill="#fff" rx="3"/>
    <text x="335" y="88" text-anchor="middle" class="detail">PC Save: Stack</text>
    <text x="335" y="98" text-anchor="middle" class="detail" font-size="9">Push current address</text>
    <rect x="280" y="108" width="110" height="25" fill="#fff" rx="3"/>
    <text x="335" y="118" text-anchor="middle" class="detail">Fetch ISR Address</text>
    <text x="335" y="128" text-anchor="middle" class="detail" font-size="9">From Vector Table</text>
    <rect x="280" y="138" width="110" height="25" fill="#fff" rx="3"/>
    <text x="335" y="148" text-anchor="middle" class="detail">Execute ISR</text>
    <text x="335" y="158" text-anchor="middle" class="detail" font-size="9">Service routine</text>
  </g>
  
  <!-- Memory Section -->
  <g class="section-anim delay-2" data-narration="Memory: Stores interrupt vector table mapping interrupt IDs to ISR addresses, also holds data for DMA transfers">
    <rect x="270" y="200" width="130" height="70" fill="url(#memGrad)" class="section-box"/>
    <text x="335" y="218" text-anchor="middle" class="label" font-weight="bold">Memory</text>
    <rect x="280" y="228" width="110" height="18" fill="#fff" rx="2"/>
    <text x="335" y="241" text-anchor="middle" class="detail">Vector Table</text>
    <rect x="280" y="250" width="110" height="15" fill="#fff" rx="2"/>
    <text x="335" y="261" text-anchor="middle" class="detail">ISR Addresses</text>
  </g>
  
  <!-- DMA Controller -->
  <g class="section-anim delay-4" data-narration="DMA Controller: Enables direct memory access by bypassing CPU for bulk data transfers (cycle stealing or burst mode)">
    <rect x="20" y="220" width="100" height="80" fill="url(#dmaGrad)" class="section-box"/>
    <text x="70" y="240" text-anchor="middle" class="label" font-weight="bold">DMA Controller</text>
    <rect x="28" y="250" width="84" height="16" fill="#fff" rx="2"/>
    <text x="70" y="261" text-anchor="middle" class="detail">Ch 0-3</text>
    <rect x="28" y="270" width="84" height="16" fill="#fff" rx="2"/>
    <text x="70" y="281" text-anchor="middle" class="detail">Cycle Steal</text>
  </g>
  
  <!-- DMA to Memory -->
  <path d="M120 260 L160 260 L160 300 L270 300" class="dma-line section-anim delay-5"/>
  <text x="195" y="255" class="detail" font-size="9" fill="#9b59b6">DMA Request</text>
  
  <!-- CPU to Memory -->
  <path d="M335 170 L335 195" class="flow-line section-anim delay-4"/>
  <text x="345" y="185" class="detail" font-size="9">Fetch ISR</text>
  
  <!-- I/O to Memory via DMA -->
  <path d="M60 160 L60 190 L120 190 L120 225" class="dma-line section-anim delay-5" stroke-dasharray="0"/>
  <path d="M120 225 L120 260" class="dma-line section-anim delay-5"/>
  <text x="90" y="200" class="detail" font-size="9" fill="#9b59b6">Data Transfer</text>
  
  <!-- Key Concepts Box -->
  <g class="section-anim delay-5" data-narration="Key I/O Mechanisms: Programmed I/O (CPU controlled), Interrupt-Driven (async events), DMA (direct memory access)">
    <rect x="15" y="320" width="390" height="70" fill="#fff" rx="8" ry="8" stroke="#aaa" stroke-width="1"/>
    <text x="25" y="340" class="label" font-weight="bold" fill="#2c3e50">Key Concepts:</text>
    <text x="25" y="358" class="detail" fill="#555">1. Programmed I/O: CPU polls device status registers</text>
    <text x="25" y="372" class="detail" fill="#555">2. Interrupt-Driven: Async notification via IRQ lines</text>
    <text x="200" y="358" class="detail" fill="#555">3. DMA: Direct Memory Access (Cycle Stealing/Burst)</text>
    <text x="200" y="372" class="detail" fill="#555">4. Memory-Mapped I/O: Unified address space</text>
  </g>
  
  <!-- Flow indicator -->
  <g class="section-anim delay-5">
    <circle cx="395" cy="385" r="8" fill="#5cb85c">
      <animate attributeName="r" values="8;10;8" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="395" y="389" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">✓</text>
  </g>
</svg>