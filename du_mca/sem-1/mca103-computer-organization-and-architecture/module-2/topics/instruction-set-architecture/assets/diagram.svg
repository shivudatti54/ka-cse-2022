<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="instruction-set-architecture" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6ba3b8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cce6cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0ccff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cce0ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .section2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .section3 { animation: slideUp 0.6s ease-out 0.6s both; }
    .section4 { animation: slideUp 0.6s ease-out 0.8s both; }
    .field-box { animation: pulse 3s ease-in-out infinite; }
    .highlight { animation: blink 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <g class="title">
    <rect x="0" y="0" width="420" height="45" fill="url(#headerGrad)" rx="12"/>
    <rect x="0" y="35" width="420" height="10" fill="url(#headerGrad)"/>
    <text x="210" y="28" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Instruction Set Architecture</text>
  </g>
  
  <!-- Section 1: Fixed-Length Format (RISC) -->
  <g class="section1" data-narration="Fixed-length instruction format used in RISC architectures like ARM and MIPS. All instructions are the same size (typically 32 bits), simplifying the decoding process and enabling efficient pipelining.">
    <rect x="15" y="55" width="185" height="75" fill="url(#boxGrad1)" rx="8" filter="url(#shadow)"/>
    <text x="25" y="72" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#cc6600">Fixed-Length (RISC)</text>
    <rect x="25" y="82" width="40" height="14" fill="#e6b366" rx="2" class="field-box"/>
    <text x="45" y="92" font-family="Arial, sans-serif" font-size="9" fill="#663300" text-anchor="middle">Opcode</text>
    <rect x="70" y="82" width="40" height="14" fill="#7ab8cc" rx="2"/>
    <text x="90" y="92" font-family="Arial, sans-serif" font-size="9" fill="#003344" text-anchor="middle">Rs</text>
    <rect x="115" y="82" width="40" height="14" fill="#7ab8cc" rx="2"/>
    <text x="135" y="92" font-family="Arial, sans-serif" font-size="9" fill="#003344" text-anchor="middle">Rt</text>
    <rect x="160" y="82" width="35" height="14" fill="#7ab8cc" rx="2"/>
    <text x="177" y="92" font-family="Arial, sans-serif" font-size="9" fill="#003344" text-anchor="middle">Sh</text>
    <text x="25" y="118" font-family="Arial, sans-serif" font-size="11" fill="#995500">32 bits • Uniform size</text>
  </g>
  
  <!-- Section 2: Variable-Length Format (CISC) -->
  <g class="section2" data-narration="Variable-length instruction format used in CISC architectures like x86. Instructions can be 1 to 15 bytes long, allowing for compact code but requiring more complex decoding logic.">
    <rect x="220" y="55" width="185" height="75" fill="url(#boxGrad2)" rx="8" filter="url(#shadow)"/>
    <text x="230" y="72" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d5a2d">Variable-Length (CISC)</text>
    <rect x="230" y="82" width="25" height="14" fill="#66b366" rx="2" class="field-box"/>
    <text x="242" y="92" font-family="Arial, sans-serif" font-size="9" fill="#003300" text-anchor="middle">Op</text>
    <rect x="260" y="82" width="30" height="14" fill="#b3d9b3" rx="2"/>
    <text x="275" y="92" font-family="Arial, sans-serif" font-size="9" fill="#003300" text-anchor="middle">Mod</text>
    <rect x="295" y="82" width="25" height="14" fill="#b3d9b3" rx="2"/>
    <text x="307" y="92" font-family="Arial, sans-serif" font-size="9" fill="#003300" text-anchor="middle">R/M</text>
    <rect x="325" y="82" width="30" height="14" fill="#b3d9b3" rx="2"/>
    <text x="340" y="92" font-family="Arial, sans-serif" font-size="9" fill="#003300" text-anchor="middle">...</text>
    <rect x="360" y="82" width="35" height="14" fill="#d9ffd9" rx="2"/>
    <text x="377" y="92" font-family="Arial, sans-serif" font-size="8" fill="#003300" text-anchor="middle">Imm</text>
    <text x="230" y="118" font-family="Arial, sans-serif" font-size="11" fill="#336633">1-15 bytes • Compact</text>
  </g>
  
  <!-- Section 3: Addressing Modes -->
  <g class="section3" data-narration="Addressing modes define how the CPU locates operand data. Common modes include Immediate (value in instruction), Register Direct (data in register), and Memory Indirect (address in register).">
    <rect x="15" y="140" width="185" height="95" fill="url(#boxGrad3)" rx="8" filter="url(#shadow)"/>
    <text x="25" y="157" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4a2d8c">Addressing Modes</text>
    
    <g transform="translate(25, 168)">
      <circle cx="6" cy="4" r="3" fill="#8b5fc7"/>
      <text x="18" y="8" font-family="Arial, sans-serif" font-size="10" fill="#3d2070">Immediate: MOV R1, #5</text>
    </g>
    <g transform="translate(25, 186)">
      <circle cx="6" cy="4" r="3" fill="#8b5fc7"/>
      <text x="18" y="8" font-family="Arial, sans-serif" font-size="10" fill="#3d2070">Register: ADD R3, R1, R2</text>
    </g>
    <g transform="translate(25, 204)">
      <circle cx="6" cy="4" r="3" fill="#8b5fc7"/>
      <text x="18" y="8" font-family="Arial, sans-serif" font-size="10" fill="#3d2070">Mem Indirect: LDR R0, [R1]</text>
    </g>
    <g transform="translate(25, 222)">
      <circle cx="6" cy="4" r="3" fill="#8b5fc7" class="highlight"/>
      <text x="18" y="8" font-family="Arial, sans-serif" font-size="10" fill="#3d2070">Indexed: LW R2, 100(R1)</text>
    </g>
  </g>
  
  <!-- Section 4: Register Architecture -->
  <g class="section4" data-narration="Register architecture defines how operands are accessed. Three main types: Accumulator (single implicit operand), Stack-based (operands on stack), and Load-Store (explicit register operations).">
    <rect x="220" y="140" width="185" height="95" fill="url(#boxGrad4)" rx="8" filter="url(#shadow)"/>
    <text x="230" y="157" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d4d8c">Register Architecture</text>
    
    <g transform="translate(230, 172)">
      <rect x="0" y="0" width="55" height="20" fill="#cce0ff" rx="4"/>
      <text x="27" y="14" font-family="Arial, sans-serif" font-size="9" fill="#1a3380" text-anchor="middle">Accumulator</text>
    </g>
    <g transform="translate(295, 172)">
      <rect x="0" y="0" width="55" height="20" fill="#cce0ff" rx="4"/>
      <text x="27" y="14" font-family="Arial, sans-serif" font-size="9" fill="#1a3380" text-anchor="middle">Stack-based</text>
    </g>
    <g transform="translate(355, 172)">
      <rect x="0" y="0" width="40" height="20" fill="#cce0ff" rx="4"/>
      <text x="20" y="14" font-family="Arial, sans-serif" font-size="9" fill="#1a3380" text-anchor="middle">Load-Store</text>
    </g>
    
    <g transform="translate(230, 200)">
      <circle cx="5" cy="5" r="3" fill="#4a7ab8"/>
      <text x="18" y="9" font-family="Arial, sans-serif" font-size="9" fill="#1a3380">Early computers</text>
    </g>
    <g transform="translate(300, 200)">
      <circle cx="5" cy="5" r="3" fill="#4a7ab8"/>
      <text x="18" y="9" font-family="Arial, sans-serif" font-size="9" fill="#1a3380">JVM, FORTH</text>
    </g>
    <g transform="translate(365, 200)">
      <circle cx="5" cy="5" r="3" fill="#4a7ab8" class="highlight"/>
      <text x="18" y="9" font-family="Arial, sans-serif" font-size="9" fill="#1a3380">ARM, MIPS</text>
    </g>
  </g>
  
  <!-- Comparison Arrows -->
  <g data-narration="Comparison showing RISC vs CISC trade-offs. RISC uses fixed-length for simplicity and pipelining efficiency, while CISC uses variable-length for code density.">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#4a90a4"/>
      </marker>
    </defs>
    <line x1="108" y1="130" x2="312" y2="130" stroke="#4a90a4" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,3"/>
    <text x="210" y="145" font-family="Arial, sans-serif" font-size="10" fill="#4a90a4" text-anchor="middle" font-style="italic">RISC vs CISC Trade-off</text>
  </g>
  
  <!-- Key Concept Box -->
  <g data-narration="Key insight: ISA serves as the contract between software and hardware, enabling software compatibility while allowing hardware innovation.">
    <rect x="15" y="245" width="390" height="40" fill="#fff9e6" rx="6" stroke="#e6c200" stroke-width="1.5"/>
    <text x="25" y="262" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#996600">Key Insight:</text>
    <text x="25" y="277" font-family="Arial, sans-serif" font-size="11" fill="#665500">ISA defines the interface between software and hardware, ensuring compatibility</text>
    <text x="370" y="277" font-family="Arial, sans-serif" font-size="11" fill="#665500">across</text>
    <text x="25" y="289" font-family="Arial, sans-serif" font-size="11" fill="#665500">generations of processors.</text>
  </g>
  
  <!-- Examples Section -->
  <g data-narration="Common ISA examples: x86-64 dominates desktop and server markets with backward compatibility; ARM leads mobile and embedded systems; RISC-V is an emerging open-source ISA.">
    <rect x="15" y="295" width="120" height="50" fill="url(#boxGrad1)" rx="6" filter="url(#shadow)"/>
    <text x="25" y="312" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#cc6600">x86-64</text>
    <text x="25" y="327" font-family="Arial, sans-serif" font-size="10" fill="#995500">Desktop/Server</text>
    <text x="25" y="339" font-family="Arial, sans-serif" font-size="9" fill="#996600">Intel, AMD</text>
  </g>
  
  <g data-narration="ARM architecture powers most mobile devices and is increasingly used in laptops and servers.">
    <rect x="150" y="295" width="120" height="50" fill="url(#boxGrad2)" rx="6" filter="url(#shadow)"/>
    <text x="160" y="312" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2d5a2d">ARM</text>
    <text x="160" y="327" font-family="Arial, sans-serif" font-size="10" fill="#336633">Mobile/Embedded</text>
    <text x="160" y="339" font-family="Arial, sans-serif" font-size="9" fill="#336633">Apple, Qualcomm</text>
  </g>
  
  <g data-narration="RISC-V is an open-source ISA enabling custom extensions and research innovation.">
    <rect x="285" y="295" width="120" height="50" fill="url(#boxGrad3)" rx="6" filter="url(#shadow)"/>
    <text x="295" y="312" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4a2d8c">RISC-V</text>
    <text x="295" y="327" font-family="Arial, sans-serif" font-size="10" fill="#3d2070">Open-source ISA</text>
    <text x="295" y="339" font-family="Arial, sans-serif" font-size="9" fill="#4a2d8c">Research/Custom</text>
  </g>
  
  <!-- Instruction Types Summary -->
  <g data-narration="Three main instruction types: Data Transfer (MOV, LOAD, STORE), Arithmetic/Logical (ADD, SUB, AND, OR), and Control Flow (JMP, BRANCH, CALL).">
    <rect x="15" y="355" width="390" height="35" fill="url(#boxGrad4)" rx="6" filter="url(#shadow)"/>
    <text x="25" y="372" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2d4d8c">Instruction Types:</text>
    <rect x="110" y="362" width="55" height="18" fill="#cce0ff" rx="3"/>
    <text x="137" y="375" font-family="Arial, sans-serif" font-size="10" fill="#1a3380" text-anchor="middle">Data Transfer</text>
    <rect x="175" y="362" width="70" height="18" fill="#cce0ff" rx="3"/>
    <text x="210" y="375" font-family="Arial, sans-serif" font-size="10" fill="#1a3380" text-anchor="middle">Arithmetic/Logic</text>
    <rect x="255" y="362" width="50" height="18" fill="#cce0ff" rx="3"/>
    <text x="280" y="375" font-family="Arial, sans-serif" font-size="10" fill="#1a3380" text-anchor="middle">Control</text>
    <rect x="315" y="362" width="80" height="18" fill="#cce0ff" rx="3"/>
    <text x="355" y="375" font-family="Arial, sans-serif" font-size="10" fill="#1a3380" text-anchor="middle">MOV, LOAD</text>
    <rect x="355" y="362" width="40" height="18" fill="#cce0ff" rx="3" opacity="0"/>
  </g>
</svg>