<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="addressing-modes-instruction-format">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4e8ec"/>
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf"/>
      <stop offset="100%" style="stop-color:#88d8b0"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dcd6f7"/>
      <stop offset="100%" style="stop-color:#a6b1e1"/>
    </linearGradient>
    <linearGradient id="boxGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2"/>
      <stop offset="100%" style="stop-color:#fcb69f"/>
    </linearGradient>
    <linearGradient id="boxGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e"/>
      <stop offset="100%" style="stop-color:#fecfef"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes colorPulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.1); } }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section1 { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section2 { animation: slideIn 0.6s ease-out 0.35s forwards; opacity: 0; }
    .section3 { animation: slideIn 0.6s ease-out 0.5s forwards; opacity: 0; }
    .section4 { animation: slideInUp 0.6s ease-out 0.65s forwards; opacity: 0; }
    .pulse-box { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .highlight { animation: colorPulse 1.5s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
    .title-text { font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-size: 12px; fill: #34495e; }
    .detail-text { font-size: 10px; fill: #5d6d7e; }
    .opcode-text { font-size: 11px; font-weight: bold; fill: #fff; }
    .arrow { marker-end: url(#arrowhead); }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <text x="210" y="25" text-anchor="middle" class="title-text title">Addressing Modes &amp; Instruction Format</text>
  
  <!-- Section 1: Addressing Modes -->
  <g class="section1" data-narration="Addressing modes define how processors locate operands. Common modes include Immediate (operand in instruction), Direct (address specified), Indirect (address of address), Register (operand in register), Register Indirect (address in register), Displacement (base+offset), and Stack (implicit pointer).">
    <rect x="10" y="38" width="125" height="130" rx="8" fill="url(#boxGrad1)" stroke="#27ae60" stroke-width="1.5"/>
    <text x="72" y="53" text-anchor="middle" class="label-text" style="font-weight:bold;font-size:12px;">Addressing Modes</text>
    <line x1="20" y1="60" x2="125" y2="60" stroke="#27ae60" stroke-width="0.5" stroke-dasharray="3,2"/>
    <text x="18" y="75" class="detail-text">• Immediate: #5</text>
    <text x="18" y="87" class="detail-text">• Direct: 2000</text>
    <text x="18" y="99" class="detail-text">• Indirect: (2000)</text>
    <text x="18" y="111" class="detail-text">• Register: R1</text>
    <text x="18" y="123" class="detail-text">• Reg.Indirect: (R2)</text>
    <text x="18" y="135" class="detail-text">• Displacement: 100(R2)</text>
    <text x="18" y="147" class="detail-text">• Stack: PUSH/POP</text>
  </g>
  
  <!-- Section 2: Instruction Format Components -->
  <g class="section2" data-narration="Instruction formats define how operations are encoded. Key components: Opcode (specifies operation), Addressing Mode Specifier, Operand Fields (registers/memory addresses), and Immediate Data Field. These determine code density and decoding complexity.">
    <rect x="145" y="38" width="125" height="130" rx="8" fill="url(#boxGrad2)" stroke="#6c5ce7" stroke-width="1.5"/>
    <text x="207" y="53" text-anchor="middle" class="label-text" style="font-weight:bold;font-size:12px;">Format Components</text>
    <line x1="155" y1="60" x2="260" y2="60" stroke="#6c5ce7" stroke-width="0.5" stroke-dasharray="3,2"/>
    
    <!-- Opcode box -->
    <rect x="152" y="68" width="50" height="18" rx="3" fill="#6c5ce7"/>
    <text x="177" y="81" text-anchor="middle" class="opcode-text">OPCODE</text>
    
    <!-- Addressing mode -->
    <rect x="208" y="68" width="30" height="18" rx="3" fill="#a29bfe"/>
    <text x="223" y="81" text-anchor="middle" class="detail-text" style="font-size:9px;">MODE</text>
    
    <!-- Operand fields -->
    <rect x="152" y="92" width="110" height="18" rx="3" fill="#a6b1e1"/>
    <text x="207" y="105" text-anchor="middle" class="detail-text" style="font-size:9px;">Operand Fields</text>
    
    <!-- Immediate data -->
    <rect x="152" y="116" width="110" height="18" rx="3" fill="#dcd6f7"/>
    <text x="207" y="129" text-anchor="middle" class="detail-text" style="font-size:9px;">Immediate Data Field</text>
  </g>
  
  <!-- Section 3: Format Types -->
  <g class="section3" data-narration="Instruction formats vary by architecture: Fixed-length (uniform size, RISC like ARM) offers simple decoding; Variable-length (x86) provides compact code but complex decoding; Hybrid (ARM Thumb) balances both. Trade-offs include code density vs decoding complexity.">
    <rect x="280" y="38" width="130" height="130" rx="8" fill="url(#boxGrad3)" stroke="#e17055" stroke-width="1.5"/>
    <text x="345" y="53" text-anchor="middle" class="label-text" style="font-weight:bold;font-size:12px;">Format Types</text>
    <line x1="290" y1="60" x2="400" y2="60" stroke="#e17055" stroke-width="0.5" stroke-dasharray="3,2"/>
    
    <!-- Fixed length -->
    <rect x="288" y="68" width="50" height="12" rx="2" fill="#e17055" class="pulse-box"/>
    <text x="313" y="77" text-anchor="middle" class="detail-text" style="fill:#fff;font-size:9px;">Fixed</text>
    <text x="345" y="77" class="detail-text" style="font-size:8px;">32-bit RISC</text>
    
    <!-- Variable length -->
    <rect x="288" y="86" width="70" height="12" rx="2" fill="#fab1a0" class="pulse-box"/>
    <text x="323" y="95" text-anchor="middle" class="detail-text" style="font-size:9px;">Variable</text>
    <text x="345" y="95" class="detail-text" style="font-size:8px;">1-15B x86</text>
    
    <!-- Hybrid -->
    <rect x="288" y="104" width="55" height="12" rx="2" fill="#ffeaa7" class="pulse-box"/>
    <text x="315" y="113" text-anchor="middle" class="detail-text" style="font-size:9px;">Hybrid</text>
    <text x="345" y="113" class="detail-text" style="font-size:8px;">ARM Thumb</text>
    
    <!-- Trade-offs note -->
    <rect x="288" y="122" width="114" height="38" rx="3" fill="#fff3cd" stroke="#f39c12" stroke-width="0.5"/>
    <text x="345" y="133" text-anchor="middle" class="detail-text" style="font-size:9px;font-weight:bold;">Trade-offs</text>
    <text x="345" y="145" text-anchor="middle" class="detail-text" style="font-size:8px;">Density vs Decode</text>
    <text x="345" y="155" text-anchor="middle" class="detail-text" style="font-size:8px;">Speed vs Flexibility</text>
  </g>
  
  <!-- Section 4: Instruction Format Types Comparison -->
  <g class="section4" data-narration="Comparing instruction formats: Three-address format has opcode + three address fields (complex but clear, e.g., ADD R1,R2,R3); Two-address format combines destination with one source (common in x86); One-address format uses accumulator (simple, early computers).">
    <rect x="10" y="175" width="400" height="210" rx="10" fill="#fff" stroke="#3498db" stroke-width="1.5"/>
    <text x="210" y="192" text-anchor="middle" class="label-text" style="font-weight:bold;font-size:13px;fill:#2c3e50;">Instruction Format Types Comparison</text>
    <line x1="20" y1="202" x2="400" y2="202" stroke="#3498db" stroke-width="0.5" stroke-dasharray="4,2"/>
    
    <!-- Three-Address Format -->
    <rect x="20" y="212" width="120" height="90" rx="6" fill="url(#boxGrad1)" class="highlight"/>
    <text x="80" y="228" text-anchor="middle" class="label-text" style="font-weight:bold;fill:#27ae60;font-size:11px;">Three-Address</text>
    <rect x="28" y="235" width="35" height="14" rx="2" fill="#27ae60"/>
    <text x="45" y="245" text-anchor="middle" class="opcode-text" style="font-size:8px;">OP</text>
    <rect x="68" y="235" width="30" height="14" rx="2" fill="#88d8b0"/>
    <text x="83" y="245" text-anchor="middle" class="detail-text" style="font-size:7px;">Addr1</text>
    <rect x="103" y="235" width="30" height="14" rx="2" fill="#88d8b0"/>
    <text x="118" y="245" text-anchor="middle" class="detail-text" style="font-size:7px;">Addr2</text>
    <rect x="28" y="254" width="105" height="14" rx="2" fill="#88d8b0"/>
    <text x="80" y="264" text-anchor="middle" class="detail-text" style="font-size:7px;">Addr3 (Result)</text>
    <text x="80" y="280" text-anchor="middle" class="detail-text" style="font-size:8px;">e.g., ADD R1,R2,R3</text>
    <text x="80" y="292" text-anchor="middle" class="detail-text" style="font-size:7px;color:#666;">Most flexible</text>
    
    <!-- Two-Address Format -->
    <rect x="150" y="212" width="120" height="90" rx="6" fill="url(#boxGrad2)" class="highlight"/>
    <text x="210" y="228" text-anchor="middle" class="label-text" style="font-weight:bold;fill:#6c5ce7;font-size:11px;">Two-Address</text>
    <rect x="158" y="235" width="35" height="14" rx="2" fill="#6c5ce7"/>
    <text x="175" y="245" text-anchor="middle" class="opcode-text" style="font-size:8px;">OP</text>
    <rect x="198" y="235" width="35" height="14" rx="2" fill="#a6b1e1"/>
    <text x="215" y="245" text-anchor="middle" class="detail-text" style="font-size:7px;">Addr1</text>
    <rect x="158" y="254" width="105" height="14" rx="2" fill="#a6b1e1"/>
    <text x="210" y="264" text-anchor="middle" class="detail-text" style="font-size:7px;">Addr2 (Src/Dest)</text>
    <text x="210" y="280" text-anchor="middle" class="detail-text" style="font-size:8px;">e.g., ADD R1,R2</text>
    <text x="210" y="292" text-anchor="middle" class="detail-text" style="font-size:7px;color:#666;">Common (x86)</text>
    
    <!-- One-Address Format -->
    <rect x="280" y="212" width="120" height="90" rx="6" fill="url(#boxGrad4)" class="highlight"/>
    <text x="340" y="228" text-anchor="middle" class="label-text" style="font-weight:bold;fill:#e84393;font-size:11px;">One-Address</text>
    <rect x="288" y="235" width="40" height="14" rx="2" fill="#e84393"/>
    <text x="308" y="245" text-anchor="middle" class="opcode-text" style="font-size:8px;">OP</text>
    <rect x="333" y="235" width="55" height="14" rx="2" fill="#ff9a9e"/>
    <text x="360" y="245" text-anchor="middle" class="detail-text" style="font-size:7px;">Addr</text>
    <rect x="288" y="254" width="105" height="14" rx="2" fill="#ff9a9e"/>
    <text x="340" y="264" text-anchor="middle" class="detail-text" style="font-size:7px;">Accumulator</text>
    <text x="340" y="280" text-anchor="middle" class="detail-text" style="font-size:8px;">e.g., ADD M</text>
    <text x="340" y="292" text-anchor="middle" class="detail-text" style="font-size:7px;color:#666;">Early computers</text>
    
    <!-- Legend/Key -->
    <rect x="20" y="315" width="380" height="60" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="0.5"/>
    <text x="30" y="330" class="label-text" style="font-size:11px;font-weight:bold;">Key Insight:</text>
    <text x="30" y="345" class="detail-text" style="font-size:10px;">• More address fields = More explicit, larger instructions</text>
    <text x="30" y="358" class="detail-text" style="font-size:10px;">• Fewer fields = Smaller code, requires more operations</text>
    <text x="30" y="371" class="detail-text" style="font-size:10px;">• Trade-off: Code density vs programming simplicity</text>
    
    <!-- Arrows showing progression -->
    <path d="M140 250 L150 250" stroke="#95a5a6" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M270 250 L280 250" stroke="#95a5a6" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#95a5a6"/>
    </marker>
  </defs>
</svg>