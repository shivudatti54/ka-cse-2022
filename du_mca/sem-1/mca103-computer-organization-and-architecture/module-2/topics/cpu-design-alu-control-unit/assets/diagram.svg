<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="cpu-design-alu-control-unit">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dced"/>
    </linearGradient>
    <linearGradient id="aluGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3"/>
      <stop offset="100%" style="stop-color:#5ba3c0"/>
    </linearGradient>
    <linearGradient id="controlGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8a8"/>
      <stop offset="100%" style="stop-color:#7bc47f"/>
    </linearGradient>
    <linearGradient id="regGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd9b3"/>
      <stop offset="100%" style="stop-color:#ffb366"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes flowDash {
      to { stroke-dashoffset: -20; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #555; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #fff; }
    .box-anim { animation: fadeIn 0.8s ease-out forwards; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .slide-anim { animation: slideIn 0.6s ease-out forwards; }
    .flow-line { animation: flowDash 1s linear infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title">CPU Design: ALU &amp; Control Unit</text>
  
  <!-- Control Unit -->
  <g class="box-anim" style="animation-delay: 0.1s;" data-narration="The Control Unit orchestrates CPU operations by generating timing and control signals based on instruction opcodes.">
    <rect x="30" y="70" width="100" height="70" rx="8" fill="url(#controlGradient)" filter="url(#shadow)"/>
    <text x="80" y="98" text-anchor="middle" class="section-title">Control Unit</text>
    <text x="80" y="115" text-anchor="middle" class="detail">Timing Signals</text>
    <text x="80" y="128" text-anchor="middle" class="detail">Instruction Decode</text>
  </g>
  
  <!-- Control Types Box -->
  <g class="box-anim" style="animation-delay: 0.2s;" data-narration="Two main control approaches: Hardwired (fast, FSM-based) and Microprogrammed (flexible, stored microcode).">
    <rect x="25" y="220" width="110" height="55" rx="5" fill="#f0f8e8" stroke="#7bc47f" stroke-width="1.5"/>
    <text x="80" y="240" text-anchor="middle" class="label" style="font-size:11px;font-weight:bold;">Control Types</text>
    <text x="80" y="255" text-anchor="middle" class="detail">• Hardwired (RISC)</text>
    <text x="80" y="268" text-anchor="middle" class="detail">• Microprogrammed</text>
  </g>
  
  <!-- ALU -->
  <g class="box-anim pulse-anim" style="animation-delay: 0.3s;" data-narration="The ALU performs arithmetic (add,sub,mul) and logic (AND,OR,XOR) operations on data from registers.">
    <rect x="160" y="70" width="100" height="90" rx="8" fill="url(#aluGradient)" filter="url(#shadow)"/>
    <text x="210" y="105" text-anchor="middle" class="section-title">ALU</text>
    <text x="210" y="125" text-anchor="middle" class="detail" fill="#fff">• Arithmetic</text>
    <text x="210" y="140" text-anchor="middle" class="detail" fill="#fff">• Logic Operations</text>
    <text x="210" y="155" text-anchor="middle" class="detail" fill="#fff">• Shifters</text>
  </g>
  
  <!-- Status Flags -->
  <g class="box-anim" style="animation-delay: 0.4s;" data-narration="Status flags indicate operation results: Zero (result is 0), Carry (overflow), Overflow (signed overflow), Sign (negative).">
    <rect x="165" y="180" width="90" height="40" rx="4" fill="#e8f4f8" stroke="#5ba3c0" stroke-width="1.5"/>
    <text x="210" y="198" text-anchor="middle" class="label" style="font-size:10px;">Status Flags</text>
    <text x="210" y="212" text-anchor="middle" class="detail">Z | C | V | S</text>
  </g>
  
  <!-- Registers -->
  <g class="box-anim" style="animation-delay: 0.5s;" data-narration="Registers store temporary operands and results. Common registers: PC (Program Counter), IR (Instruction Register), ACC (Accumulator).">
    <rect x="300" y="70" width="90" height="130" rx="8" fill="url(#regGradient)" filter="url(#shadow)"/>
    <text x="345" y="95" text-anchor="middle" class="section-title">Registers</text>
    <text x="345" y="115" text-anchor="middle" class="detail">PC</text>
    <text x="345" y="130" text-anchor="middle" class="detail">IR</text>
    <text x="345" y="145" text-anchor="middle" class="detail">ACC</text>
    <text x="345" y="160" text-anchor="middle" class="detail">General Purpose</text>
    <text x="345" y="185" text-anchor="middle" class="detail" style="font-size:10px;">Data Bus</text>
  </g>
  
  <!-- Instruction Register Box -->
  <g class="box-anim" style="animation-delay: 0.6s;" data-narration="The Instruction Register (IR) holds the currently executing instruction for decoding by the control unit.">
    <rect x="300" y="230" width="90" height="45" rx="5" fill="#ffe8d6" stroke="#ffb366" stroke-width="1.5"/>
    <text x="345" y="250" text-anchor="middle" class="label" style="font-size:11px;font-weight:bold;">IR</text>
    <text x="345" y="265" text-anchor="middle" class="detail">Instruction Register</text>
  </g>
  
  <!-- Pipeline Concept Box -->
  <g class="box-anim" style="animation-delay: 0.7s;" data-narration="Modern CPUs use pipelining to overlap instruction execution stages, improving IPC (Instructions Per Cycle).">
    <rect x="25" y="290" width="110" height="35" rx="4" fill="#f8e8f8" stroke="#c47fd4" stroke-width="1.5"/>
    <text x="80" y="308" text-anchor="middle" class="label" style="font-size:11px;">Pipeline Control</text>
    <text x="80" y="320" text-anchor="middle" class="detail">F|D|E|WB</text>
  </g>
  
  <!-- Arrows / Data Flow Lines -->
  <!-- Control to ALU -->
  <line x1="130" y1="105" x2="155" y2="105" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="flow-line" stroke-dasharray="5,3"/>
  <text x="142" y="98" class="detail" style="font-size:9px;">Op</text>
  
  <!-- Control to Registers -->
  <line x1="130" y1="125" x2="155" y2="125" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="flow-line" stroke-dasharray="5,3" style="animation-delay:0.2s;"/>
  <text x="140" y="118" class="detail" style="font-size:9px;">Ctrl</text>
  
  <!-- ALU to Registers -->
  <line x1="260" y1="140" x2="295" y2="140" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="flow-line" stroke-dasharray="5,3" style="animation-delay:0.3s;"/>
  <text x="275" y="133" class="detail" style="font-size:9px;">Result</text>
  
  <!-- Registers to ALU -->
  <line x1="300" y1="110" x2="265" y2="110" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="flow-line" stroke-dasharray="5,3" style="animation-delay:0.4s;"/>
  <text x="280" y="103" class="detail" style="font-size:9px;">Operand</text>
  
  <!-- IR to Control -->
  <line x1="345" y1="230" x2="345" y2="200" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="flow-line" stroke-dasharray="5,3" style="animation-delay:0.5s;"/>
  <text x="352" y="220" class="detail" style="font-size:9px;">Instr</text>
  
  <!-- Clock Signal -->
  <g class="slide-anim" style="animation-delay: 0.8s;">
    <line x1="20" y1="340" x2="400" y2="340" stroke="#888" stroke-width="1"/>
    <path d="M20,340 L30,340 L30,330 L40,330 L40,340 L50,340 L50,330 L60,330 L60,340 L70,340 L70,330 L80,330 L80,340 L90,340 L90,330 L100,330 L100,340 L110,340" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <text x="200" y="360" text-anchor="middle" class="label">System Clock</text>
    <text x="200" y="375" text-anchor="middle" class="detail">Coordinates Fetch-Decode-Execute Cycle</text>
  </g>
  
  <!-- Example Box -->
  <g class="box-anim" style="animation-delay: 0.9s;" data-narration="Example: (-5) + 7 in 4-bit two's complement. Binary: 1011 + 0111 = 1 0010 (2 with carry).">
    <rect x="300" y="290" width="100" height="50" rx="5" fill="#fff5e6" stroke="#e6a03c" stroke-width="1.5"/>
    <text x="350" y="308" text-anchor="middle" class="label" style="font-size:11px;font-weight:bold;">Example</text>
    <text x="350" y="322" text-anchor="middle" class="detail">(-5)+7 = 2</text>
    <text x="350" y="335" text-anchor="middle" class="detail" style="font-size:9px;">1011+0111=0010</text>
  </g>
  
  <!-- Bypass Network -->
  <g class="box-anim" style="animation-delay: 1s;" data-narration="ALU bypass networks allow forwarding results directly to the next instruction, resolving data hazards in pipelines.">
    <rect x="155" y="235" width="110" height="30" rx="4" fill="#e6f3ff" stroke="#6b9fd4" stroke-width="1"/>
    <text x="210" y="252" text-anchor="middle" class="detail" style="font-size:10px;">Bypass Network (Hazard Resolution)</text>
  </g>
</svg>