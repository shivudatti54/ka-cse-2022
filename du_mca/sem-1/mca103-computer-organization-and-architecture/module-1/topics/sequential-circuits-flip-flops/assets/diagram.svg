<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="sequential-circuits-flip-flops">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e6e6fa"/>
    </linearGradient>
    <linearGradient id="cardGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5f0"/>
      <stop offset="100%" style="stop-color:#ffe4d6"/>
    </linearGradient>
    <linearGradient id="cardGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fff4"/>
      <stop offset="100%" style="stop-color:#d6f5e6"/>
    </linearGradient>
    <linearGradient id="cardGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#d6e8ff"/>
    </linearGradient>
    <linearGradient id="cardGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8f0"/>
      <stop offset="100%" style="stop-color:#ffecd6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes clockPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    @keyframes waveAnim {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 10; }
    }
    .title-group { animation: fadeIn 0.8s ease-out forwards; }
    .card-1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .card-2 { animation: slideInRight 0.6s ease-out 0.3s forwards; opacity: 0; }
    .card-3 { animation: slideInLeft 0.6s ease-out 0.4s forwards; opacity: 0; }
    .card-4 { animation: slideInRight 0.6s ease-out 0.5s forwards; opacity: 0; }
    .timing-section { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .arrow { animation: fadeIn 0.5s ease-out 1s forwards; opacity: 0; }
    .highlight { animation: pulse 2s infinite; }
    .clock-line { animation: clockPulse 1s infinite; }
    .wave-d { animation: waveAnim 2s linear infinite; }
    .wave-q { animation: waveAnim 2.5s linear infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="title-group">
    <rect x="20" y="15" width="380" height="45" rx="8" fill="#4a6fa5" filter="url(#shadow)"/>
    <text x="210" y="42" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Sequential Circuits &amp; Flip-Flops</text>
    <text x="210" y="58" font-family="Arial, sans-serif" font-size="11" fill="#e0e0e0" text-anchor="middle">Memory Elements in Digital Systems</text>
  </g>
  
  <!-- SR Flip-Flop Card -->
  <g class="card-1" data-narration="SR Flip-Flop: The basic Set-Reset flip-flop using NOR/NAND gates. Stores 1 bit with invalid state when S=R=1">
    <rect x="25" y="75" width="85" height="85" rx="6" fill="url(#cardGradient1)" filter="url(#shadow)"/>
    <text x="67.5" y="92" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8b4513" text-anchor="middle">SR Flip-Flop</text>
    <text x="67.5" y="110" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Set-Reset</text>
    <text x="67.5" y="128" font-family="Arial, sans-serif" font-size="9" fill="#888" text-anchor="middle">Q(t+1) = S + R'·Q</text>
    <text x="67.5" y="145" font-family="Arial, sans-serif" font-size="8" fill="#a52a2a" text-anchor="middle">Invalid: S=R=1</text>
  </g>
  
  <!-- JK Flip-Flop Card -->
  <g class="card-2" data-narration="JK Flip-Flop: Eliminates SR invalid state using feedback. Characteristic equation: Q(t+1) = JQ' + K'Q">
    <rect x="125" y="75" width="85" height="85" rx="6" fill="url(#cardGradient2)" filter="url(#shadow)"/>
    <text x="167.5" y="92" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">JK Flip-Flop</text>
    <text x="167.5" y="110" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Jump-Kill</text>
    <text x="167.5" y="128" font-family="Arial, sans-serif" font-size="9" fill="#888" text-anchor="middle">Q(t+1) = JQ' + K'Q</text>
    <text x="167.5" y="145" font-family="Arial, sans-serif" font-size="8" fill="#2e7d32" text-anchor="middle">Toggle: J=K=1</text>
  </g>
  
  <!-- D Flip-Flop Card -->
  <g class="card-3" data-narration="D Flip-Flop: Single input design for data storage. Q(t+1) = D on clock edge">
    <rect x="225" y="75" width="85" height="85" rx="6" fill="url(#cardGradient3)" filter="url(#shadow)"/>
    <text x="267.5" y="92" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">D Flip-Flop</text>
    <text x="267.5" y="110" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Data/Delay</text>
    <text x="267.5" y="128" font-family="Arial, sans-serif" font-size="9" fill="#888" text-anchor="middle">Q(t+1) = D</text>
    <text x="267.5" y="145" font-family="Arial, sans-serif" font-size="8" fill="#1565c0" text-anchor="middle">Edge-triggered</text>
  </g>
  
  <!-- T Flip-Flop Card -->
  <g class="card-4" data-narration="T Flip-Flop: Toggle functionality for counting. Q(t+1) = T XOR Q">
    <rect x="325" y="75" width="85" height="85" rx="6" fill="url(#cardGradient4)" filter="url(#shadow)"/>
    <text x="367.5" y="92" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">T Flip-Flop</text>
    <text x="367.5" y="110" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Toggle</text>
    <text x="367.5" y="128" font-family="Arial, sans-serif" font-size="9" fill="#888" text-anchor="middle">Q(t+1) = T ⊕ Q</text>
    <text x="367.5" y="145" font-family="Arial, sans-serif" font-size="8" fill="#e65100" text-anchor="middle">T=1: Toggle</text>
  </g>
  
  <!-- Classification Box -->
  <g data-narration="Sequential circuits classified as Synchronous (clocked) or Asynchronous (unclocked)">
    <rect x="25" y="170" width="180" height="50" rx="5" fill="#fff" stroke="#4a6fa5" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="115" y="188" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4a6fa5" text-anchor="middle">Sequential Circuit Types</text>
    <text x="65" y="208" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="middle">Synchronous</text>
    <line x1="85" y1="205" x2="105" y2="205" stroke="#4a6fa5" stroke-width="1"/>
    <text x="115" y="208" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Clock-edge triggered</text>
    <text x="165" y="208" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="middle">Asynchronous</text>
    <line x1="185" y1="205" x2="205" y2="205" stroke="#4a6fa5" stroke-width="1"/>
    <text x="215" y="208" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Input-triggered</text>
  </g>
  
  <!-- Timing Parameters Box -->
  <g data-narration="Key timing parameters: Setup time (data stable before clock) and Hold time (data stable after clock)">
    <rect x="220" y="170" width="190" height="50" rx="5" fill="#fff" stroke="#4a6fa5" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="315" y="188" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4a6fa5" text-anchor="middle">Timing Parameters</text>
    <text x="255" y="208" font-family="Arial, sans-serif" font-size="10" fill="#333">t<tspan baseline-shift="sub" font-size="8">su</tspan></text>
    <text x="275" y="208" font-family="Arial, sans-serif" font-size="9" fill="#666">Setup time</text>
    <text x="355" y="208" font-family="Arial, sans-serif" font-size="10" fill="#333">t<tspan baseline-shift="sub" font-size="8">h</tspan></text>
    <text x="375" y="208" font-family="Arial, sans-serif" font-size="9" fill="#666">Hold time</text>
  </g>
  
  <!-- Timing Diagram Section -->
  <g class="timing-section" data-narration="D Flip-Flop Timing Diagram: Shows D input sampled on rising clock edge, Q output changes after small propagation delay">
    <rect x="25" y="235" width="385" height="150" rx="6" fill="#fff" stroke="#9c27b0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="217.5" y="255" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9c27b0" text-anchor="middle">D Flip-Flop Timing Diagram</text>
    
    <!-- Clock Signal -->
    <text x="40" y="280" font-family="Arial, sans-serif" font-size="11" fill="#333">CLK</text>
    <polyline points="60,275 70,275 70,265 80,265 80,275 90,275 90,265 100,265 100,275 110,275 110,265 120,265 120,275 130,275 130,265 140,265 140,275 150,275 150,265 160,265 160,275 170,275 170,265 180,265 180,275 190,275 190,265 200,265 200,275 210,275 210,265 220,265 220,275 230,275 230,265 240,265 240,275 250,275 250,265 260,265 260,275 270,275 270,265 280,265 280,275 290,275 290,265 300,265 300,275 310,275 310,265 320,265 320,275 330,275 330,265 340,265 340,275 350,275 350,265 360,265 360,275 370,275 370,265 380,265 380,275" 
              fill="none" stroke="#e91e63" stroke-width="2" class="clock-line"/>
    
    <!-- Rising Edge Markers -->
    <line x1="80" y1="262" x2="80" y2="272" stroke="#e91e63" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="120" y1="262" x2="120" y2="272" stroke="#e91e63" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="160" y1="262" x2="160" y2="272" stroke="#e91e63" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="200" y1="262" x2="200" y2="272" stroke="#e91e63" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="240" y1="262" x2="240" y2="272" stroke="#e91e63" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="280" y1="262" x2="280" y2="272" stroke="#e91e63" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="320" y1="262" x2="320" y2="272" stroke="#e91e63" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="360" y1="262" x2="360" y2="272" stroke="#e91e63" stroke-width="1" stroke-dasharray="2,2"/>
    
    <!-- D Input Signal -->
    <text x="40" y="305" font-family="Arial, sans-serif" font-size="11" fill="#333">D</text>
    <polyline points="60,300 90,300 90,320 130,320 130,300 170,300 170,320 210,320 210,300 250,300 250,320 290,320 290,300 330,300 330,320 370,320 370,300" 
              fill="none" stroke="#2196f3" stroke-width="2.5" class="wave-d"/>
    
    <!-- Q Output Signal (delayed from D) -->
    <text x="40" y="330" font-family="Arial, sans-serif" font-size="11" fill="#333">Q</text>
    <polyline points="60,325 90,325 90,325 95,345 125,345 125,325 130,325 135,345 165,345 165,325 170,325 175,345 205,345 205,325 210,325 215,345 245,345 245,325 250,325 255,345 285,345 285,325 290,325 295,345 325,345 325,325 330,325 335,345 365,345 365,325 370,325 370,345 385,345" 
              fill="none" stroke="#4caf50" stroke-width="2.5" class="wave-q"/>
    
    <!-- Labels -->
    <text x="80" y="375" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">Edge 1</text>
    <text x="120" y="375" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">Edge 2</text>
    <text x="160" y="375" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">Edge 3</text>
    <text x="200" y="375" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">Edge 4</text>
    
    <!-- Setup/Hold Time Annotation -->
    <line x1="170" y1="295" x2="170" y2="315" stroke="#ff9800" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="200" y1="295" x2="200" y2="315" stroke="#ff9800" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="170" y1="305" x2="200" y2="305" stroke="#ff9800" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="185" y="312" font-family="Arial, sans-serif" font-size="8" fill="#ff9800" text-anchor="middle">t<tspan baseline-shift="sub" font-size="6">su</tspan></text>
    
    <!-- Propagation Delay -->
    <line x1="200" y1="295" x2="215" y2="345" stroke="#795548" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="222" y="325" font-family="Arial, sans-serif" font-size="8" fill="#795548">t<tspan baseline-shift="sub" font-size="6">pd</tspan></text>
  </g>
  
  <!-- Arrow annotations -->
  <g class="arrow">
    <path d="M 67 165 L 67 170" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Decorative corner elements -->
  <circle cx="35" cy="35" r="4" fill="#4a6fa5" opacity="0.3"/>
  <circle cx="385" cy="35" r="4" fill="#4a6fa5" opacity="0.3"/>
  <circle cx="35" cy="375" r="4" fill="#9c27b0" opacity="0.3"/>
  <circle cx="385" cy="375" r="4" fill="#9c27b0" opacity="0.3"/>
  
  <!-- Key concept highlight -->
  <g class="highlight">
    <circle cx="395" cy="220" r="8" fill="#ffeb3b" opacity="0.6"/>
  </g>
</svg>