<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="number-systems-boolean-algebra">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95d5b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b388ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7ec8e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd6a5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb347;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes highlight {
      0%, 100% { fill: #95d5b2; }
      50% { fill: #40916c; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2d3436; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #2d3436; }
    .detail { font-family: 'Consolas', monospace; font-size: 12px; fill: #2d3436; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #fff; }
    .kmap-cell { font-family: 'Consolas', monospace; font-size: 14px; font-weight: bold; fill: #2d3436; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title fade-in">Number Systems &amp; Boolean Algebra</text>
  <line x1="80" y1="45" x2="340" y2="45" stroke="#636e72" stroke-width="1" stroke-dasharray="4,2" class="fade-in" style="animation-delay: 0.3s"/>
  
  <!-- Section 1: Number Systems -->
  <g class="slide-in" style="animation-delay: 0.4s" filter="url(#shadow)">
    <rect x="15" y="60" width="95" height="75" rx="8" fill="url(#boxGradient1)" data-narration="Four number systems: Binary (base-2), Octal (base-8), Decimal (base-10), Hexadecimal (base-16)"/>
    <text x="62" y="78" text-anchor="middle" class="section-title">NUMBER SYSTEMS</text>
    <text x="25" y="98" class="detail">Binary: 0,1</text>
    <text x="25" y="113" class="detail">Octal: 0-7</text>
    <text x="25" y="128" class="detail">Decimal: 0-9</text>
  </g>
  
  <!-- Section 2: Hex Values -->
  <g class="slide-in" style="animation-delay: 0.5s" filter="url(#shadow)">
    <rect x="120" y="60" width="75" height="75" rx="8" fill="url(#boxGradient2)" data-narration="Hexadecimal uses digits 0-9 and letters A-F representing values 10-15"/>
    <text x="157" y="78" text-anchor="middle" class="section-title">HEX</text>
    <text x="130" y="100" class="detail">A=10 B=11</text>
    <text x="130" y="115" class="detail">C=12 D=13</text>
    <text x="130" y="130" class="detail">E=14 F=15</text>
  </g>
  
  <!-- Section 3: Boolean Operators -->
  <g class="slide-in" style="animation-delay: 0.6s" filter="url(#shadow)">
    <rect x="205" y="60" width="95" height="75" rx="8" fill="url(#boxGradient3)" data-narration="Three fundamental Boolean operators: AND (·), OR (+), NOT (')"/>
    <text x="252" y="78" text-anchor="middle" class="section-title">BOOLEAN OPS</text>
    <text x="215" y="100" class="detail">AND: A·B</text>
    <text x="215" y="115" class="detail">OR: A+B</text>
    <text x="215" y="130" class="detail">NOT: A'</text>
  </g>
  
  <!-- Section 4: 2's Complement -->
  <g class="slide-in" style="animation-delay: 0.7s" filter="url(#shadow)">
    <rect x="310" y="60" width="95" height="75" rx="8" fill="url(#boxGradient4)" data-narration="2's complement is the standard representation for signed numbers in computers"/>
    <text x="357" y="78" text-anchor="middle" class="section-title">2's COMPLEMENT</text>
    <text x="320" y="100" class="detail">MSB = Sign bit</text>
    <text x="320" y="115" class="detail">Invert + 1</text>
    <text x="320" y="130" class="detail">Range: -2^(n-1)</text>
  </g>
  
  <!-- Conversion Example Box -->
  <g class="slide-in" style="animation-delay: 0.8s" filter="url(#shadow)">
    <rect x="15" y="145" width="190" height="55" rx="8" fill="#fff5f5" stroke="#ff7675" stroke-width="1" data-narration="Example: Converting Hexadecimal A3F to binary"/>
    <text x="25" y="162" class="label" fill="#d63031">Hex → Binary:</text>
    <text x="25" y="180" class="detail">A3F₁₆ = 1010 0011 1111₂</text>
  </g>
  
  <!-- Arrow -->
  <g class="fade-in" style="animation-delay: 1s">
    <path d="M 210 175 L 235 175" stroke="#636e72" stroke-width="2" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#636e72"/>
      </marker>
    </defs>
  </g>
  
  <!-- Formula Box -->
  <g class="slide-in" style="animation-delay: 0.9s" filter="url(#shadow)">
    <rect x="245" y="145" width="160" height="55" rx="8" fill="#e8f8f5" stroke="#00b894" stroke-width="1" data-narration="General positional number system formula"/>
    <text x="255" y="165" class="label" fill="#00b894">Positional Value:</text>
    <text x="255" y="185" class="detail" font-style="italic">N = Σdᵢ × bᵢ</text>
  </g>
  
  <!-- K-Map Section -->
  <g class="slide-in" style="animation-delay: 1.1s">
    <text x="210" y="220" text-anchor="middle" class="label" font-weight="bold">2-Variable Karnaugh Map</text>
    
    <!-- K-Map Grid -->
    <g filter="url(#shadow)">
      <rect x="80" y="230" width="240" height="130" rx="8" fill="#fff" stroke="#2d3436" stroke-width="2"/>
      
      <!-- Column headers -->
      <text x="115" y="248" text-anchor="middle" class="label">B\A</text>
      <text x="155" y="248" text-anchor="middle" class="label">0</text>
      <text x="205" y="248" text-anchor="middle" class="label">1</text>
      <text x="255" y="248" text-anchor="middle" class="label">1</text>
      <text x="305" y="248" text-anchor="middle" class="label">0</text>
      
      <!-- Row headers -->
      <text x="88" y="280" text-anchor="middle" class="label">0</text>
      <text x="88" y="330" text-anchor="middle" class="label">1</text>
      <text x="88" y="280" text-anchor="middle" class="label" transform="translate(30,0)">0</text>
      <text x="88" y="330" text-anchor="middle" class="label" transform="translate(30,0)">1</text>
      
      <!-- K-Map cells -->
      <rect x="135" y="255" width="45" height="35" fill="#95d5b2" stroke="#2d3436" stroke-width="1" rx="3" data-narration="Minterm 00: A'B' = 0"/>
      <text x="157" y="278" text-anchor="middle" class="kmap-cell">0</text>
      
      <rect x="185" y="255" width="45" height="35" fill="#a8d8ea" stroke="#2d3436" stroke-width="1" rx="3" data-narration="Minterm 01: AB' = 1"/>
      <text x="207" y="278" text-anchor="middle" class="kmap-cell">1</text>
      
      <rect x="235" y="255" width="45" height="35" fill="#a8d8ea" stroke="#2d3436" stroke-width="1" rx="3" data-narration="Minterm 11: AB = 1 - part of grouped pair"/>
      <text x="257" y="278" text-anchor="middle" class="kmap-cell">1</text>
      
      <rect x="285" y="255" width="45" height="35" fill="#95d5b2" stroke="#2d3436" stroke-width="1" rx="3" data-narration="Minterm 10: A'B = 0"/>
      <text x="307" y="278" text-anchor="middle" class="kmap-cell">0</text>
      
      <rect x="135" y="295" width="45" height="35" fill="#d4a5ff" stroke="#2d3436" stroke-width="1" rx="3" data-narration="Minterm 02: A'B = 0"/>
      <text x="157" y="318" text-anchor="middle" class="kmap-cell">0</text>
      
      <rect x="185" y="295" width="45" height="35" fill="#ffd6a5" stroke="#2d3436" stroke-width="1" rx="3" data-narration="Minterm 03: AB = 1 - grouped horizontally for simplification"/>
      <text x="207" y="318" text-anchor="middle" class="kmap-cell" style="fill:#d63031;font-weight:bold">1</text>
      
      <rect x="235" y="295" width="45" height="35" fill="#ffd6a5" stroke="#2d3436" stroke-width="1" rx="3" data-narration="Minterm 13: AB' = 1 - part of horizontal group"/>
      <text x="257" y="318" text-anchor="middle" class="kmap-cell" style="fill:#d63031;font-weight:bold">1</text>
      
      <rect x="285" y="295" width="45" height="35" fill="#d4a5ff" stroke="#2d3436" stroke-width="1" rx="3" data-narration="Minterm 12: A'B' = 0"/>
      <text x="307" y="318" text-anchor="middle" class="kmap-cell">0</text>
      
      <!-- Grouping highlight -->
      <rect x="185" y="295" width="95" height="35" fill="none" stroke="#e17055" stroke-width="3" stroke-dasharray="8,4" rx="5" class="pulse"/>
      
      <!-- Labels -->
      <text x="95" y="250" text-anchor="middle" class="detail" font-weight="bold">A</text>
      <text x="95" y="315" text-anchor="middle" class="detail" font-weight="bold">A'</text>
      <text x="140" y="250" text-anchor="middle" class="detail" font-weight="bold">B</text>
      <text x="290" y="250" text-anchor="middle" class="detail" font-weight="bold">B'</text>
    </g>
  </g>
  
  <!-- Result Box -->
  <g class="slide-in" style="animation-delay: 1.3s" filter="url(#shadow)">
    <rect x="15" y="370" width="390" height="25" rx="5" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="1" data-narration="Simplified Boolean expression from K-Map grouping"/>
    <text x="210" y="387" text-anchor="middle" class="label">Simplified: F = B (horizontal group eliminates A)</text>
  </g>
  
  <!-- Legend for K-Map -->
  <g class="fade-in" style="animation-delay: 1.5s">
    <circle cx="340" cy="330" r="5" fill="#ffd6a5" stroke="#2d3436"/>
    <text x="352" y="334" class="detail">=1</text>
    <circle cx="340" cy="345" r="5" fill="#95d5b2" stroke="#2d3436"/>
    <text x="352" y="349" class="detail">=0</text>
    <rect x="335" y="352" width="30" height="2" fill="#e17055" stroke="#e17055"/>
    <text x="352" y="359" class="detail">Group</text>
  </g>
</svg>