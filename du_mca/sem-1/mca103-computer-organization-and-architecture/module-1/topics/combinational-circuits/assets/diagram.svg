<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="combinational-circuits" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bbdefb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90caf9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e1bee7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #1565c0; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .section-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #333; }
    .box { filter: url(#shadow); }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .slide-up { animation: slideInUp 0.5s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .wire { stroke: #333; stroke-width: 2; fill: none; }
    .gate-body { stroke: #333; stroke-width: 1.5; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Combinational Circuits</text>
  <line x1="40" y1="38" x2="380" y2="38" stroke="#64b5f6" stroke-width="2" class="fade-in" style="animation-delay: 0.3s"/>
  
  <!-- Definition Box -->
  <g class="slide-left" style="animation-delay: 0.4s" data-narration="Core definition showing output depends only on current inputs">
    <rect x="15" y="50" width="140" height="45" rx="6" fill="url(#boxGradient1)" class="box"/>
    <text x="85" y="65" text-anchor="middle" class="section-title">Definition</text>
    <text x="85" y="82" text-anchor="middle" class="detail">Output = f(Inputs)</text>
    <text x="85" y="94" text-anchor="middle" class="detail">No Memory</text>
  </g>
  
  <!-- Design Process Box -->
  <g class="slide-left" style="animation-delay: 0.5s" data-narration="Three-step design process for combinational circuits">
    <rect x="165" y="50" width="155" height="45" rx="6" fill="url(#boxGradient2)" class="box"/>
    <text x="242" y="65" text-anchor="middle" class="section-title">Design Process</text>
    <text x="200" y="82" class="detail">1. Truth Table</text>
    <text x="245" y="82" class="detail">2. Boolean Min.</text>
    <text x="295" y="82" class="detail">3. Gates</text>
  </g>
  
  <!-- Full Adder Circuit Diagram -->
  <g class="slide-up" style="animation-delay: 0.6s" data-narration="Full adder circuit showing two half adders combined with OR gate for carry out">
    <rect x="210" y="105" width="200" height="160" rx="8" fill="#fff" stroke="#90caf9" stroke-width="2" class="box"/>
    <text x="310" y="122" text-anchor="middle" class="section-title">Full Adder Circuit</text>
    
    <!-- Input labels -->
    <text x="225" y="150" class="label" style="font-weight:bold">A</text>
    <text x="225" y="175" class="label" style="font-weight:bold">B</text>
    <text x="225" y="200" class="label" style="font-weight:bold">Cin</text>
    
    <!-- XOR Gate 1 (HA1 Sum) -->
    <path d="M260 145 L275 145 Q290 145 290 155 L290 165 Q290 175 275 175 L260 175 Z" fill="#fff" stroke="#1976d2" stroke-width="2" class="gate-body"/>
    <text x="275" y="165" text-anchor="middle" class="detail" style="font-size:10px">≥1</text>
    
    <!-- XOR Gate 2 (Final Sum) -->
    <path d="M320 180 L335 180 Q350 180 350 190 L350 200 Q350 210 335 210 L320 210 Z" fill="#fff" stroke="#1976d2" stroke-width="2" class="gate-body"/>
    <text x="335" y="198" text-anchor="middle" class="detail" style="font-size:10px">≥1</text>
    
    <!-- AND Gate 1 -->
    <path d="M320 130 L335 130 Q355 130 355 145 L355 145 L355 160 Q355 175 335 175 L320 175 Z" fill="#fff" stroke="#388e3c" stroke-width="2" class="gate-body"/>
    <text x="337" y="155" text-anchor="middle" class="detail" style="font-size:10px">&amp;</text>
    
    <!-- AND Gate 2 -->
    <path d="M320 155 L335 155 Q355 155 355 170 L355 170 L355 185 Q355 200 335 200 L320 200 Z" fill="#fff" stroke="#388e3c" stroke-width="2" class="gate-body"/>
    <text x="337" y="180" text-anchor="middle" class="detail" style="font-size:10px">&amp;</text>
    
    <!-- OR Gate -->
    <path d="M370 155 L380 155 Q395 155 395 167.5 L395 180 Q395 192.5 380 192.5 L370 192.5 Z" fill="#fff" stroke="#f57c00" stroke-width="2" class="gate-body"/>
    <text x="382" y="178" text-anchor="middle" class="detail" style="font-size:10px">≥1</text>
    
    <!-- Wires -->
    <line x1="240" y1="145" x2="260" y2="145" class="wire"/>
    <line x1="240" y1="175" x2="260" y2="175" class="wire"/>
    <line x1="290" y1="160" x2="320" y2="160" class="wire"/>
    <line x1="290" y1="190" x2="320" y2="190" class="wire"/>
    <line x1="290" y1="175" x2="310" y2="175" class="wire"/>
    <line x1="310" y1="175" x2="310" y2="180" class="wire"/>
    <line x1="310" y1="180" x2="320" y2="180" class="wire"/>
    <line x1="240" y1="200" x2="335" y2="200" class="wire"/>
    <line x1="355" y1="152" x2="370" y2="152" class="wire"/>
    <line x1="355" y1="177" x2="370" y2="177" class="wire"/>
    <line x1="350" y1="195" x2="370" y2="195" class="wire"/>
    <line x1="395" y1="173" x2="405" y2="173" class="wire" stroke="#f57c00" stroke-width="2.5"/>
    
    <!-- Output labels -->
    <text x="408" y="177" class="label" style="font-weight:bold;fill:#f57c00">Cout</text>
    <text x="350" y="215" class="label" style="font-weight:bold;fill:#1976d2">Sum</text>
    
    <!-- HA Labels -->
    <text x="275" y="138" class="detail" style="font-size:9px">HA1</text>
    <text x="335" y="125" class="detail" style="font-size:9px">HA2</text>
  </g>
  
  <!-- Standard Circuits Box -->
  <g class="slide-right" style="animation-delay: 0.7s" data-narration="List of standard combinational circuit types">
    <rect x="15" y="105" width="185" height="75" rx="6" fill="url(#boxGradient3)" class="box"/>
    <text x="107" y="120" text-anchor="middle" class="section-title">Standard Circuits</text>
    <text x="25" y="138" class="detail">• Adders (Half/Full/Carry Look-Ahead)</text>
    <text x="25" y="152" class="detail">• Multiplexers/Demultiplexers</text>
    <text x="25" y="166" class="detail">• Encoders/Decoders</text>
    <text x="25" y="180" class="detail">• Comparators</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="slide-up" style="animation-delay: 0.8s" data-narration="Important considerations in combinational circuit design">
    <rect x="15" y="190" width="185" height="75" rx="6" fill="url(#boxGradient1)" class="box"/>
    <text x="107" y="205" text-anchor="middle" class="section-title">Key Considerations</text>
    <text x="25" y="223" class="detail">• Propagation Delay</text>
    <text x="25" y="237" class="detail">• Critical Path Analysis</text>
    <text x="25" y="251" class="detail">• Static/Dynamic Hazards</text>
    <text x="25" y="265" class="detail">• Boolean Minimization</text>
  </g>
  
  <!-- Applications Box -->
  <g class="fade-in" style="animation-delay: 0.9s" data-narration="Real-world applications of combinational circuits">
    <rect x="15" y="275" width="185" height="55" rx="6" fill="url(#boxGradient2)" class="box"/>
    <text x="107" y="292" text-anchor="middle" class="section-title">Applications</text>
    <text x="25" y="308" class="detail">• ALU Design • Calculators</text>
    <text x="25" y="322" class="detail">• Data Routing • Encoders</text>
  </g>
  
  <!-- Example: Half Adder Truth Table -->
  <g class="fade-in" style="animation-delay: 1.0s" data-narration="Half adder truth table showing Sum and Carry outputs">
    <rect x="210" y="275" width="115" height="55" rx="6" fill="#fff" stroke="#a5d6a7" stroke-width="2" class="box"/>
    <text x="267" y="292" text-anchor="middle" class="section-title">Half Adder</text>
    <text x="222" y="310" class="detail" style="font-size:11px">A B | S C</text>
    <text x="222" y="324" class="detail" style="font-size:11px">0 0 | 0 0</text>
    <text x="265" y="324" class="detail" style="font-size:11px">0 1 | 1 0</text>
    <text x="298" y="310" class="detail" style="font-size:11px">1 0 | 1 0</text>
    <text x="298" y="324" class="detail" style="font-size:11px">1 1 | 0 1</text>
  </g>
  
  <!-- Market Info -->
  <g class="fade-in" style="animation-delay: 1.1s" data-narration="Digital logic market value showing industry importance">
    <rect x="210" y="340" width="115" height="45" rx="6" fill="url(#boxGradient3)" class="box pulse"/>
    <text x="267" y="358" text-anchor="middle" class="section-title">Market Value</text>
    <text x="267" y="375" text-anchor="middle" class="detail" style="font-weight:bold">$4.12B (2023)</text>
  </g>
  
  <!-- Connection arrows -->
  <g class="fade-in" style="animation-delay: 1.2s">
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#64b5f6"/>
      </marker>
    </defs>
    <line x1="160" y1="150" x2="205" y2="150" stroke="#64b5f6" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Footer -->
  <text x="210" y="390" text-anchor="middle" class="detail" style="fill:#78909c">Digital Logic Fundamentals</text>
</svg>