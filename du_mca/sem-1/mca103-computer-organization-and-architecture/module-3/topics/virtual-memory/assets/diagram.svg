<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="virtual-memory" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="virtualMemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8fb8d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="physicalMemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e8b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8d898;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tlbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e8b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0d898;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pageTableGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c8d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a8b8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; font-family: Arial, sans-serif; }
    .section-virtual { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section-physical { animation: slideInRight 0.6s ease-out 0.3s both; }
    .section-tlb { animation: fadeIn 0.6s ease-out 0.4s both; }
    .section-pagetable { animation: slideInUp 0.6s ease-out 0.5s both; }
    .section-concepts { animation: slideInUp 0.6s ease-out 0.6s both; }
    .arrow { animation: arrowPulse 2s infinite; }
    .box { animation: fadeIn 0.5s ease-out; }
    .pulse:hover { animation: pulse 0.5s ease-in-out; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5282">Virtual Memory</text>
  <line x1="30" y1="38" x2="390" y2="38" stroke="#4a90b8" stroke-width="2" class="title"/>
  
  <!-- Virtual Address Space -->
  <g class="section-virtual" data-narration="Virtual Address Space: Programs see a contiguous memory range, typically larger than physical RAM">
    <rect x="30" y="55" width="100" height="130" rx="5" fill="url(#virtualMemGrad)" filter="url(#shadow)"/>
    <text x="80" y="72" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c5282">Virtual</text>
    <text x="80" y="85" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c5282">Memory</text>
    <!-- Pages -->
    <rect x="38" y="95" width="84" height="18" rx="2" fill="#fff" stroke="#6b9bc3" stroke-width="1"/>
    <text x="80" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c5282">Page 0</text>
    <rect x="38" y="118" width="84" height="18" rx="2" fill="#fff" stroke="#6b9bc3" stroke-width="1"/>
    <text x="80" y="131" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c5282">Page 1</text>
    <rect x="38" y="141" width="84" height="18" rx="2" fill="#fff" stroke="#6b9bc3" stroke-width="1"/>
    <text x="80" y="154" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c5282">Page 2</text>
    <rect x="38" y="163" width="84" height="18" rx="2" fill="#e8f0e8" stroke="#6b9bc3" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="80" y="176" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">...</text>
  </g>
  
  <!-- TLB -->
  <g class="section-tlb" data-narration="TLB: Hardware cache storing recent page table entries for fast address translation">
    <rect x="155" y="55" width="70" height="90" rx="5" fill="url(#tlbGrad)" filter="url(#shadow)"/>
    <text x="190" y="70" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#665520">TLB</text>
    <rect x="162" y="78" width="56" height="14" rx="2" fill="#fff" stroke="#b8a868" stroke-width="1"/>
    <text x="190" y="88" text-anchor="middle" font-family="Arial" font-size="9" fill="#554410">VPN:PFN</text>
    <rect x="162" y="96" width="56" height="14" rx="2" fill="#fff" stroke="#b8a868" stroke-width="1"/>
    <text x="190" y="106" text-anchor="middle" font-family="Arial" font-size="9" fill="#554410">0:3</text>
    <rect x="162" y="114" width="56" height="14" rx="2" fill="#fff" stroke="#b8a868" stroke-width="1"/>
    <text x="190" y="124" text-anchor="middle" font-family="Arial" font-size="9" fill="#554410">1:7</text>
    <rect x="162" y="132" width="56" height="14" rx="2" fill="#fff" stroke="#b8a868" stroke-width="1"/>
    <text x="190" y="142" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">...</text>
  </g>
  
  <!-- Page Table -->
  <g class="section-pagetable" data-narration="Page Table: Maps virtual pages to physical frames, contains valid/invalid bits">
    <rect x="240" y="55" width="100" height="130" rx="5" fill="url(#pageTableGrad)" filter="url(#shadow)"/>
    <text x="290" y="72" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#6b3a4a">Page Table</text>
    <rect x="248" y="82" width="84" height="16" rx="2" fill="#fff" stroke="#a86880" stroke-width="1"/>
    <text x="290" y="93" text-anchor="middle" font-family="Arial" font-size="9" fill="#5a2838">VPN=0 → Frame 3 ✓</text>
    <rect x="248" y="102" width="84" height="16" rx="2" fill="#fff" stroke="#a86880" stroke-width="1"/>
    <text x="290" y="113" text-anchor="middle" font-family="Arial" font-size="9" fill="#5a2838">VPN=1 → Frame 7 ✓</text>
    <rect x="248" y="122" width="84" height="16" rx="2" fill="#fff" stroke="#a86880" stroke-width="1"/>
    <text x="290" y="133" text-anchor="middle" font-family="Arial" font-size="9" fill="#5a2838">VPN=2 → Frame 1 ✓</text>
    <rect x="248" y="142" width="84" height="16" rx="2" fill="#f8e8e8" stroke="#c08080" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="290" y="153" text-anchor="middle" font-family="Arial" font-size="9" fill="#a05050">VPN=3 → Invalid ✗</text>
    <rect x="248" y="162" width="84" height="16" rx="2" fill="#f8e8e8" stroke="#c08080" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="290" y="173" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">...</text>
  </g>
  
  <!-- Physical Memory -->
  <g class="section-physical" data-narration="Physical Memory (RAM): Actual memory frames where pages are loaded on demand">
    <rect x="355" y="55" width="55" height="180" rx="5" fill="url(#physicalMemGrad)" filter="url(#shadow)"/>
    <text x="382" y="70" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3a5a28">RAM</text>
    <rect x="362" y="78" width="40" height="20" rx="2" fill="#fff" stroke="#80a860" stroke-width="1"/>
    <text x="382" y="92" text-anchor="middle" font-family="Arial" font-size="9" fill="#3a5a28">F0</text>
    <rect x="362" y="102" width="40" height="20" rx="2" fill="#fff" stroke="#80a860" stroke-width="1"/>
    <text x="382" y="116" text-anchor="middle" font-family="Arial" font-size="9" fill="#3a5a28">F1</text>
    <rect x="362" y="126" width="40" height="20" rx="2" fill="#fff" stroke="#80a860" stroke-width="1"/>
    <text x="382" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#3a5a28">F2</text>
    <rect x="362" y="150" width="40" height="20" rx="2" fill="#e8f8e8" stroke="#80a860" stroke-width="1"/>
    <text x="382" y="164" text-anchor="middle" font-family="Arial" font-size="9" fill="#3a5a28">F3</text>
    <rect x="362" y="174" width="40" height="20" rx="2" fill="#fff" stroke="#80a860" stroke-width="1"/>
    <text x="382" y="188" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">...</text>
    <rect x="362" y="198" width="40" height="20" rx="2" fill="#fff" stroke="#80a860" stroke-width="1"/>
    <text x="382" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#3a5a28">F7</text>
  </g>
  
  <!-- Arrows -->
  <g class="arrow">
    <path d="M130 95 L150 95" stroke="#4a90b8" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M225 95 L235 95" stroke="#4a90b8" stroke-width="2" fill="none"/>
    <path d="M340 105 L350 105" stroke="#4a90b8" stroke-width="2" fill="none"/>
    <path d="M225 145 L340 145" stroke="#4a90b8" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
    <path d="M225 160 L340 160" stroke="#c05050" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
  </g>
  
  <!-- Disk/Secondary Storage -->
  <g class="box" data-narration="Secondary Storage: Holds pages not in RAM, loaded on page fault">
    <rect x="30" y="255" width="70" height="50" rx="5" fill="#e8e0d8" stroke="#a89888" stroke-width="1"/>
    <text x="65" y="275" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#5a4a3a">Disk</text>
    <text x="65" y="290" text-anchor="middle" font-family="Arial" font-size="9" fill="#5a4a3a">Swap</text>
  </g>
  
  <!-- Page Fault Arrow -->
  <g class="arrow">
    <path d="M65 305 L65 330 L290 330 L290 210" stroke="#c05050" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
    <text x="180" y="325" font-family="Arial" font-size="9" fill="#c05050">Page Fault → Load from Disk</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section-concepts" data-narration="Key concepts: Demand paging loads pages on demand, TLB caches translations, Page replacement algorithms (FIFO, LRU, Optimal) manage memory">
    <rect x="110" y="250" width="300" height="140" rx="5" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
    <text x="260" y="268" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c5282">Key Concepts</text>
    
    <!-- Concept 1 -->
    <rect x="118" y="278" width="90" height="22" rx="3" fill="#e8f4f8" stroke="#4a90b8" stroke-width="1"/>
    <text x="163" y="293" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c5282">Demand Paging</text>
    
    <!-- Concept 2 -->
    <rect x="215" y="278" width="90" height="22" rx="3" fill="#f8f0e8" stroke="#c09050" stroke-width="1"/>
    <text x="260" y="293" text-anchor="middle" font-family="Arial" font-size="9" fill="#5a4020">TLB Cache</text>
    
    <!-- Concept 3 -->
    <rect x="312" y="278" width="90" height="22" rx="3" fill="#f0e8f0" stroke="#9060a0" stroke-width="1"/>
    <text x="357" y="293" text-anchor="middle" font-family="Arial" font-size="9" fill="#5a3060">Page Table</text>
    
    <!-- Concept 4 -->
    <rect x="118" y="305" width="90" height="22" rx="3" fill="#e8f8e8" stroke="#60a060" stroke-width="1"/>
    <text x="163" y="320" text-anchor="middle" font-family="Arial" font-size="9" fill="#2a4a2a">FIFO</text>
    
    <!-- Concept 5 -->
    <rect x="215" y="305" width="90" height="22" rx="3" fill="#e8f8e8" stroke="#60a060" stroke-width="1"/>
    <text x="260" y="320" text-anchor="middle" font-family="Arial" font-size="9" fill="#2a4a2a">LRU</text>
    
    <!-- Concept 6 -->
    <rect x="312" y="305" width="90" height="22" rx="3" fill="#e8f8e8" stroke="#60a060" stroke-width="1"/>
    <text x="357" y="320" text-anchor="middle" font-family="Arial" font-size="9" fill="#2a4a2a">Optimal</text>
    
    <!-- Address Translation Example -->
    <rect x="118" y="332" width="284" height="50" rx="3" fill="#fafafa" stroke="#aaa" stroke-width="1"/>
    <text x="260" y="347" text-anchor="middle" font-family="Arial" font-size="9" fill="#444">Address Translation</text>
    <text x="145" y="365" font-family="Arial" font-size="8" fill="#666">Virtual: Page# + Offset</text>
    <text x="260" y="365" font-family="Arial" font-size="8" fill="#666">→</text>
    <text x="375" y="365" font-family="Arial" font-size="8" fill="#666">Physical: Frame# + Offset</text>
  </g>
</svg>