<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="cache-memory-organization" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="cacheGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8bb8d8"/>
    </linearGradient>
    <linearGradient id="memoryGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e0c8"/>
      <stop offset="100%" style="stop-color:#98c898"/>
    </linearGradient>
    <linearGradient id="tagGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#b8d8e8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideInRight 0.6s ease-out 0.4s both; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.6s both; }
    .section-4 { animation: fadeIn 0.6s ease-out 0.8s both; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
    .blink-element { animation: blink 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5282" class="title">Cache Memory Organization</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4a5568" class="title">Direct Mapping Structure</text>
  
  <!-- Memory Address Section -->
  <g class="section-1" data-narration="Memory Address breakdown showing Tag, Index, and Offset fields">
    <rect x="15" y="70" width="140" height="30" fill="#f7fafc" stroke="#4a5568" stroke-width="1" rx="4"/>
    <text x="85" y="89" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3748">Memory Address</text>
    
    <!-- Address Bits Breakdown -->
    <rect x="25" y="110" width="40" height="22" fill="#feb2b2" stroke="#c53030" stroke-width="1" rx="3"/>
    <text x="45" y="126" text-anchor="middle" font-family="monospace" font-size="11" fill="#742a2a">Tag</text>
    <text x="45" y="140" text-anchor="middle" font-family="monospace" font-size="9" fill="#742a2a">5 bits</text>
    
    <rect x="70" y="110" width="40" height="22" fill="#b2f5ea" stroke="#319795" stroke-width="1" rx="3"/>
    <text x="90" y="126" text-anchor="middle" font-family="monospace" font-size="11" fill="#234e52">Index</text>
    <text x="90" y="140" text-anchor="middle" font-family="monospace" font-size="9" fill="#234e52">3 bits</text>
    
    <rect x="115" y="110" width="30" height="22" fill="#fefcbf" stroke="#d69e2e" stroke-width="1" rx="3"/>
    <text x="130" y="126" text-anchor="middle" font-family="monospace" font-size="11" fill="#744210">Offset</text>
    <text x="130" y="140" text-anchor="middle" font-family="monospace" font-size="9" fill="#744210">2 bits</text>
    
    <line x1="85" y1="145" x2="85" y2="155" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  
  <!-- Cache Structure Section -->
  <g class="section-2" data-narration="Cache memory with multiple lines showing Tag, Valid bit, and Data">
    <rect x="220" y="70" width="190" height="30" fill="#e2e8f0" stroke="#4a5568" stroke-width="1" rx="4"/>
    <text x="315" y="89" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3748">Cache Memory</text>
    
    <!-- Cache Lines -->
    <g class="pulse-element">
      <rect x="230" y="110" width="170" height="26" fill="url(#cacheGradient)" stroke="#2b6cb0" stroke-width="1" rx="3"/>
      <text x="245" y="128" font-family="monospace" font-size="10" fill="#1a365d">V</text>
      <rect x="258" y="116" width="35" height="14" fill="url(#tagGradient)" stroke="#2c5282" stroke-width="0.5" rx="2"/>
      <text x="275" y="127" text-anchor="middle" font-family="monospace" font-size="9" fill="#1a365d">Tag</text>
      <rect x="300" y="116" width="90" height="14" fill="#fff" stroke="#ccc" stroke-width="0.5" rx="2"/>
      <text x="345" y="127" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">Data (4 bytes)</text>
    </g>
    
    <rect x="230" y="140" width="170" height="26" fill="url(#cacheGradient)" stroke="#2b6cb0" stroke-width="1" rx="3" opacity="0.7"/>
    <text x="245" y="158" font-family="monospace" font-size="10" fill="#1a365d">V</text>
    <rect x="258" y="146" width="35" height="14" fill="url(#tagGradient)" stroke="#2c5282" stroke-width="0.5" rx="2"/>
    <text x="275" y="157" text-anchor="middle" font-family="monospace" font-size="9" fill="#1a365d">Tag</text>
    <rect x="300" y="146" width="90" height="14" fill="#fff" stroke="#ccc" stroke-width="0.5" rx="2"/>
    <text x="345" y="157" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">Data</text>
    
    <rect x="230" y="170" width="170" height="26" fill="url(#cacheGradient)" stroke="#2b6cb0" stroke-width="1" rx="3" opacity="0.5"/>
    <text x="245" y="188" font-family="monospace" font-size="10" fill="#1a365d">V</text>
    <rect x="258" y="176" width="35" height="14" fill="url(#tagGradient)" stroke="#2c5282" stroke-width="0.5" rx="2"/>
    <text x="275" y="187" text-anchor="middle" font-family="monospace" font-size="9" fill="#1a365d">Tag</text>
    <rect x="300" y="176" width="90" height="14" fill="#fff" stroke="#ccc" stroke-width="0.5" rx="2"/>
    <text x="345" y="187" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">Data</text>
    
    <rect x="230" y="200" width="170" height="26" fill="url(#cacheGradient)" stroke="#2b6cb0" stroke-width="1" rx="3" opacity="0.3"/>
    <text x="245" y="218" font-family="monospace" font-size="10" fill="#1a365d">V</text>
    <rect x="258" y="206" width="35" height="14" fill="url(#tagGradient)" stroke="#2c5282" stroke-width="0.5" rx="2"/>
    <text x="275" y="217" text-anchor="middle" font-family="monospace" font-size="9" fill="#1a365d">Tag</text>
    <rect x="300" y="206" width="90" height="14" fill="#fff" stroke="#ccc" stroke-width="0.5" rx="2"/>
    <text x="345" y="217" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">Data</text>
    
    <!-- Index Labels -->
    <text x="215" y="124" font-family="Arial, sans-serif" font-size="10" fill="#2d3748">0:</text>
    <text x="215" y="154" font-family="Arial, sans-serif" font-size="10" fill="#2d3748">1:</text>
    <text x="215" y="184" font-family="Arial, sans-serif" font-size="10" fill="#2d3748">2:</text>
    <text x="215" y="214" font-family="Arial, sans-serif" font-size="10" fill="#2d3748">3:</text>
  </g>
  
  <!-- Tag Comparison Logic -->
  <g class="section-3" data-narration="Tag comparison logic showing how CPU checks for cache hits">
    <rect x="15" y="230" width="180" height="75" fill="#f7fafc" stroke="#4a5568" stroke-width="1" rx="5" filter="url(#shadow)"/>
    <text x="105" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d3748">Comparison Logic</text>
    
    <!-- CPU Request -->
    <rect x="25" y="258" width="70" height="16" fill="#c3dafe" stroke="#4299e1" stroke-width="1" rx="2"/>
    <text x="60" y="270" text-anchor="middle" font-family="monospace" font-size="9" fill="#2c5282">CPU Tag: 101</text>
    
    <!-- Comparator -->
    <circle cx="105" cy="285" r="12" fill="#9f7aea" stroke="#6b46c1" stroke-width="1"/>
    <text x="105" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">=</text>
    
    <!-- Cache Tag -->
    <rect x="115" y="272" width="70" height="16" fill="#fed7e2" stroke="#ed64a6" stroke-width="1" rx="2"/>
    <text x="150" y="284" text-anchor="middle" font-family="monospace" font-size="9" fill="#702459">Cache Tag</text>
    
    <!-- Hit/Miss -->
    <rect x="85" y="302" width="40" height="20" fill="#9ae6b4" stroke="#38a169" stroke-width="1" rx="3"/>
    <text x="105" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#22543d">HIT</text>
  </g>
  
  <!-- Key Concepts -->
  <g class="section-4" data-narration="Key concepts: Hit Rate, Miss Penalty, and AMAT formula">
    <rect x="210" y="235" width="200" height="150" fill="white" stroke="#e2e8f0" stroke-width="1" rx="5" filter="url(#shadow)"/>
    <text x="310" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d3748">Key Concepts</text>
    
    <!-- Concept 1 -->
    <circle cx="225" cy="275" r="10" fill="#feb2b2" stroke="#c53030" stroke-width="1"/>
    <text x="225" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#742a2a">1</text>
    <text x="240" y="278" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Hit Rate = Hits/(Hits+Misses)</text>
    
    <!-- Concept 2 -->
    <circle cx="225" cy="300" r="10" fill="#b2f5ea" stroke="#319795" stroke-width="1"/>
    <text x="225" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#234e52">2</text>
    <text x="240" y="303" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Miss Penalty: Cost of memory access</text>
    
    <!-- Concept 3 -->
    <circle cx="225" cy="325" r="10" fill="#fefcbf" stroke="#d69e2e" stroke-width="1"/>
    <text x="225" y="329" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#744210">3</text>
    <text x="240" y="328" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">AMAT = Hit Time + MissRate×Penalty</text>
    
    <!-- Concept 4 -->
    <circle cx="225" cy="350" r="10" fill="#e9d8fd" stroke="#805ad5" stroke-width="1"/>
    <text x="225" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#553c9a">4</text>
    <text x="240" y="353" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Replacement: LRU, FIFO, Random</text>
  </g>
  
  <!-- Arrow from Address to Cache -->
  <g class="blink-element">
    <path d="M 155 155 L 220 155" stroke="#4a5568" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <polygon points="220,155 212,150 212,160" fill="#4a5568"/>
  </g>
  
  <!-- Arrow from Comparison to Cache -->
  <g class="blink-element">
    <path d="M 195 265 L 220 250" stroke="#4a5568" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
    <polygon points="220,250 215,254 212,243" fill="#4a5568"/>
  </g>
  
  <!-- Mapping Formula -->
  <g class="section-4">
    <rect x="15" y="315" width="180" height="35" fill="#f0fff4" stroke="#48bb78" stroke-width="1" rx="4"/>
    <text x="105" y="332" text-anchor="middle" font-family="monospace" font-size="11" fill="#22543d">Direct: Line = Index % CacheSize</text>
    <text x="105" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#276749">(Each memory block → one cache line)</text>
  </g>
  
  <!-- Labels for Index and Tag -->
  <text x="315" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c5282" font-weight="bold">Cache Index selects line</text>
  <text x="315" y="145" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a5568">(3-bit index → 8 lines)</text>
</svg>