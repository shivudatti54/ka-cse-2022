<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="memory-management-techniques">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#e8fce8"/>
    </linearGradient>
    <linearGradient id="cpuGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#4a90c2"/>
    </linearGradient>
    <linearGradient id="pageTableGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8a2c8"/>
      <stop offset="100%" style="stop-color:#9966aa"/>
    </linearGradient>
    <linearGradient id="memoryGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90caf9"/>
      <stop offset="100%" style="stop-color:#42a5f5"/>
    </linearGradient>
    <linearGradient id="segmentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcc80"/>
      <stop offset="100%" style="stop-color:#ff9800"/>
    </linearGradient>
    <linearGradient id="virtualGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a5d6a7"/>
      <stop offset="100%" style="stop-color:#66bb6a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section2 { animation: slideInUp 0.6s ease-out 0.4s both; }
    .section3 { animation: slideInRight 0.6s ease-out 0.3s both; }
    .section4 { animation: slideInUp 0.6s ease-out 0.5s both; }
    .section5 { animation: fadeIn 0.6s ease-out 0.6s both; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
    .arrow { animation: arrowPulse 1.5s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
    .title-text { font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label { font-size: 14px; fill: #34495e; }
    .detail { font-size: 11px; fill: #5d6d7e; }
    .highlight { font-size: 12px; fill: #fff; font-weight: bold; }
    rect, path { transform-origin: center; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="25" text-anchor="middle" class="title-text title">Memory Management Techniques</text>
  
  <!-- Section 1: Contiguous Memory (Top Left) -->
  <g class="section1" data-narration="Contiguous Memory Allocation divides memory into fixed or variable partitions. Fixed partitioning uses equal-sized blocks while variable partitioning dynamically allocates space using hole management.">
    <rect x="10" y="40" width="130" height="75" fill="url(#cpuGradient)" rx="6" filter="url(#shadow)"/>
    <text x="75" y="58" text-anchor="middle" class="highlight">Contiguous</text>
    <text x="75" y="73" text-anchor="middle" class="highlight">Memory</text>
    <text x="75" y="95" text-anchor="middle" class="detail">Fixed/Variable</text>
    <text x="75" y="108" text-anchor="middle" class="detail">Partitions</text>
  </g>
  
  <!-- Section 2: Paging (Center - Main Focus) -->
  <g class="section2" data-narration="Paging divides memory into fixed-size frames and logical memory into pages. The page table translates virtual addresses to physical addresses using page number and offset.">
    <rect x="145" y="40" width="150" height="120" fill="#fff" rx="6" stroke="#9966aa" stroke-width="2" filter="url(#shadow)"/>
    <text x="220" y="58" text-anchor="middle" class="label" fill="#9966aa" font-weight="bold">Paging Architecture</text>
    
    <!-- Virtual Address -->
    <rect x="155" y="68" width="60" height="22" fill="#e0e0e0" rx="3"/>
    <text x="165" y="82" class="detail" fill="#333">VPN</text>
    <text x="200" y="82" class="detail" fill="#333">Offset</text>
    <text x="165" y="95" class="detail" fill="#666" font-size="9">Page #</text>
    
    <!-- Arrow to Page Table -->
    <path d="M175 90 L175 115" stroke="#9966aa" stroke-width="2" class="arrow" fill="none"/>
    
    <!-- Page Table -->
    <rect x="155" y="118" width="55" height="35" fill="url(#pageTableGradient)" rx="3"/>
    <text x="182" y="133" text-anchor="middle" class="highlight" font-size="11">Page Table</text>
    <text x="182" y="147" text-anchor="middle" class="detail" font-size="9">VPN → PFN</text>
    
    <!-- Arrow to Physical Memory -->
    <path d="M210 135 L255 135" stroke="#42a5f5" stroke-width="2" class="arrow" fill="none"/>
    <polygon points="255,130 265,135 255,140" fill="#42a5f5"/>
    
    <!-- Physical Memory Frames -->
    <rect x="260" y="118" width="30" height="35" fill="url(#memoryGradient)" rx="3"/>
    <text x="275" y="133" text-anchor="middle" class="highlight" font-size="10">Frame</text>
    <text x="275" y="147" text-anchor="middle" class="detail" font-size="9">0,1,2...</text>
  </g>
  
  <!-- Section 3: Segmentation (Top Right) -->
  <g class="section3" data-narration="Segmentation divides memory into variable-sized segments based on logical units like code, data, and stack. It uses a segment table with base and limit registers for protection.">
    <rect x="300" y="40" width="110" height="75" fill="url(#segmentGradient)" rx="6" filter="url(#shadow)"/>
    <text x="355" y="58" text-anchor="middle" class="highlight">Segmentation</text>
    <text x="355" y="76" text-anchor="middle" class="detail">Variable-size</text>
    <text x="355" y="90" text-anchor="middle" class="detail">Segments</text>
    <text x="355" y="104" text-anchor="memory" class="detail">Code|Data|Stack</text>
  </g>
  
  <!-- Section 4: Virtual Memory (Middle Left) -->
  <g class="section4" data-narration="Virtual Memory extends physical memory using disk storage. Demand paging loads pages only when needed, while page replacement algorithms like FIFO, LRU, and OPT manage which pages to evict.">
    <rect x="10" y="125" width="130" height="70" fill="url(#virtualGradient)" rx="6" filter="url(#shadow)"/>
    <text x="75" y="145" text-anchor="middle" class="highlight">Virtual Memory</text>
    <text x="75" y="162" text-anchor="middle" class="detail">Demand Paging</text>
    <text x="75" y="177" text-anchor="middle" class="detail">FIFO | LRU | OPT</text>
    <text x="75" y="190" text-anchor="middle" class="detail">Thrashing Prevention</text>
  </g>
  
  <!-- Section 5: CPU & MMU (Bottom) -->
  <g class="section5" data-narration="The CPU generates virtual addresses that the MMU (Memory Management Unit) translates to physical addresses using page tables. TLB accelerates this translation.">
    <rect x="145" y="170" width="150" height="55" fill="url(#cpuGradient)" rx="6" filter="url(#shadow)"/>
    <text x="220" y="190" text-anchor="middle" class="highlight">CPU → MMU → Physical</text>
    <text x="220" y="208" text-anchor="middle" class="detail">Virtual Address Translation</text>
    <text x="220" y="220" text-anchor="middle" class="detail">TLB Cache for Fast Lookup</text>
  </g>
  
  <!-- Fragmentation Visual (Bottom Right) -->
  <g class="section1" data-narration="Memory fragmentation occurs in two forms: internal fragmentation (unused space within allocated partitions) and external fragmentation (scattered free holes between allocated blocks).">
    <rect x="300" y="125" width="110" height="70" fill="#fff" rx="6" stroke="#ff9800" stroke-width="2" filter="url(#shadow)"/>
    <text x="355" y="145" text-anchor="middle" class="label" fill="#e65100" font-weight="bold">Fragmentation</text>
    <rect x="310" y="155" width="35" height="18" fill="#ffcc80" rx="2"/>
    <text x="327" y="167" text-anchor="middle" class="detail" font-size="9">Used</text>
    <rect x="310" y="175" width="10" height="12" fill="#e0e0e0" rx="2"/>
    <text x="327" y="187" text-anchor="middle" class="detail" font-size="8">Int</text>
    <rect x="350" y="155" width="12" height="18" fill="#e0e0e0" rx="2"/>
    <text x="356" y="167" text-anchor="middle" class="detail" font-size="8">Ext</text>
    <text x="355" y="185" text-anchor="middle" class="detail" font-size="8">Fragment</text>
  </g>
  
  <!-- TLB Box (Right Middle) -->
  <g class="section4" data-narration="TLB (Translation Lookaside Buffer) is a hardware cache that stores recent page table translations for faster address lookup.">
    <rect x="300" y="205" width="110" height="35" fill="url(#pageTableGradient)" rx="4" filter="url(#shadow)"/>
    <text x="355" y="222" text-anchor="middle" class="highlight">TLB Cache</text>
    <text x="355" y="235" text-anchor="middle" class="detail" font-size="10">Fast Translation</text>
  </g>
  
  <!-- Connecting Arrows -->
  <path d="M140 75 L145 75" stroke="#7eb8da" stroke-width="2" class="arrow"/>
  <path d="M295 77 L300 77" stroke="#ff9800" stroke-width="2" class="arrow"/>
  <path d="M140 160 L145 170" stroke="#66bb6a" stroke-width="2" class="arrow"/>
  <path d="M140 125 L145 125" stroke="#9966aa" stroke-width="2" class="arrow"/>
  <path d="M295 160 L300 170" stroke="#4a90c2" stroke-width="2" class="arrow"/>
  
  <!-- Legend -->
  <g class="section5">
    <rect x="10" y="245" width="400" height="145" fill="rgba(255,255,255,0.7)" rx="6"/>
    <text x="210" y="262" text-anchor="middle" class="label" font-weight="bold">Key Concepts Summary</text>
    
    <!-- Concept 1 -->
    <rect x="20" y="275" width="85" height="30" fill="url(#cpuGradient)" rx="4"/>
    <text x="62" y="288" text-anchor="middle" class="highlight" font-size="10">Contiguous</text>
    <text x="62" y="300" text-anchor="middle" class="detail" font-size="9">Fixed/Variable</text>
    
    <!-- Concept 2 -->
    <rect x="110" y="275" width="85" height="30" fill="#fff" stroke="#9966aa" stroke-width="2" rx="4"/>
    <text x="152" y="288" text-anchor="middle" class="label" font-size="10" fill="#9966aa">Paging</text>
    <text x="152" y="300" text-anchor="middle" class="detail" font-size="9">Fixed-size frames</text>
    
    <!-- Concept 3 -->
    <rect x="200" y="275" width="85" height="30" fill="url(#segmentGradient)" rx="4"/>
    <text x="242" y="288" text-anchor="middle" class="highlight" font-size="10">Segmentation</text>
    <text x="242" y="300" text-anchor="middle" class="detail" font-size="9">Variable-size</text>
    
    <!-- Concept 4 -->
    <rect x="290" y="275" width="85" height="30" fill="url(#virtualGradient)" rx="4"/>
    <text x="332" y="288" text-anchor="middle" class="highlight" font-size="10">Virtual Memory</text>
    <text x="332" y="300" text-anchor="middle" class="detail" font-size="9">Demand paging</text>
    
    <!-- Bottom concepts -->
    <text x="62" y="330" text-anchor="middle" class="detail" font-size="10">Internal + External</text>
    <text x="152" y="330" text-anchor="middle" class="detail" font-size="10">Page Table + TLB</text>
    <text x="242" y="330" text-anchor="middle" class="detail" font-size="10">Base + Limit</text>
    <text x="332" y="330" text-anchor="middle" class="detail" font-size="10">FIFO, LRU, OPT</text>
    
    <!-- Divider -->
    <line x1="20" y1="345" x2="390" y2="345" stroke="#ccc" stroke-width="1"/>
    
    <!-- Key Benefit -->
    <text x="210" y="365" text-anchor="middle" class="label" fill="#2c3e50">MMU enables transparent virtual memory &gt; physical RAM</text>
  </g>
</svg>