<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="groups-rings-fields">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5f0fa"/>
      <stop offset="100%" style="stop-color:#e8fcfc"/>
    </linearGradient>
    <linearGradient id="groupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c9b6"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b8e0"/>
      <stop offset="100%" style="stop-color:#b894c9"/>
    </linearGradient>
    <linearGradient id="fieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8cb8d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .detail { font-size: 11px; fill: #4a5568; }
    .example-text { font-size: 10px; fill: #5a6a7a; font-style: italic; }
    .box { rx: 8; ry: 8; }
    .arrow { stroke: #5a6a7a; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .title-anim { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .group-anim { animation: fadeIn 0.6s ease-out 0.3s forwards; opacity: 0; }
    .ring-anim { animation: fadeIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .field-anim { animation: fadeIn 0.6s ease-out 0.9s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <g class="title-anim">
    <text x="210" y="28" text-anchor="middle" class="title">Groups, Rings &amp; Fields</text>
    <text x="210" y="45" text-anchor="middle" font-size="11" fill="#5a6a7a">Foundation of Abstract Algebra</text>
  </g>
  
  <!-- Group Box -->
  <g class="group-anim" data-narration="A group (G, *) is a set with one binary operation satisfying closure, associativity, identity, and inverses. Example: (ℤ, +)">
    <rect x="30" y="70" width="120" height="100" fill="url(#groupGrad)" class="box" filter="url(#shadow)"/>
    <text x="90" y="92" text-anchor="middle" class="label">GROUP</text>
    <text x="90" y="110" text-anchor="middle" class="detail">(G, *)</text>
    <line x1="40" y1="120" x2="140" y2="120" stroke="#7a9a8a" stroke-width="1"/>
    <text x="40" y="132" class="detail">• Closure</text>
    <text x="40" y="145" class="detail">• Associative</text>
    <text x="40" y="158" class="detail">• Identity e</text>
    <text x="40" y="171" class="detail">• Inverses</text>
    <text x="90" y="185" text-anchor="middle" class="example-text">Ex: (ℤ,+), (ℤₙ,+)</text>
  </g>
  
  <!-- Arrow Group to Ring -->
  <path d="M150 120 L175 120" class="arrow" stroke-dasharray="5,3"/>
  
  <!-- Ring Box -->
  <g class="ring-anim" data-narration="A ring (R, +, ·) adds a second operation to a group. (R,+) is abelian, multiplication is associative, and distributive law holds. Example: ℤ">
    <rect x="175" y="70" width="130" height="100" fill="url(#ringGrad)" class="box" filter="url(#shadow)"/>
    <text x="240" y="92" text-anchor="middle" class="label">RING</text>
    <text x="240" y="110" text-anchor="middle" class="detail">(R, +, ·)</text>
    <line x1="185" y1="120" x2="295" y2="120" stroke="#9a7aaa" stroke-width="1"/>
    <text x="185" y="132" class="detail">• (R,+) abelian</text>
    <text x="185" y="145" class="detail">• (R,·) assoc.</text>
    <text x="185" y="158" class="detail">• Distributive</text>
    <text x="240" y="185" text-anchor="middle" class="example-text">Ex: ℤ, Matrices</text>
  </g>
  
  <!-- Arrow Ring to Field -->
  <path d="M305 120 L330 120" class="arrow" stroke-dasharray="5,3"/>
  
  <!-- Field Box -->
  <g class="field-anim" data-narration="A field is a commutative ring with unity where every non-zero element has a multiplicative inverse. Finite fields GF(p) are used in AES, ECC.">
    <rect x="330" y="70" width="70" height="100" fill="url(#fieldGrad)" class="box" filter="url(#shadow)"/>
    <text x="365" y="92" text-anchor="middle" class="label">FIELD</text>
    <text x="365" y="110" text-anchor="middle" class="detail">(F, +, ·)</text>
    <line x1="340" y1="120" x2="390" y2="120" stroke="#7a9aaa" stroke-width="1"/>
    <text x="340" y="132" class="detail">• Commutative</text>
    <text x="340" y="145" class="detail">• Unity 1≠0</text>
    <text x="340" y="158" class="detail">• a⁻¹ for a≠0</text>
    <text x="365" y="185" text-anchor="middle" class="example-text">Ex: ℚ, ℝ, GF(2⁸)</text>
  </g>
  
  <!-- Homomorphisms Section -->
  <g class="field-anim" data-narration="Homomorphisms are structure-preserving maps between algebraic systems. Group homomorphism: f(a*b)=f(a)*f(b)">
    <rect x="30" y="200" width="360" height="55" rx="6" fill="#fff9e6" stroke="#e6d9a0" stroke-width="1"/>
    <text x="45" y="220" class="label" fill="#8b7355">Homomorphisms</text>
    <text x="45" y="238" class="detail">Group: f(a*b) = f(a)*f(b)</text>
    <text x="45" y="252" class="detail">Ring: f(a+b)=f(a)+f(b), f(a·b)=f(a)·f(b)</text>
    <text x="320" y="220" class="label" fill="#8b7355">Abelian</text>
    <text x="320" y="240" class="detail">Commutative:</text>
    <text x="320" y="252" class="detail">a*b = b*a</text>
  </g>
  
  <!-- Applications Section -->
  <g class="field-anim" data-narration="Applications include RSA encryption, elliptic curve cryptography, AES, Reed-Solomon codes, and quantum computing gates.">
    <rect x="30" y="265" width="360" height="55" rx="6" fill="#e6f4ea" stroke="#a0c9b0" stroke-width="1"/>
    <text x="45" y="285" class="label" fill="#4a7c59">Applications</text>
    <text x="45" y="302" class="detail">Cryptography: RSA, ECC, AES (GF(2⁸))</text>
    <text x="45" y="316" class="detail">Error-Correcting: Reed-Solomon, Quantum Gates</text>
  </g>
  
  <!-- Properties Comparison -->
  <g class="field-anim">
    <rect x="30" y="330" width="360" height="55" rx="6" fill="#f0e6fa" stroke="#c0a0d0" stroke-width="1"/>
    <text x="45" y="350" class="label" fill="#6b4c8a">Structure Hierarchy</text>
    <text x="45" y="368" class="detail">Group ⊂ Ring ⊂ Field</text>
    <text x="45" y="380" class="detail">Each adds: operation → commutativity → inverses</text>
    <circle cx="350" cy="358" r="15" fill="#c0a0d0" class="pulse-anim"/>
    <text x="350" y="363" text-anchor="middle" fill="white" font-size="16" font-weight="bold">⊂</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5a6a7a"/>
    </marker>
  </defs>
</svg>