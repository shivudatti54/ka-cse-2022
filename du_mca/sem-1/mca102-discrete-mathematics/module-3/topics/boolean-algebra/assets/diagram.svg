<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="boolean-algebra">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6"/>
      <stop offset="100%" style="stop-color:#ffe8cc"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f5e6"/>
      <stop offset="100%" style="stop-color:#cce8cc"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e6ff"/>
      <stop offset="100%" style="stop-color:#e0ccff"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f0f5"/>
      <stop offset="100%" style="stop-color:#cce0f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Arial', sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: 'Arial', sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .label { font-family: 'Arial', sans-serif; font-size: 12px; fill: #555; }
    .gate-symbol { font-family: 'Arial', sans-serif; font-size: 16px; font-weight: bold; fill: #2c3e50; }
    .formula { font-family: 'Courier New', monospace; font-size: 11px; fill: #2c5aa0; }
    .theorem { font-family: 'Arial', sans-serif; font-size: 10px; fill: #444; }
    .fade-in { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .slide-left { animation: slideInLeft 0.8s ease-out forwards; opacity: 0; }
    .slide-right { animation: slideInRight 0.8s ease-out forwards; opacity: 0; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
    .stroke-anim { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1.5s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Boolean Algebra</text>
  <line x1="120" y1="36" x2="300" y2="36" stroke="#3498db" stroke-width="2" class="stroke-anim"/>
  
  <!-- Section 1: Basic Gates -->
  <g data-narration="Basic Logic Gates - The fundamental building blocks of digital circuits">
    <rect x="10" y="48" width="195" height="140" fill="url(#boxGradient1)" rx="6" filter="url(#shadow)" class="slide-left"/>
    <text x="20" y="66" class="section-title">Basic Gates</text>
    
    <!-- AND Gate -->
    <g transform="translate(20, 80)" class="delay-1 slide-left">
      <path d="M0,0 L15,0 Q30,10 15,20 L0,20 Z" fill="none" stroke="#e74c3c" stroke-width="2"/>
      <line x1="15" y1="-5" x2="15" y2="25" stroke="#e74c3c" stroke-width="1.5"/>
      <line x1="-8" y1="5" x2="0" y2="5" stroke="#333" stroke-width="1.5"/>
      <line x1="-8" y1="15" x2="0" y2="15" stroke="#333" stroke-width="1.5"/>
      <line x1="15" y1="10" x2="22" y2="10" stroke="#333" stroke-width="1.5"/>
      <circle cx="22" cy="10" r="2" fill="#333"/>
      <text x="30" y="14" class="gate-symbol">AND</text>
      <text x="30" y="28" class="formula">F = A · B</text>
    </g>
    
    <!-- OR Gate -->
    <g transform="translate(100, 80)" class="delay-2 slide-left">
      <path d="M0,0 Q15,10 0,20 L15,20 Q30,10 15,0 Z" fill="none" stroke="#27ae60" stroke-width="2"/>
      <line x1="-8" y1="5" x2="2" y2="5" stroke="#333" stroke-width="1.5"/>
      <line x1="-8" y1="15" x2="2" y2="15" stroke="#333" stroke-width="1.5"/>
      <line x1="20" y1="10" x2="28" y2="10" stroke="#333" stroke-width="1.5"/>
      <circle cx="28" cy="10" r="2" fill="#333"/>
      <text x="35" y="14" class="gate-symbol">OR</text>
      <text x="35" y="28" class="formula">F = A + B</text>
    </g>
    
    <!-- NOT Gate -->
    <g transform="translate(20, 145)" class="delay-3 slide-left">
      <polygon points="0,0 12,10 0,20" fill="none" stroke="#8e44ad" stroke-width="2"/>
      <circle cx="16" cy="10" r="3" fill="none" stroke="#8e44ad" stroke-width="2"/>
      <line x1="-8" y1="10" x2="0" y2="10" stroke="#333" stroke-width="1.5"/>
      <line x1="19" y1="10" x2="25" y2="10" stroke="#333" stroke-width="1.5"/>
      <circle cx="25" cy="10" r="2" fill="#333"/>
      <text x="32" y="14" class="gate-symbol">NOT</text>
      <text x="32" y="28" class="formula">F = A'</text>
    </g>
  </g>
  
  <!-- Section 2: Derived Gates -->
  <g data-narration="Derived Gates - NAND, NOR, XOR, and XNOR are universal gates used in circuit design">
    <rect x="215" y="48" width="195" height="140" fill="url(#boxGradient2)" rx="6" filter="url(#shadow)" class="slide-right"/>
    <text x="225" y="66" class="section-title">Derived Gates</text>
    
    <!-- NAND Gate -->
    <g transform="translate(225, 80)" class="delay-2 slide-right">
      <path d="M0,0 L12,0 Q24,10 12,20 L0,20 Z" fill="none" stroke="#e74c3c" stroke-width="2"/>
      <circle cx="28" cy="10" r="4" fill="none" stroke="#e74c3c" stroke-width="2"/>
      <line x1="-8" y1="5" x2="0" y2="5" stroke="#333" stroke-width="1.5"/>
      <line x1="-8" y1="15" x2="0" y2="15" stroke="#333" stroke-width="1.5"/>
      <text x="38" y="14" class="gate-symbol">NAND</text>
      <text x="38" y="28" class="formula">F = (AB)'</text>
    </g>
    
    <!-- NOR Gate -->
    <g transform="translate(305, 80)" class="delay-3 slide-right">
      <path d="M0,0 Q12,10 0,20 L12,20 Q24,10 12,0 Z" fill="none" stroke="#27ae60" stroke-width="2"/>
      <circle cx="28" cy="10" r="4" fill="none" stroke="#27ae60" stroke-width="2"/>
      <line x1="-8" y1="5" x2="0" y2="5" stroke="#333" stroke-width="1.5"/>
      <line x1="-8" y1="15" x2="0" y2="15" stroke="#333" stroke-width="1.5"/>
      <text x="38" y="14" class="gate-symbol">NOR</text>
      <text x="38" y="28" class="formula">F = (A+B)'</text>
    </g>
    
    <!-- XOR Gate -->
    <g transform="translate(225, 145)" class="delay-4 slide-right">
      <path d="M0,0 Q12,10 0,20 L12,20 Q24,10 12,0 Z" fill="none" stroke="#f39c12" stroke-width="2"/>
      <path d="M-5,0 Q7,10 -5,20" fill="none" stroke="#f39c12" stroke-width="2"/>
      <line x1="-12" y1="5" x2="0" y2="5" stroke="#333" stroke-width="1.5"/>
      <line x1="-12" y1="15" x2="0" y2="15" stroke="#333" stroke-width="1.5"/>
      <text x="35" y="14" class="gate-symbol">XOR</text>
      <text x="35" y="28" class="formula">F = A ⊕ B</text>
    </g>
    
    <!-- XNOR Gate -->
    <g transform="translate(305, 145)" class="delay-5 slide-right">
      <path d="M0,0 Q12,10 0,20 L12,20 Q24,10 12,0 Z" fill="none" stroke="#f39c12" stroke-width="2"/>
      <path d="M-5,0 Q7,10 -5,20" fill="none" stroke="#f39c12" stroke-width="2"/>
      <circle cx="28" cy="10" r="4" fill="none" stroke="#f39c12" stroke-width="2"/>
      <line x1="-12" y1="5" x2="0" y2="5" stroke="#333" stroke-width="1.5"/>
      <line x1="-12" y1="15" x2="0" y2="15" stroke="#333" stroke-width="1.5"/>
      <text x="38" y="14" class="gate-symbol">XNOR</text>
      <text x="38" y="28" class="formula">F = (A⊕B)'</text>
    </g>
  </g>
  
  <!-- Section 3: Key Operations -->
  <g data-narration="Boolean Operations - The three fundamental operations: AND, OR, and NOT">
    <rect x="10" y="198" width="125" height="95" fill="url(#boxGradient3)" rx="6" filter="url(#shadow)" class="slide-up delay-1"/>
    <text x="20" y="216" class="section-title">Operations</text>
    <g transform="translate(18, 232)" class="delay-3 slide-up">
      <text x="0" y="0" class="theorem">AND: A·B = 1 when A=B=1</text>
      <text x="0" y="16" class="theorem">OR: A+B = 0 when A=B=0</text>
      <text x="0" y="32" class="theorem">NOT: A' = 1-A</text>
    </g>
  </g>
  
  <!-- Section 4: Key Theorems -->
  <g data-narration="Important Theorems - De Morgan's laws and Absorption theorems for simplification">
    <rect x="145" y="198" width="125" height="95" fill="url(#boxGradient4)" rx="6" filter="url(#shadow)" class="slide-up delay-2"/>
    <text x="155" y="216" class="section-title">Theorems</text>
    <g transform="translate(153, 232)" class="delay-4 slide-up">
      <text x="0" y="0" class="theorem">De Morgan's:</text>
      <text x="5" y="14" class="formula">(A+B)' = A'·B'</text>
      <text x="5" y="28" class="formula">(A·B)' = A'+B'</text>
      <text x="0" y="46" class="theorem">Absorption:</text>
      <text x="5" y="60" class="formula">A+(A·B) = A</text>
    </g>
  </g>
  
  <!-- Section 5: Truth Values -->
  <g data-narration="Binary Variables - Boolean algebra uses only two values: 0 (False) and 1 (True)">
    <rect x="280" y="198" width="130" height="95" fill="url(#boxGradient1)" rx="6" filter="url(#shadow)" class="slide-up delay-3"/>
    <text x="290" y="216" class="section-title">Binary Values</text>
    <g transform="translate(300, 235)" class="delay-5 slide-up">
      <rect x="0" y="0" width="30" height="25" fill="#2ecc71" rx="4"/>
      <text x="15" y="17" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">1</text>
      <text x="40" y="17" class="label">True</text>
      <rect x="0" y="32" width="30" height="25" fill="#e74c3c" rx="4"/>
      <text x="15" y="49" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">0</text>
      <text x="40" y="49" class="label">False</text>
    </g>
  </g>
  
  <!-- Section 6: Applications -->
  <g data-narration="Applications - Boolean algebra is used in digital circuits, databases, cryptography, and AI">
    <rect x="10" y="303" width="400" height="85" fill="url(#boxGradient2)" rx="6" filter="url(#shadow)" class="slide-up delay-4"/>
    <text x="20" y="321" class="section-title">Applications</text>
    <g transform="translate(18, 340)" class="delay-5 slide-up">
      <text x="0" y="0" class="label" font-size="11">• Digital Logic Gate Design • Circuit Minimization • Database Queries •</text>
      <text x="0" y="18" class="label" font-size="11">• Cryptography • AI Decision Trees • FPGA Programming •</text>
    </g>
  </g>
  
  <!-- Decorative element -->
  <g class="pulse" style="transform-origin: 395px 385px;">
    <circle cx="395" cy="385" r="8" fill="none" stroke="#3498db" stroke-width="2" opacity="0.6"/>
    <circle cx="395" cy="385" r="4" fill="#3498db" opacity="0.8"/>
  </g>
</svg>