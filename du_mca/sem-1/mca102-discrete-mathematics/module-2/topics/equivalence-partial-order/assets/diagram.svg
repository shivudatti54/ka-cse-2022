<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="equivalence-partial-order">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6"/>
      <stop offset="100%" style="stop-color:#ffe8cc"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f3ff"/>
      <stop offset="100%" style="stop-color:#cce6ff"/>
    </linearGradient>
    <linearGradient id="boxGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6ffe6"/>
      <stop offset="100%" style="stop-color:#ccffcc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowHead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .line-anim { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1s ease-out 1s forwards; }
    .section1 { animation-delay: 0.1s; }
    .section2 { animation-delay: 0.3s; }
    .section3 { animation-delay: 0.5s; }
    .section4 { animation-delay: 0.7s; }
    text { font-family: Arial, sans-serif; }
    .title { font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-size: 14px; fill: #34495e; }
    .detail { font-size: 11px; fill: #5d6d7e; }
    .property { font-size: 12px; fill: #2c3e50; }
    .node { font-size: 13px; font-weight: bold; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title Section -->
  <g class="fade-in" data-narration="Title: Equivalence Relations and Partial Orders">
    <rect x="0" y="0" width="420" height="45" fill="#4a6fa5" opacity="0.9"/>
    <text x="210" y="30" text-anchor="middle" class="title" fill="white">Equivalence Relations &amp; Partial Orders</text>
  </g>
  
  <!-- Section 1: Equivalence Relation Properties (Left Top) -->
  <g class="slide-left section1" data-narration="Equivalence Relation: Reflexivity, Symmetry, Transitivity">
    <rect x="15" y="55" width="180" height="130" rx="8" fill="url(#boxGrad1)" filter="url(#shadow)"/>
    <text x="25" y="75" class="label" font-weight="bold">Equivalence Relation</text>
    <text x="25" y="95" class="property">R ⊆ A×A satisfying:</text>
    <circle cx="30" cy="112" r="4" fill="#e67e22"/>
    <text x="40" y="116" class="detail">Reflexivity: ∀a∈A, aRa</text>
    <circle cx="30" cy="128" r="4" fill="#e67e22"/>
    <text x="40" y="132" class="detail">Symmetry: aRb ⇒ bRa</text>
    <circle cx="30" cy="144" r="4" fill="#e67e22"/>
    <text x="40" y="148" class="detail">Transitivity: aRb ∧ bRc ⇒ aRc</text>
    <text x="25" y="175" class="detail" font-style="italic">Example: a ≡ b (mod 5)</text>
  </g>
  
  <!-- Section 2: Partition (Right Top) -->
  <g class="slide-left section2" data-narration="Partition: Equivalence classes form disjoint subsets">
    <rect x="205" y="55" width="200" height="130" rx="8" fill="url(#boxGrad2)" filter="url(#shadow)"/>
    <text x="215" y="75" class="label" font-weight="bold">Partition &amp; Equivalence Classes</text>
    <text x="215" y="95" class="detail">Fundamental Theorem:</text>
    <text x="215" y="110" class="detail">Every equivalence relation</text>
    <text x="215" y="122" class="detail">induces a partition into</text>
    <text x="215" y="134" class="detail">equivalence classes [a]</text>
    <text x="215" y="150" class="detail">Z₅ = {[0],[1],[2],[3],[4]}</text>
    <!-- Visual partition circles -->
    <g transform="translate(320, 100)">
      <circle cx="0" cy="0" r="12" fill="#3498db" opacity="0.7"/>
      <text x="0" y="4" text-anchor="middle" font-size="9" fill="white">[0]</text>
    </g>
    <g transform="translate(350, 100)">
      <circle cx="0" cy="0" r="12" fill="#e74c3c" opacity="0.7"/>
      <text x="0" y="4" text-anchor="middle" font-size="9" fill="white">[1]</text>
    </g>
    <g transform="translate(320, 130)">
      <circle cx="0" cy="0" r="12" fill="#2ecc71" opacity="0.7"/>
      <text x="0" y="4" text-anchor="middle" font-size="9" fill="white">[2]</text>
    </g>
    <g transform="translate(350, 130)">
      <circle cx="0" cy="0" r="12" fill="#9b59b6" opacity="0.7"/>
      <text x="0" y="4" text-anchor="middle" font-size="9" fill="white">[3]</text>
    </g>
    <g transform="translate(335, 160)">
      <circle cx="0" cy="0" r="12" fill="#f39c12" opacity="0.7"/>
      <text x="0" y="4" text-anchor="middle" font-size="9" fill="white">[4]</text>
    </g>
  </g>
  
  <!-- Section 3: Partial Order Properties (Left Bottom) -->
  <g class="slide-up section3" data-narration="Partial Order: Reflexivity, Antisymmetry, Transitivity">
    <rect x="15" y="195" width="180" height="100" rx="8" fill="url(#boxGrad3)" filter="url(#shadow)"/>
    <text x="25" y="215" class="label" font-weight="bold">Partial Order (Poset)</text>
    <text x="25" y="235" class="property">R ⊆ A×A satisfying:</text>
    <circle cx="30" cy="252" r="4" fill="#27ae60"/>
    <text x="40" y="256" class="detail">Reflexivity: aRa</text>
    <circle cx="30" cy="268" r="4" fill="#27ae60"/>
    <text x="40" y="272" class="detail">Antisymmetry: aRb ∧ bRa ⇒ a=b</text>
    <circle cx="30" cy="284" r="4" fill="#27ae60"/>
    <text x="40" y="288" class="detail">Transitivity: aRb ∧ bRc ⇒ aRc</text>
  </g>
  
  <!-- Section 4: Hasse Diagram D12 (Center Bottom) -->
  <g class="slide-up section4" data-narration="Hasse Diagram: Divisors of 12 under divisibility">
    <rect x="15" y="305" width="390" height="85" rx="8" fill="white" opacity="0.9" filter="url(#shadow)"/>
    <text x="25" y="325" class="label" font-weight="bold">Hasse Diagram: D₁₂ (Divisibility)</text>
    
    <!-- Edges -->
    <g class="line-anim">
      <line x1="120" y1="365" x2="120" y2="345" stroke="#7f8c8d" stroke-width="1.5"/>
      <line x1="140" y1="365" x2="140" y2="345" stroke="#7f8c8d" stroke-width="1.5"/>
      <line x1="130" y1="345" x2="110" y2="325" stroke="#7f8c8d" stroke-width="1.5"/>
      <line x1="130" y1="345" x2="150" y2="325" stroke="#7f8c8d" stroke-width="1.5"/>
      <line x1="110" y1="325" x2="130" y2="305" stroke="#7f8c8d" stroke-width="1.5"/>
      <line x1="150" y1="325" x2="130" y2="305" stroke="#7f8c8d" stroke-width="1.5"/>
    </g>
    
    <!-- Nodes -->
    <g class="pulse" style="transform-origin: 130px 380px;">
      <circle cx="130" cy="380" r="16" fill="#3498db"/>
      <text x="130" y="385" text-anchor="middle" class="node" fill="white">1</text>
    </g>
    <g class="pulse" style="transform-origin: 120px 355px;">
      <circle cx="120" cy="355" r="16" fill="#9b59b6"/>
      <text x="120" y="360" text-anchor="middle" class="node" fill="white">2</text>
    </g>
    <g class="pulse" style="transform-origin: 140px 355px;">
      <circle cx="140" cy="355" r="16" fill="#9b59b6"/>
      <text x="140" y="360" text-anchor="middle" class="node" fill="white">3</text>
    </g>
    <g class="pulse" style="transform-origin: 110px 330px;">
      <circle cx="110" cy="330" r="16" fill="#e74c3c"/>
      <text x="110" y="335" text-anchor="middle" class="node" fill="white">4</text>
    </g>
    <g class="pulse" style="transform-origin: 150px 330px;">
      <circle cx="150" cy="330" r="16" fill="#e74c3c"/>
      <text x="150" y="335" text-anchor="middle" class="node" fill="white">6</text>
    </g>
    <g class="pulse" style="transform-origin: 130px 305px;">
      <circle cx="130" cy="305" r="16" fill="#f39c12"/>
      <text x="130" y="310" text-anchor="middle" class="node" fill="white">12</text>
    </g>
    
    <!-- Labels -->
    <text x="200" y="330" class="detail">Divisibility poset:</text>
    <text x="200" y="345" class="detail">• Bottom: 1</text>
    <text x="200" y="358" class="detail">• Middle: 2,3</text>
    <text x="200" y="371" class="detail">• Top: 12</text>
  </g>
  
  <!-- Arrow connectors -->
  <g data-narration="Visual relationship between concepts">
    <path d="M195,170 Q250,180 305,170" stroke="#95a5a6" stroke-width="1" fill="none" marker-end="url(#arrowHead)" class="line-anim"/>
  </g>
  
  <!-- Decorative corner elements -->
  <g opacity="0.3">
    <circle cx="410" cy="390" r="30" fill="#3498db"/>
    <circle cx="10" cy="390" r="20" fill="#9b59b6"/>
    <circle cx="410" cy="50" r="15" fill="#e74c3c"/>
    <circle cx="10" cy="50" r="25" fill="#2ecc71"/>
  </g>
</svg>