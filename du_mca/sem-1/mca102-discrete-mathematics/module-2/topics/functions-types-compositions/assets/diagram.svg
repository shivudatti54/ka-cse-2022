<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="functions-types-compositions" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#e0f7e9"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b3d9ff"/>
      <stop offset="100%" style="stop-color:#8ecae6"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9f0c9"/>
      <stop offset="100%" style="stop-color:#a8d5a2"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd6cc"/>
      <stop offset="100%" style="stop-color:#ffb3a7"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0c3fc"/>
      <stop offset="100%" style="stop-color:#c9b1ff"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5c6bc0"/>
    </marker>
    <marker id="arrowheadRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e57373"/>
    </marker>
    <marker id="arrowheadGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#81c784"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2c3e50; }
    .formula { font-family: 'Courier New', monospace; font-size: 12px; fill: #2c3e50; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .draw-line { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 1.5s ease-out forwards; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Functions: Types &amp; Compositions</text>
  
  <!-- Section 1: Main Composition Diagram -->
  <g data-narration="Function composition shows how functions chain together. Here f maps A to B, then g maps B to C, creating g∘f from A to C.">
    <rect x="20" y="45" width="380" height="130" rx="8" fill="white" stroke="#b3d9ff" stroke-width="2" class="slide-in"/>
    <text x="35" y="62" class="section-title">Function Composition: A → B → C</text>
    
    <!-- Set A -->
    <ellipse cx="70" cy="115" rx="30" ry="40" fill="url(#boxGradient1)" stroke="#5c6bc0" stroke-width="2" class="pulse"/>
    <text x="70" y="118" text-anchor="middle" class="label" font-weight="bold">A</text>
    <text x="70" y="132" text-anchor="middle" class="detail">Domain</text>
    
    <!-- Set B -->
    <ellipse cx="210" cy="115" rx="30" ry="40" fill="url(#boxGradient2)" stroke="#66bb6a" stroke-width="2" class="pulse"/>
    <text x="210" y="118" text-anchor="middle" class="label" font-weight="bold">B</text>
    <text x="210" y="132" text-anchor="middle" class="detail">Intermediate</text>
    
    <!-- Set C -->
    <ellipse cx="350" cy="115" rx="30" ry="40" fill="url(#boxGradient3)" stroke="#ef5350" stroke-width="2" class="pulse"/>
    <text x="350" y="118" text-anchor="middle" class="label" font-weight="bold">C</text>
    <text x="350" y="132" text-anchor="middle" class="detail">Codomain</text>
    
    <!-- Arrow f: A → B -->
    <line x1="100" y1="115" x2="180" y2="115" stroke="#5c6bc0" stroke-width="2" marker-end="url(#arrowhead)" class="draw-line"/>
    <text x="140" y="105" text-anchor="middle" class="label" fill="#5c6bc0">f</text>
    
    <!-- Arrow g: B → C -->
    <line x1="240" y1="115" x2="320" y2="115" stroke="#66bb6a" stroke-width="2" marker-end="url(#arrowheadGreen)" class="draw-line"/>
    <text x="280" y="105" text-anchor="middle" class="label" fill="#66bb6a">g</text>
    
    <!-- Composition arrow -->
    <line x1="100" y1="155" x2="320" y2="155" stroke="#ef5350" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowheadRed)" class="draw-line delay-1"/>
    <text x="210" y="170" text-anchor="middle" class="label" fill="#ef5350">g ∘ f</text>
    <text x="210" y="185" text-anchor="middle" class="detail">(g∘f)(a) = g(f(a))</text>
  </g>
  
  <!-- Section 2: Function Types -->
  <g data-narration="Three main types: Injective (one-to-one), Surjective (onto), and Bijective (both).">
    <rect x="20" y="185" width="180" height="85" rx="6" fill="white" stroke="#e0c3fc" stroke-width="2" class="slide-in delay-2"/>
    <text x="30" y="202" class="section-title">Function Types</text>
    
    <!-- Injective -->
    <ellipse cx="55" cy="225" rx="18" ry="12" fill="none" stroke="#7e57c2" stroke-width="1.5"/>
    <ellipse cx="85" cy="225" rx="18" ry="12" fill="none" stroke="#7e57c2" stroke-width="1.5"/>
    <line x1="55" y1="240" x2="75" y2="240" stroke="#7e57c2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="70" y="258" text-anchor="middle" class="detail" fill="#7e57c2">Injective</text>
    <text x="70" y="270" text-anchor="middle" class="detail" font-size="10">One-to-One</text>
    
    <!-- Surjective -->
    <ellipse cx="145" cy="220" rx="18" ry="12" fill="none" stroke="#26a69a" stroke-width="1.5"/>
    <ellipse cx="145" cy="245" rx="18" ry="12" fill="none" stroke="#26a69a" stroke-width="1.5"/>
    <line x1="135" y1="228" x2="135" y2="240" stroke="#26a69a" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="155" y1="228" x2="155" y2="240" stroke="#26a69a" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="145" y="263" text-anchor="middle" class="detail" fill="#26a69a">Surjective</text>
    <text x="145" y="273" text-anchor="middle" class="detail" font-size="10">Onto</text>
  </g>
  
  <!-- Section 3: Properties -->
  <g data-narration="Key properties include associativity of composition and identity functions.">
    <rect x="210" y="185" width="190" height="85" rx="6" fill="white" stroke="#ffcc80" stroke-width="2" class="slide-in delay-2"/>
    <text x="220" y="202" class="section-title">Properties</text>
    <text x="220" y="222" class="detail">• Associativity:</text>
    <text x="220" y="236" class="formula">h∘(g∘f) = (h∘g)∘f</text>
    <text x="220" y="252" class="detail">• Identity:</text>
    <text x="220" y="266" class="formula">f∘id = f = id∘f</text>
  </g>
  
  <!-- Section 4: Inverse Function -->
  <g data-narration="Bijective functions have inverses that reverse the mapping completely.">
    <rect x="20" y="278" width="130" height="55" rx="6" fill="url(#boxGradient4)" stroke="#ab47bc" stroke-width="2" class="slide-in delay-3"/>
    <text x="30" y="295" class="section-title">Inverse Function</text>
    <text x="30" y="312" class="formula">f⁻¹(f(a)) = a</text>
    <text x="30" y="326" class="detail">Only for bijective f</text>
  </g>
  
  <!-- Section 5: Example -->
  <g data-narration="Example: f(x) = 2x + 3 is bijective with inverse f⁻¹(y) = (y-3)/2">
    <rect x="160" y="278" width="240" height="55" rx="6" fill="white" stroke="#78909c" stroke-width="2" class="slide-in delay-3"/>
    <text x="170" y="295" class="section-title">Example: f(x) = 2x + 3</text>
    <text x="170" y="312" class="formula">Injective ✓ | Surjective ✓ | Bijective ✓</text>
    <text x="170" y="326" class="detail">f⁻¹(y) = (y-3)/2</text>
  </g>
  
  <!-- Section 6: Special Functions -->
  <g data-narration="Constant and Identity are special function types with unique properties.">
    <rect x="20" y="340" width="380" height="50" rx="6" fill="white" stroke="#90a4ae" stroke-width="2" class="slide-in delay-4"/>
    <text x="30" y="360" class="section-title">Special Functions:</text>
    <text x="140" y="360" class="detail">Constant: f(x) = c</text>
    <text x="250" y="360" class="detail">Identity: id(x) = x</text>
    <text x="370" y="360" class="detail">Characteristic: χ_S(x)</text>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="395" cy="50" r="4" fill="#b3d9ff" class="pulse"/>
  <circle cx="405" cy="65" r="3" fill="#c9f0c9" class="pulse"/>
  <circle cx="25" cy="175" r="3" fill="#ffd6cc" class="pulse"/>
  <circle cx="400" cy="185" r="4" fill="#e0c3fc" class="pulse"/>
</svg>