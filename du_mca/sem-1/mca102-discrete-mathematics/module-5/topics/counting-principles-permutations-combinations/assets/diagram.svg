<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="counting-principles-permutations-combinations" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fcb69f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4fc79;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#96e6a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; font-family: Georgia, serif; }
    .box { animation: slideIn 0.8s ease-out backwards; }
    .box1 { animation-delay: 0.2s; }
    .box2 { animation-delay: 0.4s; }
    .box3 { animation-delay: 0.6s; }
    .node { animation: pulse 2s ease-in-out infinite; }
    .arrow { stroke-dasharray: 50; animation: drawLine 1s ease-out forwards; }
    .tree-node { animation: fadeIn 0.5s ease-out backwards; }
    .tree-node:nth-child(1) { animation-delay: 0.3s; }
    .tree-node:nth-child(2) { animation-delay: 0.5s; }
    .tree-node:nth-child(3) { animation-delay: 0.7s; }
    .tree-node:nth-child(4) { animation-delay: 0.9s; }
    .tree-node:nth-child(5) { animation-delay: 1.1s; }
    .tree-node:nth-child(6) { animation-delay: 1.3s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title" font-size="20" font-weight="bold" fill="#2c3e50" font-family="Georgia, serif">Counting Principles</text>
  <text x="210" y="55" text-anchor="middle" class="title" font-size="16" fill="#34495e" font-family="Georgia, serif">Permutations &amp; Combinations</text>
  
  <!-- Key Concepts Boxes -->
  <g filter="url(#shadow)">
    <rect x="10" y="75" width="120" height="50" rx="8" fill="url(#boxGradient1)" class="box box1" data-narration="Fundamental Counting Principle: If one task has m ways and another has n ways, together they have m × n ways"/>
    <text x="70" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="#5d4037">Product Rule</text>
    <text x="70" y="110" text-anchor="middle" font-size="10" fill="#5d4037">m × n ways</text>
  </g>
  
  <g filter="url(#shadow)">
    <rect x="145" y="75" width="120" height="50" rx="8" fill="url(#boxGradient2)" class="box box2" data-narration="Permutations: Arrangements where order matters. P(n,r) = n!/(n-r)!"/>
    <text x="205" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Permutations</text>
    <text x="205" y="110" text-anchor="middle" font-size="10" fill="#1b5e20">Order matters</text>
  </g>
  
  <g filter="url(#shadow)">
    <rect x="280" y="75" width="130" height="50" rx="8" fill="url(#boxGradient3)" class="box box3" data-narration="Combinations: Selections where order doesn't matter. C(n,r) = n!/[r!(n-r)!]"/>
    <text x="345" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a148c">Combinations</text>
    <text x="345" y="110" text-anchor="middle" font-size="10" fill="#4a148c">Order doesn't matter</text>
  </g>
  
  <!-- Factorial Tree Diagram -->
  <g transform="translate(210, 200)">
    <!-- Tree Lines -->
    <line x1="0" y1="0" x2="-60" y2="50" stroke="#7f8c8d" stroke-width="2" class="arrow" opacity="0.6"/>
    <line x1="0" y1="0" x2="60" y2="50" stroke="#7f8c8d" stroke-width="2" class="arrow" opacity="0.6"/>
    <line x1="-60" y1="50" x2="-90" y2="100" stroke="#7f8c8d" stroke-width="2" class="arrow" opacity="0.6"/>
    <line x1="-60" y1="50" x2="-30" y2="100" stroke="#7f8c8d" stroke-width="2" class="arrow" opacity="0.6"/>
    <line x1="60" y1="50" x2="30" y2="100" stroke="#7f8c8d" stroke-width="2" class="arrow" opacity="0.6"/>
    <line x1="60" y1="50" x2="90" y2="100" stroke="#7f8c8d" stroke-width="2" class="arrow" opacity="0.6"/>
    
    <!-- Tree Nodes -->
    <g class="tree-node" data-narration="5 factorial equals 5 multiplied by 4 factorial">
      <circle cx="0" cy="0" r="22" fill="#e74c3c" class="node"/>
      <text x="0" y="5" text-anchor="middle" font-size="14" font-weight="bold" fill="white">5!</text>
    </g>
    
    <g class="tree-node" data-narration="4 factorial equals 4 multiplied by 3 factorial">
      <circle cx="-60" cy="50" r="20" fill="#e67e22" class="node"/>
      <text x="-60" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="white">4!</text>
    </g>
    
    <g class="tree-node" data-narration="3 factorial equals 3 multiplied by 2 factorial">
      <circle cx="60" cy="50" r="20" fill="#3498db" class="node"/>
      <text x="60" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="white">3!</text>
    </g>
    
    <g class="tree-node" data-narration="2 factorial equals 2 multiplied by 1 factorial">
      <circle cx="-90" cy="100" r="18" fill="#9b59b6" class="node"/>
      <text x="-90" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="white">2!</text>
    </g>
    
    <g class="tree-node" data-narration="1 factorial equals 1 (base case)">
      <circle cx="-30" cy="100" r="18" fill="#1abc9c" class="node"/>
      <text x="-30" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1!</text>
    </g>
    
    <g class="tree-node" data-narration="0 factorial equals 1 (base case definition)">
      <circle cx="30" cy="100" r="18" fill="#2ecc71" class="node"/>
      <text x="30" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="white">0!</text>
    </g>
    
    <g class="tree-node" data-narration="0 factorial equals 1 is the fundamental base case">
      <circle cx="90" cy="100" r="18" fill="#f39c12" class="node"/>
      <text x="90" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="white">=1</text>
    </g>
    
    <!-- Multiplication symbols on arrows -->
    <text x="-30" y="30" font-size="12" fill="#2c3e50" font-weight="bold">×</text>
    <text x="30" y="30" font-size="12" fill="#2c3e50" font-weight="bold">×</text>
    <text x="-75" y="80" font-size="10" fill="#2c3e50" font-weight="bold">×</text>
    <text x="-45" y="80" font-size="10" fill="#2c3e50" font-weight="bold">×</text>
    <text x="45" y="80" font-size="10" fill="#2c3e50" font-weight="bold">×</text>
    <text x="75" y="80" font-size="10" fill="#2c3e50" font-weight="bold">×</text>
  </g>
  
  <!-- Formula Display -->
  <g transform="translate(10, 340)">
    <rect x="0" y="0" width="400" height="45" rx="6" fill="#2c3e50" opacity="0.9"/>
    <text x="200" y="18" text-anchor="middle" font-size="12" fill="#ecf0f1" font-family="Georgia, serif">Factorial: n! = n × (n-1) × (n-2) × ... × 2 × 1</text>
    <text x="200" y="35" text-anchor="middle" font-size="11" fill="#bdc3c7" font-family="Georgia, serif">0! = 1 (Base Case)</text>
  </g>
  
  <!-- Arrow indicator -->
  <g transform="translate(380, 200)">
    <path d="M0,-10 L10,0 L0,10" fill="none" stroke="#7f8c8d" stroke-width="2"/>
  </g>
</svg>