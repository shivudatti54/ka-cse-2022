<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="generating-functions">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e6f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f0e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cce0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6ffe6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccffcc;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title-text { font-family: Georgia, serif; font-size: 24px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; font-weight: bold; }
    .detail-text { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .math-text { font-family: 'Times New Roman', serif; font-size: 13px; fill: #2c3e50; font-style: italic; }
    .box-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2c3e50; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow-anim { animation: arrowPulse 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title-text fade-in">Generating Functions</text>
  <line x1="60" y1="48" x2="360" y2="48" stroke="#b8c5d0" stroke-width="1.5" class="fade-in" style="animation-delay: 0.2s"/>
  
  <!-- Definition Box -->
  <g class="slide-in" style="animation-delay: 0.3s" data-narration="The ordinary generating function encodes a sequence as coefficients of a formal power series">
    <rect x="40" y="65" width="340" height="50" rx="6" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="55" y="82" class="label-text">Ordinary Generating Function (OGF):</text>
    <text x="55" y="102" class="math-text" font-size="15">G(x) = a₀ + a₁x + a₂x² + a₃x³ + ... = Σ aₙxⁿ</text>
  </g>
  
  <!-- Operation 1: Addition -->
  <g class="slide-in" style="animation-delay: 0.5s" data-narration="Addition of generating functions corresponds to adding corresponding sequence terms element-wise">
    <rect x="30" y="135" width="105" height="95" rx="6" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="82" y="155" text-anchor="middle" class="box-title">ADDITION</text>
    <text x="82" y="175" text-anchor="middle" class="math-text">G(x) + H(x)</text>
    <text x="82" y="195" text-anchor="middle" class="detail-text">↓</text>
    <text x="82" y="212" text-anchor="middle" class="detail-text">aₙ + bₙ</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M145 165 L170 165" stroke="#3498db" stroke-width="2" fill="none" class="arrow-anim"/>
  <polygon points="170,165 163,160 163,170" fill="#3498db" class="arrow-anim"/>
  
  <!-- Operation 2: Multiplication -->
  <g class="slide-in" style="animation-delay: 0.7s" data-narration="Multiplication of generating functions corresponds to convolution of sequences">
    <rect x="180" y="135" width="105" height="95" rx="6" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="232" y="155" text-anchor="middle" class="box-title">MULTIPLICATION</text>
    <text x="232" y="175" text-anchor="middle" class="math-text">G(x) × H(x)</text>
    <text x="232" y="195" text-anchor="middle" class="detail-text">↓</text>
    <text x="232" y="212" text-anchor="middle" class="detail-text">Σ aₖbₙ₋ₖ</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M295 165 L320 165" stroke="#3498db" stroke-width="2" fill="none" class="arrow-anim"/>
  <polygon points="320,165 313,160 313,170" fill="#3498db" class="arrow-anim"/>
  
  <!-- Operation 3: Differentiation -->
  <g class="slide-in" style="animation-delay: 0.9s" data-narration="Differentiation shifts the sequence and multiplies each term by its index">
    <rect x="330" y="135" width="65" height="95" rx="6" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="362" y="155" text-anchor="middle" class="box-title">DIFF.</text>
    <text x="362" y="175" text-anchor="middle" class="math-text">G'(x)</text>
    <text x="362" y="195" text-anchor="middle" class="detail-text">↓</text>
    <text x="362" y="212" text-anchor="middle" class="detail-text">(n+1)aₙ₊₁</text>
  </g>
  
  <!-- Sequence Example Box -->
  <g class="slide-in" style="animation-delay: 1.1s" data-narration="Example: the sequence 1,1,1,1,... has generating function 1/(1-x)">
    <rect x="40" y="250" width="340" height="55" rx="6" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="55" y="270" class="label-text">Example Sequence:</text>
    <text x="55" y="290" class="detail-text">Sequence: {aₙ} = 1, 1, 1, 1, ... → G(x) = 1 + x + x² + x³ + ... = 1/(1-x)</text>
  </g>
  
  <!-- Coefficient Extraction -->
  <g class="slide-in" style="animation-delay: 1.3s" data-narration="The coefficient notation extracts the nth term from a generating function">
    <rect x="40" y="315" width="340" height="40" rx="6" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="55" y="335" class="label-text">Coefficient Notation:</text>
    <text x="190" y="335" class="math-text" font-size="14">[xⁿ] G(x) = aₙ</text>
    <text x="275" y="335" class="detail-text">extracts nth term</text>
  </g>
  
  <!-- Decorative dots representing sequence -->
  <g class="pulse" style="transform-origin: 210px 240px;">
    <circle cx="180" cy="240" r="4" fill="#3498db" opacity="0.6"/>
    <circle cx="200" cy="240" r="4" fill="#3498db" opacity="0.7"/>
    <circle cx="220" cy="240" r="4" fill="#3498db" opacity="0.8"/>
    <circle cx="240" cy="240" r="4" fill="#3498db" opacity="0.9"/>
    <circle cx="260" cy="240" r="4" fill="#3498db" opacity="1"/>
  </g>
  
</svg>