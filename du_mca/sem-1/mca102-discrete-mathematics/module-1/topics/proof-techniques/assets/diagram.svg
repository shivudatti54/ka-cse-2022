<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="proof-techniques">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="50%" style="stop-color:#e8eeff"/>
      <stop offset="100%" style="stop-color:#f0e6ff"/>
    </linearGradient>
    <linearGradient id="directGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf"/>
      <stop offset="100%" style="stop-color:#88d8b0"/>
    </linearGradient>
    <linearGradient id="contraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7"/>
      <stop offset="100%" style="stop-color:#fdcb6e"/>
    </linearGradient>
    <linearGradient id="contra2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff7675"/>
      <stop offset="100%" style="stop-color:#d63031"/>
    </linearGradient>
    <linearGradient id="inductGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2c3e50"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#27ae60"/>
    </marker>
  </defs>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes wave {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .title { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .section-desc { font-family: Arial, sans-serif; font-size: 11px; fill: #34495e; }
    .example { font-family: Arial, sans-serif; font-size: 10px; fill: #7f8c8d; font-style: italic; }
    .domino-text { font-family: Arial, sans-serif; font-size: 9px; fill: white; font-weight: bold; }
    .step-label { font-family: Arial, sans-serif; font-size: 10px; fill: #2c3e50; }
    
    .title-anim { animation: fadeIn 0.8s ease forwards; }
    .section1 { animation: slideUp 0.6s ease forwards; animation-delay: 0.2s; opacity: 0; }
    .section2 { animation: slideUp 0.6s ease forwards; animation-delay: 0.4s; opacity: 0; }
    .section3 { animation: slideUp 0.6s ease forwards; animation-delay: 0.6s; opacity: 0; }
    .section4 { animation: slideUp 0.6s ease forwards; animation-delay: 0.8s; opacity: 0; }
    
    .domino { animation: wave 1.5s ease-in-out infinite; }
    .domino:nth-child(2) { animation-delay: 0.2s; }
    .domino:nth-child(3) { animation-delay: 0.4s; }
    
    .arrow-anim { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Title -->
  <text x="210" y="32" text-anchor="middle" class="title title-anim" data-narration="Proof Techniques - Title showing the four main proof methods studied in discrete mathematics">Proof Techniques</text>
  
  <!-- Direct Proof Section -->
  <g class="section1" data-narration="Direct Proof: Start with hypothesis, logically derive conclusion using definitions and previously proven statements">
    <rect x="15" y="50" width="95" height="75" rx="8" fill="url(#directGrad)" filter="url(#shadow)"/>
    <text x="62" y="70" text-anchor="middle" class="section-title">Direct Proof</text>
    <text x="62" y="88" text-anchor="middle" class="section-desc">Assume P → Derive Q</text>
    <line x1="25" y1="100" x2="55" y2="100" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <text x="62" y="118" text-anchor="middle" class="example">n=2k → n²=2(2k²)</text>
  </g>
  
  <!-- Contrapositive Section -->
  <g class="section2" data-narration="Contrapositive Proof: Prove P implies Q by showing not Q implies not P, using logical equivalence">
    <rect x="120" y="50" width="95" height="75" rx="8" fill="url(#contraGrad)" filter="url(#shadow)"/>
    <text x="167" y="70" text-anchor="middle" class="section-title">Contrapositive</text>
    <text x="167" y="88" text-anchor="middle" class="section-desc">¬Q ⇒ ¬P</text>
    <line x1="130" y1="100" x2="160" y2="100" stroke="#e17055" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="167" y="118" text-anchor="middle" class="example">3n+2 odd → n odd</text>
  </g>
  
  <!-- Contradiction Section -->
  <g class="section3" data-narration="Proof by Contradiction: Assume the negation leads to impossible contradiction, proving original statement true">
    <rect x="225" y="50" width="95" height="75" rx="8" fill="url(#contra2Grad)" filter="url(#shadow)"/>
    <text x="272" y="70" text-anchor="middle" class="section-title" fill="white">Contradiction</text>
    <text x="272" y="88" text-anchor="middle" class="section-desc" fill="#fff">Assume ¬P → ⊥</text>
    <line x1="235" y1="100" x2="265" y2="100" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="272" y="118" text-anchor="middle" class="example">√2 = a/b → contradiction</text>
  </g>
  
  <!-- Induction Section -->
  <g class="section4" data-narration="Mathematical Induction: Prove base case, then prove if true for k it must be true for k+1">
    <rect x="330" y="50" width="75" height="75" rx="8" fill="url(#inductGrad)" filter="url(#shadow)"/>
    <text x="367" y="70" text-anchor="middle" class="section-title" fill="white">Induction</text>
    <text x="367" y="88" text-anchor="middle" class="section-desc" fill="#fff">Base + Step</text>
    <text x="367" y="118" text-anchor="middle" class="example">P(1) ∧ P(k)⇒P(k+1)</text>
  </g>
  
  <!-- Induction Domino Effect Visualization -->
  <g transform="translate(0, 140)" data-narration="Induction Domino Effect: Base case P(1) is proven true, then each domino pushes the next showing the inductive step">
    
    <!-- Base Case Label -->
    <text x="45" y="15" class="step-label" font-weight="bold">Base Case: P(1) is true</text>
    
    <!-- Domino 1 - P(1) -->
    <g class="domino">
      <rect x="30" y="30" width="18" height="35" rx="2" fill="#6c5ce7"/>
      <text x="39" y="52" text-anchor="middle" class="domino-text">P(1)</text>
    </g>
    
    <!-- Arrow 1 -->
    <path d="M52 47 L75 47" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowBlue)" class="arrow-anim"/>
    
    <!-- Domino 2 - P(k) -->
    <g class="domino">
      <rect x="80" y="30" width="18" height="35" rx="2" fill="#7d6ee8"/>
      <text x="89" y="52" text-anchor="middle" class="domino-text">P(k)</text>
    </g>
    
    <!-- Arrow 2 -->
    <path d="M102 47 L125 47" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowBlue)" class="arrow-anim"/>
    
    <!-- Domino 3 - P(k+1) -->
    <g class="domino">
      <rect x="130" y="30" width="18" height="35" rx="2" fill="#8e7ee9"/>
      <text x="139" y="52" text-anchor="middle" class="domino-text">P(k+1)</text>
    </g>
    
    <!-- Inductive Step Label -->
    <text x="285" y="35" class="step-label" font-weight="bold">Inductive Step</text>
    <text x="285" y="50" class="step-label">Assume P(k) → Prove P(k+1)</text>
    
    <!-- Continuation dots -->
    <circle cx="155" cy="47" r="2" fill="#2c3e50"/>
    <circle cx="162" cy="47" r="2" fill="#2c3e50"/>
    <circle cx="169" cy="47" r="2" fill="#2c3e50"/>
    
    <!-- Method comparison box -->
    <rect x="200" y="90" width="205" height="50" rx="6" fill="#ffffff" stroke="#bdc3c7" stroke-width="1" opacity="0.9"/>
    <text x="210" y="108" class="section-title" font-size="12">Constructive vs Non-Constructive</text>
    <text x="210" y="125" class="section-desc">Constructive: Finds actual solution</text>
    <text x="210" y="137" class="section-desc">Non-Constructive: Proves existence only</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="380" r="25" fill="#74b9ff" opacity="0.15"/>
  <circle cx="400" cy="30" r="20" fill="#a29bfe" opacity="0.2"/>
  <circle cx="380" cy="370" r="15" fill="#55efc4" opacity="0.2"/>
</svg>