<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="propositional-predicate-logic">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0fa"/>
      <stop offset="100%" style="stop-color:#e8f8f0"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8fb8d4"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b8e8"/>
      <stop offset="100%" style="stop-color:#b88fd4"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e8d4"/>
      <stop offset="100%" style="stop-color:#8fd4b8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section2 { animation: slideInRight 0.6s ease-out 0.4s both; }
    .section3 { animation: slideInUp 0.6s ease-out 0.6s both; }
    .section4 { animation: slideInUp 0.6s ease-out 0.8s both; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .blink { animation: blink 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Propositional &amp; Predicate Logic</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#5d6d7e" stroke-width="2" class="title"/>
  
  <!-- Section 1: Propositional Logic -->
  <g class="section1" data-narration="Propositional logic deals with atomic statements (propositions) that have definite truth values - either TRUE or FALSE">
    <rect x="10" y="50" width="125" height="75" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="72" y="68" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a3a4a">PROPOSITIONS</text>
    <text x="72" y="85" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Atomic statements</text>
    <text x="72" y="100" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">with truth values</text>
    <rect x="20" y="110" width="30" height="8" rx="2" fill="#fff" stroke="#3498db" stroke-width="1"/>
    <text x="35" y="117" text-anchor="middle" font-family="monospace" font-size="8" fill="#2980b9">T/F</text>
  </g>
  
  <!-- Section 2: Logical Connectives -->
  <g class="section1" data-narration="Logical connectives combine propositions: negation (NOT), conjunction (AND), disjunction (OR), implication (IF-THEN), biconditional (IFF)">
    <rect x="145" y="50" width="125" height="75" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="207" y="68" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a3a4a">CONNECTIVES</text>
    <text x="160" y="88" text-anchor="start" font-family="monospace" font-size="11" fill="#2c3e50">¬ ∧ ∨ → ↔</text>
    <text x="160" y="105" text-anchor="start" font-family="Arial" font-size="10" fill="#5d6d7e">NOT AND OR IF IFF</text>
  </g>
  
  <!-- Arrow between propositions and connectives -->
  <g class="pulse">
    <line x1="135" y1="87" x2="145" y2="87" stroke="#e74c3c" stroke-width="2"/>
    <polygon points="143,84 143,90 149,87" fill="#e74c3c"/>
  </g>
  
  <!-- Section 3: Truth Table -->
  <g class="section2" data-narration="Truth tables systematically show all possible truth value combinations for propositions and their compound forms">
    <rect x="280" y="50" width="130" height="75" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
    <text x="345" y="68" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1e8449">TRUTH TABLE</text>
    <text x="290" y="85" text-anchor="start" font-family="monospace" font-size="10" fill="#2c3e50">p q | ¬p p∧q p∨q</text>
    <rect x="290" y="92" width="110" height="1" fill="#27ae60"/>
    <text x="290" y="108" text-anchor="start" font-family="monospace" font-size="10" fill="#2c3e50">T T | F  T    T</text>
    <text x="290" y="118" text-anchor="start" font-family="monospace" font-size="9" fill="#7f8c8d">...</text>
  </g>
  
  <!-- Arrow to predicate logic -->
  <g class="pulse">
    <line x1="280" y1="140" x2="280" y2="160" stroke="#e67e22" stroke-width="2"/>
    <polygon points="277,156 283,156 280,163" fill="#e67e22"/>
  </g>
  
  <!-- Section 4: Predicate Logic -->
  <g class="section3" data-narration="Predicate logic extends propositions by including variables and quantifiers: universal (FOR ALL) and existential (THERE EXISTS)">
    <rect x="10" y="165" width="190" height="60" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="105" y="185" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a3a4a">PREDICATE LOGIC</text>
    <text x="20" y="205" text-anchor="start" font-family="monospace" font-size="11" fill="#2c3e50">P(x): "x > 5"</text>
    <text x="20" y="218" text-anchor="start" font-family="Arial" font-size="10" fill="#5d6d7e">Variables + Quantifiers</text>
  </g>
  
  <!-- Quantifiers Box -->
  <g class="section3" data-narration="Quantifiers specify the scope of statements: universal quantifier (∀) means for all elements, existential quantifier (∃) means there exists at least one">
    <rect x="210" y="165" width="100" height="60" rx="8" fill="#fff" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
    <text x="260" y="183" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#7d3c98">QUANTIFIERS</text>
    <text x="260" y="200" text-anchor="middle" font-family="monospace" font-size="12" fill="#2c3e50">∀ = For all</text>
    <text x="260" y="216" text-anchor="middle" font-family="monospace" font-size="12" fill="#2c3e50">∃ = Exists</text>
  </g>
  
  <!-- Section 5: Example / Applications -->
  <g class="section4" data-narration="Applications include digital circuits, database queries (SQL), algorithm verification, and AI knowledge representation">
    <rect x="10" y="235" width="400" height="55" rx="8" fill="#fff" stroke="#34495e" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="210" y="253" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2c3e50">APPLICATIONS</text>
    <g font-family="Arial" font-size="10" fill="#5d6d7e">
      <text x="30" y="272">• Digital Circuits</text>
      <text x="120" y="272">• Database Queries (SQL)</text>
      <text x="230" y="272">• Algorithm Verification</text>
      <text x="340" y="272">• AI Reasoning</text>
    </g>
  </g>
  
  <!-- Example Box: Truth Table for (p ∧ ¬q) → r -->
  <g class="section4" data-narration="Example truth table for compound proposition (p AND NOT q) IMPLIES r - shows how to systematically evaluate complex logical expressions">
    <rect x="10" y="300" width="400" height="90" rx="8" fill="#fafafa" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="320" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#c0392b">Example: (p ∧ ¬q) → r</text>
    
    <!-- Truth table header -->
    <text x="25" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#2c3e50">p</text>
    <text x="55" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#2c3e50">q</text>
    <text x="85" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#2c3e50">r</text>
    <text x="120" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#2c3e50">¬q</text>
    <text x="160" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#2c3e50">p∧¬q</text>
    <text x="210" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#2c3e50">(p∧¬q)→r</text>
    
    <line x1="15" y1="345" x2="405" y2="345" stroke="#e74c3c" stroke-width="0.5"/>
    
    <!-- Truth table rows -->
    <g font-family="monospace" font-size="9" fill="#2c3e50">
      <!-- Row 1 -->
      <text x="25" y="360" text-anchor="middle" class="blink">T</text>
      <text x="55" y="360" text-anchor="middle" class="blink">T</text>
      <text x="85" y="360" text-anchor="middle" class="blink">T</text>
      <text x="120" y="360" text-anchor="middle" fill="#e74c3c">F</text>
      <text x="160" y="360" text-anchor="middle" fill="#e74c3c">F</text>
      <text x="210" y="360" text-anchor="middle" fill="#27ae60">T</text>
      
      <!-- Row 2 -->
      <text x="25" y="375" text-anchor="middle" class="blink">T</text>
      <text x="55" y="375" text-anchor="middle" class="blink">T</text>
      <text x="85" y="375" text-anchor="middle" class="blink">F</text>
      <text x="120" y="375" text-anchor="middle" fill="#e74c3c">F</text>
      <text x="160" y="375" text-anchor="middle" fill="#e74c3c">F</text>
      <text x="210" y="375" text-anchor="middle" fill="#27ae60">T</text>
      
      <!-- Row 3 -->
      <text x="25" y="390" text-anchor="middle" class="blink">T</text>
      <text x="55" y="390" text-anchor="middle" class="blink">F</text>
      <text x="85" y="390" text-anchor="middle" class="blink">T</text>
      <text x="120" y="390" text-anchor="middle" fill="#27ae60">T</text>
      <text x="160" y="390" text-anchor="middle" fill="#27ae60">T</text>
      <text x="210" y="390" text-anchor="middle" fill="#27ae60">T</text>
    </g>
    
    <!-- Continuation indicator -->
    <text x="385" y="382" text-anchor="middle" font-family="Arial" font-size="10" fill="#7f8c8d" font-style="italic">...5 more rows</text>
  </g>
  
  <!-- Decorative corner elements -->
  <g opacity="0.3">
    <circle cx="400" cy="20" r="8" fill="#3498db"/>
    <circle cx="20" cy="380" r="6" fill="#9b59b6"/>
    <circle cx="400" cy="380" r="7" fill="#27ae60"/>
  </g>
  
  <!-- Animated highlight on key concept -->
  <rect x="207" y="50" width="125" height="75" rx="8" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" class="pulse" opacity="0.7"/>
</svg>