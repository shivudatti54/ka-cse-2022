<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="set-theory-operations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="setAGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#ff8080;stop-opacity:0.5" />
    </linearGradient>
    <linearGradient id="setBGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#baffc9;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#80ff80;stop-opacity:0.5" />
    </linearGradient>
    <linearGradient id="intersectionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffba;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffff80;stop-opacity:0.6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-anim { animation: fadeIn 1s ease-out forwards; }
    .set-a-anim { animation: slideInLeft 0.8s ease-out 0.3s forwards; opacity: 0; }
    .set-b-anim { animation: slideInRight 0.8s ease-out 0.3s forwards; opacity: 0; }
    .intersection-anim { animation: fadeIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .label-anim { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .arrow-anim { animation: pulse 2s ease-in-out infinite; }
    .box-anim { animation: slideInLeft 0.6s ease-out 0.8s forwards; opacity: 0; }
    .region-label { font-family: Arial, sans-serif; font-size: 11px; fill: #333; }
    .title-text { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .subtitle-text { font-family: Arial, sans-serif; font-size: 14px; fill: #555; }
    .op-text { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #333; }
    .legend-text { font-family: Arial, sans-serif; font-size: 12px; fill: #444; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-anim title-text">Set Theory Operations</text>
  <text x="210" y="50" text-anchor="middle" class="label-anim subtitle-text">Venn Diagram - Two Sets</text>
  
  <!-- Universal Set U -->
  <rect x="20" y="70" width="380" height="310" rx="10" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="2" class="set-a-anim" filter="url(#shadow)"/>
  <text x="35" y="95" class="label-anim" style="font-family: Arial; font-size: 14px; font-weight: bold; fill: #2c3e50;">U (Universal Set)</text>
  
  <!-- Set A -->
  <ellipse cx="150" cy="220" rx="95" ry="100" fill="url(#setAGradient)" stroke="#e74c3c" stroke-width="2" class="set-a-anim"/>
  <text x="150" y="220" text-anchor="middle" class="label-anim" style="font-family: Arial; font-size: 18px; font-weight: bold; fill: #c0392b;">A</text>
  
  <!-- Set B -->
  <ellipse cx="270" cy="220" rx="95" ry="100" fill="url(#setBGradient)" stroke="#27ae60" stroke-width="2" class="set-b-anim"/>
  <text x="270" y="220" text-anchor="middle" class="label-anim" style="font-family: Arial; font-size: 18px; font-weight: bold; fill: #1e8449;">B</text>
  
  <!-- Intersection A ∩ B -->
  <ellipse cx="210" cy="220" rx="55" ry="70" fill="url(#intersectionGradient)" stroke="#f39c12" stroke-width="2" class="intersection-anim"/>
  <text x="210" y="220" text-anchor="middle" class="intersection-anim" style="font-family: Arial; font-size: 14px; font-weight: bold; fill: #d68910;">A ∩ B</text>
  
  <!-- Region Labels -->
  <text x="95" y="200" class="region-label label-anim">A - B</text>
  <text x="325" y="200" class="region-label label-anim">B - A</text>
  <text x="30" y="365" class="region-label label-anim" style="font-size:10px;">(A' = Complement of A)</text>
  
  <!-- Operation Labels with Arrows -->
  <!-- Union -->
  <g class="box-anim">
    <rect x="20" y="295" width="75" height="28" rx="4" fill="#3498db" opacity="0.8"/>
    <text x="57" y="314" text-anchor="middle" style="font-family: Arial; font-size: 12px; font-weight: bold; fill: white;">A ∪ B</text>
  </g>
  <text x="58" y="288" class="label-anim legend-text">Union</text>
  
  <!-- Intersection -->
  <g class="box-anim" style="animation-delay: 1s;">
    <rect x="110" y="295" width="75" height="28" rx="4" fill="#f39c12" opacity="0.8"/>
    <text x="147" y="314" text-anchor="middle" style="font-family: Arial; font-size: 12px; font-weight: bold; fill: white;">A ∩ B</text>
  </g>
  <text x="147" y="288" class="label-anim legend-text">Intersection</text>
  
  <!-- Difference -->
  <g class="box-anim" style="animation-delay: 1.2s;">
    <rect x="200" y="295" width="75" height="28" rx="4" fill="#e74c3c" opacity="0.8"/>
    <text x="237" y="314" text-anchor="middle" style="font-family: Arial; font-size: 12px; font-weight: bold; fill: white;">A - B</text>
  </g>
  <text x="237" y="288" class="label-anim legend-text">Difference</text>
  
  <!-- Symmetric Difference -->
  <g class="box-anim" style="animation-delay: 1.4s;">
    <rect x="290" y="295" width="95" height="28" rx="4" fill="#9b59b6" opacity="0.8"/>
    <text x="337" y="314" text-anchor="middle" style="font-family: Arial; font-size: 12px; font-weight: bold; fill: white;">A △ B</text>
  </g>
  <text x="337" y="288" class="label-anim legend-text">Sym. Diff</text>
  
  <!-- Decorative Elements -->
  <circle cx="80" cy="140" r="4" fill="#ffb3ba" class="arrow-anim" style="animation-delay: 0.5s;"/>
  <circle cx="80" cy="160" r="4" fill="#baffc9" class="arrow-anim" style="animation-delay: 0.7s;"/>
  <circle cx="80" cy="180" r="4" fill="#ffffba" class="arrow-anim" style="animation-delay: 0.9s;"/>
  
  <!-- Narration sections -->
  <g data-narration="The Universal Set U contains all possible elements under consideration, represented by the outer rectangle."></g>
  <g data-narration="Set A (left circle) contains elements belonging to set A only, plus those in the intersection."></g>
  <g data-narration="Set B (right circle) contains elements belonging to set B only, plus those in the intersection."></g>
  <g data-narration="A ∩ B (center) represents elements common to both sets - their intersection."></g>
  <g data-narration="A - B (left region only) contains elements in A but not in B."></g>
  <g data-narration="B - A (right region only) contains elements in B but not in A."></g>
</svg>