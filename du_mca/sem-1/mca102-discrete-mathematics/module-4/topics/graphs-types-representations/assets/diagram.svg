<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="graphs-types-representations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#eef2f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e8f5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#6b5b95" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #4a5568; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #718096; }
    .node-circle { fill: #7c9eb2; stroke: #5a7a94; stroke-width: 2; }
    .node-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #ffffff; }
    .edge-line { stroke: #7c9eb2; stroke-width: 2.5; stroke-linecap: round; }
    .matrix-bg { fill: #f8f9fa; stroke: #cbd5e0; stroke-width: 1; }
    .matrix-cell { fill: #e2e8f0; }
    .matrix-cell-1 { fill: #7c9eb2; }
    .matrix-text { font-family: 'Courier New', monospace; font-size: 11px; fill: #2d3748; text-anchor: middle; }
    .list-bg { fill: #f8f9fa; stroke: #cbd5e0; stroke-width: 1; rx: 4; }
    .list-line { stroke: #e2e8f0; stroke-width: 1; }
    .list-text { font-family: 'Courier New', monospace; font-size: 11px; fill: #2d3748; }
    .arrow { fill: #7c9eb2; }
    .box-bg { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; rx: 6; filter: url(#shadow); }
    .box-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #4a5568; }
    .box-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #718096; }
    .legend-box { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; rx: 4; }
    .legend-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #4a5568; }
    .animate-fade { animation: fadeIn 0.8s ease-out forwards; }
    .animate-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .animate-slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .animate-slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g data-narration="Main title displaying the topic: Graph Types and Representations">
    <rect x="0" y="0" width="420" height="36" fill="#7c9eb2" opacity="0.15"/>
    <text x="210" y="24" text-anchor="middle" class="title">Graph Types &amp; Representations</text>
  </g>
  
  <!-- Sample Graph Visualization -->
  <g transform="translate(25, 55)" data-narration="Visual representation of a sample undirected graph with 4 nodes (A, B, C, D) and edges showing connections">
    <rect x="-10" y="-10" width="130" height="115" class="box-bg" rx="6"/>
    <text x="55" y="5" text-anchor="middle" class="section-title">Sample Graph (Undirected)</text>
    
    <!-- Edges with animation -->
    <line x1="25" y1="45" x2="75" y2="45" class="edge-line" stroke-dasharray="100" stroke-dashoffset="100" style="animation: drawLine 0.5s ease-out 0.3s forwards;"/>
    <line x1="25" y1="45" x2="25" y2="80" class="edge-line" stroke-dasharray="100" stroke-dashoffset="100" style="animation: drawLine 0.5s ease-out 0.5s forwards;"/>
    <line x1="75" y1="45" x2="75" y2="80" class="edge-line" stroke-dasharray="100" stroke-dashoffset="100" style="animation: drawLine 0.5s ease-out 0.7s forwards;"/>
    <line x1="25" y1="80" x2="75" y2="80" class="edge-line" stroke-dasharray="100" stroke-dashoffset="100" style="animation: drawLine 0.5s ease-out 0.9s forwards;"/>
    
    <!-- Nodes -->
    <circle cx="25" cy="45" r="14" class="node-circle animate-pulse" style="animation-delay: 0.1s;"/>
    <text x="25" y="49" text-anchor="middle" class="node-text">A</text>
    
    <circle cx="75" cy="45" r="14" class="node-circle animate-pulse" style="animation-delay: 0.2s;"/>
    <text x="75" y="49" text-anchor="middle" class="node-text">B</text>
    
    <circle cx="25" cy="80" r="14" class="node-circle animate-pulse" style="animation-delay: 0.3s;"/>
    <text x="25" y="84" text-anchor="middle" class="node-text">C</text>
    
    <circle cx="75" cy="80" r="14" class="node-circle animate-pulse" style="animation-delay: 0.4s;"/>
    <text x="75" y="84" text-anchor="middle" class="node-text">D</text>
  </g>
  
  <!-- Adjacency Matrix -->
  <g transform="translate(145, 55)" data-narration="Adjacency Matrix representation - a 4x4 grid showing 1 for connected vertices and 0 for non-connected">
    <rect x="0" y="0" width="130" height="115" class="box-bg" rx="6"/>
    <text x="65" y="5" text-anchor="middle" class="section-title">Adjacency Matrix</text>
    
    <!-- Matrix Header -->
    <text x="25" y="25" class="matrix-text" font-size="10">A</text>
    <text x="45" y="25" class="matrix-text" font-size="10">B</text>
    <text x="65" y="25" class="matrix-text" font-size="10">C</text>
    <text x="85" y="25" class="matrix-text" font-size="10">D</text>
    
    <text x="10" y="42" class="matrix-text" font-size="10">A</text>
    <rect x="20" y="32" width="14" height="14" class="matrix-cell-1"/>
    <rect x="36" y="32" width="14" height="14" class="matrix-cell-1"/>
    <rect x="52" y="32" width="14" height="14" class="matrix-cell-1"/>
    <rect x="68" y="32" width="14" height="14" class="matrix-cell"/>
    
    <text x="10" y="58" class="matrix-text" font-size="10">B</text>
    <rect x="20" y="48" width="14" height="14" class="matrix-cell-1"/>
    <rect x="36" y="48" width="14" height="14" class="matrix-cell"/>
    <rect x="52" y="48" width="14" height="14" class="matrix-cell-1"/>
    <rect x="68" y="48" width="14" height="14" class="matrix-cell"/>
    
    <text x="10" y="74" class="matrix-text" font-size="10">C</text>
    <rect x="20" y="64" width="14" height="14" class="matrix-cell-1"/>
    <rect x="36" y="64" width="14" height="14" class="matrix-cell-1"/>
    <rect x="52" y="64" width="14" height="14" class="matrix-cell"/>
    <rect x="68" y="64" width="14" height="14" class="matrix-cell-1"/>
    
    <text x="10" y="90" class="matrix-text" font-size="10">D</text>
    <rect x="20" y="80" width="14" height="14" class="matrix-cell"/>
    <rect x="36" y="80" width="14" height="14" class="matrix-cell"/>
    <rect x="52" y="80" width="14" height="14" class="matrix-cell-1"/>
    <rect x="68" y="80" width="14" height="14" class="matrix-cell"/>
    
    <text x="65" y="105" text-anchor="middle" class="detail">Space: O(V²)</text>
  </g>
  
  <!-- Adjacency List -->
  <g transform="translate(285, 55)" data-narration="Adjacency List representation - showing neighbors for each vertex as linked lists">
    <rect x="0" y="0" width="115" height="115" class="box-bg" rx="6"/>
    <text x="57" y="5" text-anchor="middle" class="section-title">Adjacency List</text>
    
    <text x="8" y="22" class="list-text" font-weight="bold">A:</text>
    <text x="22" y="22" class="list-text">[B]→[C]→null</text>
    <line x1="5" y1="28" x2="105" y2="28" class="list-line"/>
    
    <text x="8" y="42" class="list-text" font-weight="bold">B:</text>
    <text x="22" y="42" class="list-text">[A]→[C]→null</text>
    <line x1="5" y1="48" x2="105" y2="48" class="list-line"/>
    
    <text x="8" y="62" class="list-text" font-weight="bold">C:</text>
    <text x="22" y="62" class="list-text">[A]→[B]→[D]→null</text>
    <line x1="5" y1="68" x2="105" y2="68" class="list-line"/>
    
    <text x="8" y="82" class="list-text" font-weight="bold">D:</text>
    <text x="22" y="82" class="list-text">[C]→null</text>
    
    <text x="57" y="105" text-anchor="middle" class="detail">Space: O(V+E)</text>
  </g>
  
  <!-- Arrow between matrix and list -->
  <g transform="translate(275, 100)">
    <polygon points="0,5 8,0 8,10" class="arrow"/>
  </g>
  
  <!-- Comparison Legend -->
  <g transform="translate(25, 185)" data-narration="Comparison table showing when to use each representation type">
    <rect x="0" y="0" width="180" height="55" class="legend-box"/>
    <text x="90" y="15" text-anchor="middle" class="legend-text" font-weight="bold">Matrix vs List Comparison</text>
    <text x="10" y="32" class="legend-text">Matrix: Dense graphs, O(1) edge query</text>
    <text x="10" y="46" class="legend-text">List: Sparse graphs, O(V+E) space</text>
  </g>
  
  <!-- Graph Types Box -->
  <g transform="translate(215, 185)" data-narration="Key graph types: Directed vs Undirected, Weighted vs Unweighted, Cyclic vs Acyclic">
    <rect x="0" y="0" width="185" height="55" class="legend-box"/>
    <text x="92" y="15" text-anchor="middle" class="legend-text" font-weight="bold">Graph Types</text>
    <text x="10" y="32" class="legend-text">• Directed / Undirected</text>
    <text x="10" y="46" class="legend-text">• Weighted / Unweighted</text>
  </g>
  
  <!-- Representation Methods Box -->
  <g transform="translate(25, 250)" data-narration="Four main representation methods: Adjacency Matrix, Adjacency List, Edge List, Incidence Matrix">
    <rect x="0" y="0" width="180" height="55" class="legend-box"/>
    <text x="90" y="15" text-anchor="middle" class="legend-text" font-weight="bold">Representation Methods</text>
    <text x="10" y="32" class="legend-text">• Adjacency Matrix (V×V)</text>
    <text x="10" y="46" class="legend-text">• Adjacency List (V + E)</text>
  </g>
  
  <!-- Complexity Box -->
  <g transform="translate(215, 250)" data-narration="Time complexity considerations for different operations">
    <rect x="0" y="0" width="185" height="55" class="legend-box"/>
    <text x="92" y="15" text-anchor="middle" class="legend-text" font-weight="bold">Complexity</text>
    <text x="10" y="32" class="legend-text">Edge lookup: Matrix O(1), List O(deg)</text>
    <text x="10" y="46" class="legend-text">Space: Matrix O(V²), List O(V+E)</text>
  </g>
  
  <!-- Special Types -->
  <g transform="translate(25, 315)" data-narration="Special graph types: Trees (acyclic connected), Complete (all vertices connected), Bipartite (two disjoint sets)">
    <rect x="0" y="0" width="375" height="50" class="legend-box"/>
    <text x="187" y="14" text-anchor="middle" class="legend-text" font-weight="bold">Special Types: Tree • Complete • Bipartite</text>
    <text x="10" y="32" class="legend-text">Tree: Acyclic connected graph | Complete: All vertex pairs connected | Bipartite: Vertices in two disjoint sets</text>
  </g>
  
  <!-- Industry Applications -->
  <g transform="translate(25, 375)" data-narration="Real-world applications: PageRank (Google), Route optimization (Uber), Social networks">
    <rect x="0" y="0" width="375" height="20" fill="#7c9eb2" opacity="0.1" rx="4"/>
    <text x="187" y="14" text-anchor="middle" class="detail">Industry: Google (PageRank) • Uber (Routing) • Social Networks</text>
  </g>
  
  <!-- Animation trigger groups - invisible but trigger animations -->
  <g style="opacity: 0;">
    <animate attributeName="opacity" from="0" to="1" begin="0.1s" dur="0.1s" fill="freeze"/>
  </g>
</svg>