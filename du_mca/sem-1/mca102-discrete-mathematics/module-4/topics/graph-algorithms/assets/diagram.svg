<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="graph-algorithms">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e0e8f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e8f8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    @keyframes queueSlide {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 4; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideInUp 0.6s ease-out 0.4s both; }
    .section-3 { animation: fadeIn 0.6s ease-out 0.6s both; }
    .concept-box { animation: slideInUp 0.5s ease-out both; }
    .node { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .queue-item { animation: queueSlide 0.4s ease-out both; }
    .arrow-line { animation: arrowPulse 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#2c3e50" class="title">Graph Algorithms</text>
  <line x1="100" y1="42" x2="320" y2="42" stroke="#5d7ea8" stroke-width="2" class="title" style="animation-delay: 0.3s"/>
  
  <!-- BFS Graph Visualization Section -->
  <g class="section-1">
    <text x="30" y="68" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#34495e">BFS Traversal</text>
    
    <!-- Graph nodes and edges -->
    <g filter="url(#shadow)">
      <!-- Edges -->
      <line x1="90" y1="130" x2="150" y2="100" stroke="#7f8c8d" stroke-width="2" class="arrow-line"/>
      <line x1="90" y1="130" x2="90" y2="190" stroke="#7f8c8d" stroke-width="2" class="arrow-line"/>
      <line x1="150" y1="100" x2="210" y2="130" stroke="#7f8c8d" stroke-width="2" class="arrow-line"/>
      <line x1="150" y1="100" x2="210" y2="70" stroke="#7f8c8d" stroke-width="2" class="arrow-line"/>
      <line x1="90" y1="190" x2="150" y2="190" stroke="#7f8c8d" stroke-width="2" class="arrow-line"/>
      <line x1="210" y1="130" x2="210" y2="190" stroke="#7f8c8d" stroke-width="2" class="arrow-line"/>
      
      <!-- Nodes -->
      <circle cx="90" cy="130" r="18" fill="#3498db" class="node" style="animation-delay: 0.5s"/>
      <text x="90" y="135" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">0</text>
      
      <circle cx="150" cy="100" r="16" fill="#9b59b6" class="node" style="animation-delay: 0.7s"/>
      <text x="150" y="105" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">1</text>
      
      <circle cx="90" cy="190" r="16" fill="#9b59b6" class="node" style="animation-delay: 0.8s"/>
      <text x="90" y="195" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">2</text>
      
      <circle cx="210" cy="130" r="16" fill="#2ecc71" class="node" style="animation-delay: 1s"/>
      <text x="210" y="135" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">3</text>
      
      <circle cx="210" cy="70" r="14" fill="#e74c3c" class="node" style="animation-delay: 1.1s"/>
      <text x="210" y="74" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">4</text>
      
      <circle cx="150" cy="190" r="14" fill="#e74c3c" class="node" style="animation-delay: 1.2s"/>
      <text x="150" y="194" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">5</text>
      
      <circle cx="210" cy="190" r="14" fill="#e74c3c" class="node" style="animation-delay: 1.3s"/>
      <text x="210" y="194" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">6</text>
    </g>
    
    <!-- Visited markers -->
    <rect x="245" y="95" width="55" height="18" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <text x="250" y="108" font-family="Arial" font-size="9" fill="#7f8c8d">Visited:</text>
    <circle cx="285" cy="104" r="5" fill="#3498db"/>
    <circle cx="295" cy="104" r="5" fill="#9b59b6"/>
  </g>
  
  <!-- Queue Visualization -->
  <g class="section-2">
    <text x="280" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#34495e">Queue</text>
    <rect x="270" y="148" width="80" height="90" rx="6" fill="white" stroke="#bdc3c7" stroke-width="1.5" filter="url(#shadow)"/>
    
    <!-- Queue items -->
    <g class="queue-item" style="animation-delay: 0.8s">
      <rect x="278" y="155" width="64" height="18" rx="3" fill="#3498db"/>
      <text x="310" y="167" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">0</text>
    </g>
    <g class="queue-item" style="animation-delay: 1s">
      <rect x="278" y="177" width="64" height="18" rx="3" fill="#9b59b6"/>
      <text x="310" y="189" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">1, 2</text>
    </g>
    <g class="queue-item" style="animation-delay: 1.2s">
      <rect x="278" y="199" width="64" height="18" rx="3" fill="#2ecc71"/>
      <text x="310" y="211" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">3,4,5,6</text>
    </g>
    
    <!-- Queue arrow -->
    <path d="M265 180 L275 180 L270 175 Z" fill="#7f8c8d"/>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="section-3" data-narration="Key Graph Algorithms Overview">
    <text x="30" y="260" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#34495e">Key Algorithms</text>
    
    <!-- Concept boxes -->
    <g class="concept-box" style="animation-delay: 0.2s">
      <rect x="30" y="270" width="110" height="38" rx="5" fill="#e8f6f3" stroke="#1abc9c" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="35" y="284" font-family="Arial" font-size="11" font-weight="bold" fill="#16a085">BFS</text>
      <text x="35" y="298" font-family="Arial" font-size="9" fill="#7f8c8d">O(V+E) • Queue</text>
    </g>
    
    <g class="concept-box" style="animation-delay: 0.35s">
      <rect x="145" y="270" width="110" height="38" rx="5" fill="#fef9e7" stroke="#f1c40f" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="150" y="284" font-family="Arial" font-size="11" font-weight="bold" fill="#d68910">DFS</text>
      <text x="150" y="298" font-family="Arial" font-size="9" fill="#7f8c8d">O(V+E) • Stack</text>
    </g>
    
    <g class="concept-box" style="animation-delay: 0.5s">
      <rect x="260" y="270" width="110" height="38" rx="5" fill="#ebf5fb" stroke="#3498db" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="265" y="284" font-family="Arial" font-size="11" font-weight="bold" fill="#2980b9">Dijkstra</text>
      <text x="265" y="298" font-family="Arial" font-size="9" fill="#7f8c8d">O(E log V) • Greedy</text>
    </g>
    
    <g class="concept-box" style="animation-delay: 0.65s">
      <rect x="30" y="315" width="110" height="38" rx="5" fill="#f5eef8" stroke="#9b59b6" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="35" y="329" font-family="Arial" font-size="11" font-weight="bold" fill="#8e44ad">Kruskal</text>
      <text x="35" y="343" font-family="Arial" font-size="9" fill="#7f8c8d">O(E log E) • MST</text>
    </g>
    
    <g class="concept-box" style="animation-delay: 0.8s">
      <rect x="145" y="315" width="110" height="38" rx="5" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="150" y="329" font-family="Arial" font-size="11" font-weight="bold" fill="#1e8449">Prim</text>
      <text x="150" y="343" font-family="Arial" font-size="9" fill="#7f8c8d">O(E log V) • MST</text>
    </g>
    
    <g class="concept-box" style="animation-delay: 0.95s">
      <rect x="260" y="315" width="110" height="38" rx="5" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="265" y="329" font-family="Arial" font-size="11" font-weight="bold" fill="#c0392b">Topo Sort</text>
      <text x="265" y="343" font-family="Arial" font-size="9" fill="#7f8c8d">DAG Only • Kahn's</text>
    </g>
  </g>
  
  <!-- Applications Section -->
  <g data-narration="Real-world applications of graph algorithms">
    <text x="30" y="370" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#34495e">Applications:</text>
    <text x="95" y="370" font-family="Arial" font-size="10" fill="#7f8c8d">GPS • Social Networks • Task Scheduling • Network Routing</text>
  </g>
  
  <!-- Time Complexity Arrow -->
  <g data-narration="Traversal order visualization">
    <path d="M85 225 Q85 245 85 255" stroke="#95a5a6" stroke-width="2" fill="none" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#95a5a6"/>
    </marker>
  </defs>
</svg>