<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="trees-spanning-trees">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c8e6c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#795548;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5d4037;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c" />
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .draw { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1s ease-out forwards; }
    .title { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #1b5e20; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .small-label { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .concept-box { rx: 8; ry: 8; stroke: #4caf50; stroke-width: 2; }
    .vertex { fill: url(#nodeGrad); stroke: #1b5e20; stroke-width: 2; }
    .edge { stroke: url(#edgeGrad); stroke-width: 3; fill: none; }
    .mst-edge { stroke: #e53935; stroke-width: 4; fill: none; }
    .weight { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #fff; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGrad)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Trees &amp; Spanning Trees</text>
  
  <!-- Section 1: Basic Tree Definition -->
  <g class="slide-in" style="animation-delay: 0.3s" data-narration="A tree is an acyclic connected graph with N vertices and N-1 edges">
    <rect x="10" y="50" width="120" height="60" fill="#fff" class="concept-box" opacity="0.9" />
    <text x="70" y="68" text-anchor="middle" class="label" font-weight="bold">Tree Properties</text>
    <text x="70" y="85" text-anchor="middle" class="small-label">• N vertices, N-1 edges</text>
    <text x="70" y="100" text-anchor="middle" class="small-label">• Acyclic &amp; Connected</text>
  </g>
  
  <!-- Simple Tree Diagram -->
  <g transform="translate(20, 130)" class="fade-in" style="animation-delay: 0.5s">
    <line x1="30" y1="20" x2="70" y2="50" class="edge" />
    <line x1="30" y1="20" x2="10" y2="50" class="edge" />
    <line x1="70" y1="50" x2="90" y2="20" class="edge" />
    <line x1="70" y1="50" x2="70" y2="80" class="edge" />
    <circle cx="30" cy="20" r="12" class="vertex" />
    <circle cx="10" cy="50" r="12" class="vertex" />
    <circle cx="70" cy="50" r="12" class="vertex" />
    <circle cx="90" cy="20" r="12" class="vertex" />
    <circle cx="70" cy="80" r="12" class="vertex" />
    <text x="30" y="24" text-anchor="middle" class="weight">A</text>
    <text x="10" y="54" text-anchor="middle" class="weight">B</text>
    <text x="70" y="54" text-anchor="middle" class="weight">C</text>
    <text x="90" y="24" text-anchor="middle" class="weight">D</text>
    <text x="70" y="84" text-anchor="middle" class="weight">E</text>
  </g>
  
  <!-- Arrow -->
  <path d="M150 180 L180 180" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)" class="fade-in" style="animation-delay: 0.7s" />
  
  <!-- Section 2: Spanning Tree -->
  <g class="slide-in" style="animation-delay: 0.8s" data-narration="A spanning tree includes all vertices with minimum edges (N-1)">
    <rect x="190" y="50" width="130" height="60" fill="#fff" class="concept-box" opacity="0.9" />
    <text x="255" y="68" text-anchor="middle" class="label" font-weight="bold">Spanning Tree</text>
    <text x="255" y="85" text-anchor="middle" class="small-label">• All vertices included</text>
    <text x="255" y="100" text-anchor="middle" class="small-label">• Exactly N-1 edges</text>
  </g>
  
  <!-- Graph with multiple edges -->
  <g transform="translate(200, 130)" class="fade-in" style="animation-delay: 1s">
    <line x1="30" y1="20" x2="70" y2="50" class="edge" />
    <line x1="30" y1="20" x2="10" y2="50" class="edge" />
    <line x1="70" y1="50" x2="90" y2="20" class="edge" />
    <line x1="70" y1="50" x2="70" y2="80" class="edge" />
    <line x1="30" y1="20" x2="70" y2="80" class="edge" stroke-dasharray="4" opacity="0.4" />
    <circle cx="30" cy="20" r="12" class="vertex" />
    <circle cx="10" cy="50" r="12" class="vertex" />
    <circle cx="70" cy="50" r="12" class="vertex" />
    <circle cx="90" cy="20" r="12" class="vertex" />
    <circle cx="70" cy="80" r="12" class="vertex" />
    <text x="30" y="24" text-anchor="middle" class="weight">A</text>
    <text x="10" y="54" text-anchor="middle" class="weight">B</text>
    <text x="70" y="54" text-anchor="middle" class="weight">C</text>
    <text x="90" y="24" text-anchor="middle" class="weight">D</text>
    <text x="70" y="84" text-anchor="middle" class="weight">E</text>
  </g>
  
  <!-- Prim's Algorithm Section -->
  <g class="slide-in" style="animation-delay: 1.2s" data-narration="Prim's Algorithm grows MST by adding cheapest edge connecting tree to new vertex">
    <rect x="10" y="230" width="400" height="150" fill="#fff" stroke="#4caf50" stroke-width="3" rx="10" opacity="0.95" />
    <text x="210" y="255" text-anchor="middle" class="label" font-weight="bold" font-size="16">Prim's Algorithm: Step-by-Step MST Construction</text>
    
    <!-- Step 1 -->
    <g transform="translate(30, 270)">
      <circle cx="15" cy="15" r="12" fill="#e53935" class="pulse" />
      <text x="15" y="19" text-anchor="middle" class="weight">A</text>
      <text x="45" y="19" class="small-label">Start: Pick vertex A</text>
    </g>
    
    <!-- Arrow -->
    <path d="M90 285 L120 285" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)" />
    
    <!-- Step 2: Add edges from A -->
    <g transform="translate(130, 265)" class="fade-in" style="animation-delay: 1.5s">
      <line x1="15" y1="15" x2="55" y2="15" class="edge" />
      <line x1="15" y1="15" x2="15" y2="45" class="edge" />
      <circle cx="15" cy="15" r="10" fill="#e53935" />
      <text x="15" y="19" text-anchor="middle" class="weight">A</text>
      <circle cx="55" cy="15" r="10" class="vertex" />
      <text x="55" y="19" text-anchor="middle" class="weight">B</text>
      <circle cx="15" cy="45" r="10" class="vertex" />
      <text x="15" y="49" text-anchor="middle" class="weight">C</text>
      <text x="85" y="20" class="small-label">Weights: 4, 3</text>
    </g>
    
    <!-- Arrow -->
    <path d="M210 285 L240 285" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)" />
    
    <!-- Step 3: Add minimum weight edge -->
    <g transform="translate(250, 265)" class="fade-in" style="animation-delay: 1.8s">
      <line x1="15" y1="15" x2="55" y2="15" class="mst-edge" />
      <line x1="15" y1="15" x2="15" y2="45" class="mst-edge" />
      <circle cx="15" cy="15" r="10" fill="#e53935" />
      <text x="15" y="19" text-anchor="middle" class="weight">A</text>
      <circle cx="55" cy="15" r="10" fill="#e53935" />
      <text x="55" y="19" text-anchor="middle" class="weight">B</text>
      <circle cx="15" cy="45" r="10" fill="#e53935" />
      <text x="15" y="49" text-anchor="middle" class="weight">C</text>
      <text x="85" y="20" class="small-label">Min: C(3)</text>
    </g>
    
    <!-- Legend -->
    <g transform="translate(30, 350)">
      <rect x="0" y="0" width="18" height="10" fill="#e53935" rx="2" />
      <text x="22" y="9" class="small-label">MST Edge</text>
      <rect x="70" y="0" width="18" height="10" fill="#795548" rx="2" />
      <text x="92" y="9" class="small-label">Candidate</text>
    </g>
    
    <!-- Priority Queue hint -->
    <g transform="translate(280, 340)">
      <text x="0" y="0" class="small-label" font-style="italic">Priority Queue:</text>
      <text x="0" y="14" class="small-label">Sorted by edge weight</text>
    </g>
  </g>
  
  <!-- Key Properties Box -->
  <g transform="translate(340, 50)" class="fade-in" style="animation-delay: 1.3s" data-narration="Cut property: lightest edge across any partition belongs to MST">
    <rect x="0" y="0" width="75" height="70" fill="#fff9c4" stroke="#f9a825" stroke-width="2" rx="6" opacity="0.9" />
    <text x="37" y="18" text-anchor="middle" class="small-label" font-weight="bold">Key Property</text>
    <text x="37" y="35" text-anchor="middle" class="small-label">Cut Property:</text>
    <text x="37" y="50" text-anchor="middle" class="small-label" font-size="10">Lightest edge</text>
    <text x="37" y="62" text-anchor="middle" class="small-label" font-size="10">across cut ∈ MST</text>
  </g>
  
  <!-- Cycle-Cut duality note -->
  <g transform="translate(340, 130)" class="fade-in" style="animation-delay: 1.5s">
    <rect x="0" y="0" width="75" height="55" fill="#e1bee7" stroke="#8e24aa" stroke-width="2" rx="6" opacity="0.9" />
    <text x="37" y="18" text-anchor="middle" class="small-label" font-weight="bold">Cycle-Cut</text>
    <text x="37" y="35" text-anchor="middle" class="small-label" font-size="10">Heaviest in cycle</text>
    <text x="37" y="47" text-anchor="middle" class="small-label" font-size="10">NOT in MST</text>
  </g>
  
  <!-- Algorithm complexity box -->
  <g transform="translate(340, 195)" class="fade-in" style="animation-delay: 1.7s" data-narration="Kruskal's O(E log E) vs Prim's O(E + V log V)">
    <rect x="0" y="0" width="75" height="50" fill="#bbdefb" stroke="#1565c0" stroke-width="2" rx="6" opacity="0.9" />
    <text x="37" y="15" text-anchor="middle" class="small-label" font-weight="bold">Complexity</text>
    <text x="37" y="30" text-anchor="middle" class="small-label" font-size="9">Kruskal: O(E logE)</text>
    <text x="37" y="42" text-anchor="middle" class="small-label" font-size="9">Prim: O(E+V logV)</text>
  </g>
</svg>