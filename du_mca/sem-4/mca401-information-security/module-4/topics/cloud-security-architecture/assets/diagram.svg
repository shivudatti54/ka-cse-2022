<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="cloud-security-architecture">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#e0f2fe"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
    <linearGradient id="confidentialityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="integrityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="availabilityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: slideIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-3 { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .section-4 { animation: slideIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .section-5 { animation: slideIn 0.6s ease-out 1s forwards; opacity: 0; }
    .section-6 { animation: slideIn 0.6s ease-out 1.2s forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .float { animation: float 3s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e3a5f" class="title">Cloud Security Architecture</text>
  
  <!-- CIA Triad Central Diagram -->
  <g transform="translate(210, 130)" class="float">
    <!-- Confidentiality Circle -->
    <circle cx="-45" cy="0" r="50" fill="url(#confidentialityGrad)" opacity="0.85" filter="url(#shadow)"/>
    <text x="-45" y="-5" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">Confidentiality</text>
    <text x="-45" y="12" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Encryption</text>
    
    <!-- Integrity Circle -->
    <circle cx="45" cy="0" r="50" fill="url(#integrityGrad)" opacity="0.85" filter="url(#shadow)"/>
    <text x="45" y="-5" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">Integrity</text>
    <text x="45" y="12" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Hash Verify</text>
    
    <!-- Availability Circle -->
    <circle cx="0" cy="50" r="50" fill="url(#availabilityGrad)" opacity="0.85" filter="url(#shadow)"/>
    <text x="0" y="45" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">Availability</text>
    <text x="0" y="62" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">DDoS Protection</text>
    
    <!-- Center Cloud Icon -->
    <circle cx="0" cy="0" r="28" fill="#f8fafc" filter="url(#shadow)"/>
    <path d="M-12,-8 Q-8,-18 0,-18 Q8,-18 12,-8 Q18,-8 18,2 Q18,10 8,14 L-8,14 Q-18,10 -18,2 Q-18,-8 -12,-8" fill="#94a3b8" class="pulse"/>
  </g>
  
  <!-- Key Concepts Boxes -->
  <!-- Shared Responsibility -->
  <g transform="translate(15, 220)" class="section-1">
    <rect width="120" height="55" rx="6" fill="url(#boxGrad)" filter="url(#shadow)"/>
    <rect width="120" height="55" rx="6" fill="none" stroke="#6366f1" stroke-width="1.5"/>
    <text x="60" y="16" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#4338ca">Shared Responsibility</text>
    <text x="60" y="30" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">Provider: Infrastructure</text>
    <text x="60" y="42" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">Customer: Data, Access</text>
  </g>
  
  <!-- IAM -->
  <g transform="translate(150, 220)" class="section-2">
    <rect width="120" height="55" rx="6" fill="url(#boxGrad)" filter="url(#shadow)"/>
    <rect width="120" height="55" rx="6" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="60" y="16" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7c3aed">IAM</text>
    <text x="60" y="30" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">RBAC + MFA + PoLP</text>
    <text x="60" y="42" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">Least Privilege Access</text>
  </g>
  
  <!-- Encryption -->
  <g transform="translate(285, 220)" class="section-3">
    <rect width="120" height="55" rx="6" fill="url(#boxGrad)" filter="url(#shadow)"/>
    <rect width="120" height="55" rx="6" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="60" y="16" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0891b2">Data Encryption</text>
    <text x="60" y="30" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">AES-256 at Rest</text>
    <text x="60" y="42" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">TLS 1.3 in Transit</text>
  </g>
  
  <!-- Network Security -->
  <g transform="translate(15, 285)" class="section-4">
    <rect width="120" height="55" rx="6" fill="url(#boxGrad)" filter="url(#shadow)"/>
    <rect width="120" height="55" rx="6" fill="none" stroke="#f97316" stroke-width="1.5"/>
    <text x="60" y="16" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ea580c">Network Security</text>
    <text x="60" y="30" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">VPC + WAF + Zero Trust</text>
    <text x="60" y="42" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">Security Groups</text>
  </g>
  
  <!-- Monitoring -->
  <g transform="translate(150, 285)" class="section-5">
    <rect width="120" height="55" rx="6" fill="url(#boxGrad)" filter="url(#shadow)"/>
    <rect width="120" height="55" rx="6" fill="none" stroke="#10b981" stroke-width="1.5"/>
    <text x="60" y="16" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#059669">Security Monitoring</text>
    <text x="60" y="30" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">CloudTrail + SIEM</text>
    <text x="60" y="42" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">GuardDuty + UEBA</text>
  </g>
  
  <!-- Stats -->
  <g transform="translate(285, 285)" class="section-6">
    <rect width="120" height="55" rx="6" fill="url(#boxGrad)" filter="url(#shadow)"/>
    <rect width="120" height="55" rx="6" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    <text x="60" y="16" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#dc2626">Key Statistics</text>
    <text x="60" y="30" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">94% use cloud services</text>
    <text x="60" y="42" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">45% had breaches</text>
  </g>
  
  <!-- Arrows/Connections -->
  <g stroke="#94a3b8" stroke-width="1.5" fill="none" opacity="0.6">
    <!-- Connection from CIA to boxes -->
    <path d="M210,185 Q210,200 75,205" marker-end="url(#arrowhead)"/>
    <path d="M210,185 Q210,200 225,205" marker-end="url(#arrowhead)"/>
    <path d="M210,185 Q210,200 345,205" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Lock Icon for confidentiality -->
  <g transform="translate(25, 100)" class="pulse">
    <rect x="0" y="6" width="18" height="14" rx="2" fill="#0ea5e9"/>
    <path d="M4,6 L4,3 Q4,0 9,0 Q14,0 14,3 L14,6" fill="none" stroke="#0ea5e9" stroke-width="2.5"/>
  </g>
  
  <!-- Checkmark Shield for integrity -->
  <g transform="translate(365, 95)" class="pulse">
    <path d="M10,0 L20,5 L20,14 Q20,20 10,20 Q0,20 0,14 L0,5 Z" fill="#22c55e"/>
    <path d="M6,10 L9,13 L14,7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Uptime graph for availability -->
  <g transform="translate(175, 80)" class="pulse">
    <rect x="0" y="0" width="20" height="18" rx="3" fill="#f59e0b"/>
    <polyline points="2,14 6,10 10,12 14,6 18,8" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Data narration elements (invisible interactive zones) -->
  <rect x="15" y="220" width="120" height="55" fill="transparent" data-narration="Shared Responsibility: Cloud provider secures infrastructure while customers manage data and access control. In IaaS, customer bears 70% of security responsibility."/>
  <rect x="150" y="220" width="120" height="55" fill="transparent" data-narration="Identity and Access Management: Implements RBAC, Multi-Factor Authentication, and Principle of Least Privilege to control who can access cloud resources."/>
  <rect x="285" y="220" width="120" height="55" fill="transparent" data-narration="Data Encryption: Protects data using AES-256 for data at rest and TLS 1.3 for data in transit. Key management handled by services like AWS KMS."/>
  <rect x="15" y="285" width="120" height="55" fill="transparent" data-narration="Network Security: Includes VPC isolation, Web Application Firewalls, Security Groups, and Zero Trust Architecture for comprehensive protection."/>
  <rect x="150" y="285" width="120" height="55" fill="transparent" data-narration="Security Monitoring: Uses CloudTrail for API logging, SIEM integration, and AI-powered threat detection like GuardDuty and UEBA."/>
  <rect x="285" y="285" width="120" height="55" fill="transparent" data-narration="Statistics: 94% of enterprises use cloud services (Flexera 2023), but 45% experienced cloud data breaches (Thales 2023), highlighting need for proper architecture."/>
</svg>