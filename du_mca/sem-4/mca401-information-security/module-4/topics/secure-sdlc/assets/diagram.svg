<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="secure-sdlc" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357585;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5ba3a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d8a87;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7abf7a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9f5a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d9903a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a889c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6aa8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .box1 { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .box2 { animation: slideInRight 0.8s ease-out 0.4s both; }
    .box3 { animation: slideInLeft 0.8s ease-out 0.6s both; }
    .box4 { animation: slideInRight 0.8s ease-out 0.8s both; }
    .box5 { animation: slideInLeft 0.8s ease-out 1.0s both; }
    .connector { animation: drawLine 1.5s ease-out 1.2s both; stroke-dasharray: 100; stroke-dashoffset: 100; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .icon { animation: fadeIn 0.5s ease-out 1.5s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c5f6e" class="title">Secure SDLC</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5a8a9a">Security at Every Phase</text>
  
  <!-- Phase Boxes -->
  <!-- Phase 1: Requirements -->
  <g class="box1" data-narration="Security Requirements Analysis - Identify CIA requirements and create security user stories">
    <rect x="20" y="70" width="80" height="55" rx="6" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="60" y="88" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Requirements</text>
    <text x="60" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#e8f4f8">CIA Triad</text>
    <text x="60" y="117" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f4f8">MFA Stories</text>
  </g>
  
  <!-- Phase 2: Design -->
  <g class="box2" data-narration="Threat Modeling - Use STRIDE methodology and DFD analysis">
    <rect x="160" y="70" width="80" height="55" rx="6" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="200" y="88" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Design</text>
    <text x="200" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#e8f4f8">STRIDE</text>
    <text x="200" y="117" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f4f8">Threat Model</text>
  </g>
  
  <!-- Phase 3: Coding -->
  <g class="box3" data-narration="Secure Coding - OWASP Top 10 mitigation and SAST testing">
    <rect x="300" y="70" width="100" height="55" rx="6" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="350" y="88" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Secure Coding</text>
    <text x="350" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#e8f4f8">OWASP Top 10</text>
    <text x="350" y="117" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f4f8">SAST/SonarQube</text>
  </g>
  
  <!-- Phase 4: Testing -->
  <g class="box4" data-narration="Security Testing - DAST, Penetration Testing, and Fuzz Testing">
    <rect x="20" y="160" width="90" height="55" rx="6" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="65" y="178" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Testing</text>
    <text x="65" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff5e6">DAST/ZAP</text>
    <text x="65" y="207" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff5e6">Penetration</text>
  </g>
  
  <!-- Phase 5: Deployment -->
  <g class="box5" data-narration="Secure Deployment - IaC security, Container scanning, RASP">
    <rect x="150" y="160" width="100" height="55" rx="6" fill="url(#boxGradient5)" filter="url(#shadow)"/>
    <text x="200" y="178" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Deployment</text>
    <text x="200" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#f5f0fa">IaC/Trivy</text>
    <text x="200" y="207" text-anchor="middle" font-family="Arial" font-size="8" fill="#f5f0fa">RASP</text>
  </g>
  
  <!-- Arrows/Connectors -->
  <g class="connector" fill="none" stroke="#5a9f8a" stroke-width="2">
    <path d="M 100 97 L 155 97" marker-end="url(#arrowhead)"/>
    <path d="M 240 97 L 295 97" marker-end="url(#arrowhead)"/>
    <path d="M 110 155 L 110 140" marker-end="url(#arrowhead)"/>
    <path d="M 110 215 L 110 225"/>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a9f8a"/>
    </marker>
  </defs>
  
  <!-- Cycle Arrow -->
  <g class="pulse" data-narration="Continuous security loop - Maintenance and feedback">
    <path d="M 370 130 Q 400 130 400 160 Q 400 190 370 190" fill="none" stroke="#a889c7" stroke-width="3" stroke-linecap="round"/>
    <polygon points="365,180 380,185 370,200" fill="#a889c7" class="pulse"/>
  </g>
  
  <!-- Key Benefits Box -->
  <g data-narration="Benefits - 40% vulnerability reduction when adopted early">
    <rect x="20" y="240" width="180" height="60" rx="6" fill="white" stroke="#5ba3a0" stroke-width="2"/>
    <text x="110" y="258" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c5f6e">Key Benefits</text>
    <text x="110" y="275" text-anchor="middle" font-family="Arial" font-size="10" fill="#5a8a9a">40% Vulnerability</text>
    <text x="110" y="288" text-anchor="middle" font-family="Arial" font-size="10" fill="#5a8a9a">Reduction (IBM 2023)</text>
  </g>
  
  <!-- Standards Box -->
  <g data-narration="Standards - Aligns with ISO 27001, NIST SP 800-64">
    <rect x="220" y="240" width="180" height="60" rx="6" fill="white" stroke="#4a90a4" stroke-width="2"/>
    <text x="310" y="258" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c5f6e">Standards</text>
    <text x="310" y="275" text-anchor="middle" font-family="Arial" font-size="10" fill="#5a8a9a">ISO 27001</text>
    <text x="310" y="288" text-anchor="middle" font-family="Arial" font-size="10" fill="#5a8a9a">NIST SP 800-64</text>
  </g>
  
  <!-- Bottom Labels -->
  <g data-narration="Integration - Security gates at each phase">
    <rect x="20" y="315" width="380" height="35" rx="5" fill="#f0f8f8" stroke="#a8d4dc" stroke-width="1"/>
    <text x="210" y="332" text-anchor="middle" font-family="Arial" font-size="11" fill="#3d6e7a">
      <tspan font-weight="bold">Security Gates:</tspan> Security integrated at each phase
    </text>
    <text x="210" y="345" text-anchor="middle" font-family="Arial" font-size="10" fill="#7aa8b8">
      84% of breaches from app layer (OWASP 2023)
    </text>
  </g>
  
  <!-- Icons/Symbols -->
  <g class="icon">
    <!-- Lock icon -->
    <circle cx="60" y="355" r="8" fill="#5ba3a0"/>
    <rect x="55" y="350" width="10" height="8" rx="1" fill="white"/>
    <path d="M 57 350 L 57 347 Q 60 344 63 347 L 63 350" fill="none" stroke="white" stroke-width="1.5"/>
  </g>
  
  <g class="icon">
    <!-- Shield icon -->
    <polygon points="350,355 342,365 350,370 358,365" fill="#f0ad4e"/>
    <line x1="350" y1="358" x2="350" y2="367" stroke="white" stroke-width="1.5"/>
  </g>
</svg>