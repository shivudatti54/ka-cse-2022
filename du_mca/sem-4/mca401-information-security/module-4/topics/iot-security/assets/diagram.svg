<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="iot-security" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1e8e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cce0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6ffe6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccffcc;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .layer-box { filter: url(#shadow); }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-float { animation: float 3s ease-in-out infinite; }
    .shield-icon { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">IoT Security Architecture</text>
  
  <!-- Layer 1: Perception Layer -->
  <g class="anim-slide" style="animation-delay: 0.2s">
    <rect x="20" y="50" width="180" height="100" rx="8" fill="url(#layerGrad1)" class="layer-box" data-narration="Perception Layer: Physical devices with sensors and actuators. Security includes hardware TPM for secure key storage."/>
    <text x="110" y="70" text-anchor="middle" class="label">Perception Layer</text>
    <!-- Sensor icon -->
    <rect x="35" y="85" width="30" height="30" rx="4" fill="#ff9966" stroke="#cc6633" stroke-width="2"/>
    <circle cx="50" cy="100" r="8" fill="#fff"/>
    <circle cx="50" cy="100" r="4" fill="#ff9966"/>
    <!-- Hardware Security -->
    <rect x="80" y="85" width="35" height="25" rx="3" fill="#8bc34a" stroke="#558b2f" stroke-width="1.5"/>
    <text x="97" y="102" text-anchor="middle" font-size="9" fill="white" font-weight="bold">TPM</text>
    <!-- Device Lock -->
    <rect x="130" y="88" width="25" height="20" rx="3" fill="#ff7043" stroke="#d84315" stroke-width="1.5"/>
    <circle cx="142" cy="98" r="4" fill="#fff"/>
    <text x="110" y="128" text-anchor="middle" class="detail">Sensors • TPM • Device Auth</text>
  </g>
  
  <!-- Arrow down -->
  <g class="anim-fade" style="animation-delay: 0.5s">
    <path d="M110 155 L110 175" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    <polygon points="110,175 105,168 115,168" fill="#666"/>
  </g>
  
  <!-- Layer 2: Network Layer -->
  <g class="anim-slide" style="animation-delay: 0.4s">
    <rect x="20" y="180" width="180" height="100" rx="8" fill="url(#layerGrad2)" class="layer-box" data-narration="Network Layer: Communication protocols like MQTT and CoAP. Security includes DTLS encryption and secure channels."/>
    <text x="110" y="200" text-anchor="middle" class="label">Network Layer</text>
    <!-- Protocol boxes -->
    <rect x="30" y="215" width="50" height="22" rx="3" fill="#42a5f5" stroke="#1976d2" stroke-width="1.5"/>
    <text x="55" y="230" text-anchor="middle" font-size="9" fill="white" font-weight="bold">MQTT</text>
    <rect x="90" y="215" width="50" height="22" rx="3" fill="#42a5f5" stroke="#1976d2" stroke-width="1.5"/>
    <text x="115" y="230" text-anchor="middle" font-size="9" fill="white" font-weight="bold">CoAP</text>
    <!-- Encrypted channel -->
    <rect x="35" y="245" width="60" height="20" rx="3" fill="#7e57c2" stroke="#512da8" stroke-width="1.5"/>
    <text x="65" y="258" text-anchor="middle" font-size="8" fill="white" font-weight="bold">DTLS</text>
    <!-- Lock -->
    <circle cx="130" cy="255" r="12" fill="#4caf50" stroke="#2e7d32" stroke-width="1.5" class="shield-icon"/>
    <path d="M130 250 L130 258" stroke="white" stroke-width="2"/>
    <rect x="127" y="258" width="6" height="4" fill="white"/>
    <text x="110" y="278" text-anchor="middle" class="detail">MQTT/CoAP • DTLS • TLS</text>
  </g>
  
  <!-- Arrow down -->
  <g class="anim-fade" style="animation-delay: 0.7s">
    <path d="M110 285 L110 305" stroke="#666" stroke-width="2"/>
    <polygon points="110,305 105,298 115,298" fill="#666"/>
  </g>
  
  <!-- Layer 3: Application Layer -->
  <g class="anim-slide" style="animation-delay: 0.6s">
    <rect x="20" y="310" width="180" height="80" rx="8" fill="url(#layerGrad3)" class="layer-box" data-narration="Application Layer: User-facing services with API gateways and zero-trust security controls."/>
    <text x="110" y="330" text-anchor="middle" class="label">Application Layer</text>
    <!-- API Gateway -->
    <rect x="30" y="345" width="55" height="25" rx="3" fill="#26a69a" stroke="#00796b" stroke-width="1.5"/>
    <text x="57" y="360" text-anchor="middle" font-size="8" fill="white" font-weight="bold">API GW</text>
    <!-- Zero Trust -->
    <rect x="95" y="345" width="60" height="25" rx="3" fill="#ec407a" stroke="#c2185b" stroke-width="1.5"/>
    <text x="125" y="358" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Zero Trust</text>
    <text x="110" y="378" text-anchor="middle" class="detail">API Gateway • Zero Trust</text>
  </g>
  
  <!-- Attack Surfaces Panel -->
  <g class="anim-fade" style="animation-delay: 0.8s">
    <rect x="215" y="50" width="190" height="150" rx="8" fill="#fff3e0" stroke="#ffb74d" stroke-width="2" data-narration="Attack Surfaces: Common vulnerabilities including device tampering, unsecured APIs, weak authentication, and radio interface attacks."/>
    <text x="310" y="70" text-anchor="middle" class="label" fill="#e65100">Attack Surfaces</text>
    
    <!-- Attack items with icons -->
    <g transform="translate(230, 85)">
      <circle cx="8" cy="8" r="6" fill="#ff5722"/>
      <text x="22" y="12" class="detail">Device Tampering</text>
    </g>
    <g transform="translate(230, 110)">
      <circle cx="8" cy="8" r="6" fill="#ff5722"/>
      <text x="22" y="12" class="detail">Unsecured APIs</text>
    </g>
    <g transform="translate(230, 135)">
      <circle cx="8" cy="8" r="6" fill="#ff5722"/>
      <text x="22" y="12" class="detail">Weak Authentication</text>
    </g>
    <g transform="translate(230, 160)">
      <circle cx="8" cy="8" r="6" fill="#ff5722"/>
      <text x="22" y="12" class="detail">Radio Attacks (BLE/WiFi)</text>
    </g>
  </g>
  
  <!-- Security Solutions Panel -->
  <g class="anim-fade" style="animation-delay: 1s">
    <rect x="215" y="210" width="190" height="90" rx="8" fill="#e8f5e9" stroke="#81c784" stroke-width="2" data-narration="Security Solutions: Implementing DTLS, lightweight cryptography, X.509 certificates, and zero-trust architecture."/>
    <text x="310" y="230" text-anchor="middle" class="label" fill="#2e7d32">Security Solutions</text>
    
    <!-- Solution items -->
    <g transform="translate(230, 245)">
      <rect x="0" y="0" width="18" height="18" rx="3" fill="#4caf50"/>
      <text x="24" y="14" class="detail">DTLS / TLS</text>
    </g>
    <g transform="translate(230, 270)">
      <rect x="0" y="0" width="18" height="18" rx="3" fill="#4caf50"/>
      <text x="24" y="14" class="detail">X.509 Certificates</text>
    </g>
    <g transform="translate(310, 270)">
      <rect x="0" y="0" width="18" height="18" rx="3" fill="#4caf50"/>
      <text x="24" y="14" class="detail">Zero Trust</text>
    </g>
  </g>
  
  <!-- Key Concept Box -->
  <g class="anim-fade" style="animation-delay: 1.2s">
    <rect x="215" y="310" width="190" height="80" rx="8" fill="#fce4ec" stroke="#f48fb1" stroke-width="2" data-narration="Example: Smart Home Security - Use mutual TLS, enforce password policies, and employ hardware security modules for key storage."/>
    <text x="310" y="330" text-anchor="middle" class="label" fill="#c2185b">Smart Home Example</text>
    <text x="225" y="350" class="detail">• Mutual TLS Authentication</text>
    <text x="225" y="365" class="detail">• Strong Password Policies</text>
    <text x="225" y="380" class="detail">• HSM for Key Storage</text>
  </g>
  
  <!-- Flow arrows showing security at each layer -->
  <g class="anim-float" style="animation-delay: 1.4s">
    <path d="M200 100 Q205 100 210 100" stroke="#4caf50" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <path d="M200 230 Q205 230 210 230" stroke="#4caf50" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <path d="M200 350 Q205 350 210 350" stroke="#4caf50" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
  </g>
  
  <!-- Decorative shield icons -->
  <g class="anim-pulse" style="transform-origin: 380px 100px;">
    <path d="M380 80 L395 85 L395 105 Q395 115 380 120 Q365 115 365 105 L365 85 Z" fill="#4caf50" stroke="#2e7d32" stroke-width="2"/>
    <path d="M380 90 L377 95 L383 95 Z" fill="white"/>
    <rect x="378" y="98" width="4" height="8" fill="white"/>
  </g>
  
  <g class="anim-pulse" style="animation-delay: 0.5s; transform-origin: 380px 255px;">
    <path d="M380 235 L395 240 L395 260 Q395 270 380 275 Q365 270 365 260 L365 240 Z" fill="#42a5f5" stroke="#1976d2" stroke-width="2"/>
    <path d="M380 245 L377 250 L383 250 Z" fill="white"/>
    <rect x="378" y="253" width="4" height="8" fill="white"/>
  </g>
</svg>