<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="hash-functions-digital-signatures">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#e0e8f8"/>
      <stop offset="100%" style="stop-color:#d8e4f4"/>
    </linearGradient>
    <linearGradient id="senderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4edda"/>
      <stop offset="100%" style="stop-color:#c3e6cb"/>
    </linearGradient>
    <linearGradient id="receiverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d1ecf1"/>
      <stop offset="100%" style="stop-color:#bee5eb"/>
    </linearGradient>
    <linearGradient id="signatureGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3cd"/>
      <stop offset="100%" style="stop-color:#ffeeba"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowAnimation {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .sender-box { animation: slideInLeft 0.6s ease-out; }
    .receiver-box { animation: slideInRight 0.6s ease-out; }
    .signature-box { animation: fadeIn 0.8s ease-out 0.3s both; }
    .concept-box { animation: fadeIn 0.6s ease-out 0.5s both; }
    .arrow { animation: flowAnimation 1s linear infinite; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .label { font-size: 14px; font-weight: 600; }
    .detail { font-size: 12px; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title" font-size="20" font-weight="bold" fill="#2c5282">Hash Functions &amp; Digital Signatures</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#4a5568" stroke-width="1.5" class="title"/>
  
  <!-- Sender Section -->
  <g class="sender-box" data-narration="Sender creates message and generates its hash using a cryptographic hash function">
    <rect x="20" y="55" width="160" height="130" rx="8" fill="url(#senderGradient)" filter="url(#shadow)"/>
    <text x="100" y="75" text-anchor="middle" class="label" fill="#155724">SENDER</text>
    
    <!-- Message -->
    <rect x="35" y="88" width="60" height="35" rx="4" fill="#fff" stroke="#28a745" stroke-width="1.5"/>
    <text x="65" y="105" text-anchor="middle" class="detail" fill="#155724">Message</text>
    <text x="65" y="118" text-anchor="middle" font-size="10" fill="#6c757d">m</text>
    
    <!-- Hash Function -->
    <rect x="105" y="88" width="60" height="35" rx="4" fill="#fff" stroke="#28a745" stroke-width="1.5"/>
    <text x="135" y="102" text-anchor="middle" class="detail" fill="#155724">Hash</text>
    <text x="135" y="116" text-anchor="middle" font-size="10" fill="#6c757d">h(m)</text>
    
    <!-- Arrow from message to hash -->
    <line x1="95" y1="105" x2="103" y2="105" stroke="#28a745" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="100" y="98" text-anchor="middle" font-size="9" fill="#155724">SHA-256</text>
    
    <!-- Private Key -->
    <rect x="45" y="135" width="110" height="40" rx="4" fill="#fff" stroke="#28a745" stroke-width="1.5"/>
    <text x="100" y="152" text-anchor="middle" class="detail" fill="#155724">Private Key</text>
    <text x="100" y="167" text-anchor="middle" font-size="10" fill="#6c757d">Sign</text>
  </g>
  
  <!-- Signature Box -->
  <g class="signature-box" data-narration="The hash is encrypted with the sender's private key to create the digital signature">
    <rect x="190" y="85" width="50" height="70" rx="6" fill="url(#signatureGradient)" filter="url(#shadow)"/>
    <text x="215" y="108" text-anchor="middle" class="detail" fill="#856404">Digital</text>
    <text x="215" y="122" text-anchor="middle" class="detail" fill="#856404">Signature</text>
    <text x="215" y="140" text-anchor="middle" font-size="9" fill="#856404">s = Sig(SK,h(m))</text>
    
    <!-- Arrow from hash to signature -->
    <line x1="165" y1="110" x2="188" y2="110" stroke="#856404" stroke-width="2" marker-end="url(#arrowhead)" class="arrow" stroke-dasharray="5,3"/>
    
    <!-- Arrow from private key to signature -->
    <line x1="135" y1="155" x2="175" y2="135" stroke="#856404" stroke-width="1.5" marker-end="url(#arrowhead)" class="arrow" stroke-dasharray="5,3"/>
  </g>
  
  <!-- Transmission -->
  <g data-narration="The message and signature are transmitted together to the recipient">
    <line x1="250" y1="120" x2="320" y2="120" stroke="#4a5568" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowhead)"/>
    <text x="285" y="112" text-anchor="middle" font-size="10" fill="#4a5568">Transmission</text>
  </g>
  
  <!-- Receiver Section -->
  <g class="receiver-box" data-narration="Receiver decrypts signature with public key and compares hash to verify authenticity">
    <rect x="330" y="55" width="75" height="130" rx="8" fill="url(#receiverGradient)" filter="url(#shadow)"/>
    <text x="367" y="75" text-anchor="middle" class="label" fill="#0c5460">RECEIVER</text>
    
    <!-- Message received -->
    <rect x="340" y="88" width="55" height="30" rx="4" fill="#fff" stroke="#17a2b8" stroke-width="1.5"/>
    <text x="367" y="104" text-anchor="middle" font-size="11" fill="#0c5460">Message</text>
    
    <!-- Hash function received -->
    <rect x="340" y="125" width="55" height="30" rx="4" fill="#fff" stroke="#17a2b8" stroke-width="1.5"/>
    <text x="367" y="141" text-anchor="middle" font-size="11" fill="#0c5460">Hash h(m)</text>
    
    <!-- Public Key -->
    <rect x="345" y="163" width="50" height="15" rx="3" fill="#fff" stroke="#17a2b8" stroke-width="1"/>
    <text x="370" y="174" text-anchor="middle" font-size="9" fill="#0c5460">Pub Key</text>
  </g>
  
  <!-- Verification -->
  <g class="pulse-element" data-narration="Verification compares decrypted signature hash with computed hash - match means valid">
    <rect x="330" y="195" width="75" height="30" rx="4" fill="#28a745" stroke="#1e7e34" stroke-width="1"/>
    <text x="367" y="212" text-anchor="middle" font-size="11" fill="white" font-weight="600">VERIFIED</text>
    
    <!-- Arrows to verification -->
    <line x1="367" y1="155" x2="367" y2="193" stroke="#28a745" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="367" y1="118" x2="367" y2="150" stroke="#28a745" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="concept-box" data-narration="Key cryptographic properties ensure security: integrity, authentication, and non-repudiation">
    <rect x="20" y="200" width="380" height="90" rx="6" fill="#fff" stroke="#e2e6ea" stroke-width="1" filter="url(#shadow)"/>
    <text x="30" y="220" class="label" fill="#495057" font-size="13">Key Concepts:</text>
    
    <text x="30" y="242" font-size="11" fill="#6c757d">• <tspan font-weight="600" fill="#495057">Integrity:</tspan> Hash ensures message not altered</text>
    <text x="30" y="258" font-size="11" fill="#6c757d">• <tspan font-weight="600" fill="#495057">Authentication:</tspan> Private key proves sender identity</text>
    <text x="30" y="274" font-size="11" fill="#6c757d">• <tspan font-weight="600" fill="#495057">Non-repudiation:</tspan> Signature cannot be forged/denied</text>
    
    <text x="200" y="242" font-size="11" fill="#6c757d">• <tspan font-weight="600" fill="#495057">SHA-256:</tspan> 256-bit hash, collision-resistant</text>
    <text x="200" y="258" font-size="11" fill="#6c757d">• <tspan font-weight="600" fill="#495057">RSA-PSS:</tspan> Probabilistic padding scheme</text>
    <text x="200" y="274" font-size="11" fill="#6c757d">• <tspan font-weight="600" fill="#495057">ECDSA:</tspan> 256-bit keys, high efficiency</text>
  </g>
  
  <!-- Security Services -->
  <g data-narration="Applications: SSL/TLS certificates, blockchain transactions, legal e-contracts">
    <rect x="20" y="300" width="380" height="35" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="210" y="318" text-anchor="middle" font-size="12" fill="#495057">
      <tspan font-weight="600">Applications:</tspan> SSL/TLS • Blockchain • E-Contracts • Software Updates
    </text>
    <text x="210" y="332" text-anchor="middle" font-size="10" fill="#6c757d">Used in healthcare, legal tech, financial transactions</text>
  </g>
  
  <!-- Animated dots for flow indication -->
  <circle cx="250" cy="120" r="3" fill="#4a5568">
    <animate attributeName="cx" values="250;320;320" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="120" r="3" fill="#4a5568">
    <animate attributeName="cx" values="250;320;320" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Lock icon representing security -->
  <g transform="translate(190, 300)">
    <rect x="0" y="8" width="16" height="12" rx="2" fill="#28a745"/>
    <path d="M2 8V6a6 6 0 1 1 12 0v2" fill="none" stroke="#28a745" stroke-width="2"/>
    <circle cx="8" cy="14" r="1.5" fill="#fff"/>
    <rect x="7" y="14" width="2" height="3" fill="#fff"/>
  </g>
</svg>