<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="pki-certificate-management">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e0f0e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e8f4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="caGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="raGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d8b3d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d58512;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lifecycleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9585bf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c5aa8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #fff; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #fff; }
    .section-title { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #333; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-fade-1 { animation: fadeIn 0.8s ease-out 0.2s forwards; opacity: 0; }
    .anim-fade-2 { animation: fadeIn 0.8s ease-out 0.4s forwards; opacity: 0; }
    .anim-fade-3 { animation: fadeIn 0.8s ease-out 0.6s forwards; opacity: 0; }
    .anim-fade-4 { animation: fadeIn 0.8s ease-out 0.8s forwards; opacity: 0; }
    .line-anim { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1.5s ease-out 1s forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">PKI Certificate Management</text>
  <line x1="80" y1="40" x2="340" y2="40" stroke="#4a90d9" stroke-width="2" class="anim-fade" />
  
  <!-- Root CA Box -->
  <g class="anim-fade-1" filter="url(#shadow)">
    <rect x="150" y="55" width="120" height="50" rx="8" fill="url(#caGradient)" />
    <text x="210" y="75" text-anchor="middle" class="label">Root CA</text>
    <text x="210" y="90" text-anchor="middle" class="detail">Trusted Root</text>
  </g>
  
  <!-- Arrow from Root to Intermediate -->
  <line x1="210" y1="105" x2="210" y2="135" stroke="#666" stroke-width="2" class="line-anim" />
  <polygon points="210,140 205,130 215,130" fill="#666" class="anim-fade-2" />
  
  <!-- Intermediate CA Box -->
  <g class="anim-fade-2" filter="url(#shadow)">
    <rect x="150" y="140" width="120" height="50" rx="8" fill="url(#caGradient)" />
    <text x="210" y="160" text-anchor="middle" class="label">Intermediate CA</text>
    <text x="210" y="175" text-anchor="middle" class="detail">Issues End-Entity Certs</text>
  </g>
  
  <!-- Left Side - RA -->
  <g class="anim-fade-3" filter="url(#shadow)" data-narration="Registration Authority (RA) - Verifies certificate requests before CA issuance">
    <rect x="20" y="140" width="110" height="50" rx="8" fill="url(#raGradient)" />
    <text x="75" y="160" text-anchor="middle" class="label">RA</text>
    <text x="75" y="175" text-anchor="middle" class="detail">Verification</text>
  </g>
  
  <!-- Arrow from RA to Intermediate -->
  <line x1="130" y1="165" x2="150" y2="165" stroke="#666" stroke-width="2" stroke-dasharray="5,3" class="line-anim" />
  
  <!-- Arrow from Intermediate to Server -->
  <line x1="210" y1="190" x2="210" y2="235" stroke="#666" stroke-width="2" class="line-anim" />
  <polygon points="210,240 205,230 215,230" fill="#666" class="anim-fade-4" />
  
  <!-- End Entity / Web Server -->
  <g class="anim-fade-3" filter="url(#shadow)" data-narration="End Entity - Web server receives certificate binding public key to identity">
    <rect x="150" y="240" width="120" height="50" rx="8" fill="url(#serverGradient)" />
    <text x="210" y="260" text-anchor="middle" class="label">Web Server</text>
    <text x="210" y="275" text-anchor="middle" class="detail">Certificate Holder</text>
  </g>
  
  <!-- Client Validation (right side) -->
  <g class="anim-fade-4" filter="url(#shadow)" data-narration="Client validates certificate via OCSP/CRL checking trust chain">
    <rect x="300" y="240" width="100" height="50" rx="8" fill="#7c9ebb" />
    <text x="350" y="260" text-anchor="middle" class="label">Client</text>
    <text x="350" y="275" text-anchor="middle" class="detail">Validation</text>
  </g>
  
  <!-- Arrow from Server to Client -->
  <line x1="270" y1="265" x2="300" y2="265" stroke="#666" stroke-width="2" stroke-dasharray="5,3" class="line-anim" />
  
  <!-- Certificate Lifecycle Box at bottom -->
  <g class="anim-fade-4" data-narration="Certificate Lifecycle - Enrollment, Validation, Renewal, Revocation">
    <rect x="20" y="305" width="380" height="80" rx="8" fill="#f8f8f8" stroke="#9585bf" stroke-width="2" />
    <text x="210" y="325" text-anchor="middle" class="section-title">Certificate Lifecycle</text>
    
    <!-- Lifecycle stages -->
    <g>
      <circle cx="60" cy="355" r="12" fill="#5cb85c" class="anim-pulse" />
      <text x="60" y="359" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">1</text>
      <text x="60" y="375" text-anchor="middle" font-size="9" fill="#333">Enrollment</text>
    </g>
    <g>
      <circle cx="140" cy="355" r="12" fill="#5cb85c" class="anim-pulse" style="animation-delay: 0.3s" />
      <text x="140" y="359" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">2</text>
      <text x="140" y="375" text-anchor="middle" font-size="9" fill="#333">Validation</text>
    </g>
    <g>
      <circle cx="220" cy="355" r="12" fill="#5cb85c" class="anim-pulse" style="animation-delay: 0.6s" />
      <text x="220" y="359" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">3</text>
      <text x="220" y="375" text-anchor="middle" font-size="9" fill="#333">Renewal</text>
    </g>
    <g>
      <circle cx="300" cy="355" r="12" fill="#d9534f" class="anim-pulse" style="animation-delay: 0.9s" />
      <text x="300" y="359" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">4</text>
      <text x="300" y="375" text-anchor="middle" font-size="9" fill="#333">Revocation</text>
    </g>
    <g>
      <rect x="340" y="345" width="50" height="20" rx="4" fill="url(#lifecycleGradient)" />
      <text x="365" y="359" text-anchor="middle" fill="#fff" font-size="8">OCSP/CRL</text>
    </g>
  </g>
  
  <!-- Key formats note -->
  <g class="anim-fade-4" data-narration="X.509 v3 certificate format with extensions like Key Usage and SAN">
    <rect x="300" y="55" width="105" height="35" rx="5" fill="#f8f8f8" stroke="#ccc" stroke-width="1" />
    <text x="352" y="70" text-anchor="middle" font-size="9" fill="#333" font-weight="bold">X.509 v3</text>
    <text x="352" y="82" text-anchor="middle" font-size="8" fill="#666">Certificate Format</text>
  </g>
</svg>