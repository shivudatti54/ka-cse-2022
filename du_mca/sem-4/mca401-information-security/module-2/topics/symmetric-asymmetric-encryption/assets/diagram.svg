<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="symmetric-asymmetric-encryption" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="symmetricGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c9b6"/>
    </linearGradient>
    <linearGradient id="asymmetricGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#a8d4e6"/>
    </linearGradient>
    <linearGradient id="hybridGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4e8"/>
      <stop offset="100%" style="stop-color:#d4b8d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes moveRight {
      from { transform: translateX(0); }
      to { transform: translateX(30px); }
    }
    @keyframes moveLeft {
      from { transform: translateX(0); }
      to { transform: translateX(-30px); }
    }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c5f7c; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
    .box { rx: 8; ry: 8; filter: url(#shadow); }
    .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .key-icon { font-size: 16px; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="25" text-anchor="middle" class="title">Symmetric &amp; Asymmetric Encryption</text>
  
  <!-- Symmetric Section -->
  <g data-narration="Symmetric encryption uses a single shared secret key for both encryption and decryption. The sender and receiver must both have the same key.">
    <rect x="10" y="40" width="190" height="150" rx="10" fill="url(#symmetricGrad)" stroke="#6b9c8a" stroke-width="2" class="slide-left"/>
    <text x="105" y="58" text-anchor="middle" class="label" style="font-weight:bold;font-size:13px;">SYMMETRIC</text>
    <text x="105" y="75" text-anchor="middle" class="detail">Single Shared Key</text>
    
    <!-- Sender -->
    <rect x="25" y="90" width="70" height="30" rx="5" fill="#fff" stroke="#6b9c8a" stroke-width="1"/>
    <text x="60" y="110" text-anchor="middle" class="label">Sender</text>
    
    <!-- Key -->
    <text x="60" y="135" text-anchor="middle" class="key-icon pulse">🔑</text>
    <text x="60" y="148" text-anchor="middle" class="detail">Same Key</text>
    
    <!-- Arrow -->
    <line x1="95" y1="105" x2="135" y2="105" stroke="#666" stroke-width="2" class="arrow" style="marker-end:url(#arrowhead)"/>
    
    <!-- Encrypt box -->
    <rect x="135" y="90" width="50" height="30" rx="5" fill="#fff" stroke="#6b9c8a" stroke-width="1"/>
    <text x="160" y="110" text-anchor="middle" class="label">Encrypt</text>
    
    <!-- Ciphertext -->
    <rect x="135" y="130" width="50" height="30" rx="5" fill="#ddd" stroke="#999" stroke-width="1"/>
    <text x="160" y="150" text-anchor="middle" class="detail" style="font-size:9px;">Cipher</text>
    
    <!-- Receiver -->
    <rect x="25" y="165" width="70" height="25" rx="5" fill="#fff" stroke="#6b9c8a" stroke-width="1"/>
    <text x="60" y="182" text-anchor="middle" class="label">Receiver</text>
  </g>
  
  <!-- Asymmetric Section -->
  <g data-narration="Asymmetric encryption uses a key pair: a public key for encryption and a private key for decryption. This solves the key distribution problem.">
    <rect x="220" y="40" width="190" height="150" rx="10" fill="url(#asymmetricGrad)" stroke="#7ab8d4" stroke-width="2" class="slide-right"/>
    <text x="315" y="58" text-anchor="middle" class="label" style="font-weight:bold;font-size:13px;">ASYMMETRIC</text>
    <text x="315" y="75" text-anchor="middle" class="detail">Key Pair</text>
    
    <!-- Sender with Public Key -->
    <rect x="235" y="90" width="70" height="30" rx="5" fill="#fff" stroke="#7ab8d4" stroke-width="1"/>
    <text x="270" y="110" text-anchor="middle" class="label">Sender</text>
    
    <!-- Public Key -->
    <text x="270" y="135" text-anchor="middle" class="key-icon">🔓</text>
    <text x="270" y="148" text-anchor="middle" class="detail">Public Key</text>
    
    <!-- Arrow -->
    <line x1="305" y1="105" x2="345" y2="105" stroke="#666" stroke-width="2"/>
    <polygon points="345,105 338,100 338,110" fill="#666"/>
    
    <!-- Encrypt box -->
    <rect x="345" y="90" width="50" height="30" rx="5" fill="#fff" stroke="#7ab8d4" stroke-width="1"/>
    <text x="370" y="110" text-anchor="middle" class="label">Encrypt</text>
    
    <!-- Ciphertext -->
    <rect x="345" y="130" width="50" height="30" rx="5" fill="#ddd" stroke="#999" stroke-width="1"/>
    <text x="370" y="150" text-anchor="middle" class="detail" style="font-size:9px;">Cipher</text>
    
    <!-- Receiver with Private Key -->
    <rect x="235" y="165" width="70" height="25" rx="5" fill="#fff" stroke="#7ab8d4" stroke-width="1"/>
    <text x="270" y="182" text-anchor="middle" class="label">Receiver</text>
    <text x="270" y="195" text-anchor="middle" class="detail" style="font-size:9px;">🔐 Private Key</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g data-narration="Key algorithms: AES for symmetric encryption (fast, suitable for bulk data) and RSA for asymmetric (based on prime factorization, used in TLS/SSL).">
    <rect x="10" y="200" width="400" height="85" rx="10" fill="#fff" stroke="#aaa" stroke-width="1" class="fade-in" style="animation-delay:0.3s"/>
    <text x="210" y="218" text-anchor="middle" class="label" style="font-weight:bold;">Key Concepts</text>
    
    <!-- AES Box -->
    <rect x="20" y="230" width="120" height="45" rx="5" fill="#e8f5e9" stroke="#81c784" stroke-width="1"/>
    <text x="80" y="248" text-anchor="middle" class="label" style="font-weight:bold;color:#2e7d32;">AES</text>
    <text x="80" y="262" text-anchor="middle" class="detail">128/256-bit block</text>
    <text x="80" y="272" text-anchor="middle" class="detail" style="font-size:9px;">Fast • Bulk Data</text>
    
    <!-- RSA Box -->
    <rect x="150" y="230" width="120" height="45" rx="5" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1"/>
    <text x="210" y="248" text-anchor="middle" class="label" style="font-weight:bold;color:#1565c0;">RSA</text>
    <text x="210" y="262" text-anchor="middle" class="detail">Prime Factorization</text>
    <text x="210" y="272" text-anchor="middle" class="detail" style="font-size:9px;">TLS/SSL • Key Exchange</text>
    
    <!-- Hybrid Box -->
    <rect x="280" y="230" width="120" height="45" rx="5" fill="#f3e5f5" stroke="#ba68c8" stroke-width="1"/>
    <text x="340" y="248" text-anchor="middle" class="label" style="font-weight:bold;color:#7b1fa2;">Hybrid</text>
    <text x="340" y="262" text-anchor="middle" class="detail">AES + RSA</text>
    <text x="340" y="272" text-anchor="middle" class="detail" style="font-size:9px;">PGP • TLS 1.3</text>
  </g>
  
  <!-- Comparison Section -->
  <g data-narration="Symmetric is faster but requires secure key distribution. Asymmetric solves this but is slower. Hybrid systems combine both advantages.">
    <rect x="10" y="295" width="400" height="95" rx="10" fill="url(#hybridGrad)" stroke="#b8a4c8" stroke-width="1" class="fade-in" style="animation-delay:0.6s"/>
    <text x="210" y="313" text-anchor="middle" class="label" style="font-weight:bold;">Comparison</text>
    
    <!-- Speed comparison -->
    <text x="80" y="335" text-anchor="middle" class="detail" style="font-weight:bold;">Speed</text>
    <rect x="30" y="342" width="100" height="12" rx="3" fill="#81c784"/>
    <text x="80" y="351" text-anchor="middle" class="detail" style="font-size:9px;color:#fff;">Symmetric: Fast</text>
    <rect x="30" y="357" width="50" height="12" rx="3" fill="#64b5f6"/>
    <text x="55" y="366" text-anchor="middle" class="detail" style="font-size:8px;color:#fff;">RSA: Slow</text>
    
    <!-- Key Distribution -->
    <text x="210" y="335" text-anchor="middle" class="detail" style="font-weight:bold;">Key Distribution</text>
    <rect x="160" y="342" width="100" height="12" rx="3" fill="#e57373"/>
    <text x="210" y="351" text-anchor="middle" class="detail" style="font-size:9px;color:#fff;">Problem</text>
    <rect x="160" y="357" width="100" height="12" rx="3" fill="#81c784"/>
    <text x="210" y="366" text-anchor="middle" class="detail" style="font-size:9px;color:#fff;">Solved with Key Pair</text>
    
    <!-- Use Cases -->
    <text x="340" y="335" text-anchor="middle" class="detail" style="font-weight:bold;">Best For</text>
    <text x="340" y="350" text-anchor="middle" class="detail" style="font-size:10px;">• WiFi (AES)</text>
    <text x="340" y="362" text-anchor="middle" class="detail" style="font-size:10px;">• HTTPS (RSA)</text>
    <text x="340" y="374" text-anchor="middle" class="detail" style="font-size:10px;">• Digital Signatures</text>
  </g>
  
  <!-- Arrow connecting sections -->
  <path d="M 105 195 Q 105 205 105 200" stroke="#666" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
</svg>