<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="web-security-owasp">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e0e8f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e0f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#449d44;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec971f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a29bfe;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowRight {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .flow-animation { animation: flowRight 1.5s linear infinite; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="slide-in">Web Security: OWASP</text>
  <line x1="100" y1="40" x2="320" y2="40" stroke="#4a90d9" stroke-width="2" class="fade-in delay-1"/>
  
  <!-- Section 1: OWASP Top 10 Overview -->
  <g class="fade-in delay-1" filter="url(#shadow)">
    <rect x="15" y="55" width="130" height="75" rx="8" fill="url(#boxGradient1)"/>
    <text x="80" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="white">OWASP Top 10</text>
    <text x="80" y="90" text-anchor="middle" font-size="10" fill="#e8f4fc">2021 Edition</text>
    <text x="80" y="105" text-anchor="middle" font-size="9" fill="#d4e4f7">Injection</text>
    <text x="80" y="117" text-anchor="middle" font-size="9" fill="#d4e4f7">Broken Auth</text>
    <text x="80" y="129" text-anchor="middle" font-size="9" fill="#d4e4f7">+ 8 more...</text>
  </g>
  
  <!-- Section 2: CSRF Token Flow -->
  <g class="fade-in delay-2" filter="url(#shadow)">
    <rect x="155" y="55" width="165" height="145" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="237" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">CSRF Token Flow</text>
    
    <!-- User Request -->
    <ellipse cx="200" y="95" rx="22" ry="12" fill="#5cb85c"/>
    <text x="200" y="99" text-anchor="middle" font-size="9" fill="white">User</text>
    
    <!-- Arrow 1 -->
    <path d="M222 95 L268 95" stroke="#6c5ce7" stroke-width="2" stroke-dasharray="5,3" class="flow-animation"/>
    <polygon points="268,95 260,90 260,100" fill="#6c5ce7"/>
    
    <!-- Server -->
    <rect x="275" y="83" width="45" height="24" rx="4" fill="#f0ad4e"/>
    <text x="297" y="99" text-anchor="middle" font-size="9" fill="white">Server</text>
    
    <!-- Arrow 2 -->
    <path d="M320 110 L320 140" stroke="#6c5ce7" stroke-width="2" stroke-dasharray="5,3" class="flow-animation"/>
    <polygon points="320,140 315,132 325,132" fill="#6c5ce7"/>
    
    <!-- Token Generated -->
    <rect x="270" y="145" width="55" height="18" rx="3" fill="#4a90d9" class="pulse"/>
    <text x="297" y="158" text-anchor="middle" font-size="8" fill="white">Token OK</text>
    
    <!-- Arrow 3 -->
    <path d="M270 154 L222 154" stroke="#6c5ce7" stroke-width="2" stroke-dasharray="5,3" class="flow-animation"/>
    <polygon points="222,154 230,149 230,159" fill="#6c5ce7"/>
    
    <!-- Form with Token -->
    <rect x="165" y="165" width="50" height="25" rx="3" fill="#e8e0f5" stroke="#a29bfe" stroke-width="1"/>
    <text x="190" y="180" text-anchor="middle" font-size="7" fill="#6c5ce7">Form</text>
    <text x="190" y="190" text-anchor="middle" font-size="6" fill="#6c5ce7">+Token</text>
  </g>
  
  <!-- Section 3: Standards -->
  <g class="fade-in delay-3" filter="url(#shadow)">
    <rect x="330" y="55" width="80" height="75" rx="8" fill="url(#boxGradient2)"/>
    <text x="370" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Standards</text>
    <text x="370" y="90" text-anchor="middle" font-size="9" fill="#e8f4fc">WSTG</text>
    <text x="370" y="102" text-anchor="middle" font-size="9" fill="#e8f4fc">ASVS L1-L3</text>
    <text x="370" y="114" text-anchor="middle" font-size="9" fill="#e8f4fc">91 Test Cases</text>
  </g>
  
  <!-- Section 4: Tools -->
  <g class="fade-in delay-4" filter="url(#shadow)">
    <rect x="15" y="140" width="130" height="50" rx="8" fill="url(#boxGradient3)"/>
    <text x="80" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Tools</text>
    <text x="80" y="175" text-anchor="middle" font-size="10" fill="#fff5e6">ZAP Scanner</text>
  </g>
  
  <!-- Section 5: Key Stats -->
  <g class="fade-in delay-4">
    <rect x="15" y="200" width="130" height="45" rx="8" fill="#e74c3c" opacity="0.85" filter="url(#shadow)"/>
    <text x="80" y="220" text-anchor="middle" font-size="14" font-weight="bold" fill="white">94%</text>
    <text x="80" y="235" text-anchor="middle" font-size="9" fill="white">Apps have vulnerabilities</text>
  </g>
  
  <!-- Section 6: Verification Levels -->
  <g class="fade-in delay-4">
    <rect x="155" y="210" width="165" height="50" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="237" y="227" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">ASVS Levels</text>
    <rect x="165" y="235" width="35" height="18" rx="3" fill="#5cb85c"/>
    <text x="182" y="248" text-anchor="middle" font-size="8" fill="white">L1</text>
    <text x="205" y="248" text-anchor="middle" font-size="8" fill="#555">Opp.</text>
    <rect x="220" y="235" width="35" height="18" rx="3" fill="#f0ad4e"/>
    <text x="237" y="248" text-anchor="middle" font-size="8" fill="white">L2</text>
    <text x="260" y="248" text-anchor="middle" font-size="8" fill="#555">Std.</text>
    <rect x="275" y="235" width="35" height="18" rx="3" fill="#d9534f"/>
    <text x="292" y="248" text-anchor="middle" font-size="8" fill="white">L3</text>
    <text x="315" y="248" text-anchor="middle" font-size="8" fill="#555">Adv.</text>
  </g>
  
  <!-- Connection arrows between sections -->
  <g class="fade-in delay-3">
    <path d="M145 92 Q150 92 155 92" stroke="#aaa" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M320 100 L330 92" stroke="#aaa" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Data Narration Elements -->
  <g data-narration="OWASP Top 10: The authoritative list of most critical web application security risks">
    <title>OWASP Top 10</title>
  </g>
  <g data-narration="CSRF Token Flow: Demonstrates anti-CSRF token generation and validation process">
    <title>CSRF Token Flow</title>
  </g>
  <g data-narration="WSTG and ASVS: Industry standards for security testing and verification">
    <title>Standards</title>
  </g>
  <g data-narration="ZAP: Open-source web application security scanner">
    <title>Tools</title>
  </g>
  <g data-narration="94% of applications have at least one vulnerability">
    <title>Statistics</title>
  </g>
  <g data-narration="ASVS Level 1 (Opportunistic), Level 2 (Standard), Level 3 (Advanced)">
    <title>Verification Levels</title>
  </g>
  
  <!-- OWASP 2021 List -->
  <g class="fade-in delay-4">
    <rect x="330" y="140" width="85" height="105" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="372" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">Top 10 2021</text>
    <text x="372" y="168" text-anchor="middle" font-size="7" fill="#e74c3c">1. Injection</text>
    <text x="372" y="179" text-anchor="middle" font-size="7" fill="#e67e22">2. Broken Auth</text>
    <text x="372" y="190" text-anchor="middle" font-size="7" fill="#f1c40f">3. Crypto Failures</text>
    <text x="372" y="201" text-anchor="middle" font-size="7" fill="#2ecc71">4. Insecure Design</text>
    <text x="372" y="212" text-anchor="middle" font-size="7" fill="#3498db">5. Misconfig</text>
    <text x="372" y="223" text-anchor="middle" font-size="7" fill="#9b59b6">6. Vulnerable</text>
    <text x="372" y="234" text-anchor="middle" font-size="7" fill="#1abc9c">7. ID Failures</text>
    <text x="372" y="245" text-anchor="middle" font-size="7" fill="#34495e">8-10. ...</text>
  </g>
  
  <!-- Bottom info -->
  <g class="fade-in delay-4">
    <text x="210" y="290" text-anchor="middle" font-size="10" fill="#666">CSRF Protection: Token validated on server before processing request</text>
    
    <!-- Legend -->
    <rect x="15" y="305" width="390" height="85" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="210" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">OWASP Key Concepts</text>
    
    <!-- Legend items -->
    <circle cx="40" cy="345" r="5" fill="#5cb85c"/>
    <text x="55" y="349" font-size="9" fill="#555">Generation</text>
    
    <circle cx="130" cy="345" r="5" fill="#f0ad4e"/>
    <text x="145" y="349" font-size="9" fill="#555">Validation</text>
    
    <circle cx="220" cy="345" r="5" fill="#4a90d9"/>
    <text x="235" y="349" font-size="9" fill="#555">Token</text>
    
    <circle cx="310" cy="345" r="5" fill="#6c5ce7"/>
    <text x="325" y="349" font-size="9" fill="#555">Flow</text>
    
    <text x="210" y="372" text-anchor="middle" font-size="8" fill="#888">OWASP Foundation | Non-profit | Community-driven</text>
  </g>
  
  <!-- Animated highlight on CSRF section -->
  <rect x="155" y="55" width="165" height="145" rx="8" fill="none" stroke="#6c5ce7" stroke-width="2" class="pulse" opacity="0.5"/>
</svg>