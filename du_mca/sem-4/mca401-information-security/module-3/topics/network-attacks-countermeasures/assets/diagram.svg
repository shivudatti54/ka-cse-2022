<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="network-attacks-countermeasures">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e5f7"/>
      <stop offset="100%" style="stop-color:#e2d4f0"/>
    </linearGradient>
    <linearGradient id="attackGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcccc"/>
      <stop offset="100%" style="stop-color:#ff9999"/>
    </linearGradient>
    <linearGradient id="counterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ccffcc"/>
      <stop offset="100%" style="stop-color:#99ff99"/>
    </linearGradient>
    <linearGradient id="mitmGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe6cc"/>
      <stop offset="100%" style="stop-color:#ffcc99"/>
    </linearGradient>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e74c3c"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#27ae60"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dash {
      to { stroke-dashoffset: 0; }
    }
    .section-box { animation: fadeIn 0.6s ease-out forwards; }
    .section-box-delay1 { animation: fadeIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-box-delay2 { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-box-delay3 { animation: fadeIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .arrow-line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: dash 1s ease-out 0.8s forwards; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .pulse-element-delay { animation: pulse 2s ease-in-out infinite; transform-origin: center; animation-delay: 0.5s; }
    text { font-family: Arial, sans-serif; }
    .title { font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label { font-size: 12px; fill: #34495e; }
    .detail { font-size: 10px; fill: #7f8c8d; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="25" text-anchor="middle" class="title">Network Attacks &amp; Countermeasures</text>
  
  <!-- Attack Types Section -->
  <g class="section-box" data-narration="Attack Taxonomy: Categories include Passive (eavesdropping), Active (MITM, DDoS), and Insider Threats">
    <rect x="10" y="45" width="130" height="95" rx="8" fill="url(#attackGradient)" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="75" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">Attack Types</text>
    <text x="20" y="80" class="label">• Passive: Sniffing</text>
    <text x="20" y="95" class="label">• Active: MITM, DDoS</text>
    <text x="20" y="110" class="label">• Insider: Privilege</text>
    <text x="20" y="125" class="detail">Escalation, Exfiltration</text>
  </g>
  
  <!-- Attack Vectors Section -->
  <g class="section-box-delay1" data-narration="Common Attack Vectors: Phishing (BEC), Zero-Day (Log4j), Wireless (Evil Twin, KRACK)">
    <rect x="10" y="150" width="130" height="85" rx="8" fill="url(#attackGradient)" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="75" y="167" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">Attack Vectors</text>
    <text x="20" y="185" class="label">• Phishing / BEC</text>
    <text x="20" y="200" class="label">• Zero-Day (Log4j)</text>
    <text x="20" y="215" class="label">• Wireless: KRACK</text>
  </g>
  
  <!-- MITM Attack Flow Diagram -->
  <g class="section-box-delay2" data-narration="MITM Attack: Attacker intercepts client-server communication using ARP spoofing and fake certificates">
    <rect x="150" y="45" width="150" height="150" rx="8" fill="url(#mitmGradient)" stroke="#e67e22" stroke-width="1.5"/>
    <text x="225" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#d35400">MITM Attack Flow</text>
    
    <!-- Client -->
    <circle cx="180" cy="90" r="18" fill="#3498db" class="pulse-element"/>
    <text x="180" y="94" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Client</text>
    
    <!-- Server -->
    <circle cx="270" cy="90" r="18" fill="#9b59b6" class="pulse-element"/>
    <text x="270" y="94" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Server</text>
    
    <!-- Attacker -->
    <circle cx="225" cy="140" r="20" fill="#e74c3c" class="pulse-element-delay"/>
    <text x="225" y="144" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Attacker</text>
    
    <!-- Arrows -->
    <line x1="195" y1="90" x2="250" y2="90" stroke="#7f8c8d" stroke-width="1.5" class="arrow-line"/>
    <line x1="250" y1="90" x2="195" y2="90" stroke="#7f8c8d" stroke-width="1.5" class="arrow-line"/>
    
    <line x1="180" y1="110" x2="210" y2="130" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowRed)"/>
    <line x1="240" y1="130" x2="270" y2="110" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowRed)"/>
    
    <!-- Fake Certificate Icon -->
    <rect x="205" y="165" width="40" height="22" rx="3" fill="#f39c12"/>
    <text x="225" y="180" text-anchor="middle" font-size="8" fill="#fff">Fake Cert</text>
  </g>
  
  <!-- Countermeasures Section -->
  <g class="section-box-delay1" data-narration="Countermeasures: Prevention (Firewall, IDS), Detection (SIEM, NBA), Response (IR Playbooks)">
    <rect x="310" y="45" width="100" height="95" rx="8" fill="url(#counterGradient)" stroke="#27ae60" stroke-width="1.5"/>
    <text x="360" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e8449">Defense</text>
    <text x="320" y="80" class="label">• Prevention</text>
    <text x="320" y="95" class="label">• Detection</text>
    <text x="320" y="110" class="label">• Response</text>
    <text x="320" y="125" class="detail">Firewall, IDS/IPS</text>
  </g>
  
  <!-- Protocol Protections -->
  <g class="section-box-delay2" data-narration="Protocol Protections: DNSSEC, SSH (not Telnet), MACsec for Layer 2">
    <rect x="310" y="150" width="100" height="75" rx="8" fill="url(#counterGradient)" stroke="#27ae60" stroke-width="1.5"/>
    <text x="360" y="167" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e8449">Protocols</text>
    <text x="320" y="185" class="label">• DNSSEC</text>
    <text x="320" y="200" class="label">• SSH &gt; Telnet</text>
    <text x="320" y="215" class="label">• MACsec L2</text>
  </g>
  
  <!-- Mitigation Example Box -->
  <g class="section-box-delay3" data-narration="SYN Flood Mitigation: Monitor half-open connections, implement SYN cookies, increase backlog">
    <rect x="150" y="205" width="150" height="60" rx="8" fill="#f8f9fa" stroke="#3498db" stroke-width="1.5"/>
    <text x="225" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">SYN Flood Mitigation</text>
    <text x="160" y="240" class="label">Monitor: netstat SYN_RECV</text>
    <text x="160" y="255" class="detail">SYN Cookies, Increase Backlog</text>
  </g>
  
  <!-- Bottom Legend -->
  <g class="section-box-delay3" data-narration="Legend: Red indicates attack elements, Green indicates defensive measures">
    <rect x="10" y="245" width="130" height="50" rx="6" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1"/>
    <circle cx="25" cy="260" r="6" fill="#e74c3c"/>
    <text x="38" y="263" class="label">Attack</text>
    <circle cx="25" cy="280" r="6" fill="#27ae60"/>
    <text x="38" y="283" class="label">Defense</text>
    <circle cx="90" cy="260" r="6" fill="#3498db"/>
    <text x="103" y="263" class="label">Client</text>
    <circle cx="90" cy="280" r="6" fill="#9b59b6"/>
    <text x="103" y="283" class="label">Server</text>
  </g>
  
  <!-- Cost Stat -->
  <g class="section-box-delay3">
    <rect x="310" y="235" width="100" height="60" rx="6" fill="#fff3cd" stroke="#f39c12" stroke-width="1"/>
    <text x="360" y="252" text-anchor="middle" font-size="11" font-weight="bold" fill="#d68910">Data Breach</text>
    <text x="360" y="270" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">$4.45M</text>
    <text x="360" y="284" text-anchor="middle" font-size="9" fill="#7f8c8d">Avg Cost 2023</text>
  </g>
  
  <!-- Connecting Arrows Between Sections -->
  <path d="M140 y=92 Q155 92 155 92" stroke="#95a5a6" stroke-width="1.5" fill="none" class="arrow-line"/>
  <line x1="140" y1="92" x2="150" y2="92" stroke="#95a5a6" stroke-width="1.5" marker-end="url(#arrowRed)" class="arrow-line"/>
  
  <line x1="260" y1="92" x2="310" y2="92" stroke="#95a5a6" stroke-width="1.5" marker-end="url(#arrowGreen)" class="arrow-line"/>
  
  <line x1="225" y1="160" x2="225" y2="205" stroke="#95a5a6" stroke-width="1" stroke-dasharray="4" class="arrow-line"/>
</svg>