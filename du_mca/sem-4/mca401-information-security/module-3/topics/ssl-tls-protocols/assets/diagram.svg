<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="ssl-tls-protocols" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#e8e8f5"/>
      <stop offset="100%" style="stop-color:#f0e8f5"/>
    </linearGradient>
    <linearGradient id="clientGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea"/>
      <stop offset="100%" style="stop-color:#7ec8e3"/>
    </linearGradient>
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9"/>
      <stop offset="100%" style="stop-color:#81c784"/>
    </linearGradient>
    <linearGradient id="handshakeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9c4"/>
      <stop offset="100%" style="stop-color:#ffe082"/>
    </linearGradient>
    <linearGradient id="recordGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e1bee7"/>
      <stop offset="100%" style="stop-color:#ce93d8"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; font-family: Arial, sans-serif; font-weight: bold; font-size: 22px; fill: #2c3e50; }
    .client-box { animation: slideInLeft 0.8s ease-out; }
    .server-box { animation: slideInRight 0.8s ease-out; }
    .handshake-msg { animation: slideInUp 0.6s ease-out; animation-fill-mode: both; }
    .protocol-box { animation: fadeIn 1s ease-out; }
    .concept-box { animation: pulse 3s infinite; }
    .message-line { stroke-dasharray: 200; animation: drawLine 1.5s ease-out forwards; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #444; }
    .small-label { font-family: Arial, sans-serif; font-size: 10px; fill: #666; }
    .title-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Main Title -->
  <text x="210" y="30" text-anchor="middle" class="title">SSL/TLS Protocols</text>
  
  <!-- Client Box -->
  <g class="client-box" data-narration="Client: Initiates secure connection, sends supported cipher suites">
    <rect x="20" y="60" width="70" height="45" rx="8" fill="url(#clientGradient)" stroke="#5aa0c8" stroke-width="2"/>
    <text x="55" y="82" text-anchor="middle" class="title-text">Client</text>
    <text x="55" y="96" text-anchor="middle" class="small-label">Browser/App</text>
  </g>
  
  <!-- Server Box -->
  <g class="server-box" data-narration="Server: Responds with certificate, negotiates cipher suite">
    <rect x="330" y="60" width="70" height="45" rx="8" fill="url(#serverGradient)" stroke="#5aa05a" stroke-width="2"/>
    <text x="365" y="82" text-anchor="middle" class="title-text">Server</text>
    <text x="365" y="96" text-anchor="middle" class="small-label">Web Server</text>
  </g>
  
  <!-- TLS 1.2 Handshake Messages -->
  <g data-narration="TLS Handshake: 1. ClientHello - Client announces capabilities">
    <rect x="95" y="120" width="105" height="22" rx="4" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.5" class="handshake-msg" style="animation-delay: 0.2s"/>
    <text x="147" y="135" text-anchor="middle" class="label" font-weight="bold">ClientHello</text>
  </g>
  
  <line x1="147" y1="142" x2="147" y2="160" stroke="#888" stroke-width="1.5" stroke-dasharray="4" class="message-line"/>
  
  <g data-narration="TLS Handshake: 2. ServerHello - Server selects cipher suite">
    <rect x="220" y="155" width="105" height="22" rx="4" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.5" class="handshake-msg" style="animation-delay: 0.4s"/>
    <text x="272" y="170" text-anchor="middle" class="label" font-weight="bold">ServerHello</text>
  </g>
  
  <line x1="272" y1="177" x2="272" y2="195" stroke="#888" stroke-width="1.5" stroke-dasharray="4" class="message-line"/>
  
  <g data-narration="TLS Handshake: 3. Certificate - Server sends X.509 certificate for authentication">
    <rect x="220" y="190" width="105" height="22" rx="4" fill="url(#handshakeGradient)" stroke="#ffa000" stroke-width="1.5" class="handshake-msg" style="animation-delay: 0.6s"/>
    <text x="272" y="205" text-anchor="middle" class="label" font-weight="bold">Certificate</text>
  </g>
  
  <line x1="272" y1="212" x2="272" y2="230" stroke="#888" stroke-width="1.5" stroke-dasharray="4" class="message-line"/>
  
  <g data-narration="TLS Handshake: 4. ServerKeyExchange - Optional key exchange parameters">
    <rect x="220" y="225" width="105" height="22" rx="4" fill="url(#handshakeGradient)" stroke="#ffa000" stroke-width="1.5" class="handshake-msg" style="animation-delay: 0.8s"/>
    <text x="272" y="240" text-anchor="middle" class="label" font-weight="bold">ServerKeyExchange</text>
  </g>
  
  <line x1="272" y1="247" x2="272" y2="265" stroke="#888" stroke-width="1.5" stroke-dasharray="4" class="message-line"/>
  
  <g data-narration="TLS Handshake: 5. CertificateRequest - Optional server requests client certificate">
    <rect x="220" y="260" width="105" height="22" rx="4" fill="url(#handshakeGradient)" stroke="#ffa000" stroke-width="1.5" class="handshake-msg" style="animation-delay: 1s"/>
    <text x="272" y="275" text-anchor="middle" class="label" font-weight="bold">CertificateRequest</text>
  </g>
  
  <line x1="272" y1="282" x2="272" y2="300" stroke="#888" stroke-width="1.5" stroke-dasharray="4" class="message-line"/>
  
  <g data-narration="TLS Handshake: 6. ServerHelloDone - Server signals completion of its messages">
    <rect x="220" y="295" width="105" height="22" rx="4" fill="url(#handshakeGradient)" stroke="#ffa000" stroke-width="1.5" class="handshake-msg" style="animation-delay: 1.2s"/>
    <text x="272" y="310" text-anchor="middle" class="label" font-weight="bold">ServerHelloDone</text>
  </g>
  
  <!-- Protocol Architecture Box -->
  <g class="protocol-box" data-narration="Protocol Architecture: Handshake, Record, and Alert protocols work together">
    <rect x="15" y="330" width="120" height="55" rx="6" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1.5"/>
    <text x="75" y="345" text-anchor="middle" class="title-text" font-size="11">Protocol Architecture</text>
    <text x="75" y="360" text-anchor="middle" class="small-label">Handshake Protocol</text>
    <text x="75" y="372" text-anchor="middle" class="small-label">Record Protocol</text>
    <text x="75" y="384" text-anchor="middle" class="small-label">Alert Protocol</text>
  </g>
  
  <!-- Security Services Box -->
  <g class="protocol-box" data-narration="Core Security Services: 1. Confidentiality (encryption), 2. Integrity (MAC), 3. Authentication (certificates)">
    <rect x="145" y="330" width="170" height="55" rx="6" fill="#e8f5e9" stroke="#81c784" stroke-width="1.5"/>
    <text x="230" y="345" text-anchor="middle" class="title-text" font-size="11">Core Security Services</text>
    <text x="175" y="362" text-anchor="middle" class="small-label">🔒 Confidentiality</text>
    <text x="230" y="362" text-anchor="middle" class="small-label">✓ Integrity</text>
    <text x="285" y="362" text-anchor="middle" class="small-label">🔑 Authentication</text>
    <text x="230" y="376" text-anchor="middle" class="small-label" fill="#666">AES-GCM Encryption</text>
    <text x="230" y="386" text-anchor="middle" class="small-label" fill="#666">X.509 Certificates (PKI)</text>
  </g>
  
  <!-- TLS Version Box -->
  <g class="protocol-box" data-narration="Protocol Versions: TLS 1.3 is current standard with reduced latency">
    <rect x="325" y="330" width="80" height="55" rx="6" fill="#fce4ec" stroke="#f48fb1" stroke-width="1.5"/>
    <text x="365" y="345" text-anchor="middle" class="title-text" font-size="11">Versions</text>
    <text x="365" y="360" text-anchor="middle" class="small-label" fill="#888">TLS 1.3</text>
    <text x="365" y="372" text-anchor="middle" class="small-label" fill="#888">TLS 1.2</text>
    <text x="365" y="384" text-anchor="middle" class="small-label" fill="#888">TLS 1.0/1.1</text>
  </g>
  
  <!-- Arrow from Client to Server messages -->
  <path d="M 90 145 Q 147 145 215 165" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="message-line" style="animation-delay: 0.3s"/>
  
  <!-- Connection label -->
  <text x="210" y="118" text-anchor="middle" class="small-label" fill="#666" font-style="italic">TLS 1.2 Full Handshake Flow</text>
</svg>