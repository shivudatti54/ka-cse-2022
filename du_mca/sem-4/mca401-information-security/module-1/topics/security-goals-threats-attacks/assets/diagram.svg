<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="security-goals-threats-attacks">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="confGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8cbcd4;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="integGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e8b8;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#9cd48c;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="availGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4b8;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#d4b88c;stop-opacity:0.8" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; font-family: Arial, sans-serif; font-weight: bold; }
    .section-box { animation: slideInUp 0.8s ease-out forwards; opacity: 0; }
    .section-box:nth-child(1) { animation-delay: 0.2s; }
    .section-box:nth-child(2) { animation-delay: 0.4s; }
    .section-box:nth-child(3) { animation-delay: 0.6s; }
    .section-box:nth-child(4) { animation-delay: 0.8s; }
    .circle-anim { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; }
    .arrow-line { stroke-dasharray: 100; animation: drawLine 1.5s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" font-size="18" fill="#2c5282">
    Security Goals, Threats &amp; Attacks
  </text>
  <line x1="100" y1="40" x2="320" y2="40" stroke="#4a6fa5" stroke-width="2" class="arrow-line" stroke-dasharray="5,5"/>
  
  <!-- CIA Triad Section -->
  <g class="section-box" data-narration="The CIA Triad forms the foundation of information security with three core goals">
    <!-- Confidentiality Circle -->
    <circle cx="130" cy="140" r="45" fill="url(#confGradient)" stroke="#5a9bc4" stroke-width="2" filter="url(#shadow)"/>
    <text x="130" y="135" text-anchor="middle" class="label" fill="#1a365d">C</text>
    <text x="130" y="150" text-anchor="middle" class="label" fill="#1a365d">Confidentiality</text>
    <text x="130" y="165" text-anchor="middle" class="detail" fill="#2c5282">Encryption</text>
    
    <!-- Integrity Circle -->
    <circle cx="210" cy="110" r="45" fill="url(#integGradient)" stroke="#6ab86a" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="105" text-anchor="middle" class="label" fill="#1a365d">I</text>
    <text x="210" y="120" text-anchor="middle" class="label" fill="#1a365d">Integrity</text>
    <text x="210" y="135" text-anchor="middle" class="detail" fill="#276749">Hash Functions</text>
    
    <!-- Availability Circle -->
    <circle cx="170" cy="180" r="45" fill="url(#availGradient)" stroke="#c4a05a" stroke-width="2" filter="url(#shadow)"/>
    <text x="170" y="175" text-anchor="middle" class="label" fill="#1a365d">A</text>
    <text x="170" y="190" text-anchor="middle" class="label" fill="#1a365d">Availability</text>
    <text x="170" y="205" text-anchor="middle" class="detail" fill="#744210">Redundancy</text>
    
    <!-- Center overlap text -->
    <text x="170" y="150" text-anchor="middle" font-size="9" fill="#4a5568" font-family="Arial, sans-serif">Core Controls</text>
  </g>
  
  <!-- Threats Section -->
  <g class="section-box" data-narration="Threats can be passive like eavesdropping or active like masquerade attacks">
    <rect x="5" y="240" width="125" height="70" rx="5" ry="5" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
    <text x="67" y="258" text-anchor="middle" class="label" fill="#2d3748" font-size="13">THREATS</text>
    <line x1="15" y1="265" x2="120" y2="265" stroke="#cbd5e0" stroke-width="1"/>
    <text x="15" y="280" class="detail" fill="#4a5568">Passive: Eavesdropping</text>
    <text x="15" y="295" class="detail" fill="#4a5568">Active: Masquerade</text>
  </g>
  
  <!-- Attack Types Section -->
  <g class="section-box" data-narration="Attack types include interruption, interception, modification, and fabrication">
    <rect x="135" y="240" width="125" height="70" rx="5" ry="5" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
    <text x="197" y="258" text-anchor="middle" class="label" fill="#2d3748" font-size="13">ATTACK TYPES</text>
    <line x1="145" y1="265" x2="250" y2="265" stroke="#cbd5e0" stroke-width="1"/>
    <text x="145" y="280" class="detail" fill="#4a5568">Interruption (DoS)</text>
    <text x="145" y="295" class="detail" fill="#4a5568">Modification</text>
  </g>
  
  <!-- Attack Vectors Section -->
  <g class="section-box" data-narration="Common attack vectors include phishing, malware, and social engineering">
    <rect x="265" y="240" width="125" height="70" rx="5" ry="5" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
    <text x="327" y="258" text-anchor="middle" class="label" fill="#2d3748" font-size="13">ATTACK VECTORS</text>
    <line x1="275" y1="265" x2="380" y2="265" stroke="#cbd5e0" stroke-width="1"/>
    <text x="275" y="280" class="detail" fill="#4a5568">Phishing Emails</text>
    <text x="275" y="295" class="detail" fill="#4a5568">Malware</text>
  </g>
  
  <!-- Relationships Arrow -->
  <g>
    <path d="M 67 320 Q 67 345 170 345 Q 273 345 327 320" fill="none" stroke="#805ad5" stroke-width="2" stroke-dasharray="5,3" class="arrow-line"/>
    <polygon points="327,315 322,325 332,325" fill="#805ad5"/>
  </g>
  
  <!-- Key Concept Box -->
  <g class="section-box" data-narration="The CIA Triad represents the three fundamental security goals that organizations must balance">
    <rect x="135" y="355" width="150" height="35" rx="5" ry="5" fill="#ebf4ff" stroke="#4299e1" stroke-width="1"/>
    <text x="210" y="375" text-anchor="middle" class="detail" fill="#2b6cb0" font-size="11">
      Real-world: AIIMS 2022 Attack
    </text>
  </g>
  
  <!-- Animated pulse circle on CIA center -->
  <circle cx="170" cy="150" r="8" fill="none" stroke="#805ad5" stroke-width="2" class="pulse-anim" opacity="0.7"/>
</svg>