<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="security-policies-models">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4338ca;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pyramidGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f87171;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="secretGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="confidentialGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ca8a04;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#facc15;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="unclassGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .title-text { animation: fadeIn 0.8s ease-out forwards; }
    .section-box { animation: slideIn 0.6s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .pyramid-level { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .level-1 { animation-delay: 0.3s; }
    .level-2 { animation-delay: 0.5s; }
    .level-3 { animation-delay: 0.7s; }
    .level-4 { animation-delay: 0.9s; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .float-element { animation: float 3s ease-in-out infinite; }
    .arrow-line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1s ease-out forwards 1s; }
    @keyframes drawLine { to { stroke-dashoffset: 0; } }
    .label-text { font-family: Arial, sans-serif; font-size: 12px; fill: #1e293b; }
    .title-label { font-family: Arial, sans-serif; font-size: 18px; fill: #1e293b; font-weight: bold; }
    .detail-text { font-family: Arial, sans-serif; font-size: 10px; fill: #475569; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8" />
  
  <!-- Title Section -->
  <g class="title-text">
    <rect x="10" y="10" width="400" height="45" fill="url(#titleGradient)" rx="6" filter="url(#shadow)" />
    <text x="210" y="42" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Security Policies &amp; Models</text>
  </g>
  
  <!-- Classification Pyramid - Multi-Level Security -->
  <g class="section-box" data-narration="The Multi-Level Security Model shows hierarchical data classification: Top Secret (highest), Secret, Confidential, and Unclassified (lowest). This forms the basis for access control decisions.">
    <text x="30" y="75" class="title-label" font-size="13">Classification Levels</text>
  </g>
  
  <!-- Top Secret -->
  <g class="pyramid-level level-1">
    <polygon points="80,85 120,85 100,105" fill="url(#pyramidGradient)" filter="url(#shadow)" />
    <text x="100" y="98" text-anchor="middle" fill="white" font-family="Arial" font-size="9" font-weight="bold">TOP SECRET</text>
  </g>
  
  <!-- Secret -->
  <g class="pyramid-level level-2">
    <polygon points="60,108 140,108 100,138" fill="url(#secretGradient)" filter="url(#shadow)" />
    <text x="100" y="127" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">SECRET</text>
  </g>
  
  <!-- Confidential -->
  <g class="pyramid-level level-3">
    <polygon points="40,141 160,141 100,181" fill="url(#confidentialGradient)" filter="url(#shadow)" />
    <text x="100" y="165" text-anchor="middle" fill="#1e293b" font-family="Arial" font-size="11" font-weight="bold">CONFIDENTIAL</text>
  </g>
  
  <!-- Unclassified -->
  <g class="pyramid-level level-4">
    <polygon points="25,184 175,184 100,234" fill="url(#unclassGradient)" filter="url(#shadow)" />
    <text x="100" y="212" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">UNCLASSIFIED</text>
  </g>
  
  <!-- Security Models Section -->
  <g class="section-box" data-narration="Three key security models: Bell-LaPadula (confidentiality), Biba (integrity), and Clark-Wilson (real-world integrity enforcement).">
    <rect x="210" y="75" width="200" height="55" fill="white" rx="5" filter="url(#shadow)" stroke="#cbd5e1" stroke-width="1" />
    <text x="220" y="90" class="title-label" font-size="12">Security Models</text>
    
    <g class="float-element" style="transform-origin: 250px 115px;">
      <circle cx="250" cy="115" r="18" fill="#fee2e2" />
      <text x="250" y="112" text-anchor="middle" class="label-text" font-size="8" font-weight="bold">BLP</text>
      <text x="250" y="119" text-anchor="middle" class="detail-text" font-size="7">Confidentiality</text>
    </g>
    
    <g class="float-element" style="transform-origin: 310px 115px; animation-delay: 0.5s;">
      <circle cx="310" cy="115" r="18" fill="#dcfce7" />
      <text x="310" y="112" text-anchor="middle" class="label-text" font-size="8" font-weight="bold">BIBA</text>
      <text x="310" y="119" text-anchor="middle" class="detail-text" font-size="7">Integrity</text>
    </g>
    
    <g class="float-element" style="transform-origin: 370px 115px; animation-delay: 1s;">
      <circle cx="370" cy="115" r="18" fill="#fef3c7" />
      <text x="370" y="112" text-anchor="middle" class="label-text" font-size="8" font-weight="bold">CW</text>
      <text x="370" y="119" text-anchor="middle" class="detail-text" font-size="7">Integrity+</text>
    </g>
  </g>
  
  <!-- Policy Types Section -->
  <g class="section-box" data-narration="Three policy types: Organizational (enterprise-wide), System-Specific (technical controls), and Issue-Specific (particular concerns like BYOD).">
    <rect x="210" y="140" width="200" height="70" fill="white" rx="5" filter="url(#shadow)" stroke="#cbd5e1" stroke-width="1" />
    <text x="220" y="155" class="title-label" font-size="12">Policy Types</text>
    
    <rect x="220" y="162" width="55" height="18" fill="#e0e7ff" rx="3" />
    <text x="247" y="174" text-anchor="middle" class="label-text" font-size="8">Organizational</text>
    
    <rect x="282" y="162" width="55" height="18" fill="#e0e7ff" rx="3" />
    <text x="310" y="174" text-anchor="middle" class="label-text" font-size="8">System-Specific</text>
    
    <rect x="345" y="162" width="55" height="18" fill="#e0e7ff" rx="3" />
    <text x="372" y="174" text-anchor="middle" class="label-text" font-size="7">Issue-Specific</text>
    
    <text x="247" y="196" text-anchor="middle" class="detail-text">Data Classification</text>
    <text x="310" y="196" text-anchor="middle" class="detail-text">Firewall Rules</text>
    <text x="372" y="196" text-anchor="middle" class="detail-text">BYOD Policy</text>
  </g>
  
  <!-- BLP Properties -->
  <g class="section-box" data-narration="Bell-LaPadula has two key properties: Simple Security Property (no read up) and *-Property (no write down) to maintain confidentiality.">
    <rect x="210" y="220" width="95" height="80" fill="white" rx="5" filter="url(#shadow)" stroke="#fecaca" stroke-width="1" />
    <text x="220" y="235" fill="#dc2626" font-family="Arial" font-size="11" font-weight="bold">Bell-LaPadula</text>
    <text x="220" y="250" class="detail-text">Simple Security:</text>
    <text x="220" y="262" class="detail-text" font-size="9">✗ No read up</text>
    <text x="220" y="275" class="detail-text">*-Property:</text>
    <text x="220" y="287" class="detail-text" font-size="9">✗ No write down</text>
  </g>
  
  <!-- Biba Properties -->
  <g class="section-box" data-narration="Biba model focuses on integrity with Simple Integrity (no read down) and Integrity *-Property (no write up).">
    <rect x="315" y="220" width="95" height="80" fill="white" rx="5" filter="url(#shadow)" stroke="#bbf7d0" stroke-width="1" />
    <text x="325" y="235" fill="#16a34a" font-family="Arial" font-size="11" font-weight="bold">Biba Model</text>
    <text x="325" y="250" class="detail-text">Simple Integrity:</text>
    <text x="325" y="262" class="detail-text" font-size="9">✗ No read down</text>
    <text x="325" y="275" class="detail-text">Integrity *:</text>
    <text x="325" y="287" class="detail-text" font-size="9">✗ No write up</text>
  </g>
  
  <!-- Policy Lifecycle -->
  <g class="section-box" data-narration="Policy Development Lifecycle: Risk Assessment → Drafting → Implementation → Audit → Continuous Improvement">
    <rect x="10" y="245" width="190" height="45" fill="white" rx="5" filter="url(#shadow)" stroke="#cbd5e1" stroke-width="1" />
    <text x="20" y="260" class="title-label" font-size="11">Policy Lifecycle</text>
    
    <g class="pulse-element" style="transform-origin: 60px 275px;">
      <circle cx="45" cy="275" r="8" fill="#6366f1" />
      <text x="45" y="278" text-anchor="middle" fill="white" font-family="Arial" font-size="8">1</text>
    </g>
    <text x="58" y="278" class="detail-text" font-size="8">Assess</text>
    
    <line x1="60" y1="275" x2="80" y2="275" stroke="#6366f1" stroke-width="2" class="arrow-line" />
    
    <g class="pulse-element" style="transform-origin: 100px 275px; animation-delay: 0.3s;">
      <circle cx="100" cy="275" r="8" fill="#6366f1" />
      <text x="100" y="278" text-anchor="middle" fill="white" font-family="Arial" font-size="8">2</text>
    </g>
    <text x="113" y="278" class="detail-text" font-size="8">Draft</text>
    
    <line x1="115" y1="275" x2="135" y2="275" stroke="#6366f1" stroke-width="2" class="arrow-line" />
    
    <g class="pulse-element" style="transform-origin: 155px 275px; animation-delay: 0.6s;">
      <circle cx="155" cy="275" r="8" fill="#6366f1" />
      <text x="155" y="278" text-anchor="middle" fill="white" font-family="Arial" font-size="8">3</text>
    </g>
    <text x="168" y="278" class="detail-text" font-size="8">Implement</text>
    
    <line x1="170" y1="275" x2="185" y2="275" stroke="#6366f1" stroke-width="2" class="arrow-line" />
    
    <g class="pulse-element" style="transform-origin: 195px 275px; animation-delay: 0.9s;">
      <circle cx="195" cy="275" r="8" fill="#6366f1" />
      <text x="195" y="278" text-anchor="middle" fill="white" font-family="Arial" font-size="8">4</text>
    </g>
  </g>
  
  <!-- RBAC Model -->
  <g class="section-box" data-narration="Role-Based Access Control (RBAC) is NIST-standardized, assigning permissions based on organizational roles rather than individual users.">
    <rect x="10" y="300" width="190" height="50" fill="white" rx="5" filter="url(#shadow)" stroke="#cbd5e1" stroke-width="1" />
    <text x="20" y="315" class="title-label" font-size="11">RBAC Model</text>
    <text x="20" y="330" class="detail-text">NIST-Standardized Role-Based Access</text>
    <text x="20" y="342" class="detail-text">Users → Roles → Permissions</text>
  </g>
  
  <!-- Clark-Wilson -->
  <g class="section-box" data-narration="Clark-Wilson model implements real-world integrity through Certified Data Items (CDI) and Transformation Procedures (TP).">
    <rect x="210" y="310" width="200" height="45" fill="white" rx="5" filter="url(#shadow)" stroke="#fef3c7" stroke-width="1" />
    <text x="220" y="325" fill="#ca8a04" font-family="Arial" font-size="11" font-weight="bold">Clark-Wilson Model</text>
    <text x="220" y="340" class="detail-text">Certified Data Items (CDI) + Transformation Procedures (TP)</text>
    <text x="220" y="350" class="detail-text">Real-world integrity enforcement</text>
  </g>
  
  <!-- Hybrid Models Note -->
  <g class="section-box" data-narration="Modern systems often use hybrid models combining confidentiality, integrity, and availability principles.">
    <rect x="10" y="360" width="400" height="30" fill="url(#titleGradient)" rx="4" filter="url(#shadow)" />
    <text x="210" y="380" text-anchor="middle" fill="white" font-family="Arial" font-size="11">Hybrid Models: Combining BLP + Biba + RBAC for comprehensive security</text>
  </g>
  
  <!-- Connection arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1" />
    </marker>
  </defs>
  <line x1="180" y1="130" x2="205" y2="130" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-line" />
  <line x1="180" y1="175" x2="205" y2="175" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-line" />
</svg>