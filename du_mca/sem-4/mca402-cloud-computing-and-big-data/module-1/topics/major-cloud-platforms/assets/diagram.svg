<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="major-cloud-platforms">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#f5f0ff"/>
    </linearGradient>
    <linearGradient id="awsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9900"/>
      <stop offset="100%" style="stop-color:#ffb84d"/>
    </linearGradient>
    <linearGradient id="azureGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4"/>
      <stop offset="100%" style="stop-color:#50a0dc"/>
    </linearGradient>
    <linearGradient id="gcpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4"/>
      <stop offset="100%" style="stop-color:#7baaf7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes slideInLeft { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInRight { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes drawLine { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
    
    .title { animation: fadeIn 0.8s ease-out; }
    .card-aws { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .card-azure { animation: fadeIn 0.6s ease-out 0.4s both; }
    .card-gcp { animation: slideInRight 0.6s ease-out 0.6s both; }
    .connection { stroke-dasharray: 5,5; animation: drawLine 1s ease-out 0.8s both; }
    .pulse { animation: pulse 2s infinite; transform-origin: center; }
    .box-service { animation: slideIn 0.5s ease-out 1s both; }
    .label { font-family: Arial, sans-serif; }
    .title-text { font-family: Arial, sans-serif; font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text" font-size="20" fill="#2c3e50" data-narration="Main title showing topic: Major Cloud Platforms">Major Cloud Platforms</text>
  
  <!-- Load Balancer -->
  <g class="pulse" data-narration="Load balancer distributes workloads across cloud providers">
    <rect x="160" y="45" width="100" height="35" rx="5" fill="#34495e" filter="url(#shadow)"/>
    <text x="210" y="67" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Load Balancer</text>
  </g>
  
  <!-- AWS Card -->
  <g class="card-aws" filter="url(#shadow)" data-narration="AWS: Amazon Web Services with 200+ services, market leader">
    <rect x="25" y="100" width="115" height="130" rx="8" fill="url(#awsGrad)"/>
    <text x="82" y="125" text-anchor="middle" fill="white" font-size="16" font-weight="bold">AWS</text>
    <text x="82" y="145" text-anchor="middle" fill="white" font-size="10">EC2 • S3 • Lambda</text>
    <text x="82" y="160" text-anchor="middle" fill="white" font-size="9">200+ Services</text>
    <text x="82" y="175" text-anchor="middle" fill="white" font-size="9">Global Leader</text>
    <rect x="35" y="195" width="95" height="25" rx="4" fill="#fff3e0" stroke="#ff9900" stroke-width="1"/>
    <text x="82" y="210" text-anchor="middle" fill="#e65100" font-size="8">First-Mover Advantage</text>
  </g>
  
  <!-- Azure Card -->
  <g class="card-azure" filter="url(#shadow)" data-narration="Microsoft Azure: Enterprise integration, Hybrid cloud with Azure Arc">
    <rect x="152" y="100" width="115" height="130" rx="8" fill="url(#azureGrad)"/>
    <text x="209" y="125" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Azure</text>
    <text x="209" y="145" text-anchor="middle" fill="white" font-size="10">Active Directory</text>
    <text x="209" y="160" text-anchor="middle" fill="white" font-size="10">Azure Arc • Hybrid</text>
    <text x="209" y="175" text-anchor="middle" fill="white" font-size="9">Enterprise Ready</text>
    <rect x="162" y="195" width="95" height="25" rx="4" fill="#e3f2fd" stroke="#0078d4" stroke-width="1"/>
    <text x="209" y="210" text-anchor="middle" fill="#0d47a1" font-size="8">Microsoft Ecosystem</text>
  </g>
  
  <!-- GCP Card -->
  <g class="card-gcp" filter="url(#shadow)" data-narration="Google Cloud Platform: AI/ML and BigData analytics with BigQuery">
    <rect x="280" y="100" width="115" height="130" rx="8" fill="url(#gcpGrad)"/>
    <text x="337" y="125" text-anchor="middle" fill="white" font-size="16" font-weight="bold">GCP</text>
    <text x="337" y="145" text-anchor="middle" fill="white" font-size="10">BigQuery • TensorFlow</text>
    <text x="337" y="160" text-anchor="middle" fill="white" font-size="10">Global Fiber Network</text>
    <text x="337" y="175" text-anchor="middle" fill="white" font-size="9">AI/ML Leader</text>
    <rect x="290" y="195" width="95" height="25" rx="4" fill="#e8eaf6" stroke="#4285f4" stroke-width="1"/>
    <text x="337" y="210" text-anchor="middle" fill="#1a237e" font-size="8">Data Analytics</text>
  </g>
  
  <!-- Connection Lines -->
  <g class="connection" stroke="#34495e" stroke-width="2" fill="none" data-narration="Connection lines showing cross-cloud VPN and workload distribution">
    <path d="M210 80 L82 100" />
    <path d="M210 80 L209 100" />
    <path d="M210 80 L337 100" />
  </g>
  
  <!-- Database Sync -->
  <g data-narration="Database synchronization across clouds">
    <path d="M82 230 Q82 250 145 255 Q209 260 209 230" stroke="#27ae60" stroke-width="2" fill="none" stroke-dasharray="4,2" class="connection"/>
    <path d="M209 230 Q209 250 272 255 Q337 260 337 230" stroke="#27ae60" stroke-width="2" fill="none" stroke-dasharray="4,2" class="connection"/>
    <text x="210" y="270" text-anchor="middle" fill="#27ae60" font-size="10" font-weight="bold">Database Sync</text>
  </g>
  
  <!-- Cross-Cloud VPN -->
  <g data-narration="Cross-cloud VPN for secure communication">
    <rect x="140" y="280" width="140" height="22" rx="4" fill="#5e35b1" opacity="0.9"/>
    <text x="210" y="295" text-anchor="middle" fill="white" font-size="10">Cross-Cloud VPN</text>
  </g>
  
  <!-- Service Models Box -->
  <g class="box-service" data-narration="Cloud Service Models: IaaS, PaaS, SaaS">
    <rect x="25" y="315" width="370" height="75" rx="6" fill="white" stroke="#bdc3c7" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="210" y="335" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">Cloud Service Models</text>
    
    <!-- IaaS -->
    <g>
      <rect x="40" y="345" width="100" height="35" rx="4" fill="#ffe0b2"/>
      <text x="90" y="360" text-anchor="middle" fill="#e65100" font-size="10" font-weight="bold">IaaS</text>
      <text x="90" y="372" text-anchor="middle" fill="#e65100" font-size="8">Bare Metal</text>
    </g>
    
    <!-- PaaS -->
    <g>
      <rect x="160" y="345" width="100" height="35" rx="4" fill="#c8e6c9"/>
      <text x="210" y="360" text-anchor="middle" fill="#2e7d32" font-size="10" font-weight="bold">PaaS</text>
      <text x="210" y="372" text-anchor="middle" fill="#2e7d32" font-size="8">App Runtime</text>
    </g>
    
    <!-- SaaS -->
    <g>
      <rect x="280" y="345" width="100" height="35" rx="4" fill="#bbdefb"/>
      <text x="330" y="360" text-anchor="middle" fill="#1565c0" font-size="10" font-weight="bold">SaaS</text>
      <text x="330" y="372" text-anchor="middle" fill="#1565c0" font-size="8">Full Apps</text>
    </g>
  </g>
  
  <!-- Market Share Indicator -->
  <g data-narration="Market share: AWS 33%, Azure 23%, GCP 10% (66% combined)">
    <text x="395" y="390" text-anchor="end" fill="#7f8c8d" font-size="8">66% Market Share</text>
  </g>
</svg>