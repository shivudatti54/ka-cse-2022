<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="cloud-service-deployment-models" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e9f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8d9f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="publicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="privateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hybridGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="communityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box-public { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box-private { animation: slideInRight 0.6s ease-out 0.3s forwards; opacity: 0; }
    .box-hybrid { animation: slideInLeft 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box-community { animation: slideInRight 0.6s ease-out 0.5s forwards; opacity: 0; }
    .axis-line { animation: fadeIn 0.5s ease-out 0.7s forwards; opacity: 0; }
    .arrow { animation: pulse 2s ease-in-out infinite; }
    .cloud-icon { animation: float 3s ease-in-out infinite; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; }
    .title-text { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1e3a5f; }
    .subtitle { font-family: Arial, sans-serif; font-size: 12px; fill: #475569; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title Section -->
  <g class="title">
    <text x="210" y="28" text-anchor="middle" class="title-text">Cloud Service Deployment Models</text>
    <text x="210" y="45" text-anchor="middle" class="subtitle">Public • Private • Hybrid • Community</text>
  </g>
  
  <!-- Axis Labels -->
  <g class="axis-line">
    <line x1="30" y1="320" x2="200" y2="320" stroke="#64748b" stroke-width="1.5"/>
    <text x="115" y="340" text-anchor="middle" class="detail" fill="#475569">Control →</text>
    <line x1="240" y1="320" x2="390" y2="320" stroke="#64748b" stroke-width="1.5"/>
    <text x="315" y="340" text-anchor="middle" class="detail" fill="#475569">Cost →</text>
    <line x1="30" y1="320" x2="30" y2="250" stroke="#64748b" stroke-width="1.5"/>
    <text x="18" y="290" text-anchor="middle" class="detail" fill="#475569" transform="rotate(-90, 18, 290)">Scalability →</text>
  </g>
  
  <!-- Public Cloud Box -->
  <g class="box-public" data-narration="Public Cloud: Third-party providers deliver services over the public internet with multi-tenancy and pay-as-you-go model">
    <rect x="20" y="70" width="90" height="85" rx="8" fill="url(#publicGrad)" filter="url(#shadow)"/>
    <text x="65" y="92" text-anchor="middle" class="label" fill="#0c4a6e">PUBLIC</text>
    <g class="cloud-icon">
      <path d="M45 115 Q45 105 55 105 Q55 95 70 95 Q80 95 85 102 Q90 95 100 98 Q108 100 108 110 Q108 120 95 120 Z" fill="white" opacity="0.7"/>
    </g>
    <text x="65" y="140" text-anchor="middle" class="detail" fill="#0c4a6e">Multi-tenant</text>
    <text x="65" y="152" text-anchor="middle" class="detail" fill="#0c4a6e">OPEX model</text>
  </g>
  
  <!-- Private Cloud Box -->
  <g class="box-private" data-narration="Private Cloud: Dedicated infrastructure for single organization with enhanced security and compliance for sensitive data">
    <rect x="120" y="70" width="90" height="85" rx="8" fill="url(#privateGrad)" filter="url(#shadow)"/>
    <text x="165" y="92" text-anchor="middle" class="label" fill="#4c1d95">PRIVATE</text>
    <rect x="145" y="105" width="40" height="30" rx="4" fill="white" opacity="0.5"/>
    <rect x="150" y="110" width="30" height="3" rx="1" fill="white" opacity="0.7"/>
    <rect x="150" y="116" width="25" height="3" rx="1" fill="white" opacity="0.7"/>
    <rect x="150" y="122" width="20" height="3" rx="1" fill="white" opacity="0.7"/>
    <text x="165" y="145" text-anchor="middle" class="detail" fill="#4c1d95">Dedicated</text>
    <text x="165" y="157" text-anchor="middle" class="detail" fill="#4c1d95">HIPAA/GDPR</text>
  </g>
  
  <!-- Hybrid Cloud Box -->
  <g class="box-hybrid" data-narration="Hybrid Cloud: Integrates public and private clouds enabling workload portability and burst computing for seasonal demands">
    <rect x="220" y="70" width="90" height="85" rx="8" fill="url(#hybridGrad)" filter="url(#shadow)"/>
    <text x="265" y="92" text-anchor="middle" class="label" fill="#14532d">HYBRID</text>
    <rect x="235" y="105" width="25" height="20" rx="3" fill="white" opacity="0.5"/>
    <rect x="280" y="105" width="25" height="20" rx="3" fill="white" opacity="0.5"/>
    <path d="M263 115 L277 115" stroke="white" stroke-width="2" stroke-dasharray="3,2"/>
    <polygon points="277,115 272,112 272,118" fill="white"/>
    <text x="265" y="140" text-anchor="middle" class="detail" fill="#14532d">Burst computing</text>
    <text x="265" y="152" text-anchor="middle" class="detail" fill="#14532d">Portable</text>
  </g>
  
  <!-- Community Cloud Box -->
  <g class="box-community" data-narration="Community Cloud: Shared infrastructure for specific industry verticals like government or healthcare with shared compliance standards">
    <rect x="320" y="70" width="90" height="85" rx="8" fill="url(#communityGrad)" filter="url(#shadow)"/>
    <text x="365" y="92" text-anchor="middle" class="label" fill="#78350f">COMMUNITY</text>
    <circle cx="350" cy="112" r="8" fill="white" opacity="0.5"/>
    <circle cx="365" cy="112" r="8" fill="white" opacity="0.5"/>
    <circle cx="380" cy="112" r="8" fill="white" opacity="0.5"/>
    <circle cx="350" cy="126" r="8" fill="white" opacity="0.5"/>
    <circle cx="365" cy="126" r="8" fill="white" opacity="0.5"/>
    <text x="365" y="148" text-anchor="middle" class="detail" fill="#78350f">Shared standards</text>
    <text x="365" y="160" text-anchor="middle" class="detail" fill="#78350f">Regulatory</text>
  </g>
  
  <!-- Comparison Indicators -->
  <g class="axis-line">
    <!-- Control indicators -->
    <circle cx="55" cy="325" r="6" fill="#38bdf8"/>
    <circle cx="165" cy="325" r="6" fill="#8b5cf6"/>
    <circle cx="265" cy="325" r="6" fill="#22c55e"/>
    <circle cx="365" cy="325" r="6" fill="#f59e0b"/>
    
    <!-- Scalability indicators -->
    <circle cx="35" cy="270" r="6" fill="#38bdf8"/>
    <circle cx="35" cy="290" r="6" fill="#8b5cf6"/>
    <circle cx="35" cy="310" r="6" fill="#22c55e"/>
  </g>
  
  <!-- Connection Arrows -->
  <g class="arrow">
    <path d="M170 112 Q200 90 220 112" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
  
  <!-- Legend / Key -->
  <g class="axis-line">
    <rect x="25" y="355" width="130" height="35" rx="5" fill="white" opacity="0.8"/>
    <circle cx="40" cy="368" r="5" fill="#38bdf8"/>
    <text x="52" y="372" class="detail" fill="#475569">Public</text>
    <circle cx="95" cy="368" r="5" fill="#8b5cf6"/>
    <text x="107" y="372" class="detail" fill="#475569">Private</text>
    
    <rect x="160" y="355" width="130" height="35" rx="5" fill="white" opacity="0.8"/>
    <circle cx="175" cy="368" r="5" fill="#22c55e"/>
    <text x="187" y="372" class="detail" fill="#475569">Hybrid</text>
    <circle cx="240" cy="368" r="5" fill="#f59e0b"/>
    <text x="252" y="372" class="detail" fill="#475569">Community</text>
  </g>
  
  <!-- Stats badge -->
  <g class="box-hybrid" data-narration="94% of enterprises use cloud services - showing the critical importance of understanding deployment models">
    <rect x="285" y="355" width="120" height="35" rx="5" fill="#1e3a5f" opacity="0.9"/>
    <text x="345" y="370" text-anchor="middle" class="detail" fill="white">94% enterprises</text>
    <text x="345" y="383" text-anchor="middle" class="detail" fill="#94a3b8">use cloud (Flexera)</text>
  </g>
</svg>