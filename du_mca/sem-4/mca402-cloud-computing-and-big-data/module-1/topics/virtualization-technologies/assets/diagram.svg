<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="virtualization-technologies">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8f4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hardwareGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a7d9a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d5a73;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hypervisorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c5cb8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a3d8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d9a8e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="containerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c44d4d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow-anim { animation: arrowPulse 1.5s ease-in-out infinite; }
    .title { font-family: Arial, sans-serif; font-weight: bold; font-size: 20px; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-weight: bold; font-size: 14px; fill: #ffffff; }
    .sublabel { font-family: Arial, sans-serif; font-size: 11px; fill: #ffffff; opacity: 0.9; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
    .box { rx: 6; ry: 6; }
    text { dominant-baseline: middle; text-anchor: middle; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" class="title fade-in">Virtualization Technologies</text>
  
  <!-- Hardware Layer -->
  <g class="slide-in" style="animation-delay: 0.2s" data-narration="Physical Hardware Layer: The base computing resources including CPU, memory, storage, and network interface controllers that form the foundation of virtualization.">
    <rect x="30" y="320" width="360" height="50" fill="url(#hardwareGrad)" class="box" filter="url(#shadow)"/>
    <text x="210" y="338" class="label">Physical Hardware</text>
    <text x="210" y="355" class="sublabel">CPU | Memory | Storage | Network</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M210 310 L210 290" stroke="#7c5cb8" stroke-width="3" fill="none" class="arrow-anim" marker-end="url(#arrowhead)"/>
  <polygon points="205,285 215,285 210,275" fill="#7c5cb8" class="arrow-anim"/>
  
  <!-- Hypervisor Layer -->
  <g class="slide-in" style="animation-delay: 0.4s" data-narration="Hypervisor Layer: Also known as Virtual Machine Monitor (VMM), it manages guest operating systems and allocates physical resources. Type 1 runs directly on hardware; Type 2 runs on an OS.">
    <rect x="30" y="235" width="360" height="55" fill="url(#hypervisorGrad)" class="box" filter="url(#shadow)"/>
    <text x="210" y="255" class="label">Hypervisor (VMM)</text>
    <text x="100" y="275" class="sublabel">Type 1: Bare-metal</text>
    <text x="320" y="275" class="sublabel">Type 2: Hosted</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M210 225 L210 210" stroke="#4ecdc4" stroke-width="3" fill="none" class="arrow-anim"/>
  <polygon points="205,205 215,205 210,195" fill="#4ecdc4" class="arrow-anim"/>
  
  <!-- VM Layer Container -->
  <g class="slide-in" style="animation-delay: 0.6s">
    
    <!-- VM 1 -->
    <g data-narration="Virtual Machine 1: An isolated guest operating system with its own virtualized hardware resources, running complete OS and applications.">
      <rect x="25" y="130" width="115" height="75" fill="url(#vmGrad)" class="box pulse" filter="url(#shadow)"/>
      <text x="82" y="150" class="label" style="font-size:12px;">VM 1</text>
      <text x="82" y="168" class="sublabel">Guest OS + Apps</text>
      <text x="82" y="182" class="sublabel" style="font-size:9px;">vCPU | vRAM | vDisk</text>
    </g>
    
    <!-- VM 2 -->
    <g data-narration="Virtual Machine 2: Another isolated virtual environment demonstrating how multiple VMs share physical hardware through the hypervisor.">
      <rect x="150" y="130" width="115" height="75" fill="url(#vmGrad)" class="box pulse" filter="url(#shadow)" style="animation-delay: 0.3s"/>
      <text x="207" y="150" class="label" style="font-size:12px;">VM 2</text>
      <text x="207" y="168" class="sublabel">Guest OS + Apps</text>
      <text x="207" y="182" class="sublabel" style="font-size:9px;">vCPU | vRAM | vDisk</text>
    </g>
    
    <!-- Container -->
    <g data-narration="Container: Lightweight OS-level virtualization using namespaces and cgroups. Containers share the host kernel, making them faster and more efficient than VMs.">
      <rect x="275" y="130" width="115" height="75" fill="url(#containerGrad)" class="box pulse" filter="url(#shadow)" style="animation-delay: 0.6s"/>
      <text x="332" y="150" class="label" style="font-size:12px;">Container</text>
      <text x="332" y="168" class="sublabel">App + Dependencies</text>
      <text x="332" y="182" class="sublabel" style="font-size:9px;">Shared Kernel</text>
    </g>
    
  </g>
  
  <!-- Key Concepts Box -->
  <g class="fade-in" style="animation-delay: 1s" data-narration="Key Virtualization Techniques: Full Virtualization simulates complete hardware, Paravirtualization requires modified guest OS, Hardware-assisted uses CPU extensions like Intel VT-x.">
    <rect x="25" y="55" width="180" height="60" fill="#ffffff" stroke="#ddd" stroke-width="1" rx="5" filter="url(#shadow)"/>
    <text x="115" y="70" class="detail" style="font-weight:bold; font-size:11px; fill:#333;">Key Techniques</text>
    <text x="115" y="85" class="detail">• Full Virtualization</text>
    <text x="115" y="100" class="detail">• Para-virtualization</text>
    <text x="115" y="115" class="detail">• Hardware-assisted</text>
  </g>
  
  <!-- Benefits Box -->
  <g class="fade-in" style="animation-delay: 1.2s" data-narration="Benefits: 70-80% hardware cost reduction, Live Migration for zero-downtime, Nested Virtualization for cloud development environments.">
    <rect x="215" y="55" width="180" height="60" fill="#ffffff" stroke="#ddd" stroke-width="1" rx="5" filter="url(#shadow)"/>
    <text x="305" y="70" class="detail" style="font-weight:bold; font-size:11px; fill:#333;">Benefits</text>
    <text x="305" y="85" class="detail">• 70-80% cost savings</text>
    <text x="305" y="100" class="detail">• Live Migration</text>
    <text x="305" y="115" class="detail">• Elastic scaling</text>
  </g>
  
  <!-- Connection lines -->
  <g class="arrow-anim" style="animation-delay: 0.8s">
    <path d="M82 205 L82 215" stroke="#5a7d9a" stroke-width="2" stroke-dasharray="4"/>
    <path d="M207 205 L207 215" stroke="#5a7d9a" stroke-width="2" stroke-dasharray="4"/>
    <path d="M332 205 L332 215" stroke="#5a7d9a" stroke-width="2" stroke-dasharray="4"/>
  </g>
  
</svg>