<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="data-analytics-in-cloud" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4f1f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8e0e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5ba3c0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#95d5b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6bc49a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c396;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e89b6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9b1ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a88de1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd6a5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb347;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 1s ease-out; }
    .section-1 { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .section-2 { animation: slideInUp 0.8s ease-out 0.4s both; }
    .section-3 { animation: slideInUp 0.8s ease-out 0.6s both; }
    .section-4 { animation: slideInRight 0.8s ease-out 0.8s both; }
    .section-5 { animation: fadeIn 0.8s ease-out 1s both; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
    .float-element { animation: float 3s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c5f7c" class="title">Data Analytics in Cloud</text>
  <line x1="100" y1="48" x2="320" y2="48" stroke="#5ba3c0" stroke-width="2" class="title"/>
  
  <!-- Data Sources Section -->
  <g class="section-1" data-narration="Data Sources: IoT sensors, applications, and databases generate raw data">
    <rect x="20" y="70" width="80" height="55" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="60" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">Data</text>
    <text x="60" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">Sources</text>
    <circle cx="60" cy="125" r="4" fill="#fff" class="pulse-element"/>
    <circle cx="45" cy="118" r="3" fill="#fff"/>
    <circle cx="75" cy="118" r="3" fill="#fff"/>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="100" y1="97" x2="125" y2="97" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="section-1"/>
  
  <!-- Ingestion Layer -->
  <g class="section-2" data-narration="Ingestion Layer: Azure Data Factory, AWS Kinesis collect and route data">
    <rect x="130" y="70" width="95" height="55" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="177" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Ingestion</text>
    <text x="177" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Layer</text>
    <text x="177" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">(Kinesis/ADF)</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="225" y1="97" x2="250" y2="97" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="section-2"/>
  
  <!-- Processing Cluster -->
  <g class="section-3" data-narration="Processing: Apache Spark on Databricks performs ETL and ML transformations">
    <rect x="255" y="70" width="90" height="55" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="300" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Processing</text>
    <text x="300" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">(Spark/</text>
    <text x="300" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">Databricks)</text>
  </g>
  
  <!-- Arrow down from Processing -->
  <line x1="300" y1="125" x2="300" y2="155" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="section-3"/>
  
  <!-- Storage Layer -->
  <g class="section-4" data-narration="Storage: Data Lake (S3) and Warehouse (Redshift) store raw and processed data">
    <rect x="240" y="160" width="120" height="60" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="300" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">Storage</text>
    <text x="300" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">Data Lake</text>
    <text x="300" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">(S3 / ADLS)</text>
  </g>
  
  <!-- Arrow from Storage to Analytics -->
  <line x1="300" y1="220" x2="300" y2="250" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="section-4"/>
  
  <!-- BI/Visualization Layer -->
  <g class="section-5" data-narration="Visualization: Power BI, Tableau present insights from processed data">
    <rect x="240" y="255" width="120" height="55" rx="8" fill="url(#boxGradient5)" filter="url(#shadow)"/>
    <text x="300" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">Visualization</text>
    <text x="300" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">(Power BI /</text>
    <text x="300" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">Tableau)</text>
  </g>
  
  <!-- Serverless Analytics Box -->
  <g class="section-5" data-narration="Serverless: Athena enables SQL queries without infrastructure management">
    <rect x="340" y="160" width="65" height="50" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)" class="float-element"/>
    <text x="372" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">Serverless</text>
    <text x="372" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">Analytics</text>
    <text x="372" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">(Athena)</text>
  </g>
  
  <!-- Arrow connecting Storage to Serverless -->
  <line x1="360" y1="185" x2="390" y2="185" stroke="#555" stroke-width="2" stroke-dasharray="4,2" class="section-5"/>
  
  <!-- Real-time Processing -->
  <g class="section-3" data-narration="Real-time: Kafka Streams processes events with low latency">
    <rect x="255" y="320" width="90" height="50" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)" class="float-element"/>
    <text x="300" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">Real-time</text>
    <text x="300" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">(Kafka</text>
    <text x="300" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">Streams)</text>
  </g>
  
  <!-- Arrow from Real-time to Visualization -->
  <line x1="280" y1="345" x2="250" y2="345" stroke="#555" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)" class="section-3"/>
  
  <!-- Key Concepts Box -->
  <g class="section-5" data-narration="Key advantages: Horizontal scaling, serverless, AI/ML integration, global availability">
    <rect x="20" y="160" width="100" height="85" rx="8" fill="#fff" stroke="#5ba3c0" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c5f7c">Key Concepts</text>
    <line x1="30" y1="185" x2="110" y2="185" stroke="#5ba3c0" stroke-width="1"/>
    <text x="30" y="202" font-family="Arial, sans-serif" font-size="9" fill="#555">• Data Lake</text>
    <text x="30" y="217" font-family="Arial, sans-serif" font-size="9" fill="#555">• Lambda Arch</text>
    <text x="30" y="232" font-family="Arial, sans-serif" font-size="9" fill="#555">• Serverless</text>
    <text x="30" y="247" font-family="Arial, sans-serif" font-size="9" fill="#555">• Real-time</text>
  </g>
  
  <!-- Cloud Icon -->
  <g class="section-1 float-element" data-narration="Cloud infrastructure provides elastic resources">
    <ellipse cx="60" cy="330" rx="25" ry="12" fill="#fff" opacity="0.8"/>
    <circle cx="50" cy="328" r="10" fill="#fff" opacity="0.8"/>
    <circle cx="70" cy="328" r="10" fill="#fff" opacity="0.8"/>
    <circle cx="60" cy="325" r="10" fill="#fff" opacity="0.8"/>
    <text x="60" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5ba3c0">Cloud</text>
  </g>
  
  <!-- Security Badge -->
  <g class="section-4" data-narration="Security: Encryption AES-256, IAM roles, VPC peering protect data">
    <circle cx="370" cy="340" r="18" fill="#4a7c59" filter="url(#shadow)"/>
    <text x="370" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#fff">🔒</text>
    <text x="370" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">Secure</text>
  </g>
  
  <!-- 5Vs Labels -->
  <g class="section-5" data-narration="Cloud analytics addresses the 5Vs: Volume, Velocity, Variety, Veracity, Value">
    <rect x="130" y="320" width="80" height="40" rx="6" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
    <text x="170" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#555">The 5 Vs</text>
    <text x="170" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#777">V, V, V, V, V</text>
  </g>
  
  <!-- Connecting lines for flow -->
  <path d="M 300 130 L 300 155" stroke="#555" stroke-width="2" fill="none" class="section-2"/>
  <path d="M 240 190 L 240 250" stroke="#555" stroke-width="2" stroke-dasharray="4,2" fill="none" class="section-4"/>
  
</svg>