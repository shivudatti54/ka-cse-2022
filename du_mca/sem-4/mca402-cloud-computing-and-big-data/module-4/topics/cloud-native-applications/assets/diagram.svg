<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="cloud-native-applications">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e0f0ff"/>
    </linearGradient>
    <linearGradient id="containerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="orchGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="meshGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="cicdGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50"/>
      <stop offset="100%" style="stop-color:#8bc34a"/>
    </linearGradient>
    <linearGradient id="serverlessGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2"/>
      <stop offset="100%" style="stop-color:#fcb69f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #fff; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #fff; opacity: 0.9; }
    .section-rect { rx: 8; ry: 8; filter: url(#shadow); }
    .layer-1 { animation: fadeIn 0.6s ease-out 0.1s both; }
    .layer-2 { animation: slideIn 0.6s ease-out 0.3s both; }
    .layer-3 { animation: slideIn 0.6s ease-out 0.5s both; }
    .layer-4 { animation: slideIn 0.6s ease-out 0.7s both; }
    .layer-5 { animation: fadeIn 0.6s ease-out 0.9s both; }
    .pulse-anim { animation: pulse 3s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .arrow { stroke: #666; stroke-width: 2; fill: none; animation: arrowPulse 2s ease-in-out infinite; }
    .icon-text { font-size: 20px; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title">Cloud-Native Applications</text>
  
  <!-- Layer 1: Containers (Bottom) -->
  <g class="layer-1">
    <rect x="30" y="280" width="360" height="55" rx="8" fill="url(#containerGrad)" class="section-rect" data-narration="Containers package applications with dependencies, enabling consistent deployment across environments"/>
    <text x="50" y="302" class="label">🐳 Containers</text>
    <text x="50" y="320" class="detail">Docker • Images • Lightweight isolation</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M210 275 L210 260" class="arrow" marker-end="url(#arrowhead)"/>
  
  <!-- Layer 2: Orchestration -->
  <g class="layer-2">
    <rect x="30" y="200" width="360" height="60" rx="8" fill="url(#orchGrad)" class="section-rect" data-narration="Kubernetes automates deployment, scaling, and management of containerized applications"/>
    <text x="50" y="225" class="label">☸️ Orchestration</text>
    <text x="50" y="243" class="detail">Kubernetes • Pods • Services • Deployments</text>
    <circle cx="350" cy="230" r="18" fill="#fff" opacity="0.2" class="pulse-anim"/>
    <text x="350" y="236" text-anchor="middle" class="icon-text">K8s</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M210 195 L210 180" class="arrow"/>
  
  <!-- Layer 3: Service Mesh -->
  <g class="layer-3">
    <rect x="30" y="125" width="360" height="55" rx="8" fill="url(#meshGrad)" class="section-rect" data-narration="Service Mesh provides traffic management, security, and observability between microservices"/>
    <text x="50" y="147" class="label">🔷 Service Mesh</text>
    <text x="50" y="165" class="detail">Istio • Linkerd • Traffic management • mTLS</text>
    <path d="M340 152 Q360 140 370 152 Q360 164 340 152" fill="#fff" opacity="0.3"/>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M210 120 L210 105" class="arrow"/>
  
  <!-- Layer 4: CI/CD Pipeline -->
  <g class="layer-4">
    <rect x="30" y="55" width="360" height="50" rx="8" fill="url(#cicdGrad)" class="section-rect" data-narration="CI/CD pipelines automate building, testing, and deploying applications for continuous delivery"/>
    <text x="50" y="77" class="label">🔄 CI/CD Pipeline</text>
    <text x="50" y="93" class="detail">Jenkins • GitLab • GitHub Actions • Blue/Green</text>
    <g transform="translate(320, 65)" class="pulse-anim">
      <circle cx="0" cy="0" r="15" fill="#fff" opacity="0.4"/>
      <text x="0" y="5" text-anchor="middle" font-size="14">⟳</text>
    </g>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Key Stats Box -->
  <g class="layer-5">
    <rect x="270" y="320" width="120" height="60" rx="6" fill="#fff" stroke="#4facfe" stroke-width="2" filter="url(#shadow)"/>
    <text x="330" y="342" text-anchor="middle" font-family="Segoe UI" font-size="13" font-weight="bold" fill="#2c3e50">78%</text>
    <text x="330" y="358" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#666">Enterprises use</text>
    <text x="330" y="370" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#666">cloud-native (CNCF)</text>
  </g>
  
  <!-- Legend/Key Concepts -->
  <g transform="translate(20, 355)">
    <circle cx="8" cy="8" r="5" fill="#4facfe"/>
    <text x="20" y="12" font-family="Segoe UI" font-size="10" fill="#555">Microservices</text>
  </g>
  <g transform="translate(120, 355)">
    <circle cx="8" cy="8" r="5" fill="#f5576c"/>
    <text x="20" y="12" font-family="Segoe UI" font-size="10" fill="#555">Observability</text>
  </g>
</svg>