<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="microservices-containers-docker">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4eef7"/>
      <stop offset="100%" style="stop-color:#c5e3f0"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4"/>
      <stop offset="100%" style="stop-color:#357a8c"/>
    </linearGradient>
    <linearGradient id="hostGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5c9ebf"/>
      <stop offset="100%" style="stop-color:#3d7a9e"/>
    </linearGradient>
    <linearGradient id="containerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8d8"/>
      <stop offset="100%" style="stop-color:#5a9cb8"/>
    </linearGradient>
    <linearGradient id="registryGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a87c"/>
      <stop offset="100%" style="stop-color:#d4885a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .float { animation: float 3s ease-in-out infinite; }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c5f6e; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #fff; }
    .label-dark { font-family: Arial, sans-serif; font-size: 11px; fill: #2c5f6e; }
    .detail { font-family: Arial, sans-serif; font-size: 9px; fill: #1a3a47; }
    .concept-box { opacity: 0; animation: fadeIn 0.5s ease-out forwards; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title">Microservices, Containers &amp; Docker</text>
  
  <!-- Docker Client Box -->
  <g class="slide-left" data-narration="Docker CLI - Command line interface for developers to build and manage containers">
    <rect x="20" y="60" width="90" height="100" rx="8" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="65" y="82" text-anchor="middle" class="label" font-size="13" font-weight="bold">Docker Client</text>
    <text x="65" y="100" text-anchor="middle" class="label" font-size="10">(CLI)</text>
    <rect x="30" y="115" width="70" height="35" rx="4" fill="#3d7a8c"/>
    <text x="65" y="130" text-anchor="middle" class="label" font-size="9">docker build</text>
    <text x="65" y="142" text-anchor="middle" class="label" font-size="9">docker run</text>
  </g>
  
  <!-- Arrow from Client to Host -->
  <g class="fade-in delay-1">
    <path d="M115 110 L155 110" stroke="#4a90a4" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <polygon points="155,105 165,110 155,115" fill="#4a90a4"/>
  </g>
  
  <!-- Docker Host -->
  <g class="slide-up delay-2" data-narration="Docker Host - The machine running Docker Engine with daemon managing containers">
    <rect x="160" y="55" width="160" height="230" rx="10" fill="url(#hostGradient)" filter="url(#shadow)"/>
    <text x="240" y="75" text-anchor="middle" class="label" font-size="14" font-weight="bold">Docker Host</text>
    <text x="240" y="88" text-anchor="middle" class="label" font-size="10">(Docker Engine)</text>
    
    <!-- Docker Daemon -->
    <rect x="175" y="100" width="130" height="35" rx="5" fill="#2c5f6e"/>
    <text x="240" y="116" text-anchor="middle" class="label" font-size="11">Docker Daemon</text>
    <text x="240" y="128" text-anchor="middle" class="detail" fill="#a8d4e6">containerd + runc</text>
    
    <!-- Images Box -->
    <rect x="175" y="145" width="60" height="55" rx="5" fill="#e8a87c"/>
    <text x="205" y="162" text-anchor="middle" class="label-dark" font-size="10" font-weight="bold">Images</text>
    <text x="205" y="175" text-anchor="middle" class="detail">microservice:v1</text>
    <text x="205" y="187" text-anchor="middle" class="detail">app:latest</text>
    <text x="205" y="197" text-anchor="middle" class="detail">+ layers</text>
    
    <!-- Containers Box -->
    <rect x="245" y="145" width="60" height="55" rx="5" fill="#7eb8d8"/>
    <text x="275" y="162" text-anchor="middle" class="label-dark" font-size="10" font-weight="bold">Containers</text>
    <text x="275" y="175" text-anchor="middle" class="detail">ms-api-1</text>
    <text x="275" y="187" text-anchor="middle" class="detail">ms-api-2</text>
    <text x="275" y="197" text-anchor="middle" class="detail">ms-auth</text>
    
    <!-- OS/Kernel -->
    <rect x="175" y="210" width="130" height="30" rx="5" fill="#1a4a5a"/>
    <text x="240" y="228" text-anchor="middle" class="label" font-size="10">Linux Kernel + cgroups</text>
  </g>
  
  <!-- Arrow from Host to Registry -->
  <g class="fade-in delay-3">
    <path d="M325 130 L365 130" stroke="#e8a87c" stroke-width="2" fill="none"/>
    <polygon points="360,125 370,130 360,135" fill="#e8a87c"/>
  </g>
  
  <!-- Registry -->
  <g class="slide-right delay-3" data-narration="Docker Registry - Stores and distributes container images (Docker Hub or private)">
    <rect x="335" y="60" width="75" height="100" rx="8" fill="url(#registryGradient)" filter="url(#shadow)"/>
    <text x="372" y="82" text-anchor="middle" class="label" font-size="12" font-weight="bold">Registry</text>
    <text x="372" y="98" text-anchor="middle" class="label" font-size="10">Docker Hub</text>
    <rect x="345" y="108" width="55" height="42" rx="4" fill="#d4885a"/>
    <text x="372" y="122" text-anchor="middle" class="label" font-size="9">Image</text>
    <text x="372" y="135" text-anchor="middle" class="label" font-size="9">Storage</text>
    <text x="372" y="148" text-anchor="middle" class="label" font-size="8">pull/push</text>
  </g>
  
  <!-- Key Concepts Boxes -->
  <g class="fade-in delay-4 concept-box">
    <rect x="15" y="175" width="95" height="50" rx="5" fill="#fff" stroke="#5c9ebf" stroke-width="1.5" opacity="0.9"/>
    <text x="62" y="188" text-anchor="middle" class="label-dark" font-size="10" font-weight="bold">Containers</text>
    <text x="62" y="202" text-anchor="middle" class="detail">Lightweight VM</text>
    <text x="62" y="215" text-anchor="middle" class="detail">Share OS Kernel</text>
  </g>
  
  <g class="fade-in delay-4 concept-box">
    <rect x="15" y="235" width="95" height="50" rx="5" fill="#fff" stroke="#5c9ebf" stroke-width="1.5" opacity="0.9"/>
    <text x="62" y="248" text-anchor="middle" class="label-dark" font-size="10" font-weight="bold">Microservices</text>
    <text x="62" y="262" text-anchor="middle" class="detail">Independent Services</text>
    <text x="62" y="275" text-anchor="middle" class="detail">API Communication</text>
  </g>
  
  <g class="fade-in delay-4 concept-box">
    <rect x="15" y="295" width="95" height="50" rx="5" fill="#fff" stroke="#5c9ebf" stroke-width="1.5" opacity="0.9"/>
    <text x="62" y="308" text-anchor="middle" class="label-dark" font-size="10" font-weight="bold">CI/CD</text>
    <text x="62" y="322" text-anchor="middle" class="detail">Build Once</text>
    <text x="62" y="335" text-anchor="middle" class="detail">Run Anywhere</text>
  </g>
  
  <!-- Bottom Flow Arrow -->
  <g class="fade-in delay-4">
    <path d="M125 330 L200 330" stroke="#4a90a4" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <polygon points="195,325 205,330 195,335" fill="#4a90a4"/>
    <text x="162" y="345" text-anchor="middle" class="label-dark" font-size="8">Orchestration</text>
  </g>
  
  <!-- Orchestration Box -->
  <g class="fade-in delay-4">
    <rect x="210" y="310" width="100" height="45" rx="5" fill="#5c9ebf" filter="url(#shadow)"/>
    <text x="260" y="328" text-anchor="middle" class="label" font-size="11" font-weight="bold">Orchestration</text>
    <text x="260" y="343" text-anchor="middle" class="detail" fill="#e8f4f8">K8s / Docker Swarm</text>
  </g>
  
  <!-- Microservices Icons -->
  <g class="float delay-2">
    <circle cx="330" cy="310" r="15" fill="#7eb8d8" opacity="0.8"/>
    <text x="330" y="314" text-anchor="middle" class="label-dark" font-size="16">API</text>
  </g>
  <g class="float delay-3">
    <circle cx="355" cy="340" r="15" fill="#7eb8d8" opacity="0.8"/>
    <text x="355" y="344" text-anchor="middle" class="label-dark" font-size="16">DB</text>
  </g>
  
  <!-- Connection lines between concepts -->
  <g class="fade-in delay-4">
    <path d="M115 330 L125 330" stroke="#5c9ebf" stroke-width="1.5" fill="none"/>
    <path d="M115 345 L125 345" stroke="#5c9ebf" stroke-width="1.5" fill="none"/>
    <path d="M115 360 L125 360" stroke="#5c9ebf" stroke-width="1.5" fill="none"/>
  </g>
</svg>