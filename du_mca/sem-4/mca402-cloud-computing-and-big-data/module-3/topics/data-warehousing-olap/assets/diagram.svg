<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="data-warehousing-olap" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#b8dce8"/>
    </linearGradient>
    <linearGradient id="factGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e"/>
      <stop offset="100%" style="stop-color:#fecfef"/>
    </linearGradient>
    <linearGradient id="dimGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <linearGradient id="cubeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2"/>
      <stop offset="100%" style="stop-color:#fef9d7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotateCube {
      from { transform: rotateY(0deg); }
      to { transform: rotateY(360deg); }
    }
    .title { animation: fadeIn 1s ease-out; font-family: Arial, sans-serif; font-weight: bold; }
    .box { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .box1 { animation-delay: 0.2s; }
    .box2 { animation-delay: 0.4s; }
    .box3 { animation-delay: 0.6s; }
    .box4 { animation-delay: 0.8s; }
    .fact-table { animation: pulse 2s infinite; transform-origin: center; }
    .connector { animation: fadeIn 1.5s ease-out; }
    .olap-op { animation: slideIn 0.7s ease-out forwards; opacity: 0; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <text x="210" y="30" class="title" fill="#2c3e50" font-size="20" text-anchor="middle" data-narration="Title: Data Warehousing and OLAP - Main topic header">Data Warehousing &amp; OLAP</text>
  
  <!-- Star Schema Section -->
  <g data-narration="Star Schema: Central fact table with dimension tables around it">
    <rect x="160" y="55" width="100" height="25" fill="url(#factGradient)" rx="5" filter="url(#shadow)" class="fact-table"/>
    <text x="210" y="72" fill="#c0392b" font-size="12" font-weight="bold" text-anchor="middle" font-family="Arial">FACT TABLE</text>
    <text x="210" y="85" fill="#c0392b" font-size="10" text-anchor="middle" font-family="Arial">(Sales, Revenue)</text>
  </g>
  
  <!-- Dimension Tables -->
  <g data-narration="Dimension Table: Product - Contains product attributes">
    <rect x="20" y="130" width="80" height="50" fill="url(#dimGradient)" rx="5" filter="url(#shadow)" class="box box1"/>
    <text x="60" y="150" fill="#16a085" font-size="12" font-weight="bold" text-anchor="middle" font-family="Arial">Product</text>
    <text x="60" y="165" fill="#16a085" font-size="9" text-anchor="middle" font-family="Arial">prod_id, name</text>
    <line x1="100" y1="155" x2="160" y2="75" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="connector"/>
  </g>
  
  <g data-narration="Dimension Table: Time - Contains time periods">
    <rect x="320" y="130" width="80" height="50" fill="url(#dimGradient)" rx="5" filter="url(#shadow)" class="box box2"/>
    <text x="360" y="150" fill="#16a085" font-size="12" font-weight="bold" text-anchor="middle" font-family="Arial">Time</text>
    <text x="360" y="165" fill="#16a085" font-size="9" text-anchor="middle" font-family="Arial">time_id, date</text>
    <line x1="320" y1="155" x2="260" y2="75" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="connector"/>
  </g>
  
  <g data-narration="Dimension Table: Location - Contains geographic data">
    <rect x="20" y="250" width="80" height="50" fill="url(#dimGradient)" rx="5" filter="url(#shadow)" class="box box3"/>
    <text x="60" y="270" fill="#16a085" font-size="12" font-weight="bold" text-anchor="middle" font-family="Arial">Location</text>
    <text x="60" y="285" fill="#16a085" font-size="9" text-anchor="middle" font-family="Arial">loc_id, city</text>
    <line x1="100" y1="275" x2="160" y2="90" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="connector"/>
  </g>
  
  <g data-narration="Dimension Table: Customer - Contains customer information">
    <rect x="320" y="250" width="80" height="50" fill="url(#dimGradient)" rx="5" filter="url(#shadow)" class="box box4"/>
    <text x="360" y="270" fill="#16a085" font-size="12" font-weight="bold" text-anchor="middle" font-family="Arial">Customer</text>
    <text x="360" y="285" fill="#16a085" font-size="9" text-anchor="middle" font-family="Arial">cust_id, name</text>
    <line x1="320" y1="275" x2="260" y2="90" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="connector"/>
  </g>
  
  <!-- Data Cube Visualization -->
  <g data-narration="Data Cube: 3D representation of data with measures and dimensions" transform="translate(175, 310)">
    <polygon points="0,30 25,15 50,30 25,45" fill="url(#cubeGradient)" stroke="#8e44ad" stroke-width="2" filter="url(#shadow)"/>
    <polygon points="0,30 25,45 25,60 0,45" fill="#c39bd3" stroke="#8e44ad" stroke-width="1.5"/>
    <polygon points="25,45 50,30 50,45 25,60" fill="#d7bde2" stroke="#8e44ad" stroke-width="1.5"/>
    <text x="25" y="75" fill="#8e44ad" font-size="10" text-anchor="middle" font-family="Arial">Data Cube</text>
  </g>
  
  <!-- OLAP Operations Panel -->
  <g data-narration="OLAP Operations: Roll-up, Drill-down, Slice, Dice, Pivot">
    <rect x="280" y="195" width="130" height="80" fill="#fff9e6" rx="8" stroke="#f39c12" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="345" y="212" fill="#d35400" font-size="11" font-weight="bold" text-anchor="middle" font-family="Arial">OLAP Operations</text>
    <text x="345" y="228" fill="#7f8c8d" font-size="9" text-anchor="middle" font-family="Arial">• Roll-up (Aggregate)</text>
    <text x="345" y="241" fill="#7f8c8d" font-size="9" text-anchor="middle" font-family="Arial">• Drill-down (Detail)</text>
    <text x="345" y="254" fill="#7f8c8d" font-size="9" text-anchor="middle" font-family="Arial">• Slice &amp; Dice (Filter)</text>
    <text x="345" y="267" fill="#7f8c8d" font-size="9" text-anchor="middle" font-family="Arial">• Pivot (Rotate)</text>
  </g>
  
  <!-- Architecture Tiers -->
  <g data-narration="Three-Tier Architecture: Bottom (Data Sources), Middle (OLAP Server), Top (Front-end)">
    <rect x="10" y="195" width="100" height="20" fill="#fadbd8" rx="4" stroke="#e74c3c" stroke-width="1"/>
    <text x="60" y="209" fill="#c0392b" font-size="9" text-anchor="middle" font-family="Arial">Sources</text>
    
    <rect x="10" y="220" width="100" height="20" fill="#d5f5e3" rx="4" stroke="#27ae60" stroke-width="1"/>
    <text x="60" y="234" fill="#1e8449" font-size="9" text-anchor="middle" font-family="Arial">OLAP Server</text>
    
    <rect x="10" y="245" width="100" height="20" fill="#d6eaf8" rx="4" stroke="#3498db" stroke-width="1"/>
    <text x="60" y="259" fill="#2874a6" font-size="9" text-anchor="middle" font-family="Arial">Front-end</text>
  </g>
  
  <!-- ETL Arrow -->
  <g data-narration="ETL Process: Extract, Transform, Load data into warehouse">
    <text x="210" y="360" fill="#2c3e50" font-size="11" text-anchor="middle" font-family="Arial" font-weight="bold">ETL Process</text>
    <path d="M 160 370 L 180 370 L 175 365 M 180 370 L 175 375" stroke="#2c3e50" stroke-width="2" fill="none"/>
    <text x="205" y="375" fill="#34495e" font-size="9" text-anchor="middle" font-family="Arial">E</text>
    <text x="225" y="375" fill="#34495e" font-size="9" text-anchor="middle" font-family="Arial">T</text>
    <text x="245" y="375" fill="#34495e" font-size="9" text-anchor="middle" font-family="Arial">L</text>
  </g>
  
  <!-- MOLAP vs ROLAP -->
  <g data-narration="MOLAP vs ROLAP: Multidimensional vs Relational OLAP approaches">
    <rect x="110" y="355" width="90" height="35" fill="#e8daef" rx="5" stroke="#9b59b6" stroke-width="1" filter="url(#shadow)"/>
    <text x="155" y="368" fill="#7d3c98" font-size="9" font-weight="bold" text-anchor="middle" font-family="Arial">MOLAP</text>
    <text x="155" y="380" fill="#7d3c98" font-size="8" text-anchor="middle" font-family="Arial">Pre-computed cubes</text>
  </g>
  
  <g data-narration="ROLAP: Uses SQL queries on star schema relational databases">
    <rect x="210" y="355" width="90" height="35" fill="#e8f6f3" rx="5" stroke="#1abc9c" stroke-width="1" filter="url(#shadow)"/>
    <text x="255" y="368" fill="#117864" font-size="9" font-weight="bold" text-anchor="middle" font-family="Arial">ROLAP</text>
    <text x="255" y="380" fill="#117864" font-size="8" text-anchor="middle" font-family="Arial">SQL on star schema</text>
  </g>
</svg>