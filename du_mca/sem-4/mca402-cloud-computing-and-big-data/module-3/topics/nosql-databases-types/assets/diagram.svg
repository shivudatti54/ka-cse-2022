<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="nosql-databases-types" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5e6d3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f0e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="docGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95c9b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="kvGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e7ed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8c9db;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cfGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a8c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="graphGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e6d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dcc9a8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: slideIn 0.8s ease-out forwards; }
    .section { animation: fadeIn 0.6s ease-out forwards; }
    .section-1 { animation-delay: 0.2s; }
    .section-2 { animation-delay: 0.4s; }
    .section-3 { animation-delay: 0.6s; }
    .section-4 { animation-delay: 0.8s; }
    .icon { animation: pulse 2s ease-in-out infinite; }
    .arrow-line {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: drawLine 1s ease-out forwards;
      animation-delay: 1s;
    }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <text x="210" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50" class="title">NoSQL Database Types</text>
  <text x="210" y="45" text-anchor="middle" font-size="11" fill="#5a6c7d" class="title">Comparison Diagram</text>
  
  <!-- Section 1: Document -->
  <g class="section section-1" data-narration="Document databases store data as JSON/BSON documents with dynamic schemas, ideal for hierarchical data and nested structures.">
    <rect x="15" y="60" width="90" height="145" rx="8" fill="url(#docGradient)" stroke="#7eb5a6" stroke-width="1.5"/>
    <text x="60" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Document</text>
    <text x="60" y="95" text-anchor="middle" font-size="10" fill="#4a5a6a">JSON/BSON</text>
    <text x="60" y="108" text-anchor="middle" font-size="9" fill="#4a5a6a">Dynamic Schema</text>
    <rect x="22" y="118" width="76" height="28" rx="4" fill="#fff" fill-opacity="0.6"/>
    <text x="60" y="132" text-anchor="middle" font-size="9" fill="#2c3e50">MongoDB</text>
    <text x="60" y="144" text-anchor="middle" font-size="9" fill="#2c3e50">Couchbase</text>
  </g>
  
  <!-- Section 2: Key-Value -->
  <g class="section section-2" data-narration="Key-Value stores are the simplest NoSQL model with unique keys and values, providing high performance for simple queries like session storage.">
    <rect x="115" y="60" width="90" height="145" rx="8" fill="url(#kvGradient)" stroke="#8aa8ba" stroke-width="1.5"/>
    <text x="160" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Key-Value</text>
    <text x="160" y="95" text-anchor="middle" font-size="10" fill="#4a5a6a">Key : Value</text>
    <text x="160" y="108" text-anchor="middle" font-size="9" fill="#4a5a6a">Fast Lookup</text>
    <rect x="122" y="118" width="76" height="28" rx="4" fill="#fff" fill-opacity="0.6"/>
    <text x="160" y="132" text-anchor="middle" font-size="9" fill="#2c3e50">Redis</text>
    <text x="160" y="144" text-anchor="middle" font-size="9" fill="#2c3e50">DynamoDB</text>
  </g>
  
  <!-- Section 3: Column-Family -->
  <g class="section section-3" data-narration="Column-Family stores organize data into columns rather than rows, optimized for querying large datasets like time-series data.">
    <rect x="215" y="60" width="90" height="145" rx="8" fill="url(#cfGradient)" stroke="#a88ba8" stroke-width="1.5"/>
    <text x="260" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Column</text>
    <text x="260" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Family</text>
    <text x="260" y="107" text-anchor="middle" font-size="9" fill="#4a5a6a">Wide Columns</text>
    <rect x="222" y="118" width="76" height="28" rx="4" fill="#fff" fill-opacity="0.6"/>
    <text x="260" y="132" text-anchor="middle" font-size="9" fill="#2c3e50">Cassandra</text>
    <text x="260" y="144" text-anchor="middle" font-size="9" fill="#2c3e50">HBase</text>
  </g>
  
  <!-- Section 4: Graph -->
  <g class="section section-4" data-narration="Graph databases use nodes, edges, and properties to represent data, making them efficient for complex relationships like social networks.">
    <rect x="315" y="60" width="90" height="145" rx="8" fill="url(#graphGradient)" stroke="#b5a88a" stroke-width="1.5"/>
    <text x="360" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Graph</text>
    <circle cx="350" cy="100" r="8" fill="#c9a8c9" class="icon"/>
    <circle cx="370" cy="100" r="8" fill="#c9a8c9" class="icon" style="animation-delay: 0.3s"/>
    <line x1="356" y1="100" x2="364" y2="100" stroke="#8a6a8a" stroke-width="2"/>
    <rect x="322" y="118" width="76" height="28" rx="4" fill="#fff" fill-opacity="0.6"/>
    <text x="360" y="132" text-anchor="middle" font-size="9" fill="#2c3e50">Neo4j</text>
    <text x="360" y="144" text-anchor="middle" font-size="9" fill="#2c3e50">Neptune</text>
  </g>
  
  <!-- Arrows connecting sections -->
  <g data-narration="Arrows show data flow and relationships between different database types">
    <path d="M 105 130 Q 110 130 115 130" stroke="#888" stroke-width="1.5" fill="none" class="arrow-line"/>
    <path d="M 205 130 Q 210 130 215 130" stroke="#888" stroke-width="1.5" fill="none" class="arrow-line" style="animation-delay: 1.2s"/>
    <path d="M 305 130 Q 310 130 315 130" stroke="#888" stroke-width="1.5" fill="none" class="arrow-line" style="animation-delay: 1.4s"/>
  </g>
  
  <!-- Use Cases Section -->
  <g class="section" data-narration="Common use cases include content management, session storage, time-series data, and social networks">
    <rect x="15" y="215" width="390" height="55" rx="6" fill="#fff" fill-opacity="0.7" stroke="#ccc" stroke-width="1"/>
    <text x="210" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Use Cases</text>
    <text x="30" y="250" font-size="10" fill="#4a5a6a">• Profiles</text>
    <text x="95" y="250" font-size="10" fill="#4a5a6a">• Sessions</text>
    <text x="165" y="250" font-size="10" fill="#4a5a6a">• Time-series</text>
    <text x="245" y="250" font-size="10" fill="#4a5a6a">• Social</text>
    <text x="305" y="250" font-size="10" fill="#4a5a6a">• Fraud</text>
    <text x="365" y="250" font-size="10" fill="#4a5a6a">• IoT</text>
  </g>
  
  <!-- CAP Theorem -->
  <g class="section" data-narration="CAP Theorem states NoSQL databases prioritize two of Consistency, Availability, and Partition Tolerance - either AP or CP systems">
    <rect x="15" y="280" width="390" height="55" rx="6" fill="#fff" fill-opacity="0.7" stroke="#ccc" stroke-width="1"/>
    <text x="210" y="297" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">CAP Theorem</text>
    <circle cx="100" cy="320" r="18" fill="#b8e0d2"/>
    <text x="100" y="324" text-anchor="middle" font-size="10" fill="#2c3e50">C</text>
    <circle cx="160" cy="320" r="18" fill="#d4e7ed"/>
    <text x="160" y="324" text-anchor="middle" font-size="10" fill="#2c3e50">A</text>
    <circle cx="220" cy="320" r="18" fill="#e8d4e8"/>
    <text x="220" y="324" text-anchor="middle" font-size="10" fill="#2c3e50">P</text>
    <text x="280" y="315" font-size="9" fill="#4a5a6a">AP: Cassandra</text>
    <text x="280" y="328" font-size="9" fill="#4a5a6a">CP: MongoDB</text>
  </g>
  
  <!-- Key legend -->
  <g class="section" data-narration="Visual legend showing data model indicators">
    <rect x="15" y="345" width="390" height="45" rx="6" fill="#fff" fill-opacity="0.7" stroke="#ccc" stroke-width="1"/>
    <text x="210" y="362" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Data Model Summary</text>
    <rect x="25" y="370" width="10" height="10" rx="2" fill="#b8e0d2"/>
    <text x="40" y="379" font-size="9" fill="#4a5a6a">Flexible Doc</text>
    <rect x="115" y="370" width="10" height="10" rx="2" fill="#d4e7ed"/>
    <text x="130" y="379" font-size="9" fill="#4a5a6a">Pairs</text>
    <rect x="190" y="370" width="10" height="10" rx="2" fill="#e8d4e8"/>
    <text x="205" y="379" font-size="9" fill="#4a5a6a">Column</text>
    <rect x="270" y="370" width="10" height="10" rx="2" fill="#f0e6d2"/>
    <text x="285" y="379" font-size="9" fill="#4a5a6a">Nodes/Edges</text>
    <rect x="350" y="370" width="10" height="10" rx="2" fill="#c9c9c9"/>
    <text x="365" y="379" font-size="9" fill="#4a5a6a">Wide</text>
  </g>
</svg>