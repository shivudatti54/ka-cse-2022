<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="stream-processing" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e6f3ff"/>
    </linearGradient>
    <linearGradient id="streamGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#44a08d"/>
    </linearGradient>
    <linearGradient id="batchGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="speedGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="servingGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes streamFlow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: slideInRight 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .section-4 { animation: fadeIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .stream-line { animation: streamFlow 1s linear infinite; }
    .float-anim { animation: float 3s ease-in-out infinite; }
    .stream-dot { animation: pulse 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="32" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50" class="title-anim">Stream Processing</text>
  <line x1="60" y1="42" x2="360" y2="42" stroke="#4ecdc4" stroke-width="2" class="title-anim"/>
  
  <!-- Section 1: Data Streams (Left) -->
  <g class="section-1" data-narration="Data Streams: Unbounded sequences of timestamped events from sources like IoT sensors, financial transactions, and social media feeds">
    <rect x="15" y="55" width="120" height="85" fill="white" rx="8" filter="url(#shadow)"/>
    <rect x="15" y="55" width="120" height="22" fill="url(#streamGradient)" rx="8"/>
    <text x="75" y="71" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Data Streams</text>
    <text x="75" y="95" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">Unbounded event</text>
    <text x="75" y="108" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">sequences</text>
    <!-- Stream visualization -->
    <path d="M25 130 L55 130" stroke="#4ecdc4" stroke-width="2" stroke-dasharray="5,3" class="stream-line"/>
    <circle cx="25" cy="130" r="3" fill="#4ecdc4" class="stream-dot"/>
    <circle cx="40" cy="130" r="2.5" fill="#44a08d" class="stream-dot" style="animation-delay: 0.3s"/>
    <circle cx="55" cy="130" r="2" fill="#4ecdc4" class="stream-dot" style="animation-delay: 0.6s"/>
    <text x="75" y="148" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#777">Kafka/Pulsar</text>
  </g>
  
  <!-- Section 2: Event Time vs Processing Time (Right) -->
  <g class="section-2" data-narration="Event Time vs Processing Time: Event time is when events occur (source clock), processing time is when the system receives them (server clock). Critical for handling out-of-order data in distributed systems">
    <rect x="145" y="55" width="125" height="85" fill="white" rx="8" filter="url(#shadow)"/>
    <rect x="145" y="55" width="125" height="22" fill="url(#batchGradient)" rx="8"/>
    <text x="207" y="71" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Event vs Processing</text>
    <circle cx="165" cy="100" r="12" fill="#667eea" class="pulse-anim"/>
    <text x="165" y="104" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="white">Event</text>
    <line x1="177" y1="100" x2="195" y2="100" stroke="#999" stroke-width="1.5" stroke-dasharray="3,2"/>
    <circle cx="210" cy="100" r="12" fill="#f5576c" class="pulse-anim" style="animation-delay: 0.5s"/>
    <text x="210" y="104" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="white">Process</text>
    <text x="207" y="125" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#777">Watermarks handle latency</text>
  </g>
  
  <!-- Section 3: Windowing Techniques (Middle) -->
  <g class="section-3" data-narration="Windowing Techniques: Tumbling windows are fixed-size non-overlapping, Sliding windows overlap with fixed size, Session windows group by user activity">
    <rect x="280" y="55" width="125" height="85" fill="white" rx="8" filter="url(#shadow)"/>
    <rect x="280" y="55" width="125" height="22" fill="url(#servingGradient)" rx="8"/>
    <text x="342" y="71" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Windowing</text>
    <!-- Tumbling window -->
    <rect x="290" y="85" width="25" height="10" fill="#4facfe" rx="2"/>
    <text x="302" y="105" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#555">Tumbling</text>
    <!-- Sliding window -->
    <rect x="320" y="85" width="30" height="10" fill="#00f2fe" rx="2" opacity="0.7"/>
    <rect x="335" y="85" width="30" height="10" fill="#00f2fe" rx="2" opacity="0.7"/>
    <text x="337" y="105" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#555">Sliding</text>
    <!-- Session window -->
    <path d="M365 90 Q375 80 385 90" stroke="#4facfe" stroke-width="3" fill="none"/>
    <text x="377" y="105" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#555">Session</text>
    <text x="342" y="125" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#777">Fixed / Sliding / Activity</text>
  </g>
  
  <!-- Section 4: Lambda Architecture (Bottom) -->
  <g class="section-4" data-narration="Lambda Architecture: Three-layer system with Batch Layer for complete accuracy, Speed Layer for real-time results, and Serving Layer to merge and query both">
    <rect x="15" y="155" width="390" height="110" fill="white" rx="10" filter="url(#shadow)"/>
    <rect x="15" y="155" width="390" height="24" fill="#2c3e50" rx="10"/>
    <text x="210" y="172" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Lambda Architecture</text>
    
    <!-- Batch Layer -->
    <g class="float-anim" style="animation-delay: 0s">
      <rect x="30" y="190" width="100" height="65" fill="url(#batchGradient)" rx="8"/>
      <text x="80" y="215" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Batch Layer</text>
      <text x="80" y="232" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="white">Complete</text>
      <text x="80" y="244" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="white">Accuracy</text>
    </g>
    
    <!-- Arrow from Batch to Serving -->
    <path d="M135 222 L160 222" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Speed Layer -->
    <g class="float-anim" style="animation-delay: 0.5s">
      <rect x="165" y="190" width="100" height="65" fill="url(#speedGradient)" rx="8"/>
      <text x="215" y="215" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Speed Layer</text>
      <text x="215" y="232" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="white">Real-time</text>
      <text x="215" y="244" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="white">Latency</text>
    </g>
    
    <!-- Arrow from Speed to Serving -->
    <path d="M270 222 L295 222" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Serving Layer -->
    <g class="float-anim" style="animation-delay: 1s">
      <rect x="300" y="190" width="100" height="65" fill="url(#servingGradient)" rx="8"/>
      <text x="350" y="215" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Serving Layer</text>
      <text x="350" y="232" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="white">Merged</text>
      <text x="350" y="244" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="white">Results</text>
    </g>
    
    <!-- Query arrow -->
    <path d="M350 260 L350 275 L210 275 L210 260" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
    <text x="280" y="288" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">Query</text>
  </g>
  
  <!-- Section 5: State Management (Bottom Right) -->
  <g class="section-4" data-narration="State Management: Operator state is local to each parallel task, Keyed state is partitioned by key. Managed via RocksDB in Apache Flink for fault tolerance">
    <rect x="280" y="280" width="125" height="55" fill="white" rx="8" filter="url(#shadow)"/>
    <rect x="280" y="280" width="125" height="18" fill="url(#streamGradient)" rx="8"/>
    <text x="342" y="293" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="white">State Management</text>
    <rect x="290" y="305" width="40" height="22" fill="#e8f4fc" rx="4" stroke="#4ecdc4" stroke-width="1"/>
    <text x="310" y="317" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#555">Operator</text>
    <rect x="335" y="305" width="40" height="22" fill="#f0f8ff" rx="4" stroke="#44a08d" stroke-width="1"/>
    <text x="355" y="317" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#555">Keyed</text>
  </g>
  
  <!-- Section 6: Fault Tolerance (Bottom Left) -->
  <g class="section-4" data-narration="Fault Tolerance: Checkpointing creates periodic snapshots of operator state, Watermarks track event-time progress to handle late data in distributed systems">
    <rect x="15" y="280" width="125" height="55" fill="white" rx="8" filter="url(#shadow)"/>
    <rect x="15" y="280" width="125" height="18" fill="url(#speedGradient)" rx="8"/>
    <text x="77" y="293" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Fault Tolerance</text>
    <g class="pulse-anim">
      <circle cx="45" cy="315" r="8" fill="#f093fb"/>
      <text x="45" y="318" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="white">Checkpoint</text>
    </g>
    <g class="pulse-anim" style="animation-delay: 0.7s">
      <circle cx="80" cy="315" r="8" fill="#f5576c"/>
      <text x="80" y="318" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="white">Watermark</text>
    </g>
    <g class="pulse-anim" style="animation-delay: 1.4s">
      <circle cx="115" cy="315" r="8" fill="#667eea"/>
      <text x="115" y="318" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="white">Exactly-Once</text>
    </g>
  </g>
  
  <!-- Key insight box -->
  <g class="section-4" data-narration="Real-world impact: PayPal processes 1.4M transactions/hour using Apache Flink for real-time fraud detection">
    <rect x="150" y="345" width="120" height="45" fill="#fff9e6" rx="8" stroke="#ffd93d" stroke-width="1.5"/>
    <text x="210" y="362" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#d4a017">Real-World Impact</text>
    <text x="210" y="378" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#666">PayPal: 1.4M txns/hr</text>
    <text x="210" y="389" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#888">Apache Flink fraud detection</text>
  </g>
</svg>