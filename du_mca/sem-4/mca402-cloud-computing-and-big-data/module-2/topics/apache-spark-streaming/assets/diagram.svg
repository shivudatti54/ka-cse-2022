<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="apache-spark-streaming">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#d4e8f7"/>
      <stop offset="100%" style="stop-color:#c5dbf0"/>
    </linearGradient>
    <linearGradient id="streamGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="clusterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c5cc4"/>
      <stop offset="100%" style="stop-color:#4a3578"/>
    </linearGradient>
    <linearGradient id="outputGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c"/>
      <stop offset="100%" style="stop-color:#3d8b3d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowAnimation {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes streamingDot {
      0% { opacity: 0; transform: translateY(0); }
      50% { opacity: 1; }
      100% { opacity: 0; transform: translateY(30px); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.5s forwards; opacity: 0; }
    .section-4 { animation: slideInRight 0.6s ease-out 0.6s forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .flow-line { animation: flowAnimation 1s linear infinite; }
    .stream-dot { animation: streamingDot 1.5s ease-in-out infinite; }
    .stream-dot-2 { animation: streamingDot 1.5s ease-in-out 0.5s infinite; }
    .stream-dot-3 { animation: streamingDot 1.5s ease-in-out 1s infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d5a87" class="title">Apache Spark Streaming</text>
  
  <!-- Input Sources Section -->
  <g class="section-1" data-narration="Input sources like Kafka, Flume, and HDFS feed live data streams into Spark Streaming">
    <rect x="15" y="50" width="80" height="55" rx="8" fill="url(#streamGradient)" filter="url(#shadow)"/>
    <text x="55" y="72" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Input</text>
    <text x="55" y="88" text-anchor="middle" font-family="Arial" font-size="10" fill="#e8f4fc">Sources</text>
    <text x="55" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#c5dbf0">Kafka, Flume</text>
  </g>
  
  <!-- Arrow from Input to DStream -->
  <g class="flow-line">
    <path d="M95 77 L130 77" stroke="#4a90d9" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
    <polygon points="130,77 122,73 122,81" fill="#4a90d9"/>
  </g>
  
  <!-- DStream / Micro-batch Section -->
  <g class="section-2" data-narration="DStreams (Discretized Streams) divide incoming data into micro-batches, typically 0.5-10 seconds">
    <rect x="130" y="50" width="120" height="55" rx="8" fill="#5b9bd5" filter="url(#shadow)"/>
    <text x="190" y="72" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">DStream</text>
    <text x="190" y="88" text-anchor="middle" font-family="Arial" font-size="10" fill="#e8f4fc">Micro-Batch</text>
    <text x="190" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#c5dbf0">0.5-10 sec</text>
  </g>
  
  <!-- Streaming Dots Animation -->
  <g>
    <circle cx="100" cy="77" r="3" fill="#4a90d9" class="stream-dot"/>
    <circle cx="110" cy="77" r="3" fill="#4a90d9" class="stream-dot-2"/>
    <circle cx="120" cy="77" r="3" fill="#4a90d9" class="stream-dot-3"/>
  </g>
  
  <!-- Arrow from DStream to Spark Cluster -->
  <g class="flow-line">
    <path d="M250 77 L285 77" stroke="#7c5cc4" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
    <polygon points="285,77 277,73 277,81" fill="#7c5cc4"/>
  </g>
  
  <!-- Spark Cluster Section -->
  <g class="section-3" data-narration="Spark Cluster processes the micro-batches using RDDs, enabling fault-tolerant distributed processing">
    <rect x="285" y="50" width="120" height="55" rx="8" fill="url(#clusterGradient)" filter="url(#shadow)"/>
    <text x="345" y="70" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Spark Cluster</text>
    <text x="345" y="86" text-anchor="middle" font-family="Arial" font-size="10" fill="#e8dcf0">RDD Processing</text>
    <text x="345" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#c5b8d8">Fault Tolerant</text>
  </g>
  
  <!-- Horizontal divider -->
  <line x1="15" y1="120" x2="405" y2="120" stroke="#a8c5e2" stroke-width="1" stroke-dasharray="4,2"/>
  
  <!-- Key Concepts Section -->
  <g class="section-3" data-narration="Key streaming concepts include window operations for aggregations over time periods">
    <rect x="15" y="135" width="55" height="45" rx="6" fill="#f0ad4e" filter="url(#shadow)"/>
    <text x="42" y="152" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Window</text>
    <text x="42" y="166" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3cd">Tumbling</text>
    <text x="42" y="177" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3cd">Sliding</text>
  </g>
  
  <g class="section-3" data-narration="Stateful processing maintains context across batches for operations like sessionization">
    <rect x="80" y="135" width="55" height="45" rx="6" fill="#5bc0de" filter="url(#shadow)"/>
    <text x="107" y="152" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Stateful</text>
    <text x="107" y="166" text-anchor="middle" font-family="Arial" font-size="8" fill="#e0f7fa">Session</text>
    <text x="107" y="177" text-anchor="middle" font-family="Arial" font-size="8" fill="#e0f7fa">Tracking</text>
  </g>
  
  <g class="section-3" data-narration="Checkpointing ensures fault recovery by saving metadata and RDD state">
    <rect x="145" y="135" width="55" height="45" rx="6" fill="#d9534f" filter="url(#shadow)"/>
    <text x="172" y="152" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Checkpoint</text>
    <text x="172" y="166" text-anchor="middle" font-family="Arial" font-size="8" fill="#fdecea">Metadata</text>
    <text x="172" y="177" text-anchor="middle" font-family="Arial" font-size="8" fill="#fdecea">RDD Data</text>
  </g>
  
  <g class="section-3" data-narration="Integration with Kafka provides exactly-once semantics for reliable message processing">
    <rect x="210" y="135" width="55" height="45" rx="6" fill="#9b59b6" filter="url(#shadow)"/>
    <text x="237" y="152" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Kafka</text>
    <text x="237" y="166" text-anchor="middle" font-family="Arial" font-size="8" fill="#f4ecf7">Direct API</text>
    <text x="237" y="177" text-anchor="middle" font-family="Arial" font-size="8" fill="#f4ecf7">Exactly-Once</text>
  </g>
  
  <!-- Arrow down from cluster to output -->
  <g class="flow-line">
    <path d="M345 105 L345 165" stroke="#5cb85c" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
    <polygon points="345,165 341,157 349,157" fill="#5cb85c"/>
  </g>
  
  <!-- Output Operations Section -->
  <g class="section-4" data-narration="Processed data is sent to output sinks like databases, file systems, or dashboards">
    <rect x="285" y="195" width="120" height="55" rx="8" fill="url(#outputGradient)" filter="url(#shadow)" class="pulse"/>
    <text x="345" y="217" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Output</text>
    <text x="345" y="233" text-anchor="middle" font-family="Arial" font-size="10" fill="#e8f8e8">Operations</text>
    <text x="345" y="247" text-anchor="middle" font-family="Arial" font-size="9" fill="#c8e8c8">DB, Files, Dashboards</text>
  </g>
  
  <!-- Arrow from cluster to output -->
  <g class="flow-line">
    <path d="M305 195 L305 180 L345 180 L345 195" stroke="#5cb85c" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
    <polygon points="285,195 277,191 277,199" fill="#5cb85c"/>
  </g>
  
  <!-- Bottom use cases section -->
  <rect x="15" y="260" width="260" height="45" rx="8" fill="#ffffff" filter="url(#shadow)" stroke="#e0e8f0"/>
  <text x="145" y="278" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2d5a87">Use Cases</text>
  <text x="30" y="295" font-family="Arial" font-size="9" fill="#666">• Fraud Detection</text>
  <text x="135" y="295" font-family="Arial" font-size="9" fill="#666">• Real-time Recommendations</text>
  <text x="30" y="308" font-family="Arial" font-size="9" fill="#666">• Sentiment Analysis</text>
  <text x="135" y="308" font-family="Arial" font-size="9" fill="#666">• Intrusion Detection</text>
  
  <!-- Driver Program Box -->
  <g class="section-1" data-narration="The Driver Program coordinates the streaming application and defines the processing logic">
    <rect x="310" y="275" width="95" height="50" rx="6" fill="#34495e" filter="url(#shadow)"/>
    <text x="357" y="295" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Driver</text>
    <text x="357" y="310" text-anchor="middle" font-family="Arial" font-size="9" fill="#bdc3c7">Program</text>
    <text x="357" y="322" text-anchor="middle" font-family="Arial" font-size="8" fill="#95a5a6">StreamingContext</text>
  </g>
  
  <!-- Arrow from Driver to DStream -->
  <g class="flow-line">
    <path d="M357 275 L357 130 L250 130 L250 105" stroke="#34495e" stroke-width="1.5" stroke-dasharray="4,2" fill="none"/>
  </g>
  
  <!-- Architecture Label -->
  <text x="210" y="370" text-anchor="middle" font-family="Arial" font-size="11" font-style="italic" fill="#4a6572">Near Real-time Processing (latency ~500ms)</text>
  
  <!-- Legend dots -->
  <circle cx="30" cy="355" r="4" fill="#4a90d9"/>
  <text x="40" cy="358" font-family="Arial" font-size="9" fill="#4a6572">Input</text>
  <circle cx="90" cy="355" r="4" fill="#7c5cc4"/>
  <text x="100" cy="358" font-family="Arial" font-size="9" fill="#4a6572">Processing</text>
  <circle cx="170" cy="355" r="4" fill="#5cb85c"/>
  <text x="180" cy="358" font-family="Arial" font-size="9" fill="#4a6572">Output</text>
</svg>