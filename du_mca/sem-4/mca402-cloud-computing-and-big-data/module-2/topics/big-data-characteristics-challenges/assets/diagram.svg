<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="big-data-characteristics-challenges">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6e6fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b3d9ff" />
      <stop offset="100%" style="stop-color:#7ab3e6" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b3ffd9" />
      <stop offset="100%" style="stop-color:#7ae6b3" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3d9" />
      <stop offset="100%" style="stop-color:#e67ab3" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd9b3" />
      <stop offset="100%" style="stop-color:#e6a87a" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#333" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes titlePulse {
      0%, 100% { text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
      50% { text-shadow: 3px 3px 6px rgba(0,0,0,0.3); }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; animation: titlePulse 2s ease-in-out infinite; }
    .box-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #1a1a2e; }
    .box-label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    .box-detail { font-family: Arial, sans-serif; font-size: 11px; fill: #444; }
    .box-challenge { font-family: Arial, sans-serif; font-size: 10px; fill: #d63031; font-style: italic; }
    .vs-label { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #6c5ce7; }
    .card { filter: url(#shadow); }
    .card1 { animation: fadeIn 0.8s ease-out, pulse 3s ease-in-out infinite 1s; transform-origin: center; }
    .card2 { animation: fadeIn 0.8s ease-out 0.2s both, pulse 3s ease-in-out infinite 1.2s; transform-origin: center; }
    .card3 { animation: fadeIn 0.8s ease-out 0.4s both, pulse 3s ease-in-out infinite 1.4s; transform-origin: center; }
    .card4 { animation: fadeIn 0.8s ease-out 0.6s both, pulse 3s ease-in-out infinite 1.6s; transform-origin: center; }
    .connector { animation: slideIn 0.5s ease-out 1s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" data-narration="Main title showing Big Data Characteristics and Challenges">Big Data: 5Vs Challenges</text>
  
  <!-- Card 1: Volume -->
  <g class="card card1" data-narration="Volume refers to scale of data - petabytes/exabytes with challenges in storage">
    <rect x="15" y="50" width="90" height="85" rx="8" ry="8" fill="url(#boxGradient1)" stroke="#5c9ed9" stroke-width="2"/>
    <text x="60" y="70" text-anchor="middle" class="box-title">VOLUME</text>
    <text x="60" y="88" text-anchor="middle" class="box-detail">30TB/day</text>
    <text x="60" y="100" text-anchor="middle" class="box-detail">Indian Railways</text>
    <text x="60" y="120" text-anchor="middle" class="box-challenge">Storage Cost</text>
  </g>
  
  <!-- Card 2: Velocity -->
  <g class="card card2" data-narration="Velocity is the speed of data generation and processing - real-time processing challenges">
    <rect x="115" y="50" width="90" height="85" rx="8" ry="8" fill="url(#boxGradient2)" stroke="#5cd98d" stroke-width="2"/>
    <text x="160" y="70" text-anchor="middle" class="box-title">VELOCITY</text>
    <text x="160" y="88" text-anchor="middle" class="box-detail">10K txn/sec</text>
    <text x="160" y="100" text-anchor="middle" class="box-detail">Paytm Festivals</text>
    <text x="160" y="120" text-anchor="middle" class="box-challenge">Stream Processing</text>
  </g>
  
  <!-- Card 3: Variety -->
  <g class="card card3" data-narration="Variety covers diverse data types - structured, semi-structured, and unstructured data">
    <rect x="215" y="50" width="90" height="85" rx="8" ry="8" fill="url(#boxGradient3)" stroke="#d97ab3" stroke-width="2"/>
    <text x="260" y="70" text-anchor="middle" class="box-title">VARIETY</text>
    <text x="260" y="88" text-anchor="middle" class="box-detail">Images + Text</text>
    <text x="260" y="100" text-anchor="middle" class="box-detail">+ Sensor Data</text>
    <text x="260" y="120" text-anchor="middle" class="box-challenge">Schema Design</text>
  </g>
  
  <!-- Card 4: Veracity -->
  <g class="card card4" data-narration="Veracity addresses data quality, trustworthiness, and cleansing challenges">
    <rect x="315" y="50" width="90" height="85" rx="8" ry="8" fill="url(#boxGradient4)" stroke="#d9a35c" stroke-width="2"/>
    <text x="360" y="70" text-anchor="middle" class="box-title">VERACITY</text>
    <text x="360" y="88" text-anchor="middle" class="box-detail">Fake News</text>
    <text x="360" y="100" text-anchor="middle" class="box-detail">Detection</text>
    <text x="360" y="120" text-anchor="middle" class="box-challenge">Data Cleansing</text>
  </g>
  
  <!-- Center Connecting Lines -->
  <g class="connector" data-narration="Visual connections showing the interrelationship between the 5Vs">
    <line x1="105" y1="92" x2="115" y2="92" stroke="#888" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="205" y1="92" x2="215" y2="92" stroke="#888" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="305" y1="92" x2="315" y2="92" stroke="#888" stroke-width="2" stroke-dasharray="4,2"/>
  </g>
  
  <!-- Value Box at bottom center -->
  <g class="card card2" data-narration="Value represents the useful insights extracted from big data analysis">
    <rect x="150" y="150" width="120" height="55" rx="8" ry="8" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
    <text x="210" y="172" text-anchor="middle" class="box-label">VALUE</text>
    <text x="210" y="188" text-anchor="middle" class="box-detail">Actionable Insights</text>
    <text x="210" y="202" text-anchor="middle" class="box-challenge">Analysis Tools</text>
  </g>
  
  <!-- Arrows from 5Vs to Value -->
  <g class="connector" data-narration="Arrows showing how all characteristics contribute to extracting value">
    <path d="M60 135 L150 175" stroke="#6c5ce7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M160 135 L180 175" stroke="#6c5ce7" stroke-width="2" fill="none"/>
    <path d="M260 135 L240 175" stroke="#6c5ce7" stroke-width="2" fill="none"/>
    <path d="M360 135 L270 175" stroke="#6c5ce7" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Key Challenges Section -->
  <g class="card" data-narration="Key technical challenges in big data processing and storage">
    <rect x="15" y="220" width="390" height="85" rx="8" ry="8" fill="#fff9e6" stroke="#f39c12" stroke-width="2"/>
    <text x="210" y="242" text-anchor="middle" class="vs-label" data-narration="Key challenges header">KEY CHALLENGES</text>
    
    <!-- Challenge items -->
    <g class="connector">
      <circle cx="35" cy="265" r="5" fill="#e74c3c"/>
      <text x="50" y="269" class="box-detail">HDFS vs RDBMS Storage</text>
      
      <circle cx="35" cy="285" r="5" fill="#e74c3c"/>
      <text x="50" y="289" class="box-detail">Kafka vs RabbitMQ</text>
      
      <circle cx="210" cy="265" r="5" fill="#e74c3c"/>
      <text x="225" y="269" class="box-detail">Schema-on-Read vs Write</text>
      
      <circle cx="210" cy="285" r="5" fill="#e74c3c"/>
      <text x="225" y="289" class="box-detail">Real-time Analytics</text>
      
      <circle cx="380" cy="265" r="5" fill="#e74c3c"/>
      <text x="395" y="269" class="box-detail" text-anchor="end">Data Security</text>
      
      <circle cx="380" cy="285" r="5" fill="#e74c3c"/>
      <text x="395" y="289" class="box-detail" text-anchor="end">Quality Assurance</text>
    </g>
  </g>
  
  <!-- Bottom Info -->
  <g class="connector" data-narration="Footer showing practical applications in Indian context">
    <rect x="15" y="315" width="390" height="75" rx="8" ry="8" fill="#e8f4fc" stroke="#3498db" stroke-width="1"/>
    <text x="210" y="335" text-anchor="middle" class="box-label" fill="#2980b9">PRACTICAL APPLICATIONS (India)</text>
    <text x="210" y="355" text-anchor="middle" class="box-detail">Aadhaar • UPI (40M+/day) • Smart Cities • IoT Sensors</text>
    <text x="210" y="375" text-anchor="middle" class="box-detail">Healthcare Analytics • Financial Fraud Detection</text>
  </g>
</svg>