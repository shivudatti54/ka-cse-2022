<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="hadoop-ecosystem-hdfs-mapreduce">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="50%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#fff3e0"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50"/>
      <stop offset="100%" style="stop-color:#2e7d32"/>
    </linearGradient>
    <linearGradient id="clientGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2196f3"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    <linearGradient id="datanodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800"/>
      <stop offset="100%" style="stop-color:#ef6c00"/>
    </linearGradient>
    <linearGradient id="mapreduceGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9c27b0"/>
      <stop offset="100%" style="stop-color:#6a1b9a"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dataFlow {
      0% { stroke-dashoffset: 100; }
      100% { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s infinite; }
    .data-packet { animation: dataFlow 1.5s linear infinite; }
    
    .section-1 { animation-delay: 0.2s; opacity: 0; }
    .section-2 { animation-delay: 0.4s; opacity: 0; }
    .section-3 { animation-delay: 0.6s; opacity: 0; }
    .section-4 { animation-delay: 0.8s; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a237e" text-anchor="middle">Hadoop Ecosystem: HDFS &amp; MapReduce</text>
  
  <!-- Section 1: HDFS Architecture -->
  <g class="section-1" data-narration="HDFS Architecture showing NameNode managing metadata and DataNodes storing data blocks with 3x replication">
    <rect x="10" y="45" width="130" height="90" fill="white" stroke="#4caf50" stroke-width="2" rx="5"/>
    <text x="75" y="62" font-family="Arial" font-size="13" font-weight="bold" fill="#2e7d32" text-anchor="middle">HDFS Architecture</text>
    
    <!-- NameNode -->
    <rect x="20" y="72" width="55" height="28" fill="url(#nodeGradient)" rx="4"/>
    <text x="47" y="89" font-family="Arial" font-size="10" fill="white" text-anchor="middle">NameNode</text>
    <text x="47" y="100" font-family="Arial" font-size="8" fill="white" text-anchor="middle">Metadata</text>
    
    <!-- DataNodes -->
    <rect x="80" y="72" width="50" height="28" fill="url(#datanodeGradient)" rx="4"/>
    <text x="105" y="89" font-family="Arial" font-size="10" fill="white" text-anchor="middle">DataNode</text>
    <text x="105" y="100" font-family="Arial" font-size="8" fill="white" text-anchor="middle">128MB Blocks</text>
    
    <!-- Replication Arrows -->
    <path d="M 75 86 L 80 86" stroke="#ff5722" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
    <text x="77" y="82" font-family="Arial" font-size="8" fill="#d84315">3x</text>
  </g>
  
  <!-- Section 2: Write Pipeline -->
  <g class="section-2" data-narration="Write Pipeline showing Client writing data to multiple DataNodes in chain with acknowledgment packets">
    <rect x="150" y="45" width="140" height="90" fill="white" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="220" y="62" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100" text-anchor="middle">Write Pipeline</text>
    
    <!-- Client -->
    <rect x="160" y="72" width="35" height="25" fill="url(#clientGradient)" rx="4"/>
    <text x="177" y="87" font-family="Arial" font-size="9" fill="white" text-anchor="middle">Client</text>
    
    <!-- DataNode 1 -->
    <rect x="200" y="72" width="35" height="25" fill="url(#datanodeGradient)" rx="4"/>
    <text x="217" y="87" font-family="Arial" font-size="9" fill="white" text-anchor="middle">DN 1</text>
    
    <!-- DataNode 2 -->
    <rect x="240" y="72" width="35" height="25" fill="url(#datanodeGradient)" rx="4"/>
    <text x="257" y="87" font-family="Arial" font-size="9" fill="white" text-anchor="middle">DN 2</text>
    
    <!-- DataNode 3 -->
    <rect x="200" y="102" width="35" height="25" fill="url(#datanodeGradient)" rx="4"/>
    <text x="217" y="117" font-family="Arial" font-size="9" fill="white" text-anchor="middle">DN 3</text>
    
    <!-- Pipeline Arrows with animation -->
    <path d="M 195 84 L 200 84" stroke="#2196f3" stroke-width="2" stroke-dasharray="4,2" class="data-packet"/>
    <path d="M 235 84 L 240 84" stroke="#2196f3" stroke-width="2" stroke-dasharray="4,2" class="data-packet"/>
    <path d="M 235 97 L 235 102" stroke="#4caf50" stroke-width="2" stroke-dasharray="4,2" class="data-packet"/>
    
    <!-- ACK -->
    <text x="257" y="115" font-family="Arial" font-size="8" fill="#2e7d32">ACK</text>
  </g>
  
  <!-- Section 3: MapReduce Model -->
  <g class="section-3" data-narration="MapReduce processing model showing Map phase, Shuffle and Sort, and Reduce phase with (key, value) transformations">
    <rect x="300" y="45" width="110" height="90" fill="white" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="355" y="62" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a" text-anchor="middle">MapReduce</text>
    
    <!-- Map Box -->
    <rect x="310" y="72" width="30" height="22" fill="url(#mapreduceGradient)" rx="3"/>
    <text x="325" y="85" font-family="Arial" font-size="9" fill="white" text-anchor="middle">Map</text>
    
    <!-- Shuffle Arrow -->
    <text x="342" y="85" font-family="Arial" font-size="10" fill="#666">→</text>
    
    <!-- Shuffle Box -->
    <rect x="350" y="72" width="30" height="22" fill="#ffcc80" rx="3"/>
    <text x="365" y="85" font-family="Arial" font-size="8" fill="#e65100" text-anchor="middle">Shuffle</text>
    
    <!-- Reduce Arrow -->
    <text x="382" y="85" font-family="Arial" font-size="10" fill="#666">→</text>
    
    <!-- Reduce Box -->
    <rect x="390" y="72" width="15" height="22" fill="url(#mapreduceGradient)" rx="3"/>
    <text x="397" y="85" font-family="Arial" font-size="8" fill="white" text-anchor="middle">R</text>
    
    <!-- Flow description -->
    <text x="355" y="108" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">(k,v)→list(k,v)</text>
  </g>
  
  <!-- Section 4: YARN -->
  <g class="section-4" data-narration="YARN resource management with ResourceManager for cluster allocation and NodeManager for per-machine monitoring">
    <rect x="10" y="145" width="130" height="55" fill="white" stroke="#00acc1" stroke-width="2" rx="5"/>
    <text x="75" y="162" font-family="Arial" font-size="12" font-weight="bold" fill="#00838f" text-anchor="middle">YARN</text>
    
    <!-- ResourceManager -->
    <rect x="18" y="170" width="50" height="24" fill="#00bcd4" rx="3"/>
    <text x="43" y="184" font-family="Arial" font-size="9" fill="white" text-anchor="middle">RM</text>
    
    <!-- NodeManager -->
    <rect x="72" y="170" width="50" height="24" fill="#26c6da" rx="3"/>
    <text x="97" y="184" font-family="Arial" font-size="9" fill="white" text-anchor="middle">NM</text>
  </g>
  
  <!-- Section 5: Fault Tolerance -->
  <g class="section-1" data-narration="Fault tolerance mechanisms including DataNode heartbeats, speculative execution, and NameNode checkpointing">
    <rect x="150" y="145" width="130" height="55" fill="white" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="215" y="162" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828" text-anchor="middle">Fault Tolerance</text>
    
    <text x="215" y="178" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Heartbeat | Speculative</text>
    <text x="215" y="190" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Checkpointing</text>
  </g>
  
  <!-- Section 6: Example - Word Count -->
  <g class="section-2" data-narration="Word Count example showing Mapper splitting text into words with count 1, and Reducer aggregating counts per word">
    <rect x="290" y="145" width="120" height="55" fill="white" stroke="#3f51b5" stroke-width="2" rx="5"/>
    <text x="350" y="162" font-family="Arial" font-size="12" font-weight="bold" fill="#283593" text-anchor="middle">Example: Word Count</text>
    
    <text x="350" y="178" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">Map: (word,1)</text>
    <text x="350" y="190" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">Reduce: sum counts</text>
  </g>
  
  <!-- Visual Flow Arrow -->
  <g class="slide-in">
    <path d="M 75 210 Q 210 230 345 210" stroke="#78909c" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Bottom Section: Complete Data Flow -->
  <g data-narration="Complete end-to-end data flow from HDFS storage through MapReduce processing back to HDFS output">
    <rect x="10" y="220" width="400" height="80" fill="white" stroke="#5c6bc0" stroke-width="2" rx="8"/>
    <text x="210" y="240" font-family="Arial" font-size="13" font-weight="bold" fill="#303f9f" text-anchor="middle">Complete Data Flow</text>
    
    <!-- Input HDFS -->
    <rect x="20" y="252" width="50" height="35" fill="url(#nodeGradient)" rx="4" class="pulse"/>
    <text x="45" y="270" font-family="Arial" font-size="9" fill="white" text-anchor="middle">HDFS</text>
    <text x="45" y="282" font-family="Arial" font-size="7" fill="white" text-anchor="middle">Input</text>
    
    <!-- Arrow to Map -->
    <path d="M 70 270 L 110 270" stroke="#2196f3" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="90" y="262" font-family="Arial" font-size="7" fill="#1565c0">Split</text>
    
    <!-- Map -->
    <rect x="110" y="252" width="45" height="35" fill="url(#mapreduceGradient)" rx="4" class="pulse"/>
    <text x="132" y="270" font-family="Arial" font-size="9" fill="white" text-anchor="middle">Map</text>
    <text x="132" y="282" font-family="Arial" font-size="7" fill="white" text-anchor="middle">Parallel</text>
    
    <!-- Arrow to Reduce -->
    <path d="M 155 270 L 195 270" stroke="#9c27b0" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="175" y="262" font-family="Arial" font-size="7" fill="#6a1b9a">Shuffle</text>
    
    <!-- Reduce -->
    <rect x="195" y="252" width="45" height="35" fill="url(#mapreduceGradient)" rx="4" class="pulse"/>
    <text x="217" y="270" font-family="Arial" font-size="9" fill="white" text-anchor="middle">Reduce</text>
    <text x="217" y="282" font-family="Arial" font-size="7" fill="white" text-anchor="middle">Aggregate</text>
    
    <!-- Arrow to Output -->
    <path d="M 240 270 L 280 270" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="260" y="262" font-family="Arial" font-size="7" fill="#2e7d32">Merge</text>
    
    <!-- Output HDFS -->
    <rect x="280" y="252" width="50" height="35" fill="url(#nodeGradient)" rx="4" class="pulse"/>
    <text x="305" y="270" font-family="Arial" font-size="9" fill="white" text-anchor="middle">HDFS</text>
    <text x="305" y="282" font-family="Arial" font-size="7" fill="white" text-anchor="middle">Output</text>
    
    <!-- YARN label -->
    <rect x="330" y="252" width="70" height="35" fill="#00bcd4" rx="4"/>
    <text x="365" y="270" font-family="Arial" font-size="9" fill="white" text-anchor="middle">YARN</text>
    <text x="365" y="282" font-family="Arial" font-size="7" fill="white" text-anchor="middle">Resource</text>
  </g>
  
  <!-- Key Stats -->
  <g data-narration="Real-world Hadoop usage statistics showing Facebook 300+ PB storage and LinkedIn 1.4M+ daily jobs">
    <rect x="10" y="310" width="400" height="35" fill="#eceff1" stroke="#b0bec5" stroke-width="1" rx="5"/>
    <text x="30" y="330" font-family="Arial" font-size="11" fill="#37474f" font-weight="bold">Real-World Use:</text>
    <text x="120" y="330" font-family="Arial" font-size="10" fill="#37474f">FB: 300+ PB in HDFS</text>
    <text x="240" y="330" font-family="Arial" font-size="10" fill="#37474f">LinkedIn: 1.4M+ jobs/day</text>
    <text x="350" y="330" font-family="Arial" font-size="10" fill="#37474f">Aadhaar, UPI</text>
  </g>
  
  <!-- Legend -->
  <g data-narration="Color legend for diagram elements">
    <circle cx="30" cy="360" r="5" fill="#4caf50"/>
    <text x="42" y="364" font-family="Arial" font-size="9" fill="#333">NameNode</text>
    <circle cx="100" cy="360" r="5" fill="#ff9800"/>
    <text x="112" y="364" font-family="Arial" font-size="9" fill="#333">DataNode</text>
    <circle cx="170" cy="360" r="5" fill="#9c27b0"/>
    <text x="182" y="364" font-family="Arial" font-size="9" fill="#333">Map/Reduce</text>
    <circle cx="245" cy="360" r="5" fill="#00bcd4"/>
    <text x="257" y="364" font-family="Arial" font-size="9" fill="#333">YARN</text>
    <circle cx="305" cy="360" r="5" fill="#2196f3"/>
    <text x="317" y="364" font-family="Arial" font-size="9" fill="#333">Data Flow</text>
  </g>
  
  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#78909c"/>
    </marker>
  </defs>
  
  <!-- Decorative corner elements -->
  <rect x="5" y="5" width="15" height="15" fill="#4caf50" rx="2" opacity="0.3"/>
  <rect x="400" y="380" width="15" height="15" fill="#9c27b0" rx="2" opacity="0.3"/>
</svg>