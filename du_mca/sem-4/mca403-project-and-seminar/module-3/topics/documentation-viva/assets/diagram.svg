<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="documentation-viva">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="50%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#fef5e7"/>
    </linearGradient>
    <linearGradient id="docGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <linearGradient id="vivaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2"/>
      <stop offset="100%" style="stop-color:#fef9d7"/>
    </linearGradient>
    <linearGradient id="practiceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89f7fe"/>
      <stop offset="100%" style="stop-color:#66a6ff"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .section-box { rx: 8; ry: 8; stroke: #3498db; stroke-width: 1.5; }
    .title-anim { animation: fadeIn 1s ease-out; }
    .box1 { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .box2 { animation: slideInRight 0.8s ease-out 0.4s both; }
    .box3 { animation: slideInUp 0.8s ease-out 0.6s both; }
    .box4 { animation: slideInUp 0.8s ease-out 0.8s both; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow-line { animation: arrowPulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Documentation &amp; Viva</text>
  
  <!-- Documentation Types Box -->
  <g class="box1" data-narration="Four main types of project documentation: Technical Specifications, User Manuals, Process Documentation, and Test Documentation">
    <rect x="15" y="50" width="130" height="110" fill="#fff" class="section-box" stroke="#e74c3c"/>
    <text x="80" y="68" text-anchor="middle" class="label" fill="#c0392b">Doc Types</text>
    <circle cx="30" cy="90" r="4" fill="#e74c3c"/>
    <text x="40" y="94" class="detail">Technical Specs</text>
    <circle cx="30" cy="110" r="4" fill="#e74c3c"/>
    <text x="40" y="114" class="detail">User Manuals</text>
    <circle cx="30" cy="130" r="4" fill="#e74c3c"/>
    <text x="40" y="134" class="detail">Process Docs</text>
    <circle cx="30" cy="150" r="4" fill="#e74c3c"/>
    <text x="40" y="154" class="detail">Test Docs</text>
  </g>
  
  <!-- Best Practices Box -->
  <g class="box2" data-narration="Documentation best practices include DRY principle, version control with Git, automated tools like Sphinx, and WCAG accessibility compliance">
    <rect x="275" y="50" width="130" height="110" fill="#fff" class="section-box" stroke="#27ae60"/>
    <text x="340" y="68" text-anchor="middle" class="label" fill="#27ae60">Best Practices</text>
    <circle cx="290" cy="90" r="4" fill="#27ae60"/>
    <text x="300" y="94" class="detail">DRY Principle</text>
    <circle cx="290" cy="110" r="4" fill="#27ae60"/>
    <text x="300" y="114" class="detail">Git + Markdown</text>
    <circle cx="290" cy="130" r="4" fill="#27ae60"/>
    <text x="300" y="134" class="detail">Auto Docs</text>
    <circle cx="290" cy="150" r="4" fill="#27ae60"/>
    <text x="300" y="154" class="detail">WCAG 2.1</text>
  </g>
  
  <!-- Documentation Lifecycle -->
  <g class="box3" data-narration="Documentation lifecycle shows stages from planning through finalization, following an iterative process">
    <rect x="145" y="50" width="130" height="70" fill="url(#docGradient)" class="section-box" stroke="#9b59b6"/>
    <text x="210" y="68" text-anchor="middle" class="label" fill="#8e44ad">Doc Lifecycle</text>
    <text x="210" y="85" text-anchor="middle" class="detail">Planning → Drafting →</text>
    <text x="210" y="100" text-anchor="middle" class="detail">Review → Version Ctrl → Final</text>
  </g>
  
  <!-- Lifecycle Arrows -->
  <g class="arrow-line">
    <defs>
      <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <polygon points="0 0, 6 3, 0 6" fill="#9b59b6"/>
      </marker>
    </defs>
    <line x1="160" y1="130" x2="160" y2="155" stroke="#9b59b6" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="260" y1="130" x2="260" y2="155" stroke="#9b59b6" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Viva Preparation Box -->
  <g class="box4" data-narration="Viva voce preparation uses 3-Layer Defense Strategy covering technical implementation, algorithmic choices, and system limitations, plus the STAR answer framework">
    <rect x="15" y="175" width="185" height="90" fill="url(#vivaGradient)" class="section-box" stroke="#8e44ad"/>
    <text x="107" y="193" text-anchor="middle" class="label" fill="#6c3483">Viva Preparation</text>
    <circle cx="30" cy="215" r="4" fill="#8e44ad"/>
    <text x="42" y="219" class="detail">3-Layer Defense</text>
    <circle cx="30" cy="235" r="4" fill="#8e44ad"/>
    <text x="42" y="239" class="detail">Technical Details</text>
    <circle cx="110" cy="215" r="4" fill="#8e44ad"/>
    <text x="122" y="219" class="detail">Algo Choices</text>
    <circle cx="110" cy="235" r="4" fill="#8e44ad"/>
    <text x="122" y="239" class="detail">Limitations/Future</text>
    <circle cx="155" cy="255" r="4" fill="#8e44ad"/>
    <text x="167" y="259" class="detail">STAR Framework</text>
  </g>
  
  <!-- Key Benefits Box -->
  <g class="box4" data-narration="According to IEEE standards, proper documentation reduces software maintenance costs by 40-60%">
    <rect x="210" y="175" width="195" height="90" fill="url(#practiceGradient)" class="section-box" stroke="#2980b9"/>
    <text x="307" y="193" text-anchor="middle" class="label" fill="#1a5276">Key Benefits</text>
    <circle cx="225" cy="215" r="5" fill="#2980b9" class="pulse-element"/>
    <text x="240" y="219" class="detail">40-60% Cost Reduction</text>
    <text x="240" y="233" class="detail" fill="#555">(IEEE Standards)</text>
    <circle cx="225" cy="250" r="5" fill="#2980b9" class="pulse-element"/>
    <text x="240" y="254" class="detail">Industry-Ready Skills</text>
    <text x="240" y="268" class="detail" fill="#555">Career Preparation</text>
  </g>
  
  <!-- Connecting Arrow -->
  <g>
    <path d="M 107 265 L 107 285 L 210 285 L 210 265" fill="none" stroke="#34495e" stroke-width="1.5" stroke-dasharray="4,2" class="arrow-line"/>
    <polygon points="210,265 205,260 215,260" fill="#34495e"/>
  </g>
  
  <!-- Bottom Summary -->
  <g class="box4" data-narration="The combination of thorough documentation and strong viva performance demonstrates comprehensive understanding of the project">
    <rect x="15" y="295" width="390" height="40" fill="#ecf0f1" class="section-box" stroke="#7f8c8d" rx="5"/>
    <text x="210" y="312" text-anchor="middle" class="detail" fill="#2c3e50">Documentation bridges theory &amp; practice • Viva mirrors real-world technical reviews</text>
    <text x="210" y="326" text-anchor="middle" class="detail" fill="#7f8c8d">Together they demonstrate comprehensive academic understanding</text>
  </g>
</svg>