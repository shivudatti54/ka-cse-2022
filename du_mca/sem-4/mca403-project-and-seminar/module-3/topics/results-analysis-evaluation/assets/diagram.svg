<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="results-analysis-evaluation" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dff0"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf"/>
      <stop offset="100%" style="stop-color:#88d8b0"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba"/>
      <stop offset="100%" style="stop-color:#ffdfba"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae1ff"/>
      <stop offset="100%" style="stop-color:#baffc9"/>
    </linearGradient>
    <linearGradient id="matrixGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .section2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .section3 { animation: slideUp 0.6s ease-out 0.3s both; }
    .section4 { animation: slideUp 0.6s ease-out 0.5s both; }
    .matrix-cell { animation: pulse 2s infinite; }
    .metric-box { animation: fadeIn 0.5s ease-out; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Results Analysis &amp; Evaluation</text>
  
  <!-- Confusion Matrix Section -->
  <g class="section1" data-narration="Confusion Matrix: Visualizes classification results with Actual vs Predicted classes showing TP, TN, FP, FN">
    <rect x="20" y="45" width="160" height="150" fill="url(#matrixGradient)" rx="8" filter="url(#shadow)"/>
    <text x="100" y="62" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#34495e">CONFUSION MATRIX</text>
    
    <!-- Matrix Header -->
    <rect x="25" y="70" width="70" height="20" fill="#3498db" rx="3"/>
    <text x="60" y="84" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Pred: Positive</text>
    <rect x="105" y="70" width="70" height="20" fill="#e74c3c" rx="3"/>
    <text x="140" y="84" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Pred: Negative</text>
    
    <!-- Matrix Rows -->
    <rect x="25" y="95" width="70" height="25" fill="#27ae60" rx="3"/>
    <text x="60" y="112" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">TP: 45</text>
    <rect x="105" y="95" width="70" height="25" fill="#f39c12" rx="3"/>
    <text x="140" y="112" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">FN: 5</text>
    
    <rect x="25" y="125" width="70" height="25" fill="#e74c3c" rx="3"/>
    <text x="60" y="142" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">FP: 8</text>
    <rect x="105" y="125" width="70" height="25" fill="#27ae60" rx="3"/>
    <text x="140" y="142" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">TN: 42</text>
    
    <!-- Row Labels -->
    <text x="25" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50" transform="rotate(-90, 25, 108)">Actual: Positive</text>
    <text x="25" y="138" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50" transform="rotate(-90, 25, 138)">Actual: Negative</text>
  </g>
  
  <!-- Performance Metrics Section -->
  <g class="section2" data-narration="Performance Metrics: Key evaluation measures for classification, regression and clustering models">
    <rect x="190" y="45" width="205" height="75" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="292" y="62" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#34495e">PERFORMANCE METRICS</text>
    
    <text x="200" y="82" font-family="Arial" font-size="10" fill="#2c3e50">• Precision: TP/(TP+FP) = 0.85</text>
    <text x="200" y="97" font-family="Arial" font-size="10" fill="#2c3e50">• Recall: TP/(TP+FN) = 0.90</text>
    <text x="200" y="112" font-family="Arial" font-size="10" fill="#2c3e50">• F1-Score: 2×P×R/(P+R) = 0.87</text>
  </g>
  
  <!-- Statistical Testing Section -->
  <g class="section3" data-narration="Statistical Significance: Parametric and non-parametric tests with p-value interpretation">
    <rect x="20" y="205" width="185" height="85" fill="url(#boxGradient1)" rx="8" filter="url(#shadow)"/>
    <text x="112" y="222" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">STATISTICAL TESTING</text>
    
    <text x="30" y="242" font-family="Arial" font-size="10" fill="#2c3e50">• t-test, ANOVA (Parametric)</text>
    <text x="30" y="257" font-family="Arial" font-size="10" fill="#2c3e50">• Mann-Whitney, Chi-square</text>
    <text x="30" y="272" font-family="Arial" font-size="10" fill="#2c3e50">• p-value &lt; 0.05 = Significant</text>
    <text x="30" y="287" font-family="Arial" font-size="10" fill="#2c3e50">• Type I/II Error Analysis</text>
  </g>
  
  <!-- Validation Techniques Section -->
  <g class="section4" data-narration="Validation Techniques: Methods to ensure model generalizability">
    <rect x="215" y="130" width="180" height="70" fill="url(#boxGradient2)" rx="8" filter="url(#shadow)"/>
    <text x="305" y="147" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">VALIDATION TECHNIQUES</text>
    
    <text x="225" y="167" font-family="Arial" font-size="10" fill="#2c3e50">• k-Fold Cross-Validation</text>
    <text x="225" y="182" font-family="Arial" font-size="10" fill="#2c3e50">• Holdout Method (Train/Test)</text>
    <text x="225" y="197" font-family="Arial" font-size="10" fill="#2c3e50">• Bootstrapping</text>
  </g>
  
  <!-- Visual Analysis Section -->
  <g class="section3" data-narration="Visual Analysis: Box plots, ROC curves, and heatmaps for data exploration">
    <rect x="20" y="300" width="120" height="55" fill="url(#boxGradient3)" rx="8" filter="url(#shadow)"/>
    <text x="80" y="317" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2c3e50">VISUAL ANALYSIS</text>
    <text x="30" y="335" font-family="Arial" font-size="9" fill="#2c3e50">• Box plots (outliers)</text>
    <text x="30" y="350" font-family="Arial" font-size="9" fill="#2c3e50">• ROC curves</text>
  </g>
  
  <!-- Error Analysis Section -->
  <g class="section4" data-narration="Error Analysis: Understanding model bias-variance tradeoff">
    <rect x="150" y="300" width="120" height="55" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="210" y="317" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2c3e50">ERROR ANALYSIS</text>
    <text x="160" y="335" font-family="Arial" font-size="9" fill="#2c3e50">• Bias-Variance</text>
    <text x="160" y="350" font-family="Arial" font-size="9" fill="#2c3e50">• RMSE, R² metrics</text>
  </g>
  
  <!-- Arrow Connections -->
  <g class="section1" data-narration="Flow: Data flows from testing to metrics to validation">
    <path d="M180 95 L190 95" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M180 130 L190 130" stroke="#27ae60" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Legend/Formula Box -->
  <g class="section2" data-narration="Key formula: Accuracy = (TP+TN)/(TP+TN+FP+FN)">
    <rect x="280" y="210" width="125" height="50" fill="#fff9e6" rx="6" stroke="#f39c12" stroke-width="1"/>
    <text x="342" y="228" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e67e22">ACCURACY FORMULA</text>
    <text x="342" y="250" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Accuracy = 87/100</text>
    <text x="342" y="262" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">= 87%</text>
  </g>
  
  <!-- Bottom Info -->
  <g class="section1" data-narration="MCA Program: DU's Master of Computer Applications focuses on practical data analysis skills">
    <text x="210" y="375" text-anchor="middle" font-family="Arial" font-size="9" fill="#7f8c8d">DU MCA • Results Analysis &amp; Evaluation Module</text>
  </g>
</svg>