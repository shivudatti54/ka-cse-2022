<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="literature-review-methodology">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4FD"/>
      <stop offset="50%" style="stop-color:#FDF2E9"/>
      <stop offset="100%" style="stop-color:#E8EAF6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546E7A"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-15px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(15px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .title { animation: fadeIn 1s ease-out; }
    .box1 { animation: slideInDown 0.6s ease-out 0.2s both; }
    .box2 { animation: slideInDown 0.6s ease-out 0.35s both; }
    .box3 { animation: slideInDown 0.6s ease-out 0.5s both; }
    .box4 { animation: slideInUp 0.6s ease-out 0.65s both; }
    .box5 { animation: slideInUp 0.6s ease-out 0.8s both; }
    .box6 { animation: slideInUp 0.6s ease-out 0.95s both; }
    .arrow { animation: fadeIn 0.5s ease-out 1.2s both; }
    .label { animation: slideInLeft 0.4s ease-out 1.3s both; }
    .subtitle { animation: fadeIn 0.8s ease-out 0.8s both; }
    .highlight { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#37474F" class="title">Literature Review</text>
  <text x="210" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#546E7A" class="subtitle">Methodology Flowchart</text>
  
  <!-- Process Boxes Row 1 -->
  <g class="box1" data-narration="Step 1: Define your research question using PICO framework">
    <rect x="20" y="75" width="115" height="65" rx="8" fill="#BBDEFB" filter="url(#shadow)"/>
    <rect x="20" y="75" width="115" height="22" rx="8" fill="#64B5F6"/>
    <text x="77" y="90" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">1. Research</text>
    <text x="77" y="90" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">Question</text>
    <text x="77" y="118" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565C0">PICO Framework</text>
    <text x="77" y="131" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565C0">Problem definition</text>
  </g>
  
  <g class="box2" data-narration="Step 2: Design search strategy with Boolean operators and select databases">
    <rect x="152" y="75" width="115" height="65" rx="8" fill="#C8E6C9" filter="url(#shadow)"/>
    <rect x="152" y="75" width="115" height="22" rx="8" fill="#81C784"/>
    <text x="209" y="88" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">2. Search</text>
    <text x="209" y="88" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">Strategy</text>
    <text x="209" y="118" text-anchor="middle" font-family="Arial" font-size="10" fill="#2E7D32">Boolean operators</text>
    <text x="209" y="131" text-anchor="middle" font-family="Arial" font-size="9" fill="#2E7D32">Scopus, IEEE, ACM</text>
  </g>
  
  <g class="box3" data-narration="Step 3: Screen papers using inclusion/exclusion criteria funnel">
    <rect x="284" y="75" width="115" height="65" rx="8" fill="#FFCCBC" filter="url(#shadow)"/>
    <rect x="284" y="75" width="115" height="22" rx="8" fill="#FF8A65"/>
    <text x="341" y="88" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">3. Screening</text>
    <text x="341" y="88" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">Funnel</text>
    <text x="341" y="118" text-anchor="middle" font-family="Arial" font-size="10" fill="#D84315">PRISMA criteria</text>
    <text x="341" y="131" text-anchor="middle" font-family="Arial" font-size="9" fill="#D84315">Title/Abstract review</text>
  </g>
  
  <!-- Arrows Row 1 -->
  <g class="arrow">
    <line x1="135" y1="107" x2="150" y2="107" stroke="#546E7A" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g class="arrow">
    <line x1="267" y1="107" x2="282" y2="107" stroke="#546E7A" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Process Boxes Row 2 -->
  <g class="box4" data-narration="Step 4: Assess quality of selected studies using JBI tools">
    <rect x="20" y="175" width="115" height="65" rx="8" fill="#E1BEE7" filter="url(#shadow)"/>
    <rect x="20" y="175" width="115" height="22" rx="8" fill="#BA68C8"/>
    <text x="77" y="188" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">4. Quality</text>
    <text x="77" y="188" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">Assessment</text>
    <text x="77" y="218" text-anchor="middle" font-family="Arial" font-size="10" fill="#6A1B9A">JBI Critical</text>
    <text x="77" y="231" text-anchor="middle" font-family="Arial" font-size="9" fill="#6A1B9A">Appraisal Tools</text>
  </g>
  
  <g class="box5" data-narration="Step 5: Extract data using coding sheets for technical parameters">
    <rect x="152" y="175" width="115" height="65" rx="8" fill="#FFF9C4" filter="url(#shadow)"/>
    <rect x="152" y="175" width="115" height="22" rx="8" fill="#FFD54F"/>
    <text x="209" y="188" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">5. Data</text>
    <text x="209" y="188" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">Extraction</text>
    <text x="209" y="218" text-anchor="middle" font-family="Arial" font-size="10" fill="#F57F17">Coding sheets</text>
    <text x="209" y="231" text-anchor="middle" font-family="Arial" font-size="9" fill="#F57F17">Algorithms, datasets</text>
  </g>
  
  <g class="box6" data-narration="Step 6: Synthesize findings through thematic analysis">
    <rect x="284" y="175" width="115" height="65" rx="8" fill="#B2DFDB" filter="url(#shadow)"/>
    <rect x="284" y="175" width="115" height="22" rx="8" fill="#4DB6AC"/>
    <text x="341" y="188" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">6. Synthesis</text>
    <text x="341" y="188" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">&amp; Reporting</text>
    <text x="341" y="218" text-anchor="middle" font-family="Arial" font-size="10" fill="#00695C">Thematic analysis</text>
    <text x="341" y="231" text-anchor="middle" font-family="Arial" font-size="9" fill="#00695C">NVivo, Gap findings</text>
  </g>
  
  <!-- Arrows Row 2 -->
  <g class="arrow">
    <line x1="135" y1="207" x2="150" y2="207" stroke="#546E7A" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g class="arrow">
    <line x1="267" y1="207" x2="282" y2="207" stroke="#546E7A" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="label">
    <rect x="20" y="270" width="380" height="110" rx="8" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>
    <text x="35" y="292" font-family="Arial" font-size="13" font-weight="bold" fill="#37474F">Key Concepts</text>
    
    <!-- Types -->
    <circle cx="50" cy="320" r="4" fill="#64B5F6"/>
    <text x="62" y="324" font-family="Arial" font-size="11" fill="#455A64">Systematic Reviews</text>
    
    <circle cx="160" cy="320" r="4" fill="#81C784"/>
    <text x="172" y="324" font-family="Arial" font-size="11" fill="#455A64">Scoping Reviews</text>
    
    <circle cx="270" cy="320" r="4" fill="#FF8A65"/>
    <text x="282" y="324" font-family="Arial" font-size="11" fill="#455A64">Meta-Analyses</text>
    
    <!-- Tools -->
    <rect x="35" y="340" width="75" height="20" rx="4" fill="#E3F2FD"/>
    <text x="72" y="354" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565C0">Zotero</text>
    
    <rect x="120" y="340" width="75" height="20" rx="4" fill="#E8F5E9"/>
    <text x="157" y="354" text-anchor="middle" font-family="Arial" font-size="9" fill="#2E7D32">Mendeley</text>
    
    <rect x="205" y="340" width="75" height="20" rx="4" fill="#FFF8E1"/>
    <text x="242" y="354" text-anchor="middle" font-family="Arial" font-size="9" fill="#F57F17">NVivo</text>
    
    <rect x="290" y="340" width="75" height="20" rx="4" fill="#F3E5F5"/>
    <text x="327" y="354" text-anchor="middle" font-family="Arial" font-size="9" fill="#6A1B9A">CiteSpace</text>
    
    <!-- Outcome -->
    <text x="35" y="375" font-family="Arial" font-size="10" fill="#546E7A">Outcome: Evidence-based research gap identification &amp; methodological rigor</text>
  </g>
  
  <!-- Highlight animation on key box -->
  <rect x="284" y="175" width="115" height="65" rx="8" fill="none" stroke="#4DB6AC" stroke-width="2" class="highlight" style="transform-origin: 341px 207px;"/>
</svg>