<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="project-proposal-problem-statement">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4edda;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="problemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8d7da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5c6cb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="proposalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cce5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8daff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="solutionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4edda;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c3e6cb;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#495057" />
    </marker>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideIn {
        from { transform: translateY(-20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.03); }
      }
      @keyframes drawLine {
        from { stroke-dashoffset: 200; }
        to { stroke-dashoffset: 0; }
      }
      .title-text { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
      .label-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #495057; }
      .detail-text { font-family: Arial, sans-serif; font-size: 11px; fill: #6c757d; }
      .box { rx: 8; ry: 8; stroke: #495057; stroke-width: 1.5; }
      .connector { stroke: #6c757d; stroke-width: 2; fill: none; marker-end: url(#arrowhead); stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 1.5s ease-out forwards; }
      .fade-in { animation: fadeIn 0.8s ease-out forwards; }
      .slide-in { animation: slideIn 0.6s ease-out forwards; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>
  
  <rect width="420" height="400" fill="url(#bgGrad)" />
  
  <!-- Main Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text fade-in">Project Proposal &amp; Problem Statement</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#495057" stroke-width="2" class="fade-in" style="animation-delay: 0.3s" />
  
  <!-- Problem Statement Section (Root) -->
  <g class="slide-in" style="animation-delay: 0.2s" data-narration="The Problem Statement identifies the core gap or challenge using root cause analysis like the 5 Whys technique">
    <rect x="140" y="55" width="140" height="45" fill="url(#problemGrad)" class="box pulse" />
    <text x="210" y="75" text-anchor="middle" class="label-text">Problem Statement</text>
    <text x="210" y="90" text-anchor="middle" class="detail-text">Root Cause Analysis (5 Whys)</text>
  </g>
  
  <!-- Arrow from Problem to Solution -->
  <path d="M210 100 L210 130" class="connector" style="animation-delay: 0.5s" />
  
  <!-- Solution/Proposal Branch -->
  <g class="slide-in" style="animation-delay: 0.4s" data-narration="The Proposal outlines the systematic approach including objectives, methodology, timeline and budget">
    <rect x="120" y="130" width="180" height="45" fill="url(#proposalGrad)" class="box pulse" />
    <text x="210" y="150" text-anchor="middle" class="label-text">Project Proposal</text>
    <text x="210" y="165" text-anchor="middle" class="detail-text">Systematic Approach</text>
  </g>
  
  <!-- Branch arrows and components -->
  <!-- Left branch - Objectives -->
  <path d="M140 175 L80 200" class="connector" style="animation-delay: 0.7s" />
  <g class="slide-in" style="animation-delay: 0.6s" data-narration="SMART Objectives: Specific, Measurable, Achievable, Relevant, Time-bound">
    <rect x="15" y="200" width="110" height="55" fill="url(#solutionGrad)" class="box" />
    <text x="70" y="220" text-anchor="middle" class="label-text">Objectives</text>
    <text x="70" y="235" text-anchor="middle" class="detail-text">SMART Criteria</text>
    <text x="70" y="248" text-anchor="middle" class="detail-text">Specific | Measurable</text>
  </g>
  
  <!-- Center-left - Methodology -->
  <path d="M180 175 L180 200" class="connector" style="animation-delay: 0.8s" />
  <g class="slide-in" style="animation-delay: 0.7s" data-narration="Methodology includes tech stack selection, algorithms, and development approach like Agile or Waterfall">
    <rect x="130" y="200" width="100" height="55" fill="url(#solutionGrad)" class="box" />
    <text x="180" y="220" text-anchor="middle" class="label-text">Methodology</text>
    <text x="180" y="235" text-anchor="middle" class="detail-text">Tech Stack</text>
    <text x="180" y="248" text-anchor="middle" class="detail-text">Agile/Waterfall</text>
  </g>
  
  <!-- Center-right - Timeline -->
  <path d="M240 175 L300 200" class="connector" style="animation-delay: 0.9s" />
  <g class="slide-in" style="animation-delay: 0.8s" data-narration="Timeline includes Gantt charts with milestones for tracking project progress">
    <rect x="250" y="200" width="100" height="55" fill="url(#solutionGrad)" class="box" />
    <text x="300" y="220" text-anchor="middle" class="label-text">Timeline</text>
    <text x="300" y="235" text-anchor="middle" class="detail-text">Gantt Charts</text>
    <text x="300" y="248" text-anchor="middle" class="detail-text">Milestones</text>
  </g>
  
  <!-- Right branch - Budget -->
  <path d="M300 175 L360 200" class="connector" style="animation-delay: 1s" />
  <g class="slide-in" style="animation-delay: 0.9s" data-narration="Budget covers cloud compute costs, human resources, and licensing fees">
    <rect x="305" y="200" width="110" height="55" fill="url(#solutionGrad)" class="box" />
    <text x="360" y="220" text-anchor="middle" class="label-text">Budget</text>
    <text x="360" y="235" text-anchor="middle" class="detail-text">Cloud | HR | Licenses</text>
    <text x="360" y="248" text-anchor="middle" class="detail-text">Resource Costs</text>
  </g>
  
  <!-- Key Elements Section at bottom -->
  <g class="fade-in" style="animation-delay: 1.2s" data-narration="Key elements include title, SMART objectives, methodology selection, timeline planning, and budget allocation">
    <rect x="20" y="280" width="380" height="100" fill="#fff" stroke="#495057" stroke-width="1.5" rx="10" />
    <text x="210" y="300" text-anchor="middle" class="label-text">Key Components Overview</text>
    
    <!-- Component boxes -->
    <rect x="30" y="310" width="85" height="60" fill="#e8f4fc" stroke="#007bff" stroke-width="1" rx="5" />
    <text x="72" y="330" text-anchor="middle" class="detail-text" font-weight="bold">Title</text>
    <text x="72" y="345" text-anchor="middle" class="detail-text">Precise &amp;</text>
    <text x="72" y="358" text-anchor="middle" class="detail-text">Reflective</text>
    
    <rect x="125" y="310" width="85" height="60" fill="#e8f4fc" stroke="#007bff" stroke-width="1" rx="5" />
    <text x="167" y="330" text-anchor="middle" class="detail-text" font-weight="bold">Objectives</text>
    <text x="167" y="345" text-anchor="middle" class="detail-text">SMART</text>
    <text x="167" y="358" text-anchor="middle" class="detail-text">Criteria</text>
    
    <rect x="220" y="310" width="85" height="60" fill="#e8f4fc" stroke="#007bff" stroke-width="1" rx="5" />
    <text x="262" y="330" text-anchor="middle" class="detail-text" font-weight="bold">Methodology</text>
    <text x="262" y="345" text-anchor="middle" class="detail-text">Tech Stack</text>
    <text x="262" y="358" text-anchor="middle" class="detail-text">Algorithms</text>
    
    <rect x="315" y="310" width="75" height="60" fill="#e8f4fc" stroke="#007bff" stroke-width="1" rx="5" />
    <text x="352" y="330" text-anchor="middle" class="detail-text" font-weight="bold">Deliverables</text>
    <text x="352" y="345" text-anchor="middle" class="detail-text">Outputs</text>
    <text x="352" y="358" text-anchor="middle" class="detail-text">Outcomes</text>
  </g>
  
  <!-- Legend/Indicator -->
  <g class="fade-in" style="animation-delay: 1.5s">
    <circle cx="35" cy="375" r="5" fill="#f8d7da" stroke="#dc3545" />
    <text x="45" y="378" class="detail-text">Problem</text>
    <circle cx="95" cy="375" r="5" fill="#cce5ff" stroke="#007bff" />
    <text x="105" y="378" class="detail-text">Proposal</text>
    <circle cx="175" cy="375" r="5" fill="#d4edda" stroke="#28a745" />
    <text x="185" y="378" class="detail-text">Solution</text>
    <text x="280" y="378" class="detail-text" font-style="italic">DU MCA Program</text>
  </g>
</svg>