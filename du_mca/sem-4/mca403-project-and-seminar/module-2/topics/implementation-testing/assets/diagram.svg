<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="implementation-testing">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#f5f0ff"/>
    </linearGradient>
    <linearGradient id="impGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c3e6cb"/>
      <stop offset="100%" style="stop-color:#a8d5ba"/>
    </linearGradient>
    <linearGradient id="testGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#9cc2dc"/>
    </linearGradient>
    <linearGradient id="pipelineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8e8d0"/>
      <stop offset="50%" style="stop-color:#f0d9c0"/>
      <stop offset="100%" style="stop-color:#e8cbb0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .impl-box { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .test-box { animation: slideInRight 0.6s ease-out 0.4s both; }
    .pipe-section { animation: slideInUp 0.5s ease-out 0.6s both; }
    .pulse-anim { animation: pulse 2s infinite; }
    .arrow-anim { animation: arrowPulse 1.5s infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Implementation &amp; Testing</text>
  <text x="210" y="46" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5d6d7e" class="title">CI/CD Pipeline Flow</text>
  
  <!-- Implementation Section (Left) -->
  <g class="impl-box" data-narration="Implementation Phase: Converting design into executable code through development, version control, CI/CD, and deployment">
    <rect x="15" y="60" width="145" height="145" fill="url(#impGradient)" rx="6" filter="url(#shadow)"/>
    <text x="87" y="78" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e5631">Implementation</text>
    <rect x="22" y="85" width="130" height="22" fill="#fff" rx="4" opacity="0.8"/>
    <circle cx="32" cy="96" r="4" fill="#27ae60"/>
    <text x="40" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#2c3e50">Code Development</text>
    <rect x="22" y="110" width="130" height="22" fill="#fff" rx="4" opacity="0.8"/>
    <circle cx="32" cy="121" r="4" fill="#27ae60"/>
    <text x="40" y="125" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#2c3e50">Version Control</text>
    <rect x="22" y="135" width="130" height="22" fill="#fff" rx="4" opacity="0.8"/>
    <circle cx="32" cy="146" r="4" fill="#27ae60"/>
    <text x="40" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#2c3e50">CI/CD Pipeline</text>
    <rect x="22" y="160" width="130" height="22" fill="#fff" rx="4" opacity="0.8"/>
    <circle cx="32" cy="171" r="4" fill="#27ae60"/>
    <text x="40" y="175" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#2c3e50">Deployment</text>
  </g>
  
  <!-- Testing Section (Right) -->
  <g class="test-box" data-narration="Testing Techniques: Unit, Integration, System, UAT, and Automation testing with metrics">
    <rect x="175" y="60" width="145" height="145" fill="url(#testGradient)" rx="6" filter="url(#shadow)"/>
    <text x="247" y="78" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a3a52">Testing</text>
    <rect x="182" y="85" width="130" height="22" fill="#fff" rx="4" opacity="0.8"/>
    <circle cx="192" cy="96" r="4" fill="#3498db"/>
    <text x="200" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#2c3e50">Unit Testing</text>
    <rect x="182" y="110" width="130" height="22" fill="#fff" rx="4" opacity="0.8"/>
    <circle cx="192" cy="121" r="4" fill="#3498db"/>
    <text x="200" y="125" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#2c3e50">Integration</text>
    <rect x="182" y="135" width="130" height="22" fill="#fff" rx="4" opacity="0.8"/>
    <circle cx="192" cy="146" r="4" fill="#3498db"/>
    <text x="200" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#2c3e50">System Testing</text>
    <rect x="182" y="160" width="130" height="22" fill="#fff" rx="4" opacity="0.8"/>
    <circle cx="192" cy="171" r="4" fill="#3498db"/>
    <text x="200" y="175" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#2c3e50">UAT &amp; Automation</text>
  </g>
  
  <!-- Arrow between Impl and Test -->
  <path d="M160 120 L175 120" stroke="#7f8c8d" stroke-width="2" class="arrow-anim" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7f8c8d"/>
    </marker>
  </defs>
  
  <!-- CI/CD Pipeline Section -->
  <g class="pipe-section" data-narration="CI/CD Pipeline: Automated flow from version control through build, testing, to production deployment">
    <rect x="15" y="220" width="305" height="70" fill="url(#pipelineGradient)" rx="6" filter="url(#shadow)"/>
    <text x="167" y="238" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#5d4037">CI/CD Pipeline</text>
    
    <!-- Pipeline Stages -->
    <rect x="25" y="248" width="55" height="32" fill="#ecf0f1" rx="4" stroke="#e74c3c" stroke-width="2" class="pulse-anim"/>
    <text x="52" y="264" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="bold" fill="#c0392b">Version</text>
    <text x="52" y="274" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#7f8c8d">Control</text>
    
    <line x1="80" y1="264" x2="95" y2="264" stroke="#e74c3c" stroke-width="2" class="arrow-anim"/>
    
    <rect x="95" y="248" width="55" height="32" fill="#ecf0f1" rx="4" stroke="#f39c12" stroke-width="2" class="pulse-anim"/>
    <text x="122" y="264" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="bold" fill="#d68910">Build</text>
    <text x="122" y="274" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#7f8c8d">Server</text>
    
    <line x1="150" y1="264" x2="165" y2="264" stroke="#f39c12" stroke-width="2" class="arrow-anim"/>
    
    <rect x="165" y="248" width="55" height="32" fill="#ecf0f1" rx="4" stroke="#27ae60" stroke-width="2" class="pulse-anim"/>
    <text x="192" y="264" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="bold" fill="#1e8449">Test</text>
    <text x="192" y="274" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#7f8c8d">Suite</text>
    
    <line x1="220" y1="264" x2="235" y2="264" stroke="#27ae60" stroke-width="2" class="arrow-anim"/>
    
    <rect x="235" y="248" width="55" height="32" fill="#ecf0f1" rx="4" stroke="#3498db" stroke-width="2" class="pulse-anim"/>
    <text x="262" y="264" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="bold" fill="#2471a3">Production</text>
    <text x="262" y="274" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#7f8c8d">Deploy</text>
  </g>
  
  <!-- Metrics Section -->
  <g class="pipe-section" data-narration="Key Metrics: Code Coverage 80%+, Defect Density &lt;0.5/KLOC, MTTR &lt;4hrs">
    <rect x="330" y="220" width="75" height="70" fill="#fff" rx="6" filter="url(#shadow)"/>
    <text x="367" y="235" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="bold" fill="#2c3e50">Metrics</text>
    <rect x="335" y="240" width="65" height="18" fill="#e8f6f3" rx="3"/>
    <text x="367" y="253" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#16a085">Coverage 80%+</text>
    <rect x="335" y="260" width="65" height="18" fill="#fef9e7" rx="3"/>
    <text x="367" y="273" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#b7950b">Defects &lt;0.5</text>
  </g>
  
  <!-- Skills & Roles Section -->
  <g class="pipe-section" data-narration="Career Opportunities: DevOps Engineer and QA Lead roles with competitive CTC in Indian market">
    <rect x="15" y="305" width="390" height="80" fill="#f8f9fa" rx="6" stroke="#dee2e6" stroke-width="1"/>
    <text x="210" y="322" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Career Opportunities</text>
    
    <!-- DevOps Box -->
    <rect x="25" y="330" width="175" height="45" fill="#e8f4fd" rx="4" stroke="#3498db" stroke-width="1"/>
    <text x="50" y="348" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#2980b9">DevOps Engineer</text>
    <text x="50" y="362" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#5d6d7e">Avg CTC: ₹9.8L</text>
    <circle cx="180" cy="352" r="12" fill="#3498db" class="pulse-anim"/>
    <text x="180" y="356" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#fff">CI</text>
    
    <!-- QA Lead Box -->
    <rect x="220" y="330" width="175" height="45" fill="#fdedec" rx="4" stroke="#e74c3c" stroke-width="1"/>
    <text x="245" y="348" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#c0392b">QA Lead</text>
    <text x="245" y="362" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#5d6d7e">Avg CTC: ₹12.4L</text>
    <circle cx="375" cy="352" r="12" fill="#e74c3c" class="pulse-anim"/>
    <text x="375" y="356" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#fff">QA</text>
  </g>
  
  <!-- Tools Mention -->
  <g class="pipe-section" data-narration="Tools: Git, Jenkins, Docker, Kubernetes, JUnit, Selenium, Postman, JMeter">
    <text x="210" y="392" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#7f8c8d">Tools: Git | Jenkins | Docker | K8s | JUnit | Selenium | Postman | JMeter</text>
  </g>
</svg>