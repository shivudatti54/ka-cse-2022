<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="system-design-and-architecture" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serviceGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gatewayGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dbGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cacheGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes slideInLeft {
      0% { transform: translateX(-30px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      0% { transform: translateX(30px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      0% { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: slideInUp 0.6s ease-out 0.3s forwards; opacity: 0; }
    .section-3 { animation: slideInRight 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-4 { animation: slideInLeft 0.6s ease-out 0.5s forwards; opacity: 0; }
    .section-5 { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .section-6 { animation: slideInRight 0.6s ease-out 0.7s forwards; opacity: 0; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .box { animation: fadeIn 0.5s ease-out forwards; }
    .pulse-anim { animation: pulse 3s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e40af" class="title">System Design &amp; Architecture</text>
  <line x1="30" y1="38" x2="390" y2="38" stroke="#93c5fd" stroke-width="1.5" class="title"/>
  
  <!-- Client/User Section -->
  <g data-narration="Client/User layer - Entry point for all requests" class="section-1">
    <rect x="20" y="310" width="80" height="50" rx="6" fill="#fbcfe8" filter="url(#shadow)"/>
    <text x="60" y="330" text-anchor="middle" font-family="Arial" font-size="12" fill="#831843" font-weight="bold">Client</text>
    <text x="60" y="345" text-anchor="middle" font-family="Arial" font-size="10" fill="#831843">/Mobile/Web</text>
  </g>
  
  <!-- Load Balancer -->
  <g data-narration="Load Balancer - Distributes traffic across multiple servers using Round Robin or Least Connections" class="section-1">
    <rect x="130" y="310" width="70" height="50" rx="6" fill="url(#cacheGradient)" filter="url(#shadow)"/>
    <text x="165" y="328" text-anchor="middle" font-family="Arial" font-size="11" fill="#78350f" font-weight="bold">Load</text>
    <text x="165" y="342" text-anchor="middle" font-family="Arial" font-size="10" fill="#78350f">Balancer</text>
  </g>
  
  <!-- API Gateway -->
  <g data-narration="API Gateway - Single entry point for all clients, handles routing, auth, rate limiting" class="section-2">
    <rect x="230" y="290" width="160" height="70" rx="8" fill="url(#gatewayGradient)" filter="url(#shadow)" class="pulse-anim"/>
    <text x="310" y="315" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff" font-weight="bold">API Gateway</text>
    <text x="310" y="332" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Route • Auth • Rate Limit</text>
    <text x="310" y="347" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Circuit Breaker</text>
  </g>
  
  <!-- Service Discovery -->
  <g data-narration="Service Discovery - Enables dynamic service registration and discovery" class="section-2">
    <rect x="230" y="220" width="70" height="40" rx="5" fill="#e9d5ff" filter="url(#shadow)"/>
    <text x="265" y="238" text-anchor="middle" font-family="Arial" font-size="10" fill="#6b21a8" font-weight="bold">Service</text>
    <text x="265" y="250" text-anchor="middle" font-family="Arial" font-size="9" fill="#6b21a8">Discovery</text>
  </g>
  
  <!-- Auth Service -->
  <g data-narration="Auth Service - Handles authentication, authorization, and user management" class="section-3">
    <rect x="20" y="180" width="90" height="55" rx="6" fill="url(#serviceGradient)" filter="url(#shadow)"/>
    <text x="65" y="200" text-anchor="middle" font-family="Arial" font-size="12" fill="#fff" font-weight="bold">Auth Service</text>
    <text x="65" y="216" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">JWT • OAuth</text>
    <text x="65" y="228" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Token Valid.</text>
  </g>
  
  <!-- Auth DB -->
  <g data-narration="Auth Database - Stores user credentials and tokens" class="section-3">
    <rect x="20" y="250" width="90" height="40" rx="5" fill="url(#dbGradient)" filter="url(#shadow)"/>
    <text x="65" y="268" text-anchor="middle" font-family="Arial" font-size="10" fill="#166534" font-weight="bold">User DB</text>
    <text x="65" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="#166534">PostgreSQL</text>
  </g>
  
  <!-- Payment Service -->
  <g data-narration="Payment Service - Core microservice for transaction processing, handles 10K+ TPS" class="section-4">
    <rect x="140" y="130" width="100" height="60" rx="6" fill="url(#serviceGradient)" filter="url(#shadow)" class="pulse-anim"/>
    <text x="190" y="152" text-anchor="middle" font-family="Arial" font-size="12" fill="#fff" font-weight="bold">Payment Service</text>
    <text x="190" y="168" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">10K TPS</text>
    <text x="190" y="180" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">&lt;200ms Latency</text>
  </g>
  
  <!-- Payment DB -->
  <g data-narration="Payment Database - Stores transactions with ACID properties" class="section-4">
    <rect x="140" y="205" width="100" height="40" rx="5" fill="url(#dbGradient)" filter="url(#shadow)"/>
    <text x="190" y="223" text-anchor="middle" font-family="Arial" font-size="10" fill="#166534" font-weight="bold">Transaction DB</text>
    <text x="190" y="235" text-anchor="middle" font-family="Arial" font-size="9" fill="#166534">Sharded MySQL</text>
  </g>
  
  <!-- Redis Cache -->
  <g data-narration="Redis Cache - In-memory cache for reducing database load and improving latency" class="section-5">
    <rect x="270" y="130" width="80" height="45" rx="5" fill="url(#cacheGradient)" filter="url(#shadow)"/>
    <text x="310" y="150" text-anchor="middle" font-family="Arial" font-size="11" fill="#78350f" font-weight="bold">Redis Cache</text>
    <text x="310" y="164" text-anchor="middle" font-family="Arial" font-size="9" fill="#78350f">Session • Rate</text>
  </g>
  
  <!-- Message Queue (Kafka) -->
  <g data-narration="Kafka Message Queue - Handles async processing, event streaming, and decoupling services" class="section-5">
    <rect x="270" y="190" width="80" height="50" rx="5" fill="#fed7aa" filter="url(#shadow)"/>
    <text x="310" y="210" text-anchor="middle" font-family="Arial" font-size="10" fill="#9a3412" font-weight="bold">Message Queue</text>
    <text x="310" y="224" text-anchor="middle" font-family="Arial" font-size="9" fill="#9a3412">Kafka</text>
    <text x="310" y="236" text-anchor="middle" font-family="Arial" font-size="8" fill="#9a3412">Event Streaming</text>
  </g>
  
  <!-- Notification Service -->
  <g data-narration="Notification Service - Sends alerts, SMS, emails asynchronously via message queue" class="section-6">
    <rect x="320" y="55" width="80" height="45" rx="5" fill="url(#serviceGradient)" filter="url(#shadow)"/>
    <text x="360" y="75" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">Notification</text>
    <text x="360" y="88" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Email • SMS</text>
  </g>
  
  <!-- Arrows/Connections -->
  <g class="arrow" stroke="#64748b" stroke-width="1.5" fill="none">
    <!-- Client to Load Balancer -->
    <path d="M100 335 L130 335" marker-end="url(#arrowhead)"/>
    
    <!-- Load Balancer to API Gateway -->
    <path d="M200 335 L230 325" marker-end="url(#arrowhead)"/>
    
    <!-- API Gateway to Services -->
    <path d="M310 290 L310 260 L65 260 L65 245" marker-end="url(#arrowhead)"/>
    <path d="M310 290 L310 250 L190 220 L190 195" marker-end="url(#arrowhead)"/>
    <path d="M310 290 L270 290 L270 175" marker-end="url(#arrowhead)"/>
    
    <!-- Service Discovery connections -->
    <path d="M230 240 L230 180 L20 180 L20 170" stroke-dasharray="4,2"/>
    
    <!-- Payment to DB -->
    <path d="M190 190 L190 205" marker-end="url(#arrowhead)"/>
    
    <!-- Auth to DB -->
    <path d="M65 235 L65 250" marker-end="url(#arrowhead)"/>
    
    <!-- Payment to Cache -->
    <path d="M240 160 L270 162" marker-end="url(#arrowhead)"/>
    
    <!-- Payment to Message Queue -->
    <path d="M240 175 L270 215" marker-end="url(#arrowhead)"/>
    
    <!-- Message Queue to Notification -->
    <path d="M310 215 L310 180 L360 100" marker-end="url(#arrowhead)"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Key Concepts Box -->
  <g data-narration="Key Design Principles - CAP Theorem, ACID vs BASE, SOLID principles guide architectural decisions" class="box">
    <rect x="20" y="55" width="115" height="70" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" opacity="0.9"/>
    <text x="77" y="70" text-anchor="middle" font-family="Arial" font-size="10" fill="#92400e" font-weight="bold">Key Principles</text>
    <text x="77" y="83" text-anchor="middle" font-family="Arial" font-size="8" fill="#78350f">CAP Theorem</text>
    <text x="77" y="95" text-anchor="middle" font-family="Arial" font-size="8" fill="#78350f">ACID vs BASE</text>
    <text x="77" y="107" text-anchor="middle" font-family="Arial" font-size="8" fill="#78350f">SOLID Design</text>
    <text x="77" y="119" text-anchor="middle" font-family="Arial" font-size="8" fill="#78350f">Circuit Breaker</text>
  </g>
  
  <!-- Architecture Patterns Box -->
  <g data-narration="Architecture Patterns - Microservices, Event-Driven, CQRS enable scalable system design" class="box">
    <rect x="140" y="55" width="120" height="55" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
    <text x="200" y="70" text-anchor="middle" font-family="Arial" font-size="10" fill="#1e40af" font-weight="bold">Patterns</text>
    <text x="200" y="84" text-anchor="middle" font-family="Arial" font-size="8" fill="#1e3a8a">Microservices</text>
    <text x="200" y="96" text-anchor="middle" font-family="Arial" font-size="8" fill="#1e3a8a">Event-Driven</text>
    <text x="200" y="106" text-anchor="middle" font-family="Arial" font-size="8" fill="#1e3a8a">CQRS</text>
  </g>
</svg>