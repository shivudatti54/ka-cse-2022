<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="page-replacement-thrashing" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="queueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="thrashGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fee2e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecaca;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#64748b" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    @keyframes counterPulse {
      0%, 100% { fill: #0f172a; }
      50% { fill: #dc2626; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideInRight 0.6s ease-out 0.4s both; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.6s both; }
    .section-4 { animation: slideInUp 0.6s ease-out 0.8s both; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .arrow-anim { animation: arrowPulse 1.5s ease-in-out infinite; }
    .counter-anim { animation: counterPulse 1s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1e3a5f" class="title">Page Replacement &amp; Thrashing</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#3b82f6" stroke-width="2" class="title" />
  
  <!-- Section 1: Physical Memory Frames -->
  <g class="section-1" data-narration="Physical memory frames where pages are stored">
    <text x="30" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#334155">Physical Memory</text>
    <rect x="25" y="75" width="140" height="100" fill="url(#frameGradient)" stroke="#94a3b8" stroke-width="1" rx="5" filter="url(#shadow)" />
    
    <!-- Frame slots -->
    <rect x="35" y="85" width="50" height="20" fill="#fff" stroke="#cbd5e1" stroke-width="1" rx="3" />
    <text x="60" y="100" font-family="Arial, sans-serif" font-size="12" fill="#64748b">F0: 4</text>
    
    <rect x="95" y="85" width="50" height="20" fill="#fff" stroke="#cbd5e1" stroke-width="1" rx="3" />
    <text x="120" y="100" font-family="Arial, sans-serif" font-size="12" fill="#64748b">F1: 7</text>
    
    <rect x="35" y="115" width="50" height="20" fill="#fff" stroke="#cbd5e1" stroke-width="1" rx="3" />
    <text x="60" y="130" font-family="Arial, sans-serif" font-size="12" fill="#64748b">F2: 1</text>
    
    <rect x="95" y="115" width="50" height="20" fill="#fff" stroke="#cbd5e1" stroke-width="1" rx="3" />
    <text x="120" y="130" font-family="Arial, sans-serif" font-size="12" fill="#64748b">F3: 3</text>
    
    <rect x="35" y="145" width="110" height="20" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" rx="3" />
    <text x="90" y="160" font-family="Arial, sans-serif" font-size="12" fill="#1e40af">Victim: F0</text>
  </g>
  
  <!-- Section 2: FIFO Queue -->
  <g class="section-2" data-narration="FIFO queue showing page arrival order, oldest page replaced first">
    <text x="250" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#334155">FIFO Queue</text>
    <rect x="245" y="75" width="150" height="100" fill="url(#queueGradient)" stroke="#f59e0b" stroke-width="1" rx="5" filter="url(#shadow)" />
    
    <!-- Queue entries -->
    <rect x="255" y="90" width="130" height="18" fill="#fffbeb" stroke="#fcd34d" stroke-width="1" rx="3" />
    <text x="320" y="104" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#92400e">Head → Page 4</text>
    
    <rect x="255" y="115" width="130" height="18" fill="#fffbeb" stroke="#fcd34d" stroke-width="1" rx="3" />
    <text x="320" y="129" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#92400e">Page 7</text>
    
    <rect x="255" y="140" width="130" height="18" fill="#fffbeb" stroke="#fcd34d" stroke-width="1" rx="3" />
    <text x="320" y="154" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#92400e">Tail → Page 2 (new)</text>
    
    <!-- Arrow from queue to memory -->
    <path d="M 220 125 Q 180 125 165 115" fill="none" stroke="#f59e0b" stroke-width="2" class="arrow-anim" marker-end="url(#arrowhead)" />
  </g>
  
  <!-- Arrow definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
  </defs>
  
  <!-- Page Fault Counter -->
  <g class="pulse-anim" data-narration="Page fault counter tracking replacement events">
    <rect x="30" y="190" width="80" height="35" fill="#fef2f2" stroke="#ef4444" stroke-width="1" rx="5" />
    <text x="70" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#991b1b">Page Faults</text>
    <text x="70" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" class="counter-anim" fill="#0f172a">12</text>
  </g>
  
  <!-- Section 3: Working Set Model -->
  <g class="section-3" data-narration="Working set model showing process memory requirements">
    <text x="30" y="250" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#334155">Working Set</text>
    <rect x="25" y="260" width="120" height="60" fill="#f0fdf4" stroke="#22c55e" stroke-width="1" rx="5" filter="url(#shadow)" />
    <text x="85" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">WSS₁ = {4,7,1,3}</text>
    <text x="85" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#166534">Δ = 10 refs</text>
    <text x="85" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">(Window Size)</text>
  </g>
  
  <!-- Section 4: Thrashing Warning -->
  <g class="section-4" data-narration="Thrashing occurs when total working sets exceed physical memory">
    <text x="250" y="250" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#334155">Thrashing Condition</text>
    <rect x="245" y="260" width="150" height="60" fill="url(#thrashGradient)" stroke="#ef4444" stroke-width="1" rx="5" filter="url(#shadow)" />
    <text x="320" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#991b1b">∑WSSᵢ &gt; Physical</text>
    <text x="320" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#991b1b">Memory Frames (m)</text>
    <text x="320" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#dc2626">→ High Page Faults!</text>
  </g>
  
  <!-- Key Algorithms Box -->
  <g class="section-4" data-narration="Common page replacement algorithms">
    <rect x="180" y="330" width="220" height="55" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1" rx="5" />
    <text x="290" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#5b21b6">Algorithms</text>
    <text x="290" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6d28d9">FIFO | LRU | Optimal | LFU</text>
    <text x="290" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7c3aed">(Local vs Global Allocation)</text>
  </g>
  
  <!-- Legend/Indicator -->
  <g>
    <circle cx="40" cy="365" r="4" fill="#22c55e" />
    <text x="52" y="369" font-family="Arial, sans-serif" font-size="9" fill="#166534">In Memory</text>
    <circle cx="110" cy="365" r="4" fill="#f59e0b" />
    <text x="122" y="369" font-family="Arial, sans-serif" font-size="9" fill="#92400e">In Queue</text>
    <circle cx="175" cy="365" r="4" fill="#ef4444" />
    <text x="187" y="369" font-family="Arial, sans-serif" font-size="9" fill="#991b1b">Victim Page</text>
  </g>
  
  <!-- Arrow: Working Set to Thrashing -->
  <path d="M 145 290 Q 195 290 245 290" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" />
  <polygon points="240,285 245,290 240,295" fill="#94a3b8" />
</svg>