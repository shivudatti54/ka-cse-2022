<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="virtual-memory-paging-segmentation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a90b8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pageTableGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9fd5b5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6cb890;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="physicalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b87aa8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="segGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c396;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e89b6e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; font-family: Arial, sans-serif; }
    .section-cpu { animation: slideInLeft 0.6s ease-out; }
    .section-pagetable { animation: fadeIn 0.7s ease-out 0.2s both; }
    .section-physical { animation: slideInRight 0.6s ease-out 0.3s both; }
    .section-seg { animation: slideInUp 0.6s ease-out 0.4s both; }
    .section-concepts { animation: fadeIn 0.8s ease-out 0.5s both; }
    .arrow { animation: arrowPulse 2s infinite; }
    .cpu-box { animation: pulse 3s infinite; }
    .pagetable-box { animation: pulse 3s infinite 0.5s; }
    .physical-box { animation: pulse 3s infinite 1s; }
    .concept-box { animation: fadeIn 0.5s ease-out; }
    text { font-family: Arial, Helvetica, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" font-size="18" font-weight="bold" fill="#2c3e50">Virtual Memory</text>
  <text x="210" y="48" text-anchor="middle" class="title" font-size="14" fill="#5a6c7d">Paging &amp; Segmentation</text>
  
  <!-- CPU / Logical Address Section -->
  <g class="section-cpu" data-narration="CPU generates logical addresses consisting of page number and offset">
    <rect x="20" y="70" width="100" height="70" rx="8" fill="url(#cpuGradient)" filter="url(#shadow)"/>
    <text x="70" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="white">CPU</text>
    <text x="70" y="108" text-anchor="middle" font-size="10" fill="white">Logical Address</text>
    
    <!-- Logical Address Breakdown -->
    <rect x="30" y="150" width="80" height="30" rx="4" fill="#5a9bc9" opacity="0.8"/>
    <text x="50" y="168" font-size="10" fill="white">Page#</text>
    <text x="85" y="168" font-size="10" fill="white">Offset</text>
    <line x1="70" y1="150" x2="70" y2="180" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- Arrow from CPU to Page Table -->
  <path class="arrow" d="M120 105 L155 105" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <!-- Page Table Section -->
  <g class="section-pagetable" data-narration="Page table maps virtual page numbers to physical frame numbers">
    <rect x="155" y="70" width="110" height="120" rx="8" fill="url(#pageTableGradient)" filter="url(#shadow)"/>
    <text x="210" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Page Table</text>
    
    <!-- Page Table Entries -->
    <line x1="165" y1="100" x2="255" y2="100" stroke="white" stroke-width="1" stroke-opacity="0.5"/>
    <text x="165" y="115" font-size="9" fill="white">Page</text>
    <text x="210" y="115" font-size="9" fill="white">Frame</text>
    <text x="250" y="115" font-size="9" fill="white">Valid</text>
    
    <line x1="165" y1="125" x2="255" y2="125" stroke="white" stroke-width="1" stroke-opacity="0.3"/>
    <text x="168" y="138" font-size="8" fill="white">0</text>
    <text x="212" y="138" font-size="8" fill="white">3</text>
    <text x="252" y="138" font-size="8" fill="white">1</text>
    
    <line x1="165" y1="145" x2="255" y2="145" stroke="white" stroke-width="1" stroke-opacity="0.3"/>
    <text x="168" y="158" font-size="8" fill="white">1</text>
    <text x="212" y="158" font-size="8" fill="white">7</text>
    <text x="252" y="158" font-size="8" fill="white">1</text>
    
    <line x1="165" y1="165" x2="255" y2="165" stroke="white" stroke-width="1" stroke-opacity="0.3"/>
    <text x="168" y="178" font-size="8" fill="white">2</text>
    <text x="212" y="178" font-size="8" fill="white">-</text>
    <text x="252" y="178" font-size="8" fill="white">0</text>
  </g>
  
  <!-- Arrow from Page Table to Physical Memory -->
  <path class="arrow" d="M265 130 L295 130" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Physical Memory / Frames Section -->
  <g class="section-physical" data-narration="Physical memory contains page frames storing actual data">
    <rect x="295" y="70" width="110" height="120" rx="8" fill="url(#physicalGradient)" filter="url(#shadow)"/>
    <text x="350" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Physical Memory</text>
    
    <!-- Frame representation -->
    <rect x="305" y="100" width="90" height="18" rx="3" fill="white" opacity="0.3"/>
    <text x="315" y="113" font-size="8" fill="white">Frame 0</text>
    
    <rect x="305" y="120" width="90" height="18" rx="3" fill="white" opacity="0.5"/>
    <text x="315" y="133" font-size="8" fill="white">Frame 1</text>
    
    <rect x="305" y="140" width="90" height="18" rx="3" fill="white" opacity="0.3"/>
    <text x="315" y="153" font-size="8" fill="white">Frame 2</text>
    
    <rect x="305" y="160" width="90" height="18" rx="3" fill="white" opacity="0.5"/>
    <text x="315" y="173" font-size="8" fill="white">Frame 3: Page 0</text>
  </g>
  
  <!-- Segmentation Section -->
  <g class="section-seg" data-narration="Segmentation divides memory into variable-sized logical segments">
    <rect x="20" y="210" width="180" height="50" rx="8" fill="url(#segGradient)" filter="url(#shadow)"/>
    <text x="110" y="230" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Segmentation</text>
    <text x="110" y="248" text-anchor="middle" font-size="9" fill="white">Variable-sized logical units</text>
    
    <!-- Segment representation -->
    <rect x="30" y="265" width="45" height="25" rx="3" fill="#e89b6e" opacity="0.7"/>
    <text x="52" y="280" text-anchor="middle" font-size="8" fill="white">Code</text>
    
    <rect x="78" y="265" width="55" height="25" rx="3" fill="#e89b6e" opacity="0.5"/>
    <text x="105" y="280" text-anchor="middle" font-size="8" fill="white">Data</text>
    
    <rect x="136" y="265" width="50" height="25" rx="3" fill="#e89b6e" opacity="0.6"/>
    <text x="160" y="280" text-anchor="middle" font-size="8" fill="white">Stack</text>
    
    <!-- Segment Table -->
    <rect x="210" y="210" width="90" height="50" rx="8" fill="#d4a574" filter="url(#shadow)"/>
    <text x="255" y="230" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Segment Table</text>
    <text x="255" y="248" text-anchor="middle" font-size="8" fill="white">Base + Limit</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section-concepts" data-narration="Key concepts: demand paging, address translation, page replacement algorithms">
    <rect x="20" y="305" width="380" height="85" rx="8" fill="#fff" stroke="#ccc" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Key Concepts</text>
    
    <circle cx="40" cy="345" r="4" fill="#7eb8da"/>
    <text x="52" y="348" font-size="9" fill="#333">Paging: Fixed-size pages</text>
    
    <circle cx="40" cy="362" r="4" fill="#9fd5b5"/>
    <text x="52" y="365" font-size="9" fill="#333">Segmentation: Variable segments</text>
    
    <circle cx="40" cy="379" r="4" fill="#d4a5c9"/>
    <text x="52" y="382" font-size="9" fill="#333">TLB: Fast address lookup</text>
    
    <circle cx="200" cy="345" r="4" fill="#f5c396"/>
    <text x="212" y="348" font-size="9" fill="#333">Page# + Offset = Logical Addr</text>
    
    <circle cx="200" cy="362" r="4" fill="#9fd5b5"/>
    <text x="212" y="365" font-size="9" fill="#333">Frame# + Offset = Physical Addr</text>
    
    <circle cx="200" cy="379" r="4" fill="#d4a5c9"/>
    <text x="212" y="382" font-size="9" fill="#333">FIFO, LRU, OPT algorithms</text>
    
    <!-- Legend for colors -->
    <rect x="320" y="335" width="70" height="45" rx="4" fill="#f9f9f9" stroke="#eee"/>
    <text x="355" y="348" text-anchor="middle" font-size="7" fill="#666">Address</text>
    <text x="355" y="358" text-anchor="middle" font-size="7" fill="#666">Translation</text>
    <text x="355" y="375" text-anchor="middle" font-size="8" fill="#2c3e50">Flow →</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="400" y="380" r="15" fill="#e8f4f8" opacity="0.5"/>
  <circle cx="20" y="20" r="10" fill="#f0f8ff" opacity="0.5"/>
</svg>