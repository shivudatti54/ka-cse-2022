<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="process-management-scheduling" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="100%" style="stop-color:#f0e6ff"/>
    </linearGradient>
    <linearGradient id="stateNew" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0f0"/>
      <stop offset="100%" style="stop-color:#8fcce0"/>
    </linearGradient>
    <linearGradient id="stateReady" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c5f0c5"/>
      <stop offset="100%" style="stop-color:#90d890"/>
    </linearGradient>
    <linearGradient id="stateRunning" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff0b8"/>
      <stop offset="100%" style="stop-color:#ffe080"/>
    </linearGradient>
    <linearGradient id="stateWaiting" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd9b8"/>
      <stop offset="100%" style="stop-color:#ffb366"/>
    </linearGradient>
    <linearGradient id="stateTerminated" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#b0b0b0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-1 { animation: fadeIn 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .section-3 { animation: slideIn 0.6s ease-out 0.6s both; }
    .section-4 { animation: fadeIn 0.6s ease-out 0.8s both; }
    .state-circle { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
    .arrow-line { animation: arrowPulse 2s ease-in-out infinite; }
    .concept-box { animation: fadeIn 0.5s ease-out; }
    text { font-family: Arial, sans-serif; }
    .title-text { font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .detail-text { font-size: 11px; fill: #4a5568; }
    .section-title { font-size: 12px; font-weight: bold; fill: #2c3e50; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text title">Process Management</text>
  <text x="210" y="50" text-anchor="middle" class="detail-text title" style="font-size:14px">and Scheduling</text>
  
  <!-- Main State Transition Diagram -->
  <g class="section-1" data-narration="Process State Transition: Shows how processes move between states">
    <!-- State: NEW -->
    <circle cx="70" cy="120" r="35" fill="url(#stateNew)" filter="url(#shadow)" class="state-circle"/>
    <text x="70" y="115" text-anchor="middle" class="label-text">NEW</text>
    <text x="70" y="130" text-anchor="middle" class="detail-text">Created</text>
    
    <!-- State: READY -->
    <circle cx="210" cy="80" r="38" fill="url(#stateReady)" filter="url(#shadow)" class="state-circle"/>
    <text x="210" y="75" text-anchor="middle" class="label-text">READY</text>
    <text x="210" y="90" text-anchor="middle" class="detail-text">Waiting</text>
    
    <!-- State: RUNNING -->
    <circle cx="210" cy="180" r="40" fill="url(#stateRunning)" filter="url(#shadow)" class="state-circle" style="animation-delay:0.3s"/>
    <text x="210" y="175" text-anchor="middle" class="label-text">RUNNING</text>
    <text x="210" y="190" text-anchor="middle" class="detail-text">Executing</text>
    
    <!-- State: WAITING -->
    <circle cx="350" cy="120" r="35" fill="url(#stateWaiting)" filter="url(#shadow)" class="state-circle"/>
    <text x="350" y="115" text-anchor="middle" class="label-text">WAITING</text>
    <text x="350" y="130" text-anchor="middle" class="detail-text">Blocked</text>
    
    <!-- State: TERMINATED -->
    <circle cx="210" cy="280" r="35" fill="url(#stateTerminated)" filter="url(#shadow)" class="state-circle"/>
    <text x="210" y="275" text-anchor="middle" class="label-text">TERMINATED</text>
    <text x="210" y="290" text-anchor="middle" class="detail-text">Finished</text>
    
    <!-- Transitions arrows -->
    <path d="M85 150 Q90 200 170 175" fill="none" stroke="#5a7fa8" stroke-width="2" class="arrow-line"/>
    <text x="130" y="175" class="detail-text" fill="#5a7fa8">Admit</text>
    
    <path d="M210 118 L210 140" fill="none" stroke="#5a7fa8" stroke-width="2" class="arrow-line"/>
    <text x="220" y="135" class="detail-text" fill="#5a7fa8">Dispatch</text>
    
    <path d="M248 165 Q300 120 335 120" fill="none" stroke="#5a7fa8" stroke-width="2" class="arrow-line"/>
    <text x="280" y="145" class="detail-text" fill="#5a7fa8">I/O Request</text>
    
    <path d="M315 140 L250 165" fill="none" stroke="#5a7fa8" stroke-width="2" class="arrow-line"/>
    <text x="265" y="155" class="detail-text" fill="#5a7fa8">I/O Complete</text>
    
    <path d="M248 195 Q280 240 210 245" fill="none" stroke="#5a7fa8" stroke-width="2" class="arrow-line"/>
    <text x="250" y="225" class="detail-text" fill="#5a7fa8">Time Slice</text>
    
    <path d="M210 240 L210 245" fill="none" stroke="#5a7fa8" stroke-width="2" class="arrow-line"/>
    <text x="195" y="258" class="detail-text" fill="#5a7fa8">Exit</text>
    
    <path d="M105 100 Q140 60 170 75" fill="none" stroke="#5a7fa8" stroke-width="2" class="arrow-line"/>
    <text x="145" y="70" class="detail-text" fill="#5a7fa8">Submit</text>
  </g>
  
  <!-- Concept Box: Process vs Program -->
  <g class="section-2" data-narration="Process is an active instance while Program is passive" transform="translate(5,310)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="white" filter="url(#shadow)" stroke="#b8e0f0" stroke-width="1"/>
    <text x="65" y="18" text-anchor="middle" class="section-title">Process vs Program</text>
    <text x="10" y="38" class="detail-text">• <tspan font-weight="bold">Program</tspan>: Passive, on disk</text>
    <text x="10" y="52" class="detail-text">• <tspan font-weight="bold">Process</tspan>: Active, in memory</text>
    <text x="10" y="66" class="detail-text">• Resources: registers, memory</text>
  </g>
  
  <!-- Concept Box: PCB -->
  <g class="section-3" data-narration="Process Control Block contains all process information" transform="translate(145,310)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="white" filter="url(#shadow)" stroke="#c5f0c5" stroke-width="1"/>
    <text x="65" y="18" text-anchor="middle" class="section-title">Process Control Block</text>
    <text x="10" y="38" class="detail-text">• Process ID &amp; State</text>
    <text x="10" y="52" class="detail-text">• CPU Registers</text>
    <text x="10" y="66" class="detail-text">• Priority &amp; Memory</text>
  </g>
  
  <!-- Concept Box: Scheduler Types -->
  <g class="section-4" data-narration="Three types of schedulers manage process execution" transform="translate(285,310)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="white" filter="url(#shadow)" stroke="#fff0b8" stroke-width="1"/>
    <text x="65" y="18" text-anchor="middle" class="section-title">Scheduler Types</text>
    <text x="10" y="38" class="detail-text">• <tspan font-weight="bold">Long-term</tspan>: Job scheduler</text>
    <text x="10" y="52" class="detail-text">• <tspan font-weight="bold">Short-term</tspan>: CPU scheduler</text>
    <text x="10" y="66" class="detail-text">• <tspan font-weight="bold">Medium-term</tspan>: Swapping</text>
  </g>
  
  <!-- Queue Indicators -->
  <g class="section-2" data-narration="Ready and Device queues manage process scheduling" transform="translate(320,75)">
    <rect x="0" y="0" width="90" height="35" rx="5" fill="#c5f0c5" opacity="0.8"/>
    <text x="45" y="15" text-anchor="middle" class="detail-text" font-weight="bold">Ready Queue</text>
    <text x="45" y="28" text-anchor="middle" class="detail-text">CPU Time</text>
  </g>
  
  <g class="section-3" data-narration="Device queues hold processes waiting for I/O" transform="translate(340,150)">
    <rect x="0" y="0" width="75" height="35" rx="5" fill="#ffd9b8" opacity="0.8"/>
    <text x="37" y="15" text-anchor="middle" class="detail-text" font-weight="bold">Device Queue</text>
    <text x="37" y="28" text-anchor="middle" class="detail-text">I/O Wait</text>
  </g>
  
  <!-- Connecting lines to queues -->
  <path d="M250 160 Q290 160 320 160" fill="none" stroke="#90d890" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M315 120 Q335 135 340 135" fill="none" stroke="#ffb366" stroke-width="1.5" stroke-dasharray="4,2"/>
</svg>