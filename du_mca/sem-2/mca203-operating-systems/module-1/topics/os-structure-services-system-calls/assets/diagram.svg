<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="os-structure-services-system-calls">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e0e8f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e0f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hardwareGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7fb3d5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5499c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="kernelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a569bd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="servicesGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#52be80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="appsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5b041;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .hardware { animation: slideInUp 0.6s ease-out 0.2s forwards; opacity: 0; }
    .kernel { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .services { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .apps { animation: slideInUp 0.6s ease-out 0.8s forwards; opacity: 0; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .concept-box { animation: fadeIn 0.8s ease-out 1s forwards; opacity: 0; }
    .system-call { animation: pulse 2s ease-in-out infinite; }
    .label { animation: slideInLeft 0.5s ease-out forwards; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50" class="title">OS Structure &amp; System Calls</text>
  
  <!-- Hardware Layer -->
  <g class="hardware" data-narration="Hardware Layer: Physical components including CPU, memory, I/O devices - the foundation of all computing">
    <rect x="60" y="300" width="140" height="50" rx="8" fill="url(#hardwareGrad)" filter="url(#shadow)"/>
    <text x="130" y="330" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">HARDWARE</text>
    <text x="130" y="348" text-anchor="middle" font-family="Arial" font-size="10" fill="#f0f8ff">CPU, Memory, I/O</text>
  </g>
  
  <!-- Arrow to Kernel -->
  <path d="M130 295 L130 270" stroke="#5499c7" stroke-width="3" fill="none" class="arrow"/>
  <polygon points="130,265 125,275 135,275" fill="#5499c7" class="arrow"/>
  
  <!-- Kernel Layer -->
  <g class="kernel" data-narration="Kernel Layer: Core of the OS managing resources, process scheduling, memory allocation, and device drivers">
    <rect x="60" y="220" width="140" height="55" rx="8" fill="url(#kernelGrad)" filter="url(#shadow)"/>
    <text x="130" y="250" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">KERNEL</text>
    <text x="130" y="268" text-anchor="middle" font-family="Arial" font-size="10" fill="#f5eeff">Scheduler, Memory, Drivers</text>
  </g>
  
  <!-- Arrow to Services -->
  <path d="M130 215 L130 190" stroke="#8e44ad" stroke-width="3" fill="none" class="arrow"/>
  <polygon points="130,185 125,195 135,195" fill="#8e44ad" class="arrow"/>
  
  <!-- System Services Layer -->
  <g class="services" data-narration="System Services Layer: OS services like file systems, networking, process management exposed to applications">
    <rect x="60" y="140" width="140" height="55" rx="8" fill="url(#servicesGrad)" filter="url(#shadow)"/>
    <text x="130" y="170" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">SYSTEM SERVICES</text>
    <text x="130" y="188" text-anchor="middle" font-family="Arial" font-size="10" fill="#e8f8f0">File System, IPC, Security</text>
  </g>
  
  <!-- Arrow to Applications -->
  <path d="M130 135 L130 110" stroke="#27ae60" stroke-width="3" fill="none" class="arrow"/>
  <polygon points="130,105 125,115 135,115" fill="#27ae60" class="arrow"/>
  
  <!-- Applications Layer -->
  <g class="apps" data-narration="Applications Layer: User programs that request OS services through system calls">
    <rect x="60" y="60" width="140" height="55" rx="8" fill="url(#appsGrad)" filter="url(#shadow)"/>
    <text x="130" y="90" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">APPLICATIONS</text>
    <text x="130" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#fef5e7">User Programs</text>
  </g>
  
  <!-- System Call Mechanism -->
  <g class="system-call" data-narration="System Call Interface: Bridge between user space and kernel space enabling controlled access to protected resources">
    <rect x="250" y="130" width="130" height="45" rx="6" fill="#ecf0f1" stroke="#34495e" stroke-width="2"/>
    <text x="315" y="155" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">SYSTEM CALL</text>
    <text x="315" y="170" text-anchor="middle" font-family="Arial" font-size="9" fill="#7f8c8d">API Interface</text>
    <path d="M200 140 L245 152" stroke="#e74c3c" stroke-width="2" fill="none" stroke-dasharray="4,2" class="arrow"/>
    <path d="M385 152 L430 140" stroke="#e74c3c" stroke-width="2" fill="none" stroke-dasharray="4,2" class="arrow"/>
  </g>
  
  <!-- Concept Boxes -->
  <g class="concept-box" data-narration="Monolithic Architecture: Traditional single-address-space design where all OS components run in kernel space for maximum performance">
    <rect x="280" y="220" width="120" height="35" rx="5" fill="#fad7a0" stroke="#e67e22" stroke-width="1" opacity="0.9"/>
    <text x="340" y="238" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#935c1f">Monolithic</text>
    <text x="340" y="250" text-anchor="middle" font-family="Arial" font-size="8" fill="#935c1f">Single address space</text>
  </g>
  
  <g class="concept-box" data-narration="Microkernel Design: Minimal kernel with most services running in user space, communicating via message passing">
    <rect x="280" y="265" width="120" height="35" rx="5" fill="#a9dfbf" stroke="#27ae60" stroke-width="1" opacity="0.9"/>
    <text x="340" y="283" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1e6f38">Microkernel</text>
    <text x="340" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#1e6f38">Message passing IPC</text>
  </g>
  
  <g class="concept-box" data-narration="Layered Structure: Hierarchical organization where each layer uses services only from layers below it">
    <rect x="280" y="310" width="120" height="35" rx="5" fill="#aed6f1" stroke="#3498db" stroke-width="1" opacity="0.9"/>
    <text x="340" y="328" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a5276">Layered</text>
    <text x="340" y="340" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a5276">Hierarchical design</text>
  </g>
  
  <g class="concept-box" data-narration="Hybrid/Modular: Modern approach like Linux with loadable kernel modules combining efficiency and flexibility">
    <rect x="280" y="355" width="120" height="35" rx="5" fill="#d7bde2" stroke="#8e44ad" stroke-width="1" opacity="0.9"/>
    <text x="340" y="373" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6c3483">Hybrid/Modular</text>
    <text x="340" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#6c3483">Loadable modules</text>
  </g>
  
  <!-- Kernel Space / User Space Divider -->
  <line x1="40" y1="180" x2="250" y2="180" stroke="#95a5a6" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="50" y="175" font-family="Arial" font-size="9" fill="#7f8c8d" font-style="italic">Kernel Space</text>
  <line x1="40" y1="115" x2="250" y2="115" stroke="#95a5a6" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="50" y="110" font-family="Arial" font-size="9" fill="#7f8c8d" font-style="italic">User Space</text>
</svg>