<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="disk-scheduling-raid" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="diskGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6fa3c4"/>
      <stop offset="100%" style="stop-color:#4a7fa3"/>
    </linearGradient>
    <linearGradient id="raid1Gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8fd3a8"/>
      <stop offset="50%" style="stop-color:#6bc48a"/>
      <stop offset="100%" style="stop-color:#4da672"/>
    </linearGradient>
    <linearGradient id="raid2Gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5b982"/>
      <stop offset="50%" style="stop-color:#f0a566"/>
      <stop offset="100%" style="stop-color:#e8914a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes moveHead {
      0% { transform: translateX(0); }
      25% { transform: translateX(60px); }
      50% { transform: translateX(120px); }
      75% { transform: translateX(60px); }
      100% { transform: translateX(0); }
    }
    @keyframes scanLine {
      0% { transform: translateY(0); }
      100% { transform: translateY(80px); }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .move-head { animation: moveHead 4s ease-in-out infinite; }
    .scan-anim { animation: scanLine 2s ease-in-out infinite alternate; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5282" class="fade-in">Disk Scheduling &amp; RAID</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#4a7fa3" stroke-width="2" class="fade-in" style="animation-delay: 0.2s"/>
  
  <!-- Section 1: Disk Representation -->
  <g class="slide-left" style="animation-delay: 0.3s" data-narration="Disk platter showing circular tracks from inner to outer edge">
    <text x="20" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c5282">Disk Scheduling</text>
    <circle cx="70" cy="110" r="45" fill="url(#diskGradient)" stroke="#3d6a8a" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="70" cy="110" r="35" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <circle cx="70" cy="110" r="25" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <circle cx="70" cy="110" r="15" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <circle cx="70" cy="110" r="5" fill="#2c5282"/>
    <!-- Track numbers -->
    <text x="70" y="70" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">0</text>
    <text x="70" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">50</text>
    <text x="70" y="130" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">100</text>
    <text x="70" y="155" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">150</text>
    <!-- Head -->
    <rect x="118" y="105" width="20" height="10" fill="#e53e3e" rx="2" class="pulse"/>
    <text x="140" y="98" font-family="Arial" font-size="10" fill="#e53e3e">Head</text>
  </g>
  
  <!-- Section 2: Request Queue -->
  <g class="slide-right" style="animation-delay: 0.4s" data-narration="Example request queue showing track numbers in arrival order">
    <text x="160" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c5282">Request Queue</text>
    <rect x="155" y="70" width="110" height="70" fill="#fff" stroke="#4a7fa3" stroke-width="1" rx="5" filter="url(#shadow)"/>
    <text x="160" y="88" font-family="Arial" font-size="11" fill="#666">Queue Order:</text>
    <text x="160" y="105" font-family="Arial" font-size="11" fill="#2c5282">98, 183, 37, 122,</text>
    <text x="160" y="120" font-family="Arial" font-size="11" fill="#2c5282">14, 124, 65</text>
    <text x="160" y="138" font-family="Arial" font-size="10" fill="#888">Current Head: 50</text>
  </g>
  
  <!-- Section 3: SCAN Algorithm -->
  <g class="fade-in" style="animation-delay: 0.6s" data-narration="SCAN algorithm moves back and forth across all tracks like an elevator">
    <text x="20" y="170" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c5282">SCAN (Elevator)</text>
    <rect x="15" y="180" width="130" height="55" fill="#e8f8f0" stroke="#6bc48a" stroke-width="1" rx="5"/>
    <text x="25" y="198" font-family="Arial" font-size="11" fill="#2c5282">Movement Pattern:</text>
    <!-- Visual representation of SCAN -->
    <line x1="30" y1="220" x2="130" y2="220" stroke="#4a7fa3" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="130,220 120,215 120,225" fill="#e53e3e"/>
    <polygon points="30,220 40,215 40,225" fill="#e53e3e"/>
    <text x="80" y="240" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Back &amp; Forth</text>
  </g>
  
  <!-- Section 4: C-SCAN Algorithm -->
  <g class="fade-in" style="animation-delay: 0.7s" data-narration="C-SCAN services requests in one direction only, then wraps around">
    <text x="180" y="170" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c5282">C-SCAN (Circular)</text>
    <rect x="175" y="180" width="130" height="55" fill="#fef3e2" stroke="#f0a566" stroke-width="1" rx="5"/>
    <text x="185" y="198" font-family="Arial" font-size="11" fill="#2c5282">Movement Pattern:</text>
    <!-- Visual representation of C-SCAN -->
    <line x1="185" y1="220" x2="285" y2="220" stroke="#4a7fa3" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="285,220 275,215 275,225" fill="#e53e3e"/>
    <!-- Return arrow (dashed) -->
    <line x1="185" y1="230" x2="185" y2="220" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="235" y="240" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">One Way + Return</text>
  </g>
  
  <!-- Section 5: Algorithms List -->
  <g class="slide-left" style="animation-delay: 0.8s" data-narration="List of disk scheduling algorithms with descriptions">
    <text x="20" y="265" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c5282">Algorithms</text>
    <rect x="15" y="275" width="145" height="60" fill="#fff" stroke="#ccc" stroke-width="1" rx="5" filter="url(#shadow)"/>
    <text x="25" y="292" font-family="Arial" font-size="10" fill="#2c5282">• <tspan font-weight="bold">FCFS</tspan>: First-Come First-Served</text>
    <text x="25" y="306" font-family="Arial" font-size="10" fill="#2c5282">• <tspan font-weight="bold">SSTF</tspan>: Shortest Seek First</text>
    <text x="25" y="320" font-family="Arial" font-size="10" fill="#2c5282">• <tspan font-weight="bold">LOOK</tspan>: Reverses when needed</text>
  </g>
  
  <!-- Section 6: RAID Levels -->
  <g class="slide-right" style="animation-delay: 0.9s" data-narration="RAID levels showing different configurations from striping to mirroring">
    <text x="180" y="265" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c5282">RAID Levels</text>
    <rect x="175" y="275" width="225" height="60" fill="#fff" stroke="#ccc" stroke-width="1" rx="5" filter="url(#shadow)"/>
    <!-- RAID visualization -->
    <rect x="185" y="288" width="18" height="30" fill="url(#raid1Gradient)" rx="2"/>
    <rect x="205" y="288" width="18" height="30" fill="url(#raid1Gradient)" rx="2"/>
    <rect x="225" y="288" width="18" height="30" fill="url(#raid1Gradient)" rx="2"/>
    <rect x="245" y="288" width="18" height="30" fill="url(#raid1Gradient)" rx="2"/>
    <text x="210" y="330" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">RAID 0-5 (Striping)</text>
    
    <rect x="285" y="288" width="18" height="30" fill="url(#raid2Gradient)" rx="2"/>
    <rect x="305" y="288" width="18" height="30" fill="url(#raid2Gradient)" rx="2"/>
    <rect x="325" y="288" width="18" height="30" fill="url(#raid2Gradient)" rx="2"/>
    <rect x="345" y="288" width="18" height="30" fill="url(#raid2Gradient)" rx="2"/>
    <text x="325" y="330" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">RAID 10 (Mirror+Stripe)</text>
    
    <!-- RAID Labels -->
    <text x="185" y="285" font-family="Arial" font-size="8" fill="#fff" font-weight="bold">0</text>
    <text x="245" y="285" font-family="Arial" font-size="8" fill="#fff" font-weight="bold">5</text>
    <text x="285" y="285" font-family="Arial" font-size="8" fill="#fff" font-weight="bold">1</text>
    <text x="345" y="285" font-family="Arial" font-size="8" fill="#fff" font-weight="bold">10</text>
  </g>
  
  <!-- Section 7: RAID Features -->
  <g class="fade-in" style="animation-delay: 1s" data-narration="RAID comparison table showing performance and redundancy features">
    <text x="20" y="355" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c5282">RAID Features</text>
    <rect x="15" y="365" width="195" height="30" fill="#fff" stroke="#ccc" stroke-width="1" rx="5" filter="url(#shadow)"/>
    <text x="25" y="380" font-family="Arial" font-size="10" fill="#2c5282">RAID 0: <tspan fill="#e53e3e">Fast, No Redundancy</tspan></text>
    <text x="130" y="380" font-family="Arial" font-size="10" fill="#2c5282">RAID 1: <tspan fill="#38a169">Mirror (2x Space)</tspan></text>
    <text x="25" y="392" font-family="Arial" font-size="10" fill="#2c5282">RAID 5: <tspan fill="#3182ce">1 Parity Disk</tspan></text>
    <text x="130" y="392" font-family="Arial" font-size="10" fill="#2c5282">RAID 6: <tspan fill="#805ad5">2 Parity Disks</tspan></text>
  </g>
  
  <!-- Key insight box -->
  <g class="fade-in" style="animation-delay: 1.1s" data-narration="Key takeaway about disk scheduling importance">
    <rect x="220" y="345" width="180" height="50" fill="#ebf8ff" stroke="#4299e1" stroke-width="1" rx="5"/>
    <text x="230" y="360" font-family="Arial" font-size="10" font-weight="bold" fill="#2b6cb0">Key Insight:</text>
    <text x="230" y="375" font-family="Arial" font-size="9" fill="#4a5568">Efficient scheduling reduces</text>
    <text x="230" y="387" font-family="Arial" font-size="9" fill="#4a5568">seek time &amp; improves I/O</text>
  </g>
</svg>