<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="io-systems" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c2dce8"/>
    </linearGradient>
    <linearGradient id="layerHardware" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5D9CEC"/>
      <stop offset="100%" style="stop-color:#4A89DC"/>
    </linearGradient>
    <linearGradient id="layerDrivers" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8CC152"/>
      <stop offset="100%" style="stop-color:#7CB342"/>
    </linearGradient>
    <linearGradient id="layerKernel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48CFAD"/>
      <stop offset="100%" style="stop-color:#37BC9B"/>
    </linearGradient>
    <linearGradient id="layerUser" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#AC92EC"/>
      <stop offset="100%" style="stop-color:#9678D6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowHead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34495e"/>
    </marker>
  </defs>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .title-anim { animation: slideInUp 0.6s ease-out forwards; }
    .layer-anim { opacity: 0; animation: fadeIn 0.5s ease-out forwards; }
    .layer-anim-1 { animation-delay: 0.3s; }
    .layer-anim-2 { animation-delay: 0.5s; }
    .layer-anim-3 { animation-delay: 0.7s; }
    .layer-anim-4 { animation-delay: 0.9s; }
    .arrow-anim { opacity: 0; animation: fadeIn 0.4s ease-out forwards; }
    .arrow-anim-1 { animation-delay: 1.1s; }
    .arrow-anim-2 { animation-delay: 1.3s; }
    .arrow-anim-3 { animation-delay: 1.5s; }
    .pulse-anim { animation: pulse 2.5s ease-in-out infinite; }
    .concept-anim { opacity: 0; animation: slideInLeft 0.5s ease-out forwards; }
    .concept-anim-1 { animation-delay: 0.4s; }
    .concept-anim-2 { animation-delay: 0.6s; }
    .concept-anim-3 { animation-delay: 0.8s; }
    .concept-anim-4 { animation-delay: 1.0s; }
  </style>
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>
  <text x="210" y="35" text-anchor="middle" class="title-anim" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50">I/O Subsystem Layers</text>
  <rect x="15" y="55" width="390" height="330" rx="12" ry="12" fill="#ffffff" fill-opacity="0.4" stroke="#b8c9d4" stroke-width="1.5"/>
  
  <!-- Device Hardware Layer -->
  <g data-narration="Bottom layer: Device Hardware - Physical I/O devices including HDD, SSD, Network cards, and peripherals. Contains device registers for command/status/data transfer.">
    <rect x="30" y="300" width="260" height="65" rx="8" ry="8" fill="url(#layerHardware)" filter="url(#shadow)" class="layer-anim layer-anim-1"/>
    <text x="45" y="325" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Device Hardware</text>
    <text x="45" y="345" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.9">HDD, SSD, NVMe, Network, I/O Devices</text>
    <circle cx="265" cy="332" r="15" fill="#ffffff" fill-opacity="0.3" class="pulse-anim"/>
    <text x="265" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">⚙</text>
  </g>
  
  <!-- Device Drivers Layer -->
  <g data-narration="Device Drivers: Software components that interface between OS kernel and physical hardware. Implement device-specific protocols (SATA, PCIe) and provide standardized interfaces.">
    <rect x="30" y="225" width="260" height="65" rx="8" ry="8" fill="url(#layerDrivers)" filter="url(#shadow)" class="layer-anim layer-anim-2"/>
    <text x="45" y="250" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Device Drivers</text>
    <text x="45" y="270" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.9">Driver Interface, Device Registers, Protocols</text>
    <circle cx="265" cy="257" r="15" fill="#ffffff" fill-opacity="0.3" class="pulse-anim"/>
    <text x="265" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">◉</text>
  </g>
  
  <!-- Kernel I/O Subsystem Layer -->
  <g data-narration="Kernel I/O Subsystem: Core OS layer managing buffering, caching, scheduling, and error handling. Implements DMA, interrupt handling, and performance optimization.">
    <rect x="30" y="150" width="260" height="65" rx="8" ry="8" fill="url(#layerKernel)" filter="url(#shadow)" class="layer-anim layer-anim-3"/>
    <text x="45" y="175" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Kernel I/O Subsystem</text>
    <text x="45" y="195" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.9">Buffering, Caching, Scheduling, DMA</text>
    <circle cx="265" cy="182" r="15" fill="#ffffff" fill-opacity="0.3" class="pulse-anim"/>
    <text x="265" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">☰</text>
  </g>
  
  <!-- User-Space Libraries Layer -->
  <g data-narration="User-Space Libraries: API layer providing standard I/O interfaces to applications. Includes stdio, POSIX I/O, and high-level language libraries.">
    <rect x="30" y="75" width="260" height="65" rx="8" ry="8" fill="url(#layerUser)" filter="url(#shadow)" class="layer-anim layer-anim-4"/>
    <text x="45" y="100" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">User-Space Libraries</text>
    <text x="45" y="120" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.9">API Layer: stdio, POSIX, System Calls</text>
    <circle cx="265" cy="107" r="15" fill="#ffffff" fill-opacity="0.3" class="pulse-anim"/>
    <text x="265" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">⊞</text>
  </g>
  
  <!-- Arrows showing data flow -->
  <line x1="160" y1="140" x2="160" y2="155" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrowHead)" class="arrow-anim arrow-anim-1"/>
  <line x1="160" y1="215" x2="160" y2="230" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrowHead)" class="arrow-anim arrow-anim-2"/>
  <line x1="160" y1="290" x2="160" y2="305" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrowHead)" class="arrow-anim arrow-anim-3"/>
  
  <!-- Key Concepts Boxes -->
  <g data-narration="Direct Memory Access (DMA): Bypasses CPU for bulk data transfers, improving performance through cycle stealing or burst mode operations.">
    <rect x="305" y="75" width="90" height="55" rx="6" ry="6" fill="#fef9e7" stroke="#f9e79f" stroke-width="1.5" class="concept-anim concept-anim-1"/>
    <text x="315" y="90" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">DMA</text>
    <text x="315" y="105" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">Bulk transfers</text>
    <text x="315" y="118" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">Cycle stealing</text>
  </g>
  
  <g data-narration="Interrupt-Driven I/O: Hardware signals for asynchronous event notification, reducing CPU polling overhead and improving system responsiveness.">
    <rect x="305" y="140" width="90" height="55" rx="6" ry="6" fill="#e8f6f3" stroke="#a3e4d7" stroke-width="1.5" class="concept-anim concept-anim-2"/>
    <text x="315" y="155" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">Interrupts</text>
    <text x="315" y="170" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">Async events</text>
    <text x="315" y="183" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">Low latency</text>
  </g>
  
  <g data-narration="I/O Buffering: Memory temporarily storing data during transfers. Double buffering enables continuous data streams; write-back/write-through for caching policies.">
    <rect x="305" y="205" width="90" height="55" rx="6" ry="6" fill="#fdebd0" stroke="#f5cba7" stroke-width="1.5" class="concept-anim concept-anim-3"/>
    <text x="315" y="220" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">Buffering</text>
    <text x="315" y="235" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">Double buffer</text>
    <text x="315" y="248" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">Write-back</text>
  </g>
  
  <g data-narration="I/O Scheduling: Algorithms including FIFO, SSTF, SCAN, C-LOOK optimize disk access. Deadline scheduling used for real-time systems requirements.">
    <rect x="305" y="270" width="90" height="55" rx="6" ry="6" fill="#ebf5fb" stroke="#aed6f1" stroke-width="1.5" class="concept-anim concept-anim-4"/>
    <text x="315" y="285" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">Scheduling</text>
    <text x="315" y="300" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">FIFO, SSTF</text>
    <text x="315" y="313" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">SCAN, C-LOOK</text>
  </g>
  
  <!-- Data flow arrow from Hardware to Drivers -->
  <text x="220" y="365" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d" font-style="italic">Data Flow →</text>
</svg>