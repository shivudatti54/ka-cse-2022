<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="file-system-implementation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9e4f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inodeHeaderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4178b8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#92d050;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7ab800;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="indirectGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffc000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6a000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="doubleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e55050;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .section-1 { animation: fadeIn 0.8s ease-out forwards; }
    .section-2 { animation: slideInLeft 0.6s ease-out 0.3s forwards; opacity: 0; }
    .section-3 { animation: slideInRight 0.6s ease-out 0.5s forwards; opacity: 0; }
    .section-4 { animation: slideInUp 0.6s ease-out 0.7s forwards; opacity: 0; }
    .section-5 { animation: fadeIn 0.6s ease-out 0.9s forwards; opacity: 0; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow-anim { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawArrow 1s ease-out 1.2s forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <g class="section-1">
    <text x="210" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c5282" text-anchor="middle">File System Implementation</text>
    <text x="210" y="46" font-family="Arial, sans-serif" font-size="14" fill="#4a5568" text-anchor="middle">Inode Structure (UNIX-style)</text>
    <line x1="60" y1="55" x2="360" y2="55" stroke="#5b9bd5" stroke-width="2"/>
  </g>
  
  <!-- Inode Header / Metadata Section -->
  <g class="section-2" filter="url(#shadow)">
    <rect x="20" y="70" width="130" height="100" rx="6" fill="url(#inodeHeaderGrad)" data-narration="Inode Header: Contains file metadata including inode number, file permissions, ownership (UID/GID), file size in bytes, timestamps (access, modify, change), and link count"/>
    <text x="85" y="88" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">INODE HEADER</text>
    <text x="85" y="108" font-family="Arial, sans-serif" font-size="10" fill="#e8f4fc" text-anchor="middle">inode #: 12345</text>
    <text x="85" y="122" font-family="Arial, sans-serif" font-size="10" fill="#e8f4fc" text-anchor="middle">mode: -rw-r--r--</text>
    <text x="85" y="136" font-family="Arial, sans-serif" font-size="10" fill="#e8f4fc" text-anchor="middle">size: 2048 bytes</text>
    <text x="85" y="150" font-family="Arial, sans-serif" font-size="10" fill="#e8f4fc" text-anchor="middle">uid: 1000, gid: 1000</text>
    <text x="85" y="164" font-family="Arial, sans-serif" font-size="10" fill="#e8f4fc" text-anchor="middle">time: Jan 15, 2024</text>
  </g>
  
  <!-- Pointer Section -->
  <g class="section-3" filter="url(#shadow)">
    <rect x="160" y="70" width="245" height="100" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="282" y="88" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c5282" text-anchor="middle">BLOCK POINTERS</text>
    
    <!-- Direct Pointers -->
    <rect x="170" y="98" width="50" height="16" rx="3" fill="#92d050" data-narration="Direct Block Pointers (0-11): 12 pointers that directly address data blocks. Used for files up to 12KB assuming 1KB blocks"/>
    <text x="195" y="110" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Direct[0-11]</text>
    <rect x="225" y="98" width="50" height="16" rx="3" fill="#92d050"/>
    <text x="250" y="110" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">12 blocks</text>
    
    <!-- Single Indirect -->
    <rect x="170" y="120" width="50" height="16" rx="3" fill="url(#indirectGrad)" data-narration="Single Indirect Pointer: Points to an index block containing pointers to data blocks. Adds 256 more block pointers (assuming 4-byte pointer, 1KB block)"/>
    <text x="195" y="132" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Single Ind.</text>
    <rect x="225" y="120" width="50" height="16" rx="3" fill="#f0f0f0" stroke="#ccc"/>
    <text x="250" y="132" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">→ Index</text>
    
    <!-- Double Indirect -->
    <rect x="170" y="142" width="50" height="16" rx="3" fill="url(#doubleGrad)" data-narration="Double Indirect Pointer: Two-level indexing. Points to an index block that points to more index blocks, each pointing to data blocks. Supports 65,536 blocks"/>
    <text x="195" y="154" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Double Ind.</text>
    <rect x="225" y="142" width="50" height="16" rx="3" fill="#f0f0f0" stroke="#ccc"/>
    <text x="250" y="154" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">→ Index²</text>
    
    <!-- Triple Indirect -->
    <rect x="320" y="120" width="70" height="16" rx="3" fill="#9b59b6" data-narration="Triple Indirect Pointer: Three-level indexing for very large files, supporting millions of blocks"/>
    <text x="355" y="132" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Triple Ind.</text>
    <rect x="320" y="142" width="70" height="16" rx="3" fill="#f0f0f0" stroke="#ccc"/>
    <text x="355" y="154" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">→ Index³</text>
  </g>
  
  <!-- Connection Arrow -->
  <path class="arrow-anim" d="M150 120 L160 120" stroke="#5b9bd5" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5b9bd5"/>
    </marker>
  </defs>
  
  <!-- Data Blocks Visualization -->
  <g class="section-4">
    <!-- Direct Data Blocks -->
    <g data-narration="Direct Data Blocks: Store actual file data. Each block typically 1KB-4KB. First 12 blocks accessed directly via direct pointers">
      <rect x="30" y="190" width="45" height="28" rx="4" fill="url(#blockGrad)" class="pulse-element"/>
      <text x="52" y="208" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">DB 0</text>
      
      <rect x="80" y="190" width="45" height="28" rx="4" fill="url(#blockGrad)"/>
      <text x="102" y="208" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">DB 1</text>
      
      <rect x="130" y="190" width="45" height="28" rx="4" fill="url(#blockGrad)"/>
      <text x="152" y="208" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">DB 2</text>
      
      <rect x="180" y="190" width="45" height="28" rx="4" fill="url(#blockGrad)"/>
      <text x="202" y="208" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">...</text>
      
      <text x="135" y="225" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="middle">Direct Data Blocks (0-11)</text>
    </g>
    
    <!-- Indirect Index Block -->
    <g data-narration="Single Indirect Index Block: Contains array of block pointers. Each pointer references a data block. With 1KB block and 4-byte pointers = 256 pointers">
      <rect x="250" y="185" width="50" height="35" rx="4" fill="url(#indirectGrad)"/>
      <text x="275" y="203" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Index</text>
      <text x="275" y="215" font-family="Arial, sans-serif" font-size="8" fill="#fff8e1" text-anchor="middle">[256 ptrs]</text>
    </g>
    
    <!-- Arrow to indirect -->
    <path d="M225 204 L250 204" stroke="#ffc000" stroke-width="2" stroke-dasharray="4,2" fill="none" marker-end="url(#arrowhead2)"/>
    <defs>
      <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#ffc000"/>
      </marker>
    </defs>
    
    <!-- Data blocks from indirect -->
    <rect x="310" y="190" width="40" height="24" rx="3" fill="#c8e6c9" stroke="#81c784" stroke-width="1"/>
    <text x="330" y="206" font-family="Arial, sans-serif" font-size="8" fill="#2e7d32" text-anchor="middle">Data</text>
    
    <rect x="355" y="190" width="40" height="24" rx="3" fill="#c8e6c9" stroke="#81c784" stroke-width="1"/>
    <text x="375" y="206" font-family="Arial, sans-serif" font-size="8" fill="#2e7d32" text-anchor="middle">Data</text>
    
    <line x1="300" y1="202" x2="310" y2="202" stroke="#ffc000" stroke-width="1.5"/>
    <line x1="350" y1="202" x2="355" y2="202" stroke="#ffc000" stroke-width="1.5"/>
  </g>
  
  <!-- Double Indirect Section -->
  <g class="section-5" data-narration="Double Indirect: Two-level tree structure. First level points to 256 index blocks, each pointing to 256 data blocks = 65,536 data blocks max">
    <rect x="250" y="235" width="50" height="35" rx="4" fill="url(#doubleGrad)" class="pulse-element"/>
    <text x="275" y="253" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Index²</text>
    <text x="275" y="265" font-family="Arial, sans-serif" font-size="8" fill="#ffcccc" text-anchor="middle">[256 idx]</text>
    
    <rect x="250" y="280" width="50" height="30" rx="4" fill="#e8f5e9" stroke="#a5d6a7"/>
    <text x="275" y="299" font-family="Arial, sans-serif" font-size="9" fill="#2e7d32" text-anchor="middle">Index</text>
    
    <rect x="310" y="285" width="35" height="20" rx="3" fill="#c8e6c9"/>
    <text x="327" y="299" font-family="Arial, sans-serif" font-size="8" fill="#2e7d32" text-anchor="middle">DB</text>
    
    <rect x="355" y="285" width="35" height="20" rx="3" fill="#c8e6c9"/>
    <text x="372" y="299" font-family="Arial, sans-serif" font-size="8" fill="#2e7d32" text-anchor="middle">DB</text>
    
    <path d="M300 252 L300 280" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="3,2"/>
    <path d="M300 305 L310 300" stroke="#ffc000" stroke-width="1.5"/>
    <path d="M300 305 L355 300" stroke="#ffc000" stroke-width="1.5"/>
    
    <text x="275" y="325" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="middle">Double Indirect Level</text>
  </g>
  
  <!-- Key Concept Box -->
  <g class="section-5">
    <rect x="20" y="340" width="380" height="50" rx="5" fill="#fff9c4" stroke="#f9a825" stroke-width="1" data-narration="Key Concept: Inodes balance efficiency and scalability. Direct pointers for small files (fast access), indirect pointers for larger files. Maximum file size determined by pointer depth and block size"/>
    <text x="210" y="358" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f57f17" text-anchor="middle">Key Concept: Inode Design Trade-offs</text>
    <text x="210" y="375" font-family="Arial, sans-serif" font-size="10" fill="#5d4037" text-anchor="middle">Direct = Fast (small files) | Indirect = Scalable (large files) | Max: ~16TB with 4KB blocks</text>
  </g>
</svg>