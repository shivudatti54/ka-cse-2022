<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="threads-multithreading-models">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="userThreadGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdcb6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="kernelThreadGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="spaceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-box { animation: fadeIn 0.6s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .user-thread { animation: slideInLeft 0.5s ease-out forwards; opacity: 0; }
    .kernel-thread { animation: slideInRight 0.5s ease-out forwards; opacity: 0; }
    .arrow-line { animation: fadeIn 0.4s ease-out forwards; animation-delay: 0.5s; opacity: 0; }
    .arrow-head { animation: fadeIn 0.3s ease-out forwards; animation-delay: 0.7s; opacity: 0; }
    .label { animation: fadeIn 0.5s ease-out forwards; }
    .concept-box { animation: pulse 3s ease-in-out infinite; }
    .section-1 .user-thread:nth-child(1) { animation-delay: 0.1s; }
    .section-1 .user-thread:nth-child(2) { animation-delay: 0.2s; }
    .section-1 .user-thread:nth-child(3) { animation-delay: 0.3s; }
    .section-2 .user-thread:nth-child(1) { animation-delay: 0.1s; }
    .section-2 .user-thread:nth-child(2) { animation-delay: 0.2s; }
    .section-2 .user-thread:nth-child(3) { animation-delay: 0.3s; }
    .section-3 .user-thread:nth-child(1) { animation-delay: 0.1s; }
    .section-3 .user-thread:nth-child(2) { animation-delay: 0.2s; }
    .section-3 .user-thread:nth-child(3) { animation-delay: 0.3s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2d3436" class="title">Threads Multithreading Models</text>
  <line x1="30" y1="38" x2="390" y2="38" stroke="#6c5ce7" stroke-width="2" class="title"/>
  
  <!-- Section Labels -->
  <text x="70" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3436" class="label">Many-to-One</text>
  <text x="210" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3436" class="label">One-to-One</text>
  <text x="350" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3436" class="label">Many-to-Many</text>
  
  <!-- Space Labels -->
  <text x="30" y="75" font-family="Arial, sans-serif" font-size="10" fill="#636e72" font-style="italic">User Space</text>
  <text x="30" y="195" font-family="Arial, sans-serif" font-size="10" fill="#636e72" font-style="italic">Kernel Space</text>
  <line x1="25" y1="80" x2="385" y2="80" stroke="#b2bec3" stroke-width="1" stroke-dasharray="4"/>
  <line x1="25" y1="200" x2="385" y2="200" stroke="#b2bec3" stroke-width="1" stroke-dasharray="4"/>
  
  <!-- Many-to-One Section -->
  <g class="section-1" data-narration="Many-to-One Model: Multiple user threads map to a single kernel thread. This is lightweight but doesn't achieve true parallelism on multi-core systems.">
    <!-- User Threads -->
    <g class="user-thread" style="animation-delay: 0.1s">
      <rect x="40" y="90" width="60" height="20" rx="5" fill="url(#userThreadGrad)" filter="url(#shadow)"/>
      <text x="70" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">UT1</text>
    </g>
    <g class="user-thread" style="animation-delay: 0.2s">
      <rect x="40" y="115" width="60" height="20" rx="5" fill="url(#userThreadGrad)" filter="url(#shadow)"/>
      <text x="70" y="129" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">UT2</text>
    </g>
    <g class="user-thread" style="animation-delay: 0.3s">
      <rect x="40" y="140" width="60" height="20" rx="5" fill="url(#userThreadGrad)" filter="url(#shadow)"/>
      <text x="70" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">UT3</text>
    </g>
    <!-- Kernel Thread -->
    <g class="kernel-thread" style="animation-delay: 0.4s">
      <rect x="50" y="215" width="40" height="20" rx="5" fill="url(#kernelThreadGrad)" filter="url(#shadow)"/>
      <text x="70" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">KT</text>
    </g>
    <!-- Arrows -->
    <line x1="70" y1="110" x2="70" y2="215" stroke="#00b894" stroke-width="2" class="arrow-line"/>
    <polygon points="70,215 65,205 75,205" fill="#00b894" class="arrow-head"/>
    <line x1="70" y1="135" x2="70" y2="205" stroke="#00b894" stroke-width="1" class="arrow-line"/>
    <line x1="70" y1="160" x2="70" y2="205" stroke="#00b894" stroke-width="1" class="arrow-line"/>
    <!-- Limitation Tag -->
    <rect x="35" y="245" width="70" height="22" rx="3" fill="#ff7675" opacity="0.8"/>
    <text x="70" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff" font-weight="bold">No Parallelism</text>
  </g>
  
  <!-- One-to-One Section -->
  <g class="section-2" data-narration="One-to-One Model: Each user thread maps to a kernel thread. Provides true parallelism but has higher overhead due to kernel resource usage.">
    <!-- User Threads -->
    <g class="user-thread" style="animation-delay: 0.1s">
      <rect x="180" y="90" width="60" height="20" rx="5" fill="url(#userThreadGrad)" filter="url(#shadow)"/>
      <text x="210" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">UT1</text>
    </g>
    <g class="user-thread" style="animation-delay: 0.2s">
      <rect x="180" y="115" width="60" height="20" rx="5" fill="url(#userThreadGrad)" filter="url(#shadow)"/>
      <text x="210" y="129" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">UT2</text>
    </g>
    <g class="user-thread" style="animation-delay: 0.3s">
      <rect x="180" y="140" width="60" height="20" rx="5" fill="url(#userThreadGrad)" filter="url(#shadow)"/>
      <text x="210" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">UT3</text>
    </g>
    <!-- Kernel Threads -->
    <g class="kernel-thread" style="animation-delay: 0.4s">
      <rect x="180" y="215" width="40" height="20" rx="5" fill="url(#kernelThreadGrad)" filter="url(#shadow)"/>
      <text x="200" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">KT1</text>
    </g>
    <g class="kernel-thread" style="animation-delay: 0.5s">
      <rect x="180" y="240" width="40" height="20" rx="5" fill="url(#kernelThreadGrad)" filter="url(#shadow)"/>
      <text x="200" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">KT2</text>
    </g>
    <g class="kernel-thread" style="animation-delay: 0.6s">
      <rect x="180" y="265" width="40" height="20" rx="5" fill="url(#kernelThreadGrad)" filter="url(#shadow)"/>
      <text x="200" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">KT3</text>
    </g>
    <!-- Arrows -->
    <line x1="210" y1="110" x2="210" y2="215" stroke="#00b894" stroke-width="2" class="arrow-line"/>
    <polygon points="210,215 205,205 215,205" fill="#00b894" class="arrow-head"/>
    <line x1="210" y1="135" x2="210" y2="240" stroke="#00b894" stroke-width="2" class="arrow-line"/>
    <polygon points="210,240 205,230 215,230" fill="#00b894" class="arrow-head"/>
    <line x1="210" y1="160" x2="210" y2="265" stroke="#00b894" stroke-width="2" class="arrow-line"/>
    <polygon points="210,265 205,255 215,255" fill="#00b894" class="arrow-head"/>
    <!-- Pro Tag -->
    <rect x="175" y="295" width="50" height="18" rx="3" fill="#00b894" opacity="0.8"/>
    <text x="200" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff" font-weight="bold">Parallel</text>
  </g>
  
  <!-- Many-to-Many Section -->
  <g class="section-3" data-narration="Many-to-Many Model: Multiplexes user threads to kernel threads, balancing concurrency and efficiency. The most flexible model for complex applications.">
    <!-- User Threads -->
    <g class="user-thread" style="animation-delay: 0.1s">
      <rect x="320" y="90" width="60" height="20" rx="5" fill="url(#userThreadGrad)" filter="url(#shadow)"/>
      <text x="350" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">UT1</text>
    </g>
    <g class="user-thread" style="animation-delay: 0.2s">
      <rect x="320" y="115" width="60" height="20" rx="5" fill="url(#userThreadGrad)" filter="url(#shadow)"/>
      <text x="350" y="129" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">UT2</text>
    </g>
    <g class="user-thread" style="animation-delay: 0.3s">
      <rect x="320" y="140" width="60" height="20" rx="5" fill="url(#userThreadGrad)" filter="url(#shadow)"/>
      <text x="350" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">UT3</text>
    </g>
    <!-- Kernel Threads -->
    <g class="kernel-thread" style="animation-delay: 0.4s">
      <rect x="330" y="220" width="40" height="20" rx="5" fill="url(#kernelThreadGrad)" filter="url(#shadow)"/>
      <text x="350" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">KT1</text>
    </g>
    <g class="kernel-thread" style="animation-delay: 0.5s">
      <rect x="330" y="250" width="40" height="20" rx="5" fill="url(#kernelThreadGrad)" filter="url(#shadow)"/>
      <text x="350" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">KT2</text>
    </g>
    <!-- Arrows showing multiplexing -->
    <line x1="340" y1="110" x2="340" y2="220" stroke="#00b894" stroke-width="2" class="arrow-line"/>
    <polygon points="340,220 335,210 345,210" fill="#00b894" class="arrow-head"/>
    <line x1="350" y1="110" x2="360" y2="220" stroke="#00b894" stroke-width="1.5" class="arrow-line"/>
    <line x1="350" y1="150" x2="350" y2="250" stroke="#00b894" stroke-width="2" class="arrow-line"/>
    <polygon points="350,250 345,240 355,240" fill="#00b894" class="arrow-head"/>
    <line x1="340" y1="150" x2="360" y2="250" stroke="#00b894" stroke-width="1.5" class="arrow-line"/>
    <line x1="360" y1="135" x2="370" y2="220" stroke="#00b894" stroke-width="1" class="arrow-line"/>
    <!-- Balanced Tag -->
    <rect x="315" y="280" width="70" height="18" rx="3" fill="#0984e3" opacity="0.8"/>
    <text x="350" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff" font-weight="bold">Balanced</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="concept-box" data-narration="Key concepts: User threads exist in user space, managed by thread libraries. Kernel threads exist in kernel space, managed by the OS scheduler.">
    <rect x="10" y="330" width="400" height="55" rx="5" fill="#fff" stroke="#6c5ce7" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="20" y="348" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2d3436">Key Concepts:</text>
    <text x="20" y="363" font-family="Arial, sans-serif" font-size="9" fill="#636e72">• User Threads: Library-managed (Pthreads, Java)</text>
    <text x="20" y="376" font-family="Arial, sans-serif" font-size="9" fill="#636e72">• Kernel Threads: OS-managed, scheduler-aware</text>
    <text x="210" y="363" font-family="Arial, sans-serif" font-size="9" fill="#636e72">• Synchronization: Mutexes, Semaphores</text>
    <text x="210" y="376" font-family="Arial, sans-serif" font-size="9" fill="#636e72">• States: Ready, Running, Blocked</text>
  </g>
</svg>