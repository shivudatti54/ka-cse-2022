<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="deadlock-detection-prevention" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c5364"/>
      <stop offset="100%" style="stop-color:#203a43"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e"/>
      <stop offset="100%" style="stop-color:#fecfef"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a18cd1"/>
      <stop offset="100%" style="stop-color:#fbc2eb"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#84fab0"/>
      <stop offset="100%" style="stop-color:#8fd3f4"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: white; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
    .small-label { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c5364; }
    .fade-in { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .process-node { fill: #5dade2; stroke: #2e86ab; stroke-width: 2; }
    .resource-node { fill: #f7dc6f; stroke: #d4ac0d; stroke-width: 2; }
    .alloc-edge { stroke: #e74c3c; stroke-width: 2; fill: none; marker-end: url(#arrowRed); }
    .request-edge { stroke: #3498db; stroke-width: 2; fill: none; marker-end: url(#arrowBlue); }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="420" height="45" fill="url(#headerGradient)"/>
  <text x="210" y="30" text-anchor="middle" class="title">Deadlock Detection &amp; Prevention</text>
  
  <!-- Section 1: Four Conditions (Left side) -->
  <g class="slide-in delay-1">
    <rect x="10" y="55" width="125" height="130" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="72" y="72" text-anchor="middle" class="section-title">4 Deadlock Conditions</text>
    <circle cx="25" cy="90" r="8" fill="#e74c3c"/>
    <text x="40" y="94" class="label">Mutual Exclusion</text>
    <circle cx="25" cy="115" r="8" fill="#3498db"/>
    <text x="40" y="119" class="label">Hold &amp; Wait</text>
    <circle cx="25" cy="140" r="8" fill="#9b59b6"/>
    <text x="40" y="144" class="label">No Preemption</text>
    <circle cx="25" cy="165" r="8" fill="#27ae60"/>
    <text x="40" y="169" class="label">Circular Wait</text>
  </g>
  
  <!-- Section 2: Resource Allocation Graph (Center) -->
  <g class="fade-in delay-2">
    <rect x="145" y="55" width="150" height="130" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="220" y="72" text-anchor="middle" class="section-title">Resource Allocation Graph</text>
    
    <!-- Process nodes -->
    <circle cx="180" cy="105" r="15" class="process-node"/>
    <text x="180" y="109" text-anchor="middle" class="small-label" fill="white">P1</text>
    <circle cx="260" cy="105" r="15" class="process-node"/>
    <text x="260" y="109" text-anchor="middle" class="small-label" fill="white">P2</circle>
    
    <!-- Resource nodes (squares) -->
    <rect x="188" y="140" width="24" height="24" rx="3" class="resource-node"/>
    <text x="200" y="156" text-anchor="middle" class="small-label">R1</text>
    <rect x="238" y="140" width="24" height="24" rx="3" class="resource-node"/>
    <text x="250" y="156" text-anchor="middle" class="small-label">R2</text>
    
    <!-- Allocation edges -->
    <line x1="180" y1="118" x2="195" y2="140" stroke="#e74c3c" stroke-width="2"/>
    <line x1="260" y1="118" x2="255" y2="140" stroke="#e74c3c" stroke-width="2"/>
    
    <!-- Request edges -->
    <line x1="195" y1="164" x2="255" y2="140" stroke="#3498db" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="255" y1="164" x2="195" y2="140" stroke="#3498db" stroke-width="2" stroke-dasharray="4,2"/>
    
    <!-- Legend -->
    <line x1="155" y1="175" x2="170" y2="175" stroke="#e74c3c" stroke-width="2"/>
    <text x="175" y="179" class="small-label">Allocation</text>
    <line x1="215" y1="175" x2="230" y2="175" stroke="#3498db" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="235" y="179" class="small-label">Request</text>
  </g>
  
  <!-- Section 3: Banker's Algorithm (Right side) -->
  <g class="slide-in delay-3">
    <rect x="305" y="55" width="105" height="130" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="357" y="72" text-anchor="middle" class="section-title">Banker's Algorithm</text>
    <rect x="315" y="80" width="85" height="18" rx="4" fill="#d5f5e3"/>
    <text x="357" y="93" text-anchor="middle" class="small-label">1. Calc Need</text>
    <rect x="315" y="102" width="85" height="18" rx="4" fill="#d5f5e3"/>
    <text x="357" y="115" text-anchor="middle" class="small-label">2. Find Safe</text>
    <rect x="315" y="124" width="85" height="18" rx="4" fill="#d5f5e3"/>
    <text x="357" y="137" text-anchor="middle" class="small-label">3. Simulate</text>
    <rect x="315" y="146" width="85" height="18" rx="4" fill="#d5f5e3"/>
    <text x="357" y="159" text-anchor="middle" class="small-label">4. Verify Safe</text>
  </g>
  
  <!-- Section 4: Prevention Strategies (Bottom left) -->
  <g class="slide-in delay-1">
    <rect x="10" y="195" width="195" height="95" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="107" y="212" text-anchor="middle" class="section-title">Prevention Strategies</text>
    
    <g transform="translate(20, 222)">
      <circle cx="10" cy="8" r="6" fill="url(#boxGradient1)"/>
      <text x="22" y="12" class="small-label">Shareable Resources</text>
      <circle cx="10" cy="26" r="6" fill="url(#boxGradient2)"/>
      <text x="22" y="30" class="small-label">Atomic Acquisition</text>
      <circle cx="10" cy="44" r="6" fill="url(#boxGradient3)"/>
      <text x="22" y="48" class="small-label">Rollback Mechanism</text>
      <circle cx="10" cy="62" r="6" fill="url(#boxGradient4)"/>
      <text x="22" y="66" class="small-label">Hierarchical Ordering</text>
    </g>
  </g>
  
  <!-- Section 5: Wait-For Graph (Bottom center) -->
  <g class="fade-in delay-2">
    <rect x="215" y="195" width="120" height="95" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="275" y="212" text-anchor="middle" class="section-title">Wait-For Graph</text>
    
    <!-- WFG nodes -->
    <circle cx="250" cy="245" r="12" fill="#9b59b6" opacity="0.8"/>
    <text x="250" y="249" text-anchor="middle" class="small-label" fill="white">P1</text>
    <circle cx="300" cy="245" r="12" fill="#9b59b6" opacity="0.8"/>
    <text x="300" y="249" text-anchor="middle" class="small-label" fill="white">P2</text>
    <circle cx="275" cy="275" r="12" fill="#9b59b6" opacity="0.8"/>
    <text x="275" y="279" text-anchor="middle" class="small-label" fill="white">P3</text>
    
    <!-- WFG edges forming cycle -->
    <path d="M260 250 Q275 235 290 250" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <path d="M300 257 L288 268" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <path d="M262 275 Q250 265 260 255" stroke="#e74c3c" stroke-width="2" fill="none"/>
    
    <text x="275" y="295" text-anchor="middle" class="small-label" fill="#c0392b">Cycle = Deadlock!</text>
  </g>
  
  <!-- Section 6: Detection vs Prevention (Bottom right) -->
  <g class="slide-in delay-3">
    <rect x="345" y="195" width="65" height="95" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="377" y="212" text-anchor="middle" class="section-title">Approaches</text>
    
    <rect x="352" y="222" width="50" height="18" rx="4" fill="#fadbd8"/>
    <text x="377" y="235" text-anchor="middle" class="small-label">Detection</text>
    <rect x="352" y="244" width="50" height="18" rx="4" fill="#d4efdf"/>
    <text x="377" y="257" text-anchor="middle" class="small-label">Prevention</text>
    <rect x="352" y="266" width="50" height="18" rx="4" fill="#d6eaf8"/>
    <text x="377" y="279" text-anchor="middle" class="small-label">Avoidance</text>
  </g>
  
  <!-- Animated highlight circle -->
  <circle cx="275" cy="245" r="20" fill="none" stroke="#e74c3c" stroke-width="2" class="pulse" opacity="0.5"/>
  
  <!-- Data narration attributes (hidden, for accessibility) -->
  <rect x="0" y="0" width="420" height="400" fill="transparent" data-narration="Deadlock Detection and Prevention diagram showing four necessary conditions for deadlock, Resource Allocation Graph with processes and resources, Banker's Algorithm steps, Wait-For Graph with cycle detection, and prevention strategies"/>
</svg>