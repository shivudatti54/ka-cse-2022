<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="process-synchronization-semaphores">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="semBoxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8fbcd4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdcb6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="signalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#55a891;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="queueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dfe6e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b2bec3;stop-opacity:1" />
    </linearGradient>
  </defs>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #34495e; }
    .code { font-family: monospace; font-size: 11px; fill: #2c3e50; }
    .section-box { rx: 8; ry: 8; stroke: #5d6d7e; stroke-width: 1.5; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .bounce { animation: bounce 1.5s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Process Synchronization</text>
  <text x="210" y="46" text-anchor="middle" class="label" style="fill:#5d6d7e;">with Semaphores</text>
  
  <!-- Semaphore Structure Box -->
  <g class="slide-in" style="animation-delay: 0.2s;">
    <rect x="20" y="60" width="120" height="70" rx="8" fill="url(#semBoxGrad)" class="section-box"/>
    <text x="80" y="80" text-anchor="middle" class="label" style="font-weight:bold;">Semaphore</text>
    <text x="80" y="100" text-anchor="middle" class="detail">Integer S = 1</text>
    <text x="80" y="118" text-anchor="middle" class="detail" style="fill:#7f8c8d;">(non-negative)</text>
  </g>
  
  <!-- wait() Operation -->
  <g class="slide-in" style="animation-delay: 0.4s;">
    <rect x="160" y="60" width="110" height="70" rx="8" fill="url(#waitGrad)" class="section-box"/>
    <text x="215" y="80" text-anchor="middle" class="label" style="font-weight:bold;">wait(S)</text>
    <text x="215" y="98" text-anchor="middle" class="detail">P Operation</text>
    <text x="215" y="116" text-anchor="middle" class="code">S = S - 1</text>
  </g>
  
  <!-- signal() Operation -->
  <g class="slide-in" style="animation-delay: 0.6s;">
    <rect x="290" y="60" width="110" height="70" rx="8" fill="url(#signalGrad)" class="section-box"/>
    <text x="345" y="80" text-anchor="middle" class="label" style="font-weight:bold;">signal(S)</text>
    <text x="345" y="98" text-anchor="middle" class="detail">V Operation</text>
    <text x="345" y="116" text-anchor="middle" class="code">S = S + 1</text>
  </g>
  
  <!-- Arrow connecting semaphore to operations -->
  <g class="fade-in" style="animation-delay: 0.8s;">
    <path d="M140 95 L155 95" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrowhead)"/>
    <path d="M270 95 L285 95" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Process Queue Box -->
  <g class="slide-in" style="animation-delay: 1s;">
    <rect x="20" y="145" width="380" height="80" rx="8" fill="url(#queueGrad)" class="section-box"/>
    <text x="210" y="165" text-anchor="middle" class="label" style="font-weight:bold;">Blocked Process Queue</text>
    <rect x="40" y="180" width="50" height="30" rx="4" fill="#e74c3c" class="bounce" style="animation-delay: 1.5s;"/>
    <text x="65" y="200" text-anchor="middle" class="detail" style="fill:white;">P1</text>
    <rect x="100" y="180" width="50" height="30" rx="4" fill="#e74c3c" class="bounce" style="animation-delay: 1.7s;"/>
    <text x="125" y="200" text-anchor="middle" class="detail" style="fill:white;">P2</text>
    <rect x="160" y="180" width="50" height="30" rx="4" fill="#e74c3c" class="bounce" style="animation-delay: 1.9s;"/>
    <text x="185" y="200" text-anchor="middle" class="detail" style="fill:white;">P3</text>
    <text x="280" y="195" text-anchor="middle" class="detail">When S &lt; 0, process blocks</text>
    <text x="280" y="212" text-anchor="middle" class="detail">Added to waiting queue</text>
  </g>
  
  <!-- Semaphore Types -->
  <g class="slide-in" style="animation-delay: 1.2s;">
    <rect x="20" y="240" width="180" height="70" rx="8" fill="#fadbd8" class="section-box"/>
    <text x="110" y="262" text-anchor="middle" class="label" style="font-weight:bold;">Binary Semaphore</text>
    <text x="110" y="282" text-anchor="middle" class="detail">Values: 0 or 1</text>
    <text x="110" y="300" text-anchor="middle" class="detail">Used for Mutual Exclusion</text>
  </g>
  
  <g class="slide-in" style="animation-delay: 1.4s;">
    <rect x="220" y="240" width="180" height="70" rx="8" fill="#d5f5e3" class="section-box"/>
    <text x="310" y="262" text-anchor="middle" class="label" style="font-weight:bold;">Counting Semaphore</text>
    <text x="310" y="282" text-anchor="middle" class="detail">Values: 0 to N</text>
    <text x="310" y="300" text-anchor="middle" class="detail">Manages N identical resources</text>
  </g>
  
  <!-- Producer-Consumer Example -->
  <g class="slide-in" style="animation-delay: 1.6s;">
    <rect x="20" y="325" width="380" height="65" rx="8" fill="#e8daef" class="section-box"/>
    <text x="210" y="345" text-anchor="middle" class="label" style="font-weight:bold;">Producer-Consumer Problem</text>
    <text x="80" y="368" text-anchor="middle" class="detail">empty=1, full=0</text>
    <text x="210" y="368" text-anchor="middle" class="code" style="font-size:10px;">wait(empty) → produce → signal(full)</text>
    <text x="340" y="368" text-anchor="middle" class="detail">Bounded Buffer</text>
    <circle cx="380" cy="360" r="8" fill="#9b59b6" class="pulse"/>
  </g>
  
  <!-- Arrow from queue to types -->
  <g class="fade-in" style="animation-delay: 1.8s;">
    <path d="M210 225 L210 235" stroke="#5d6d7e" stroke-width="1.5" stroke-dasharray="4,2"/>
  </g>
  
  <!-- Data narration attributes on key elements -->
  <rect x="20" y="60" width="120" height="70" fill="transparent" data-narration="Semaphore is an integer variable with two atomic operations"/>
  <rect x="160" y="60" width="110" height="70" fill="transparent" data-narration="wait(P) decrements semaphore, blocks if value becomes negative"/>
  <rect x="290" y="60" width="110" height="70" fill="transparent" data-narration="signal(V) increments semaphore, wakes blocked process"/>
  <rect x="20" y="145" width="380" height="80" fill="transparent" data-narration="Blocked processes are queued when semaphore is negative"/>
  <rect x="20" y="240" width="180" height="70" fill="transparent" data-narration="Binary semaphore provides mutual exclusion with values 0 or 1"/>
  <rect x="220" y="240" width="180" height="70" fill="transparent" data-narration="Counting semaphore manages multiple identical resources"/>
  <rect x="20" y="325" width="380" height="65" fill="transparent" data-narration="Producer-Consumer uses semaphores to synchronize buffer access"/>
</svg>