<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="heaps-priority-queues">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#f0e8f8"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5dade2"/>
      <stop offset="100%" style="stop-color:#3498db"/>
    </linearGradient>
    <linearGradient id="arrayGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a9dfbf"/>
      <stop offset="100%" style="stop-color:#27ae60"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9e79f"/>
      <stop offset="100%" style="stop-color:#f39c12"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 1s ease-out; font-family: Arial, sans-serif; font-weight: bold; }
    .node { animation: fadeIn 0.8s ease-out; transform-origin: center; }
    .node-anim { animation: pulse 2s infinite; }
    .array-cell { animation: slideIn 0.6s ease-out; }
    .arrow { animation: fadeIn 1.2s ease-out; }
    .concept-box { animation: fadeIn 1s ease-out; }
    .label { font-family: Arial, sans-serif; font-size: 12px; }
    .value { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" fill="#2c3e50" font-size="22" font-weight="bold">Heaps &amp; Priority Queues</text>
  
  <!-- Section 1: Max-Heap Tree Structure -->
  <g data-narration="Max-Heap tree structure showing complete binary tree with heap property">
    <text x="20" y="55" class="label" fill="#7f8c8d" font-size="12">Max-Heap Tree</text>
    <!-- Tree edges -->
    <line x1="105" y1="95" x2="70" y2="130" stroke="#7f8c8d" stroke-width="2" class="arrow"/>
    <line x1="105" y1="95" x2="140" y2="130" stroke="#7f8c8d" stroke-width="2" class="arrow"/>
    <line x1="70" y1="130" x2="50" y2="165" stroke="#7f8c8d" stroke-width="2" class="arrow"/>
    <line x1="70" y1="130" x2="90" y2="165" stroke="#7f8c8d" stroke-width="2" class="arrow"/>
    <line x1="140" y1="130" x2="120" y2="165" stroke="#7f8c8d" stroke-width="2" class="arrow"/>
    
    <!-- Root node -->
    <circle cx="105" cy="85" r="22" fill="url(#nodeGradient)" filter="url(#shadow)" class="node"/>
    <text x="105" y="90" text-anchor="middle" fill="white" class="value">10</text>
    
    <!-- Level 2 nodes -->
    <circle cx="70" cy="140" r="18" fill="url(#nodeGradient)" filter="url(#shadow)" class="node" style="animation-delay: 0.2s"/>
    <text x="70" y="145" text-anchor="middle" fill="white" class="value">5</text>
    
    <circle cx="140" cy="140" r="18" fill="url(#nodeGradient)" filter="url(#shadow)" class="node" style="animation-delay: 0.3s"/>
    <text x="140" y="145" text-anchor="middle" fill="white" class="value">3</text>
    
    <!-- Level 3 nodes -->
    <circle cx="50" cy="175" r="14" fill="url(#nodeGradient)" filter="url(#shadow)" class="node" style="animation-delay: 0.4s"/>
    <text x="50" y="179" text-anchor="middle" fill="white" class="value" font-size="12">4</text>
    
    <circle cx="90" cy="175" r="14" fill="url(#nodeGradient)" filter="url(#shadow)" class="node" style="animation-delay: 0.5s"/>
    <text x="90" y="179" text-anchor="middle" fill="white" class="value" font-size="12">1</text>
  </g>
  
  <!-- Section 2: Array Representation -->
  <g data-narration="Array representation showing how tree maps to indices 0-4">
    <text x="200" y="55" class="label" fill="#7f8c8d" font-size="12">Array: [10, 5, 3, 4, 1]</text>
    <rect x="195" y="65" width="210" height="30" fill="white" rx="5" stroke="#27ae60" stroke-width="1"/>
    
    <!-- Array cells -->
    <g class="array-cell">
      <rect x="200" y="70" width="35" height="20" fill="url(#arrayGradient)" rx="3"/>
      <text x="217.5" y="84" text-anchor="middle" fill="white" class="label">10</text>
      <text x="217.5" y="100" text-anchor="middle" fill="#7f8c8d" class="detail">[0]</text>
    </g>
    <g class="array-cell" style="animation-delay: 0.1s">
      <rect x="240" y="70" width="35" height="20" fill="url(#arrayGradient)" rx="3"/>
      <text x="257.5" y="84" text-anchor="middle" fill="white" class="label">5</text>
      <text x="257.5" y="100" text-anchor="middle" fill="#7f8c8d" class="detail">[1]</text>
    </g>
    <g class="array-cell" style="animation-delay: 0.2s">
      <rect x="280" y="70" width="35" height="20" fill="url(#arrayGradient)" rx="3"/>
      <text x="297.5" y="84" text-anchor="middle" fill="white" class="label">3</text>
      <text x="297.5" y="100" text-anchor="middle" fill="#7f8c8d" class="detail">[2]</text>
    </g>
    <g class="array-cell" style="animation-delay: 0.3s">
      <rect x="320" y="70" width="35" height="20" fill="url(#arrayGradient)" rx="3"/>
      <text x="337.5" y="84" text-anchor="middle" fill="white" class="label">4</text>
      <text x="337.5" y="100" text-anchor="middle" fill="#7f8c8d" class="detail">[3]</text>
    </g>
    <g class="array-cell" style="animation-delay: 0.4s">
      <rect x="360" y="70" width="35" height="20" fill="url(#arrayGradient)" rx="3"/>
      <text x="377.5" y="84" text-anchor="middle" fill="white" class="label">1</text>
      <text x="377.5" y="100" text-anchor="middle" fill="#7f8c8d" class="detail">[4]</text>
    </g>
  </g>
  
  <!-- Section 3: Key Formulas -->
  <g data-narration="Index calculation formulas showing parent-child relationships in array">
    <text x="30" y="215" class="label" fill="#7f8c8d" font-size="12">Index Formulas</text>
    <rect x="20" y="225" width="160" height="60" fill="white" rx="5" stroke="#9b59b6" stroke-width="1" filter="url(#shadow)"/>
    <text x="30" y="245" fill="#2c3e50" class="detail">Parent(i) = ⌊(i-1)/2⌋</text>
    <text x="30" y="262" fill="#2c3e50" class="detail">Left(i) = 2i + 1</text>
    <text x="30" y="279" fill="#2c3e50" class="detail">Right(i) = 2i + 2</text>
  </g>
  
  <!-- Section 4: Operations -->
  <g data-narration="Core heap operations with time complexity">
    <text x="220" y="215" class="label" fill="#7f8c8d" font-size="12">Operations</text>
    <rect x="200" y="225" width="200" height="60" fill="white" rx="5" stroke="#e74c3c" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="245" fill="#2c3e50" class="detail">Insert: O(log n) ⬆️ percolate-up</text>
    <text x="210" y="262" fill="#2c3e50" class="detail">Extract-Max: O(log n) ⬇️ percolate-down</text>
    <text x="210" y="279" fill="#2c3e50" class="detail">Peek: O(1) — root element</text>
  </g>
  
  <!-- Section 5: Priority Queue ADT -->
  <g data-narration="Priority Queue abstract data type methods">
    <text x="30" y="305" class="label" fill="#7f8c8d" font-size="12">Priority Queue ADT</text>
    <rect x="20" y="315" width="180" height="70" fill="white" rx="5" stroke="#3498db" stroke-width="1" filter="url(#shadow)"/>
    <text x="30" y="335" fill="#2c3e50" class="detail">enqueue(item, priority)</text>
    <text x="30" y="352" fill="#2c3e50" class="detail">dequeue() → highest priority</text>
    <text x="30" y="369" fill="#2c3e50" class="detail">peek() → without removal</text>
    <text x="30" y="382" fill="#2c3e50" class="detail">isEmpty() → boolean</text>
  </g>
  
  <!-- Section 6: Applications -->
  <g data-narration="Real-world applications of heaps and priority queues">
    <text x="230" y="305" class="label" fill="#7f8c8d" font-size="12">Applications</text>
    <rect x="200" y="315" width="200" height="70" fill="url(#boxGradient)" rx="5" filter="url(#shadow)"/>
    <text x="210" y="335" fill="#2c3e50" class="detail">🏥 Emergency Triage</text>
    <text x="210" y="352" fill="#2c3e50" class="detail">💻 OS Process Scheduling</text>
    <text x="210" y="369" fill="#2c3e50" class="detail">🗺️ Dijkstra's Algorithm</text>
    <text x="210" y="382" fill="#2c3e50" class="detail">📊 Heap Sort</text>
  </g>
  
  <!-- Heapify Arrow -->
  <g data-narration="Heapify operation visual showing comparison and swap">
    <text x="105" y="205" class="label" fill="#7f8c8d" font-size="11" text-anchor="middle">Heapify↓</text>
    <path d="M105 198 L105 188" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  </g>
  
  <!-- Visual indicator for max element -->
  <g class="node-anim" style="transform-origin: 105px 85px">
    <circle cx="105" cy="85" r="26" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3"/>
  </g>
  
  <!-- Legend -->
  <g data-narration="Legend showing heap property: parent >= children">
    <rect x="320" y="220" width="80" height="50" fill="#fdebd0" rx="3"/>
    <text x="330" y="238" fill="#2c3e50" class="detail" font-size="10">Max-Heap:</text>
    <text x="330" y="252" fill="#2c3e50" class="detail" font-size="10">Parent ≥ Child</text>
    <text x="330" y="266" fill="#2c3e50" class="detail" font-size="10">10 ≥ 5, 3, 4, 1</text>
  </g>
</svg>