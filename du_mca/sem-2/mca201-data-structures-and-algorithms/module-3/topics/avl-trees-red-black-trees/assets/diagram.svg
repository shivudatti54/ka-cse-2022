<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="avl-trees-red-black-trees">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5e6d3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="avlGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95c9b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rbGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#eac4d5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8b4c2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotateIn {
      from { transform: rotate(-90deg); opacity: 0; }
      to { transform: rotate(0deg); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; font-family: Arial, sans-serif; }
    .section-box { animation: slideIn 0.6s ease-out; }
    .node { animation: pulse 2s infinite; transform-origin: center; }
    .avl-node { animation: fadeIn 0.5s ease-out; }
    .rb-node { animation: fadeIn 0.5s ease-out 0.2s both; }
    .arrow-line { animation: fadeIn 0.8s ease-out; }
    .concept-text { animation: slideIn 0.5s ease-out; font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" font-size="22" font-weight="bold" fill="#2c3e50" font-family="Arial">AVL Trees &amp; Red-Black Trees</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#34495e" stroke-width="2" class="title"/>
  
  <!-- Section 1: AVL Tree Box -->
  <g class="section-box" data-narration="AVL Trees maintain strict balance with height difference ≤ 1 between subtrees">
    <rect x="15" y="55" width="185" height="85" rx="8" fill="url(#avlGradient)" filter="url(#shadow)"/>
    <text x="25" y="75" font-size="16" font-weight="bold" fill="#1a5f4a" font-family="Arial">AVL Trees</text>
    <text x="25" y="95" font-size="12" fill="#2c7a5f" font-family="Arial">• Balance Factor: -1, 0, +1</text>
    <text x="25" y="112" font-size="12" fill="#2c7a5f" font-family="Arial">• Rotations: LL, RR, LR, RL</text>
    <text x="25" y="129" font-size="12" fill="#2c7a5f" font-family="Arial">• Height-balanced → O(log n)</text>
  </g>
  
  <!-- Section 2: Red-Black Tree Box -->
  <g class="section-box" data-narration="Red-Black Trees use color coding to maintain approximate balance">
    <rect x="220" y="55" width="185" height="85" rx="8" fill="url(#rbGradient)" filter="url(#shadow)"/>
    <text x="230" y="75" font-size="16" font-weight="bold" fill="#8b3a62" font-family="Arial">Red-Black Trees</text>
    <text x="230" y="95" font-size="12" fill="#9c4a6e" font-family="Arial">• Nodes: Red or Black</text>
    <text x="230" y="112" font-size="12" fill="#9c4a6e" font-family="Arial">• Root &amp; leaves are Black</text>
    <text x="230" y="129" font-size="12" fill="#9c4a6e" font-family="Arial">• No consecutive red nodes</text>
  </g>
  
  <!-- Section 3: AVL Left Rotation Diagram -->
  <g data-narration="Left rotation fixes right-heavy imbalance by rotating the right child up">
    <text x="30" y="160" font-size="14" font-weight="bold" fill="#1a5f4a" font-family="Arial">Left Rotation (AVL)</text>
    
    <!-- Before rotation -->
    <text x="50" y="180" font-size="11" fill="#555" font-family="Arial">Before:</text>
    <circle cx="70" cy="210" r="18" fill="#7fcbb8" stroke="#1a5f4a" stroke-width="2" class="avl-node"/>
    <text x="70" y="215" text-anchor="middle" font-size="12" fill="#1a5f4a" font-family="Arial">X</text>
    
    <circle cx="130" cy="210" r="18" fill="#7fcbb8" stroke="#1a5f4a" stroke-width="2" class="avl-node"/>
    <text x="130" y="215" text-anchor="middle" font-size="12" fill="#1a5f4a" font-family="Arial">Y</text>
    
    <circle cx="160" cy="240" r="14" fill="#a8e0d4" stroke="#1a5f4a" stroke-width="1.5" class="avl-node"/>
    <text x="160" y="244" text-anchor="middle" font-size="10" fill="#1a5f4a" font-family="Arial">T2</text>
    
    <line x1="88" y1="210" x2="112" y2="210" stroke="#1a5f4a" stroke-width="2" class="arrow-line"/>
    <line x1="144" y1="220" x2="152" y2="232" stroke="#1a5f4a" stroke-width="1.5" class="arrow-line"/>
    
    <!-- Arrow -->
    <path d="M 200 210 L 230 210" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow-line"/>
    
    <!-- After rotation -->
    <text x="250" y="180" font-size="11" fill="#555" font-family="Arial">After:</text>
    <circle cx="280" cy="210" r="18" fill="#7fcbb8" stroke="#1a5f4a" stroke-width="2" class="avl-node"/>
    <text x="280" y="215" text-anchor="middle" font-size="12" fill="#1a5f4a" font-family="Arial">Y</text>
    
    <circle cx="340" cy="210" r="18" fill="#7fcbbb" stroke="#1a5f4a" stroke-width="2" class="avl-node"/>
    <text x="340" y="215" text-anchor="middle" font-size="12" fill="#1a5f4a" font-family="Arial">X</text>
    
    <circle cx="370" cy="240" r="14" fill="#a8e0d4" stroke="#1a5f4a" stroke-width="1.5" class="avl-node"/>
    <text x="370" y="244" text-anchor="middle" font-size="10" fill="#1a5f4a" font-family="Arial">T2</text>
    
    <line x1="298" y1="210" x2="322" y2="210" stroke="#1a5f4a" stroke-width="2" class="arrow-line"/>
    <line x1="354" y1="220" x2="362" y2="232" stroke="#1a5f4a" stroke-width="1.5" class="arrow-line"/>
  </g>
  
  <!-- Section 4: Red-Black Tree Insertion -->
  <g data-narration="Red-Black tree fixup handles double-red violations through recoloring and rotations">
    <text x="30" y="275" font-size="14" font-weight="bold" fill="#8b3a62" font-family="Arial">RBT Insertion Fixup Cases</text>
    
    <!-- Case 1 -->
    <rect x="30" y="288" width="110" height="35" rx="5" fill="#f8e8ef" stroke="#d8a4b8" stroke-width="1"/>
    <text x="38" y="303" font-size="11" font-weight="bold" fill="#8b3a62" font-family="Arial">Case 1:</text>
    <text x="38" y="316" font-size="10" fill="#7a4a5e" font-family="Arial">Uncle Red → Recolor</text>
    
    <!-- Case 2 -->
    <rect x="150" y="288" width="110" height="35" rx="5" fill="#f8e8ef" stroke="#d8a4b8" stroke-width="1"/>
    <text x="158" y="303" font-size="11" font-weight="bold" fill="#8b3a62" font-family="Arial">Case 2:</text>
    <text x="158" y="316" font-size="10" fill="#7a4a5e" font-family="Arial">Uncle Black + Line</text>
    
    <!-- Case 3 -->
    <rect x="270" y="288" width="110" height="35" rx="5" fill="#f8e8ef" stroke="#d8a4b8" stroke-width="1"/>
    <text x="278" y="303" font-size="11" font-weight="bold" fill="#8b3a62" font-family="Arial">Case 3:</text>
    <text x="278" y="316" font-size="10" fill="#7a4a5e" font-family="Arial">Uncle Black + Triangle</text>
  </g>
  
  <!-- Section 5: Comparison Table -->
  <g data-narration="Comparison shows trade-offs: AVL better for search, RBT better for frequent modifications">
    <text x="30" y="340" font-size="14" font-weight="bold" fill="#2c3e50" font-family="Arial">Comparison</text>
    
    <rect x="30" y="352" width="175" height="40" rx="5" fill="#fff5e6" stroke="#e6c9a8" stroke-width="1"/>
    <text x="40" y="368" font-size="11" fill="#6b5a4a" font-family="Arial">AVL: Search-heavy apps</text>
    <text x="40" y="383" font-size="11" fill="#6b5a4a" font-family="Arial">DB Indexing, Read-intensive</text>
    
    <rect x="215" y="352" width="175" height="40" rx="5" fill="#e6f4f1" stroke="#b8d8c8" stroke-width="1"/>
    <text x="225" y="368" font-size="11" fill="#4a6b5a" font-family="Arial">RBT: Write-heavy apps</text>
    <text x="225" y="383" font-size="11" fill="#4a6b5a" font-family="Arial">Linux Kernel, TreeMap</text>
  </g>
  
  <!-- Visual Tree Examples -->
  <g data-narration="Example trees showing structure differences">
    <!-- Simple AVL tree visual -->
    <circle cx="100" cy="175" r="10" fill="#5cb89d" stroke="#1a5f4a" stroke-width="1.5"/>
    <circle cx="80" cy="195" r="8" fill="#5cb89d" stroke="#1a5f4a" stroke-width="1.5"/>
    <circle cx="120" cy="195" r="8" fill="#5cb89d" stroke="#1a5f4a" stroke-width="1.5"/>
    <line x1="90" y1="185" x2="82" y2="188" stroke="#1a5f4a" stroke-width="1"/>
    <line x1="110" y1="185" x2="118" y2="188" stroke="#1a5f4a" stroke-width="1"/>
    
    <!-- Simple RBT tree visual -->
    <circle cx="320" cy="175" r="10" fill="#d85080" stroke="#8b3a62" stroke-width="1.5"/>
    <circle cx="300" cy="195" r="8" fill="#2c2c2c" stroke="#000" stroke-width="1"/>
    <circle cx="340" cy="195" r="8" fill="#d85080" stroke="#8b3a62" stroke-width="1"/>
    <line x1="310" y1="185" x2="302" y2="188" stroke="#555" stroke-width="1"/>
    <line x1="330" y1="185" x2="338" y2="188" stroke="#8b3a62" stroke-width="1"/>
  </g>
  
  <!-- Legend -->
  <g>
    <circle cx="400" y="360" r="6" fill="#5cb89d"/>
    <text x="388" y="364" font-size="9" fill="#555" font-family="Arial">AVL</text>
    <circle cx="400" y="378" r="6" fill="#d85080"/>
    <circle cx="400" y="378" r="6" fill="none" stroke="#2c2c2c" stroke-width="2"/>
    <text x="388" y="382" font-size="9" fill="#555" font-family="Arial">RBT</text>
  </g>
</svg>