<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="binary-trees-bst">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dced"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4"/>
      <stop offset="100%" style="stop-color:#2d5a6b"/>
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6bb3a0"/>
      <stop offset="100%" style="stop-color:#3d7a68"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#0003"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; font-family: Georgia, serif; }
    .section-box { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .section-box:nth-child(1) { animation-delay: 0.3s; }
    .section-box:nth-child(2) { animation-delay: 0.5s; }
    .section-box:nth-child(3) { animation-delay: 0.7s; }
    .node { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .node-1 { animation-delay: 0.5s; }
    .node-2 { animation-delay: 1.0s; }
    .node-3 { animation-delay: 1.5s; }
    .node-4 { animation-delay: 2.0s; }
    .edge { stroke: #4a6a7a; stroke-width: 2; stroke-dasharray: 100; animation: drawLine 0.5s ease-out forwards; stroke-dashoffset: 100; }
    .edge-1 { animation-delay: 1.2s; }
    .edge-2 { animation-delay: 1.7s; }
    .edge-3 { animation-delay: 2.2s; }
    .label { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
    .label-1 { animation-delay: 0.8s; }
    .label-2 { animation-delay: 1.3s; }
    .label-3 { animation-delay: 1.8s; }
    .label-4 { animation-delay: 2.3s; }
    .key-concept { animation: slideInDown 0.5s ease-out forwards; opacity: 0; }
    .concept-1 { animation-delay: 2.5s; }
    .concept-2 { animation-delay: 2.7s; }
    .concept-3 { animation-delay: 2.9s; }
    .highlight { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .step-text { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
    .step-1 { animation-delay: 0.4s; }
    .step-2 { animation-delay: 0.9s; }
    .step-3 { animation-delay: 1.4s; }
    .step-4 { animation-delay: 1.9s; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title" font-size="22" font-weight="bold" fill="#2d4a5a" font-family="Georgia, serif">Binary Search Trees (BST)</text>
  <line x1="60" y1="45" x2="360" y2="45" stroke="#4a90a4" stroke-width="2" class="title" style="animation-delay: 0.3s"/>
  
  <!-- BST Property Box -->
  <g class="section-box">
    <rect x="15" y="55" width="140" height="55" rx="8" fill="#f8fafc" stroke="#4a90a4" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="85" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d5a6b">BST Property</text>
    <text x="85" y="88" text-anchor="middle" font-size="10" fill="#4a6a7a">Left &lt; Node &lt; Right</text>
    <text x="85" y="101" text-anchor="middle" font-size="9" fill="#5a7a8a">O(h) time complexity</text>
  </g>
  
  <!-- Insertion Steps Box -->
  <g class="section-box">
    <rect x="165" y="55" width="240" height="55" rx="8" fill="#f0f7f4" stroke="#6bb3a0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="285" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d5a6b">Insertion: [5, 3, 7, 2]</text>
    <g class="step-text step-1">
      <circle cx="210" cy="90" r="8" fill="#4a90a4"/>
      <text x="210" y="94" text-anchor="middle" font-size="10" fill="white">5</text>
    </g>
    <g class="step-text step-2">
      <circle cx="245" cy="90" r="8" fill="#6bb3a0"/>
      <text x="245" y="94" text-anchor="middle" font-size="10" fill="white">3</text>
    </g>
    <g class="step-text step-3">
      <circle cx="280" cy="90" r="8" fill="#6bb3a0"/>
      <text x="280" y="94" text-anchor="middle" font-size="10" fill="white">7</text>
    </g>
    <g class="step-text step-4">
      <circle cx="315" cy="90" r="8" fill="#6bb3a0"/>
      <text x="315" y="94" text-anchor="middle" font-size="10" fill="white">2</text>
    </g>
    <path d="M218 90 L237 90" stroke="#4a6a7a" stroke-width="1.5" stroke-dasharray="3"/>
    <path d="M253 90 L272 90" stroke="#4a6a7a" stroke-width="1.5" stroke-dasharray="3"/>
    <path d="M288 90 L307 90" stroke="#4a6a7a" stroke-width="1.5" stroke-dasharray="3"/>
  </g>
  
  <!-- Tree Structure -->
  <g transform="translate(210, 180)">
    <!-- Edges -->
    <line x1="0" y1="0" x2="-60" y2="60" class="edge edge-1" fill="none"/>
    <line x1="0" y1="0" x2="60" y2="60" class="edge edge-2" fill="none"/>
    <line x1="-60" y1="60" x2="-90" y2="110" class="edge edge-3" fill="none"/>
    
    <!-- Root Node -->
    <g class="node node-1 highlight">
      <circle cx="0" cy="0" r="22" fill="url(#nodeGradient)" filter="url(#shadow)"/>
      <text x="0" y="5" text-anchor="middle" font-size="14" font-weight="bold" fill="white">5</text>
      <text x="0" y="-30" text-anchor="middle" font-size="9" fill="#4a6a7a">Root</text>
    </g>
    
    <!-- Left Child -->
    <g class="node node-2">
      <circle cx="-60" cy="60" r="20" fill="url(#leafGradient)" filter="url(#shadow)"/>
      <text x="-60" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="white">3</text>
      <text x="-60" y="90" text-anchor="middle" font-size="9" fill="#3d7a68">Left: 3 &lt; 5</text>
    </g>
    
    <!-- Right Child -->
    <g class="node node-3">
      <circle cx="60" cy="60" r="20" fill="url(#leafGradient)" filter="url(#shadow)"/>
      <text x="60" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="white">7</text>
      <text x="60" y="90" text-anchor="middle" font-size="9" fill="#3d7a68">Right: 7 &gt; 5</text>
    </g>
    
    <!-- Left-Left Child -->
    <g class="node node-4">
      <circle cx="-90" cy="110" r="18" fill="url(#leafGradient)" filter="url(#shadow)"/>
      <text x="-90" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="white">2</text>
      <text x="-90" y="138" text-anchor="middle" font-size="8" fill="#3d7a68">2 &lt; 3 (L)</text>
    </g>
  </g>
  
  <!-- Labels -->
  <g class="label label-1" data-narration="Root node 5 is inserted first as the tree is empty">
    <rect x="75" y="295" width="80" height="22" rx="4" fill="#e8f4f8" stroke="#4a90a4"/>
    <text x="115" y="310" text-anchor="middle" font-size="10" fill="#2d5a6b">Step 1: Insert 5</text>
  </g>
  <g class="label label-2" data-narration="3 is less than 5 so goes to left subtree">
    <rect x="170" y="295" width="80" height="22" rx="4" fill="#e8f4f8" stroke="#6bb3a0"/>
    <text x="210" y="310" text-anchor="middle" font-size="10" fill="#2d5a6b">Step 2: Insert 3</text>
  </g>
  <g class="label label-3" data-narration="7 is greater than 5 so goes to right subtree">
    <rect x="265" y="295" width="80" height="22" rx="4" fill="#e8f4f8" stroke="#6bb3a0"/>
    <text x="305" y="310" text-anchor="middle" font-size="10" fill="#2d5a6b">Step 3: Insert 7</text>
  </g>
  <g class="label label-4" data-narration="2 is less than 5 and 3, so becomes left child of 3">
    <rect x="265" y="325" width="80" height="22" rx="4" fill="#e8f4f8" stroke="#6bb3a0"/>
    <text x="305" y="340" text-anchor="middle" font-size="10" fill="#2d5a6b">Step 4: Insert 2</text>
  </g>
  
  <!-- Key Operations Box -->
  <g class="section-box">
    <rect x="15" y="355" width="240" height="35" rx="6" fill="#fef9e7" stroke="#d4a574" stroke-width="1"/>
    <text x="135" y="372" text-anchor="middle" font-size="11" fill="#5a4a3a">
      <tspan font-weight="bold">Operations:</tspan> Search • Insert • Delete • Traverse
    </text>
  </g>
  
  <!-- Traversal Methods -->
  <g class="key-concept concept-1" data-narration="In-order traversal produces sorted sequence: 2, 3, 5, 7">
    <rect x="265" y="355" width="140" height="35" rx="6" fill="#f0f4f8" stroke="#7a9ab8" stroke-width="1"/>
    <text x="335" y="367" text-anchor="middle" font-size="9" fill="#3d5a6b">In-order (LNR):</text>
    <text x="335" y="380" text-anchor="middle" font-size="10" font-weight="bold" fill="#2d4a5a">2 → 3 → 5 → 7</text>
  </g>
  
  <!-- Arrow annotations -->
  <g class="label label-1">
    <path d="M140 185 L150 185" stroke="#4a6a7a" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="145" y="180" font-size="8" fill="#4a6a7a">L</text>
  </g>
  <g class="label label-2">
    <path d="M270 185 L280 185" stroke="#4a6a7a" stroke-width="1.5"/>
    <text x="275" y="180" font-size="8" fill="#4a6a7a">R</text>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4a6a7a"/>
    </marker>
  </defs>
  
  <!-- Data narration attributes on main groups -->
  <title data-narration="Binary Search Trees are hierarchical data structures enabling efficient O(h) search, insertion, and deletion operations">BST Overview</title>
</svg>