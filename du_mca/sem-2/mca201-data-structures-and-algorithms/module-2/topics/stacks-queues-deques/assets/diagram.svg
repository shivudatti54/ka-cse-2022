<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="stacks-queues-deques">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0e6f6"/>
      <stop offset="100%" style="stop-color:#e6f6f0"/>
    </linearGradient>
    <linearGradient id="stackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb88c"/>
      <stop offset="100%" style="stop-color:#de6262"/>
    </linearGradient>
    <linearGradient id="queueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <linearGradient id="dequeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2"/>
      <stop offset="100%" style="stop-color:#fef9d7"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowMove {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .op-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #fff; font-weight: 600; }
    .box-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #fff; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide { animation: slideUp 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title">Stacks, Queues &amp; Deques</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#bdc3c7" stroke-width="2"/>
  
  <!-- Stack Section -->
  <g data-narration="Stack: Last-In-First-Out (LIFO) - Elements added and removed from the same end">
    <rect x="20" y="55" width="115" height="145" rx="8" fill="url(#stackGrad)" opacity="0.9"/>
    <text x="77" y="75" text-anchor="middle" class="box-title">STACK (LIFO)</text>
    
    <!-- Stack elements -->
    <rect x="30" y="145" width="95" height="22" rx="3" fill="#fff" opacity="0.9" class="anim-slide"/>
    <text x="77" y="161" text-anchor="middle" class="label" style="font-size:12px;">A</text>
    
    <rect x="30" y="120" width="95" height="22" rx="3" fill="#fff" opacity="0.85" class="anim-slide" style="animation-delay:0.1s"/>
    <text x="77" y="136" text-anchor="middle" class="label" style="font-size:12px;">B</text>
    
    <rect x="30" y="95" width="95" height="22" rx="3" fill="#fff" opacity="0.8" class="anim-slide" style="animation-delay:0.2s"/>
    <text x="77" y="111" text-anchor="middle" class="label" style="font-size:12px;">C</text>
    
    <!-- Top pointer -->
    <polygon points="77,85 67,95 87,95" fill="#e74c3c" class="anim-pulse"/>
    <text x="77" y="83" text-anchor="middle" class="detail" fill="#e74c3c">TOP</text>
    
    <!-- Operations -->
    <rect x="25" y="210" width="50" height="18" rx="4" fill="#e74c3c"/>
    <text x="50" y="223" text-anchor="middle" class="op-label">PUSH</text>
    <rect x="80" y="210" width="50" height="18" rx="4" fill="#e74c3c"/>
    <text x="105" y="223" text-anchor="middle" class="op-label">POP</text>
  </g>
  
  <!-- Queue Section -->
  <g data-narration="Queue: First-In-First-Out (FIFO) - Elements added at rear, removed from front">
    <rect x="152" y="55" width="115" height="145" rx="8" fill="url(#queueGrad)" opacity="0.9"/>
    <text x="209" y="75" text-anchor="middle" class="box-title">QUEUE (FIFO)</text>
    
    <!-- Queue elements -->
    <rect x="162" y="145" width="25" height="22" rx="3" fill="#fff" opacity="0.9" class="anim-slide"/>
    <text x="174" y="161" text-anchor="middle" class="label" style="font-size:11px;">A</text>
    
    <rect x="190" y="145" width="25" height="22" rx="3" fill="#fff" opacity="0.85" class="anim-slide" style="animation-delay:0.1s"/>
    <text x="202" y="161" text-anchor="middle" class="label" style="font-size:11px;">B</text>
    
    <rect x="218" y="145" width="25" height="22" rx="3" fill="#fff" opacity="0.8" class="anim-slide" style="animation-delay:0.2s"/>
    <text x="230" y="161" text-anchor="middle" class="label" style="font-size:11px;">C</text>
    
    <!-- Front/Back indicators -->
    <text x="157" y="135" class="detail" fill="#16a085">FRONT</text>
    <text x="252" y="135" class="detail" fill="#16a085">REAR</text>
    <polygon points="162,140 152,145 162,150" fill="#16a085"/>
    <polygon points="257,140 267,145 257,150" fill="#16a085"/>
    
    <!-- Operations -->
    <rect x="157" y="210" width="50" height="18" rx="4" fill="#16a085"/>
    <text x="182" y="223" text-anchor="middle" class="op-label">ENQUEUE</text>
    <rect x="212" y="210" width="50" height="18" rx="4" fill="#16a085"/>
    <text x="237" y="223" text-anchor="middle" class="op-label">DEQUEUE</text>
  </g>
  
  <!-- Deque Section -->
  <g data-narration="Deque: Double-ended queue - Can add/remove from both front and rear">
    <rect x="284" y="55" width="115" height="145" rx="8" fill="url(#dequeGrad)" opacity="0.9"/>
    <text x="341" y="75" text-anchor="middle" class="box-title">DEQUE</text>
    
    <!-- Deque elements -->
    <rect x="294" y="145" width="22" height="22" rx="3" fill="#fff" opacity="0.9" class="anim-slide"/>
    <text x="305" y="161" text-anchor="middle" class="label" style="font-size:10px;">A</text>
    
    <rect x="319" y="145" width="22" height="22" rx="3" fill="#fff" opacity="0.85" class="anim-slide" style="animation-delay:0.1s"/>
    <text x="330" y="161" text-anchor="middle" class="label" style="font-size:10px;">B</text>
    
    <rect x="344" y="145" width="22" height="22" rx="3" fill="#fff" opacity="0.8" class="anim-slide" style="animation-delay:0.2s"/>
    <text x="355" y="161" text-anchor="middle" class="label" style="font-size:10px;">C</text>
    
    <!-- Both ends -->
    <text x="290" y="135" class="detail" fill="#8e44ad">FRONT</text>
    <text x="375" y="135" class="detail" fill="#8e44ad">REAR</text>
    
    <!-- Operations -->
    <rect x="289" y="210" width="52" height="18" rx="4" fill="#8e44ad"/>
    <text x="315" y="223" text-anchor="middle" class="op-label" style="font-size:9px;">ADD F/R</text>
    <rect x="346" y="210" width="52" height="18" rx="4" fill="#8e44ad"/>
    <text x="372" y="223" text-anchor="middle" class="op-label" style="font-size:9px;">REM F/R</text>
  </g>
  
  <!-- Relationship Arrows -->
  <g data-narration="All three structures support O(1) basic operations: push/enqueue/addFront are O(1), pop/dequeue/removeFront are O(1)">
    <defs>
      <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <polygon points="0 0, 6 3, 0 6" fill="#7f8c8d"/>
      </marker>
    </defs>
    <line x1="135" y1="125" x2="152" y2="125" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="267" y1="125" x2="284" y2="125" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Complexity Box -->
  <g data-narration="Time Complexity: All basic operations (push, pop, enqueue, dequeue, addFront, addRear, removeFront, removeRear) are O(1). Search is O(n)">
    <rect x="20" y="250" width="180" height="55" rx="6" fill="#fff" stroke="#bdc3c7" stroke-width="1" opacity="0.95"/>
    <text x="110" y="268" text-anchor="middle" class="label" style="font-size:12px;">Time Complexity</text>
    <text x="30" y="285" class="detail">Stack: Push, Pop = O(1)</text>
    <text x="30" y="297" class="detail">Queue: Enqueue, Dequeue = O(1)</text>
    <text x="110" y="285" class="detail">Deque: All ops = O(1)</text>
    <text x="110" y="297" class="detail">Search: O(n) all</text>
  </g>
  
  <!-- Applications Box -->
  <g data-narration="Real-world applications: Stack for DFS, function calls, undo. Queue for BFS, printer spooling, scheduling. Deque for sliding window, LRU cache">
    <rect x="220" y="250" width="180" height="55" rx="6" fill="#fff" stroke="#bdc3c7" stroke-width="1" opacity="0.95"/>
    <text x="310" y="268" text-anchor="middle" class="label" style="font-size:12px;">Applications</text>
    <text x="230" y="283" class="detail" style="fill:#e74c3c;">Stack: DFS, Undo, Call stack</text>
    <text x="230" y="295" class="detail" style="fill:#16a085;">Queue: BFS, Printer, Scheduler</text>
    <text x="310" y="283" class="detail" style="fill:#8e44ad;">Deque: Sliding window</text>
  </g>
  
  <!-- Key Concept Highlight -->
  <g data-narration="Key insight: These data structures constrain access patterns to provide predictable O(1) performance for specific operations">
    <rect x="20" y="315" width="380" height="40" rx="6" fill="#fff" stroke="#3498db" stroke-width="2" opacity="0.9"/>
    <text x="210" y="335" text-anchor="middle" class="label" style="font-size:13px; fill:#3498db;">Key: Constrained Access = Predictable O(1) Performance</text>
    <text x="210" y="350" text-anchor="middle" class="detail">Stack: one end | Queue: both ends different | Deque: both ends same</text>
  </g>
  
  <!-- Animated dots decoration -->
  <circle cx="30" y="370" r="4" fill="#e74c3c" class="anim-pulse"/>
  <circle cx="45" y="370" r="4" fill="#16a085" class="anim-pulse" style="animation-delay:0.3s"/>
  <circle cx="60" y="370" r="4" fill="#8e44ad" class="anim-pulse" style="animation-delay:0.6s"/>
  
  <!-- Legend -->
  <text x="80" y="370" class="detail">Stack</text>
  <text x="130" y="370" class="detail">Queue</text>
  <text x="180" y="370" class="detail">Deque</text>
</svg>