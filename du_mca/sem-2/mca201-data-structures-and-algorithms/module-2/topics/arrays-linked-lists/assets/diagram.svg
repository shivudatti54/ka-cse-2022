<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="arrays-linked-lists">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="arrayBlockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#4a90b8"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9dd6b0"/>
      <stop offset="100%" style="stop-color:#5cb87a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .array-section { animation: slideInLeft 0.6s ease-out; }
    .linked-section { animation: slideInRight 0.6s ease-out; }
    .complexity-box { animation: fadeIn 1s ease-out; }
    .pulse-anim { animation: pulse 2s infinite; }
    .arrow-line { stroke-dasharray: 5; animation: drawLine 1s linear forwards; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c5282" class="title">Arrays vs Linked Lists</text>
  
  <!-- Array Section -->
  <g class="array-section" data-narration="Array: Contiguous memory blocks with index-based access">
    <text x="70" y="60" font-size="14" font-weight="bold" fill="#2c5282">ARRAY</text>
    <text x="70" y="78" font-size="11" fill="#4a5568">Contiguous Memory</text>
    
    <!-- Array blocks -->
    <g filter="url(#shadow)">
      <rect x="30" y="90" width="35" height="30" rx="3" fill="url(#arrayBlockGrad)" stroke="#2c5282" stroke-width="1"/>
      <text x="47.5" y="110" text-anchor="middle" font-size="12" fill="white">0</text>
      
      <rect x="65" y="90" width="35" height="30" rx="3" fill="url(#arrayBlockGrad)" stroke="#2c5282" stroke-width="1"/>
      <text x="82.5" y="110" text-anchor="middle" font-size="12" fill="white">1</text>
      
      <rect x="100" y="90" width="35" height="30" rx="3" fill="url(#arrayBlockGrad)" stroke="#2c5282" stroke-width="1"/>
      <text x="117.5" y="110" text-anchor="middle" font-size="12" fill="white">2</text>
      
      <rect x="135" y="90" width="35" height="30" rx="3" fill="url(#arrayBlockGrad)" stroke="#2c5282" stroke-width="1"/>
      <text x="152.5" y="110" text-anchor="middle" font-size="12" fill="white">3</text>
    </g>
    
    <!-- Address labels -->
    <text x="47.5" y="135" text-anchor="middle" font-size="9" fill="#718096">@100</text>
    <text x="82.5" y="135" text-anchor="middle" font-size="9" fill="#718096">@104</text>
    <text x="117.5" y="135" text-anchor="middle" font-size="9" fill="#718096">@108</text>
    <text x="152.5" y="135" text-anchor="middle" font-size="9" fill="#718096">@112</text>
    
    <!-- Array characteristics -->
    <rect x="25" y="150" width="155" height="55" rx="5" fill="white" stroke="#cbd5e0" stroke-width="1"/>
    <text x="35" y="168" font-size="11" fill="#2d3748">• O(1) random access</text>
    <text x="35" y="184" font-size="11" fill="#2d3748">• Fixed size (static)</text>
    <text x="35" y="200" font-size="11" fill="#2d3748">• Resizable (dynamic)</text>
  </g>
  
  <!-- Linked List Section -->
  <g class="linked-section" data-narration="Linked List: Nodes with pointers, scattered memory allocation">
    <text x="280" y="60" font-size="14" font-weight="bold" fill="#2c5282">LINKED LIST</text>
    <text x="280" y="78" font-size="11" fill="#4a5568">Scattered Memory</text>
    
    <!-- Linked list nodes -->
    <g filter="url(#shadow)">
      <rect x="250" y="90" width="50" height="30" rx="3" fill="url(#nodeGrad)" stroke="#276749" stroke-width="1"/>
      <text x="275" y="110" text-anchor="middle" font-size="11" fill="white">data</text>
      <circle cx="310" cy="105" r="8" fill="white" stroke="#276749" stroke-width="1"/>
      <path d="M310 105 L330 105" stroke="#e53e3e" stroke-width="2" marker-end="url(#arrowhead)"/>
    </g>
    
    <!-- Arrow definition -->
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#e53e3e"/>
      </marker>
      <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#e53e3e"/>
      </marker>
    </defs>
    
    <!-- Second node -->
    <g>
      <rect x="340" y="90" width="50" height="30" rx="3" fill="url(#nodeGrad)" stroke="#276749" stroke-width="1"/>
      <text x="365" y="110" text-anchor="middle" font-size="11" fill="white">data</text>
      <circle cx="400" cy="105" r="8" fill="white" stroke="#276749" stroke-width="1"/>
      <path d="M400 105 L420 105" stroke="#e53e3e" stroke-width="2" marker-end="url(#arrowhead2)"/>
    </g>
    
    <!-- Third node -->
    <g>
      <rect x="270" y="150" width="50" height="30" rx="3" fill="url(#nodeGrad)" stroke="#276749" stroke-width="1"/>
      <text x="295" y="170" text-anchor="middle" font-size="11" fill="white">data</text>
      <circle cx="330" cy="165" r="8" fill="white" stroke="#276749" stroke-width="1"/>
    </g>
    
    <!-- Null indicator -->
    <text x="400" y="165" font-size="10" fill="#e53e3e">null</text>
    
    <!-- Pointer labels -->
    <text x="320" y="98" font-size="8" fill="#e53e3e">next</text>
    <text x="405" y="98" font-size="8" fill="#e53e3e">next</text>
    
    <!-- Address labels for scattered memory -->
    <text x="275" y="138" text-anchor="middle" font-size="9" fill="#718096">@500</text>
    <text x="365" y="138" text-anchor="middle" font-size="9" fill="#718096">@820</text>
    <text x="295" y="198" text-anchor="middle" font-size="9" fill="#718096">@215</text>
    
    <!-- Linked list characteristics -->
    <rect x="245" y="220" width="155" height="55" rx="5" fill="white" stroke="#cbd5e0" stroke-width="1"/>
    <text x="255" y="238" font-size="11" fill="#2d3748">• O(1) insert/delete</text>
    <text x="255" y="254" font-size="11" fill="#2d3748">• Sequential access only</text>
    <text x="255" y="270" font-size="11" fill="#2d3748">• Dynamic size</text>
  </g>
  
  <!-- Complexity Comparison Box -->
  <g class="complexity-box" data-narration="Time complexity comparison between arrays and linked lists">
    <rect x="20" y="310" width="180" height="80" rx="5" fill="white" stroke="#4a5568" stroke-width="1" filter="url(#shadow)"/>
    <text x="110" y="330" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c5282">Time Complexity</text>
    <text x="30" y="350" font-size="10" fill="#2d3748">Access:</text>
    <text x="90" y="350" font-size="10" fill="#2d3748">Array O(1)</text>
    <text x="150" y="350" font-size="10" fill="#2d3748">List O(n)</text>
    <text x="30" y="368" font-size="10" fill="#2d3748">Insert:</text>
    <text x="90" y="368" font-size="10" fill="#2d3748">Array O(n)</text>
    <text x="150" y="368" font-size="10" fill="#2d3748">List O(1)*</text>
    <text x="30" y="382" font-size="9" fill="#718096">*at head/tail with pointer</text>
  </g>
  
  <!-- Cache Performance Box -->
  <g class="complexity-box" data-narration="Cache performance comparison showing spatial locality advantage of arrays">
    <rect x="220" y="310" width="180" height="80" rx="5" fill="white" stroke="#4a5568" stroke-width="1" filter="url(#shadow)"/>
    <text x="310" y="330" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c5282">Cache Performance</text>
    <text x="235" y="352" font-size="11" fill="#2d3748">Array: <tspan fill="#38a169">Excellent</tspan></text>
    <text x="235" y="368" font-size="11" fill="#2d3748">Spatial locality</text>
    <text x="235" y="384" font-size="11" fill="#2d3748">Linked: <tspan fill="#e53e3e">Poor</tspan> - cache misses</text>
  </g>
  
  <!-- Animated pulse circles for emphasis -->
  <circle cx="47.5" cy="105" r="20" fill="none" stroke="#7eb8da" stroke-width="1" opacity="0.5" class="pulse-anim"/>
  <circle cx="275" cy="105" r="20" fill="none" stroke="#9dd6b0" stroke-width="1" opacity="0.5" class="pulse-anim" style="animation-delay: 0.5s"/>
  
  <!-- Connection arrow between sections -->
  <path d="M180 200 L240 200" stroke="#cbd5e0" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowhead)"/>
  <text x="210" y="195" text-anchor="middle" font-size="10" fill="#718096">Memory</text>
</svg>