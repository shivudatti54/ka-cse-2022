<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="applications-of-linear-ds">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4e8f0"/>
    </linearGradient>
    <linearGradient id="arrayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <linearGradient id="listGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2"/>
      <stop offset="100%" style="stop-color:#fef9d7"/>
    </linearGradient>
    <linearGradient id="stackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89f7fe"/>
      <stop offset="100%" style="stop-color:#66a6ff"/>
    </linearGradient>
    <linearGradient id="queueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fddb92"/>
      <stop offset="100%" style="stop-color:#d1fdff"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes popIn {
      0% { transform: scale(0); }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .title-text { animation: fadeIn 1s ease-out; }
    .section-box { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .section-1 { animation-delay: 0.2s; }
    .section-2 { animation-delay: 0.4s; }
    .section-3 { animation-delay: 0.6s; }
    .section-4 { animation-delay: 0.8s; }
    .stack-item { animation: popIn 0.4s ease-out forwards; }
    .pulse-anim { animation: pulse 2s infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <text x="210" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title-text">Applications of Linear Data Structures</text>
  
  <!-- Array Section -->
  <g class="section-box section-1" data-narration="Arrays provide O(1) access for matrix operations, hash tables, and dynamic programming memoization">
    <rect x="15" y="55" width="90" height="85" rx="8" fill="url(#arrayGrad)" stroke="#667eea" stroke-width="1.5"/>
    <text x="60" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">ARRAYS</text>
    <text x="60" y="95" text-anchor="middle" font-size="10" fill="#4a5568">Matrix Ops</text>
    <text x="60" y="110" text-anchor="middle" font-size="10" fill="#4a5568">Hash Tables</text>
    <text x="60" y="125" text-anchor="middle" font-size="10" fill="#4a5568">Circular Buffer</text>
  </g>
  
  <!-- Linked List Section -->
  <g class="section-box section-2" data-narration="Linked lists enable dynamic memory allocation, music playlists, and browser history navigation">
    <rect x="115" y="55" width="90" height="85" rx="8" fill="url(#listGrad)" stroke="#9f7aea" stroke-width="1.5"/>
    <text x="160" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">LINKED LISTS</text>
    <text x="160" y="95" text-anchor="middle" font-size="10" fill="#4a5568">Playlists</text>
    <text x="160" y="110" text-anchor="middle" font-size="10" fill="#4a5568">Browser History</text>
    <text x="160" y="125" text-anchor="middle" font-size="10" fill="#4a5568">Memory Mgmt</text>
  </g>
  
  <!-- Stack Section -->
  <g class="section-box section-3" data-narration="Stacks manage function calls, expression evaluation, and undo operations in editors">
    <rect x="215" y="55" width="90" height="85" rx="8" fill="url(#stackGrad)" stroke="#4299e1" stroke-width="1.5"/>
    <text x="260" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">STACKS</text>
    <text x="260" y="95" text-anchor="middle" font-size="10" fill="#4a5568">Undo/Redo</text>
    <text x="260" y="110" text-anchor="middle" font-size="10" fill="#4a5568">Parenthesis</text>
    <text x="260" y="125" text-anchor="middle" font-size="10" fill="#4a5568">Expression Eval</text>
  </g>
  
  <!-- Queue Section -->
  <g class="section-box section-4" data-narration="Queues handle I/O scheduling, CPU task management, and BFS traversal">
    <rect x="315" y="55" width="90" height="85" rx="8" fill="url(#queueGrad)" stroke="#ed8936" stroke-width="1.5"/>
    <text x="360" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">QUEUES</text>
    <text x="360" y="95" text-anchor="middle" font-size="10" fill="#4a5568">I/O Scheduling</text>
    <text x="360" y="110" text-anchor="middle" font-size="10" fill="#4a5568">Task Scheduling</text>
    <text x="360" y="125" text-anchor="middle" font-size="10" fill="#4a5568">BFS Traversal</text>
  </g>
  
  <!-- Connection arrows -->
  <path d="M105 97 L115 97" stroke="#cbd5e0" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M205 97 L215 97" stroke="#cbd5e0" stroke-width="2"/>
  <path d="M305 97 L315 97" stroke="#cbd5e0" stroke-width="2"/>
  
  <!-- Expression Evaluation Stack Diagram -->
  <g data-narration="Stack-based infix to postfix conversion showing operator precedence">
    <rect x="30" y="160" width="360" height="220" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="210" y="185" text-anchor="middle" font-size="16" font-weight="bold" fill="#2d3748">Expression Evaluation: Infix to Postfix</text>
    
    <!-- Input Expression -->
    <text x="60" y="215" font-size="12" fill="#4a5568">Input: A + B * C</text>
    <text x="60" y="235" font-size="12" fill="#4a5568">Postfix: ABC*+</text>
    
    <!-- Stack visualization -->
    <rect x="150" y="205" width="80" height="150" rx="5" fill="#f7fafc" stroke="#cbd5e0" stroke-width="1"/>
    <text x="190" y="222" text-anchor="middle" font-size="11" fill="#718096">STACK</text>
    
    <!-- Stack items -->
    <g class="stack-item" style="animation-delay: 1s">
      <rect x="155" y="300" width="70" height="22" rx="3" fill="#89f7fe" stroke="#4299e1"/>
      <text x="190" y="315" text-anchor="middle" font-size="11" fill="#2c5282">+</text>
    </g>
    <g class="stack-item" style="animation-delay: 1.2s">
      <rect x="155" y="275" width="70" height="22" rx="3" fill="#66a6ff" stroke="#3182ce"/>
      <text x="190" y="290" text-anchor="middle" font-size="11" fill="#fff">*</text>
    </g>
    <g class="stack-item" style="animation-delay: 1.4s">
      <rect x="155" y="250" width="70" height="22" rx="3" fill="#fed6e3" stroke="#d53f8c"/>
      <text x="190" y="265" text-anchor="middle" font-size="11" fill="#702459">C</text>
    </g>
    
    <!-- Steps -->
    <g class="pulse-anim" style="transform-origin: 280px 280px">
      <rect x="250" y="220" width="130" height="100" rx="5" fill="#f0fff4" stroke="#68d391" stroke-width="1"/>
      <text x="315" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#276749">Steps:</text>
      <text x="315" y="258" text-anchor="middle" font-size="10" fill="#4a5568">1. Push A</text>
      <text x="315" y="273" text-anchor="middle" font-size="10" fill="#4a5568">2. Push +</text>
      <text x="315" y="288" text-anchor="middle" font-size="10" fill="#4a5568">3. Push B</text>
      <text x="315" y="303" text-anchor="middle" font-size="10" fill="#4a5568">4. Push *, Pop *</text>
      <text x="315" y="318" text-anchor="middle" font-size="10" fill="#4a5568">5. Pop +</text>
    </g>
    
    <!-- Arrow showing pop operation -->
    <path d="M190 340 L190 355 L210 355 L200 365" fill="none" stroke="#e53e3e" stroke-width="2" class="pulse-anim" style="transform-origin: 200px 350px"/>
    <text x="210" y="370" font-size="10" fill="#e53e3e">Pop &amp; Output</text>
  </g>
  
  <!-- Key takeaway box -->
  <rect x="30" y="370" width="360" height="25" rx="4" fill="#ebf8ff" stroke="#4299e1"/>
  <text x="210" y="387" text-anchor="middle" font-size="11" fill="#2b6cb0" font-style="italic">Key: Linear DS enable O(1) operations for stacks/queues, O(1) random access for arrays</text>
</svg>