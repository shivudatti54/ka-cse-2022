<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="tries-and-string-algorithms">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .slide-in-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-weight: bold; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; }
    .node { fill: url(#nodeGradient); }
    .edge { stroke: #667eea; stroke-width: 2; fill: none; }
    .highlight-node { fill: url(#accentGradient); }
    .end-marker { fill: #ff6b6b; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" font-size="20" fill="#2d3748">Tries &amp; String Algorithms</text>
  
  <!-- Section 1: Trie Structure -->
  <g data-narration="The Trie structure showing root node with character branches for 'app', 'apple', and 'apply'">
    <rect x="10" y="45" width="180" height="170" fill="white" rx="6" stroke="#e2e8f0" stroke-width="1" class="slide-in"/>
    <text x="20" y="65" class="title" font-size="14" fill="#4a5568">Trie Structure</text>
    
    <!-- Trie Tree -->
    <g transform="translate(60, 100)">
      <!-- Edges -->
      <path d="M0,0 L20,-30" class="edge" stroke-dasharray="100" stroke-dashoffset="100" style="animation: drawLine 0.5s ease-out 0.5s forwards;"/>
      <path d="M20,-30 L40,-60" class="edge" stroke-dasharray="100" stroke-dashoffset="100" style="animation: drawLine 0.5s ease-out 0.7s forwards;"/>
      <path d="M20,-30 L40,0" class="edge" stroke-dasharray="100" stroke-dashoffset="100" style="animation: drawLine 0.5s ease-out 0.9s forwards;"/>
      <path d="M40,-60 L60,-80" class="edge" stroke-dasharray="100" stroke-dashoffset="100" style="animation: drawLine 0.5s ease-out 1.1s forwards;"/>
      <path d="M40,-60 L60,-30" class="edge" stroke-dasharray="100" stroke-dashoffset="100" style="animation: drawLine 0.5s ease-out 1.3s forwards;"/>
      <path d="M40,0 L60,-20" class="edge" stroke-dasharray="100" stroke-dashoffset="100" style="animation: drawLine 0.5s ease-out 1.5s forwards;"/>
      
      <!-- Root Node -->
      <circle cx="0" cy="0" r="12" class="node" opacity="0"/>
      <text x="0" y="4" text-anchor="middle" fill="white" font-size="8" font-weight="bold" opacity="0">R</text>
      
      <!-- Level 1: 'a' -->
      <circle cx="20" cy="-30" r="12" class="node pulse" style="animation-delay: 0.3s;" opacity="0"/>
      <text x="20" y="-26" text-anchor="middle" fill="white" font-size="10" font-weight="bold" opacity="0">a</text>
      
      <!-- Level 2: 'p', 'p' -->
      <circle cx="40" cy="-60" r="12" class="node pulse" style="animation-delay: 0.5s;" opacity="0"/>
      <text x="40" y="-56" text-anchor="middle" fill="white" font-size="10" font-weight="bold" opacity="0">p</text>
      
      <circle cx="40" cy="0" r="12" class="node pulse" style="animation-delay: 0.5s;" opacity="0"/>
      <text x="40" y="4" text-anchor="middle" fill="white" font-size="10" font-weight="bold" opacity="0">p</text>
      
      <!-- Level 3: 'l', 'l', 'e' -->
      <circle cx="60" cy="-80" r="12" class="highlight-node pulse" style="animation-delay: 0.7s;" opacity="0"/>
      <text x="60" y="-76" text-anchor="middle" fill="white" font-size="10" font-weight="bold" opacity="0">l</text>
      
      <circle cx="60" cy="-30" r="12" class="highlight-node pulse" style="animation-delay: 0.7s;" opacity="0"/>
      <text x="60" y="-26" text-anchor="middle" fill="white" font-size="10" font-weight="bold" opacity="0">l</text>
      
      <circle cx="60" cy="-20" r="10" class="end-marker pulse" style="animation-delay: 0.9s;" opacity="0"/>
      <text x="60" y="-17" text-anchor="middle" fill="white" font-size="8" font-weight="bold" opacity="0">e*</text>
    </g>
    
    <!-- Word labels -->
    <text x="130" y="175" class="detail" fill="#718096">"app"</text>
    <text x="130" y="190" class="detail" fill="#718096">"apple"</text>
    <text x="130" y="205" class="detail" fill="#718096">"apply"</text>
  </g>

  <!-- Section 2: Algorithm Comparison -->
  <g data-narration="Comparison of string matching algorithms: KMP, Rabin-Karp, and Boyer-Moore">
    <rect x="200" y="45" width="200" height="170" fill="white" rx="6" stroke="#e2e8f0" stroke-width="1" class="slide-in delay-1"/>
    <text x="210" y="65" class="title" font-size="14" fill="#4a5568">String Matching</text>
    
    <!-- KMP Box -->
    <rect x="210" y="80" width="85" height="50" fill="#ebf4ff" rx="4" class="slide-in-up delay-2"/>
    <text x="252" y="100" text-anchor="middle" class="label" font-weight="bold" fill="#2b6cb0">KMP</text>
    <text x="252" y="118" text-anchor="middle" class="detail" fill="#4a5568">O(n+m)</text>
    <text x="252" y="130" text-anchor="middle" class="detail" fill="#718096">Prefix function</text>
    
    <!-- Rabin-Karp Box -->
    <rect x="305" y="80" width="85" height="50" fill="#f0fff4" rx="4" class="slide-in-up delay-3"/>
    <text x="347" y="100" text-anchor="middle" class="label" font-weight="bold" fill="#276749">Rabin-Karp</text>
    <text x="347" y="118" text-anchor="middle" class="detail" fill="#4a5568">O(n+m)</text>
    <text x="347" y="130" text-anchor="middle" class="detail" fill="#718096">Rolling hash</text>
    
    <!-- Boyer-Moore Box -->
    <rect x="210" y="140" width="85" height="50" fill="#fff5f5" rx="4" class="slide-in-up delay-4"/>
    <text x="252" y="160" text-anchor="middle" class="label" font-weight="bold" fill="#c53030">Boyer-Moore</text>
    <text x="252" y="178" text-anchor="middle" class="detail" fill="#4a5568">O(nm)</text>
    <text x="252" y="190" text-anchor="middle" class="detail" fill="#718096">Bad char heuristic</text>
    
    <!-- Suffix Array Box -->
    <rect x="305" y="140" width="85" height="50" fill="#faf5ff" rx="4" class="slide-in-up delay-5"/>
    <text x="347" y="160" text-anchor="middle" class="label" font-weight="bold" fill="#6b46c1">Suffix Array</text>
    <text x="347" y="178" text-anchor="middle" class="detail" fill="#4a5568">O(n log n)</text>
    <text x="347" y="190" text-anchor="middle" class="detail" fill="#718096">Sorted suffixes</text>
  </g>

  <!-- Section 3: Time Complexity -->
  <g data-narration="Time complexity comparison chart for Trie operations">
    <rect x="10" y="225" width="180" height="75" fill="white" rx="6" stroke="#e2e8f0" stroke-width="1" class="slide-in delay-2"/>
    <text x="20" y="245" class="title" font-size="14" fill="#4a5568">Trie Complexity</text>
    
    <!-- Complexity bars -->
    <rect x="20" y="255" width="80" height="8" fill="#e2e8f0" rx="2"/>
    <rect x="20" y="255" width="60" height="8" fill="url(#nodeGradient)" rx="2" class="slide-in delay-3"/>
    <text x="110" y="262" class="detail" fill="#4a5568">Insert: O(L)</text>
    
    <rect x="20" y="270" width="80" height="8" fill="#e2e8f0" rx="2"/>
    <rect x="20" y="270" width="55" height="8" fill="url(#accentGradient)" rx="2" class="slide-in delay-4"/>
    <text x="110" y="277" class="detail" fill="#4a5568">Search: O(L)</text>
    
    <rect x="20" y="285" width="80" height="8" fill="#e2e8f0" rx="2"/>
    <rect x="20" y="285" width="40" height="8" fill="url(#highlightGradient)" rx="2" class="slide-in delay-5"/>
    <text x="110" y="292" class="detail" fill="#4a5568">Prefix: O(L)</text>
  </g>

  <!-- Section 4: Applications -->
  <g data-narration="Real-world applications of tries and string algorithms">
    <rect x="200" y="225" width="200" height="75" fill="white" rx="6" stroke="#e2e8f0" stroke-width="1" class="slide-in delay-3"/>
    <text x="210" y="245" class="title" font-size="14" fill="#4a5568">Applications</text>
    
    <g class="slide-in-up delay-4">
      <circle cx="225" cy="265" r="4" fill="#667eea"/>
      <text x="235" y="268" class="detail" fill="#4a5568">Autocomplete</text>
    </g>
    <g class="slide-in-up delay-5">
      <circle cx="285" cy="265" r="4" fill="#38ef7d"/>
      <text x="295" y="268" class="detail" fill="#4a5568">DNA Analysis</text>
    </g>
    <g class="slide-in-up delay-5">
      <circle cx="225" cy="285" r="4" fill="#ff9a9e"/>
      <text x="235" y="288" class="detail" fill="#4a5568">Spell Check</text>
    </g>
    <g class="slide-in-up delay-5">
      <circle cx="285" cy="285" r="4" fill="#fecfef"/>
      <text x="295" y="288" class="detail" fill="#4a5568">IP Routing</text>
    </g>
  </g>

  <!-- Section 5: Key Concept - Prefix Search -->
  <g data-narration="Example showing prefix search for 'ap' finding 'app', 'apple', 'apply'">
    <rect x="10" y="310" width="390" height="80" fill="white" rx="6" stroke="#e2e8f0" stroke-width="1" class="slide-in delay-4"/>
    <text x="20" y="330" class="title" font-size="14" fill="#4a5568">Example: Prefix Search "ap*"</text>
    
    <!-- Visual representation -->
    <g transform="translate(30, 350)">
      <rect x="0" y="0" width="40" height="25" fill="#ebf4ff" rx="3" class="pulse"/>
      <text x="20" y="17" text-anchor="middle" class="label" fill="#2b6cb0">ap*</text>
      <path d="M45,12 L60,12" stroke="#667eea" stroke-width="2" marker-end="url(#arrowhead)"/>
      <rect x="65" y="0" width="50" height="25" fill="#f0fff4" rx="3" class="pulse" style="animation-delay: 0.3s;"/>
      <text x="90" y="17" text-anchor="middle" class="label" fill="#276749">app</text>
      <rect x="120" y="0" width="60" height="25" fill="#f0fff4" rx="3" class="pulse" style="animation-delay: 0.6s;"/>
      <text x="150" y="17" text-anchor="middle" class="label" fill="#276749">apple</text>
      <rect x="185" y="0" width="55" height="25" fill="#f0fff4" rx="3" class="pulse" style="animation-delay: 0.9s;"/>
      <text x="212" y="17" text-anchor="middle" class="label" fill="#276749">apply</text>
    </g>
  </g>

  <!-- Section 6: Algorithm Flow Arrow -->
  <g data-narration="Flow showing how these algorithms work together in text processing systems">
    <defs>
      <marker id="arrow2" markerWidth="8" height="8" refX="7" refY="4" orient="auto">
        <path d="M0,0 L8,4 L0,8 Z" fill="#cbd5e0"/>
      </marker>
    </defs>
    <line x1="100" y1="220" x2="100" y2="225" stroke="#cbd5e0" stroke-width="1"/>
    <line x1="300" y1="220" x2="300" y2="225" stroke="#cbd5e0" stroke-width="1"/>
  </g>
</svg>