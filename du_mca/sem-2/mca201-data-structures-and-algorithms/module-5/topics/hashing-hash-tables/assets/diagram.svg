<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="hashing-hash-tables">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bucketGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7bc47f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9e5c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="keyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e07b7b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c45c5c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowDraw {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-text { font-family: 'Arial', sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-family: 'Arial', sans-serif; font-size: 14px; fill: #34495e; }
    .detail-text { font-family: 'Arial', sans-serif; font-size: 11px; fill: #5d6d7e; }
    .section-box { fill: white; stroke: #bdc3c7; stroke-width: 1; rx: 8; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow-line { stroke: #e74c3c; stroke-width: 2; stroke-dasharray: 100; animation: arrowDraw 1.5s ease-out forwards; }
    .bucket { fill: url(#bucketGradient); rx: 4; }
    .node { fill: url(#nodeGradient); rx: 3; }
    .key-box { fill: url(#keyGradient); rx: 3; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text fade-in">Hashing &amp; Hash Tables</text>
  
  <!-- Section 1: Hash Function -->
  <g class="slide-in" style="animation-delay: 0.2s">
    <rect x="20" y="50" width="180" height="70" class="section-box" filter="url(#shadow)"/>
    <text x="110" y="70" text-anchor="middle" class="label-text" style="font-weight:bold">Hash Function</text>
    <text x="110" y="90" text-anchor="middle" class="detail-text">key → hash(key) → index</text>
    <rect x="35" y="100" width="40" height="14" class="key-box"/>
    <text x="55" y="111" text-anchor="middle" class="detail-text" fill="white">"cat"</text>
    <text x="85" y="111" text-anchor="middle" class="detail-text">→</text>
    <rect x="100" y="100" width="30" height="14" fill="#f39c12" rx="3"/>
    <text x="115" y="111" text-anchor="middle" class="detail-text" fill="white">427</text>
    <text x="145" y="111" text-anchor="middle" class="detail-text">→</text>
    <rect x="165" y="100" width="20" height="14" fill="#9b59b6" rx="3"/>
    <text x="175" y="111" text-anchor="middle" class="detail-text" fill="white">3</text>
  </g>
  
  <!-- Section 2: Hash Table Structure -->
  <g class="slide-in" style="animation-delay: 0.4s">
    <rect x="210" y="50" width="190" height="70" class="section-box" filter="url(#shadow)"/>
    <text x="305" y="70" text-anchor="middle" class="label-text" style="font-weight:bold">Hash Table (m=5)</text>
    <text x="305" y="90" text-anchor="middle" class="detail-text">Array of Buckets</text>
    <!-- Array cells -->
    <rect x="230" y="100" width="30" height="14" fill="#bdc3c7" rx="2"/>
    <text x="245" y="111" text-anchor="middle" class="detail-text">[0]</text>
    <rect x="265" y="100" width="30" height="14" fill="#bdc3c7" rx="2"/>
    <text x="280" y="111" text-anchor="middle" class="detail-text">[1]</text>
    <rect x="300" y="100" width="30" height="14" fill="#bdc3c7" rx="2"/>
    <text x="315" y="111" text-anchor="middle" class="detail-text">[2]</text>
    <rect x="335" y="100" width="30" height="14" fill="#bdc3c7" rx="2"/>
    <text x="350" y="111" text-anchor="middle" class="detail-text">[3]</text>
    <rect x="370" y="100" width="30" height="14" fill="#bdc3c7" rx="2"/>
    <text x="385" y="111" text-anchor="middle" class="detail-text">[4]</text>
  </g>
  
  <!-- Arrow from Hash Function to Table -->
  <path d="M 110 125 L 110 150 L 305 150 L 305 170" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" class="arrow-line"/>
  <polygon points="305,175 300,165 310,165" fill="#e74c3c"/>
  
  <!-- Section 3: Separate Chaining -->
  <g class="slide-in" style="animation-delay: 0.6s">
    <rect x="20" y="180" width="380" height="100" class="section-box" filter="url(#shadow)" data-narration="Shows separate chaining: each bucket contains a linked list for handling collisions"/>
    <text x="210" y="200" text-anchor="middle" class="label-text" style="font-weight:bold">Separate Chaining - Collision Resolution</text>
    
    <!-- Bucket 0 with linked list -->
    <rect x="40" y="215" width="50" height="55" class="bucket"/>
    <text x="65" y="235" text-anchor="middle" class="detail-text" fill="white" style="font-weight:bold">Index 0</text>
    <rect x="48" y="245" width="34" height="18" class="node"/>
    <text x="65" y="257" text-anchor="middle" class="detail-text" fill="white">15</text>
    <line x1="82" y1="254" x2="95" y2="254" stroke="#34495e" stroke-width="1"/>
    <circle cx="98" cy="254" r="2" fill="#34495e"/>
    
    <!-- Bucket 1 -->
    <rect x="105" y="215" width="50" height="55" class="bucket"/>
    <text x="130" y="235" text-anchor="middle" class="detail-text" fill="white" style="font-weight:bold">Index 1</text>
    <rect x="113" y="245" width="34" height="18" class="node"/>
    <text x="130" y="257" text-anchor="middle" class="detail-text" fill="white">21</text>
    
    <!-- Bucket 2 -->
    <rect x="170" y="215" width="50" height="55" class="bucket"/>
    <text x="195" y="235" text-anchor="middle" class="detail-text" fill="white" style="font-weight:bold">Index 2</text>
    <rect x="178" y="245" width="34" height="18" class="node"/>
    <text x="195" y="257" text-anchor="middle" class="detail-text" fill="white">7</text>
    
    <!-- Bucket 3 with chain -->
    <rect x="235" y="215" width="50" height="55" class="bucket"/>
    <text x="260" y="235" text-anchor="middle" class="detail-text" fill="white" style="font-weight:bold">Index 3</text>
    <rect x="243" y="245" width="34" height="18" class="node"/>
    <text x="260" y="257" text-anchor="middle" class="detail-text" fill="white">3</text>
    <line x1="277" y1="254" x2="290" y2="254" stroke="#34495e" stroke-width="1"/>
    <circle cx="293" cy="254" r="2" fill="#34495e"/>
    <rect x="295" y="245" width="34" height="18" class="node"/>
    <text x="312" y="257" text-anchor="middle" class="detail-text" fill="white">8</text>
    <line x1="329" y1="254" x2="342" y2="254" stroke="#34495e" stroke-width="1"/>
    <circle cx="345" cy="254" r="2" fill="#34495e"/>
    <rect x="347" y="245" width="34" height="18" class="node"/>
    <text x="364" y="257" text-anchor="middle" class="detail-text" fill="white">13</text>
    <line x1="381" y1="254" x2="394" y2="254" stroke="#34495e" stroke-width="1"/>
    <circle cx="397" cy="254" r="2" fill="#34495e" class="pulse" style="animation-delay:1s"/>
    
    <!-- Bucket 4 -->
    <rect x="300" y="215" width="50" height="55" class="bucket"/>
    <text x="325" y="235" text-anchor="middle" class="detail-text" fill="white" style="font-weight:bold">Index 4</text>
    <rect x="308" y="245" width="34" height="18" class="node"/>
    <text x="325" y="257" text-anchor="middle" class="detail-text" fill="white">9</text>
  </g>
  
  <!-- Section 4: Key Concepts -->
  <g class="slide-in" style="animation-delay: 0.8s">
    <rect x="20" y="290" width="180" height="100" class="section-box" filter="url(#shadow)" data-narration="Key concepts include load factor and collision resolution strategies"/>
    <text x="110" y="310" text-anchor="middle" class="label-text" style="font-weight:bold; font-size:13px">Key Concepts</text>
    <text x="30" y="330" class="detail-text">• Load Factor (α) = n/m</text>
    <text x="30" y="345" class="detail-text">• α &gt; 0.7 triggers resize</text>
    <text x="30" y="360" class="detail-text">• O(1) avg-case operations</text>
    <text x="30" y="375" class="detail-text">• Separate Chaining shown</text>
  </g>
  
  <!-- Section 5: Open Addressing -->
  <g class="slide-in" style="animation-delay: 1s">
    <rect x="210" y="290" width="190" height="100" class="section-box" filter="url(#shadow)" data-narration="Open addressing methods: linear probing, quadratic probing, and double hashing"/>
    <text x="305" y="310" text-anchor="middle" class="label-text" style="font-weight:bold; font-size:13px">Open Addressing</text>
    <text x="225" y="330" class="detail-text">Linear: h(k,i) = (h' + i) mod m</text>
    <text x="225" y="345" class="detail-text">Quadratic: h(k,i) = (h' + c₁i + c₂i²)</text>
    <text x="225" y="360" class="detail-text">Double: h(k,i) = (h₁ + i·h₂) mod m</text>
    <rect x="225" y="370" width="60" height="14" fill="#e74c3c" rx="3"/>
    <text x="255" y="381" text-anchor="middle" class="detail-text" fill="white">Collision!</text>
  </g>
  
  <!-- Animation indicators -->
  <circle cx="380" cy="385" r="6" fill="#27ae60" class="pulse"/>
  <text x="395" y="388" class="detail-text" fill="#27ae60">O(1)</text>
</svg>