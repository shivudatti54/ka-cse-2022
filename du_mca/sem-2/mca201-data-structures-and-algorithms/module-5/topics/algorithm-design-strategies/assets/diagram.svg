<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="algorithm-design-strategies">
<defs>
  <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
    <stop offset="50%" style="stop-color:#e8f4f8;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#f0f5e8;stop-opacity:1" />
  </linearGradient>
  <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#b8e4f0;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#9dd0e4;stop-opacity:1" />
  </linearGradient>
  <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#c4e8b8;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#a8dca0;stop-opacity:1" />
  </linearGradient>
  <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#e0c4f0;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#d0a8e8;stop-opacity:1" />
  </linearGradient>
  <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#f0e4c4;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#e8d4a8;stop-opacity:1" />
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.2"/>
  </filter>
</defs>
<style>
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideInLeft {
    from { transform: translateX(-30px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  @keyframes slideInRight {
    from { transform: translateX(30px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  @keyframes slideInUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  @keyframes drawArrow {
    from { stroke-dashoffset: 60; }
    to { stroke-dashoffset: 0; }
  }
  .title-anim { animation: fadeIn 0.8s ease-out; }
  .box-anim-1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
  .box-anim-2 { animation: slideInLeft 0.6s ease-out 0.35s both; }
  .box-anim-3 { animation: slideInLeft 0.6s ease-out 0.5s both; }
  .box-anim-4 { animation: slideInLeft 0.6s ease-out 0.65s both; }
  .comp-anim { animation: slideInRight 0.7s ease-out 0.8s both; }
  .arrow-anim { stroke-dasharray: 60; stroke-dashoffset: 60; animation: drawArrow 0.8s ease-out 1.2s forwards; }
  .pulse-anim { animation: pulse 2s ease-in-out infinite; animation-delay: 1.5s; }
  .subprob { transition: all 0.3s ease; }
  .subprob:hover { transform: scale(1.1); }
</style>
<rect width="420" height="400" fill="url(#bgGradient)" rx="12" />
<text x="210" y="30" text-anchor="middle" class="title-anim" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">Algorithm Design Strategies</text>
<line x1="30" y1="45" x2="390" y2="45" stroke="#b0c4de" stroke-width="1" />
<g data-narration="Divide and Conquer strategy - recursively breaks problems into independent subproblems">
  <rect class="box-anim-1" x="20" y="60" width="95" height="75" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)" stroke="#7fbcd4" stroke-width="1.5" />
  <text x="67" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Divide &amp;</text>
  <text x="67" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Conquer</text>
  <text x="67" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5a7a8a">Merge Sort, QuickSort</text>
</g>
<g data-narration="Greedy Algorithms - makes locally optimal choices at each stage">
  <rect class="box-anim-2" x="20" y="145" width="95" height="75" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)" stroke="#9bc987" stroke-width="1.5" />
  <text x="67" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Greedy</text>
  <text x="67" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5a8a5a">Dijkstra, Huffman</text>
</g>
<g data-narration="Dynamic Programming - solves overlapping subproblems using memoization">
  <rect class="box-anim-3" x="20" y="230" width="95" height="75" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)" stroke="#c4a0dc" stroke-width="1.5" />
  <text x="67" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Dynamic</text>
  <text x="67" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Programming</text>
  <text x="67" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7a5a8a">Knapsack, Floyd-Warshall</text>
</g>
<g data-narration="Backtracking - systematic trial-and-error approach">
  <rect class="box-anim-4" x="20" y="315" width="95" height="75" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)" stroke="#e0c080" stroke-width="1.5" />
  <text x="67" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Backtracking</text>
  <text x="67" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8a7a5a">N-Queens, Sudoku</text>
</g>
<g class="comp-anim" data-narration="Comparison diagram: Divide and Conquer has independent subproblems while Dynamic Programming has overlapping subproblems">
  <text x="265" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Subproblem Comparison</text>
  <rect x="130" y="75" width="270" height="145" rx="6" fill="#ffffff" stroke="#d0d8e0" stroke-width="1" opacity="0.9" />
  <text x="175" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4a7a94">Divide &amp; Conquer</text>
  <text x="355" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#7a4a94">Dynamic Programming</text>
  <circle class="subprob pulse-anim" cx="155" cy="120" r="14" fill="#b8e4f0" stroke="#7fbcd4" stroke-width="2" />
  <text x="155" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2c3e50">P1</text>
  <circle class="subprob pulse-anim" cx="195" cy="120" r="14" fill="#b8e4f0" stroke="#7fbcd4" stroke-width="2" />
  <text x="195" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2c3e50">P2</text>
  <circle class="subprob pulse-anim" cx="155" cy="155" r="14" fill="#b8e4f0" stroke="#7fbcd4" stroke-width="2" />
  <text x="155" y="159" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2c3e50">P3</text>
  <circle class="subprob pulse-anim" cx="195" cy="155" r="14" fill="#b8e4f0" stroke="#7fbcd4" stroke-width="2" />
  <text x="195" y="159" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2c3e50">P4</text>
  <text x="175" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Independent</text>
  <line x1="320" y1="115" x2="350" y2="140" class="arrow-anim" stroke="#c4a0dc" stroke-width="2" stroke-dasharray="4,3" />
  <circle class="subprob pulse-anim" cx="335" cy="125" r="14" fill="#e0c4f0" stroke="#c4a0dc" stroke-width="2" />
  <text x="335" y="129" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2c3e50">P1</text>
  <circle class="subprob pulse-anim" cx="370" cy="125" r="14" fill="#e0c4f0" stroke="#c4a0dc" stroke-width="2" />
  <text x="370" y="129" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2c3e50">P2</text>
  <circle class="subprob pulse-anim" cx="335" cy="160" r="14" fill="#e0c4f0" stroke="#c4a0dc" stroke-width="2" />
  <text x="335" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2c3e50">P3</text>
  <circle class="subprob pulse-anim" cx="370" cy="160" r="14" fill="#e0c4f0" stroke="#c4a0dc" stroke-width="2" />
  <text x="370" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2c3e50">P4</text>
  <path d="M349 135 Q352 145 349 155" class="arrow-anim" fill="none" stroke="#c4a0dc" stroke-width="2" stroke-dasharray="4,3" />
  <path d="M356 135 Q359 145 356 155" class="arrow-anim" fill="none" stroke="#c4a0dc" stroke-width="2" stroke-dasharray="4,3" />
  <text x="352" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Overlapping</text>
</g>
<g data-narration="Flow arrows showing relationship between strategies">
  <path d="M115 97 Q150 97 130 75" fill="none" stroke="#7fbcd4" stroke-width="1.5" stroke-dasharray="4,2" class="arrow-anim" />
  <path d="M115 182 Q150 182 130 160" fill="none" stroke="#9bc987" stroke-width="1.5" stroke-dasharray="4,2" class="arrow-anim" />
  <path d="M115 267 Q150 267 130 245" fill="none" stroke="#c4a0dc" stroke-width="1.5" stroke-dasharray="4,2" class="arrow-anim" />
</g>
<text x="210" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#888">Master Theorem • Greedy Choice Property • Memoization • Branch &amp; Bound</text>
</svg>