<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="recurrence-master-theorem">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e4eaf5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8e4f0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="case1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4edda;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c3e6cb;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="case2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3cd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffeeba;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="case3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8d7da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5c6cb;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .formula-anim { animation: slideIn 0.6s ease-out 0.3s forwards; opacity: 0; }
    .case1-anim { animation: slideInLeft 0.5s ease-out 0.5s forwards; opacity: 0; }
    .case2-anim { animation: slideIn 0.5s ease-out 0.7s forwards; opacity: 0; }
    .case3-anim { animation: slideInRight 0.5s ease-out 0.9s forwards; opacity: 0; }
    .param-anim { animation: fadeIn 0.6s ease-out 1.1s forwards; opacity: 0; }
    .flow-anim { animation: pulse 2s ease-in-out infinite; }
    text { font-family: Arial, Helvetica, sans-serif; }
    .title-text { font-size: 20px; font-weight: bold; }
    .label-text { font-size: 14px; font-weight: 600; }
    .detail-text { font-size: 11px; }
    .formula-text { font-size: 16px; font-weight: bold; }
    .small-text { font-size: 10px; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Header Box -->
  <rect x="15" y="12" width="390" height="44" rx="8" fill="url(#headerGradient)" filter="url(#shadow)"/>
  <text x="210" y="42" text-anchor="middle" fill="white" class="title-text title-anim">Recurrence Master Theorem</text>
  
  <!-- Formula Box -->
  <g class="formula-anim">
    <rect x="40" y="70" width="340" height="45" rx="6" fill="white" stroke="#667eea" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="97" text-anchor="middle" fill="#333" class="formula-text">T(n) = aT(n/b) + f(n)</text>
  </g>
  
  <!-- Parameters Section -->
  <g class="param-anim">
    <rect x="25" y="125" width="145" height="85" rx="6" fill="white" stroke="#8899aa" stroke-width="1.5"/>
    <text x="97" y="143" text-anchor="middle" fill="#556677" class="label-text">Parameters</text>
    <line x1="35" y1="150" x2="160" y2="150" stroke="#dde4ea" stroke-width="1"/>
    <text x="35" y="168" fill="#555" class="detail-text"><tspan font-weight="bold">a</tspan> = subproblems</text>
    <text x="35" y="182" fill="#555" class="detail-text"><tspan font-weight="bold">b</tspan> = divide factor</text>
    <text x="35" y="196" fill="#555" class="detail-text"><tspan font-weight="bold">f(n)</tspan> = cost</text>
    <text x="35" y="208" fill="#555" class="detail-text">n<tspan baseline-shift="sub" font-size="9">log<tspan baseline-shift="sub" font-size="8">b</tspan></tspan><tspan baseline-shift="sub" font-size="9">a</tspan> = comparison</text>
  </g>
  
  <!-- Decision Flow -->
  <g class="flow-anim">
    <text x="210" y="148" text-anchor="middle" fill="#667eea" class="label-text" data-narration="Compare f(n) with n^log_b a">Compare f(n) vs n<tspan baseline-shift="sub" font-size="9">log<tspan baseline-shift="sub" font-size="8">b</tspan></tspan><tspan baseline-shift="sub" font-size="9">a</tspan></text>
    
    <!-- Arrow from params to comparison -->
    <path d="M97 210 L97 225 L175 225 L175 160" stroke="#667eea" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    
    <!-- Comparison operators -->
    <text x="175" y="225" fill="#667eea" class="detail-text" font-weight="bold">&lt;</text>
    <text x="210" y="225" fill="#667eea" class="detail-text" font-weight="bold">=</text>
    <text x="245" y="225" fill="#667eea" class="detail-text" font-weight="bold">&gt;</text>
  </g>
  
  <!-- Case 1 Box -->
  <g class="case1-anim" data-narration="Case 1: f(n) is polynomially smaller than n^log_b a">
    <rect x="20" y="240" width="115" height="80" rx="6" fill="url(#case1Grad)" stroke="#28a745" stroke-width="2"/>
    <text x="77" y="258" text-anchor="middle" fill="#1e7e34" class="label-text">Case 1</text>
    <text x="77" y="275" text-anchor="middle" fill="#1e7e34" class="detail-text">f(n) &lt; n<tspan baseline-shift="sub" font-size="8">log<tspan baseline-shift="sub" font-size="7">b</tspan></tspan><tspan baseline-shift="sub" font-size="8">a</tspan></text>
    <text x="77" y="290" text-anchor="middle" fill="#155724" class="detail-text" font-weight="bold">T(n) = Θ(n<tspan baseline-shift="sub" font-size="8">log<tspan baseline-shift="sub" font-size="7">b</tspan></tspan><tspan baseline-shift="sub" font-size="8">a</tspan>)</text>
  </g>
  
  <!-- Case 2 Box -->
  <g class="case2-anim" data-narration="Case 2: f(n) equals n^log_b a polynomially">
    <rect x="152" y="240" width="115" height="80" rx="6" fill="url(#case2Grad)" stroke="#ffc107" stroke-width="2"/>
    <text x="209" y="258" text-anchor="middle" fill="#856404" class="label-text">Case 2</text>
    <text x="209" y="275" text-anchor="middle" fill="#856404" class="detail-text">f(n) ≈ n<tspan baseline-shift="sub" font-size="8">log<tspan baseline-shift="sub" font-size="7">b</tspan></tspan><tspan baseline-shift="sub" font-size="8">a</tspan></text>
    <text x="209" y="290" text-anchor="middle" fill="#665c04" class="detail-text" font-weight="bold">T(n) = Θ(n<tspan baseline-shift="sub" font-size="8">log<tspan baseline-shift="sub" font-size="7">b</tspan></tspan><tspan baseline-shift="sub" font-size="8">a</tspan> log n)</text>
  </g>
  
  <!-- Case 3 Box -->
  <g class="case3-anim" data-narration="Case 3: f(n) is polynomially larger than n^log_b a">
    <rect x="284" y="240" width="115" height="80" rx="6" fill="url(#case3Grad)" stroke="#dc3545" stroke-width="2"/>
    <text x="341" y="258" text-anchor="middle" fill="#a71d2a" class="label-text">Case 3</text>
    <text x="341" y="275" text-anchor="middle" fill="#721c24" class="detail-text">f(n) &gt; n<tspan baseline-shift="sub" font-size="8">log<tspan baseline-shift="sub" font-size="7">b</tspan></tspan><tspan baseline-shift="sub" font-size="8">a</tspan></text>
    <text x="341" y="290" text-anchor="middle" fill="#721c24" class="detail-text" font-weight="bold">T(n) = Θ(f(n))</text>
  </g>
  
  <!-- Bottom explanation -->
  <g class="param-anim">
    <rect x="25" y="330" width="370" height="55" rx="6" fill="white" stroke="#aabbcc" stroke-width="1"/>
    <text x="210" y="348" text-anchor="middle" fill="#556677" class="label-text">Regularity Condition (Case 3)</text>
    <text x="210" y="365" text-anchor="middle" fill="#667788" class="detail-text">af(n/b) ≤ cf(n) for some c&lt;1, large n</text>
    <text x="210" y="380" text-anchor="middle" fill="#667788" class="small-text">Ensures the recursion generates a geometric series</text>
  </g>
  
  <!-- Examples reference -->
  <g class="param-anim">
    <circle cx="405" cy="395" r="12" fill="#667eea"/>
    <text x="405" y="399" text-anchor="middle" fill="white" font-size="14" font-weight="bold">?</text>
    <title>Examples: Merge Sort (T(n)=2T(n/2)+n) → Case 2</title>
  </g>
</svg>