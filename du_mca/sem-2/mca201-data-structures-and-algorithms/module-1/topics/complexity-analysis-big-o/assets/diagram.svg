<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="complexity-analysis-big-o">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4e8ec"/>
    </linearGradient>
    <linearGradient id="chartGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71"/>
      <stop offset="100%" style="stop-color:#27ae60"/>
    </linearGradient>
    <linearGradient id="chartGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
    <linearGradient id="chartGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="chartGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#8e44ad"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section2 { animation: slideInRight 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section3 { animation: slideInLeft 0.6s ease-out 0.6s forwards; opacity: 0; }
    .section4 { animation: slideInRight 0.6s ease-out 0.8s forwards; opacity: 0; }
    .chart-line { stroke-dasharray: 500; stroke-dashoffset: 500; animation: drawLine 2s ease-out forwards; }
    .legend-box { animation: fadeIn 0.5s ease-out forwards; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .axis-label { font-size: 11px; fill: #555; }
    .complexity-label { font-size: 14px; font-weight: bold; }
    .formula-text { font-size: 12px; font-family: 'Courier New', monospace; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Complexity Analysis: Big O</text>
  
  <!-- Chart Area -->
  <g transform="translate(50, 70)">
    <!-- Axes -->
    <line x1="0" y1="250" x2="320" y2="250" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="250" stroke="#7f8c8d" stroke-width="2"/>
    
    <!-- Axis Labels -->
    <text x="160" y="275" text-anchor="middle" class="axis-label">Input Size (n)</text>
    <text x="-60" y="125" text-anchor="middle" class="axis-label" transform="rotate(-90, -60, 125)">Operations</text>
    
    <!-- Grid lines -->
    <line x1="0" y1="200" x2="320" y2="200" stroke="#bdc3c7" stroke-width="0.5" stroke-dasharray="4"/>
    <line x1="0" y1="150" x2="320" y2="150" stroke="#bdc3c7" stroke-width="0.5" stroke-dasharray="4"/>
    <line x1="0" y1="100" x2="320" y2="100" stroke="#bdc3c7" stroke-width="0.5" stroke-dasharray="4"/>
    <line x1="0" y1="50" x2="320" y2="50" stroke="#bdc3c7" stroke-width="0.5" stroke-dasharray="4"/>
    
    <!-- Data Points -->
    <!-- O(1) - Constant (horizontal line) -->
    <polyline points="0,240 40,240 80,240 120,240 160,240 200,240 240,240 280,240 320,240" 
              fill="none" stroke="url(#chartGradient1)" stroke-width="3" class="chart-line" 
              data-narration="O(1) - Constant time: Operations remain the same regardless of input size"/>
    
    <!-- O(n) - Linear (45 degree line) -->
    <polyline points="0,250 40,230 80,210 120,190 160,170 200,150 240,130 280,110 320,90" 
              fill="none" stroke="url(#chartGradient2)" stroke-width="3" class="chart-line" 
              data-narration="O(n) - Linear time: Operations grow proportionally with input size"/>
    
    <!-- O(n²) - Quadratic (parabolic curve) -->
    <polyline points="0,250 40,245 80,232 120,210 160,180 200,142 240,96 280,42 320,0" 
              fill="none" stroke="url(#chartGradient3)" stroke-width="3" class="chart-line" 
              data-narration="O(n²) - Quadratic time: Operations grow as square of input size"/>
    
    <!-- O(2ⁿ) - Exponential (very steep curve) -->
    <polyline points="0,250 20,249 40,247 60,242 80,232 100,210 120,160 140,60 160,0" 
              fill="none" stroke="url(#chartGradient4)" stroke-width="3" class="chart-line" 
              data-narration="O(2ⁿ) - Exponential time: Operations double with each input increase"/>
  </g>
  
  <!-- Legend Boxes -->
  <g class="legend-box" data-narration="Legend showing complexity classes from best to worst">
    <!-- O(1) -->
    <rect x="10" y="320" width="90" height="35" rx="5" fill="#d5f4e6" stroke="#2ecc71" stroke-width="1.5"/>
    <text x="55" y="337" text-anchor="middle" class="complexity-label" fill="#27ae60">O(1)</text>
    <text x="55" y="350" text-anchor="middle" font-size="10" fill="#27ae60">Constant</text>
    
    <!-- O(n) -->
    <rect x="110" y="320" width="90" height="35" rx="5" fill="#d6eaf8" stroke="#3498db" stroke-width="1.5"/>
    <text x="155" y="337" text-anchor="middle" class="complexity-label" fill="#2980b9">O(n)</text>
    <text x="155" y="350" text-anchor="middle" font-size="10" fill="#2980b9">Linear</text>
    
    <!-- O(n²) -->
    <rect x="210" y="320" width="90" height="35" rx="5" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="255" y="337" text-anchor="middle" class="complexity-label" fill="#c0392b">O(n²)</text>
    <text x="255" y="350" text-anchor="middle" font-size="10" fill="#c0392b">Quadratic</text>
    
    <!-- O(2ⁿ) -->
    <rect x="310" y="320" width="90" height="35" rx="5" fill="#ebdef0" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="355" y="337" text-anchor="middle" class="complexity-label" fill="#8e44ad">O(2ⁿ)</text>
    <text x="355" y="350" text-anchor="middle" font-size="10" fill="#8e44ad">Exponential</text>
  </g>
  
  <!-- Key Concept Box -->
  <g class="section1" data-narration="Big O notation describes the upper bound of growth rate - worst case analysis">
    <rect x="10" y="365" width="180" height="30" rx="4" fill="#fff9e6" stroke="#f39c12" stroke-width="1"/>
    <text x="20" y="378" font-size="10" fill="#d68910">Big O = Upper Bound (Worst Case)</text>
    <text x="20" y="390" font-size="9" fill="#9c7c1f">f(n) ≤ c·g(n) for n ≥ n₀</text>
  </g>
  
  <!-- Arrow showing efficiency direction -->
  <g class="section2" data-narration="Arrow indicating efficiency decreases from left to right">
    <line x1="200" y1="375" x2="290" y2="375" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)"/>
    <polygon points="290,375 282,370 282,380" fill="#7f8c8d"/>
    <text x="245" y="370" font-size="9" fill="#7f8c8d" font-style="italic">Less Efficient</text>
  </g>
  
  <!-- Efficiency Labels -->
  <g class="section3" data-narration="Visual representation of efficiency ordering">
    <text x="320" y="375" font-size="9" fill="#2ecc71" font-weight="bold">Best</text>
    <text x="385" y="375" font-size="9" fill="#e74c3c" font-weight="bold">Worst</text>
  </g>
  
  <!-- Small formula example -->
  <g class="section4" data-narration="Example: Nested loop with O(n²) complexity">
    <rect x="300" y="55" width="110" height="25" rx="4" fill="#fdebd0" stroke="#e67e22" stroke-width="1"/>
    <text x="355" y="70" text-anchor="middle" font-size="11" fill="#d35400" class="formula-text">for i in range(n):
    for j in range(n):</text>
  </g>
  
  <!-- Interactive pulse circle on O(1) -->
  <circle cx="55" cy="347" r="8" fill="#2ecc71" opacity="0.3" class="pulse-element"/>
</svg>