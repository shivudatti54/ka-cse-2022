<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="sorting-algorithms-comparison">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0e6f6"/>
      <stop offset="100%" style="stop-color:#e6f0f4"/>
    </linearGradient>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6a5acd"/>
      <stop offset="100%" style="stop-color:#483d8b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes highlightRow {
      0%, 100% { fill: transparent; }
      50% { fill: rgba(106, 90, 205, 0.1); }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: white; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 13px; fill: #333; }
    .value { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .header-text { font-family: Arial, sans-serif; font-size: 11px; fill: white; font-weight: bold; }
    .complexity-bad { fill: #e74c3c; }
    .complexity-good { fill: #27ae60; }
    .complexity-avg { fill: #f39c12; }
    .stable-yes { fill: #27ae60; }
    .stable-no { fill: #e74c3c; }
    .inplace-yes { fill: #27ae60; }
    .inplace-no { fill: #e74c3c; }
    .section-box { fill: white; stroke: #ddd; stroke-width: 1; rx: 8; }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .anim-slide { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="420" height="50" fill="url(#headerGradient)" rx="0"/>
  <text x="210" y="32" text-anchor="middle" class="title anim-fade">Sorting Algorithms Comparison</text>
  
  <!-- Column Headers -->
  <g class="anim-slide delay-1">
    <rect x="10" y="60" width="95" height="25" fill="#6a5acd" rx="4" data-narration="Algorithm column header"/>
    <text x="57" y="77" text-anchor="middle" class="header-text">ALGORITHM</text>
    
    <rect x="105" y="60" width="95" height="25" fill="#7b68ee" rx="4" data-narration="Time complexity column"/>
    <text x="152" y="77" text-anchor="middle" class="header-text">TIME (Avg)</text>
    
    <rect x="200" y="60" width="65" height="25" fill="#8470ff" rx="4" data-narration="Space complexity column"/>
    <text x="232" y="77" text-anchor="middle" class="header-text">SPACE</text>
    
    <rect x="265" y="60" width="70" height="25" fill="#6a5acd" rx="4" data-narration="Stability column"/>
    <text x="300" y="77" text-anchor="middle" class="header-text">STABLE</text>
    
    <rect x="335" y="60" width="75" height="25" fill="#7b68ee" rx="4" data-narration="In-place column"/>
    <text x="372" y="77" text-anchor="middle" class="header-text">IN-PLACE</text>
  </g>
  
  <!-- Bubble Sort Row -->
  <g class="anim-slide delay-2" data-narration="Bubble Sort: O(n²) time, O(1) space, stable, in-place">
    <rect x="10" y="88" width="400" height="52" class="section-box" filter="url(#shadow)"/>
    <text x="57" y="120" text-anchor="middle" class="label" font-weight="bold">Bubble Sort</text>
    <text x="152" y="120" text-anchor="middle" class="value complexity-bad">O(n²)</text>
    <text x="152" y="135" text-anchor="middle" class="value" font-size="10">quadratic</text>
    <text x="232" y="120" text-anchor="middle" class="value complexity-good">O(1)</text>
    <text x="232" y="135" text-anchor="middle" class="value" font-size="10">constant</text>
    <circle cx="300" cy="120" r="8" class="stable-yes"/>
    <text x="300" y="124" text-anchor="middle" font-size="10" fill="white" font-weight="bold">✓</text>
    <circle cx="372" cy="120" r="8" class="inplace-yes"/>
    <text x="372" y="124" text-anchor="middle" font-size="10" fill="white" font-weight="bold">✓</text>
  </g>
  
  <!-- Quick Sort Row -->
  <g class="anim-slide delay-3" data-narration="Quick Sort: O(n log n) average time, O(log n) space, not stable, in-place">
    <rect x="10" y="143" width="400" height="52" class="section-box" filter="url(#shadow)"/>
    <text x="57" y="175" text-anchor="middle" class="label" font-weight="bold">Quick Sort</text>
    <text x="152" y="175" text-anchor="middle" class="value complexity-avg">O(n log n)</text>
    <text x="152" y="190" text-anchor="middle" class="value" font-size="10">average</text>
    <text x="232" y="175" text-anchor="middle" class="value complexity-avg">O(log n)</text>
    <text x="232" y="190" text-anchor="middle" class="value" font-size="10">stack</text>
    <circle cx="300" cy="175" r="8" class="stable-no"/>
    <text x="300" y="170" text-anchor="middle" font-size="12" fill="#e74c3c" font-weight="bold">✗</text>
    <circle cx="372" cy="175" r="8" class="inplace-yes"/>
    <text x="372" y="179" text-anchor="middle" font-size="10" fill="white" font-weight="bold">✓</text>
  </g>
  
  <!-- Merge Sort Row -->
  <g class="anim-slide delay-4" data-narration="Merge Sort: O(n log n) consistent time, O(n) space, stable, not in-place">
    <rect x="10" y="198" width="400" height="52" class="section-box" filter="url(#shadow)"/>
    <text x="57" y="230" text-anchor="middle" class="label" font-weight="bold">Merge Sort</text>
    <text x="152" y="230" text-anchor="middle" class="value complexity-good">O(n log n)</text>
    <text x="152" y="245" text-anchor="middle" class="value" font-size="10">consistent</text>
    <text x="232" y="230" text-anchor="middle" class="value complexity-bad">O(n)</text>
    <text x="232" y="245" text-anchor="middle" class="value" font-size="10">auxiliary</text>
    <circle cx="300" cy="230" r="8" class="stable-yes"/>
    <text x="300" y="234" text-anchor="middle" font-size="10" fill="white" font-weight="bold">✓</text>
    <circle cx="372" cy="230" r="8" class="inplace-no"/>
    <text x="372" y="225" text-anchor="middle" font-size="12" fill="#e74c3c" font-weight="bold">✗</text>
  </g>
  
  <!-- Heap Sort Row -->
  <g class="anim-slide delay-4" data-narration="Heap Sort: O(n log n) worst-case, O(1) space, not stable, in-place">
    <rect x="10" y="253" width="400" height="52" class="section-box" filter="url(#shadow)"/>
    <text x="57" y="285" text-anchor="middle" class="label" font-weight="bold">Heap Sort</text>
    <text x="152" y="285" text-anchor="middle" class="value complexity-good">O(n log n)</text>
    <text x="152" y="300" text-anchor="middle" class="value" font-size="10">worst-case</text>
    <text x="232" y="285" text-anchor="middle" class="value complexity-good">O(1)</text>
    <text x="232" y="300" text-anchor="middle" class="value" font-size="10">constant</text>
    <circle cx="300" cy="285" r="8" class="stable-no"/>
    <text x="300" y="280" text-anchor="middle" font-size="12" fill="#e74c3c" font-weight="bold">✗</text>
    <circle cx="372" cy="285" r="8" class="inplace-yes"/>
    <text x="372" y="289" text-anchor="middle" font-size="10" fill="white" font-weight="bold">✓</text>
  </g>
  
  <!-- Key Insight Box -->
  <g class="anim-fade" data-narration="Key insight: Choose algorithm based on data size, stability needs, and memory constraints">
    <rect x="10" y="315" width="400" height="75" fill="white" stroke="#6a5acd" stroke-width="2" rx="8"/>
    <text x="210" y="335" text-anchor="middle" class="label" font-weight="bold" fill="#483d8b">Key Insights</text>
    <text x="210" y="355" text-anchor="middle" class="value" font-size="11">• Quick Sort: Best for general purpose</text>
    <text x="210" y="370" text-anchor="middle" class="value" font-size="11">• Merge Sort: Use when stability matters</text>
    <text x="210" y="385" text-anchor="middle" class="value" font-size="11">• Heap Sort: Guaranteed O(n log n)</text>
  </g>
  
  <!-- Decorative Arrow -->
  <g class="anim-pulse" data-narration="Visual relationship between algorithm properties">
    <path d="M 390 55 Q 395 45 390 35" stroke="#6a5acd" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Legend -->
  <g class="anim-fade" data-narration="Legend showing color coding for complexity values">
    <circle cx="25" cy="365" r="5" class="complexity-good"/>
    <text x="35" y="368" class="value" font-size="10">Good</text>
    <circle cx="75" cy="365" r="5" class="complexity-avg"/>
    <text x="85" y="368" class="value" font-size="10">Average</text>
    <circle cx="135" cy="365" r="5" class="complexity-bad"/>
    <text x="145" y="368" class="value" font-size="10">Poor</text>
  </g>
</svg>