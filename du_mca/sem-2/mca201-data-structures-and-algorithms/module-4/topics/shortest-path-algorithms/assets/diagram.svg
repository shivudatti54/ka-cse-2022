<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="shortest-path-algorithms">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sectionGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sectionGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4f0d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sectionGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff0d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes highlight {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 4; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #34495e; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .algorithm-name { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2980b9; }
    .complexity { font-family: Arial, sans-serif; font-size: 11px; fill: #27ae60; }
    .node { fill: url(#nodeGradient); stroke: #2c3e50; stroke-width: 2; }
    .edge { stroke: #7f8c8d; stroke-width: 2; fill: none; }
    .edge-label { font-family: Arial, sans-serif; font-size: 11px; fill: #e74c3c; }
    .highlighted-node { fill: #27ae60; stroke: #1e8449; stroke-width: 3; }
    .visited-node { fill: #f39c12; stroke: #d68910; stroke-width: 2; }
    .box { fill: white; stroke: #bdc3c7; stroke-width: 1; rx: 5; }
    .arrow { marker-end: url(#arrowhead); }
    
    .section1 { animation: fadeIn 0.8s ease-out; }
    .section2 { animation: slideIn 0.6s ease-out 0.3s both; }
    .section3 { animation: fadeIn 0.6s ease-out 0.5s both; }
    .section4 { animation: slideIn 0.6s ease-out 0.7s both; }
    .pulse { animation: pulse 2s infinite; }
    .highlight { animation: highlight 1.5s infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Section 1: Title and Introduction -->
  <g class="section1" data-narration="Introduction to Shortest Path Algorithms - fundamental tools in graph theory with applications in networks, transportation, and AI">
    <text x="210" y="30" class="title" text-anchor="middle">Shortest Path Algorithms</text>
    <line x1="30" y1="45" x2="390" y2="45" stroke="#3498db" stroke-width="2"/>
  </g>
  
  <!-- Section 2: Graph Visualization with Dijkstra Example -->
  <g class="section2" data-narration="Dijkstra's Algorithm Example - Finding shortest paths from node A using greedy approach with priority queue">
    <rect x="20" y="55" width="180" height="130" fill="url(#sectionGradient1)" rx="8" stroke="#3498db" stroke-width="1"/>
    <text x="30" y="75" class="section-title">Dijkstra's Algorithm</text>
    <text x="30" y="92" class="detail">Greedy approach • Non-negative edges</text>
    
    <!-- Graph Nodes -->
    <circle cx="60" cy="130" r="14" class="node"/>
    <text x="60" y="134" fill="white" font-size="11" text-anchor="middle" font-family="Arial">A</text>
    
    <circle cx="110" cy="110" r="14" class="node"/>
    <text x="110" y="114" fill="white" font-size="11" text-anchor="middle" font-family="Arial">B</text>
    
    <circle cx="110" cy="155" r="14" class="node"/>
    <text x="110" y="159" fill="white" font-size="11" text-anchor="middle" font-family="Arial">C</text>
    
    <circle cx="165" cy="130" r="14" class="visited-node"/>
    <text x="165" y="134" fill="white" font-size="11" text-anchor="middle" font-family="Arial">D</text>
    
    <!-- Graph Edges -->
    <line x1="72" y1="125" x2="98" y2="113" class="edge"/>
    <text x="82" y="115" class="edge-label">4</text>
    
    <line x1="72" y1="135" x2="98" y2="152" class="edge"/>
    <text x="80" y="148" class="edge-label">2</text>
    
    <line x1="122" y1="115" x2="152" y2="128" class="edge" style="stroke: #e74c3c; stroke-width: 3;"/>
    <text x="140" y="118" class="edge-label" style="font-weight: bold;">1</text>
    
    <line x1="122" y1="150" x2="152" y2="133" class="edge"/>
    <text x="142" y="145" class="edge-label">8</text>
    
    <line x1="178" y1="130" x2="178" y2="130" class="edge"/>
  </g>
  
  <!-- Section 3: Algorithm Comparison -->
  <g class="section3" data-narration="Algorithm Comparison - Time complexities and key characteristics of each algorithm">
    <rect x="210" y="55" width="190" height="130" fill="url(#sectionGradient2)" rx="8" stroke="#27ae60" stroke-width="1"/>
    <text x="220" y="75" class="section-title">Algorithm Comparison</text>
    
    <rect x="220" y="85" width="170" height="22" class="box"/>
    <text x="225" y="97" class="algorithm-name">Dijkstra</text>
    <text x="300" y="97" class="complexity">O((V+E) log V)</text>
    
    <rect x="220" y="110" width="170" height="22" class="box"/>
    <text x="225" y="122" class="algorithm-name">Bellman-Ford</text>
    <text x="310" y="122" class="complexity">O(V·E)</text>
    
    <rect x="220" y="135" width="170" height="22" class="box"/>
    <text x="225" y="147" class="algorithm-name">Floyd-Warshall</text>
    <text x="310" y="147" class="complexity">O(V³)</text>
    
    <rect x="220" y="160" width="170" height="22" class="box"/>
    <text x="225" y="172" class="algorithm-name">A* Search</text>
    <text x="300" y="172" class="complexity">O(E) with heuristic</text>
  </g>
  
  <!-- Section 4: Relaxation Technique -->
  <g class="section4" data-narration="Relaxation Technique - The fundamental operation that updates shortest distance estimates">
    <rect x="20" y="195" width="180" height="90" fill="url(#sectionGradient3)" rx="8" stroke="#f39c12" stroke-width="1"/>
    <text x="30" y="215" class="section-title">Relaxation Technique</text>
    <text x="30" y="235" class="detail">Core operation in shortest path algos</text>
    
    <!-- Relaxation visualization -->
    <circle cx="60" cy="260" r="16" class="node"/>
    <text x="60" y="264" fill="white" font-size="12" text-anchor="middle" font-family="Arial">u</text>
    <text x="35" y="260" class="detail" style="font-size:10">dist[u]</text>
    
    <line x1="76" y1="260" x2="104" y2="260" class="edge" stroke="#e74c3c"/>
    <text x="90" y="255" class="edge-label" style="font-size:10">w(u,v)</text>
    
    <circle cx="130" cy="260" r="16" class="node"/>
    <text x="130" y="264" fill="white" font-size="12" text-anchor="middle" font-family="Arial">v</text>
    <text x="130" y="285" class="detail" style="font-size:10">dist[v]</text>
    
    <path d="M 95 275 Q 110 290 125 275" fill="none" stroke="#27ae60" stroke-width="2" class="pulse"/>
    <text x="110" y="295" class="detail" fill="#27ae60" style="font-size:9">if dist[u]+w &lt; dist[v]</text>
  </g>
  
  <!-- Section 5: Real-World Applications -->
  <g class="section1" data-narration="Real-World Applications - GPS navigation, Internet routing, Flight optimization, Game AI">
    <rect x="210" y="195" width="190" height="90" fill="url(#sectionGradient1)" rx="8" stroke="#9b59b6" stroke-width="1"/>
    <text x="220" y="215" class="section-title">Applications</text>
    
    <circle cx="235" cy="240" r="6" fill="#e74c3c"/>
    <text x="248" y="244" class="detail">GPS Navigation (Dijkstra)</text>
    
    <circle cx="235" cy="260" r="6" fill="#3498db"/>
    <text x="248" y="264" class="detail">Packet Routing (Bellman-Ford)</text>
    
    <circle cx="235" cy="280" r="6" fill="#f39c12"/>
    <text x="248" y="284" class="detail">Game AI (A* Search)</text>
  </g>
  
  <!-- Section 6: Key Features -->
  <g class="section2" data-narration="Key Features Summary - Each algorithm handles different graph types and constraints">
    <rect x="20" y="295" width="380" height="95" fill="white" rx="8" stroke="#bdc3c7" stroke-width="1"/>
    <text x="30" y="315" class="section-title">Key Concepts Summary</text>
    
    <!-- Feature boxes -->
    <rect x="30" y="328" width="110" height="55" fill="#e8f4f8" rx="5" stroke="#3498db" stroke-width="1"/>
    <text x="85" y="345" class="label" text-anchor="middle" style="font-size:12;font-weight:bold;">Dijkstra</text>
    <text x="85" y="362" class="detail" text-anchor="middle">Non-negative</text>
    <text x="85" y="375" class="detail" text-anchor="middle">weights only</text>
    
    <rect x="150" y="328" width="110" height="55" fill="#fef9e7" rx="5" stroke="#f1c40f" stroke-width="1"/>
    <text x="205" y="345" class="label" text-anchor="middle" style="font-size:12;font-weight:bold;">Bellman-Ford</text>
    <text x="205" y="362" class="detail" text-anchor="middle">Handles negative</text>
    <text x="205" y="375" class="detail" text-anchor="middle">weights, detects cycles</text>
    
    <rect x="270" y="328" width="110" height="55" fill="#e8f8f5" rx="5" stroke="#1abc9c" stroke-width="1"/>
    <text x="325" y="345" class="label" text-anchor="middle" style="font-size:12;font-weight:bold;">Floyd-Warshall</text>
    <text x="325" y="362" class="detail" text-anchor="middle">All-pairs</text>
    <text x="325" y="375" class="detail" text-anchor="middle">shortest paths</text>
  </g>
  
  <!-- Decorative elements -->
  <g opacity="0.3">
    <circle cx="400" cy="20" r="40" fill="#3498db"/>
    <circle cx="10" cy="380" r="30" fill="#27ae60"/>
    <circle cx="410" cy="380" r="25" fill="#e74c3c"/>
  </g>
</svg>