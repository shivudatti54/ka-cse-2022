<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="normalization-1nf-2nf-3nf-bcnf">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5e6f5"/>
      <stop offset="100%" style="stop-color:#e6f5ec"/>
    </linearGradient>
    <linearGradient id="unfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcccc"/>
      <stop offset="100%" style="stop-color:#ff9999"/>
    </linearGradient>
    <linearGradient id="nf1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe5cc"/>
      <stop offset="100%" style="stop-color:#ffb366"/>
    </linearGradient>
    <linearGradient id="nf2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff4cc"/>
      <stop offset="100%" style="stop-color:#ffe066"/>
    </linearGradient>
    <linearGradient id="nf3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4f5d4"/>
      <stop offset="100%" style="stop-color:#7dcea0"/>
    </linearGradient>
    <linearGradient id="bcnfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d6eaf8"/>
      <stop offset="100%" style="stop-color:#5dade2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .title { animation: slideIn 0.8s ease-out forwards; }
    .box-unf { animation: fadeIn 0.6s ease-out 0.3s forwards; opacity: 0; }
    .box-nf1 { animation: fadeIn 0.6s ease-out 0.5s forwards; opacity: 0; }
    .box-nf2 { animation: fadeIn 0.6s ease-out 0.7s forwards; opacity: 0; }
    .box-nf3 { animation: fadeIn 0.6s ease-out 0.9s forwards; opacity: 0; }
    .box-bcnf { animation: fadeIn 0.6s ease-out 1.1s forwards; opacity: 0; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .concept-box { animation: slideIn 0.5s ease-out forwards; }
    .highlight { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50" class="title">Database Normalization</text>
  <text x="210" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5d6d7e">1NF → 2NF → 3NF → BCNF</text>
  
  <!-- BCNF Box (Top) -->
  <g class="box-bcnf" data-narration="BCNF: Boyce-Codd Normal Form - The highest normal form where every determinant must be a superkey">
    <rect x="145" y="70" width="130" height="45" rx="8" fill="url(#bcnfGrad)" filter="url(#shadow)"/>
    <text x="210" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a5276">BCNF</text>
    <text x="210" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a5276">All determinants</text>
    <text x="210" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a5276">are superkeys</text>
  </g>
  
  <!-- Arrow -->
  <g class="arrow">
    <path d="M210 117 L210 132" stroke="#5d6d7e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- 3NF Box -->
  <g class="box-nf3" data-narration="3NF: Third Normal Form - Eliminates transitive dependencies; no non-key attribute depends on another non-key attribute">
    <rect x="120" y="135" width="180" height="50" rx="8" fill="url(#nf3Grad)" filter="url(#shadow)"/>
    <text x="210" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e8449">3NF</text>
    <text x="210" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e8449">No transitive dependencies</text>
    <text x="210" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e8449">X → Y, Y ∉ X, Y → Z ⇒ X → Z</text>
  </g>
  
  <!-- Arrow -->
  <g class="arrow">
    <path d="M210 187 L210 202" stroke="#5d6d7e" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 2NF Box -->
  <g class="box-nf2" data-narration="2NF: Second Normal Form - Must be in 1NF plus no partial dependencies; non-key attributes depend on entire primary key">
    <rect x="95" y="205" width="230" height="55" rx="8" fill="url(#nf2Grad)" filter="url(#shadow)"/>
    <text x="210" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#9a7d0a">2NF</text>
    <text x="210" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9a7d0a">No partial dependencies</text>
    <text x="210" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9a7d0a">Non-key attr. depend on WHOLE key</text>
  </g>
  
  <!-- Arrow -->
  <g class="arrow">
    <path d="M210 262 L210 277" stroke="#5d6d7e" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 1NF Box -->
  <g class="box-nf1" data-narration="1NF: First Normal Form - Atomic values only; no repeating groups or arrays in columns">
    <rect x="70" y="280" width="280" height="55" rx="8" fill="url(#nf1Grad)" filter="url(#shadow)"/>
    <text x="210" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#935116">1NF</text>
    <text x="210" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#935116">Atomic values only</text>
    <text x="210" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#935116">No repeating groups or multi-valued attrs</text>
  </g>
  
  <!-- Arrow -->
  <g class="arrow">
    <path d="M210 337 L210 352" stroke="#5d6d7e" stroke-width="2" fill="none"/>
  </g>
  
  <!-- UNF Box (Bottom) -->
  <g class="box-unf" data-narration="UNF: Unnormalized Form - Raw data as collected; contains redundancy, repeating groups, and potential anomalies">
    <rect x="45" y="355" width="330" height="35" rx="8" fill="url(#unfGrad)" filter="url(#shadow)"/>
    <text x="210" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7f0000">UNF - Unnormalized Form</text>
    <text x="210" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f0000">Raw data with redundancy</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="concept-box" data-narration="Key concept: Each normal form builds upon the previous one, progressively eliminating data anomalies">
    <rect x="10" y="320" width="35" height="70" rx="5" fill="#ffffff" stroke="#bdc3c7" stroke-width="1" opacity="0.9"/>
    <text x="27" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#2c3e50">KEY</text>
    <text x="27" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#e74c3c">FD:</text>
    <text x="27" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#2c3e50">Functional</text>
    <text x="27" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#2c3e50">Dependency</text>
    <text x="27" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#27ae60">PK:</text>
    <text x="27" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#2c3e50">Primary</text>
    <text x="27" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#2c3e50">Key</text>
  </g>
  
  <!-- Anomalies Info -->
  <g class="concept-box" data-narration="Normalization solves insertion, update, and deletion anomalies that occur in unnormalized data">
    <rect x="375" y="320" width="40" height="70" rx="5" fill="#ffffff" stroke="#bdc3c7" stroke-width="1" opacity="0.9"/>
    <text x="395" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#2c3e50">ANOMALIES</text>
    <text x="395" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#c0392b">Insert</text>
    <text x="395" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#c0392b">Update</text>
    <text x="395" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#c0392b">Delete</text>
    <text x="395" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#27ae60">Solved!</text>
    <text x="395" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#27ae60">By 3NF+</text>
  </g>
</svg>