<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="functional-dependencies">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#9fc5db"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9"/>
      <stop offset="100%" style="stop-color:#a5d6a7"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe0b2"/>
      <stop offset="100%" style="stop-color:#ffcc80"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e1bee7"/>
      <stop offset="100%" style="stop-color:#ce93d8"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow-pulse { animation: arrowPulse 1.5s ease-in-out infinite; }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #1565c0; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #555; }
    .section-box { rx: 8; ry: 8; stroke: #666; stroke-width: 1; }
    .arrow-line { stroke: #1976d2; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .title-box { rx: 10; ry: 10; fill: url(#bgGradient); stroke: #1976d2; stroke-width: 2; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="fade-in">
    <rect x="10" y="10" width="400" height="50" class="title-box"/>
    <text x="210" y="42" text-anchor="middle" class="title-text">Functional Dependencies</text>
  </g>
  
  <!-- Section 1: Basic Definition -->
  <g class="slide-in" data-narration="The basic notation X → Y means if two tuples have same X values, they must have same Y values">
    <rect x="15" y="70" width="185" height="85" class="section-box" fill="url(#boxGradient1)"/>
    <text x="25" y="88" class="label-text" font-weight="bold">Basic Definition</text>
    <text x="25" y="108" class="detail-text">X → Y notation:</text>
    <text x="25" y="125" class="detail-text" font-size="16" font-style="italic">If X determines Y,</text>
    <text x="25" y="142" class="detail-text">then same X → same Y</text>
  </g>
  
  <!-- Section 2: Armstrong's Axioms -->
  <g class="slide-in" data-narration="Armstrong's Axioms are reflexity, augmentation, and transitivity - rules to derive new FDs">
    <rect x="215" y="70" width="195" height="85" class="section-box" fill="url(#boxGradient2)"/>
    <text x="225" y="88" class="label-text" font-weight="bold">Armstrong's Axioms</text>
    <text x="225" y="108" class="detail-text">1. Reflexivity: Y⊆X ⇒ X→Y</text>
    <text x="225" y="124" class="detail-text">2. Augmentation: X→Y ⇒ XZ→YZ</text>
    <text x="225" y="140" class="detail-text">3. Transitivity: X→Y, Y→Z ⇒ X→Z</text>
  </g>
  
  <!-- Section 3: Example with closure -->
  <g class="fade-in" data-narration="Example shows computing attribute closure to find derived dependencies like A→C from A→B and B→C">
    <rect x="15" y="165" width="185" height="110" class="section-box" fill="url(#boxGradient3)"/>
    <text x="25" y="183" class="label-text" font-weight="bold">Example: R(A,B,C)</text>
    <text x="25" y="203" class="detail-text">Given: A → B, B → C</text>
    <text x="25" y="222" class="detail-text" font-weight="bold" fill="#d84315">Compute A+:</text>
    <text x="35" y="240" class="detail-text">Start: {A}</text>
    <text x="35" y="258" class="detail-text">Add B (A→B): {A,B}</text>
    <text x="35" y="268" class="detail-text">Add C (B→C): {A,B,C}</text>
    <text x="25" y="285" class="detail-text" font-weight="bold" fill="#1565c0">Therefore: A → C holds</text>
  </g>
  
  <!-- Section 4: Key Concepts -->
  <g class="fade-in" data-narration="Key concepts include attribute closure, candidate keys as minimal determinants, and minimal cover as irreducible FD set">
    <rect x="215" y="165" width="195" height="110" class="section-box" fill="url(#boxGradient4)"/>
    <text x="225" y="183" class="label-text" font-weight="bold">Key Concepts</text>
    <text x="225" y="203" class="detail-text">• Attribute Closure (X+):</text>
    <text x="235" y="218" class="detail-text">All attrs determined by X</text>
    <text x="225" y="236" class="detail-text">• Candidate Key:</text>
    <text x="235" y="251" class="detail-text">Minimal key determining all</text>
    <text x="225" y="266" class="detail-text">• Minimal Cover:</text>
    <text x="235" y="275" class="detail-text">Irreducible equivalent set</text>
  </g>
  
  <!-- Visual: FD Lattice Diagram -->
  <g class="pulse" data-narration="Attribute closure lattice shows how attributes are determined hierarchically through FDs">
    <text x="210" y="295" class="label-text" font-weight="bold" text-anchor="middle">Attribute Closure Hierarchy</text>
    
    <!-- Lattice nodes -->
    <circle cx="210" cy="320" r="18" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="210" y="324" class="detail-text" text-anchor="middle" font-weight="bold">{A}</text>
    
    <circle cx="150" cy="360" r="18" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="150" y="364" class="detail-text" text-anchor="middle" font-weight="bold">{A,B}</text>
    
    <circle cx="270" cy="360" r="18" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
    <text x="270" y="364" class="detail-text" text-anchor="middle" font-weight="bold">{A,B,C}</text>
    
    <!-- Arrows showing FDs -->
    <line x1="195" y1="330" x2="160" y2="345" stroke="#1976d2" stroke-width="2" class="arrow-pulse"/>
    <line x1="225" y1="330" x2="260" y2="345" stroke="#1976d2" stroke-width="2" class="arrow-pulse"/>
    
    <text x="120" y="395" class="detail-text" font-weight="bold" fill="#388e3c">A → B</text>
    <text x="275" y="395" class="detail-text" font-weight="bold" fill="#f57c00">B → C</text>
  </g>
  
  <!-- Bottom note -->
  <g class="fade-in" data-narration="Functional dependencies are fundamental to database normalization and ensuring data integrity">
    <rect x="10" y="365" width="400" height="28" rx="5" ry="5" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="1"/>
    <text x="210" y="382" class="detail-text" text-anchor="middle" font-weight="bold" fill="#303f9f">Foundation for 3NF, BCNF &amp; Data Integrity</text>
  </g>
</svg>