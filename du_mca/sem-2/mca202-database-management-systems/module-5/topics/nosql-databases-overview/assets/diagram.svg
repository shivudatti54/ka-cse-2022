<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="nosql-databases-overview">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dff0"/>
    </linearGradient>
    <linearGradient id="circleC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba"/>
      <stop offset="100%" style="stop-color:#ff8080"/>
    </linearGradient>
    <linearGradient id="circleA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#baffc9"/>
      <stop offset="100%" style="stop-color:#80ff80"/>
    </linearGradient>
    <linearGradient id="circleP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae1ff"/>
      <stop offset="100%" style="stop-color:#80b3ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 1s ease-out; }
    .section-1 { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .section-2 { animation: slideInRight 0.8s ease-out 0.4s both; }
    .section-3 { animation: slideInUp 0.8s ease-out 0.6s both; }
    .section-4 { animation: fadeIn 1s ease-out 0.8s both; }
    .cap-circle { animation: fadeIn 1s ease-out 0.3s both; }
    .cap-label { animation: pulse 2s infinite 1.5s; }
    .model-box { animation: slideInUp 0.6s ease-out both; }
    .arrow { animation: fadeIn 0.5s ease-out 1s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c5282" class="title">NoSQL Databases Overview</text>
  
  <!-- CAP Theorem Section -->
  <g data-narration="CAP Theorem shows the tradeoff between Consistency, Availability, and Partition Tolerance - only two can be guaranteed">
    <text x="300" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3748">CAP Theorem</text>
    
    <!-- Circle C - Consistency -->
    <circle cx="260" cy="100" r="38" fill="url(#circleC)" opacity="0.7" class="cap-circle"/>
    <text x="260" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c53030">C</text>
    <text x="260" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c53030">Consistency</text>
    
    <!-- Circle A - Availability -->
    <circle cx="340" cy="100" r="38" fill="url(#circleA)" opacity="0.7" class="cap-circle"/>
    <text x="340" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#276749">A</text>
    <text x="340" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#276749">Availability</text>
    
    <!-- Circle P - Partition Tolerance -->
    <circle cx="300" cy="145" r="38" fill="url(#circleP)" opacity="0.7" class="cap-circle"/>
    <text x="300" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2b6cb0">P</text>
    <text x="300" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2b6cb0">Partition</text>
    <text x="300" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2b6cb0">Tolerance</text>
    
    <!-- Center label -->
    <text x="300" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568" class="cap-label">Pick 2</text>
  </g>
  
  <!-- Data Models Section -->
  <g data-narration="Four main types of NoSQL databases: Document, Key-Value, Column-Family, and Graph stores">
    <text x="100" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3748" class="section-1">Data Models</text>
    
    <!-- Document Store -->
    <g class="model-box" style="animation-delay: 0.3s">
      <rect x="20" y="70" width="130" height="55" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="85" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Document</text>
      <text x="85" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">MongoDB, CouchDB</text>
      <text x="85" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350f">JSON-like docs</text>
    </g>
    
    <!-- Key-Value Store -->
    <g class="model-box" style="animation-delay: 0.5s">
      <rect x="20" y="130" width="130" height="55" rx="5" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="85" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#065f46">Key-Value</text>
      <text x="85" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#065f46">Redis, DynamoDB</text>
      <text x="85" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#064e3b">Simple pairs</text>
    </g>
    
    <!-- Column-Family Store -->
    <g class="model-box" style="animation-delay: 0.7s">
      <rect x="20" y="190" width="130" height="55" rx="5" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="85" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3730a3">Column-Family</text>
      <text x="85" y="223" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3730a3">Cassandra, HBase</text>
      <text x="85" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#312e81">Wide columns</text>
    </g>
    
    <!-- Graph Database -->
    <g class="model-box" style="animation-delay: 0.9s">
      <rect x="20" y="250" width="130" height="55" rx="5" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="85" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9d174d">Graph</text>
      <text x="85" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9d174d">Neo4j</text>
      <text x="85" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#831843">Nodes + edges</text>
    </g>
  </g>
  
  <!-- Properties Section -->
  <g data-narration="NoSQL follows BASE principles: Basically Available, Soft state, Eventually consistent">
    <rect x="165" y="210" width="130" height="50" rx="5" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5" filter="url(#shadow)" class="section-3"/>
    <text x="230" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#7e22ce">BASE Properties</text>
    <text x="230" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b21a8">Basically Available</text>
    <text x="230" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b21a8">Soft State</text>
  </g>
  
  <g data-narration="ACID properties are typical of relational databases, while NoSQL often sacrifices strict consistency">
    <rect x="310" y="210" width="100" height="50" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)" class="section-4"/>
    <text x="360" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">vs ACID</text>
    <text x="360" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b91c1c">Atomic</text>
    <text x="360" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b91c1c">Consistent</text>
  </g>
  
  <!-- Key Benefits -->
  <g data-narration="Key advantages: horizontal scaling through sharding and replication, flexible schemas, high performance">
    <text x="210" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2d3748">Key Benefits</text>
    
    <g class="section-4" style="animation-delay: 1s">
      <rect x="30" y="335" width="85" height="30" rx="4" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
      <text x="72" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1e40af">Horizontal</text>
      <text x="72" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">Scaling</text>
    </g>
    
    <g class="section-4" style="animation-delay: 1.1s">
      <rect x="125" y="335" width="85" height="30" rx="4" fill="#bbf7d0" stroke="#22c55e" stroke-width="1"/>
      <text x="167" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#166534">Flexible</text>
      <text x="167" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">Schema</text>
    </g>
    
    <g class="section-4" style="animation-delay: 1.2s">
      <rect x="220" y="335" width="85" height="30" rx="4" fill="#fcd34d" stroke="#f59e0b" stroke-width="1"/>
      <text x="262" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#92400e">High</text>
      <text x="262" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">Performance</text>
    </g>
    
    <g class="section-4" style="animation-delay: 1.3s">
      <rect x="315" y="335" width="85" height="30" rx="4" fill="#e9d5ff" stroke="#a855f7" stroke-width="1"/>
      <text x="357" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#7e22ce">Cloud</text>
      <text x="357" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7e22ce">Native</text>
    </g>
  </g>
  
  <!-- Connecting arrow -->
  <g class="arrow">
    <path d="M 150 95 Q 180 95 195 80" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Footer -->
  <text x="210" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">DU MCA - Modern Data Management</text>
</svg>