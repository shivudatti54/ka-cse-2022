<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="query-optimization">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea"/>
      <stop offset="100%" style="stop-color:#7ec8e3"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95d5b2"/>
    </linearGradient>
    <linearGradient id="boxGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5a5"/>
      <stop offset="100%" style="stop-color:#c49090"/>
    </linearGradient>
    <linearGradient id="boxGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9b1ff"/>
      <stop offset="100%" style="stop-color:#a87dd4"/>
    </linearGradient>
    <linearGradient id="boxGrad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd6a5"/>
      <stop offset="100%" style="stop-color:#ffb347"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .box { rx: 8; ry: 8; stroke: #34495e; stroke-width: 1.5; }
    .arrow { stroke: #e74c3c; stroke-width: 2; fill: none; stroke-dasharray: 100; animation: drawLine 1s forwards; }
    .section-1 { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .section-2 { animation: slideIn 0.8s ease-out 0.3s forwards; opacity: 0; }
    .section-3 { animation: slideIn 0.8s ease-out 0.5s forwards; opacity: 0; }
    .section-4 { animation: slideIn 0.8s ease-out 0.7s forwards; opacity: 0; }
    .section-5 { animation: fadeIn 0.8s ease-out 0.9s forwards; opacity: 0; }
    .pulse:hover { animation: pulse 1s infinite; cursor: pointer; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" data-narration="Title: Query Optimization - the process of selecting the most efficient execution strategy">Query Optimization</text>
  <line x1="100" y1="38" x2="320" y2="38" stroke="#3498db" stroke-width="2"/>
  
  <!-- Section 1: Query Processing Pipeline -->
  <g class="section-1" data-narration="Query Processing Pipeline: Parsing → Validation → Optimization → Execution">
    <rect x="20" y="50" width="380" height="55" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <text x="30" y="65" class="label">Query Processing Pipeline</text>
    
    <!-- Pipeline boxes -->
    <g class="pulse">
      <rect x="30" y="75" width="70" height="22" rx="4" fill="url(#boxGrad1)"/>
      <text x="65" y="90" text-anchor="middle" class="detail" fill="#2c3e50">Parsing</text>
    </g>
    <line x1="105" y1="86" x2="115" y2="86" stroke="#7f8c8d" stroke-width="1.5"/>
    
    <g class="pulse">
      <rect x="120" y="75" width="80" height="22" rx="4" fill="url(#boxGrad2)"/>
      <text x="160" y="90" text-anchor="middle" class="detail" fill="#2c3e50">Validation</text>
    </g>
    <line x1="205" y1="86" x2="215" y2="86" stroke="#7f8c8d" stroke-width="1.5"/>
    
    <g class="pulse">
      <rect x="220" y="75" width="90" height="22" rx="4" fill="url(#boxGrad3)"/>
      <text x="265" y="90" text-anchor="middle" class="detail" fill="#2c3e50">Optimization</text>
    </g>
    <line x1="315" y1="86" x2="325" y2="86" stroke="#7f8c8d" stroke-width="1.5"/>
    
    <g class="pulse">
      <rect x="330" y="75" width="60" height="22" rx="4" fill="url(#boxGrad4)"/>
      <text x="360" y="90" text-anchor="middle" class="detail" fill="#2c3e50">Execute</text>
    </g>
  </g>
  
  <!-- Section 2: Cost Estimation -->
  <g class="section-2" data-narration="Cost Estimation uses cardinality and selectivity: Cost = CPU_cost + I/O_cost">
    <rect x="20" y="115" width="180" height="70" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <text x="30" y="130" class="label" fill="#e74c3c">Cost Estimation</text>
    <text x="30" y="148" class="detail">Cardinality: # result rows</text>
    <text x="30" y="162" class="detail">Selectivity: SF = res/total</text>
    <text x="30" y="176" class="detail">Cost = CPU + I/O (weighted)</text>
  </g>
  
  <!-- Section 3: Logical Transformations -->
  <g class="section-3" data-narration="Logical Transformations include Predicate Pushdown, Join Reordering, and Subquery Flattening">
    <rect x="210" y="115" width="190" height="70" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <text x="220" y="130" class="label" fill="#9b59b6">Logical Transformations</text>
    <text x="220" y="148" class="detail">• Predicate pushdown (filter early)</text>
    <text x="220" y="162" class="detail">• Join reordering (reduce size)</text>
    <text x="220" y="176" class="detail">• Subquery flattening → joins</text>
  </g>
  
  <!-- Section 4: Physical Operators -->
  <g class="section-4" data-narration="Physical Operators: Join algorithms with different complexities">
    <rect x="20" y="195" width="380" height="55" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <text x="30" y="212" class="label" fill="#27ae60">Physical Operators</text>
    
    <rect x="30" y="222" width="110" height="20" rx="4" fill="url(#boxGrad5)"/>
    <text x="85" y="236" text-anchor="middle" class="detail" fill="#2c3e50">Nested Loop O(n×m)</text>
    
    <rect x="150" y="222" width="100" height="20" rx="4" fill="url(#boxGrad1)"/>
    <text x="200" y="236" text-anchor="middle" class="detail" fill="#2c3e50">Hash Join O(n+m)</text>
    
    <rect x="260" y="222" width="130" height="20" rx="4" fill="url(#boxGrad2)"/>
    <text x="325" y="236" text-anchor="middle" class="detail" fill="#2c3e50">Merge Join O(n log n)</text>
  </g>
  
  <!-- Section 5: Execution Plan Tree -->
  <g class="section-5" data-narration="Example Execution Plan: Hash Join between Orders and Customers with index scans">
    <rect x="20" y="260" width="380" height="130" rx="8" fill="#fff9e6" stroke="#f39c12" stroke-width="1.5"/>
    <text x="30" y="278" class="label" fill="#e67e22">Execution Plan (Tree)</text>
    
    <!-- Tree structure -->
    <g class="pulse">
      <rect x="170" y="285" width="80" height="22" rx="4" fill="#e74c3c"/>
      <text x="210" y="300" text-anchor="middle" class="detail" fill="white" font-size="10">Hash Join</text>
      <text x="210" y="312" text-anchor="middle" class="detail" fill="#c0392b" font-size="9">Cost: 125</text>
    </g>
    
    <!-- Arrows from Hash Join -->
    <line x1="175" y1="307" x2="140" y2="330" stroke="#7f8c8d" stroke-width="1.5"/>
    <line x1="245" y1="307" x2="280" y2="330" stroke="#7f8c8d" stroke-width="1.5"/>
    
    <!-- Left branch - Orders -->
    <g class="pulse">
      <rect x="80" y="335" width="120" height="22" rx="4" fill="#3498db"/>
      <text x="140" y="350" text-anchor="middle" class="detail" fill="white" font-size="10">Index Scan: Orders</text>
      <text x="140" y="362" text-anchor="middle" class="detail" fill="#2980b9" font-size="9">Rows: 1.2K</text>
    </g>
    
    <!-- Right branch - Customers -->
    <g class="pulse">
      <rect x="230" y="335" width="130" height="22" rx="4" fill="#9b59b6"/>
      <text x="295" y="350" text-anchor="middle" class="detail" fill="white" font-size="10">Seq Scan: Customers</text>
      <text x="295" y="362" text-anchor="middle" class="detail" fill="#8e44ad" font-size="9">Rows: 50K</text>
    </g>
    
    <!-- Arrow to result -->
    <line x1="210" y1="307" x2="210" y2="335" stroke="#27ae60" stroke-width="2"/>
    <polygon points="205,335 215,335 210,342" fill="#27ae60"/>
    
    <!-- Result box -->
    <rect x="175" y="368" width="70" height="16" rx="4" fill="#27ae60"/>
    <text x="210" y="379" text-anchor="middle" class="detail" fill="white" font-size="9">Result Set</text>
  </g>
  
  <!-- Legend/Stats -->
  <g>
    <text x="30" y="395" class="detail" fill="#7f8c8d">◉ Hover boxes to highlight • Optimized queries: ms vs hours</text>
  </g>
</svg>