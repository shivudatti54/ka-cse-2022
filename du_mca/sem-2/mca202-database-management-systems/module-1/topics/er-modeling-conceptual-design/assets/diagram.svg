<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="er-modeling-conceptual-design">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8ed"/>
      <stop offset="100%" style="stop-color:#c5dde6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#666" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c5282; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; fill: #2d3748; }
    .detail-text { font-family: Arial, sans-serif; font-size: 12px; fill: #4a5568; }
    .section-box { fill: #fff; stroke: #4299e1; stroke-width: 2; rx: 8; }
    .entity-box { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
    .entity-box-double { fill: #bee3f8; stroke: #3182ce; stroke-width: 3; }
    .relationship-diamond { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
    .attribute-oval { fill: #feebc8; stroke: #dd6b20; stroke-width: 2; }
    .arrow-line { stroke: #718096; stroke-width: 2; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .draw-line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1.5s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="fade-in" data-narration="Title section introducing ER Modeling Conceptual Design">
    <text x="210" y="30" text-anchor="middle" class="title-text">ER Modeling: Conceptual Design</text>
    <line x1="60" y1="40" x2="360" y2="40" stroke="#4299e1" stroke-width="2"/>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="slide-in" style="animation-delay: 0.3s" data-narration="Key concepts include Entity Types, Attributes, and Relationship Constraints">
    <rect x="10" y="55" width="130" height="70" class="section-box"/>
    <text x="20" y="72" class="label-text" font-weight="bold">Key Concepts:</text>
    <text x="20" y="88" class="detail-text">• Entity Types</text>
    <text x="20" y="102" class="detail-text">• Attributes</text>
    <text x="20" y="116" class="detail-text">• Relationships</text>
  </g>
  
  <!-- Strong vs Weak Entity Box -->
  <g class="slide-in" style="animation-delay: 0.5s" data-narration="Strong entities exist independently while weak entities depend on strong entities">
    <rect x="150" y="55" width="130" height="70" class="section-box"/>
    <text x="160" y="72" class="label-text" font-weight="bold">Entity Types:</text>
    <text x="160" y="88" class="detail-text">Strong: Student, Account</text>
    <text x="160" y="102" class="detail-text">Weak: Dependent, Prescription</text>
    <text x="160" y="116" class="detail-text">Double border = Strong</text>
  </g>
  
  <!-- Relationship Constraints Box -->
  <g class="slide-in" style="animation-delay: 0.7s" data-narration="Cardinality ratios define relationship patterns like 1:1, 1:N, M:N">
    <rect x="290" y="55" width="120" height="70" class="section-box"/>
    <text x="300" y="72" class="label-text" font-weight="bold">Constraints:</text>
    <text x="300" y="88" class="detail-text">Cardinality: 1:1, 1:N, M:N</text>
    <text x="300" y="102" class="detail-text">Participation: Total/Partial</text>
    <text x="300" y="116" class="detail-text">Role Indicators</text>
  </g>
  
  <!-- ER Diagram Section -->
  <g data-narration="University ER Diagram showing Student, Course, Department with Enrolls relationship">
    <!-- ER Diagram Title -->
    <text x="210" y="148" text-anchor="middle" class="label-text" font-weight="bold" font-size="14">University ER Diagram</text>
    
    <!-- Student Entity (Double Rectangle for Strong Entity) -->
    <g class="pulse" style="animation-delay: 1s">
      <rect x="30" y="160" width="80" height="50" class="entity-box-double"/>
      <rect x="33" y="163" width="74" height="44" class="entity-box-double"/>
      <text x="70" y="182" text-anchor="middle" class="label-text" font-weight="bold">Student</text>
      <text x="70" y="198" text-anchor="middle" class="detail-text">ID, Name</text>
    </g>
    
    <!-- Student Attributes (Ovals) -->
    <g class="fade-in" style="animation-delay: 1.2s">
      <ellipse cx="20" cy="180" rx="15" ry="10" class="attribute-oval"/>
      <text x="20" y="183" text-anchor="middle" class="detail-text" font-size="9">ID</text>
      <line x1="35" y1="180" x2="45" y2="180" stroke="#718096" stroke-width="1"/>
    </g>
    <g class="fade-in" style="animation-delay: 1.3s">
      <ellipse cx="20" cy="200" rx="18" ry="10" class="attribute-oval"/>
      <text x="20" y="203" text-anchor="middle" class="detail-text" font-size="9">Name</text>
      <line x1="38" y1="200" x2="48" y2="200" stroke="#718096" stroke-width="1"/>
    </g>
    
    <!-- Department Entity -->
    <g class="pulse" style="animation-delay: 1.1s">
      <rect x="310" y="160" width="80" height="50" class="entity-box"/>
      <text x="350" y="182" text-anchor="middle" class="label-text" font-weight="bold">Department</text>
      <text x="350" y="198" text-anchor="middle" class="detail-text">DID, DName</text>
    </g>
    
    <!-- Course Entity -->
    <g class="pulse" style="animation-delay: 1.2s">
      <rect x="170" y="270" width="80" height="50" class="entity-box"/>
      <text x="210" y="292" text-anchor="middle" class="label-text" font-weight="bold">Course</text>
      <text x="210" y="308" text-anchor="middle" class="detail-text">CID, Title</text>
    </g>
    
    <!-- Enrolls Relationship (Diamond) -->
    <g class="pulse" style="animation-delay: 1.4s">
      <polygon points="170,230 200,245 170,260 140,245" class="relationship-diamond"/>
      <text x="170" y="248" text-anchor="middle" class="detail-text" font-weight="bold" font-size="10">Enrolls</text>
    </g>
    
    <!-- BelongsTo Relationship (Diamond) -->
    <g class="pulse" style="animation-delay: 1.5s">
      <polygon points="280,210 310,225 280,240 250,225" class="relationship-diamond"/>
      <text x="280" y="228" text-anchor="middle" class="detail-text" font-weight="bold" font-size="10">BelongsTo</text>
    </g>
    
    <!-- Relationship Lines with animation -->
    <line x1="110" y1="185" x2="135" y2="240" class="arrow-line draw-line" style="animation-delay: 1.5s"/>
    <line x1="110" y1="185" x2="145" y2="245" class="arrow-line draw-line" style="animation-delay: 1.6s"/>
    <line x1="250" y1="185" x2="245" y2="220" class="arrow-line draw-line" style="animation-delay: 1.7s"/>
    <line x1="350" y1="185" x2="255" y2="220" class="arrow-line draw-line" style="animation-delay: 1.8s"/>
    <line x1="210" y1="320" x2="210" y2="275" class="arrow-line draw-line" style="animation-delay: 1.9s"/>
    
    <!-- Cardinality Labels -->
    <text x="130" y="220" class="detail-text" font-size="10">(1:N)</text>
    <text x="255" y="218" class="detail-text" font-size="10">(1:N)</text>
    <text x="205" y="265" class="detail-text" font-size="10">(M:N)</text>
  </g>
  
  <!-- Example Footer -->
  <g class="fade-in" style="animation-delay: 2s" data-narration="Example: Student enrolls in Course, Department offers Course">
    <rect x="10" y="340" width="400" height="50" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1" rx="5"/>
    <text x="210" y="358" text-anchor="middle" class="detail-text" font-weight="bold">Example: Students enroll in Courses offered by Departments</text>
    <text x="210" y="376" text-anchor="middle" class="detail-text">Cardinality: Student(1) → Enrolls(M) ← Course(N)</text>
  </g>
</svg>