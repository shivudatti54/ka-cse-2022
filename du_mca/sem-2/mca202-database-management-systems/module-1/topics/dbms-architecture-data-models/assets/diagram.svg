<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="dbms-architecture-data-models">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e1f5fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8eaf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="externalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9c4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff59d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="conceptualGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="internalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffccbc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffab91;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="modelsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d1c4e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b39ddb;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5c6bc0" />
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out; font-family: Arial, sans-serif; font-weight: bold; }
    .box-external { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .box-conceptual { animation: slideInLeft 0.6s ease-out 0.4s both; }
    .box-internal { animation: slideInLeft 0.6s ease-out 0.6s both; }
    .box-models { animation: slideInRight 0.6s ease-out 0.3s both; }
    .arrow-line { animation: fadeIn 0.5s ease-out 0.8s both; }
    .mapping-label { animation: pulse 2s infinite; }
    .model-item { animation: fadeIn 0.5s ease-out; }
    .independence-badge { animation: bounce 2s infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title" font-size="18" fill="#1a237e" font-weight="bold" data-narration="Main title showing DBMS Architecture and Data Models">DBMS Architecture &amp; Data Models</text>
  <line x1="20" y1="38" x2="400" y2="38" stroke="#5c6bc0" stroke-width="2" opacity="0.5" />
  
  <!-- Three Schema Architecture Box - Left Side -->
  <text x="25" y="60" font-size="14" fill="#1a237e" font-weight="bold" data-narration="Three-tier architecture label">Three-Tier Architecture</text>
  
  <!-- External Level -->
  <g class="box-external">
    <rect x="20" y="70" width="150" height="70" rx="8" fill="url(#externalGrad)" stroke="#fbc02d" stroke-width="2" />
    <text x="95" y="88" text-anchor="middle" font-size="14" fill="#f57f17" font-weight="bold" data-narration="External level - user specific views">EXTERNAL</text>
    <text x="95" y="105" text-anchor="middle" font-size="10" fill="#5d4037" data-narration="User-specific views like teller vs loan officer">User Views</text>
    <text x="95" y="120" text-anchor="middle" font-size="9" fill="#5d4037" data-narration="Individual user perspective">Customized UI</text>
    <text x="95" y="133" text-anchor="middle" font-size="9" fill="#5d4037" data-narration="Different permissions per user">Permissions</text>
  </g>
  
  <!-- Arrow Down -->
  <line x1="95" y1="140" x2="95" y2="155" stroke="#5c6bc0" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-line" />
  <text x="110" y="150" font-size="8" fill="#5c6bc0" class="mapping-label" data-narration="Mapping between external and conceptual">Map</text>
  
  <!-- Conceptual Level -->
  <g class="box-conceptual">
    <rect x="20" y="160" width="150" height="70" rx="8" fill="url(#conceptualGrad)" stroke="#43a047" stroke-width="2" />
    <text x="95" y="178" text-anchor="middle" font-size="14" fill="#1b5e20" font-weight="bold" data-narration="Conceptual level - unified logical structure">CONCEPTUAL</text>
    <text x="95" y="195" text-anchor="middle" font-size="10" fill="#2e7d32" data-narration="Logical structure with tables relationships">Tables, Relationships</text>
    <text x="95" y="210" text-anchor="middle" font-size="9" fill="#2e7d32" data-narration="Database design independent of apps">Logical Design</text>
    <text x="95" y="223" text-anchor="middle" font-size="9" fill="#2e7d32" data-narration="Rules and constraints">Constraints</text>
  </g>
  
  <!-- Arrow Down -->
  <line x1="95" y1="230" x2="95" y2="245" stroke="#5c6bc0" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-line" />
  <text x="110" y="240" font-size="8" fill="#5c6bc0" class="mapping-label" data-narration="Mapping between conceptual and internal">Map</text>
  
  <!-- Internal Level -->
  <g class="box-internal">
    <rect x="20" y="250" width="150" height="70" rx="8" fill="url(#internalGrad)" stroke="#e64a19" stroke-width="2" />
    <text x="95" y="268" text-anchor="middle" font-size="14" fill="#bf360c" font-weight="bold" data-narration="Internal level - physical storage details">INTERNAL</text>
    <text x="95" y="285" text-anchor="middle" font-size="10" fill="#d84315" data-narration="Physical storage file structures indexing">File Structures</text>
    <text x="95" y="300" text-anchor="middle" font-size="9" fill="#d84315" data-narration="How data is physically stored">Indexing</text>
    <text x="95" y="313" text-anchor="middle" font-size="9" fill="#d84315" data-narration="Storage optimization">Compression</text>
  </g>
  
  <!-- Data Independence Labels -->
  <g class="independence-badge">
    <rect x="30" y="325" width="60" height="20" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" />
    <text x="60" y="340" text-anchor="middle" font-size="8" fill="#1565c0" data-narration="Logical data independence">Log. Indep.</text>
  </g>
  <g class="independence-badge">
    <rect x="100" y="325" width="60" height="20" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" />
    <text x="130" y="340" text-anchor="middle" font-size="8" fill="#2e7d32" data-narration="Physical data independence">Phys. Indep.</text>
  </g>
  
  <!-- Data Models Box - Right Side -->
  <g class="box-models">
    <rect x="185" y="70" width="210" height="280" rx="10" fill="url(#modelsGrad)" stroke="#7e57c2" stroke-width="2" />
    <text x="290" y="90" text-anchor="middle" font-size="14" fill="#4527a0" font-weight="bold" data-narration="Data Models section showing different database models">Data Models</text>
    
    <!-- Relational -->
    <g class="model-item" style="animation-delay: 0.4s">
      <circle cx="200" cy="115" r="4" fill="#7b1fa2" />
      <text x="210" y="118" font-size="11" fill="#4a148c" font-weight="bold" data-narration="Relational model with tables tuples attributes">Relational</text>
      <text x="210" y="130" font-size="9" fill="#6a1b9a" data-narration="SQL-based like MySQL PostgreSQL Oracle">SQL, Tables</text>
    </g>
    
    <!-- Hierarchical -->
    <g class="model-item" style="animation-delay: 0.5s">
      <circle cx="200" cy="148" r="4" fill="#7b1fa2" />
      <text x="210" y="151" font-size="11" fill="#4a148c" font-weight="bold" data-narration="Hierarchical model tree structure">Hierarchical</text>
      <text x="210" y="163" font-size="9" fill="#6a1b9a" data-narration="Tree structures like IMS legacy">Tree, Parent-Child</text>
    </g>
    
    <!-- Network -->
    <g class="model-item" style="animation-delay: 0.6s">
      <circle cx="200" cy="181" r="4" fill="#7b1fa2" />
      <text x="210" y="184" font-size="11" fill="#4a148c" font-weight="bold" data-narration="Network model graph-like structures">Network</text>
      <text x="210" y="196" font-size="9" fill="#6a1b9a" data-narration="Graph structures many-to-many">Many-Many</text>
    </g>
    
    <!-- Object-Oriented -->
    <g class="model-item" style="animation-delay: 0.7s">
      <circle cx="200" cy="214" r="4" fill="#7b1fa2" />
      <text x="210" y="217" font-size="11" fill="#4a148c" font-weight="bold" data-narration="Object-oriented model encapsulation inheritance">Object-Oriented</text>
      <text x="210" y="229" font-size="9" fill="#6a1b9a" data-narration="Objects with methods classes">OOP, PostgreSQL</text>
    </g>
    
    <!-- NoSQL -->
    <g class="model-item" style="animation-delay: 0.8s">
      <circle cx="200" cy="247" r="4" fill="#7b1fa2" />
      <text x="210" y="250" font-size="11" fill="#4a148c" font-weight="bold" data-narration="NoSQL model modern scalable databases">NoSQL</text>
      <text x="210" y="262" font-size="9" fill="#6a1b9a" data-narration="Document columnar graph key-value">Doc/Col/Graph</text>
      <text x="210" y="274" font-size="9" fill="#6a1b9a" data-narration="MongoDB Cassandra Neo4j examples">Mongo, Cassandra</text>
    </g>
    
    <!-- NoSQL Types Mini Icons -->
    <rect x="295" y="280" width="18" height="12" rx="2" fill="#fff" stroke="#7b1fa2" opacity="0.7" />
    <text x="304" y="289" font-size="7" fill="#7b1fa2" text-anchor="middle">D</text>
    <rect x="315" y="280" width="18" height="12" rx="2" fill="#fff" stroke="#7b1fa2" opacity="0.7" />
    <text x="324" y="289" font-size="7" fill="#7b1fa2" text-anchor="middle">C</text>
    <rect x="335" y="280" width="18" height="12" rx="2" fill="#fff" stroke="#7b1fa2" opacity="0.7" />
    <text x="344" y="289" font-size="7" fill="#7b1fa2" text-anchor="middle">G</text>
    <text x="350" y="310" font-size="8" fill="#4a148c" data-narration="Document Column Graph NoSQL types">Doc | Col | Graph</text>
  </g>
  
  <!-- Connecting Arrows from Models to Architecture -->
  <path d="M 185 150 Q 170 160 170 180" stroke="#7e57c2" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arrowhead)" class="arrow-line" />
  <path d="M 185 220 Q 170 210 170 195" stroke="#7e57c2" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arrowhead)" class="arrow-line" />
  <path d="M 185 300 Q 170 300 170 285" stroke="#7e57c2" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arrowhead)" class="arrow-line" />
  
  <!-- Key Concept Box -->
  <rect x="20" y="360" width="130" height="30" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1" />
  <text x="85" y="375" text-anchor="middle" font-size="9" fill="#e65100" font-weight="bold" data-narration="Key takeaway about data abstraction">Data Abstraction</text>
  <text x="85" y="386" text-anchor="middle" font-size="8" fill="#ef6c00" data-narration="Hides complexity from users">Hides complexity</text>
  
  <rect x="155" y="360" width="130" height="30" rx="5" fill="#e8f5e9" stroke="#4caf50" stroke-width="1" />
  <text x="220" y="375" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold" data-narration="Key takeaway about data independence">Data Independence</text>
  <text x="220" y="386" text-anchor="middle" font-size="8" fill="#388e3c" data-narration="Schema changes don't affect apps">Schema changes isolated</text>
  
  <rect x="290" y="360" width="110" height="30" rx="5" fill="#fce4ec" fill-opacity="0.7" stroke="#ec407a" stroke-width="1" />
  <text x="345" y="375" text-anchor="middle" font-size="9" fill="#880e4f" font-weight="bold" data-narration="ACID properties for banking">ACID Compliance</text>
  <text x="345" y="386" text-anchor="middle" font-size="8" fill="#ad1457" data-narration="Atomic Consistent Isolated Durable">Reliable Transactions</text>
</svg>