<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="relational-algebra-calculus">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="algebraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c9b6"/>
    </linearGradient>
    <linearGradient id="calculusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4c4e8"/>
      <stop offset="100%" style="stop-color:#b8a4d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .subtitle { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .section-title { font-family: Georgia, serif; font-size: 16px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #7f8c8d; }
    .op-box { rx: 6; ry: 6; filter: url(#shadow); }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .anim-slide { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-arrow { animation: arrowPulse 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade" style="animation-delay: 0.1s">Relational Algebra</text>
  <text x="210" y="50" text-anchor="middle" class="title anim-fade" style="animation-delay: 0.2s">&amp; Calculus</text>
  <text x="210" y="70" text-anchor="middle" class="subtitle anim-fade" style="animation-delay: 0.3s">Foundation of Relational Databases</text>
  
  <!-- Left Column: Relational Algebra -->
  <g transform="translate(15, 90)" data-narration="Relational Algebra - Procedural operations to manipulate relations">
    <rect class="op-box" width="180" height="140" fill="url(#algebraGrad)" stroke="#7fb3a5" stroke-width="2" style="animation: slideIn 0.6s ease-out forwards; animation-delay: 0.4s; opacity: 0;"/>
    <text x="90" y="22" text-anchor="middle" class="section-title" style="animation: fadeIn 0.6s ease-out forwards; animation-delay: 0.5s; opacity: 0;">Relational Algebra</text>
    <text x="90" y="42" text-anchor="middle" class="detail" style="animation: fadeIn 0.6s ease-out forwards; animation-delay: 0.55s; opacity: 0;">Procedural • HOW</text>
    
    <!-- Operations -->
    <rect x="10" y="52" width="75" height="24" rx="4" fill="#fff" stroke="#7fb3a5" stroke-width="1" class="anim-pulse" style="animation-delay: 0.7s; opacity: 0; animation: slideIn 0.5s ease-out forwards, pulse 2s ease-in-out infinite; animation-delay: 0.7s, 1.2s;"/>
    <text x="47" y="68" text-anchor="middle" class="label" font-size="12">Selection (σ)</text>
    
    <rect x="95" y="52" width="75" height="24" rx="4" fill="#fff" stroke="#7fb3a5" stroke-width="1" style="animation: slideIn 0.5s ease-out forwards; animation-delay: 0.8s; opacity: 0;"/>
    <text x="132" y="68" text-anchor="middle" class="label" font-size="12">Projection (π)</text>
    
    <rect x="10" y="82" width="75" height="24" rx="4" fill="#fff" stroke="#7fb3a5" stroke-width="1" style="animation: slideIn 0.5s ease-out forwards; animation-delay: 0.9s; opacity: 0;"/>
    <text x="47" y="98" text-anchor="middle" class="label" font-size="12">Union (∪)</text>
    
    <rect x="95" y="82" width="75" height="24" rx="4" fill="#fff" stroke="#7fb3a5" stroke-width="1" style="animation: slideIn 0.5s ease-out forwards; animation-delay: 1s; opacity: 0;"/>
    <text x="132" y="98" text-anchor="middle" class="label" font-size="12">Join (⋈)</text>
    
    <rect x="10" y="112" width="75" height="24" rx="4" fill="#fff" stroke="#7fb3a5" stroke-width="1" style="animation: slideIn 0.5s ease-out forwards; animation-delay: 1.1s; opacity: 0;"/>
    <text x="47" y="128" text-anchor="middle" class="label" font-size="12">Cartesian (×)</text>
    
    <rect x="95" y="112" width="75" height="24" rx="4" fill="#fff" stroke="#7fb3a5" stroke-width="1" style="animation: slideIn 0.5s ease-out forwards; animation-delay: 1.2s; opacity: 0;"/>
    <text x="132" y="128" text-anchor="middle" class="label" font-size="12">Rename (ρ)</text>
  </g>
  
  <!-- Right Column: Relational Calculus -->
  <g transform="translate(225, 90)" data-narration="Relational Calculus - Declarative specification of WHAT to retrieve">
    <rect class="op-box" width="180" height="140" fill="url(#calculusGrad)" stroke="#9b8abf" stroke-width="2" style="animation: slideIn 0.6s ease-out forwards; animation-delay: 0.5s; opacity: 0;"/>
    <text x="90" y="22" text-anchor="middle" class="section-title" style="animation: fadeIn 0.6s ease-out forwards; animation-delay: 0.6s; opacity: 0;">Relational Calculus</text>
    <text x="90" y="42" text-anchor="middle" class="detail" style="animation: fadeIn 0.6s ease-out forwards; animation-delay: 0.65s; opacity: 0;">Declarative • WHAT</text>
    
    <!-- TRC Box -->
    <rect x="10" y="52" width="160" height="32" rx="4" fill="#fff" stroke="#9b8abf" stroke-width="1" style="animation: slideIn 0.5s ease-out forwards; animation-delay: 0.8s; opacity: 0;"/>
    <text x="90" y="66" text-anchor="middle" class="label" font-size="12" font-weight="bold">Tuple RC (TRC)</text>
    <text x="90" y="80" text-anchor="middle" class="detail" font-size="10">{ t | P(t) }</text>
    
    <!-- DRC Box -->
    <rect x="10" y="90" width="160" height="32" rx="4" fill="#fff" stroke="#9b8abf" stroke-width="1" style="animation: slideIn 0.5s ease-out forwards; animation-delay: 1s; opacity: 0;"/>
    <text x="90" y="104" text-anchor="middle" class="label" font-size="12" font-weight="bold">Domain RC (DRC)</text>
    <text x="90" y="118" text-anchor="middle" class="detail" font-size="10">{ x1,x2... | P(x1,x2...) }</text>
  </g>
  
  <!-- Center Arrow -->
  <g transform="translate(195, 155)" data-narration="Equivalence - Safe calculus expressions are equivalent to algebra">
    <path d="M15,0 L15,30" stroke="#e74c3c" stroke-width="2" class="anim-arrow" fill="none"/>
    <polygon points="15,35 10,25 20,25" fill="#e74c3c" class="anim-pulse" style="animation-delay: 1.5s;"/>
    <text x="15" y="48" text-anchor="middle" class="detail" font-size="10">Equivalence</text>
  </g>
  
  <!-- Example Query Section -->
  <g transform="translate(15, 250)" data-narration="Example - Selection operation filtering students by CGPA > 8.5">
    <rect class="op-box" width="390" height="130" fill="#fef9e7" stroke="#f9e79f" stroke-width="2" style="animation: slideIn 0.6s ease-out forwards; animation-delay: 1.3s; opacity: 0;"/>
    <text x="195" y="18" text-anchor="middle" class="section-title" font-size="14" style="animation: fadeIn 0.6s ease-out forwards; animation-delay: 1.4s; opacity: 0;">Example: Selection Operation (σ)</text>
    <text x="195" y="36" text-anchor="middle" class="detail" font-size="11" style="animation: fadeIn 0.6s ease-out forwards; animation-delay: 1.45s; opacity: 0;">Find students with CGPA > 8.5 in CSE department</text>
    
    <!-- Input Table -->
    <g transform="translate(20, 48)" style="animation: slideIn 0.5s ease-out forwards; animation-delay: 1.6s; opacity: 0;">
      <text x="45" y="0" text-anchor="middle" class="label" font-size="11" font-weight="bold">Input: Students</text>
      <rect x="0" y="5" width="90" height="60" fill="#fff" stroke="#bdc3c7" stroke-width="1"/>
      <line x1="0" y1="20" x2="90" y2="20" stroke="#bdc3c7" stroke-width="1"/>
      <text x="45" y="16" text-anchor="middle" class="detail" font-size="9">Name | Dept | CGPA</text>
      <text x="45" y="33" text-anchor="middle" class="detail" font-size="9">Alice  | CSE  | 9.0</text>
      <text x="45" y="46" text-anchor="middle" class="detail" font-size="9">Bob    | CSE  | 7.5</text>
      <text x="45" y="59" text-anchor="middle" class="detail" font-size="9">Carol  | CSE  | 8.8</text>
    </g>
    
    <!-- Arrow -->
    <g transform="translate(125, 78)" style="animation: fadeIn 0.6s ease-out forwards; animation-delay: 1.8s; opacity: 0;">
      <text x="15" y="-8" text-anchor="middle" class="label" font-size="12">σ{CGPA>8.5}</text>
      <path d="M0,0 L30,0" stroke="#3498db" stroke-width="2" class="anim-arrow"/>
      <polygon points="30,0 22,-5 22,5" fill="#3498db"/>
    </g>
    
    <!-- Output Table -->
    <g transform="translate(170, 48)" style="animation: slideIn 0.5s ease-out forwards; animation-delay: 1.9s; opacity: 0;">
      <text x="45" y="0" text-anchor="middle" class="label" font-size="11" font-weight="bold">Result</text>
      <rect x="0" y="5" width="90" height="35" fill="#d5f5e3" stroke="#82e0aa" stroke-width="1"/>
      <line x1="0" y1="20" x2="90" y2="20" stroke="#82e0aa" stroke-width="1"/>
      <text x="45" y="16" text-anchor="middle" class="detail" font-size="9">Name | Dept | CGPA</text>
      <text x="45" y="33" text-anchor="middle" class="detail" font-size="9">Alice  | CSE  | 9.0</text>
    </g>
    
    <!-- Formula -->
    <g transform="translate(280, 50)" style="animation: slideIn 0.5s ease-out forwards; animation-delay: 2s; opacity: 0;">
      <rect x="0" y="0" width="110" height="55" rx="4" fill="#ebf5fb" stroke="#aed6f1" stroke-width="1"/>
      <text x="55" y="18" text-anchor="middle" class="label" font-size="11" font-weight="bold">Algebra Query:</text>
      <text x="55" y="35" text-anchor="middle" class="detail" font-size="9">π_name(σ_dept='CSE'</text>
      <text x="55" y="48" text-anchor="middle" class="detail" font-size="9">∧ CGPA>8.5(Students))</text>
    </g>
  </g>
  
  <!-- Bottom Legend -->
  <g transform="translate(130, 385)" data-narration="Key insight - Algebra is procedural, Calculus is declarative but equivalent for safe expressions">
    <text x="80" y="0" text-anchor="middle" class="detail" font-size="10" font-style="italic">Algebra: HOW to retrieve • Calculus: WHAT to retrieve</text>
  </g>
</svg>