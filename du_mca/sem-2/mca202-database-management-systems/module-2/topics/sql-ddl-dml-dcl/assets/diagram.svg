<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="sql-ddl-dml-dcl" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5e6d3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ddlGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a5a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dmlGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3dbdb5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dclGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sqlGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .sql-box { animation: slideInDown 0.6s ease-out; }
    .ddl-section { animation: slideInLeft 0.7s ease-out 0.2s both; }
    .dml-section { animation: slideInDown 0.7s ease-out 0.4s both; }
    .dcl-section { animation: slideInRight 0.7s ease-out 0.6s both; }
    .ddl-box { animation: pulse 2s ease-in-out infinite; }
    .dml-box { animation: pulse 2s ease-in-out infinite 0.3s; }
    .dcl-box { animation: pulse 2s ease-in-out infinite 0.6s; }
    .arrow { animation: fadeIn 0.5s ease-out 0.8s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50" class="title">SQL: DDL, DML, DCL</text>
  <text x="210" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">Database Command Categories</text>
  
  <!-- SQL Root Box -->
  <g class="sql-box" data-narration="SQL (Structured Query Language) is the foundation of database management, divided into three main sublanguages">
    <rect x="160" y="70" width="100" height="40" rx="8" fill="url(#sqlGradient)" filter="url(#shadow)"/>
    <text x="210" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">SQL</text>
  </g>
  
  <!-- Arrows from SQL to categories -->
  <g class="arrow">
    <line x1="180" y1="110" x2="100" y2="160" stroke="#bdc3c7" stroke-width="2"/>
    <polygon points="95,155 100,170 110,158" fill="#bdc3c7"/>
  </g>
  <g class="arrow">
    <line x1="210" y1="110" x2="210" y2="160" stroke="#bdc3c7" stroke-width="2"/>
    <polygon points="205,165 210,180 215,165" fill="#bdc3c7"/>
  </g>
  <g class="arrow">
    <line x1="240" y1="110" x2="320" y2="160" stroke="#bdc3c7" stroke-width="2"/>
    <polygon points="315,155 310,170 320,158" fill="#bdc3c7"/>
  </g>
  
  <!-- DDL Section -->
  <g class="ddl-section" data-narration="DDL (Data Definition Language) handles schema structure - CREATE, ALTER, DROP commands">
    <rect x="30" y="170" width="140" height="100" rx="10" fill="url(#ddlGradient)" filter="url(#shadow)"/>
    <text x="100" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">DDL</text>
    <text x="100" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Data Definition</text>
    <text x="100" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Language</text>
    <rect x="40" y="245" width="120" height="18" rx="4" fill="rgba(255,255,255,0.25)"/>
    <text x="100" y="257" text-anchor="middle" font-family="monospace" font-size="9" fill="white">CREATE, ALTER, DROP</text>
  </g>
  
  <!-- DML Section -->
  <g class="dml-section" data-narration="DML (Data Manipulation Language) handles data operations - INSERT, UPDATE, DELETE, SELECT">
    <rect x="140" y="170" width="140" height="100" rx="10" fill="url(#dmlGradient)" filter="url(#shadow)"/>
    <text x="210" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">DML</text>
    <text x="210" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Data Manipulation</text>
    <text x="210" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Language</text>
    <rect x="150" y="245" width="120" height="18" rx="4" fill="rgba(255,255,255,0.25)"/>
    <text x="210" y="257" text-anchor="middle" font-family="monospace" font-size="9" fill="white">INSERT, UPDATE, DELETE</text>
  </g>
  
  <!-- DCL Section -->
  <g class="dcl-section" data-narration="DCL (Data Control Language) manages security - GRANT and REVOKE commands control access">
    <rect x="250" y="170" width="140" height="100" rx="10" fill="url(#dclGradient)" filter="url(#shadow)"/>
    <text x="320" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">DCL</text>
    <text x="320" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Data Control</text>
    <text x="320" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Language</text>
    <rect x="260" y="245" width="120" height="18" rx="4" fill="rgba(255,255,255,0.25)"/>
    <text x="320" y="257" text-anchor="middle" font-family="monospace" font-size="9" fill="white">GRANT, REVOKE</text>
  </g>
  
  <!-- Command Examples Box -->
  <g data-narration="Detailed command examples showing practical syntax for each category">
    <rect x="30" y="290" width="360" height="95" rx="8" fill="white" filter="url(#shadow)" stroke="#ecf0f1" stroke-width="2"/>
    <text x="210" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Command Examples</text>
    
    <!-- DDL Examples -->
    <text x="50" y="332" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c" font-weight="bold">DDL:</text>
    <text x="85" y="332" font-family="monospace" font-size="9" fill="#34495e">CREATE TABLE emp (id INT PRIMARY KEY);</text>
    <text x="50" y="347" font-family="monospace" font-size="9" fill="#34495e">ALTER TABLE emp ADD name VARCHAR(50);</text>
    <text x="50" y="362" font-family="monospace" font-size="9" fill="#34495e">DROP TABLE emp;</text>
    
    <!-- DML Examples -->
    <text x="50" y="377" font-family="Arial, sans-serif" font-size="10" fill="#16a085" font-weight="bold">DML:</text>
    <text x="85" y="377" font-family="monospace" font-size="9" fill="#34495e">INSERT INTO emp VALUES(1,'John');</text>
    
    <!-- DCL Examples -->
    <text x="210" y="332" font-family="Arial, sans-serif" font-size="10" fill="#8e44ad" font-weight="bold">DCL:</text>
    <text x="245" y="332" font-family="monospace" font-size="9" fill="#34495e">GRANT SELECT ON emp TO user1;</text>
    <text x="245" y="347" font-family="monospace" font-size="9" fill="#34495e">REVOKE DELETE ON emp FROM user1;</text>
    
    <!-- SELECT Example -->
    <text x="210" y="362" font-family="Arial, sans-serif" font-size="10" fill="#16a085" font-weight="bold">Query:</text>
    <text x="250" y="362" font-family="monospace" font-size="9" fill="#34495e">SELECT * FROM emp WHERE id=1;</text>
  </g>
  
  <!-- Decorative corner elements -->
  <circle cx="30" cy="30" r="15" fill="#3498db" opacity="0.1"/>
  <circle cx="390" cy="370" r="20" fill="#9b59b6" opacity="0.1"/>
  <circle cx="390" cy="30" r="12" fill="#e74c3c" opacity="0.1"/>
  <circle cx="30" cy="370" r="18" fill="#16a085" opacity="0.1"/>
</svg>