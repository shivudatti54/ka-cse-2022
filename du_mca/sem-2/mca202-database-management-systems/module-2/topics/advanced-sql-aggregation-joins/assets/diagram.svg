<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="advanced-sql-aggregation-joins" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e6f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f4f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leftCircleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#4a90b8;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="rightCircleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c492b5;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#9b6a8c;stop-opacity:0.7" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <clipPath id="innerClip">
      <ellipse cx="210" cy="175" rx="55" ry="70"/>
    </clipPath>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .subtitle { animation: fadeIn 1s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .left-circle { animation: slideInLeft 0.8s ease-out forwards; }
    .right-circle { animation: slideInRight 0.8s ease-out forwards; }
    .inner-region { animation: fadeIn 1s ease-out forwards; animation-delay: 0.5s; opacity: 0; }
    .label-box { animation: slideUp 0.6s ease-out forwards; }
    .label-box:nth-child(1) { animation-delay: 0.8s; }
    .label-box:nth-child(2) { animation-delay: 0.9s; }
    .label-box:nth-child(3) { animation-delay: 1.0s; }
    .label-box:nth-child(4) { animation-delay: 1.1s; }
    .concept-box { animation: fadeIn 0.8s ease-out forwards; }
    .concept-box:nth-child(1) { animation-delay: 1.2s; opacity: 0; }
    .concept-box:nth-child(2) { animation-delay: 1.3s; opacity: 0; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title Section -->
  <text x="210" y="30" text-anchor="middle" class="title" font-size="20" font-weight="bold" fill="#2c5282">Advanced SQL</text>
  <text x="210" y="52" text-anchor="middle" class="subtitle" font-size="16" font-weight="bold" fill="#553c5e">Aggregation &amp; Joins</text>
  
  <!-- Venn Diagram Section -->
  <g data-narration="Venn diagram showing join types between two tables">
    <!-- Left Circle (Left Table) -->
    <ellipse cx="155" cy="175" rx="70" ry="85" fill="url(#leftCircleGrad)" stroke="#4a90b8" stroke-width="2" class="left-circle" filter="url(#shadow)"/>
    <text x="155" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff" class="left-circle">LEFT</text>
    <text x="155" y="192" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff" class="left-circle">TABLE</text>
    
    <!-- Right Circle (Right Table) -->
    <ellipse cx="265" cy="175" rx="70" ry="85" fill="url(#rightCircleGrad)" stroke="#9b6a8c" stroke-width="2" class="right-circle" filter="url(#shadow)"/>
    <text x="265" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff" class="right-circle">RIGHT</text>
    <text x="265" y="192" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff" class="right-circle">TABLE</text>
    
    <!-- Inner Overlap - INNER JOIN -->
    <path d="M 210 110 A 55 70 0 0 1 210 240 A 55 70 0 0 1 210 110" fill="#7dd3a0" stroke="#4caf50" stroke-width="2" class="inner-region" filter="url(#shadow)"/>
    <text x="210" y="168" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20" class="inner-region pulse-element">INNER</text>
    <text x="210" y="183" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20" class="inner-region">JOIN</text>
  </g>
  
  <!-- Join Type Labels -->
  <g data-narration="LEFT JOIN returns all left table rows">
    <rect x="10" y="285" width="95" height="28" rx="5" fill="#7eb8da" filter="url(#shadow)" class="label-box"/>
    <text x="57" y="303" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">LEFT JOIN</text>
  </g>
  
  <g data-narration="RIGHT JOIN returns all right table rows">
    <rect x="315" y="285" width="95" height="28" rx="5" fill="#c492b5" filter="url(#shadow)" class="label-box"/>
    <text x="362" y="303" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">RIGHT JOIN</text>
  </g>
  
  <g data-narration="FULL OUTER JOIN returns all matching and non-matching rows">
    <rect x="162" y="310" width="96" height="28" rx="5" fill="#9bdbcb" filter="url(#shadow)" class="label-box"/>
    <text x="210" y="328" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">FULL JOIN</text>
  </g>
  
  <g data-narration="INNER JOIN returns only matching rows from both tables">
    <rect x="155" y="248" width="110" height="22" rx="4" fill="#4caf50" filter="url(#shadow)" class="label-box"/>
    <text x="210" y="264" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Matches Only</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g data-narration="Aggregation functions include SUM, AVG, COUNT">
    <rect x="15" y="355" width="185" height="35" rx="4" fill="#fff" stroke="#7eb8da" stroke-width="1" class="concept-box"/>
    <text x="22" y="368" font-size="10" fill="#2c5282" font-weight="bold">Aggregation:</text>
    <text x="22" y="382" font-size="9" fill="#553c5e">SUM | AVG | COUNT | GROUP BY</text>
  </g>
  
  <g data-narration="Window functions enable row-level calculations">
    <rect x="220" y="355" width="185" height="35" rx="4" fill="#fff" stroke="#c492b5" stroke-width="1" class="concept-box"/>
    <text x="227" y="368" font-size="10" fill="#553c5e" font-weight="bold">Window Funcs:</text>
    <text x="227" y="382" font-size="9" fill="#553c5e">OVER(), PARTITION BY, RANK()</text>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="40" cy="350" r="3" fill="#7eb8da"/>
  <circle cx="380" cy="350" r="3" fill="#c492b5"/>
  <circle cx="40" cy="50" r="3" fill="#7eb8da"/>
  <circle cx="380" cy="50" r="3" fill="#c492b5"/>
</svg>