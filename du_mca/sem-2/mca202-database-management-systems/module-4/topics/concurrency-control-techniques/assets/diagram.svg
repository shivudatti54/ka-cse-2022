<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="concurrency-control-techniques">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lockGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a90b8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="timestampGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9dd6b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6bc48a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mvccGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b57ba6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="deadlockGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c987;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a665;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes growWidth {
      from { width: 0; }
      to { width: 100px; }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; font-family: 'Segoe UI', Arial, sans-serif; font-weight: bold; }
    .section { animation: slideUp 0.6s ease-out both; }
    .section-1 { animation-delay: 0.1s; }
    .section-2 { animation-delay: 0.2s; }
    .section-3 { animation-delay: 0.3s; }
    .section-4 { animation-delay: 0.4s; }
    .box { animation: fadeIn 0.5s ease-out both; }
    .pulse-item { animation: pulse 2s infinite; transform-origin: center; }
    .growing-bar { animation: growWidth 1.5s ease-out forwards; }
    .shrinking-bar { animation: growWidth 1.5s ease-out 1.5s forwards; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .label { font-size: 14px; font-weight: 600; }
    .detail { font-size: 12px; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <text x="210" y="28" text-anchor="middle" font-size="20" fill="#2c5f7c" class="title">Concurrency Control Techniques</text>
  
  <!-- Lock-Based Section -->
  <g class="section section-1" data-narration="Lock-Based Protocols use Shared (S) and Exclusive (X) locks to manage transaction access to data items">
    <rect x="15" y="45" width="95" height="72" rx="8" fill="url(#lockGradient)" />
    <text x="62" y="62" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Lock-Based</text>
    <text x="62" y="78" text-anchor="middle" font-size="10" fill="#fff">Protocols</text>
    <text x="62" y="95" text-anchor="middle" font-size="9" fill="#e8f4f8">S-Lock / X-Lock</text>
    <text x="62" y="108" text-anchor="middle" font-size="9" fill="#e8f4f8">2PL Protocol</text>
  </g>
  
  <!-- Timestamp Section -->
  <g class="section section-2" data-narration="Timestamp Ordering assigns unique timestamps to transactions to ensure serializability">
    <rect x="120" y="45" width="95" height="72" rx="8" fill="url(#timestampGradient)" />
    <text x="167" y="62" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Timestamp</text>
    <text x="167" y="78" text-anchor="middle" font-size="10" fill="#fff">Ordering</text>
    <text x="167" y="95" text-anchor="middle" font-size="9" fill="#e8f4f8">TS-based</text>
    <text x="167" y="108" text-anchor="middle" font-size="9" fill="#e8f4f8">Serialization</text>
  </g>
  
  <!-- MVCC Section -->
  <g class="section section-3" data-narration="Multiversion Concurrency Control maintains multiple versions of data for snapshot isolation">
    <rect x="225" y="45" width="95" height="72" rx="8" fill="url(#mvccGradient)" />
    <text x="272" y="62" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">MVCC</text>
    <text x="272" y="78" text-anchor="middle" font-size="10" fill="#fff">Multiversion</text>
    <text x="272" y="95" text-anchor="middle" font-size="9" fill="#e8f4f8">Snapshots</text>
    <text x="272" y="108" text-anchor="middle" font-size="9" fill="#e8f4f8">PostgreSQL</text>
  </g>
  
  <!-- Deadlock Section -->
  <g class="section section-4" data-narration="Deadlock Handling includes prevention schemes (Wait-Die, Wound-Wait) and detection via wait-for graphs">
    <rect x="325" y="45" width="80" height="72" rx="8" fill="url(#deadlockGradient)" />
    <text x="365" y="62" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Deadlock</text>
    <text x="365" y="78" text-anchor="middle" font-size="10" fill="#fff">Handling</text>
    <text x="365" y="95" text-anchor="middle" font-size="9" fill="#5c4a2a">Prevention</text>
    <text x="365" y="108" text-anchor="middle" font-size="9" fill="#5c4a2a">Detection</text>
  </g>
  
  <!-- 2PL Timeline Diagram -->
  <g data-narration="Two-Phase Locking Timeline showing growing phase (lock acquisition) followed by shrinking phase (lock release)">
    <rect x="15" y="130" width="390" height="120" rx="8" fill="#fff" stroke="#ccc" stroke-width="1" />
    <text x="210" y="150" text-anchor="middle" font-size="14" fill="#2c5f7c" font-weight="bold">Two-Phase Locking (2PL) Timeline</text>
    
    <!-- Timeline axis -->
    <line x1="40" y1="220" x2="380" y2="220" stroke="#888" stroke-width="2" />
    <polygon points="380,220 370,215 370,225" fill="#888" />
    
    <!-- Growing Phase -->
    <text x="40" y="165" font-size="11" fill="#4a90b8" font-weight="bold">Growing Phase</text>
    <text x="40" y="178" font-size="10" fill="#666">(Lock Acquisition)</text>
    <rect x="40" y="185" width="0" height="25" fill="#7eb8da" rx="3" class="growing-bar">
      <animate attributeName="width" from="0" to="130" dur="1.5s" fill="freeze" />
    </rect>
    <text x="175" y="200" font-size="9" fill="#4a90b8">Lock Point</text>
    
    <!-- Commit Point -->
    <line x1="200" y1="160" x2="200" y2="245" stroke="#d4a665" stroke-width="2" stroke-dasharray="5,3" />
    <text x="200" y="248" text-anchor="middle" font-size="9" fill="#8b6914" font-weight="bold">Commit Point</text>
    <circle cx="200" cy="220" r="5" fill="#d4a665" class="pulse-item" />
    
    <!-- Shrinking Phase -->
    <text x="230" y="165" font-size="11" fill="#6bc48a" font-weight="bold">Shrinking Phase</text>
    <text x="230" y="178" font-size="10" fill="#666">(Lock Release)</text>
    <rect x="230" y="185" width="0" height="25" fill="#9dd6b0" rx="3">
      <animate attributeName="width" from="0" to="130" dur="1.5s" begin="1.5s" fill="freeze" />
    </rect>
    
    <!-- Time labels -->
    <text x="40" y="235" font-size="8" fill="#666">T1</text>
    <text x="120" y="235" font-size="8" fill="#666">T2</text>
    <text x="200" y="235" font-size="8" fill="#666">T3</text>
    <text x="280" y="235" font-size="8" fill="#666">T4</text>
    <text x="360" y="235" font-size="8" fill="#666">T5</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g data-narration="Key ACID properties ensure transaction reliability in database systems">
    <rect x="15" y="260" width="190" height="130" rx="8" fill="#fff" stroke="#7eb8da" stroke-width="2" />
    <text x="110" y="280" text-anchor="middle" font-size="13" fill="#2c5f7c" font-weight="bold">ACID Properties</text>
    
    <rect x="25" y="290" width="20" height="18" rx="3" fill="#7eb8da" />
    <text x="32" y="303" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">A</text>
    <text x="50" y="303" font-size="10" fill="#333">Atomicity - All or nothing</text>
    
    <rect x="25" y="312" width="20" height="18" rx="3" fill="#9dd6b0" />
    <text x="32" y="325" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">C</text>
    <text x="50" y="325" font-size="10" fill="#333">Consistency - Valid state</text>
    
    <rect x="25" y="334" width="20" height="18" rx="3" fill="#d4a5c9" />
    <text x="32" y="347" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">I</text>
    <text x="50" y="347" font-size="10" fill="#333">Isolation - Concurrent safe</text>
    
    <rect x="25" y="356" width="20" height="18" rx="3" fill="#f0c987" />
    <text x="32" y="369" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">D</text>
    <text x="50" y="369" font-size="10" fill="#333">Durability - Persisted</text>
  </g>
  
  <!-- Lock Types Box -->
  <g data-narration="Shared locks allow read operations while exclusive locks permit write operations">
    <rect x="215" y="260" width="190" height="130" rx="8" fill="#fff" stroke="#4a90b8" stroke-width="2" />
    <text x="310" y="280" text-anchor="middle" font-size="13" fill="#2c5f7c" font-weight="bold">Lock Types</text>
    
    <!-- Shared Lock -->
    <rect x="230" y="292" width="160" height="38" rx="5" fill="#e8f4f8" stroke="#7eb8da" />
    <text x="250" y="310" font-size="11" fill="#4a90b8" font-weight="bold">S-Lock (Shared)</text>
    <text x="250" y="323" font-size="9" fill="#666">Read-only access</text>
    <text x="370" y="310" font-size="9" fill="#7eb8da">Multiple allowed</text>
    
    <!-- Exclusive Lock -->
    <rect x="230" y="335" width="160" height="38" rx="5" fill="#fce8e8" stroke="#d47a7a" />
    <text x="250" y="353" font-size="11" fill="#c44" font-weight="bold">X-Lock (Exclusive)</text>
    <text x="250" y="366" font-size="9" fill="#666">Write access</text>
    <text x="370" y="353" font-size="9" fill="#d47a7a">Only one allowed</text>
  </g>
  
  <!-- Arrow indicators -->
  <g>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#888" />
      </marker>
    </defs>
    <path d="M110 117 Q 210 125, 310 117" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />
  </g>
  
  <!-- Bottom info -->
  <text x="210" y="395" text-anchor="middle" font-size="10" fill="#666">DU MCA - Database Management Systems</text>
</svg>