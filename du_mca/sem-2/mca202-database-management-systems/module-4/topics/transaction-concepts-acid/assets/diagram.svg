<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="transaction-concepts-acid">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="atomicityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="consistencyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="isolationGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="durabilityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8bbd9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box-atomicity { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box-consistency { animation: slideInRight 0.6s ease-out 0.3s forwards; opacity: 0; }
    .box-isolation { animation: slideInLeft 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box-durability { animation: slideInRight 0.6s ease-out 0.5s forwards; opacity: 0; }
    .connector { animation: drawLine 1s ease-out 0.8s forwards; stroke-dasharray: 100; stroke-dashoffset: 100; }
    .center-icon { animation: pulse 2s ease-in-out infinite 1.2s; }
    .subtitle { animation: fadeIn 0.6s ease-out 0.5s forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">ACID Properties</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d6d7e" class="subtitle">Transaction Concepts in Database Systems</text>
  
  <!-- Center Database Icon -->
  <g class="center-icon" transform="translate(210, 200)">
    <ellipse cx="0" cy="0" rx="28" ry="12" fill="#34495e" opacity="0.2"/>
    <rect x="-20" y="-25" width="40" height="50" rx="4" fill="#3498db" opacity="0.9"/>
    <rect x="-15" y="-20" width="30" height="3" rx="1" fill="white" opacity="0.8"/>
    <rect x="-15" y="-12" width="30" height="3" rx="1" fill="white" opacity="0.8"/>
    <rect x="-15" y="-4" width="30" height="3" rx="1" fill="white" opacity="0.8"/>
    <rect x="-15" y="4" width="30" height="3" rx="1" fill="white" opacity="0.8"/>
    <rect x="-15" y="12" width="30" height="3" rx="1" fill="white" opacity="0.8"/>
    <text x="0" y="35" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50" font-weight="bold">DATABASE</text>
  </g>
  
  <!-- Atomicity Box (Top Left) -->
  <g class="box-atomicity" data-narration="Atomicity ensures all-or-nothing execution. Either ALL operations succeed or NONE are applied.">
    <rect x="15" y="70" width="95" height="85" rx="8" fill="url(#atomicityGrad)" filter="url(#shadow)"/>
    <circle cx="62" cy="95" r="16" fill="#1976d2" opacity="0.3"/>
    <circle cx="62" cy="95" r="10" fill="none" stroke="#1565c0" stroke-width="2" stroke-dasharray="4,2"/>
    <circle cx="62" cy="95" r="4" fill="#1565c0"/>
    <text x="62" y="125" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">Atomicity</text>
    <text x="62" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#546e7a">All or Nothing</text>
    <text x="62" y="152" text-anchor="middle" font-family="Arial" font-size="8" fill="#78909c">UNDO logs</text>
  </g>
  
  <!-- Consistency Box (Top Right) -->
  <g class="box-consistency" data-narration="Consistency maintains database invariants. Transactions must move the database from one valid state to another.">
    <rect x="310" y="70" width="95" height="85" rx="8" fill="url(#consistencyGrad)" filter="url(#shadow)"/>
    <circle cx="357" cy="95" r="16" fill="#388e3c" opacity="0.3"/>
    <path d="M350 98 L355 105 L368 90" fill="none" stroke="#2e7d32" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="357" y="125" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2e7d32">Consistency</text>
    <text x="357" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#546e7a">Valid States</text>
    <text x="357" y="152" text-anchor="middle" font-family="Arial" font-size="8" fill="#78909c">Constraints</text>
  </g>
  
  <!-- Isolation Box (Bottom Left) -->
  <g class="box-isolation" data-narration="Isolation ensures concurrent transactions don't interfere. Uses locking mechanisms or MVCC.">
    <rect x="15" y="265" width="95" height="85" rx="8" fill="url(#isolationGrad)" filter="url(#shadow)"/>
    <circle cx="62" cy="290" r="16" fill="#f57c00" opacity="0.3"/>
    <rect x="52" y="283" width="8" height="14" fill="#ef6c00" rx="1"/>
    <rect x="64" y="283" width="8" height="14" fill="#ef6c00" rx="1"/>
    <rect x="52" y="296" width="20" height="2" fill="#ef6c00"/>
    <text x="62" y="320" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#ef6c00">Isolation</text>
    <text x="62" y="335" text-anchor="middle" font-family="Arial" font-size="9" fill="#546e7a">No Interference</text>
    <text x="62" y="347" text-anchor="middle" font-family="Arial" font-size="8" fill="#78909c">Locking/MVCC</text>
  </g>
  
  <!-- Durability Box (Bottom Right) -->
  <g class="box-durability" data-narration="Durability guarantees committed changes survive failures. Uses write-ahead logging and persistent storage.">
    <rect x="310" y="265" width="95" height="85" rx="8" fill="url(#durabilityGrad)" filter="url(#shadow)"/>
    <circle cx="357" cy="290" r="16" fill="#c2185b" opacity="0.3"/>
    <rect x="350" y="282" width="14" height="18" fill="#c62828" rx="2"/>
    <circle cx="357" cy="295" r="3" fill="#ffeb3b"/>
    <path d="M352 288 L357 293 L362 286" fill="none" stroke="#ffeb3b" stroke-width="1.5"/>
    <text x="357" y="320" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#c62828">Durability</text>
    <text x="357" y="335" text-anchor="middle" font-family="Arial" font-size="9" fill="#546e7a">Survives Failures</text>
    <text x="357" y="347" text-anchor="middle" font-family="Arial" font-size="8" fill="#78909c">WAL + Disk</text>
  </g>
  
  <!-- Connectors -->
  <g class="connector">
    <!-- Top left to center -->
    <line x1="110" y1="112" x2="175" y2="175" stroke="#90a4ae" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="178,170 185,180 170,182" fill="#90a4ae"/>
    <!-- Top right to center -->
    <line x1="310" y1="112" x2="245" y2="175" stroke="#90a4ae" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="242,170 235,180 250,182" fill="#90a4ae"/>
    <!-- Bottom left to center -->
    <line x1="110" y1="305" x2="175" y2="225" stroke="#90a4ae" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="178,230 185,220 170,218" fill="#90a4ae"/>
    <!-- Bottom right to center -->
    <line x1="310" y1="305" x2="245" y2="225" stroke="#90a4ae" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="242,230 235,220 250,218" fill="#90a4ae"/>
  </g>
  
  <!-- Transaction States Flow -->
  <g data-narration="Transaction flows through states: Active → Partially Committed → Committed or Failed → Aborted">
    <text x="210" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#78909c">Transaction States</text>
    <g transform="translate(145, 378)">
      <rect x="0" y="0" width="18" height="12" rx="2" fill="#b3e5fc" stroke="#0288d1" stroke-width="0.5"/>
      <text x="9" y="9" text-anchor="middle" font-family="Arial" font-size="6" fill="#01579b">A</text>
      <line x1="18" y1="6" x2="27" y2="6" stroke="#78909c" stroke-width="1"/>
      <rect x="27" y="0" width="18" height="12" rx="2" fill="#fff9c4" stroke="#fbc02d" stroke-width="0.5"/>
      <text x="36" y="9" text-anchor="middle" font-family="Arial" font-size="6" fill="#f57f17">PC</text>
      <line x1="45" y1="6" x2="54" y2="6" stroke="#78909c" stroke-width="1"/>
      <rect x="54" y="0" width="18" height="12" rx="2" fill="#c8e6c9" stroke="#388e3c" stroke-width="0.5"/>
      <text x="63" y="9" text-anchor="middle" font-family="Arial" font-size="6" fill="#1b5e20">C</text>
    </g>
  </g>
  
  <!-- Legend/Key indicators -->
  <g data-narration="ACID properties work together to ensure reliable database transactions">
    <text x="210" y="395" text-anchor="middle" font-family="Arial" font-size="8" fill="#90a4ae" font-style="italic">Four pillars of reliable transaction processing</text>
  </g>
</svg>