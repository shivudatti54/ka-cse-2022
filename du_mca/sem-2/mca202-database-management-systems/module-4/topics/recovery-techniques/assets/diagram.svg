<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="recovery-techniques">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phaseGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phaseGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cceeff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phaseGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff0f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0e9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes crashBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .phase-box { animation: slideInUp 0.6s ease-out forwards; }
    .phase-1 { animation-delay: 0.2s; }
    .phase-2 { animation-delay: 0.4s; }
    .phase-3 { animation-delay: 0.6s; }
    .timeline { animation: fadeIn 1s ease-out forwards; animation-delay: 0.3s; opacity: 0; }
    .crash-marker { animation: crashBlink 1.5s ease-in-out infinite; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .arrow { animation: fadeIn 0.5s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5282" class="title">ARIES Recovery Phases</text>
  <text x="210" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4a5568">Log-Based Recovery Algorithm</text>
  
  <!-- Timeline -->
  <g class="timeline">
    <line x1="40" y1="330" x2="380" y2="330" stroke="#a0aec0" stroke-width="2"/>
    <polygon points="380,325 380,335 390,330" fill="#a0aec0"/>
    
    <!-- LSN markers -->
    <circle cx="80" cy="330" r="4" fill="#4299e1"/>
    <text x="80" y="350" text-anchor="middle" font-size="10" fill="#2d3748">LSN 100</text>
    
    <circle cx="150" cy="330" r="4" fill="#4299e1"/>
    <text x="150" y="350" text-anchor="middle" font-size="10" fill="#2d3748">LSN 200</text>
    
    <circle cx="220" cy="330" r="4" fill="#48bb78"/>
    <text x="220" y="350" text-anchor="middle" font-size="10" fill="#2d3748">LSN 300</text>
    
    <circle cx="290" cy="330" r="4" fill="#f56565" class="crash-marker"/>
    <text x="290" y="350" text-anchor="middle" font-size="10" fill="#c53030" font-weight="bold">CRASH</text>
    
    <circle cx="350" cy="330" r="4" fill="#9f7aea"/>
    <text x="350" y="350" text-anchor="middle" font-size="10" fill="#2d3748">LSN 400</text>
  </g>
  
  <!-- Phase 1: Analysis -->
  <g class="phase-box phase-1" filter="url(#shadow)">
    <rect x="20" y="65" width="115" height="90" rx="8" fill="url(#phaseGradient1)" stroke="#ed8936" stroke-width="2"/>
    <text x="77" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c05621">ANALYSIS</text>
    <line x1="30" y1="90" x2="125" y2="90" stroke="#ed8936" stroke-width="1"/>
    <text x="77" y="108" text-anchor="middle" font-size="10" fill="#7c2d12">Identify dirty pages</text>
    <text x="77" y="122" text-anchor="middle" font-size="10" fill="#7c2d12">Determine redo start</text>
    <text x="77" y="136" text-anchor="middle" font-size="10" fill="#7c2d12">Find active TXNs</text>
    <circle cx="77" cy="148" r="3" fill="#ed8936"/>
    <text x="77" y="156" text-anchor="middle" font-size="9" fill="#7c2d12">Output: Checkpoint</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow" style="animation-delay: 0.8s; opacity: 0;">
    <path d="M135 95 L155 95" stroke="#4a5568" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Phase 2: Redo -->
  <g class="phase-box phase-2" filter="url(#shadow)">
    <rect x="155" y="65" width="115" height="90" rx="8" fill="url(#phaseGradient2)" stroke="#4299e1" stroke-width="2"/>
    <text x="212" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2b6cb0">REDO</text>
    <line x1="165" y1="90" x2="260" y2="90" stroke="#4299e1" stroke-width="1"/>
    <text x="212" y="108" text-anchor="middle" font-size="10" fill="#1a365d">Scan from Checkpoint</text>
    <text x="212" y="122" text-anchor="middle" font-size="10" fill="#1a365d">Replay all updates</text>
    <text x="212" y="136" text-anchor="middle" font-size="10" fill="#1a365d">LSN ≥ recoveryLSN</text>
    <circle cx="212" cy="148" r="3" fill="#4299e1"/>
    <text x="212" y="156" text-anchor="middle" font-size="9" fill="#1a365d">Output: Dirty pages</text>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow" style="animation-delay: 1s; opacity: 0;">
    <path d="M270 95 L290 95" stroke="#4a5568" stroke-width="2" fill="none"/>
    <polygon points="290,90 300,95 290,100" fill="#4a5568"/>
  </g>
  
  <!-- Phase 3: Undo -->
  <g class="phase-box phase-3" filter="url(#shadow)">
    <rect x="290" y="65" width="115" height="90" rx="8" fill="url(#phaseGradient3)" stroke="#ed64a6" stroke-width="2"/>
    <text x="347" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#9b2c6c">UNDO</text>
    <line x1="300" y1="90" x2="395" y2="90" stroke="#ed64a6" stroke-width="1"/>
    <text x="347" y="108" text-anchor="middle" font-size="10" fill="#702459">Rollback losers</text>
    <text x="347" y="122" text-anchor="middle" font-size="10" fill="#702459">Write CLR entries</text>
    <text x="347" y="136" text-anchor="middle" font-size="10" fill="#702459">Update transaction</text>
    <text x="347" y="150" text-anchor="middle" font-size="10" fill="#702459">table</text>
  </g>
  
  <!-- Dirty Page Table Box -->
  <g class="phase-box" style="animation-delay: 0.7s; opacity: 0;">
    <rect x="20" y="170" width="180" height="75" rx="6" fill="#fff" stroke="#718096" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="110" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d3748" data-narration="Dirty Page Table shows pages modified since last checkpoint">Dirty Page Table</text>
    <line x1="25" y1="198" x2="175" y2="198" stroke="#e2e8f0" stroke-width="1"/>
    <text x="35" y="218" font-size="10" fill="#4a5568">PageID</text>
    <text x="100" y="218" font-size="10" fill="#4a5568">RecLSN</text>
    <text x="155" y="218" font-size="10" fill="#4a5568">State</text>
    <text x="35" y="234" font-size="10" fill="#2d3748">P1</text>
    <text x="100" y="234" font-size="10" fill="#2d3748">100</text>
    <rect x="150" y="226" width="40" height="12" rx="2" fill="#c6f6d5"/>
    <text x="170" y="235" text-anchor="middle" font-size="8" fill="#22543d">clean</text>
    <text x="35" y="250" font-size="10" fill="#2d3748">P2</text>
    <text x="100" y="250" font-size="10" fill="#2d3748">200</text>
    <rect x="150" y="242" width="40" height="12" rx="2" fill="#fed7d7"/>
    <text x="170" y="251" text-anchor="middle" font-size="8" fill="#742a2a">dirty</text>
  </g>
  
  <!-- Transaction Table Box -->
  <g class="phase-box" style="animation-delay: 0.8s; opacity: 0;">
    <rect x="220" y="170" width="180" height="75" rx="6" fill="#fff" stroke="#718096" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="310" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d3748" data-narration="Transaction Table tracks active transactions and their states">Transaction Table</text>
    <line x1="225" y1="198" x2="375" y2="198" stroke="#e2e8f0" stroke-width="1"/>
    <text x="235" y="218" font-size="10" fill="#4a5568">TXN ID</text>
    <text x="295" y="218" font-size="10" fill="#4a5568">Status</text>
    <text x="355" y="218" font-size="10" fill="#4a5568">LastLSN</text>
    <text x="235" y="234" font-size="10" fill="#2d3748">T1</text>
    <text x="295" y="234" font-size="10" fill="#38a169">COMMIT</text>
    <text x="355" y="234" font-size="10" fill="#2d3748">150</text>
    <text x="235" y="250" font-size="10" fill="#2d3748">T2</text>
    <text x="295" y="250" font-size="10" fill="#e53e3e">ACTIVE</text>
    <text x="355" y="250" font-size="10" fill="#2d3748">320</text>
  </g>
  
  <!-- Log Sequence Box -->
  <g class="phase-box" style="animation-delay: 0.9s; opacity: 0;">
    <rect x="20" y="260" width="380" height="55" rx="6" fill="#faf5ff" stroke="#9f7aea" stroke-width="1.5"/>
    <text x="210" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#553c9a">Log Sequence Flow (LSN)</text>
    <rect x="30" y="286" width="50" height="20" rx="3" fill="#e9d8fd" class="pulse-anim"/>
    <text x="55" y="300" text-anchor="middle" font-size="9" fill="#553c9a">BEGIN</text>
    <text x="90" y="298" font-size="12" fill="#805ad5">→</text>
    <rect x="100" y="286" width="50" height="20" rx="3" fill="#b794f4"/>
    <text x="125" y="300" text-anchor="middle" font-size="9" fill="#553c9a">UPDATE</text>
    <text x="160" y="298" font-size="12" fill="#805ad5">→</text>
    <rect x="170" y="286" width="50" height="20" rx="3" fill="#d6bcfa" class="pulse-anim"/>
    <text x="195" y="300" text-anchor="middle" font-size="9" fill="#553c9a">CLR</text>
    <text x="230" y="298" font-size="12" fill="#805ad5">→</text>
    <rect x="240" y="286" width="50" height="20" rx="3" fill="#b794f4"/>
    <text x="265" y="300" text-anchor="middle" font-size="9" fill="#553c9a">COMMIT</text>
    <text x="300" y="298" font-size="12" fill="#805ad5">→</text>
    <rect x="310" y="286" width="50" height="20" rx="3" fill="#e9d8fd"/>
    <text x="335" y="300" text-anchor="middle" font-size="9" fill="#553c9a">CHECKPT</text>
  </g>
  
  <!-- Key Legend -->
  <g class="phase-box" style="animation-delay: 1s; opacity: 0;">
    <rect x="230" y="260" width="170" height="55" rx="6" fill="#fff" stroke="#48bb78" stroke-width="1.5"/>
    <text x="315" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#22543d">Key Concepts</text>
    <circle cx="245" cy="292" r="4" fill="#48bb78"/>
    <text x="255" y="296" font-size="9" fill="#2f855a">Recovery LSN</text>
    <circle cx="245" cy="306" r="4" fill="#f56565"/>
    <text x="255" y="310" font-size="9" fill="#c53030">Crash Point</text>
  </g>
  
  <!-- Recovery Flow Arrows -->
  <g class="arrow" style="animation-delay: 1.2s; opacity: 0;">
    <path d="M77 155 Q77 180 110 185" stroke="#ed8936" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <text x="60" y="175" font-size="8" fill="#c05621">1</text>
  </g>
  <g class="arrow" style="animation-delay: 1.3s; opacity: 0;">
    <path d="M212 155 Q212 180 220 185" stroke="#4299e1" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <text x="205" y="175" font-size="8" fill="#2b6cb0">2</text>
  </g>
  <g class="arrow" style="animation-delay: 1.4s; opacity: 0;">
    <path d="M347 155 Q347 180 310 185" stroke="#ed64a6" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <text x="355" y="175" font-size="8" fill="#9b2c6c">3</text>
  </g>
</svg>