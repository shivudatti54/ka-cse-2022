    <text data-narration="Entity-Relationship Diagram (ERD)" x="10" y="400" font-size="14" font-family="Arial" fill="rgb(73, 109, 137)">A graphical representation of the database schema.</text>
    <text data-narration="Normalization" x="10" y="450" font-size="14" font-family="Arial" fill="rgb(73, 109, 137)">The process of organizing data into tables to minimize data redundancy.</text>
    
