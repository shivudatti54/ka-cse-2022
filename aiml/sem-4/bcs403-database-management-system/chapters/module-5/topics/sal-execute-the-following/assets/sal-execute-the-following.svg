    <text data-narration="Relational Model" x="10" y="350" font-size="14" font-family="Arial" fill="rgb(73, 109, 137)">A model that uses tables and relationships to store data.</text>
    <text data-narration="Object-Oriented Model" x="10" y="400" font-size="14" font-family="Arial" fill="rgb(73, 109, 137)">A model that uses objects and classes to store data.</text>
    
