    <text data-narration="Introduction to DMS" x="10" y="90" font-size="14" font-family="Arial" fill="rgb(73, 109, 137)">Definition: A software that enables the creation, modification, and manipulation of databases.</text>
    <text data-narration="Importance of DMS" x="10" y="150" font-size="14" font-family="Arial" fill="rgb(73, 109, 137)">DMS is essential in today's data-driven world, where organizations rely on data to make informed decisions.</text>
    
