<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; }
      .header { font-size: 18px; font-weight: bold; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
    </style>
  </defs>

  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="NoSQL systems provide flexible scalable alternatives to traditional relational databases for modern big data applications">
    <rect x="50" y="50" width="700" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="3" rx="10"/>
    <text x="400" y="90" text-anchor="middle" class="title" fill="#1976d2">Introduction to NoSQL</text>
    <text x="400" y="115" text-anchor="middle" class="body" fill="#1976d2">Not Only SQL: Modern Database Systems</text>
  </g>

  <!-- Step 1: Why NoSQL -->
  <g id="step1" class="step" data-narration="NoSQL emerged to handle massive scale unstructured data and real-time web applications beyond relational limits">
    <rect x="100" y="160" width="600" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="400" y="185" text-anchor="middle" class="header" fill="#ff9800">Why NoSQL?</text>
    <text x="400" y="210" text-anchor="middle" class="small">Big Data • Flexible Schema • Horizontal Scaling</text>
    <text x="400" y="230" text-anchor="middle" class="small">High Performance • Distributed Systems • Real-time Apps</text>
  </g>

  <!-- Step 2: Document Store -->
  <g id="step2" class="step" data-narration="Document databases store semi-structured data as JSON or XML documents enabling flexible nested schemas">
    <rect x="60" y="260" width="160" height="120" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="140" y="285" text-anchor="middle" class="header" fill="#388e3c">Document</text>
    <text x="140" y="305" text-anchor="middle" class="small">JSON/XML docs</text>
    <text x="140" y="325" text-anchor="middle" class="small">Nested structure</text>
    <text x="140" y="345" text-anchor="middle" class="small">Flexible schema</text>
    <text x="140" y="365" text-anchor="middle" class="small">MongoDB</text>
  </g>

  <!-- Step 3: Key-Value Store -->
  <g id="step3" class="step" data-narration="Key-value stores offer simplest model mapping unique keys to values for fast lookups and caching">
    <rect x="240" y="260" width="160" height="120" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="320" y="285" text-anchor="middle" class="header" fill="#388e3c">Key-Value</text>
    <text x="320" y="305" text-anchor="middle" class="small">Simple pairs</text>
    <text x="320" y="325" text-anchor="middle" class="small">Fast lookups</text>
    <text x="320" y="345" text-anchor="middle" class="small">Caching</text>
    <text x="320" y="365" text-anchor="middle" class="small">Redis, DynamoDB</text>
  </g>

  <!-- Step 4: Column Family -->
  <g id="step4" class="step" data-narration="Column family databases organize data in columns optimized for analytical queries and massive scale">
    <rect x="420" y="260" width="160" height="120" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="500" y="285" text-anchor="middle" class="header" fill="#1976d2">Column Family</text>
    <text x="500" y="305" text-anchor="middle" class="small">Wide columns</text>
    <text x="500" y="325" text-anchor="middle" class="small">Analytical</text>
    <text x="500" y="345" text-anchor="middle" class="small">Massive scale</text>
    <text x="500" y="365" text-anchor="middle" class="small">Cassandra, HBase</text>
  </g>

  <!-- Step 5: Graph Database -->
  <g id="step5" class="step" data-narration="Graph databases store nodes and relationships ideal for connected data like social networks and recommendations">
    <rect x="600" y="260" width="160" height="120" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="680" y="285" text-anchor="middle" class="header" fill="#1976d2">Graph</text>
    <text x="680" y="305" text-anchor="middle" class="small">Nodes & edges</text>
    <text x="680" y="325" text-anchor="middle" class="small">Relationships</text>
    <text x="680" y="345" text-anchor="middle" class="small">Connected data</text>
    <text x="680" y="365" text-anchor="middle" class="small">Neo4j</text>
  </g>

  <!-- Step 6: CAP Theorem -->
  <g id="step6" class="step" data-narration="CAP theorem states distributed systems can guarantee only two of three: consistency availability and partition tolerance">
    <rect x="100" y="400" width="600" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="400" y="425" text-anchor="middle" class="header" fill="#ff9800">CAP Theorem</text>
    <text x="400" y="450" text-anchor="middle" class="small">Choose 2 of 3: Consistency • Availability • Partition Tolerance</text>
    <text x="400" y="470" text-anchor="middle" class="small">NoSQL often favors AP over C (eventual consistency)</text>
  </g>

  <!-- Step 7: SQL vs NoSQL -->
  <g id="step7" class="step" data-narration="SQL databases offer strong consistency and structured schemas while NoSQL provides flexibility and horizontal scalability">
    <rect x="60" y="500" width="330" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="225" y="525" text-anchor="middle" class="header" fill="#1976d2">SQL (RDBMS)</text>
    <text x="225" y="545" text-anchor="middle" class="small">Fixed schema • ACID</text>
    <text x="225" y="560" text-anchor="middle" class="small">Vertical scaling • Joins</text>
  </g>

  <!-- Step 8: NoSQL Advantages -->
  <g id="step8" class="step" data-narration="NoSQL advantages include schema flexibility horizontal scaling high performance and handling diverse data types">
    <rect x="410" y="500" width="330" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="3" rx="8"/>
    <text x="575" y="525" text-anchor="middle" class="header" fill="#388e3c">NoSQL</text>
    <text x="575" y="545" text-anchor="middle" class="small">Flexible schema • BASE</text>
    <text x="575" y="560" text-anchor="middle" class="small">Horizontal scaling • Denormalized</text>
  </g>
</svg>
