  <!-- Section 2: Key Concepts -->
  <section data-narration="Key Concepts" style="background-color: #C7E5F2; padding: 20px;">
    <h2>Key Concepts</h2>
    <ul>
      <li>Insert Statement: An insert statement is used to add new records to a table in a database management system.</li>
      <li>Rollback: Rollback is a feature that allows you to undo changes made to a database after they have been committed.</li>
    </ul>
  </section>

