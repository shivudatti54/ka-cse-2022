        </tr>
        <tr>
          <td>ENAME</td>
          <td>Employee's name</td>
        </tr>
        <tr>
          <td>JOB</td>
          <td>Employee's job title</td>
        </tr>
        <tr>
          <td>MANAGER_NO</td>
          <td>Manager's employee number</td>
        </tr>
        <tr>
          <td>SAL</td>
          <td>Employee's salary</td>
        </tr>
        <tr>
          <td>COMMISSION</td>
          <td>Employee's commission</td>
        </tr>
      </tbody>
    </table>
