<svg width="420" height="400" data-topic-id="add-a-column-commission-with-domain-to-the-employee" xmlns="http://www.w3.org/2000/svg">
  <Defs>
    <LinearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </LinearGradient>
    <LinearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0097A7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#03A9F4" stop-opacity="1"/>
    </LinearGradient>
  </Defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <text x="20" y="20" fill="#000" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">
    Add a Column Commission with Domain to the Employee
  </text>
  <rect x="10" y="60" width="400" height="100" fill="#fff" rx="10" />
  <g transform="rotate(90) translate(20 60)">
    <path d="M 20 20 L 60 60 L 20 100 Z" stroke="#000" stroke-width="2" fill="none"/>
    <text x="10" y="50" fill="#000" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
      What is Commission?
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 20 60" to="180 20 60" dur="5000" begin="0s" repeatCount="indefinite"/>
    <text x="80" y="50" fill="#000" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
      Commission is a form of payment where an employee receives a percentage of the total sales or revenue generated by their work.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 80 50" to="180 80 50" dur="5000" begin="1000s" repeatCount="indefinite"/>
  </g>
  <rect x="10" y="190" width="400" height="100" fill="#fff" rx="10" />
  <g transform="rotate(90) translate(20 190)">
    <path d="M 20 20 L 60 60 L 20 100 Z" stroke="#000" stroke-width="2" fill="none"/>
    <text x="10" y="50" fill="#000" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
      Why Domain?
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 20 60" to="180 20 60" dur="5000" begin="2000s" repeatCount="indefinite"/>
    <text x="80" y="50" fill="#000" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
      A domain is a set of values that a column can take. It is used to restrict the values that can be entered into a column, ensuring data consistency and accuracy.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 80 50" to="180 80 50" dur="5000" begin="3000s" repeatCount="indefinite"/>
  </g>
  <rect x="10" y="310" width="400" height="100" fill="#fff" rx="10" />
  <g transform="rotate(90) translate(20 310)">
    <path d="M 20 20 L 60 60 L 20 100 Z" stroke="#000" stroke-width="2" fill="none"/>
    <text x="10" y="50" fill="#000" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
      Key Concepts
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 20 60" to="180 20 60" dur="5000" begin="4000s" repeatCount="indefinite"/>
    <text x="80" y="50" fill="#000" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
      Column: A column is a single field or attribute in a table.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 80 50" to="180 80 50" dur="5000" begin="5000s" repeatCount="indefinite"/>
    <text x="80" y="80" fill="#000" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
      Data Type: A data type is the type of value that a column can hold.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 80 70" to="180 80 70" dur="5000" begin="6000s" repeatCount="indefinite"/>
    <text x="80" y="100" fill="#000" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
      Domain: A domain is a set of valid values that a column can take.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 80 90" to="180 80 90" dur="5000" begin="7000s" repeatCount="indefinite"/>
  </g>
  <rect x="10" y="420" width="400" height="20" fill="#fff" rx="5" />
  <text x="20" y="420" fill="#000" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">
    Created by <a href="https://www.example.com">Example</a>
  </text>
  <rect x="10" y="440" width="400" height="20" fill="#fff" rx="5" />
  <text x="20" y="440" fill="#000" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">
    <a href="https://www.example.com">Back to Examples</a>
  </text>
</svg>