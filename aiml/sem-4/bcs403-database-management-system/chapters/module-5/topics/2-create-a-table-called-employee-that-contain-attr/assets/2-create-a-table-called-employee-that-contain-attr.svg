<svg width="420" height="400" data-topic-id="employee-creation" data-slug="create-a-table-called-employee-that-contain-attr">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="380" height="360" fill="url(#gradient)"/>
  <text x="20" y="30" font-size="24" font-family="Arial" text-anchor="middle">Create a Table Called Employee</text>
  <section data-narration="Introduction" style="margin-bottom: 20px">
    <text x="50" y="100" font-size="18" font-family="Arial" text-anchor="middle">In a database management system, a table is a collection of related data.</text>
  </section>
  <section data-narration="Definition of a Table" style="margin-bottom: 20px">
    <text x="50" y="150" font-size="18" font-family="Arial" text-anchor="middle">A table is a collection of related data that is stored in rows and columns.</text>
    <rect x="20" y="180" width="340" height="10" rx="5" fill="#66CCCC"/>
    <text x="20" y="190" font-size="14" font-family="Arial" text-anchor="middle">Each row represents a single record, and each column represents a field or attribute of that record.</text>
  </section>
  <section data-narration="Attributes of a Table" style="margin-bottom: 20px">
    <text x="50" y="250" font-size="18" font-family="Arial" text-anchor="middle">An attribute is a single field or column in a table that stores a specific piece of data.</text>
  </section>
  <section data-narration="Creating a Table" style="margin-bottom: 20px">
    <text x="50" y="310" font-size="18" font-family="Arial" text-anchor="middle">To create a table, we use the CREATE TABLE statement.</text>
    <text x="50" y="330" font-size="14" font-family="Arial" text-anchor="middle">The basic syntax of the CREATE TABLE statement is as follows:</text>
    <text x="50" y="350" font-size="14" font-family="Arial" text-anchor="middle">CREATE TABLE table_name (<br>attribute1 data_type,<br>attribute2 data_type,<br>attribute3 data_type,<br>...)</text>
    <rect x="20" y="380" width="340" height="10" rx="5" fill="#66CCCC"/>
  </section>
  <section data-narration="Creating the Employee Table" style="margin-bottom: 20px">
    <text x="50" y="430" font-size="18" font-family="Arial" text-anchor="middle">Let's create the Employee table with the attribute EMPNO.</text>
    <text x="50" y="450" font-size="14" font-family="Arial" text-anchor="middle">The EMPNO attribute will be a unique identifier for each employee.</text>
    <text x="50" y="470" font-size="14" font-family="Arial" text-anchor="middle">It is a VARCHAR(10) data type, which means it can store strings of up to 10 characters.</text>
  </section>
  <section data-narration="Attributes of the Employee Table" style="margin-bottom: 20px">
    <text x="50" y="520" font-size="18" font-family="Arial" text-anchor="middle">The Employee table has the following attributes:</text>
    <rect x="20" y="550" width="340" height="20" rx="5" fill="#66CCCC"/>
    <text x="20" y="560" font-size="14" font-family="Arial" text-anchor="middle">EMPNO: a unique identifier for each employee.</text>
    <text x="20" y="580" font-size="14" font-family="Arial" text-anchor="middle">Name: the name of the employee.</text>
    <text x="20" y="600" font-size="14" font-family="Arial" text-anchor="middle">Department: the department of the employee.</text>
    <text x="20" y="620" font-size="14" font-family="Arial" text-anchor="middle">Salary: the salary of the employee.</text>
    <text x="20" y="640" font-size="14" font-family="Arial" text-anchor="middle">It is a DECIMAL(10, 2) data type, which means it can store decimal numbers with up to 10 digits and 2 decimal places.</text>
  </section>
  <rect x="20" y="680" width="380" height="10" rx="5" fill="#66CCCC"/>
  <text x="20" y="690" font-size="14" font-family="Arial" text-anchor="middle">Creating a table provides several benefits, including organization and efficient storage.</text>
  <text x="20" y="710" font-size="14" font-family="Arial" text-anchor="middle">To create a table, we use the CREATE TABLE statement.</text>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 20" begin="0s" dur="2s" repeatCount="indefinite"/>
</svg>