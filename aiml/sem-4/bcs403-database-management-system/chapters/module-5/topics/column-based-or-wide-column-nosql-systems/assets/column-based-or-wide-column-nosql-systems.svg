<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; }
      .header { font-size: 18px; font-weight: bold; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
    </style>
  </defs>

  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="Column-based NoSQL systems store data by columns rather than rows optimized for analytical queries and massive scale">
    <rect x="50" y="50" width="700" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="3" rx="10"/>
    <text x="400" y="90" text-anchor="middle" class="title" fill="#1976d2">Column-Based NoSQL</text>
    <text x="400" y="115" text-anchor="middle" class="body" fill="#1976d2">Wide Column Stores</text>
  </g>

  <!-- Step 1: Row vs Column Storage -->
  <g id="step1" class="step" data-narration="Traditional row-based storage reads entire rows while column storage reads only needed columns improving analytical performance">
    <rect x="80" y="160" width="300" height="140" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="230" y="185" text-anchor="middle" class="header" fill="#ff9800">Row-Based (SQL)</text>

    <rect x="100" y="200" width="260" height="90" fill="#ffe0b2" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="120" y="220" class="small">Row1: ID|Name|Age|City</text>
    <line x1="110" y1="225" x2="350" y2="225" stroke="#ff9800" stroke-width="1"/>
    <text x="120" y="240" class="small">Row2: ID|Name|Age|City</text>
    <line x1="110" y1="245" x2="350" y2="245" stroke="#ff9800" stroke-width="1"/>
    <text x="120" y="260" class="small">Row3: ID|Name|Age|City</text>
    <line x1="110" y1="265" x2="350" y2="265" stroke="#ff9800" stroke-width="1"/>
    <text x="230" y="285" text-anchor="middle" class="small">Reads full rows</text>
  </g>

  <!-- Step 2: Column Storage -->
  <g id="step2" class="step" data-narration="Column storage groups same attributes together enabling faster aggregations and better compression">
    <rect x="420" y="160" width="300" height="140" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="570" y="185" text-anchor="middle" class="header" fill="#388e3c">Column-Based</text>

    <rect x="440" y="200" width="260" height="90" fill="#c8e6c9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="450" y="220" class="small">ID: [1, 2, 3, 4, 5...]</text>
    <text x="450" y="240" class="small">Name: [Alice, Bob, Carol...]</text>
    <text x="450" y="260" class="small">Age: [20, 22, 21, 25...]</text>
    <text x="450" y="280" class="small">City: [NY, LA, SF...]</text>
  </g>

  <!-- Step 3: Column Family Structure -->
  <g id="step3" class="step" data-narration="Column families group related columns with row keys and column keys for flexible schema">
    <rect x="100" y="320" width="600" height="100" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="400" y="345" text-anchor="middle" class="header" fill="#1976d2">Column Family Structure</text>

    <rect x="120" y="360" width="560" height="50" fill="#bbdefb" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="130" y="380" class="small">RowKey: user_123</text>
    <text x="140" y="398" class="small">CF:profile → name:"Alice", age:20, city:"NYC"</text>
  </g>

  <!-- Step 4: Advantages -->
  <g id="step4" class="step" data-narration="Advantages include fast aggregations better compression efficient analytical queries and horizontal scalability">
    <rect x="60" y="440" width="330" height="140" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="225" y="465" text-anchor="middle" class="header" fill="#388e3c">Advantages</text>

    <text x="80" y="490" class="small">✓ Fast aggregations (SUM, AVG)</text>
    <text x="80" y="510" class="small">✓ Better compression</text>
    <text x="80" y="530" class="small">✓ Read only needed columns</text>
    <text x="80" y="550" class="small">✓ Horizontal scalability</text>
    <text x="80" y="570" class="small">✓ Time-series data</text>
  </g>

  <!-- Step 5: Use Cases and Examples -->
  <g id="step5" class="step" data-narration="Common use cases include analytics recommendation engines time-series data and IoT using systems like Cassandra and HBase">
    <rect x="410" y="440" width="330" height="140" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="575" y="465" text-anchor="middle" class="header" fill="#ff9800">Use Cases & Examples</text>

    <text x="430" y="490" class="small">• Analytics & BI</text>
    <text x="430" y="510" class="small">• Recommendation engines</text>
    <text x="430" y="530" class="small">• Time-series data (IoT)</text>
    <text x="430" y="550" class="small">• Cassandra, HBase</text>
    <text x="430" y="570" class="small">• Google Bigtable</text>
  </g>
</svg>
