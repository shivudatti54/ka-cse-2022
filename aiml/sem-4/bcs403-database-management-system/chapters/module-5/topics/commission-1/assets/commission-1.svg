<svg width="420" height="400" data-topic-id="commission-1">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E0F0F0" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <title>Commission 1</title>
  <g id="commission-structure">
    <rect x="20" y="20" width="300" height="200" fill="#C7E5F5" stroke="#2E4053" stroke-width="2"/>
    <text x="50" y="60" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Commission Structure</text>
    <animateTransform attributeName="transform" type="translate" from="0 200" to="0 20" dur="2s" repeatCount="indefinite"/>
    <g id="fixed-commission">
      <rect x="20" y="150" width="150" height="50" fill="#E6F5E9" stroke="#2E4053" stroke-width="2"/>
      <text x="100" y="170" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Fixed Commission</text>
      <text x="100" y="160" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">A predetermined amount paid to an employee for every sale or transaction made.</text>
    </g>
    <g id="variable-commission">
      <rect x="200" y="150" width="150" height="50" fill="#E6F5E9" stroke="#2E4053" stroke-width="2"/>
      <text x="250" y="170" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Variable Commission</text>
      <text x="250" y="160" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">A percentage of the sales or revenue generated by an employee's efforts.</text>
    </g>
    <g id="composite-commission">
      <rect x="20" y="350" width="300" height="50" fill="#E6F5E9" stroke="#2E4053" stroke-width="2"/>
      <text x="50" y="370" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Composite Commission</text>
      <text x="50" y="360" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">A combination of fixed and variable commissions.</text>
    </g>
    <g id="commission-benefits">
      <rect x="20" y="250" width="300" height="150" fill="#C7E5F5" stroke="#2E4053" stroke-width="2"/>
      <text x="50" y="280" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Benefits of Commission-Based Payment</text>
      <animateTransform attributeName="transform" type="translate" from="0 250" to="0 220" dur="2s" repeatCount="indefinite"/>
      <g id="motivation">
        <rect x="20" y="200" width="150" height="50" fill="#E6F5E9" stroke="#2E4053" stroke-width="2"/>
        <text x="100" y="220" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Motivation</text>
        <text x="100" y="210" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">A commission-based payment structure motivates employees to work harder and increase sales.</text>
      </g>
      <g id="flexibility">
        <rect x="200" y="200" width="150" height="50" fill="#E6F5E9" stroke="#2E4053" stroke-width="2"/>
        <text x="250" y="220" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Flexibility</text>
        <text x="250" y="210" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">A commission-based structure allows companies to adjust the payment structure according to their business needs.</text>
      </g>
    </g>
  </g>
  <g id="footer">
    <text x="50" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Commission 1</text>
  </g>
</svg>