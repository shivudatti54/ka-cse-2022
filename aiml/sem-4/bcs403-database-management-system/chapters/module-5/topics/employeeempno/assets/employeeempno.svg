<svg width="420" height="400" data-topic-id="employee-empno" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#E6DAC3" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title at top -->
  <text x="50%" y="20%" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#3498db">
    Employee (EMPNO)
  </text>
  
  <!-- Section 1: Employee ID (EMPNO) -->
  <rect x="20" y="100" width="200" height="40" fill="#f2f2f2" rx="5" data-narration="Employee ID (EMPNO): A unique numeric identifier assigned to each employee." />
  <text x="30" y="110" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#2ecc71">
    EMPNO
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,100" to="0,120" dur="500ms" begin="0s" sequence="sequential" />
  
  <!-- Section 2: Employee Name (ENAME) -->
  <rect x="20" y="150" width="200" height="40" fill="#f2f2f2" rx="5" data-narration="Employee Name (ENAME): The full name of the employee." />
  <text x="30" y="160" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#2ecc71">
    ENAME
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,170" to="0,190" dur="500ms" begin="1s" sequence="sequential" />
  
  <!-- Section 3: Employee Salary (Salary) -->
  <rect x="20" y="200" width="200" height="40" fill="#f2f2f2" rx="5" data-narration="Employee Salary (Salary): The monthly salary of the employee." />
  <text x="30" y="210" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#2ecc71">
    SALARY
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,220" to="0,240" dur="500ms" begin="2s" sequence="sequential" />
  
  <!-- Section 4: Employee Department (DEPTNO) -->
  <rect x="20" y="250" width="200" height="40" fill="#f2f2f2" rx="5" data-narration="Employee Department (DEPTNO): The department to which the employee belongs." />
  <text x="30" y="260" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#2ecc71">
    DEPTNO
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,270" to="0,290" dur="500ms" begin="3s" sequence="sequential" />
  
  <!-- Section 5: Employee Job Title (JOBNO) -->
  <rect x="20" y="300" width="200" height="40" fill="#f2f2f2" rx="5" data-narration="Employee Job Title (JOBNO): The job title of the employee." />
  <text x="30" y="310" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#2ecc71">
    JOBNO
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,320" to="0,340" dur="500ms" begin="4s" sequence="sequential" />
  
  <!-- Arrow markers for connections -->
  <path d="M 50,220 L 80,220" stroke="#2ecc71" stroke-width="2" fill="none" />
  <path d="M 50,240 L 80,240" stroke="#2ecc71" stroke-width="2" fill="none" />
  <path d="M 50,260 L 80,260" stroke="#2ecc71" stroke-width="2" fill="none" />
  <path d="M 50,280 L 80,280" stroke="#2ecc71" stroke-width="2" fill="none" />
  
  <!-- Footer at bottom -->
  <text x="50%" y="380%" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#3498db">
    Created with love for educational purposes
  </text>
</svg>