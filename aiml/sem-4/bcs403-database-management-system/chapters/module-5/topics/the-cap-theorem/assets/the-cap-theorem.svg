<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; }
      .header { font-size: 18px; font-weight: bold; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
    </style>
  </defs>

  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="CAP theorem states distributed systems can guarantee only two of three properties: consistency availability and partition tolerance">
    <rect x="50" y="50" width="700" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="3" rx="10"/>
    <text x="400" y="90" text-anchor="middle" class="title" fill="#1976d2">CAP Theorem</text>
    <text x="400" y="115" text-anchor="middle" class="body" fill="#1976d2">Choose 2 of 3 Properties</text>
  </g>

  <!-- Step 1: Triangle Diagram -->
  <g id="step1" class="step" data-narration="The CAP triangle shows three vertices representing consistency availability and partition tolerance">
    <path d="M 400 180 L 250 380 L 550 380 Z" fill="#e3f2fd" stroke="#1976d2" stroke-width="3"/>

    <circle cx="400" cy="180" r="45" fill="#fff3e0" stroke="#ff9800" stroke-width="3"/>
    <text x="400" y="190" text-anchor="middle" class="header" fill="#ff9800">C</text>

    <circle cx="250" cy="380" r="45" fill="#e8f5e9" stroke="#388e3c" stroke-width="3"/>
    <text x="250" y="390" text-anchor="middle" class="header" fill="#388e3c">A</text>

    <circle cx="550" cy="380" r="45" fill="#ffebee" stroke="#d32f2f" stroke-width="3"/>
    <text x="550" y="390" text-anchor="middle" class="header" fill="#d32f2f">P</text>
  </g>

  <!-- Step 2: Consistency -->
  <g id="step2" class="step" data-narration="Consistency ensures all nodes see the same data at the same time with immediate updates across system">
    <rect x="320" y="100" width="160" height="70" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="400" y="125" text-anchor="middle" class="header" fill="#ff9800">Consistency</text>
    <text x="400" y="145" text-anchor="middle" class="small">All nodes see</text>
    <text x="400" y="160" text-anchor="middle" class="small">same data</text>
  </g>

  <!-- Step 3: Availability -->
  <g id="step3" class="step" data-narration="Availability guarantees every request receives a response even if some nodes are down">
    <rect x="100" y="390" width="140" height="70" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="170" y="415" text-anchor="middle" class="header" fill="#388e3c">Availability</text>
    <text x="170" y="435" text-anchor="middle" class="small">Always responds</text>
    <text x="170" y="450" text-anchor="middle" class="small">to requests</text>
  </g>

  <!-- Step 4: Partition Tolerance -->
  <g id="step4" class="step" data-narration="Partition tolerance allows system to continue operating despite network failures or message loss between nodes">
    <rect x="560" y="390" width="160" height="70" fill="#ffebee" stroke="#d32f2f" stroke-width="2" rx="8"/>
    <text x="640" y="415" text-anchor="middle" class="header" fill="#d32f2f">Partition Tolerance</text>
    <text x="640" y="435" text-anchor="middle" class="small">Works despite</text>
    <text x="640" y="450" text-anchor="middle" class="small">network failures</text>
  </g>

  <!-- Step 5: CP Systems -->
  <g id="step5" class="step" data-narration="CP systems prioritize consistency and partition tolerance sacrificing availability during network partitions">
    <rect x="60" y="480" width="220" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="170" y="505" text-anchor="middle" class="header" fill="#ff9800">CP Systems</text>
    <text x="170" y="525" text-anchor="middle" class="small">Consistency + Partition</text>
    <text x="170" y="545" text-anchor="middle" class="small">May reject requests</text>
    <text x="170" y="565" text-anchor="middle" class="small">MongoDB, HBase</text>
  </g>

  <!-- Step 6: AP Systems -->
  <g id="step6" class="step" data-narration="AP systems prioritize availability and partition tolerance accepting eventual consistency for always responsive behavior">
    <rect x="290" y="480" width="220" height="100" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="400" y="505" text-anchor="middle" class="header" fill="#388e3c">AP Systems</text>
    <text x="400" y="525" text-anchor="middle" class="small">Availability + Partition</text>
    <text x="400" y="545" text-anchor="middle" class="small">Eventual consistency</text>
    <text x="400" y="565" text-anchor="middle" class="small">Cassandra, DynamoDB</text>
  </g>

  <!-- Step 7: CA Systems -->
  <g id="step7" class="step" data-narration="CA systems are impractical in distributed environments because network partitions are inevitable in real networks">
    <rect x="520" y="480" width="220" height="100" fill="#ffebee" stroke="#d32f2f" stroke-width="2" rx="8"/>
    <text x="630" y="505" text-anchor="middle" class="header" fill="#d32f2f">CA Systems</text>
    <text x="630" y="525" text-anchor="middle" class="small">Consistency + Availability</text>
    <text x="630" y="545" text-anchor="middle" class="small">❌ Not practical</text>
    <text x="630" y="565" text-anchor="middle" class="small">Partitions inevitable</text>
  </g>

  <!-- Step 8: Trade-off Summary -->
  <g id="step8" class="step" data-narration="In practice all distributed systems must tolerate partitions so real choice is between consistency and availability">
    <rect x="150" y="145" width="500" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="400" y="170" text-anchor="middle" class="body" fill="#1976d2">Real choice: CP (consistent but unavailable) vs AP (available but eventually consistent)</text>
  </g>
</svg>
