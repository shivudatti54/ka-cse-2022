  <!-- Section 1: Entity Types -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="200" height="100" fill="#F7F7F7" rx="10" data-narration="Entity types are the building blocks of a database and are used to capture the main concepts and relationships in a database.">
      <animateTransform begin="0s" dur="2s" type="translate" x="200" y="0"/>
    </rect>
    <text x="50%" y="80%" fill="#2E4053" font-size="24" text-anchor="middle">Entity Types</text>
    <path d="M 100,20 L 100,60 L 120,60 L 120,100 L 140,100 L 140,60 L 160,60 L 160,20 L 100,20 Z" fill="#4BC0C9" stroke="#2E4053" stroke-width="2"/>
  </g>
  
  <!-- Section 2: Entity Types (continued) -->
  <g transform="translate(350, 50)">
    <rect x="0" y="0" width="200" height="100" fill="#F7F7F7" rx="10" data-narration="An entity type is a real-world entity that has its own identity and existence. Entity types are the building blocks of a database and are used to capture the main concepts and relationships in a database.">
      <animateTransform begin="0s" dur="2s" type="translate" x="300" y="0"/>
    </rect>
    <text x="50%" y="80%" fill="#2E4053" font-size="24" text-anchor="middle">Entity Types (continued)</text>
    <path d="M 100,20 L 100,60 L 120,60 L 120,100 L 140,100 L 140,60 L 160,60 L 160,20 L 100,20 Z" fill="#4BC0C9" stroke="#2E4053" stroke-width="2"/>
  </g>
  
  <!-- Section 3: Entity Types (example) -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="200" height="100" fill="#F7F7F7" rx="10" data-narration="Suppose we want to model the concept of a student in a university. The student entity type can be defined as follows:">
      <animateTransform begin="0s" dur="2s" type="translate" x="200" y="0"/>
    </rect>
    <text x="50%" y="80%" fill="#2E4053" font-size="24" text-anchor="middle">Entity Types (example)</text>
    <path d="M 100,20 L 100,60 L 120,60 L 120,100 L 140,100 L 140,60 L 160,60 L 160,20 L 100,20 Z" fill="#4BC0C9" stroke="#2E4053" stroke-width="2"/>
  </g>
  
  <!-- Section 4: Entity Sets -->
  <g transform="translate(350, 200)">
    <rect x="0" y="0" width="200" height="100" fill="#F7F7F7" rx="10" data-narration="An entity set is a collection of entity instances that share the same entity type. Entity sets are used to represent the multiple instances of an entity type.">
      <animateTransform begin="0s" dur="2s" type="translate" x="300" y="0"/>
    </rect>
    <text x="50%" y="80%" fill="#2E4053" font-size="24" text-anchor="middle">Entity Sets</text>
    <path d="M 100,20 L 100,60 L 120,60 L 120,100 L 140,100 L 140,60 L 160,60 L 160,20 L 100,20 Z" fill="#4BC0C9" stroke="#2E4053" stroke-width="2"/>
  </g>
  
  <!-- Section 5: Entity Sets (example) -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="200" height="100" fill="#F7F7F7" rx="10" data-narration="Using the student entity type defined earlier, we can create an entity set as follows:">
      <animateTransform begin="0s" dur="2s" type="translate" x="200" y="0"/>
    </rect>
    <text x="50%" y="80%" fill="#2E4053" font-size="24" text-anchor="middle">Entity Sets (example)</text>
