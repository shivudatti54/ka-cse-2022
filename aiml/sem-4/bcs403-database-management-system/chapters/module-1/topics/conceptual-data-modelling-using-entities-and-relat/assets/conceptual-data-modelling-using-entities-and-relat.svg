<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" data-topic-id="conceptual-data-modelling" data-slugified-topic-name="conceptual-data-modelling-using-entities-and-relationships">
  <!-- Gradient Background -->
