<svg width="420" height="400" data-topic-id="introduction-to-databases-introduction-characteristics">
  <rect x="0" y="0" width="420" height="400" fill="#CCFFCC" opacity="0.8" rx="10" />
  <title>Introduction to Databases - Introduction to Database Approach</title>
  <footer>Learn Database Fundamentals</footer>

  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0FFFF" stop-opacity="1" />
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" opacity="1" rx="10" />

  <!-- Section 1: Definition of Database -->
  <section data-narration="Definition of Database">
    <rect x="50" y="50" width="320" height="150" fill="#FFFFFF" opacity="1" rx="10" />
    <animateTransform attribute="transform" type="translateX" from="0" to="-50" begin="0s" dur="1s" repeatCount="indefinite" />
    <text x="170" y="80" fill="#333333" font-size="24" font-family="Arial, sans-serif">A database is a digital repository that stores and manages large amounts of data in a structured and controlled manner.</text>
  </section>

  <!-- Section 2: Types of Databases -->
  <section data-narration="Types of Databases">
    <rect x="50" y="250" width="320" height="150" fill="#FFFFFF" opacity="1" rx="10" />
    <animateTransform attribute="transform" type="translateX" from="0" to="-50" begin="1s" dur="1s" repeatCount="indefinite" />
    <text x="170" y="290" fill="#333333" font-size="24" font-family="Arial, sans-serif">
      <tspan>Relational databases (e.g., MySQL, Oracle)</tspan>
      <tspan> NoSQL databases (e.g., MongoDB, Cassandra)</tspan>
      <tspan> Graph databases (e.g., Neo4j)</tspan>
      <tspan> Time-series databases (e.g., InfluxDB)</tspan>
    </text>
  </section>

  <!-- Section 3: Characteristics of Database Approach -->
  <section data-narration="Characteristics of Database Approach">
    <rect x="50" y="450" width="320" height="150" fill="#FFFFFF" opacity="1" rx="10" />
    <animateTransform attribute="transform" type="translateX" from="0" to="-50" begin="2s" dur="1s" repeatCount="indefinite" />
    <text x="170" y="490" fill="#333333" font-size="24" font-family="Arial, sans-serif">
      <tspan>Data Independence</tspan>
      <tspan> Control over Data</tspan>
      <tspan>Automatic Recovery</tspan>
      <tspan>Data Integrity</tspan>
      <tspan>Scalability</tspan>
    </text>
    <rect x="0" y="480" width="40" height="20" fill="#66CCCC" rx="5" />
    <rect x="120" y="480" width="40" height="20" fill="#66CCCC" rx="5" />
    <rect x="240" y="480" width="40" height="20" fill="#66CCCC" rx="5" />
    <rect x="360" y="480" width="40" height="20" fill="#66CCCC" rx="5" />
  </section>

  <!-- Section 4: Advantages of Using the DBMS Approach -->
  <section data-narration="Advantages of Using the DBMS Approach">
    <rect x="50" y="600" width="320" height="150" fill="#FFFFFF" opacity="1" rx="10" />
    <animateTransform attribute="transform" type="translateX" from="0" to="-50" begin="3s" dur="1s" repeatCount="indefinite" />
    <text x="170" y="640" fill="#333333" font-size="24" font-family="Arial, sans-serif">
      <tspan>Data Abstraction</tspan>
      <tspan>Scalability</tspan>
      <tspan>Automatic Recovery</tspan>
      <tspan>Data Integrity</tspan>
    </text>
    <rect x="0" y="630" width="40" height="20" fill="#66CCCC" rx="5" />
    <rect x="120" y="630" width="40" height="20" fill="#66CCCC" rx="5" />
    <rect x="240" y="630" width="40" height="20" fill="#66CCCC" rx="5" />
    <rect x="360" y="630" width="40" height="20" fill="#66CCCC" rx="5" />
  </section>

  <!-- Section 5: Conclusion -->
  <section data-narration="Conclusion">
    <rect x="50" y="750" width="320" height="150" fill="#FFFFFF" opacity="1" rx="10" />
    <animateTransform attribute="transform" type="translateX" from="0" to="-50" begin="4s" dur="1s" repeatCount="indefinite" />
    <text x="170" y="790" fill="#333333" font-size="24" font-family="Arial, sans-serif">A database approach provides a structured and controlled manner of managing large amounts of data.</text>
  </section>

  <!-- Arrow markers -->
  <polyline points="40,50 60,50" fill="#66CCCC" stroke="#66CCCC" stroke-width="2" />
  <polyline points="140,50 160,50" fill="#66CCCC" stroke="#66CCCC" stroke-width="2" />
  <polyline points="240,50 260,50" fill="#66CCCC" stroke="#66CCCC" stroke-width="2" />
  <polyline points="340,50 360,50" fill="#66CCCC" stroke="#66CCCC" stroke-width="2" />
</svg>