<svg width="420" height="400" data-topic-id="spot-instances-in-cloud-computing">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#44A0E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title at top -->
  <text x="10" y="20" font-size="24" font-family="Arial" font-weight="bold" text-anchor="start" fill="#3498DB">
    Spot Instances in Cloud Computing
  </text>
  
  <!-- Section 1: What are Spot Instances? -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial" text-anchor="start" fill="#2C3E50" data-narration="What are Spot Instances?">
      Spot Instances are unused EC2 capacity offered at up to 90% discount compared to On-Demand prices.
    </text>
  </g>
  <animate transform="translate(50, 50)" dur="2000" begin="0s" fill="freeze" repeatCount="indefinite">
    <rect x="10" y="15" width="190" height="40" fill="#F7F7F7" rx="5"/>
  </animate>
  
  <!-- Section 2: How Spot Instances Work -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial" text-anchor="start" fill="#2C3E50" data-narration="How Spot Instances Work">
      You request instances at current spot price, AWS provides instances while capacity available, if capacity needed, AWS sends 2-minute warning, and instance is terminated (you only pay for used time).
    </text>
  </g>
  <animate transform="translate(100, 100)" dur="2000" begin="1s" fill="freeze" repeatCount="indefinite">
    <rect x="10" y="15" width="190" height="40" fill="#F7F7F7" rx="5"/>
  </animate>
  
  <!-- Section 3: Pricing Model -->
  <g transform="translate(150, 150)">
    <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial" text-anchor="start" fill="#2C3E50" data-narration="Pricing Model">
      | Pricing Type | Discount | Interruption Risk   |
      | ------------ | -------- | ------------------- |
      | On-Demand    | 0%       | None                |
      | Reserved     | 40-72%   | None                |
      | Spot         | 60-90%   | Yes (2-min warning) |
    </text>
  </g>
  <animate transform="translate(150, 150)" dur="2000" begin="2s" fill="freeze" repeatCount="indefinite">
    <rect x="10" y="15" width="190" height="40" fill="#F7F7F7" rx="5"/>
  </animate>
  
  <!-- Section 4: Price Fluctuation -->
  <g transform="translate(200, 150)">
    <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial" text-anchor="start" fill="#2C3E50" data-narration="Price Fluctuation">
      - Prices change based on supply/demand
      - Can set maximum price willing to pay
      - No bidding - you get current spot price
    </text>
  </g>
  <animate transform="translate(200, 150)" dur="2000" begin="3s" fill="freeze" repeatCount="indefinite">
    <rect x="10" y="15" width="190" height="40" fill="#F7F7F7" rx="5"/>
  </animate>
  
  <!-- Section 5: Best Practices -->
  <g transform="translate(250, 100)">
    <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial" text-anchor="start" fill="#2C3E50" data-narration="Best Practices">
      Use multiple instance types and AZs:
      - c5.large in us-east-1a
      - c5.xlarge in us-east-1b
      - c5a.large in us-east-1c
      - m5.large in us-east-1a
    </text>
  </g>
  <animate transform="translate(250, 100)" dur="2000" begin="4s" fill="freeze" repeatCount="indefinite">
    <rect x="10" y="15" width="190" height="40" fill="#F7F7F7" rx="5"/>
  </animate>
  
  <!-- Section 6: Use Cases -->
  <g transform="translate(300, 50)">
    <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial" text-anchor="start" fill="#2C3E50" data-narration="Use Cases">
      - Batch processing jobs
      - Big data analytics (EMR, Spark)
      - CI/CD build workers
      - Testing environments
      - Containerized workloads
      - Machine learning training
      - Image/video rendering
    </text>
  </g>
  <animate transform="translate(300, 50)" dur="2000" begin="5s" fill="freeze" repeatCount="indefinite">
    <rect x="10" y="15" width="190" height="40" fill="#F7F7F7" rx="5"/>
  </animate>
  
  <!-- Section 7: Not Good for Spot -->
  <g transform="translate(350, 50)">
    <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial" text-anchor="start" fill="#2C3E50" data-narration="Not Good for Spot">
      - Production web servers
      - Databases
      - Single critical instances
      - Stateful applications without checkpointing
    </text>
  </g>
  <animate transform="translate(350, 50)" dur="2000" begin="6s" fill="freeze" repeatCount="indefinite">
    <rect x="10" y="15" width="190" height="40" fill="#F7F7F7" rx="5"/>
  </animate>
  
  <!-- Section 8: Handling Interruptions -->
  <g transform="translate(400, 100)">
    <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial" text-anchor="start" fill="#2C3E50" data-narration="Handling Interruptions">
      - Termination Notice: AWS provides 2-minute warning via instance metadata service, CloudWatch Events, and EventBridge.
      - Checking requirements: save state periodically, use checkpointing for long jobs, implement graceful shutdown handling, and store data externally.
    </text>
  </g>
  <animate transform="translate(400, 100)" dur="2000" begin="7s" fill="freeze" repeatCount="indefinite">
    <rect x="10" y="15" width="190" height="40" fill="#F7F7F7" rx="5"/>
  </animate>
  
  <!-- Footer -->
  <text x="10" y="380" font-size="18" font-family="Arial" text-anchor="start" fill="#2C3E50">
    By using Spot Instances, you can save up to 90% on EC2 costs. However, you must be aware of the potential interruption risk and take necessary precautions to handle interruptions.
  </text>
</svg>