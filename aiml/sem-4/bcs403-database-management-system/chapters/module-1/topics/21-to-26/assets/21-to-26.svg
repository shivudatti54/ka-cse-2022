<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="21-to-26">
  <!-- Gradient Background -->
  <Defs>
    <LinearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1" />
      <stop offset="50%" stop-color="#33CCCC" stop-opacity="1" />
      <stop offset="100%" stop-color="#0CC7CC" stop-opacity="1" />
    </LinearGradient>
  </Defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" rx="10" />
  <!-- Title Section -->
  <g transform="rotate(45 210 180)" data-narration="Introduction to Database Management System">
    <text x="210" y="180" font-size="24" font-family="Arial" text-anchor="middle" fill="#00698f">
      Introduction to Database Management System
    </text>
  </g>
  <!-- Definition Section -->
  <g transform="rotate(45 210 120)" data-narration="Definition of DBMS">
    <rect x="0" y="100" width="420" height="60" fill="#f9f9f9" rx="10" />
    <text x="210" y="130" font-size="18" font-family="Arial" text-anchor="middle" fill="#00698f">
      A DBMS is a software system that allows you to define, create, maintain, and manipulate databases.
    </text>
  </g>
  <!-- Characteristics of a DBMS Section -->
  <g transform="rotate(45 210 60)" data-narration="Characteristics of a DBMS">
    <rect x="0" y="100" width="420" height="60" fill="#f9f9f9" rx="10" />
    <text x="210" y="130" font-size="18" font-family="Arial" text-anchor="middle" fill="#00698f">
      Data Independence, Security, Concurrency Control, and Data Integrity
    </text>
  </g>
  <!-- Advantages of DBMS Section -->
  <g transform="rotate(45 210 20)" data-narration="Advantages of DBMS">
    <rect x="0" y="100" width="420" height="60" fill="#f9f9f9" rx="10" />
    <text x="210" y="130" font-size="18" font-family="Arial" text-anchor="middle" fill="#00698f">
      Improved Data Management, Increased Productivity, and Better Data Security
    </text>
  </g>
  <!-- Disadvantages of DBMS Section -->
  <g transform="rotate(45 210 0)" data-narration="Disadvantages of DBMS">
    <rect x="0" y="100" width="420" height="60" fill="#f9f9f9" rx="10" />
    <text x="210" y="130" font-size="18" font-family="Arial" text-anchor="middle" fill="#00698f">
      Complexity, High Cost, and Learning Curve
    </text>
  </g>
  <!-- Types of DBMS Section -->
  <g transform="rotate(45 210 100)" data-narration="Types of DBMS">
    <rect x="0" y="100" width="420" height="60" fill="#f9f9f9" rx="10" />
    <text x="210" y="130" font-size="18" font-family="Arial" text-anchor="middle" fill="#00698f">
      Relational and Object-Oriented DBMS
    </text>
  </g>
  <!-- Database Models Section -->
  <g transform="rotate(45 210 80)" data-narration="Database Models">
    <rect x="0" y="100" width="420" height="60" fill="#f9f9f9" rx="10" />
    <text x="210" y="130" font-size="18" font-family="Arial" text-anchor="middle" fill="#00698f">
      Relational and Object-Oriented Database Models
    </text>
  </g>
  <!-- Animation Section -->
  <animateTransform attributeName="transform" type="translate" from="0 180" to="0 180" begin="1s" dur="2s" repeatCount="indefinite" />
  <animateTransform attributeName="transform" type="rotate" from="45 210 180" to="45 210 180" begin="1.5s" dur="2s" repeatCount="indefinite" />
  <animateTransform attributeName="transform" type="translate" from="0 180" to="0 180" begin="2.5s" dur="2s" repeatCount="indefinite" />
  <!-- Footer Section -->
  <g transform="rotate(45 210 0)" data-narration="Footer">
    <rect x="0" y="300" width="420" height="100" fill="#f9f9f9" rx="10" />
    <text x="210" y="320" font-size="18" font-family="Arial" text-anchor="middle" fill="#00698f">
      Created with love for learning
    </text>
  </g>
</svg>