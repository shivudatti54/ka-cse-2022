<svg width="420" height="400" data-topic-id="3-1-to-3-10-rbt-l1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background-color: #C7E7F5; background-image: linear-gradient(to bottom, #87CEEB, #A7C9F2);">
  <title>Database Management Systems</title>
  <footer>Learn DBMS</footer>
  <rect x="15" y="15" width="390" height="350" rx="10" style="fill: #F5F5F5;"/>
  <g transform="translate(15, 15)">
    <rect x="0" y="0" width="100" height="50" rx="10" style="fill: #56B3FA;"/>
    <rect x="100" y="0" width="100" height="50" rx="10" style="fill: #4CAF50;"/>
    <rect x="200" y="0" width="100" height="50" rx="10" style="fill: #FF9800;"/>
    <g>
      <rect x="0" y="50" width="100" height="100" rx="10" style="fill: #56B3FA;"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="1" to="0" dur="2s" repeatCount="indefinite"/>
      <text x="20" y="30" font-size="16" font-family="Arial" text-anchor="middle" style="fill: white;">Data Independence</text>
      <text x="20" y="70" font-size="16" font-family="Arial" text-anchor="middle" style="fill: white;" data-narration="The ability to access data without knowing the details of the underlying database." transform="translate(0, 110) rotate(45)">Control</text>
    </g>
    <g>
      <rect x="100" y="50" width="100" height="100" rx="10" style="fill: #4CAF50;"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="1" to="0" dur="2s" repeatCount="indefinite"/>
      <text x="20" y="30" font-size="16" font-family="Arial" text-anchor="middle" style="fill: white;">Data Integrity</text>
      <text x="20" y="70" font-size="16" font-family="Arial" text-anchor="middle" style="fill: white;" data-narration="The ability of a database management system to maintain data consistency and accuracy." transform="translate(100, 110) rotate(45)">Security</text>
    </g>
    <g>
      <rect x="200" y="50" width="100" height="100" rx="10" style="fill: #FF9800;"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="1" to="0" dur="2s" repeatCount="indefinite"/>
      <text x="20" y="30" font-size="16" font-family="Arial" text-anchor="middle" style="fill: white;">Features</text>
      <text x="20" y="70" font-size="16" font-family="Arial" text-anchor="middle" style="fill: white;" data-narration="The various functionalities provided by a database management system, such as data storage, retrieval, and manipulation." transform="translate(200, 110) rotate(45)">Advantages</text>
    </g>
    <g>
      <rect x="0" y="220" width="100" height="100" rx="10" style="fill: #56B3FA;"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="1" to="0" dur="2s" repeatCount="indefinite"/>
      <text x="20" y="30" font-size="16" font-family="Arial" text-anchor="middle" style="fill: white;">Normalization</text>
      <text x="20" y="70" font-size="16" font-family="Arial" text-anchor="middle" style="fill: white;" data-narration="The process of organizing data in a database to minimize data redundancy and improve data integrity." transform="translate(0, 110) rotate(45)">Disadvantages</text>
    </g>
    <g>
      <rect x="100" y="220" width="100" height="100" rx="10" style="fill: #4CAF50;"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="1" to="0" dur="2s" repeatCount="indefinite"/>
      <text x="20" y="30" font-size="16" font-family="Arial" text-anchor="middle" style="fill: white;">Data Denormalization</text>
      <text x="20" y="70" font-size="16" font-family="Arial" text-anchor="middle" style="fill: white;" data-narration="The process of storing data in a database in a way that reduces data redundancy and improves query performance." transform="translate(100, 110) rotate(45)">Data Security</text>
    </g>
    <g>
      <rect x="200" y="220" width="100" height="100" rx="10" style="fill: #FF9800;"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="1" to="0" dur="2s" repeatCount="indefinite"/>
      <text x="20" y="30" font-size="16" font-family="Arial" text-anchor="middle" style="fill: white;">Database Transaction</text>
      <text x="20" y="70" font-size="16" font-family="Arial" text-anchor="middle" style="fill: white;" data-narration="A sequence of operations performed on a database in a single, all-or-nothing unit of work." transform="translate(200, 110) rotate(45)">Advantages and Disadvantages</text>
    </g>
  </g>
  <rect x="15" y="350" width="390" height="50" rx="10" style="fill: #56B3FA;"/>
  <text x="20" y="370" font-size="16" font-family="Arial" text-anchor="middle" style="fill: white;">Learn more about Database Management Systems</text>
</svg>