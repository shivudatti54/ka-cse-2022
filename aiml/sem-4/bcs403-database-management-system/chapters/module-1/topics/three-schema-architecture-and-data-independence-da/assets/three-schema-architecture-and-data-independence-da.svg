<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" data-topic-id="three-schema-architecture-and-data-independence">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A88DA"/>
      <stop offset="100%" stop-color="#2196F3"/>
    </linearGradient>
  </defs>
  <title>Three Schema Architecture and Data Independence</title>
  <rect x="10" y="10" width="400" height="80" fill="url(#grad)"/>
  <g transform="translate(20, 120)">
    <rect x="0" y="0" width="100" height="40" fill="#f7f7f7"/>
    <text x="10" y="15" fill="#333" font-size="16" font-family="Arial, sans-serif" font-weight="bold" data-narration="Conceptual Schema: The highest level of abstraction, representing the data entities and their relationships in a conceptual manner.">Conceptual Schema</text>
    <animateTransform attributeName="transform" type="translate" from="0 120" to="0 140" begin="0s" dur="1s" repeatCount="indefinite"/>
    <rect x="105" y="0" width="100" height="40" fill="#f7f7f7"/>
    <text x="115" y="15" fill="#333" font-size="16" font-family="Arial, sans-serif" font-weight="bold" data-narration="Logical Schema: A representation of the conceptual schema, but with a more formal and structured approach. It includes tables, fields, and relationships, and is typically represented using a relational schema diagram." data-narration-position="right">Logical Schema</text>
    <animateTransform attributeName="transform" type="translate" from="105 120" to="105 140" begin="0.5s" dur="1s" repeatCount="indefinite"/>
    <rect x="210" y="0" width="100" height="40" fill="#f7f7f7"/>
    <text x="220" y="15" fill="#333" font-size="16" font-family="Arial, sans-serif" font-weight="bold" data-narration="Physical Schema: The lowest level of abstraction, representing the actual storage and retrieval of data in the database. It includes the database's layout, including the physical storage of tables and data." data-narration-position="right">Physical Schema</text>
    <animateTransform attributeName="transform" type="translate" from="210 120" to="210 140" begin="1s" dur="1s" repeatCount="indefinite"/>
    <rect x="0" y="160" width="100" height="40" fill="#f7f7f7"/>
    <text x="10" y="165" fill="#333" font-size="16" font-family="Arial, sans-serif" font-weight="bold" data-narration="Horizontal Data Independence: The ability to change the physical storage of data without affecting the logical schema." data-narration-position="right">Horizontal Data Independence</text>
    <animateTransform attributeName="transform" type="translate" from="0 180" to="0 200" begin="2s" dur="1s" repeatCount="indefinite"/>
    <rect x="105" y="160" width="100" height="40" fill="#f7f7f7"/>
    <text x="115" y="165" fill="#333" font-size="16" font-family="Arial, sans-serif" font-weight="bold" data-narration="Vertical Data Independence: The ability to change the logical schema without affecting the physical schema." data-narration-position="right">Vertical Data Independence</text>
    <animateTransform attributeName="transform" type="translate" from="105 180" to="105 200" begin="2.5s" dur="1s" repeatCount="indefinite"/>
    <rect x="210" y="160" width="100" height="40" fill="#f7f7f7"/>
    <text x="220" y="165" fill="#333" font-size="16" font-family="Arial, sans-serif" font-weight="bold" data-narration="Conceptual Data Independence: The ability to change the conceptual schema without affecting the logical or physical schema." data-narration-position="right">Conceptual Data Independence</text>
    <animateTransform attributeName="transform" type="translate" from="210 180" to="210 200" begin="3.5s" dur="1s" repeatCount="indefinite"/>
    <rect x="0" y="280" width="400" height="120" fill="#f7f7f7"/>
    <text x="10" y="285" fill="#333" font-size="16" font-family="Arial, sans-serif" font-weight="bold" data-narration="Data Independence: The ability of a database to change without affecting the application that uses it." data-narration-position="left">Data Independence</text>
    <animateTransform attributeName="transform" type="translate" from="0 300" to="0 320" begin="4s" dur="1s" repeatCount="indefinite"/>
    <rect x="10" y="320" width="400" height="40" fill="#f7f7f7"/>
    <text x="15" y="325" fill="#333" font-size="16" font-family="Arial, sans-serif" font-weight="bold" data-narration="Conclusion: The Three Schema Architecture and Data Independence are key concepts in database design that provide flexibility and maintainability." data-narration-position="left">Conclusion</text>
    <animateTransform attributeName="transform" type="translate" from="10 330" to="10 350" begin="5s" dur="1s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 330)">
    <rect x="0" y="0" width="100" height="40" fill="#2196F3"/>
    <text x="5" y="15" fill="#fff" font-size="16" font-family="Arial, sans-serif" font-weight="bold" data-narration="Indigo:  A calming and trustworthy color that can represent professionalism." data-narration-position="left">Indigo</text>
    <animateTransform attributeName="transform" type="translate" from="0 35" to="0 55" begin="6s" dur="1s" repeatCount="indefinite"/>
    <rect x="105" y="0" width="100" height="40" fill="#F7DC6F"/>
    <text x="110" y="15" fill="#333" font-size="16" font-family="Arial, sans-serif" font-weight="bold" data-narration="Teal:  A fresh and natural color that can represent growth and harmony." data-narration-position="left">Teal</text>
    <animateTransform attributeName="transform" type="translate" from="105 35" to="105 55" begin="6.5s" dur="1s" repeatCount="indefinite"/>
    <rect x="210" y="0" width="100" height="40" fill="#FF9800"/>
    <text x="215" y="15" fill="#333" font-size="16" font-family="Arial, sans-serif" font-weight="bold" data-narration="Orange:  A vibrant and energetic color that can represent enthusiasm and creativity." data-narration-position="left">Orange</text>
    <animateTransform attributeName="transform" type="translate" from="210 35" to="210 55" begin="7.5s" dur="1s" repeatCount="indefinite"/>
    <rect x="0" y="380" width="400" height="40" fill="#f7f7f7"/>
    <text x="10" y="385" fill="#333" font-size="16" font-family="Arial, sans-serif" font-weight="bold" data-narration="Arrow markers can be used to connect concepts and data relationships in a clear and intuitive way." data-narration-position="left">Arrow markers</text>
    <animateTransform attributeName="transform" type="translate" from="0 400" to="0 420" begin="8s" dur="1s" repeatCount="indefinite"/>
  </g>
</svg>