<svg width="420" height="400" data-topic-id="database-management-system" data-slugified-topic-name="database-management-system-module-1-introduction-to-database-management-systems">

  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5E1F5" stop-opacity="1" />
      <stop offset="50%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5E1F5" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" data-narration="Background" />

  <!-- Title at top -->
  <text x="50%" y="20%" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db" data-narration="Title">
    Database Management System
  </text>

  <!-- Section 1: What is a Database Management System? -->
  <rect x="0" y="60" width="420" height="120" fill="#f9f9f9" rx="10" data-narration="Section 1: What is a Database Management System?" />
  <animate transform="rotate(0) scale(1)" begin="0s" dur="2s" repeatCount="indefinite" />
  <text x="50%" y="100%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71" data-narration="Definition: A Database Management System (DBMS) is a software system that allows you to define, create, maintain, control, and manipulate databases.">
    <tspan x="50%" y="110%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">Definition:</tspan>
    <tspan x="50%" y="120%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">A DBMS provides a set of tools and techniques to manage and control the creation, modification, and deletion of data in a database.</tspan>
  </text>

  <!-- Section 2: Characteristics of a DBMS -->
  <rect x="0" y="190" width="420" height="120" fill="#f9f9f9" rx="10" data-narration="Section 2: Characteristics of a DBMS" />
  <animate transform="rotate(90) scale(1)" begin="2s" dur="2s" repeatCount="indefinite" />
  <text x="50%" y="210%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71" data-narration="Key Characteristics:">
    <tspan x="50%" y="220%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">- Data Independence: The ability to change the physical storage of data without affecting the application that uses it.</tspan>
    <tspan x="50%" y="230%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">- Control: The ability to control access to the data and ensure data integrity.</tspan>
    <tspan x="50%" y="240%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">- Security: The ability to protect the data from unauthorized access.</tspan>
    <tspan x="50%" y="250%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">- Concurrency: The ability to allow multiple users to access the data simultaneously.</tspan>
    <tspan x="50%" y="260%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">- Autonomy: The ability to allow the database to operate independently of the application.</tspan>
  </text>

  <!-- Section 3: Types of DBMS -->
  <rect x="0" y="310" width="420" height="120" fill="#f9f9f9" rx="10" data-narration="Section 3: Types of DBMS" />
  <animate transform="rotate(180) scale(1)" begin="4s" dur="2s" repeatCount="indefinite" />
  <text x="50%" y="330%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71" data-narration="Types of DBMS:">
    <tspan x="50%" y="340%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">- Relational DBMS: Uses tables to store data and relationships to define the structure of the data.</tspan>
    <tspan x="50%" y="350%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">- Object-Oriented DBMS: Stores data as objects that contain both data and methods to manipulate that data.</tspan>
    <tspan x="50%" y="360%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">- Document-Oriented DBMS: Stores data as documents that contain structured and unstructured data.</tspan>
    <tspan x="50%" y="370%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">- Graph DBMS: Stores data as nodes and edges that define the relationships between the data.</tspan>
  </text>

  <!-- Section 4: DBMS Functions -->
  <rect x="0" y="410" width="420" height="120" fill="#f9f9f9" rx="10" data-narration="Section 4: DBMS Functions" />
  <animate transform="rotate(270) scale(1)" begin="6s" dur="2s" repeatCount="indefinite" />
  <text x="50%" y="430%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71" data-narration="Functions of a DBMS:">
    <tspan x="50%" y="440%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">- Data Definition Language (DDL): Used to define the structure of the database.</tspan>
    <tspan x="50%" y="450%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">- Data Manipulation Language (DML): Used to manipulate the data in the database.</tspan>
  </text>

  <!-- Footer -->
  <text x="50%" y="380%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db" data-narration="Footer">
    Database Management System
  </text>

</svg>