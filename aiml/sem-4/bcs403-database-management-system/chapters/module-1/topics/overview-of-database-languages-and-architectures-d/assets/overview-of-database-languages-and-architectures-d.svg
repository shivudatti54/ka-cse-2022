<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" data-topic-id="overview-of-database-languages-and-architectures-d">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10"/>
  
  <!-- Title section -->
  <g transform="translate(20, 20)">
    <text x="10" y="40" font-size="24" font-family="Arial" fill="#2E4053" data-narration="What is a Data Model?">
      Overview of Database Languages and Architectures: Data Models
    </text>
  </g>
  
  <!-- Entities section -->
  <g transform="translate(20, 80)">
    <rect x="0" y="0" width="150" height="150" fill="#87CEEB" rx="10"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#2E4053" data-narration="Entities are the objects that the database will store.">
      Entities
    </text>
    <text x="20" y="60" font-size="18" font-family="Arial" fill="#2E4053">
      Examples: customers, orders, products
    </text>
  </g>
  
  <!-- Attributes section -->
  <g transform="translate(20, 240)">
    <rect x="0" y="0" width="150" height="150" fill="#87CEEB" rx="10"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#2E4053" data-narration="Attributes are the characteristics of an entity.">
      Attributes
    </text>
    <text x="20" y="60" font-size="18" font-family="Arial" fill="#2E4053">
      Examples: customer name, order date, product price
    </text>
  </g>
  
  <!-- Relationships section -->
  <g transform="translate(20, 320)">
    <rect x="0" y="0" width="150" height="150" fill="#87CEEB" rx="10"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#2E4053" data-narration="Relationships are the connections between entities.">
      Relationships
    </text>
    <text x="20" y="60" font-size="18" font-family="Arial" fill="#2E4053">
      Examples: one-to-one, one-to-many, many-to-many relationships
    </text>
  </g>
  
  <!-- Object-Oriented Data Model section -->
  <g transform="translate(20, 160)">
    <rect x="0" y="0" width="150" height="150" fill="#87CEEB" rx="10"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#2E4053" data-narration="The Object-Oriented Data Model represents entities as objects and their relationships as methods.">
      Object-Oriented Data Model
    </text>
    <text x="20" y="60" font-size="18" font-family="Arial" fill="#2E4053">
      Examples: classes, objects, inheritance
    </text>
  </g>
  
  <!-- Entity-Relationship Data Model section -->
  <g transform="translate(20, 240)">
    <rect x="0" y="0" width="150" height="150" fill="#87CEEB" rx="10"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#2E4053" data-narration="The Entity-Relationship Data Model represents entities and their relationships as entities and relationships.">
      Entity-Relationship Data Model
    </text>
    <text x="20" y="60" font-size="18" font-family="Arial" fill="#2E4053">
      Examples: entities, relationships, associations
    </text>
  </g>
  
  <!-- Hierarchical Data Model section -->
  <g transform="translate(20, 320)">
    <rect x="0" y="0" width="150" height="150" fill="#87CEEB" rx="10"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#2E4053" data-narration="The Hierarchical Data Model represents entities as a hierarchy of relationships.">
      Hierarchical Data Model
    </text>
    <text x="20" y="60" font-size="18" font-family="Arial" fill="#2E4053">
      Examples: parent-child relationships, inheritance
    </text>
  </g>
  
  <!-- Footer section -->
  <g transform="translate(20, 380)">
    <text x="10" y="390" font-size="18" font-family="Arial" fill="#2E4053" data-narration="">
      &copy; 2023
    </text>
  </g>
</svg>