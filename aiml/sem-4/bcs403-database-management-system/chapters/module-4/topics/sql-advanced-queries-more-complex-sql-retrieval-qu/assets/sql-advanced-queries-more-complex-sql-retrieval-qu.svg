<svg width="420" height="400" data-topic-id="sql-advanced-queries-more-complex-sql-retrieval-queries" xmlns="http://www.w3.org/2000/svg">
  <desc>SQL Advanced Queries: More Complex SQL Retrieval Queries</desc>
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <g transform="translate(10, 20)">
    <text x="10" y="50" font-size="32" font-family="Arial" text-anchor="start">Subqueries</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 10" dur="1s" begin="0s"/>
    <text x="10" y="80" font-size="24" font-family="Arial" text-anchor="start">What is a subquery?</text>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 80" dur="1s" begin="0.5s"/>
    <text x="10" y="120" font-size="24" font-family="Arial" text-anchor="start">Types of subqueries</text>
    <animateTransform attributeName="transform" type="translate" from="0 40" to="0 120" dur="1s" begin="1s"/>
    <rect x="10" y="160" width="80" height="20" fill="#007bff" rx="5"/>,
    <rect x="10" y="180" width="80" height="20" fill="#64bfe6" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 160" dur="1s" begin="1.5s"/>
    <text x="10" y="200" font-size="24" font-family="Arial" text-anchor="start">Example</text>
    <animateTransform attributeName="transform" type="translate" from="0 170" to="0 200" dur="1s" begin="2s"/>
    <rect x="10" y="240" width="300" height="30" fill="#f7dc6f" rx="5"/>,
    <rect x="10" y="260" width="300" height="30" fill="#f2c464" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 230" to="0 240" dur="1s" begin="2.5s"/>
    <text x="10" y="280" font-size="24" font-family="Arial" text-anchor="start">SQL query</text>
    <animateTransform attributeName="transform" type="translate" from="0 250" to="0 280" dur="1s" begin="3.5s"/>
  </g>
  
  <g transform="translate(150, 20)">
    <text x="150" y="50" font-size="32" font-family="Arial" text-anchor="start">Aggregates</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 10" dur="1s" begin="0s"/>
    <text x="150" y="80" font-size="24" font-family="Arial" text-anchor="start">What are aggregates?</text>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 80" dur="1s" begin="0.5s"/>
    <rect x="150" y="120" width="80" height="20" fill="#007bff" rx="5"/>,
    <rect x="150" y="180" width="80" height="20" fill="#64bfe6" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 120" dur="1s" begin="1s"/>
    <text x="150" y="200" font-size="24" font-family="Arial" text-anchor="start">Types of aggregate functions</text>
    <animateTransform attributeName="transform" type="translate" from="0 170" to="0 200" dur="1s" begin="1.5s"/>
    <rect x="150" y="240" width="300" height="30" fill="#f7dc6f" rx="5"/>,
    <rect x="150" y="260" width="300" height="30" fill="#f2c464" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 230" to="0 240" dur="1s" begin="2.5s"/>
    <text x="150" y="280" font-size="24" font-family="Arial" text-anchor="start">Example</text>
    <animateTransform attributeName="transform" type="translate" from="0 250" to="0 280" dur="1s" begin="3.5s"/>
  </g>
  
  <g transform="translate(270, 20)">
    <text x="270" y="50" font-size="32" font-family="Arial" text-anchor="start">Subqueries vs Aggregates</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 10" dur="1s" begin="0s"/>
    <text x="270" y="80" font-size="24" font-family="Arial" text-anchor="start">Which one to use?</text>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 80" dur="1s" begin="0.5s"/>
    <rect x="270" y="120" width="80" height="20" fill="#007bff" rx="5"/>,
    <rect x="270" y="180" width="80" height="20" fill="#64bfe6" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 120" dur="1s" begin="1s"/>
    <text x="270" y="200" font-size="24" font-family="Arial" text-anchor="start">Example</text>
    <animateTransform attributeName="transform" type="translate" from="0 170" to="0 200" dur="1s" begin="1.5s"/>
    <rect x="270" y="240" width="300" height="30" fill="#f7dc6f" rx="5"/>,
    <rect x="270" y="260" width="300" height="30" fill="#f2c464" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 230" to="0 240" dur="1s" begin="2.5s"/>
    <text x="270" y="280" font-size="24" font-family="Arial" text-anchor="start">SQL query</text>
    <animateTransform attributeName="transform" type="translate" from="0 250" to="0 280" dur="1s" begin="3.5s"/>
  </g>
  
  <g transform="translate(320, 20)">
    <text x="320" y="50" font-size="32" font-family="Arial" text-anchor="start">Conclusion</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 10" dur="1s" begin="0s"/>
    <text x="320" y="80" font-size="24" font-family="Arial" text-anchor="start">Remember</text>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 80" dur="1s" begin="0.5s"/>
    <rect x="320" y="120" width="80" height="20" fill="#007bff" rx="5"/>,
    <rect x="320" y="180" width="80" height="20" fill="#64bfe6" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 120" dur="1s" begin="1s"/>
    <text x="320" y="200" font-size="24" font-family="Arial" text-anchor="start">Practice</text>
    <animateTransform attributeName="transform" type="translate" from="0 170" to="0 200" dur="1s" begin="1.5s"/>
    <rect x="320" y="240" width="300" height="30" fill="#f7dc6f" rx="5"/>,
    <rect x="320" y="260" width="300" height="30" fill="#f2c464" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 230" to="0 240" dur="1s" begin="2.5s"/>
    <text x="320" y="280" font-size="24" font-family="Arial" text-anchor="start">Get started</text>
    <animateTransform attributeName="transform" type="translate" from="0 250" to="0 280" dur="1s" begin="3.5s"/>
  </g>
  
  <g transform="translate(370, 20)">
    <text x="370" y="50" font-size="32" font-family="Arial" text-anchor="start">References</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 10" dur="1s" begin="0s"/>
    <text x="370" y="80" font-size="24" font-family="Arial" text-anchor="start">Get more info</text>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 80" dur="1s" begin="0.5s"/>
    <rect x="370" y="120" width="80" height="20" fill="#007bff" rx="5"/>,
    <rect x="370" y="180" width="80" height="20" fill="#64bfe6" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 120" dur="1s" begin="1s"/>
  </g>
  
  <path d="M 0 0 L 420 0 L 420 400 L 0 400 Z"/>
  
  <text x="375" y="410" font-size="32" font-family="Arial" text-anchor="start">SQL Advanced Queries: More Complex SQL Retrieval Queries</text>
</svg>