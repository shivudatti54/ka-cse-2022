<svg width="420" height="400" data-topic-id="specifying-constraints-as-assertions-and-action-triggers">
  <defs>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#73ACC5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <body>
    <rect x="20" y="20" width="380" height="360" fill="url(#backgroundGradient)"/>
    <g transform="translate(20, 20)">
      <title>Specifying Constraints as Assertions and Action Triggers</title>
      <rect x="0" y="0" width="100%" height="20" fill="#FFFFFF" stroke="#000000" rx="5"/>
      <g id="Assertions">
        <text x="10" y="30" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Assertions</text>
        <rect x="10" y="60" width="100%" height="20" fill="#F7F7F7" stroke="#AAAAAA" rx="5"/>
        <g transform="translate(10, 65)">
          <text x="0" y="0" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Data Integrity Assertions</text>
          <rect x="10" y="20" width="100%" height="20" fill="#F7F7F7" stroke="#AAAAAA" rx="5"/>
          <g transform="translate(10, 45)">
            <text x="0" y="0" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Unique constraints</text>
            <circle cx="50%" cy="50%" r="20" fill="#73ACC5" stroke="#000000" stroke-width="2"/>
            <text x="50%" y="65" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">Ensure each value is unique.</text>
          </g>
          <g transform="translate(10, 100)">
            <text x="0" y="0" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Primary key constraints</text>
            <circle cx="50%" cy="50%" r="20" fill="#73ACC5" stroke="#000000" stroke-width="2"/>
            <text x="50%" y="65" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">Ensure each row has a unique identifier.</text>
          </g>
        </g>
        <g transform="translate(10, 150)">
          <text x="0" y="0" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Data Consistency Assertions</text>
          <rect x="10" y="20" width="100%" height="20" fill="#F7F7F7" stroke="#AAAAAA" rx="5"/>
          <g transform="translate(10, 45)">
            <text x="0" y="0" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Referential integrity</text>
            <line x1="50%" y1="50%" x2="50%" y2="70%" fill="#73ACC5" stroke="#000000" stroke-width="2"/>
            <text x="50%" y="65" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">Ensure values reference existing values.</text>
          </g>
          <g transform="translate(10, 100)">
            <text x="0" y="0" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Check constraints</text>
            <circle cx="50%" cy="50%" r="20" fill="#73ACC5" stroke="#000000" stroke-width="2"/>
            <text x="50%" y="65" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">Ensure values meet criteria.</text>
          </g>
        </g>
      </g>
      <g id="Action Triggers">
        <text x="10" y="300" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Action Triggers</text>
        <rect x="10" y="320" width="100%" height="20" fill="#F7F7F7" stroke="#AAAAAA" rx="5"/>
        <g transform="translate(10, 335)">
          <text x="0" y="0" font-size="14" font-family="Arial, sans-serif" text-anchor="start">INSERT Triggers</text>
          <rect x="10" y="20" width="100%" height="20" fill="#F7F7F7" stroke="#AAAAAA" rx="5"/>
          <g transform="translate(10, 45)">
            <text x="0" y="0" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Procedural statements</text>
            <line x1="50%" y1="50%" x2="50%" y2="70%" fill="#73ACC5" stroke="#000000" stroke-width="2"/>
            <text x="50%" y="65" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">Execute in response to an event.</text>
          </g>
        </g>
        <g transform="translate(10, 150)">
          <text x="0" y="0" font-size="14" font-family="Arial, sans-serif" text-anchor="start">UPDATE Triggers</text>
          <rect x="10" y="20" width="100%" height="20" fill="#F7F7F7" stroke="#AAAAAA" rx="5"/>
          <g transform="translate(10, 45)">
            <text x="0" y="0" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Procedural statements</text>
            <line x1="50%" y1="50%" x2="50%" y2="70%" fill="#73ACC5" stroke="#000000" stroke-width="2"/>
            <text x="50%" y="65" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">Execute in response to an update.</text>
          </g>
        </g>
      </g>
      <g id="Footer">
        <rect x="10" y="360" width="100%" height="20" fill="#FFFFFF" stroke="#000000" rx="5"/>
        <text x="10" y="370" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Last Updated: 2023-02-20</text>
      </g>
    </g>
    <g transform="translate(20, 20)">
      <rect x="0" y="0" width="100%" height="20" fill="#FFFFFF" stroke="#000000" rx="5"/>
      <rect x="0" y="0" width="100%" height="20" fill="#F7F7F7" stroke="#AAAAAA" rx="5"/>
      <rect x="0" y="0" width="100%" height="20" fill="#F7F7F7" stroke="#AAAAAA" rx="5"/>
      <rect x="0" y="0" width="100%" height="20" fill="#F7F7F7" stroke="#AAAAAA" rx="5"/>
      <rect x="0" y="0" width="100%" height="20" fill="#F7F7F7" stroke="#AAAAAA" rx="5"/>
    </g>
    <g transform="translate(20, 20)">
      <a href="#">Back to Topics</a>
    </g>
  </body>
</svg>