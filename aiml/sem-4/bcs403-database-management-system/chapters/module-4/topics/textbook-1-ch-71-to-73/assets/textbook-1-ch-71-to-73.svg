    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#CCCCFF" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" style="fill: url(#backgroundGradient)"/>
  
  <!-- Title Section -->
  <section data-narration="Introduction" style="background-color: #2F4F7F; padding: 20px;">
    <h1>Database Management System Study Material</h1>
  </section>
  
  <!-- DBMS Components Section -->
  <section data-narration="Database Management System (DBMS) Components" style="background-color: #66CCCC; padding: 20px;">
    <h2>Hardware Components</h2>
    <ul>
      <li>Central Processing Unit (CPU)</li>
      <li>Memory (RAM)</li>
      <li>Storage Devices (HDD, SSD)</li>
      <li>Input/Output Devices (Keyboard, Mouse, Printer)</li>
    </ul>
    <h2>Software Components</h2>
    <ul>
      <li>Operating System</li>
      <li>Database Management System (DBMS)</li>
      <li>Application Software</li>
    </ul>
    <h2>Database Components</h2>
    <ul>
      <li>Database Schema</li>
      <li>Database Files</li>
    </ul>
  </section>
  
  <!-- DBMS Functions Section -->
  <section data-narration="Database Management System (DBMS) Functions" style="background-color: #CCCCFF; padding: 20px;">
    <h2>Data Definition</h2>
    <p>Defining the structure of the database.</p>
  </section>
  
  <!-- Entity-Relationship Model (ERM) Section -->
  <section data-narration="Entity-Relationship Model (ERM)" style="background-color: #FFC107; padding: 20px;">
    <h2>Definition</h2>
    <p>A conceptual representation of the database structure using entities and relationships.</p>
  </section>
  
  <!-- Normalization Section -->
  <section data-narration="Normalization" style="background-color: #8BC34A; padding: 20px;">
    <h2>Definition</h2>
    <p>Removing redundant data from the database.</p>
  </section>
  
  <!-- Data Modeling Section -->
  <section data-narration="Data Modeling" style="background-color: #2196F3; padding: 20px;">
    <h2>Definition</h2>
    <p>Creating a concept model of the database.</p>
  </section>
  
  <!-- Arrow Markers -->
  <path fill="none" stroke="#000" stroke-width="1" d="M 20 20 L 400 20"/>
  <path fill="none" stroke="#000" stroke-width="1" d="M 20 20 L 20 400"/>
  
