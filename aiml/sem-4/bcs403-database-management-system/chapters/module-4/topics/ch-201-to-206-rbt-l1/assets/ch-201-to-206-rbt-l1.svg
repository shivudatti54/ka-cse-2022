    <text x="15" y="60" font-size="18" font-family="Arial, sans-serif" fill="#2E4053" data-narration="The benefits of using a DBMS include:Improved data security, Increased data integrity, Reduced data redundancy, Improved data sharing, Improved data backup and recovery." text-anchor="start"/>
