    <text x="15" y="20" font-size="18" font-family="Arial, sans-serif" fill="#2E4053" data-narration="A Database Management System (DBMS) is a software that helps in the management of a database. It provides various facilities to control, maintain and modify the database." text-anchor="start"/>
    <text x="15" y="70" font-size="18" font-family="Arial, sans-serif" fill="#2E4053" data-narration="A DBMS is a software that provides a way to store, organize, and retrieve large amounts of data." text-anchor="start"/>
  </g>
