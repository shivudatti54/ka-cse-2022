      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
      <stop offset="10%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="20%" stop-color="#C5CAE9" stop-opacity="1"/>
