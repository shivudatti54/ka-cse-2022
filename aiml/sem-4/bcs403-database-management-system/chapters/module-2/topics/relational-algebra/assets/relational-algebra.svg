<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; }
      .header { font-size: 18px; font-weight: bold; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
    </style>
  </defs>

  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="Relational algebra is the formal mathematical foundation for querying and manipulating relational databases">
    <rect x="50" y="50" width="700" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="3" rx="10"/>
    <text x="400" y="90" text-anchor="middle" class="title" fill="#1976d2">Relational Algebra</text>
    <text x="400" y="115" text-anchor="middle" class="body" fill="#1976d2">Mathematical Foundation of Databases</text>
  </g>

  <!-- Step 1: Basic Operations -->
  <g id="step1" class="step" data-narration="Six fundamental operations form the core of relational algebra select project union difference product and rename">
    <rect x="150" y="160" width="500" height="60" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="400" y="185" text-anchor="middle" class="header" fill="#ff9800">Six Basic Operations</text>
    <text x="400" y="210" text-anchor="middle" class="small">σ (Select) • π (Project) • ∪ (Union) • − (Difference) • × (Product) • ρ (Rename)</text>
  </g>

  <!-- Step 2: Selection -->
  <g id="step2" class="step" data-narration="Selection operator sigma filters rows based on specified condition returning subset of tuples">
    <rect x="60" y="240" width="220" height="100" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="170" y="265" text-anchor="middle" class="header" fill="#1976d2">Selection σ</text>
    <text x="170" y="285" text-anchor="middle" class="small">Filter rows</text>
    <text x="170" y="305" text-anchor="middle" class="small">σ(age > 21)(Student)</text>
    <text x="170" y="325" text-anchor="middle" class="small">Returns students older than 21</text>
  </g>

  <!-- Step 3: Projection -->
  <g id="step3" class="step" data-narration="Projection operator pi selects specific columns removing duplicates and returning vertical subset">
    <rect x="300" y="240" width="220" height="100" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="410" y="265" text-anchor="middle" class="header" fill="#1976d2">Projection π</text>
    <text x="410" y="285" text-anchor="middle" class="small">Select columns</text>
    <text x="410" y="305" text-anchor="middle" class="small">π(name, age)(Student)</text>
    <text x="410" y="325" text-anchor="middle" class="small">Returns only name and age</text>
  </g>

  <!-- Step 4: Set Operations -->
  <g id="step4" class="step" data-narration="Set operations include union for combining relations intersection for common tuples and difference for subtraction">
    <rect x="540" y="240" width="220" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="650" y="265" text-anchor="middle" class="header" fill="#ff9800">Set Operations</text>
    <text x="650" y="285" text-anchor="middle" class="small">Union ∪</text>
    <text x="650" y="300" text-anchor="middle" class="small">Intersection ∩</text>
    <text x="650" y="315" text-anchor="middle" class="small">Difference −</text>
    <text x="650" y="330" text-anchor="middle" class="small">R ∪ S combines both</text>
  </g>

  <!-- Step 5: Cartesian Product -->
  <g id="step5" class="step" data-narration="Cartesian product operator combines every tuple from first relation with every tuple from second relation">
    <rect x="60" y="360" width="220" height="100" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="170" y="385" text-anchor="middle" class="header" fill="#388e3c">Product ×</text>
    <text x="170" y="405" text-anchor="middle" class="small">All combinations</text>
    <text x="170" y="425" text-anchor="middle" class="small">R × S</text>
    <text x="170" y="445" text-anchor="middle" class="small">Every R tuple with every S tuple</text>
  </g>

  <!-- Step 6: Join -->
  <g id="step6" class="step" data-narration="Join operation combines related tuples from two relations based on common attributes using theta join condition">
    <rect x="300" y="360" width="220" height="100" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="410" y="385" text-anchor="middle" class="header" fill="#388e3c">Join ⋈</text>
    <text x="410" y="405" text-anchor="middle" class="small">Combine on condition</text>
    <text x="410" y="425" text-anchor="middle" class="small">R ⋈ S</text>
    <text x="410" y="445" text-anchor="middle" class="small">Natural join on common attrs</text>
  </g>

  <!-- Step 7: Rename -->
  <g id="step7" class="step" data-narration="Rename operator rho changes relation or attribute names for clarity or resolving conflicts">
    <rect x="540" y="360" width="220" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="650" y="385" text-anchor="middle" class="header" fill="#ff9800">Rename ρ</text>
    <text x="650" y="405" text-anchor="middle" class="small">Change names</text>
    <text x="650" y="425" text-anchor="middle" class="small">ρ(NewName, R)</text>
    <text x="650" y="445" text-anchor="middle" class="small">Rename relation or attributes</text>
  </g>

  <!-- Step 8: Expression Example -->
  <g id="step8" class="step" data-narration="Complex queries are built by composing operations like selecting filtering then projecting specific columns">
    <rect x="100" y="480" width="600" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="3" rx="8"/>
    <text x="400" y="505" text-anchor="middle" class="header" fill="#1976d2">Query Expression Example</text>
    <text x="400" y="530" text-anchor="middle" class="small">π(name, grade) (σ(age > 20) (Student ⋈ Enrollment))</text>
    <text x="400" y="550" text-anchor="middle" class="small">Get names and grades of students over 20</text>
    <text x="400" y="565" text-anchor="middle" class="small">Read right to left: Join → Filter → Project</text>
  </g>
</svg>
