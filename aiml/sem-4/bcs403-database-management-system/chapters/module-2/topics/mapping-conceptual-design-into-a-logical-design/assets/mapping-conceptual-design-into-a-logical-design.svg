<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; }
      .header { font-size: 18px; font-weight: bold; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
    </style>
  </defs>

  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="Mapping conceptual design into logical design transforms business requirements into database structures ready for implementation">
    <rect x="50" y="50" width="700" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="3" rx="10"/>
    <text x="400" y="95" text-anchor="middle" class="title" fill="#1976d2">Mapping Conceptual to Logical Design</text>
  </g>

  <!-- Step 1: Conceptual Design (ER Model) -->
  <g id="step1" class="step" data-narration="Start with conceptual design using entity relationship model showing business entities and their relationships">
    <rect x="100" y="180" width="250" height="180" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="225" y="210" text-anchor="middle" class="header" fill="#ff9800">Conceptual Design</text>
    <text x="225" y="240" text-anchor="middle" class="body">(ER Model)</text>

    <!-- Entity examples -->
    <rect x="130" y="270" width="80" height="50" fill="#ffe0b2" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="170" y="300" text-anchor="middle" class="body">Student</text>

    <line x1="210" y1="295" x2="250" y2="295" stroke="#ff9800" stroke-width="2"/>
    <text x="230" y="290" text-anchor="middle" class="small">enrolls</text>

    <rect x="250" y="270" width="80" height="50" fill="#ffe0b2" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="290" y="300" text-anchor="middle" class="body">Course</text>
  </g>

  <!-- Step 2: Mapping Process Arrow -->
  <g id="step2" class="step" data-narration="The mapping process applies systematic rules to convert each ER component into relational schema elements">
    <path d="M 360 270 L 430 270" stroke="#1976d2" stroke-width="3" fill="none" marker-end="url(#arrowblue)"/>
    <text x="395" y="260" text-anchor="middle" class="body" fill="#1976d2">Mapping</text>
    <text x="395" y="280" text-anchor="middle" class="body" fill="#1976d2">Rules</text>
    <defs>
      <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
      </marker>
    </defs>
  </g>

  <!-- Step 3: Logical Design (Relations) -->
  <g id="step3" class="step" data-narration="Logical design produces relational tables with defined attributes, primary keys, and foreign keys">
    <rect x="450" y="180" width="280" height="180" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="590" y="210" text-anchor="middle" class="header" fill="#388e3c">Logical Design</text>
    <text x="590" y="240" text-anchor="middle" class="body">(Relational Schema)</text>

    <!-- Table examples -->
    <rect x="480" y="260" width="220" height="85" fill="#c8e6c9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="590" y="280" text-anchor="middle" class="small" font-weight="bold">Student Table</text>
    <text x="490" y="300" class="small">StuID (PK), Name, DOB</text>

    <text x="590" y="325" text-anchor="middle" class="small" font-weight="bold">Enrollment Table</text>
    <text x="490" y="340" class="small">StuID (FK), CourseID (FK)</text>
  </g>

  <!-- Step 4: Entity Mapping -->
  <g id="step4" class="step" data-narration="Step one: map each entity to a relation with all simple attributes becoming columns">
    <rect x="80" y="390" width="160" height="120" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="160" y="415" text-anchor="middle" class="header" fill="#1976d2">Entity Mapping</text>
    <text x="160" y="440" text-anchor="middle" class="small">Entity → Table</text>
    <text x="160" y="460" text-anchor="middle" class="small">Attributes → Columns</text>
    <text x="160" y="480" text-anchor="middle" class="small">Key Attribute → PK</text>
  </g>

  <!-- Step 5: Relationship Mapping -->
  <g id="step5" class="step" data-narration="Step two: map relationships based on cardinality one to one, one to many, or many to many">
    <rect x="260" y="390" width="160" height="120" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="340" y="415" text-anchor="middle" class="header" fill="#1976d2">Relationship</text>
    <text x="340" y="435" text-anchor="middle" class="small">1:1 → FK in either</text>
    <text x="340" y="455" text-anchor="middle" class="small">1:N → FK in many</text>
    <text x="340" y="475" text-anchor="middle" class="small">M:N → New table</text>
    <text x="340" y="495" text-anchor="middle" class="small">with two FKs</text>
  </g>

  <!-- Step 6: Attribute Mapping -->
  <g id="step6" class="step" data-narration="Step three: handle complex attributes composite attributes are flattened and multivalued become separate tables">
    <rect x="440" y="390" width="160" height="120" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="520" y="415" text-anchor="middle" class="header" fill="#1976d2">Attributes</text>
    <text x="520" y="435" text-anchor="middle" class="small">Composite → Flatten</text>
    <text x="520" y="455" text-anchor="middle" class="small">Multivalued → Table</text>
    <text x="520" y="475" text-anchor="middle" class="small">Derived → Calculate</text>
  </g>

  <!-- Step 7: Constraints -->
  <g id="step7" class="step" data-narration="Step four: translate all constraints including domain constraints, referential integrity, and business rules">
    <rect x="620" y="390" width="150" height="120" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="695" y="415" text-anchor="middle" class="header" fill="#ff9800">Constraints</text>
    <text x="695" y="440" text-anchor="middle" class="small">Domain rules</text>
    <text x="695" y="460" text-anchor="middle" class="small">NOT NULL</text>
    <text x="695" y="480" text-anchor="middle" class="small">UNIQUE</text>
    <text x="695" y="500" text-anchor="middle" class="small">CHECK</text>
  </g>

  <!-- Step 8: Final Schema -->
  <g id="step8" class="step" data-narration="The final logical schema is a complete set of normalized relations ready for physical database implementation">
    <rect x="150" y="530" width="500" height="50" fill="#e8f5e9" stroke="#388e3c" stroke-width="3" rx="10"/>
    <text x="400" y="560" text-anchor="middle" class="header" fill="#388e3c">Complete Logical Schema → DDL Implementation</text>
  </g>
</svg>
