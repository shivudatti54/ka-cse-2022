<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; }
      .header { font-size: 18px; font-weight: bold; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
    </style>
  </defs>

  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="Unary and binary operations are the fundamental building blocks for querying relational databases">
    <rect x="50" y="50" width="700" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="3" rx="10"/>
    <text x="400" y="95" text-anchor="middle" class="title" fill="#1976d2">Unary and Binary Operations</text>
    <text x="400" y="115" text-anchor="middle" class="body" fill="#1976d2">Building Blocks of Data Queries</text>
  </g>

  <!-- Step 1: Input Table -->
  <g id="step1" class="step" data-narration="Start with a relation or table containing structured data organized in rows and columns">
    <rect x="280" y="160" width="240" height="110" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="400" y="185" text-anchor="middle" class="header" fill="#1976d2">Input Relation</text>
    <rect x="300" y="200" width="200" height="60" fill="#bbdefb" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="400" y="220" text-anchor="middle" class="small">Student Table</text>
    <text x="320" y="240" class="small">ID | Name | Grade</text>
    <text x="320" y="255" class="small">1 | Alice | A</text>
  </g>

  <!-- Step 2: Unary Operations Left Branch -->
  <g id="step2" class="step" data-narration="Unary operations work on single relations including select to filter rows and project to choose columns">
    <path d="M 320 270 L 180 320" stroke="#ff9800" stroke-width="2" fill="none"/>
    <rect x="50" y="320" width="260" height="140" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="180" y="345" text-anchor="middle" class="header" fill="#ff9800">Unary Operations</text>

    <!-- SELECT -->
    <rect x="70" y="360" width="100" height="55" fill="#ffe0b2" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="120" y="380" text-anchor="middle" class="body">SELECT</text>
    <text x="120" y="395" text-anchor="middle" class="small">σ (sigma)</text>
    <text x="120" y="410" text-anchor="middle" class="small">Filter rows</text>

    <!-- PROJECT -->
    <rect x="190" y="360" width="100" height="55" fill="#ffe0b2" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="240" y="380" text-anchor="middle" class="body">PROJECT</text>
    <text x="240" y="395" text-anchor="middle" class="small">π (pi)</text>
    <text x="240" y="410" text-anchor="middle" class="small">Select cols</text>

    <!-- RENAME -->
    <rect x="130" y="425" width="100" height="25" fill="#ffe0b2" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="180" y="443" text-anchor="middle" class="small">RENAME ρ</text>
  </g>

  <!-- Step 3: Binary Operations Right Branch -->
  <g id="step3" class="step" data-narration="Binary operations combine two relations using union intersection difference cartesian product and join">
    <path d="M 480 270 L 620 320" stroke="#388e3c" stroke-width="2" fill="none"/>
    <rect x="490" y="320" width="260" height="140" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="620" y="345" text-anchor="middle" class="header" fill="#388e3c">Binary Operations</text>

    <!-- UNION -->
    <rect x="510" y="360" width="90" height="45" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="555" y="377" text-anchor="middle" class="small">UNION ∪</text>
    <text x="555" y="395" text-anchor="middle" class="small">Combine all</text>

    <!-- INTERSECTION -->
    <rect x="620" y="360" width="110" height="45" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="675" y="377" text-anchor="middle" class="small">INTERSECT ∩</text>
    <text x="675" y="395" text-anchor="middle" class="small">Common only</text>

    <!-- MINUS -->
    <rect x="510" y="415" width="90" height="35" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="555" y="437" text-anchor="middle" class="small">MINUS −</text>

    <!-- PRODUCT -->
    <rect x="620" y="415" width="110" height="35" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="675" y="437" text-anchor="middle" class="small">PRODUCT ×</text>
  </g>

  <!-- Step 4: SELECT Example -->
  <g id="step4" class="step" data-narration="Select example filters students where grade equals A returning only matching rows">
    <rect x="50" y="480" width="150" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="125" y="500" text-anchor="middle" class="body" fill="#ff9800">σ Example</text>
    <text x="125" y="520" text-anchor="middle" class="small">σ(Grade='A')</text>
    <text x="125" y="540" text-anchor="middle" class="small">Returns rows</text>
    <text x="125" y="555" text-anchor="middle" class="small">with A grade</text>
  </g>

  <!-- Step 5: PROJECT Example -->
  <g id="step5" class="step" data-narration="Project example selects only name and grade columns removing other attributes">
    <rect x="220" y="480" width="150" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="295" y="500" text-anchor="middle" class="body" fill="#ff9800">π Example</text>
    <text x="295" y="520" text-anchor="middle" class="small">π(Name,Grade)</text>
    <text x="295" y="540" text-anchor="middle" class="small">Returns only</text>
    <text x="295" y="555" text-anchor="middle" class="small">2 columns</text>
  </g>

  <!-- Step 6: JOIN Operation -->
  <g id="step6" class="step" data-narration="Join combines related data from two tables based on matching column values">
    <rect x="430" y="480" width="150" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="505" y="500" text-anchor="middle" class="body" fill="#388e3c">JOIN ⋈</text>
    <text x="505" y="520" text-anchor="middle" class="small">Student ⋈ Course</text>
    <text x="505" y="540" text-anchor="middle" class="small">Match on</text>
    <text x="505" y="555" text-anchor="middle" class="small">common key</text>
  </g>

  <!-- Step 7: Composition -->
  <g id="step7" class="step" data-narration="Operations can be composed together to create complex queries by nesting multiple operations">
    <rect x="600" y="480" width="150" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="675" y="505" text-anchor="middle" class="body" fill="#1976d2">Composition</text>
    <text x="675" y="530" text-anchor="middle" class="small">π(σ(R)) ∪ S</text>
    <text x="675" y="550" text-anchor="middle" class="small">Nested ops</text>
  </g>
</svg>
