<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; }
      .header { font-size: 18px; font-weight: bold; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
    </style>
  </defs>

  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="Relational model constraints enforce data integrity and consistency ensuring database reliability and accuracy">
    <rect x="50" y="50" width="700" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="3" rx="10"/>
    <text x="400" y="90" text-anchor="middle" class="title" fill="#1976d2">Relational Model Constraints</text>
    <text x="400" y="115" text-anchor="middle" class="body" fill="#1976d2">Enforcing Data Integrity</text>
  </g>

  <!-- Step 1: Domain Constraints -->
  <g id="step1" class="step" data-narration="Domain constraints define allowable values for each attribute restricting data type and range">
    <rect x="60" y="160" width="330" height="110" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="225" y="185" text-anchor="middle" class="header" fill="#ff9800">Domain Constraints</text>
    <text x="225" y="210" text-anchor="middle" class="small">Data Type + Value Range</text>

    <rect x="80" y="225" width="130" height="35" fill="#ffe0b2" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="145" y="248" text-anchor="middle" class="small">Age: Integer 1-150</text>

    <rect x="230" y="225" width="140" height="35" fill="#ffe0b2" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="300" y="248" text-anchor="middle" class="small">Email: VARCHAR(50)</text>
  </g>

  <!-- Step 2: Key Constraints -->
  <g id="step2" class="step" data-narration="Key constraints ensure uniqueness identifying each tuple with unique values for key attributes">
    <rect x="410" y="160" width="330" height="110" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="575" y="185" text-anchor="middle" class="header" fill="#388e3c">Key Constraints</text>
    <text x="575" y="210" text-anchor="middle" class="small">Uniqueness Guarantee</text>

    <rect x="430" y="225" width="130" height="35" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="495" y="248" text-anchor="middle" class="small">Superkey</text>

    <rect x="580" y="225" width="140" height="35" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="650" y="248" text-anchor="middle" class="small">Candidate Key</text>
  </g>

  <!-- Step 3: Entity Integrity -->
  <g id="step3" class="step" data-narration="Entity integrity constraint requires primary key to be unique and not null for every tuple">
    <rect x="60" y="290" width="330" height="100" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="225" y="315" text-anchor="middle" class="header" fill="#1976d2">Entity Integrity</text>
    <text x="225" y="340" text-anchor="middle" class="body">PRIMARY KEY ≠ NULL</text>
    <text x="225" y="360" text-anchor="middle" class="small">Every tuple must have</text>
    <text x="225" y="378" text-anchor="middle" class="small">unique non-null identifier</text>
  </g>

  <!-- Step 4: Referential Integrity -->
  <g id="step4" class="step" data-narration="Referential integrity ensures foreign key values match existing primary key values in referenced table">
    <rect x="410" y="290" width="330" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="575" y="315" text-anchor="middle" class="header" fill="#ff9800">Referential Integrity</text>
    <text x="575" y="340" text-anchor="middle" class="body">FOREIGN KEY → PRIMARY KEY</text>
    <text x="575" y="360" text-anchor="middle" class="small">FK must reference existing PK</text>
    <text x="575" y="378" text-anchor="middle" class="small">or be NULL (if allowed)</text>
  </g>

  <!-- Step 5: Example Tables -->
  <g id="step5" class="step" data-narration="Example shows student table with primary key and enrollment table with foreign key referencing student">
    <rect x="100" y="410" width="250" height="140" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="225" y="435" text-anchor="middle" class="header" fill="#1976d2">Student Table</text>

    <rect x="120" y="450" width="210" height="90" fill="#bbdefb" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="140" y="470" class="small" font-weight="bold">StuID (PK)</text>
    <text x="250" y="470" class="small">Name</text>
    <line x1="130" y1="475" x2="320" y2="475" stroke="#1976d2" stroke-width="1"/>
    <text x="140" y="490" class="small">101</text>
    <text x="250" y="490" class="small">Alice</text>
    <text x="140" y="505" class="small">102</text>
    <text x="250" y="505" class="small">Bob</text>
    <text x="140" y="520" class="small">103</text>
    <text x="250" y="520" class="small">Carol</text>
  </g>

  <!-- Step 6: Foreign Key Table -->
  <g id="step6" class="step" data-narration="Enrollment table uses foreign key to maintain referential integrity linking to valid student records">
    <rect x="400" y="410" width="320" height="140" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="560" y="435" text-anchor="middle" class="header" fill="#388e3c">Enrollment Table</text>

    <rect x="420" y="450" width="280" height="90" fill="#c8e6c9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="440" y="470" class="small" font-weight="bold">StuID (FK)</text>
    <text x="540" y="470" class="small">CourseID</text>
    <text x="640" y="470" class="small">Grade</text>
    <line x1="430" y1="475" x2="690" y2="475" stroke="#388e3c" stroke-width="1"/>
    <text x="440" y="490" class="small">101</text>
    <text x="540" y="490" class="small">CS101</text>
    <text x="640" y="490" class="small">A</text>
    <text x="440" y="505" class="small">102</text>
    <text x="540" y="505" class="small">CS102</text>
    <text x="640" y="505" class="small">B</text>
    <text x="440" y="520" class="small">101</text>
    <text x="540" y="520" class="small">CS103</text>
    <text x="640" y="520" class="small">A</text>

    <path d="M 350 485 L 420 485" stroke="#ff9800" stroke-width="2" fill="none" marker-end="url(#arroworange3)"/>
    <text x="385" y="475" text-anchor="middle" class="small" fill="#ff9800">FK links</text>

    <defs>
      <marker id="arroworange3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
      </marker>
    </defs>
  </g>

  <!-- Step 7: Constraint Violation -->
  <g id="step7" class="step" data-narration="Constraints prevent invalid operations like inserting foreign key with no matching primary key or null primary key">
    <rect x="150" y="565" width="500" height="25" fill="#ffebee" stroke="#d32f2f" stroke-width="2" rx="5"/>
    <text x="400" y="582" text-anchor="middle" class="small" fill="#d32f2f">❌ Cannot insert FK=999 (no matching PK) or PK=NULL</text>
  </g>
</svg>
