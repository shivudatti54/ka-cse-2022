<svg version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xml:space="preserve" width="420" height="400">
  <title>Database Management System</title>
  <desc>DBMS Educational Diagram</desc>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <style>
    .rect {
      fill: url(#grad);
      stroke: #000;
      stroke-width: 2;
      stroke-linecap: round;
    }
    .text {
      font-size: 16px;
      font-family: Arial, sans-serif;
    }
  </style>
  <g id="Group_1">
    <rect x="10" y="10" width="400" height="60" class="rect"/>
    <text x="15" y="40" class="text" data-narration="Module Overview">
      <tspan x="15" y="40">Module Title:</tspan>
      <tspan x="90" y="40">Database Management System</tspan>
      <tspan x="15" y="65">Number of Hours:</tspan>
      <tspan x="90" y="65">8</tspan>
    </text>
    <text x="15" y="120" class="text" data-narration="Key Features of DBMS">
      <tspan x="15" y="120">Data Storage:</tspan>
      <tspan x="90" y="120">Provides a structured way to store and manage data.</tspan>
      <tspan x="15" y="145">Data Retrieval:</tspan>
      <tspan x="90" y="145">Enable users to access and retrieve data from the database.</tspan>
      <tspan x="15" y="170">Data Manipulation:</tspan>
      <tspan x="90" y="170">Allow users to modify, add, or delete data from the database.</tspan>
      <tspan x="15" y="195">Data Security:</tspan>
      <tspan x="90" y="195">Ensures the integrity and confidentiality of data.</tspan>
    </text>
    <rect x="10" y="270" width="400" height="60" class="rect"/>
    <text x="15" y="310" class="text" data-narration="Types of DBMS">
      <tspan x="15" y="310">Relational DBMS:</tspan>
      <tspan x="90" y="310">Uses a relational model to store and manage data.</tspan>
      <tspan x="15" y="335">Object-Oriented DBMS:</tspan>
      <tspan x="90" y="335">Uses an object-oriented model to store and manage data.</tspan>
      <tspan x="15" y="360">Hierarchical DBMS:</tspan>
      <tspan x="90" y="360">Uses a hierarchical model to store and manage data.</tspan>
      <tspan x="15" y="385">Network DBMS:</tspan>
      <tspan x="90" y="385">Uses a network model to store and manage data.</tspan>
      <tspan x="15" y="410">Graph DBMS:</tspan>
      <tspan x="90" y="410">Uses a graph model to store and manage data.</tspan>
    </text>
    <rect x="10" y="370" width="400" height="60" class="rect"/>
    <text x="15" y="410" class="text" data-narration="Characteristics of DBMS">
      <tspan x="15" y="410">Scalability:</tspan>
      <tspan x="90" y="410">DBMS should be able to handle large volumes of data and scale up or down as needed.</tspan>
      <tspan x="15" y="425">Flexibility:</tspan>
      <tspan x="90" y="425">DBMS should be flexible and adaptable to changing requirements.</tspan>
    </text>
    <rect x="10" y="50" width="400" height="20" class="rect"/>
    <g id="Group_2">
      <line x1="15" y1="70" x2="15" y2="90" class="arrow"/>
      <line x1="15" y1="120" x2="15" y2="140" class="arrow"/>
      <line x1="15" y1="170" x2="15" y2="190" class="arrow"/>
      <line x1="15" y1="220" x2="15" y2="240" class="arrow"/>
      <circle cx="15" cy="50" r="10" class="marker"/>
      <circle cx="15" cy="120" r="10" class="marker"/>
      <circle cx="15" cy="170" r="10" class="marker"/>
      <circle cx="15" cy="220" r="10" class="marker"/>
    </g>
    <rect x="10" y="390" width="400" height="40" class="rect"/>
    <text x="15" y="420" class="text" data-narration="RBT L1">
      <tspan x="15" y="420">RBT L1</tspan>
    </text>
  </g>
</svg>