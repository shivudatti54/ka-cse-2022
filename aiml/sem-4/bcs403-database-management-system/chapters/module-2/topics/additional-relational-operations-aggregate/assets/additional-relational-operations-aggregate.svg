<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; }
      .header { font-size: 18px; font-weight: bold; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
    </style>
  </defs>

  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="Aggregate functions perform calculations on sets of data to produce summary statistics and insights">
    <rect x="50" y="50" width="700" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="3" rx="10"/>
    <text x="400" y="90" text-anchor="middle" class="title" fill="#1976d2">Aggregate Operations</text>
    <text x="400" y="115" text-anchor="middle" class="body" fill="#1976d2">Summarizing Data</text>
  </g>

  <!-- Step 1: COUNT Function -->
  <g id="step1" class="step" data-narration="COUNT function returns the number of rows matching specified criteria or total rows">
    <rect x="60" y="160" width="140" height="95" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="130" y="185" text-anchor="middle" class="header" fill="#ff9800">COUNT()</text>
    <text x="130" y="210" text-anchor="middle" class="small">Number of rows</text>
    <text x="130" y="230" text-anchor="middle" class="small">COUNT(*)</text>
    <text x="130" y="245" text-anchor="middle" class="small">COUNT(column)</text>
  </g>

  <!-- Step 2: SUM Function -->
  <g id="step2" class="step" data-narration="SUM function calculates the total of numeric values in a column">
    <rect x="220" y="160" width="140" height="95" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="290" y="185" text-anchor="middle" class="header" fill="#ff9800">SUM()</text>
    <text x="290" y="210" text-anchor="middle" class="small">Total of values</text>
    <text x="290" y="230" text-anchor="middle" class="small">SUM(price)</text>
    <text x="290" y="245" text-anchor="middle" class="small">Returns sum</text>
  </g>

  <!-- Step 3: AVG Function -->
  <g id="step3" class="step" data-narration="AVG function computes the arithmetic mean or average of numeric values">
    <rect x="380" y="160" width="140" height="95" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="450" y="185" text-anchor="middle" class="header" fill="#388e3c">AVG()</text>
    <text x="450" y="210" text-anchor="middle" class="small">Average value</text>
    <text x="450" y="230" text-anchor="middle" class="small">AVG(salary)</text>
    <text x="450" y="245" text-anchor="middle" class="small">Returns mean</text>
  </g>

  <!-- Step 4: MAX Function -->
  <g id="step4" class="step" data-narration="MAX function finds the largest value in a column">
    <rect x="540" y="160" width="100" height="95" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="590" y="185" text-anchor="middle" class="header" fill="#388e3c">MAX()</text>
    <text x="590" y="210" text-anchor="middle" class="small">Largest</text>
    <text x="590" y="230" text-anchor="middle" class="small">value</text>
  </g>

  <!-- Step 5: MIN Function -->
  <g id="step5" class="step" data-narration="MIN function finds the smallest value in a column">
    <rect x="660" y="160" width="100" height="95" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="710" y="185" text-anchor="middle" class="header" fill="#388e3c">MIN()</text>
    <text x="710" y="210" text-anchor="middle" class="small">Smallest</text>
    <text x="710" y="230" text-anchor="middle" class="small">value</text>
  </g>

  <!-- Step 6: Example Query -->
  <g id="step6" class="step" data-narration="Example shows aggregate query calculating total sales count of orders and average order value">
    <rect x="100" y="280" width="600" height="100" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="400" y="305" text-anchor="middle" class="header" fill="#1976d2">Example Query</text>

    <rect x="120" y="320" width="560" height="50" fill="#bbdefb" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="400" y="340" text-anchor="middle" class="small" font-family="monospace">SELECT COUNT(*) as TotalOrders,</text>
    <text x="400" y="355" text-anchor="middle" class="small" font-family="monospace">SUM(amount) as TotalSales, AVG(amount) as AvgSale</text>
    <text x="400" y="370" text-anchor="middle" class="small" font-family="monospace">FROM Orders;</text>
  </g>

  <!-- Step 7: GROUP BY -->
  <g id="step7" class="step" data-narration="GROUP BY partitions data into groups applying aggregate functions to each group separately">
    <rect x="100" y="400" width="280" height="90" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="240" y="425" text-anchor="middle" class="header" fill="#ff9800">GROUP BY</text>
    <text x="240" y="450" text-anchor="middle" class="small">Partition data into groups</text>
    <text x="240" y="470" text-anchor="middle" class="small">Apply aggregates per group</text>
  </g>

  <!-- Step 8: HAVING Clause -->
  <g id="step8" class="step" data-narration="HAVING clause filters groups after aggregation based on aggregate function results">
    <rect x="400" y="400" width="300" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="550" y="425" text-anchor="middle" class="header" fill="#388e3c">HAVING Clause</text>
    <text x="550" y="450" text-anchor="middle" class="small">Filter groups after aggregation</text>
    <text x="550" y="470" text-anchor="middle" class="small">HAVING SUM(amount) > 1000</text>
  </g>

  <!-- Step 9: Complete Example -->
  <g id="step9" class="step" data-narration="Complete example groups sales by region and filters regions with total sales exceeding ten thousand">
    <rect x="100" y="510" width="600" height="70" fill="#e8f5e9" stroke="#388e3c" stroke-width="3" rx="8"/>
    <text x="400" y="535" text-anchor="middle" class="body" fill="#388e3c">Complete Example</text>
    <text x="400" y="555" text-anchor="middle" class="small">SELECT region, SUM(sales) FROM Orders</text>
    <text x="400" y="572" text-anchor="middle" class="small">GROUP BY region HAVING SUM(sales) > 10000;</text>
  </g>
</svg>
