<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; }
      .header { font-size: 18px; font-weight: bold; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
    </style>
  </defs>

  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="Relational model organizes data into tables with rows and columns forming the foundation of modern databases">
    <rect x="50" y="50" width="700" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="3" rx="10"/>
    <text x="400" y="90" text-anchor="middle" class="title" fill="#1976d2">Relational Model Concepts</text>
    <text x="400" y="115" text-anchor="middle" class="body" fill="#1976d2">Foundation of Database Systems</text>
  </g>

  <!-- Step 1: Relation/Table -->
  <g id="step1" class="step" data-narration="A relation or table is a collection of related data organized in rows and columns with a unique name">
    <rect x="100" y="160" width="280" height="180" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="240" y="185" text-anchor="middle" class="header" fill="#ff9800">Relation (Table)</text>

    <rect x="120" y="200" width="240" height="130" fill="#ffe0b2" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="240" y="220" text-anchor="middle" class="small" font-weight="bold">Student Table</text>
    <line x1="130" y1="225" x2="350" y2="225" stroke="#ff9800" stroke-width="1"/>

    <!-- Header row -->
    <text x="140" y="240" class="small" font-weight="bold">ID</text>
    <text x="200" y="240" class="small" font-weight="bold">Name</text>
    <text x="280" y="240" class="small" font-weight="bold">Age</text>
    <line x1="130" y1="245" x2="350" y2="245" stroke="#ff9800" stroke-width="1"/>

    <!-- Data rows -->
    <text x="140" y="260" class="small">1</text>
    <text x="200" y="260" class="small">Alice</text>
    <text x="280" y="260" class="small">20</text>

    <text x="140" y="275" class="small">2</text>
    <text x="200" y="275" class="small">Bob</text>
    <text x="280" y="275" class="small">22</text>

    <text x="140" y="290" class="small">3</text>
    <text x="200" y="290" class="small">Carol</text>
    <text x="280" y="290" class="small">21</text>

    <text x="240" y="310" text-anchor="middle" class="small">Rows = Tuples</text>
    <text x="240" y="325" text-anchor="middle" class="small">Columns = Attributes</text>
  </g>

  <!-- Step 2: Attributes -->
  <g id="step2" class="step" data-narration="Attributes are columns representing properties or characteristics with specific data types and domains">
    <rect x="420" y="160" width="320" height="100" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="580" y="185" text-anchor="middle" class="header" fill="#388e3c">Attributes (Columns)</text>

    <rect x="440" y="200" width="130" height="50" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="505" y="220" text-anchor="middle" class="small" font-weight="bold">ID: Integer</text>
    <text x="505" y="237" text-anchor="middle" class="small">Domain: 1-9999</text>

    <rect x="590" y="200" width="130" height="50" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="655" y="220" text-anchor="middle" class="small" font-weight="bold">Name: String</text>
    <text x="655" y="237" text-anchor="middle" class="small">Domain: A-Z</text>
  </g>

  <!-- Step 3: Tuples -->
  <g id="step3" class="step" data-narration="Tuples are rows representing individual records or instances each containing values for all attributes">
    <rect x="420" y="280" width="320" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="580" y="305" text-anchor="middle" class="header" fill="#1976d2">Tuples (Rows)</text>
    <text x="580" y="325" text-anchor="middle" class="small">Each row = one complete record</text>
  </g>

  <!-- Step 4: Degree -->
  <g id="step4" class="step" data-narration="Degree is the number of attributes or columns in a relation defining its structure">
    <rect x="100" y="360" width="180" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="190" y="385" text-anchor="middle" class="header" fill="#ff9800">Degree</text>
    <text x="190" y="405" text-anchor="middle" class="small">Number of columns</text>
    <text x="190" y="425" text-anchor="middle" class="small">Student has degree 3</text>
  </g>

  <!-- Step 5: Cardinality -->
  <g id="step5" class="step" data-narration="Cardinality is the number of tuples or rows in a relation indicating table size">
    <rect x="310" y="360" width="180" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="400" y="385" text-anchor="middle" class="header" fill="#ff9800">Cardinality</text>
    <text x="400" y="405" text-anchor="middle" class="small">Number of rows</text>
    <text x="400" y="425" text-anchor="middle" class="small">Student has 3 tuples</text>
  </g>

  <!-- Step 6: Domain -->
  <g id="step6" class="step" data-narration="Domain defines the set of allowed values for each attribute ensuring data integrity">
    <rect x="520" y="360" width="180" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="610" y="385" text-anchor="middle" class="header" fill="#388e3c">Domain</text>
    <text x="610" y="405" text-anchor="middle" class="small">Set of valid values</text>
    <text x="610" y="425" text-anchor="middle" class="small">Age: 1-150</text>
  </g>

  <!-- Step 7: Relational Schema -->
  <g id="step7" class="step" data-narration="Relational schema is the logical structure definition showing table name and attributes with data types">
    <rect x="100" y="460" width="600" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="400" y="485" text-anchor="middle" class="header" fill="#1976d2">Relational Schema</text>
    <text x="400" y="508" text-anchor="middle" class="small">Student(ID: Integer, Name: String, Age: Integer)</text>
  </g>

  <!-- Step 8: Key Properties -->
  <g id="step8" class="step" data-narration="Relational model ensures no duplicate rows order independence and atomic values for all attributes">
    <rect x="150" y="540" width="500" height="50" fill="#e8f5e9" stroke="#388e3c" stroke-width="3" rx="10"/>
    <text x="400" y="570" text-anchor="middle" class="body" fill="#388e3c">No duplicates • Order independent • Atomic values</text>
  </g>
</svg>
