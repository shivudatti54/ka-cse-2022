<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; }
      .header { font-size: 18px; font-weight: bold; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
    </style>
  </defs>

  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="Grouping in databases allows aggregation and summarization of data into meaningful categories for analysis">
    <rect x="50" y="50" width="700" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="3" rx="10"/>
    <text x="400" y="90" text-anchor="middle" class="title" fill="#1976d2">GROUP BY in SQL</text>
    <text x="400" y="115" text-anchor="middle" class="body" fill="#1976d2">Aggregating Data into Groups</text>
  </g>

  <!-- Step 1: Raw Data -->
  <g id="step1" class="step" data-narration="Start with raw table data containing individual records that need to be summarized">
    <rect x="100" y="160" width="250" height="160" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="225" y="185" text-anchor="middle" class="header" fill="#1976d2">Raw Data Table</text>

    <rect x="120" y="200" width="210" height="110" fill="#bbdefb" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="225" y="220" text-anchor="middle" class="small" font-weight="bold">Sales Table</text>
    <text x="130" y="240" class="small">Product | Region | Amount</text>
    <line x1="130" y1="245" x2="320" y2="245" stroke="#1976d2" stroke-width="1"/>
    <text x="130" y="260" class="small">Laptop | North | 1200</text>
    <text x="130" y="275" class="small">Mouse | North | 25</text>
    <text x="130" y="290" class="small">Laptop | South | 1100</text>
    <text x="130" y="305" class="small">Mouse | South | 30</text>
  </g>

  <!-- Step 2: GROUP BY Clause -->
  <g id="step2" class="step" data-narration="Apply GROUP BY clause to partition rows into groups based on specified column values">
    <path d="M 350 240 L 430 240" stroke="#ff9800" stroke-width="3" fill="none" marker-end="url(#arroworange)"/>
    <text x="390" y="225" text-anchor="middle" class="body" fill="#ff9800">GROUP BY</text>
    <text x="390" y="260" text-anchor="middle" class="small" fill="#ff9800">Region</text>
    <defs>
      <marker id="arroworange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
      </marker>
    </defs>
  </g>

  <!-- Step 3: Grouped Data -->
  <g id="step3" class="step" data-narration="Data is partitioned into distinct groups where each group shares the same grouping column value">
    <rect x="450" y="160" width="280" height="160" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="590" y="185" text-anchor="middle" class="header" fill="#ff9800">Grouped Data</text>

    <!-- North Group -->
    <rect x="470" y="200" width="120" height="55" fill="#ffe0b2" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="530" y="220" text-anchor="middle" class="small" font-weight="bold">North Group</text>
    <text x="480" y="237" class="small">Laptop: 1200</text>
    <text x="480" y="250" class="small">Mouse: 25</text>

    <!-- South Group -->
    <rect x="600" y="200" width="120" height="55" fill="#ffe0b2" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="660" y="220" text-anchor="middle" class="small" font-weight="bold">South Group</text>
    <text x="610" y="237" class="small">Laptop: 1100</text>
    <text x="610" y="250" class="small">Mouse: 30</text>
  </g>

  <!-- Step 4: Aggregate Functions -->
  <g id="step4" class="step" data-narration="Apply aggregate functions to each group to calculate summary statistics like count sum average max and min">
    <rect x="150" y="350" width="500" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="400" y="375" text-anchor="middle" class="header" fill="#388e3c">Aggregate Functions</text>

    <text x="200" y="400" class="small" font-weight="bold">COUNT()</text>
    <text x="200" y="415" class="small">Number of rows</text>

    <text x="310" y="400" class="small" font-weight="bold">SUM()</text>
    <text x="310" y="415" class="small">Total value</text>

    <text x="410" y="400" class="small" font-weight="bold">AVG()</text>
    <text x="410" y="415" class="small">Average</text>

    <text x="510" y="400" class="small" font-weight="bold">MAX()</text>
    <text x="510" y="415" class="small">Maximum</text>

    <text x="600" y="400" class="small" font-weight="bold">MIN()</text>
    <text x="600" y="415" class="small">Minimum</text>
  </g>

  <!-- Step 5: Result with Aggregates -->
  <g id="step5" class="step" data-narration="Each group produces one result row with the grouping column and calculated aggregate values">
    <rect x="200" y="450" width="400" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="400" y="475" text-anchor="middle" class="header" fill="#388e3c">Aggregated Results</text>

    <rect x="220" y="490" width="360" height="40" fill="#c8e6c9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="230" y="507" class="small">Region | Total_Sales | Avg_Sales</text>
    <line x1="230" y1="512" x2="570" y2="512" stroke="#388e3c" stroke-width="1"/>
    <text x="230" y="527" class="small">North  | 1225        | 612.5</text>
  </g>

  <!-- Step 6: HAVING Clause -->
  <g id="step6" class="step" data-narration="Use HAVING clause to filter groups after aggregation based on aggregate function results">
    <rect x="100" y="555" width="300" height="35" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="250" y="577" text-anchor="middle" class="body" fill="#ff9800">HAVING Total_Sales > 1000</text>
  </g>

  <!-- Step 7: Final Result -->
  <g id="step7" class="step" data-narration="Final result shows only groups that meet the HAVING condition producing filtered summary data">
    <rect x="420" y="555" width="280" height="35" fill="#e8f5e9" stroke="#388e3c" stroke-width="3" rx="5"/>
    <text x="560" y="577" text-anchor="middle" class="body" fill="#388e3c">Filtered Summary Results</text>
  </g>
</svg>
