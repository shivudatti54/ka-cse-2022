<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="database-management-system-module-51-to-53" data-slug="database-management-system-module-51-to-53">
  <style>
    /* Add some basic styling */
    text {
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    
    .section {
      margin-bottom: 20px;
    }
    
    .section h2 {
      margin-top: 0;
    }
  </style>
  <title>Database Management System Module 51 to 53</title>
  <footer>Copyright 2023</footer>
  
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64BFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0097A7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#grad)"/>
  
  <!-- Section 1: Database Concepts -->
  <section class="section" data-narration="Database Concepts">
    <h2>Database Concepts</h2>
    <p id="database-concepts" data-topic-id="database-management-system-module-51-to-53-database-concepts">A database is a collection of organized data that is stored in a way that allows for efficient retrieval and manipulation.</p>
  </section>
  
  <!-- Section 2: Database Management System (DBMS) -->
  <section class="section" data-narration="Database Management System (DBMS)">
    <h2>Database Management System (DBMS)</h2>
    <p id="dbms" data-topic-id="database-management-system-module-51-to-53-database-management-system-dbms">A software system that allows users to create, maintain, and manipulate databases.</p>
  </section>
  
  <!-- Section 3: Database Schema -->
  <section class="section" data-narration="Database Schema">
    <h2>Database Schema</h2>
    <p id="databaseschema" data-topic-id="database-management-system-module-51-to-53-databaseschema">The overall structure of a database, including the relationships between different tables.</p>
  </section>
  
  <!-- Section 4: Data Types -->
  <section class="section" data-narration="Data Types">
    <h2>Data Types</h2>
    <p id="datatypes" data-topic-id="database-management-system-module-51-to-53-datatype">The categories into which data is divided, such as integers, strings, and dates.</p>
  </section>
  
  <!-- Section 5: Database Entities -->
  <section class="section" data-narration="Database Entities">
    <h2>Database Entities</h2>
    <p id="databaseentities" data-topic-id="database-management-system-module-51-to-53-databaseentities">The objects that are represented in a database, such as customers, orders, and products.</p>
  </section>
  
  <!-- Section 6: Database Types -->
  <section class="section" data-narration="Database Types">
    <h2>Database Types</h2>
    <p id="database-types" data-topic-id="database-management-system-module-51-to-53-database-types">A database type refers to the way in which data is organized and stored.</p>
  </section>
  
  <!-- Section 7: Relational Database -->
  <section class="section" data-narration="Relational Database">
    <h2>Relational Database</h2>
    <p id="relational-database" data-topic-id="database-management-system-module-51-to-53-relational-database">A database that stores data in tables with defined relationships between them.</p>
  </section>
  
  <!-- Section 8: NoSQL Database -->
  <section class="section" data-narration="NoSQL Database">
    <h2>NoSQL Database</h2>
    <p id="nosql-database" data-topic-id="database-management-system-module-51-to-53-nosql-database">A database that stores data in a variety of formats, such as key-value pairs, documents, or graphs.</p>
  </section>
  
  <!-- Section 9: Object-Oriented Database -->
  <section class="section" data-narration="Object-Oriented Database">
    <h2>Object-Oriented Database</h2>
    <p id="object-oriented-database" data-topic-id="database-management-system-module-51-to-53-object-oriented-database">A database that stores data in the form of objects, which are instances of classes.</p>
  </section>
  
  <!-- Animation -->
  <animate id="animation" attributeName="opacity" begin="0s" duration="5s" repeatCount="indefinite">
    <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" dur="5s" repeatCount="indefinite"/>
  </animate>
  
  <script>
    // Add event listeners to the sections
    const sections = document.querySelectorAll('.section');
    sections.forEach((section) => {
      section.addEventListener('mouseover', () => {
        const narration = section.getAttribute('data-narration');
        document.getElementById(narration).style.display = 'block';
      });
      
      section.addEventListener('mouseout', () => {
        const narration = section.getAttribute('data-narration');
        document.getElementById(narration).style.display = 'none';
      });
    });
  </script>
</svg>