<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; }
      .header { font-size: 18px; font-weight: bold; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
    </style>
  </defs>

  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="ER to relational mapping transforms conceptual entity relationship diagrams into implementable relational database schemas">
    <rect x="50" y="50" width="700" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="3" rx="10"/>
    <text x="400" y="90" text-anchor="middle" class="title" fill="#1976d2">ER-to-Relational Mapping</text>
    <text x="400" y="115" text-anchor="middle" class="body" fill="#1976d2">From Conceptual to Logical Design</text>
  </g>

  <!-- Step 1: ER Model Input -->
  <g id="step1" class="step" data-narration="Begin with entity relationship model showing entities attributes and relationships from conceptual design">
    <rect x="80" y="160" width="200" height="140" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="180" y="185" text-anchor="middle" class="header" fill="#ff9800">ER Model</text>

    <!-- Entity -->
    <rect x="120" y="200" width="120" height="50" fill="#ffe0b2" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="180" y="230" text-anchor="middle" class="body">Entity</text>

    <!-- Relationship -->
    <path d="M 140 255 L 180 270 L 220 255 L 180 240 Z" fill="#ffe0b2" stroke="#ff9800" stroke-width="2"/>
    <text x="180" y="260" text-anchor="middle" class="small">Relation</text>
  </g>

  <!-- Step 2: Mapping Rules -->
  <g id="step2" class="step" data-narration="Apply systematic mapping rules to convert each ER component into relational tables with proper keys">
    <rect x="310" y="180" width="180" height="100" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="400" y="205" text-anchor="middle" class="header" fill="#1976d2">Mapping Rules</text>
    <text x="400" y="230" text-anchor="middle" class="small">• Entity → Table</text>
    <text x="400" y="250" text-anchor="middle" class="small">• Attribute → Column</text>
    <text x="400" y="270" text-anchor="middle" class="small">• Relationship → FK</text>
  </g>

  <!-- Step 3: Relational Schema Output -->
  <g id="step3" class="step" data-narration="Produce relational schema with tables columns primary keys and foreign key relationships">
    <rect x="520" y="160" width="200" height="140" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="620" y="185" text-anchor="middle" class="header" fill="#388e3c">Relational Schema</text>

    <!-- Table -->
    <rect x="540" y="200" width="160" height="90" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="620" y="220" text-anchor="middle" class="body">TABLE</text>
    <text x="550" y="240" class="small">ID (PK)</text>
    <text x="550" y="255" class="small">Attribute1</text>
    <text x="550" y="270" class="small">Attribute2</text>
    <text x="550" y="285" class="small">FK_ID</text>
  </g>

  <!-- Step 4: Strong Entity Mapping -->
  <g id="step4" class="step" data-narration="Step one: map strong entities to tables with primary key from entity identifier attribute">
    <rect x="60" y="320" width="170" height="90" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="145" y="345" text-anchor="middle" class="header" fill="#ff9800">Strong Entity</text>
    <text x="145" y="365" text-anchor="middle" class="small">Create table with</text>
    <text x="145" y="382" text-anchor="middle" class="small">all simple attributes</text>
    <text x="145" y="399" text-anchor="middle" class="small">Key → Primary Key</text>
  </g>

  <!-- Step 5: Weak Entity Mapping -->
  <g id="step5" class="step" data-narration="Step two: map weak entities including partial key plus foreign key from owner entity as composite primary key">
    <rect x="250" y="320" width="170" height="90" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="335" y="345" text-anchor="middle" class="header" fill="#ff9800">Weak Entity</text>
    <text x="335" y="365" text-anchor="middle" class="small">Partial key + FK</text>
    <text x="335" y="382" text-anchor="middle" class="small">from owner entity</text>
    <text x="335" y="399" text-anchor="middle" class="small">as composite PK</text>
  </g>

  <!-- Step 6: 1:N Relationship -->
  <g id="step6" class="step" data-narration="Step three: for one to many relationships add foreign key to many side referencing primary key of one side">
    <rect x="440" y="320" width="170" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="525" y="345" text-anchor="middle" class="header" fill="#388e3c">1:N Relation</text>
    <text x="525" y="365" text-anchor="middle" class="small">Add FK in N side</text>
    <text x="525" y="382" text-anchor="middle" class="small">referencing 1 side</text>
    <text x="525" y="399" text-anchor="middle" class="small">primary key</text>
  </g>

  <!-- Step 7: M:N Relationship -->
  <g id="step7" class="step" data-narration="Step four: for many to many relationships create new junction table with foreign keys from both entities">
    <rect x="630" y="320" width="150" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="705" y="345" text-anchor="middle" class="header" fill="#388e3c">M:N Relation</text>
    <text x="705" y="365" text-anchor="middle" class="small">New table with</text>
    <text x="705" y="382" text-anchor="middle" class="small">FKs from both</text>
    <text x="705" y="399" text-anchor="middle" class="small">entities as PK</text>
  </g>

  <!-- Step 8: Multivalued Attributes -->
  <g id="step8" class="step" data-narration="Step five: map multivalued attributes to separate tables with foreign key referencing parent entity">
    <rect x="60" y="430" width="170" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="145" y="455" text-anchor="middle" class="header" fill="#ff9800">Multivalued</text>
    <text x="145" y="475" text-anchor="middle" class="small">Separate table with</text>
    <text x="145" y="492" text-anchor="middle" class="small">FK to parent entity</text>
  </g>

  <!-- Step 9: Composite Attributes -->
  <g id="step9" class="step" data-narration="Step six: flatten composite attributes into individual simple attributes in the parent table">
    <rect x="250" y="430" width="170" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="335" y="455" text-anchor="middle" class="header" fill="#ff9800">Composite</text>
    <text x="335" y="475" text-anchor="middle" class="small">Flatten into simple</text>
    <text x="335" y="492" text-anchor="middle" class="small">attributes</text>
  </g>

  <!-- Step 10: Final Schema -->
  <g id="step10" class="step" data-narration="Final relational schema is complete with all tables properly structured with primary keys foreign keys and constraints">
    <rect x="440" y="430" width="340" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="3" rx="10"/>
    <text x="610" y="460" text-anchor="middle" class="header" fill="#388e3c">Complete Relational Schema</text>
    <text x="610" y="485" text-anchor="middle" class="body" fill="#388e3c">Ready for SQL Implementation</text>
  </g>

  <!-- Step 11: Validation -->
  <g id="step11" class="step" data-narration="Validate schema to ensure all entities relationships and constraints are properly represented without data loss">
    <rect x="200" y="530" width="400" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="400" y="560" text-anchor="middle" class="body" fill="#1976d2">Validate: Check all relationships preserved</text>
  </g>
</svg>
