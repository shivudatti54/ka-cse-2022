<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>

  <!-- Title -->
  <text x="20" y="20" fill="#2E4053" font-size="24" font-family="Arial, sans-serif">
    Database Management System
  </text>

  <!-- Section 1: Data Model -->
  <section id="data-model" data-narration="This is an example of a conceptual data model for a university database. It includes entities such as student, course, and department, with relationships such as a student takes multiple courses and a course is offered by a department.">
    <rect x="20" y="60" width="380" height="50" fill="#F7F7F7" rx="5" />
    <text x="10" y="30" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">Conceptual Data Model</text>
    <g transform="translate(20, 60)">
      <ellipse cx="50" cy="25" rx="10" ry="10" fill="#F7F7F7" />
      <ellipse cx="100" cy="25" rx="10" ry="10" fill="#F7F7F7" />
      <ellipse cx="150" cy="25" rx="10" ry="10" fill="#F7F7F7" />
      <line x1="60" y1="45" x2="60" y2="35" stroke="#2E4053" stroke-width="2" />
      <line x1="120" y1="45" x2="120" y2="35" stroke="#2E4053" stroke-width="2" />
      <line x1="180" y1="45" x2="180" y2="35" stroke="#2E4053" stroke-width="2" />
      <text x="60" y="40" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">Student</text>
      <text x="120" y="40" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">Course</text>
      <text x="180" y="40" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">Department</text>
    </g>
  </section>

  <!-- Section 2: Entity-Relationship Model -->
  <section id="entity-relationship-model" data-narration="This is an example of an entity-relationship model for a university database. It includes entities such as Student, Course, and Department, with attributes such as Student ID, Name, and GPA, and relationships such as a student takes multiple courses and a course is offered by a department.">
    <rect x="20" y="120" width="380" height="50" fill="#F7F7F7" rx="5" />
    <text x="10" y="90" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">Entity-Relationship Model</text>
    <g transform="translate(20, 120)">
      <ellipse cx="50" cy="25" rx="10" ry="10" fill="#F7F7F7" />
      <ellipse cx="100" cy="25" rx="10" ry="10" fill="#F7F7F7" />
      <ellipse cx="150" cy="25" rx="10" ry="10" fill="#F7F7F7" />
      <line x1="60" y1="45" x2="60" y2="35" stroke="#2E4053" stroke-width="2" />
      <line x1="120" y1="45" x2="120" y2="35" stroke="#2E4053" stroke-width="2" />
      <line x1="180" y1="45" x2="180" y2="35" stroke="#2E4053" stroke-width="2" />
      <text x="60" y="40" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">Student</text>
      <text x="120" y="40" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">Course</text>
      <text x="180" y="40" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">Department</text>
    </g>
  </section>

  <!-- Section 3: Relational Model -->
  <section id="relational-model" data-narration="This is an example of a relational model for a university database. It includes tables such as Student, Course, and Department, with attributes and relationships such as Student ID, Name, and GPA, and relationships such as a student takes multiple courses and a course is offered by a department.">
    <rect x="20" y="210" width="380" height="50" fill="#F7F7F7" rx="5" />
    <text x="10" y="180" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">Relational Model</text>
    <g transform="translate(20, 210)">
      <ellipse cx="50" cy="25" rx="10" ry="10" fill="#F7F7F7" />
      <ellipse cx="100" cy="25" rx="10" ry="10" fill="#F7F7F7" />
      <ellipse cx="150" cy="25" rx="10" ry="10" fill="#F7F7F7" />
      <line x1="60" y1="45" x2="60" y2="35" stroke="#2E4053" stroke-width="2" />
      <line x1="120" y1="45" x2="120" y2="35" stroke="#2E4053" stroke-width="2" />
      <line x1="180" y1="45" x2="180" y2="35" stroke="#2E4053" stroke-width="2" />
      <text x="60" y="40" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">Student</text>
      <text x="120" y="40" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">Course</text>
      <text x="180" y="40" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">Department</text>
    </g>
  </section>

  <!-- Section 4: Data Modeling -->
  <section id="data-modeling" data-narration="Data modeling is a crucial step in database design. It involves creating a conceptual representation of the data in a database, including entities, attributes, and relationships. The goal of data modeling is to create a database that is well-designed, efficient, and easy to maintain.">
    <rect x="20" y="290" width="380" height="50" fill="#F7F7F7" rx="5" />
    <text x="10" y="260" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">Data Modeling</text>
    <g transform="translate(20, 290)">
      <ellipse cx="50" cy="25" rx="10" ry="10" fill="#F7F7F7" />
      <ellipse cx="100" cy="25" rx="10" ry="10" fill="#F7F7F7" />
      <ellipse cx="150" cy="25" rx="10" ry="10" fill="#F7F7F7" />
      <line x1="60" y1="45" x2="60" y2="35" stroke="#2E4053" stroke-width="2" />
      <line x1="120" y1="45" x2="120" y2="35" stroke="#2E4053" stroke-width="2" />
      <line x1="180" y1="45" x2="180" y2="35" stroke="#2E4053" stroke-width="2" />
      <text x="60" y="40" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">Entity</text>
      <text x="120" y="40" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">Attribute</text>
      <text x="180" y="40" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">Relationship</text>
    </g>
  </section>

  <!-- Section 5: Benefits of Data Modeling -->
  <section id="benefits-of-data-modeling" data-narration="Data modeling has several benefits, including improved data integrity, reduced data redundancy, and increased data security. By creating a well-designed data model, you can ensure that your database is efficient, scalable, and easy to maintain.">
    <rect x="20" y="370" width="380" height="50" fill="#F7F7F7" rx="5" />
    <text x="10" y="340" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">Benefits of Data Modeling</text>
    <g transform="translate(20, 370)">
      <ellipse cx="50" cy="25" rx="10" ry="10" fill="#F7F7F7" />
      <ellipse cx="100" cy="25" rx="10" ry="10" fill="#F7F7F7" />
      <ellipse cx="150" cy="25" rx="10" ry="10" fill="#F7F7F7" />
      <line x1="60" y1="45" x2="60" y2="35" stroke="#2E4053" stroke-width="2" />
      <line x1="120" y1="45" x2="120" y2="35" stroke="#2E4053" stroke-width="2" />
      <line x1="180" y1="45" x2="180" y2="35" stroke="#2E4053" stroke-width="2" />
      <text x="60" y="40" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">Data Integrity</text>
      <text x="120" y="40" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">Reduced Redundancy</text>
      <text x="180" y="40" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">Increased Security</text>
    </g>
  </section>

  <!-- Section 6: Conclusion -->
  <section id="conclusion" data-narration="In conclusion, data modeling is a crucial step in database design. It involves creating a conceptual representation of the data in a database, including entities, attributes, and relationships. By creating a well-designed data model, you can ensure that your database is efficient, scalable, and easy to maintain.">
    <rect x="20" y="450" width="380" height="50" fill="#F7F7F7" rx="5" />
    <text x="10" y="420" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">Conclusion</text>
    <g transform="translate(20, 450)">
      <ellipse cx="50" cy="25" rx="10" ry="10" fill="#F7F7F7" />
      <ellipse cx="100" cy="25" rx="10" ry="10" fill="#F7F7F7" />
      <ellipse cx="150" cy="25" rx="10" ry="10" fill="#F7F7F7" />
      <line x1="60" y1="45" x2="60" y2="35" stroke="#2E4053" stroke-width="2" />
      <line x1="120" y1="45" x2="120" y2="35" stroke="#2E4053" stroke-width="2" />
      <line x1="180" y1="45" x2="180" y2="35" stroke="#2E4053" stroke-width="2" />
      <text x="60" y="40" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">Efficient Database</text>
      <text x="120" y="40" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">Scalable Database</text>
      <text x="180" y="40" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">Easy-to-Maintain Database</text>
    </g>
  </section>

  <!-- Footer -->
  <text x="20" y="490" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">Database Management System</text>
</svg>