<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; }
      .header { font-size: 18px; font-weight: bold; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
    </style>
  </defs>

  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="Database transactions are logical units of work that maintain data integrity through ACID properties">
    <rect x="50" y="50" width="700" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="3" rx="10"/>
    <text x="400" y="90" text-anchor="middle" class="title" fill="#1976d2">Database Transactions</text>
    <text x="400" y="115" text-anchor="middle" class="body" fill="#1976d2">Ensuring Data Integrity</text>
  </g>

  <!-- Step 1: Transaction Lifecycle -->
  <g id="step1" class="step" data-narration="A transaction begins with start, executes operations, and ends with commit for success or rollback for failure">
    <rect x="150" y="160" width="500" height="120" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="400" y="185" text-anchor="middle" class="header" fill="#ff9800">Transaction Lifecycle</text>

    <rect x="180" y="200" width="100" height="50" fill="#ffe0b2" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="230" y="230" text-anchor="middle" class="body">BEGIN</text>

    <path d="M 280 225 L 340 225" stroke="#ff9800" stroke-width="2" marker-end="url(#arroworange4)"/>

    <rect x="340" y="200" width="120" height="50" fill="#ffe0b2" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="400" y="230" text-anchor="middle" class="body">EXECUTE</text>

    <path d="M 460 210 L 500 180" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowgreen)"/>
    <path d="M 460 240 L 500 270" stroke="#d32f2f" stroke-width="2" marker-end="url(#arrowred)"/>

    <rect x="500" y="160" width="120" height="40" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="560" y="185" text-anchor="middle" class="body">COMMIT</text>

    <rect x="500" y="250" width="120" height="40" fill="#ffcdd2" stroke="#d32f2f" stroke-width="2" rx="5"/>
    <text x="560" y="275" text-anchor="middle" class="body">ROLLBACK</text>

    <defs>
      <marker id="arroworange4" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
      </marker>
      <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
      </marker>
      <marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#d32f2f"/>
      </marker>
    </defs>
  </g>

  <!-- Step 2: ACID Properties -->
  <g id="step2" class="step" data-narration="ACID properties ensure transactions are Atomic Consistent Isolated and Durable for reliable database operations">
    <rect x="100" y="310" width="600" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="400" y="340" text-anchor="middle" class="header" fill="#1976d2">ACID Properties</text>
  </g>

  <!-- Step 3: Atomicity -->
  <g id="step3" class="step" data-narration="Atomicity ensures all operations complete successfully or none at all following all or nothing principle">
    <rect x="60" y="380" width="160" height="90" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="140" y="405" text-anchor="middle" class="header" fill="#ff9800">Atomicity</text>
    <text x="140" y="425" text-anchor="middle" class="small">All or Nothing</text>
    <text x="140" y="445" text-anchor="middle" class="small">Complete unit</text>
    <text x="140" y="460" text-anchor="middle" class="small">or full rollback</text>
  </g>

  <!-- Step 4: Consistency -->
  <g id="step4" class="step" data-narration="Consistency maintains database integrity rules ensuring valid state before and after each transaction">
    <rect x="240" y="380" width="160" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="320" y="405" text-anchor="middle" class="header" fill="#388e3c">Consistency</text>
    <text x="320" y="425" text-anchor="middle" class="small">Valid State</text>
    <text x="320" y="445" text-anchor="middle" class="small">Integrity rules</text>
    <text x="320" y="460" text-anchor="middle" class="small">always maintained</text>
  </g>

  <!-- Step 5: Isolation -->
  <g id="step5" class="step" data-narration="Isolation prevents concurrent transactions from interfering with each other maintaining data consistency">
    <rect x="420" y="380" width="160" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="500" y="405" text-anchor="middle" class="header" fill="#1976d2">Isolation</text>
    <text x="500" y="425" text-anchor="middle" class="small">No Interference</text>
    <text x="500" y="445" text-anchor="middle" class="small">Concurrent txns</text>
    <text x="500" y="460" text-anchor="middle" class="small">run independently</text>
  </g>

  <!-- Step 6: Durability -->
  <g id="step6" class="step" data-narration="Durability guarantees committed changes persist permanently even after system failures or crashes">
    <rect x="600" y="380" width="160" height="90" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="680" y="405" text-anchor="middle" class="header" fill="#ff9800">Durability</text>
    <text x="680" y="425" text-anchor="middle" class="small">Permanent</text>
    <text x="680" y="445" text-anchor="middle" class="small">Changes persist</text>
    <text x="680" y="460" text-anchor="middle" class="small">after commit</text>
  </g>

  <!-- Step 7: Example Transaction -->
  <g id="step7" class="step" data-narration="Bank transfer example shows atomic transaction where money debits from one account and credits to another">
    <rect x="100" y="490" width="600" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="400" y="515" text-anchor="middle" class="header" fill="#388e3c">Example: Bank Transfer</text>
    <text x="400" y="540" text-anchor="middle" class="small">BEGIN → Debit $100 from Account A</text>
    <text x="400" y="557" text-anchor="middle" class="small">→ Credit $100 to Account B → COMMIT</text>
    <text x="400" y="572" text-anchor="middle" class="small">If any step fails: ROLLBACK entire transaction</text>
  </g>
</svg>
