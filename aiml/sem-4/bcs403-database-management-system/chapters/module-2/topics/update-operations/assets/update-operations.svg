<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; }
      .header { font-size: 18px; font-weight: bold; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
    </style>
  </defs>

  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="Queue is a first in first out data structure where elements are added at rear and removed from front">
    <rect x="50" y="50" width="700" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="3" rx="10"/>
    <text x="400" y="90" text-anchor="middle" class="title" fill="#1976d2">Queue Operations</text>
    <text x="400" y="115" text-anchor="middle" class="body" fill="#1976d2">FIFO: First In, First Out</text>
  </g>

  <!-- Step 1: Empty Queue -->
  <g id="step1" class="step" data-narration="Start with an empty queue represented as an array with front and rear pointers">
    <rect x="200" y="160" width="400" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="400" y="185" text-anchor="middle" class="header" fill="#1976d2">Empty Queue</text>
    <rect x="220" y="200" width="360" height="30" fill="#bbdefb" stroke="#1976d2" stroke-width="2" rx="3"/>
    <line x1="280" y1="200" x2="280" y2="230" stroke="#1976d2" stroke-width="1"/>
    <line x1="340" y1="200" x2="340" y2="230" stroke="#1976d2" stroke-width="1"/>
    <line x1="400" y1="200" x2="400" y2="230" stroke="#1976d2" stroke-width="1"/>
    <line x1="460" y1="200" x2="460" y2="230" stroke="#1976d2" stroke-width="1"/>
    <line x1="520" y1="200" x2="520" y2="230" stroke="#1976d2" stroke-width="1"/>
  </g>

  <!-- Step 2: Enqueue Operation -->
  <g id="step2" class="step" data-narration="Enqueue adds element at the rear end increasing rear pointer by one">
    <rect x="80" y="260" width="300" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="230" y="285" text-anchor="middle" class="header" fill="#ff9800">Enqueue (Add)</text>
    <text x="230" y="310" text-anchor="middle" class="body">Add at REAR</text>

    <path d="M 350 310 L 200 350" stroke="#ff9800" stroke-width="3" fill="none" marker-end="url(#arroworange)"/>
    <text x="280" y="335" text-anchor="middle" class="small" fill="#ff9800">Insert</text>

    <rect x="110" y="315" width="60" height="35" fill="#ffe0b2" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="140" y="337" text-anchor="middle" class="body">10</text>
  </g>

  <!-- Step 3: After Enqueue -->
  <g id="step3" class="step" data-narration="After enqueuing elements the queue fills from left to right at the rear end">
    <rect x="420" y="260" width="300" height="100" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="570" y="285" text-anchor="middle" class="header" fill="#388e3c">After Enqueue</text>

    <rect x="440" y="300" width="260" height="50" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="3"/>
    <text x="470" y="330" text-anchor="middle" class="body">10</text>
    <line x1="500" y1="300" x2="500" y2="350" stroke="#388e3c" stroke-width="1"/>
    <text x="530" y="330" text-anchor="middle" class="body">20</text>
    <line x1="560" y1="300" x2="560" y2="350" stroke="#388e3c" stroke-width="1"/>
    <text x="590" y="330" text-anchor="middle" class="body">30</text>
    <line x1="620" y1="300" x2="620" y2="350" stroke="#388e3c" stroke-width="1"/>
    <line x1="680" y1="300" x2="680" y2="350" stroke="#388e3c" stroke-width="1"/>

    <text x="450" y="290" text-anchor="middle" class="small" fill="#388e3c">Front</text>
    <text x="670" y="290" text-anchor="middle" class="small" fill="#388e3c">Rear</text>
  </g>

  <!-- Step 4: Dequeue Operation -->
  <g id="step4" class="step" data-narration="Dequeue removes element from the front end returning the value and moving front pointer forward">
    <rect x="80" y="380" width="300" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="230" y="405" text-anchor="middle" class="header" fill="#ff9800">Dequeue (Remove)</text>
    <text x="230" y="430" text-anchor="middle" class="body">Remove from FRONT</text>

    <rect x="110" y="440" width="60" height="35" fill="#ffe0b2" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="140" y="462" text-anchor="middle" class="body">10</text>

    <path d="M 175 457 L 350 430" stroke="#ff9800" stroke-width="3" fill="none" marker-end="url(#arroworange2)"/>
    <text x="270" y="440" text-anchor="middle" class="small" fill="#ff9800">Return</text>

    <defs>
      <marker id="arroworange2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
      </marker>
    </defs>
  </g>

  <!-- Step 5: After Dequeue -->
  <g id="step5" class="step" data-narration="After dequeue front pointer moves forward and removed space becomes available in circular implementation">
    <rect x="420" y="380" width="300" height="100" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="570" y="405" text-anchor="middle" class="header" fill="#388e3c">After Dequeue</text>

    <rect x="440" y="420" width="260" height="50" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="3"/>
    <rect x="440" y="420" width="60" height="50" fill="#f1f8e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <line x1="500" y1="420" x2="500" y2="470" stroke="#388e3c" stroke-width="1"/>
    <text x="530" y="450" text-anchor="middle" class="body">20</text>
    <line x1="560" y1="420" x2="560" y2="470" stroke="#388e3c" stroke-width="1"/>
    <text x="590" y="450" text-anchor="middle" class="body">30</text>
    <line x1="620" y1="420" x2="620" y2="470" stroke="#388e3c" stroke-width="1"/>
    <line x1="680" y1="420" x2="680" y2="470" stroke="#388e3c" stroke-width="1"/>

    <text x="510" y="410" text-anchor="middle" class="small" fill="#388e3c">Front</text>
    <text x="670" y="410" text-anchor="middle" class="small" fill="#388e3c">Rear</text>
  </g>

  <!-- Step 6: Circular Queue -->
  <g id="step6" class="step" data-narration="Circular queue solves space wastage by wrapping rear pointer back to beginning using modulo arithmetic">
    <rect x="80" y="500" width="320" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="240" y="525" text-anchor="middle" class="header" fill="#1976d2">Circular Queue</text>
    <text x="240" y="545" text-anchor="middle" class="small">rear = (rear + 1) % capacity</text>
    <text x="240" y="565" text-anchor="middle" class="small">Efficient memory usage</text>
  </g>

  <!-- Step 7: Applications -->
  <g id="step7" class="step" data-narration="Queues are used in CPU scheduling breadth first search buffering and resource sharing systems">
    <rect x="420" y="500" width="300" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="570" y="525" text-anchor="middle" class="header" fill="#388e3c">Applications</text>
    <text x="570" y="545" text-anchor="middle" class="small">CPU Scheduling • BFS</text>
    <text x="570" y="565" text-anchor="middle" class="small">I/O Buffers • Task Queue</text>
  </g>
</svg>
