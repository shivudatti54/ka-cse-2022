<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; }
      .header { font-size: 18px; font-weight: bold; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
    </style>
  </defs>

  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="Relational algebra provides mathematical operations to query and manipulate data in relational databases">
    <rect x="50" y="50" width="700" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="3" rx="10"/>
    <text x="400" y="95" text-anchor="middle" class="title" fill="#1976d2">Relational Algebra Operations</text>
    <text x="400" y="115" text-anchor="middle" class="body" fill="#1976d2">Unary and Binary Operations</text>
  </g>

  <!-- Step 1: Unary Operations -->
  <g id="step1" class="step" data-narration="Unary operations work on a single relation or table to filter or transform data">
    <rect x="50" y="160" width="330" height="200" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="215" y="190" text-anchor="middle" class="header" fill="#ff9800">Unary Operations</text>
    <text x="215" y="215" text-anchor="middle" class="small">(Single Table)</text>

    <!-- SELECT -->
    <rect x="70" y="230" width="130" height="60" fill="#ffe0b2" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="135" y="250" text-anchor="middle" class="body">SELECT (σ)</text>
    <text x="135" y="270" text-anchor="middle" class="small">Filter rows</text>
    <text x="135" y="285" text-anchor="middle" class="small">by condition</text>

    <!-- PROJECT -->
    <rect x="220" y="230" width="130" height="60" fill="#ffe0b2" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="285" y="250" text-anchor="middle" class="body">PROJECT (π)</text>
    <text x="285" y="270" text-anchor="middle" class="small">Select specific</text>
    <text x="285" y="285" text-anchor="middle" class="small">columns</text>

    <!-- RENAME -->
    <rect x="145" y="300" width="130" height="50" fill="#ffe0b2" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="210" y="320" text-anchor="middle" class="body">RENAME (ρ)</text>
    <text x="210" y="340" text-anchor="middle" class="small">Change names</text>
  </g>

  <!-- Step 2: Binary Operations -->
  <g id="step2" class="step" data-narration="Binary operations combine two relations to create new result sets based on specified conditions">
    <rect x="420" y="160" width="330" height="200" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="585" y="190" text-anchor="middle" class="header" fill="#388e3c">Binary Operations</text>
    <text x="585" y="215" text-anchor="middle" class="small">(Two Tables)</text>

    <!-- UNION -->
    <rect x="440" y="230" width="130" height="55" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="505" y="250" text-anchor="middle" class="body">UNION (∪)</text>
    <text x="505" y="270" text-anchor="middle" class="small">Combine all</text>

    <!-- INTERSECTION -->
    <rect x="590" y="230" width="140" height="55" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="660" y="250" text-anchor="middle" class="body">INTERSECT (∩)</text>
    <text x="660" y="270" text-anchor="middle" class="small">Common rows</text>

    <!-- DIFFERENCE -->
    <rect x="440" y="295" width="130" height="55" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="505" y="315" text-anchor="middle" class="body">MINUS (−)</text>
    <text x="505" y="335" text-anchor="middle" class="small">In A not in B</text>

    <!-- CARTESIAN -->
    <rect x="590" y="295" width="140" height="55" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="660" y="315" text-anchor="middle" class="body">PRODUCT (×)</text>
    <text x="660" y="335" text-anchor="middle" class="small">All combinations</text>
  </g>

  <!-- Step 3: SELECT Example -->
  <g id="step3" class="step" data-narration="Select operation filters rows based on conditions like selecting students with grade A">
    <rect x="50" y="380" width="180" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="140" y="405" text-anchor="middle" class="header" fill="#1976d2">σ Example</text>
    <text x="140" y="425" text-anchor="middle" class="small">σ(grade='A')</text>
    <text x="140" y="445" text-anchor="middle" class="small">Returns only</text>
    <text x="140" y="460" text-anchor="middle" class="small">A-grade students</text>
  </g>

  <!-- Step 4: PROJECT Example -->
  <g id="step4" class="step" data-narration="Project operation selects specific columns like extracting only name and email from student table">
    <rect x="250" y="380" width="180" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="340" y="405" text-anchor="middle" class="header" fill="#1976d2">π Example</text>
    <text x="340" y="425" text-anchor="middle" class="small">π(name, email)</text>
    <text x="340" y="445" text-anchor="middle" class="small">Returns only</text>
    <text x="340" y="460" text-anchor="middle" class="small">name and email</text>
  </g>

  <!-- Step 5: UNION Example -->
  <g id="step5" class="step" data-narration="Union combines all unique rows from two compatible tables into a single result set">
    <rect x="450" y="380" width="140" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="520" y="405" text-anchor="middle" class="header" fill="#388e3c">∪ Example</text>
    <text x="520" y="425" text-anchor="middle" class="small">R ∪ S</text>
    <text x="520" y="445" text-anchor="middle" class="small">All rows from</text>
    <text x="520" y="460" text-anchor="middle" class="small">both tables</text>
  </g>

  <!-- Step 6: JOIN Operation -->
  <g id="step6" class="step" data-narration="Join is a special binary operation combining related data from two tables based on common attributes">
    <rect x="610" y="380" width="140" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="680" y="405" text-anchor="middle" class="header" fill="#388e3c">JOIN (⋈)</text>
    <text x="680" y="425" text-anchor="middle" class="small">R ⋈ S</text>
    <text x="680" y="445" text-anchor="middle" class="small">Combine on</text>
    <text x="680" y="460" text-anchor="middle" class="small">common attrs</text>
  </g>

  <!-- Step 7: Composition -->
  <g id="step7" class="step" data-narration="Operations can be composed together to form complex queries by nesting operations">
    <rect x="100" y="490" width="600" height="60" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="400" y="515" text-anchor="middle" class="header" fill="#ff9800">Composition of Operations</text>
    <text x="400" y="540" text-anchor="middle" class="small">π(name) (σ(grade='A') (Student))</text>
  </g>

  <!-- Step 8: SQL Connection -->
  <g id="step8" class="step" data-narration="Relational algebra operations directly map to SQL statements forming the foundation of database query languages">
    <rect x="150" y="560" width="500" height="35" fill="#e3f2fd" stroke="#1976d2" stroke-width="3" rx="10"/>
    <text x="400" y="582" text-anchor="middle" class="body" fill="#1976d2">Foundation for SQL Query Language</text>
  </g>
</svg>
