<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" xmlns:xlink="http://www.w3.org/1999/xlink" style="overflow: visible;">
  <!-- Background Gradient -->
  <rect x="0" y="0" width="420" height="400" fill="rgb(240, 245, 250)" rx="10"/>
  <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="rgb(240, 245, 250)" stop-opacity="1"/>
    <stop offset="50%" stop-color="rgb(200, 230, 245)" stop-opacity="1"/>
    <stop offset="100%" stop-color="rgb(180, 220, 240)" stop-opacity="1"/>
  </linearGradient>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Title -->
  <text x="20" y="20" font-size="24" font-weight="bold" text-anchor="start" stroke="#2f4f7f" stroke-width="2" fill="#2f4f7f">Mapping Conceptual Design into a Logical Design</text>
  <animateTransform attributeName="transform" type="rotate" from="0 210 20" to="360 210 20" dur="10000" repeatCount="indefinite"/>

  <!-- Sections -->
  <rect x="20" y="60" width="380" height="100" fill="#f7f7f7" rx="10"/>
  <rect x="20" y="170" width="380" height="100" fill="#f7f7f7" rx="10"/>
  <rect x="20" y="280" width="380" height="100" fill="#f7f7f7" rx="10"/>
  <rect x="20" y="390" width="380" height="100" fill="#f7f7f7" rx="10"/>

  <animateTransform attributeName="transform" type="translate" from="20 60" to="20 160" dur="2000" repeatCount="infinite"/>
  <animateTransform attributeName="transform" type="translate" from="20 160" to="20 280" dur="2000" repeatCount="infinite"/>
  <animateTransform attributeName="transform" type="translate" from="20 280" to="20 380" dur="2000" repeatCount="infinite"/>
  <animateTransform attributeName="transform" type="translate" from="20 380" to="20 60" dur="2000" repeatCount="infinite"/>

  <!-- Narration -->
  <text x="20" y="140" font-size="18" fill="#2f4f7f" text-anchor="start" data-narration="What is Conceptual Design?">What is Conceptual Design?</text>
  <animateTransform attributeName="transform" type="translate" from="20 140" to="20 160" dur="2000" repeatCount="infinite"/>
  <text x="20" y="250" font-size="18" fill="#2f4f7f" text-anchor="start" data-narration="How is ER Modeling Used?">How is ER Modeling Used?</text>
  <animateTransform attributeName="transform" type="translate" from="20 250" to="20 280" dur="2000" repeatCount="infinite"/>
  <text x="20" y="360" font-size="18" fill="#2f4f7f" text-anchor="start" data-narration="What is ER Diagram?">What is ER Diagram?</text>
  <animateTransform attributeName="transform" type="translate" from="20 360" to="20 380" dur="2000" repeatCount="infinite"/>

  <text x="210" y="30" font-size="18" fill="#2f4f7f" text-anchor="start" stroke="#2f4f7f" stroke-width="2">Entities, Attributes, and Relationships</text>
  <animateTransform attributeName="transform" type="translate" from="210 30" to="210 60" dur="2000" repeatCount="infinite"/>
  <text x="210" y="230" font-size="18" fill="#2f4f7f" text-anchor="start" stroke="#2f4f7f" stroke-width="2">ER Diagram: A Visual Representation</text>
  <animateTransform attributeName="transform" type="translate" from="210 230" to="210 270" dur="2000" repeatCount="infinite"/>
  <text x="210" y="350" font-size="18" fill="#2f4f7f" text-anchor="start" stroke="#2f4f7f" stroke-width="2">Relationship Notation: Solid Line = One-to-One, Dashed Line = One-to-Many</text>
  <animateTransform attributeName="transform" type="translate" from="210 350" to="210 380" dur="2000" repeatCount="infinite"/>

  <!-- Footer -->
  <text x="20" y="410" font-size="18" fill="#2f4f7f" text-anchor="start">Mapped Conceptual Design into a Logical Design</text>
</svg>