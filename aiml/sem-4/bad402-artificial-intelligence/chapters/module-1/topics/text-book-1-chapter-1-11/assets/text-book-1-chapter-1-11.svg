<svg width="420" height="400" data-topic-id="text-book-1-chapter-1-1" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1" />
      <stop offset="50%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1" />
    </linearGradient>
  </defs>
  <title>Text Book 1 Chapter 1 - Introduction to Artificial Intelligence</title>
  <rect x="10" y="10" width="400" height="350" fill="url(#pastel-gradient)" rx="10"/>
  <g id="section-1">
    <rect x="20" y="20" width="360" height="80" fill="#fff" rx="10">
      <text x="20" y="40" font-size="16" font-family="Arial, sans-serif" text-anchor="start">What is Artificial Intelligence?</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="20,0" dur="2s" begin="-0.5s" />
    </rect>
    <text x="20" y="120" font-size="16" font-family="Arial, sans-serif" text-anchor="start" data-narration="Definition of AI">The science and engineering of making intelligent machines, especially intelligent computer programs." - John McCarthy</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="20,0" dur="2s" begin="-0.5s" />
  </g>
  <g id="section-2">
    <rect x="20" y="220" width="360" height="80" fill="#fff" rx="10">
