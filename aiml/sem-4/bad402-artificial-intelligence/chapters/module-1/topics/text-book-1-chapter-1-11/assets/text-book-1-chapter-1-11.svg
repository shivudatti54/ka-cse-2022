      <text x="20" y="340" font-size="16" font-family="Arial, sans-serif" text-anchor="start">History of AI</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="20,0" dur="2s" begin="-0.5s" />
    </rect>
    <rect x="40" y="320" width="200" height="20" fill="#2ecc71" rx="5">
      <text x="40" y="340" font-size="14" font-family="Arial, sans-serif" text-anchor="start">1950s</text>
