<svg width="420" height="400" data-topic-id="chapter-2-21-1-3-2-1-intelligent-agents-and-multi-agent-systems-2-1-intelligent-agents">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7F464" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="50" y="50" width="320" height="300" fill="url(#pastel-gradient)"/>
  
  <!-- Section 1: Definition -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="100" height="50" fill="#2E4053" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#F7F7F7">Definition:</text>
    <text x="10" y="30" font-size="18" font-family="Arial" fill="#F7F7F7">An intelligent agent is a computer program that perceives its environment and takes actions to achieve a goal.</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="10 0" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 2: Characteristics -->
  <g transform="translate(150, 50)">
    <rect x="0" y="0" width="100" height="50" fill="#2E4053" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#F7F7F7">Characteristics:</text>
    <rect x="10" y="30" width="80" height="20" fill="#4BC0C7" rx="5"/>
    <text x="30" y="35" font-size="12" font-family="Arial" fill="#F7F7F7">Autonomy</text>
    <rect x="10" y="50" width="80" height="20" fill="#4BC0C7" rx="5"/>
    <text x="30" y="55" font-size="12" font-family="Arial" fill="#F7F7F7">Perception</text>
    <rect x="10" y="70" width="80" height="20" fill="#4BC0C7" rx="5"/>
    <text x="30" y="75" font-size="12" font-family="Arial" fill="#F7F7F7">Reasoning</text>
    <rect x="10" y="90" width="80" height="20" fill="#4BC0C7" rx="5"/>
    <text x="30" y="95" font-size="12" font-family="Arial" fill="#F7F7F7">Action</text>
    <rect x="10" y="110" width="80" height="20" fill="#4BC0C7" rx="5"/>
    <text x="30" y="115" font-size="12" font-family="Arial" fill="#F7F7F7">Learning</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="10 0" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 3: Examples -->
  <g transform="translate(250, 50)">
    <rect x="0" y="0" width="100" height="50" fill="#2E4053" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#F7F7F7">Examples:</text>
    <rect x="10" y="30" width="80" height="20" fill="#4BC0C7" rx="5"/>
    <text x="30" y="35" font-size="12" font-family="Arial" fill="#F7F7F7">Virtual assistants</text>
    <rect x="10" y="50" width="80" height="20" fill="#4BC0C7" rx="5"/>
    <text x="30" y="55" font-size="12" font-family="Arial" fill="#F7F7F7">Self-driving cars</text>
    <rect x="10" y="70" width="80" height="20" fill="#4BC0C7" rx="5"/>
    <text x="30" y="75" font-size="12" font-family="Arial" fill="#F7F7F7">Chatbots</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="10 0" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 4: Types of Intelligent Agents -->
  <g transform="translate(350, 50)">
    <rect x="0" y="0" width="100" height="50" fill="#2E4053" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#F7F7F7">Types of Intelligent Agents:</text>
    <rect x="10" y="30" width="80" height="20" fill="#4BC0C7" rx="5"/>
    <text x="30" y="35" font-size="12" font-family="Arial" fill="#F7F7F7">Narrow or Weak AI</text>
    <rect x="10" y="50" width="80" height="20" fill="#4BC0C7" rx="5"/>
    <text x="30" y="55" font-size="12" font-family="Arial" fill="#F7F7F7">Virtual assistants, self-driving cars, chatbots</text>
    <rect x="10" y="70" width="80" height="20" fill="#4BC0C7" rx="5"/>
    <text x="30" y="75" font-size="12" font-family="Arial" fill="#F7F7F7">General or Strong AI</text>
    <rect x="10" y="90" width="80" height="20" fill="#4BC0C7" rx="5"/>
    <text x="30" y="95" font-size="12" font-family="Arial" fill="#F7F7F7">Currently, there is no general or strong AI</text>
    <rect x="10" y="110" width="80" height="20" fill="#4BC0C7" rx="5"/>
    <text x="30" y="115" font-size="12" font-family="Arial" fill="#F7F7F7">Superintelligence</text>
    <rect x="10" y="130" width="80" height="20" fill="#4BC0C7" rx="5"/>
    <text x="30" y="135" font-size="12" font-family="Arial" fill="#F7F7F7">Refers to intelligent agents that possess the ability to understand, learn, and apply knowledge across a wide range of tasks</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="10 0" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  
  <!-- Footer -->
  <g transform="translate(50, 350)">
    <rect x="0" y="0" width="420" height="50" fill="#2E4053" rx="10"/>
    <text x="10" y="25" font-size="18" font-family="Arial" fill="#F7F7F7">Chapter 2, Section 1: Intelligent Agents and Multi-Agent Systems</text>
  </g>
</svg>