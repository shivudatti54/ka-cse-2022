<svg width="420" height="400" data-topic-id="uninformed-search-strategies-breadth-first-search"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400" xmlns:xlink="http://www.w3.org/1999/xlink"
     style="background: #6495ED; background-image: linear-gradient(to bottom, #6495ED 0%, #87CEEB 100%);">
  <!-- Title -->
  <rect x="10" y="10" width="400" height="50" style="fill: #87CEEB; opacity: 0.7;" rx="10"/>
  <text x="15" y="30" font-size="24" font-family="Arial" fill="#333333" text-anchor="start"
        style="mix-blend-mode: multiply; opacity: 0.7;" data-narration="Introduction to Uninformed Search">
    Uninformed Search Strategies
  </text>

  <!-- Background Gradient -->
  <rect x="0" y="70" width="420" height="250" style="fill: linear-gradient(to bottom, #6495ED 0%, #87CEEB 100%);"/>

  <!-- Section 1: Introduction -->
  <rect x="10" y="330" width="400" height="50" style="fill: #87CEEB; background-image: linear-gradient(to bottom, #6495ED 0%, #87CEEB 100%); opacity: 0.7;" rx="10"/>
  <text x="15" y="340" font-size="18" font-family="Arial" fill="#333333" text-anchor="start"
        style="mix-blend-mode: multiply; opacity: 0.7;" data-narration="Types of Uninformed Search Strategies">
    Types of Uninformed Search Strategies
  </text>

  <!-- Section 2: BFS -->
  <rect x="10" y="380" width="400" height="50" style="fill: #87CEEB; background-image: linear-gradient(to bottom, #6495ED 0%, #87CEEB 100%); opacity: 0.7;" rx="10"/>
  <text x="15" y="390" font-size="18" font-family="Arial" fill="#333333" text-anchor="start"
        style="mix-blend-mode: multiply; opacity: 0.7;" data-narration="Breadth-First Search (BFS)">
    Breadth-First Search (BFS)
  </text>
  <rect x="10" y="350" width="400" height="30" style="fill: #f7dc6f; border: 1px solid #333333;" rx="10"/>
  <text x="15" y="360" font-size="18" font-family="Arial" fill="#333333" text-anchor="start"
        style="mix-blend-mode: multiply; opacity: 0.7;" data-narration="Suppose we have a graph with the following nodes and edges:">
    <tspan x="15" y="360" font-size="18" font-family="Arial" fill="#333333" text-anchor="start" 
          style="mix-blend-mode: multiply; opacity: 0.7;" xml:lang="en">A, B, C, D, E, F</tspan>
  </text>
  <rect x="10" y="320" width="400" height="30" style="fill: #f7dc6f; border: 1px solid #333333;" rx="10"/>
  <text x="15" y="330" font-size="18" font-family="Arial" fill="#333333" text-anchor="start"
        style="mix-blend-mode: multiply; opacity: 0.7;" data-narration="The BFS traversal of this graph would be: A, B, C, D, E, F">
    <tspan x="15" y="330" font-size="18" font-family="Arial" fill="#333333" text-anchor="start" 
          style="mix-blend-mode: multiply; opacity: 0.7;" xml:lang="en">A, B, C, D, E, F</tspan>
  </text>
  <rect x="10" y="290" width="400" height="30" style="fill: #f7dc6f; border: 1px solid #333333;" rx="10"/>
  <text x="15" y="300" font-size="18" font-family="Arial" fill="#333333" text-anchor="start"
        style="mix-blend-mode: multiply; opacity: 0.7;" data-narration="The ASCII diagram of BFS would be:">
    <tspan x="15" y="300" font-size="18" font-family="Arial" fill="#333333" text-anchor="start" 
          style="mix-blend-mode: multiply; opacity: 0.7;" xml:lang="en" xml:space="preserve">
      +---+---+---+---+---+
      | A | B | C | D | E |
      +---+---+---+---+---+
      |   | / \ |   | / \ |
      |   |/   \|   |/   \|
      |  D     E  F     |
      +---+---+---+---+---+
    </tspan>
  </text>

  <!-- Section 3: DFS -->
  <rect x="10" y="340" width="400" height="50" style="fill: #87CEEB; background-image: linear-gradient(to bottom, #6495ED 0%, #87CEEB 100%); opacity: 0.7;" rx="10"/>
  <text x="15" y="350" font-size="18" font-family="Arial" fill="#333333" text-anchor="start"
        style="mix-blend-mode: multiply; opacity: 0.7;" data-narration="Depth-First Search (DFS)">
    Depth-First Search (DFS)
  </text>
  <rect x="10" y="310" width="400" height="30" style="fill: #f7dc6f; border: 1px solid #333333;" rx="10"/>
  <text x="15" y="320" font-size="18" font-family="Arial" fill="#333333" text-anchor="start"
        style="mix-blend-mode: multiply; opacity: 0.7;" data-narration="Suppose we have a graph with the following nodes and edges:">
    <tspan x="15" y="320" font-size="18" font-family="Arial" fill="#333333" text-anchor="start" 
          style="mix-blend-mode: multiply; opacity: 0.7;" xml:lang="en">A, B, D, E, C, F</tspan>
  </text>
  <rect x="10" y="280" width="400" height="30" style="fill: #f7dc6f; border: 1px solid #333333;" rx="10"/>
  <text x="15" y="290" font-size="18" font-family="Arial" fill="#333333" text-anchor="start"
        style="mix-blend-mode: multiply; opacity: 0.7;" data-narration="The DFS traversal of this graph would be: A, B, D, E, C, F">
    <tspan x="15" y="290" font-size="18" font-family="Arial" fill="#333333" text-anchor="start" 
          style="mix-blend-mode: multiply; opacity: 0.7;" xml:lang="en">A, B, D, E, C, F</tspan>
  </text>
  <rect x="10" y="250" width="400" height="30" style="fill: #f7dc6f; border: 1px solid #333333;" rx="10"/>
  <text x="15" y="260" font-size="18" font-family="Arial" fill="#333333" text-anchor="start"
        style="mix-blend-mode: multiply; opacity: 0.7;" data-narration="The ASCII diagram of DFS would be:">
    <tspan x="15" y="260" font-size="18" font-family="Arial" fill="#333333" text-anchor="start" 
          style="mix-blend-mode: multiply; opacity: 0.7;" xml:lang="en" xml:space="preserve">
      +---+---+---+---+---+
      | A | B | C | D | E |
      +---+---+---+---+---+
      |   | / \ |   | / \ |
      |   |/   \|   |/   \|
      |  D     E  F     |
      +---+---+---+---+---+
    </tspan>
  </text>

  <!-- Footer -->
  <rect x="10" y="410" width="400" height="40" style="fill: #87CEEB; background-image: linear-gradient(to bottom, #6495ED 0%, #87CEEB 100%); opacity: 0.7;" rx="10"/>
  <text x="15" y="420" font-size="18" font-family="Arial" fill="#333333" text-anchor="start"
        style="mix-blend-mode: multiply; opacity: 0.7;" data-narration="Conclusion">
    Uninformed Search Strategies
  </text>
  <rect x="10" y="390" width="400" height="10" style="fill: #f7dc6f; border: 1px solid #333333;" rx="10"/>
  <text x="15" y="400" font-size="18" font-family="Arial" fill="#333333" text-anchor="start"
        style="mix-blend-mode: multiply; opacity: 0.7;" data-narration="References">
    <tspan x="15" y="400" font-size="18" font-family="Arial" fill="#333333" text-anchor="start" 
          style="mix-blend-mode: multiply; opacity: 0.7;" xml:lang="en">BFS, DFS, UCS, DLS, IDDFS</tspan>
  </text>

  <!-- Arrow markers for connections -->
  <circle cx="110" cy="60" r="10" style="fill: #333333; opacity: 0.7;"/>
  <line x1="110" y1="60" x2="110" y2="100" style="stroke: #333333; stroke-width: 2;"/>
  <line x1="110" y1="100" x2="110" y2="140" style="stroke: #333333; stroke-width: 2;"/>
  <line x1="110" y1="140" x2="110" y2="180" style="stroke: #333333; stroke-width: 2;"/>
  <line x1="110" y1="180" x2="110" y2="220" style="stroke: #333333; stroke-width: 2;"/>
  <line x1="110" y1="220" x2="110" y2="260" style="stroke: #333333; stroke-width: 2;"/>
  <line x1="110" y1="260" x2="110" y2="300" style="stroke: #333333; stroke-width: 2;"/>
  <line x1="110" y1="300" x2="110" y2="340" style="stroke: #333333; stroke-width: 2;"/>
  <line x1="110" y1="340" x2="110" y2="380" style="stroke: #333333; stroke-width: 2;"/>
  <line x1="110" y1="380" x2="110" y2="420" style="stroke: #333333; stroke-width: 2;"/>

  <animate xmlns="http://www.w3.org/2000/svg" xlink:href="#gradient" begin="0s" dur="4s" repeatCount="indefinite" />
</svg>