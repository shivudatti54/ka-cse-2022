<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="depth-first-search" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" opacity="0.5"/>
  
  <!-- Title at top -->
  <text x="50%" y="20%" font-size="24" fill="#3498db" font-family="Arial" text-anchor="middle">
    Depth First Search
  </text>
  
  <!-- Introduction section -->
  <section data-narration="Introduction">
    <rect x="20" y="60" width="380" height="80" fill="#f0f0f0" rx="10"/>
    <text x="20" y="80" font-size="18" fill="#333" font-family="Arial">
      Depth First Search (DFS) is a fundamental algorithm used in graph theory and search problems.
    </text>
  </section>
  
  <!-- What is Depth First Search? section -->
  <section data-narration="What is Depth First Search?">
    <rect x="20" y="160" width="380" height="80" fill="#f0f0f0" rx="10"/>
    <text x="20" y="180" font-size="18" fill="#333" font-family="Arial">
      Depth First Search is a traversal algorithm that visits a node in a graph or tree and explores as far as possible along each branch before backtracking.
    </text>
  </section>
  
  <!-- Types of Depth First Search section -->
  <section data-narration="Types of Depth First Search">
    <rect x="20" y="260" width="380" height="80" fill="#f0f0f0" rx="10"/>
    <text x="20" y="280" font-size="18" fill="#333" font-family="Arial">
      There are several types of Depth First Search algorithms, including In-Order DFS, Pre-Order DFS, and Post-Order DFS.
    </text>
  </section>
  
  <!-- How Depth First Search Works section -->
  <section data-narration="How Depth First Search Works">
    <rect x="20" y="360" width="380" height="80" fill="#f0f0f0" rx="10"/>
    <text x="20" y="380" font-size="18" fill="#333" font-family="Arial">
      The following are the steps involved in a Depth First Search algorithm:
      <ol>
        <li>Choose a starting node</li>
        <li>Mark the node as visited</li>
        <li>Explore the neighbors</li>
        <li>Backtrack</li>
      </ol>
    </text>
  </section>
  
  <!-- Example Use Cases section -->
  <section data-narration="Example Use Cases">
    <rect x="20" y="440" width="380" height="80" fill="#f0f0f0" rx="10"/>
    <text x="20" y="460" font-size="18" fill="#333" font-family="Arial">
      Depth First Search has several applications in computer science, including searching for connected components in a graph.
    </text>
  </section>
  
  <!-- Arrow markers for connections -->
  <path d="M 100 20 L 120 40" stroke="#3498db" stroke-width="2" fill="none"/>
  <path d="M 120 40 L 140 60" stroke="#3498db" stroke-width="2" fill="none"/>
  <path d="M 140 60 L 160 80" stroke="#3498db" stroke-width="2" fill="none"/>
  
  <!-- Footer at bottom -->
  <text x="50%" y="380" font-size="18" fill="#333" font-family="Arial" text-anchor="middle">
    Developed by [Your Name]
  </text>
</svg>