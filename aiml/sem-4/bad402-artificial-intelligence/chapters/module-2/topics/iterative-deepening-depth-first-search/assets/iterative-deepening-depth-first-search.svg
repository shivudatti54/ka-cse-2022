<svg width="420" height="400" data-topic-id="iterative-deepening-depth-first-search">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#6495ED" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" opacity="0.5"/>
  
  <!-- Title -->
  <g transform="translate(10, 10)">
    <text x="0" y="20" font-size="24" font-family="Arial, sans-serif" fill="#3498DB" text-anchor="start">
      Iterative Deepening Depth-First Search
    </text>
  </g>
  
  <!-- Section 1: Introduction -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="80%" height="20%" fill="#F9F9F9" rx="5" opacity="0.8"/>
    <text x="0" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333" text-anchor="start">
      <data-narration>Iterative Deepening Depth-First Search (IDDFS) is a popular search algorithm used in Artificial Intelligence to find the shortest path between two nodes in a graph or a maze.</data-narration>
    </text>
  </g>
  
  <!-- Section 2: Definition -->
  <g transform="translate(50, 130)">
    <rect x="0" y="0" width="80%" height="20%" fill="#F9F9F9" rx="5" opacity="0.8"/>
    <text x="0" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333" text-anchor="start">
      <data-narration>IDDFS is a variant of Depth-First Search (DFS) that uses a combination of DFS and Breadth-First Search (BFS) to find the shortest path between two nodes.</data-narration>
    </text>
  </g>
  
  <!-- Section 3: Key Concepts -->
  <g transform="translate(50, 160)">
    <rect x="0" y="0" width="80%" height="20%" fill="#F9F9F9" rx="5" opacity="0.8"/>
    <text x="0" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333" text-anchor="start">
      <data-narration>
        <ul>
          <li>Depth-First Search (DFS): A search algorithm that explores as far as possible along each branch before backtracking.</li>
          <li>Breadth-First Search (BFS): A search algorithm that explores all the nodes at a given depth before moving to the next depth level.</li>
          <li>Iterative Deepening: A technique used to increase the depth of the search by incrementally increasing the maximum depth explored by the algorithm.</li>
        </ul>
      </data-narration>
    </text>
  </g>
  
  <!-- Section 4: How IDDFS Works -->
  <g transform="translate(50, 190)">
    <rect x="0" y="0" width="80%" height="20%" fill="#F9F9F9" rx="5" opacity="0.8"/>
    <text x="0" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333" text-anchor="start">
      <data-narration>
        <ol>
          <li>Initialization: Initialize a queue with the starting node and a maximum depth.</li>
          <li>Exploration: Explore the nodes in the queue using DFS.</li>
          <li>Backtracking: If the queue is empty, backtrack to the previous node and increase the maximum depth.</li>
          <li>Termination: The algorithm terminates when the destination node is found or the maximum depth is reached.</li>
        </ol>
      </data-narration>
    </text>
  </g>
  
  <!-- Section 5: Example -->
  <g transform="translate(50, 220)">
    <rect x="0" y="0" width="80%" height="20%" fill="#F9F9F9" rx="5" opacity="0.8"/>
    <text x="0" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333" text-anchor="start">
      <data-narration>
        <ul>
          <li>Suppose we have a graph with the following nodes and edges:</li>
          <li>| Node | Edge |</li>
          <li>| A    | B    |</li>
          <li>| A    | C    |</li>
          <li>| B    | D    |</li>
          <li>| C    | D    |</li>
          <li>| D    | E    |</li>
        </ul>
        <p>
          We want to find the shortest path from node A to node E using IDDFS.
        </p>
        <ol start="1">
          <li>Initialization: Initialize a queue with node A and a maximum depth of 1.</li>
          <li>Exploration: Explore the nodes in the queue using DFS. We visit nodes A, B, and C.</li>
          <li>Backtracking: Increase the maximum depth to 2 and explore the remaining nodes.</li>
          <li>Exploration: We visit nodes D and E.</li>
          <li>Termination: The algorithm terminates when the destination node is found or the maximum depth is reached.</li>
        </ol>
      </data-narration>
    </text>
  </g>
  
  <!-- Section 6: Conclusion -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="80%" height="20%" fill="#F9F9F9" rx="5" opacity="0.8"/>
    <text x="0" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333" text-anchor="start">
      <data-narration>
        <p>IDDFS is a powerful search algorithm for finding the shortest path between two nodes in a graph or a maze.</p>
        <p>It combines the strengths of DFS and BFS to find the optimal solution.</p>
      </data-narration>
    </text>
  </g>
  
  <!-- Footer -->
  <g transform="translate(10, 280)">
    <text x="0" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333" text-anchor="start">
      <data-narration>Iterative Deepening Depth-First Search</data-narration>
  </g>
  
  <!-- Animation -->
  <animate xmlns="http://www.w3.org/1999/shape" xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="#gradient" begin="0s" dur="10s" repeatCount="indefinite">
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#6495ED" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </animate>
  
  <!-- Arrow markers -->
  <g transform="translate(260, 250)">
    <line x1="270" y1="280" x2="300" y2="280" stroke="#333" stroke-width="2" stroke-dasharray="2,2"/>
    <line x1="270" y1="280" x2="280" y2="300" stroke="#333" stroke-width="2" stroke-dasharray="2,2"/>
    <line x1="300" y1="280" x2="320" y2="280" stroke="#333" stroke-width="2" stroke-dasharray="2,2"/>
    <line x1="300" y1="280" x2="280" y2="300" stroke="#333" stroke-width="2" stroke-dasharray="2,2"/>
    <line x1="320" y1="280" x2="340" y2="280" stroke="#333" stroke-width="2" stroke-dasharray="2,2"/>
  </g>
  
  <g transform="translate(180, 250)">
    <line x1="190" y1="280" x2="210" y2="280" stroke="#333" stroke-width="2" stroke-dasharray="2,2"/>
    <line x1="190" y1="280" x2="200" y2="300" stroke="#333" stroke-width="2" stroke-dasharray="2,2"/>
    <line x1="210" y1="280" x2="220" y2="280" stroke="#333" stroke-width="2" stroke-dasharray="2,2"/>
    <line x1="210" y1="280" x2="200" y2="300" stroke="#333" stroke-width="2" stroke-dasharray="2,2"/>
    <line x1="220" y1="280" x2="230" y2="280" stroke="#333" stroke-width="2" stroke-dasharray="2,2"/>
  </g>
</svg>