<svg width="420" height="400" data-topic-id="probability-notation-inference-using-full-joint-distribution">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="#E0E0E0" y1="0%" x2="#C7C5B8" y2="100%">
      <stop offset="0%" stop-color="#E0E0E0" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7C5B8" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title at top -->
  <text x="50" y="30" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#1A1D23" data-narration="Probability Notation, Inference using Full Joint Distributions, Independence, Baye’s Rule and its use">
    Probability Notation, Inference using Full Joint Distributions, Independence, Baye’s Rule and its use
  </text>
  
  <!-- Section 1: Probability Notation -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="200" height="50" fill="#C7C5B8" rx="10" />
    <text x="10" y="25" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#1A1D23" data-narration="Event: A set of outcomes that can occur.">
      Event
    </text>
    <text x="10" y="45" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#1A1D23" data-narration="Random Variable: A variable that can take on different values based on the occurrence of an event.">
      Random Variable
    </text>
    <text x="10" y="65" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#1A1D23" data-narration="Sample Space: The set of all possible outcomes of an experiment.">
      Sample Space
    </text>
    <text x="10" y="85" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#1A1D23" data-narration="Event Space: A set of events that can occur.">
      Event Space
    </text>
  </g>
  
  <!-- Section 2: Inference using Full Joint Distributions -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="200" height="50" fill="#C7C5B8" rx="10" />
    <text x="10" y="25" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#1A1D23" data-narration="Joint Distribution: A probability distribution that describes the probability of events A and B occurring together.">
      Joint Distribution
    </text>
    <text x="10" y="45" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#1A1D23" data-narration="Conditional Probability: The probability of event A occurring given that event B has occurred.">
      Conditional Probability
    </text>
    <text x="10" y="65" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#1A1D23" data-narration="Independent Events: Events A and B are independent if the occurrence of one event does not affect the probability of the other event.">
      Independent Events
    </text>
  </g>
  
  <!-- Section 3: Independence -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="200" height="50" fill="#C7C5B8" rx="10" />
    <text x="10" y="25" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#1A1D23" data-narration="Mutual Independence: P(A ∩ B) = P(A)P(B) for all possible values of A and B.">
      Mutual Independence
    </text>
    <text x="10" y="45" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#1A1D23" data-narration="Mutual Exclusive: P(A ∩ B) = 0 for all possible values of A and B.">
      Mutual Exclusive
    </text>
  </g>
  
  <!-- Section 4: Baye’s Rule -->
  <g transform="translate(50, 400)">
    <rect x="0" y="0" width="200" height="50" fill="#C7C5B8" rx="10" />
    <text x="10" y="25" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#1A1D23" data-narration="Baye’s Rule: P(A|B) = P(B|A) \* P(A) / P(B).">
      Baye’s Rule
    </text>
  </g>
  
  <!-- Footnote at bottom -->
  <text x="50" y="420" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#1A1D23" data-narration="This diagram illustrates the key concepts of probability notation, inference using full joint distributions, independence, and Baye’s rule.">
    &copy; 2023
  </text>
  
  <!-- Annotation arrows -->
  <path d="M 50 100 L 60 110" stroke="#1A1D23" stroke-width="2" fill="none" data-annotation="From Event to Joint Distribution" />
  <path d="M 50 200 L 60 210" stroke="#1A1D23" stroke-width="2" fill="none" data-annotation="From Joint Distribution to Conditional Probability" />
  <path d="M 50 300 L 60 310" stroke="#1A1D23" stroke-width="2" fill="none" data-annotation="From Conditional Probability to Independence" />
  <path d="M 50 400 L 60 410" stroke="#1A1D23" stroke-width="2" fill="none" data-annotation="From Independence to Baye’s Rule" />
</svg>