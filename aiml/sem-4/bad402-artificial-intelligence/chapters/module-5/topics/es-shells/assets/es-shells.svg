<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    .path {
      fill: none;
      stroke: #1A1D23;
      stroke-width: 2;
    }
    .rect {
      fill: #C7E5F2;
    }
    .circle {
      fill: #3498DB;
    }
    .gradient {
      clip-path: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 100%);
    }
  </style>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7E5F2" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" class="gradient" />
  <title>Expert Systems (ES) Shells</title>
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="100" height="30" class="rect" />
    <text x="5" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">What is an ES Shell?</text>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="1.2 1.2" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="translateX" from="10" to="20" begin="0s" dur="2s" repeatCount="indefinite" />
    <path class="path" d="M 20 30 L 40 60 L 60 80 L 80 100 L 100 120 L 120 140 L 140 160 L 160 180 L 180 200 L 200 220 L 220 240 L 240 260 L 260 280 L 280 300 L 300 320 L 320 340 L 340 360 L 360 380 Z" />
    <text x="5" y="50" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" data-narration="The knowledge base is the repository of knowledge that the expert system uses to make decisions. It can be in the form of rules, facts, or other types of data." />
    <animateTransform attributeName="transform" type="translateX" from="10" to="20" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="0" y="70" width="100" height="30" class="rect" />
    <text x="5" y="80" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" data-narration="The reasoning engine is the core of the expert system, responsible for interpreting the knowledge base and generating decisions." />
    <animateTransform attributeName="transform" type="translateX" from="10" to="20" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="0" y="110" width="100" height="30" class="rect" />
    <text x="5" y="120" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" data-narration="The user interface is the front-end of the expert system, providing a means for users to interact with the system and receive decisions." />
    <animateTransform attributeName="transform" type="translateX" from="10" to="20" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="0" y="150" width="100" height="30" class="rect" />
    <text x="5" y="160" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" data-narration="Fuzzy logic is a mathematical approach to dealing with uncertainty, which allows expert systems to handle imprecise or uncertain data." />
    <animateTransform attributeName="transform" type="translateX" from="10" to="20" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="0" y="190" width="100" height="30" class="rect" />
    <text x="5" y="200" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" data-narration="Rule-based systems are a type of expert system that uses rules to make decisions, where each rule is a statement of the form &quot;if-then&quot;." />
    <animateTransform attributeName="transform" type="translateX" from="10" to="20" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="0" y="230" width="100" height="30" class="rect" />
    <text x="5" y="240" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" data-narration="There are several types of ES shells, including production rule systems, decision tables, and more." />
    <animateTransform attributeName="transform" type="translateX" from="10" to="20" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="0" y="270" width="100" height="30" class="rect" />
    <text x="5" y="280" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" data-narration="Some popular ES shells include CLIPS, Expert System 1.0, and rule-based systems like MYCIN and DENDRAL." />
    <animateTransform attributeName="transform" type="translateX" from="10" to="20" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="0" y="310" width="100" height="30" class="rect" />
    <text x="5" y="320" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" data-narration="ES shells have many applications in various fields, including medicine, engineering, and finance." />
    <animateTransform attributeName="transform" type="translateX" from="10" to="20" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="0" y="350" width="100" height="30" class="rect" />
    <text x="5" y="360" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" data-narration="In conclusion, ES shells are powerful tools for building artificial intelligence applications, and they have many benefits, including flexibility, scalability, and ease of use." />
    <animateTransform attributeName="transform" type="translateX" from="10" to="20" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="0" y="400" width="100" height="30" class="rect" />
    <text x="5" y="410" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">Footer</text>
  </g>
  <rect x="0" y="400" width="400" height="10" class="rect" />
</svg>