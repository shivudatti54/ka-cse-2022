<svg width="420" height="400" data-topic-id="linear-search">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Title Section -->
  <section data-narration="Introduction to Searching">
    <rect x="50" y="50" width="320" height="50" fill="#2F4F7F" rx="10"/>
    <text x="120" y="70" font-size="24" fill="#FFFFFF" text-anchor="middle">Searching</text>
  </section>

  <!-- Linear Search Algorithm Steps -->
  <section data-narration="Basic Algorithm">
    <rect x="50" y="140" width="320" height="30" fill="#2F4F7F" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0,140" to="0,150" dur="1s" begin="0s"/>
    <text x="120" y="155" font-size="18" fill="#FFFFFF" text-anchor="middle">Start from the first element</text>
    <animateTransform attributeName="transform" type="translate" from="0,150" to="0,160" dur="1s" begin="0.5s"/>
    <text x="120" y="170" font-size="18" fill="#FFFFFF" text-anchor="middle">Compare with target element</text>
    <animateTransform attributeName="transform" type="translate" from="0,160" to="0,170" dur="1s" begin="1s"/>
    <text x="120" y="190" font-size="18" fill="#FFFFFF" text-anchor="middle">Move to next element if not match</text>
  </section>

  <!-- ASCII Diagram -->
  <section data-narration="Visual Representation">
    <rect x="50" y="280" width="320" height="70" fill="#2F4F7F" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0,280" to="0,290" dur="1s" begin="2s"/>
    <text x="120" y="310" font-size="18" fill="#FFFFFF" text-anchor="middle">Array: [10, 23, 45, 72, 86, 91, 105]</text>
    <animateTransform attributeName="transform" type="translate" from="0,290" to="0,300" dur="1s" begin="2.5s"/>
    <text x="120" y="320" font-size="18" fill="#FFFFFF" text-anchor="middle">Target: 86</text>
    <animateTransform attributeName="transform" type="translate" from="0,300" to="0,310" dur="1s" begin="3s"/>
  </section>

  <!-- Pointer Arrow -->
  <svg x="50" y="350" width="10" height="50" fill="orange" data-narration="Pointer Arrow">
    <path d="M 0,0 L 10,25 L 0,50 Z"/>
  </svg>