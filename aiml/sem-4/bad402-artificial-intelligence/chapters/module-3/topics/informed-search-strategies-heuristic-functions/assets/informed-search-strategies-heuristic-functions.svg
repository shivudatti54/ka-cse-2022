<svg width="420" height="400" data-topic-id="informed-search-strategies-heuristic-functions">
  <style>
    /* Global Styles */
    body {
      font-family: Arial, sans-serif;
      background-color: #f1f3f5;
    }
    /* Gradient Background */
    .gradient {
      background-image: linear-gradient(to bottom, #4169e1, #6495ed, #8bc34a);
      background-size: 100% 100%;
      background-position: 0% 0%;
      background-repeat: no-repeat;
    }
    /* Section Styles */
    .section {
      padding: 20px;
      margin-bottom: 20px;
      background-color: #fff;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    /* Data-Narration Styles */
    .data-narration {
      font-size: 18px;
