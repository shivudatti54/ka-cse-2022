      <rect x="10" y="80" width="300" height="20" rx="5" fill="#f1f3f5" />
      <text x="10" y="90" class="evaluation-function">Evaluation Function (f(n))</text>
      <rect x="10" y="120" width="300" height="20" rx="5" fill="#f1f3f5" />
      <text x="10" y="130" class="heuristic-function">Heuristic Function (h(n))</text>
