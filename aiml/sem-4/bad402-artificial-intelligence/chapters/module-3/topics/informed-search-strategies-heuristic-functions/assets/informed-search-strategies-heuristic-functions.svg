    }
    /* Evaluation Function Styles */
    .evaluation-function {
      font-size: 18px;
      color: #666;
    }
    /* Heuristic Function Styles */
    .heuristic-function {
      font-size: 18px;
      color: #666;
    }
    /* Best-First Search Styles */
    .best-first-search {
      font-size: 18px;
      color: #666;
    }
  </style>

  <!-- Title -->
  <title>Informed Search Strategies: Heuristic Functions</title>

  <g transform="translate(10, 10)">
