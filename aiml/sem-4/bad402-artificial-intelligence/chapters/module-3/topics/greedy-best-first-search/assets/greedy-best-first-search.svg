<svg width="420" height="400" data-topic-id="Greedy-Best-First-Search">
    <style>
        /*Gradient background*/
        rect {
            fill: #87CEEB; /* light blue */
            stroke: #000;
            stroke-width: 1;
        }
        
        /*Section styles*/
        .section {
            margin-bottom: 20px;
        }
        
        /*Text styles*/
        .title {
            font-size: 24px;
            font-weight: bold;
            color: #3498db; /* indigo */
        }
        
        .footer {
            font-size: 14px;
            color: #8e44ad; /* purple */
            text-align: center;
        }
        
        /*Arrow marker styles*/
        .arrow {
            fill: #f1c40f; /* orange */
            stroke: #000;
            stroke-width: 2;
            shape-rendering: crispEdges;
        }
    </style>
    
    <!--Title section-->
    <g class="title">
        <text x="50%" y="20%" font-size="36px" font-weight="bold">Greedy Best First Search</text>
    </g>
    
    <!--Section 1: Overview-->
    <g class="section">
        <rect x="20" y="80" width="380" height="50" rx="10" fill="#87CEEB" />
        <text x="20%" y="90%" font-size="18px" font-weight="normal" data-narration="Greedy best first search is a heuristic search algorithm used in artificial intelligence to find the shortest path between a start node and a goal node in an unweighted graph.">Overview</text>
        <animate transform="rotate(45 20% 90%)" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>
    
    <!--Section 2: Key Concepts-->
    <g class="section">
        <rect x="20" y="150" width="380" height="50" rx="10" fill="#87CEEB" />
        <text x="20%" y="160%" font-size="18px" font-weight="normal" data-narration="Greedy best first search is a heuristic search algorithm that selects the node with the lowest estimated total cost (heuristic + cost so far) to expand next.">Definition</text>
        <animate transform="rotate(90 20% 160%)" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>
    
    <!--Section 3: Heuristics-->
    <g class="section">
        <rect x="20" y="220" width="380" height="50" rx="10" fill="#87CEEB" />
        <text x="20%" y="230%" font-size="18px" font-weight="normal" data-narration="Heuristics are estimates of the distance from a node to the goal node. In greedy best first search, the heuristic is used to guide the search towards the goal node.">Heuristics</text>
        <animate transform="rotate(45 20% 230%)" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>
    
    <!--Section 4: Greedy Algorithm-->
    <g class="section">
        <rect x="20" y="290" width="380" height="50" rx="10" fill="#87CEEB" />
        <text x="20%" y="300%" font-size="18px" font-weight="normal" data-narration="The greedy algorithm in this algorithm chooses the next node based on the lowest estimated total cost. If the estimated total cost of two nodes is the same, the algorithm chooses the node with the lowest cost so far.">Greedy Algorithm</text>
        <animate transform="rotate(90 20% 300%)" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>
    
    <!--Section 5: How it Works-->
    <g class="section">
        <rect x="20" y="360" width="380" height="50" rx="10" fill="#87CEEB" />
        <text x="20%" y="370%" font-size="18px" font-weight="normal" data-narration="1. Initialize the start node and the goal node. 2. Assign a cost to each node in the graph. 3. Calculate the estimated total cost for each node (heuristic + cost so far). 4. Select the node with the lowest estimated total cost as the next node to expand.">How it Works</text>
        <animate transform="rotate(45 20% 370%)" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>
    
    <!--Section 6: Example-->
    <g class="section">
        <rect x="20" y="420" width="380" height="50" rx="10" fill="#87CEEB" />
        <text x="20%" y="430%" font-size="18px" font-weight="normal" data-narration="Suppose we have a graph with the following nodes and edges:| Node | Edge | Cost | ...| Goal Node | H | 2 | ...| We want to find the shortest path from node A to node H.">Example</text>
        <animate transform="rotate(90 20% 430%)" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>
    
    <!--Footer section-->
    <g class="footer">
        <text x="50%" y="380%" font-size="14px" font-weight="normal" color="#8e44ad">Learn more about Greedy Best First Search</text>
    </g>
    
    <!--Node connections-->
    <path class="arrow" d="M 100 150 L 250 150" />
    <path class="arrow" d="M 150 200 L 250 200" />
    <path class="arrow" d="M 150 250 L 250 250" />
    <path class="arrow" d="M 100 300 L 250 300" />
    <path class="arrow" d="M 150 350 L 250 350" />
    
    <!--Node shapes-->
    <circle cx="100" cy="150" r="10" fill="#ccc" />
    <circle cx="150" cy="200" r="10" fill="#ccc" />
    <circle cx="150" cy="250" r="10" fill="#ccc" />
    <circle cx="100" cy="300" r="10" fill="#ccc" />
    <circle cx="150" cy="350" r="10" fill="#ccc" />
    <circle cx="200" cy="150" r="10" fill="#ccc" />
    <circle cx="250" cy="200" r="10" fill="#ccc" />
    <circle cx="250" cy="250" r="10" fill="#ccc" />
    <circle cx="250" cy="300" r="10" fill="#ccc" />
    <circle cx="250" cy="350" r="10" fill="#ccc" />
    <circle cx="300" cy="150" r="10" fill="#ccc" />
    <circle cx="350" cy="200" r="10" fill="#ccc" />
    <circle cx="350" cy="250" r="10" fill="#ccc" />
    <circle cx="350" cy="300" r="10" fill="#ccc" />
    <circle cx="350" cy="350" r="10" fill="#ccc" />
    <circle cx="250" cy="400" r="10" fill="#ccc" />
</svg>