<svg width="420" height="400" data-topic-id="8-hours" xmlns="http://www.w3.org/2000/svg">
    <style>
        .rect {
            fill: #c7e9f7;
            stroke: #007bff;
            stroke-width: 2;
        }
    </style>
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#e6fff" stop-opacity="1"/>
            <stop offset="50%" stop-color="#d7ffc7" stop-opacity="1"/>
            <stop offset="100%" stop-color="#c2e7f5" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <g transform="translate(20, 20)">
        <rect class="rect" width="380" height="360" fill="url(#pastel-gradient)"/>
        <text x="12" y="20" font-size="18" font-family="Arial" fill="#007bff">8 Hours: A Study of Time Management</text>
        <text x="12" y="380" font-size="18" font-family="Arial" fill="#007bff">Effective Time Management for Achieving Success</text>
        <rect class="rect" width="90" height="80" rx="10" transform="translate(190, 190)" fill="#007bff" data-narration="8 hours of focused work, eliminating distractions and interruptions"/>
        <animateTransform attributeName="transform" type="rotate" from="0 190 190" to="360 190 190" dur="2s" begin="0s" repeatCount="indefinite"/>
        <rect class="rect" width="90" height="80" rx="10" transform="translate(280, 190)" fill="#007bff" data-narration="16 hours of rest and relaxation, prioritizing self-care and relaxation"/>
        <animateTransform attributeName="transform" type="rotate" from="0 280 190" to="360 280 190" dur="2s" begin="0.5s" repeatCount="indefinite"/>
        <rect class="rect" width="90" height="80" rx="10" transform="translate(370, 190)" fill="#007bff" data-narration="Buffer time, avoiding overcommitting and maintaining a sustainable pace"/>
        <animateTransform attributeName="transform" type="rotate" from="0 370 190" to="360 370 190" dur="2s" begin="1s" repeatCount="indefinite"/>
        <rect class="rect" width="90" height="80" rx="10" transform="translate(160, 300)" fill="#007bff" data-narration="Set clear goals, establishing priorities to maximize productivity"/>
        <animateTransform attributeName="transform" type="rotate" from="0 160 300" to="360 160 300" dur="2s" begin="2s" repeatCount="indefinite"/>
        <rect class="rect" width="90" height="80" rx="10" transform="translate(240, 300)" fill="#007bff" data-narration="Create a schedule, planning dedicated work periods, breaks, and relaxation time"/>
        <animateTransform attributeName="transform" type="rotate" from="0 240 300" to="360 240 300" dur="2s" begin="2.5s" repeatCount="indefinite"/>
        <rect class="rect" width="90" height="80" rx="10" transform="translate(320, 300)" fill="#007bff" data-narration="Prioritize self-care, allocating time for exercise, meditation, or other activities that promote well-being"/>
        <animateTransform attributeName="transform" type="rotate" from="0 320 300" to="360 320 300" dur="2s" begin="3s" repeatCount="indefinite"/>
        <rect class="rect" width="90" height="80" rx="10" transform="translate(400, 190)" fill="#007bff" data-narration="Review and adjust, regularly re-evaluating your schedule and habits to optimize your productivity"/>
        <animateTransform attributeName="transform" type="rotate" from="0 400 190" to="360 400 190" dur="2s" begin="3.5s" repeatCount="indefinite"/>
        <g transform="translate(180, 220)"/>
        <circle cx="10" cy="10" r="10" fill="#00698f" data-topic-id="indigo"/>
        <circle cx="220" cy="10" r="10" fill="#0097a7" data-topic-id="teal"/>
        <circle cx="10" cy="250" r="10" fill="#f7dc6f" data-topic-id="orange"/>
        <g transform="translate(120, 250)"/>
        <line x1="10" y1="275" x2="10" y2="295" stroke="#007bff" stroke-width="2" data-topic-id="arrow"/>
        <line x1="220" y1="275" x2="220" y2="295" stroke="#007bff" stroke-width="2" data-topic-id="arrow"/>
        <line x1="10" y1="200" x2="10" y2="275" stroke="#007bff" stroke-width="2" data-topic-id="arrow"/>
        <line x1="220" y1="200" x2="220" y2="275" stroke="#007bff" stroke-width="2" data-topic-id="arrow"/>
        <g transform="translate(380, 220)"/>
        <text x="18" y="380" font-size="14" font-family="Arial" fill="#007bff">Benefits of the 8-Hour Rule</text>
        <text x="18" y="410" font-size="14" font-family="Arial" fill="#007bff">Improved Productivity</text>
        <text x="18" y="440" font-size="14" font-family="Arial" fill="#007bff">Better Work-Life Balance</text>
        <text x="18" y="470" font-size="14" font-family="Arial" fill="#007bff">Increased Energy</text>
        <g transform="translate(380, 300)"/>
        <text x="18" y="330" font-size="14" font-family="Arial" fill="#007bff">Key Components of the 8-Hour Rule</text>
        <text x="18" y="350" font-size="14" font-family="Arial" fill="#007bff">8 Hours of Focused Work</text>
        <text x="18" y="370" font-size="14" font-family="Arial" fill="#007bff">16 Hours of Rest and Relaxation</text>
        <text x="18" y="390" font-size="14" font-family="Arial" fill="#007bff">Buffer Time</text>
        <text x="18" y="410" font-size="14" font-family="Arial" fill="#007bff">Set Clear Goals</text>
        <text x="18" y="430" font-size="14" font-family="Arial" fill="#007bff">Create a Schedule</text>
        <text x="18" y="450" font-size="14" font-family="Arial" fill="#007bff">Prioritize Self-Care</text>
        <text x="18" y="470" font-size="14" font-family="Arial" fill="#007bff">Review and Adjust</text>
        <g transform="translate(460, 220)"/>
        <text x="467" y="20" font-size="18" font-family="Arial" fill="#007bff">Animated Educational Diagram for 8 Hours</text>
        <text x="467" y="380" font-size="18" font-family="Arial" fill="#007bff">Effective Time Management for Achieving Success</text>
        <text x="467" y="400" font-size="18" font-family="Arial" fill="#007bff">Copyright 2023</text>
    </svg>