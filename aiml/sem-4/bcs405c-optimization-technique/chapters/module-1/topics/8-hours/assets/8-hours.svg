<svg width="420" height="400" data-topic-id="Vector-Calculus-Optimization-Technique-8-hours">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"></stop>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="20%" y="10%" font-size="30" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    8 Hours of Vector Calculus Optimization Technique
  </text>

  <!-- Section 1: What is Optimization? -->
  <rect x="20%" y="50%" width="360%" height="150%" fill="url(#gradient)" data-narration="What is Optimization?">
    <text x="20%" y="60%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">
      Optimization is the process of finding the best solution among a set of possible solutions.
    </text>
  </rect>

  <!-- Section 2: Types of Optimization -->
  <rect x="20%" y="220%" width="360%" height="150%" fill="url(#gradient)" data-narration="Types of Optimization">
    <text x="20%" y="230%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">
      There are two primary types of optimization: Unconstrained Optimization and Constrained Optimization.
    </text>
  </rect>

  <!-- Section 3: Gradient Descent -->
  <rect x="20%" y="390%" width="360%" height="150%" fill="url(#gradient)" data-narration="Gradient Descent">
    <text x="20%" y="400%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">
      Gradient Descent is an optimization algorithm that iteratively updates the parameters of a function to minimize the loss function.
    </text>
    <animate transform="rotate(360 20% 20%)" begin="0s" dur="10s" repeat="indefinite"></animate>
  </rect>

  <!-- Section 4: Newton's Method -->
  <rect x="20%" y="550%" width="360%" height="150%" fill="url(#gradient)" data-narration="Newton's Method">
    <text x="20%" y="560%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">
      Newton's Method is an optimization algorithm that uses the Hessian matrix to update the parameters of a function.
    </text>
    <animate transform="rotate(720 20% 20%)" begin="10s" dur="10s" repeat="indefinite"></animate>
  </rect>

  <!-- Section 5: Arrow markers for connections -->
  <line x1="20%" y1="50%" x2="20%" y2="120%" stroke="#3498db" stroke-width="2"></line>
  <line x1="20%" y1="220%" x2="20%" y2="300%" stroke="#3498db" stroke-width="2"></line>
  <line x1="20%" y1="390%" x2="20%" y2="460%" stroke="#3498db" stroke-width="2"></line>
  <line x1="20%" y1="550%" x2="20%" y2="620%" stroke="#3498db" stroke-width="2"></line>

  <!-- Footer -->
  <text x="20%" y="380%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">
    8 Hours of Vector Calculus Optimization Technique
  </text>
</svg>