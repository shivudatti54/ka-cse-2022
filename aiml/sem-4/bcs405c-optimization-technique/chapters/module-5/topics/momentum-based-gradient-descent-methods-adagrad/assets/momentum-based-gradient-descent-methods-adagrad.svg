<svg width="420" height="400" data-topic-id="adagrad">
  <!-- Header -->
  <rect x="10" y="10" width="400" height="50" style="fill: #2E4053; stroke: #2E4053; stroke-width: 2" />
  <text x="15" y="25" font-size="24" font-family="Arial, sans-serif" fill="#66CCCC">Momentum-based Gradient Descent Methods: Adagrad</text>

  <!-- Introduction Section -->
  <section data-narration="Introduction">
    <rect x="10" y="80" width="400" height="50" style="fill: #2E4053; stroke: #2E4053; stroke-width: 2" />
    <text x="15" y="95" font-size="18" font-family="Arial, sans-serif" fill="#66CCCC">Gradient Descent (GD) is a widely used optimization technique to minimize the loss function in machine learning models.</text>
    <animate begin="1s"dur="2s" attributeName="opacity" from="1" to="0" />
  </section>

  <!-- Defining Gradient Descent Section -->
  <section data-narration="Defining Gradient Descent">
    <rect x="10" y="140" width="400" height="50" style="fill: #2E4053; stroke: #2E4053; stroke-width: 2" />
    <text x="15" y="155" font-size="18" font-family="Arial, sans-serif" fill="#66CCCC">The update rule is given by:</text>
    <text x="15" y="175" font-size="18" font-family="Arial, sans-serif" fill="#66CCCC">w_new = w_old - α * ∇L(w_old)</text>
    <animate begin="3s"dur="2s" attributeName="opacity" from="1" to="0" />
  </section>

  <!-- Momentum-based Gradient Descent Methods Section -->
  <section data-narration="Momentum-based Gradient Descent Methods">
    <rect x="10" y="190" width="400" height="50" style="fill: #2E4053; stroke: #2E4053; stroke-width: 2" />
    <text x="15" y="205" font-size="18" font-family="Arial, sans-serif" fill="#66CCCC">Momentum-based gradient descent methods add a momentum term to the update rule to help the algorithm escape local minima.</text>
    <linearGradient id="momentumGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1" />
      <stop offset="100%" stop-color="#33CC66" stop-opacity="1" />
    </linearGradient>
    <rect x="15" y="225" width="350" height="20" style="fill: url(#momentumGradient); stroke: #2E4053; stroke-width: 2" />
    <animate begin="5s"dur="2s" attributeName="opacity" from="1" to="0" />
  </section>

  <!-- Adagrad Algorithm Section -->
  <section data-narration="Adagrad Algorithm">
    <rect x="10" y="255" width="400" height="50" style="fill: #2E4053; stroke: #2E4053; stroke-width: 2" />
    <text x="15" y="270" font-size="18" font-family="Arial, sans-serif" fill="#66CCCC">Adagrad adapts the learning rate for each parameter individually.</text>
    <text x="15" y="300" font-size="18" font-family="Arial, sans-serif" fill="#66CCCC">The update rule is given by:</text>
    <text x="15" y="330" font-size="18" font-family="Arial, sans-serif" fill="#66CCCC">w_new = w_old - α * ∇L(w_old) / ||∇L(w_old)||^2</text>
    <animate begin="7s"dur="2s" attributeName="opacity" from="1" to="0" />
  </section>

  <!-- Key Concepts Section -->
  <section data-narration="Key Concepts">
    <rect x="10" y="360" width="400" height="50" style="fill: #2E4053; stroke: #2E4053; stroke-width: 2" />
    <text x="15" y="375" font-size="18" font-family="Arial, sans-serif" fill="#66CCCC">Momentum:</text>
    <text x="15" y="395" font-size="18" font-family="Arial, sans-serif" fill="#66CCCC">Adaptive learning rate.</text>
    <animate begin="9s"dur="2s" attributeName="opacity" from="1" to="0" />
  </section>

  <!-- Footer -->
  <rect x="10" y="400" width="400" height="50" style="fill: #2E4053; stroke: #2E4053; stroke-width: 2" />
  <text x="15" y="415" font-size="18" font-family="Arial, sans-serif" fill="#66CCCC">Momentum-based Gradient Descent Methods: Adagrad</text>
</svg>