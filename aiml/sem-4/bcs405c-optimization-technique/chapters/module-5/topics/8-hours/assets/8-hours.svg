<svg width="420" height="400" data-topic-id="8-hours">
  <!-- Gradient background -->
  <Defs>
    <LinearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <Stop offset="0%" stop-color="#7A7AFF" stop-opacity="1"/>
      <Stop offset="100%" stop-color="#34A85A" stop-opacity="1"/>
    </LinearGradient>
  </Defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#grad)" opacity="0.7"/>
  
  <!-- Title -->
  <text x="20%" y="20%" font-size="24" font-family="Arial Black" fill="#2B5F8B">
    <tspan>8 Hours</tspan>
  </text>
  
  <!-- Section 1 -->
  <rect x="20%" y="50%" width="80%" height="100" fill="#F7F7F7" opacity="0.8"/>
  <text x="40%" y="70%" font-size="18" font-family="Arial" fill="#2B5F8B" data-narration="What is (8 hours)?">
    8 hours is not an actual technique, but rather a placeholder for a technique that is commonly used in optimization problems.
  </text>
  
  <!-- Section 2 -->
  <rect x="20%" y="170%" width="80%" height="100" fill="#F7F7F7" opacity="0.8"/>
  <text x="40%" y="190%" font-size="18" font-family="Arial" fill="#2B5F8B" data-narration="Definition and Explanation">
    An optimization problem is defined as follows:
    <tspan>Objective Function:</tspan>
    <tspan> A function that needs to be maximized or minimized.</tspan>
    <tspan>Constraints:</tspan>
    <tspan> A set of rules that limit the possible solutions.</tspan>
    <tspan>Solution Space:</tspan>
    <tspan> The set of all possible solutions.</tspan>
  </text>
  
  <!-- Section 3 -->
  <rect x="20%" y="280%" width="80%" height="100" fill="#F7F7F7" opacity="0.8"/>
  <text x="40%" y="300%" font-size="18" font-family="Arial" fill="#2B5F8B" data-narration="Key Concepts">
    Time Allocation: Allocating a fixed amount of time to solve an optimization problem.
    Solution Space Reduction: Techniques used to reduce the solution space and make the optimization problem more manageable.
    Heuristics: Rules of thumb or intuitive methods used to find good solutions.
    Global Optimization: Finding the global optimum of an optimization problem, rather than a local optimum.
  </text>
  
  <!-- Section 4 -->
  <rect x="20%" y="380%" width="80%" height="100" fill="#F7F7F7" opacity="0.8"/>
  <text x="40%" y="400%" font-size="18" font-family="Arial" fill="#2B5F8B" data-narration="Examples and Applications">
    1. Optimization problems in computer science.
    2. Real-world applications in logistics and finance.
  </text>
  
  <!-- Footer -->
  <text x="20%" y="500%" font-size="18" font-family="Arial" fill="#2B5F8B">
    Created by [Your Name]
  </text>
  
  <!-- Animation -->
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" begin="0s" dur="10s" repeatCount="indefinite">
    <animateTransform attributeName="x" begin="0s" dur="10s" repeatCount="indefinite">
      <animateTransform attributeName="x" begin="0s" dur="5s" from="20%" to="40%"/>
      <animateTransform attributeName="x" begin="5s" dur="5s" from="40%" to="20%"/>
    </animateTransform>
  </animate>
</svg>