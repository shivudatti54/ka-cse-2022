<svg width="420" height="400" data-topic-id="Saddle Point Methods">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#CCCCFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#CCFF66" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>
  
  <!-- Title and footer -->
  <text x="50%" y="50%" text-anchor="middle" font-size="24" font-family="Arial" fill="#008000" data-narration="Title">Saddle Point Methods</text>
  <text x="50%" y="90%" text-anchor="middle" font-size="18" font-family="Arial" fill="#008000" data-narration="Footer"></text>
  
  <!-- Section 1: Contiguous Allocation -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="200" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="10"/>
    <text x="10" y="15" text-anchor="start" font-size="16" font-family="Arial" fill="#000000" data-narration="Contiguous Allocation">
      <tspan>Each file occupies contiguous blocks on disk.</tspan>
      <tspan>Directory Entry: (filename, start_block, length)</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(300, 50)">
    <rect x="0" y="0" width="200" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="10"/>
    <text x="10" y="15" text-anchor="start" font-size="16" font-family="Arial" fill="#000000" data-narration="Advantages">
      <tspan>Advantages:</tspan>
      <tspan>Simple implementation, Excellent read performance (sequential access), Supports direct access.</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="1s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(500, 50)">
    <rect x="0" y="0" width="200" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="10"/>
    <text x="10" y="15" text-anchor="start" font-size="16" font-family="Arial" fill="#000000" data-narration="Disadvantages">
      <tspan>Disadvantages:</tspan>
      <tspan>External fragmentation, File size must be known at creation, Difficult to grow files.</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="2s" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 2: Linked Allocation -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="200" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="10"/>
    <text x="10" y="15" text-anchor="start" font-size="16" font-family="Arial" fill="#000000" data-narration="Linked Allocation">
      <tspan>Each block contains pointer to next block.</tspan>
      <tspan>Directory Entry: (filename, start_block, end_block)</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(300, 150)">
    <rect x="0" y="0" width="200" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="10"/>
    <text x="10" y="15" text-anchor="start" font-size="16" font-family="Arial" fill="#000000" data-narration="Advantages">
      <tspan>Advantages:</tspan>
      <tspan>No external fragmentation, Files can grow dynamically, Simple allocation.</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="1s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(500, 150)">
    <rect x="0" y="0" width="200" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="10"/>
    <text x="10" y="15" text-anchor="start" font-size="16" font-family="Arial" fill="#000000" data-narration="Disadvantages">
      <tspan>Disadvantages:</tspan>
      <tspan>No direct access (must traverse), Pointer space overhead, Reliability issues (one bad pointer loses rest).</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="2s" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 3: Indexed Allocation -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="200" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="10"/>
    <text x="10" y="15" text-anchor="start" font-size="16" font-family="Arial" fill="#000000" data-narration="Indexed Allocation">
      <tspan>Index block contains all pointers to data blocks.</tspan>
      <tspan>Directory Entry: (filename, index_block)</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(300, 250)">
    <rect x="0" y="0" width="200" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="10"/>
    <text x="10" y="15" text-anchor="start" font-size="16" font-family="Arial" fill="#000000" data-narration="Advantages">
      <tspan>Advantages:</tspan>
      <tspan>Direct access supported, No external fragmentation, Easy file growth.</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="1s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(500, 250)">
    <rect x="0" y="0" width="200" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="10"/>
    <text x="10" y="15" text-anchor="start" font-size="16" font-family="Arial" fill="#000000" data-narration="Disadvantages">
      <tspan>Disadvantages:</tspan>
      <tspan>Index block overhead, Index block size limits file size.</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="2s" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 4: Handling Large Files -->
  <g transform="translate(50, 350)">
    <rect x="0" y="0" width="200" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="10"/>
    <text x="10" y="15" text-anchor="start" font-size="16" font-family="Arial" fill="#000000" data-narration="Linked Index">
      <tspan>Index blocks linked together</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(300, 350)">
    <rect x="0" y="0" width="200" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="10"/>
    <text x="10" y="15" text-anchor="start" font-size="16" font-family="Arial" fill="#000000" data-narration="Multi-level Index">
      <tspan>Index of indexes</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="1s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(500, 350)">
    <rect x="0" y="0" width="200" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="10"/>
    <text x="10" y="15" text-anchor="start" font-size="16" font-family="Arial" fill="#000000" data-narration="Combined (Unix inode)">
      <tspan>12 direct pointers, 1 single indirect, 1 double indirect, 1 triple indirect</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="2s" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Comparison Table -->
  <g transform="translate(50, 450)">
    <rect x="0" y="0" width="200" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="10"/>
    <text x="10" y="15" text-anchor="start" font-size="16" font-family="Arial" fill="#000000" data-narration="Comparison">
      <tspan>Method</tspan>
      <tspan>Fragmentation</tspan>
      <tspan>Direct Access</tspan>
      <tspan>Growth</tspan>
    </text>
    <rect x="10" y="35" width="180" height="25" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="10"/>
    <text x="10" y="40" text-anchor="start" font-size="14" font-family="Arial" fill="#000000">
      <tspan>Contiguous</tspan>
      <tspan>External</tspan>
      <tspan>Yes</tspan>
      <tspan>Difficult</tspan>
    </text>
    <rect x="230" y="35" width="180" height="25" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="10"/>
    <text x="230" y="40" text-anchor="start" font-size="14" font-family="Arial" fill="#000000">
      <tspan>Linked</tspan>
      <tspan>None</tspan>
      <tspan>No</tspan>
      <tspan>Easy</tspan>
    </text>
    <rect x="460" y="35" width="180" height="25" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="10"/>
    <text x="460" y="40" text-anchor="start" font-size="14" font-family="Arial" fill="#000000">
      <tspan>Indexed</tspan>
      <tspan>None</tspan>
      <tspan>Yes</tspan>
      <tspan>Easy</tspan>
    </text>
  </g>
  
  <!-- Unix Inode Example -->
  <g transform="translate(50, 500)">
    <rect x="0" y="0" width="200" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2" rx="10"/>
    <text x="10" y="15" text-anchor="start" font-size="16" font-family="Arial" fill="#000000" data-narration="Unix Inode Example">
      <tspan>With 4KB blocks and 4-byte pointers:</tspan>
      <tspan>Direct: 12 × 4KB = 48KB</tspan>
      <tspan>Single indirect: 1024 × 4KB = 4MB</tspan>
      <tspan>Double indirect: 1024² × 4KB = 4GB</tspan>
      <tspan>Triple indirect: 1024³ × 4KB = 4TB</tspan>
      <tspan>Maximum file size ≈ 4TB</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
</svg>