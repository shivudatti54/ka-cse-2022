<svg width="420" height="400" data-topic-id="optimization-techniques-8-hours">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
            <stop offset="50%" stop-color="#66CCCC" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#66CCCC" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="20" y="20" width="380" height="360" fill="url(#gradient)"/>
    <title>Optimization Techniques: 8 Hours</title>
    <g transform="translate(10, 30)">
        <rect width="100" height="20" fill="#FFC107" rx="5"/>
        <text x="10" y="5" font-size="16" font-family="Arial, sans-serif" fill="#000" text-anchor="start">Introduction</text>
        <text x="10" y="25" font-size="14" font-family="Arial, sans-serif" fill="#000" text-anchor="start">Optimization techniques are used to find the maximum or minimum value of a function subject to certain constraints.</text>
        <animateTransform attributeName="transform" type="rotate" from="0 190 20" to="360 190 20" dur="10s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(120, 30)">
        <rect width="100" height="20" fill="#34A85A" rx="5"/>
        <text x="10" y="5" font-size="16" font-family="Arial, sans-serif" fill="#000" text-anchor="start">Definition</text>
        <text x="10" y="25" font-size="14" font-family="Arial, sans-serif" fill="#000" text-anchor="start">Optimization is the process of finding the best value of a function subject to certain constraints.</text>
        <animateTransform attributeName="transform" type="rotate" from="0 220 20" to="360 220 20" dur="10s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(220, 30)">
        <rect width="100" height="20" fill="#1ABC9C" rx="5"/>
        <text x="10" y="5" font-size="16" font-family="Arial, sans-serif" fill="#000" text-anchor="start">Types</text>
        <text x="10" y="25" font-size="14" font-family="Arial, sans-serif" fill="#000" text-anchor="start">There are two types of optimization: unconstrained and constrained optimization.</text>
        <animateTransform attributeName="transform" type="rotate" from="0 250 20" to="360 250 20" dur="10s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(320, 30)">
        <rect width="100" height="20" fill="#E74C3C" rx="5"/>
        <text x="10" y="5" font-size="16" font-family="Arial, sans-serif" fill="#000" text-anchor="start">Methods</text>
        <text x="10" y="25" font-size="14" font-family="Arial, sans-serif" fill="#000" text-anchor="start">There are several methods of optimization, including gradient descent, Newton's method, and Lagrange multiplier method.</text>
        <animateTransform attributeName="transform" type="rotate" from="0 290 20" to="360 290 20" dur="10s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(20, 340)">
        <rect width="380" height="20" fill="#F1C40F" rx="5"/>
        <text x="10" y="5" font-size="16" font-family="Arial, sans-serif" fill="#000" text-anchor="start">Applications</text>
        <text x="10" y="25" font-size="14" font-family="Arial, sans-serif" fill="#000" text-anchor="start">Optimization techniques have numerous applications in various fields, including physics, engineering, economics, and computer science.</text>
        <animateTransform attributeName="transform" type="rotate" from="0 190 350" to="360 190 350" dur="10s" repeatCount="indefinite"/>
    </g>
    <footer>
        <g transform="translate(10, 370)">
            <rect width="380" height="20" fill="#F1C40F" rx="5"/>
            <text x="10" y="5" font-size="16" font-family="Arial, sans-serif" fill="#000" text-anchor="start">Stay updated with our latest study materials!</text>
        </g>
    </footer>
</svg>