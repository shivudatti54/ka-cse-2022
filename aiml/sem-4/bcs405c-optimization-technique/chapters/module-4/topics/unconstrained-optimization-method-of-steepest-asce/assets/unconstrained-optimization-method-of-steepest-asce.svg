<svg width="420" height="400" data-topic-id="unconstrained-optimization-method-of-steepest-ascent">
    <title>Unconstrained Optimization: Method of Steepest Ascent/Descent</title>
    <rect x="0" y="0" width="420" height="400" fill="#66CCCC"/>
    <g transform="translate(10, 10)">
        <rect x="0" y="0" width="400" height="350" fill="#C5E1F5"/>
        <text x="15" y="15" font-size="18" font-family="Arial" fill="#3498DB">Method of Steepest Ascent/Descent</text>
        <g data-narration="Introduction">
            <rect x="0" y="50" width="400" height="50" fill="#F7F7F7"/>
            <text x="15" y="60" font-size="18" font-family="Arial" fill="#2C3E50">Unconstrained Optimization Techniques</text>
        </g>
        <g data-narration="Definition and How it Works">
            <rect x="0" y="110" width="400" height="50" fill="#F7F7F7"/>
            <rect x="0" y="120" width="100" height="30" fill="#FFC107"/>
            <text x="15" y="130" font-size="18" font-family="Arial" fill="#2C3E50">Definition:</text>
            <text x="125" y="130" font-size="18" font-family="Arial" fill="#2C3E50">The Method of Steepest Ascent/Descent is a simple optimization technique that uses the gradient of the objective function to move in the direction of the negative gradient.</text>
            <text x="15" y="160" font-size="18" font-family="Arial" fill="#2C3E50">How it works:</text>
            <text x="15" y="170" font-size="18" font-family="Arial" fill="#2C3E50">Initialize a starting point for the optimization.</text>
            <text x="15" y="190" font-size="18" font-family="Arial" fill="#2C3E50">Calculate the gradient of the objective function at the current point.</text>
            <text x="15" y="210" font-size="18" font-family="Arial" fill="#2C3E50">Move in the direction of the negative gradient by a small step size.</text>
            <text x="15" y="230" font-size="18" font-family="Arial" fill="#2C3E50">Repeat the process until convergence.</text>
        </g>
        <g data-narration="Example">
            <rect x="0" y="280" width="400" height="50" fill="#F7F7F7"/>
            <rect x="0" y="290" width="100" height="30" fill="#FF9800"/>
            <text x="15" y="300" font-size="18" font-family="Arial" fill="#2C3E50">Example:</text>
            <text x="125" y="300" font-size="18" font-family="Arial" fill="#2C3E50">Consider the objective function f(x) = x^2.</text>
            <text x="15" y="320" font-size="18" font-family="Arial" fill="#2C3E50">The gradient of f(x) is f'(x) = 2x.</text>
            <text x="15" y="340" font-size="18" font-family="Arial" fill="#2C3E50">Initialize x = 1 and take a step size of 0.1.</text>
            <text x="15" y="360" font-size="18" font-family="Arial" fill="#2C3E50">The new point is x = 1 - 0.1 \* 2 = 0.8.</text>
        </g>
        <g data-narration="Newton-Raphson (NR) Method">
            <rect x="0" y="350" width="400" height="50" fill="#F7F7F7"/>
            <rect x="0" y="360" width="100" height="30" fill="#FFC107"/>
            <text x="15" y="370" font-size="18" font-family="Arial" fill="#2C3E50">Newton-Raphson (NR) Method:</text>
            <text x="125" y="370" font-size="18" font-family="Arial" fill="#2C3E50">A powerful optimization technique that uses the Hessian matrix of the objective function to find the minimum or maximum.</text>
        </g>
        <animate xlink:href="#animate-gradient" dur="10s" begin="1s"/>
        <animate xlink:href="#animate-text" dur="5s" begin="2s"/>
    </g>
    <g data-narration="Footer">
        <rect x="0" y="380" width="400" height="20" fill="#66CCCC"/>
        <text x="15" y="390" font-size="18" font-family="Arial" fill="#3498DB">Copyright 2023</text>
    </g>
</svg>