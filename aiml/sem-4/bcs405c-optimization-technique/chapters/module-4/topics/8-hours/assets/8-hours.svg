    <div class="gradient">
        <div class="title">8 Hours</div>
        <div class="sections">
            <div class="section data-narration="Introduction" data-id="1">
                <div class="section-content">
                    <h2>Introduction</h2>
                    <p>(8 hours) is an optimization technique used in convex optimization.</p>
                </div>
