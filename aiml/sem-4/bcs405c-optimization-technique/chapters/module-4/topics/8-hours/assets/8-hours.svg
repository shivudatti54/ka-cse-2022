            <div class="section data-narration="What is (8 hours)?" data-id="2">
                <div class="section-content">
                    <h2>What is (8 hours)?</h2>
                    <p>(8 hours) is defined as the set of all points in the feasible region that lie on the boundary of the region.</p>
                </div>
