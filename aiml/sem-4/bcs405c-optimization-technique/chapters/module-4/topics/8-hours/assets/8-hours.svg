            </div>
            <div class="section data-narration="Linear Programming Example" data-id="4">
                <div class="section-content">
                    <h2>Linear Programming Example</h2>
                    <p>Consider the following linear programming problem:</p>
                    <ul>
                        <li>Maximize: 2x + 3y</li>
                        <li>Subject to:</li>
                        <li>x + y ≤ 4</li>
                        <li>x ≥ 0</li>
                        <li>y ≥ 0</li>
                    </ul>
                    <p>The feasible region is a triangle with vertices (0, 0), (4, 0), and (0, 4). The set (8 hours) is the boundary of this triangle, which is a line segment.</p>
                </div>
                <div class="arrow-marker"></div>
            </div>
