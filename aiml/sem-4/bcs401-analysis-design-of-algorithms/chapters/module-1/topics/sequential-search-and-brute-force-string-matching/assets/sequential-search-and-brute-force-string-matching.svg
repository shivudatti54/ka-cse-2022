<svg width="420" height="400" data-topic-id="sequential-search-and-brute-force-string-matching">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" style="fill: url(#gradient)"/>
  <text x="10" y="20" font-size="24" font-family="Arial" fill="#2E4053">String Matching</text>
  <text x="10" y="60" font-size="18" font-family="Arial" fill="#2E4053">Sequential Search</text>
  <section data-narration="Sequential Search Introduction">
    <rect x="50" y="100" width="320" height="120" style="fill:#F7F7F7"/>
    <text x="60" y="110" font-size="18" font-family="Arial" fill="#2E4053">Definition:</text>
    <text x="60" y="130" font-size="18" font-family="Arial" fill="#2E4053">Sequential Search is a method of finding a specific substring within a larger string by iterating through the characters of the string one by one.</text>
  </section>
  <section data-narration="Sequential Search Algorithm">
    <rect x="50" y="250" width="320" height="120" style="fill:#F7F7F7"/>
    <text x="60" y="260" font-size="18" font-family="Arial" fill="#2E4053">Algorithm:</text>
    <text x="60" y="280" font-size="18" font-family="Arial" fill="#2E4053">1. Initialize two pointers, i and j, to 0, which will be used to traverse the string and the substring respectively.</text>
    <text x="60" y="300" font-size="18" font-family="Arial" fill="#2E4053">2. Compare the characters at the current positions i and j in the string and the substring.</text>
    <text x="60" y="320" font-size="18" font-family="Arial" fill="#2E4053">3. If the characters match, increment both i and j by 1.</text>
    <text x="60" y="340" font-size="18" font-family="Arial" fill="#2E4053">4. If the characters do not match, increment i by 1 and reset j to 0.</text>
  </section>
  <section data-narration="Sequential Search Example">
    <rect x="50" y="400" width="320" height="120" style="fill:#F7F7F7"/>
    <text x="60" y="410" font-size="18" font-family="Arial" fill="#2E4053">Example:</text>
    <text x="60" y="430" font-size="18" font-family="Arial" fill="#2E4053">Suppose we want to find the substring &quot;abc&quot; in the string &quot;abcdefg&quot;.</text>
    <text x="60" y="450" font-size="18" font-family="Arial" fill="#2E4053">| i   | j   | chars | result |</text>
    <text x="60" y="470" font-size="18" font-family="Arial" fill="#2E4053">| 0   | 0   | a     |        |</text>
    <text x="60" y="490" font-size="18" font-family="Arial" fill="#2E4053">| 0   | 1   | b     |        |</text>
    <text x="60" y="510" font-size="18" font-family="Arial" fill="#2E4053">| 0   | 2   | c     |        |</text>
    <text x="60" y="530" font-size="18" font-family="Arial" fill="#2E4053">| 0   | 3   | d     |        |</text>
    <text x="60" y="550" font-size="18" font-family="Arial" fill="#2E4053">| 0   | 4   | e     |        |</text>
    <text x="60" y="570" font-size="18" font-family="Arial" fill="#2E4053">| 0   | 5   | f     |        |</text>
    <text x="60" y="590" font-size="18" font-family="Arial" fill="#2E4053">| 0   | 6   | g     |        |</text>
    <text x="60" y="610" font-size="18" font-family="Arial" fill="#2E4053">| 1   | 0   | a     |        |</text>
    <text x="60" y="630" font-size="18" font-family="Arial" fill="#2E4053">| 1   | 1   | b     |        |</text>
    <text x="60" y="650" font-size="18" font-family="Arial" fill="#2E4053">| 1   | 2   | c     |        |</text>
    <text x="60" y="670" font-size="18" font-family="Arial" fill="#2E4053">| 1   | 3   |       |        |</text>
    <text x="60" y="690" font-size="18" font-family="Arial" fill="#2E4053">| 1   | 4   | d     |        |</text>
    <text x="60" y="710" font-size="18" font-family="Arial" fill="#2E4053">| 1   | 5   | e     |        |</text>
    <text x="60" y="730" font-size="18" font-family="Arial" fill="#2E4053">| 1   | 6   | f     |        |</text>
    <text x="60" y="750" font-size="18" font-family="Arial" fill="#2E4053">| 2   | 0   |       |        |</text>
    <text x="60" y="770" font-size="18" font-family="Arial" fill="#2E4053">| 2   | 1   | a     |        |</text>
    <text x="60" y="790" font-size="18" font-family="Arial" fill="#2E4053">| 2   | 2   | b     |        |</text>
    <text x="60" y="810" font-size="18" font-family="Arial" fill="#2E4053">| 2   | 3   | c     |        |</text>
    <text x="60" y="830" font-size="18" font-family="Arial" fill="#2E4053">| 2   | 4   |       |        |</text>
    <text x="60" y="850" font-size="18" font-family="Arial" fill="#2E4053">| 2   | 5   | d     |        |</text>
    <text x="60" y="870" font-size="18" font-family="Arial" fill="#2E4053">| 2   | 6   | e     |        |</text>
    <text x="60" y="890" font-size="18" font-family="Arial" fill="#2E4053">| 

  </section>
  <section data-narration="Brute Force String Matching">
    <rect x="50" y="500" width="320" height="120" style="fill:#F7F7F7"/>
    <text x="60" y="510" font-size="18" font-family="Arial" fill="#2E4053">Brute Force String Matching</text>
    <text x="60" y="530" font-size="18" font-family="Arial" fill="#2E4053">is a method of finding a specific substring within a larger string by checking every possible substring.</text>
  </section>
  <section data-narration="Brute Force Algorithm">
    <rect x="50" y="600" width="320" height="120" style="fill:#F7F7F7"/>
    <text x="60" y="610" font-size="18" font-family="Arial" fill="#2E4053">Algorithm:</text>
    <text x="60" y="630" font-size="18" font-family="Arial" fill="#2E4053">1. Initialize two pointers, i and j, to 0, which will be used to traverse the string and the substring respectively.</text>
    <text x="60" y="650" font-size="18" font-family="Arial" fill="#2E4053">2. Compare the characters at the current positions i and j in the string and the substring.</text>
    <text x="60" y="670" font-size="18" font-family="Arial" fill="#2E4053">3. If the characters match, increment both i and j by 1.</text>
    <text x="60" y="690" font-size="18" font-family="Arial" fill="#2E4053">4. If the characters do not match, increment i by 1 and reset j to 0.</text>
  </section>
  <section data-narration="Brute Force Example">
    <rect x="50" y="700" width="320" height="120" style="fill:#F7F7F7"/>
    <text x="60" y="710" font-size="18" font-family="Arial" fill="#2E4053">Example:</text>
    <text x="60" y="730" font-size="18" font-family="Arial" fill="#2E4053">Suppose we want to find the substring &quot;abc&quot; in the string &quot;abcdefg&quot;.</text>
    <text x="60" y="750" font-size="18" font-family="Arial" fill="#2E4053">To use Brute Force String Matching, we need to check every possible substring of the string.</text>
    <text x="60" y="770" font-size="18" font-family="Arial" fill="#2E4053">For example, we need to check the substrings &quot;abc&quot;, &quot;abd&quot;, &quot;abe&quot;, etc.</text>
  </section>
  <footer>
    <text x="10" y="380" font-size="18" font-family="Arial" fill="#2E4053">Sequential Search and Brute Force String Matching</text>
  </footer>
</svg>