<svg width="420" height="400" data-topic-id="chapter-1-introduction-to-algorithmic-problem-solving"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">

    <!-- Gradient Background -->
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#E5F5EA" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

    <!-- Title -->
    <text x="10" y="20" fill="#2E4053" font-size="24" font-family="Arial, sans-serif">
        Chapter 1: Introduction to Algorithmic Problem Solving
    </text>

    <!-- Section 1: What is an Algorithm? -->
    <section data-narration="What is an algorithm?">
        <rect x="50" y="50" width="320" height="200" fill="#F7FCFC" rx="10"/>
        <text x="60" y="70" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">
            An algorithm is a well-defined procedure that takes some input and produces a corresponding output.
        </text>
        <text x="60" y="110" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">
            It is a set of instructions that is used to solve a specific problem or perform a particular task.
        </text>
    </section>

    <!-- Section 2: Key Characteristics -->
    <section data-narration="Key Characteristics">
        <rect x="50" y="280" width="320" height="200" fill="#F7FCFC" rx="10"/>
        <animate attributeName="opacity" dur="2s" begin="0s" delay="2s" from="1" to="0" repeatCount="indefinite"/>
        <text x="60" y="300" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">
            Well-defined:
            <text x="160" y="300" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">
                An algorithm has a clear set of instructions that can be followed.
            </text>
        </text>
        <text x="60" y="330" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">
            Finite:
            <text x="160" y="330" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">
                An algorithm has a finite number of steps that can be completed.
            </text>
        </text>
        <text x="60" y="360" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">
            Unambiguous:
            <text x="160" y="360" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">
                An algorithm has a clear and unambiguous set of instructions.
            </text>
        </text>
        <text x="60" y="390" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">
            Effective:
            <text x="160" y="390" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">
                An algorithm produces a corresponding output for a given input.
            </text>
        </text>
    </section>

    <!-- Section 3: Examples of Algorithms -->
    <section data-narration="Examples of Algorithms">
        <rect x="50" y="280" width="320" height="200" fill="#F7FCFC" rx="10"/>
        <animate attributeName="opacity" dur="2s" begin="0s" delay="2s" from="1" to="0" repeatCount="indefinite"/>
        <text x="60" y="300" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">
            A recipe for baking a cake
            <text x="160" y="300" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">
                A map that guides you from one place to another
            </text>
        </text>
        <text x="60" y="330" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">
            A computer program that sorts a list of numbers
        </text>
    </section>

    <!-- Section 4: Why are Algorithms Important? -->
    <section data-narration="Why are Algorithms Important?">
        <rect x="50" y="50" width="320" height="200" fill="#F7FCFC" rx="10"/>
        <text x="60" y="70" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">
            Algorithms are essential in computer science because they provide a way to solve problems and perform tasks efficiently.
        </text>
        <text x="60" y="110" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">
            Here are some reasons why algorithms are important:
        </text>
        <text x="60" y="140" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">
            Efficiency:
            <text x="160" y="140" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">
                Algorithms can solve problems quickly and efficiently.
            </text>
        </text>
        <text x="60" y="170" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">
            Scalability:
            <text x="160" y="170" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">
                Algorithms can be used to solve problems of varying sizes and complexity.
            </text>
        </text>
        <text x="60" y="200" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">
            Reliability:
            <text x="160" y="200" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">
                Algorithms can produce consistent results, even with varying inputs.
            </text>
        </text>
        <text x="60" y="230" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">
            Flexibility:
            <text x="160" y="230" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">
                Algorithms can be modified to solve different problems.
            </text>
        </text>
    </section>

    <!-- Section 5: Types of Algorithms -->
    <section data-narration="Types of Algorithms">
        <rect x="50" y="280" width="320" height="200" fill="#F7FCFC" rx="10"/>
        <animate attributeName="opacity" dur="2s" begin="0s" delay="2s" from="1" to="0" repeatCount="indefinite"/>
        <text x="60" y="300" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">
            Deterministic algorithms:
            <text x="160" y="300" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">
                These algorithms always produce the same output for a given input.
            </text>
        </text>
        <text x="60" y="330" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">
            Non-deterministic algorithms:
            <text x="160" y="330" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">
                These algorithms may produce different outputs for the same input.
            </text>
        </text>
    </section>

    <!-- Footer -->
    <text x="10" y="380" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">
        Footnote: This diagram is for educational purposes only.
    </text>

</svg>