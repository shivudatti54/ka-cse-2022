<svg width="420" height="400" data-topic-id="chapter-3-section-31">
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  <g transform="translate(10, 10)">
    <title>Chapter 3: Analysis &amp; Design of Algorithms</title>
    <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="start">Section 3.1: What is an Algorithm?</text>
    <rect x="10" y="50" width="400" height="200" fill="#FFFFFF" stroke="#333" stroke-width="2"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="0s" repeatCount="indefinite"/>
    <g transform="rotate(0 200 200)">
      <text x="200" y="120" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Definition of an Algorithm</text>
      <data-narration id="definition">An algorithm is a well-defined procedure that takes some input and produces a corresponding output.</data-narration>
      <rect x="150" y="180" width="100" height="20" fill="#FFC107" rx="5"/>
      <text x="170" y="190" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Well-defined</text>
      <text x="170" y="200" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Finite</text>
      <text x="170" y="210" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Terminating</text>
      <text x="170" y="220" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Input</text>
      <text x="170" y="230" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Output</text>
      <text x="10" y="250" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Examples of Algorithms</text>
      <data-narration id="examples">Sorting algorithms, searching algorithms, cryptography algorithms.</data-narration>
      <rect x="10" y="280" width="400" height="100" fill="#FFFFFF" stroke="#333" stroke-width="2"/>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="1s" repeatCount="indefinite"/>
      <g transform="rotate(0 200 200)">
        <text x="200" y="320" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Key Concepts</text>
        <data-narration id="key-concepts">Big O notation, space complexity, pseudo-code.</data-narration>
        <rect x="150" y="360" width="100" height="20" fill="#FF9801" rx="5"/>
        <text x="170" y="370" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Why is it Important to Analyze Algorithms?</text>
        <text x="10" y="390" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Efficiency, scalability.</text>
        <footer>Created with <a href="https://www.adobe.com/products/illustrator.html">Adobe Illustrator</a></footer>
      </g>
    </g>
  </svg>