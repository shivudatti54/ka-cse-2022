<svg width="420" height="400" data-topic-id="brute-force-approaches-selection-sort-and-bubble-sort"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     style="background-color: #7A288A; background-image: linear-gradient(to bottom, #C7B8EA, #C7B8EA 10%, #87CEEB 10%, #87CEEB 80%, #6495ED 80%, #6495ED 100%);">
  <title>Brute Force Approaches: Selection Sort and Bubble Sort</title>
  <footer>Created with SVG.js</footer>
  <rect x="10" y="10" width="400" height="20" style="fill: #4B0082;"/>
  <rect x="10" y="40" width="400" height="20" style="fill: #6495ED;"/>
  <g data-narration="Introduction">
    <text x="20" y="60" style="font-size: 24px; font-family: Arial, sans-serif; fill: #6495ED;" transform="rotate(0 20 60)">
      <tspan data-narration="What is a Brute Force Algorithm?">A brute force algorithm is an algorithm that uses a trial-and-error approach to solve a problem.</tspan>
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 20 60" to="360 20 60" dur="5s" begin="0s"/>
  </g>
  <g data-narration="Selection Sort">
    <rect x="10" y="100" width="400" height="20" style="fill: #87CEEB;"/>
    <g transform="translate(20, 120)">
      <rect x="0" y="0" width="100" height="100" style="fill: none; stroke: #6495ED; stroke-width: 2" rx="10"/>
      <g data-narration="How it Works">
        <text x="0" y="10" style="font-size: 18px; font-family: Arial, sans-serif; fill: #6495ED;" transform="rotate(0 0 10)">
          <tspan data-narration="Start at the beginning of the array">Start at the beginning of the array</tspan>
        </text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin="0s"/>
        <text x="0" y="20" style="font-size: 18px; font-family: Arial, sans-serif; fill: #6495ED;" transform="rotate(0 0 20)">
          <tspan data-narration="Find the minimum element in the unsorted part of the array">Find the minimum element in the unsorted part of the array</tspan>
        </text>
        <animateTransform attributeName="transform" type="translate" from="100 0" to="200 0" dur="2s" begin="2s"/>
        <text x="0" y="30" style="font-size: 18px; font-family: Arial, sans-serif; fill: #6495ED;" transform="rotate(0 0 30)">
          <tspan data-narration="Swap the minimum element with the first unsorted element">Swap the minimum element with the first unsorted element</tspan>
        </text>
        <animateTransform attributeName="transform" type="translate" from="200 0" to="300 0" dur="2s" begin="4s"/>
        <text x="0" y="40" style="font-size: 18px; font-family: Arial, sans-serif; fill: #6495ED;" transform="rotate(0 0 40)">
          <tspan data-narration="Repeat steps until the entire array is sorted">Repeat steps until the entire array is sorted</tspan>
        </text>
      </g>
      <g data-narration="Example">
        <rect x="0" y="0" width="100" height="100" style="fill: none; stroke: #6495ED; stroke-width: 2" rx="10"/>
        <text x="0" y="10" style="font-size: 18px; font-family: Arial, sans-serif; fill: #6495ED;" transform="rotate(0 0 10)">
          <tspan data-narration="Suppose we have an array of integers: [5, 2, 8, 3, 1, 6, 4]">Suppose we have an array of integers: [5, 2, 8, 3, 1, 6, 4]</tspan>
        </text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin="6s"/>
        <text x="0" y="20" style="font-size: 18px; font-family: Arial, sans-serif; fill: #6495ED;" transform="rotate(0 0 20)">
          <tspan data-narration="Find the minimum element in the unsorted part of the array ([2, 3, 1, 6, 4]): 2">Find the minimum element in the unsorted part of the array ([2, 3, 1, 6, 4]): 2</tspan>
        </text>
        <animateTransform attributeName="transform" type="translate" from="100 0" to="200 0" dur="2s" begin="8s"/>
        <text x="0" y="30" style="font-size: 18px; font-family: Arial, sans-serif; fill: #6495ED;" transform="rotate(0 0 30)">
          <tspan data-narration="Swap the minimum element with the first unsorted element: [2, 8, 3, 1, 6, 4]">Swap the minimum element with the first unsorted element: [2, 8, 3, 1, 6, 4]</tspan>
        </text>
        <animateTransform attributeName="transform" type="translate" from="200 0" to="300 0" dur="2s" begin="10s"/>
        <text x="0" y="40" style="font-size: 18px; font-family: Arial, sans-serif; fill: #6495ED;" transform="rotate(0 0 40)">
          <tspan data-narration="Repeat steps until the entire array is sorted: [1, 2, 3, 4, 5, 6, 8]</tspan>
        </text>
      </g>
    </g>
  </g>
  <g data-narration="Bubble Sort">
    <rect x="10" y="200" width="400" height="20" style="fill: #C7B8EA;"/>
    <g transform="translate(20, 220)">
      <rect x="0" y="0" width="100" height="100" style="fill: none; stroke: #6495ED; stroke-width: 2" rx="10"/>
      <g data-narration="How it Works">
        <text x="0" y="10" style="font-size: 18px; font-family: Arial, sans-serif; fill: #6495ED;" transform="rotate(0 0 10)">
          <tspan data-narration="Start at the beginning of the array">Start at the beginning of the array</tspan>
        </text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin="0s"/>
        <text x="0" y="20" style="font-size: 18px; font-family: Arial, sans-serif; fill: #6495ED;" transform="rotate(0 0 20)">
          <tspan data-narration="Compare adjacent elements and swap if necessary">Compare adjacent elements and swap if necessary</tspan>
        </text>
        <animateTransform attributeName="transform" type="translate" from="100 0" to="200 0" dur="2s" begin="2s"/>
        <text x="0" y="30" style="font-size: 18px; font-family: Arial, sans-serif; fill: #6495ED;" transform="rotate(0 0 30)">
          <tspan data-narration="Repeat steps until the entire array is sorted">Repeat steps until the entire array is sorted</tspan>
        </text>
        <animateTransform attributeName="transform" type="translate" from="200 0" to="300 0" dur="2s" begin="4s"/>
        <text x="0" y="40" style="font-size: 18px; font-family: Arial, sans-serif; fill: #6495ED;" transform="rotate(0 0 40)">
          <tspan data-narration="Bubble Sort is similar to Selection Sort but uses a loop to compare and swap adjacent elements">Bubble Sort is similar to Selection Sort but uses a loop to compare and swap adjacent elements</tspan>
        </text>
      </g>
      <g data-narration="Example">
        <rect x="0" y="0" width="100" height="100" style="fill: none; stroke: #6495ED; stroke-width: 2" rx="10"/>
        <text x="0" y="10" style="font-size: 18px; font-family: Arial, sans-serif; fill: #6495ED;" transform="rotate(0 0 10)">
          <tspan data-narration="Suppose we have an array of integers: [5, 2, 8, 3, 1, 6, 4]">Suppose we have an array of integers: [5, 2, 8, 3, 1, 6, 4]</tspan>
        </text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin="6s"/>
        <text x="0" y="20" style="font-size: 18px; font-family: Arial, sans-serif; fill: #6495ED;" transform="rotate(0 0 20)">
          <tspan data-narration="Compare the first two elements: 5 and 2">Compare the first two elements: 5 and 2</tspan>
        </text>
        <animateTransform attributeName="transform" type="translate" from="100 0" to="200 0" dur="2s" begin="8s"/>
        <text x="0" y="30" style="font-size: 18px; font-family: Arial, sans-serif; fill: #6495ED;" transform="rotate(0 0 30)">
          <tspan data-narration="Since 2 is smaller, swap them: [2, 5, 8, 3, 1, 6, 4]">Since 2 is smaller, swap them: [2, 5, 8, 3, 1, 6, 4]</tspan>
        </text>
        <animateTransform attributeName="transform" type="translate" from="200 0" to="300 0" dur="2s" begin="10s"/>
        <text x="0" y="40" style="font-size: 18px; font-family: Arial, sans-serif; fill: #6495ED;" transform="rotate(0 0 40)">
          <tspan data-narration="Repeat steps until the entire array is sorted: [1, 2, 3, 4, 5, 6, 8]</tspan>
        </text>
      </g>
    </g>
  </g>
</svg>