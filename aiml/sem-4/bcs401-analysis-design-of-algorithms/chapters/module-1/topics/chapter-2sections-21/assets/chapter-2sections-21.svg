<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="chapter-2-sections-21" viewBox="0 0 420 400">
  <title>Chapter 2: Sections 2.1 - What is an Algorithm?</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA"/>
      <stop offset="100%" stop-color="#A1C9F2"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  <g id="section-1">
    <text x="50%" y="20" text-anchor="middle" font-size="24" fill="#2F4F7F">What is an Algorithm?</text>
    <rect x="50%" y="60" width="200" height="30" fill="#2F4F7F" rx="5"/>
    <text x="50%" y="90" text-anchor="middle" font-size="18" fill="#FFFFFF">An algorithm is a well-defined procedure that takes some input and produces a corresponding output.</text>
  </g>
  <g id="section-2">
    <rect x="50%" y="120" width="200" height="30" fill="#2F4F7F" rx="5"/>
    <text x="50%" y="150" text-anchor="middle" font-size="18" fill="#FFFFFF">A typical algorithm consists of the following components:</text>
    <animate begin="1s" dur="2s" sequence="fill #2F4F7F to #A1C9F2" attributeName="fill"/>
    <text x="50%" y="180" text-anchor="middle" font-size="18" fill="#A1C9F2">Input, Processing, and Output.</text>
  </g>
  <g id="section-3">
    <rect x="50%" y="220" width="200" height="30" fill="#2F4F7F" rx="5"/>
    <text x="50%" y="250" text-anchor="middle" font-size="18" fill="#FFFFFF">There are two main types of algorithms:</text>
    <animate begin="3s" dur="2s" sequence="fill #A1C9F2 to #FFC107" attributeName="fill"/>
    <text x="50%" y="280" text-anchor="middle" font-size="18" fill="#FFC107">Deterministic and Non-deterministic Algorithm.</text>
  </g>
  <g id="section-4">
    <rect x="50%" y="300" width="200" height="30" fill="#2F4F7F" rx="5"/>
    <text x="50%" y="330" text-anchor="middle" font-size="18" fill="#FFFFFF">A good algorithm should have the following characteristics:</text>
    <animate begin="4s" dur="2s" sequence="fill #FFC107 to #2F4F7F" attributeName="fill"/>
    <text x="50%" y="360" text-anchor="middle" font-size="18" fill="#2F4F7F">Efficiency, Scalability, Readability, and Modifiability.</text>
  </g>
  <g id="section-5">
    <rect x="50%" y="380" width="200" height="30" fill="#2F4F7F" rx="5"/>
    <text x="50%" y="410" text-anchor="middle" font-size="18" fill="#FFFFFF">Example of an algorithm is a recipe for making a cake.</text>
  </g>
  <g id="footer">
    <text x="50%" y="420" text-anchor="middle" font-size="18" fill="#2F4F7F">Chapter 2: Sections 2.1 - What is an Algorithm?</text>
  </g>
</svg>