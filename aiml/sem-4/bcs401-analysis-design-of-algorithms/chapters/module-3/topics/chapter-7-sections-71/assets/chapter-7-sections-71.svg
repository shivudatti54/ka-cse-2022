<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="7.1-introduction-to-algorithm-analysis">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <title>Chapter 7 Sections 71</title>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="200" height="100" fill="#3498DB" rx="10"/>
    <text x="20" y="20" font-size="24" font-weight="bold">What is Algorithm Analysis?</text>
    <text x="20" y="60" font-size="18">Algorithm analysis is the process of measuring the efficiency of an algorithm.</text>
    <animate href="#section1" begin="0s" dur="2s" fill="freeze"/>
  </g>
  <g transform="translate(220, 20)">
    <rect x="0" y="0" width="200" height="100" fill="#1ABC9C" rx="10"/>
    <text x="20" y="20" font-size="24" font-weight="bold">Key Concepts</text>
    <text x="20" y="60" font-size="18">Big-O Notation, Time Complexity, Space Complexity, Lower Bound.</text>
    <animate href="#section2" begin="2s" dur="2s" fill="freeze"/>
  </g>
  <g transform="translate(420, 20)">
    <rect x="0" y="0" width="200" height="100" fill="#F1C40F" rx="10"/>
    <text x="20" y="20" font-size="24" font-weight="bold">Big-O Notation</text>
    <text x="20" y="60" font-size="18">A way to describe the upper bound of an algorithm's time or space complexity.</text>
    <animate href="#section3" begin="4s" dur="2s" fill="freeze"/>
  </g>
  <g transform="translate(220, 140)">
    <rect x="0" y="0" width="200" height="100" fill="#E74C3C" rx="10"/>
    <text x="20" y="20" font-size="24" font-weight="bold">Time Complexity</text>
    <text x="20" y="60" font-size="18">The amount of time an algorithm takes to complete.</text>
    <animate href="#section4" begin="6s" dur="2s" fill="freeze"/>
  </g>
  <g transform="translate(420, 140)">
    <rect x="0" y="0" width="200" height="100" fill="#2ECC71" rx="10"/>
    <text x="20" y="20" font-size="24" font-weight="bold">Space Complexity</text>
    <text x="20" y="60" font-size="18">The amount of memory an algorithm uses.</text>
    <animate href="#section5" begin="8s" dur="2s" fill="freeze"/>
  </g>
  <g transform="translate(220, 260)">
    <rect x="0" y="0" width="200" height="100" fill="#E74C3C" rx="10"/>
    <text x="20" y="20" font-size="24" font-weight="bold">Lower Bound</text>
    <text x="20" y="60" font-size="18">The minimum amount of time or space an algorithm must use.</text>
    <animate href="#section6" begin="10s" dur="2s" fill="freeze"/>
  </g>
  <g transform="translate(420, 260)">
    <rect x="0" y="0" width="200" height="100" fill="#2ECC71" rx="10"/>
    <text x="20" y="20" font-size="24" font-weight="bold">Conclusion</text>
    <text x="20" y="60" font-size="18">Algorithm analysis is crucial in designing efficient algorithms.</text>
  </g>
  <g transform="translate(20, 380)">
    <text x="20" y="380" font-size="18" font-weight="bold">References</text>
  </g>
  <footer>
    <g transform="translate(20, 400)">
      <text x="20" y="400" font-size="18" font-weight="bold">Chapter 7 Sections 71</text>
    </g>
  </footer>
</svg>