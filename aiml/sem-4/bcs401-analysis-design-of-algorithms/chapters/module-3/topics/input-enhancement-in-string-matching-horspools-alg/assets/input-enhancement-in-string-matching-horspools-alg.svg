<svg width="420" height="400" data-topic-id="input-enhancement-in-string-matching-horspools-algorithm" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#66CCCC" x="0" y="0" width="420" height="400" rx="10"/>
  <rect fill="#33CCFF" x="0" y="0" width="100%" height="20" rx="10"/>
  <text x="10" y="30" font-size="24" text-anchor="start" fill="#2E4053">Input Enhancement in String Matching: Horspool’s Algorithm</text>
  <path d="M 20 80 C 20 50 40 30 60 20" stroke="#FFC107" stroke-width="4"/>
  <path d="M 20 80 C 40 30 60 20 80 80" stroke="#2E4053" stroke-width="2"/>
  <section data-narration="What is Horspool’s Algorithm?" x="50" y="150" y1="250" y2="350">
    <rect fill="#FFC107" x="50" y="150" width="100" height="100" rx="10"/>
    <text x="60" y="170" font-size="16" text-anchor="start" fill="#2E4053">Horspool’s Algorithm is a linear-time string matching algorithm that uses a combination of hashing and shifting to find a pattern within a larger string.</text>
    <animate transform="translate(0, 50) rotate(360)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  <section data-narration="How Horspool’s Algorithm Works" x="50" y="350" y1="250" y2="350">
    <rect fill="#FFC107" x="50" y="350" width="100" height="100" rx="10"/>
    <text x="60" y="370" font-size="16" text-anchor="start" fill="#2E4053">Here’s a step-by-step explanation of how Horspool’s algorithm works:</text>
    <text x="60" y="380" font-size="14" text-anchor="start" fill="#2E4053">1. Initialize a hash table (or a lookup table) that stores the last occurrence of each character in the pattern.</text>
    <text x="60" y="390" font-size="14" text-anchor="start" fill="#2E4053">2. Initialize a variable `shift` to 0, which represents the shift amount.</text>
    <text x="60" y="390" font-size="14" text-anchor="start" fill="#2E4053">3. Iterate through the text string, starting from the first character.</text>
    <animate transform="translate(0, 25) rotate(360)" begin="1s" dur="2s" repeatCount="indefinite"/>
  </section>
  <section data-narration="Key Concepts" x="50" y="150" y1="250" y2="350">
    <rect fill="#FFC107" x="50" y="150" width="100" height="100" rx="10"/>
    <text x="60" y="170" font-size="16" text-anchor="start" fill="#2E4053">Key Concepts include:</text>
    <text x="60" y="180" font-size="14" text-anchor="start" fill="#2E4053">- Hash Table: A data structure that stores the last occurrence of each character in the pattern.</text>
    <text x="60" y="190" font-size="14" text-anchor="start" fill="#2E4053">- Shift Amount: A variable that represents the amount by which the hash value is shifted.</text>
    <animate transform="translate(0, 15) rotate(360)" begin="2s" dur="2s" repeatCount="indefinite"/>
  </section>
  <section data-narration="Advantages" x="50" y="100" y1="200" y2="300">
    <rect fill="#FFC107" x="50" y="100" width="100" height="100" rx="10"/>
    <text x="60" y="120" font-size="16" text-anchor="start" fill="#2E4053">Advantages of Horspool’s Algorithm include:</text>
    <text x="60" y="130" font-size="14" text-anchor="start" fill="#2E4053">- Linear-time complexity.</text>
    <text x="60" y="140" font-size="14" text-anchor="start" fill="#2E4053">- Simple to implement.</text>
    <animate transform="translate(0, 20) rotate(360)" begin="3s" dur="2s" repeatCount="indefinite"/>
  </section>
  <section data-narration="Implementation" x="50" y="60" y1="170" y2="270">
    <rect fill="#FFC107" x="50" y="60" width="100" height="100" rx="10"/>
    <text x="60" y="80" font-size="16" text-anchor="start" fill="#2E4053">Here is an example implementation of Horspool’s algorithm in code:</text>
    <text x="60" y="90" font-size="14" text-anchor="start" fill="#2E4053">- Initialize a hash table and a variable `shift` to 0.</text>
    <text x="60" y="100" font-size="14" text-anchor="start" fill="#2E4053">- Iterate through the text string and update the hash table.</text>
    <animate transform="translate(0, 15) rotate(360)" begin="4s" dur="2s" repeatCount="indefinite"/>
  </section>
  <footer>
    <text x="10" y="380" font-size="16" text-anchor="start" fill="#2E4053">Learn more about string matching and Horspool’s algorithm at <a href="https://www.example.com">example.com</a>.</text>
  </footer>
</svg>