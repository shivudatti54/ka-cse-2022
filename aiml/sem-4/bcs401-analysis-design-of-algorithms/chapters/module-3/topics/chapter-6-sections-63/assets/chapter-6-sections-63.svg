<svg width="420" height="400" data-topic-id="binary-search-trees">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A288A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4682B4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title -->
  <text x="50%" y="50" text-anchor="middle" font-size="36" fill="#4682B4">Binary Search Trees</text>
  
  <!-- Section 1: Introduction -->
  <section>
    <rect x="10" y="100" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="120" text-anchor="left" font-size="18" fill="#333">Introduction</text>
    <animateTransform attributeName="transform" type="translate" from="0 120" to="0 100" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  <section id="section-1-narration" data-narration>
    <text x="20" y="150" text-anchor="left" font-size="18" fill="#333">A Binary Search Tree is a tree-like data structure that allows for efficient searching, inserting, and deleting operations.</text>
  </section>
  
  <!-- Section 2: Definition -->
  <section>
    <rect x="10" y="200" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="220" text-anchor="left" font-size="18" fill="#333">Definition</text>
    <animateTransform attributeName="transform" type="translate" from="0 220" to="0 200" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  <section id="section-2-narration" data-narration>
    <text x="20" y="250" text-anchor="left" font-size="18" fill="#333">Each node in the tree has a unique key, and the left subtree of a node contains only keys less than the node's key, while the right subtree contains only keys greater than the node's key.</text>
  </section>
  
  <!-- Section 3: Properties -->
  <section>
    <rect x="10" y="300" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="320" text-anchor="left" font-size="18" fill="#333">Properties</text>
    <animateTransform attributeName="transform" type="translate" from="0 320" to="0 300" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  <section id="section-3-narration" data-narration>
    <text x="20" y="350" text-anchor="left" font-size="18" fill="#333">Each node in the tree has a unique key, and all keys in the left subtree and right subtree must also follow the above properties.</text>
  </section>
  
  <!-- Section 4: Types of Binary Search Trees -->
  <section>
    <rect x="10" y="400" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="420" text-anchor="left" font-size="18" fill="#333">Types of Binary Search Trees</text>
    <animateTransform attributeName="transform" type="translate" from="0 420" to="0 400" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  <section id="section-4-narration" data-narration>
    <text x="20" y="450" text-anchor="left" font-size="18" fill="#333">AVL Tree and Red-Black Tree are two examples of self-balancing BSTs that maintain the tree's balance.</text>
  </section>
  
  <!-- Section 5: Operations -->
  <section>
    <rect x="10" y="500" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="520" text-anchor="left" font-size="18" fill="#333">Operations</text>
    <animateTransform attributeName="transform" type="translate" from="0 520" to="0 500" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  <section id="section-5-narration" data-narration>
    <text x="20" y="550" text-anchor="left" font-size="18" fill="#333">Insertion, deletion, search, and traversal are common operations performed on binary search trees.</text>
  </section>
  
  <!-- Section 6: Example -->
  <section>
    <rect x="10" y="600" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="620" text-anchor="left" font-size="18" fill="#333">Example</text>
    <animateTransform attributeName="transform" type="translate" from="0 620" to="0 600" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  <section id="section-6-narration" data-narration>
    <text x="20" y="650" text-anchor="left" font-size="18" fill="#333">The given list of keys can be used to create a binary search tree.</text>
  </section>
  
  <!-- Footer -->
  <text x="50%" y="380" text-anchor="middle" font-size="18" fill="#4682B4">2023</text>
</svg>