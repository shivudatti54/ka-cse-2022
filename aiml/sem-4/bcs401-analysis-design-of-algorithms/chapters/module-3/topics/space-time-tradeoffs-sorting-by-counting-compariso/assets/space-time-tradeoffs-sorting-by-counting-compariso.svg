    data-narration="Introduction,What is Comparison Counting Sort?,Key Concepts,How Comparison Counting Sort Works,Algorithm"

    style="background: linear-gradient(to bottom, #C7B8EA, #C7B8EA), background-size: 100% 100%;">
    <!-- Header Section -->
    <rect x="10" y="10" width="400" height="50" rx="10" style="fill: #337ab7;"/>
