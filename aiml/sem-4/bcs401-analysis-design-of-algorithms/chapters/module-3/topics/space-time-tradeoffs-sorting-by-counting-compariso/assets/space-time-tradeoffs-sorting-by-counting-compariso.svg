    <rect x="10" y="60" width="400" height="20" rx="10" style="fill: #337ab7;"/>
    <text x="20" y="80" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#ffffff" opacity="0.9">Introduction</text>
    <animate transform="translateX(-10)" begin="0.5s" dur="1s" repeatCount="indefinite"/>
    <text x="20" y="100" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#ffffff" opacity="0.9">What is Comparison Counting Sort?</text>
    <animate transform="translateX(10)" begin="1.5s" dur="1s" repeatCount="indefinite"/>
    <!-- Main Content Section -->
    <rect x="10" y="130" width="400" height="200" rx="10" style="fill: #f7f7f7;"/>
    <rect x="20" y="150" width="350" height="100" rx="10" style="fill: #e0e0e0;"/>
    <rect x="20" y="270" width="350" height="100" rx="10" style="fill: #f7f7f7;"/>
    <rect x="10" y="280" width="400" height="20" rx="10" style="fill: #337ab7;"/>
    <text x="20" y="300" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#ffffff" opacity="0.9">Key Concepts</text>
    <rect x="10" y="320" width="400" height="20" rx="10" style="fill: #337ab7;"/>
    <text x="20" y="340" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#ffffff" opacity="0.9">How Comparison Counting Sort Works</text>
    <animate transform="translateX(-10)" begin="0.5s" dur="1s" repeatCount="indefinite"/>
    <rect x="10" y="360" width="400" height="20" rx="10" style="fill: #337ab7;"/>
    <text x="20" y="380" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#ffffff" opacity="0.9">Algorithm</text>
    <animate transform="translateX(10)" begin="1.5s" dur="1s" repeatCount="indefinite"/>
    <text x="20" y="400" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#ffffff" opacity="0.9">Explanation</text>
    <animate transform="translateX(-10)" begin="2.5s" dur="1s" repeatCount="indefinite"/>
    <!-- Footer Section -->
    <rect x="10" y="420" width="400" height="20" rx="10" style="fill: #337ab7;"/>
    <text x="20" y="440" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#ffffff" opacity="0.9">By: [Your Name]</text>
