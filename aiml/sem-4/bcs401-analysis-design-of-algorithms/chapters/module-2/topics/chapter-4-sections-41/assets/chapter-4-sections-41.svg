<svg width="420" height="400" data-topic-id="exhaustive-search-41">
  <title>Exhaustive Search</title>
  <foreignObject x="120" y="50" width="180" height="300">
    <text x="20" y="20" font-size="24" font-family="Arial, sans-serif">Exhaustive Search</text>
    <rect x="10" y="40" width="160" height="20" fill="#87CEEB" rx="5" />
  </foreignObject>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="50%" stop-color="#A5C9F5" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="70" width="400" height="280" fill="url(#pastel-gradient)" rx="5" />
  <g transform="translate(10, 80)">
    <rect x="0" y="0" width="160" height="20" fill="#FFC107" rx="5" />
    <text x="10" y="10" font-size="18" font-family="Arial, sans-serif">Exhaustive Search</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="2s" begin="0s" />
    <foreignObject x="170" y="0" width="180" height="20">
      <text x="20" y="10" font-size="18" font-family="Arial, sans-serif">Definition</text>
      <text x="10" y="40" font-size="14" font-family="Arial, sans-serif" data-narration="Exhaustive search is a problem-solving strategy used in algorithm design where all possible solutions are considered and evaluated to find the optimal or correct one." />
    </foreignObject>
    <animateTransform attributeName="transform" type="translate" from="0,20" to="0,40" dur="2s" begin="0s" />
    <foreignObject x="0" y="40" width="400" height="20">
      <text x="20" y="30" font-size="18" font-family="Arial, sans-serif">Types</text>
      <rect x="0" y="0" width="160" height="20" fill="#87CEEB" rx="5" />
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="2s" begin="0s" />
      <foreignObject x="170" y="0" width="180" height="20">
        <text x="20" y="10" font-size="18" font-family="Arial, sans-serif">Breadth-First Search (BFS)</text>
        <text x="10" y="40" font-size="14" font-family="Arial, sans-serif" data-narration="Breadth-First Search is a type of exhaustive search that explores all the nodes at the current level before moving to the next level." />
        <animateTransform attributeName="transform" type="translate" from="0,20" to="0,40" dur="2s" begin="0s" />
        <foreignObject x="0" y="40" width="400" height="20">
          <text x="20" y="50" font-size="18" font-family="Arial, sans-serif">Depth-First Search (DFS)</text>
          <text x="10" y="70" font-size="14" font-family="Arial, sans-serif" data-narration="Depth-First Search is a type of exhaustive search that explores as far as possible along each branch before backtracking." />
          <animateTransform attributeName="transform" type="translate" from="0,40" to="0,60" dur="2s" begin="0s" />
          <foreignObject x="0" y="60" width="400" height="20">
            <text x="20" y="70" font-size="18" font-family="Arial, sans-serif">Exhaustive Search with Branch and Bound</text>
            <text x="10" y="90" font-size="14" font-family="Arial, sans-serif" data-narration="Exhaustive search with branch and bound is a type of exhaustive search that uses bounds to prune branches that cannot lead to the optimal solution." />
            <animateTransform attributeName="transform" type="translate" from="0,60" to="0,80" dur="2s" begin="0s" />
        </foreignObject>
        <animateTransform attributeName="transform" type="translate" from="0,60" to="0,80" dur="2s" begin="2s" />
      </foreignObject>
      <animateTransform attributeName="transform" type="translate" from="0,40" to="0,60" dur="2s" begin="2s" />
    </foreignObject>
    <animateTransform attributeName="transform" type="translate" from="0,40" to="0,60" dur="2s" begin="4s" />
    <foreignObject x="0" y="60" width="400" height="20">
      <text x="20" y="70" font-size="18" font-family="Arial, sans-serif">Example Problem: Traveling Salesman Problem</text>
      <text x="10" y="90" font-size="14" font-family="Arial, sans-serif" data-narration="The traveling salesman problem is a classic problem in computer science and operations research that involves finding the shortest possible tour that visits a set of cities and returns to the starting city." />
      <animateTransform attributeName="transform" type="translate" from="0,60" to="0,80" dur="2s" begin="4s" />
    </foreignObject>
    <animateTransform attributeName="transform" type="translate" from="0,60" to="0,80" dur="2s" begin="6s" />
  </g>
  <foreignObject x="120" y="350" width="180" height="50">
    <text x="10" y="40" font-size="18" font-family="Arial, sans-serif">Footer</text>
    <rect x="0" y="0" width="160" height="20" fill="#FFC107" rx="5" />
  </foreignObject>
</svg>