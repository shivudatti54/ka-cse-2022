<svg width="420" height="400" data-topic-id="divide-and-conquer-merge-sort-quick-sort-binary-tree-tr">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastelGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Title at top -->
  <text x="50%" y="20%" font-size="36" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">
    Divide and Conquer
  </text>

  <!-- Main content area -->
  <rect x="10" y="50" width="400" height="300" fill="url(#pastelGradient)" rx="10" />
  <rect x="10" y="60" width="350" height="240" fill="#FFFFFF" rx="10" opacity="0.9" />
  <text x="20" y="60" font-size="24" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
    Divide
  </text>
  <text x="20" y="80" font-size="24" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
    Conquer
  </text>

  <!-- Merge Sort section -->
  <rect x="10" y="110" width="350" height="40" fill="#FFFFFF" rx="10" opacity="0.9" />
  <text x="20" y="110" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
    Merge Sort
  </text>
  <animate transform="rotate(360 20 110)" begin="0s" dur="2s" repeatCount="indefinite" />
  <rect x="20" y="130" width="60" height="20" fill="#66CCCC" rx="5" />
  <text x="35" y="130" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
    Divide the array into two halves
  </text>
  <animate transform="rotate(360 35 130)" begin="0s" dur="0.5s" repeatCount="indefinite" />
  <rect x="20" y="150" width="60" height="20" fill="#66CCCC" rx="5" />
  <text x="35" y="150" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
    Recursively sort each half
  </text>
  <animate transform="rotate(360 35 150)" begin="0.5s" dur="0.5s" repeatCount="indefinite" />
  <rect x="20" y="170" width="60" height="20" fill="#66CCCC" rx="5" />
  <text x="35" y="170" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
    Merge the two sorted halves
  </text>
  <animate transform="rotate(360 35 170)" begin="1s" dur="0.5s" repeatCount="indefinite" />

  <!-- Quick Sort section -->
  <rect x="10" y="200" width="350" height="40" fill="#FFFFFF" rx="10" opacity="0.9" />
  <text x="20" y="200" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
    Quick Sort
  </text>
  <animate transform="rotate(360 20 200)" begin="2s" dur="2s" repeatCount="indefinite" />
  <rect x="20" y="220" width="60" height="20" fill="#66CCCC" rx="5" />
  <text x="35" y="220" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
    Choose a pivot element
  </text>
  <animate transform="rotate(360 35 220)" begin="2.5s" dur="0.5s" repeatCount="indefinite" />
  <rect x="20" y="240" width="60" height="20" fill="#66CCCC" rx="5" />
  <text x="35" y="240" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
    Partition the array around the pivot
  </text>
  <animate transform="rotate(360 35 240)" begin="3s" dur="0.5s" repeatCount="indefinite" />
  <rect x="20" y="260" width="60" height="20" fill="#66CCCC" rx="5" />
  <text x="35" y="260" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
    Recursively sort the sub-arrays
  </text>
  <animate transform="rotate(360 35 260)" begin="3.5s" dur="0.5s" repeatCount="indefinite" />

  <!-- Binary Tree Traversals section -->
  <rect x="10" y="300" width="350" height="40" fill="#FFFFFF" rx="10" opacity="0.9" />
  <text x="20" y="300" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
    Binary Tree Traversals
  </text>
  <animate transform="rotate(360 20 300)" begin="4s" dur="2s" repeatCount="indefinite" />
  <rect x="20" y="320" width="60" height="20" fill="#66CCCC" rx="5" />
  <text x="35" y="320" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
    In-order traversal: Left-Root-Right
  </text>
  <animate transform="rotate(360 35 320)" begin="4.5s" dur="0.5s" repeatCount="indefinite" />
  <rect x="20" y="340" width="60" height="20" fill="#66CCCC" rx="5" />
  <text x="35" y="340" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
    Pre-order traversal: Root-Left-Right
  </text>
  <animate transform="rotate(360 35 340)" begin="5s" dur="0.5s" repeatCount="indefinite" />
  <rect x="20" y="360" width="60" height="20" fill="#66CCCC" rx="5" />
  <text x="35" y="360" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
    Post-order traversal: Left-Right-Root
  </text>
  <animate transform="rotate(360 35 360)" begin="5.5s" dur="0.5s" repeatCount="indefinite" />

  <!-- Footer at bottom -->
  <text x="50%" y="380%" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">
    Created with love for learning
  </text>
</svg>