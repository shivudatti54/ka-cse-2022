<svg width="420" height="400" data-topic-id="topological-sorting">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#A2C3F8" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" opacity="0.5" />
  
  <!-- Title -->
  <g transform="translate(20, 20)">
    <text x="0" y="0" font-size="24" font-family="Arial" font-weight="bold" fill="#2E4053">Topological Sorting</text>
  </g>
  
  <!-- Section 1: Introduction -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="100" height="20" fill="#F7F7F7" stroke="#2E4053" stroke-width="1" rx="2" />
    <text x="5" y="5" font-size="16" font-family="Arial" fill="#2E4053">What is Topological Sorting?</text>
    <text x="5" y="25" font-size="16" font-family="Arial" fill="#2E4053">Topological sorting is a linear ordering of vertices in a directed acyclic graph (DAG) such that for every directed edge u -> v, vertex u comes before v in the ordering.</text>
  </g>
  
  <!-- Section 2: Definition -->
  <g transform="translate(200, 60)">
    <rect x="0" y="0" width="100" height="20" fill="#F7F7F7" stroke="#2E4053" stroke-width="1" rx="2" />
    <text x="5" y="5" font-size="16" font-family="Arial" fill="#2E4053">Definition:</text>
    <text x="5" y="25" font-size="16" font-family="Arial" fill="#2E4053">A topological sorting of a DAG is a linear ordering of vertices such that for every directed edge u -> v, vertex u comes before v in the ordering.</text>
  </g>
  
  <!-- Section 3: Algorithm -->
  <g transform="translate(350, 60)">
    <rect x="0" y="0" width="100" height="20" fill="#F7F7F7" stroke="#2E4053" stroke-width="1" rx="2" />
    <text x="5" y="5" font-size="16" font-family="Arial" fill="#2E4053">Algorithm:</text>
    <text x="5" y="25" font-size="16" font-family="Arial" fill="#2E4053">1. Initialize an empty list to store the sorted vertices.</text>
    <text x="5" y="45" font-size="16" font-family="Arial" fill="#2E4053">2. Iterate over all vertices in the graph.</text>
    <text x="5" y="65" font-size="16" font-family="Arial" fill="#2E4053">3. For each vertex v, find all vertices with an edge pointing to v.</text>
    <text x="5" y="85" font-size="16" font-family="Arial" fill="#2E4053">4. Add v to the sorted list.</text>
  </g>
  
  <!-- Section 4: Example -->
  <g transform="translate(50, 120)">
    <rect x="0" y="0" width="100" height="20" fill="#F7F7F7" stroke="#2E4053" stroke-width="1" rx="2" />
    <text x="5" y="5" font-size="16" font-family="Arial" fill="#2E4053">Example:</text>
    <rect x="10" y="25" width="50" height="10" fill="#F7F7F7" stroke="#2E4053" stroke-width="1" rx="1" />
    <text x="55" y="30" font-size="14" font-family="Arial" fill="#2E4053">A -> B</text>
    <rect x="70" y="25" width="50" height="10" fill="#F7F7F7" stroke="#2E4053" stroke-width="1" rx="1" />
    <text x="115" y="30" font-size="14" font-family="Arial" fill="#2E4053">B -> C</text>
  </g>
  
  <!-- Section 5: Conclusion -->
  <g transform="translate(200, 120)">
    <rect x="0" y="0" width="100" height="20" fill="#F7F7F7" stroke="#2E4053" stroke-width="1" rx="2" />
    <text x="5" y="5" font-size="16" font-family="Arial" fill="#2E4053">Conclusion:</text>
    <text x="5" y="25" font-size="16" font-family="Arial" fill="#2E4053">Topological sorting is a useful algorithm for solving problems in computer science.</text>
  </g>
  
  <!-- Section 6: Real-World Applications -->
  <g transform="translate(350, 120)">
    <rect x="0" y="0" width="100" height="20" fill="#F7F7F7" stroke="#2E4053" stroke-width="1" rx="2" />
    <text x="5" y="5" font-size="16" font-family="Arial" fill="#2E4053">Real-World Applications:</text>
    <text x="5" y="25" font-size="16" font-family="Arial" fill="#2E4053">1. Network optimization</text>
    <text x="5" y="45" font-size="16" font-family="Arial" fill="#2E4053">2. Resource allocation</text>
    <text x="5" y="65" font-size="16" font-family="Arial" fill="#2E4053">3. Scheduling</text>
  </g>
  
  <!-- Arrow markers -->
  <g transform="translate(50, 40)">
    <line x1="10" y1="15" x2="20" y2="25" stroke="#2E4053" stroke-width="2" />
  </g>
  <g transform="translate(200, 40)">
    <line x1="110" y1="35" x2="120" y2="45" stroke="#2E4053" stroke-width="2" />
  </g>
  <g transform="translate(350, 40)">
    <line x1="310" y1="55" x2="320" y2="65" stroke="#2E4053" stroke-width="2" />
  </g>
  
  <!-- Footer -->
  <g transform="translate(20, 380)">
    <text x="0" y="0" font-size="18" font-family="Arial" fill="#2E4053">Learn more about Topological Sorting at <a href="https://en.wikipedia.org/wiki/Topological_sorting">Wikipedia</a></text>
  </g>
</svg>