    <g transform="translate(20, 200)">
      <rect width="200" height="100" fill="#F7F7F7" rx="10" />
      <text x="10" y="20" font-size="24" font-family="Arial" fill="#444">Insertion Sort</text>
      <text x="10" y="50" font-size="24" font-family="Arial" fill="#444">Algorithm</text>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="200 0" dur="2000" repeatCount="indefinite" begin="0s" />
    </g>
  </section>

  <!-- Key Concepts Section -->
  <section data-narration="Key Concepts">
    <g transform="translate(20, 260)">
      <rect width="320" height="100" fill="#F7F7F7" rx="10" />
      <text x="10" y="20" font-size="24" font-family="Arial" fill="#444">Decrease-and-Conquer</text>
      <text x="10" y="50" font-size="24" font-family="Arial" fill="#444">Approach</text>
      <text x="10" y="80" font-size="24" font-family="Arial" fill="#444">Sorted Region</text>
      <text x="10" y="110" font-size="24" font-family="Arial" fill="#444">Unsorted Region</text>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="320 0" dur="2000" repeatCount="indefinite" begin="0s" />
