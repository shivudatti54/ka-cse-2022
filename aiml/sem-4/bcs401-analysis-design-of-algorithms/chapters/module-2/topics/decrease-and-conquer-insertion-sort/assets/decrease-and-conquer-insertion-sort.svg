  <section data-narration="Example Use Cases">
    <g transform="translate(20, 320)">
      <rect width="320" height="100" fill="#F7F7F7" rx="10" />
      <text x="10" y="20" font-size="24" font-family="Arial" fill="#444">Small Datasets</text>
      <text x="10" y="50" font-size="24" font-family="Arial" fill="#444">Nearly Sorted Data</text>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="320 0" dur="2000" repeatCount="indefinite" begin="0s" />
