      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#4682B4" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" rx="10" />
  <!-- Title Section -->
  <section data-narration="Introduction">
