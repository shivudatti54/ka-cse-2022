<svg
  width="420"
  height="400"
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 420 400"
  data-topic-id="knapsack-problem"
  style="background-image: linear-gradient(to bottom, #C7B8EA, #87CEEB); background-size: 100% 100%; background-position: 0% 0%; transition: background-position 0.5s ease-in-out;"
  onmouseover="this.style.backgroundPosition = '0% 100%'"
  onmouseout="this.style.backgroundPosition = '0% 0%'"
>

  <!-- Title -->
  <text
    x="50%"
    y="20"
    text-anchor="middle"
    font-size="24"
    font-weight="bold"
    fill="#2E4053"
    style="color: #2E4053; text-shadow: 0 0 10px rgba(0, 0, 0, 0.2)"
  >
    Branch and Bound: Knapsack Problem
  </text>

  <!-- Gradient background -->
  <rect
    x="0"
    y="0"
    width="420"
    height="400"
    fill="none"
    stroke="#87CEEB"
    stroke-width="2"
  />

  <!-- Section 1: Introduction -->
  <rect
    x="50"
    y="50"
    width="320"
    height="80"
    fill="none"
    stroke="#C7B8EA"
    stroke-width="2"
  >
    <text
      x="10"
      y="10"
      text-anchor="start"
      font-size="18"
      font-weight="bold"
      fill="#2E4053"
      style="color: #2E4053; text-shadow: 0 0 5px rgba(0, 0, 0, 0.2)"
    >
      Introduction
    </text>
  </rect>
  <animate
    attributeName="opacity"
    from="1"
    to="0"
    dur="1s"
    begin="0s"
    repeatCount="indefinite"
  />
  <animate
    attributeName="x"
    from="50"
    to="60"
    dur="1s"
    begin="0s"
    repeatCount="indefinite"
  />
  <text
    x="60"
    y="70"
    text-anchor="start"
    font-size="16"
    fill="#2E4053"
    style="color: #2E4053; text-shadow: 0 0 5px rgba(0, 0, 0, 0.2)"
  >
    The 0/1 Knapsack Problem is a classic optimization problem in computer science.
    Given a set of items, each with a weight and a value, the goal is to determine
    the most valuable combination of items that can fit into a knapsack of fixed
    capacity without exceeding its weight limit.
  </text>

  <!-- Section 2: Branching and Bounding -->
  <rect
    x="50"
    y="150"
    width="320"
    height="80"
    fill="none"
    stroke="#C7B8EA"
    stroke-width="2"
  >
    <text
      x="10"
      y="10"
      text-anchor="start"
      font-size="18"
      font-weight="bold"
      fill="#2E4053"
      style="color: #2E4053; text-shadow: 0 0 5px rgba(0, 0, 0, 0.2)"
    >
      Branching and Bounding
    </text>
  </rect>
  <animate
    attributeName="opacity"
    from="1"
    to="0"
    dur="1s"
    begin="1s"
    repeatCount="indefinite"
  />
  <animate
    attributeName="x"
    from="60"
    to="70"
    dur="1s"
    begin="1s"
    repeatCount="indefinite"
  />
  <text
    x="70"
    y="70"
    text-anchor="start"
    font-size="16"
    fill="#2E4053"
    style="color: #2E4053; text-shadow: 0 0 5px rgba(0, 0, 0, 0.2)"
  >
    Branching: Dividing the problem into smaller subproblems.
    Bounding: Calculating an upper bound for the best possible solution in
    each branch and pruning branches that cannot yield a better solution than
    the best one found so far.
  </text>

  <!-- Section 3: Branching -->
  <rect
    x="50"
    y="250"
    width="320"
    height="80"
    fill="none"
    stroke="#C7B8EA"
    stroke-width="2"
  >
    <text
      x="10"
      y="10"
      text-anchor="start"
      font-size="18"
      font-weight="bold"
      fill="#2E4053"
      style="color: #2E4053; text-shadow: 0 0 5px rgba(0, 0, 0, 0.2)"
    >
      Branching
    </text>
  </rect>
  <animate
    attributeName="opacity"
    from="1"
    to="0"
    dur="1s"
    begin="2s"
    repeatCount="indefinite"
  />
  <animate
    attributeName="x"
    from="60"
    to="70"
    dur="1s"
    begin="2s"
    repeatCount="indefinite"
  />
  <path
    d="M 70 170 L 120 170"
    stroke="#87CEEB"
    stroke-width="2"
    fill="none"
  />

  <!-- Section 4: Bounding -->
  <rect
    x="50"
    y="350"
    width="320"
    height="80"
    fill="none"
    stroke="#C7B8EA"
    stroke-width="2"
  >
    <text
      x="10"
      y="10"
      text-anchor="start"
      font-size="18"
      font-weight="bold"
      fill="#2E4053"
      style="color: #2E4053; text-shadow: 0 0 5px rgba(0, 0, 0, 0.2)"
    >
      Bounding
    </text>
  </rect>
  <animate
    attributeName="opacity"
    from="1"
    to="0"
    dur="1s"
    begin="3s"
    repeatCount="indefinite"
  />
  <animate
    attributeName="x"
    from="60"
    to="70"
    dur="1s"
    begin="3s"
    repeatCount="indefinite"
  />
  <path
    d="M 70 370 L 120 370"
    stroke="#87CEEB"
    stroke-width="2"
    fill="none"
  />

  <!-- Section 5: Example -->
  <rect
    x="50"
    y="450"
    width="320"
    height="80"
    fill="none"
    stroke="#C7B8EA"
    stroke-width="2"
  >
    <text
      x="10"
      y="10"
      text-anchor="start"
      font-size="18"
      font-weight="bold"
      fill="#2E4053"
      style="color: #2E4053; text-shadow: 0 0 5px rgba(0, 0, 0, 0.2)"
    >
      Example
    </text>
  </rect>
  <animate
    attributeName="opacity"
    from="1"
    to="0"
    dur="1s"
    begin="4s"
    repeatCount="indefinite"
  />
  <animate
    attributeName="x"
    from="60"
    to="70"
    dur="1s"
    begin="4s"
    repeatCount="indefinite"
  />
  <path
    d="M 70 470 L 120 470"
    stroke="#87CEEB"
    stroke-width="2"
    fill="none"
  />

  <!-- Section 6: Conclusion -->
  <rect
    x="50"
    y="550"
    width="320"
    height="80"
    fill="none"
    stroke="#C7B8EA"
    stroke-width="2"
  >
    <text
      x="10"
      y="10"
      text-anchor="start"
      font-size="18"
      font-weight="bold"
      fill="#2E4053"
      style="color: #2E4053; text-shadow: 0 0 5px rgba(0, 0, 0, 0.2)"
    >
      Conclusion
    </text>
  </rect>
  <animate
    attributeName="opacity"
    from="1"
    to="0"
    dur="1s"
    begin="5s"
    repeatCount="indefinite"
  />
  <animate
    attributeName="x"
    from="60"
    to="70"
    dur="1s"
    begin="5s"
    repeatCount="indefinite"
  />
  <path
    d="M 70 570 L 120 570"
    stroke="#87CEEB"
    stroke-width="2"
    fill="none"
  />

  <!-- Footer -->
  <text
    x="50%"
    y="380"
    text-anchor="middle"
    font-size="18"
    fill="#2E4053"
    style="color: #2E4053; text-shadow: 0 0 5px rgba(0, 0, 0, 0.2)"
  >
    Branch and Bound: Knapsack Problem
  </text>

</svg>