<svg width="420" height="400" data-topic-id="travelling-salesman-problem-annexure-ii-3-4">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2A9F4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Exhaustive Search Approach</title>
  <rect x="10" y="20" width="400" height="30" fill="url(#pastel-gradient)"/>
  <g id="exhaustive-search-section" transform="translate(50, 60)">
    <section data-narration="Exhaustive search is a problem-solving strategy where every possible solution is considered and evaluated until the optimal solution is found.">
      <text x="20" y="40" font-size="18" font-family="Arial" fill="#2E4053">Exhaustive Search</text>
    </section>
    <section data-narration="The time complexity of exhaustive search is O(n!), where n is the number of cities. This is because there are n! possible permutations of cities, and each permutation needs to be evaluated.">
      <text x="20" y="80" font-size="18" font-family="Arial" fill="#2E4053">Time Complexity: O(n!)</text>
    </section>
    <section data-narration="The space complexity of exhaustive search is also O(n!), as we need to store all possible permutations of cities.">
      <text x="20" y="120" font-size="18" font-family="Arial" fill="#2E4053">Space Complexity: O(n!)</text>
    </section>
    <section data-narration="Suppose we have 4 cities: A, B, C, and D. The exhaustive search approach would generate the following permutations:
    <ul>
      <li>ABCD</li>
      <li>ABDC</li>
      <li>ACBD</li>
      <li>ACDB</li>
      <li>ADBC</li>
      <li>ADCB</li>
      <li>BCAD</li>
      <li>BCDA</li>
      <li>BDCB</li>
      <li>BDAC</li>
      <li>CDAB</li>
      <li>CDBA</li>
    </ul>
    Each permutation would be evaluated to determine the shortest tour.">
      <text x="20" y="160" font-size="18" font-family="Arial" fill="#2E4053">Examples</text>
    </section>
    <section data-narration="Exhaustive search is a brute force method used to solve the Travelling Salesman Problem (TSP). In this approach, every possible solution is generated and evaluated. This method is guaranteed to find the optimal solution but is computationally expensive due to its high time complexity.">
      <text x="20" y="200" font-size="18" font-family="Arial" fill="#2E4053">Definition</text>
    </section>
    <section data-narration="The exhaustive search approach would generate the following permutations:
    <ul>
      <li>ABCD</li>
      <li>ABDC</li>
      <li>ACBD</li>
      <li>ACDB</li>
      <li>ADBC</li>
      <li>ADCB</li>
      <li>BCAD</li>
      <li>BCDA</li>
      <li>BDCB</li>
      <li>BDAC</li>
      <li>CDAB</li>
      <li>CDBA</li>
    </ul>
    Each permutation would be evaluated to determine the shortest tour.">
      <text x="20" y="240" font-size="18" font-family="Arial" fill="#2E4053">Permutations</text>
    </section>
  </g>
  <g id="animation-section" transform="translate(50, 300)">
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="20" y="350" font-size="18" font-family="Arial" fill="#2E4053">Optimal Solution</text>
  </g>
  <footer data-narration="The exhaustive search approach is guaranteed to find the optimal solution, if it exists. However, it is not practical for large problems due to its high computational complexity.">
    <text x="10" y="380" font-size="18" font-family="Arial" fill="#2E4053">Footer</text>
  </footer>
</svg>