<svg
    width="420"
    height="400"
    data-topic-id="The-Greedy-Method-Prims-Algorithm-Kraskals-Algorit"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    viewBox="0 0 420 400"
    style="background-color: #5567b3; background-image: linear-gradient(to bottom, #5567b3, #6495ed);">
    <title>Greedy Method Prims Algorithm Kraskals Algorithm</title>
    <footer>Designed by [Your Name]</footer>

    <!-- Section 1: Introduction -->
    <section data-narration="Introduction">
        <rect x="10" y="10" width="400" height="50" style="fill: transparent; stroke: #fff; stroke-width: 2;" />
        <text x="15" y="25" font-size="24" font-family="Arial" fill="#fff">The Greedy Method</text>
        <text x="15" y="50" font-size="18" font-family="Arial" fill="#fff">Prims Algorithm, Kraskals Algorithm</text>
    </section>

    <!-- Section 2: Prim's Algorithm -->
    <section data-narration="Prims Algorithm">
        <rect x="10" y="70" width="400" height="150" style="fill: transparent; stroke: #fff; stroke-width: 2;" />
        <text x="15" y="90" font-size="24" font-family="Arial" fill="#fff">Prim's Algorithm</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,50" dur="2s" begin="0s" />
        <circle cx="220" cy="100" r="10" fill="#fff" stroke="#fff" stroke-width="2" />
        <text x="200" y="120" font-size="18" font-family="Arial" fill="#fff">Start with a node</text>
        <text x="200" y="140" font-size="18" font-family="Arial" fill="#fff">Add minimum-weight edge</text>
        <text x="200" y="160" font-size="18" font-family="Arial" fill="#fff">Repeat until all nodes</text>
    </section>

    <!-- Section 3: Kruskal's Algorithm -->
    <section data-narration="Kruskal's Algorithm">
        <rect x="10" y="210" width="400" height="150" style="fill: transparent; stroke: #fff; stroke-width: 2;" />
        <text x="15" y="230" font-size="24" font-family="Arial" fill="#fff">Kruskal's Algorithm</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,70" dur="2s" begin="1s" />
        <circle cx="220" cy="130" r="10" fill="#fff" stroke="#fff" stroke-width="2" />
        <text x="200" y="150" font-size="18" font-family="Arial" fill="#fff">Sort edges by weight</text>
        <text x="200" y="170" font-size="18" font-family="Arial" fill="#fff">Add minimum-weight edge</text>
        <text x="200" y="190" font-size="18" font-family="Arial" fill="#fff">Avoid cycles</text>
    </section>

    <!-- Section 4: Example -->
    <section data-narration="Example">
        <rect x="10" y="270" width="400" height="150" style="fill: transparent; stroke: #fff; stroke-width: 2;" />
        <text x="15" y="290" font-size="24" font-family="Arial" fill="#fff">Example</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,70" dur="2s" begin="2s" />
        <rect x="10" y="30" width="100" height="50" style="fill: #f0f0f0; stroke: #fff; stroke-width: 2;" />
        <rect x="120" y="30" width="100" height="50" style="fill: #f0f0f0; stroke: #fff; stroke-width: 2;" />
        <rect x="230" y="30" width="100" height="50" style="fill: #f0f0f0; stroke: #fff; stroke-width: 2;" />
        <text x="120" y="80" font-size="18" font-family="Arial" fill="#fff">Edge AB (2)</text>
        <text x="120" y="110" font-size="18" font-family="Arial" fill="#fff">Edge BC (3)</text>
        <text x="230" y="80" font-size="18" font-family="Arial" fill="#fff">Edge CD (1)</text>
        <text x="230" y="110" font-size="18" font-family="Arial" fill="#fff">Edge AD (4)</text>
        <text x="230" y="140" font-size="18" font-family="Arial" fill="#fff">Edge BD (5)</text>
    </section>

    <!-- Section 5: Conclusion -->
    <section data-narration="Conclusion">
        <rect x="10" y="330" width="400" height="50" style="fill: transparent; stroke: #fff; stroke-width: 2;" />
        <text x="15" y="350" font-size="24" font-family="Arial" fill="#fff">Conclusion</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" begin="3s" />
        <text x="15" y="370" font-size="18" font-family="Arial" fill="#fff">Both algorithms find MST</text>
        <text x="15" y="390" font-size="18" font-family="Arial" fill="#fff">Choose algorithm based on graph properties</text>
    </section>

</svg>