<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="functions" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A288A" stop-opacity="1"/>
      <stop offset="50%" stop-color="#1A6D96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFC107" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#gradient)" x="0" y="0" width="420" height="400"/>
  <text x="50%" y="20%" font-size="24" fill="#fff" text-anchor="middle">Functions</text>
  <rect x="50%" y="60%" width="300" height="100" fill="#fff" rx="10"/>
  <text x="50%" y="70%" font-size="18" fill="#2E4053" text-anchor="middle">Introduction to Functions</text>
  <text x="50%" y="80%" font-size="16" fill="#2E4053" text-anchor="middle">A function is a relationship between two sets that assigns each element of the first set to exactly one element of the second set.</text>
  <g transform="translate(50,100)">
    <rect x="0" y="0" width="80" height="80" fill="#fff" rx="10"/>
    <text x="0" y="0" font-size="18" fill="#2E4053" text-anchor="middle">Domain</text>
    <text x="30" y="20" font-size="16" fill="#2E4053" text-anchor="middle">The set of all possible inputs for the function.</text>
    <text x="0" y="60" font-size="18" fill="#2E4053" text-anchor="middle">Codomain</text>
    <text x="30" y="70" font-size="16" fill="#2E4053" text-anchor="middle">The set of all possible outputs.</text>
  </g>
  <g transform="translate(50,250)">
    <rect x="0" y="0" width="80" height="80" fill="#fff" rx="10"/>
    <text x="0" y="0" font-size="18" fill="#2E4053" text-anchor="middle">Range/Image</text>
    <text x="30" y="20" font-size="16" fill="#2E4053" text-anchor="middle">The set of all actual outputs produced by the function.</text>
    <text x="0" y="60" font-size="18" fill="#2E4053" text-anchor="middle">Pre-image</text>
    <text x="30" y="70" font-size="16" fill="#2E4053" text-anchor="middle">For any output b, the set of all inputs a such that f(a) = b.</text>
  </g>
  <g transform="translate(50,400)">
    <rect x="0" y="0" width="80" height="80" fill="#fff" rx="10"/>
    <text x="0" y="0" font-size="18" fill="#2E4053" text-anchor="middle">Injective Functions (One-to-One)</text>
    <text x="30" y="20" font-size="16" fill="#2E4053" text-anchor="middle">A function f: A → B is injective if distinct elements in the domain map to distinct elements in the codomain.</text>
    <rect x="0" y="60" width="80" height="80" fill="#fff" rx="10"/>
    <text x="0" y="70" font-size="18" fill="#2E4053" text-anchor="middle">Injective Function Example: f(x) = 2x from ℝ to ℝ</text>
    <text x="30" y="80" font-size="16" fill="#2E4053" text-anchor="middle">Distinct elements in the domain map to distinct elements in the codomain.</text>
  </g>
  <g transform="translate(50,500)">
    <rect x="0" y="0" width="80" height="80" fill="#fff" rx="10"/>
    <text x="0" y="0" font-size="18" fill="#2E4053" text-anchor="middle">Surjective Functions (Onto)</text>
    <text x="30" y="20" font-size="16" fill="#2E4053" text-anchor="middle">A function f: A → B is surjective if every element in the codomain has at least one pre-image in the domain.</text>
    <rect x="0" y="60" width="80" height="80" fill="#fff" rx="10"/>
    <text x="0" y="70" font-size="18" fill="#2E4053" text-anchor="middle">Surjective Function Example: f(x) = x² from ℝ to ℝ⁺</text>
    <text x="30" y="80" font-size="16" fill="#2E4053" text-anchor="middle">Every non-negative number has a real square root.</text>
  </g>
  <g transform="translate(50,650)">
    <rect x="0" y="0" width="80" height="80" fill="#fff" rx="10"/>
    <text x="0" y="0" font-size="18" fill="#2E4053" text-anchor="middle">Pre-image Example</text>
    <text x="30" y="20" font-size="16" fill="#2E4053" text-anchor="middle">For any b ∈ B, the set of all a ∈ A such that f(a) = b.</text>
    <rect x="0" y="60" width="80" height="80" fill="#fff" rx="10"/>
    <text x="0" y="70" font-size="18" fill="#2E4053" text-anchor="middle">Pre-image Example: f(x) = 2x from ℝ to ℝ</text>
    <text x="30" y="80" font-size="16" fill="#2E4053" text-anchor="middle">Pre-image of 2 is {1, -1}.</text>
  </g>
  <g transform="translate(50,700)">
    <rect x="0" y="0" width="80" height="80" fill="#fff" rx="10"/>
    <text x="0" y="0" font-size="18" fill="#2E4053" text-anchor="middle">Arrows for Connections</text>
    <text x="30" y="20" font-size="16" fill="#2E4053" text-anchor="middle">Use arrows to visualize the relationships between the domain and codomain.</text>
    <rect x="0" y="60" width="80" height="80" fill="#fff" rx="10"/>
    <text x="0" y="70" font-size="18" fill="#2E4053" text-anchor="middle">Arrow Markers</text>
    <text x="30" y="80" font-size="16" fill="#2E4053" text-anchor="middle">Use arrow markers to highlight important relationships between the domain and codomain.</text>
  </g>
  <g transform="translate(50,750)">
    <rect x="0" y="0" width="80" height="80" fill="#fff" rx="10"/>
    <text x="0" y="0" font-size="18" fill="#2E4053" text-anchor="middle">Footer</text>
    <text x="30" y="20" font-size="16" fill="#2E4053" text-anchor="middle">Functions are crucial in computer science for modeling relationships between data, defining algorithms, and structuring programs.</text>
  </g>
</svg>