      <rect x="0" y="80" width="400" height="80" fill="#ADD8E6" stroke="#4567b7" stroke-width="2" rx="10"/>
      <text x="20" y="120" fill="#000" font-size="18">Decision Trees</text>
      <animate transform="translate(20, 160)" begin="2s" duration="2s" repeat="forever"/>
