<svg width="420" height="400" data-topic-id="Coping-with-Limitations-of-Algorithmic-Power-Backtracking"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400" style="background-color: #ADD8E6; background-image: linear-gradient(45deg, #ADD8E6, #66CCCC);">
  <title>Coping with Limitations of Algorithmic Power: Backtracking</title>
  <desc></desc>
  <defs>
    <linearGradient id=" gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Section 1: Introduction -->
  <g transform="translate(10, 30)">
    <rect width="400" height="40" fill="#66CCCC" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#ADD8E6" text-anchor="start"
          stroke="#ADD8E6" stroke-width="2">Coping with Limitations of Algorithmic Power</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 40"
                     dur="2000" begin="0s" repeatCount="indefinite"/>
  </g>

  <!-- Section 2: Backtracking -->
  <g transform="translate(10, 70)">
    <rect width="400" height="40" fill="#ADD8E6" rx="10"/>
    <text x="10" y="75" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start"
          stroke="#66CCCC" stroke-width="2">Backtracking</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 80"
                     dur="2000" begin="1s" repeatCount="indefinite"/>
    <rect x="20" y="60" width="150" height="20" fill="#DCDCDC" rx="5"/>
    <text x="25" y="65" font-size="14" font-family="Arial" fill="#666" text-anchor="start">Recursive function</text>
    <text x="75" y="65" font-size="14" font-family="Arial" fill="#666" text-anchor="start">Pruning</text>
    <text x="125" y="65" font-size="14" font-family="Arial" fill="#666" text-anchor="start">Uninformed search</text>
  </g>

  <!-- Section 3: Example: n-Queens Problem -->
  <g transform="translate(10, 120)">
    <rect width="400" height="40" fill="#ADD8E6" rx="10"/>
    <text x="10" y="125" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start"
          stroke="#66CCCC" stroke-width="2">Example: n-Queens Problem</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 140"
                     dur="2000" begin="2s" repeatCount="indefinite"/>
    <rect x="20" y="110" width="200" height="30" fill="#DCDCDC" rx="5"/>
    <text x="25" y="115" font-size="14" font-family="Arial" fill="#666" text-anchor="start">n queens on n x n chessboard</text>
  </g>

  <!-- Section 4: Code -->
  <g transform="translate(10, 170)">
    <rect width="400" height="40" fill="#ADD8E6" rx="10"/>
    <text x="10" y="175" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start"
          stroke="#66CCCC" stroke-width="2">Code</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 190"
                     dur="2000" begin="3.5s" repeatCount="indefinite"/>
    <rect x="20" y="165" width="300" height="40" fill="#DCDCDC" rx="5"/>
    <text x="25" y="170" font-size="14" font-family="Arial" fill="#666" text-anchor="start">Python implementation</text>
  </g>

  <!-- Section 5: Approximation -->
  <g transform="translate(10, 220)">
    <rect width="400" height="40" fill="#ADD8E6" rx="10"/>
    <text x="10" y="225" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start"
          stroke="#66CCCC" stroke-width="2">Approximation</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 260"
                     dur="2000" begin="5s" repeatCount="indefinite"/>
    <rect x="20" y="240" width="150" height="20" fill="#DCDCDC" rx="5"/>
    <text x="25" y="245" font-size="14" font-family="Arial" fill="#666" text-anchor="start">Trade-offs between accuracy and computation time</text>
  </g>

  <!-- Section 6: Branch-and-Bound -->
  <g transform="translate(10, 280)">
    <rect width="400" height="40" fill="#ADD8E6" rx="10"/>
    <text x="10" y="285" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start"
          stroke="#66CCCC" stroke-width="2">Branch-and-Bound</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 320"
                     dur="2000" begin="6.5s" repeatCount="indefinite"/>
    <rect x="20" y="290" width="150" height="20" fill="#DCDCDC" rx="5"/>
    <text x="25" y="295" font-size="14" font-family="Arial" fill="#666" text-anchor="start">Using bounds to prune branches</text>
  </g>

  <!-- Footer -->
  <g transform="translate(10, 370)">
    <rect width="400" height="30" fill="#ADD8E6" rx="10"/>
    <text x="10" y="375" font-size="14" font-family="Arial" fill="#66CCCC" text-anchor="start"
          stroke="#66CCCC" stroke-width="2">Coping with Limitations of Algorithmic Power: Backtracking</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 400"
                     dur="2000" begin="7s" repeatCount="indefinite"/>
  </g>

  <!-- Arrow markers for connections -->
  <path d="M 40 10 h 20 V 10 z" stroke="#ADD8E6" stroke-width="2"/>
  <path d="M 120 10 h 20 V 10 z" stroke="#ADD8E6" stroke-width="2"/>
  <path d="M 200 10 h 20 V 10 z" stroke="#ADD8E6" stroke-width="2"/>
  <path d="M 280 10 h 20 V 10 z" stroke="#ADD8E6" stroke-width="2"/>
  <path d="M 40 90 h 20 V 90 z" stroke="#ADD8E6" stroke-width="2"/>
  <path d="M 120 90 h 20 V 90 z" stroke="#ADD8E6" stroke-width="2"/>
  <path d="M 200 90 h 20 V 90 z" stroke="#ADD8E6" stroke-width="2"/>
  <path d="M 280 90 h 20 V 90 z" stroke="#ADD8E6" stroke-width="2"/>
  <path d="M 40 170 h 20 V 170 z" stroke="#ADD8E6" stroke-width="2"/>
  <path d="M 120 170 h 20 V 170 z" stroke="#ADD8E6" stroke-width="2"/>
  <path d="M 200 170 h 20 V 170 z" stroke="#ADD8E6" stroke-width="2"/>
  <path d="M 280 170 h 20 V 170 z" stroke="#ADD8E6" stroke-width="2"/>
  <path d="M 40 260 h 20 V 260 z" stroke="#ADD8E6" stroke-width="2"/>
  <path d="M 120 260 h 20 V 260 z" stroke="#ADD8E6" stroke-width="2"/>
  <path d="M 200 260 h 20 V 260 z" stroke="#ADD8E6" stroke-width="2"/>
  <path d="M 280 260 h 20 V 260 z" stroke="#ADD8E6" stroke-width="2"/>
</svg>