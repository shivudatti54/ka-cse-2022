<svg width="420" height="400" data-topic-id="providing-public-good">
  <rect x="0" y="0" width="420" height="400" fill="#ADD8E6" rx="10"/>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#56B3FA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Providing a Public Good</title>
  <footer>Animated Educational Diagram</footer>
  <g id="diagram">
    <rect x="10" y="10" width="400" height="360" fill="url(#gradient)" rx="10"/>
    <g id="narrations">
      <text x="50" y="50" font-size="18" font-family=" Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Introduction</text>
      <rect x="15" y="80" width="370" height="20" fill="#ccc" rx="5"/>
      <animateTransform attributeName="transform" type="translate" from="0,100" to="0,0" begin="0s"/>
      <text x="50" y="120" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Key Definitions</text>
      <rect x="15" y="180" width="370" height="20" fill="#ccc" rx="5"/>
      <animateTransform attributeName="transform" type="translate" from="0,100" to="0,0" begin="1s"/>
      <text x="50" y="220" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Types of Public Goods</text>
      <rect x="15" y="280" width="370" height="20" fill="#ccc" rx="5"/>
      <animateTransform attributeName="transform" type="translate" from="0,100" to="0,0" begin="2s"/>
      <text x="50" y="320" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Examples of Public Goods</text>
      <rect x="15" y="380" width="370" height="20" fill="#ccc" rx="5"/>
      <animateTransform attributeName="transform" type="translate" from="0,100" to="0,0" begin="3s"/>
    </g>
    <g id="excludable">
      <rect x="10" y="10" width="100" height="100" fill="#66CCCC" rx="10" stroke="#2F4F7F" stroke-width="4"/>
      <text x="50" y="50" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F" data-narration="Excludable public goods can be excluded from those who do not pay for them. Examples include national defense and law enforcement."/>
      <text x="50" y="120" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F" data-narration="For example, if one person pays for the national defense, the security provided is not reduced for others."/>
    </g>
    <g id="non-excludable">
      <rect x="120" y="10" width="100" height="100" fill="#66CCCC" rx="10" stroke="#2F4F7F" stroke-width="4"/>
      <text x="50" y="50" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F" data-narration="Non-excludable public goods cannot be excluded from those who do not pay for them. Examples include public parks and public roads."/>
      <text x="50" y="120" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F" data-narration="For example, if one person uses a public park, the benefits provided are not reduced for others."/>
    </g>
    <g id="narration-1">
      <rect x="10" y="10" width="400" height="60" fill="#ccc" rx="5"/>
      <animateTransform attributeName="transform" type="translate" from="0,100" to="0,0" begin="0s"/>
      <text x="50" y="30" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F" data-narration="A public good is a resource that is non-excludable and non-rivalrous, meaning that it cannot be excluded from those who do not pay for it and it can be consumed by multiple individuals at the same time."/>
      <text x="50" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F" data-narration="This concept is fundamental in economics and game theory, as it highlights the challenges of coordinating individual actions to achieve a common goal."/>
    </g>
    <g id="narration-2">
      <rect x="10" y="80" width="400" height="60" fill="#ccc" rx="5"/>
      <animateTransform attributeName="transform" type="translate" from="0,100" to="0,0" begin="1s"/>
      <text x="50" y="30" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F" data-narration="Non-excludable means that the good or service cannot be denied to those who do not pay for it, while non-rivalrous means that its consumption does not reduce its availability for others."/>
      <text x="50" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F" data-narration="These two characteristics are essential for a public good to be considered a true public good."/>
    </g>
    <g id="narration-3">
      <rect x="10" y="180" width="400" height="60" fill="#ccc" rx="5"/>
      <animateTransform attributeName="transform" type="translate" from="0,100" to="0,0" begin="2s"/>
      <text x="50" y="30" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F" data-narration="There are two main types of public goods: excludable and non-excludable public goods."/>
      <text x="50" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F" data-narration="Excludable public goods can be denied to those who do not pay for them, while non-excludable public goods cannot be denied to those who do not pay for them."/>
    </g>
    <g id="narration-4">
      <rect x="10" y="280" width="400" height="60" fill="#ccc" rx="5"/>
      <animateTransform attributeName="transform" type="translate" from="0,100" to="0,0" begin="3s"/>
      <text x="50" y="30" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F" data-narration="Examples of excludable public goods include national defense and law enforcement, while examples of non-excludable public goods include public parks and public roads."/>
      <text x="50" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F" data-narration="These examples illustrate the different characteristics of excludable and non-excludable public goods."/>
    </g>
    <g id="narration-5">
      <rect x="10" y="380" width="400" height="60" fill="#ccc" rx="5"/>
      <animateTransform attributeName="transform" type="translate" from="0,100" to="0,0" begin="4s"/>
      <text x="50" y="30" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F" data-narration="In conclusion, providing a public good is a complex task that requires coordination and cooperation among individuals to achieve a common goal."/>
      <text x="50" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F" data-narration="This diagram illustrates the key concepts of providing a public good, including non-excludable and non-rivalrous characteristics, excludable and non-excludable public goods, and examples of public goods."/>
    </g>
  </g>
  <g id="arrow-markers">
    <path id="arrow-1" fill="none" stroke="#2F4F7F" stroke-width="2" d="M 20, 20 L 400, 20"/>
    <path id="arrow-2" fill="none" stroke="#2F4F7F" stroke-width="2" d="M 20, 20 L 20, 300"/>
    <path id="arrow-3" fill="none" stroke="#2F4F7F" stroke-width="2" d="M 400, 20 L 20, 300"/>
  </g>
</svg>