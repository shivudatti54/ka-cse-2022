<svg width="420" height="400"
     data-topic-id="cournots-duopoly-game-with-imperfect-information"
     viewBox="0 0 420 400"
     xmlns="http://www.w3.org/2000/svg"
     style="background-image: linear-gradient(to bottom, #7A8BD2, #87CEEB);">
  <!-- Title -->
  <text x="10" y="10" font-size="24" font-family="Arial" fill="#007bff" text-anchor="start">
    Cournot's Duopoly Game with Imperfect Information
  </text>

  <!-- Gradient background -->
  <rect x="0" y="40" width="420" height="320" fill="url(# gradient)" rx="10" />
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#007bff" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Section 1: Definition of Cournot's Duopoly Game -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="200" height="50" fill="#fff" rx="10" data-narration="The Cournot's duopoly game is a two-player game where each player produces a good that is a continuous variable." />
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#007bff" text-anchor="start">
      Definition
    </text>
    <animateTransform attribute="x" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>

  <!-- Section 2: Key Concepts -->
  <g transform="translate(250, 60)">
    <rect x="0" y="0" width="200" height="50" fill="#fff" rx="10" data-narration="The output of each player is a continuous variable, meaning it can take on any value within a certain range." />
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#007bff" text-anchor="start">
      Key Concepts
    </text>
    <animateTransform attribute="x" begin="2s" dur="2s" repeatCount="indefinite" />
  </g>

  <!-- Section 3: Demand Function -->
  <g transform="translate(50, 160)">
    <rect x="0" y="0" width="200" height="50" fill="#fff" rx="10" data-narration="The demand function is typically represented as a downward-sloping curve, indicating that an increase in total output leads to a decrease in demand." />
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#007bff" text-anchor="start">
      Demand Function
    </text>
    <path d="M10,50 C-5,50 0,35 10,35" fill="#007bff" stroke="#007bff" stroke-width="2" />
    <animateTransform attribute="x" begin="4s" dur="2s" repeatCount="indefinite" />
  </g>

  <!-- Section 4: Production Cost -->
  <g transform="translate(250, 160)">
    <rect x="0" y="0" width="200" height="50" fill="#fff" rx="10" data-narration="Each player incurs a production cost for producing the good." />
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#007bff" text-anchor="start">
      Production Cost
    </text>
    <path d="M10,50 C-5,50 0,35 10,35" fill="#007bff" stroke="#007bff" stroke-width="2" />
    <animateTransform attribute="x" begin="6s" dur="2s" repeatCount="indefinite" />
  </g>

  <!-- Section 5: Profit Function -->
  <g transform="translate(50, 260)">
    <rect x="0" y="0" width="200" height="50" fill="#fff" rx="10" data-narration="The profit function is typically represented as a function of the production levels and the demand function." />
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#007bff" text-anchor="start">
      Profit Function
    </text>
    <path d="M10,50 C-5,50 0,35 10,35" fill="#007bff" stroke="#007bff" stroke-width="2" />
    <animateTransform attribute="x" begin="8s" dur="2s" repeatCount="indefinite" />
  </g>

  <!-- Section 6: Gameplay -->
  <g transform="translate(250, 260)">
    <rect x="0" y="0" width="200" height="50" fill="#fff" rx="10" data-narration="The game consists of two players, 1 and 2. Each player makes a decision about how much to produce, denoted by x1 and x2, respectively." />
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#007bff" text-anchor="start">
      Gameplay
    </text>
    <path d="M10,50 C-5,50 0,35 10,35" fill="#007bff" stroke="#007bff" stroke-width="2" />
    <animateTransform attribute="x" begin="10s" dur="2s" repeatCount="indefinite" />
  </g>

  <!-- Footer -->
  <text x="10" y="380" font-size="18" font-family="Arial" fill="#007bff" text-anchor="start">
    Cournot's Duopoly Game with Imperfect Information
  </text>
</svg>