<svg width="420" height="400" data-topic-id="auctions-auctions-with-an-arbitrary-distribution-o">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#8BC34A" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" rx="10" />
  
  <!-- Title Section -->
  <section data-narration="Introduction">
    <rect x="50" y="50" width="320" height="50" fill="#E0E0E0" rx="5" />
    <text x="150" y="70" font-size="24" font-family="Arial" fill="#2F4F7F">Auctions</text>
    <animate attributeName="opacity" from="1" to="0.5" dur="2000" begin="0s" />
  </section>
  
  <!-- Definition Section -->
  <section data-narration="Definition of an Auction">
    <rect x="50" y="120" width="320" height="50" fill="#E0E0E0" rx="5" />
    <text x="150" y="140" font-size="18" font-family="Arial" fill="#2F4F7F">An auction is a mechanism for allocating a single item or resource to a group of bidders.</text>
    <animate attributeName="opacity" from="1" to="0.5" dur="2000" begin="2s" />
  </section>
  
  <!-- Types of Auctions Section -->
  <section data-narration="Types of Auctions">
    <rect x="50" y="180" width="320" height="50" fill="#E0E0E0" rx="5" />
    <text x="150" y="200" font-size="18" font-family="Arial" fill="#2F4F7F">There are several types of auctions, including:</text>
    <rect x="50" y="220" width="80" height="20" fill="#8BC34A" rx="5" />
    <text x="130" y="240" font-size="18" font-family="Arial" fill="#2F4F7F">First-Price Auction</text>
    <rect x="230" width="80" height="20" fill="#8BC34A" rx="5" />
    <text x="310" y="240" font-size="18" font-family="Arial" fill="#2F4F7F">Second-Price Auction</text>
    <rect x="50" y="280" width="80" height="20" fill="#8BC34A" rx="5" />
    <text x="130" y="300" font-size="18" font-family="Arial" fill="#2F4F7F">Symmetric Auction</text>
    <animate attributeName="opacity" from="1" to="0.5" dur="2000" begin="4s" />
  </section>
  
  <!-- Auctions with an Arbitrary Distribution of Valuations Section -->
  <section data-narration="Auctions with an Arbitrary Distribution of Valuations">
    <rect x="50" y="340" width="320" height="50" fill="#E0E0E0" rx="5" />
    <text x="150" y="360" font-size="18" font-family="Arial" fill="#2F4F7F">In an auction with an arbitrary distribution of valuations, each bidder has a private valuation for the item, which is not known by the other bidders.</text>
    <animate attributeName="opacity" from="1" to="0.5" dur="2000" begin="6s" />
  </section>
  
  <!-- Bayes' Rule in Auctions Section -->
  <section data-narration="Bayes' Rule in Auctions">
    <rect x="50" y="410" width="320" height="50" fill="#E0E0E0" rx="5" />
    <text x="150" y="430" font-size="18" font-family="Arial" fill="#2F4F7F">Bayes' rule can be used to determine the expected value of a bid, given the distribution of valuations.</text>
    <animate attributeName="opacity" from="1" to="0.5" dur="2000" begin="8s" />
  </section>
  
  <!-- Footer Section -->
  <footer>
    <rect x="50" y="460" width="320" height="50" fill="#E0E0E0" rx="5" />
    <text x="150" y="470" font-size="18" font-family="Arial" fill="#2F4F7F">Auctions</text>
  </footer>
</svg>