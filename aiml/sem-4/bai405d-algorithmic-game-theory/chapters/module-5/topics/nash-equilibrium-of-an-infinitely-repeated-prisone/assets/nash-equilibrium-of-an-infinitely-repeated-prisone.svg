<svg width="420" height="400" data-topic-id="nash-equilibrium-infinitely-repeated-prisoner-dilemma" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  
  <!-- Title -->
  <text transform="translate(20, 20)" font-size="24" font-family="Arial" fill="#3498DB">
    Nash Equilibrium of an Infinitely Repeated Prisoner's Dilemma
  </text>
  
  <!-- Section 1: Introduction -->
  <section data-narration="What is the Prisoner's Dilemma?" transform="translate(20, 60)">
    <rect x="10" y="10" width="300" height="50" fill="#F7F7F7" rx="10"/>
    <text transform="translate(15, 20)" font-size="18" font-family="Arial" fill="#555555">
      The Prisoner's Dilemma is a classic game theory paradox...
    </text>
  </section>
  <animateTransform attributeName="transform" type="translate" from="translate(20, 60)" to="translate(20, 60)" dur="2000" begin="0s"/>
  
  <!-- Section 2: Payoff Matrix -->
  <section data-narration="Payoff Matrix" transform="translate(20, 110)">
    <rect x="10" y="10" width="300" height="50" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="70" width="300" height="50" fill="#F7F7F7" rx="10"/>
    <text transform="translate(15, 20)" font-size="18" font-family="Arial" fill="#555555">
      The payoffs for each player are as follows:
    </text>
    <text transform="translate(15, 70)" font-size="18" font-family="Arial" fill="#555555">
      |                           | Prisoner A Defects | Prisoner A Cooperates |
      | ------------------------- | ------------------ | --------------------- |
      | **Prisoner B Defects**    | A: 3, B: 3         | A: 0, B: 5            |
      | **Prisoner B Cooperates** | A: 5, B: 0         | A: 1, B: 1            |
    </text>
  </section>
  <animateTransform attributeName="transform" type="translate" from="translate(20, 110)" to="translate(20, 110)" dur="2000" begin="1000s"/>
  
  <!-- Section 3: Nash Equilibrium -->
  <section data-narration="Nash Equilibrium" transform="translate(20, 160)">
    <rect x="10" y="10" width="300" height="50" fill="#F7F7F7" rx="10"/>
    <text transform="translate(15, 20)" font-size="18" font-family="Arial" fill="#555555">
      A Nash Equilibrium is a state in a game where...
    </text>
    <text transform="translate(15, 70)" font-size="18" font-family="Arial" fill="#555555">
      ...no player can improve their payoff by unilaterally changing their strategy.
    </text>
  </section>
  <animateTransform attributeName="transform" type="translate" from="translate(20, 160)" to="translate(20, 160)" dur="2000" begin="2000s"/>
  
  <!-- Section 4: Infinitely Repeated Prisoner's Dilemma -->
  <section data-narration="Infinitely Repeated Prisoner's Dilemma" transform="translate(20, 210)">
    <rect x="10" y="10" width="300" height="50" fill="#F7F7F7" rx="10"/>
    <text transform="translate(15, 20)" font-size="18" font-family="Arial" fill="#555555">
      In the context of an infinitely repeated Prisoner's Dilemma...
    </text>
    <text transform="translate(15, 70)" font-size="18" font-family="Arial" fill="#555555">
      ...we can think of the game as being played multiple times.
    </text>
  </section>
  <animateTransform attributeName="transform" type="translate" from="translate(20, 210)" to="translate(20, 210)" dur="2000" begin="3000s"/>
  
  <!-- Section 5: Arrow Markers -->
  <rect x="10" y="10" width="300" height="50" fill="#F7F7F7" rx="10"/>
  <path d="M 20,20 L 90,20" stroke="#FFC107" stroke-width="2"/>
  <path d="M 20,20 L 90,20" stroke="#FFC107" stroke-width="2"/>
  <path d="M 20,20 L 90,20" stroke="#FFC107" stroke-width="2"/>
  
  <!-- Section 6: Conclusion -->
  <section data-narration="Conclusion" transform="translate(20, 260)">
    <rect x="10" y="10" width="300" height="50" fill="#F7F7F7" rx="10"/>
    <text transform="translate(15, 20)" font-size="18" font-family="Arial" fill="#555555">
      In conclusion, the Nash Equilibrium of an Infinitely Repeated Prisoner's Dilemma...
    </text>
    <text transform="translate(15, 70)" font-size="18" font-family="Arial" fill="#555555">
      ...is a stable state where no player has an incentive to deviate from their chosen strategy.
    </text>
  </section>
  <animateTransform attributeName="transform" type="translate" from="translate(20, 260)" to="translate(20, 260)" dur="2000" begin="4000s"/>
  
  <!-- Footer -->
  <text transform="translate(20, 380)" font-size="18" font-family="Arial" fill="#555555">
    &copy; 2023
  </text>
</svg>