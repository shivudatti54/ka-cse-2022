<svg width="420" height="400" data-topic-id="nash-equilibrium-payoffs-of-an-infinitely-repeated" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1">
        <animate attributeName="stop-opacity" begin="0s" dur="2s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#B1B8CE" stop-opacity="1">
        <animate attributeName="stop-opacity" begin="1s" dur="2s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1">
        <animate attributeName="stop-opacity" begin="3s" dur="2s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)" />
  
  <!-- Title at top -->
  <text x="50%" y="20%" font-size="24" font-weight="bold" fill="#3498DB" text-anchor="middle">Nash Equilibrium Payoffs of an Infinitely Repeated</text>
  
  <!-- Section 1: Introduction -->
  <rect x="0" y="100" width="100%" height="50" fill="#F0F0F0" rx="10">
    <text x="20%" y="25%" font-size="16" fill="#666" text-anchor="middle" data-narration="In the infinitely repeated Prisoner's Dilemma, the game is repeated infinitely many times. This means that the prisoners have the opportunity to make multiple decisions, and the payoffs for each decision are based on the current and future payoffs." />
  </rect>
  
  <!-- Section 2: Nash Equilibrium -->
  <rect x="0" y="170" width="100%" height="50" fill="#F0F0F0" rx="10">
    <text x="20%" y="25%" font-size="16" fill="#666" text-anchor="middle" data-narration="A Nash Equilibrium is a situation in which no player can improve their payoff by unilaterally changing their strategy, assuming all other players keep their strategies unchanged." />
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
  </rect>
  
  <!-- Section 3: Prisoner's Dilemma -->
  <rect x="0" y="240" width="100%" height="50" fill="#F0F0F0" rx="10">
    <text x="20%" y="25%" font-size="16" fill="#666" text-anchor="middle" data-narration="The Prisoner's Dilemma is a game in which two prisoners, A and B, are arrested and interrogated separately. Each prisoner has two options: cooperate (C) or defect (D)." />
    <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite" />
  </rect>
  
  <!-- Section 4: Infinitely Repeated Prisoner's Dilemma -->
  <rect x="0" y="310" width="100%" height="50" fill="#F0F0F0" rx="10">
    <text x="20%" y="25%" font-size="16" fill="#666" text-anchor="middle" data-narration="In the infinitely repeated Prisoner's Dilemma, the game is repeated infinitely many times. This means that the prisoners have the opportunity to make multiple decisions, and the payoffs for each decision are based on the current and future payoffs." />
    <animate attributeName="opacity" begin="4s" dur="2s" repeatCount="indefinite" />
  </rect>
  
  <!-- Section 5: Nash Equilibrium Payoffs -->
  <rect x="0" y="380" width="100%" height="50" fill="#F0F0F0" rx="10">
    <text x="20%" y="25%" font-size="16" fill="#666" text-anchor="middle" data-narration="In the infinitely repeated Prisoner's Dilemma, the Nash Equilibrium payoffs are the payoffs that result from a simultaneous and symmetric strategy." />
    <animate attributeName="opacity" begin="6s" dur="2s" repeatCount="indefinite" />
  </rect>
  
  <!-- Section 6: Infinite Repetition -->
  <rect x="0" y="450" width="100%" height="50" fill="#F0F0F0" rx="10">
    <text x="20%" y="25%" font-size="16" fill="#666" text-anchor="middle" data-narration="The prisoners have the opportunity to make multiple decisions, and the payoffs for each decision are based on the current and future payoffs." />
    <animate attributeName="opacity" begin="8s" dur="2s" repeatCount="indefinite" />
  </rect>
  
  <!-- Arrow markers for connections -->
  <line x1="20%" y1="100" x2="80%" y2="100" stroke="#3498DB" stroke-width="2" />
  <line x1="20%" y1="170" x2="80%" y2="170" stroke="#3498DB" stroke-width="2" />
  <line x1="20%" y1="240" x2="80%" y2="240" stroke="#3498DB" stroke-width="2" />
  <line x1="20%" y1="310" x2="80%" y2="310" stroke="#3498DB" stroke-width="2" />
  <line x1="20%" y1="380" x2="80%" y2="380" stroke="#3498DB" stroke-width="2" />
  <line x1="20%" y1="450" x2="80%" y2="450" stroke="#3498DB" stroke-width="2" />
  
  <!-- Footer at bottom -->
  <text x="50%" y="460%" font-size="12" fill="#666" text-anchor="middle">Indigo Insights</text>
</svg>