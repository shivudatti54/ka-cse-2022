<svg width="420" height="400" data-topic-id="preferences">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#93a8c4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d8d8d8" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <title>Preferences</title>

  <rect x="10" y="10" width="400" height="350" fill="url(#gradient)"/>
  <text x="20" y="20" font-size="32" font-family="Arial" fill="#3498db" text-anchor="middle">Preferences</text>

  <section data-narration="What are Pointers?" style="margin-bottom: 20px;">
    <rect x="10" y="50" width="340" height="100" fill="#f9f9f9"/>
    <text x="20" y="60" font-size="18" font-family="Arial" fill="#2ecc71">Pointers are variables that store memory addresses.</text>
    <text x="20" y="80" font-size="18" font-family="Arial" fill="#2ecc71">They "point to" the location where data is stored in memory.</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" begin="0s" dur="2s"/>
  </section>

  <section data-narration="Basic Pointer Syntax" style="margin-bottom: 20px;">
    <rect x="10" y="150" width="340" height="100" fill="#f9f9f9"/>
    <text x="20" y="160" font-size="18" font-family="Arial" fill="#2ecc71">int *ptr = &number;</text>
    <text x="20" y="180" font-size="18" font-family="Arial" fill="#2ecc71">ptr now contains the address of number.</text>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 200" begin="2s" dur="2s"/>
  </section>

  <section data-narration="The Address-of Operator (&)" style="margin-bottom: 20px;">
    <rect x="10" y="250" width="340" height="100" fill="#f9f9f9"/>
    <text x="20" y="260" font-size="18" font-family="Arial" fill="#2ecc71">int x = 10;</text>
    <text x="20" y="280" font-size="18" font-family="Arial" fill="#2ecc71">cout << &x;</text>
    <text x="20" y="300" font-size="18" font-family="Arial" fill="#2ecc71">Outputs the memory address of x.</text>
    <animateTransform attributeName="transform" type="translate" from="0 250" to="0 300" begin="4s" dur="2s"/>
  </section>

  <section data-narration="Pointer Memory Diagram" style="margin-bottom: 20px;">
    <rect x="10" y="350" width="340" height="150" fill="#f9f9f9"/>
    <text x="20" y="360" font-size="18" font-family="Arial" fill="#2ecc71">Memory Layout:</text>
    <text x="20" y="380" font-size="14" font-family="Arial" fill="#2ecc71">+----------------+-------------------+-------------------+</text>
    <text x="20" y="400" font-size="14" font-family="Arial" fill="#2ecc71">| Variable Name  | Memory Address    | Stored Value      |</text>
    <text x="20" y="420" font-size="14" font-family="Arial" fill="#2ecc71">| number         | 0x7ffd42a3bc4c    | 42                |</text>
    <text x="20" y="440" font-size="14" font-family="Arial" fill="#2ecc71">| ptr            | 0x7ffd42a3bc50    | 0x7ffd42a3bc4c    |</text>
    <text x="20" y="460" font-size="14" font-family="Arial" fill="#2ecc71">+----------------+-------------------+-------------------+</text>
    <animateTransform attributeName="transform" type="translate" from="0 350" to="0 400" begin="6s" dur="2s"/>
  </section>

  <section data-narration="Pointer Arithmetic" style="margin-bottom: 20px;">
    <rect x="10" y="550" width="340" height="100" fill="#f9f9f9"/>
    <text x="20" y="560" font-size="18" font-family="Arial" fill="#2ecc71">int arr[5] = {10, 20, 30, 40, 50};</text>
    <text x="20" y="580" font-size="18" font-family="Arial" fill="#2ecc71">int *ptr = arr;</text>
    <text x="20" y="600" font-size="18" font-family="Arial" fill="#2ecc71">ptr now points to the first element.</text>
    <text x="20" y="620" font-size="18" font-family="Arial" fill="#2ecc71">cout << *ptr; Outputs 10.</text>
    <text x="20" y="640" font-size="18" font-family="Arial" fill="#2ecc71">ptr++; Move to the next element.</text>
    <text x="20" y="660" font-size="18" font-family="Arial" fill="#2ecc71">cout << *ptr; Outputs 20.</text>
    <text x="20" y="680" font-size="18" font-family="Arial" fill="#2ecc71">cout << *(ptr + 2); Outputs 40.</text>
    <animateTransform attributeName="transform" type="translate" from="0 550" to="0 600" begin="8s" dur="2s"/>
  </section>

  <footer>Created with love for C++</footer>
</svg>