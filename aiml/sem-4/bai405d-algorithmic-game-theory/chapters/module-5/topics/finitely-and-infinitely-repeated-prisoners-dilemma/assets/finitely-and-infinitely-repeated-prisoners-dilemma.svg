<svg width="420" height="400" data-topic-id="finitely-and-infinitely-repeated-prisoner-dilemma">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A9BE5" stop-opacity="1" />
      <stop offset="50%" stop-color="#6c5ce7" stop-opacity="1" />
      <stop offset="100%" stop-color="#8BC34A" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" opacity="0.5" />
  
  <!-- Title at top -->
  <text x="50%" y="20%" font-size="24px" font-family="Arial, sans-serif" text-anchor="middle" fill="#8BC34A">
    Finitely And Infinitely Repeated Prisoner’s Dilemma
  </text>
  
  <!-- Section 1: Introduction -->
  <rect x="20" y="80" width="380" height="40" fill="#fff" opacity="1" data-narration="Introduction to the Prisoner's Dilemma">
    <text x="20" y="90" font-size="16px" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      The Prisoner's Dilemma is a fundamental concept in game theory that has been extensively studied in various fields, including economics, psychology, and computer science.
    </text>
  </rect>
  <animateTransform attributeName="transform" type="translate" from="0,80" to="0,100" dur="1500" begin="0s" />
  
  <!-- Section 2: Definitions -->
  <rect x="20" y="120" width="380" height="40" fill="#fff" opacity="1" data-narration="Definitions of the Prisoner's Dilemma">
    <text x="20" y="130" font-size="16px" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      The Prisoner's Dilemma is a game where two prisoners, A and B, are arrested and interrogated separately by the police.
    </text>
  </rect>
  <rect x="80" y="120" width="300" height="40" fill="#fff" opacity="1" data-narration="Payoffs for each option">
    <text x="80" y="130" font-size="16px" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      <tspan x="80" y="140">Each prisoner has two options: to confess or remain silent.</tspan>
      <tspan x="80" y="150">The payoffs for each option are as follows:</tspan>
      <tspan x="80" y="160">|                               |</tspan>
      <tspan x="80" y="170">|   Prisoner A Confesses   |</tspan>
      <tspan x="80" y="180">|   Prisoner A Remains Silent |</tspan>
      <tspan x="80" y="190">|   Prisoner B Confesses    |</tspan>
      <tspan x="80" y="200">|   Prisoner B Remains Silent |</tspan>
    </text>
  </rect>
  <animateTransform attributeName="transform" type="translate" from="80,120" to="80,140" dur="1500" begin="0s" />
  <animateTransform attributeName="transform" type="translate" from="80,160" to="80,180" dur="1500" begin="0s" />
  <animateTransform attributeName="transform" type="translate" from="80,200" to="80,220" dur="1500" begin="0s" />
  <animateTransform attributeName="transform" type="translate" from="80,240" to="80,260" dur="1500" begin="0s" />
  
  <!-- Section 3: Key Concepts -->
  <rect x="20" y="250" width="380" height="40" fill="#fff" opacity="1" data-narration="Key Concepts: Nash Equilibrium">
    <text x="20" y="260" font-size="16px" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      A Nash Equilibrium is a state where no player can improve their payoff by unilaterally changing their strategy, assuming the other player's strategy remains the same.
    </text>
  </rect>
  <rect x="80" y="250" width="300" height="40" fill="#fff" opacity="1" data-narration="Fermat’s Apparent Paradox">
    <text x="80" y="260" font-size="16px" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      Fermat’s Apparent Paradox states that, in the finitely repeated Prisoner's Dilemma, both prisoners will confess, even though it is not the dominant strategy.
    </text>
  </rect>
  <rect x="80" y="300" width="300" height="40" fill="#fff" opacity="1" data-narration="Tit for Tat Strategy">
    <text x="80" y="310" font-size="16px" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      Tit for Tat is a strategy where a player imitates the other player's previous move.
    </text>
  </rect>
  <rect x="80" y="350" width="300" height="40" fill="#fff" opacity="1" data-narration="Nash Equilibrium Example">
    <text x="80" y="360" font-size="16px" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      An example of a Nash Equilibrium is when both prisoners remain silent, resulting in a payoff of 10 years for both.
    </text>
  </rect>
  <animateTransform attributeName="transform" type="translate" from="80,250" to="80,270" dur="1500" begin="0s" />
  <animateTransform attributeName="transform" type="translate" from="80,290" to="80,310" dur="1500" begin="0s" />
  <animateTransform attributeName="transform" type="translate" from="80,330" to="80,350" dur="1500" begin="0s" />
  <animateTransform attributeName="transform" type="translate" from="80,370" to="80,390" dur="1500" begin="0s" />
  
  <!-- Section 4: Infinitely Repeated Prisoner's Dilemma -->
  <rect x="20" y="400" width="380" height="40" fill="#fff" opacity="1" data-narration="Infinitely Repeated Prisoner’s Dilemma">
    <text x="20" y="410" font-size="16px" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      In an infinitely repeated Prisoner's Dilemma, the game is played an infinite number of times, with the prisoners making decisions based on the payoffs from previous periods.
    </text>
  </rect>
  <rect x="80" y="400" width="300" height="40" fill="#fff" opacity="1" data-narration="Nash Equilibrium in Infinitely Repeated Game">
    <text x="80" y="410" font-size="16px" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      In the infinitely repeated game, both prisoners will eventually converge to the Nash Equilibrium, where both prisoners remain silent.
    </text>
  </rect>
  <rect x="80" y="450" width="300" height="40" fill="#fff" opacity="1" data-narration="Tit for Tat in Infinitely Repeated Game">
    <text x="80" y="460" font-size="16px" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      Tit for Tat will not converge to the Nash Equilibrium in the infinitely repeated game, as the players will continue to imitate each other's previous moves.
    </text>
  </rect>
  <animateTransform attributeName="transform" type="translate" from="80,400" to="80,420" dur="1500" begin="0s" />
  <animateTransform attributeName="transform" type="translate" from="80,440" to="80,460" dur="1500" begin="0s" />
  <animateTransform attributeName="transform" type="translate" from="80,470" to="80,490" dur="1500" begin="0s" />
  <animateTransform attributeName="transform" type="translate" from="80,500" to="80,520" dur="1500" begin="0s" />
  
  <!-- Section 5: Conclusion -->
  <rect x="20" y="550" width="380" height="40" fill="#fff" opacity="1" data-narration="Conclusion">
    <text x="20" y="560" font-size="16px" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      The Prisoner's Dilemma is a fundamental concept in game theory that has been extensively studied in various fields, including economics, psychology, and computer science.
    </text>
  </rect>
  <rect x="80" y="550" width="300" height="40" fill="#fff" opacity="1" data-narration="Conclusion: Nash Equilibrium and Tit for Tat">
    <text x="80" y="560" font-size="16px" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      The Prisoner's Dilemma has important implications for our understanding of human behavior in repeated games, and strategies like Nash Equilibrium and Tit for Tat can be used to analyze and understand the behavior of players.
    </text>
  </rect>
  <animateTransform attributeName="transform" type="translate" from="80,550" to="80,570" dur="1500" begin="0s" />
  <animateTransform attributeName="transform" type="translate" from="80,580" to="80,600" dur="1500" begin="0s" />
  <animateTransform attributeName="transform" type="translate" from="80,610" to="80,630" dur="1500" begin="0s" />
  <animateTransform attributeName="transform" type="translate" from="80,640" to="80,660" dur="1500" begin="0s" />
  
  <!-- Footer -->
  <text x="50%" y="380" font-size="16px" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">
    Created by [Your Name]
  </text>
</svg>