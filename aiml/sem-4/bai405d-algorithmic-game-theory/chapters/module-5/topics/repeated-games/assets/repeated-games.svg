<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="Repeated-Games">
  <desc>Repeated Games Diagram</desc>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6495ED" stop-opacity="1"/>
      <stop offset="50%" stop-color="#8BC34A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <g transform="translate(20, 20)">
    <g data-narration="Stage Game">
      <path d="M 10 10 L 30 30 L 50 50 L 70 30 L 90 10 Z"/>
      <text x="50" y="50" font-size="14" font-family="Arial">Stage Game</text>
    </g>
    <g data-narration="Common Knowledge">
      <path d="M 100 10 L 120 30 L 140 50 L 160 30 L 180 10 Z"/>
      <text x="130" y="40" font-size="14" font-family="Arial">Common Knowledge</text>
    </g>
    <g data-narration="Perfect Information">
      <path d="M 200 10 L 220 30 L 240 50 L 260 30 L 280 10 Z"/>
      <text x="230" y="40" font-size="14" font-family="Arial">Perfect Information</text>
    </g>
    <g data-narration="Nash Equilibrium">
      <path d="M 300 10 L 320 30 L 340 50 L 360 30 L 380 10 Z"/>
      <text x="320" y="40" font-size="14" font-family="Arial">Nash Equilibrium</text>
    </g>
    <g data-narration="Reputation">
      <path d="M 410 10 L 430 30 L 450 50 L 470 30 L 490 10 Z"/>
      <text x="430" y="40" font-size="14" font-family="Arial">Reputation</text>
    </g>
    <g data-narration="Signaling">
      <path d="M 500 10 L 520 30 L 540 50 L 560 30 L 580 10 Z"/>
      <text x="530" y="40" font-size="14" font-family="Arial">Signaling</text>
    </g>
    <g data-narration="Types of Repeated Games">
      <path d="M 10 200 L 30 220 L 50 240 L 70 220 L 90 200 Z"/>
      <text x="40" y="210" font-size="14" font-family="Arial">Finite Horizon Game</text>
      <text x="60" y="220" font-size="14" font-family="Arial">Infinite Horizon Game</text>
      <text x="80" y="240" font-size="14" font-family="Arial">Zero-Sum Game</text>
    </g>
    <g data-narration="Equilibrium in Repeated Games">
      <path d="M 300 200 L 320 220 L 340 240 L 360 220 L 380 200 Z"/>
      <text x="320" y="210" font-size="14" font-family="Arial">Nash Equilibrium</text>
    </g>
    <animate transform="rotate(360 200 200)" begin="0s" dur="10000ms" repeatCount="indefinite"/>
    <animate transform="rotate(360 250 250)" begin="0.5s" dur="10000ms" repeatCount="indefinite"/>
    <animate transform="rotate(360 300 300)" begin="1s" dur="10000ms" repeatCount="indefinite"/>
    <animate transform="rotate(360 350 350)" begin="1.5s" dur="10000ms" repeatCount="indefinite"/>
    <animate transform="rotate(360 400 400)" begin="2s" dur="10000ms" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 220)">
    <title>Repeated Games Diagram</title>
  </g>
  <g transform="translate(10, 380)">
    <footer>Learn about Repeated Games</footer>
  </g>
</svg>