<svg width="420" height="400" data-topic-id="equilibrium-in-a-single-population">
    <style>
        /* Add some basic styling to our SVG */
        /* Set the background color */
        body {
            margin: 0;
            padding: 0;
            background-image: linear-gradient(to bottom, #c7d2ff, #a1c9f2);
        }
        
        /* Add some padding to our SVG */
        svg {
            padding: 20px;
        }
        
        /* Set the text color */
        text {
            fill: #000;
        }
        
        /* Add some nice arrows */
        line {
            stroke: #0a0;
            stroke-width: 2;
        }
        
        /* Add some nice circles */
        circle {
            fill: #f0f0f0;
            stroke: #0a0;
            stroke-width: 2;
        }
        
        /* Add some nice rectangles */
        rect {
            fill: #f0f0f0;
            stroke: #0a0;
            stroke-width: 2;
        }
    </style>
    <title>Equilibrium in a Single Population</title>
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#c7d2ff" stop-opacity="1" />
            <stop offset="100%" stop-color="#a1c9f2" stop-opacity="1" />
        </linearGradient>
    </defs>
    <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" rx="10" />
    <g data-narration="Introduction">
        <text x="20" y="50" font-size="24" font-family="Arial" font-weight="bold">Equilibrium in a Single Population</text>
    </g>
    <g data-narration="Definitions">
        <rect x="10" y="80" width="370" height="20" rx="10" fill="#f0f0f0" stroke="#0a0" stroke-width="2" />
        <text x="20" y="90" font-size="18" font-family="Arial" font-weight="bold">Mixed Strategy</text>
        <text x="20" y="110" font-size="18" font-family="Arial">A probability distribution over a set of pure strategies. It is a way to randomize one's actions to make them unpredictable to others.</text>
    </g>
    <g data-narration="Key Concepts">
        <rect x="10" y="140" width="370" height="20" rx="10" fill="#f0f0f0" stroke="#0a0" stroke-width="2" />
        <text x="20" y="150" font-size="18" font-family="Arial" font-weight="bold">Expected Value</text>
        <text x="20" y="170" font-size="18" font-family="Arial">The average payoff that a player can expect to receive when using a particular strategy.</text>
        <rect x="10" y="200" width="370" height="20" rx="10" fill="#f0f0f0" stroke="#0a0" stroke-width="2" />
        <text x="20" y="210" font-size="18" font-family="Arial" font-weight="bold">Payoff Matrix</text>
        <text x="20" y="230" font-size="18" font-family="Arial">A table that shows the payoffs for each possible combination of strategies.</text>
        <rect x="10" y="280" width="370" height="20" rx="10" fill="#f0f0f0" stroke="#0a0" stroke-width="2" />
        <text x="20" y="290" font-size="18" font-family="Arial" font-weight="bold">Dominant Strategy</text>
        <text x="20" y="310" font-size="18" font-family="Arial">A strategy that is better than any other strategy, regardless of what the other player chooses.</text>
    </g>
    <g data-narration="Example">
        <rect x="10" y="360" width="370" height="20" rx="10" fill="#f0f0f0" stroke="#0a0" stroke-width="2" />
        <text x="20" y="370" font-size="18" font-family="Arial" font-weight="bold">Payoff Matrix</text>
        <rect x="10" y="400" width="370" height="20" rx="10" fill="#f0f0f0" stroke="#0a0" stroke-width="2" />
        <text x="20" y="410" font-size="18" font-family="Arial" font-weight="bold">Dominant Strategy</text>
        <rect x="10" y="460" width="370" height="20" rx="10" fill="#f0f0f0" stroke="#0a0" stroke-width="2" />
        <text x="20" y="470" font-size="18" font-family="Arial" font-weight="bold">Example</text>
        <rect x="10" y="500" width="370" height="20" rx="10" fill="#f0f0f0" stroke="#0a0" stroke-width="2" />
        <rect x="10" y="530" width="370" height="20" rx="10" fill="#f0f0f0" stroke="#0a0" stroke-width="2" />
        <rect x="10" y="560" width="370" height="20" rx="10" fill="#f0f0f0" stroke="#0a0" stroke-width="2" />
        <text x="20" y="570" font-size="18" font-family="Arial" font-weight="bold">A</text>
        <text x="20" y="590" font-size="18" font-family="Arial">B</text>
        <text x="20" y="610" font-size="18" font-family="Arial">10</text>
        <text x="20" y="630" font-size="18" font-family="Arial">5</text>
    </g>
    <g data-narration="Conclusion">
        <text x="20" y="700" font-size="18" font-family="Arial" font-weight="bold">Conclusion</text>
        <text x="20" y="720" font-size="18" font-family="Arial">In a single population game, the goal is to maximize the payoff. The optimal strategy is the strategy that results in the highest payoff.</text>
    </g>
    <g data-narration="Arrows">
        <line x1="10" y1="50" x2="350" y2="50" stroke="#0a0" stroke-width="2" />
        <line x1="10" y1="80" x2="350" y2="80" stroke="#0a0" stroke-width="2" />
        <line x1="10" y1="140" x2="350" y2="140" stroke="#0a0" stroke-width="2" />
        <line x1="10" y1="200" x2="350" y2="200" stroke="#0a0" stroke-width="2" />
        <line x1="10" y1="280" x2="350" y2="280" stroke="#0a0" stroke-width="2" />
    </g>
    <g data-narration="Animations">
        <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" repeatCount="indefinite">
            <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" rx="10" />
        </animate>
    </g>
</svg>