<svg width="420" height="400" data-topic-id="dominated-actions" xmlns="http://www.w3.org/2000/svg">
  <style>
    body {
      background-image: linear-gradient(to bottom, #66CCCC, #CCFF99);
      color: #000;
    }
    .section {
      background-color: #f2f2f2;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    .title {
      font-size: 24px;
      font-weight: bold;
      margin-top: 0;
    }
    .footer {
      font-size: 14px;
      color: #666;
      text-align: center;
      margin-top: auto;
    }
    .link {
      text-decoration: none;
      color: #337ab7;
    }
  </style>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E4D6F5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>
  <g transform="translate(20, 20)">
    <text class="title">Dominated Actions</text>
    <text x="20" y="35" class="footer">Learn about the different types of interactions in computer graphics</text>
    <section data-narration="Introduction to Interaction">
      <rect x="0" y="0" width="100%" height="100" rx="10" fill="#f2f2f2"/>
      <text x="20" y="20" font-size="18px">Interaction in computer graphics refers to the communication between a user and a computer system through various input devices, enabling real-time manipulation and control of graphical elements.</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" dur="2s" begin="0s" repeatCount="indefinite"/>
    </section>
    <section data-narration="Input Devices">
      <rect x="0" y="0" width="100%" height="100" rx="10" fill="#f2f2f2"/>
      <text x="20" y="20" font-size="18px">Input devices can be categorized based on their functionality and the type of data they provide to the system.</text>
      <rect x="20" y="60" width="60" height="30" rx="5" fill="#ccc"/>
      <text x="80" y="60" font-size="14px">String</text>
      <text x="20" y="90" font-size="14px">Locator</text>
      <rect x="80" y="90" width="60" height="30" rx="5" fill="#ccc"/>
      <text x="80" y="120" font-size="14px">Pick</text>
      <rect x="20" y="150" width="60" height="30" rx="5" fill="#ccc"/>
      <text x="80" y="150" font-size="14px">Choice</text>
      <rect x="20" y="180" width="60" height="30" rx="5" fill="#ccc"/>
      <text x="80" y="180" font-size="14px">Valuator</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" dur="2s" begin="0s" repeatCount="indefinite"/>
    </section>
    <section data-narration="Logical Device Classification">
      <rect x="0" y="0" width="100%" height="100" rx="10" fill="#f2f2f2"/>
      <text x="20" y="20" font-size="18px">Logical Device Classification</text>
      <rect x="20" y="60" width="60" height="30" rx="5" fill="#ccc"/>
      <text x="80" y="60" font-size="14px">String</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" dur="2s" begin="0s" repeatCount="indefinite"/>
    </section>
    <section data-narration="Physical Input Devices">
      <rect x="0" y="0" width="100%" height="100" rx="10" fill="#f2f2f2"/>
      <text x="20" y="20" font-size="18px">Physical Input Devices</text>
      <rect x="20" y="60" width="60" height="30" rx="5" fill="#ccc"/>
      <text x="80" y="60" font-size="14px">Keyboards</text>
      <rect x="80" y="90" width="60" height="30" rx="5" fill="#ccc"/>
      <text x="80" y="120" font-size="14px">Mouse</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" dur="2s" begin="0s" repeatCount="indefinite"/>
    </section>
  </g>
</svg>