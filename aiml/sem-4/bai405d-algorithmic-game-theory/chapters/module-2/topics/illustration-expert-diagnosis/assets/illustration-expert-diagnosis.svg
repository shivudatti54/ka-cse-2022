  <rect x="10" y="10" width="400" height="340" fill="url(#pastel-gradient)"/>
  <title>Illustration Expert Diagnosis</title>
  <metadata>
    <title>Illustration Expert Diagnosis</title>
    <description>Expert Diagnosis is a type of game that involves a diagnostician and a patient, where the diagnostician aims to identify the patient's disease or condition, while the patient tries to mislead the diagnostician.</description>
  </metadata>
