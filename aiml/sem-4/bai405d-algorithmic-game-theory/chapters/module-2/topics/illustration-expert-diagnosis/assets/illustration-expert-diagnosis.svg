<svg width="420" height="400" data-topic-id="illustration-expert-diagnosis">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A6C3C3" stop-opacity="1"/>
