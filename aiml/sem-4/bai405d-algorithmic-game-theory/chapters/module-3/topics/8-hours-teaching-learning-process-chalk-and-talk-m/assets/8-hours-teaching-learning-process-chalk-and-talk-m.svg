<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" data-topic-id="teaching-learning-process-chalk-and-talk-m" xmlns:yin="http://example.com/yin">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#4567b7" stop-opacity="1"/>
            <stop offset="100%" stop-color="#6495ed" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
    <g yin:label="Title">
        <text x="20" y="50" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#ffd700">Teaching-Learning Process: Chalk and Talk Method</text>
        <animateTransform attributeName="transform" type="rotate" from="0 20 50" to="360 20 50" dur="6000" begin="-2500" repeatCount="indefinite"/>
    </g>
    <g yin:label="Section 1: Introduction">
        <rect x="10" y="60" width="380" height="20" fill="#ff69b4" rx="5"/>
        <text x="20" y="70" font-size="16" font-family="Arial" text-anchor="middle" fill="#455a64">Introduction</text>
        <animateTransform attributeName="transform" type="translateX" from="10" to="10" dur="1000" begin="-2500" repeatCount="indefinite"/>
    </g>
    <g yin:label="Section 2: Characteristics">
        <rect x="10" y="90" width="380" height="20" fill="#33ccff" rx="5"/>
        <text x="20" y="100" font-size="16" font-family="Arial" text-anchor="middle" fill="#455a64">Characteristics</text>
        <animateTransform attributeName="transform" type="translateX" from="10" to="10" dur="1000" begin="-1800" repeatCount="indefinite"/>
        <text x="150" y="100" font-size="14" font-family="Arial" text-anchor="middle" fill="#455a64">The teacher is the primary source of information.</text>
    </g>
    <g yin:label="Section 3: Advantages">
        <rect x="10" y="110" width="380" height="20" fill="#ffd700" rx="5"/>
        <text x="20" y="120" font-size="16" font-family="Arial" text-anchor="middle" fill="#455a64">Advantages</text>
        <animateTransform attributeName="transform" type="translateX" from="10" to="10" dur="1000" begin="-1200" repeatCount="indefinite"/>
        <text x="150" y="120" font-size="14" font-family="Arial" text-anchor="middle" fill="#455a64">Easy to understand and organize, can be used for large classes, and suitable for teaching simple concepts.</text>
    </g>
    <g yin:label="Section 4: Disadvantages">
        <rect x="10" y="130" width="380" height="20" fill="#ff9643" rx="5"/>
        <text x="20" y="140" font-size="16" font-family="Arial" text-anchor="middle" fill="#455a64">Disadvantages</text>
        <animateTransform attributeName="transform" type="translateX" from="10" to="10" dur="1000" begin="-900" repeatCount="indefinite"/>
        <text x="150" y="140" font-size="14" font-family="Arial" text-anchor="middle" fill="#455a64">Limited interaction between the teacher and the learner, may not be engaging for students, and can be time-consuming.</text>
    </g>
    <g yin:label="Section 5: Example">
        <rect x="10" y="150" width="380" height="20" fill="#33ccff" rx="5"/>
        <text x="20" y="160" font-size="16" font-family="Arial" text-anchor="middle" fill="#455a64">Example</text>
        <animateTransform attributeName="transform" type="translateX" from="10" to="10" dur="1000" begin="-600" repeatCount="indefinite"/>
        <text x="150" y="160" font-size="14" font-family="Arial" text-anchor="middle" fill="#455a64">Suppose a teacher wants to teach a simple math concept, such as the formula for calculating the area of a rectangle. The teacher would write the formula on the blackboard and explain each step in a clear and concise manner.</text>
    </g>
    <g yin:label="Section 6: Conclusion">
        <rect x="10" y="170" width="380" height="20" fill="#ff69b4" rx="5"/>
        <text x="20" y="180" font-size="16" font-family="Arial" text-anchor="middle" fill="#455a64">Conclusion</text>
        <animateTransform attributeName="transform" type="translateX" from="10" to="10" dur="1000" begin="-400" repeatCount="indefinite"/>
        <text x="150" y="180" font-size="14" font-family="Arial" text-anchor="middle" fill="#455a64">The teaching-learning process using the Chalk and Talk method is a complex and dynamic interaction between the teacher and the learner.</text>
    </g>
    <rect x="10" y="200" width="400" height="10" fill="#455a64" rx="5"/>
    <g yin:label="Footer">
        <text x="20" y="210" font-size="14" font-family="Arial" text-anchor="middle" fill="#455a64">Created with love</text>
    </g>
</svg>