<svg width="420" height="400" data-topic-id="extensive-games-with-perfect-information">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#B2FFFC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A7FFFA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <text x="15" y="20" font-size="24" font-family="sans-serif" text-anchor="start" fill="#2F4F7F">Extensive Games with Perfect Information</text>
  <section data-narration="Introduction" style="display:none;">
    <text x="15" y="60" font-size="18" font-family="sans-serif" text-anchor="start" fill="#2F4F7F">In algorithmic game theory, games with perfect information refer to situations where both players have complete knowledge of the game state, including the actions taken by their opponent.</text>
  </section>
  <section data-narration="Definitions" style="display:none;">
    <text x="15" y="100" font-size="18" font-family="sans-serif" text-anchor="start" fill="#2F4F7F">An extensive game is a game where the game state is divided into stages, and each stage represents a decision node.</text>
    <text x="15" y="120" font-size="18" font-family="sans-serif" text-anchor="start" fill="#2F4F7F">Perfect information means that both players have complete knowledge of the game state, including the actions taken by their opponent.</text>
  </section>
  <section data-narration="Key Concepts" style="display:none;">
    <text x="15" y="170" font-size="18" font-family="sans-serif" text-anchor="start" fill="#2F4F7F">A game tree is a tree-like representation of the game state, where each node represents a decision node and the edges represent possible actions.</text>
    <text x="15" y="190" font-size="18" font-family="sans-serif" text-anchor="start" fill="#2F4F7F">A path is a sequence of nodes in the game tree, representing a possible sequence of actions.</text>
  </section>
  <section data-narration="Subgames" style="display:none;">
    <text x="15" y="230" font-size="18" font-family="sans-serif" text-anchor="start" fill="#2F4F7F">A subgame is a smaller game that is part of the larger game tree.</text>
    <text x="15" y="250" font-size="18" font-family="sans-serif" text-anchor="start" fill="#2F4F7F">Backward induction is a method for solving extensive games by working backwards from the terminal nodes.</text>
  </section>
  <section data-narration="Game Tree Representation" style="display:none;">
    <rect x="50" y="250" width="200" height="100" fill="#C9E4CA" rx="10"/>
    <text x="55" y="260" font-size="18" font-family="sans-serif" text-anchor="middle" fill="#2F4F7F">Game Tree</text>
    <animateTransform attributeName="transform" type="rotate" from="0,250,250" to="360,250,250" dur="10s" begin="0s" repeatCount="indefinite"/>
  </section>
  <section data-narration="Backward Induction" style="display:none;">
    <text x="50" y="300" font-size="18" font-family="sans-serif" text-anchor="middle" fill="#2F4F7F">Backward Induction</text>
    <animateTransform attributeName="transform" type="translate" from="0,350,250" to="0,400,250" dur="10s" begin="0s" repeatCount="indefinite"/>
    <circle cx="250" cy="375" r="10" fill="#A7FFFA" stroke="#2F4F7F" stroke-width="2"/>
  </section>
  <section data-narration="Path" style="display:none;">
    <text x="15" y="400" font-size="18" font-family="sans-serif" text-anchor="start" fill="#2F4F7F">A path is a sequence of nodes in the game tree, representing a possible sequence of actions.</text>
  </section>
  <footer>
    <text x="15" y="420" font-size="24" font-family="sans-serif" text-anchor="start" fill="#2F4F7F">Educational SVG Diagram for Extensive Games with Perfect Information</text>
  </footer>
</svg>