<svg width="420" height="400" data-topic-id="Stackelbergs-Model-Of-Duopoly" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6"/>
      <stop offset="100%" stop-color="#C7B8EA"/>
    </linearGradient>
  </defs>
  <style>
    .section {
      background: url(#pastel-gradient) no-repeat;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
    }
  </style>
  <rect x="10" y="10" width="400" height="30" fill="#4C6F9F"/>
  <text x="20" y="40" font-size="24" font-family="Arial, sans-serif" fill="#fff">Stackelberg's Model of Duopoly</text>
  <rect x="10" y="60" width="400" height="200"/>
  <div class="section" data-narration="Introduction">
    <text x="20" y="70" font-size="18" font-family="Arial, sans-serif" fill="#fff" text-anchor="middle">Introduction</text>
    <text x="20" y="90" font-size="14" font-family="Arial, sans-serif" fill="#fff">Stackelberg's model of duopoly is a game theoretical model that describes the strategic interaction between two firms in a competitive market.</text>
  </div>
  <div class="section" data-narration="Key Components">
    <text x="20" y="70" font-size="18" font-family="Arial, sans-serif" fill="#fff" text-anchor="middle">Key Components</text>
    <rect x="10" y="90" width="200" height="100" fill="#4C6F9F"/>
    <text x="20" y="110" font-size="14" font-family="Arial, sans-serif" fill="#fff" text-anchor="middle">Definition</text>
    <text x="20" y="130" font-size="14" font-family="Arial, sans-serif" fill="#fff">Stackelberg's model of duopoly is a two-player game where two firms, Firm A and Firm B, compete to maximize their profits.</text>
    <text x="20" y="150" font-size="14" font-family="Arial, sans-serif" fill="#fff" text-anchor="middle">Assumptions</text>
    <text x="20" y="170" font-size="14" font-family="Arial, sans-serif" fill="#fff">Both firms produce a homogeneous product.</text>
    <text x="20" y="190" font-size="14" font-family="Arial, sans-serif" fill="#fff">Both firms have constant marginal costs.</text>
    <text x="20" y="210" font-size="14" font-family="Arial, sans-serif" fill="#fff">The market is competitive, and customers have perfect information about the firms' product quality.</text>
    <text x="20" y="230" font-size="14" font-family="Arial, sans-serif" fill="#fff">The firms have perfect information about each other's strategies.</text>
  </div>
  <div class="section" data-narration="Game Tree">
    <text x="20" y="70" font-size="18" font-family="Arial, sans-serif" fill="#fff" text-anchor="middle">Game Tree</text>
    <rect x="10" y="90" width="300" height="120" fill="#4C6F9F"/>
    <text x="20" y="110" font-size="14" font-family="Arial, sans-serif" fill="#fff" text-anchor="middle">Stage 1: Firm A decides on its production level, denoted by Q1.</text>
    <text x="20" y="130" font-size="14" font-family="Arial, sans-serif" fill="#fff">Stage 2: Firm B observes Firm A's production level and decides on its production level, denoted by Q2.</text>
  </div>
  <div class="section" data-narration="Strategic Form">
    <text x="20" y="70" font-size="18" font-family="Arial, sans-serif" fill="#fff" text-anchor="middle">Strategic Form</text>
    <rect x="10" y="90" width="380" height="80" fill="#4C6F9F"/>
    <text x="20" y="110" font-size="14" font-family="Arial, sans-serif" fill="#fff" text-anchor="middle">|                         | Firm B's Action | Firm B's Profit       |</text>
    <text x="20" y="130" font-size="14" font-family="Arial, sans-serif" fill="#fff">| ----------------------- | --------------- | --------------------- |</text>
    <text x="20" y="150" font-size="14" font-family="Arial, sans-serif" fill="#fff">| **Firm A's Action:** Q1 | Q2              | π(A, B) = (Q1 - Q2)^2 |</text>
    <text x="20" y="170" font-size="14" font-family="Arial, sans-serif" fill="#fff">|                         | Q1              | π(A, B) = (Q1 - Q2)^2 |</text>
  </div>
  <div class="section" data-narration="Firm A's Strategy">
    <text x="20" y="70" font-size="18" font-family="Arial, sans-serif" fill="#fff" text-anchor="middle">Firm A's Strategy</text>
    <rect x="10" y="90" width="380" height="80" fill="#4C6F9F"/>
    <text x="20" y="110" font-size="14" font-family="Arial, sans-serif" fill="#fff" text-anchor="middle">Firm A's strategy is to maximize its profit, π(A, B), subject to the constraint that Q1 ≤ Q_max.</text>
  </div>
  <div class="section" data-narration="Firm B's Strategy">
    <text x="20" y="70" font-size="18" font-family="Arial, sans-serif" fill="#fff" text-anchor="middle">Firm B's Strategy</text>
    <rect x="10" y="90" width="380" height="80" fill="#4C6F9F"/>
    <text x="20" y="110" font-size="14" font-family="Arial, sans-serif" fill="#fff" text-anchor="middle">Firm B's strategy is to maximize its profit, π(B, A), subject to the constraint that Q2 ≤ Q_max.</text>
  </div>
  <rect x="10" y="320" width="400" height="30" fill="#4C6F9F"/>
  <text x="20" y="350" font-size="24" font-family="Arial, sans-serif" fill="#fff" text-anchor="middle">Stackelberg's Model of Duopoly</text>
  <rect x="10" y="370" width="400" height="30" fill="#4C6F9F"/>
  <text x="20" y="400" font-size="14" font-family="Arial, sans-serif" fill="#fff" text-anchor="middle">By <span data-tip="Johan B. S. Stackelberg">Stackelberg</span></text>
</svg>