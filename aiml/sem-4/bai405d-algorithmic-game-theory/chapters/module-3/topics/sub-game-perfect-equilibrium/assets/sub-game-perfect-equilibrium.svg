<svg width="420" height="400" data-topic-id="sub-game-perfect-equilibrium" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CC66" stop-opacity="1"/>
    </linearGradient>
    <style>
      .title {
        font-size: 24px;
        font-weight: bold;
        text-align: center;
        margin-bottom: 20px;
      }
      .description {
        font-size: 18px;
        font-weight: normal;
        text-align: center;
        margin-bottom: 20px;
      }
      .section {
        background-color: #F0F0F0;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
      }
      .animation {
        fill: none;
        stroke: black;
        stroke-width: 2;
        stroke-dasharray: 5,5;
      }
    </style>
  </defs>
  <title>Sub-Game Perfect Equilibrium</title>
  <footer>Illustration of Sub-Game Perfect Equilibrium</footer>
  <rect x="10" y="10" width="400" height="370" style="fill: url(#gradient)"/>
  <g>
    <rect x="20" y="20" width="360" height="340" rx="10" style="fill: white"/>
    <path d="M 50 100 L 300 300" style="stroke: black; stroke-width: 2; stroke-dasharray: 5,5"/>
    <path d="M 100 150 L 250 250" style="stroke: black; stroke-width: 2; stroke-dasharray: 5,5"/>
    <path d="M 200 200 L 100 300" style="stroke: black; stroke-width: 2; stroke-dasharray: 5,5"/>
    <circle cx="220" cy="220" r="20" style="fill: #33CC66"/>
    <text x="220" y="220" style="font-size: 18px; font-weight: normal; text-align: center;">Sub-Game Perfect Equilibrium</text>
    <text x="20" y="50" style="font-size: 18px; font-weight: normal; text-align: center;">Introduction</text>
    <a class="description" href="#introduction" data-narration="Sub-game perfect equilibrium is a concept in game theory that extends the idea of Nash equilibrium to sub-games within a larger game. In a Nash equilibrium, no player can improve their payoff by unilaterally changing their strategy, assuming all other players keep their strategies unchanged. However, in a large game with multiple sub-games, it may not be possible for a player to make a unilateral change that affects the payoff without also affecting the outcome of other sub-games." data-topic-id="sub-game-perfect-equilibrium"/>
    <rect x="20" y="80" width="320" height="280" style="fill: white"/>
    <g class="section">
      <path d="M 100 100 L 200 200" style="stroke: black; stroke-width: 2; stroke-dasharray: 5,5"/>
      <circle cx="150" cy="150" r="10" style="fill: #66CCCC"/>
      <text x="150" y="150" style="font-size: 18px; font-weight: normal; text-align: center;">Nash Equilibrium in Sub-Games</text>
      <a class="description" href="#nash-equilibrium-in-sub-games" data-narration="In a Nash equilibrium, no player can improve their payoff by unilaterally changing their strategy, assuming all other players keep their strategies unchanged. However, in a large game with multiple sub-games, it may not be possible for a player to make a unilateral change that affects the payoff without also affecting the outcome of other sub-games." data-topic-id="sub-game-perfect-equilibrium"/>
    </g>
    <g class="section">
      <path d="M 200 100 L 300 200" style="stroke: black; stroke-width: 2; stroke-dasharray: 5,5"/>
      <circle cx="250" cy="150" r="10" style="fill: #33CC66"/>
      <text x="250" y="150" style="font-size: 18px; font-weight: normal; text-align: center;">No Deviations are Possible</text>
      <a class="description" href="#no-deviations-are-possible" data-narration="No player can improve their payoff by deviating from their strategy without affecting the outcome of other sub-games. This means that a sub-game perfect equilibrium must consider the interactions between all sub-games in the larger game." data-topic-id="sub-game-perfect-equilibrium"/>
    </g>
    <g class="section">
      <path d="M 300 100 L 400 200" style="stroke: black; stroke-width: 2; stroke-dasharray: 5,5"/>
      <circle cx="350" cy="150" r="10" style="fill: #66CCCC"/>
      <text x="350" y="150" style="font-size: 18px; font-weight: normal; text-align: center;">Existence and Uniqueness</text>
      <a class="description" href="#existence-and-uniqueness" data-narration="Sub-game perfect equilibrium exists in every sub-game of the larger game, and there is only one sub-game perfect equilibrium in every sub-game. This means that a sub-game perfect equilibrium is a Nash equilibrium in every sub-game, and it is the only Nash equilibrium in every sub-game." data-topic-id="sub-game-perfect-equilibrium"/>
    </g>
    <g class="section">
      <path d="M 200 200 L 300 300" style="stroke: black; stroke-width: 2; stroke-dasharray: 5,5"/>
      <circle cx="250" cy="250" r="10" style="fill: #33CC66"/>
      <text x="250" y="250" style="font-size: 18px; font-weight: normal; text-align: center;">Pareto Optimality</text>
      <a class="description" href="#pareto-optimality" data-narration="The sub-game perfect equilibrium is Pareto optimal, meaning that no other strategy profile can improve the payoff of at least one player without worsening the payoff of another player. This means that a sub-game perfect equilibrium is a Nash equilibrium in every sub-game, and it is the only Nash equilibrium in every sub-game." data-topic-id="sub-game-perfect-equilibrium"/>
    </g>
    <a class="description" href="#examples" data-narration="Consider a game with two players, A and B, and two sub-games: Sub-game 1 and Sub-game 2. In Sub-game 1, player A decides to play either a high or a low strategy, while in Sub-game 2, player B decides to play either a cooperate or a defect strategy." data-topic-id="sub-game-perfect-equilibrium"/>
    <g>
      <rect x="20" y="320" width="400" height="80" style="fill: #F0F0F0"/>
      <text x="20" y="320" style="font-size: 18px; font-weight: normal; text-align: center;">Examples</text>
    </g>
    <path d="M 50 380 L 300 380" style="stroke: black; stroke-width: 2; stroke-dasharray: 5,5"/>
    <path d="M 100 350 L 200 250" style="stroke: black; stroke-width: 2; stroke-dasharray: 5,5"/>
    <path d="M 200 250 L 300 350" style="stroke: black; stroke-width: 2; stroke-dasharray: 5,5"/>
    <text x="220" y="380" style="font-size: 18px; font-weight: normal; text-align: center;">Here is an example of a game with two players, A and B, and two sub-games: Sub-game 1 and Sub-game 2.</text>
    <animate xlink:href="#example" begin="0s" dur="5s" repeatCount="indefinite" />
  </g>
  <g id="example">
    <rect x="20" y="20" width="360" height="340" rx="10" style="fill: #F0F0F0"/>
    <path d="M 50 100 L 300 300" style="stroke: black; stroke-width: 2; stroke-dasharray: 5,5"/>
    <path d="M 100 150 L 250 250" style="stroke: black; stroke-width: 2; stroke-dasharray: 5,5"/>
    <path d="M 200 200 L 100 300" style="stroke: black; stroke-width: 2; stroke-dasharray: 5,5"/>
    <circle cx="220" cy="220" r="20" style="fill: #33CC66"/>
    <text x="220" y="220" style="font-size: 18px; font-weight: normal; text-align: center;">Sub-Game Perfect Equilibrium</text>
    <line x1="50" y1="100" x2="300" y2="300" style="stroke: black; stroke-width: 2; stroke-dasharray: 5,5"/>
    <line x1="100" y1="150" x2="250" y2="250" style="stroke: black; stroke-width: 2; stroke-dasharray: 5,5"/>
    <line x1="200" y1="200" x2="100" y2="300" style="stroke: black; stroke-width: 2; stroke-dasharray: 5,5"/>
  </g>
  <animate xlink:href="#arrow" begin="0s" dur="5s" repeatCount="indefinite" />
  <rect x="20" y="370" width="400" height="30" style="fill: #F0F0F0"/>
  <text x="20" y="370" style="font-size: 18px; font-weight: normal; text-align: center;">Footer</text>
</svg>