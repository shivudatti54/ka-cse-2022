<svg width="420" height="400"
     data-topic-id="finding-sub-game-perfect-equilibria-of-finite-hori"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
     xsi:schemaLocation="http://www.w3.org/2000/svg
     http://www.w3.org/2000/svg/strict.svg#strict"
     viewBox="0 0 420 400"
     style="background-color: #6495ED; background-image: linear-gradient(45deg, #6495ED 0%, #B2E6CE 100%);">
  
  <!-- Title -->
  <text x="10" y="20" font-size="24" font-family="Arial" fill="#3B5998">
    Finding Sub-Game Perfect Equilibria of Finite Horizon Games
  </text>
  
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6495ED" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2E6CE" stop-opacity="1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="30" width="420" height="350" fill="url(#gradient)"/>
  
  <!-- Section 1: Introduction -->
  <section data-narration="Introduction to Backward Induction">
    <rect x="10" y="60" width="400" height="30" fill="#3B5998" rx="5"/>
    <text x="15" y="80" font-size="18" font-family="Arial" fill="#FFFFFF">
      In game theory, a sub-game perfect equilibrium is a strategy profile that is optimal for every sub-game in a game of finite horizon.
    </text>
  </section>
  
  <!-- Section 2: Definitions -->
  <section data-narration="Definitions">
    <rect x="10" y="110" width="400" height="30" fill="#3B5998" rx="5"/>
    <rect x="10" y="150" width="400" height="30" fill="#3B5998" rx="5"/>
    <text x="15" y="180" font-size="18" font-family="Arial" fill="#FFFFFF">
      A game of finite horizon has a finite number of stages, where each stage has a set of players and a set of actions for each player.
    </text>
    <text x="15" y="210" font-size="18" font-family="Arial" fill="#FFFFFF">
      A sub-game is a subset of the original game, where the players and actions are the same as the original game, but the stages may be reduced or modified.
    </text>
  </section>
  
  <!-- Section 3: Perfect Equilibrium -->
  <section data-narration="Perfect Equilibrium">
    <rect x="10" y="250" width="400" height="30" fill="#3B5998" rx="5"/>
    <rect x="10" y="290" width="400" height="30" fill="#3B5998" rx="5"/>
    <text x="15" y="320" font-size="18" font-family="Arial" fill="#FFFFFF">
      A perfect equilibrium is a strategy profile where no player can improve their payoff by unilaterally changing their strategy, assuming all other players keep their strategies unchanged.
    </text>
  </section>
  
  <!-- Section 4: Backward Induction -->
  <section data-narration="Backward Induction">
    <rect x="10" y="350" width="400" height="30" fill="#3B5998" rx="5"/>
    <rect x="10" y="390" width="400" height="30" fill="#3B5998" rx="5"/>
    <text x="15" y="420" font-size="18" font-family="Arial" fill="#FFFFFF">
      Backward induction is a method for finding perfect equilibria by recursively analyzing the sub-games from the last stage to the first.
    </text>
  </section>
  
  <!-- Section 5: Step-by-Step Example -->
  <section data-narration="Step-by-Step Example">
    <rect x="10" y="450" width="400" height="30" fill="#3B5998" rx="5"/>
    <rect x="10" y="490" width="400" height="30" fill="#3B5998" rx="5"/>
    <rect x="10" y="530" width="400" height="30" fill="#3B5998" rx="5"/>
    <rect x="10" y="570" width="400" height="30" fill="#3B5998" rx="5"/>
    <text x="15" y="600" font-size="18" font-family="Arial" fill="#FFFFFF">
      Consider the following game:
      
      |     | A     | B     |
      | --- | ----- | ----- |
      | 1   | (2,2) | (0,4) |
      | 2   | (0,4) | (2,2) |
      
      |     | A     | B     |
      | --- | ----- | ----- |
      | 3   | (3,3) | (1,1) |
      | 4   | (1,1) | (3,3) |
      
      |     | A     | B     |
      | --- | ----- | ----- |
      | 5   | (5,5) | (0,0) |
    </text>
  </section>
  
  <!-- Animation -->
  <animate id="animate" attributeName="opacity" begin="0s" dur="10s" repeatCount="indefinite">
    <animate transform="translate(10,450)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate transform="translate(10,490)" begin="2s" dur="2s" repeatCount="indefinite"/>
    <animate transform="translate(10,530)" begin="4s" dur="2s" repeatCount="indefinite"/>
    <animate transform="translate(10,570)" begin="6s" dur="2s" repeatCount="indefinite"/>
  </animate>
  
  <!-- Arrow markers -->
  <line x1="15" y1="60" x2="15" y2="80" stroke="#3B5998" stroke-width="2" fill="none" />
  <line x1="15" y1="110" x2="15" y2="150" stroke="#3B5998" stroke-width="2" fill="none" />
  <line x1="15" y1="250" x2="15" y2="290" stroke="#3B5998" stroke-width="2" fill="none" />
  <line x1="15" y1="350" x2="15" y2="390" stroke="#3B5998" stroke-width="2" fill="none" />
  <line x1="15" y1="450" x2="15" y2="600" stroke="#3B5998" stroke-width="2" fill="none" />
  
  <!-- Footer -->
  <text x="10" y="380" font-size="18" font-family="Arial" fill="#3B5998">
    Finding Sub-Game Perfect Equilibria of Finite Horizon Games
  </text>
  
</svg>