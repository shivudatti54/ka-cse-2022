<svg width="420" height="400" data-topic-id="strategies-and-outcomes" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <title>Strategies and Outcomes</title>
  <g transform="translate(10, 20)">
    <rect x="0" y="0" width="100" height="20" fill="#3498db"/>
    <text x="10" y="5" font-size="18" font-family="Arial" fill="#ffffff">Introduction</text>
    <rect x="120" y="0" width="100" height="20" fill="#2ecc71"/>
    <text x="130" y="5" font-size="18" font-family="Arial" fill="#ffffff">Definitions</text>
    <rect x="240" y="0" width="100" height="20" fill="#e74c3c"/>
    <text x="250" y="5" font-size="18" font-family="Arial" fill="#ffffff">Types of Strategies</text>
    <rect x="360" y="0" width="100" height="20" fill="#1abc9c"/>
    <text x="370" y="5" font-size="18" font-family="Arial" fill="#ffffff">Types of Outcomes</text>
    <rect x="10" y="60" width="100" height="20" fill="#3498db"/>
    <text x="10" y="65" font-size="18" font-family="Arial" fill="#ffffff">Pure Strategy</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" dur="2000" begin="0s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="200,0" dur="2000" begin="0.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="300,0" dur="2000" begin="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="400,0" dur="2000" begin="1.5s" repeatCount="indefinite"/>
    <rect x="120" y="60" width="100" height="20" fill="#2ecc71"/>
    <text x="120" y="65" font-size="18" font-family="Arial" fill="#ffffff">Mixed Strategy</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="220,0" dur="2000" begin="0.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="320,0" dur="2000" begin="1s" repeatCount="indefinite"/>
    <rect x="240" y="60" width="100" height="20" fill="#e74c3c"/>
    <text x="240" y="65" font-size="18" font-family="Arial" fill="#ffffff">Nash Equilibrium</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="340,0" dur="2000" begin="0.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="440,0" dur="2000" begin="1s" repeatCount="indefinite"/>
    <rect x="360" y="60" width="100" height="20" fill="#1abc9c"/>
    <text x="360" y="65" font-size="18" font-family="Arial" fill="#ffffff">Pareto Optimal Outcome</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="460,0" dur="2000" begin="0.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="560,0" dur="2000" begin="1s" repeatCount="indefinite"/>
    <rect x="10" y="140" width="100" height="20" fill="#3498db"/>
    <text x="10" y="145" font-size="18" font-family="Arial" fill="#ffffff">Pareto Inefficient Outcome</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="110,0" dur="2000" begin="0.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="210,0" dur="2000" begin="1s" repeatCount="indefinite"/>
    <rect x="240" y="140" width="100" height="20" fill="#2ecc71"/>
    <text x="240" y="145" font-size="18" font-family="Arial" fill="#ffffff">The Prisoner's Dilemma</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="330,0" dur="2000" begin="0.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="430,0" dur="2000" begin="1s" repeatCount="indefinite"/>
    <rect x="360" y="140" width="100" height="20" fill="#e74c3c"/>
    <text x="360" y="145" font-size="18" font-family="Arial" fill="#ffffff">Conclusion</text>
    <rect x="10" y="320" width="100" height="20" fill="#1abc9c"/>
    <text x="10" y="325" font-size="18" font-family="Arial" fill="#ffffff">References</text>
    <rect x="240" y="320" width="100" height="20" fill="#3498db"/>
    <text x="240" y="325" font-size="18" font-family="Arial" fill="#ffffff">Glossary</text>
    <rect x="360" y="320" width="100" height="20" fill="#2ecc71"/>
    <text x="360" y="325" font-size="18" font-family="Arial" fill="#ffffff">FAQs</text>
    <rect x="10" y="400" width="400" height="20" fill="#3498db"/>
    <text x="10" y="405" font-size="18" font-family="Arial" fill="#ffffff">Footer</text>
  </g>
  <rect x="10" y="390" width="400" height="10" fill="#3498db"/>
</svg>