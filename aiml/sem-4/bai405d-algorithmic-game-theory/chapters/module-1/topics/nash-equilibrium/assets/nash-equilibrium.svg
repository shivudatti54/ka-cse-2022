<svg width="420" height="400" data-topic-id="nash-equilibrium">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="nash-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6495ED" stop-opacity="1" />
      <stop offset="100%" stop-color="#3E8E41" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#nash-gradient)" rx="10" />
  
  <!-- Title -->
  <text x="50%" y="30%" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#34495E">
    <tspan>Understanding Nash Equilibrium</tspan>
  </text>
  
  <!-- Section 1: Introduction -->
  <g transform="translate(50, 100)" data-narration="A Nash Equilibrium is a stable state in a game where no player can improve their payoff by unilaterally changing their strategy, assuming all other players keep their strategies unchanged.">
    <rect x="0" y="0" width="200" height="50" fill="#F7DC6F" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#8BC34A">
      What is a Nash Equilibrium?
    </text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" from="1" to="0" />
  </g>
  
  <!-- Section 2: Key Components -->
  <g transform="translate(50, 200)" data-narration="The key components of a Nash Equilibrium include rationality, strategic interdependence, and stability.">
    <rect x="0" y="0" width="200" height="50" fill="#F7DC6F" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#8BC34A">
      Key Components
    </text>
    <text x="50" y="40" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#8BC34A">
      Rationality, Strategic Interdependence, and Stability
    </text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" from="1" to="0" />
  </g>
  
  <!-- Section 3: Conditions -->
  <g transform="translate(50, 300)" data-narration="The conditions for a Nash Equilibrium include best response and no unilateral improvement.">
    <rect x="0" y="0" width="200" height="50" fill="#F7DC6F" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#8BC34A">
      Conditions
    </text>
    <text x="50" y="40" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#8BC34A">
      Best Response and No Unilateral Improvement
    </text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" from="1" to="0" />
  </g>
  
  <!-- Section 4: Example - Prisoner's Dilemma -->
  <g transform="translate(50, 400)" data-narration="The Prisoner's Dilemma is a classic example of a game that demonstrates a Nash Equilibrium.">
    <rect x="0" y="0" width="200" height="50" fill="#F7DC6F" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#8BC34A">
    Example: Prisoner's Dilemma
    </text>
    <text x="50" y="40" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#8BC34A">
      A: (3, 3) - Both prisoners remain silent
      B: (0, 5) - Prisoner B confesses while prisoner A remains silent
      C: (5, 0) - Prisoner A confesses while prisoner B remains silent
      D: (1, 1) - Both prisoners confess
    </text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" from="1" to="0" />
  </g>
  
  <!-- Section 5: Arrow Markers -->
  <g transform="translate(200, 50)">
    <line x1="10" y1="20" x2="180" y2="120" stroke="#8BC34A" stroke-width="2" />
    <line x1="10" y1="120" x2="180" y2="20" stroke="#8BC34A" stroke-width="2" />
  </g>
  
  <!-- Section 6: Footer -->
  <rect x="0" y="350" width="420" height="50" fill="#F7DC6F" rx="10" />
  <text x="50%" y="360%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#34495E">
    Powered by SVG.js
  </text>
</svg>