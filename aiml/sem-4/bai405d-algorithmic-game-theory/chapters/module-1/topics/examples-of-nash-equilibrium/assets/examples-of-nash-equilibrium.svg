<svg width="420" height="400" data-topic-id="nash-equilibrium" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="color-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A288A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3B5998" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Title and footer -->
  <rect x="10" y="10" width="400" height="20" fill="#7A288A" rx="5"/>
  <text x="15" y="15" font-size="18" font-family="Arial" fill="#fff">Nash Equilibrium</text>
  <rect x="10" y="80" width="400" height="20" fill="#3B5998" rx="5"/>
  <text x="15" y="85" font-size="18" font-family="Arial" fill="#fff">Examples and Explanation</text>

  <!-- Sections and data-narration -->
  <section data-narration="Introduction">
    <rect x="15" y="30" width="370" height="100" fill="#fff" rx="5"/>
    <text x="20" y="40" font-size="16" font-family="Arial" fill="#333">In game theory, a Nash equilibrium is a state in a game where no player can improve their payoff (or outcome) by unilaterally changing their strategy, assuming all other players keep their strategies unchanged.</text>
  </section>

  <!-- Prisoner's Dilemma -->
  <section data-narration="Prisoner's Dilemma">
    <rect x="15" y="150" width="370" height="150" fill="#fff" rx="5"/>
    <line x1="15" y1="75" x2="15" y2="225" stroke="#333" stroke-width="2"/>
    <line x1="225" y1="75" x2="225" y2="225" stroke="#333" stroke-width="2"/>
    <rect x="180" y="100" width="100" height="100" fill="#fff" rx="5"/>
    <text x="190" y="115" font-size="16" font-family="Arial" fill="#333">Prisoner's Dilemma Payoff Matrix:</text>
    <table>
      <tr>
        <td>
          <line x1="15" y1="75" x2="15" y2="75" stroke="#333" stroke-width="2"/>
          <line x1="15" y1="150" x2="15" y2="150" stroke="#333" stroke-width="2"/>
        </td>
        <td>
          <line x1="225" y1="75" x2="225" y2="75" stroke="#333" stroke-width="2"/>
          <line x1="225" y1="150" x2="225" y2="150" stroke="#333" stroke-width="2"/>
        </td>
      </tr>
      <tr>
        <td>
          <text x="15" y="120" font-size="16" font-family="Arial" fill="#333">Prisoner A</text>
          <rect x="15" y="150" width="100" height="100" fill="#fff" rx="5"/>
        </td>
        <td>
          <text x="225" y="120" font-size="16" font-family="Arial" fill="#333">Prisoner B</text>
          <rect x="225" y="150" width="100" height="100" fill="#fff" rx="5"/>
        </td>
      </tr>
      <tr>
        <td>
          <rect x="15" y="75" width="100" height="100" fill="#fff" rx="5"/>
          <text x="15" y="85" font-size="16" font-family="Arial" fill="#333">Confess</text>
        </td>
        <td>
          <rect x="225" y="75" width="100" height="100" fill="#fff" rx="5"/>
          <text x="225" y="85" font-size="16" font-family="Arial" fill="#333">Remain Silent</text>
        </td>
      </tr>
      <tr>
        <td>
          <text x="15" y="120" font-size="16" font-family="Arial" fill="#333">2 years in prison</text>
        </td>
        <td>
          <text x="225" y="120" font-size="16" font-family="Arial" fill="#333">3 years in prison</text>
        </td>
      </tr>
    </table>
    <animate attributeName="opacity" dur="2s" begin="0s" repeatCount="indefinite"/>
  </section>

  <!-- Battle of the Sexes -->
  <section data-narration="Battle of the Sexes">
    <rect x="15" y="250" width="370" height="150" fill="#fff" rx="5"/>
    <line x1="15" y1="125" x2="15" y2="225" stroke="#333" stroke-width="2"/>
    <line x1="225" y1="125" x2="225" y2="225" stroke="#333" stroke-width="2"/>
    <rect x="180" y="100" width="100" height="100" fill="#fff" rx="5"/>
    <text x="190" y="115" font-size="16" font-family="Arial" fill="#333">Battle of the Sexes Payoff Matrix:</text>
    <table>
      <tr>
        <td>
          <line x1="15" y1="125" x2="15" y2="125" stroke="#333" stroke-width="2"/>
          <line x1="15" y1="200" x2="15" y2="200" stroke="#333" stroke-width="2"/>
        </td>
        <td>
          <line x1="225" y1="125" x2="225" y2="125" stroke="#333" stroke-width="2"/>
          <line x1="225" y1="200" x2="225" y2="200" stroke="#333" stroke-width="2"/>
        </td>
      </tr>
      <tr>
        <td>
          <text x="15" y="150" font-size="16" font-family="Arial" fill="#333">Beach</text>
          <rect x="15" y="200" width="100" height="100" fill="#fff" rx="5"/>
        </td>
        <td>
          <text x="225" y="150" font-size="16" font-family="Arial" fill="#333">Music Festival</text>
          <rect x="225" y="200" width="100" height="100" fill="#fff" rx="5"/>
        </td>
      </tr>
      <tr>
        <td>
          <text x="15" y="175" font-size="16" font-family="Arial" fill="#333">5 points</text>
        </td>
        <td>
          <text x="225" y="175" font-size="16" font-family="Arial" fill="#333">3 points</text>
        </td>
      </tr>
    </table>
    <animate attributeName="opacity" dur="2s" begin="2s" repeatCount="indefinite"/>
  </section>

  <!-- Arrow markers -->
  <path d="M 10 100 L 100 100 L 100 230" stroke="#333" stroke-width="2" fill="none"/>
  <path d="M 220 100 L 100 100 L 100 230" stroke="#333" stroke-width="2" fill="none"/>
  <path d="M 10 100 L 220 100 L 220 230" stroke="#333" stroke-width="2" fill="none"/>
  <path d="M 100 100 L 220 100 L 220 230" stroke="#333" stroke-width="2" fill="none"/>

  <!-- Gradient fill -->
  <rect x="0" y="0" width="420" height="400" fill="url(#color-gradient)"/>

  <animate attributeName="opacity" dur="5s" begin="0s" repeatCount="indefinite"/>
</svg>