<svg width="420" height="400" data-topic-id="dominated-actions" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" x="0" y="0" width="420" height="400" rx="10" />
  <text x="20" y="20" font-size="24" font-family="Arial" fill="#2F4F7F" text-anchor="start">
    Dominated Actions
  </text>
  <g id="input-devices">
    <rect x="50" y="100" width="100" height="50" fill="#F7F7F7" rx="10" />
    <text x="60" y="110" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="start" data-narration="Logical Device Classification">
      Logical Devices
    </text>
    <title>String</title>
    <rect x="60" y="130" width="90" height="20" fill="#F7F7F7" rx="10" />
    <text x="70" y="140" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Inputs text data
    </text>
    <title>Locator</title>
    <rect x="60" y="170" width="90" height="20" fill="#F7F7F7" rx="10" />
    <text x="70" y="180" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Provides coordinate positions
    </text>
    <title>Pick</title>
    <rect x="60" y="210" width="90" height="20" fill="#F7F7F7" rx="10" />
    <text x="70" y="220" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Selects graphical objects
    </text>
    <title>Choice</title>
    <rect x="60" y="250" width="90" height="20" fill="#F7F7F7" rx="10" />
    <text x="70" y="260" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Selects from predefined options
    </text>
    <title>Valuator</title>
    <rect x="60" y="290" width="90" height="20" fill="#F7F7F7" rx="10" />
    <text x="70" y="300" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Inputs scalar values
    </text>
  </g>
  <g id="physical-input-devices">
    <rect x="250" y="100" width="100" height="50" fill="#F7F7F7" rx="10" />
    <text x="260" y="110" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="start" data-narration="Physical Input Devices">
      Physical Devices
    </text>
    <title>Keyboards</title>
    <rect x="260" y="130" width="90" height="20" fill="#F7F7F7" rx="10" />
    <text x="270" y="140" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      The most common text input device
    </text>
    <title>Mouse</title>
    <rect x="260" y="170" width="90" height="20" fill="#F7F7F7" rx="10" />
    <text x="270" y="180" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      A relative positioning device
    </text>
  </g>
  <g id="sections">
    <rect x="20" y="130" width="400" height="20" fill="#F7F7F7" rx="10" />
    <text x="30" y="140" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="start" data-narration="Interaction in Graphics">
      Interaction in Graphics
    </text>
    <title>Introduction to Interaction</title>
    <rect x="20" y="170" width="400" height="20" fill="#F7F7F7" rx="10" />
    <text x="30" y="180" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="start" data-narration="Input Devices">
      Input Devices
    </text>
    <title>Input Devices</title>
    <rect x="20" y="210" width="400" height="20" fill="#F7F7F7" rx="10" />
    <text x="30" y="220" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="start" data-narration="Logical Device Classification">
      Logical Device Classification
    </text>
    <title>Logical Device Classification</title>
    <rect x="20" y="250" width="400" height="20" fill="#F7F7F7" rx="10" />
    <text x="30" y="260" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="start" data-narration="Physical Input Devices">
      Physical Input Devices
    </text>
    <title>Physical Input Devices</title>
  </g>
  <g id="animations">
    <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" fill="freeze">
      <rect x="20" y="130" width="400" height="20" fill="#F7F7F7" rx="10" />
      <animateTransform transform="rotate(360deg)" begin="0.5s" dur="1.5s" />
    </animate>
    <animate xmlns="http://www.w3.org/2000/svg" begin="2.5s" dur="2s" fill="freeze">
      <rect x="20" y="170" width="400" height="20" fill="#F7F7F7" rx="10" />
      <animateTransform transform="rotate(360deg)" begin="2.5s" dur="1.5s" />
    </animate>
  </g>
  <g id="footer">
    <text x="20" y="380" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Created with SVG
    </text>
  </g>
</svg>