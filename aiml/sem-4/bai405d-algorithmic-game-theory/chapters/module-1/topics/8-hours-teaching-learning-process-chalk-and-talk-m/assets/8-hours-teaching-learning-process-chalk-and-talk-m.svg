<svg width="420" height="400" data-topic-id="teaching-learning-process-chalk-and-talk-m" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10" />
  <!-- Title at top -->
  <text x="20" y="40" fill="#3498db" font-size="24" font-family="Arial Black" text-anchor="middle">Chalk and Talk Method</text>
  <!-- Introduction section -->
  <section data-narration="Introduction">
    <rect x="10" y="70" width="400" height="50" fill="#ffffff" rx="10" />
    <text x="20" y="80" fill="#666666" font-size="16" font-family="Arial" text-anchor="middle">The teaching-learning process is a fundamental concept in education that involves the exchange of information between the teacher and the student.</text>
  </section>
  <!-- Key Characteristics section -->
  <section data-narration="Key Characteristics">
    <rect x="10" y="130" width="400" height="50" fill="#ffffff" rx="10" />
    <rect x="10" y="140" width="400" height="20" fill="#ffffff" rx="10" />
    <text x="10" y="150" fill="#666666" font-size="16" font-family="Arial" text-anchor="middle">Direct Instruction: The teacher provides direct instruction to the students through written notes.</text>
    <text x="10" y="170" fill="#666666" font-size="16" font-family="Arial" text-anchor="middle">Active Learning: The students are expected to be actively engaged in the learning process through listening and taking notes.</text>
    <text x="10" y="190" fill="#666666" font-size="16" font-family="Arial" text-anchor="middle">Limited Interactivity: The Chalk and Talk method is a one-way communication, with limited opportunities for student interaction.</text>
  </section>
  <!-- Advantages section -->
  <section data-narration="Advantages">
    <rect x="10" y="230" width="400" height="50" fill="#ffffff" rx="10" />
    <rect x="10" y="240" width="400" height="20" fill="#ffffff" rx="10" />
    <text x="10" y="250" fill="#666666" font-size="16" font-family="Arial" text-anchor="middle">Easy to Understand: The Chalk and Talk method is simple and easy to understand, making it suitable for students with learning difficulties.</text>
    <text x="10" y="270" fill="#666666" font-size="16" font-family="Arial" text-anchor="middle">Quick Review: The method allows for quick review and recall of material.</text>
    <text x="10" y="290" fill="#666666" font-size="16" font-family="Arial" text-anchor="middle">Cost-Effective: The Chalk and Talk method is a low-cost teaching method.</text>
  </section>
  <!-- Disadvantages section -->
  <section data-narration="Disadvantages">
    <rect x="10" y="310" width="400" height="50" fill="#ffffff" rx="10" />
    <rect x="10" y="320" width="400" height="20" fill="#ffffff" rx="10" />
    <text x="10" y="330" fill="#666666" font-size="16" font-family="Arial" text-anchor="middle">Limited Engagement: The Chalk and Talk method can be boring and lack engaging activities for students.</text>
    <text x="10" y="350" fill="#666666" font-size="16" font-family="Arial" text-anchor="middle">Limited Interactivity: The method limits student interaction and collaboration.</text>
    <text x="10" y="370" fill="#666666" font-size="16" font-family="Arial" text-anchor="middle">Dependence on the Teacher: The Chalk and Talk method relies heavily on the teacher's ability to explain complex concepts clearly.</text>
  </section>
  <!-- Example section -->
  <section data-narration="Example">
    <rect x="10" y="410" width="400" height="50" fill="#ffffff" rx="10" />
    <rect x="10" y="420" width="400" height="20" fill="#ffffff" rx="10" />
    <text x="10" y="430" fill="#666666" font-size="16" font-family="Arial" text-anchor="middle">A teacher uses the Chalk and Talk method to teach a class of students about fractions. The teacher writes down the definition of a fraction on the board and explains it to the students, using simple examples and diagrams.</text>
  </section>
  <!-- Arrow markers for connections -->
  <line x1="10" y1="60" x2="400" y2="60" stroke="#3498db" stroke-width="2" />
  <line x1="10" y1="130" x2="400" y2="130" stroke="#3498db" stroke-width="2" />
  <line x1="10" y1="230" x2="400" y2="230" stroke="#3498db" stroke-width="2" />
  <line x1="10" y1="310" x2="400" y2="310" stroke="#3498db" stroke-width="2" />
  <!-- Footer at bottom -->
  <rect x="10" y="380" width="400" height="20" fill="#ffffff" rx="10" />
  <text x="10" y="390" fill="#666666" font-size="16" font-family="Arial" text-anchor="middle">Data: teaching-learning-process-chalk-and-talk-m</text>
</svg>