<svg width="420" height="400" data-topic-id="batch-vs-streaming-processing" xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="mix-blend-mode: multiply;">

    <!-- Gradient Background -->
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
            <stop offset="100%" stop-color="#66CCCC" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)"/>
    <!-- Title -->
    <text x="50%" y="20%" font-size="30" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="middle">Batch vs Streaming Processing</text>

    <!-- Section 1: Batch Processing -->
    <rect x="50%" y="100%" width="60%" height="70%" fill="#F5F5F5" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 100" to="360 200 100" dur="10" repeatCount="indefinite"/>
    <text x="150%" y="35%" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Batch processing is a method of processing data where a large volume of data is collected over a period of time, and then the entire dataset is processed together in a single, scheduled operation." transform="rotate(0 200 100)"></text>
    <path d="M 210 130 L 240 160 L 270 90 L 200 90 L 150 160 L 130 160 L 90 90 L 90 130 Z" stroke="#ADD8E6" stroke-width="2" fill="none"/>
    <g transform="rotate(0 200 100)"><circle cx="200" cy="100" r="40" stroke="#ADD8E6" stroke-width="2" fill="none"/>
    <circle cx="200" cy="100" r="20" stroke="#66CCCC" stroke-width="2" fill="none"/></g>

    <!-- Section 2: Stream Processing -->
    <rect x="50%" y="180%" width="60%" height="70%" fill="#F5F5F5" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 130" to="360 200 130" dur="10" repeatCount="indefinite"/>
    <text x="150%" y="155%" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Stream processing, on the other hand, is a method of processing data as it is generated, allowing for real-time processing and analysis." transform="rotate(0 200 130)"></text>
    <path d="M 210 150 L 240 170 L 270 120 L 200 120 L 150 170 L 130 170 L 90 120 L 90 150 Z" stroke="#ADD8E6" stroke-width="2" fill="none"/>
    <g transform="rotate(0 200 130)"><circle cx="200" cy="130" r="40" stroke="#ADD8E6" stroke-width="2" fill="none"/>
    <circle cx="200" cy="130" r="20" stroke="#66CCCC" stroke-width="2" fill="none"/></g>

    <!-- Section 3: Key Characteristics of Batch Processing -->
    <rect x="50%" y="250%" width="80%" height="60%" fill="#F5F5F5" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 220" to="360 200 220" dur="10" repeatCount="indefinite"/>
    <text x="150%" y="235%" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Batch processing is characterized by bounded data, high latency, and high throughput." transform="rotate(0 200 220)"></text>
    <path d="M 210 250 L 240 270 L 270 230 L 200 230 L 150 270 L 130 270 L 90 230 L 90 250 Z" stroke="#ADD8E6" stroke-width="2" fill="none"/>
    <g transform="rotate(0 200 220)"><circle cx="200" cy="220" r="40" stroke="#ADD8E6" stroke-width="2" fill="none"/>
    <circle cx="200" cy="220" r="20" stroke="#66CCCC" stroke-width="2" fill="none"/></g>

    <!-- Section 4: Stream Processing -->
    <rect x="50%" y="310%" width="80%" height="60%" fill="#F5F5F5" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 260" to="360 200 260" dur="10" repeatCount="indefinite"/>
    <text x="150%" y="305%" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Stream processing, on the other hand, is characterized by unbounded data, low latency, and low throughput." transform="rotate(0 200 260)"></text>
    <path d="M 210 300 L 240 320 L 270 280 L 200 280 L 150 320 L 130 320 L 90 280 L 90 300 Z" stroke="#ADD8E6" stroke-width="2" fill="none"/>
    <g transform="rotate(0 200 260)"><circle cx="200" cy="260" r="40" stroke="#ADD8E6" stroke-width="2" fill="none"/>
    <circle cx="200" cy="260" r="20" stroke="#66CCCC" stroke-width="2" fill="none"/></g>

    <!-- Section 5: Latency -->
    <rect x="50%" y="370%" width="80%" height="60%" fill="#F5F5F5" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 330" to="360 200 330" dur="10" repeatCount="indefinite"/>
    <text x="150%" y="365%" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="The latency of batch processing can range from minutes to hours or even days, while stream processing has low latency." transform="rotate(0 200 330)"></text>
    <path d="M 210 360 L 240 380 L 270 340 L 200 340 L 150 380 L 130 380 L 90 340 L 90 360 Z" stroke="#ADD8E6" stroke-width="2" fill="none"/>
    <g transform="rotate(0 200 330)"><circle cx="200" cy="330" r="40" stroke="#ADD8E6" stroke-width="2" fill="none"/>
    <circle cx="200" cy="330" r="20" stroke="#66CCCC" stroke-width="2" fill="none"/></g>

    <!-- Section 6: Conclusion -->
    <rect x="50%" y="410%" width="80%" height="60%" fill="#F5F5F5" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 380" to="360 200 380" dur="10" repeatCount="indefinite"/>
    <text x="150%" y="405%" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="In conclusion, batch processing and stream processing are two different approaches to handling big data, each with its own strengths and weaknesses." transform="rotate(0 200 380)"></text>
    <path d="M 210 400 L 240 420 L 270 380 L 200 380 L 150 420 L 130 420 L 90 380 L 90 400 Z" stroke="#ADD8E6" stroke-width="2" fill="none"/>
    <g transform="rotate(0 200 380)"><circle cx="200" cy="380" r="40" stroke="#ADD8E6" stroke-width="2" fill="none"/>
    <circle cx="200" cy="380" r="20" stroke="#66CCCC" stroke-width="2" fill="none"/></g>

    <!-- Footer -->
    <text x="50%" y="410%" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">Developed by [Your Name]</text>

</svg>