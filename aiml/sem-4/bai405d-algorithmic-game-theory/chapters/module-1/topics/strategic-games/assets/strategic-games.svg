<svg width="420" height="400" data-topic-id="strategic-games" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve">
    <style>
        /* Pastel gradient background */
        .gradient {
            filter: progid:DXImageTransform.Microsoft.gradient(startColorstr="#C7B8EA", endColorstr="#87CEEB");
            background-image: linear-gradient(to bottom, #C7B8EA, #87CEEB);
            background-size: 100% 100%;
            height: 100%;
            width: 100%;
        }
        
        /* Indigo text color */
        .indigo {
            color: #3B3F54;
        }
        
        /* Teal text color */
        .teal {
            color: #0097A7;
        }
        
        /* Orange accent color */
        .orange {
            color: #FFC107;
        }
    </style>
    <!-- Gradient background -->
    <rect class="gradient" x="0" y="0" width="420" height="400" fill="none" />
    
    <!-- Top title -->
    <text class="title" x="50%" y="20" text-anchor="middle" font-size="24" font-family="Arial, sans-serif">Strategic Games</text>
    
    <!-- Section 1: Static Members -->
    <rect x="20" y="60" width="380" height="50" fill="none" rx="5" />
    <text class="section-title" x="20" y="60" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">Static Members</text>
    <text class="data-narration" x="20" y="80" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">Shared across all class instances.
Static members exist even when no objects of the class are created.
Associated with the class rather than objects.
Accessed using the class name scope resolution operator (::)</text>
    
    <!-- Section 2: Static Data Members -->
    <rect x="20" y="130" width="380" height="50" fill="none" rx="5" />
    <text class="section-title" x="20" y="130" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">Static Data Members</text>
    <rect x="10" y="150" width="10" height="10" fill="#C7B8EA" rx="2" />
    <text class="data-narration" x="40" y="170" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">Variables that are shared by all objects of a class.
Declared with the static keyword and must be defined separately outside the class declaration.</text>
    
    <!-- Section 3: Static Member Functions -->
    <rect x="20" y="210" width="380" height="50" fill="none" rx="5" />
    <text class="section-title" x="20" y="210" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">Static Member Functions</text>
    <rect x="10" y="230" width="10" height="10" fill="#87CEEB" rx="2" />
    <text class="data-narration" x="40" y="260" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">Functions that can be called without creating an object of the class.
Can only access static data members and other static member functions.</text>
    
    <!-- Section 4: Memory Representation -->
    <rect x="20" y="310" width="380" height="50" fill="none" rx="5" />
    <text class="section-title" x="20" y="310" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">Memory Representation</text>
    <rect x="10" y="330" width="10" height="10" fill="#3B3F54" rx="2" />
    <rect x="40" y="350" width="10" height="10" fill="#87CEEB" rx="2" />
    <rect x="80" y="350" width="10" height="10" fill="#C7B8EA" rx="2" />
    <text class="data-narration" x="110" y="370" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">Class-level members that belong to the class itself rather than to individual objects of the class.
Exist even when no objects of the class are created.
Associated with the class rather than objects.
Accessed using the class name scope resolution operator (::)</text>
    
    <!-- Section 5: Arrow markers for connections -->
    <line x1="10" y1="360" x2="110" y2="360" stroke="#3B3F54" stroke-width="2" />
    <line x1="110" y1="360" x2="40" y2="360" stroke="#87CEEB" stroke-width="2" />
    <line x1="40" y1="360" x2="10" y2="360" stroke="#C7B8EA" stroke-width="2" />
    
    <!-- Bottom footer -->
    <text class="footer" x="50%" y="380" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">Strategic Games</text>
</svg>