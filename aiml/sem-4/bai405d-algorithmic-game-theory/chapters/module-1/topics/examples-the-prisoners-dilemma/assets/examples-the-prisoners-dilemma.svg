<svg width="420" height="400" data-topic-id="prisoners-dilemma" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="background-color: #C7B8EA; background-image: linear-gradient(45deg, #C7B8EA, #C7B8EA); background-size: 100% 100%;">
  <!-- Title -->
  <defs>
    <linearGradient id="title-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6495ED" stop-opacity="1" />
      <stop offset="100%" stop-color="#64A2FF" stop-opacity="1" />
    </linearGradient>
  </defs>
  <text x="50%" y="20%" font-size="24" font-family="Arial, sans-serif" fill="#64A2FF" text-anchor="middle" style="opacity: 0.8;">
    The Prisoner's Dilemma
  </text>

  <!-- Section 1: Introduction -->
  <rect x="50%" y="100%" width="280" height="100" fill="#ADD8E6" rx="10" data-narration="The Prisoner's Dilemma is a mathematical model used to study the behavior of individuals in situations where the outcome depends on the actions of multiple parties." />
  <animate transform="rotate(360 50% 50%)" begin="0s" dur="2s" repeat="indefinite" />
  <text x="50%" y="150%" font-size="18" font-family="Arial, sans-serif" fill="#6495ED" text-anchor="middle" style="opacity: 0.8;">
    A fundamental concept in game theory
  </text>

  <!-- Section 2: What is the Prisoner's Dilemma? -->
  <rect x="50%" y="100%" width="280" height="100" fill="#ADD8E6" rx="10" data-narration="The Prisoner's Dilemma involves two individuals who are given the opportunity to confess to a crime or remain silent." />
  <animate transform="rotate(720 50% 50%)" begin="2s" dur="2s" repeat="indefinite" />
  <text x="50%" y="150%" font-size="18" font-family="Arial, sans-serif" fill="#6495ED" text-anchor="middle" style="opacity: 0.8;">
    A mathematical model of human decision-making
  </text>

  <!-- Section 3: The Game -->
  <rect x="50%" y="100%" width="280" height="100" fill="#ADD8E6" rx="10" data-narration="In the Prisoner's Dilemma game, two prisoners are arrested and interrogated separately by the police." />
  <animate transform="rotate(1080 50% 50%)" begin="4s" dur="2s" repeat="indefinite" />
  <text x="50%" y="150%" font-size="18" font-family="Arial, sans-serif" fill="#6495ED" text-anchor="middle" style="opacity: 0.8;">
    Each prisoner has two options: confess (C) or remain silent (S)
  </text>

  <!-- Section 4: Payoff Matrix -->
  <rect x="50%" y="100%" width="280" height="100" fill="#ADD8E6" rx="10" data-narration="The payoff matrix illustrates the possible outcomes of the Prisoner's Dilemma:">
    <rect x="120" y="50" width="20" height="20" fill="#C7B8EA" rx="5" data-narration="A: 1 year, B: 1 year" />
    <rect x="80" y="50" width="20" height="20" fill="#C7B8EA" rx="5" data-narration="A: 3 years, B: 1 year" />
    <rect x="120" y="50" width="20" height="20" fill="#C7B8EA" rx="5" data-narration="A: 1 year, B: 3 years" />
    <rect x="80" y="50" width="20" height="20" fill="#C7B8EA" rx="5" data-narration="A: 2 years, B: 2 years" />
  </rect>
  <animate transform="rotate(1320 50% 50%)" begin="6s" dur="2s" repeat="indefinite" />
  <text x="50%" y="150%" font-size="18" font-family="Arial, sans-serif" fill="#6495ED" text-anchor="middle" style="opacity: 0.8;">
    If both prisoners confess, they will receive a sentence of 2 years in prison.
  </text>

  <!-- Section 5: Key Concepts -->
  <rect x="50%" y="100%" width="280" height="100" fill="#ADD8E6" rx="10" data-narration="The Prisoner's Dilemma highlights the importance of rational choice and dominant strategies in game theory." />
  <animate transform="rotate(1560 50% 50%)" begin="8s" dur="2s" repeat="indefinite" />
  <text x="50%" y="150%" font-size="18" font-family="Arial, sans-serif" fill="#6495ED" text-anchor="middle" style="opacity: 0.8;">
    A model of human decision-making
  </text>

  <!-- Section 6: Conclusion -->
  <rect x="50%" y="100%" width="280" height="100" fill="#ADD8E6" rx="10" data-narration="The Prisoner's Dilemma is a fundamental concept in game theory that continues to influence our understanding of human behavior." />
  <animate transform="rotate(1800 50% 50%)" begin="10s" dur="2s" repeat="indefinite" />
  <text x="50%" y="150%" font-size="18" font-family="Arial, sans-serif" fill="#6495ED" text-anchor="middle" style="opacity: 0.8;">
    A model of human decision-making
  </text>

  <!-- Footer -->
  <rect x="50%" y="350%" width="420" height="20" fill="#ADD8E6" rx="10" />
  <text x="50%" y="380%" font-size="14" font-family="Arial, sans-serif" fill="#6495ED" text-anchor="middle" style="opacity: 0.8;">
    Created by [Your Name]
  </text>
</svg>