<svg width="420" height="400" data-topic-id="cartesian-products-and-relations" data-slugified-name="Cartesian Products and Relations">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A68D8" stop-opacity="1" />
      <stop offset="50%" stop-color="#6495ED" stop-opacity="1" />
      <stop offset="100%" stop-color="#FFC107" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" rx="10" />
  
  <!-- Title -->
  <text x="170" y="20" font-size="24" font-family="Arial, sans-serif" fill="#FFC107">
    Cartesian Products and Relations
  </text>
  
  <!-- Section 1: Definition and Notation -->
  <section data-narration="Definition and Notation">
    <rect x="10" y="60" width="400" height="100" fill="#7A68D8" rx="10" />
    <text x="15" y="80" font-size="18" font-family="Arial, sans-serif" fill="#6495ED" text-anchor="start">
      The Cartesian product of two sets A and B, denoted by A × B, is the set of all ordered pairs (a, b) where a ∈ A and b ∈ B.
    </text>
    <rect x="10" y="120" width="400" height="60" fill="#6495ED" rx="10" />
    <text x="15" y="140" font-size="18" font-family="Arial, sans-serif" fill="#7A68D8" text-anchor="start">
      A relation R from set A to set B is a subset of the Cartesian product A × B.
    </text>
  </section>
  
  <!-- Section 2: Properties of Cartesian Products -->
  <section data-narration="Properties of Cartesian Products">
    <rect x="10" y="190" width="400" height="100" fill="#6495ED" rx="10" />
    <text x="15" y="210" font-size="18" font-family="Arial, sans-serif" fill="#7A68D8" text-anchor="start">
      Commutativity: The order of elements in an ordered pair does not change the pair.
      <tspan x="15" y="230" font-size="14" font-family="Arial, sans-serif" fill="#6495ED">Example: (a, b) = (b, a)</tspan>
    </text>
    <rect x="10" y="260" width="400" height="60" fill="#7A68D8" rx="10" />
    <text x="15" y="280" font-size="18" font-family="Arial, sans-serif" fill="#6495ED" text-anchor="start">
      Associativity: The order of composition of ordered pairs does not change the pair.
      <tspan x="15" y="300" font-size="14" font-family="Arial, sans-serif" fill="#6495ED">Example: ((a, b), (c, d)) = (a, c) × (b, d)</tspan>
    </text>
  </section>
  
  <!-- Section 3: Types of Relations -->
  <section data-narration="Types of Relations">
    <rect x="10" y="320" width="400" height="120" fill="#6495ED" rx="10" />
    <text x="15" y="340" font-size="18" font-family="Arial, sans-serif" fill="#7A68D8" text-anchor="start">
      Equivalence Relation: A relation R from A to B is an equivalence relation if it satisfies the following properties:
      <tspan x="15" y="360" font-size="14" font-family="Arial, sans-serif" fill="#6495ED">Reflexivity, Symmetry, and Transitivity</tspan>
    </text>
    <rect x="10" y="400" width="400" height="60" fill="#7A68D8" rx="10" />
    <text x="15" y="420" font-size="18" font-family="Arial, sans-serif" fill="#6495ED" text-anchor="start">
      Function: A relation R from A to B is a function if for each a ∈ A, there exists a unique b ∈ B such that (a, b) ∈ R.
    </text>
  </section>
  
  <!-- Section 4: Example -->
  <section data-narration="Example">
    <rect x="10" y="460" width="400" height="100" fill="#6495ED" rx="10" />
    <text x="15" y="480" font-size="18" font-family="Arial, sans-serif" fill="#7A68D8" text-anchor="start">
      Consider two sets A = {1, 2, 3} and B = {a, b, c}. The Cartesian product A × B is:
      <tspan x="15" y="500" font-size="14" font-family="Arial, sans-serif" fill="#6495ED">A × B = {(1, a), (1, b), (1, c), (2, a), (2, b), (2, c), (3, a), (3, b), (3, c)}</tspan>
    </text>
  </section>
  
  <!-- Section 5: Real-World Applications -->
  <section data-narration="Real-World Applications">
    <rect x="10" y="550" width="400" height="120" fill="#6495ED" rx="10" />
    <text x="15" y="570" font-size="18" font-family="Arial, sans-serif" fill="#7A68D8" text-anchor="start">
      Database Design: Cartesian products and relations are used to design databases that can efficiently store and retrieve data.
    </text>
    <rect x="10" y="600" width="400" height="60" fill="#6495ED" rx="10" />
    <text x="15" y="620" font-size="18" font-family="Arial, sans-serif" fill="#7A68D8" text-anchor="start">
      Computer Networks: Relations are used to represent relationships between devices.
    </text>
  </section>
  
  <!-- Footer -->
  <text x="10" y="380" font-size="14" font-family="Arial, sans-serif" fill="#7A68D8" text-anchor="start">
    &copy; 2023 Educational Resources
  </text>
</svg>