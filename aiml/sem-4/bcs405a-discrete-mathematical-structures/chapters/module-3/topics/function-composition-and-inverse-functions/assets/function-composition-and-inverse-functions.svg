<svg width="420" height="400" data-topic-id="function-composition-inverse-functions">
  <title>Function Composition and Inverse Functions</title>
  <footer>Learn about function composition and inverse functions in this interactive diagram.</footer>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <g id="composition-section" transform="translate(10, 50)">
    <section data-narration="Function Composition">
      <g transform="rotate(0, 20, 20)">
        <path d="M 20 20 L 60 60 L 100 80 Z" stroke="#2E4053" stroke-width="2" fill="none"/>
        <text x="40" y="50" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">f ∘ g (x)</text>
        <text x="80" y="50" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">(g ∘ f)(x)</text>
      </g>
      <animate transform="rotate(90, 20, 20)" begin="0s" duration="2s" repeatCount="indefinite"/>
    </section>
    <section data-narration="Composition of Multiple Functions">
      <g transform="rotate(0, 20, 20)">
        <path d="M 20 20 L 60 60 L 100 80 Z" stroke="#2E4053" stroke-width="2" fill="none"/>
        <text x="40" y="50" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">(f ∘ g ∘ h)(x)</text>
        <text x="80" y="50" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">(f ∘ (g ∘ h))(x)</text>
      </g>
      <animate transform="rotate(180, 20, 20)" begin="2s" duration="2s" repeatCount="indefinite"/>
    </section>
    <section data-narration="Inverse Functions">
      <g transform="rotate(0, 20, 20)">
        <path d="M 20 20 L 60 60 L 100 80 Z" stroke="#2E4053" stroke-width="2" fill="none"/>
        <text x="40" y="50" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">f^(-1)(y)</text>
        <text x="80" y="50" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">x if and only if f(x) = y</text>
      </g>
      <animate transform="rotate(270, 20, 20)" begin="4s" duration="2s" repeatCount="indefinite"/>
    </section>
    <section data-narration="One-to-One Correspondence">
      <g transform="rotate(0, 20, 20)">
        <path d="M 20 20 L 60 60 L 100 80 Z" stroke="#2E4053" stroke-width="2" fill="none"/>
        <text x="40" y="50" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">f is one-to-one if and only if f^(-1) exists</text>
        <text x="80" y="50" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">f^(-1) = f</text>
      </g>
      <animate transform="rotate(360, 20, 20)" begin="6s" duration="2s" repeatCount="indefinite"/>
    </section>
    <section data-narration="Bijective Functions">
      <g transform="rotate(0, 20, 20)">
        <path d="M 20 20 L 60 60 L 100 80 Z" stroke="#2E4053" stroke-width="2" fill="none"/>
        <text x="40" y="50" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">f is bijective if and only if f^(-1) exists and f^(-1) = f</text>
        <text x="80" y="50" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">f^(-1) exists and f^(-1) = f</text>
      </g>
      <animate transform="rotate(0, 20, 20)" begin="8s" duration="2s" repeatCount="indefinite"/>
    </section>
  </g>
</svg>