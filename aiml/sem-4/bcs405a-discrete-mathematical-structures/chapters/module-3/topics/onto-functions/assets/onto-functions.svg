<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="Onto-Functions" xmlns="http://www.w3.org/2000/svg"
     style="background-color: #2C4DB8; background-image: linear-gradient(to bottom, #2C4DB8, #455A64);">

  <!-- Header -->
  <rect x="10" y="10" width="400" height="40" style="fill: #455A64; border: none; border-radius: 0 0 10 10;"/>
  <text x="20" y="30" style="font-size: 24px; color: #FFF; font-family: Arial, sans-serif; text-align: center;">
    Onto Functions
  </text>
  <rect x="10" y="60" width="400" height="30" style="fill: #455A64; border: none; border-radius: 0 0 10 10;"/>
  <text x="20" y="80" style="font-size: 18px; color: #FFF; font-family: Arial, sans-serif; text-align: center;">
    What are Loss Functions?
  </text>

  <!-- Loss vs Cost -->
  <rect x="10" y="120" width="400" height="100" style="fill: #F7D2C4; background-image: linear-gradient(to bottom, #F7D2C4, #F2B4C4);"/>
  <text x="20" y="140" style="font-size: 18px; color: #000; font-family: Arial, sans-serif; data-narration="Loss vs Cost is about measuring how well a neural network's predictions match the true labels."/>
  <path d="M 50, 150 L 350, 150" style="stroke: #455A64; stroke-width: 2; stroke-dasharray: 5,5;"/>
  <path d="M 50, 200 L 350, 200" style="stroke: #455A64; stroke-width: 2; stroke-dasharray: 5,5;"/>
  <text x="220" y="180" style="font-size: 18px; color: #000; font-family: Arial, sans-serif;">
    Loss (Error for a single training example)
  </text>
  <text x="220" y="210" style="font-size: 18px; color: #000; font-family: Arial, sans-serif;">
    Cost (Average loss over the entire training set)
  </text>
  <animate begin="0s" dur="2s" repeatCount="indefinite" attributeName="opacity" from="1" to="0" fill="freeze"/>
  <animate begin="0.5s" dur="2s" repeatCount="indefinite" attributeName="opacity" from="0" to="1" fill="freeze"/>

  <!-- Regression Loss Functions -->
  <rect x="10" y="320" width="400" height="100" style="fill: #F2B4C4; background-image: linear-gradient(to bottom, #F2B4C4, #F7D2C4);"/>
  <text x="20" y="340" style="font-size: 18px; color: #000; font-family: Arial, sans-serif; data-narration="Mean Squared Error (MSE) is a regression loss function that penalizes large errors heavily."/>
  <path d="M 50, 350 L 350, 350" style="stroke: #455A64; stroke-width: 2; stroke-dasharray: 5,5;"/>
  <text x="220" y="370" style="font-size: 18px; color: #000; font-family: Arial, sans-serif;">
    Mean Squared Error (MSE)
  </text>
  <text x="220" y="390" style="font-size: 18px; color: #000; font-family: Arial, sans-serif;">
    Mean Absolute Error (MAE)
  </text>
  <text x="220" y="410" style="font-size: 18px; color: #000; font-family: Arial, sans-serif;">
    Huber Loss
  </text>
  <animate begin="0s" dur="2s" repeatCount="indefinite" attributeName="opacity" from="1" to="0" fill="freeze"/>
  <animate begin="0.5s" dur="2s" repeatCount="indefinite" attributeName="opacity" from="0" to="1" fill="freeze"/>

  <!-- Classification Loss Functions -->
  <rect x="10" y="420" width="400" height="100" style="fill: #F7D2C4; background-image: linear-gradient(to bottom, #F7D2C4, #F2B4C4);"/>
  <text x="20" y="440" style="font-size: 18px; color: #000; font-family: Arial, sans-serif; data-narration="Binary Cross-Entropy (Log Loss) is a classification loss function that penalizes confident wrong predictions heavily."/>
  <path d="M 50, 450 L 350, 450" style="stroke: #455A64; stroke-width: 2; stroke-dasharray: 5,5;"/>
  <text x="220" y="470" style="font-size: 18px; color: #000; font-family: Arial, sans-serif;">
    Binary Cross-Entropy (Log Loss)
  </text>
  <text x="220" y="490" style="font-size: 18px; color: #000; font-family: Arial, sans-serif;">
    Categorical Cross-Entropy
  </text>
  <animate begin="0s" dur="2s" repeatCount="indefinite" attributeName="opacity" from="1" to="0" fill="freeze"/>
  <animate begin="0.5s" dur="2s" repeatCount="indefinite" attributeName="opacity" from="0" to="1" fill="freeze"/>

  <!-- Footer -->
  <rect x="10" y="460" width="400" height="40" style="fill: #455A64; border: none; border-radius: 0 0 10 10;"/>
  <text x="20" y="480" style="font-size: 18px; color: #FFF; font-family: Arial, sans-serif; text-align: center;">
    Developed by [Your Name]
  </text>

</svg>