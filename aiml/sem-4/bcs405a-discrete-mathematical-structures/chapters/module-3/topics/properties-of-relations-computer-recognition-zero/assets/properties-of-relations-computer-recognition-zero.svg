<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="properties-of-relations-computer-recognition-zero">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="420" height="400" rx="10" />

  <!-- Title -->
  <g transform="translate(10, 20)">
    <text text-anchor="start" font-size="24" font-family="Arial, sans-serif" fill="#3498DB">
      Properties of Relations <br> Computer Recognition – Zero-One Matrices and Directed Graphs
    </text>
  </g>

  <!-- Section 1: Definition -->
  <g transform="translate(10, 60)">
    <rect fill="#F7F7F7" width="400" height="50" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0,60" to="0,70" dur="1s" begin="0s" />
    <text text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#666" data-narration="A relation R on a set A is a subset of the Cartesian product A × A, i.e., R ⊆ A × A." />
  </g>

  <!-- Section 2: Types of Relations -->
  <g transform="translate(10, 120)">
    <rect fill="#F7F7F7" width="400" height="50" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0,120" to="0,130" dur="1s" begin="0.2s" />
    <text text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#666" data-narration="Equivalence Relation: A relation R on a set A is said to be an equivalence relation if it satisfies the following properties:" />
    <rect fill="#F7F7F7" width="120" height="10" rx="5" transform="rotate(45, 200, 120)" />
    <text text-anchor="start" font-size="14" font-family="Arial, sans-serif" fill="#666" data-narration="Reflexive: (a, a) ∈ R for all a ∈ A" />
    <rect fill="#F7F7F7" width="120" height="10" rx="5" transform="rotate(45, 320, 120)" />
    <text text-anchor="start" font-size="14" font-family="Arial, sans-serif" fill="#666" data-narration="Symmetric: if (a, b) ∈ R, then (b, a) ∈ R" />
    <rect fill="#F7F7F7" width="120" height="10" rx="5" transform="rotate(45, 440, 120)" />
    <text text-anchor="start" font-size="14" font-family="Arial, sans-serif" fill="#666" data-narration="Transitive: if (a, b) ∈ R and (b, c) ∈ R, then (a, c) ∈ R" />
  </g>

  <!-- Section 3: Operations on Relations -->
  <g transform="translate(10, 190)">
    <rect fill="#F7F7F7" width="400" height="50" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0,190" to="0,200" dur="1s" begin="0.4s" />
    <text text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#666" data-narration="Union: The union of two relations R1 and R2 is defined as:" />
    <rect fill="#F7F7F7" width="120" height="10" rx="5" transform="rotate(45, 200, 190)" />
    <text text-anchor="start" font-size="14" font-family="Arial, sans-serif" fill="#666" data-narration="The union of two relations R1 and R2 is defined as:" />
    <rect fill="#F7F7F7" width="120" height="10" rx="5" transform="rotate(45, 320, 190)" />
    <text text-anchor="start" font-size="14" font-family="Arial, sans-serif" fill="#666" data-narration="Intersection: The intersection of two relations R1 and R2 is defined as:" />
    <rect fill="#F7F7F7" width="120" height="10" rx="5" transform="rotate(45, 440, 190)" />
    <text text-anchor="start" font-size="14" font-family="Arial, sans-serif" fill="#666" data-narration="Complement: The complement of a relation R is defined as:" />
  </g>

  <!-- Section 4: Computer Recognition – Zero-One Matrices and Directed Graphs -->
  <g transform="translate(10, 260)">
    <rect fill="#F7F7F7" width="400" height="50" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0,260" to="0,270" dur="1s" begin="0.6s" />
    <text text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#666" data-narration="A zero-one matrix is a matrix where each entry is either 0 or 1. A directed graph is a graph where each edge has a direction." />
  </g>

  <!-- Title -->
  <g transform="translate(10, 320)">
    <text text-anchor="start" font-size="24" font-family="Arial, sans-serif" fill="#3498DB">
      Computer Recognition – Zero-One Matrices and Directed Graphs
    </text>
  </g>

  <!-- Footer -->
  <g transform="translate(10, 380)">
    <text text-anchor="start" font-size="14" font-family="Arial, sans-serif" fill="#666">
      Edmunds 2022
    </text>
  </g>
</svg>