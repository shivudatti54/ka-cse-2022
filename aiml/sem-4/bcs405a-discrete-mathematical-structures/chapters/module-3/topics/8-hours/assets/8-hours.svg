<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" data-topic-id="functions" data-slug="functions">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>
  
  <!-- Title at top -->
  <text x="10" y="20" font-size="24" font-family="Open Sans" text-anchor="start" fill="#3498DB">
    8 Hours
  </text>
  
  <!-- Section 1: Domain -->
  <section data-narration="Domain is the set of all possible input values">
    <rect x="10" y="60" width="400" height="20" fill="#F7F7F7"/>
    <text x="10" y="80" font-size="18" font-family="Open Sans" text-anchor="start" fill="#666">
      Domain
    </text>
    <animate transform="rotate(45 10 80)" begin="0s" dur="2s" repeat Countdown" />
    <svg width="5" height="10">
      <rect x="5" y="5" width="5" height="5" fill="#3498DB"/>
      <text x="10" y="10" font-size="10" font-family="Open Sans" text-anchor="start" fill="#3498DB">
        Input
      </text>
    </svg>