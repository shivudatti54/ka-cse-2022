<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="the-principle-of-inclusion-and-exclusion">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cee5f5"/>
      <stop offset="50%" stop-color="#add8e6"/>
      <stop offset="100%" stop-color="#c5f3c5"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  
  <!-- Title -->
  <text x="20" y="10" font-size="24" font-family="Arial, sans-serif" text-anchor="start" fill="#2c5dae">
    The Principle of Inclusion and Exclusion
  </text>
  
  <!-- Section 1: Definitions and Notations -->
  <section id="section-1" data-narration="This section explains the definitions and notations used in the Principle of Inclusion and Exclusion.">
    <rect x="10" y="50" width="300" height="80" fill="#ffffff" rx="10"/>
    <rect x="10" y="50" width="300" height="80" opacity="0.5"/>
    <text x="15" y="60" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2c5dae">
      <tspan>Set:</tspan>
      <tspan> A collection of unique elements, often represented using curly brackets {}.</tspan>
    </text>
    <text x="15" y="80" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2c5dae">
      <tspan>Union:</tspan>
      <tspan> The combination of all elements in two or more sets, often represented using the symbol {}.</tspan>
    </text>
  </section>
  <animate transform="rotate(0 20 20)" begin="0s" dur="2s" repeatCount="indefinite"/>
  
  <!-- Section 2: The Principle of Inclusion and Exclusion -->
  <section id="section-2" data-narration="This section explains the Principle of Inclusion and Exclusion.">
    <rect x="10" y="150" width="300" height="80" fill="#ffffff" rx="10"/>
    <rect x="10" y="150" width="300" height="80" opacity="0.5"/>
    <text x="15" y="160" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2c5dae">
      <tspan>The Principle of Inclusion and Exclusion states that the number of elements in the union of two sets A and B can be calculated as follows:</tspan>
    </text>
    <text x="15" y="180" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2c5dae">
      <tspan>|A ∪ B| = |A| + |B| - |A ∩ B|</tspan>
    </text>
  </section>
  <animate transform="rotate(0 20 20)" begin="2s" dur="2s" repeatCount="indefinite"/>
  
  <!-- Section 3: Example -->
  <section id="section-3" data-narration="This section provides an example of the Principle of Inclusion and Exclusion.">
    <rect x="10" y="250" width="300" height="80" fill="#ffffff" rx="10"/>
    <rect x="10" y="250" width="300" height="80" opacity="0.5"/>
    <text x="15" y="260" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2c5dae">
      <tspan>Suppose we have two sets A and B, and we want to find the number of elements in their union.</tspan>
    </text>
    <text x="15" y="280" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2c5dae">
      <tspan>|A| = 10</tspan>
      <tspan> |B| = 15</tspan>
      <tspan> |A ∩ B| = 5</tspan>
    </text>
  </section>
  <animate transform="rotate(0 20 20)" begin="4s" dur="2s" repeatCount="indefinite"/>
  
  <!-- Section 4: Generalizations of the Principle -->
  <section id="section-4" data-narration="This section discusses generalizations of the Principle of Inclusion and Exclusion.">
    <rect x="10" y="350" width="300" height="80" fill="#ffffff" rx="10"/>
    <rect x="10" y="350" width="300" height="80" opacity="0.5"/>
    <text x="15" y="360" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2c5dae">
      <tspan>The Principle of Inclusion and Exclusion has been generalized to include various types of sets and relationships.</tspan>
    </text>
  </section>
  <animate transform="rotate(0 20 20)" begin="6s" dur="2s" repeatCount="indefinite"/>
  
  <!-- Footer -->
  <text x="20" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2c5dae">
    Created with love for education
  </text>
</svg>