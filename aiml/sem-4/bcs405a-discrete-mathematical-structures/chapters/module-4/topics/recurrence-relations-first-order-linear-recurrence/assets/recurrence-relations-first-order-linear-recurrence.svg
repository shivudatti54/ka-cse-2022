    <path d="M 20 810 L 380 810" stroke="#3498DB" stroke-width="2"/>
    <text x="100" y="820" font-size="18" fill="#000">Fibonacci sequence: f(n) = f(n-1) + f(n-2) with initial conditions f(0) = 0 and f(1) = 1.</text>
