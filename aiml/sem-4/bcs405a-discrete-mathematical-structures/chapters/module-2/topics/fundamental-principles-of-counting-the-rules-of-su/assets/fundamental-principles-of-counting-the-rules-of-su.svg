<svg width="420" height="400" data-topic-id="fundamental-principles-of-counting-the-rules-of-sum-and-product">
  <style>
    /* Add some basic styling to make it look nice */
    body {
      background-color: #E0E0E0;
    }
    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .footer {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-top: 20px;
    }
    .section {
      margin-bottom: 20px;
    }
  </style>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#E6F2FF" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10" />
  <g transform="translate(10, 10)">
    <!-- Title -->
    <text class="title" x="50%" y="20%" text-anchor="middle">Fundamental Principles of Counting: The Rules of Sum and Product</text>
    <!-- Footer -->
    <text class="footer" x="50%" y="100%" text-anchor="middle">Learn more about counting and permutations!</text>
    <!-- Section 1: Rules of Sum -->
    <section data-narration="The Rules of Sum">
      <g transform="translate(10, 60)">
        <rect width="100" height="20" fill="#fff" rx="5" />
        <text x="10" y="15" text-anchor="start">Rule of Sum</text>
        <text x="150" y="15" text-anchor="end">|A| + |B| = |A| × |B|</text>
        <animate attributeName="opacity" from="1" to="0" dur="1000" begin="1000ms" />
      </g>
      <g transform="translate(220, 60)">
        <rect width="100" height="20" fill="#fff" rx="5" />
        <text x="10" y="15" text-anchor="start">Rule of Sum</text>
        <text x="150" y="15" text-anchor="end">|A| + |B| = |A| × |B|</text>
        <animate attributeName="opacity" from="1" to="0" dur="1000" begin="2000ms" />
      </g>
      <g transform="translate(10, 60)">
        <rect width="100" height="20" fill="#fff" rx="5" />
        <text x="10" y="15" text-anchor="start">Example</text>
        <text x="150" y="15" text-anchor="end">|A| = 3, |B| = 2, |A| + |B| = 5, |A| × |B| = 6</text>
        <animate attributeName="opacity" from="1" to="0" dur="1000" begin="3000ms" />
      </g>
    </section>
    <!-- Section 2: Rules of Product -->
    <section data-narration="The Rules of Product">
      <g transform="translate(10, 120)">
        <rect width="100" height="20" fill="#fff" rx="5" />
        <text x="10" y="15" text-anchor="start">Rule of Product</text>
        <text x="150" y="15" text-anchor="end">|A| × |B| × |C| = |A| × |B| × |C|</text>
        <animate attributeName="opacity" from="1" to="0" dur="1000" begin="4000ms" />
      </g>
      <g transform="translate(220, 120)">
        <rect width="100" height="20" fill="#fff" rx="5" />
        <text x="10" y="15" text-anchor="start">Example</text>
        <text x="150" y="15" text-anchor="end">|A| = 2, |B| = 2, |C| = 3, |A| × |B| × |C| = 12</text>
        <animate attributeName="opacity" from="1" to="0" dur="1000" begin="5000ms" />
      </g>
      <g transform="translate(10, 120)">
        <rect width="100" height="20" fill="#fff" rx="5" />
        <text x="10" y="15" text-anchor="start">Multiple sets</text>
        <text x="150" y="15" text-anchor="end">|A| × |B| × |C| = |A| × |B| × |C|</text>
        <animate attributeName="opacity" from="1" to="0" dur="1000" begin="6000ms" />
      </g>
    </section>
    <!-- Section 3: Permutations -->
    <section data-narration="Permutations">
      <g transform="translate(10, 180)">
        <rect width="100" height="20" fill="#fff" rx="5" />
        <text x="10" y="15" text-anchor="start">Permutation</text>
        <text x="150" y="15" text-anchor="end">n! = n × (n - 1) × ... × 2 × 1</text>
        <animate attributeName="opacity" from="1" to="0" dur="1000" begin="7000ms" />
      </g>
      <g transform="translate(220, 180)">
        <rect width="100" height="20" fill="#fff" rx="5" />
        <text x="10" y="15" text-anchor="start">Example</text>
        <text x="150" y="15" text-anchor="end">3! = 3 × 2 × 1 = 6</text>
        <animate attributeName="opacity" from="1" to="0" dur="1000" begin="8000ms" />
      </g>
    </section>
    <!-- Section 4: Combinations -->
    <section data-narration="Combinations">
      <g transform="translate(10, 240)">
        <rect width="100" height="20" fill="#fff" rx="5" />
        <text x="10" y="15" text-anchor="start">Combination</text>
        <text x="150" y="15" text-anchor="end">k! / (k - r)! × r!</text>
        <animate attributeName="opacity" from="1" to="0" dur="1000" begin="9000ms" />
      </g>
      <g transform="translate(220, 240)">
        <rect width="100" height="20" fill="#fff" rx="5" />
        <text x="10" y="15" text-anchor="start">Example</text>
        <text x="150" y="15" text-anchor="end">3C2 = 3! / (3 - 2)! × 2! = 3</text>
        <animate attributeName="opacity" from="1" to="0" dur="1000" begin="10000ms" />
      </g>
    </section>
  </g>
</svg>