<svg width="420" height="400" data-topic-id="recursive-definitions">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Title -->
  <g transform="translate(20, 20)">
    <text font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle">Recursive Definitions</text>
  </g>

  <!-- Section 1: What is a Graph? -->
  <g transform="translate(20, 60)">
    <rect width="380" height="40" fill="#C7B8EA" rx="10"/>
    <text font-size="18" font-family="Arial" text-anchor="middle" fill="#333">What is a Graph?</text>
    <text data-narration="A graph is an ordered pair G = (V, E) consisting of a non-empty set of vertices and a set of edges connecting pairs of vertices."</text>
    <rect width="20" height="40" fill="#F7DC6F" rx="5" transform="translate(190, 0)"/>
  </g>

  <!-- Section 2: Vertices and Edges -->
  <g transform="translate(20, 110)">
    <rect width="380" height="40" fill="#C5CAE9" rx="10"/>
    <text font-size="18" font-family="Arial" text-anchor="middle" fill="#333">Vertices and Edges</text>
    <text data-narration="Vertices represent the fundamental units or entities in a graph. They are typically drawn as circles or points. Edges represent relationships or connections between vertices. They can be either directed or undirected."</text>
    <rect width="20" height="40" fill="#F7DC6F" rx="5" transform="translate(190, 0)"/>
  </g>

  <!-- Section 3: Order and Size -->
  <g transform="translate(20, 160)">
    <rect width="380" height="40" fill="#C7B8EA" rx="10"/>
    <text font-size="18" font-family="Arial" text-anchor="middle" fill="#333">Order and Size</text>
    <text data-narration="Order refers to the number of vertices in a graph, denoted as |V| or n. Size refers to the number of edges in a graph, denoted as |E| or m."</text>
    <rect width="20" height="40" fill="#F7DC6F" rx="5" transform="translate(190, 0)"/>
  </g>

  <!-- Section 4: Incidence and Adjacency -->
  <g transform="translate(20, 210)">
    <rect width="380" height="40" fill="#C5CAE9" rx="10"/>
    <text font-size="18" font-family="Arial" text-anchor="middle" fill="#333">Incidence and Adjacency</text>
    <text data-narration="Incidence refers to an edge being incident to a vertex if the vertex is one of the endpoints of the edge. Adjacency refers to two vertices being connected by an edge. Two edges are adjacent if they share a common vertex."</text>
    <rect width="20" height="40" fill="#F7DC6F" rx="5" transform="translate(190, 0)"/>
  </g>

  <!-- Section 5: Recursive Definitions -->
  <g transform="translate(20, 260)">
    <rect width="380" height="40" fill="#C7B8EA" rx="10"/>
    <text font-size="18" font-family="Arial" text-anchor="middle" fill="#333">Recursive Definitions</text>
    <text data-narration="Recursive definitions refer to the process of defining a set or relation using only instances of the same kind. This can be applied to various mathematical structures, including graphs, trees, and sequences."</text>
    <rect width="20" height="40" fill="#F7DC6F" rx="5" transform="translate(190, 0)"/>
  </g>

  <!-- Footer -->
  <g transform="translate(20, 360)">
    <text font-size="18" font-family="Arial" text-anchor="middle" fill="#333">Recursive Definitions</text>
  </g>

  <!-- Animation -->
  <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 1" begin="0s"/> 
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 2" begin="2s"/> 
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 4" begin="4s"/>
  </animate>
</svg>