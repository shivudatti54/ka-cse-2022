<svg width="420" height="400" data-topic-id="well-ordering-principle-mathematical-induction">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  
  <!-- Title -->
  <text x="50%" y="20" font-size="36" font-family="Arial, sans-serif" text-anchor="middle">
    <tspan style="color:#3498DB">The Well Ordering Principle Mathematical Induction</tspan>
  </text>
  
  <!-- Section 1: Introduction -->
  <section id="section-1" data-narration="Introduction">
    <rect x="10" y="50" width="320" height="50" fill="#F7F7F7" rx="10"/>
    <text x="15" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      <tspan style="color:#2ECC71">Introduction</tspan>
    </text>
    <text x="15" y="100" font-size="16" font-family="Arial, sans-serif" text-anchor="start">
      The Well Ordering Principle is a fundamental concept in discrete mathematics that deals with the ordering of the natural numbers.
    </text>
  </section>
  
  <!-- Section 2: Definition -->
  <section id="section-2" data-narration="Definition">
    <rect x="10" y="170" width="320" height="50" fill="#F7F7F7" rx="10"/>
    <text x="15" y="190" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      <tspan style="color:#2ECC71">Definition</tspan>
    </text>
    <text x="15" y="220" font-size="16" font-family="Arial, sans-serif" text-anchor="start">
      The Well Ordering Principle states that every non-empty set of natural numbers contains a least element.
    </text>
  </section>
  
  <!-- Section 3: Mathematical Induction -->
  <section id="section-3" data-narration="Mathematical Induction">
    <rect x="10" y="290" width="320" height="50" fill="#F7F7F7" rx="10"/>
    <text x="15" y="310" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      <tspan style="color:#2ECC71">Mathematical Induction</tspan>
    </text>
    <text x="15" y="340" font-size="16" font-family="Arial, sans-serif" text-anchor="start">
      Mathematical induction is a technique used to prove that a statement is true for all natural numbers.
    </text>
  </section>
  
  <!-- Section 4: Base Case -->
  <section id="section-4" data-narration="Base Case">
    <rect x="10" y="410" width="320" height="50" fill="#F7F7F7" rx="10"/>
    <text x="15" y="430" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      <tspan style="color:#2ECC71">Base Case</tspan>
    </text>
    <text x="15" y="460" font-size="16" font-family="Arial, sans-serif" text-anchor="start">
      Prove that the statement is true for the smallest natural number (usually 1).
    </text>
  </section>
  
  <!-- Section 5: Inductive Step -->
  <section id="section-5" data-narration="Inductive Step">
    <rect x="10" y="510" width="320" height="50" fill="#F7F7F7" rx="10"/>
    <text x="15" y="530" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      <tspan style="color:#2ECC71">Inductive Step</tspan>
    </text>
    <text x="15" y="560" font-size="16" font-family="Arial, sans-serif" text-anchor="start">
      Prove that if the statement is true for a natural number, then it is true for the next natural number.
    </text>
  </section>
  
  <!-- Inductive Hypothesis and Inductive Step (Proof) -->
  <section id="section-6" data-narration="Example">
    <rect x="10" y="610" width="320" height="100" fill="#F7F7F7" rx="10"/>
    <text x="15" y="630" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      <tspan style="color:#2ECC71">Example</tspan>
    </text>
    <text x="15" y="660" font-size="16" font-family="Arial, sans-serif" text-anchor="start">
      Suppose we want to prove that the statement "n is a perfect square" is true for all natural numbers using mathematical induction.
    </text>
    <text x="15" y="680" font-size="16" font-family="Arial, sans-serif" text-anchor="start">
      Prove that 1 is a perfect square (1 = 1^2).
    </text>
    <text x="15" y="700" font-size="16" font-family="Arial, sans-serif" text-anchor="start">
      Assume that n is a perfect square (n = k^2) for some natural number k. Prove that n + 1 is a perfect square ((n + 1) = (k + 1)^2).
    </text>
  </section>
  
  <!-- Footer -->
  <text x="50%" y="380" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">
    <tspan style="color:#3498DB">End of Well Ordering Principle Mathematical Induction</tspan>
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 190 190" to="360 190 190" dur="10s" repeatCount="indefinite"/>
</svg>