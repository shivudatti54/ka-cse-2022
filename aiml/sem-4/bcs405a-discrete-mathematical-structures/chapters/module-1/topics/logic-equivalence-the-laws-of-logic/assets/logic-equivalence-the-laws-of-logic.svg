<svg width="420" height="400" data-topic-id="logic-equivalence-laws-of-logic">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Title at top -->
  <rect x="50" y="20" width="320" height="40" fill="#6495ED" rx="10" />
  <text x="150" y="30" font-size="24" font-family="Arial" fill="#ffffff">
    Logic Equivalence Laws of Logic
  </text>

  <!-- Section 1: Commutative Law -->
  <g transform="translate(50, 100)">
    <rect width="100" height="40" fill="#87CEEB" rx="10" />
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#000000" data-narration="The commutative law states that the order of the statements does not change their truth value.">
      Commutative Law
    </text>
    <line x1="20" y1="25" x2="80" y2="25" stroke-width="2" stroke="#6495ED" />
    <animateTransform attributeName="transform" type="translate" from="0 25" to="0 75" dur="2s" begin="0s" />
    <line x1="120" y1="25" x2="180" y2="25" stroke-width="2" stroke="#6495ED" />
    <animateTransform attributeName="transform" type="translate" from="0 25" to="0 75" dur="2s" begin="0.5s" />
  </g>

  <!-- Section 2: Associative Law -->
  <g transform="translate(50, 200)">
    <rect width="100" height="40" fill="#87CEEB" rx="10" />
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#000000" data-narration="The associative law states that the order of the statements does not change their truth value when there are multiple conjunctions (AND) or disjunctions (OR).">
      Associative Law
    </text>
    <line x1="20" y1="25" x2="80" y2="25" stroke-width="2" stroke="#6495ED" />
    <animateTransform attributeName="transform" type="translate" from="0 25" to="0 75" dur="2s" begin="1s" />
    <line x1="120" y1="25" x2="180" y2="25" stroke-width="2" stroke="#6495ED" />
    <animateTransform attributeName="transform" type="translate" from="0 25" to="0 75" dur="2s" begin="1.5s" />
  </g>

  <!-- Section 3: Distributive Law -->
  <g transform="translate(50, 300)">
    <rect width="100" height="40" fill="#87CEEB" rx="10" />
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#000000" data-narration="The distributive law states that a conjunction (AND) can be distributed over a disjunction (OR).">
      Distributive Law
    </text>
    <line x1="20" y1="25" x2="80" y2="25" stroke-width="2" stroke="#6495ED" />
    <animateTransform attributeName="transform" type="translate" from="0 25" to="0 75" dur="2s" begin="2s" />
    <line x1="120" y1="25" x2="180" y2="25" stroke-width="2" stroke="#6495ED" />
    <animateTransform attributeName="transform" type="translate" from="0 25" to="0 75" dur="2s" begin="2.5s" />
  </g>

  <!-- Section 4: Absorption Law -->
  <g transform="translate(50, 400)">
    <rect width="100" height="40" fill="#87CEEB" rx="10" />
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#000000" data-narration="The absorption law states that a disjunction (OR) can absorb a conjunction (AND).">
      Absorption Law
    </text>
    <line x1="20" y1="25" x2="80" y2="25" stroke-width="2" stroke="#6495ED" />
    <animateTransform attributeName="transform" type="translate" from="0 25" to="0 75" dur="2s" begin="3s" />
    <line x1="120" y1="25" x2="180" y2="25" stroke-width="2" stroke="#6495ED" />
    <animateTransform attributeName="transform" type="translate" from="0 25" to="0 75" dur="2s" begin="3.5s" />
  </g>

  <!-- Footer at bottom -->
  <rect x="50" y="380" width="320" height="40" fill="#6495ED" rx="10" />
  <text x="150" y="390" font-size="18" font-family="Arial" fill="#ffffff">
    Created with love for educational purposes.
  </text>
</svg>