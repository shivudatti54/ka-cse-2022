<svg width="420" height="400" data-topic-id="Quantifiers" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="indigo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <text x="50" y="50" font-size="24" font-family="Arial" fill="#333333" text-anchor="middle">The Use of Quantifiers</text>
  <g id="quantifier-sections">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2000" repeatCount="indefinite"/>
    <rect x="10" y="80" width="100" height="20" fill="#f7dc6f" fill-opacity="0.2"/>
    <text x="20" y="90" font-size="18" font-family="Arial" fill="#333333" text-anchor="middle" data-narration="Types of Quantifiers">Types of Quantifiers</text>
    <animate attributeName="opacity" from="0" to="1" dur="500" begin="0s"/>
    <rect x="10" y="110" width="100" height="20" fill="#f7dc6f" fill-opacity="0.2"/>
    <text x="20" y="120" font-size="18" font-family="Arial" fill="#333333" text-anchor="middle" data-narration="Universal Quantifier (`∀`)">Universal Quantifier (`∀`)</text>
    <animate attributeName="opacity" from="0" to="1" dur="500" begin="0.5s"/>
    <rect x="10" y="140" width="100" height="20" fill="#f7dc6f" fill-opacity="0.2"/>
    <text x="20" y="150" font-size="18" font-family="Arial" fill="#333333" text-anchor="middle" data-narration="Existential Quantifier (`∃`)">Existential Quantifier (`∃`)</text>
    <animate attributeName="opacity" from="0" to="1" dur="500" begin="1s"/>
    <rect x="10" y="170" width="100" height="20" fill="#f7dc6f" fill-opacity="0.2"/>
    <text x="20" y="180" font-size="18" font-family="Arial" fill="#333333" text-anchor="middle" data-narration="Using Quantifiers in Statements">Using Quantifiers in Statements</text>
    <animate attributeName="opacity" from="0" to="1" dur="500" begin="1.5s"/>
    <rect x="10" y="200" width="100" height="20" fill="#f7dc6f" fill-opacity="0.2"/>
    <text x="20" y="210" font-size="18" font-family="Arial" fill="#333333" text-anchor="middle" data-narration="Key Concepts">Key Concepts</text>
    <animate attributeName="opacity" from="0" to="1" dur="500" begin="2s"/>
    <rect x="10" y="230" width="100" height="20" fill="#f7dc6f" fill-opacity="0.2"/>
    <text x="20" y="240" font-size="18" font-family="Arial" fill="#333333" text-anchor="middle" data-narration="Scope, Domain, and Range">Scope, Domain, and Range</text>
    <animate attributeName="opacity" from="0" to="1" dur="500" begin="2.5s"/>
  </g>
  <g id="arrow-markers">
    <path d="M 10,10 L 20,20" fill="#333333" stroke="#333333" stroke-width="2"/>
    <path d="M 20,20 L 30,30" fill="#333333" stroke="#333333" stroke-width="2"/>
    <path d="M 30,30 L 40,40" fill="#333333" stroke="#333333" stroke-width="2"/>
  </g>
  <text x="50" y="390" font-size="18" font-family="Arial" fill="#333333" text-anchor="middle">Educational Resources</text>
</svg>