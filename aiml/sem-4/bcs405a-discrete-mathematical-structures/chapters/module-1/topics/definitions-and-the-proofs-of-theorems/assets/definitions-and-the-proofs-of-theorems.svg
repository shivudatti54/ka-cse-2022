<svg width="420" height="400" data-topic-id="definitions-and-the-proofs-of-theorems">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#C2E9F5" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="50" y="50" width="320" height="300" fill="url(#pastel-gradient)" rx="10" />
  <text x="170" y="30" font-size="24" font-family="Arial" fill="#2E4053">Definitions and the Proofs of Theorems</text>

  <section data-narration="What is a Definition?" data-x="50" data-y="150" data-width="220" data-height="200">
    <rect x="50" y="150" width="220" height="200" fill="#F5F5F5" rx="10" />
    <text x="70" y="160" font-size="16" font-family="Arial" fill="#2E4053" text-anchor="middle">A definition is a statement that provides a clear and concise description of a mathematical concept.</text>
    <tspan x="70" y="180" font-size="16" font-family="Arial" fill="#2E4053">It is a way to define a set, a function, a relation, or any other mathematical object.</tspan>
  </section>

  <section data-narration="Types of Definitions" data-x="50" data-y="360" data-width="220" data-height="200">
    <rect x="50" y="360" width="220" height="200" fill="#F5F5F5" rx="10" />
    <text x="70" y="370" font-size="16" font-family="Arial" fill="#2E4053" text-anchor="middle">There are three types of definitions:</text>
    <tspan x="70" y="390" font-size="16" font-family="Arial" fill="#2E4053">Explicit, Implicit, and Recursive definitions.</tspan>
  </section>

  <section data-narration="Explicit Definition" data-x="50" data-y="510" data-width="220" data-height="200">
    <rect x="50" y="510" width="220" height="200" fill="#F5F5F5" rx="10" />
    <text x="70" y="520" font-size="16" font-family="Arial" fill="#2E4053" text-anchor="middle">Explicit definition:</text>
    <tspan x="70" y="540" font-size="16" font-family="Arial" fill="#2E4053">The set of all even integers is defined as: {x | x is an integer and x is divisible by 2}</tspan>
  </section>

  <section data-narration="Implicit Definition" data-x="50" data-y="660" data-width="220" data-height="200">
    <rect x="50" y="660" width="220" height="200" fill="#F5F5F5" rx="10" />
    <text x="70" y="670" font-size="16" font-family="Arial" fill="#2E4053" text-anchor="middle">Implicit definition:</text>
    <tspan x="70" y="690" font-size="16" font-family="Arial" fill="#2E4053">A function f is defined implicitly as: f(x) = x^2</tspan>
  </section>

  <section data-narration="Recursive Definition" data-x="50" data-y="810" data-width="220" data-height="200">
    <rect x="50" y="810" width="220" height="200" fill="#F5F5F5" rx="10" />
    <text x="70" y="820" font-size="16" font-family="Arial" fill="#2E4053" text-anchor="middle">Recursive definition:</text>
    <tspan x="70" y="840" font-size="16" font-family="Arial" fill="#2E4053">The Fibonacci sequence is defined recursively as: F(n) = F(n-1) + F(n-2), with initial values F(0) = 0 and F(1) = 1</tspan>
  </section>

  <section data-narration="What is a Proof?" data-x="50" data-y="960" data-width="220" data-height="200">
    <rect x="50" y="960" width="220" height="200" fill="#F5F5F5" rx="10" />
    <text x="70" y="970" font-size="16" font-family="Arial" fill="#2E4053" text-anchor="middle">A proof is a step-by-step argument that demonstrates the validity of a statement.</text>
    <tspan x="70" y="990" font-size="16" font-family="Arial" fill="#2E4053">It is a way to establish the truth of a mathematical statement using logical reasoning and mathematical principles.</tspan>
  </section>

  <section data-narration="Types of Proofs" data-x="50" data-y="1100" data-width="220" data-height="200">
    <rect x="50" y="1100" width="220" height="200" fill="#F5F5F5" rx="10" />
    <text x="70" y="1110" font-size="16" font-family="Arial" fill="#2E4053" text-anchor="middle">There are two types of proofs:</text>
    <tspan x="70" y="1130" font-size="16" font-family="Arial" fill="#2E4053">Direct proof and Indirect proof.</tspan>
  </section>

  <section data-narration="Direct Proof" data-x="50" data-y="1230" data-width="220" data-height="200">
    <rect x="50" y="1230" width="220" height="200" fill="#F5F5F5" rx="10" />
    <text x="70" y="1240" font-size="16" font-family="Arial" fill="#2E4053" text-anchor="middle">Direct proof:</text>
    <tspan x="70" y="1260" font-size="16" font-family="Arial" fill="#2E4053">Prove that the sum of two even integers is even. Let x and y be two even integers. Then x = 2a and y = 2b for some integers a and b. By the definition of even integers, x + y = 2(a + b). Since a + b is an integer, x + y is even.</tspan>
  </section>

  <section data-narration="Indirect Proof" data-x="50" data-y="1350" data-width="220" data-height="200">
    <rect x="50" y="1350" width="220" height="200" fill="#F5F5F5" rx="10" />
    <text x="70" y="1360" font-size="16" font-family="Arial" fill="#2E4053" text-anchor="middle">Indirect proof:</text>
    <tspan x="70" y="1380" font-size="16" font-family="Arial" fill="#2E4053">Prove that the sum of two odd integers is even. Assume that the sum of two odd integers is not even. Then there exists an integer k such that x + y = 2k + 1</tspan>
  </section>

  <footer>
    <text x="50" y="400" font-size="16" font-family="Arial" fill="#2E4053">Educational Diagram by [Your Name]</text>
  </footer>
</svg>