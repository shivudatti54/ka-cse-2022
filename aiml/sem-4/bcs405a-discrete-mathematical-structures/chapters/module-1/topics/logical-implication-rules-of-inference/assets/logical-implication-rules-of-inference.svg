<svg width="420" height="400" viewBox="0 0 420 400" xmlns="https://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2A5F4" stop-opacity="1"/>
    </linearGradient>
    <style>
      .section {
        background: linear-gradient(to bottom, #C7B8EA 0%, #B2A5F4 100%);
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      .section:nth-child(odd) {
        background: linear-gradient(to bottom, #C7B8EA 0%, #B2A5F4 100%);
        border-bottom: 1px solid #E5E5EA;
      }
      .title {
        font-size: 24px;
        font-weight: bold;
        color: #3498db;
        margin-bottom: 10px;
      }
      .footer {
        background-color: #f9f9f9;
        padding: 10px;
        text-align: center;
        border-top: 1px solid #E5E5EA;
      }
      .arrow {
        fill: #3498db;
      }
    </style>
  </defs>
  <g data-topic-id="logical-implication-rules-of-inference">
    <rect x="10" y="10" width="400" height="40" rx="10" fill="#f9f9f9"/>
    <text class="title" x="20" y="30" text-anchor="middle">Logical Implication Rules of Inference</text>
    <rect x="10" y="60" width="400" height="40" rx="10"/>
    <text data-narration="Introduction" x="20" y="70" text-anchor="middle">Definition and Explanation</text>
    <rect x="10" y="110" width="400" height="50" rx="10"/>
    <g data-narration="Modus Ponens">
      <rect x="15" y="115" width="25" height="25" rx="5" fill="#3498db"/>
      <path d="M 20 20 L 35 35" stroke="#3498db" stroke-width="2"/>
      <path d="M 35 35 L 20 20" stroke="#3498db" stroke-width="2"/>
      <text data-narration="If P, then Q (P → Q)" x="25" y="135" text-anchor="middle">If P, then Q</text>
      <text data-narration="Premise 1: P" x="15" y="155" text-anchor="middle">P</text>
      <text data-narration="Premise 2: Q" x="15" y="170" text-anchor="middle">Q</text>
      <text data-narration="∴ Q" x="25" y="180" text-anchor="middle">∴ Q</text>
    </g>
    <rect x="10" y="220" width="400" height="50" rx="10"/>
    <g data-narration="Modus Tollens">
      <rect x="15" y="225" width="25" height="25" rx="5" fill="#3498db"/>
      <path d="M 20 20 L 35 35" stroke="#3498db" stroke-width="2"/>
      <path d="M 35 35 L 20 20" stroke="#3498db" stroke-width="2"/>
      <text data-narration="If P, then Q (P → Q)" x="25" y="240" text-anchor="middle">If P, then Q</text>
      <text data-narration="∼Q" x="15" y="255" text-anchor="middle">∼Q</text>
      <text data-narration="∴ ∼P" x="25" y="265" text-anchor="middle">∴ ∼P</text>
    </g>
    <rect x="10" y="310" width="400" height="40" rx="10"/>
    <text data-narration="Examples" x="20" y="320" text-anchor="middle">Examples</text>
    <rect x="10" y="360" width="400" height="50" rx="10"/>
    <g data-narration="Example 1: Modus Ponens">
      <rect x="15" y="365" width="25" height="25" rx="5" fill="#3498db"/>
      <path d="M 20 20 L 35 35" stroke="#3498db" stroke-width="2"/>
      <path d="M 35 35 L 20 20" stroke="#3498db" stroke-width="2"/>
      <text data-narration="Premise 1: P → Q" x="25" y="380" text-anchor="middle">Premise 1: P → Q</text>
      <text data-narration="Premise 2: P" x="15" y="395" text-anchor="middle">Premise 2: P</text>
      <text data-narration="∴ Q" x="25" y="405" text-anchor="middle">∴ Q</text>
    </g>
    <g data-narration="Example 2: Modus Tollens">
      <rect x="15" y="365" width="25" height="25" rx="5" fill="#3498db"/>
      <path d="M 20 20 L 35 35" stroke="#3498db" stroke-width="2"/>
      <path d="M 35 35 L 20 20" stroke="#3498db" stroke-width="2"/>
      <text data-narration="Premise 1: P → Q" x="25" y="380" text-anchor="middle">Premise 1: P → Q</text>
      <text data-narration="∼Q" x="15" y="395" text-anchor="middle">∼Q</text>
      <text data-narration="∴ ∼P" x="25" y="405" text-anchor="middle">∴ ∼P</text>
    </g>
    <rect x="10" y="410" width="400" height="40" rx="10"/>
    <text data-narration="Practice Exercises" x="20" y="420" text-anchor="middle">Practice Exercises</text>
    <rect x="10" y="460" width="400" height="50" rx="10"/>
    <g data-narration="Example 1: Modus Ponens">
      <rect x="15" y="465" width="25" height="25" rx="5" fill="#3498db"/>
      <path d="M 20 20 L 35 35" stroke="#3498db" stroke-width="2"/>
      <path d="M 35 35 L 20 20" stroke="#3498db" stroke-width="2"/>
      <text data-narration="Premise 1: P" x="15" y="480" text-anchor="middle">Premise 1: P</text>
      <text data-narration="Premise 2: Q" x="15" y="495" text-anchor="middle">Premise 2: Q</text>
      <text data-narration="∴ Q" x="25" y="505" text-anchor="middle">∴ Q</text>
    </g>
    <g data-narration="Example 2: Modus Tollens">
      <rect x="15" y="465" width="25" height="25" rx="5" fill="#3498db"/>
      <path d="M 20 20 L 35 35" stroke="#3498db" stroke-width="2"/>
      <path d="M 35 35 L 20 20" stroke="#3498db" stroke-width="2"/>
      <text data-narration="Premise 1: P" x="15" y="480" text-anchor="middle">Premise 1: P</text>
      <text data-narration="Premise 2: ∼Q" x="15" y="495" text-anchor="middle">Premise 2: ∼Q</text>
      <text data-narration="∴ ∼P" x="25" y="505" text-anchor="middle">∴ ∼P</text>
    </g>
    <rect x="10" y="510" width="400" height="40" rx="10"/>
    <text data-narration="Footer" x="20" y="520" text-anchor="middle">Logical Implication Rules of Inference</text>
  </g>
  <animate id="gradient-animate" attributeName="fill" from="#f9f9f9" to="#C7B8EA" dur="10s" begin="0s" repeatCount="indefinite"/>
  <animate id="title-animate" attributeName="opacity" from="1" to="0" dur="2s" begin="0s"/>
  <animate id="footer-animate" attributeName="opacity" from="1" to="0" dur="2s" begin="10s"/>
</svg>