<svg width="420" height="400" data-topic-id="basic-connectives-and-truth-tables">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Gradient background -->
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)" opacity="0.5" />

  <!-- Title -->
  <g transform="translate(20, 20)">
    <text x="0" y="0" font-size="24" font-family="Arial" fill="#3498DB" text-anchor="start">Basic Connectives and Truth Tables</text>
  </g>

  <!-- Conjunction (AND) section -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="80%" height="40%" fill="#F9F9F9" rx="10" />
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#2E4053" data-narration="Conjunction (AND): Two statements are connected by AND if both statements must be true for the compound statement to be true.">Conjunction (AND)</text>
    <path d="M 10 20 L 90 20" stroke="#3498DB" stroke-width="2" fill="none" />
    <animateTransform attributeName="transform" type="translate" from="0 20" to="90 20" dur="2s" begin="0s" />
    <text x="10" y="20" font-size="16" font-family="Arial" fill="#3498DB">A ∧ B</text>
  </g>

  <!-- Disjunction (OR) section -->
  <g transform="translate(50, 160)">
    <rect x="0" y="0" width="80%" height="40%" fill="#F9F9F9" rx="10" />
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#2E4053" data-narration="Disjunction (OR): Two statements are connected by OR if at least one statement must be true for the compound statement to be true.">Disjunction (OR)</text>
    <path d="M 10 20 L 90 20" stroke="#3498DB" stroke-width="2" fill="none" />
    <animateTransform attributeName="transform" type="translate" from="0 20" to="90 20" dur="2s" begin="0s" />
    <text x="10" y="20" font-size="16" font-family="Arial" fill="#3498DB">A ∨ B</text>
  </g>

  <!-- Negation (NOT) section -->
  <g transform="translate(50, 210)">
    <rect x="0" y="0" width="80%" height="40%" fill="#F9F9F9" rx="10" />
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#2E4053" data-narration="Negation (NOT): A statement is connected by NOT if it is false.">Negation (NOT)</text>
    <path d="M 10 20 L 90 20" stroke="#3498DB" stroke-width="2" fill="none" />
    <animateTransform attributeName="transform" type="translate" from="0 20" to="90 20" dur="2s" begin="0s" />
    <text x="10" y="20" font-size="16" font-family="Arial" fill="#3498DB">¬A</text>
  </g>

  <!-- Exclusive Disjunction (XOR) section -->
  <g transform="translate(50, 260)">
    <rect x="0" y="0" width="80%" height="40%" fill="#F9F9F9" rx="10" />
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#2E4053" data-narration="Exclusive Disjunction (XOR): Two statements are connected by XOR if exactly one statement must be true for the compound statement to be true.">Exclusive Disjunction (XOR)</text>
    <path d="M 10 20 L 90 20" stroke="#3498DB" stroke-width="2" fill="none" />
    <animateTransform attributeName="transform" type="translate" from="0 20" to="90 20" dur="2s" begin="0s" />
    <text x="10" y="20" font-size="16" font-family="Arial" fill="#3498DB">A ⊕ B</text>
  </g>

  <!-- Examples section -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="80%" height="40%" fill="#F9F9F9" rx="10" />
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#2E4053" data-narration="Examples: We can connect two statements using basic connectives to form compound statements.">Examples</text>
    <path d="M 10 20 L 90 20" stroke="#3498DB" stroke-width="2" fill="none" />
    <animateTransform attributeName="transform" type="translate" from="0 20" to="90 20" dur="2s" begin="0s" />
    <text x="10" y="20" font-size="16" font-family="Arial" fill="#3498DB">It is sunny and warm</text>
    <text x="10" y="30" font-size="16" font-family="Arial" fill="#3498DB">It is sunny or warm</text>
    <text x="10" y="40" font-size="16" font-family="Arial" fill="#3498DB">It is not sunny</text>
  </g>

  <!-- Footer -->
  <text x="20" y="360" font-size="16" font-family="Arial" fill="#3498DB" text-anchor="start">Learn more about logic and its applications</text>
</svg>