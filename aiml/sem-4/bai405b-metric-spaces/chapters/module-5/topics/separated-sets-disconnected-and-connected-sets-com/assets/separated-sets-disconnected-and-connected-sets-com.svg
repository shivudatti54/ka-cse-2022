<svg width="420" height="400" data-topic-id="Separated-Sets-Disconnected-And-Connected-Sets-Com">
  <title>Separated Sets, Disconnected and Connected Sets, Components, Connected Subsets of R, Continuous Functions on Connected Sets</title>
  <style>
    body {
      background-color: #87CEEB;
    }
    .section {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #C9E4CA;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    .section[data-narration="Separated Sets"] {
      background-image: linear-gradient(to bottom, #87CEEB, #ACE1AF);
    }
    .section[data-narration="Disconnected Sets"] {
      background-image: linear-gradient(to bottom, #C9E4CA, #B2FFFC);
    }
    .section[data-narration="Connected Sets"] {
      background-image: linear-gradient(to bottom, #87CEEB, #ACE1AF);
    }
    .section[data-narration="Components"] {
      background-image: linear-gradient(to bottom, #ACE1AF, #87CEEB);
    }
    .section[data-narration="Connected Subsets of R"] {
      background-image: linear-gradient(to bottom, #C9E4CA, #B2FFFC);
    }
    .section[data-narration="Continuous Functions on Connected Sets"] {
      background-image: linear-gradient(to bottom, #87CEEB, #ACE1AF);
    }
    .arrow {
      fill: #0097A7;
    }
  </style>
  <g>
    <rect x="10" y="10" width="400" height="350" rx="10" data-narration="title" />
    <rect x="10" y="10" width="400" height="30" rx="10" data-narration="footer" />
    <g>
      <rect x="20" y="50" width="380" height="200" rx="10" data-narration="Separated Sets" />
      <animateTransform attributeName="transform" type="translate" from="0,0" to="-420,0" dur="2s" begin="0s" />
      <text x="20" y="70" font-size="24" font-family="Arial" text-anchor="middle" data-narration="Separated Sets">
        <tspan x="20" y="70">Separated Sets</tspan>
      </text>
      <line x1="20" y1="100" x2="20" y2="150" stroke="#0097A7" stroke-width="2" data-narration="definition" />
      <text x="20" y="120" font-size="18" font-family="Arial" text-anchor="middle" data-narration="example">
        Let X = R with the standard metric. The set A = {0, 1} is separated since ∅ ≠ A ≠ R.
      </text>
    </g>
    <g>
      <rect x="20" y="250" width="380" height="200" rx="10" data-narration="Disconnected Sets" />
      <animateTransform attributeName="transform" type="translate" from="0,0" to="-420,0" dur="2s" begin="1s" />
      <text x="20" y="270" font-size="24" font-family="Arial" text-anchor="middle" data-narration="Disconnected Sets">
        <tspan x="20" y="270">Disconnected Sets</tspan>
      </text>
      <line x1="20" y1="290" x2="20" y2="340" stroke="#0097A7" stroke-width="2" data-narration="definition" />
      <text x="20" y="310" font-size="18" font-family="Arial" text-anchor="middle" data-narration="example">
        Let X = R with the standard metric. The set A = (0, 1) ∪ (1, 2) is disconnected since A = (0, 2) and (0, 1) ∩ (1, 2) = ∅.
      </text>
    </g>
    <g>
      <rect x="20" y="490" width="380" height="200" rx="10" data-narration="Connected Sets" />
      <animateTransform attributeName="transform" type="translate" from="0,0" to="-420,0" dur="2s" begin="2s" />
      <text x="20" y="510" font-size="24" font-family="Arial" text-anchor="middle" data-narration="Connected Sets">
        <tspan x="20" y="510">Connected Sets</tspan>
      </text>
      <line x1="20" y1="530" x2="20" y2="580" stroke="#0097A7" stroke-width="2" data-narration="definition" />
      <text x="20" y="550" font-size="18" font-family="Arial" text-anchor="middle" data-narration="example">
        Let X = R with the standard metric. The set A = (0, 1) is connected since A = (0, 1) and (0, 1) ∩ (0, 1) = (0, 1).
      </text>
    </g>
    <g>
      <rect x="20" y="630" width="380" height="200" rx="10" data-narration="Components" />
      <animateTransform attributeName="transform" type="translate" from="0,0" to="-420,0" dur="2s" begin="3s" />
      <text x="20" y="650" font-size="24" font-family="Arial" text-anchor="middle" data-narration="Components">
        <tspan x="20" y="650">Components</tspan>
      </text>
      <line x1="20" y1="670" x2="20" y2="720" stroke="#0097A7" stroke-width="2" data-narration="definition" />
      <text x="20" y="690" font-size="18" font-family="Arial" text-anchor="middle" data-narration="example">
        A component of a connected set is a maximal connected subset.
      </text>
    </g>
    <g>
      <rect x="20" y="830" width="380" height="200" rx="10" data-narration="Connected Subsets of R" />
      <animateTransform attributeName="transform" type="translate" from="0,0" to="-420,0" dur="2s" begin="4s" />
      <text x="20" y="850" font-size="24" font-family="Arial" text-anchor="middle" data-narration="Connected Subsets of R">
        <tspan x="20" y="850">Connected Subsets of R</tspan>
      </text>
      <line x1="20" y1="870" x2="20" y2="920" stroke="#0097A7" stroke-width="2" data-narration="definition" />
      <text x="20" y="890" font-size="18" font-family="Arial" text-anchor="middle" data-narration="example">
        A connected subset of R is a subset that is connected in the usual Euclidean metric.
      </text>
    </g>
    <g>
      <rect x="20" y="970" width="380" height="200" rx="10" data-narration="Continuous Functions on Connected Sets" />
      <animateTransform attributeName="transform" type="translate" from="0,0" to="-420,0" dur="2s" begin="5s" />
      <text x="20" y="990" font-size="24" font-family="Arial" text-anchor="middle" data-narration="Continuous Functions on Connected Sets">
        <tspan x="20" y="990">Continuous Functions on Connected Sets</tspan>
      </text>
      <line x1="20" y1="1010" x2="20" y2="1060" stroke="#0097A7" stroke-width="2" data-narration="definition" />
      <text x="20" y="1030" font-size="18" font-family="Arial" text-anchor="middle" data-narration="example">
        Let A be a connected set. A continuous function f from A to R is continuous if for every x in A, for every ε > 0, there exists δ > 0 such that |f(x) - f(y)| < ε whenever |x - y| < δ.
      </text>
    </g>
    <g>
      <line x1="20" y1="350" x2="20" y2="450" stroke="#0097A7" stroke-width="2" data-narration="arrow" />
      <line x1="20" y1="550" x2="20" y2="650" stroke="#0097A7" stroke-width="2" data-narration="arrow" />
      <line x1="20" y1="750" x2="20" y2="850" stroke="#0097A7" stroke-width="2" data-narration="arrow" />
      <line x1="20" y1="950" x2="20" y2="1050" stroke="#0097A7" stroke-width="2" data-narration="arrow" />
    </g>
    <g>
      <text x="20" y="400" font-size="18" font-family="Arial" text-anchor="middle" data-narration="section">
        <tspan x="20" y="400">Separated Sets, Disconnected and Connected Sets, Components, Connected Subsets of R, Continuous Functions on Connected Sets</tspan>
      </text>
      <text x="20" y="370" font-size="16" font-family="Arial" text-anchor="middle" data-narration="footer">
        <tspan x="20" y="370">Animated Educational Diagram</tspan>
      </text>
    </g>
  </g>
</svg>