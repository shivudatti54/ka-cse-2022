<svg width="420" height="400" data-topic-id="teaching-learning-process-chalk-and-talk-m" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7b8ea" stop-opacity="1" />
      <stop offset="100%" stop-color="#8c99e9" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" />
  <g transform="translate(20, 20)">
    <g id="section-1" transform="translate(0, 0)">
      <rect x="0" y="0" width="100%" height="50%" fill="#fff" rx="10" />
      <title data-narration="Introduction">Introduction</title>
      <text x="50%" y="25%" font-size="18" text-anchor="middle">The teaching-learning process is a crucial aspect of education that involves the transmission of knowledge from the teacher to the students.</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-50" dur="2s" begin="0s" />
    </g>
    <g id="section-2" transform="translate(0, 70)">
      <rect x="0" y="0" width="100%" height="50%" fill="#fff" rx="10" />
      <title data-narration="Definition">Definition</title>
      <text x="50%" y="25%" font-size="18" text-anchor="middle">The chalk and talk method is a traditional teaching method where the teacher uses a chalkboard or blackboard to write down notes and discuss topics with the students.</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-50" dur="2s" begin="2s" />
    </g>
    <g id="section-3" transform="translate(0, 140)">
      <rect x="0" y="0" width="100%" height="50%" fill="#fff" rx="10" />
      <title data-narration="Characteristics">Characteristics</title>
      <text x="50%" y="25%" font-size="18" text-anchor="middle">The chalk and talk method is a traditional teaching method that has been used for centuries.</text>
      <text x="50%" y="50%" font-size="18" text-anchor="middle">The method relies heavily on verbal communication between the teacher and students.</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-50" dur="2s" begin="4s" />
    </g>
    <g id="section-4" transform="translate(0, 210)">
      <rect x="0" y="0" width="100%" height="50%" fill="#fff" rx="10" />
      <title data-narration="Benefits">Benefits</title>
      <text x="50%" y="25%" font-size="18" text-anchor="middle">The chalk and talk method is a cost-effective way to teach students.</text>
      <text x="50%" y="50%" font-size="18" text-anchor="middle">The method is simple to implement and requires minimal equipment.</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-50" dur="2s" begin="6s" />
    </g>
    <g id="section-5" transform="translate(0, 280)">
      <rect x="0" y="0" width="100%" height="50%" fill="#fff" rx="10" />
      <title data-narration="Limitations">Limitations</title>
      <text x="50%" y="25%" font-size="18" text-anchor="middle">The chalk and talk method can be a passive learning experience for students.</text>
      <text x="50%" y="50%" font-size="18" text-anchor="middle">The method does not allow for much interaction between the teacher and students.</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-50" dur="2s" begin="8s" />
    </g>
    <g id="section-6" transform="translate(0, 350)">
      <rect x="0" y="0" width="100%" height="50%" fill="#fff" rx="10" />
      <title data-narration="Comparison with PowerPoint Presentation">Comparison with PowerPoint Presentation</title>
      <text x="50%" y="25%" font-size="18" text-anchor="middle">A PowerPoint presentation is a type of presentation that uses a software program to create and display visual aids.</text>
      <text x="50%" y="50%" font-size="18" text-anchor="middle">The method allows for more interactivity and engagement between the teacher and students.</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-50" dur="2s" begin="10s" />
    </g>
  </g>
  <g transform="translate(-20, 20)">
    <text x="50%" y="5%" font-size="24" text-anchor="middle" fill="#8c99e9">Teaching-Learning Process: Chalk and Talk Method / PowerPoint Presentation</text>
  </g>
  <g transform="translate(-20, 360)">
    <text x="50%" y="5%" font-size="24" text-anchor="middle" fill="#8c99e9" >2023</text>
  </g>
</svg>