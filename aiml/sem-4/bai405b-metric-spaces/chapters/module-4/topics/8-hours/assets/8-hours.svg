<svg width="420" height="400" data-topic-id="8-hours">
  <!-- Title Section -->
  <defs>
    <linearGradient id="title-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3498db" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="40" fill="url(#title-gradient)"/>
  <text x="20" y="25" font-size="24" fill="#fff" text-anchor="middle">8 Hours</text>

  <!-- Section 1: Introduction -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="80" height="40" fill="#f9f9f9"/>
    <text x="10" y="10" font-size="18" fill="#333" text-anchor="middle" data-narration="A metric space is a set X together with a metric or distance function d that satisfies certain properties.">Metric Space</text>
    <animateTransform attribute="x" begin="0s" dur="2s" type="translate" x="80%" />
  </g>

  <!-- Section 2: Definition of Compactness -->
  <g transform="translate(50, 120)">
    <rect x="0" y="0" width="80" height="40" fill="#f9f9f9"/>
    <text x="10" y="10" font-size="18" fill="#333" text-anchor="middle" data-narration="A metric space X is said to be compact if every open cover of X has a finite subcover.">Compactness</text>
    <animateTransform attribute="x" begin="2s" dur="2s" type="translate" x="80%" />
  </g>

  <!-- Section 3: Definition of an Open Cover -->
  <g transform="translate(50, 180)">
    <rect x="0" y="0" width="80" height="40" fill="#f9f9f9"/>
    <text x="10" y="10" font-size="18" fill="#333" text-anchor="middle" data-narration="An open cover of a set X is a collection of open sets that cover X.">Open Cover</text>
    <animateTransform attribute="x" begin="4s" dur="2s" type="translate" x="80%" />
  </g>

  <!-- Section 4: Definition of a Finite Subcover -->
  <g transform="translate(50, 240)">
    <rect x="0" y="0" width="80" height="40" fill="#f9f9f9"/>
    <text x="10" y="10" font-size="18" fill="#333" text-anchor="middle" data-narration="A finite subcover of an open cover is a finite subset of the open sets that still covers X.">Finite Subcover</text>
    <animateTransform attribute="x" begin="6s" dur="2s" type="translate" x="80%" />
  </g>

  <!-- Section 5: Examples of Compact Metric Spaces -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="80" height="40" fill="#f9f9f9"/>
    <text x="10" y="10" font-size="18" fill="#333" text-anchor="middle" data-narration="The closed unit interval [0, 1] in the standard metric space with the usual distance function d(x, y) = |x - y| is a compact metric space.">Compact Metric Spaces</text>
    <animateTransform attribute="x" begin="8s" dur="2s" type="translate" x="80%" />
  </g>

  <!-- Section 6: Examples of Non-Compact Metric Spaces -->
  <g transform="translate(50, 360)">
    <rect x="0" y="0" width="80" height="40" fill="#f9f9f9"/>
    <text x="10" y="10" font-size="18" fill="#333" text-anchor="middle" data-narration="The open interval (0, 1) in the standard metric space with the usual distance function d(x, y) = |x - y| is not a compact metric space.">Non-Compact Metric Spaces</text>
    <animateTransform attribute="x" begin="10s" dur="2s" type="translate" x="80%" />
  </g>

  <!-- Footer -->
  <rect x="10" y="380" width="400" height="10" fill="#f9f9f9"/>
  <text x="20" y="385" font-size="18" fill="#333" text-anchor="middle">8 Hours</text>
</svg>