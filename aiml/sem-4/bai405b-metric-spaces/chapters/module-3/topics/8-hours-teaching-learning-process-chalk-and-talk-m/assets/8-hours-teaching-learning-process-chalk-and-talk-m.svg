            <text x="10" y="10" font-size="14" font-family="Arial" text-anchor="start">PowerPoint Presentation</text>
            <animate transform="rotate(0) translate(10,280)" begin=".1s" dur="2s" repeat="indefinite"/>
            <a href="#" data-narration="A PowerPoint Presentation is a digital presentation that uses a combination of text, images, and multimedia elements to convey mathematical concepts and ideas."><ellipse x="10" y="290" cx="15" cy="15" rx="5" ry="5" fill="#C5E1F5" stroke="#000" stroke-width="2"/></a>
            <a href="#" data-narration="This method can be easily accessed and updated."><ellipse x="10" y="320" cx="15" cy="15" rx="5" ry="5" fill="#C5E1F5" stroke="#000" stroke-width="2"/></a>
