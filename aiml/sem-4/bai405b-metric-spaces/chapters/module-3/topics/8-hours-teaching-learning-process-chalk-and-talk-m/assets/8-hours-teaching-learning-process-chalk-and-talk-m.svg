<svg width="420" height="400" data-topic-id="teaching-learning-process-chalk-and-talk-m" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
        <linearGradient id=" Pastel Gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C5E1F5" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="100%" height="100%" style="fill: url(#Pastel Gradient)" rx="10"/>
    <g transform="translate(20,20)">
