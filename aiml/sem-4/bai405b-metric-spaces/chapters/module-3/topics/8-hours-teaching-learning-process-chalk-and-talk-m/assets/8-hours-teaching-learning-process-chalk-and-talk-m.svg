            <text x="10" y="10" font-size="14" font-family="Arial" text-anchor="start">Chalk and Talk Method</text>
            <animate transform="rotate(0) translate(10,30)" begin=".1s" dur="2s" repeat="indefinite"/>
            <a href="#" data-narration="Definition is a traditional teaching technique where the teacher writes mathematical concepts and examples on a blackboard or a whiteboard and then discusses them with the students."><ellipse x="10" y="30" cx="15" cy="15" rx="5" ry="5" fill="#C7B8EA" stroke="#000" stroke-width="2"/></a>
            <a href="#" data-narration="This method encourages active participation and engagement of students."><ellipse x="10" y="60" cx="15" cy="15" rx="5" ry="5" fill="#C7B8EA" stroke="#000" stroke-width="2"/></a>
            <a href="#" data-narration="It allows for immediate feedback and clarification of doubts."><ellipse x="10" y="90" cx="15" cy="15" rx="5" ry="5" fill="#C7B8EA" stroke="#000" stroke-width="2"/></a>
            <a href="#" data-narration="It helps in developing problem-solving skills."><ellipse x="10" y="120" cx="15" cy="15" rx="5" ry="5" fill="#C7B8EA" stroke="#000" stroke-width="2"/></a>
