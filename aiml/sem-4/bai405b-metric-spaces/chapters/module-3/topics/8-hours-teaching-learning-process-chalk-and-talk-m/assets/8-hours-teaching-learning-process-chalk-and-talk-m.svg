        <animate transform="rotate(0) translate(10,30)" begin=".1s" dur="2s" repeat="indefinite"/>
        <a href="#" data-narration="Suppose we are teaching the topic of Complete Metric Spaces."><ellipse x="10" y="40" cx="15" cy="15" rx="5" ry="5" fill="#C7B8EA" stroke="#000" stroke-width="2"/></a>
        <a href="#" data-narration="The teacher can write the definition of a metric space on the board and then provide examples to illustrate the concept."><ellipse x="10" y="70" cx="15" cy="15" rx="5" ry="5" fill="#C7B8EA" stroke="#000" stroke-width="2"/></a>
        <a href="#" data-narration="The teacher can then ask questions to test the students' understanding and provide feedback on their responses."><ellipse x="10" y="100" cx="15" cy="15" rx="5" ry="5" fill="#C7B8EA" stroke="#000" stroke-width="2"/></a>
