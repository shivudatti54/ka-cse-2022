        <a href="#" data-narration="In conclusion, the Chalk and Talk Method and PowerPoint Presentation are two popular methods used in mathematics education."><ellipse x="10" y="40" cx="15" cy="15" rx="5" ry="5" fill="#C7B8EA" stroke="#000" stroke-width="2"/></a>
