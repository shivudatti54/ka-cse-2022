<svg width="420" height="400" data-topic-id="21.3.2" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastelColors" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <background>
    <rect width="100%" height="100%" fill="url(#pastelColors)"/>
  </background>
  <title>Network Layer Services and Packet Switching</title>
  <g id="network-layer-section">
    <rect width="100%" height="100px" fill="#FFFFFF" rx="10px"/>
    <g id="routing-service">
      <text x="20%" y="25%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Routing</text>
      <animateTransform attributeName="transform" type="translate" from="-50% -50%" to="0% 0%" begin="0s" dur="2s" repeatCount="indefinite"/>
      <line x1="20%" y1="50%" x2="80%" y2="50%" stroke="#3498DB" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
    </g>
    <g id="fragmentation-service">
      <rect width="100%" height="100px" fill="#FFFFFF" rx="10px"/>
      <text x="20%" y="25%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Fragmentation</text>
      <animateTransform attributeName="transform" type="translate" from="-50% -50%" to="0% 0%" begin="2s" dur="2s" repeatCount="indefinite"/>
      <line x1="20%" y1="50%" x2="80%" y2="50%" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
    </g>
    <g id="reassembly-service">
      <rect width="100%" height="100px" fill="#FFFFFF" rx="10px"/>
      <text x="20%" y="25%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Reassembly</text>
      <animateTransform attributeName="transform" type="translate" from="-50% -50%" to="0% 0%" begin="4s" dur="2s" repeatCount="indefinite"/>
      <line x1="20%" y1="50%" x2="80%" y2="50%" stroke="#8E44AD" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
    </g>
    <g id="error-free-transfer">
      <rect width="100%" height="100px" fill="#FFFFFF" rx="10px"/>
      <text x="20%" y="25%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Error-Free Transfer</text>
      <animateTransform attributeName="transform" type="translate" from="-50% -50%" to="0% 0%" begin="6s" dur="2s" repeatCount="indefinite"/>
      <line x1="20%" y1="50%" x2="80%" y2="50%" stroke="#2ECC71" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
    </g>
  </g>
  <g id="packet-switching-section">
    <rect width="100%" height="100px" fill="#FFFFFF" rx="10px"/>
    <text x="20%" y="25%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Packet Switching</text>
    <animateTransform attributeName="transform" type="translate" from="-50% -50%" to="0% 0%" begin="8s" dur="2s" repeatCount="indefinite"/>
    <line x1="20%" y1="50%" x2="80%" y2="50%" stroke="#2980B9" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
  </g>
  <g id="ipv4-address-section">
    <rect width="100%" height="100px" fill="#FFFFFF" rx="10px"/>
    <text x="20%" y="25%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">IPv4 Address</text>
    <animateTransform attributeName="transform" type="translate" from="-50% -50%" to="0% 0%" begin="10s" dur="2s" repeatCount="indefinite"/>
    <line x1="20%" y1="50%" x2="80%" y2="50%" stroke="#1ABC9C" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
  </g>
  <g id="ipv4-dgram-section">
    <rect width="100%" height="100px" fill="#FFFFFF" rx="10px"/>
    <text x="20%" y="25%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">IPv4 Datagram</text>
    <animateTransform attributeName="transform" type="translate" from="-50% -50%" to="0% 0%" begin="12s" dur="2s" repeatCount="indefinite"/>
    <line x1="20%" y1="50%" x2="80%" y2="50%" stroke="#E67E73" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
  </g>
  <g id="ipv6-section">
    <rect width="100%" height="100px" fill="#FFFFFF" rx="10px"/>
    <text x="20%" y="25%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">IPv6</text>
    <animateTransform attributeName="transform" type="translate" from="-50% -50%" to="0% 0%" begin="14s" dur="2s" repeatCount="indefinite"/>
    <line x1="20%" y1="50%" x2="80%" y2="50%" stroke="#8BC34A" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
  </g>
  <footer>Network Layer Services and Packet Switching</footer>
</svg>