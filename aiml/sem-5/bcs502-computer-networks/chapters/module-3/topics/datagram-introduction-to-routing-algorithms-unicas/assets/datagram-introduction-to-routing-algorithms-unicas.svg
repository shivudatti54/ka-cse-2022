<svg width="420" height="400" data-topic-id="datagram-introduction-to-routing-algorithms-unicast-routing-protocols">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title at top -->
  <text x="50%" y="20%" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#3498db">
    Datagram Introduction to Routing Algorithms Unicast
  </text>
  
  <!-- Section 1: Datagram Introduction -->
  <section data-narration="datagram-introduction">
    <rect x="20" y="100" width="380" height="50" fill="#f9f9f9" rx="10" />
    <text x="25" y="110" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#666">
      Definition: A datagram is a self-contained packet of data that is transmitted independently of other packets.
    </text>
    <text x="25" y="130" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#666">
      Characteristics: Self-contained, independent transmission, no guaranteed delivery.
    </text>
  </section>
  
  <!-- Section 2: Types of Datalograms -->
  <section data-narration="datagram-types">
    <rect x="20" y="170" width="380" height="50" fill="#f9f9f9" rx="10" />
    <text x="25" y="180" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#666">
      IP Datagram: A packet of data that is transmitted using the Internet Protocol (IP).
    </text>
    <text x="25" y="200" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#666">
      ICMP Datagram: A packet of control information that is used to report errors or provide diagnostic information.
    </text>
  </section>
  
  <!-- Section 3: Introduction to Routing Algorithms -->
  <section data-narration="routing-algorithms">
    <rect x="20" y="220" width="380" height="50" fill="#f9f9f9" rx="10" />
    <text x="25" y="230" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#666">
      Definition: Routing algorithms are used to determine the best path for forwarding datagrams between nodes on a network.
    </text>
    <text x="25" y="250" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#666">
      Routing table: A data structure that contains the best known path to a destination network.
    </text>
  </section>
  
  <!-- Section 4: Unicast Routing Protocols -->
  <section data-narration="unicast-routing-protocols">
    <rect x="20" y="280" width="380" height="50" fill="#f9f9f9" rx="10" />
    <text x="25" y="290" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#666">
      Distance-Vector Routing Algorithm: A routing algorithm that uses distance vectors to determine the best path.
    </text>
    <text x="25" y="310" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#666">
      Link-State Routing Algorithm: A routing algorithm that uses link-state information to determine the best path.
    </text>
  </section>
  
  <!-- Smooth animations using <animate> elements -->
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="fill" begin="0s" dur="2s" repeatCount="indefinite">
    <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
    <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1" />
  </animate>
  
  <!-- Clear labels and annotations -->
  <text x="50%" y="50%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#666">
    Datagram
  </text>
  <text x="50%" y="70%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#666">
    Routing Algorithms
  </text>
  <text x="50%" y="90%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#666">
    Unicast
  </text>
  
  <!-- Arrow markers for connections -->
  <polygon points="20,100 380,100 200,50" fill="#666" />
  <polygon points="20,170 380,170 200,120" fill="#666" />
  <polygon points="20,220 380,220 200,170" fill="#666" />
  <polygon points="20,280 380,280 200,230" fill="#666" />
  
  <!-- Footer at bottom -->
  <text x="50%" y="380%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#666">
    &copy; 2023
  </text>
</svg>