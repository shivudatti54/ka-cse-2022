<svg width="420" height="400" data-topic-id="20.1-20.2" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#98B2E3"/>
      <stop offset="100%" stop-color="#C9E4CA"/>
    </linearGradient>
  </defs>
  <title>Network Layer Services and Packet Switching</title>
  <rect x="0" y="0" width="420" height="400" style="fill:linear-gradient(#98B2E3, #C9E4CA)}/>
  <g id="network-layer-services">
    <rect x="50" y="50" width="320" height="200" style="fill:none" rx="10"/>
    <path d="M 100,20 L 140,40 L 180,60" style="stroke:#2F4F7F; stroke-width:2; fill:none"/>
    <text x="120" y="30" style="font-size:18px; font-weight:bold;">Routing</text>
    <text x="120" y="60" style="font-size:16px;">The network layer is responsible for routing packets between different networks.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 70" to="360 190 70" dur="10s" repeatCount="indefinite"/>
    <animate d="M 100,20 L 140,40 L 180,60" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="fragmentation">
    <rect x="50" y="280" width="320" height="120" style="fill:none" rx="10"/>
    <path d="M 100,90 L 140,110 L 180,130" style="stroke:#2F4F7F; stroke-width:2; fill:none"/>
    <text x="120" y="100" style="font-size:18px; font-weight:bold;">Fragmentation</text>
    <text x="120" y="130" style="font-size:16px;">If a packet is larger than the maximum size of a link layer frame, it is fragmented into smaller packets at the source node.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 120" to="360 190 120" dur="10s" repeatCount="indefinite"/>
    <animate d="M 100,90 L 140,110 L 180,130" begin="2s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="reassembly">
    <rect x="50" y="350" width="320" height="90" style="fill:none" rx="10"/>
    <path d="M 100,60 L 140,70 L 180,80" style="stroke:#2F4F7F; stroke-width:2; fill:none"/>
    <text x="120" y="70" style="font-size:18px; font-weight:bold;">Reassembly</text>
    <text x="120" y="90" style="font-size:16px;">The receiving node reassembles the fragmented packets into the original packet at the application layer.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 150" to="360 190 150" dur="10s" repeatCount="indefinite"/>
    <animate d="M 100,60 L 140,70 L 180,80" begin="4s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="source-routing">
    <rect x="50" y="220" width="320" height="80" style="fill:none" rx="10"/>
    <path d="M 100,40 L 140,50 L 180,60" style="stroke:#2F4F7F; stroke-width:2; fill:none"/>
    <text x="120" y="50" style="font-size:18px; font-weight:bold;">Source Routing</text>
    <text x="120" y="70" style="font-size:16px;">The source node specifies the path that the packet should take through the network.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 120" to="360 190 120" dur="10s" repeatCount="indefinite"/>
    <animate d="M 100,40 L 140,50 L 180,60" begin="6s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="quality-of-service">
    <rect x="50" y="100" width="320" height="60" style="fill:none" rx="10"/>
    <path d="M 100,20 L 140,30 L 180,40" style="stroke:#2F4F7F; stroke-width:2; fill:none"/>
    <text x="120" y="30" style="font-size:18px; font-weight:bold;">Quality of Service (QoS)</text>
    <text x="120" y="50" style="font-size:16px;">The network layer provides QoS features to ensure that packets are delivered in a timely and reliable manner.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 70" to="360 190 70" dur="10s" repeatCount="indefinite"/>
    <animate d="M 100,20 L 140,30 L 180,40" begin="8s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="ip-internet-protocol">
    <rect x="320" y="50" width="80" height="200" style="fill:none" rx="10"/>
    <path d="M 340,20 L 380,40 L 420,60" style="stroke:#2F4F7F; stroke-width:2; fill:none"/>
    <text x="350" y="30" style="font-size:18px; font-weight:bold;">IP (Internet Protocol)</text>
    <text x="350" y="60" style="font-size:16px;">IP is the primary protocol used at the network layer.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 420 70" to="360 420 70" dur="10s" repeatCount="indefinite"/>
    <animate d="M 340,20 L 380,40 L 420,60" begin="10s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="igmp-internet-group-management-protocol">
    <rect x="320" y="280" width="80" height="120" style="fill:none" rx="10"/>
    <path d="M 340,90 L 380,110 L 420,130" style="stroke:#2F4F7F; stroke-width:2; fill:none"/>
    <text x="350" y="100" style="font-size:18px; font-weight:bold;">IGMP (Internet Group Management Protocol)</text>
    <text x="350" y="130" style="font-size:16px;">IGMP is used to manage multicast groups and allows devices to join or leave a multicast group dynamically.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 420 120" to="360 420 120" dur="10s" repeatCount="indefinite"/>
    <animate d="M 340,90 L 380,110 L 420,130" begin="12s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="rip-routing-information-protocol">
    <rect x="320" y="350" width="80" height="90" style="fill:none" rx="10"/>
    <path d="M 340,60 L 380,70 L 420,80" style="stroke:#2F4F7F; stroke-width:2; fill:none"/>
    <text x="350" y="70" style="font-size:18px; font-weight:bold;">RIP (Routing Information Protocol)</text>
    <text x="350" y="90" style="font-size:16px;">RIP is a distance-vector routing protocol used to exchange routing information between nodes on a network.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 420 150" to="360 420 150" dur="10s" repeatCount="indefinite"/>
    <animate d="M 340,60 L 380,70 L 420,80" begin="14s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="packet-switching">
    <rect x="50" y="150" width="320" height="50" style="fill:none" rx="10"/>
    <path d="M 100,20 L 140,30 L 180,40" style="stroke:#2F4F7F; stroke-width:2; fill:none"/>
    <text x="120" y="30" style="font-size:18px; font-weight:bold;">Packet Switching</text>
    <text x="120" y="50" style="font-size:16px;">Packet switching is a technique used in the network layer to transmit data in small packets.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 70" to="360 190 70" dur="10s" repeatCount="indefinite"/>
    <animate d="M 100,20 L 140,30 L 180,40" begin="16s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="packet-creation">
    <rect x="50" y="210" width="320" height="60" style="fill:none" rx="10"/>
    <path d="M 100,30 L 140,40 L 180,50" style="stroke:#2F4F7F; stroke-width:2; fill:none"/>
    <text x="120" y="40" style="font-size:18px; font-weight:bold;">Packet Creation</text>
    <text x="120" y="60" style="font-size:16px;">The application layer breaks down data into small packets and assigns a header to each packet.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 120" to="360 190 120" dur="10s" repeatCount="indefinite"/>
    <animate d="M 100,30 L 140,40 L 180,50" begin="18s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="packet-switching-workflow">
    <rect x="50" y="270" width="320" height="80" style="fill:none" rx="10"/>
    <path d="M 100,40 L 140,50 L 180,60" style="stroke:#2F4F7F; stroke-width:2; fill:none"/>
    <text x="120" y="50" style="font-size:18px; font-weight:bold;">Packet Switching Workflow</text>
    <text x="120" y="70" style="font-size:16px;">Each packet is transmitted through the network, where it is routed to its destination node.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 120" to="360 190 120" dur="10s" repeatCount="indefinite"/>
    <animate d="M 100,40 L 140,50 L 180,60" begin="20s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="packet-reassembly">
    <rect x="50" y="330" width="320" height="60" style="fill:none" rx="10"/>
    <path d="M 100,30 L 140,40 L 180,50" style="stroke:#2F4F7F; stroke-width:2; fill:none"/>
    <text x="120" y="40" style="font-size:18px; font-weight:bold;">Packet Reassembly</text>
    <text x="120" y="60" style="font-size:16px;">The receiving node reassembles the fragmented packets into the original packet at the application layer.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 130" to="360 190 130" dur="10s" repeatCount="indefinite"/>
    <animate d="M 100,30 L 140,40 L 180,50" begin="22s" dur="2s" repeatCount="indefinite"/>
  </g>
  <footer>
    <text x="190" y="380" style="font-size:18px; font-weight:bold;">Network Layer Services and Packet Switching</text>
  </footer>
</svg>