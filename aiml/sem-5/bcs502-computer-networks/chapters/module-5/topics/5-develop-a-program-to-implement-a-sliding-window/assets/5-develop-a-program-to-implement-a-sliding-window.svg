<svg width="420" height="400" data-topic-id="sliding-window-protocol" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#33CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0CC0CC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)"/>
  <text x="10" y="20" font-size="24" font-family="Arial" text-anchor="start" fill="#000000">Sliding Window Protocol</text>
  <section data-narration="Introduction">
    <rect x="0" y="50" width="100%" height="20" fill="#FFFFFF" rx="5"/>
    <text x="10" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#000000">The Sliding Window Protocol is a type of flow control mechanism used in data link layer protocols to manage the transmission of data packets between two devices.</text>
  </section>
  <section data-narration="What is Sliding Window Protocol?">
    <rect x="0" y="80" width="100%" height="20" fill="#FFFFFF" rx="5"/>
    <text x="10" y="90" font-size="18" font-family="Arial" text-anchor="start" fill="#000000">The Sliding Window Protocol divides the available bandwidth into fixed-size windows and allows devices to send data packets within these windows.</text>
  </section>
  <section data-narration="How Sliding Window Protocol Works">
    <rect x="0" y="110" width="100%" height="20" fill="#FFFFFF" rx="5"/>
    <text x="10" y="120" font-size="18" font-family="Arial" text-anchor="start" fill="#000000">Here's a step-by-step explanation of how the Sliding Window Protocol works:</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100%,0" dur="2s" begin="0s" delay="0s"/>
    <rect x="100" y="120" width="20" height="20" fill="#FFFFFF" rx="5" opacity="1"/>
    <rect x="120" y="120" width="20" height="20" fill="#FFFFFF" rx="5" opacity="0"/>
    <text x="140" y="130" font-size="12" font-family="Arial" text-anchor="start" fill="#000000">Window Establishment</text>
    <rect x="100" y="150" width="20" height="20" fill="#FFFFFF" rx="5" opacity="1"/>
    <rect x="120" y="150" width="20" height="20" fill="#FFFFFF" rx="5" opacity="0"/>
    <text x="140" y="160" font-size="12" font-family="Arial" text-anchor="start" fill="#000000">Packet Transmission</text>
    <rect x="100" y="180" width="20" height="20" fill="#FFFFFF" rx="5" opacity="1"/>
    <rect x="120" y="180" width="20" height="20" fill="#FFFFFF" rx="5" opacity="0"/>
    <text x="140" y="190" font-size="12" font-family="Arial" text-anchor="start" fill="#000000">WindowSize Reduction</text>
    <rect x="100" y="210" width="20" height="20" fill="#FFFFFF" rx="5" opacity="1"/>
    <rect x="120" y="210" width="20" height="20" fill="#FFFFFF" rx="5" opacity="0"/>
    <text x="140" y="220" font-size="12" font-family="Arial" text-anchor="start" fill="#000000">Window Movement and Packet Transmission</text>
  </section>
  <section data-narration="Example Program Implementation">
    <rect x="0" y="240" width="100%" height="20" fill="#FFFFFF" rx="5"/>
    <text x="10" y="250" font-size="18" font-family="Arial" text-anchor="start" fill="#000000">Below is a simple Python program that implements a Sliding Window Protocol:</text>
    <pre x="10" y="270" font-size="14" font-family="Courier" text-anchor="start" fill="#000000">
import socket
import time

WINDOW_SIZE = 5
BUFFER_SIZE = 10

# Constants
WINDOW_SIZE = 5
BUFFER_SIZE = 10

# Create a socket
sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)

# Connect to the server
sock.connect(("localhost", 8080))

# Send data packets
for i in range(BUFFER_SIZE):
  packet = str(i) + "\n"
  sock.send(packet.encode())

# Close the socket
sock.close()
</pre>
  </section>
  <section data-narration="Key Concepts">
    <rect x="0" y="290" width="100%" height="20" fill="#FFFFFF" rx="5"/>
    <text x="10" y="300" font-size="18" font-family="Arial" text-anchor="start" fill="#000000">Key Concepts:</text>
    <unorderedlist>
      <listitem>
        <term>Sliding Window Protocol</term>
        <description>A type of flow control mechanism used in data link layer protocols to manage the transmission of data packets between two devices.</description>
      </listitem>
      <listitem>
        <term>Window Establishment</term>
        <description>The process of establishing the initial window size between the sender and receiver.</description>
      </listitem>
      <listitem>
        <term>Packet Transmission</term>
        <description>The process of sending data packets within the established window size.</description>
      </listitem>
      <listitem>
        <term>WindowSize Reduction</term>
        <description>The process of reducing the window size in response to negative acknowledgements or timeouts.</description>
      </listitem>
    </unorderedlist>
  </section>
  <footer>
    <text x="10" y="320" font-size="18" font-family="Arial" text-anchor="start" fill="#000000">Educational Resources</text>
  </footer>
</svg>