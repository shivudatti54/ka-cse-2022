<svg
    width="420"
    height="400"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 420 400"
    data-topic-id="implement-an-ether-net-lan-using-n-nodes-and-set"
    style="background: linear-gradient(to bottom, #4F69F9, #3B5998);">

    <!-- Title -->
    <rect
        x="0"
        y="0"
        width="100%"
        height="10%"
        fill="#2C6BC0"
        rx="5"
        transform="rotate(45 10% 50%)"
        style="font-size: 24px; font-weight: bold; text-align: center; color: white;"

    </rect>

    <!-- Section 1: Connecting Devices -->
    <g
        transform="translate(10%, 15%)"
        fill="#F7F7F7"
        opacity="0.8"
    >
        <rect
            x="0"
            y="0"
            width="100%"
            height="20%"
            rx="10"
            fill="#F7F7F7"
            style="pointer-events: none;"
        />
        <path
            d="M 20% 20% L 80% 20% L 80% 60% L 20% 60%"
            stroke="#2C6BC0"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
        />
        <text
            x="50%"
            y="50%"
            fill="#666"
            style="font-size: 16px; text-align: center;"
        >
            Connect devices to the LAN.
        </text>
    </g>

    <!-- Section 2: Configuring Switches and Routers -->
    <g
        transform="translate(10%, 40%)"
        fill="#F7F7F7"
        opacity="0.8"
    >
        <rect
            x="0"
            y="0"
            width="100%"
            height="20%"
            rx="10"
            fill="#F7F7F7"
            style="pointer-events: none;"
        />
        <path
            d="M 20% 20% L 80% 20% L 80% 60% L 20% 60%"
            stroke="#2C6BC0"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
        />
        <text
            x="50%"
            y="50%"
            fill="#666"
            style="font-size: 16px; text-align: center;"
        >
            Configure switches and routers to forward traffic.
        </text>
    </g>

    <!-- Section 3: Setting Up Traffic Nodes -->
    <g
        transform="translate(10%, 70%)"
        fill="#F7F7F7"
        opacity="0.8"
    >
        <rect
            x="0"
            y="0"
            width="100%"
            height="20%"
            rx="10"
            fill="#F7F7F7"
            style="pointer-events: none;"
        />
        <path
            d="M 20% 20% L 80% 20% L 80% 60% L 20% 60%"
            stroke="#2C6BC0"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
        />
        <text
            x="50%"
            y="50%"
            fill="#666"
            style="font-size: 16px; text-align: center;"
        >
            Set up traffic nodes to simulate heavy traffic.
        </text>
    </g>

    <!-- Section 4: Monitoring Network Performance -->
    <g
        transform="translate(10%, 100%)"
        fill="#F7F7F7"
        opacity="0.8"
    >
        <rect
            x="0"
            y="0"
            width="100%"
            height="20%"
            rx="10"
            fill="#F7F7F7"
            style="pointer-events: none;"
        />
        <path
            d="M 20% 20% L 80% 20% L 80% 60% L 20% 60%"
            stroke="#2C6BC0"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
        />
        <text
            x="50%"
            y="50%"
            fill="#666"
            style="font-size: 16px; text-align: center;"
        >
            Monitor network performance.
        </text>
    </g>

    <!-- Congestion Window -->
    <g
        transform="translate(10%, 130%)"
        fill="#F7F7F7"
        opacity="0.8"
    >
        <rect
            x="0"
            y="0"
            width="100%"
            height="20%"
            rx="10"
            fill="#F7F7F7"
            style="pointer-events: none;"
        />
        <path
            d="M 20% 20% L 80% 20% L 80% 60% L 20% 60%"
            stroke="#2C6BC0"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
        />
        <text
            x="50%"
            y="50%"
            fill="#666"
            style="font-size: 16px; text-align: center;"
        >
            Congestion Window: The amount of data that can be transmitted
            without causing network congestion.
        </text>
    </g>

    <!-- Animation -->
    <animate
        attributeName="opacity"
        type="sequential"
        begin="0s"
        dur="4s"
        fill="freeze"
    >
        <animate-transform
            attributeName="transform"
            type="rotate"
            from="0 10% 50%"
            to="45 10% 50%"
            dur="1s"
        />
    </animate>

    <!-- Footer -->
    <rect
        x="0"
        y="380"
        width="100%"
        height="10%"
        fill="#2C6BC0"
        rx="5"
        style="font-size: 12px; font-weight: bold; text-align: center; color: white;"
    >
        &copy; 2023
    </rect>

</svg>