<svg width="420" height="400" data-topic-id="packet-loss-and-drops" xmlns="http://www.w3.org/2000/svg">
  <title>And Find The Number Of Packets Dropped</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="indigo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3b5998" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>
  <text x="10" y="20" font-size="24" fill="#2f4f7f">Packet Loss and Drops</text>
  <rect x="10" y="60" width="100%" height="150" fill="none" stroke="#d9d9d9" stroke-width="2"/>
  <g transform="translate(10,70)">
    <rect x="0" y="0" width="200" height="150" fill="none" stroke="#d9d9d9" stroke-width="2"/>
    <rect x="0" y="0" width="100" height="50" fill="#f7dc6f" rx="10"/>
    <text x="20" y="20" font-size="18" fill="#2f4f7f">What is Packet Loss?</text>
    <animate transform="translate(20,0)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(220,70)">
    <rect x="0" y="0" width="200" height="150" fill="none" stroke="#d9d9d9" stroke-width="2"/>
    <rect x="0" y="0" width="100" height="50" fill="#f7dc6f" rx="10"/>
    <text x="20" y="20" font-size="18" fill="#2f4f7f">What is Packet Drop?</text>
    <animate transform="translate(20,0)" begin="2s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10,230)">
    <g>
      <polyline points="100,200 150,220 200,240" stroke="#3b5998" stroke-width="4"/>
      <text x="120" y="240" font-size="18" fill="#2f4f7f">Causes of Packet Drops</text>
      <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <polyline points="100,200 150,220 200,240" stroke="#6c5ce7" stroke-width="4"/>
      <text x="120" y="240" font-size="18" fill="#2f4f7f">Effects of Packet Drops</text>
      <animateTransform attributeName="transform" type="translate" begin="2s" dur="2s" repeatCount="indefinite"/>
    </g>
  </g>
  <g transform="translate(220,230)">
    <g>
      <polyline points="100,200 150,220 200,240" stroke="#3b5998" stroke-width="4"/>
      <text x="120" y="240" font-size="18" fill="#2f4f7f">Types of Packet Drops</text>
      <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <polyline points="100,200 150,220 200,240" stroke="#6c5ce7" stroke-width="4"/>
      <text x="120" y="240" font-size="18" fill="#2f4f7f">Random Packet Drop</text>
      <animateTransform attributeName="transform" type="translate" begin="2s" dur="2s" repeatCount="indefinite"/>
    </g>
  </g>
  <g transform="translate(10,280)">
    <rect x="0" y="0" width="100%" height="150" fill="none" stroke="#d9d9d9" stroke-width="2"/>
    <text x="10" y="20" font-size="18" fill="#2f4f7f">Conclusion</text>
  </g>
  <footer>
    <text x="10" y="350" font-size="18" fill="#2f4f7f">And Find The Number Of Packets Dropped</text>
