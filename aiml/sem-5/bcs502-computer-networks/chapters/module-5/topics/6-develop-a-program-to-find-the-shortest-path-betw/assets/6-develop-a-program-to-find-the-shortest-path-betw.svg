<svg width="420" height="400" data-topic-id="shortest-path-algorithms">
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" />
  <rect x="0" y="0" width="100%" height="20" fill="#343A40" />
  <rect x="0" y="220" width="100%" height="20" fill="#343A40" />

  <g transform="translate(10, 20)">
    <text data-narration="What are Shortest Path Algorithms?" x="0" y="5" font-size="20" fill="#66CCCC" text-anchor="middle" />
  </g>

  <g transform="translate(10, 50)">
    <rect x="0" y="0" width="100%" height="20" fill="#343A40" />
    <text data-narration="A shortest path algorithm is a technique used to find the minimum-weight path between two nodes in a weighted graph or network. These algorithms are essential in computer networks, as they help in optimizing network design, traffic routing, and fault-tolerant routing." x="0" y="5" font-size="14" fill="#66CCCC" text-anchor="middle" />
    <animate transform="translate(0, 20)" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>

  <g transform="translate(10, 80)">
    <rect x="0" y="0" width="100%" height="20" fill="#343A40" />
    <text data-narration="The Bellman-Ford algorithm is a dynamic programming algorithm for finding the shortest path from a source vertex to all other vertices in a weighted graph. It can handle negative-weight edges, making it suitable for finding the shortest path in graphs with negative cycles." x="0" y="5" font-size="14" fill="#66CCCC" text-anchor="middle" />
    <animate transform="translate(0, 20)" begin="0s" dur="2s" repeatCount="indefinite" />
    <path d="M 10, 100 L 50, 150" stroke="#C7B8EA" stroke-width="2" fill="none" />
  </g>

  <g transform="translate(10, 120)">
    <rect x="0" y="0" width="100%" height="20" fill="#343A40" />
    <text data-narration="1. Initialize the distance to the source vertex as 0, and all other vertices as infinity." x="0" y="5" font-size="14" fill="#66CCCC" text-anchor="middle" />
    <animate transform="translate(0, 20)" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>

  <g transform="translate(10, 160)">
    <rect x="0" y="0" width="100%" height="20" fill="#343A40" />
    <text data-narration="2. Relax the edges repeatedly, updating the distance to each vertex if a shorter path is found." x="0" y="5" font-size="14" fill="#66CCCC" text-anchor="middle" />
    <animate transform="translate(0, 20)" begin="0s" dur="2s" repeatCount="indefinite" />
    <path d="M 10, 170 L 60, 200" stroke="#C7B8EA" stroke-width="2" fill="none" />
  </g>

  <g transform="translate(10, 200)">
    <rect x="0" y="0" width="100%" height="20" fill="#343A40" />
    <text data-narration="3. Repeat step 2 for all vertices (except the source vertex) until no further updates are made." x="0" y="5" font-size="14" fill="#66CCCC" text-anchor="middle" />
    <animate transform="translate(0, 20)" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>

  <g transform="translate(10, 240)">
    <rect x="0" y="0" width="100%" height="20" fill="#343A40" />
    <text data-narration="The Bellman-Ford algorithm can handle negative-weight edges, making it suitable for finding the shortest path in graphs with negative cycles." x="0" y="5" font-size="14" fill="#66CCCC" text-anchor="middle" />
    <animate transform="translate(0, 20)" begin="0s" dur="2s" repeatCount="indefinite" />
    <path d="M 10, 250 L 100, 300" stroke="#C7B8EA" stroke-width="2" fill="none" />
  </g>

  <g transform="translate(10, 280)">
    <rect x="0" y="0" width="100%" height="20" fill="#343A40" />
    <text data-narration="Path Vector Routing Algorithm" x="0" y="5" font-size="14" fill="#66CCCC" text-anchor="middle" />
    <animate transform="translate(0, 20)" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>

  <g transform="translate(10, 310)">
    <rect x="0" y="0" width="100%" height="20" fill="#343A40" />
    <text data-narration="The path vector routing algorithm is used to find the minimum-weight path between two nodes in a weighted graph or network." x="0" y="5" font-size="14" fill="#66CCCC" text-anchor="middle" />
    <animate transform="translate(0, 20)" begin="0s" dur="2s" repeatCount="indefinite" />
    <path d="M 10, 320 L 150, 350" stroke="#C7B8EA" stroke-width="2" fill="none" />
  </g>

  <rect x="0" y="320" width="100%" height="20" fill="#343A40" />
  <text data-narration="Conclusion" x="0" y="5" font-size="14" fill="#66CCCC" text-anchor="middle" />
  <animate transform="translate(0, 20)" begin="0s" dur="2s" repeatCount="indefinite" />
</svg>