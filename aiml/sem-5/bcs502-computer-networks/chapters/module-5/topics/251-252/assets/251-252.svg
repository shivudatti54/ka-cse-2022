<svg width="420" height="400" data-topic-id="computer-networks-fundamentals-252" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Title -->
  <text x="150" y="20" font-size="24" font-family="Arial" font-weight="bold" fill="#2F4F7F">
    Computer Networks Fundamentals
  </text>

  <!-- Section 1: Network Fundamentals -->
  <section data-narration="Network Fundamentals">
    <rect x="50" y="80" width="320" height="50" fill="#fff" rx="10"/>
    <text x="100" y="90" font-size="18" font-family="Arial" fill="#2F4F7F">
      A computer network is a collection of interconnected devices that can communicate with each other to share resources and exchange information.
    </text>
  </section>

  <!-- Section 2: Types of Computer Networks -->
  <section data-narration="Types of Computer Networks">
    <rect x="50" y="130" width="320" height="220" fill="#fff" rx="10"/>
    <g transform="rotate(45 170 140)">
      <path d="M 170 140 L 170 260 Z"/>
      <text x="170" y="200" font-size="18" font-family="Arial" fill="#2F4F7F">
        Local Area Network (LAN)
      </text>
      <text x="170" y="180" font-size="18" font-family="Arial" fill="#2F4F7F">
        Metropolitan Area Network (MAN)
      </text>
      <text x="170" y="160" font-size="18" font-family="Arial" fill="#2F4F7F">
        Wireless Network (WLAN)
      </text>
    </g>
    <g transform="rotate(45 170 140 -45)">
      <path d="M 170 140 L 170 260 Z"/>
      <text x="170" y="200" font-size="18" font-family="Arial" fill="#2F4F7F">
        Wide Area Network (WAN)
      </text>
    </g>
  </section>

  <!-- Section 3: Network Topology -->
  <section data-narration="Network Topology">
    <rect x="50" y="360" width="320" height="100" fill="#fff" rx="10"/>
    <g transform="translate(150 380) rotate(90 0 0)">
      <path d="M 0 0 L 100 0 Z"/>
      <path d="M 100 0 L 200 0 Z"/>
      <text x="100" y="20" font-size="18" font-family="Arial" fill="#2F4F7F">
        Bus Topology
      </text>
      <text x="200" y="20" font-size="18" font-family="Arial" fill="#2F4F7F">
        Star Topology
      </text>
      <text x="100" y="50" font-size="18" font-family="Arial" fill="#2F4F7F">
        Ring Topology
      </text>
      <text x="200" y="50" font-size="18" font-family="Arial" fill="#2F4F7F">
        Mesh Topology
      </text>
    </g>
  </section>

  <!-- Section 4: Network Devices -->
  <section data-narration="Network Devices">
    <rect x="50" y="500" width="320" height="150" fill="#fff" rx="10"/>
    <g transform="translate(120 520)">
      <path d="M 0 0 L 50 0 Z"/>
      <path d="M 50 0 L 100 0 Z"/>
      <text x="50" y="20" font-size="18" font-family="Arial" fill="#2F4F7F">
        Router
      </text>
      <text x="100" y="20" font-size="18" font-family="Arial" fill="#2F4F7F">
        Switch
      </text>
      <text x="50" y="50" font-size="18" font-family="Arial" fill="#2F4F7F">
        Hub
      </text>
      <text x="100" y="50" font-size="18" font-family="Arial" fill="#2F4F7F">
        Bridge
      </text>
    </g>
  </section>

  <!-- Section 5: Network Protocols -->
  <section data-narration="Network Protocols">
    <rect x="50" y="650" width="320" height="200" fill="#fff" rx="10"/>
    <g transform="translate(150 670)">
      <path d="M 0 0 L 50 0 Z"/>
      <path d="M 50 0 L 100 0 Z"/>
      <text x="50" y="20" font-size="18" font-family="Arial" fill="#2F4F7F">
      Transport Layer Protocols
      </text>
      <text x="100" y="20" font-size="18" font-family="Arial" fill="#2F4F7F">
      Internet Layer Protocols
      </text>
    </g>
  </section>

  <!-- Footer -->
  <text x="150" y="390" font-size="18" font-family="Arial" fill="#2F4F7F">
    Created by [Your Name]
  </text>
</svg>