<svg width="420" height="400" data-topic-id="error-detecting-code-using-crc-ccitt-16-bits">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient-background" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4567b7" stop-opacity="1" />
      <stop offset="100%" stop-color="#6495ed" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient-background)" rx="10" />
  <!-- Title -->
  <text x="50%" y="50" font-size="36" font-family="Arial, sans-serif" text-anchor="middle" fill="#ffffff" opacity="0.9">
    Error Detecting Code Using CRC-CCITT (16-bits)
  </text>
  <!-- Section 1: Definition of CRC-CCITT -->
  <rect x="50%" y="150" width="300" height="100" fill="#ffffff" rx="10" />
  <text x="50%" y="170" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#000000" data-narration="The CRC-CCITT algorithm is a method of detecting errors in digital data transmission. It is a type of checksum algorithm that uses a polynomial to generate a digital signature from the data, which can be used to detect errors.">
    Definition of CRC-CCITT
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="0s" />
  <animate attribute="opacity" from="1" to="0" dur="10s" begin="0s" />
  <!-- Section 2: How CRC-CCITT Works -->
  <rect x="50%" y="280" width="300" height="100" fill="#ffffff" rx="10" />
  <text x="50%" y="300" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#000000" data-narration="The CRC-CCITT algorithm works as follows:

  1.  Data Preparation: The data to be transmitted is divided into a series of blocks.
  2.  Polynomial Generation: A polynomial is generated based on the data block. The polynomial is used to generate a digital signature.
  3.  Digital Signature Generation: The digital signature is generated by multiplying the polynomial with the data block.
  4.  Digital Signature Calculation: The digital signature is calculated by performing bitwise XOR operations between the data block and the generated digital signature.">
    How CRC-CCITT Works
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="0.5s" />
  <animate attribute="opacity" from="1" to="0" dur="10s" begin="0.5s" />
  <!-- Section 3: 16-bit CRC-CCITT Algorithm -->
  <rect x="50%" y="410" width="300" height="100" fill="#ffffff" rx="10" />
  <text x="50%" y="430" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#000000" data-narration="The 16-bit CRC-CCITT algorithm is used for detecting errors in digital data transmission. The algorithm works as follows:

  -  Algorithm Steps:
    1.  Initialize the CRC to 0.
    2.  For each bit in the data block:
        - If the bit is 1:
          - XOR the CRC with the polynomial (0x1021 in 16-bit CRC-CCITT).
        - Else:
          - XOR the CRC with 0.
  3.  The final CRC value is the digital signature.">
    16-bit CRC-CCITT Algorithm
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="1s" />
  <animate attribute="opacity" from="1" to="0" dur="10s" begin="1s" />
  <!-- Section 4: Example of 16-bit CRC-CCITT Algorithm -->
  <rect x="50%" y="550" width="300" height="100" fill="#ffffff" rx="10" />
  <text x="50%" y="570" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#000000" data-narration="Here is an example of the 16-bit CRC-CCITT algorithm:

| Data Bit | CRC Bit |
| -------- | ------- |
| 0        | 0       |
| 1        | 0       |
| 0        | 1       |
| 1        | 0       |
| ...      | ...     |
  ">
    Example of 16-bit CRC-CCITT Algorithm
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="1.5s" />
  <animate attribute="opacity" from="1" to="0" dur="10s" begin="1.5s" />
  <!-- Section 5: Polynomial (0x1021) -->
  <rect x="50%" y="680" width="300" height="100" fill="#ffffff" rx="10" />
  <text x="50%" y="700" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#000000" data-narration="The polynomial used in the 16-bit CRC-CCITT algorithm is 0x1021.">
    Polynomial (0x1021)
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="2s" />
  <animate attribute="opacity" from="1" to="0" dur="10s" begin="2s" />
  <!-- Section 6: Key Concepts -->
  <rect x="50%" y="820" width="300" height="100" fill="#ffffff" rx="10" />
  <text x="50%" y="840" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#000000" data-narration="Key Concepts:

  -  Checksum: A digital signature generated from the data to be transmitted.
  -  Polynomial: A mathematical expression used to generate the digital signature.
  -  Digital Signature: A unique signature generated from the data.">
    Key Concepts
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="2.5s" />
  <animate attribute="opacity" from="1" to="0" dur="10s" begin="2.5s" />
  <!-- Footer -->
  <rect x="0" y="940" width="420" height="20" fill="#000000" rx="10" />
  <text x="50%" y="960" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#ffffff">
    Powered by SVG Educational
  </text>
</svg>