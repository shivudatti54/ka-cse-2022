    <text x="10" y="140" font-size="18" fill="#C7B8EA" text-anchor="start">Practical Component of IPCC</text>
  </g>

  <section data-narration="What is a Point-to-Point Network?">
    <g transform="translate(50, 150)">
      <rect width="200" height="100" fill="#2E4053" rx="5"/>
      <text x="10" y="20" font-size="18" fill="#C7B8EA" text-anchor="start">A point-to-point network is a type of network that connects two devices directly, without any intermediate devices.</text>
      <text x="10" y="140" font-size="18" fill="#C7B8EA" text-anchor="start">In a point-to-point network, each device is connected to another device using a physical link, such as a cable or wireless link.</text>
    </g>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 200" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>

  <section data-narration="What are Duplex Links?">
    <g transform="translate(50, 250)">
      <rect width="200" height="100" fill="#2E4053" rx="5"/>
      <text x="10" y="20" font-size="18" fill="#C7B8EA" text-anchor="start">A duplex link is a type of link that allows data to be transmitted in both directions, simultaneously.</text>
      <text x="10" y="140" font-size="18" fill="#C7B8EA" text-anchor="start">Duplex links have two transmission paths, one for transmitting data and another for receiving data.</text>
    </g>
    <animateTransform attributeName="transform" type="translate" from="0 250" to="0 300" begin="2s" dur="2s" repeatCount="indefinite"/>
  </section>

  <section data-narration="Components of a Point-to-Point Network">
    <g transform="translate(50, 350)">
      <rect width="200" height="100" fill="#2E4053" rx="5"/>
      <text x="10" y="20" font-size="18" fill="#C7B8EA" text-anchor="start">A point-to-point network consists of the following components:</text>
      <text x="10" y="140" font-size="18" fill="#C7B8EA" text-anchor="start">- Nodes: These are the devices that make up the network, such as computers, routers, or switches.</text>
      <text x="10" y="160" font-size="18" fill="#C7B8EA" text-anchor="start">- Links: These are the physical connections between nodes, such as cables or wireless links.</text>
      <text x="10" y="180" font-size="18" fill="#C7B8EA" text-anchor="start">- Network Interface Cards (NICs): These are the cards installed in each node that allow it to connect to the network.</text>
    </g>
    <animateTransform attributeName="transform" type="translate" from="0 350" to="0 400" begin="4s" dur="2s" repeatCount="indefinite"/>
  </section>

  <section data-narration="Experiment: Implementing a Point-to-Point Network with Duplex Links">
