      <text x="10" y="20" font-size="18" fill="#C7B8EA" text-anchor="start">In this experiment, we will implement a point-to-point network with duplex links between three nodes.</text>
      <text x="10" y="140" font-size="18" fill="#C7B8EA" text-anchor="start">The nodes will be connected using duplex links, which will allow for fast and reliable data transfer.</text>
    </g>
