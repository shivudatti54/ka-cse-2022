<svg width="420" height="400" data-topic-id="121-122">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2A8E6" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)" />
  
  <!-- Section 1: Introduction to Error Detection and Correction -->
  <section data-narration="Introduction to Error Detection and Correction">
    <rect x="0" y="100" width="420" height="50" fill="#2F4F7F" rx="5" />
    <text x="10" y="30" font-size="24" font-family="Arial, sans-serif" fill="#FFFFFF">Error Detection and Correction</text>
    <animate transform="translate(0, 50) rotate(45)" begin="0s" dur="2s" repeat="forever" />
  </section>
  
  <!-- Section 2: Why is Error Detection and Correction Important? -->
  <section data-narration="Why is Error Detection and Correction Important?">
    <rect x="0" y="170" width="420" height="50" fill="#2F4F7F" rx="5" />
    <text x="10" y="90" font-size="24" font-family="Arial, sans-serif" fill="#FFFFFF">Prevents data corruption and loss</text>
    <animate transform="translate(0, 100) rotate(90)" begin="2s" dur="2s" repeat="forever" />
  </section>
  
  <!-- Section 3: Types of Errors -->
  <section data-narration="Types of Errors">
    <rect x="0" y="240" width="420" height="50" fill="#2F4F7F" rx="5" />
    <text x="10" y="170" font-size="24" font-family="Arial, sans-serif" fill="#FFFFFF">Bit errors, packet errors, and forward errors</text>
    <animate transform="translate(0, 120) rotate(135)" begin="4s" dur="2s" repeat="forever" />
  </section>
  
  <!-- Section 4: Block Coding -->
  <section data-narration="Block Coding">
    <rect x="0" y="310" width="420" height="50" fill="#2F4F7F" rx="5" />
    <text x="10" y="230" font-size="24" font-family="Arial, sans-serif" fill="#FFFFFF">Divide data into blocks, add error-checking codes</text>
    <animate transform="translate(0, 160) rotate(45)" begin="6s" dur="2s" repeat="forever" />
  </section>
  
  <!-- Section 5: Types of Block Codes -->
  <section data-narration="Types of Block Codes">
    <rect x="0" y="380" width="420" height="50" fill="#2F4F7F" rx="5" />
    <text x="10" y="310" font-size="24" font-family="Arial, sans-serif" fill="#FFFFFF">Single-error-correcting, double-error-correcting, triple-error-correcting</text>
    <animate transform="translate(0, 240) rotate(90)" begin="8s" dur="2s" repeat="forever" />
  </section>
  
  <!-- Section 6: Example -->
  <section data-narration="Example">
    <rect x="0" y="450" width="420" height="50" fill="#2F4F7F" rx="5" />
    <text x="10" y="370" font-size="24" font-family="Arial, sans-serif" fill="#FFFFFF">Divide data into blocks, add error-checking codes, and transmit</text>
    <animate transform="translate(0, 300) rotate(135)" begin="10s" dur="2s" repeat="forever" />
  </section>
  
  <!-- Footer -->
  <footer>
    <text x="10" y="420" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">Error Detection and Correction</text>
  </footer>
</svg>