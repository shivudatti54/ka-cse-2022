<svg width="420" height="400" data-topic-id="error-detection-correction-101-104" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xml:space="preserve">
  <style>
    /* Set styles for the entire SVG */
    svg {
      background-image: linear-gradient(to bottom, #6f7d8f, #a6e6e6);
      color: #3b5998;
      font-family: Arial, sans-serif;
    }

    /* Set styles for sections */
    .section {
      padding: 10px;
      margin-bottom: 20px;
      border-bottom: 1px solid #ddd;
    }

    /* Set styles for animation */
    animate {
      fill: transparent;
      stroke: #3b5998;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>

  <!-- Title -->
  <g transform="translate(10, 10)">
    <text x="0" y="20" font-size="24" font-weight="bold" text-anchor="middle">Error Detection and Correction</text>
  </g>

  <!-- Section 1: Introduction -->
  <g transform="translate(0, 50)">
    <rect x="0" y="0" width="100%" height="20" rx="10" style="fill: #fff" />
    <rect x="0" y="20" width="100%" height="20" rx="10" style="fill: #fff" />
    <animate transform="rotate(360 50 50)" begin="0s" duration="2s" repeat="-1" />
    <g>
      <text x="50" y="30" font-size="16" font-weight="bold" data-narration="Introduction to Error Detection and Correction">Error Detection and Correction</text>
      <text x="50" y="60" font-size="14" data-narration="Error detection is the process of identifying errors in data without correcting them.">Error Detection</text>
    </g>
  </g>

  <!-- Section 2: Errors in Data Transmission -->
  <g transform="translate(0, 130)">
    <rect x="0" y="0" width="100%" height="20" rx="10" style="fill: #fff" />
    <rect x="0" y="20" width="100%" height="20" rx="10" style="fill: #fff" />
    <animate transform="rotate(360 50 50)" begin="0s" duration="2s" repeat="-1" />
    <g>
      <text x="50" y="30" font-size="16" font-weight="bold" data-narration="Errors in Data Transmission">Errors in Data Transmission</text>
      <text x="50" y="60" font-size="14" data-narration="Bit flipping, bit insertion, and bit deletion are common errors in data transmission.">Bit Flipping</text>
      <text x="50" y="90" font-size="14" data-narration="Bit insertion occurs when an extra bit is inserted into the data." />
      <text x="50" y="120" font-size="14" data-narration="Bit deletion occurs when a bit is removed from the data." />
    </g>
  </g>

  <!-- Section 3: Error Detection -->
  <g transform="translate(0, 230)">
    <rect x="0" y="0" width="100%" height="20" rx="10" style="fill: #fff" />
    <rect x="0" y="20" width="100%" height="20" rx="10" style="fill: #fff" />
    <animate transform="rotate(360 50 50)" begin="0s" duration="2s" repeat="-1" />
    <g>
      <text x="50" y="30" font-size="16" font-weight="bold" data-narration="Error Detection">Error Detection</text>
      <text x="50" y="60" font-size="14" data-narration="Parity bits and checksums are used for error detection." />
      <text x="50" y="90" font-size="14" data-narration="Parity bits ensure that the total number of 1's is even." />
      <text x="50" y="120" font-size="14" data-narration="Checksums calculate a numerical value to detect changes in the data." />
    </g>
  </g>

  <!-- Section 4: Error Correction -->
  <g transform="translate(0, 330)">
    <rect x="0" y="0" width="100%" height="20" rx="10" style="fill: #fff" />
    <rect x="0" y="20" width="100%" height="20" rx="10" style="fill: #fff" />
    <animate transform="rotate(360 50 50)" begin="0s" duration="2s" repeat="-1" />
    <g>
      <text x="50" y="30" font-size="16" font-weight="bold" data-narration="Error Correction">Error Correction</text>
      <text x="50" y="60" font-size="14" data-narration="Block coding and cyclic codes are used for error correction." />
      <text x="50" y="90" font-size="14" data-narration="Hamming codes can detect and correct single-bit errors." />
      <text x="50" y="120" font-size="14" data-narration="Block coding divides data into blocks and applies error-correcting codes." />
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(0, 390)">
    <rect x="0" y="0" width="420" height="10" rx="10" style="fill: #fff" />
    <text x="10" y="10" font-size="16" font-weight="bold" text-anchor="start">Error Detection and Correction</text>
  </g>
</svg>