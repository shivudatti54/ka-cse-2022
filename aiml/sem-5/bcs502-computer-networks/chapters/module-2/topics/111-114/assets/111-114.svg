<svg width="420" height="400" data-topic-id="data-link-layer-error-detection-and-correction-111-114">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>

  <g transform="translate(10, 10)">
    <text x="0" y="20" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">
      <tspan data-narration="Introduction" font-weight="bold">Block Coding</tspan>
    </text>

    <rect x="0" y="50" width="200" height="100" fill="#E0E0E0"/>
    <rect x="0" y="50" width="200" height="100" fill="#E0E0E0" opacity="0.5" rx="10"/>
    <text x="5" y="60" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Divide data into fixed-length blocks
    </text>
    <text x="5" y="80" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Add redundancy to each block
    </text>
    <animate transform="translateX(20)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(220, 10)">
    <text x="0" y="20" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">
      <tspan data-narration="Advantages" font-weight="bold">Advantages</tspan>
    </text>

    <rect x="0" y="50" width="200" height="100" fill="#E0E0E0"/>
    <rect x="0" y="50" width="200" height="100" fill="#E0E0E0" opacity="0.5" rx="10"/>
    <text x="5" y="60" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Handles any type of data transmission
    </text>
    <text x="5" y="80" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Can be used with any type of channel
    </text>
    <animate transform="translateX(20)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(440, 10)">
    <text x="0" y="20" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">
      <tspan data-narration="Disadvantages" font-weight="bold">Disadvantages</tspan>
    </text>

    <rect x="0" y="50" width="200" height="100" fill="#E0E0E0"/>
    <rect x="0" y="50" width="200" height="100" fill="#E0E0E0" opacity="0.5" rx="10"/>
    <text x="5" y="60" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Complex to implement
    </text>
    <text x="5" y="80" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Requires more bandwidth
    </text>
    <animate transform="translateX(20)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(220, 150)">
    <text x="0" y="20" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">
      <tspan data-narration="Types of Block Codes" font-weight="bold">Types of Block Codes</tspan>
    </text>

    <rect x="0" y="50" width="200" height="100" fill="#E0E0E0"/>
    <rect x="0" y="50" width="200" height="100" fill="#E0E0E0" opacity="0.5" rx="10"/>
    <text x="5" y="60" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Cyclic Codes
    </text>
    <text x="5" y="80" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Non-Cyclic Codes
    </text>
    <animate transform="translateX(20)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(220, 250)">
    <text x="0" y="20" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">
      <tspan data-narration="Example of Block Coding" font-weight="bold">Example of Block Coding</tspan>
    </text>

    <rect x="0" y="50" width="200" height="100" fill="#E0E0E0"/>
    <rect x="0" y="50" width="200" height="100" fill="#E0E0E0" opacity="0.5" rx="10"/>
    <text x="5" y="60" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      (7,1) code
    </text>
    <text x="5" y="80" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Adds 1 parity bit to each data bit
    </text>
    <animate transform="translateX(20)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(0, 350)">
    <text x="0" y="10" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">
      <tspan data-narration="Cyclic Codes" font-weight="bold">Cyclic Codes</tspan>
    </text>

    <text x="5" y="50" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Cyclic shift to detect and correct errors
    </text>
    <text x="5" y="70" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Widely used in digital communication systems
    </text>
    <text x="5" y="90" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Non-cyclic shift to detect and correct errors
    </text>
    <text x="5" y="110" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Less widely used than cyclic codes
    </text>
    <animate transform="translateX(20)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(420, 350)">
    <text x="0" y="10" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">
      <tspan data-narration="Footer" font-weight="bold">Footer</tspan>
    </text>
  </g>
</svg>