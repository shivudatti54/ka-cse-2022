<svg width="420" height="400" data-topic-id="mac-random-access" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="max-width:100%;position relative;">
  <defs>
    <linearGradient id="linear-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#66CCFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <title>Media Access Control Random Access</title>
  <text x="10%" y="5%" font-size="24" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle" fill="#000000">Media Access Control Random Access</text>

  <rect x="10%" y="30%" width="100%" height="200%" fill="url(#linear-gradient)" opacity="0.5"/>

  <g transform="translate(10%, 40%)">
    <rect x="0" y="0" width="100%" height="30%" fill="#F0F0F0" rx="10"/>
    <text x="10%" y="10%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#000000" data-narration="Random Access Protocols">Random Access Protocols</text>
    <animateTransform attributeName="transform" type="translate" from="0 30%" to="0 10%" dur="2s" begin="0s"/>
  </g>

  <g transform="translate(10%, 70%)">
    <rect x="0" y="0" width="100%" height="30%" fill="#F0F0F0" rx="10"/>
    <text x="10%" y="10%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#000000" data-narration="ALOHA">ALOHA</text>
    <animateTransform attributeName="transform" type="translate" from="0 30%" to="0 10%" dur="2s" begin="0s"/>
  </g>

  <g transform="translate(10%, 110%)">
    <rect x="0" y="0" width="100%" height="30%" fill="#F0F0F0" rx="10"/>
    <text x="10%" y="10%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#000000" data-narration="CSMA/CD">CSMA/CD</text>
    <animateTransform attributeName="transform" type="translate" from="0 30%" to="0 10%" dur="2s" begin="2s"/>
  </g>

  <g transform="translate(10%, 150%)">
    <rect x="0" y="0" width="100%" height="30%" fill="#F0F0F0" rx="10"/>
    <text x="10%" y="10%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#000000" data-narration="Token Ring">Token Ring</text>
    <animateTransform attributeName="transform" type="translate" from="0 30%" to="0 10%" dur="2s" begin="4s"/>
  </g>

  <g transform="translate(10%, 190%)">
    <rect x="0" y="0" width="100%" height="30%" fill="#F0F0F0" rx="10"/>
    <text x="10%" y="10%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#000000" data-narration="Flow Control">Flow Control</text>
    <animateTransform attributeName="transform" type="translate" from="0 30%" to="0 10%" dur="2s" begin="6s"/>
  </g>

  <rect x="10%" y="220%" width="100%" height="30%" fill="#F0F0F0" rx="10"/>
  <text x="10%" y="230%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#000000">MAC Protocol Functions</text>
  <animateTransform attributeName="transform" type="translate" from="0 240%" to="0 230%" dur="2s" begin="8s"/>
</svg>