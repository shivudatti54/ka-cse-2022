<svg width="420" height="400" data-topic-id="layering-tcpip-protocol-suite-the-osimodel-introd">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#B3A8FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="420" height="400" rx="10"/>

  <!-- Title -->
  <g transform="translate(10, 10)">
    <text font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">Layering, TCP/IP Protocol Suite, and The OSI Model Introduction</text>
  </g>

  <!-- Section 1: Introduction -->
  <g transform="translate(10, 50)">
    <rect width="400" height="100" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,150" dur="2s" begin="0s"/>
    <text font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="The topic of layering, TCP/IP protocol suite, and the OSI model is fundamental to understanding how data is transmitted over a network.">
      <tspan x="10" y="60">Introduction</tspan>
    </text>
  </g>

  <!-- Section 2: Layering -->
  <g transform="translate(10, 200)">
    <rect width="400" height="100" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0,200" to="0,300" dur="2s" begin="0s"/>
    <text font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Layering refers to the process of breaking down data into smaller sections, each with its own specific function.">
      <tspan x="10" y="220">Layering</tspan>
    </text>
  </g>

  <!-- Section 3: OSI Model -->
  <g transform="translate(10, 350)">
    <rect width="400" height="100" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0,350" to="0,450" dur="2s" begin="0s"/>
    <text font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="The OSI model is a 7-layered framework that explains how data is transmitted over a network.">
      <tspan x="10" y="370">OSI Model</tspan>
    </text>
  </g>

  <!-- Section 4: TCP/IP Model -->
  <g transform="translate(10, 500)">
    <rect width="400" height="100" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0,500" to="0,600" dur="2s" begin="0s"/>
    <text font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="The TCP/IP model is a 4-layered framework that is commonly used in the internet.">
      <tspan x="10" y="520">TCP/IP Model</tspan>
    </text>
  </g>

  <!-- Section 5: Key Differences -->
  <g transform="translate(10, 650)">
    <rect width="400" height="100" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0,650" to="0,750" dur="2s" begin="0s"/>
    <text font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="The key differences between the OSI and TCP/IP models are listed below.">
      <tspan x="10" y="670">Key Differences</tspan>
    </text>
    <rect x="10" y="680" width="30" height="10" fill="#F7F7F7" rx="5" stroke="#2F4F7F" stroke-width="2"/>
    <text x="40" y="680" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">OSI</text>
    <rect x="80" y="680" width="30" height="10" fill="#F7F7F7" rx="5" stroke="#2F4F7F" stroke-width="2"/>
    <text x="110" y="680" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">TCP/IP</text>
  </g>

  <!-- Section 6: Conclusion -->
  <g transform="translate(10, 800)">
    <rect width="400" height="100" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0,800" to="0,900" dur="2s" begin="0s"/>
    <text font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="In conclusion, understanding the layering, TCP/IP protocol suite, and OSI model is crucial for network communication.">
      <tspan x="10" y="820">Conclusion</tspan>
    </text>
  </g>

  <!-- Footer -->
  <g transform="translate(10, 950)">
    <rect width="400" height="50" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0,950" to="0,1000" dur="2s" begin="0s"/>
    <text font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">Designed by [Your Name]</text>
  </g>

  <!-- Arrow markers -->
  <line x1="10" y1="100" x2="20" y2="110" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="10" y1="200" x2="20" y2="210" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="10" y1="300" x2="20" y2="310" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="10" y1="400" x2="20" y2="410" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="10" y1="500" x2="20" y2="510" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="10" y1="600" x2="20" y2="610" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="10" y1="650" x2="20" y2="660" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="10" y1="750" x2="20" y2="760" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="10" y1="850" x2="20" y2="860" stroke="#2F4F7F" stroke-width="2"/>
</svg>