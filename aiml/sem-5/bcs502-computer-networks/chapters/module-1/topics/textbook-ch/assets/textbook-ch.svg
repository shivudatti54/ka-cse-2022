<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="computer-networks-ch">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
    <style>
      .text {
        font-size: 14px;
        font-weight: bold;
        color: #2F4F7F;
      }
      .subtext {
        font-size: 12px;
        color: #666;
      }
    </style>
  </defs>
  <title>Textbook Ch</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <g transform="translate(10, 10)">
    <path d="M 10 100 L 55 150 L 100 200 L 145 250 L 190 300 L 235 350 L 280 400 Z" stroke="#2F4F7F" stroke-width="2" fill="none"/>
    <g opacity=".5">
      <path d="M 10 200 L 55 250 L 100 300 L 145 350 L 190 400 L 235 450 L 280 500 Z" stroke="#2F4F7F" stroke-width="2" fill="none"/>
    </g>
    <g>
      <rect x="20" y="20" width="40" height="40" fill="#F7D2C4" rx="10"/>
      <text class="text" x="40" y="30">Local Area Network (LAN)</text>
      <text class="subtext" x="40" y="50">A network that connects devices within a limited geographical area.</text>
      <animate transform="translate(40, 30)" attributeName="x" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="80" y="20" width="40" height="40" fill="#F7D2C4" rx="10"/>
      <text class="text" x="100" y="30">Wide Area Network (WAN)</text>
      <text class="subtext" x="100" y="50">A network that connects devices over a larger geographical area.</text>
      <animate transform="translate(100, 30)" attributeName="x" begin="2s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="130" y="20" width="40" height="40" fill="#F7D2C4" rx="10"/>
      <text class="text" x="150" y="30">Metropolitan Area Network (MAN)</text>
      <text class="subtext" x="150" y="50">A network that connects devices within a metropolitan area.</text>
      <animate transform="translate(150, 30)" attributeName="x" begin="4s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="180" y="20" width="40" height="40" fill="#F7D2C4" rx="10"/>
      <text class="text" x="200" y="30">Wireless Network (WLAN)</text>
      <text class="subtext" x="200" y="50">A network that connects devices wirelessly, using radio waves or infrared signals.</text>
      <animate transform="translate(200, 30)" attributeName="x" begin="6s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="230" y="20" width="40" height="40" fill="#F7D2C4" rx="10"/>
      <text class="text" x="250" y="30">Physical Layer (Layer 1)</text>
      <text class="subtext" x="250" y="50">The physical means of transmitting data between devices.</text>
      <animate transform="translate(250, 30)" attributeName="x" begin="8s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="20" y="60" width="40" height="40" fill="#F7D2C4" rx="10"/>
      <text class="text" x="40" y="70">Data Link Layer (Layer 2)</text>
      <text class="subtext" x="40" y="90">Error-free transfer of data frames between devices on the same network.</text>
      <animate transform="translate(40, 70)" attributeName="x" begin="10s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="20" y="110" width="40" height="40" fill="#F7D2C4" rx="10"/>
      <text class="text" x="40" y="120">Network Layer (Layer 3)</text>
      <text class="subtext" x="40" y="140">Routes data between devices on different networks.</text>
      <animate transform="translate(40, 120)" attributeName="x" begin="12s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="20" y="150" width="40" height="40" fill="#F7D2C4" rx="10"/>
      <text class="text" x="40" y="160">Transport Layer (Layer 4)</text>
      <text class="subtext" x="40" y="180">Provides reliable data transfer between devices.</text>
      <animate transform="translate(40, 160)" attributeName="x" begin="14s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="20" y="180" width="40" height="40" fill="#F7D2C4" rx="10"/>
      <text class="text" x="40" y="190">Session Layer (Layer 5)</text>
      <text class="subtext" x="40" y="210">Establishes, manages, and terminates connections between applications.</text>
      <animate transform="translate(40, 190)" attributeName="x" begin="16s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="20" y="210" width="40" height="40" fill="#F7D2C4" rx="10"/>
      <text class="text" x="40" y="220">Presentation Layer (Layer 6)</text>
      <text class="subtext" x="40" y="240">Converts data into a format that can be understood by the receiving device.</text>
      <animate transform="translate(40, 220)" attributeName="x" begin="18s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="20" y="230" width="40" height="40" fill="#F7D2C4" rx="10"/>
      <text class="text" x="40" y="240">Application Layer (Layer 7)</text>
      <text class="subtext" x="40" y="260">Provides services to end-user applications.</text>
      <animate transform="translate(40, 240)" attributeName="x" begin="20s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="20" y="250" width="40" height="40" fill="#F7D2C4" rx="10"/>
      <text class="text" x="40" y="260">Protocol Model</text>
      <text class="subtext" x="40" y="280">A hierarchical structure that defines the different layers of communication.</text>
      <animate transform="translate(40, 260)" attributeName="x" begin="22s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="20" y="270" width="40" height="40" fill="#F7D2C4" rx="10"/>
      <text class="text" x="40" y="280" style="font-size: 16px; color: #FF9800;">Arrow</text>
      <animate transform="translate(40, 280)" attributeName="x" begin="24s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="20" y="290" width="40" height="40" fill="#F7D2C4" rx="10"/>
      <text class="text" x="40" y="300" style="font-size: 16px; color: #FF9800;">Arrow</text>
      <animate transform="translate(40, 300)" attributeName="x" begin="26s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="20" y="310" width="40" height="40" fill="#F7D2C4" rx="10"/>
      <text class="text" x="40" y="320" style="font-size: 16px; color: #FF9800;">Arrow</text>
      <animate transform="translate(40, 320)" attributeName="x" begin="28s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="20" y="330" width="40" height="40" fill="#F7D2C4" rx="10"/>
      <text class="text" x="40" y="340" style="font-size: 16px; color: #FF9800;">Arrow</text>
      <animate transform="translate(40, 340)" attributeName="x" begin="30s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="20" y="350" width="40" height="40" fill="#F7D2C4" rx="10"/>
      <text class="text" x="40" y="360" style="font-size: 16px; color: #FF9800;">Arrow</text>
      <animate transform="translate(40, 360)" attributeName="x" begin="32s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="20" y="370" width="40" height="40" fill="#F7D2C4" rx="10"/>
      <text class="text" x="40" y="380" style="font-size: 16px; color: #2F4F7F;">Footer</text>
    </g>
  </g>
</svg>