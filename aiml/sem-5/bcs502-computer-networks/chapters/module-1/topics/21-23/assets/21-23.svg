<svg width="420" height="400" data-topic-id="21-23" xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 420 400" xmlns:xlink="http://www.w3.org/1999/xlink"
     style="font-family:Arial, sans-serif; font-size:16px; fill:#2F4F7F;">

    <!-- Gradient background -->
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7E6F1" />
            <stop offset="100%" stop-color="#ADD8E6" />
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)" />

    <!-- Title -->
    <text x="10" y="30" text-anchor="start" font-size="24px" fill="#2F4F7F" data-narration="Title">
        Data Communications 21-23
    </text>

    <!-- Section 1: Introduction to Data Communications -->
    <rect x="10" y="60" width="400" height="80" fill="#FFFFFF" rx="10">
        <text x="15" y="30" text-anchor="start" font-size="18px" fill="#666666" data-narration="Introduction to Data Communications">
            Definition: Data communications refers to the process of transmitting data between two or more devices over a communication medium.
        </text>
        <rect x="15" y="80" width="50" height="10" rx="5" fill="#66CCCC" />
        <text x="15" y="90" text-anchor="start" font-size="14px" fill="#2F4F7F" data-narration="Direct communication between two devices.">
            Point-to-Point (PtP) Communication
        </text>
    </rect>

    <!-- Section 2: Network Types -->
    <rect x="10" y="150" width="400" height="80" fill="#FFFFFF" rx="10">
        <text x="15" y="120" text-anchor="start" font-size="18px" fill="#666666" data-narration="Types of Data Communications">
            Types of Data Communications:
        </text>
        <rect x="15" y="150" width="50" height="10" rx="5" fill="#66CCCC" />
        <text x="15" y="160" text-anchor="start" font-size="14px" fill="#2F4F7F" data-narration="MultiPoint (MP) Communication: Communication between multiple devices.">
            MultiPoint (MP) Communication
        </text>
    </rect>

    <!-- Section 3: Network Models -->
    <rect x="10" y="220" width="400" height="80" fill="#FFFFFF" rx="10">
        <text x="15" y="190" text-anchor="start" font-size="18px" fill="#666666" data-narration="Network Models">
            Network Models:
        </text>
        <rect x="15" y="220" width="50" height="10" rx="5" fill="#66CCCC" />
        <text x="15" y="230" text-anchor="start" font-size="14px" fill="#2F4F7F" data-narration="Physical Model: A model that represents the physical components of a network, such as cables and routers.">
            Physical Model
        </text>
    </rect>

    <!-- Section 4: Local Area Network (LAN) -->
    <rect x="10" y="290" width="400" height="80" fill="#FFFFFF" rx="10">
        <text x="15" y="260" text-anchor="start" font-size="18px" fill="#666666" data-narration="Local Area Network (LAN)">
            Definition: A network that connects devices within a limited geographical area, such as a home or office building.
        </text>
        <rect x="15" y="280" width="50" height="10" rx="5" fill="#66CCCC" />
        <text x="15" y="290" text-anchor="start" font-size="14px" fill="#2F4F7F" data-narration="Interconnected devices: Computers, printers, and routers.">
            Interconnected Devices
        </text>
    </rect>

    <!-- Section 5: Interconnected Devices -->
    <rect x="10" y="360" width="400" height="80" fill="#FFFFFF" rx="10">
        <text x="15" y="320" text-anchor="start" font-size="18px" fill="#666666" data-narration="Interconnected Devices">
            Definition: Devices connected to a network, such as computers, printers, and routers.
        </text>
        <rect x="15" y="340" width="50" height="10" rx="5" fill="#66CCCC" />
        <text x="15" y="350" text-anchor="start" font-size="14px" fill="#2F4F7F" data-narration="Communication medium: The physical or wireless link used to transmit data between devices.">
            Communication Medium
        </text>
    </rect>

    <!-- Title at top -->
    <text x="10" y="10" text-anchor="start" font-size="36px" fill="#2F4F7F" data-narration="Data Communications 21-23">
        Data Communications 21-23
    </text>

    <!-- Footer at bottom -->
    <text x="10" y="370" text-anchor="start" font-size="14px" fill="#2F4F7F" data-narration="Learn more about data communications at">
        Learn more about data communications at
    </text>

    <!-- Animation -->
    <animate
        xmlns="http://www.w3.org/2000/svg"
        begin="0s"
        dur="2s"
        repeatCount="indefinite"
        fill="freeze">
        <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" dur="2s" repeatCount="indefinite" />
    </animate>

    <!-- Arrow markers -->
    <line x1="20" y1="30" x2="200" y2="30" stroke="#2F4F7F" stroke-width="2" data-narration="Point-to-Point (PtP) Communication" />
    <line x1="20" y1="80" x2="200" y2="80" stroke="#2F4F7F" stroke-width="2" data-narration="MultiPoint (MP) Communication" />
    <line x1="20" y1="150" x2="200" y2="150" stroke="#2F4F7F" stroke-width="2" data-narration="Physical Model" />
    <line x1="20" y1="220" x2="200" y2="220" stroke="#2F4F7F" stroke-width="2" data-narration="Interconnected Devices" />
    <line x1="20" y1="290" x2="200" y2="290" stroke="#2F4F7F" stroke-width="2" data-narration="Communication Medium" />

</svg>