<svg width="420" height="400" data-topic-id="computer-networks-11-13">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)" />
  
  <!-- Title Section -->
  <g transform="translate(50, 20)">
    <text data-narration="Introduction to Computer Networks" x="0" y="0" font-size="24" font-family="Arial" fill="#3498DB" text-anchor="middle">Computer Networks</text>
  </g>
  
  <!-- Data Communication Section -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="100%" height="50" fill="#F7F7F7" rx="10" />
    <text data-narration="Data Communication" x="0" y="10" font-size="18" font-family="Arial" fill="#2C3E50" text-anchor="left">Data Communication</text>
    <animate transform="translate(0, -20)" begin="0s" dur="2s" repeat="forever" />
    <line x1="50%" y1="30%" x2="50%" y2="70%" stroke="#28A745" stroke-width="2" stroke-dasharray="5,5" />
    <line x1="50%" y1="30%" x2="70%" y2="30%" stroke="#28A745" stroke-width="2" stroke-dasharray="5,5" />
    <line x1="50%" y1="70%" x2="70%" y2="70%" stroke="#28A745" stroke-width="2" stroke-dasharray="5,5" />
  </g>
  
  <!-- Data Transmission Section -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="100%" height="50" fill="#F7F7F7" rx="10" />
    <text data-narration="Data Transmission" x="0" y="10" font-size="18" font-family="Arial" fill="#2C3E50" text-anchor="left">Data Transmission</text>
    <animate transform="translate(0, -20)" begin="2s" dur="2s" repeat="forever" />
    <line x1="50%" y1="30%" x2="50%" y2="70%" stroke="#28A745" stroke-width="2" stroke-dasharray="5,5" />
    <line x1="50%" y1="30%" x2="70%" y2="30%" stroke="#28A745" stroke-width="2" stroke-dasharray="5,5" />
    <line x1="50%" y1="70%" x2="70%" y2="70%" stroke="#28A745" stroke-width="2" stroke-dasharray="5,5" />
  </g>
  
  <!-- Network Section -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="100%" height="50" fill="#F7F7F7" rx="10" />
    <text data-narration="Network" x="0" y="10" font-size="18" font-family="Arial" fill="#2C3E50" text-anchor="left">Network</text>
    <animate transform="translate(0, -20)" begin="4s" dur="2s" repeat="forever" />
    <line x1="50%" y1="30%" x2="50%" y2="70%" stroke="#28A745" stroke-width="2" stroke-dasharray="5,5" />
    <line x1="50%" y1="30%" x2="70%" y2="30%" stroke="#28A745" stroke-width="2" stroke-dasharray="5,5" />
    <line x1="50%" y1="70%" x2="70%" y2="70%" stroke="#28A745" stroke-width="2" stroke-dasharray="5,5" />
  </g>
  
  <!-- Footer Section -->
  <g transform="translate(50, 380)">
    <rect x="0" y="0" width="100%" height="20" fill="#F7F7F7" rx="10" />
    <text x="0" y="10" font-size="18" font-family="Arial" fill="#2C3E50" text-anchor="left">Computer Networks</text>
  </g>
</svg>