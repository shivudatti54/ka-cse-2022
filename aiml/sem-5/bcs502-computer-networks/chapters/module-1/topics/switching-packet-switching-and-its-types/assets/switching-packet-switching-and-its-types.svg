<svg
  width="420"
  height="400"
  data-topic-id="switching-packet-switching-and-its-types"
  viewBox="0 0 420 400"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  style="background-color: #8e8f8f;"
>
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9e4ca" stop-opacity="1" />
      <stop offset="100%" stop-color="#d1e9e9" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Title at top -->
  <rect x="10" y="10" width="400" height="50" fill="#7a88a9" rx="10" />
  <text x="20" y="30" font-size="24" font-family="Arial" fill="#ffffff" text-anchor="left">
    Switching: Packet Switching and its Types
  </text>

  <!-- Section 1: Introduction -->
  <rect x="10" y="80" width="400" height="100" fill="#8e8f8f" rx="10" />
  <animate
    attributeName="opacity"
    dur="2s"
    begin="0s"
    fill="freeze"
  />
  <text x="20" y="120" font-size="18" font-family="Arial" fill="#444444" text-anchor="left" data-narration="What is Switching?">
    Switching is a fundamental concept in computer networks, which enables efficient and reliable communication between devices.
  </text>

  <!-- Connection arrow -->
  <line x1="20" y1="140" x2="140" y2="140" stroke="#444444" stroke-width="2" stroke-dasharray="3,3" />
  <text x="120" y="150" font-size="18" font-family="Arial" fill="#444444" text-anchor="middle">
    A network technique used to forward packets between devices on a network.
  </text>

  <!-- Section 2: Packet Switching -->
  <rect x="10" y="200" width="400" height="100" fill="#8e8f8f" rx="10" />
  <animate
    attributeName="opacity"
    dur="2s"
    begin="2s"
    fill="freeze"
  />
  <text x="20" y="230" font-size="18" font-family="Arial" fill="#444444" text-anchor="left" data-narration="Packet Switching">
    Packet switching is a type of switching that involves breaking down data into small packets and transmitting them independently over the network.
  </text>

  <!-- Connection arrow -->
  <line x1="20" y1="250" x2="140" y2="250" stroke="#444444" stroke-width="2" stroke-dasharray="3,3" />
  <text x="120" y="260" font-size="18" font-family="Arial" fill="#444444" text-anchor="middle">
    Each packet contains the source and destination addresses, as well as other control information.
  </text>

  <!-- Section 3: Store-and-Forward Switching -->
  <rect x="10" y="320" width="400" height="100" fill="#8e8f8f" rx="10" />
  <animate
    attributeName="opacity"
    dur="2s"
    begin="4s"
    fill="freeze"
  />
  <text x="20" y="350" font-size="18" font-family="Arial" fill="#444444" text-anchor="left" data-narration="Store-and-Forward Switching">
    In store-and-forward switching, each device on the network acts as a switch, forwarding packets to other devices that have the destination address.
  </text>

  <!-- Connection arrow -->
  <line x1="20" y1="370" x2="140" y2="370" stroke="#444444" stroke-width="2" stroke-dasharray="3,3" />
  <text x="120" y="380" font-size="18" font-family="Arial" fill="#444444" text-anchor="middle">
    The packets are stored in a temporary buffer before being forwarded.
  </text>

  <!-- Section 4: Circuit Switching -->
  <rect x="10" y="430" width="400" height="100" fill="#8e8f8f" rx="10" />
  <animate
    attributeName="opacity"
    dur="2s"
    begin="6s"
    fill="freeze"
  />
  <text x="20" y="460" font-size="18" font-family="Arial" fill="#444444" text-anchor="left" data-narration="Circuit Switching">
    In circuit switching, a dedicated communication channel is established between the sender and receiver for the duration of the transmission.
  </text>

  <!-- Connection arrow -->
  <line x1="20" y1="480" x2="140" y2="480" stroke="#444444" stroke-width="2" stroke-dasharray="3,3" />
  <text x="120" y="490" font-size="18" font-family="Arial" fill="#444444" text-anchor="middle">
    This type of switching is more efficient than broadcasting, but it requires more resources and can be more complex to manage.
  </text>

  <!-- Footer -->
  <rect x="10" y="530" width="400" height="30" fill="#7a88a9" rx="10" />
  <text x="20" y="550" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="left">
    Created <text x="120" y="550" font-size="18" font-family="Arial" fill="#444444" text-anchor="middle">02/07/2024</text>
  </text>
</svg>