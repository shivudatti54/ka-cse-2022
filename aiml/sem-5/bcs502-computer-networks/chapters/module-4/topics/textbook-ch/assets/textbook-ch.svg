<svg width="420" height="400" data-topic-id="transport-layer" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6579f5" stop-opacity="1"/>
      <stop offset="1" stop-color="#6c5ce7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)"/>
  <g id="title">
    <text x="50%" y="20%" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Textbook Ch</text>
  </g>
  <g id="section1">
    <rect x="50%" y="150%" width="60%" height="20%" fill="#fff" rx="2"/>
    <text x="50%" y="170%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f" data-narration="The Transport Layer is the fourth layer of the OSI Model and is responsible for providing reliable data transfer between devices on a network.">Transport Layer</text>
    <animateTransform attributeName="transform" type="rotate" from="0,50%,150%" to="360,50%,150%" dur="10s" begin="0s"/>
  </g>
  <g id="section2">
    <rect x="50%" y="250%" width="60%" height="20%" fill="#fff" rx="2"/>
    <text x="50%" y="270%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f" data-narration="The Transport Layer uses several protocols to ensure reliable data transfer. Some of the most common protocols are TCP, UDP, and SCTP.">Transport Layer Protocols</text>
    <animateTransform attributeName="transform" type="translate" from="0,300%" to="0,250%" dur="10s" begin="1s"/>
    <line x1="50%" y1="250%" x2="50%" y2="250%" stroke="#00bfff" stroke-width="2"/>
  </g>
  <g id="section3">
    <rect x="50%" y="350%" width="60%" height="20%" fill="#fff" rx="2"/>
    <text x="50%" y="370%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f" data-narration="TCP is a connection-oriented protocol that ensures reliable data transfer. It divides data into small segments and assigns sequence numbers to each segment.">TCP</text>
    <animateTransform attributeName="transform" type="translate" from="0,400%" to="0,350%" dur="10s" begin="2s"/>
    <line x1="50%" y1="350%" x2="50%" y2="350%" stroke="#00bfff" stroke-width="2"/>
    <line x1="50%" y1="370%" x2="70%" y2="370%" stroke="#00bfff" stroke-width="2"/>
  </g>
  <g id="section4">
    <rect x="50%" y="450%" width="60%" height="20%" fill="#fff" rx="2"/>
    <text x="50%" y="470%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f" data-narration="UDP is a connectionless protocol that does not guarantee reliable data transfer. It does not segment data into small packets and does not perform error-checking on data transmission.">UDP</text>
    <animateTransform attributeName="transform" type="translate" from="0,500%" to="0,450%" dur="10s" begin="3s"/>
    <line x1="50%" y1="450%" x2="50%" y2="450%" stroke="#00bfff" stroke-width="2"/>
    <line x1="50%" y1="470%" x2="30%" y2="470%" stroke="#00bfff" stroke-width="2"/>
  </g>
  <g id="section5">
    <rect x="50%" y="550%" width="60%" height="20%" fill="#fff" rx="2"/>
    <text x="50%" y="570%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f" data-narration="SCTP is a connection-oriented protocol that supports multiple streams of data over a single connection. It ensures reliable data transfer and corrects errors in data transmission.">SCTP</text>
    <animateTransform attributeName="transform" type="translate" from="0,600%" to="0,550%" dur="10s" begin="4s"/>
    <line x1="50%" y1="550%" x2="50%" y2="550%" stroke="#00bfff" stroke-width="2"/>
    <line x1="50%" y1="570%" x2="70%" y2="570%" stroke="#00bfff" stroke-width="2"/>
    <line x1="50%" y1="570%" x2="30%" y2="570%" stroke="#00bfff" stroke-width="2"/>
  </g>
  <g id="footer">
    <text x="50%" y="380%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Textbook Ch</text>
  </g>
</svg>