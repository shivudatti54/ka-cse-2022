<svg width="420" height="400" data-topic-id="datagram-protocol-transmission-control-protocol-se">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="parallax-ground" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7b8ea" stop-opacity="1"/>
      <stop offset="50%" stop-color="#a7d8f4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#96c9ff" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#parallax-ground)"/>

  <!-- Title -->
  <text x="50%" y="20%" font-size="24" text-anchor="middle" fill="#2f4f7f" data-narration="Introduction">
    Datagram Protocol, Transmission Control Protocol: Services, Features, Segments, TCP Connections, Flow Control, Error Control, Congestion Control
  </text>

  <!-- Section 1: Datagram Protocol (UDP) -->
  <rect x="10" y="50" width="400" height="100" fill="#f7f7f7" data-narration="Datagram Protocol (UDP)">
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 150" dur="1000" begin="0s"/>
    <text x="20%" y="20%" font-size="18" text-anchor="middle" fill="#2f4f7f">Services:</text>
    <text x="20%" y="70%" font-size="18" text-anchor="middle" fill="#2f4f7f" data-narration="Connectionless: UDP does not establish a connection before sending data. This allows for faster transmission but also increases the risk of data loss or corruption.">
      Connectionless
    </text>
    <text x="20%" y="100%" font-size="18" text-anchor="middle" fill="#2f4f7f" data-narration="Best-effort delivery: UDP does not guarantee delivery of data packets. If a packet is lost or corrupted, it is not retransmitted."></text>

    <!-- Arrow marker -->
    <line x1="20%" y1="80%" x2="80%" y2="80%" stroke="#2f4f7f" stroke-width="2" opacity="0.5"/>
  </rect>

  <!-- Section 2: Features of UDP -->
  <rect x="10" y="160" width="400" height="100" fill="#f7f7f7" data-narration="Features of UDP">
    <animateTransform attributeName="transform" type="translate" from="0 160" to="0 270" dur="1000" begin="0s"/>
    <text x="20%" y="20%" font-size="18" text-anchor="middle" fill="#2f4f7f">Simple Header Format:</text>
    <text x="20%" y="70%" font-size="18" text-anchor="middle" fill="#2f4f7f" data-narration="UDP packets have a simple header that contains source port, destination port, and checksum."></text>
    <text x="20%" y="100%" font-size="18" text-anchor="middle" fill="#2f4f7f" data-narration="Limited Error-Checking: UDP uses a simple checksum to detect packet corruption, but it does not provide error correction."></text>

    <!-- Arrow marker -->
    <line x1="20%" y1="80%" x2="80%" y2="80%" stroke="#2f4f7f" stroke-width="2" opacity="0.5"/>
  </rect>

  <!-- Section 3: Segments of UDP -->
  <rect x="10" y="310" width="400" height="100" fill="#f7f7f7" data-narration="Segments of UDP">
    <animateTransform attributeName="transform" type="translate" from="0 310" to="0 410" dur="1000" begin="0s"/>
    <text x="20%" y="20%" font-size="18" text-anchor="middle" fill="#2f4f7f">UDP Datagram:</text>
    <text x="20%" y="70%" font-size="18" text-anchor="middle" fill="#2f4f7f" data-narration="A UDP datagram is a single packet that contains the data and header."></text>
    <text x="20%" y="100%" font-size="18" text-anchor="middle" fill="#2f4f7f" data-narration="Port Numbers: UDP uses 16-bit port numbers to identify the sender and receiver of data."></text>

    <!-- Arrow marker -->
    <line x1="20%" y1="80%" x2="80%" y2="80%" stroke="#2f4f7f" stroke-width="2" opacity="0.5"/>
  </rect>

  <!-- Section 4: TCP Connection -->
  <rect x="10" y="170" width="400" height="100" fill="#f7f7f7" data-narration="TCP Connection">
    <animateTransform attributeName="transform" type="translate" from="0 170" to="0 280" dur="1000" begin="0s"/>
    <text x="20%" y="20%" font-size="18" text-anchor="middle" fill="#2f4f7f">Services:</text>
    <text x="20%" y="70%" font-size="18" text-anchor="middle" fill="#2f4f7f" data-narration="Connection-Oriented: TCP establishes a connection before sending data. This ensures reliability and guarantees delivery of data packets."></text>
    <text x="20%" y="100%" font-size="18" text-anchor="middle" fill="#2f4f7f" data-narration="Guaranteed Delivery: TCP guarantees delivery of data packets and provides error correction."></text>

    <!-- Arrow marker -->
    <line x1="20%" y1="80%" x2="80%" y2="80%" stroke="#2f4f7f" stroke-width="2" opacity="0.5"/>
  </rect>

  <!-- Section 5: Features of TCP -->
  <rect x="10" y="290" width="400" height="100" fill="#f7f7f7" data-narration="Features of TCP">
    <animateTransform attributeName="transform" type="translate" from="0 290" to="0 390" dur="1000" begin="0s"/>
    <text x="20%" y="20%" font-size="18" text-anchor="middle" fill="#2f4f7f">Complex Header Format:</text>
    <text x="20%" y="70%" font-size="18" text-anchor="middle" fill="#2f4f7f" data-narration="TCP packets have a complex header that contains source and destination ports, sequence numbers, and acknowledgement numbers."></text>
    <text x="20%" y="100%" font-size="18" text-anchor="middle" fill="#2f4f7f" data-narration="Error-Checking and Correction: TCP uses a combination of checksums and acknowledgement numbers to detect and correct errors."></text>

    <!-- Arrow marker -->
    <line x1="20%" y1="80%" x2="80%" y2="80%" stroke="#2f4f7f" stroke-width="2" opacity="0.5"/>
  </rect>

  <!-- Footer -->
  <text x="50%" y="370%" font-size="18" text-anchor="middle" fill="#2f4f7f" data-narration="Datagram Protocol, Transmission Control Protocol: Services, Features, Segments, TCP Connections, Flow Control, Error Control, Congestion Control">
    Footer
  </text>
</svg>