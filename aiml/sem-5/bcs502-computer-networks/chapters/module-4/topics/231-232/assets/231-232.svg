  <section data-narration="connection-oriented-protocols">
    <rect x="10" y="10" width="100" height="30" fill="#45a0e6"/>
    <text x="15" y="25" font-size="18" font-family="Arial" fill="#3b5998">Connection-Oriented Protocols</text>
    <animate transform="rotate(0 195 25)" begin="0s" dur="2s" repeat="forever"/>
