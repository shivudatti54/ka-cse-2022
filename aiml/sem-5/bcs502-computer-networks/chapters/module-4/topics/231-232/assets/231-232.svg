    <text x="15" y="75" font-size="18" font-family="Arial" fill="#3b5998">Establish a dedicated connection before data transfer begins.</text>
  </section>
  <section data-narration="connectionless-protocols">
    <rect x="10" y="150" width="100" height="30" fill="#66d9ef"/>
    <text x="15" y="165" font-size="18" font-family="Arial" fill="#3b5998">Connectionless Protocols</text>
