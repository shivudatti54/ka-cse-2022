<svg width="420" height="400" data-topic-id="transport-layer-241-2434" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A698A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#5C649A" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title Section -->
  <section data-narration="Introduction to Transport Layer">
    <rect x="50" y="50" width="320" height="50" fill="#5C649A" rx="10"/>
    <text x="150" y="70" font-size="24" font-family="Arial" fill="#fff">Transport Layer</text>
  </section>
  
  <!-- Functions of Transport Layer Section -->
  <section data-narration="Functions of Transport Layer">
    <rect x="50" y="120" width="320" height="150" fill="#7A698A" rx="10"/>
    <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0s"/>
    <g>
      <rect x="50" y="120" width="50" height="50" fill="#fff" rx="5"/>
      <text x="60" y="130" font-size="18" font-family="Arial" fill="#000">Reliable Data Transfer</text>
      <rect x="120" y="120" width="50" height="50" fill="#fff" rx="5"/>
      <text x="130" y="130" font-size="18" font-family="Arial" fill="#000">Ordered Delivery of Data</text>
      <rect x="190" y="120" width="50" height="50" fill="#fff" rx="5"/>
      <text x="200" y="130" font-size="18" font-family="Arial" fill="#000">Error Detection and Correction</text>
    </g>
  </section>
  
  <!-- Transport Layer Protocols Section -->
  <section data-narration="Transport Layer Protocols">
    <rect x="50" y="280" width="320" height="150" fill="#7A698A" rx="10"/>
    <animate attributeName="opacity" from="1" to="0" dur="2s" begin="2s"/>
    <g>
      <rect x="50" y="280" width="50" height="50" fill="#fff" rx="5"/>
      <text x="60" y="290" font-size="18" font-family="Arial" fill="#000">TCP</text>
      <rect x="120" y="280" width="50" height="50" fill="#fff" rx="5"/>
      <text x="130" y="290" font-size="18" font-family="Arial" fill="#000">UDP</text>
    </g>
  </section>
  
  <!-- Comparison of TCP and UDP Section -->
  <section data-narration="Comparison of TCP and UDP">
    <rect x="50" y="430" width="320" height="150" fill="#7A698A" rx="10"/>
    <animate attributeName="opacity" from="1" to="0" dur="2s" begin="4s"/>
    <g>
      <rect x="50" y="430" width="50" height="50" fill="#fff" rx="5"/>
      <text x="60" y="440" font-size="18" font-family="Arial" fill="#000">TCP</text>
      <rect x="120" y="430" width="50" height="50" fill="#fff" rx="5"/>
      <text x="130" y="440" font-size="18" font-family="Arial" fill="#000">UDP</text>
      <line x1="180" y1="420" x2="180" y2="470" stroke="#000" stroke-width="2"/>
      <line x1="230" y1="420" x2="230" y2="470" stroke="#000" stroke-width="2"/>
    </g>
  </section>
  
  <!-- Footer Section -->
  <footer>
    <rect x="50" y="470" width="320" height="30" fill="#5C649A" rx="10"/>
    <text x="150" y="490" font-size="18" font-family="Arial" fill="#fff">Transport Layer</text>
  </footer>
</svg>