<svg width="420" height="400" data-topic-id="transport-layer-fundamentals-2436-2439" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  <g transform="translate(20, 10)">
    <title>Transport Layer Fundamentals</title>
    <text x="50" y="10" font-size="18" font-family="Arial" fill="#2196F3">Transport Layer Fundamentals</text>
  </g>
  <g transform="translate(20, 50)">
    <section data-narration="Introduction to Transport Layer">
      <rect x="0" y="0" width="400" height="100" fill="#F7F7F7"/>
      <text x="50" y="50" font-size="16" font-family="Arial" fill="#333">The Transport Layer is the fourth layer of the OSI model and is responsible for ensuring reliable data transfer between devices over a network.</text>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -100" dur="2s" begin="0s" repeatCount="indefinite"/>
    </section>
    <g transform="translate(20, 150)">
      <section data-narration="Functions of the Transport Layer">
        <rect x="0" y="0" width="400" height="100" fill="#F7F7F7"/>
        <text x="50" y="50" font-size="16" font-family="Arial" fill="#333">The Transport Layer provides a reliable connection between devices, ensuring that data is delivered in the correct order and without duplication or loss.</text>
        <rect x="0" y="0" width="0" height="0" fill="#FFF" rx="10" transform="rotate(45 0 0)"/>
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="2s" begin="0s" repeatCount="indefinite"/>
      </section>
      <g transform="translate(20, 250)">
        <section data-narration="Connection-Oriented (CO) Protocols">
          <rect x="0" y="0" width="400" height="100" fill="#F7F7F7"/>
          <text x="50" y="50" font-size="16" font-family="Arial" fill="#333">Connection-Oriented (CO) protocols establish a connection before data is sent.</text>
          <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -100" dur="2s" begin="0s" repeatCount="indefinite"/>
        </section>
        <g transform="translate(20, 350)">
          <section data-narration="Connectionless (CL) Protocols">
            <rect x="0" y="0" width="400" height="100" fill="#F7F7F7"/>
            <text x="50" y="50" font-size="16" font-family="Arial" fill="#333">Connectionless (CL) protocols do not establish a connection before data is sent.</text>
            <rect x="0" y="0" width="0" height="0" fill="#FFF" rx="10" transform="rotate(45 0 0)"/>
            <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="2s" begin="0s" repeatCount="indefinite"/>
          </section>
          <g transform="translate(20, 450)">
            <section data-narration="Types of Transport-Layer Protocols">
              <rect x="0" y="0" width="400" height="100" fill="#F7F7F7"/>
              <text x="50" y="50" font-size="16" font-family="Arial" fill="#333">There are two main types of Transport-Layer protocols: Connection-Oriented (CO) and Connectionless (CL).</text>
              <rect x="0" y="0" width="0" height="0" fill="#FFF" rx="10" transform="rotate(45 0 0)"/>
              <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="2s" begin="0s" repeatCount="indefinite"/>
            </section>
            <g transform="translate(20, 550)">
              <section data-narration="TCP (Transmission Control Protocol) and UDP (User Datagram Protocol)">
                <rect x="0" y="0" width="400" height="100" fill="#F7F7F7"/>
                <text x="50" y="50" font-size="16" font-family="Arial" fill="#333">TCP is a Connection-Oriented protocol that provides reliable data transfer, while UDP is a Connectionless protocol that provides best-effort delivery.</text>
                <rect x="0" y="0" width="0" height="0" fill="#FFF" rx="10" transform="rotate(45 0 0)"/>
                <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="2s" begin="0s" repeatCount="indefinite"/>
              </section>
            </g>
            <g transform="translate(20, 650)">
              <section data-narration="SCTP (Stream Control Transmission Protocol)">
                <rect x="0" y="0" width="400" height="100" fill="#F7F7F7"/>
                <text x="50" y="50" font-size="16" font-family="Arial" fill="#333">SCTP is a Connection-Oriented protocol that provides reliable data transfer and multiplexing.</text>
                <rect x="0" y="0" width="0" height="0" fill="#FFF" rx="10" transform="rotate(45 0 0)"/>
                <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="2s" begin="0s" repeatCount="indefinite"/>
              </section>
            </g>
          </g>
          <g transform="translate(20, 750)">
            <footer>Footer</footer>
            <text x="50" y="10" font-size="18" font-family="Arial" fill="#2196F3">Transport Layer Fundamentals</text>
          </g>
        </g>
      </g>
    </g>
  </svg>