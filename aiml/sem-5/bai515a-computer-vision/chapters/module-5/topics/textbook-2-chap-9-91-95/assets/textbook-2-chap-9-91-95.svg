<svg width="420" height="400" data-topic-id="morphological-image-processing-preliminaries-erosion-and-dilation-opening-and-closing-hit-or-miss-91-95">
  <title>Morphological Image Processing Preliminaries: Erosion and Dilation, Opening and Closing, Hit-or-Miss</title>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A288A" stop-opacity="1" />
      <stop offset="50%" stop-color="#4682B4" stop-opacity="1" />
      <stop offset="100%" stop-color="#FFC107" stop-opacity="1" />
    </linearGradient>
    <style>
      .section {
        margin-bottom: 20px;
      }
      .section:after {
        content: attr(data-narration);
        display: block;
      }
      .arrow {
        stroke-width: 4;
        stroke-linecap: round;
        fill: none;
      }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#grad)" rx="10" />
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="100" height="100" rx="50" fill="#fff" />
    <text x="50" y="30" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#000">Morphological Image Processing</text>
    <text x="50" y="60" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#000">Preliminaries: Erosion and Dilation, Opening and Closing, Hit-or-Miss</text>
    <section data-narration="Definition of Morphology">
      <rect x="0" y="120" width="100" height="100" rx="50" fill="#fff" />
      <text x="50" y="150" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#000">Morphology is the study of shapes and structures of objects.</text>
      <path d="M 20,20 L 20,80 L 80,80 L 80,20 Z" fill="#fff" stroke="#000" class="arrow" />
    </section>
    <section data-narration="Operators">
      <rect x="0" y="220" width="100" height="100" rx="50" fill="#fff" />
      <text x="50" y="250" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#000">Operators are functions that take an image as input and produce an output image.</text>
      <path d="M 20,20 L 20,80 L 80,80 L 80,20 Z" fill="#fff" stroke="#000" class="arrow" />
    </section>
    <section data-narration="Erosion">
      <rect x="0" y="320" width="100" height="100" rx="50" fill="#fff" />
      <text x="50" y="350" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#000">Erosion is an operator that removes small objects from an image.</text>
      <path d="M 20,20 L 20,80 L 80,80 L 80,20 Z" fill="#fff" stroke="#000" class="arrow" />
    </section>
    <section data-narration="Dilation">
      <rect x="0" y="420" width="100" height="100" rx="50" fill="#fff" />
      <text x="50" y="450" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#000">Dilation is an operator that adds new objects to an image.</text>
      <path d="M 20,20 L 20,80 L 80,80 L 80,20 Z" fill="#fff" stroke="#000" class="arrow" />
    </section>
    <section data-narration="Opening">
      <rect x="0" y="520" width="100" height="100" rx="50" fill="#fff" />
      <text x="50" y="550" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#000">Opening is an operator that combines erosion and dilation.</text>
      <path d="M 20,20 L 20,80 L 80,80 L 80,20 Z" fill="#fff" stroke="#000" class="arrow" />
    </section>
    <section data-narration="Closing">
      <rect x="0" y="620" width="100" height="100" rx="50" fill="#fff" />
      <text x="50" y="650" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#000">Closing is an operator that combines dilation and erosion.</text>
      <path d="M 20,20 L 20,80 L 80,80 L 80,20 Z" fill="#fff" stroke="#000" class="arrow" />
    </section>
    <section data-narration="Hit-or-Miss">
      <rect x="0" y="720" width="100" height="100" rx="50" fill="#fff" />
      <text x="50" y="750" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#000">Hit-or-Miss is an operator that performs a specified operation on each pixel in the image.</text>
      <path d="M 20,20 L 20,80 L 80,80 L 80,20 Z" fill="#fff" stroke="#000" class="arrow" />
    </section>
    <g transform="translate(10, 760)">
      <rect x="0" y="0" width="400" height="40" fill="#fff" rx="10" />
      <text x="50" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#000">Morphological Image Processing</text>
    </g>
  </g>
</svg>