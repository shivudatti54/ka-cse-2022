<svg width="420" height="400" data-topic-id="boundary-preprocessing-boundary-following-chain-co">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
      <stop offset="50%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"/>
    </linearGradient>
    <style>
      .title {font-size: 24px; font-weight: bold;}
      .section {margin-bottom: 20px;}
      .narration {font-size: 18px;}
      .arrow {shape-rendering: auto; stroke-width: 2; stroke: #FFC107;}
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <title>Boundary Preprocessing: Boundary Following and Chain Codes</title>
  <section data-narration="Boundary Following Introduction">
    <rect x="15" y="50" width="370" height="30" fill="#87CEEB" stroke="#000"/>
    <text x="20" y="60" class="title">Boundary Following</text>
    <text x="15" y="80" class="narration">Boundary following is a technique used to extract the boundary of an object from an image.</text>
  </section>
  <section data-narration="Boundary Following Algorithm">
    <rect x="15" y="120" width="370" height="30" fill="#87CEEB" stroke="#000"/>
    <text x="20" y="130" class="title">Boundary Following Algorithm</text>
    <text x="15" y="150" class="narration">1. Choose a starting point on the boundary of the object.</text>
    <text x="15" y="170" class="narration">2. Mark the current pixel as visited.</text>
    <text x="15" y="190" class="narration">3. Explore all neighboring pixels that are not marked as visited.</text>
    <text x="15" y="210" class="narration">4. If a neighboring pixel is on the boundary, mark it as visited and add it to the boundary list.</text>
    <text x="15" y="230" class="narration">5. Repeat steps 3-4 until all neighboring pixels are marked as visited.</text>
    <text x="15" y="250" class="narration">6. Backtrack to the starting point and remove the starting pixel from the boundary list.</text>
  </section>
  <section data-narration="Boundary Following Example">
    <rect x="15" y="300" width="370" height="30" fill="#87CEEB" stroke="#000"/>
    <text x="20" y="310" class="title">Boundary Following Example</text>
    <rect x="15" y="330" width="370" height="150" fill="#ADD8E6" stroke="#000"/>
    <rect x="15" y="180" width="370" height="120" fill="#ADD8E6" stroke="#000"/>
    <path d="M 15,95 L 75,95 L 120,95 Z"/>
    <path d="M 15,155 L 75,155 L 120,155 Z"/>
    <path d="M 15,215 L 75,215 L 120,215 Z"/>
    <text x="15" y="270" class="narration">The boundary of the object is extracted using the algorithm.</text>
  </section>
  <section data-narration="Chain Codes">
    <rect x="15" y="420" width="370" height="30" fill="#87CEEB" stroke="#000"/>
    <text x="20" y="430" class="title">Chain Codes</text>
    <text x="15" y="450" class="narration">Chain codes are a way of describing the boundary of an object.</text>
  </section>
  <section data-narration="Chain Code Notation">
    <rect x="15" y="500" width="370" height="30" fill="#87CEEB" stroke="#000"/>
    <text x="20" y="510" class="title">Chain Code Notation</text>
    <text x="15" y="530" class="narration">Chain codes are represented as a series of numbers.</text>
    <text x="15" y="550" class="narration">Each number corresponds to a direction.</text>
  </section>
  <footer>Boundary Preprocessing: Boundary Following and Chain Codes</footer>
  <g id="boundary-following">
    <path class="arrow" d="M 120,95 L 120,155 L 120,215 Z"/>
    <path class="arrow" d="M 75,95 L 75,155 L 75,215 Z"/>
    <path class="arrow" d="M 15,95 L 15,155 L 15,215 Z"/>
  </g>
</svg>