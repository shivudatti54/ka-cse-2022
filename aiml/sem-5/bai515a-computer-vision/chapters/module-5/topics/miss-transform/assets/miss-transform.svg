<svg width="420" height="400" data-topic-id="fourier-transforms-in-image-processing" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="palette" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5E1F5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8BC34A" stop-opacity="1"/>
    </linearGradient>
    <style>
      .section {
        background-image: url("https://www.example.com/pastel-gradient.png");
        background-size: cover;
        padding: 20px;
        width: calc(100% - 40px);
        margin: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
    </style>
  </defs>

  <!-- Title -->
  <rect x="10" y="10" width="400" height="50" fill="#E5E5EA" rx="10">
    <text x="20" y="35" font-size="24" font-weight="bold" fill="#8BC34A">Miss Transform</text>
  </rect>

  <!-- Section 1: Introduction -->
  <div class="section" data-narration="Introduction">
    <rect x="20" y="70" width="360" height="150" fill="#E5E5EA" rx="10">
      <text x="20" y="85" font-size="18" font-weight="normal" fill="#666" data-topic-id="fourier-transforms-in-image-processing" data-section="1">Introduction</text>
      <rect x="20" y="120" width="340" height="20" fill="#666" rx="5"></rect>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="3s" repeatCount="indefinite"/>
      <g>
        <rect x="20" y="150" width="340" height="20" fill="#666" rx="5"></rect>
        <text x="20" y="170" font-size="18" font-weight="normal" fill="#666">The Fourier Transform is a mathematical tool in image processing that decomposes an image into its frequency domain representation.</text>
      </g>
    </rect>
  </div>

  <!-- Section 2: 1D Fourier Transform -->
  <div class="section" data-narration="1D Fourier Transform">
    <rect x="20" y="70" width="360" height="150" fill="#E5E5EA" rx="10">
      <text x="20" y="85" font-size="18" font-weight="normal" fill="#666" data-topic-id="fourier-transforms-in-image-processing" data-section="2">1D Fourier Transform</text>
      <rect x="20" y="120" width="340" height="20" fill="#666" rx="5"></rect>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="3s" repeatCount="indefinite"/>
      <g>
        <rect x="20" y="150" width="340" height="20" fill="#666" rx="5"></rect>
        <text x="20" y="170" font-size="18" font-weight="normal" fill="#666">The 1D Fourier Transform is defined as F(ω) = ∫ f(x)e^(-jωx) dx.</text>
      </g>
    </rect>
  </div>

  <!-- Section 3: 2D Fourier Transform for Images -->
  <div class="section" data-narration="2D Fourier Transform for Images">
    <rect x="20" y="70" width="360" height="150" fill="#E5E5EA" rx="10">
      <text x="20" y="85" font-size="18" font-weight="normal" fill="#666" data-topic-id="fourier-transforms-in-image-processing" data-section="3">2D Fourier Transform for Images</text>
      <rect x="20" y="120" width="340" height="20" fill="#666" rx="5"></rect>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="3s" repeatCount="indefinite"/>
      <g>
        <rect x="20" y="150" width="340" height="20" fill="#666" rx="5"></rect>
        <text x="20" y="170" font-size="18" font-weight="normal" fill="#666">The 2D Fourier Transform for images is defined as F(u,v) = (1/MN) ∑∑ f(x,y)e^(-j2π(ux/M + vy/N)).</text>
      </g>
    </rect>
  </div>

  <!-- Section 4: Frequency Domain Representation -->
  <div class="section" data-narration="Frequency Domain Representation">
    <rect x="20" y="70" width="360" height="150" fill="#E5E5EA" rx="10">
      <text x="20" y="85" font-size="18" font-weight="normal" fill="#666" data-topic-id="fourier-transforms-in-image-processing" data-section="4">Frequency Domain Representation</text>
      <rect x="20" y="120" width="340" height="20" fill="#666" rx="5"></rect>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="3s" repeatCount="indefinite"/>
      <g>
        <rect x="20" y="150" width="340" height="20" fill="#666" rx="5"></rect>
        <text x="20" y="170" font-size="18" font-weight="normal" fill="#666">The frequency domain representation is given by |F(u,v)| = √[R²(u,v) + I²(u,v)].</text>
      </g>
    </rect>
  </div>

  <!-- Section 5: Visualization of Fourier Transforms -->
  <div class="section" data-narration="Visualization of Fourier Transforms">
    <rect x="20" y="70" width="360" height="150" fill="#E5E5EA" rx="10">
      <text x="20" y="85" font-size="18" font-weight="normal" fill="#666" data-topic-id="fourier-transforms-in-image-processing" data-section="5">Visualization of Fourier Transforms</text>
      <rect x="20" y="120" width="340" height="20" fill="#666" rx="5"></rect>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="3s" repeatCount="indefinite"/>
      <g>
        <rect x="20" y="150" width="340" height="20" fill="#666" rx="5"></rect>
        <text x="20" y="170" font-size="18" font-weight="normal" fill="#666">The frequency domain representation can be visualized using a spectrum plot.</text>
      </g>
    </rect>
  </div>

  <!-- Section 6: Key Concepts in Fourier Image Processing -->
  <div class="section" data-narration="Key Concepts in Fourier Image Processing">
    <rect x="20" y="70" width="360" height="150" fill="#E5E5EA" rx="10">
      <text x="20" y="85" font-size="18" font-weight="normal" fill="#666" data-topic-id="fourier-transforms-in-image-processing" data-section="6">Key Concepts in Fourier Image Processing</text>
      <rect x="20" y="120" width="340" height="20" fill="#666" rx="5"></rect>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="3s" repeatCount="indefinite"/>
      <g>
        <rect x="20" y="150" width="340" height="20" fill="#666" rx="5"></rect>
        <text x="20" y="170" font-size="18" font-weight="normal" fill="#666">Low frequencies correspond to gradual changes in intensity (smooth areas), while high frequencies correspond to rapid changes (edges, noise, fine details).</text>
      </g>
    </rect>
  </div>

  <!-- Footer -->
  <rect x="10" y="370" width="400" height="50" fill="#E5E5EA" rx="10">
    <text x="20" y="385" font-size="18" font-weight="bold" fill="#8BC34A">Miss Transform</text>
  </rect>
</svg>