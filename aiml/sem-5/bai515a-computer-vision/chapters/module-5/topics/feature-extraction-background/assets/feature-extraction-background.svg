<svg width="420" height="400" data-topic-id="feature-extraction-background" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient-background" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c7d9f7" stop-opacity="1" />
      <stop offset="100%" stop-color="#a5e5ff" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="420" height="400" fill="url(#gradient-background)" rx="10" />
  <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" font-weight="bold" fill="#2f4f7f">
    Feature Extraction Background
  </text>

  <section data-narration="Importance of Feature Extraction" style="margin-bottom: 20px;">
    <rect x="10" y="50" width="400" height="30" fill="#fff" rx="10" />
    <text x="15" y="60" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Importance of Feature Extraction
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="1s" begin="0s" />
    <text x="15" y="80" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      By extracting meaningful features from images, we can:
      <tspan x="15" y="100" font-size="16" font-family="Arial, sans-serif" fill="#666">
        reduce image complexity, improve image understanding, and enable object recognition.
      </tspan>
    </text>
  </section>

  <section data-narration="Types of Features" style="margin-bottom: 20px;">
    <rect x="10" y="150" width="400" height="30" fill="#fff" rx="10" />
    <text x="15" y="160" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Types of Features
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="1s" begin="0s" />
    <rect x="10" y="180" width="100" height="20" fill="#f2c464" rx="5" />
    <text x="120" y="190" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Local Features
    </text>
    <text x="15" y="210" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Edge features, texture features, and shape features describe small regions or patches of the image.
    </text>
    <rect x="10" y="230" width="100" height="20" fill="#2f4f7f" rx="5" />
    <text x="120" y="240" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Global Features
    </text>
    <text x="15" y="260" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Intensity features, color features, and spatial features describe the entire image.
    </text>
  </section>

  <section data-narration="Local Features" style="margin-bottom: 20px;">
    <rect x="10" y="310" width="400" height="30" fill="#fff" rx="10" />
    <text x="15" y="320" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Local Features
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,50" dur="1s" begin="1s" />
    <rect x="10" y="340" width="100" height="20" fill="#a5e5ff" rx="5" />
    <text x="120" y="350" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Edge features
    </text>
    <text x="15" y="370" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Corners, edges, and ridges describe the edges of an object.
    </text>
    <rect x="10" y="390" width="100" height="20" fill="#f2c464" rx="5" />
    <text x="120" y="400" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Texture features
    </text>
    <text x="15" y="420" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Patterns, shapes, and colors describe the texture of an object.
    </text>
    <rect x="10" y="440" width="100" height="20" fill="#2f4f7f" rx="5" />
    <text x="120" y="450" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Shape features
    </text>
    <text x="15" y="470" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Size, orientation, and symmetry describe the shape of an object.
    </text>
  </section>

  <section data-narration="Global Features" style="margin-bottom: 20px;">
    <rect x="10" y="510" width="400" height="30" fill="#fff" rx="10" />
    <text x="15" y="520" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Global Features
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,70" dur="1s" begin="2s" />
    <rect x="10" y="540" width="100" height="20" fill="#f2c464" rx="5" />
    <text x="120" y="550" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Intensity features
    </text>
    <text x="15" y="570" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Describe the intensity or brightness of the image.
    </text>
    <rect x="10" y="590" width="100" height="20" fill="#2f4f7f" rx="5" />
    <text x="120" y="600" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Color features
    </text>
    <text x="15" y="620" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Describe the color of the image.
    </text>
    <rect x="10" y="650" width="100" height="20" fill="#a5e5ff" rx="5" />
    <text x="120" y="660" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Spatial features
    </text>
    <text x="15" y="680" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">
      Describe the spatial relationships between pixels in the image.
    </text>
  </section>

  <footer>
    <rect x="10" y="370" width="400" height="30" fill="#fff" rx="10" />
    <text x="15" y="380" font-size="18" font-family="Arial, sans-serif" fill="#666">
    &copy; 2023. All rights reserved.
  </text>
  </footer>
</svg>