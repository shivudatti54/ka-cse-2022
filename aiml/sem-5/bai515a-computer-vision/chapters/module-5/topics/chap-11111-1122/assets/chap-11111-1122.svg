<svg width="420" height="400" data-topic-id="chap-11111-1122" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <style>
    .section {
      margin-bottom: 20px;
    }
  </style>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>
  <g transform="translate(10, 10)">
    <text x="10" y="20" font-size="24" fill="#2E4053">Morphological Image Processing</text>
    <text x="10" y="50" font-size="18" fill="#2E4053">Chapter 11.1 Preliminaries</text>
    <section class="section" data-narration="Section 1: Definition">
      <rect x="0" y="0" width="380" height="120" fill="#F7F7F7"/>
      <text x="10" y="10" font-size="16" fill="#2E4053">Morphological image processing is a non-parametric, non-linear technique</text>
      <animate transform="rotate(360 190 60)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </section>
    <section class="section" data-narration="Section 2: Key Concepts">
      <rect x="0" y="150" width="380" height="120" fill="#F7F7F7"/>
      <text x="10" y="10" font-size="16" fill="#2E4053">Morphological operators analyze and modify images using geometric shapes</text>
      <text x="10" y="50" font-size="16" fill="#2E4053">Image features are characteristics of an image that can be extracted and analyzed</text>
      <animate transform="translateX(190)" begin="2s" dur="2s" repeatCount="indefinite"/>
    </section>
    <section class="section" data-narration="Section 3: Erosion">
      <rect x="0" y="300" width="380" height="120" fill="#F7F7F7"/>
      <text x="10" y="10" font-size="16" fill="#2E4053">Erosion removes pixels from an image based on the size and shape of a structuring element</text>
      <path d="M 190,60 L 190,120 L 230,120 L 230,60 Z" stroke="#3498DB" stroke-width="2" fill="#F7F7F7"/>
      <animate transform="rotate(360 190 60)" begin="4s" dur="2s" repeatCount="indefinite"/>
    </section>
    <section class="section" data-narration="Section 4: Dilation">
      <rect x="0" y="450" width="380" height="120" fill="#F7F7F7"/>
      <text x="10" y="10" font-size="16" fill="#2E4053">Dilation adds pixels to an image based on the size and shape of a structuring element</text>
      <path d="M 190,60 L 190,120 L 230,120 L 230,60 Z" stroke="#8BC34A" stroke-width="2" fill="#F7F7F7"/>
      <animate transform="translateX(190)" begin="6s" dur="2s" repeatCount="indefinite"/>
    </section>
    <footer>
      <text x="10" y="390" font-size="18" fill="#2E4053">Chapter 11.1 Preliminaries</text>
    </footer>
  </g>
</svg>