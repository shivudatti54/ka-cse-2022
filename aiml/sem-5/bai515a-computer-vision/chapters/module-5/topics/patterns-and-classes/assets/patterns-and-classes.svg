<svg width="420" height="400" data-topic-id="patterns-and-classes" xmlns="http://www.w3.org/2000/svg" xml:space="preserve">
  <!-- Title -->
  <title>Patterns and Classes</title>
  <rect fill="#87CEEB" x="10" y="10" width="400" height="50" rx="10"/>
  <text x="15" y="25" font-size="24" fill="#4B0082">Patterns and Classes</text>
  <animateTransform attributeName="transform" type="translate" from="0,50" to="0,10" dur="2s" begin="0s" repeatCount="indefinite"/>
  
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA"/>
      <stop offset="50%" stop-color="#B2FFFC"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
  </defs>
  <rect x="10" y="60" width="400" height="250" fill="url(#pastel-gradient)"/>
  
  <!-- Section 1: Introduction -->
  <section id="introduction">
    <rect x="10" y="310" width="400" height="50" fill="#87CEEB" rx="10"/>
    <text x="15" y="325" font-size="18" fill="#4B0082">Introduction</text>
    <animateTransform attributeName="transform" type="translate" from="0,320" to="0,315" dur="2s" begin="0s" repeatCount="indefinite"/>
    <rect x="10" y="335" width="200" height="20" fill="#4B0082" rx="10"/>
    <rect x="220" y="335" width="180" height="20" fill="#4B0082" rx="10"/>
    <text x="15" y="345" font-size="16" fill="#666666" data-narration="A pattern is a set of pixels that define a specific shape or structure in an image.">
      <animateTransform attributeName="transform" type="translate" from="0,360" to="0,330" dur="2s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="230" y="345" font-size="16" fill="#666666" data-narration="Understanding patterns is essential for performing various morphological operations, such as erosion, dilation, opening, and closing.">
      <animateTransform attributeName="transform" type="translate" from="0,360" to="0,330" dur="2s" begin="0s" repeatCount="indefinite"/>
    </text>
  </section>
  
  <!-- Section 2: Types of Patterns -->
  <section id="types-of-patterns">
    <rect x="10" y="320" width="400" height="50" fill="#87CEEB" rx="10"/>
    <text x="15" y="335" font-size="18" fill="#4B0082">Types of Patterns</text>
    <animateTransform attributeName="transform" type="translate" from="0,340" to="0,335" dur="2s" begin="0s" repeatCount="indefinite"/>
    <rect x="10" y="345" width="200" height="20" fill="#4B0082" rx="10"/>
    <rect x="220" y="345" width="180" height="20" fill="#4B0082" rx="10"/>
    <text x="15" y="355" font-size="16" fill="#666666" data-narration="A linear pattern consists of a series of connected pixels in a straight line.">
      <animateTransform attributeName="transform" type="translate" from="0,380" to="0,330" dur="2s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="230" y="355" font-size="16" fill="#666666" data-narration="A non-linear pattern consists of a set of pixels that are not connected in a straight line.">
      <animateTransform attributeName="transform" type="translate" from="0,380" to="0,330" dur="2s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="15" y="365" font-size="16" fill="#666666" data-narration="A structural pattern consists of a set of pixels that are connected in a specific way to form a shape or structure.">
      <animateTransform attributeName="transform" type="translate" from="0,400" to="0,330" dur="2s" begin="0s" repeatCount="indefinite"/>
    </text>
  </section>
  
  <!-- Section 3: Types of Classes -->
  <section id="types-of-classes">
    <rect x="10" y="300" width="400" height="50" fill="#87CEEB" rx="10"/>
    <text x="15" y="315" font-size="18" fill="#4B0082">Types of Classes</text>
    <animateTransform attributeName="transform" type="translate" from="0,325" to="0,320" dur="2s" begin="0s" repeatCount="indefinite"/>
    <rect x="10" y="335" width="200" height="20" fill="#4B0082" rx="10"/>
    <rect x="220" y="335" width="180" height="20" fill="#4B0082" rx="10"/>
    <text x="15" y="345" font-size="16" fill="#666666" data-narration="A shape class defines the shape of an object in an image.">
      <animateTransform attributeName="transform" type="translate" from="0,380" to="0,330" dur="2s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="230" y="345" font-size="16" fill="#666666" data-narration="A size class defines the size of an object in an image.">
      <animateTransform attributeName="transform" type="translate" from="0,380" to="0,330" dur="2s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="15" y="355" font-size="16" fill="#666666" data-narration="A color class defines the color of an object in an image.">
      <animateTransform attributeName="transform" type="translate" from="0,400" to="0,330" dur="2s" begin="0s" repeatCount="indefinite"/>
    </text>
  </section>
  
  <!-- Section 4: Key Concepts -->
  <section id="key-concepts">
    <rect x="10" y="260" width="400" height="50" fill="#87CEEB" rx="10"/>
    <text x="15" y="275" font-size="18" fill="#4B0082">Key Concepts</text>
    <animateTransform attributeName="transform" type="translate" from="0,290" to="0,285" dur="2s" begin="0s" repeatCount="indefinite"/>
    <rect x="10" y="305" width="200" height="20" fill="#4B0082" rx="10"/>
    <rect x="220" y="305" width="180" height="20" fill="#4B0082" rx="10"/>
    <text x="15" y="315" font-size="16" fill="#666666" data-narration="Morphological pattern operations, such as erosion, dilation, opening, and closing, are used to define the properties of objects in an image.">
      <animateTransform attributeName="transform" type="translate" from="0,350" to="0,300" dur="2s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="230" y="315" font-size="16" fill="#666666" data-narration="Understanding patterns and classes is essential for performing various morphological operations.">
      <animateTransform attributeName="transform" type="translate" from="0,350" to="0,300" dur="2s" begin="0s" repeatCount="indefinite"/>
    </text>
  </section>
  
  <!-- Footer -->
  <rect x="10" y="370" width="400" height="30" fill="#87CEEB" rx="10"/>
  <text x="15" y="385" font-size="18" fill="#4B0082">Patterns and Classes</text>
  <animateTransform attributeName="transform" type="translate" from="0,405" to="0,380" dur="2s" begin="0s" repeatCount="indefinite"/>
</svg>