<svg width="420" height="400" data-topic-id="pattern-classification-by-prototype-matching-minimum-distance-classifier-only">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="50" y="50" width="320" height="300" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title -->
  <text x="170" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">
    Pattern Classification by Prototype Matching (Minimum Distance Classifier Only)
  </text>
  
  <!-- Introduction -->
  <section data-narration="Introduction">
    <rect x="50" y="80" width="320" height="30" fill="#F7F7F7" rx="5" />
    <text x="70" y="90" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">
      Pattern classification is a crucial task in image processing, where images are classified into predefined categories based on their features.
    </text>
  </section>
  
  <!-- What is Prototype Matching? -->
  <section data-narration="What is Prototype Matching?">
    <rect x="50" y="120" width="320" height="30" fill="#F7F7F7" rx="5" />
    <text x="70" y="130" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">
      Prototype matching is a pattern classification technique where an image is compared to a set of pre-defined prototypes (or models) to determine the most similar one.
    </text>
  </section>
  
  <!-- Minimum Distance Classifier -->
  <section data-narration="Minimum Distance Classifier">
    <rect x="50" y="160" width="320" height="30" fill="#F7F7F7" rx="5" />
    <text x="70" y="170" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">
      The Minimum Distance Classifier is a type of prototype matching algorithm that classifies an image into the category of the prototype that is closest to it.
    </text>
  </section>
  
  <!-- How Minimum Distance Classifier Works -->
  <section data-narration="How Minimum Distance Classifier Works">
    <rect x="50" y="200" width="320" height="30" fill="#F7F7F7" rx="5" />
    <text x="70" y="210" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">
      The Minimum Distance Classifier works by:
      <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite">
        <animateTransform attributeName="transform" type="rotate" from="0 180 180" to="360 180 180" dur="2s" repeatCount="indefinite" />
      </animate>
      <text x="140" y="210" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498DB" opacity="0" animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
      <text x="140" y="210" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053" animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite" />
    </animate>
    <text x="140" y="210" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498DB">
        1. Image Feature Extraction
      </text>
    </animate>
    <text x="140" y="210" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053" opacity="0" animate attributeName="opacity" begin="4s" dur="2s" repeatCount="indefinite" />
    <text x="140" y="210" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498DB">
        2. Prototype Definition
      </text>
    </animate>
    <text x="140" y="210" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053" opacity="0" animate attributeName="opacity" begin="6s" dur="2s" repeatCount="indefinite" />
    <text x="140" y="210" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498DB">
        3. Distance Calculation
      </text>
    </animate>
    <text x="140" y="210" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053" opacity="0" animate attributeName="opacity" begin="8s" dur="2s" repeatCount="indefinite" />
    <text x="140" y="210" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498DB">
        4. Class Assignment
      </text>
    </animate>
    <text x="140" y="210" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053" opacity="0" animate attributeName="opacity" begin="10s" dur="2s" repeatCount="indefinite" />
    <text x="140" y="210" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498DB">
        5. Classification
      </text>
  </section>
  
  <!-- Advantages and Disadvantages -->
  <section data-narration="Advantages and Disadvantages">
    <rect x="50" y="280" width="320" height="30" fill="#F7F7F7" rx="5" />
    <text x="70" y="290" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">
      The Minimum Distance Classifier has the advantage of being simple to implement and efficient.
    </text>
  </section>
  
  <!-- Footer -->
  <text x="170" y="360" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">
    Pattern Classification by Prototype Matching (Minimum Distance Classifier Only)
  </text>
</svg>