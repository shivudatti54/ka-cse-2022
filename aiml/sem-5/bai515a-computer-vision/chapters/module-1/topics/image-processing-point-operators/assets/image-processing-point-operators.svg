<svg width="420" height="400" data-topic-id="image-processing-point-operators">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#E0C5C5" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Section 1: Point Operations -->
  <g transform="translate(20, 50)">
    <g data-narration="Point Operations">
      <rect width="100" height="20" fill="#3498db" rx="5" />
      <text x="10" y="10" font-size="14" fill="#fff">Point Operations</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="2s" begin="-1s" />
    </g>
    <line x1="20" y1="40" x2="40" y2="60" stroke="#3498db" stroke-width="2" />
    <text x="30" y="50" font-size="16" fill="#fff">Brighteness: I + c</text>
    <line x1="60" y1="40" x2="80" y2="60" stroke="#3498db" stroke-width="2" />
    <text x="70" y="50" font-size="16" fill="#fff">Contrast: a * I</text>
    <line x1="100" y1="40" x2="120" y2="60" stroke="#3498db" stroke-width="2" />
    <text x="110" y="50" font-size="16" fill="#fff">Inversion: 255 - I</text>
    <line x1="140" y1="40" x2="160" y2="60" stroke="#3498db" stroke-width="2" />
    <text x="150" y="50" font-size="16" fill="#fff">Thresholding: O = 255 if I > T else 0</text>
  </g>
  
  <!-- Section 2: Convolution and Filtering -->
  <g transform="translate(20, 100)">
    <g data-narration="Convolution and Filtering">
      <rect width="100" height="20" fill="#2ecc71" rx="5" />
      <text x="10" y="10" font-size="14" fill="#fff">Convolution</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="2s" begin="-1s" />
    </g>
    <rect width="20" height="20" fill="#2ecc71" rx="5" />
    <text x="10" y="10" font-size="16" fill="#fff">Identity (no change)</text>
    <rect width="20" height="20" fill="#1abc9c" rx="5" />
    <text x="10" y="15" font-size="16" fill="#fff">Box Blur (averaging)</text>
    <line x1="40" y1="20" x2="60" y2="40" stroke="#1abc9c" stroke-width="2" />
    <text x="50" y="30" font-size="16" fill="#fff">Gaussian Blur</text>
    <rect width="20" height="20" fill="#16a085" rx="5" />
    <text x="10" y="10" font-size="16" fill="#fff">Sharpen</text>
    <line x1="60" y1="20" x2="80" y2="40" stroke="#16a085" stroke-width="2" />
    <text x="70" y="30" font-size="16" fill="#fff">Smoothing Filters (Low-pass)</text>
  </g>
  
  <!-- Section 3: Smoothing and Sharpening Filters -->
  <g transform="translate(20, 150)">
    <g data-narration="Smoothing and Sharpening Filters">
      <rect width="100" height="20" fill="#e74c3c" rx="5" />
      <text x="10" y="10" font-size="14" fill="#fff">Box/Mean Blur</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="2s" begin="-1s" />
    </g>
    <line x1="20" y1="40" x2="40" y2="60" stroke="#e74c3c" stroke-width="2" />
    <text x="30" y="50" font-size="16" fill="#fff">Gaussian Blur</text>
    <g data-narration="Smoothing and Sharpening Filters">
      <rect width="100" height="20" fill="#9b59b6" rx="5" />
      <text x="10" y="10" font-size="14" fill="#fff">Median Blur</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="2s" begin="-1s" />
    </g>
    <line x1="60" y1="40" x2="80" y2="60" stroke="#9b59b6" stroke-width="2" />
    <text x="70" y="50" font-size="16" fill="#fff">Bilateral Filter</text>
  </g>
  
  <!-- Section 4: Sharpening Filters -->
  <g transform="translate(20, 200)">
    <g data-narration="Sharpening Filters">
      <rect width="100" height="20" fill="#34a85a" rx="5" />
      <text x="10" y="10" font-size="14" fill="#fff">Sharpen</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="2s" begin="-1s" />
    </g>
    <line x1="20" y1="40" x2="40" y2="60" stroke="#34a85a" stroke-width="2" />
    <text x="30" y="50" font-size="16" fill="#fff">Unsharp Mask</text>
  </g>
  
  <!-- Footer -->
  <g transform="translate(20, 350)">
    <rect width="100" height="20" fill="#3498db" rx="5" />
    <text x="10" y="10" font-size="14" fill="#fff">Image Processing Point Operators</text>
  </g>
</svg>