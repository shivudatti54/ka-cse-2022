<svg width="420" height="400" data-topic-id="linear-programming-problem-formulation-formation">
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="50%" stop-color="#C2E9F3" stop-opacity="1"/>
            <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <style>
        .section {
            margin-bottom: 20px;
        }
    </style>

    <rect x="50" y="50" width="320" height="300" style="fill: url(#pastel-gradient)" opacity="0.5"/>

    <g transform="translate(50, 50)">
        <text x="10" y="10" font-size="24" font-weight="bold" fill="#2F4F7F">Linear Programming Problem Formulation</text>

        <section data-narration="Introduction to Linear Programming">
            <rect x="10" y="40" width="300" height="30" style="fill: #FFC107" opacity="0.5"/>
            <text x="15" y="50" font-size="18" fill="#2F4F7F">Linear Programming (LP) is one of the most fundamental and widely used techniques in Operations Research and Optimization.</text>
        </section>

        <section data-narration="Key Components of an LP Problem">
            <rect x="10" y="60" width="300" height="30" style="fill: #C7B8EA" opacity="0.5"/>
            <rect x="10" y="90" width="300" height="30" style="fill: #2F4F7F" opacity="0.5"/>
            <rect x="10" y="130" width="300" height="30" style="fill: #C2E9F3" opacity="0.5"/>
            <text x="15" y="50" font-size="18" fill="#2F4F7F">Every Linear Programming problem consists of three essential components:</text>
            <text x="15" y="90" font-size="18" fill="#2F4F7F">1. Decision Variables:</text>
            <text x="15" y="130" font-size="18" fill="#2F4F7F">2. Objective Function:</text>
            <text x="15" y="170" font-size="18" fill="#2F4F7F">3. Constraints:</text>
        </section>

        <section data-narration="Decision Variables">
            <rect x="10" y="200" width="300" height="30" style="fill: #87CEEB" opacity="0.5"/>
            <text x="15" y="210" font-size="18" fill="#2F4F7F">Decision Variables:</text>
            <text x="15" y="240" font-size="18" fill="#2F4F7F">These are the unknown quantities that we seek to determine.</text>
        </section>

        <section data-narration="Objective Function">
            <rect x="10" y="270" width="300" height="30" style="fill: #C7B8EA" opacity="0.5"/>
            <text x="15" y="280" font-size="18" fill="#2F4F7F">Objective Function:</text>
            <text x="15" y="310" font-size="18" fill="#2F4F7F">This is a linear function of the decision variables that we want to either maximize or minimize.</text>
        </section>

        <section data-narration="Constraints">
            <rect x="10" y="330" width="300" height="30" style="fill: #2F4F7F" opacity="0.5"/>
            <text x="15" y="340" font-size="18" fill="#2F4F7F">Constraints:</text>
            <text x="15" y="370" font-size="18" fill="#2F4F7F">These are the restrictions or limitations on the decision variables.</text>
        </section>

        <g transform="translate(50, 50)">
            <text x="10" y="10" font-size="24" font-weight="bold" fill="#2F4F7F">Formation</text>
        </g>
    </g>

    <footer>
        <text x="10" y="370" font-size="18" fill="#2F4F7F">Formation</text>
    </footer>
</svg>