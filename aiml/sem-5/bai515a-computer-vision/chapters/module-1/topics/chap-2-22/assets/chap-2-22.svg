<svg width="420" height="400" data-topic-id="chap-2-22" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="420" height="400" fill="url(#background-gradient)"/>
  <text x="15" y="20" font-size="24" fill="#3498DB" text-anchor="start">Chap 2 22</text>

  <section data-narration="What is Photometric Image Formation?">
    <rect x="0" y="50" width="420" height="50" fill="#F7F7F7" rx="10"/>
    <text x="10" y="30" font-size="18" fill="#3498DB">Photometric Image Formation</text>
    <text x="10" y="60" font-size="18" fill="#666666">Refers to the process of converting light into electrical signals</text>
  </section>

  <section data-narration="Key Components of Photometric Image Formation">
    <rect x="0" y="110" width="420" height="50" fill="#F7F7F7" rx="10"/>
    <text x="10" y="90" font-size="18" fill="#3498DB">Sensor</text>
    <text x="10" y="120" font-size="18" fill="#666666">Conversions light into electrical signals</text>
    <rect x="150" y="110" width="150" height="50" fill="#F7F7F7" rx="10"/>
    <text x="160" y="90" font-size="18" fill="#3498DB">Optics</text>
    <text x="160" y="120" font-size="18" fill="#666666">Focus and direct light onto sensor</text>
  </section>

  <section data-narration="Types of Photometric Images">
    <rect x="0" y="170" width="420" height="50" fill="#F7F7F7" rx="10"/>
    <text x="10" y="150" font-size="18" fill="#3498DB">Analog Image</text>
    <text x="10" y="170" font-size="18" fill="#666666">Continuous signal represents intensity of light</text>
    <rect x="150" y="170" width="150" height="50" fill="#F7F7F7" rx="10"/>
    <text x="160" y="150" font-size="18" fill="#3498DB">Digital Image</text>
    <text x="160" y="170" font-size="18" fill="#666666">Discrete signal represents intensity of light</text>
  </section>

  <section data-narration="Key Concepts">
    <rect x="0" y="230" width="420" height="50" fill="#F7F7F7" rx="10"/>
    <text x="10" y="210" font-size="18" fill="#3498DB">Resolution</text>
    <text x="10" y="230" font-size="18" fill="#666666">Amount of detail captured by sensor</text>
    <rect x="150" y="230" width="150" height="50" fill="#F7F7F7" rx="10"/>
    <text x="160" y="210" font-size="18" fill="#3498DB">Dynamic Range</text>
    <text x="160" y="230" font-size="18" fill="#666666">Range of light intensities captured by sensor</text>
    <rect x="300" y="230" width="120" height="50" fill="#F7F7F7" rx="10"/>
    <text x="310" y="210" font-size="18" fill="#3498DB">Signal-to-Noise Ratio (SNR)</text>
    <text x="310" y="230" font-size="18" fill="#666666">Ratio of signal strength to noise strength</text>
  </section>

  <section data-narration="Example">
    <rect x="0" y="290" width="420" height="50" fill="#F7F7F7" rx="10"/>
    <text x="10" y="270" font-size="18" fill="#3498DB">Camera captures image</text>
    <text x="10" y="290" font-size="18" fill="#666666">Image formation process converts light into electrical signals</text>
  </section>

  <footer>
    <text x="15" y="380" font-size="18" fill="#3498DB">Chap 2 22</text>
  </footer>
</svg>