<svg width="420" height="400" data-topic-id="chap-3-31">
  <style>
    /* Add some basic styles to make the SVG look better */
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
    }
    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .section {
      margin-bottom: 20px;
    }
  </style>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="50%" y="50%" width="220%" height="200%" style="fill: url(#grad)"/>
  <g transform="translate(50%, 50%)">
    <g data-narration="Light Entrance">
      <circle cx="0" cy="0" r="10" fill="#2E4053"/>
      <text x="0" y="12" text-anchor="middle" font-size="16" font-family="Arial">Light Entrance</text>
    </g>
    <g data-narration="Refraction">
      <circle cx="0" cy="0" r="10" fill="#2E4053"/>
      <text x="0" y="12" text-anchor="middle" font-size="16" font-family="Arial">Refraction</text>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="45 0 0" dur="2s".begin="1s"/>
    </g>
    <g data-narration="Focus">
      <circle cx="0" cy="0" r="10" fill="#2E4053"/>
      <text x="0" y="12" text-anchor="middle" font-size="16" font-family="Arial">Focus</text>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="90 0 0" dur="2s".begin="2s"/>
    </g>
    <g data-narration="Signal Transmission">
      <circle cx="0" cy="0" r="10" fill="#2E4053"/>
      <text x="0" y="12" text-anchor="middle" font-size="16" font-family="Arial">Signal Transmission</text>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="135 0 0" dur="2s" begin="3s"/>
    </g>
    <g data-narration="Image Formation">
      <circle cx="0" cy="0" r="10" fill="#2E4053"/>
      <text x="0" y="12" text-anchor="middle" font-size="16" font-family="Arial">Image Formation</text>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="180 0 0" dur="2s" begin="4s"/>
    </g>
    <g data-narration="Characteristics of a Photometric Image">
      <rect x="50" y="50" width="100" height="50" fill="#87CEEB" rx="10"/>
      <rect x="150" y="50" width="100" height="50" fill="#ADD8E6" rx="10"/>
      <text x="100" y="70" text-anchor="middle" font-size="16" font-family="Arial">Intensity</text>
      <text x="250" y="70" text-anchor="middle" font-size="16" font-family="Arial">Radiance</text>
      <text x="100" y="100" text-anchor="middle" font-size="16" font-family="Arial">Illuminance</text>
      <text x="250" y="100" text-anchor="middle" font-size="16" font-family="Arial">Exposure</text>
    </g>
    <g data-narration="Types of Photometric Images">
      <rect x="50" y="200" width="100" height="50" fill="#87CEEB" rx="10"/>
      <rect x="150" y="200" width="100" height="50" fill="#ADD8E6" rx="10"/>
      <text x="100" y="220" text-anchor="middle" font-size="16" font-family="Arial">Grayscale</text>
      <text x="250" y="220" text-anchor="middle" font-size="16" font-family="Arial">Color</text>
      <text x="100" y="250" text-anchor="middle" font-size="16" font-family="Arial">Binary</text>
      <text x="250" y="250" text-anchor="middle" font-size="16" font-family="Arial">Image</text>
    </g>
    <g data-narration="Arrow Markers">
      <line x1="50" y1="50" x2="150" y2="50" stroke="#333333" stroke-width="2"/>
      <line x1="150" y1="50" x2="150" y2="200" stroke="#333333" stroke-width="2"/>
      <line x1="150" y2="200" x2="250" y2="200" stroke="#333333" stroke-width="2"/>
    </g>
    <text x="50%" y="10" transform="rotate(0 50 0)" class="title">Image Formation and Photometric Images</text>
    <text x="50%" y="350" class="footer">Created with love for Education</text>
  </g>
</svg>