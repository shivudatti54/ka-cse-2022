<svg width="420" height="400" data-topic-id="textbook-1-chap-1-11">
  <defs>
    <linearGradient id="gradient-background" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient-background)" rx="10"/>
  <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" fill="#AAAAAA" text-anchor="start">
    <tspan>Textbook 1 Chap 1 11</tspan>
  </text>
  <text x="10" y="60" font-size="18" font-family="Arial, sans-serif" fill="#AAAAAA" text-anchor="start">
    <tspan data-narration="1.1.1">Definition of Photometric Image</tspan>
  </text>
  <rect x="10" y="80" width="400" height="50" fill="#F7F7F7" rx="5" stroke="#AAAAAA" stroke-width="1"/>
  <text x="15" y="90" font-size="16" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">
    A photometric image is a numerical representation of the intensity of light that falls on a 2D surface, such as a camera sensor.
  </text>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="10 0" begin="0s" duration="2s" repeatCount="1"/>
  <rect x="15" y="110" width="300" height="30" fill="#F7F7F7" rx="5" stroke="#AAAAAA" stroke-width="1"/>
  <text x="20" y="120" font-size="16" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">
    <tspan data-narration="1.1.2">Formation of Photometric Image</tspan>
  </text>
  <rect x="20" y="140" width="280" height="30" fill="#F7F7F7" rx="5" stroke="#AAAAAA" stroke-width="1"/>
  <text x="25" y="150" font-size="16" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">
    The formation of a photometric image occurs through a process called radiometry. Radiometry involves measuring the intensity of light emitted or reflected by an object.
  </text>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="30 0" begin="2s" duration="2s" repeatCount="1"/>
  <rect x="25" y="170" width="260" height="30" fill="#F7F7F7" rx="5" stroke="#AAAAAA" stroke-width="1"/>
  <text x="30" y="180" font-size="16" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">
    <tspan data-narration="1.1.3">Components of a Photometric Image</tspan>
  </text>
  <rect x="30" y="200" width="240" height="30" fill="#F7F7F7" rx="5" stroke="#AAAAAA" stroke-width="1"/>
  <text x="35" y="210" font-size="16" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">
    A photometric image is composed of the following components:
    <tspan data-narration="1.1.3.1">Intensity</tspan>
    <tspan data-narration="1.1.3.2">Color</tspan>
    <tspan data-narration="1.1.3.3">Radiance</tspan>
  </text>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="50 0" begin="4s" duration="2s" repeatCount="1"/>
  <rect x="35" y="230" width="220" height="30" fill="#F7F7F7" rx="5" stroke="#AAAAAA" stroke-width="1"/>
  <text x="40" y="240" font-size="16" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">
    <tspan data-narration="1.1.4">Image Formation Process</tspan>
  </text>
  <rect x="40" y="260" width="200" height="30" fill="#F7F7F7" rx="5" stroke="#AAAAAA" stroke-width="1"/>
  <text x="45" y="270" font-size="16" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">
    The image formation process involves the following steps:
    <tspan data-narration="1.1.4.1">Object Illumination</tspan>
    <tspan data-narration="1.1.4.2">Radiation</tspan>
    <tspan data-narration="1.1.4.3">Reflection</tspan>
    <tspan data-narration="1.1.4.4">Transmission</tspan>
    <tspan data-narration="1.1.4.5">Receive</tspan>
    <tspan data-narration="1.1.4.6">Photometric Image Formation</tspan>
  </text>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="70 0" begin="6s" duration="2s" repeatCount="1"/>
  <rect x="45" y="290" width="170" height="30" fill="#F7F7F7" rx="5" stroke="#AAAAAA" stroke-width="1"/>
  <text x="50" y="300" font-size="16" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">
    <tspan data-narration="1.1.5">Key Concepts</tspan>
  </text>
  <rect x="50" y="320" width="120" height="30" fill="#F7F7F7" rx="5" stroke="#AAAAAA" stroke-width="1"/>
  <text x="55" y="330" font-size="16" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">
    Radiometry: The measurement of the intensity of light.
    <tspan data-narration="1.1.5.2">Photometric Image: A numerical representation of the intensity of reflected light.</tspan>
  </text>
  <text x="10" y="380" font-size="18" font-family="Arial, sans-serif" fill="#AAAAAA" text-anchor="start">
    <tspan>References</tspan>
  </text>
</svg>