<svg width="420" height="400" data-topic-id="the-digital-camera" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Title -->
  <text x="50%" y="20%" font-size="24" fill="#3498db" text-anchor="middle">The Digital Camera</text>

  <!-- Section 1: Scene Radiance and the Lens -->
  <rect x="20" y="80" width="380" height="120" fill="#f9f9f9" rx="10"/>
  <text x="30" y="90" font-size="18" fill="#333" text-anchor="middle" data-narration="The operation of a digital camera begins with light reflecting off objects in a scene. This light, characterized by its intensity and spectral composition (color), travels towards the camera. The first component it encounters is the camera lens. The lens collects the incoming light rays and focuses them onto a single point on the image sensor. It performs a perspective projection, transforming the 3D world into a 2D image. A longer focal length provides magnification (telephoto), while a shorter focal length provides a wider field of view (wide-angle). The adjustable opening within the lens that controls the amount of light entering the camera is called the aperture." data-topic-id="scene-radiance-and-the-lens"/>
  <line x1="50" y1="120" x2="50" y2="180" stroke="#3498db" stroke-width="2"/>
  <line x1="50" y1="180" x2="50" y2="120" stroke="#3498db" stroke-width="2"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 120" to="360 50 120" dur="10s" begin="-2s"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 120" to="360 50 120" dur="10s" begin="-4s"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 120" to="360 50 120" dur="10s" begin="-6s"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 120" to="360 50 120" dur="10s" begin="-8s"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 120" to="360 50 120" dur="10s" begin="-10s"/>

  <!-- Section 2: Focal Length -->
  <rect x="20" y="220" width="380" height="120" fill="#f9f9f9" rx="10"/>
  <text x="30" y="230" font-size="18" fill="#333" text-anchor="middle" data-narration="The focal length of a lens refers to its ability to magnify or reduce the size of objects in a scene. A longer focal length provides magnification (telephoto), while a shorter focal length provides a wider field of view (wide-angle)." data-topic-id="focal-length"/>
  <line x1="50" y1="260" x2="50" y2="320" stroke="#3498db" stroke-width="2"/>
  <line x1="50" y1="320" x2="50" y2="260" stroke="#3498db" stroke-width="2"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 260" to="360 50 260" dur="10s" begin="-12s"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 260" to="360 50 260" dur="10s" begin="-14s"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 260" to="360 50 260" dur="10s" begin="-16s"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 260" to="360 50 260" dur="10s" begin="-18s"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 260" to="360 50 260" dur="10s" begin="-20s"/>

  <!-- Section 3: Aperture -->
  <rect x="20" y="320" width="380" height="120" fill="#f9f9f9" rx="10"/>
  <text x="30" y="330" font-size="18" fill="#333" text-anchor="middle" data-narration="The aperture of a lens refers to the adjustable opening that controls the amount of light entering the camera. A lower f-number means a larger aperture opening, allowing more light to pass through." data-topic-id="aperture"/>
  <line x1="50" y1="360" x2="50" y2="420" stroke="#3498db" stroke-width="2"/>
  <line x1="50" y1="420" x2="50" y2="360" stroke="#3498db" stroke-width="2"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 360" to="360 50 360" dur="10s" begin="-22s"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 360" to="360 50 360" dur="10s" begin="-24s"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 360" to="360 50 360" dur="10s" begin="-26s"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 360" to="360 50 360" dur="10s" begin="-28s"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 360" to="360 50 360" dur="10s" begin="-30s"/>

  <!-- Section 4: Image Formation Pipeline -->
  <rect x="20" y="420" width="380" height="120" fill="#f9f9f9" rx="10"/>
  <text x="30" y="430" font-size="18" fill="#333" text-anchor="middle" data-narration="The image formation pipeline is the critical first step upon which all subsequent computer vision algorithms depend. The quality and characteristics of the captured image directly influence the performance of tasks like object detection, image segmentation, and feature extraction." data-topic-id="image-formation-pipeline"/>
  <line x1="50" y1="460" x2="50" y2="520" stroke="#3498db" stroke-width="2"/>
  <line x1="50" y1="520" x2="50" y2="460" stroke="#3498db" stroke-width="2"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 460" to="360 50 460" dur="10s" begin="-32s"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 460" to="360 50 460" dur="10s" begin="-34s"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 460" to="360 50 460" dur="10s" begin="-36s"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 460" to="360 50 460" dur="10s" begin="-38s"/>
  <animateTransform attributeName="transform" type="rotate" from="0 50 460" to="360 50 460" dur="10s" begin="-40s"/>

  <!-- Footer -->
  <text x="50%" y="470%" font-size="18" fill="#333" text-anchor="middle">Created with love and care</text>
</svg>