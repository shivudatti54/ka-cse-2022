<svg width="420" height="400" data-topic-id="linear-filtering-in-computer-vision" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A288A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2E4357" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)"/>
  
  <!-- Title Section -->
  <g id="title-section" transform="translate(10,10)">
    <text data-narration="Introduction to Linear Filtering" x="10" y="30" font-size="24" font-family="Arial" fill="#2E4357">Linear Filtering</text>
  </g>
  
  <!-- Convolution Operation Section -->
  <g id="convolution-operation-section" transform="translate(10,60)">
    <rect x="0" y="0" width="300" height="120" fill="#F7F7F7" rx="10"/>
    <text data-narration="The Convolution Operation" x="10" y="20" font-size="18" font-family="Arial" fill="#2E4357">Convolution Operation</text>
    <rect x="10" y="40" width="50" height="50" fill="#F7DC6F"/>
    <text data-narration="Mathematical Definition" x="10" y="60" font-size="16" font-family="Arial" fill="#2E4357">Output(x,y) = ∑∑ I(x-i, y-j) * K(i,j)</text>
    <text data-narration="Convolution Process Step-by-Step" x="10" y="100" font-size="16" font-family="Arial" fill="#2E4357">
      <animateTransform attributeName="x" type="translate" from="10" to="10" begin="0s" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="y" type="translate" from="50" to="110" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>
  </g>
  
  <!-- Common Types of Linear Filter Section -->
  <g id="common-types-section" transform="translate(10,210)">
    <rect x="0" y="0" width="300" height="120" fill="#F7F7F7" rx="10"/>
    <text data-narration="Common Types of Linear Filters" x="10" y="20" font-size="18" font-family="Arial" fill="#2E4357">Common Types of Linear Filters</text>
    <rect x="10" y="40" width="50" height="50" fill="#F7DC6F"/>
    <text data-narration="Requirements" x="10" y="60" font-size="16" font-family="Arial" fill="#2E4357">
      <animateTransform attributeName="x" type="translate" from="10" to="10" begin="0s" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="y" type="translate" from="50" to="110" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>
    <rect x="10" y="100" width="50" height="50" fill="#F7DC6F"/>
    <text data-narration="Requirements (continued)" x="10" y="120" font-size="16" font-family="Arial" fill="#2E4357">
      <animateTransform attributeName="x" type="translate" from="10" to="10" begin="0s" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="y" type="translate" from="50" to="110" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>
  </g>
  
  <!-- Footer Section -->
  <g id="footer-section" transform="translate(10,280)">
    <text data-narration="Linear Filtering in Computer Vision" x="10" y="300" font-size="18" font-family="Arial" fill="#2E4357">Linear Filtering</text>
  </g>
</svg>