<svg width="420" height="400" data-topic-id="Geometric-Transformations" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="colorGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A7A7A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#84B7F5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#colorGradient)"/>
  <g transform="matrix(1,0,0,1,0,0)">
    <title>Geometric Transformations</title>
    <rect x="10" y="10" width="400" height="30" fill="#F7F7F7" opacity="0.8" rx="5"/>
    <text x="15" y="25" font-size="18" fill="#333" text-anchor="start">Introduction to Geometric Transformations</text>
    <rect x="10" y="50" width="400" height="200" fill="#F7F7F7" opacity="0.8" rx="5"/>
    <g transform="matrix(1,0,0,1,0,0)">
      <rect x="10" y="60" width="180" height="120" fill="#F7F7F7" opacity="0.8" rx="5"/>
      <text x="15" y="80" font-size="16" fill="#333" text-anchor="start">Coordinate Systems</text>
      <rect x="15" y="100" width="50" height="30" fill="#F7F7F7" opacity="0.8" rx="5"/>
      <text x="25" y="115" font-size="14" fill="#333" text-anchor="start">Spatial Domain (x,y) → Transformed Domain (u,v)</text>
      <rect x="65" y="100" width="50" height="30" fill="#F7F7F7" opacity="0.8" rx="5"/>
      <text x="75" y="115" font-size="14" fill="#333" text-anchor="start">u = f(x,y) → v = g(x,y)</text>
      <rect x="10" y="230" width="400" height="150" fill="#F7F7F7" opacity="0.8" rx="5"/>
      <g transform="matrix(1,0,0,1,0,0)">
        <rect x="10" y="240" width="180" height="120" fill="#F7F7F7" opacity="0.8" rx="5"/>
        <text x="15" y="260" font-size="16" fill="#333" text-anchor="start">Forward vs. Inverse Mapping</text>
        <rect x="15" y="280" width="50" height="30" fill="#F7F7F7" opacity="0.8" rx="5"/>
        <text x="25" y="295" font-size="14" fill="#333" text-anchor="start">Forward Mapping: (x,y) → (u,v)</text>
        <rect x="65" y="280" width="50" height="30" fill="#F7F7F7" opacity="0.8" rx="5"/>
        <text x="75" y="295" font-size="14" fill="#333" text-anchor="start">Inverse Mapping: (u,v) → (x,y)</text>
      </g>
      <rect x="10" y="400" width="400" height="30" fill="#F7F7F7" opacity="0.8" rx="5"/>
      <text x="15" y="415" font-size="18" fill="#333" text-anchor="start">Types of Geometric Transformations</text>
      <rect x="10" y="435" width="400" height="150" fill="#F7F7F7" opacity="0.8" rx="5"/>
      <g transform="matrix(1,0,0,1,0,0)">
        <rect x="10" y="445" width="180" height="120" fill="#F7F7F7" opacity="0.8" rx="5"/>
        <text x="15" y="465" font-size="16" fill="#333" text-anchor="start">Linear Transformations</text>
        <rect x="15" y="485" width="50" height="30" fill="#F7F7F7" opacity="0.8" rx="5"/>
        <text x="25" y="500" font-size="14" fill="#333" text-anchor="start">Affine Transform: f(x,y) = ax + by + c</text>
        <rect x="65" y="485" width="50" height="30" fill="#F7F7F7" opacity="0.8" rx="5"/>
        <text x="75" y="500" font-size="14" fill="#333" text-anchor="start">Perspective Transformation: f(x,y) = (ax + by + c) / (dx + ey + f)</text>
      </g>
      <rect x="10" y="600" width="400" height="30" fill="#F7F7F7" opacity="0.8" rx="5"/>
      <text x="15" y="615" font-size="18" fill="#333" text-anchor="start">Conclusion</text>
      <rect x="10" y="635" width="400" height="30" fill="#F7F7F7" opacity="0.8" rx="5"/>
      <text x="15" y="650" font-size="18" fill="#333" text-anchor="start">References</text>
    </g>
  </g>
  <animate xmlns="http://www.w3.org/1999/11/25/xlink" begin="0s" dur="5s" repeatCount="indefinite">
    <animateTransform attributeName="transform" type="scale" from="1 1" to="1.2 1.2" dur="1s"/>
  </animate>
</svg>