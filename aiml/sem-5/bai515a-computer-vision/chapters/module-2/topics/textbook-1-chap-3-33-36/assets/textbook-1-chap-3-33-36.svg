<svg width="420" height="400" data-topic-id="textbook-1-chap-3-33-36">
  <title>Textbook 1 Chap 3 33 36</title>
  <desc>Animated Educational Diagram for Image Processing Techniques</desc>
  <style>
    /* Add some basic styling to our diagram */
    body {
      background-color: #87CEEB; /* Pastel Blue */
      color: #4C5154; /* Text Color */
    }
    .section {
      padding: 20px;
      border-bottom: 1px solid #ccc;
    }
    .section:last-child {
      border-bottom: none;
    }
    .icon {
      font-size: 24px;
      margin-right: 10px;
    }
  </style>

  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B2FFFC" stop-opacity="1" />
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="380" height="360" fill="url(#gradient)" rx="10" />

  <section data-narration="Section 1: Neighborhood Operators">
    <div class="section">
      <div class="icon"><img src="gaussian-filter-icon.png" alt="Gaussian Filter Icon" /></div>
      <h2>Gaussian Filter</h2>
      <p>A Gaussian filter is a type of neighborhood operator that uses a Gaussian distribution to weight the pixels within the neighborhood.</p>
    </div>
    <div class="section">
      <div class="icon"><img src="median-filter-icon.png" alt="Median Filter Icon" /></div>
      <h2>Median Filter</h2>
      <p>A median filter is a type of neighborhood operator that uses the median value of the pixels within the neighborhood to replace the pixel value.</p>
    </div>
    <div class="section">
      <div class="icon"><img src="sobel-operator-icon.png" alt="Sobel Operator Icon" /></div>
      <h2>Sobel Operator</h2>
      <p>A Sobel operator is a type of neighborhood operator that uses the gradient of the pixels within the neighborhood to detect edges.</p>
    </div>
  </section>

  <section data-narration="Section 2: Fourier Transforms">
    <div class="section">
      <div class="icon"><img src="fourier-transform-icon.png" alt="Fourier Transform Icon" /></div>
      <h2>Fourier Transforms</h2>
      <p>A Fourier transform is a mathematical operator that decomposes an image into its constituent frequencies.</p>
    </div>
    <div class="section">
      <div class="icon"><img src="2d-fourier-transform-icon.png" alt="2D Fourier Transform Icon" /></div>
      <h2>2D Fourier Transform</h2>
      <p>A 2D Fourier transform is a mathematical operator that decomposes an image into its constituent frequencies in two dimensions.</p>
    </div>
  </section>

  <section data-narration="Section 3: Applications of Image Processing Techniques">
    <div class="section">
      <h2>Applications of Image Processing Techniques</h2>
      <p>Image processing techniques such as neighborhood operators and Fourier transforms have numerous applications in image analysis and processing.</p>
    </div>
  </section>

  <footer>
    <p>&copy; 2023 Animated Educational Diagram</p>
  </footer>

