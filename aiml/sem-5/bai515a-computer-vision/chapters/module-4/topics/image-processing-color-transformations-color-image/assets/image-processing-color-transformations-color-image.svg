<svg width="420" height="400" data-topic-id="color-image-processing-color-transformations-color-image"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
    <title>Color Image Processing: Color Transformations</title>
    <style>
        /* Add a style for the gradient background */
        background-image: linear-gradient(to bottom, #81A2E4, #0077B5);
        background-size: 100% 100%;
        background-position: center;
    </style>

    <!-- Gradient background -->
    <rect x="0" y="0" width="420" height="400" style="background-image: linear-gradient(to bottom, #81A2E4, #0077B5); background-size: 100% 100%; background-position: center;"></rect>

    <!-- Section 1: Introduction -->
    <g id="introduction" data-narration="Introduction to Color Image Processing">
        <rect x="20" y="20" width="380" height="120" style="fill:#F7F7F7; border-radius: 10px 10px 0 0;">
            <text x="20" y="30" font-size="24" font-family="Arial, sans-serif">Color Image Processing</text>
        </rect>
        <animate id="animate-intro" begin="0s" dur="2s" repeatCount="indefinite">
            <rect x="20" y="20" width="380" height="120" style="fill:#F7F7F7; border-radius: 10px 10px 0 0;">
                <text x="20" y="30" font-size="24" font-family="Arial, sans-serif">Color Image Processing</text>
            </rect>
        </animate>
        <g>
            <line x1="50" y1="100" x2="370" y2="100" stroke="#0077B5" stroke-width="2" />
            <line x1="50" y1="120" x2="370" y2="120" stroke="#0077B5" stroke-width="2" />
        </g>
    </g>

    <!-- Section 2: Color Models -->
    <g id="color-models" data-narration="Color Models">
        <rect x="20" y="160" width="380" height="120" style="fill:#F7F7F7; border-radius: 10px 10px 0 0;">
            <text x="20" y="30" font-size="24" font-family="Arial, sans-serif">Color Models</text>
        </rect>
        <animate id="animate-color-models" begin="2s" dur="2s" repeatCount="indefinite">
            <rect x="20" y="20" width="380" height="120" style="fill:#F7F7F7; border-radius: 10px 10px 0 0;">
                <text x="20" y="30" font-size="24" font-family="Arial, sans-serif">Color Models</text>
            </rect>
        </animate>
        <g>
            <line x1="50" y1="100" x2="370" y2="100" stroke="#0077B5" stroke-width="2" />
            <line x1="50" y1="120" x2="370" y2="120" stroke="#0077B5" stroke-width="2" />
            <line x1="150" y1="50" x2="150" y2="120" stroke="#0077B5" stroke-width="2" />
        </g>
    </g>

    <!-- Section 3: RGB Color Model -->
    <g id="rgb-color-model" data-narration="RGB Color Model">
        <rect x="20" y="300" width="380" height="120" style="fill:#F7F7F7; border-radius: 10px 10px 0 0;">
            <text x="20" y="30" font-size="24" font-family="Arial, sans-serif">RGB Color Model</text>
        </rect>
        <animate id="animate-rgb-color-model" begin="4s" dur="2s" repeatCount="indefinite">
            <rect x="20" y="20" width="380" height="120" style="fill:#F7F7F7; border-radius: 10px 10px 0 0;">
                <text x="20" y="30" font-size="24" font-family="Arial, sans-serif">RGB Color Model</text>
            </rect>
        </animate>
        <g>
            <line x1="50" y1="100" x2="370" y2="100" stroke="#0077B5" stroke-width="2" />
            <line x1="50" y1="120" x2="370" y2="120" stroke="#0077B5" stroke-width="2" />
            <line x1="150" y1="50" x2="150" y2="120" stroke="#0077B5" stroke-width="2" />
        </g>
    </g>

    <!-- Section 4: Converting between Color Models -->
    <g id="color-model-conversion" data-narration="Converting between Color Models">
        <rect x="20" y="400" width="380" height="120" style="fill:#F7F7F7; border-radius: 10px 10px 0 0;">
            <text x="20" y="30" font-size="24" font-family="Arial, sans-serif">Converting between Color Models</text>
        </rect>
        <animate id="animate-color-model-conversion" begin="6s" dur="2s" repeatCount="indefinite">
            <rect x="20" y="20" width="380" height="120" style="fill:#F7F7F7; border-radius: 10px 10px 0 0;">
                <text x="20" y="30" font-size="24" font-family="Arial, sans-serif">Converting between Color Models</text>
            </rect>
        </animate>
        <g>
            <line x1="50" y1="100" x2="370" y2="100" stroke="#0077B5" stroke-width="2" />
            <line x1="50" y1="120" x2="370" y2="120" stroke="#0077B5" stroke-width="2" />
            <line x1="150" y1="50" x2="150" y2="120" stroke="#0077B5" stroke-width="2" />
        </g>
    </g>

    <!-- Section 5: Color Inversion -->
    <g id="color-inversion" data-narration="Color Inversion">
        <rect x="20" y="320" width="380" height="120" style="fill:#F7F7F7; border-radius: 10px 10px 0 0;">
            <text x="20" y="30" font-size="24" font-family="Arial, sans-serif">Color Inversion</text>
        </rect>
        <animate id="animate-color-inversion" begin="8s" dur="2s" repeatCount="indefinite">
            <rect x="20" y="20" width="380" height="120" style="fill:#F7F7F7; border-radius: 10px 10px 0 0;">
                <text x="20" y="30" font-size="24" font-family="Arial, sans-serif">Color Inversion</text>
            </rect>
        </animate>
        <g>
            <line x1="50" y1="100" x2="370" y2="100" stroke="#0077B5" stroke-width="2" />
            <line x1="50" y1="120" x2="370" y2="120" stroke="#0077B5" stroke-width="2" />
            <line x1="150" y1="50" x2="150" y2="120" stroke="#0077B5" stroke-width="2" />
        </g>
    </g>

    <!-- Section 6: Color Normalization -->
    <g id="color-normalization" data-narration="Color Normalization">
        <rect x="20" y="240" width="380" height="120" style="fill:#F7F7F7; border-radius: 10px 10px 0 0;">
            <text x="20" y="30" font-size="24" font-family="Arial, sans-serif">Color Normalization</text>
        </rect>
        <animate id="animate-color-normalization" begin="10s" dur="2s" repeatCount="indefinite">
            <rect x="20" y="20" width="380" height="120" style="fill:#F7F7F7; border-radius: 10px 10px 0 0;">
                <text x="20" y="30" font-size="24" font-family="Arial, sans-serif">Color Normalization</text>
            </rect>
        </animate>
        <g>
            <line x1="50" y1="100" x2="370" y2="100" stroke="#0077B5" stroke-width="2" />
            <line x1="50" y1="120" x2="370" y2="120" stroke="#0077B5" stroke-width="2" />
            <line x1="150" y1="50" x2="150" y2="120" stroke="#0077B5" stroke-width="2" />
        </g>
    </g>

    <!-- Section 7: Color Image Smoothing and Sharpening -->
    <g id="color-image-smoothing-sharpening" data-narration="Color Image Smoothing and Sharpening">
        <rect x="20" y="160" width="380" height="120" style="fill:#F7F7F7; border-radius: 10px 10px 0 0;">
            <text x="20" y="30" font-size="24" font-family="Arial, sans-serif">Color Image Smoothing and Sharpening</text>
        </rect>
        <animate id="animate-color-image-smoothing-sharpening" begin="12s" dur="2s" repeatCount="indefinite">
            <rect x="20" y="20" width="380" height="120" style="fill:#F7F7F7; border-radius: 10px 10px 0 0;">
                <text x="20" y="30" font-size="24" font-family="Arial, sans-serif">Color Image Smoothing and Sharpening</text>
            </rect>
        </animate>
        <g>
            <line x1="50" y1="100" x2="370" y2="100" stroke="#0077B5" stroke-width="2" />
            <line x1="50" y1="120" x2="370" y2="120" stroke="#0077B5" stroke-width="2" />
            <line x1="150" y1="50" x2="150" y2="120" stroke="#0077B5" stroke-width="2" />
        </g>
    </g>

    <!-- Footer -->
    <g id="footer">
        <rect x="20" y="380" width="380" height="20" style="fill:#F7F7F7; border-radius: 0 0 10px 10px;">
            <text x="20" y="20" font-size="18" font-family="Arial, sans-serif">Color Image Processing: Color Transformations</text>
        </rect>
    </g>
</svg>