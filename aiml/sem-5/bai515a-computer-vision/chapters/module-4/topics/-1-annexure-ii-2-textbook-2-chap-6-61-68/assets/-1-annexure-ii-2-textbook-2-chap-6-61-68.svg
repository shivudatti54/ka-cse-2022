<svg width="420" height="400" data-topic-id="color-fundamentals-and-color-models">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#62B3FA" stop-opacity="1" />
      <stop offset="100%" stop-color="#8BC34A" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" opacity="0.7" />
  
  <!-- Title -->
  <text x="10" y="20" font-size="24" font-family="Arial" fill="#2F4F7F">
    Color Fundamentals and Color Models
  </text>
  
  <!-- Section 1: Color Definition -->
  <section data-narration="6.1 Color Fundamentals">
    <rect x="10" y="50" width="400" height="100" fill="#F7F7F7" rx="10" />
    <text x="15" y="70" font-size="18" font-family="Arial" fill="#2F4F7F">
      Color is a form of electromagnetic radiation that is visible to the human eye.
    </text>
  </section>
  
  <!-- Section 2: Color Properties -->
  <section data-narration="6.1 Color Properties">
    <rect x="10" y="170" width="400" height="100" fill="#F7F7F7" rx="10" />
    <text x="15" y="190" font-size="18" font-family="Arial" fill="#2F4F7F">
      Hue: The actual color itself (e.g., red, blue, green)
      Saturation: The purity or intensity of a color
      Value: The lightness or darkness of a color
    </text>
  </section>
  
  <!-- Section 3: RGB Model -->
  <section data-narration="6.1 Color Models">
    <rect x="10" y="280" width="400" height="100" fill="#F7F7F7" rx="10" />
    <text x="15" y="300" font-size="18" font-family="Arial" fill="#2F4F7F">
      RGB (Red, Green, Blue) Model
      <animate begin="0s" dur="2s" attributeName="opacity" from="1" to="0" repeatCount="indefinite" />
    </text>
    <animate begin="0.5s" dur="2s" attributeName="opacity" from="0" to="1" repeatCount="indefinite" />
    <animate begin="1s" dur="2s" attributeName="opacity" from="1" to="0" repeatCount="indefinite" />
  </section>
  
  <!-- Section 4: CMYK Model -->
  <section data-narration="6.1 Color Models">
    <rect x="10" y="380" width="400" height="100" fill="#F7F7F7" rx="10" />
    <text x="15" y="400" font-size="18" font-family="Arial" fill="#2F4F7F">
      CMYK (Cyan, Magenta, Yellow, Black) Model
      <animate begin="0s" dur="2s" attributeName="opacity" from="1" to="0" repeatCount="indefinite" />
    </text>
    <animate begin="0.5s" dur="2s" attributeName="opacity" from="0" to="1" repeatCount="indefinite" />
    <animate begin="1s" dur="2s" attributeName="opacity" from="1" to="0" repeatCount="indefinite" />
  </section>
  
  <!-- Section 5: YCbCr Model -->
  <section data-narration="6.1 Color Models">
    <rect x="10" y="480" width="400" height="100" fill="#F7F7F7" rx="10" />
    <text x="15" y="500" font-size="18" font-family="Arial" fill="#2F4F7F">
      YCbCr (Luminance, Blue, Chrominance) Model
      <animate begin="0s" dur="2s" attributeName="opacity" from="1" to="0" repeatCount="indefinite" />
    </text>
    <animate begin="0.5s" dur="2s" attributeName="opacity" from="0" to="1" repeatCount="indefinite" />
    <animate begin="1s" dur="2s" attributeName="opacity" from="1" to="0" repeatCount="indefinite" />
  </section>
  
  <!-- Section 6: Pseudocolor Image Processing -->
  <section data-narration="6.2 Pseudocolor Image Processing">
    <rect x="10" y="580" width="400" height="100" fill="#F7F7F7" rx="10" />
    <text x="15" y="600" font-size="18" font-family="Arial" fill="#2F4F7F">
      Pseudocolor Image Processing involves converting a grayscale image into a color image using a color map or palette.
    </text>
  </section>
  
  <!-- Footer -->
  <text x="10" y="390" font-size="12" font-family="Arial" fill="#2F4F7F">
    Color Fundamentals and Color Models
  </text>
</svg>