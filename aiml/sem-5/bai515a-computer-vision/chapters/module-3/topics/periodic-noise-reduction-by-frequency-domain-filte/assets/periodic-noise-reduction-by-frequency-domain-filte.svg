<svg width="420" height="400" data-topic-id="periodic-noise-reduction-by-frequency-domain-filtering" viewBox="0 0 420 400">
  <defs>
    <linearGradient id="color-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5c7080" stop-opacity="1"/>
      <stop offset="100%" stop-color="#56b3fa" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="color-gradient-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7dc6f" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f2c464" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect x="0" y="0" width="420" height="400" fill="url(#color-gradient)"/>
  <rect x="0" y="0" width="420" height="400" fill="url(#color-gradient-2)" opacity="0.5"/>

  <!-- Title -->
  <text x="50" y="20" font-size="24" font-family="Arial" fill="#5c7080" text-anchor="middle">Periodic Noise Reduction by Frequency Domain Filtering</text>

  <!-- Section 1: Introduction -->
  <rect x="10" y="50" width="400" height="100" fill="#ffffff" rx="10"/>
  <text x="20" y="70" font-size="18" font-family="Arial" fill="#000000" data-narration="In image processing, noise can be a significant problem that affects the quality of the image. There are two types of noise: additive and multiplicative. Additive noise is a random variation in the intensity of the image, while multiplicative noise is a random variation in the contrast of the image. This study material focuses on periodic noise reduction by frequency domain filtering, which is a common technique used to remove additive noise from images." fill="#000000"/>
  <animateTransform attributeName="transform" type="translate" from="0 50" to="0 150" dur="2000" begin="0s" repeatCount="1"/>
  <animateTransform attributeName="transform" type="translate" from="0 150" to="0 250" dur="2000" begin="2s" repeatCount="1"/>
  <animateTransform attributeName="transform" type="translate" from="0 250" to="0 350" dur="2000" begin="4s" repeatCount="1"/>

  <!-- Section 2: Definition of Periodic Noise -->
  <rect x="10" y="170" width="400" height="100" fill="#ffffff" rx="10"/>
  <text x="20" y="190" font-size="18" font-family="Arial" fill="#000000" data-narration="Periodic noise is a type of additive noise that has a regular, periodic pattern. It can be seen as a repeating disturbance in the image, with a fixed frequency and amplitude. Examples of periodic noise include salt and pepper noise, Gaussian noise, and impulsive noise." fill="#000000"/>
  <animateTransform attributeName="transform" type="translate" from="0 170" to="0 270" dur="2000" begin="0s" repeatCount="1"/>
  <animateTransform attributeName="transform" type="translate" from="0 270" to="0 370" dur="2000" begin="2s" repeatCount="1"/>
  <animateTransform attributeName="transform" type="translate" from="0 370" to="0 470" dur="2000" begin="4s" repeatCount="1"/>

  <!-- Section 3: Definition of Frequency Domain -->
  <rect x="10" y="290" width="400" height="100" fill="#ffffff" rx="10"/>
  <text x="20" y="310" font-size="18" font-family="Arial" fill="#000000" data-narration="The frequency domain is a mathematical representation of a signal or image as a function of frequency. It is a way to decompose a signal or image into its constituent frequencies, making it easier to analyze and manipulate." fill="#000000"/>
  <animateTransform attributeName="transform" type="translate" from="0 290" to="0 390" dur="2000" begin="0s" repeatCount="1"/>
  <animateTransform attributeName="transform" type="translate" from="0 390" to="0 490" dur="2000" begin="2s" repeatCount="1"/>
  <animateTransform attributeName="transform" type="translate" from="0 490" to="0 590" dur="2000" begin="4s" repeatCount="1"/>

  <!-- Section 4: Frequency Domain Filtering -->
  <rect x="10" y="410" width="400" height="100" fill="#ffffff" rx="10"/>
  <text x="20" y="430" font-size="18" font-family="Arial" fill="#000000" data-narration="Frequency domain filtering is a technique used to remove noise from images by reducing or eliminating specific frequencies. The idea is to filter out the frequencies that correspond to the noise present in the image, while preserving the frequencies that correspond to the original image." fill="#000000"/>
  <animateTransform attributeName="transform" type="translate" from="0 410" to="0 510" dur="2000" begin="0s" repeatCount="1"/>
  <animateTransform attributeName="transform" type="translate" from="0 510" to="0 610" dur="2000" begin="2s" repeatCount="1"/>
  <animateTransform attributeName="transform" type="translate" from="0 610" to="0 710" dur="2000" begin="4s" repeatCount="1"/>

  <!-- Section 5: Low-pass Filters -->
  <rect x="10" y="530" width="400" height="100" fill="#ffffff" rx="10"/>
  <text x="20" y="550" font-size="18" font-family="Arial" fill="#000000" data-narration="Low-pass filters reduce high-frequency components and allow low-frequency components to pass through. This is useful for removing high-frequency noise, but may not be effective for removing low-frequency noise." fill="#000000"/>
  <animateTransform attributeName="transform" type="translate" from="0 530" to="0 630" dur="2000" begin="0s" repeatCount="1"/>
  <animateTransform attributeName="transform" type="translate" from="0 630" to="0 730" dur="2000" begin="2s" repeatCount="1"/>
  <animateTransform attributeName="transform" type="translate" from="0 730" to="0 830" dur="2000" begin="4s" repeatCount="1"/>

  <!-- Section 6: High-pass Filters -->
  <rect x="10" y="650" width="400" height="100" fill="#ffffff" rx="10"/>
  <text x="20" y="670" font-size="18" font-family="Arial" fill="#000000" data-narration="High-pass filters reduce low-frequency components and allow high-frequency components to pass through. This is useful for removing low-frequency noise, but may not be effective for removing high-frequency noise." fill="#000000"/>
  <animateTransform attributeName="transform" type="translate" from="0 650" to="0 750" dur="2000" begin="0s" repeatCount="1"/>
  <animateTransform attributeName="transform" type="translate" from="0 750" to="0 850" dur="2000" begin="2s" repeatCount="1"/>
  <animateTransform attributeName="transform" type="translate" from="0 850" to="0 950" dur="2000" begin="4s" repeatCount="1"/>

  <!-- Footer -->
  <text x="50" y="380" font-size="18" font-family="Arial" fill="#5c7080" text-anchor="middle">Periodic Noise Reduction by Frequency Domain Filtering</text>
</svg>