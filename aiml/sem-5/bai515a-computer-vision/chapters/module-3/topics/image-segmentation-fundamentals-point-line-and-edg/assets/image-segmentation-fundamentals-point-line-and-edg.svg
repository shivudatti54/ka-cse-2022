<svg width="420" height="400" data-topic-id="image-segmentation-fundamentals-point-line-and-edge">
  <!-- Header Section -->
  <rect x="50" y="50" width="320" height="100" fill="#3498db" rx="10" />
  <text x="170" y="70" font-size="30" font-family="Arial" fill="#ffffff" text-anchor="middle">Image Segmentation Fundamentals: Point, Line, and Edge Detection</text>

  <!-- Gradient Background -->
  <linearGradient id="gradient-background" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#87ceeb" stop-opacity="1" />
    <stop offset="50%" stop-color="#4682b4" stop-opacity="1" />
    <stop offset="100%" stop-color="#6495ed" stop-opacity="1" />
  </linearGradient>
  <rect x="50" y="150" width="320" height="150" fill="url(#gradient-background)" rx="10" />

  <!-- Section 1: Point Detection -->
  <section id="point-detection" data-narration="Point detection is the process of locating specific points of interest within an image. It involves identifying corners or key points in an image.">
    <rect x="50" y="320" width="320" height="100" fill="#2ecc71" rx="10" />
    <text x="170" y="330" font-size="20" font-family="Arial" fill="#ffffff" text-anchor="middle">Corner Detection</text>
    <animate begin="1s" duration="2000" attributeName="opacity" from="1" to="0.5" repeatCount="indefinite" />
  </section>

  <section id="feature-detection" data-narration="Feature detection is a type of point detection that involves detecting specific features, such as edges, lines, or shapes.">
    <rect x="50" y="430" width="320" height="100" fill="#2ecc71" rx="10" />
    <text x="170" y="440" font-size="20" font-family="Arial" fill="#ffffff" text-anchor="middle">Feature Detection</text>
    <animate begin="2s" duration="2000" attributeName="opacity" from="1" to="0.5" repeatCount="indefinite" />
  </section>

  <!-- Section 2: Line Detection -->
  <section id="line-detection" data-narration="Line detection is the process of locating lines or edges in an image. It involves using gradient information to detect lines.">
    <rect x="50" y="530" width="320" height="100" fill="#2ecc71" rx="10" />
    <text x="170" y="540" font-size="20" font-family="Arial" fill="#ffffff" text-anchor="middle">Hough Transform</text>
    <animate begin="3s" duration="2000" attributeName="opacity" from="1" to="0.5" repeatCount="indefinite" />
  </section>

  <section id="edge-detection" data-narration="Edge detection is the process of locating edges or boundaries in an image. It involves using gradient information to detect edges.">
    <rect x="50" y="630" width="320" height="100" fill="#2ecc71" rx="10" />
    <text x="170" y="640" font-size="20" font-family="Arial" fill="#ffffff" text-anchor="middle">Sobel Operator</text>
    <animate begin="4s" duration="2000" attributeName="opacity" from="1" to="0.5" repeatCount="indefinite" />
  </section>

  <!-- Section 3: Gradient-Based Methods -->
  <section id="gradient-based-methods" data-narration="Gradient-based methods are used for point, line, and edge detection. They involve using gradient information to detect points, lines, or edges.">
    <rect x="50" y="730" width="320" height="100" fill="#2ecc71" rx="10" />
    <text x="170" y="740" font-size="20" font-family="Arial" fill="#ffffff" text-anchor="middle">Gradient-Based Methods</text>
    <animate begin="5s" duration="2000" attributeName="opacity" from="1" to="0.5" repeatCount="indefinite" />
  </section>

  <!-- Section 4: Non-Gradient-Based Methods -->
  <section id="non-gradient-based-methods" data-narration="Non-gradient-based methods are used for point, line, and edge detection. They involve using other methods, such as texture analysis or shape analysis.">
    <rect x="50" y="830" width="320" height="100" fill="#2ecc71" rx="10" />
    <text x="170" y="840" font-size="20" font-family="Arial" fill="#ffffff" text-anchor="middle">Non-Gradient-Based Methods</text>
    <animate begin="6s" duration="2000" attributeName="opacity" from="1" to="0.5" repeatCount="indefinite" />
  </section>

  <!-- Footer Section -->
  <rect x="50" y="930" width="320" height="50" fill="#3498db" rx="10" />
  <text x="170" y="940" font-size="20" font-family="Arial" fill="#ffffff" text-anchor="middle">Image Segmentation Fundamentals: Point, Line, and Edge Detection</text>
</svg>