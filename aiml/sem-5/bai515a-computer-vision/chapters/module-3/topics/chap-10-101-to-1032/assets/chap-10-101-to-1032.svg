<svg width="420" height="400" data-topic-id="chap-10-101-to-1032" version="1.1">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" rx="10"/>
  
  <!-- Title -->
  <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="start" fill="#3498db">
    Image Restoration and Reconstruction
  </text>
  
  <!-- Section 1: Introduction to Image Degradation -->
  <section data-narration="Introduction to Image Degradation">
    <rect x="10" y="50" width="400" height="50" fill="#f9f9f9" rx="10"/>
    <text x="15" y="60" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2ecc71">
      Image degradation refers to the process by which an image undergoes a change in its quality.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 2: Types of Image Degradation -->
  <section data-narration="Types of Image Degradation">
    <rect x="10" y="110" width="400" height="50" fill="#f9f9f9" rx="10"/>
    <text x="15" y="120" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2ecc71">
      Types of image degradation include noise, blur, and compression.
    </text>
    <animate transform="translateX(200)" attributeName="transform" type="translate" from="0 200 200" to="200 200 200" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 3: Effects of Image Degradation -->
  <section data-narration="Effects of Image Degradation">
    <rect x="10" y="170" width="400" height="50" fill="#f9f9f9" rx="10"/>
    <text x="15" y="180" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2ecc71">
      Effects of image degradation include artifacts, loss of details, and reduced contrast.
    </text>
    <animate transform="translateX(400)" attributeName="transform" type="translate" from="0 200 200" to="400 200 200" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 4: Mathematical Model of Image Degradation -->
  <section data-narration="Mathematical Model of Image Degradation">
    <rect x="10" y="230" width="400" height="50" fill="#f9f9f9" rx="10"/>
    <text x="15" y="240" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2ecc71">
      The linear model of image degradation is a mathematical model that describes the degradation of an image as a linear transformation of the original image.
    </text>
    <animate transform="translateX(700)" attributeName="transform" type="translate" from="0 200 200" to="700 200 200" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 5: Non-Linear Model of Image Degradation -->
  <section data-narration="Non-Linear Model of Image Degradation">
    <rect x="10" y="290" width="400" height="50" fill="#f9f9f9" rx="10"/>
    <text x="15" y="300" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2ecc71">
      The non-linear model of image degradation is a mathematical model that describes the degradation of an image as a non-linear transformation of the original image.
    </text>
    <animate transform="translateX(1000)" attributeName="transform" type="translate" from="0 200 200" to="1000 200 200" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Footer -->
  <text x="10" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#3498db">
    Image Restoration and Reconstruction
  </text>
</svg>