<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; fill: #1F2937; }
      .label { font-size: 14px; fill: #374151; }
      .description { font-size: 12px; fill: #6B7280; }
      .box { stroke: #E5E7EB; stroke-width: 2; }
      .arrow { fill: none; stroke: #9CA3AF; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#9CA3AF" />
    </marker>
  </defs>

  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="Create data">
    <text x="400" y="50" class="title" text-anchor="middle">Create data</text>
  </g>

  <!-- Step 1: Introduction -->
  <g id="step1" class="step" data-narration="Introduction to Create data">
    <rect x="100" y="120" width="600" height="100" rx="8" fill="#3B82F6" opacity="0.1" class="box" />
    <text x="400" y="160" class="label" text-anchor="middle" font-weight="bold">Introduction</text>
    <text x="400" y="190" class="description" text-anchor="middle">Understanding the fundamentals</text>
  </g>
  
  <!-- Step 2: Key Concepts -->
  <g id="step2" class="step" data-narration="Exploring the key concepts and definitions">
    <rect x="100" y="250" width="280" height="100" rx="8" fill="#F97316" opacity="0.1" class="box" />
    <text x="240" y="290" class="label" text-anchor="middle" font-weight="bold">Key Concepts</text>
    <text x="240" y="320" class="description" text-anchor="middle">Core principles</text>
  </g>
  
  <!-- Step 3: Applications -->
  <g id="step3" class="step" data-narration="Looking at practical applications">
    <rect x="420" y="250" width="280" height="100" rx="8" fill="#EC4899" opacity="0.1" class="box" />
    <text x="560" y="290" class="label" text-anchor="middle" font-weight="bold">Applications</text>
    <text x="560" y="320" class="description" text-anchor="middle">Real-world uses</text>
  </g>
  
  <!-- Step 4: Process Flow -->
  <g id="step4" class="step" data-narration="Understanding the process flow">
    <path d="M 240 220 L 240 250" class="arrow" />
    <path d="M 560 220 L 560 250" class="arrow" />
  </g>
  
  <!-- Step 5: Implementation -->
  <g id="step5" class="step" data-narration="Implementation and practical considerations">
    <rect x="100" y="380" width="600" height="100" rx="8" fill="#10B981" opacity="0.1" class="box" />
    <text x="400" y="420" class="label" text-anchor="middle" font-weight="bold">Implementation</text>
    <text x="400" y="450" class="description" text-anchor="middle">Putting concepts into practice</text>
  </g>
  
  <!-- Step 6: Connect to Implementation -->
  <g id="step6" class="step" data-narration="Connecting all concepts together">
    <path d="M 240 350 L 400 380" class="arrow" />
    <path d="M 560 350 L 400 380" class="arrow" />
  </g>
</svg>