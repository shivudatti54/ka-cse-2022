<svg width="420" height="400" data-topic-id="exploratory-data-analysis">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64BFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2ECCFF" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <body>
    <section data-narration="Introduction to Strings in Pandas">
      <rect x="10" y="20" width="400" height="100" fill="url(#gradient)"/>
      <text x="20" y="70" font-size="24" fill="#2ECCFF">Vectorized String Operations</text>
      <animateTransform attributeName="transform" type="translate" from="0 20" to="0 100" dur="3s" begin="0s"/>
    </section>
    <section data-narration="String Methods">
      <rect x="10" y="130" width="400" height="100" fill="url(#gradient)" fill-opacity="0.5"/>
      <text x="20" y="180" font-size="18" fill="#64BFFF">String Methods</text>
      <animateTransform attributeName="transform" type="translate" from="0 130" to="0 200" dur="3s" begin="3s"/>
    </section>
    <section data-narration="Strip()">
      <rect x="10" y="230" width="400" height="100" fill="url(#gradient)" fill-opacity="0.25"/>
      <text x="20" y="280" font-size="18" fill="#2ECCFF">Strip</text>
      <animateTransform attributeName="transform" type="translate" from="0 230" to="0 300" dur="3s" begin="6s"/>
    </section>
    <section data-narration="Upper() and Lower()">
      <rect x="10" y="290" width="400" height="100" fill="url(#gradient)" fill-opacity="0.25"/>
      <text x="20" y="340" font-size="18" fill="#64BFFF">Upper() and Lower()</text>
      <animateTransform attributeName="transform" type="translate" from="0 290" to="0 400" dur="3s" begin="9s"/>
    </section>
    <section data-narration="Replace()">
      <rect x="10" y="350" width="400" height="100" fill="url(#gradient)" fill-opacity="0.25"/>
      <text x="20" y="400" font-size="18" fill="#2ECCFF">Replace</text>
      <animateTransform attributeName="transform" type="translate" from="0 350" to="0 500" dur="3s" begin="12s"/>
    </section>
    <section data-narration="Split()">
      <rect x="10" y="450" width="400" height="100" fill="url(#gradient)" fill-opacity="0.25"/>
      <text x="20" y="500" font-size="18" fill="#64BFFF">Split</text>
      <animateTransform attributeName="transform" type="translate" from="0 450" to="0 600" dur="3s" begin="15s"/>
    </section>
    <footer>
      <text x="10" y="380" font-size="18" fill="#2ECCFF">Exploratory Data Analysis</text>
    </footer>
  </body>
</svg>