<svg width="420" height="400" data-topic-id="exploratory-data-analysis">
    <desc>Exploratory Data Analysis (EDA)</desc>
    <title>Chapter 24: Exploratory Data Analysis</title>
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <style>
        .section {
            background-color: #C5CAE9;
            padding: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid #E0E0E0;
        }
        .section:hover {
            background-color: #B2B2FF;
        }
    </style>
    <g transform="translate(10, 20)">
        <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10"/>
        <text x="20" y="30" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Exploratory Data Analysis (EDA)</text>
        <rect x="10" y="60" width="400" height="50" fill="#E0E0E0" rx="10"/>
        <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
        <text x="20" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Vectorized String Operations</text>
        <section data-narration="Vectorized string operations are operations that can be performed on entire columns of a DataFrame at once, without the need for explicit loops. This is achieved using Pandas' vectorized operations, which are built on top of NumPy's vectorized operations.">
            <rect x="10" y="90" width="400" height="100" fill="#E0E0E0" rx="10"/>
            <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
            <text x="20" y="110" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">String Concatenation: Concatenating two or more strings together using the `+` operator.</text>
            <text x="20" y="130" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">String Splitting: Splitting a string into multiple substrings using the `str.split()` method.</text>
            <text x="20" y="150" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">String Strip: Removing leading and trailing whitespace from a string using the `str.strip()` method.</text>
            <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite"/>
        </section>
        <rect x="10" y="240" width="400" height="50" fill="#E0E0E0" rx="10"/>
        <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
        <text x="20" y="250" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Working with Time Series Data</text>
        <section data-narration="Working with time series data involves cleaning, processing, and visualizing time-stamped data. This chapter will focus on using Pandas to perform various tasks, including resampling and merging data.">
            <rect x="10" y="270" width="400" height="100" fill="#E0E0E0" rx="10"/>
            <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
            <text x="20" y="290" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Resampling: Resampling time-stamped data to a different frequency using the `resample()` method.</text>
            <text x="20" y="310" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Merging: Merging multiple time series datasets together using the `merge()` method.</text>
            <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite"/>
        </section>
        <rect x="10" y="380" width="400" height="50" fill="#E0E0E0" rx="10"/>
        <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
        <text x="20" y="390" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Conclusion</text>
        <section data-narration="In conclusion, exploratory data analysis is a crucial step in the data analysis process that involves summarizing and visualizing the underlying patterns and trends in a dataset. By using Pandas' vectorized operations and working with time series data, you can perform various tasks to gain insights and make informed decisions.">
            <rect x="10" y="410" width="400" height="50" fill="#E0E0E0" rx="10"/>
            <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
            <text x="20" y="420" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Remember, practice makes perfect! Try your hand at exploring different datasets and visualizing the results using Pandas and Matplotlib.</text>
        </section>
    </g>
    <rect x="10" y="450" width="400" height="50" fill="#E0E0E0" rx="10"/>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="20" y="460" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Footer</text>
</svg>