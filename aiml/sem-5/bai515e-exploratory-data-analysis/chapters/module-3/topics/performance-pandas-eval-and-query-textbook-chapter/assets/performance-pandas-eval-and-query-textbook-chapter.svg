<svg width="420" height="400" data-topic-id="performance-pandas-eval-and-query">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <style>
    .section {
      margin-bottom: 20px;
    }
  </style>
  <section class="section" data-narration="Overview">
    <rect x="10" y="10" width="400" height="60" fill="url(#grad)"/>
    <text x="15" y="30" font-size="24" font-family="Arial" font-weight="bold">Performance Pandas: eval and query</text>
  </section>
  <section class="section" data-narration="eval Function">
    <rect x="10" y="90" width="400" height="60" fill="url(#grad)"/>
    <text x="15" y="110" font-size="18" font-family="Arial" font-weight="normal">eval Function</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="130" width="350" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <text x="15" y="150" font-size="14" font-family="Arial" font-weight="normal">The eval function is used to evaluate a string as a Python expression and return the result.</text>
    <animate transform="translate(10,170) rotate(90)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="200" width="350" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <text x="15" y="220" font-size="14" font-family="Arial" font-weight="normal">This function is useful when we need to perform complex calculations or data manipulation operations.</text>
  </section>
  <section class="section" data-narration="query Function">
    <rect x="10" y="270" width="400" height="60" fill="url(#grad)"/>
    <text x="15" y="290" font-size="18" font-family="Arial" font-weight="normal">query Function</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="320" width="350" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <text x="15" y="340" font-size="14" font-family="Arial" font-weight="normal">The query function is used to query the DataFrame based on a string expression.</text>
    <animate transform="translate(10,380) rotate(90)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="430" width="350" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <text x="15" y="450" font-size="14" font-family="Arial" font-weight="normal">This function is useful when we need to filter data based on specific conditions.</text>
  </section>
  <section class="section" data-narration="Example 1">
    <rect x="10" y="490" width="400" height="60" fill="url(#grad)"/>
    <text x="15" y="510" font-size="18" font-family="Arial" font-weight="normal">Example 1</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="550" width="350" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <text x="15" y="570" font-size="14" font-family="Arial" font-weight="normal">Create a DataFrame and then use the eval function to calculate the mean of the 'Age' column.</text>
    <animate transform="translate(10,610) rotate(90)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="670" width="350" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <text x="15" y="690" font-size="14" font-family="Arial" font-weight="normal">result = df['Age'].mean()</text>
  </section>
  <section class="section" data-narration="Example 2">
    <rect x="10" y="730" width="400" height="60" fill="url(#grad)"/>
    <text x="15" y="750" font-size="18" font-family="Arial" font-weight="normal">Example 2</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="800" width="350" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <text x="15" y="820" font-size="14" font-family="Arial" font-weight="normal">Use the eval function to select rows where the 'Age' column is greater than 30 and then calculate the value count of the 'Name' column.</text>
    <animate transform="translate(10,860) rotate(90)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="950" width="350" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <text x="15" y="970" font-size="14" font-family="Arial" font-weight="normal">result = df.loc[df['Age'] > 30, 'Name'].value_counts()</text>
  </section>
  <footer>
    <g>
      <path d="M 10 400 L 400 400 L 400 10 L 10 10 Z" stroke="#000000" stroke-width="2"/>
    </g>
  </footer>
</svg>