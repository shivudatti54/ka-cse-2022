<svg width="420" height="400" data-topic-id="numpy-arrays" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Add a gradient background with pastel colors */
    background-color: #C7B8EA;
    background-image: linear-gradient(to bottom, #C7B8EA 0%, #87CEEB 100%);
  </style>
  <!-- Title at top -->
  <rect x="10" y="10" width="400" height="50" style="fill: #4A8CE2;"/>
  <text x="15" y="25" font-size="24" fill="#fff" text-anchor="start">NumPy Arrays</text>
  <!-- Features Section -->
  <section id="features">
    <rect x="10" y="80" width="400" height="150" style="fill: #F7F7F7;"/>
    <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" style="position: absolute; top: 90px; left: 15px;">
      <!-- Categorical feature -->
      <circle cx="50" cy="50" r="40" fill="#FFC7CE" style="stroke: #333; stroke-width: 2;" />
      <text x="50" y="60" font-size="14" fill="#333">Categorical feature</text>
      <!-- Numerical feature -->
      <circle cx="150" cy="50" r="40" fill="#C6F4D6" style="stroke: #333; stroke-width: 2;" />
      <text x="150" y="60" font-size="14" fill="#333">Numerical feature</text>
      <!-- Text feature -->
      <circle cx="250" cy="50" r="40" fill="#C2C5B8" style="stroke: #333; stroke-width: 2;" />
      <text x="250" y="60" font-size="14" fill="#333">Text feature</text>
    </svg>