<svg width="420" height="400" data-topic-id="chapter-39-exploratory-data-analysis">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title Section -->
  <section id="title-section" data-narration="Introduction to Exploratory Data Analysis">
    <rect x="20" y="20" width="380" height="40" fill="#2F4F7F" rx="10" />
    <text x="50" y="30" font-size="24" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Chapter 39: Exploratory Data Analysis</text>
  </section>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" begin="0s" />
  
  <!-- Importance of EDA Section -->
  <section id="importance-section" data-narration="Importance of Exploratory Data Analysis">
    <rect x="20" y="50" width="380" height="80" fill="#2F4F7F" rx="10" />
    <text x="50" y="60" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">EDA is essential for several reasons:</text>
    <text x="50" y="120" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">- Data Understanding</text>
    <text x="50" y="160" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">- Data Preprocessing</text>
    <text x="50" y="200" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">- Model Selection</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-50,0" dur="2s" begin="0.5s" />
  </section>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-100" dur="2s" begin="1s" />
  
  <!-- Types of EDA Section -->
  <section id="types-of-eda-section" data-narration="Types of Exploratory Data Analysis">
    <rect x="20" y="180" width="380" height="80" fill="#2F4F7F" rx="10" />
    <text x="50" y="190" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">There are two types of EDA:</text>
    <text x="50" y="240" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">- Univariate EDA</text>
    <text x="50" y="280" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">- Multivariate EDA</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-50,0" dur="2s" begin="2.5s" />
  </section>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-140" dur="2s" begin="3.5s" />
  
  <!-- Univariate EDA Section -->
  <section id="univariate-eda-section" data-narration="Univariate Exploratory Data Analysis">
    <rect x="20" y="310" width="380" height="80" fill="#2F4F7F" rx="10" />
    <text x="50" y="320" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Univariate EDA involves examining individual variables:</text>
    <text x="50" y="360" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">- Descriptive Statistics</text>
    <text x="50" y="400" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">- Histograms</text>
    <text x="50" y="440" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">- Box Plots</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-50,0" dur="2s" begin="4.5s" />
  </section>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-160" dur="2s" begin="6s" />
  
  <!-- Footer Section -->
  <footer>
    <rect x="20" y="370" width="380" height="30" fill="#2F4F7F" rx="10" />
    <text x="50" y="380" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">&copy; 2023</text>
  </footer>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" begin="7s" />
</svg>