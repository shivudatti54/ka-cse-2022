<svg viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="exploratory-data-analysis">
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="10s" fill="freeze">
    <defs>
      <style>
        .section {
          stroke: #333;
          stroke-width: 1;
          fill: #f0f0f0;
          opacity: 0.8;
        }
        .section:not(:last-child) {
          stroke-dasharray: 3, 3;
        }
        .section-third {
          stroke-dasharray: 1, 3;
        }
        .section-last {
          stroke-dasharray: 3, 1;
        }
        .legend-circle {
          stroke: #66d9ef;
          stroke-width: 4;
          fill: #66d9ef;
          opacity: 0.8;
        }
        .legend-text {
          fill: #333;
          font-size: 14px;
        }
      </style>
    </defs>
    <g transform="translate(20, 20)">
      <rect x="0" y="0" width="400" height="360" fill="#f7f7f7"/>
      <g id="legend">
        <circle cx="18" cy="18" r="18" class="legend-circle"/>
        <text x="18" y="24" class="legend-text">Exploratory Data Analysis</text>
      </g>
      <g id="title">
        <text x="210" y="30" class="title-text">Chapter 38: Exploratory Data Analysis</text>
      </g>
      <g id="summary-statistics">
        <text x="20" y="80" class="section">Summary Statistics</text>
        <g transform="translate(20, 100)">
          <rect x="0" y="0" width="60" height="20" class="section"/>
          <text x="15" y="10" class="section-text">Mean, Median, Mode</text>
          <text x="70" y="10" class="section-text">Standard Deviation</text>
        </g>
      </g>
      <g id="correlation-analysis">
        <text x="20" y="170" class="section">Correlation Analysis</text>
        <g transform="translate(20, 190)">
          <rect x="0" y="0" width="60" height="20" class="section"/>
          <text x="15" y="10" class="section-text">Pearson's Correlation</text>
          <text x="70" y="10" class="section-text">Spearman's Correlation</text>
        </g>
      </g>
      <g id="outliers-and-anomalies">
        <text x="20" y="240" class="section">Outliers and Anomalies</text>
        <g transform="translate(20, 260)">
          <rect x="0" y="0" width="60" height="20" class="section"/>
          <text x="15" y="10" class="section-text">Definition</text>
          <text x="70" y="10" class="section-text">Detection Methods</text>
        </g>
      </g>
      <g id="data-visualization">
        <text x="20" y="310" class="section">Data Visualization</text>
        <g transform="translate(20, 330)">
          <rect x="0" y="0" width="60" height="20" class="section"/>
          <text x="15" y="10" class="section-text">Scatter Plots</text>
          <text x="70" y="10" class="section-text">Bar Charts</text>
          <text x="110" y="10" class="section-text">Histograms</text>
        </g>
      </g>
    </g>
    <g id="scatter-plot">
      <g transform="translate(140, 100)">
        <circle cx="200" cy="200" r="20" class="scatter-marker"/>
        <text x="200" y="220" class="scatter-label">Sepal Length vs Sepal Width</text>
      </g>
    </g>
    <g id="bar-chart">
      <g transform="translate(140, 200)">
        <rect x="150" y="200" width="40" height="30" class="bar-chart-marker"/>
        <text x="160" y="210" class="bar-chart-label">Species</text>
      </g>
    </g>
    <g id="histogram">
      <g transform="translate(140, 300)">
        <rect x="150" y="300" width="40" height="30" class="histogram-marker"/>
        <text x="160" y="310" class="histogram-label">Sepal Length</text>
      </g>
    </g>
    <g id="box-plot">
      <g transform="translate(140, 100)">
        <rect x="200" y="200" width="20" height="30" class="box-plot-marker"/>
        <text x="210" y="210" class="box-plot-label">Sepal Length</text>
      </g>
    </g>
  </animate>
</svg>