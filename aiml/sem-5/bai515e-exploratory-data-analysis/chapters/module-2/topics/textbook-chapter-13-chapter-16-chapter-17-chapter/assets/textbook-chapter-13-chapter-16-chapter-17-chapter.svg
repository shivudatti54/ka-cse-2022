<svg width="420" height="400" data-topic-id="exploratory-data-analysis-with-pandas" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xml:space="preserve">
  <style>
    /* styles for the entire SVG */
    * {
      font-family: Arial, sans-serif;
      fill: none;
      stroke: #333;
      stroke-width: 2px;
    }
    text {
      font-size: 14px;
      font-weight: bold;
    }
  </style>
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" />
      <stop offset="100%" stop-color="#87CEEB" />
    </linearGradient>
  </defs>
  <rect fill="url(#gradient)" width="100%" height="100%" />
  <!-- Title at top -->
  <g transform="translate(10, 10)">
    <text data-narration="Introduction to Exploratory Data Analysis" x="10" y="30" font-size="24" font-weight="bold">Exploratory Data Analysis with Pandas</text>
  </g>
  <!-- Section 1: Overview of Pandas Objects -->
  <g transform="translate(20, 60)">
    <rect width="80%" height="30" fill="#F7F7F7" rx="5" />
    <rect x="10" y="10" width="60%" height="20" fill="#F7F7F7" rx="5" />
    <text data-narration="Pandas Objects Overview" x="10" y="40" font-size="18" font-weight="bold">Pandas Objects Overview</text>
    <animate transform="translateX(60%)" begin="0s" dur="2s" repeat-count="indefinite" />
    <text data-narration="Series: One-dimensional labeled array of values." x="10" y="60" font-size="14" font-weight="normal">Series: One-dimensional labeled array of values.</text>
    <text data-narration="DataFrame: Two-dimensional labeled data structure with columns of potentially different types." x="10" y="80" font-size="14" font-weight="normal">DataFrame: Two-dimensional labeled data structure with columns of potentially different types.</text>
  </g>
  <!-- Section 2: Creating Pandas Objects -->
  <g transform="translate(20, 120)">
    <rect width="80%" height="30" fill="#F7F7F7" rx="5" />
    <rect x="10" y="10" width="60%" height="20" fill="#F7F7F7" rx="5" />
    <text data-narration="Creating Pandas Series and DataFrame" x="10" y="40" font-size="18" font-weight="bold">Creating Pandas Series and DataFrame</text>
    <animate transform="translateX(60%)" begin="0s" dur="2s" repeat-count="indefinite" />
    <text data-narration="Importing pandas library and creating a series." x="10" y="60" font-size="14" font-weight="normal">Importing pandas library and creating a series.</text>
    <text data-narration="Creating a pandas DataFrame from a dictionary." x="10" y="80" font-size="14" font-weight="normal">Creating a pandas DataFrame from a dictionary.</text>
  </g>
  <!-- Section 3: Handling Missing Data -->
  <g transform="translate(20, 180)">
    <rect width="80%" height="30" fill="#F7F7F7" rx="5" />
    <rect x="10" y="10" width="60%" height="20" fill="#F7F7F7" rx="5" />
    <text data-narration="Handling Missing Data" x="10" y="40" font-size="18" font-weight="bold">Handling Missing Data</text>
    <animate transform="translateX(60%)" begin="0s" dur="2s" repeat-count="indefinite" />
    <text data-narration="Types of Missing Data: MCAR, MAR, MNAR." x="10" y="60" font-size="14" font-weight="normal">Types of Missing Data: MCAR, MAR, MNAR.</text>
    <text data-narration="Strategies for Handling Missing Data: Listwise deletion, Pairwise deletion, Mean/Median imputation, Regression imputation." x="10" y="80" font-size="14" font-weight="normal">Strategies for Handling Missing Data: Listwise deletion, Pairwise deletion, Mean/Median imputation, Regression imputation.</text>
  </g>
  <!-- Footer at bottom -->
  <g transform="translate(10, 340)">
    <rect width="100%" height="30" fill="#F7F7F7" rx="5" />
    <text data-narration="Exploratory Data Analysis with Pandas" x="10" y="350" font-size="14" font-weight="bold">Exploratory Data Analysis with Pandas</text>
  </g>
</svg>