<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="indexing" data-topic-slug="indexing">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Indexing</title>
  <g transform="translate(20, 20)">
    <rect fill="url(#gradient)" width="380" height="360" rx="10"/>
    <g data-narration="Hash Function" data-topic-id="indexing">
      <rect x="10" y="10" width="300" height="40" fill="#F7F7F7" rx="5"/>
      <text x="15" y="15" font-size="16" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">Hash Function</text>
      <animate transform="rotate(45 15 15)" attributeName="transform" begin="1s" dur="3s" repeatCount="indefinite"/>
    </g>
    <g data-narration="Uniform Distribution" data-topic-id="indexing">
      <rect x="10" y="60" width="300" height="40" fill="#F7F7F7" rx="5"/>
      <text x="15" y="65" font-size="16" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">Uniform Distribution</text>
      <animate transform="rotate(90 15 65)" attributeName="transform" begin="1.5s" dur="3s" repeatCount="indefinite"/>
    </g>
    <g data-narration="Deterministic" data-topic-id="indexing">
      <rect x="10" y="110" width="300" height="40" fill="#F7F7F7" rx="5"/>
      <text x="15" y="115" font-size="16" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">Deterministic</text>
      <animate transform="rotate(135 15 115)" attributeName="transform" begin="2s" dur="3s" repeatCount="indefinite"/>
    </g>
    <g data-narration="Avalanche Effect" data-topic-id="indexing">
      <rect x="10" y="160" width="300" height="40" fill="#F7F7F7" rx="5"/>
      <text x="15" y="165" font-size="16" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">Avalanche Effect</text>
      <animate transform="rotate(165 15 165)" attributeName="transform" begin="2.5s" dur="3s" repeatCount="indefinite"/>
    </g>
    <g data-narration="Buckets and Slots" data-topic-id="indexing">
      <rect x="10" y="210" width="300" height="40" fill="#F7F7F7" rx="5"/>
      <text x="15" y="215" font-size="16" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">Buckets and Slots</text>
      <animate transform="rotate(195 15 215)" attributeName="transform" begin="3s" dur="3s" repeatCount="indefinite"/>
    </g>
    <g data-narration="Hash Collision" data-topic-id="indexing">
      <rect x="10" y="260" width="300" height="40" fill="#F7F7F7" rx="5"/>
      <text x="15" y="265" font-size="16" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">Hash Collision</text>
      <animate transform="rotate(225 15 265)" attributeName="transform" begin="3.5s" dur="3s" repeatCount="indefinite"/>
    </g>
    <g data-narration="Handling Collisions" data-topic-id="indexing">
      <rect x="10" y="310" width="300" height="40" fill="#F7F7F7" rx="5"/>
      <text x="15" y="315" font-size="16" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">Handling Collisions</text>
      <animate transform="rotate(255 15 315)" attributeName="transform" begin="4s" dur="3s" repeatCount="indefinite"/>
    </g>
    <g data-narration="Indexing" data-topic-id="indexing">
      <rect x="10" y="360" width="300" height="40" fill="#F7F7F7" rx="5"/>
      <text x="15" y="365" font-size="16" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">Indexing</text>
      <animate transform="rotate(285 15 365)" attributeName="transform" begin="4.5s" dur="3s" repeatCount="indefinite"/>
    </g>
    <g data-narration="Animated Arrows" data-topic-id="indexing">
      <symbol id="arrow">
        <line x1="10" y1="10" x2="20" y2="20" stroke="#333"/>
        <line x1="20" y1="10" x2="20" y2="20" stroke="#333"/>
      </symbol>
      <rect x="10" y="410" width="300" height="40" fill="#F7F7F7" rx="5"/>
      <text x="15" y="415" font-size="16" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">Animated Arrows</text>
    </g>
    <footer>End of Indexing Animation</footer>
  </g>
</svg>