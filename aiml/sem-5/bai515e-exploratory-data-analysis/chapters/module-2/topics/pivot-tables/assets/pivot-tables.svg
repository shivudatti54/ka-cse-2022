<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  width="420"
  height="400"
  data-topic-id="pivot-tables"
  version="1.1"
  id="pivot-tables-svg"
>

  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect
    x="0"
    y="0"
    width="420"
    height="400"
    fill="url(#pastel-gradient)"
  />

  <!-- Title Section -->
  <section data-narration="Section1">
    <text x="10" y="10" font-size="24" font-family="Arial" font-weight="bold" text-anchor="start">
      Pivot Tables
    </text>
  </section>

  <!-- Truth Table Section -->
  <section data-narration="Section2">
    <rect x="10" y="50" width="400" height="200" fill="#87CEEB" rx="10" />
    <text x="20" y="40" font-size="18" font-family="Arial" text-anchor="middle">
      Truth Table
    </text>
    <rect x="10" y="30" width="400" height="20" fill="#C7B8EA" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 190 180" to="360 190 180" dur="10s" begin="0s" />
  </section>

  <!-- Constructing Truth Tables Section -->
  <section data-narration="Section3">
    <text x="10" y="220" font-size="18" font-family="Arial" text-anchor="start">
      Constructing Truth Tables
    </text>
    <rect x="10" y="240" width="340" height="150" fill="#87CEEB" rx="10" />
    <rect x="10" y="230" width="340" height="20" fill="#C7B8EA" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="10 250" to="10 220" dur="10s" begin="0s" />
  </section>

