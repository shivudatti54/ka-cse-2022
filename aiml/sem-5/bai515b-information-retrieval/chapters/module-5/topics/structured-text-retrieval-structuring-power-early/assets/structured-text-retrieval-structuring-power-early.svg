<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns: xlink="http://www.w3.org/1999/xlink" style="background: #3B5998; filter: linear-gradient(45deg, #3498db 0%, #2c4daf 100%);">
  <title>Structured Text Retrieval Structuring Power Early</title>
  <defs>
    <linearGradient id="渐进渐变" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B6BC0" stop-opacity="1"/>
      <stop offset="50%" stop-color="#3498db" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2c4daf" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="400" height="60" fill="url(#渐进渐变)"/>
  <g transform="translate(10 80)">
    <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="start">Structured Text Retrieval</text>
    <text x="10" y="50" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Topic: Structured Text</text>
    <text x="10" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Topic ID: STT-001</text>
    <text x="10" y="90" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Data Topic ID: stt-001</text>
  </g>

  <g transform="translate(10 150)">
    <rect x="10" y="10" width="200" height="100" fill="#2c4daf" rx="10" transform-origin="top left"/>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 200" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Structured Text Retrieval</text>
    <text x="10" y="40" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Definition:</text>
    <text x="10" y="60" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Structured text refers to text that has been organized into a predefined format, such as tables, XML files, or databases.</text>
    <text x="10" y="80" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Example:</text>
    <text x="10" y="100" font-size="14" font-family="Arial, sans-serif" text-anchor="start">| Document ID | Title     | Content                    |</text>
    <text x="10" y="120" font-size="14" font-family="Arial, sans-serif" text-anchor="start">| 1           | Article 1 | This is an article...      |</text>
    <text x="10" y="140" font-size="14" font-family="Arial, sans-serif" text-anchor="start">| 2           | Article 2 | This is another article... |</text>
    <text x="10" y="160" font-size="14" font-family="Arial, sans-serif" text-anchor="start">| 3           | Article 3 | This is a third article... |</text>
  </g>

  <g transform="translate(10 250)">
    <rect x="10" y="10" width="200" height="100" fill="#2c4daf" rx="10" transform-origin="top left"/>
    <animateTransform attributeName="transform" type="translate" from="0 250" to="0 300" begin="2s" dur="2s" repeatCount="indefinite"/>
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="start">XML Retrieval</text>
    <text x="10" y="40" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Definition:</text>
    <text x="10" y="60" font-size="14" font-family="Arial, sans-serif" text-anchor="start">XML retrieval is a technique used to retrieve data from XML files.</text>
    <text x="10" y="80" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Example:</text>
    <text x="10" y="100" font-size="14" font-family="Arial, sans-serif" text-anchor="start">| Document | Element | Attribute |</text>
    <text x="10" y="120" font-size="14" font-family="Arial, sans-serif" text-anchor="start">| XMLFile  | Element | id="1234"</text>
    <text x="10" y="140" font-size="14" font-family="Arial, sans-serif" text-anchor="start">| XMLFile  | Element | name="John"</text>
  </g>

  <g transform="translate(10 350)">
    <rect x="10" y="10" width="200" height="100" fill="#2c4daf" rx="10" transform-origin="top left"/>
    <animateTransform attributeName="transform" type="translate" from="0 350" to="0 400" begin="4s" dur="2s" repeatCount="indefinite"/>
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Early Text Retrieval Models</text>
    <text x="10" y="40" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Definition:</text>
    <text x="10" y="60" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Early text retrieval models focused on ranking documents based on their relevance to a query.</text>
    <text x="10" y="80" font-size="14" font-family="Arial, sans-serif" text-anchor="start">TF-IDF, Inverted Index, and Relevance Feedback are some of these models.</text>
    <text x="10" y="100" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Example:</text>
    <text x="10" y="120" font-size="14" font-family="Arial, sans-serif" text-anchor="start">| Document ID | Title     | Content                    |</text>
    <text x="10" y="140" font-size="14" font-family="Arial, sans-serif" text-anchor="start">| 1           | Article 1 | This is an article...      |</text>
    <text x="10" y="160" font-size="14" font-family="Arial, sans-serif" text-anchor="start">| 2           | Article 2 | This is another article... |</text>
    <text x="10" y="180" font-size="14" font-family="Arial, sans-serif" text-anchor="start">| 3           | Article 3 | This is a third article... |</text>
  </g>

  <g transform="translate(10 450)">
    <rect x="10" y="10" width="200" height="100" fill="#2c4daf" rx="10" transform-origin="top left"/>
    <animateTransform attributeName="transform" type="translate" from="0 450" to="0 500" begin="6s" dur="2s" repeatCount="indefinite"/>
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Conclusion</text>
    <text x="10" y="40" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Structured text retrieval is an important field that has gained significant importance in recent years.</text>
    <text x="10" y="60" font-size="14" font-family="Arial, sans-serif" text-anchor="start">By leveraging the structure of the data, structured text retrieval systems aim to improve the efficiency and accuracy of information retrieval.</text>
    <text x="10" y="80" font-size="14" font-family="Arial, sans-serif" text-anchor="start">The future of structured text retrieval is promising, and it will continue to play a crucial role in the field of information retrieval.</text>
  </g>

  <text x="10" y="480" font-size="24" font-family="Arial, sans-serif" text-anchor="start">Structured Text Retrieval Structuring Power Early</text>
  <text x="10" y="520" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Footer: 2023</text>
</svg>