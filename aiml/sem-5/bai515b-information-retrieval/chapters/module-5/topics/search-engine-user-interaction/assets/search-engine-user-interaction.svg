<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="search-engine-user-interaction">
  <!-- Title Section -->
  <rect x="10" y="10" width="400" height="30" fill="#2F4F7F" rx="5"/>
  <text x="20" y="25" font-size="24" font-family="Arial" fill="#FFFFFF" data-narration="Search Engine User Interaction Introduction">
    Search Engine User Interaction
  </text>
  
  <!-- Gradient Background -->
  <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
    <stop offset="100%" stop-color="#6495ED" stop-opacity="1"/>
  </linearGradient>
  <rect x="10" y="40" width="400" height="320" fill="url(#gradient)"/>
  
  <!-- Section 1: Types of Search Queries -->
  <rect x="10" y="70" width="400" height="50" fill="#F5F5F5" rx="5"/>
  <text x="20" y="80" font-size="18" font-family="Arial" fill="#333333" data-narration="Types of Search Queries">
    Types of Search Queries
  </text>
  <rect x="10" y="90" width="200" height="30" fill="#87CEEB" rx="5"/>
  <text x="25" y="100" font-size="16" font-family="Arial" fill="#FFFFFF" data-narration="Informational queries: Users seek information on a particular topic, such as 'what is artificial intelligence?'">
    Informational queries
  </text>
  <rect x="225" y="90" width="200" height="30" fill="#87CEEB" rx="5"/>
  <text x="240" y="100" font-size="16" font-family="Arial" fill="#FFFFFF" data-narration="Navigational queries: Users seek to visit a specific website, such as 'Google.com'">
    Navigational queries
  </text>
  <rect x="10" y="130" width="200" height="30" fill="#87CEEB" rx="5"/>
  <text x="25" y="140" font-size="16" font-family="Arial" fill="#FFFFFF" data-narration="Transactional queries: Users seek to perform a specific action, such as 'buy tickets to a concert'">
    Transactional queries
  </text>
  
  <!-- Section 2: Search Interface Design -->
  <rect x="10" y="170" width="400" height="50" fill="#F5F5F5" rx="5"/>
  <text x="20" y="180" font-size="18" font-family="Arial" fill="#333333" data-narration="Search Interface Design">
    Search Interface Design
  </text>
  <rect x="10" y="190" width="100" height="30" fill="#87CEEB" rx="5"/>
  <text x="20" y="200" font-size="16" font-family="Arial" fill="#FFFFFF" data-narration="Search boxes: The input field where users enter their search queries">
    Search boxes
  </text>
  <rect x="130" y="190" width="100" height="30" fill="#87CEEB" rx="5"/>
  <text x="140" y="200" font-size="16" font-family="Arial" fill="#FFFFFF" data-narration="Search buttons: The button that triggers the search">
    Search buttons
  </text>
  <rect x="10" y="230" width="400" height="30" fill="#F5F5F5" rx="5"/>
  <text x="20" y="240" font-size="18" font-family="Arial" fill="#333333" data-narration="Search results: The list of web pages that appear in response to the search query">
    Search results
  </text>
  <rect x="10" y="260" width="100" height="30" fill="#87CEEB" rx="5"/>
  <text x="20" y="270" font-size="16" font-family="Arial" fill="#FFFFFF" data-narration="Search filters: Options that allow users to refine their search results, such as date, location, or language">
    Search filters
  </text>
  
  <!-- Section 3: Search Engine Ranking Algorithms -->
  <rect x="10" y="300" width="400" height="50" fill="#F5F5F5" rx="5"/>
  <text x="20" y="310" font-size="18" font-family="Arial" fill="#333333" data-narration="Search Engine Ranking Algorithms">
    Search Engine Ranking Algorithms
  </text>
  <rect x="10" y="320" width="100" height="30" fill="#87CEEB" rx="5"/>
  <text x="20" y="330" font-size="16" font-family="Arial" fill="#FFFFFF" data-narration="PageRank: Google's algorithm for ranking web pages based on their importance">
    PageRank
  </text>
  <rect x="130" y="320" width="100" height="30" fill="#87CEEB" rx="5"/>
  <text x="140" y="330" font-size="16" font-family="Arial" fill="#FFFFFF" data-narration="Link analysis: The process of analyzing the links between web pages to determine their importance">
    Link analysis
  </text>
  <rect x="10" y="360" width="100" height="30" fill="#87CEEB" rx="5"/>
  <text x="20" y="370" font-size="16" font-family="Arial" fill="#FFFFFF" data-narration="Keyword extraction: The process of extracting keywords from web page content to determine relevance">
    Keyword extraction
  </text>
  
  <!-- Section 4: Key Concepts -->
  <rect x="10" y="410" width="400" height="50" fill="#F5F5F5" rx="5"/>
  <text x="20" y="420" font-size="18" font-family="Arial" fill="#333333" data-narration="Key Concepts">
    Key Concepts
  </text>
  <rect x="10" y="430" width="100" height="30" fill="#87CEEB" rx="5"/>
  <text x="20" y="440" font-size="16" font-family="Arial" fill="#FFFFFF" data-narration="Search engine optimization (SEO): The process of optimizing web pages to rank higher in search engine results">
    Search engine optimization (SEO)
  </text>
  <rect x="130" y="430" width="100" height="30" fill="#87CEEB" rx="5"/>
  <text x="140" y="440" font-size="16" font-family="Arial" fill="#FFFFFF" data-narration="Search engine marketing (SEM): The process of paying for ads to appear in search engine results">
    Search engine marketing (SEM)
  </text>
  <rect x="10" y="470" width="100" height="30" fill="#87CEEB" rx="5"/>
  <text x="20" y="480" font-size="16" font-family="Arial" fill="#FFFFFF" data-narration="Natural language processing (NLP): The process of analyzing and understanding human language to improve search engine results">
    Natural language processing (NLP)
  </text>
  
  <!-- Title and Footer -->
  <rect x="10" y="0" width="400" height="10" fill="#2F4F7F" rx="5"/>
  <text x="20" y="5" font-size="18" font-family="Arial" fill="#FFFFFF" data-narration="Search Engine User Interaction">
    Search Engine User Interaction
  </text>
  <rect x="10" y="390" width="400" height="10" fill="#2F4F7F" rx="5"/>
  <text x="20" y="395" font-size="18" font-family="Arial" fill="#FFFFFF" data-narration="Learn more about Search Engine User Interaction">
    Learn more about Search Engine User Interaction
  </text>
</svg>