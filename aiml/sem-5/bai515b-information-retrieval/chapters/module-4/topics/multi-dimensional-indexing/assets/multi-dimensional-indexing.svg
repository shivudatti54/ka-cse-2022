<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" data-topic-id="multidimensional-indexing" xml:lang="en">
  <title>Multi Dimensional Indexing</title>
  <defs>
    <linearGradient id="pastelGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1" />
    </linearGradient>
  </defs>
  <body>
    <rect x="10" y="10" width="400" height="380" fill="url(#pastelGradient)" rx="10"/>
    <g transform="translate(10, 20)">
      <rect x="0" y="0" width="100" height="30" fill="#1A1D23" rx="5"/>
      <text x="5" y="10" font-size="16" font-family="Arial" text-anchor="middle" fill="#F7F7F7">One Dimensional Array</text>
      <animate transform="rotate(360 50 50)" dur="1000" begin="0s" repeatCount="indefinite"/>
      <animate transform="translate(50 50)" dur="1000" begin="0s" repeatCount="indefinite"/>
      <g transform="rotate(90 50 50)">
        <rect x="0" y="0" width="30" height="20" fill="#1A1D23" rx="5"/>
        <text x="15" y="5" font-size="12" font-family="Arial" text-anchor="middle" fill="#F7F7F7">1-Dimensional Array</text>
        <animate transform="rotate(360 50 50)" dur="1000" begin="0s" repeatCount="indefinite"/>
        <animate transform="translate(50 50)" dur="1000" begin="0s" repeatCount="indefinite"/>
      </g>
      <g transform="rotate(180 50 50)">
        <rect x="0" y="0" width="30" height="20" fill="#1A1D23" rx="5"/>
        <text x="15" y="5" font-size="12" font-family="Arial" text-anchor="middle" fill="#F7F7F7">2-Dimensional Array</text>
        <animate transform="rotate(360 50 50)" dur="1000" begin="0s" repeatCount="indefinite"/>
        <animate transform="translate(50 50)" dur="1000" begin="0s" repeatCount="indefinite"/>
      </g>
      <g transform="rotate(270 50 50)">
        <rect x="0" y="0" width="30" height="20" fill="#1A1D23" rx="5"/>
        <text x="15" y="5" font-size="12" font-family="Arial" text-anchor="middle" fill="#F7F7F7">3-Dimensional Array</text>
        <animate transform="rotate(360 50 50)" dur="1000" begin="0s" repeatCount="indefinite"/>
        <animate transform="translate(50 50)" dur="1000" begin="0s" repeatCount="indefinite"/>
      </g>
      <g transform="rotate(360 50 50)">
        <rect x="0" y="0" width="30" height="20" fill="#1A1D23" rx="5"/>
        <text x="15" y="5" font-size="12" font-family="Arial" text-anchor="middle" fill="#F7F7F7">Higher Dimensional Array</text>
        <animate transform="rotate(360 50 50)" dur="1000" begin="0s" repeatCount="indefinite"/>
        <animate transform="translate(50 50)" dur="1000" begin="0s" repeatCount="indefinite"/>
      </g>
    </g>
    <text x="10" y="400" font-size="24" font-family="Arial" text-anchor="middle" fill="#1A1D23">Multidimensional Arrays</text>
  </body>
</svg>