<svg width="420" height="400" data-topic-id="indexing-and-searching" xmlns="http://www.w3.org/2000/svg">
  <title>Indexing and Searching: Inverted Indexes, Signature Files, Suffix Trees and Suffix Arrays</title>
  <footer>Chapter 9, Pages 92-96</footer>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#C5CAE9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <g transform="scale(1)">
    <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10"/>
    <rect x="10" y="390" width="400" height="10" fill="#C7B8EA"/>
    <g transform="translate(10, 20)">
      <rect x="0" y="0" width="200" height="150" fill="#F7F7F7" rx="10"/>
      <rect x="0" y="150" width="200" height="150" fill="#F7F7F7" rx="10"/>
      <rect x="210" y="0" width="200" height="150" fill="#F7F7F7" rx="10"/>
      <rect x="210" y="150" width="200" height="150" fill="#F7F7F7" rx="10"/>
      <path d="M 30 60 L 170 60" stroke="#455A64" stroke-width="2" fill="none"/>
      <path d="M 30 120 L 170 120" stroke="#455A64" stroke-width="2" fill="none"/>
      <path d="M 30 180 L 170 180" stroke="#455A64" stroke-width="2" fill="none"/>
      <path d="M 30 240 L 170 240" stroke="#455A64" stroke-width="2" fill="none"/>
      <g transform="translate(35, 65)">
        <text x="0" y="0" font-size="18" font-family="Arial" fill="#455A64">Inverted Indexes</text>
        <text x="0" y="30" font-size="14" font-family="Arial" fill="#455A64">Definition:</text>
        <text x="0" y="60" font-size="14" font-family="Arial" fill="#455A64">An inverted index is a data structure used in information retrieval systems to store the index of words or phrases in a document, along with their locations in the document.</text>
        <text x="0" y="90" font-size="14" font-family="Arial" fill="#455A64">Properties:</text>
        <text x="0" y="120" font-size="14" font-family="Arial" fill="#455A64">- Stores word or phrase occurrences in documents</text>
        <text x="0" y="150" font-size="14" font-family="Arial" fill="#455A64">- Allows for fast lookup and retrieval of documents containing a given word or phrase</text>
        <text x="0" y="180" font-size="14" font-family="Arial" fill="#455A64">- Typically implemented as a collection of arrays or lists, where each array or list represents a word or phrase and its corresponding document IDs</text>
        <text x="0" y="210" font-size="14" font-family="Arial" fill="#455A64">Example:</text>
        <text x="0" y="240" font-size="14" font-family="Arial" fill="#455A64">Suppose we have the following documents:</text>
        <text x="0" y="270" font-size="14" font-family="Arial" fill="#455A64">| Document ID | Document Content                            |</text>
        <text x="0" y="300" font-size="14" font-family="Arial" fill="#455A64">| 1           | The quick brown fox jumps over the lazy dog |</text>
        <text x="0" y="330" font-size="14" font-family="Arial" fill="#455A64">| 2           | The sun rises over the hills in the east    |</text>
        <text x="0" y="360" font-size="14" font-family="Arial" fill="#455A64">| 3           | Foxes are fast and agile animals            |</text>
        <text x="0" y="390" font-size="14" font-family="Arial" fill="#455A64">| Word | Document IDs |</text>
        <text x="0" y="420" font-size="14" font-family="Arial" fill="#455A64">| fox  | 1, 3         |</text>
        <text x="0" y="450" font-size="14" font-family="Arial" fill="#455A64">| the  | 1, 2         |</text>
      </g>
      <g transform="translate(220, 20)">
        <rect x="0" y="0" width="200" height="150" fill="#F7F7F7" rx="10"/>
        <rect x="0" y="150" width="200" height="150" fill="#F7F7F7" rx="10"/>
        <path d="M 30 60 L 170 60" stroke="#455A64" stroke-width="2" fill="none"/>
        <path d="M 30 120 L 170 120" stroke="#455A64" stroke-width="2" fill="none"/>
        <path d="M 30 180 L 170 180" stroke="#455A64" stroke-width="2" fill="none"/>
        <path d="M 30 240 L 170 240" stroke="#455A64" stroke-width="2" fill="none"/>
        <g transform="translate(35, 65)">
          <text x="0" y="0" font-size="18" font-family="Arial" fill="#455A64">Signature Files</text>
          <text x="0" y="30" font-size="14" font-family="Arial" fill="#455A64">Definition:</text>
          <text x="0" y="60" font-size="14" font-family="Arial" fill="#455A64">A signature file is a data structure used in information retrieval systems to store a compact representation of a document, allowing for efficient matching between documents.</text>
          <text x="0" y="90" font-size="14" font-family="Arial" fill="#455A64">Properties:</text>
          <text x="0" y="120" font-size="14" font-family="Arial" fill="#455A64">- Stores a unique signature for each document, based on its contents</text>
          <text x="0" y="150" font-size="14" font-family="Arial" fill="#455A64">- Typically implemented as a collection of one-bit or byte arrays, where each array represents a document and its corresponding signature</text>
          <text x="0" y="180" font-size="14" font-family="Arial" fill="#455A64">Example:</text>
          <text x="0" y="210" font-size="14" font-family="Arial" fill="#455A64">Suppose we have the following documents:</text>
          <text x="0" y="240" font-size="14" font-family="Arial" fill="#455A64">| Document ID | Document Content                            |</text>
          <text x="0" y="270" font-size="14" font-family="Arial" fill="#455A64">| 1           | The sun rises over the hills in the east    |</text>
          <text x="0" y="300" font-size="14" font-family="Arial" fill="#455A64">| 2           | The quick brown fox jumps over the lazy dog |</text>
          <text x="0" y="330" font-size="14" font-family="Arial" fill="#455A64">| 3           | Foxes are fast and agile animals            |</text>
          <text x="0" y="360" font-size="14" font-family="Arial" fill="#455A64">| Signature |</text>
          <text x="0" y="390" font-size="14" font-family="Arial" fill="#455A64">| 1 0 1 0 |</text>
          <text x="0" y="420" font-size="14" font-family="Arial" fill="#455A64">| 2 0 1 0 |</text>
          <text x="0" y="450" font-size="14" font-family="Arial" fill="#455A64">| 3 1 1 1 |</text>
        </g>
      </g>
    </g>
    <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="10s" repeatCount="indefinite">
      <animateTransform transform="translate(0, 0) scale(1.02)" begin="0s" dur="5s" repeatCount="indefinite"/>
    </animate>
  </svg>