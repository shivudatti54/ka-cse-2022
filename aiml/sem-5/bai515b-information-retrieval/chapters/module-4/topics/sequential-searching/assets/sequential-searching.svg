<svg width="420" height="400" data-topic-id="sequential-searching" xmlns="http://www.w3.org/2000/svg" xml:lang="en">
  <style>
    /* Gradient background */
    .gradient {
      fill: #c7d2f5;
      stroke: linear-gradient(to bottom, #7f8a91, #7f8a91);
    }

    /* Pastel colors */
    .pastel {
      fill: #e5e5f5;
    }

    /* Indigo and teal colors */
    .indigo {
      fill: #4b0082;
    }

    /* Orange accents */
    .orange {
      fill: #ffc107;
    }
  </style>

  <!-- Background gradient -->
  <rect x="0" y="0" width="420" height="400" class="gradient" />
  
  <!-- Title -->
  <text x="50%" y="20%" class="indigo" font-size="36" font-family="Arial, sans-serif">
    Sequential Searching
  </text>

  <!-- Section 1: Introduction -->
  <rect x="0" y="100" width="420" height="100" class="pastel" />
  <text x="50%" y="50%" class="orange" font-size="18" font-family="Arial, sans-serif">
    <tspan data-narration="Introduction">Sequential searching is a simple searching algorithm...</tspan>
  </text>

  <!-- Section 2: How it Works -->
  <rect x="0" y="210" width="420" height="100" class="pastel" />
  <g transform="translate(50%, 270%)">
    <path d="M 50 50 L 70 20 L 90 0 L 110 0 L 130 20 L 150 50 Z" class="indigo" stroke="#4b0082" stroke-width="2" fill="none" />
    <text x="50%" y="80%" class="orange" font-size="18" font-family="Arial, sans-serif">
      <tspan data-narration="How it Works">Start at the first element of the list or array...</tspan>
    </text>
  </g>

  <!-- Section 3: Example -->
  <rect x="0" y="310" width="420" height="100" class="pastel" />
  <g transform="translate(50%, 380%)">
    <path d="M 50 50 L 70 20 L 90 0 L 110 0 L 130 20 L 150 50 Z" class="indigo" stroke="#4b0082" stroke-width="2" fill="none" />
    <text x="50%" y="350%" class="orange" font-size="18" font-family="Arial, sans-serif">
      <tspan data-narration="Example">Suppose we have a list of numbers...</tspan>
    </text>
    <text x="50%" y="400%" class="orange" font-size="18" font-family="Arial, sans-serif">
      <tspan data-narration="Return the index of the current element, which is 4." />
    </text>
  </g>

  <!-- Section 4: Time Complexity -->
  <rect x="0" y="410" width="420" height="100" class="pastel" />
  <g transform="translate(50%, 470%)">
    <path d="M 50 50 L 70 20 L 90 0 L 110 0 L 130 20 L 150 50 Z" class="indigo" stroke="#4b0082" stroke-width="2" fill="none" />
    <text x="50%" y="450%" class="orange" font-size="18" font-family="Arial, sans-serif">
      <tspan data-narration="The time complexity of sequential searching is O(n), where n is the number of elements in the list or array." />
    </text>
  </g>

  <!-- Section 5: Advantages and Disadvantages -->
  <rect x="0" y="510" width="420" height="100" class="pastel" />
  <g transform="translate(50%, 570%)">
    <path d="M 50 50 L 70 20 L 90 0 L 110 0 L 130 20 L 150 50 Z" class="indigo" stroke="#4b0082" stroke-width="2" fill="none" />
    <text x="50%" y="500%" class="orange" font-size="18" font-family="Arial, sans-serif">
      <tspan data-narration="Advantages: simple to implement, efficient for small lists or arrays...</tspan>
    </text>
    <text x="50%" y="550%" class="orange" font-size="18" font-family="Arial, sans-serif">
      <tspan data-narration="Disadvantages: inefficient for large lists or arrays.</tspan>
    </text>
  </g>

  <!-- Section 6: Best Practices -->
  <rect x="0" y="610" width="420" height="100" class="pastel" />
  <g transform="translate(50%, 670%)">
    <path d="M 50 50 L 70 20 L 90 0 L 110 0 L 130 20 L 150 50 Z" class="indigo" stroke="#4b0082" stroke-width="2" fill="none" />
    <text x="50%" y="600%" class="orange" font-size="18" font-family="Arial, sans-serif">
      <tspan data-narration="Best Practices: use sequential searching for small lists or arrays...</tspan>
    </text>
  </g>

  <!-- Animations -->
  <animate transform="translate(50%, 240%)" begin="0s" dur="2s" />
  <animate transform="translate(50%, 390%)" begin="2s" dur="2s" />
  <animate transform="translate(50%, 540%)" begin="4s" dur="2s" />
  <animate transform="translate(50%, 690%)" begin="6s" dur="2s" />
</svg>