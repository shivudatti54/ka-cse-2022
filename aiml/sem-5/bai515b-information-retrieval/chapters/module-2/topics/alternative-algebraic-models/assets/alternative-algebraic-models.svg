<svg width="420" height="400" data-topic-id="alternative-algebraic-models"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400" style="background-image: linear-gradient(to bottom, #C7B8EA, #87CEEB);">
  <g>
    <rect x="10" y="10" width="400" height="380" fill="#87CEEB" rx="10" />
    <rect x="10" y="40" width="400" height="300" fill="#C7B8EA" rx="10" />
    <rect x="10" y="340" width="400" height="60" fill="#F7DC6F" rx="10" />

    <!-- Iterations -->
    <g id="iterations">
      <animateTransform attributeName="transform" type="translate" from="0,50" to="0,150" dur="2s" begin="0s" />
      <rect x="120" y="50" width="200" height="100" fill="#F2C464" rx="10" data-narration="An iteration is a single development cycle, typically lasting from one to four weeks. Each iteration results in a stable, integrated, and tested partial product, known as an **increment**." />
      <rect x="120" y="170" width="200" height="100" fill="#F2C464" rx="10" data-narration="The key activities in every iteration include: Planning, Design &amp; Implementation, and Testing &amp; Evaluation." />
      <rect x="120" y="290" width="200" height="100" fill="#F2C464" rx="10" data-narration="The software is developed and delivered in increments, with each increment adding functionality to the previous release." />
      <rect x="120" y="50" width="200" height="100" fill="#F2C464" rx="10" data-narration="Each segment, or iteration, goes through a mini-SDLC cycle of its own, including requirements, design, implementation, and testing." />
    </g>

    <!-- Increments -->
    <g id="increments">
      <animateTransform attributeName="transform" type="translate" from="0,250" to="0,350" dur="2s" begin="0s" />
      <rect x="120" y="250" width="200" height="100" fill="#F2C464" rx="10" data-narration="An increment is the sum of all the product features completed and integrated through the iterations so far." />
      <rect x="120" y="300" width="200" height="100" fill="#F2C464" rx="10" data-narration="The sum of all the product features completed and integrated through the iterations so far." />
      <rect x="120" y="350" width="200" height="100" fill="#F2C464" rx="10" data-narration="The increments are delivered to the customers for review, testing, and feedback." />
    </g>

    <!-- Connections -->
    <g id="connections">
      <animateTransform attributeName="transform" type="translate" from="0,60" to="0,260" dur="2s" begin="0s" />
      <line x1="120" y1="50" x2="120" y2="260" stroke="#87CEEB" stroke-width="2" />
      <line x1="120" y1="260" x2="120" y2="350" stroke="#87CEEB" stroke-width="2" />
    </g>

    <!-- Title and Footer -->
    <text x="10" y="10" font-size="24" font-family="Arial Black" text-anchor="middle" fill="#F7DC6F">Iterative and Incremental Development</text>
    <rect x="10" y="390" width="400" height="10" fill="#F7DC6F" rx="5" />
    <text x="10" y="390" font-size="18" font-family="Arial" text-anchor="middle" fill="#F7DC6F">Learn More</text>
  </g>
</svg>