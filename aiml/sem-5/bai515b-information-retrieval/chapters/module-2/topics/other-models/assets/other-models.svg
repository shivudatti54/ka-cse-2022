<svg width="420" height="400" data-topic-id="other-models" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#84A0E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#74B5FF" stop-opacity="1"/>
    </linearGradient>
    <style>
      .section {
        margin-bottom: 20px;
      }
      .section:hover {
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
    </style>
  </defs>
  <title>Other Models</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <g transform="translate(15, 20)">
    <rect x="0" y="0" width="100%" height="100%" rx="10" fill="#FFFFFF"/>
    <text x="50%" y="40%" font-size="24px" font-weight="bold" text-anchor="middle">Other Models</text>
    <g id="user-thread-section">
      <rect x="10" y="60" width="80%" height="100%" rx="10" fill="#F7F7F7"/>
      <rect x="10" y="60" width="20%" height="100%" rx="10" fill="#4B8BBE"/>
      <text x="40%" y="80%" font-size="18px" font-weight="normal" text-anchor="middle" data-narration="User Threads are managed entirely by user-level libraries without kernel support. The operating system sees only the process, not the individual threads." fill="#4B8BBE"/>
      <rect x="110%" y="60" width="20%" height="100%" rx="10" fill="#F7F7F7"/>
      <rect x="110%" y="60" width="80%" height="100%" rx="10" fill="#F7F7F7"/>
      <text x="150%" y="80%" font-size="18px" font-weight="normal" text-anchor="middle" data-narration="Kernel Threads are supported and managed directly by the operating system kernel. The kernel is aware of all threads and schedules them individually." fill="#F7F7F7"/>
      <animateTransform attributeName="transform" type="rotate" from="0 180 180" to="360 180 180" dur="10s" begin="1s"/>
    </g>
    <g id="comparison-table-section">
      <rect x="10" y="180" width="80%" height="100%" rx="10" fill="#F7F7F7"/>
      <rect x="10" y="180" width="20%" height="40%" rx="10" fill="#4B8BBE"/>
      <text x="40%" y="200%" font-size="18px" font-weight="normal" text-anchor="middle" data-narration="| Aspect     | User Threads                                           | Kernel Threads                      |" fill="#4B8BBE"/>
      <rect x="110%" y="180" width="20%" height="40%" rx="10" fill="#F7F7F7"/>
      <rect x="110%" y="180" width="80%" height="40%" rx="10" fill="#F7F7F7"/>
      <text x="150%" y="200%" font-size="18px" font-weight="normal" text-anchor="middle" data-narration="| Management | User-level library                                     | Operating System                    |" fill="#F7F7F7"/>
      <rect x="230%" y="180" width="20%" height="40%" rx="10" fill="#4B8BBE"/>
      <rect x="230%" y="180" width="80%" height="40%" rx="10" fill="#F7F7F7"/>
      <text x="270%" y="200%" font-size="18px" font-weight="normal" text-anchor="middle" data-narration="| Speed      | Fast creation/context switch                    | Faster thread creation/switching |" fill="#F7F7F7"/>
      <animateTransform attributeName="transform" type="rotate" from="0 360 0" to="360 360 0" dur="10s" begin="2s"/>
    </g>
    <g id="kernel-thread-section">
      <rect x="10" y="260" width="80%" height="100%" rx="10" fill="#F7F7F7"/>
      <rect x="10" y="260" width="20%" height="100%" rx="10" fill="#4B8BBE"/>
      <text x="40%" y="280%" font-size="18px" font-weight="normal" text-anchor="middle" data-narration="Kernel Threads are supported and managed directly by the operating system kernel. The kernel is aware of all threads and schedules them individually." fill="#4B8BBE"/>
      <rect x="110%" y="260" width="20%" height="100%" rx="10" fill="#F7F7F7"/>
      <rect x="110%" y="260" width="80%" height="100%" rx="10" fill="#F7F7F7"/>
      <text x="150%" y="280%" font-size="18px" font-weight="normal" text-anchor="middle" data-narration="Threads can be implemented at two different levels: User Threads and Kernel Threads." fill="#F7F7F7"/>
    </g>
    <g id="user-thread-vs-kernel-thread-section">
      <rect x="10" y="340" width="80%" height="100%" rx="10" fill="#F7F7F7"/>
      <rect x="10" y="340" width="20%" height="100%" rx="10" fill="#4B8BBE"/>
      <text x="40%" y="360%" font-size="18px" font-weight="normal" text-anchor="middle" data-narration="Threads can be implemented at two different levels: User Threads and Kernel Threads." fill="#4B8BBE"/>
      <rect x="110%" y="340" width="20%" height="100%" rx="10" fill="#F7F7F7"/>
      <rect x="110%" y="340" width="80%" height="100%" rx="10" fill="#F7F7F7"/>
      <text x="150%" y="360%" font-size="18px" font-weight="normal" text-anchor="middle" data-narration="| Aspect     | User Threads                                           | Kernel Threads                      |" fill="#F7F7F7"/>
      <rect x="230%" y="340" width="20%" height="40%" rx="10" fill="#4B8BBE"/>
      <rect x="230%" y="340" width="80%" height="40%" rx="10" fill="#F7F7F7"/>
      <text x="270%" y="360%" font-size="18px" font-weight="normal" text-anchor="middle" data-narration="| Management | User-level library                                     | Operating System                    |" fill="#F7F7F7"/>
    </g>
    <g id="comparison-table-section">
      <rect x="10" y="400" width="80%" height="40%" rx="10" fill="#F7F7F7"/>
      <rect x="10" y="400" width="20%" height="40%" rx="10" fill="#4B8BBE"/>
      <text x="40%" y="420%" font-size="18px" font-weight="normal" text-anchor="middle" data-narration="| Aspect     | User Threads                                           | Kernel Threads                      |" fill="#4B8BBE"/>
      <rect x="110%" y="400" width="20%" height="40%" rx="10" fill="#F7F7F7"/>
      <rect x="110%" y="400" width="80%" height="40%" rx="10" fill="#F7F7F7"/>
      <text x="150%" y="420%" font-size="18px" font-weight="normal" text-anchor="middle" data-narration="| Speed      | Fast creation/context switch                    | Faster thread creation/switching |" fill="#F7F7F7"/>
      <animateTransform attributeName="transform" type="rotate" from="0 360 0" to="360 360 0" dur="10s" begin="3s"/>
    </g>
    <g id="footer">
      <rect x="10" y="460" width="400" height="30" rx="10" fill="#F7F7F7"/>
      <text x="50%" y="480%" font-size="14px" font-weight="normal" text-anchor="middle" fill="#999999">Copyright 2023. All rights reserved.</text>
    </g>
  </g>
</svg>