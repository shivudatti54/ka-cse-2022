<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400">
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Alternative Probabilistic Models for Link Prediction</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <text x="15" y="40" font-size="24" font-family="Arial" fill="#2E4053">Link Prediction</text>
  <rect x="10" y="80" width="360" height="20" fill="#3498DB" rx="5"/>
  <text x="15" y="90" font-size="18" font-family="Arial" fill="#2E4053" data-topic-id="stochastic-block-models">Stochastic Block Models</text>
  <animate transform="rotate(0 200 200)" dur="5000" begin="100ms" repeatCount="indefinite"/>
  <section x="20" y="110" width="320" height="60" data-narration="Stochastic Block Models assume that nodes belong to latent groups or communities, and the probability of a link between two nodes depends solely on their group memberships." fill="#2E4053" rx="5">
    <rect x="15" y="15" width="280" height="40" fill="#3498DB"/>
    <path d="M 30,20 L 30,50" stroke-width="2" stroke="#2E4053"/>
    <path d="M 50,20 L 50,50" stroke-width="2" stroke="#2E4053"/>
    <path d="M 70,20 L 70,50" stroke-width="2" stroke="#2E4053"/>
  </section>
  <section x="20" y="180" width="320" height="60" data-narration="Bayesian Framework incorporates prior knowledge: P(θ|G) ∝ P(G|θ) × P(θ)" fill="#2E4053" rx="5">
    <rect x="15" y="15" width="280" height="40" fill="#3498DB"/>
    <path d="M 30,20 L 30,50" stroke-width="2" stroke="#2E4053"/>
    <path d="M 50,20 L 50,50" stroke-width="2" stroke="#2E4053"/>
    <path d="M 70,20 L 70,50" stroke-width="2" stroke="#2E4053"/>
  </section>
  <section x="20" y="250" width="320" height="60" data-narration="Maximum Likelihood Estimation (MLE): find parameter values that maximize the likelihood of observing the network data" fill="#2E4053" rx="5">
    <rect x="15" y="15" width="280" height="40" fill="#3498DB"/>
    <path d="M 30,20 L 30,50" stroke-width="2" stroke="#2E4053"/>
    <path d="M 50,20 L 50,50" stroke-width="2" stroke="#2E4053"/>
    <path d="M 70,20 L 70,50" stroke-width="2" stroke="#2E4053"/>
  </section>
  <section x="20" y="320" width="320" height="60" data-narration="Bayesian Framework allows incorporating domain knowledge through prior distribution P(θ)" fill="#2E4053" rx="5">
    <rect x="15" y="15" width="280" height="40" fill="#3498DB"/>
    <path d="M 30,20 L 30,50" stroke-width="2" stroke="#2E4053"/>
    <path d="M 50,20 L 50,50" stroke-width="2" stroke="#2E4053"/>
    <path d="M 70,20 L 70,50" stroke-width="2" stroke="#2E4053"/>
  </section>
  <footer>
    <text x="10" y="420" font-size="18" font-family="Arial" fill="#2E4053">Link Prediction</text>
  </footer>
  <g>
    <path d="M 200,200 L 240,200" stroke-width="2" stroke="#3498DB"/>
    <path d="M 200,220 L 240,220" stroke-width="2" stroke="#3498DB"/>
  </g>
</svg>