<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background-color: #C7E5F5;">
  <title>Textbook Chapter 3 31-36</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C5E1F5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7E5F5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" style="fill: url(#pastel-gradient)"/>
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="400" height="380" style="stroke: #3484A8; stroke-width: 2; fill: none"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 20" dur="2s" begin="0s" repeatCount="indefinite"/>
    <text x="20" y="20" font-size="24" font-family="Arial" text-anchor="middle" style="fill: #3484A8;">Relevance</text>
    <animate attributeName="opacity" from="1" to=".5" dur="1s" begin="-1s" repeatCount="indefinite"/>
    <text x="20" y="50" font-size="24" font-family="Arial" text-anchor="middle" style="fill: #3484A8;" data-narration="Relevance is the degree to which a document contains the desired information.">Relevance is the degree to which a document contains the desired information.</text>
    <animate attributeName="opacity" from=".5" to="1" dur="1s" begin="0s" repeatCount="indefinite"/>
    <rect x="0" y="80" width="400" height="20" style="stroke: #3484A8; stroke-width: 2; fill: none"/>
    <animateTransform attributeName="transform" type="translate" from="0 80" to="0 220" dur="2s" begin="0s" repeatCount="indefinite"/>
    <text x="20" y="220" font-size="24" font-family="Arial" text-anchor="middle" style="fill: #3484A8;">Query</text>
    <animate attributeName="opacity" from="1" to ".5" dur="1s" begin="-1s" repeatCount="indefinite"/>
    <text x="20" y="250" font-size="24" font-family="Arial" text-anchor="middle" style="fill: #3484A8;" data-narration="A query is the user's request for information.">A query is the user's request for information.</text>
    <animate attributeName="opacity" from=".5" to="1" dur="1s" begin="0s" repeatCount="indefinite"/>
    <rect x="0" y="320" width="400" height="20" style="stroke: #3484A8; stroke-width: 2; fill: none"/>
    <animateTransform attributeName="transform" type="translate" from="0 320" to="0 360" dur="2s" begin="0s" repeatCount="indefinite"/>
    <text x="20" y="360" font-size="24" font-family="Arial" text-anchor="middle" style="fill: #3484A8;">Documents</text>
    <animate attributeName="opacity" from="1" to ".5" dur="1s" begin="-1s" repeatCount="indefinite"/>
    <text x="20" y="390" font-size="24" font-family="Arial" text-anchor="middle" style="fill: #3484A8;" data-narration="Documents are the collection of text or data from which information is retrieved.">Documents are the collection of text or data from which information is retrieved.</text>
    <animate attributeName="opacity" from=".5" to="1" dur="1s" begin="0s" repeatCount="indefinite"/>
    <g>
      <line x1="10" y1="20" x2="10" y2="70" style="stroke: #3484A8; stroke-width: 2; fill: none"/>
      <line x1="10" y1="20" x2="120" y2="70" style="stroke: #3484A8; stroke-width: 2; fill: none"/>
      <line x1="10" y1="70" x2="10" y2="200" style="stroke: #3484A8; stroke-width: 2; fill: none"/>
      <line x1="10" y1="70" x2="120" y2="200" style="stroke: #3484A8; stroke-width: 2; fill: none"/>
      <line x1="10" y1="200" x2="10" y2="330" style="stroke: #3484A8; stroke-width: 2; fill: none"/>
      <line x1="10" y1="200" x2="120" y2="330" style="stroke: #3484A8; stroke-width: 2; fill: none"/>
      <line x1="120" y1="20" x2="120" y2="200" style="stroke: #3484A8; stroke-width: 2; fill: none"/>
      <line x1="120" y1="70" x2="120" y2="200" style="stroke: #3484A8; stroke-width: 2; fill: none"/>
      <line x1="120" y1="200" x2="120" y2="330" style="stroke: #3484A8; stroke-width: 2; fill: none"/>
    </g>
    <rect x="10" y="10" width="400" height="380" style="stroke: #3484A8; stroke-width: 2; fill: none"/>
    <rect x="10" y="10" width="400" height="40" style="fill: #F7DC6F; animation: gradient 2s infinite"/>
    <rect x="10" y="360" width="400" height="40" style="fill: #F7DC6F; animation: gradient 2s infinite"/>
    <rect x="10" y="70" width="400" height="20" style="fill: #8BC34A; animation: gradient 1s infinite"/>
    <rect x="10" y="230" width="400" height="20" style="fill: #8BC34A; animation: gradient 1s infinite"/>
    <rect x="10" y="330" width="400" height="20" style="fill: #8BC34A; animation: gradient 1s infinite"/>
    <rect x="10" y="190" width="400" height="20" style="fill: #FF9800; animation: gradient 1s infinite"/>
    <rect x="10" y="280" width="400" height="20" style="fill: #FF9800; animation: gradient 1s infinite"/>
    <animate name="gradient" attributes="opacity" from=".5" to="1" dur="2s" repeatCount="indefinite"/>
  </g>
  <rect x="10" y="10" width="400" height="40" style="fill: #F7DC6F; animation: gradient 2s infinite"/>
  <rect x="10" y="360" width="400" height="40" style="fill: #F7DC6F; animation: gradient 2s infinite"/>
  <rect x="10" y="70" width="400" height="20" style="fill: #8BC34A; animation: gradient 1s infinite"/>
  <rect x="10" y="230" width="400" height="20" style="fill: #8BC34A; animation: gradient 1s infinite"/>
  <rect x="10" y="330" width="400" height="20" style="fill: #8BC34A; animation: gradient 1s infinite"/>
  <rect x="10" y="190" width="400" height="20" style="fill: #FF9800; animation: gradient 1s infinite"/>
  <rect x="10" y="280" width="400" height="20" style="fill: #FF9800; animation: gradient 1s infinite"/>
  <animate name="gradient" attributes="opacity" from=".5" to="1" dur="2s" repeatCount="indefinite"/>
  <rect x="10" y="10" width="400" height="380" style="stroke: #3484A8; stroke-width: 2; fill: none"/>
</svg>