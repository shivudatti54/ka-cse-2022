<svg width="420" height="400" viewBox="0 0 420 400">
  <title>Chapter 2: Fundamentals of Information Retrieval</title>
  <desc>Animated Educational SVG Diagram for Chapter 2: Fundamentals of Information Retrieval</desc>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <style>
    .section {
      background-color: #ADD8E6;
      padding: 20px;
      margin-bottom: 20px;
      text-align: center;
    }
    .title {
      color: #3377B4;
      font-size: 24px;
      margin-bottom: 10px;
    }
    .annotation {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .arrow {
      stroke: #3377B4;
      stroke-width: 2;
      fill: none;
    }
  </style>
  <g>
    <rect x="10" y="10" width="400" height="300" fill="url(#grad)"/>
    <text x="50" y="20" class="title">Chapter 2: Fundamentals of Information Retrieval</text>
    <g transform="translate(10, 50)">
      <rect x="0" y="0" width="200" height="100" fill="white" rx="10"/>
      <text x="10" y="20" class="section" data-narration="2.1: Introduction to Information Retrieval">Introduction to Information Retrieval</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="10,50" dur="2s" begin="0s"/>
      <g>
        <rect x="10" y="20" width="20" height="20" fill="#3377B4" rx="10"/>
        <line x1="15" y1="15" x2="25" y2="25" class="arrow"/>
        <text x="20" y="30" class="annotation">Definition: Information retrieval is the process of retrieving relevant documents or sources from a large collection based on a user's query or search term.</text>
      </g>
    </g>
    <g transform="translate(10, 150)">
      <rect x="0" y="0" width="200" height="100" fill="white" rx="10"/>
      <text x="10" y="20" class="section" data-narration="2.2: The IR Problem">The IR Problem</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="10,150" dur="2s" begin="2s"/>
      <g>
        <rect x="10" y="20" width="20" height="20" fill="#3377B4" rx="10"/>
        <line x1="15" y1="15" x2="25" y2="25" class="arrow"/>
        <text x="20" y="30" class="annotation">Key Challenges: Scalability, Relevance, and Complexity.</text>
      </g>
    </g>
    <g transform="translate(10, 250)">
      <rect x="0" y="0" width="200" height="100" fill="white" rx="10"/>
      <text x="10" y="20" class="section" data-narration="2.3: IR System Components">IR System Components</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="10,250" dur="2s" begin="4s"/>
      <g>
        <rect x="10" y="20" width="20" height="20" fill="#3377B4" rx="10"/>
        <line x1="15" y1="15" x2="25" y2="25" class="arrow"/>
        <text x="20" y="30" class="annotation">Key Components: Inverted Index, Query Parser.</text>
      </g>
    </g>
    <g transform="translate(10, 350)">
      <rect x="0" y="0" width="200" height="100" fill="white" rx="10"/>
      <text x="10" y="20" class="section" data-narration="Query Processing and Ranking">Query Processing and Ranking</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="10,350" dur="2s" begin="6s"/>
      <g>
        <rect x="10" y="20" width="20" height="20" fill="#3377B4" rx="10"/>
        <line x1="15" y1="15" x2="25" y2="25" class="arrow"/>
        <text x="20" y="30" class="annotation">Ranking retrieved documents or sources based on their relevance.</text>
      </g>
    </g>
    <g transform="translate(10, 450)">
      <rect x="0" y="0" width="200" height="100" fill="white" rx="10"/>
      <text x="10" y="20" class="section" data-narration="User Interface">User Interface</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="10,450" dur="2s" begin="8s"/>
      <g>
        <rect x="10" y="20" width="20" height="20" fill="#3377B4" rx="10"/>
        <line x1="15" y1="15" x2="25" y2="25" class="arrow"/>
        <text x="20" y="30" class="annotation">Interface through which users interact with the IR system.</text>
      </g>
    </g>
  </g>
  <g transform="translate(10, 500)">
    <text x="50" y="520" class="title">Chapter Summary</text>
    <g class="section" data-narration="Chapter Summary">Chapter Summary</g>
  </g>
</svg>