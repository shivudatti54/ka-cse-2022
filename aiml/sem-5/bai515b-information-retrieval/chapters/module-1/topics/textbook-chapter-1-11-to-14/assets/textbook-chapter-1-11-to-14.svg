<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .ir-container {
      overflow: hidden;
    }

    .ir-section {
      position: relative;
      background-color: #a7dfc4;
      padding: 20px;
      margin-bottom: 20px;
    }

    .ir-section:after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #f7f7f7, #f7f7f7);
      opacity: 0.5;
    }

    .ir-section-third:after {
      background: linear-gradient(to bottom, #f2c464, #f2c464);
    }

    .ir-section-third {
      background-color: #f7f7f7;
      padding: 20px;
      margin-bottom: 20px;
    }

    .ir-section-third:after {
      background: linear-gradient(to bottom, #f2c464, #f2c464);
    }

    .ir-section-fourth:after {
      background: linear-gradient(to bottom, #3498db, #3498db);
    }

    .ir-section-fourth {
      background-color: #f7f7f7;
      padding: 20px;
      margin-bottom: 20px;
    }

    .ir-section-fourth:after {
      background: linear-gradient(to bottom, #3498db, #3498db);
    }

    .ir-section-fifth:after {
      background: linear-gradient(to bottom, #2ecc71, #2ecc71);
    }

    .ir-section-fifth {
      background-color: #f7f7f7;
      padding: 20px;
      margin-bottom: 20px;
    }

    .ir-section-fifth:after {
      background: linear-gradient(to bottom, #2ecc71, #2ecc71);
    }

    .arrows {
      font-size: 24px;
    }
  </style>
  <g id="ir-container">
    <rect x="0" y="0" width="420" height="400" rx="10" fill="#a7dfc4"/>
    <text x="50%" y="20%" font-size="48" text-anchor="middle">Information Retrieval Study Material: Chapter 1.1-1.4</text>
    <g class="arrows">
      <line x1="20%" y1="50%" x2="80%" y2="150%" style="stroke:#3498db;stroke-width:2"/>
      <line x1="20%" y1="150%" x2="80%" y2="50%" style="stroke:#3498db;stroke-width:2"/>
    </g>
    <g class="ir-section">
      <rect x="0" y="0" width="100%" height="40" rx="10" fill="#a7dfc4"/>
      <text x="10%" y="15%" font-size="24" text-anchor="start" class="ir-section-title">Information Definition and Scope</text>
      <text x="10%" y="25%" font-size="18" text-anchor="start" class="ir-section-narration" data-narration="IR is the process of locating, retrieving, and extracting relevant information from a vast amount of data in various formats, such as text, images, audio, and video. IR is a crucial aspect of information science, as it enables users to find the required information efficiently and effectively." style="opacity:0.8"/>
    </g>
    <g class="ir-section">
      <rect x="0" y="0" width="100%" height="40" rx="10" fill="#a7dfc4"/>
      <text x="10%" y="15%" font-size="24" text-anchor="start" class="ir-section-title">Importance of Information Retrieval</text>
      <text x="10%" y="25%" font-size="18" text-anchor="start" class="ir-section-narration" data-narration="IR plays a vital role in various aspects of our daily lives, including search engines, digital libraries, and information systems." style="opacity:0.8"/>
    </g>
    <g class="ir-section-third">
      <rect x="0" y="0" width="100%" height="40" rx="10" fill="#f2c464"/>
      <text x="10%" y="15%" font-size="24" text-anchor="start" class="ir-section-title">The IR Problem</text>
      <text x="10%" y="25%" font-size="18" text-anchor="start" class="ir-section-narration" data-narration="The IR problem refers to the challenge of designing and developing effective IR systems that can efficiently locate and extract relevant information from a vast amount of data." style="opacity:0.8"/>
    </g>
    <g class="ir-section-third">
      <rect x="0" y="0" width="100%" height="40" rx="10" fill="#f2c464"/>
      <text x="10%" y="15%" font-size="24" text-anchor="start" class="ir-section-title">Key Challenges</text>
      <text x="10%" y="25%" font-size="18" text-anchor="start" class="ir-section-narration" data-narration="IR systems must deal with noise and irrelevant data that can hinder the accuracy of search results." style="opacity:0.8"/>
    </g>
    <g class="ir-section-fourth">
      <rect x="0" y="0" width="100%" height="40" rx="10" fill="#3498db"/>
      <text x="10%" y="15%" font-size="24" text-anchor="start" class="ir-section-title">Indexing</text>
      <text x="10%" y="25%" font-size="18" text-anchor="start" class="ir-section-narration" data-narration="The process of converting data into a format that can be used by IR systems is called indexing." style="opacity:0.8"/>
    </g>
    <g class="ir-section-fourth">
      <rect x="0" y="0" width="100%" height="40" rx="10" fill="#3498db"/>
      <text x="10%" y="15%" font-size="24" text-anchor="start" class="ir-section-title">Querying</text>
      <text x="10%" y="25%" font-size="18" text-anchor="start" class="ir-section-narration" data-narration="The process of submitting a request or question to an IR system is called querying." style="opacity:0.8"/>
    </g>
    <g class="ir-section-fifth">
      <rect x="0" y="0" width="100%" height="40" rx="10" fill="#2ecc71"/>
      <text x="10%" y="15%" font-size="24" text-anchor="start" class="ir-section-title">Retrieval</text>
      <text x="10%" y="25%" font-size="18" text-anchor="start" class="ir-section-narration" data-narration="The process of locating and extracting information from a database or repository is called retrieval." style="opacity:0.8"/>
    </g>
    <g class="ir-section-fifth">
      <rect x="0" y="0" width="100%" height="40" rx="10" fill="#2ecc71"/>
      <text x="10%" y="15%" font-size="24" text-anchor="start" class="ir-section-title">Information</text>
      <text x="10%" y="25%" font-size="18" text-anchor="start" class="ir-section-narration" data-narration="A piece of knowledge or data that has value and relevance is called information." style="opacity:0.8"/>
    </g>
  </g>
  <animate 
    xlink:href="#ir-section"
    begin="0s"
    dur="2s"
    repeatCount="indefinite"
  />
  <animate 
    xlink:href="#ir-section-third"
    begin="2s"
    dur="2s"
    repeatCount="indefinite"
  />
  <animate 
    xlink:href="#ir-section-third"
    begin="4s"
    dur="2s"
    repeatCount="indefinite"
  />
  <animate 
    xlink:href="#ir-section-fourth"
    begin="6s"
    dur="2s"
    repeatCount="indefinite"
  />
  <animate 
    xlink:href="#ir-section-fourth"
    begin="8s"
    dur="2s"
    repeatCount="indefinite"
  />
  <animate 
    xlink:href="#ir-section-fifth"
    begin="10s"
    dur="2s"
    repeatCount="indefinite"
  />
  <animate 
    xlink:href="#ir-section-fifth"
    begin="12s"
    dur="2s"
    repeatCount="indefinite"
  />
  <rect x="20%" y="160%" width="360%" height="120%" rx="10" fill="#f7f7f7"/>
  <rect x="20%" y="160%" width="360%" height="120%" rx="10" fill="#f7f7f7"/>
  <rect x="20%" y="160%" width="360%" height="120%" rx="10" fill="#f7f7f7"/>
  <rect x="20%" y="160%" width="360%" height="120%" rx="10" fill="#f7f7f7"/>
  <rect x="20%" y="160%" width="360%" height="120%" rx="10" fill="#f7f7f7"/>
  <text x="50%" y="240%" font-size="48" text-anchor="middle" class="footer">Footer</text>
</svg>