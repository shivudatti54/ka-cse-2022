<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="50%" stop-color="#6495ED" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4682B4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="360" fill="url(#gradient)"/>
  <!-- Title -->
  <text x="20" y="20" font-size="30" font-family="Arial" fill="#2F4F7F">User Interfaces For Search Introduction How People</text>
  <!-- Section 1: Keyword Search -->
  <g transform="translate(50, 50)">
    <rect x="10" y="10" width="100" height="50" fill="#F7DC6F" rx="10" stroke="#FFC107" stroke-width="2"/>
    <text x="15" y="20" font-size="18" font-family="Arial" fill="#FFC107">Keyword Search</text>
    <text x="10" y="40" font-size="14" font-family="Arial" fill="#2F4F7F" data-narration="Users type keywords or phrases into a search box to find information online.">Users type keywords or phrases into a search box to find information online.</text>
    <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <!-- Section 2: Implicit Search -->
  <g transform="translate(150, 50)">
    <rect x="10" y="10" width="100" height="50" fill="#C6E2B5" rx="10" stroke="#8BC34A" stroke-width="2"/>
    <text x="15" y="20" font-size="18" font-family="Arial" fill="#8BC34A">Implicit Search</text>
    <text x="10" y="40" font-size="14" font-family="Arial" fill="#2F4F7F" data-narration="Users use browser history, bookmarks, or search engine suggestions to find information online.">Users use browser history, bookmarks, or search engine suggestions to find information online.</text>
    <animateTransform attributeName="transform" type="translate" begin="0.5s" dur="2s" repeatCount="indefinite"/>
  </g>
  <!-- Section 3: Visual Search -->
  <g transform="translate(250, 50)">
    <rect x="10" y="10" width="100" height="50" fill="#F7DC6F" rx="10" stroke="#FFC107" stroke-width="2"/>
    <text x="15" y="20" font-size="18" font-family="Arial" fill="#FFC107">Visual Search</text>
    <text x="10" y="40" font-size="14" font-family="Arial" fill="#2F4F7F" data-narration="Users use images, videos, or other multimedia to search for information online.">Users use images, videos, or other multimedia to search for information online.</text>
    <animateTransform attributeName="transform" type="translate" begin="1s" dur="2s" repeatCount="indefinite"/>
  </g>
  <!-- Section 4: Conversational Search -->
  <g transform="translate(350, 50)">
    <rect x="10" y="10" width="100" height="50" fill="#C6E2B5" rx="10" stroke="#8BC34A" stroke-width="2"/>
    <text x="15" y="20" font-size="18" font-family="Arial" fill="#8BC34A">Conversational Search</text>
    <text x="10" y="40" font-size="14" font-family="Arial" fill="#2F4F7F" data-narration="Users use voice or text-based conversations to ask questions online.">Users use voice or text-based conversations to ask questions online.</text>
    <animateTransform attributeName="transform" type="translate" begin="1.5s" dur="2s" repeatCount="indefinite"/>
  </g>
  <!-- Section 5: Search Intent -->
  <g transform="translate(50, 200)">
    <rect x="10" y="10" width="100" height="50" fill="#87CEEB" rx="10" stroke="#6495ED" stroke-width="2"/>
    <text x="15" y="20" font-size="18" font-family="Arial" fill="#6495ED">Search Intent</text>
    <text x="10" y="40" font-size="14" font-family="Arial" fill="#2F4F7F" data-narration="Users have specific goals or intentions when searching for information online.">Users have specific goals or intentions when searching for information online.</text>
    <animateTransform attributeName="transform" type="translate" begin="0.5s" dur="2s" repeatCount="indefinite"/>
  </g>
  <!-- Section 6: Search Context -->
  <g transform="translate(150, 200)">
    <rect x="10" y="10" width="100" height="50" fill="#87CEEB" rx="10" stroke="#6495ED" stroke-width="2"/>
    <text x="15" y="20" font-size="18" font-family="Arial" fill="#6495ED">Search Context</text>
    <text x="10" y="40" font-size="14" font-family="Arial" fill="#2F4F7F" data-narration="The background or environment in which the search is conducted can impact the results.">The background or environment in which the search is conducted can impact the results.</text>
    <animateTransform attributeName="transform" type="translate" begin="1s" dur="2s" repeatCount="indefinite"/>
  </g>
  <!-- Section 7: Search History -->
  <g transform="translate(250, 200)">
    <rect x="10" y="10" width="100" height="50" fill="#87CEEB" rx="10" stroke="#6495ED" stroke-width="2"/>
    <text x="15" y="20" font-size="18" font-family="Arial" fill="#6495ED">Search History</text>
    <text x="10" y="40" font-size="14" font-family="Arial" fill="#2F4F7F" data-narration="The previous searches or interactions with the search system can provide valuable insights.">The previous searches or interactions with the search system can provide valuable insights.</text>
    <animateTransform attributeName="transform" type="translate" begin="1.5s" dur="2s" repeatCount="indefinite"/>
  </g>
  <!-- Footer -->
  <text x="20" y="380" font-size="18" font-family="Arial" fill="#2F4F7F">User Interfaces For Search Introduction How People</text>
</svg>