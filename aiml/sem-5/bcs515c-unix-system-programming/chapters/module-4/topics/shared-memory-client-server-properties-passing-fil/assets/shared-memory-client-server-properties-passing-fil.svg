<svg width="420" height="400" data-topic-id="shared-memory-client-server-properties-passing-fil">
    <defs>
        <linearGradient id="pastel" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
        </linearGradient>
        <linearGradient id="indigo" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6c5ce7" stop-opacity="1"/>
            <stop offset="100%" stop-color="#5c3ce7" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <title>Shared Memory Client Server Properties Passing Fil</title>
    <text x="10" y="10" font-size="24" text-anchor="start" fill="#5c3ce7">Shared Memory</text>
    <rect x="10" y="40" width="400" height="200" fill="url(#pastel)"/>
    <section id="definition" data-narration="Definition">
        <rect x="10" y="50" width="200" height="30" stroke="#5c3ce7" stroke-width="2"/>
        <text x="30" y="60" font-size="18" text-anchor="start" fill="#6c5ce7">Definition</text>
        <text x="10" y="70" font-size="12" text-anchor="start" fill="#5c3ce7">Shared memory is a region of memory shared by multiple processes.</text>
        <animate-transform attributeName="transform" type="rotate" from="0 200 30" to="360 200 30" dur="5s" begin="1s"/>
    </section>
    <section id="characteristics" data-narration="Characteristics">
        <rect x="10" y="50" width="200" height="30" stroke="#5c3ce7" stroke-width="2"/>
        <text x="30" y="60" font-size="18" text-anchor="start" fill="#6c5ce7">Characteristics</text>
        <text x="10" y="70" font-size="12" text-anchor="start" fill="#5c3ce7">- Multiple processes can access the same shared memory region simultaneously.</text>
        <text x="10" y="80" font-size="12" text-anchor="start" fill="#5c3ce7">- Changes made to the shared memory are reflected in all processes that have access to it.</text>
        <text x="10" y="90" font-size="12" text-anchor="start" fill="#5c3ce7">- Shared memory is more efficient than IPC mechanisms for large amounts of data transfer.</text>
        <animate-transform attributeName="transform" type="rotate" from="0 200 30" to="360 200 30" dur="5s" begin="2s"/>
    </section>
    <section id="types-of-shared-memory" data-narration="Types of Shared Memory">
        <rect x="10" y="50" width="200" height="30" stroke="#5c3ce7" stroke-width="2"/>
        <text x="30" y="60" font-size="18" text-anchor="start" fill="#6c5ce7">Types of Shared Memory</text>
        <text x="10" y="70" font-size="12" text-anchor="start" fill="#5c3ce7">- System V Shared Memory: Most widely used shared memory mechanism in Unix-like systems.</text>
        <text x="10" y="80" font-size="12" text-anchor="start" fill="#5c3ce7">- POSIX Shared Memory: Standard for shared memory mechanisms.</text>
        <animate-transform attributeName="transform" type="rotate" from="0 200 30" to="360 200 30" dur="5s" begin="3s"/>
    </section>
    <section id="creation-and-accessing-shared-memory" data-narration="Creation and Accessing Shared Memory">
        <rect x="10" y="50" width="200" height="30" stroke="#5c3ce7" stroke-width="2"/>
        <text x="30" y="60" font-size="18" text-anchor="start" fill="#6c5ce7">Creation and Accessing Shared Memory</text>
        <text x="10" y="70" font-size="12" text-anchor="start" fill="#5c3ce7">- Create a shared memory region using the shmget system call.</text>
        <text x="10" y="80" font-size="12" text-anchor="start" fill="#5c3ce7">- Map the shared memory region to your process's address space using the mmap system call.</text>
        <text x="10" y="90" font-size="12" text-anchor="start" fill="#5c3ce7">- Access the shared memory region using the mmap system call.</text>
        <animate-transform attributeName="transform" type="rotate" from="0 200 30" to="360 200 30" dur="5s" begin="4s"/>
    </section>
    <section id="shared-memory-example" data-narration="Shared Memory Example">
        <rect x="10" y="50" width="200" height="30" stroke="#5c3ce7" stroke-width="2"/>
        <text x="30" y="60" font-size="18" text-anchor="start" fill="#6c5ce7">Shared Memory Example</text>
        <text x="10" y="70" font-size="12" text-anchor="start" fill="#5c3ce7">- Create a shared memory region with 1024 bytes.</text>
        <text x="10" y="80" font-size="12" text-anchor="start" fill="#5c3ce7">- Map the shared memory region to your process's address space.</text>
        <text x="10" y="90" font-size="12" text-anchor="start" fill="#5c3ce7">- Access and modify the shared memory region.</text>
        <animate-transform attributeName="transform" type="rotate" from="0 200 30" to="360 200 30" dur="5s" begin="5s"/>
    </section>
    <footer>
        <text x="10" y="380" font-size="18" text-anchor="start" fill="#5c3ce7">Shared Memory Client Server Properties Passing Fil</text>
    </footer>
    <animate-transform attributeName="transform" type="rotate" from="0 200 30" to="360 200 30" dur="5s" begin="6s"/>
</svg>