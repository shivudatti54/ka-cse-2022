    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    style="background-image: linear-gradient(to bottom, #b3e5fc, #e1e6f9); border-radius: 10px;">
    <title>Overview of IPC Methods, Pipes, popen, pclose Functions</title>

    <!-- Section 1: Introduction -->
    <section data-narration="Introduction">
        <rect x="20" y="20" width="380" height="20" fill="#f5f5f5"></rect>
        <text x="30" y="35" font-size="24" font-family="Arial" fill="#3b5998" text-anchor="start">Inter-Process Communication (IPC)</text>
        <text x="30" y="50" font-size="18" font-family="Arial" fill="#3b5998" text-anchor="start">A mechanism used to enable communication between two or more processes in a computer system.</text>
    </section>

    <!-- Section 2: Pipes -->
    <section data-narration="Pipes">
        <rect x="20" y="70" width="380" height="20" fill="#f5f5f5"></rect>
        <rect x="20" y="100" width="380" height="20" fill="#f5f5f5"></rect>
        <rect x="20" y="130" width="380" height="20" fill="#f5f5f5"></rect>
        <animateTransform
            attributeName="transform"
            type="translate"
            from="0 130"
            to="0 220"
            dur="2s"
            begin="1s"
            repeatCount="indefinite"
        />
        <path
            d="M 30,140 C 50,160 70,180 90,200 C 110,220 130,240 150,260"
            stroke="#3b5998"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
        />
        <text x="40" y="220" font-size="18" font-family="Arial" fill="#3b5998" text-anchor="start">A pipe is a unidirectional communication channel between two processes.</text>
        <text x="40" y="240" font-size="18" font-family="Arial" fill="#3b5998" text-anchor="start">It is a first-in-first-out (FIFO) data structure that allows data to be sent from one process to another.</text>
    </section>

    <!-- Section 3: Popen and Pclose Functions -->
    <section data-narration="Popen and Pclose Functions">
        <rect x="20" y="270" width="380" height="20" fill="#f5f5f5"></rect>
        <rect x="20" y="300" width="380" height="20" fill="#f5f5f5"></rect>
        <rect x="20" y="330" width="380" height="20" fill="#f5f5f5"></rect>
        <animateTransform
            attributeName="transform"
            type="translate"
            from="0 330"
            to="0 410"
            dur="2s"
            begin="2s"
            repeatCount="indefinite"
        />
        <path
            d="M 30,370 C 50,390 70,410 90,430"
            stroke="#3b5998"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
        />
        <text x="40" y="410" font-size="18" font-family="Arial" fill="#3b5998" text-anchor="start">`popen()` and `pclose()` functions are used to execute a command in a separate process and communicate with it.</text>
        <text x="40" y="430" font-size="18" font-family="Arial" fill="#3b5998" text-anchor="start">`popen()` function opens a pipe to a command and returns a file descriptor.</text>
    </section>

    <!-- Section 4: Pipes -->
    <section data-narration="Pipes">
        <rect x="20" y="460" width="380" height="20" fill="#f5f5f5"></rect>
        <rect x="20" y="490" width="380" height="20" fill="#f5f5f5"></rect>
