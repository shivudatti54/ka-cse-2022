        <text x="40" y="920" font-size="18" font-family="Arial" fill="#3b5998" text-anchor="start">Other IPC methods include coprocesses, FIFOs, System V IPC, message queues, and semaphores.</text>
        <text x="40" y="940" font-size="18" font-family="Arial" fill="#3b5998" text-anchor="start">These methods provide different ways for processes to communicate and share resources.</text>
