        <text x="40" y="650" font-size="18" font-family="Arial" fill="#3b5998" text-anchor="start">A pipe is used to transfer data between two processes.</text>
        <text x="40" y="670" font-size="18" font-family="Arial" fill="#3b5998" text-anchor="start">It is a first-in-first-out (FIFO) data structure that allows data to be sent from one process to another.</text>
    </section>

