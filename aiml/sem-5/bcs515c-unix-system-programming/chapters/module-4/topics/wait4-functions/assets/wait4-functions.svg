<svg width="420" height="400" data-topic-id="wait4-functions">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3498db" stop-opacity="1" />
      <stop offset="50%" stop-color="#2ecc71" stop-opacity="1" />
      <stop offset="100%" stop-color="#e74c3c" stop-opacity="1" />
    </linearGradient>
    <style>
      .text {
        font-size: 14px;
        font-weight: bold;
        color: #2ecc71;
      }
      .annotation {
        font-size: 12px;
        color: #e74c3c;
      }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#grad)" rx="10">
    <animate transform="rotate(0 200 200)" dur="5000" repeatCount="indefinite" begin="0s" />
  </rect>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="100" height="50" fill="#f1f1f1" rx="5" />
    <rect x="0" y="55" width="100" height="50" fill="#f1f1f1" rx="5" />
    <rect x="0" y="110" width="100" height="50" fill="#f1f1f1" rx="5" />
    <rect x="0" y="165" width="100" height="50" fill="#f1f1f1" rx="5" />
    <rect x="0" y="220" width="100" height="50" fill="#f1f1f1" rx="5" />
    <circle cx="50" cy="25" r="20" fill="#3498db" />
    <text class="text" x="30" y="25" font-size="18px" text-anchor="middle">Communicators</text>
    <animate transform="translate(0, 50)" dur="500" repeatCount="indefinite" begin="0s" />
    <text class="text" x="30" y="75" font-size="18px" text-anchor="middle">Groups</text>
    <rect x="0" y="100" width="100" height="50" fill="#f1f1f1" rx="5" />
    <rect x="0" y="155" width="100" height="50" fill="#f1f1f1" rx="5" />
    <rect x="0" y="210" width="100" height="50" fill="#f1f1f1" rx="5" />
    <animate transform="translate(0, 150)" dur="500" repeatCount="indefinite" begin="0s" />
    <text class="annotation" x="30" y="100" font-size="12px" text-anchor="middle">Rank: Unique identifier for each process</text>
    <text class="annotation" x="30" y="155" font-size="12px" text-anchor="middle">Process View: Ordered arrangement of processes within a communicator</text>
    <text class="annotation" x="30" y="210" font-size="12px" text-anchor="middle">Group: Collection of processes that communicate with each other</text>
  </g>
  <g transform="translate(170, 250)">
    <rect x="0" y="0" width="100" height="50" fill="#f1f1f1" rx="5" />
    <rect x="0" y="55" width="100" height="50" fill="#f1f1f1" rx="5" />
    <rect x="0" y="110" width="100" height="50" fill="#f1f1f1" rx="5" />
    <rect x="0" y="165" width="100" height="50" fill="#f1f1f1" rx="5" />
    <rect x="0" y="220" width="100" height="50" fill="#f1f1f1" rx="5" />
    <circle cx="50" cy="25" r="20" fill="#3498db" />
    <text class="text" x="30" y="25" font-size="18px" text-anchor="middle">Point-to-Point Communication</text>
    <animate transform="translate(0, 50)" dur="500" repeatCount="indefinite" begin="0s" />
    <text class="text" x="30" y="75" font-size="18px" text-anchor="middle">MPI_Send</text>
    <rect x="0" y="100" width="100" height="50" fill="#f1f1f1" rx="5" />
    <rect x="0" y="155" width="100" height="50" fill="#f1f1f1" rx="5" />
    <rect x="0" y="210" width="100" height="50" fill="#f1f1f1" rx="5" />
    <animate transform="translate(0, 150)" dur="500" repeatCount="indefinite" begin="0s" />
