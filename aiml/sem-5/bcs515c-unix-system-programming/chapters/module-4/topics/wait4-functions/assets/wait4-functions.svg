    <text class="annotation" x="30" y="155" font-size="12px" text-anchor="middle">Receiver: The process that receives a message</text>
  </g>
  <g transform="translate(320, 250)">
    <rect x="0" y="0" width="100" height="50" fill="#f1f1f1" rx="5" />
    <rect x="0" y="55" width="100" height="50" fill="#f1f1f1" rx="5" />
    <rect x="0" y="110" width="100" height="50" fill="#f1f1f1" rx="5" />
    <rect x="0" y="165" width="100" height="50" fill="#f1f1f1" rx="5" />
    <rect x="0" y="220" width="100" height="50" fill="#f1f1f1" rx="5" />
    <circle cx="50" cy="25" r="20" fill="#3498db" />
    <text class="text" x="30" y="25" font-size="18px" text-anchor="middle">MPI_Sendrecv</text>
    <rect x="0" y="100" width="100" height="50" fill="#f1f1f1" rx="5" />
    <rect x="0" y="155" width="100" height="50" fill="#f1f1f1" rx="5" />
    <rect x="0" y="210" width="100" height="50" fill="#f1f1f1" rx="5" />
    <animate transform="translate(0, 150)" dur="500" repeatCount="indefinite" begin="0s" />
    <text class="annotation" x="30" y="100" font-size="12px" text-anchor="middle">Multiple processes can send and receive messages</text>
    <text class="annotation" x="30" y="155" font-size="12px" text-anchor="middle">Efficient and fast communication</text>
