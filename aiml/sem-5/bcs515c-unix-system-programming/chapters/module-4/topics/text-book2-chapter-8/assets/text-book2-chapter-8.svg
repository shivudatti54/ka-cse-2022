<svg width="420" height="400" data-topic-id="unix-system-programming-chapter-8">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
        </linearGradient>
        <style>
            .section {
                background-color: #87CEEB;
                padding: 20px;
                margin-bottom: 20px;
                border-radius: 10px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            .section.data-narration {
                background-color: #C7B8EA;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            .title {
                font-size: 24px;
                font-weight: bold;
                color: #3498db;
                margin-bottom: 10px;
            }
            .footer {
                font-size: 14px;
                color: #666;
                text-align: center;
                margin-top: 20px;
            }
            .animate {
                fill: transparent;
                stroke: #3498db;
                stroke-width: 2;
                stroke-linecap: round;
                animation: animate 2s infinite;
            }
            @keyframes animate {
                0% { transform: translateX(0); }
                50% { transform: translateX(20px); }
                100% { transform: translateX(0); }
            }
        </style>
    </defs>
    <title>UNIX System Programming: Chapter 8</title>
    <footer>Copyright 2023</footer>
    <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
    <g transform="translate(10, 20)">
        <rect width="400" height="350" rx="10" fill="#fff"/>
        <g class="title">UNIX System Programming: Chapter 8</g>
        <g class="footer">Copyright 2023</g>
        <g class="section data-narration">
            <text x="20" y="20" class="title">Process Identifiers</text>
            <text x="20" y="50" class="data-narration">A process identifier (PID) is a unique number assigned to each process. It is used to identify a process.</text>
        </g>
        <g class="section">
            <text x="20" y="20" class="title">Process Control Commands</text>
            <g class="animate">
                <line x1="20" y1="50" x2="50" y2="100" marker-end="url(#arrow)"/>
                <text x="20" y="100" class="data-narration">fork(): Creates a new process.</text>
                <line x1="20" y1="150" x2="50" y2="200" marker-end="url(#arrow)"/>
                <text x="20" y="200" class="data-narration">vfork(): Creates a new process and also shares the parent's memory space.</text>
                <line x1="20" y1="250" x2="50" y2="300" marker-end="url(#arrow)"/>
                <text x="20" y="300" class="data-narration">exit(): Terminates a process.</text>
                <line x1="20" y1="350" x2="50" y2="400" marker-end="url(#arrow)"/>
                <text x="20" y="400" class="data-narration">wait(): Waits for a process to terminate.</text>
            </g>
        </g>
        <g class="section">
            <text x="20" y="20" class="title">fork() Function</text>
            <g class="animate">
                <line x1="20" y1="50" x2="50" y2="100" marker-end="url(#arrow)"/>
                <text x="20" y="100" class="data-narration">The fork() system call creates a new process.</text>
                <line x1="20" y1="150" x2="50" y2="200" marker-end="url(#arrow)"/>
                <text x="20" y="200" class="data-narration">The new process is a copy of the parent process.</text>
                <line x1="20" y1="250" x2="50" y2="300" marker-end="url(#arrow)"/>
                <text x="20" y="300" class="data-narration">The fork() system call returns a value of 0 in the child process and the PID of the child process in the parent process.</text>
            </g>
        </g>
    </g>
</svg>