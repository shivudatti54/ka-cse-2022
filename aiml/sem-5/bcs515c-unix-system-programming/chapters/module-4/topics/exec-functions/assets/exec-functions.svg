<svg width="420" height="400" data-topic-id="exec-functions" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    /* 
    * Include gradient background with pastel colors
    */
    .gradient {
      background-image: linear-gradient(to bottom, #C7B8EA, #87CEEB);
      background-size: 100% 100%;
      height: 100%;
    }

    /* 
    * Add title at top
    */
    .title {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #3498db;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
    }

    /* 
    * Add footer at bottom
    */
    .footer {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #2ecc71;
      font-size: 14px;
      text-align: center;
    }

    /* 
    * Section for injective functions
    */
    .injective-section {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #f1c40f;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      width: 80%;
      animation: animate-injective 2s infinite;
    }

    @keyframes animate-injective {
      0% {
        transform: translateX(-50%) rotate(0deg);
      }
      50% {
        transform: translateX(-50%) rotate(90deg);
      }
      100% {
        transform: translateX(-50%) rotate(180deg);
      }
    }

    /* 
    * Section for surjective functions
    */
    .surjective-section {
      position: absolute;
      top: 240px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #2ecc71;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      width: 80%;
      animation: animate-surjective 2s infinite;
    }

    @keyframes animate-surjective {
      0% {
        transform: translateX(-50%) rotate(0deg);
      }
      50% {
        transform: translateX(-50%) rotate(90deg);
      }
      100% {
        transform: translateX(-50%) rotate(180deg);
      }
    }

    /* 
    * Add arrow markers for connections
    */
    .arrow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #3498db;
      font-size: 14px;
      text-align: center;
    }

    /* 
    * Add clear labels and annotations
    */
    .label {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #2ecc71;
      font-size: 14px;
      text-align: center;
    }
  </style>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" rx="10" />
  <rect x="10" y="10" width="400" height="380" class="gradient" fill="none" rx="10" />
  <text class="title" xml:space="preserve">Exec Functions</text>
  <text class="footer" xml:space="preserve">Learn about functions and their applications</text>
  <div class="injective-section" data-narration="Injective Functions">
    <text class="label">Injective Function</text>
    <text xml:space="preserve">A function is injective if distinct elements map to distinct elements.</text>
    <rect x="20" y="20" width="60" height="60" fill="#f1c40f" rx="10" />
    <text class="arrow">→</text>
    <text xml:space="preserve">For example, f(x) = 2x is injective because x₁ ≠ x₂ implies 2x₁ ≠ 2x₂.</text>
    <rect x="100" y="20" width="60" height="60" fill="#f1c40f" rx="10" />
    <text class="arrow">→</text>
    <text xml:space="preserve">This means that different input values produce different output values.</text>
  </div>
  <div class="surjective-section" data-narration="Surjective Functions">
    <text class="label">Surjective Function</text>
    <text xml:space="preserve">A function is surjective if every element in the codomain has at least one pre-image.</text>
    <rect x="20" y="120" width="60" height="60" fill="#2ecc71" rx="10" />
    <text class="arrow">→</text>
    <text xml:space="preserve">For example, f(x) = x² is surjective because every non-negative real number has a real square root.</text>
    <rect x="100" y="120" width="60" height="60" fill="#2ecc71" rx="10" />
    <text class="arrow">→</text>
    <text xml:space="preserve">This means that every possible output value is mapped to at least one input value.</text>
  </div>
</svg>