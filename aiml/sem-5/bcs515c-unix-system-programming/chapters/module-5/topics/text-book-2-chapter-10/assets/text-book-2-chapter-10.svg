<svg width="420" height="400" data-topic-id="unix-system-programming-text-book-2-chapter-10">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <body>
    <!-- Title at top -->
    <rect x="10" y="10" width="400" height="30" fill="url(#grad)" rx="5"/>
    <text x="15" y="25" font-size="24" fill="#455A64">UNIX System Programming</text>
    <text x="15" y="40" font-size="18" fill="#455A64" data-narration="Introduction to UNIX System Programming"></text>

    <!-- Section 1: File Descriptors -->
    <section id="file-descriptors">
      <rect x="10" y="60" width="400" height="70" fill="url(#grad)" rx="5"/>
      <text x="15" y="80" font-size="18" fill="#455A64" data-narration="File Descriptors: Small integers that refer to open files in a process."></text>
      <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="5s" begin="-2s" />
      <path d="M 200,150 L 250,150" stroke="#34A85A" stroke-width="2" fill="none" data-topic-id="unix-system-programming-text-book-2-chapter-10-file-descriptors-1"/>
      <text x="15" y="120" font-size="18" fill="#455A64" data-narration="Creating file descriptors using the open() system call."></text>
      <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="5s" begin="-2s" />
    </section>

    <!-- Section 2: File Descriptors Types -->
    <section id="file-descriptors-types">
      <rect x="10" y="130" width="400" height="70" fill="url(#grad)" rx="5"/>
      <text x="15" y="150" font-size="18" fill="#455A64" data-narration="File Descriptors Types: Read, Write, and Append file descriptors."></text>
      <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="5s" begin="-2s" />
      <path d="M 200,150 L 220,150" stroke="#34A85A" stroke-width="2" fill="none" data-topic-id="unix-system-programming-text-book-2-chapter-10-file-descriptors-types-1"/>
      <text x="15" y="180" font-size="18" fill="#455A64" data-narration="File Descriptors Types: Used to read and write data to files."></text>
      <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="5s" begin="-2s" />
    </section>

    <!-- Section 3: File Locking -->
    <section id="file-locking">
      <rect x="10" y="210" width="400" height="70" fill="url(#grad)" rx="5"/>
      <text x="15" y="230" font-size="18" fill="#455A64" data-narration="File Locking: Prevents multiple processes from accessing the same file simultaneously."></text>
      <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="5s" begin="-2s" />
      <path d="M 200,150 L 250,150" stroke="#34A85A" stroke-width="2" fill="none" data-topic-id="unix-system-programming-text-book-2-chapter-10-file-locking-1"/>
      <text x="15" y="260" font-size="18" fill="#455A64" data-narration="File Locking Mechanism: Used to synchronize access to shared resources."></text>
      <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="5s" begin="-2s" />
    </section>

    <!-- Section 4: Pipes -->
    <section id="pipes">
      <rect x="10" y="310" width="400" height="70" fill="url(#grad)" rx="5"/>
      <text x="15" y="330" font-size="18" fill="#455A64" data-narration="Pipes: Used to connect two processes and allow them to communicate with each other."></text>
      <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="5s" begin="-2s" />
      <path d="M 200,150 L 250,150" stroke="#34A85A" stroke-width="2" fill="none" data-topic-id="unix-system-programming-text-book-2-chapter-10-pipes-1"/>
      <text x="15" y="360" font-size="18" fill="#455A64" data-narration="Creating pipes using the pipe() system call."></text>
      <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="5s" begin="-2s" />
    </section>

    <!-- Section 5: Multiple Processes and Pipes -->
    <section id="multiple-processes-and-pipes">
      <rect x="10" y="410" width="400" height="70" fill="url(#grad)" rx="5"/>
      <text x="15" y="430" font-size="18" fill="#455A64" data-narration="Multiple Processes and Pipes: Used to connect multiple processes and allow them to communicate with each other."></text>
      <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="5s" begin="-2s" />
      <path d="M 200,150 L 250,150" stroke="#34A85A" stroke-width="2" fill="none" data-topic-id="unix-system-programming-text-book-2-chapter-10-multiple-processes-and-pipes-1"/>
      <text x="15" y="460" font-size="18" fill="#455A64" data-narration="Creating multiple processes and pipes using the fork() and pipe() system calls."></text>
      <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="5s" begin="-2s" />
    </section>

    <!-- Footer at bottom -->
    <rect x="10" y="380" width="400" height="30" fill="url(#grad)" rx="5"/>
    <text x="15" y="400" font-size="18" fill="#455A64">UNIX System Programming</text>
  </body>
</svg>