<svg width="420" height="400" data-topic-id="daemon-processes-introduction-daemon-characteristi">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA"/>
      <stop offset="100%" stop-color="#F7F2C4"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title section -->
  <section data-narration="Introduction to Daemon Processes">
    <rect x="10" y="10" width="400" height="50" fill="#3498DB"/>
    <rect x="10" y="60" width="400" height="50" fill="#E74C3C"/>
    <text x="15" y="25" font-size="24" font-family="Montserrat" fill="#ffffff">Daemon Processes</text>
    <text x="15" y="90" font-size="18" font-family="Montserrat" fill="#ffffff">Introduction</text>
  </section>
  
  <!-- Background Process section -->
  <section data-narration="Background Process">
    <rect x="10" y="120" width="400" height="50" fill="#2ecc71"/>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="x" begin="0s" dur="2s" repeatCount="indefinite" from="10" to="50"/>
    <animate attributeName="y" begin="0s" dur="2s" repeatCount="indefinite" from="120" to="170"/>
    <text x="15" y="175" font-size="18" font-family="Montserrat" fill="#ffffff">Background Process</text>
  </section>
  
  <!-- System Service section -->
  <section data-narration="System Service">
    <rect x="10" y="200" width="400" height="50" fill="#2ecc71"/>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="x" begin="0s" dur="2s" repeatCount="indefinite" from="10" to="50"/>
    <animate attributeName="y" begin="0s" dur="2s" repeatCount="indefinite" from="200" to="250"/>
    <text x="15" y="225" font-size="18" font-family="Montserrat" fill="#ffffff">System Service</text>
  </section>
  
  <!-- Non-Interactive section -->
  <section data-narration="Non-Interactive">
    <rect x="10" y="250" width="400" height="50" fill="#2ecc71"/>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="x" begin="0s" dur="2s" repeatCount="indefinite" from="10" to="50"/>
    <animate attributeName="y" begin="0s" dur="2s" repeatCount="indefinite" from="250" to="300"/>
    <text x="15" y="275" font-size="18" font-family="Montserrat" fill="#ffffff">Non-Interactive</text>
  </section>
  
  <!-- Persistent section -->
  <section data-narration="Persistent">
    <rect x="10" y="300" width="400" height="50" fill="#2ecc71"/>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="x" begin="0s" dur="2s" repeatCount="indefinite" from="10" to="50"/>
    <animate attributeName="y" begin="0s" dur="2s" repeatCount="indefinite" from="300" to="350"/>
    <text x="15" y="325" font-size="18" font-family="Montserrat" fill="#ffffff">Persistent</text>
  </section>
  
  <!-- Coding Rules section -->
  <section data-narration="Coding Rules">
    <rect x="10" y="350" width="400" height="50" fill="#3498DB"/>
    <rect x="10" y="400" width="400" height="50" fill="#E74C3C"/>
    <text x="15" y="375" font-size="18" font-family="Montserrat" fill="#ffffff">Coding Rules</text>
  </section>
  
  <!-- Footer section -->
  <footer>
    <text x="15" y="380" font-size="18" font-family="Montserrat" fill="#ffffff">Educational Diagram</text>
  </footer>
</svg>