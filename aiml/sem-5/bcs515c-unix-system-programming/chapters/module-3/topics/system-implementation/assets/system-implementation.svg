<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg">
    <!-- Core Directives -->
    <circle cx="210" cy="200" r="100" fill="#3498db" stroke="#ffffff" stroke-width="2" />
    <rect x="50" y="50" width="320" height="300" fill="#f9f9f9" />
    
    <!-- default-src 'self'; -->
    <text x="180" y="220" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Content Security Policy</text>
    
    <!-- script-src 'self' https://trusted.cdn.com -->
    <rect x="100" y="100" width="200" height="150" fill="#ffffff" rx="10" />
    <text x="150" y="120" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Script Source</text>
    <text x="150" y="180" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Trusted CDN</text>
    
    <!-- HTTP Response Header -->
    <g transform="translate(200, 250)">
        <rect x="0" y="0" width="120" height="40" fill="#ffffff" rx="10" />
        <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="start">HTTP Response Header</text>
    </g>
    
    <!-- Basic Flow of CSP Enforcement -->
    <g transform="translate(350, 250)">
        <rect x="0" y="0" width="120" height="40" fill="#ffffff" rx="10" />
        <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="start">CSP Enforcement</text>
    </g>
    
    <!-- Resource Loading -->
    <g transform="translate(500, 250)">
        <rect x="0" y="0" width="120" height="40" fill="#ffffff" rx="10" />
        <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Resource Loading</text>
    </g>
</svg>