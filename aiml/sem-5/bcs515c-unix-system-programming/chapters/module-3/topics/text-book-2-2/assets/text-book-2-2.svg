<svg width="420" height="400" data-topic-id="Text-Book-2-2" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B2FFFC"/>
      <stop offset="100%" stop-color="#C7E8F2"/>
    </linearGradient>
  </defs>
  <title>Unix System Programming</title>
  <rect x="10" y="10" width="400" height="80" fill="url(#pastel-gradient)"/>
  <g transform="translate(10, 120)">
    <rect x="10" y="10" width="400" height="50" fill="#F7F7F7"/>
    <g id="unix-standardization-section">
      <rect x="10" y="10" width="350" height="40" fill="#F7F7F7"/>
      <text x="10" y="20" font-size="16" font-family="Arial" fill="#333">Unix Standardization</text>
      <text x="10" y="40" font-size="12" font-family="Arial" fill="#666">This refers to the process of creating a set of rules and guidelines for Unix-like systems.</text>
      <animate transform="rotate(360 20 20)" begin="0s" dur="5s" repeat="1"/>
      <text x="10" y="60" font-size="16" font-family="Arial" fill="#333">What is Unix Standardization?</text>
    </g>
    <g id="unix-standardization-history-section">
      <rect x="10" y="10" width="350" height="40" fill="#F7F7F7"/>
      <text x="10" y="20" font-size="16" font-family="Arial" fill="#333">History of Unix Standardization</text>
      <text x="10" y="40" font-size="12" font-family="Arial" fill="#666">The Unix standardization began in the 1970s, when the United States Department of Defense (DoD) developed the Unix operating system.</text>
      <animate transform="rotate(360 20 20)" begin="5s" dur="5s" repeat="1"/>
      <text x="10" y="60" font-size="16" font-family="Arial" fill="#333">When did Unix Standardization begin?</text>
    </g>
    <g id="unix-standardization-key-features-section">
      <rect x="10" y="10" width="350" height="40" fill="#F7F7F7"/>
      <text x="10" y="20" font-size="16" font-family="Arial" fill="#333">Key Features of Unix Standardization</text>
      <text x="10" y="40" font-size="12" font-family="Arial" fill="#666">Portability, Interoperability, and Compatibility.</text>
      <animate transform="rotate(360 20 20)" begin="10s" dur="5s" repeat="1"/>
      <text x="10" y="60" font-size="16" font-family="Arial" fill="#333">What are the key features of Unix Standardization?</text>
    </g>
    <g id="unix-section">
      <rect x="10" y="10" width="400" height="50" fill="#F7F7F7"/>
      <text x="10" y="20" font-size="16" font-family="Arial" fill="#333">UNIX</text>
      <text x="10" y="40" font-size="12" font-family="Arial" fill="#666">A family of operating systems that conform to the Unix standard.</text>
      <animate transform="rotate(360 20 20)" begin="15s" dur="5s" repeat="1"/>
      <text x="10" y="60" font-size="16" font-family="Arial" fill="#333">What is UNIX?</text>
    </g>
    <g id="unix-key-features-section">
      <rect x="10" y="10" width="350" height="40" fill="#F7F7F7"/>
      <text x="10" y="20" font-size="16" font-family="Arial" fill="#333">Key Features of UNIX</text>
      <text x="10" y="40" font-size="12" font-family="Arial" fill="#666">Multi-user capability, Multi-tasking, File system hierarchy, and Input/Output operations.</text>
      <animate transform="rotate(360 20 20)" begin="20s" dur="5s" repeat="1"/>
      <text x="10" y="60" font-size="16" font-family="Arial" fill="#333">What are the key features of UNIX?</text>
    </g>
    <g id="unix-applications-section">
      <rect x="10" y="10" width="350" height="40" fill="#F7F7F7"/>
      <text x="10" y="20" font-size="16" font-family="Arial" fill="#333">UNIX Applications</text>
      <text x="10" y="40" font-size="12" font-family="Arial" fill="#666">UNIX is widely used in various fields such as operating systems, network protocols, and embedded systems.</text>
      <animate transform="rotate(360 20 20)" begin="25s" dur="5s" repeat="1"/>
      <text x="10" y="60" font-size="16" font-family="Arial" fill="#333">In which fields is UNIX widely used?</text>
    </g>
    <g id="footer">
      <rect x="10" y="370" width="400" height="30" fill="#F7F7F7"/>
      <text x="10" y="380" font-size="16" font-family="Arial" fill="#333">Learn more about Unix System Programming</text>
    </g>
  </g>
</svg>