<svg width="420" height="400" data-topic-id="fchdir-getcwd-functions">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A98FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4698FF" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="380" height="350" fill="url(#gradient)"/>
  <!-- Section 1: Introduction -->
  <section data-narration="Introduction to Directory Functions">
    <title>Directory Functions</title>
    <text x="20" y="50" font-size="24" font-family="Arial, sans-serif">Directory Functions</text>
    <rect x="20" y="80" width="350" height="30" fill="#fff" rx="10"/>
    <text x="20" y="100" font-size="18" font-family="Arial, sans-serif">In Unix system programming, directory functions provide essential tools for navigating and manipulating the directory structure of the filesystem.</text>
  </section>

  <!-- Section 2: mkdir() Function -->
  <section data-narration="Creating Directories with mkdir() Function">
    <rect x="20" y="150" width="350" height="30" fill="#fff" rx="10"/>
    <text x="20" y="170" font-size="18" font-family="Arial, sans-serif">mkdir() Function</text>
    <text x="20" y="205" font-size="18" font-family="Arial, sans-serif">Creates a new directory with the specified pathname.</text>
    <ul>
      <li><text x="20" y="230" font-size="16" font-family="Arial, sans-serif">pathname</text>: The path of the directory to create</li>
      <li><text x="20" y="250" font-size="16" font-family="Arial, sans-serif">mode</text>: The permission bits for the new directory</li>
    </ul>
    <rect x="20" y="280" width="350" height="30" fill="#fff" rx="10"/>
    <text x="20" y="300" font-size="18" font-family="Arial, sans-serif">Example:</text>
    <code>
      <pre>
        <code>
          if (mkdir("/tmp/mydir", 0755) == -1) {
            perror("mkdir");
            return 1;
          }
          printf("Directory created successfully\n");
          return 0;
        </code>
      </pre>
    </code>
  </section>

  <!-- Section 3: rmdir() Function -->
  <section data-narration="Removing Directories with rmdir() Function">
    <rect x="20" y="350" width="350" height="30" fill="#fff" rx="10"/>
    <text x="20" y="370" font-size="18" font-family="Arial, sans-serif">rmdir() Function</text>
    <text x="20" y="405" font-size="18" font-family="Arial, sans-serif">Removes an empty directory.</text>
    <ul>
      <li><text x="20" y="430" font-size="16" font-family="Arial, sans-serif">pathname</text>: The path of the directory to remove</li>
    </ul>
    <rect x="20" y="460" width="350" height="30" fill="#fff" rx="10"/>
    <text x="20" y="480" font-size="18" font-family="Arial, sans-serif">Example:</text>
    <code>
      <pre>
        <code>
          if (rmdir("/tmp/mydir") == -1) {
            perror("rmdir");
            return 1;
          }
          printf("Directory removed successfully\n");
          return 0;
        </code>
      </pre>
    </code>
  </section>

  <!-- Section 4: Example Code -->
  <section data-narration="Example Code for mkdir() and rmdir() Functions">
    <rect x="20" y="530" width="350" height="30" fill="#fff" rx="10"/>
    <text x="20" y="550" font-size="18" font-family="Arial, sans-serif">Example Code</text>
    <pre>
      <code>
        #include <stdio.h>
        #include <sys/stat.h>
        #include <sys/types.h>

        int main() {
          if (mkdir("/tmp/mydir", 0755) == -1) {
            perror("mkdir");
            return 1;
          }
          printf("Directory created successfully\n");
          return 0;
        }
      </code>
    </pre>
    <pre>
      <code>
        #include <stdio.h>
        #include <sys/stat.h>
        #include <sys/types.h>

        int main() {
          if (rmdir("/tmp/mydir") == -1) {
            perror("rmdir");
            return 1;
          }
          printf("Directory removed successfully\n");
          return 0;
        }
      </code>
    </pre>
  </section>

  <!-- Footer -->
  <footer>
    <text x="20" y="390" font-size="18" font-family="Arial, sans-serif">Fchdir and Getcwd Functions</text>
  </footer>
</svg>