<svg width="420" height="400" data-topic-id="file-io-introduction-file-description-open-create">
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"></rect>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>File I/O Introduction in UNIX</title>
  <rect x="10" y="10" width="400" height="30" fill="#2F4F7F" rx="5"></rect>
  <text x="20" y="35" font-size="24" font-family="Arial" fill="#FFFFFF" text-anchor="start">File I/O in UNIX</text>
  <rect x="10" y="60" width="400" height="150" fill="#2F4F7F" rx="5"></rect>
  <section data-narration="File Description">
    <rect x="10" y="70" width="350" height="100" fill="#FFFFFF" rx="5"></rect>
    <rect x="10" y="70" width="30" height="100" fill="#2F4F7F" rx="5"></rect>
    <text x="40" y="90" font-size="18" font-family="Arial" fill="#666666" text-anchor="start">File Type</text>
    <rect x="70" y="90" width="80" height="80" fill="#2F4F7F" rx="5"></rect>
    <text x="150" y="90" font-size="18" font-family="Arial" fill="#666666" text-anchor="start">File Permissions</text>
    <rect x="200" y="90" width="80" height="80" fill="#2F4F7F" rx="5"></rect>
    <text x="300" y="90" font-size="18" font-family="Arial" fill="#666666" text-anchor="start">File Ownership</text>
    <rect x="330" y="90" width="80" height="80" fill="#2F4F7F" rx="5"></rect>
    <text x="20" y="220" font-size="18" font-family="Arial" fill="#666666" text-anchor="start">File Size</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 50" to="360 200 50" dur="10s" begin="0s" repeatCount="indefinite"/>
  </section>
  <section data-narration="Open Function">
    <rect x="10" y="230" width="400" height="150" fill="#2F4F7F" rx="5"></rect>
    <rect x="10" y="230" width="30" height="100" fill="#2F4F7F" rx="5"></rect>
    <text x="40" y="260" font-size="18" font-family="Arial" fill="#666666" text-anchor="start">Open Function</text>
    <rect x="70" y="260" width="80" height="80" fill="#2F4F7F" rx="5"></rect>
    <text x="150" y="260" font-size="18" font-family="Arial" fill="#666666" text-anchor="start">File Descriptor</text>
    <rect x="200" y="260" width="80" height="80" fill="#2F4F7F" rx="5"></rect>
    <text x="300" y="260" font-size="18" font-family="Arial" fill="#666666" text-anchor="start">Flags</text>
    <rect x="330" y="260" width="80" height="80" fill="#2F4F7F" rx="5"></rect>
    <text x="20" y="300" font-size="18" font-family="Arial" fill="#666666" text-anchor="start">Example</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="10s" begin="0s" repeatCount="indefinite"/>
  </section>
  <section data-narration="Create Function">
    <rect x="10" y="340" width="400" height="150" fill="#2F4F7F" rx="5"></rect>
    <rect x="10" y="340" width="30" height="100" fill="#2F4F7F" rx="5"></rect>
    <text x="40" y="370" font-size="18" font-family="Arial" fill="#666666" text-anchor="start">Create Function</text>
    <rect x="70" y="370" width="80" height="80" fill="#2F4F7F" rx="5"></rect>
    <text x="150" y="370" font-size="18" font-family="Arial" fill="#666666" text-anchor="start">File Descriptor</text>
    <rect x="200" y="370" width="80" height="80" fill="#2F4F7F" rx="5"></rect>
    <text x="300" y="370" font-size="18" font-family="Arial" fill="#666666" text-anchor="start">Flags</text>
    <rect x="330" y="370" width="80" height="80" fill="#2F4F7F" rx="5"></rect>
    <text x="20" y="410" font-size="18" font-family="Arial" fill="#666666" text-anchor="start">Example</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 320" to="360 200 320" dur="10s" begin="0s" repeatCount="indefinite"/>
  </section>
  <rect x="20" y="450" width="400" height="30" fill="#2F4F7F" rx="5"></rect>
  <text x="140" y="465" font-size="24" font-family="Arial" fill="#FFFFFF" text-anchor="middle">File I/O in UNIX</text>
  <rect x="10" y="470" width="400" height="30" fill="#2F4F7F" rx="5"></rect>
  <text x="10" y="495" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">File I/O in UNIX</text>
</svg>