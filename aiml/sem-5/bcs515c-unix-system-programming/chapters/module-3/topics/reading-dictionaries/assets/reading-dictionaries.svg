<svg width="420" height="400" data-topic-id="reading-dictionaries" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title {
      font-size: 24px;
      font-weight: bold;
      color: #0097A7;
      text-align: center;
      margin-bottom: 20px;
    }

    .footer {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-top: 20px;
    }

    .gradient {
      background: #87CEEB;
      background: linear-gradient(to bottom, #87CEEB, #ADD8E6);
    }

    .section {
      margin-bottom: 40px;
    }

    .section:after {
      content: attr(data-narration);
      font-size: 14px;
      color: #3B5998;
      text-align: center;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      position: absolute;
    }

    .arrow {
      fill: #66CCCC;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .word {
      font-size: 18px;
      color: #3498DB;
    }

    .definition {
      font-size: 16px;
      color: #E74C3C;
    }
  </style>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#gradient)" />
  <rect x="10" y="10" width="400" height="380" rx="10" fill="#fff" />
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="100%" height="100%" fill="#fff" />
    <text class="title" x="50%" y="20%" text-anchor="middle">Reading Dictionaries</text>
    <text class="footer" x="50%" y="40%" text-anchor="middle">Unix System Programming</text>
  </g>
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="100%" height="150" fill="#fff" />
    <section class="section" data-narration="Introduction to Dictionaries">
      <rect x="0" y="0" width="100%" height="80" fill="#fff" />
      <text class="word" x="50%" y="50%" text-anchor="middle">Dictionary</text>
      <text class="definition" x="50%" y="70%" text-anchor="middle">A file that stores a collection of key-value pairs.</text>
    </section>
    <section class="section" data-narration="Types of Dictionaries">
      <rect x="0" y="150" width="100%" height="80" fill="#fff" />
      <text class="word" x="50%" y="50%" text-anchor="middle">Word Dictionary</text>
      <text class="definition" x="50%" y="70%" text-anchor="middle">Stores the meanings of individual words.</text>
      <rect x="0" y="0" width="30%" height="100%" fill="#fff" />
      <text class="word" x="10%" y="50%" text-anchor="middle">Technical Dictionary</text>
      <text class="definition" x="10%" y="70%" text-anchor="middle">Stores the meanings of technical terms and phrases.</text>
    </section>
    <section class="section" data-narration="How to Read a Dictionary">
      <rect x="0" y="250" width="100%" height="80" fill="#fff" />
      <text class="word" x="50%" y="50%" text-anchor="middle">Open the dictionary file</text>
      <text class="definition" x="50%" y="70%" text-anchor="middle">Use a text editor or command-line interface to open the dictionary file.</text>
      <rect x="0" y="0" width="30%" height="100%" fill="#fff" />
      <text class="word" x="10%" y="50%" text-anchor="middle">Scan the contents</text>
      <text class="definition" x="10%" y="70%" text-anchor="middle">Browse through the dictionary file to understand its structure and organization.</text>
    </section>
    <section class="section" data-narration="Examples of Dictionaries in Unix">
      <rect x="0" y="350" width="100%" height="80" fill="#fff" />
      <text class="word" x="50%" y="50%" text-anchor="middle">Man dictionary</text>
      <text class="definition" x="50%" y="70%" text-anchor="middle">The man command is used to read the manual pages of Unix commands and utilities.</text>
      <rect x="0" y="0" width="30%" height="100%" fill="#fff" />
      <text class="word" x="10%" y="50%" text-anchor="middle">Yacc dictionary</text>
      <text class="definition" x="10%" y="70%" text-anchor="middle">The yacc command is used to read the lexical analyzer and parser definitions for programming languages.</text>
    </section>
    <a class="arrow" x="50%" y="200" transform="rotate(45 50% 200%)"></a>
    <a class="arrow" x="50%" y="280" transform="rotate(-45 50% 280%)"></a>
  </g>
  <animate duration="2000" begin="0s" fill="freeze" repeatCount="indefinite">
    <rect x="0" y="0" width="100%" height="100%" fill="#ADD8E6" />
  </animate>
</svg>