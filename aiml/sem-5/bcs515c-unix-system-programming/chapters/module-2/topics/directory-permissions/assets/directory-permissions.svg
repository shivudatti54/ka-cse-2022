<svg width="420" height="400" data-topic-id="directory-permissions" data-slug="directory-permissions">
  <defs>
    <style>
      text {
        fill: #333;
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 10px;
      }
      circle {
        fill: #ccc;
        stroke: #aaa;
        stroke-width: 2;
      }
      .section {
        background-color: #83B9FF;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
      }
      .animation {
        fill: #F7DC6F;
        animation: pulse 2s infinite;
      }
    </style>
  </defs>

  <title>Directory Permissions</title>

  <section data-narration="Introduction to File Attributes">
    <div class="section">
      <h2>File Attributes and Permissions</h2>
      <p>
        In a Unix/Linux system, every file and directory has a set of
        metadata associated with it, known as file attributes. These
        attributes are not part of the file's content but describe its
        characteristics, such as who owns it, when it was last modified,
        its size, and, most importantly, its access permissions.
      </p>
    </div>
  </section>

  <section data-narration="Viewing File Attributes with `ls`">
    <div class="section">
      <h2>Viewing File Attributes with `ls`</h2>
      <p>
        The primary command for viewing file attributes is `ls` (list).
        While a simple `ls` shows only filenames, its various options
        reveal detailed attribute information.
      </p>
      <pre>
        $ ls -l
        total 24
        drwxr-xr-x 2 alice users 4096 Mar 10 14:30 Documents
        -rw-r--r-- 1 alice users  220 Mar  9 11:22 hello.txt
        -rw-r--r-- 1 alice users 8464 Mar  8 10:15 my_script.sh
      </pre>
    </div>
  </section>

  <section data-narration="The `-l` (Long Listing) Option">
    <div class="section">
      <h2>The `-l` (Long Listing) Option</h2>
      <p>
        The most important option is `ls -l`, which provides a detailed,
        columnar view of file attributes.
      </p>
      <div class="animation">
        <circle cx="20" cy="20" r="20"></circle>
        <text x="20" y="40" text-anchor="middle">File type and permissions</text>
        <text x="20" y="60" text-anchor="middle">Link count</text>
        <text x="20" y="80" text-anchor="middle">Owner (User)</text>
        <text x="20" y="100" text-anchor="middle">Group</text>
        <text x="20" y="120" text-anchor="middle">Size</text>
      </div>
    </div>
  </section>

  <section data-narration="Breaking Down the Output">
    <div class="section">
      <h2>Breaking Down the Output</h2>
      <p>
        The output of `ls -l` shows the following:
      </p>
      <div class="animation">
        <circle cx="20" cy="20" r="20"></circle>
        <text x="20" y="40" text-anchor="middle">File type and permissions</text>
        <text x="20" y="60" text-anchor="middle">Link count: 2</text>
        <text x="20" y="80" text-anchor="middle">Owner (User): alice</text>
        <text x="20" y="100" text-anchor="middle">Group: users</text>
        <text x="20" y="120" text-anchor="middle">Size (bytes): 4096</text>
      </div>
    </div>
  </section>

  <section data-narration="File Type and Permissions">
    <div class="section">
      <h2>File Type and Permissions</h2>
      <p>
        The first character of the output represents the file type and
        permissions. Here's a breakdown:
      </p>
      <div class="animation">
        <circle cx="20" cy="20" r="20"></circle>
        <text x="20" y="40" text-anchor="middle">File type and permissions</text>
        <text x="20" y="60" text-anchor="middle">Following is the permission
          breakdown:
        </text>
        <text x="20" y="80" text-anchor="middle">- (owner only read)
        </text>
        <text x="20" y="100" text-anchor="middle">r (owner and group read)
        </text>
        <text x="20" y="120" text-anchor="middle">- (owner only write)
        </text>
      </div>
    </div>
  </section>

  <footer>
    <h2>Directory Permissions</h2>
  </footer>
</svg>