<svg width="420" height="400" data-topic-id="profile" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#65C2E1" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E9D8F7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Profile</title>
  <rect x="10" y="10" width="400" height="30" fill="#1A1D23" rx="5"/>
  <text x="15" y="30" fill="#C7E1F4" font-size="18" font-family="Open Sans" text-anchor="start" data-narration="Profile Definition">
    <tspan x="15" y="30" font-size="18" font-family="Open Sans" font-weight="bold">Profile</tspan>
    <tspan x="60" y="30" font-size="14" font-family="Open Sans">Definition</tspan>
  </text>
  <rect x="10" y="60" width="400" height="80" fill="url(#pastel-gradient)" rx="5"/>
  <text x="15" y="70" fill="#C7E1F4" font-size="16" font-family="Open Sans" text-anchor="start" data-narration="What is a Profile?">
    <tspan x="15" y="70" font-size="16" font-family="Open Sans">What is a Profile?</tspan>
    <tspan x="60" y="70" font-size="14" font-family="Open Sans" font-weight="bold">A profile is a user's customized Unix shell settings</tspan>
  </text>
  <g>
    <path d="M 170,100 L 180,100 L 180,120 L 200,120 L 200,140 L 220,140 L 220,160 L 240,160 L 240,180 L 260,180 L 260,200 L 280,200 L 280,220 L 300,220 L 300,240 L 320,240 L 320,260 L 340,260 L 340,280 L 360,280 L 360,300 L 380,300 L 380,320 L 400,320 L 400,340 L 420,340 Z" fill="#66CCCC" stroke="#455A64" stroke-width="2"/>
    <animateTransform attributeName="transform" dur="0.5s" from="0 0" to="1 0" begin="0s" repeatCount="indefinite"/>
  </g>
  <rect x="10" y="150" width="400" height="80" fill="url(#pastel-gradient)" rx="5"/>
  <text x="15" y="160" fill="#C7E1F4" font-size="16" font-family="Open Sans" text-anchor="start" data-narration="Types of Profiles">
    <tspan x="15" y="160" font-size="16" font-family="Open Sans">Types of Profiles</tspan>
    <tspan x="60" y="160" font-size="14" font-family="Open Sans" font-weight="bold">There are two types of profiles</tspan>
    <tspan x="80" y="160" font-size="14" font-family="Open Sans">Login Profile and Interactive Profile</tspan>
  </text>
  <g>
    <path d="M 170,220 L 180,220 L 180,240 L 200,240 L 200,260 L 220,260 L 220,280 L 240,280 L 240,300 L 260,300 L 260,320 L 280,320 L 280,340 L 300,340 L 300,360 L 320,360 L 320,380 L 340,380 L 340,400 L 360,400 L 360,420 L 380,420 L 380,440 L 400,440 L 400,460 L 420,460 Z" fill="#66CCCC" stroke="#455A64" stroke-width="2"/>
    <animateTransform attributeName="transform" dur="0.5s" from="0 0" to="1 0" begin="0s" repeatCount="indefinite"/>
  </g>
  <rect x="10" y="220" width="400" height="80" fill="url(#pastel-gradient)" rx="5"/>
  <text x="15" y="230" fill="#C7E1F4" font-size="16" font-family="Open Sans" text-anchor="start" data-narration="Creating a Profile">
    <tspan x="15" y="230" font-size="16" font-family="Open Sans">Creating a Profile</tspan>
    <tspan x="60" y="230" font-size="14" font-family="Open Sans">Create a file in the ~\.profile directory</tspan>
    <tspan x="80" y="230" font-size="14" font-family="Open Sans" font-weight="bold">and add shell commands or settings</tspan>
  </text>
  <g>
    <path d="M 170,290 L 180,290 L 180,310 L 200,310 L 200,330 L 220,330 L 220,350 L 240,350 L 240,370 L 260,370 L 260,390 L 280,390 L 280,410 L 300,410 L 300,430 L 320,430 L 320,450 L 340,450 L 340,470 L 360,470 L 360,490 L 380,490 L 380,510 L 400,510 L 400,530 L 420,530 Z" fill="#66CCCC" stroke="#455A64" stroke-width="2"/>
    <animateTransform attributeName="transform" dur="0.5s" from="0 0" to="1 0" begin="0s" repeatCount="indefinite"/>
  </g>
  <rect x="10" y="290" width="400" height="80" fill="url(#pastel-gradient)" rx="5"/>
  <text x="15" y="300" fill="#C7E1F4" font-size="16" font-family="Open Sans" text-anchor="start" data-narration="Loading and Editing a Profile">
    <tspan x="15" y="300" font-size="16" font-family="Open Sans">Loading and Editing a Profile</tspan>
    <tspan x="60" y="300" font-size="14" font-family="Open Sans">Use the nano or vim commands to edit a profile</tspan>
    <tspan x="80" y="300" font-size="14" font-family="Open Sans" font-weight="bold">and load it in the shell configuration file</tspan>
  </text>
  <g>
    <path d="M 170,370 L 180,370 L 180,390 L 200,390 L 200,410 L 220,410 L 220,430 L 240,430 L 240,450 L 260,450 L 260,470 L 280,470 L 280,490 L 300,490 L 300,510 L 320,510 L 320,530 L 340,530 L 340,550 L 360,550 L 360,570 L 380,570 L 380,590 L 400,590 L 400,610 L 420,610 Z" fill="#66CCCC" stroke="#455A64" stroke-width="2"/>
    <animateTransform attributeName="transform" dur="0.5s" from="0 0" to="1 0" begin="0s" repeatCount="indefinite"/>
  </g>
  <rect x="10" y="370" width="400" height="80" fill="url(#pastel-gradient)" rx="5"/>
  <text x="15" y="380" fill="#C7E1F4" font-size="16" font-family="Open Sans" text-anchor="start" data-narration="Best Practices">
    <tspan x="15" y="380" font-size="16" font-family="Open Sans">Best Practices</tspan>
    <tspan x="60" y="380" font-size="14" font-family="Open Sans">Keep your profile file small and focused</tspan>
    <tspan x="80" y="380" font-size="14" font-family="Open Sans" font-weight="bold">on one or two things</tspan>
  </text>
  <g>
    <path d="M 170,440 L 180,440 L 180,460 L 200,460 L 200,480 L 220,480 L 220,500 L 240,500 L 240,520 L 260,520 L 260,540 L 280,540 L 280,560 L 300,560 L 300,580 L 320,580 L 320,600 L 340,600 L 340,620 L 360,620 L 360,640 L 380,640 L 380,660 L 400,660 L 400,680 L 420,680 Z" fill="#66CCCC" stroke="#455A64" stroke-width="2"/>
    <animateTransform attributeName="transform" dur="0.5s" from="0 0" to="1 0" begin="0s" repeatCount="indefinite"/>
  </g>
  <rect x="10" y="440" width="400" height="80" fill="url(#pastel-gradient)" rx="5"/>
  <text x="15" y="450" fill="#C7E1F4" font-size="16" font-family="Open Sans" text-anchor="start" data-narration="Footer">
    <tspan x="15" y="450" font-size="16" font-family="Open Sans">Footer</tspan>
    <tspan x="60" y="450" font-size="14" font-family="Open Sans">Learn more about profiles in Unix system programming</tspan>
  </text>
  <g>
    <path d="M 170,500 L 180,500 L 180,520 L 200,520 L 200,540 L 220,540 L 220,560 L 240,560 L 240,580 L 260,580 L 260,600 L 280,600 L 280,620 L 300,620 L 300,640 L 320,640 L 320,660 L 340,660 L 340,680 L 360,680 L 360,700 L 380,700 L 380,720 L 400,720 L 400,740 L 420,740 Z" fill="#66CCCC" stroke="#455A64" stroke-width="2"/>
    <animateTransform attributeName="transform" dur="0.5s" from="0 0" to="1 0" begin="0s" repeatCount="indefinite"/>
  </g>
  <animate transform="rotate(360 400 200)" dur="10s" repeatCount="indefinite"/>
</svg>