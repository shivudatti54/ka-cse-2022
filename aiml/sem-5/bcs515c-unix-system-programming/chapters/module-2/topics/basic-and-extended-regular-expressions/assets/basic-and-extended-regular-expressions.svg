<svg width="420" height="400" data-topic-id="Basic-And-Extended-Regular-Expressions">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A7A9C2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <title>Basic And Extended Regular Expressions</title>
  <g id="section-1">
    <rect x="20" y="40" width="360" height="20" fill="#F7F7F7"/>
    <text x="30" y="10" font-size="16" font-family="Arial" fill="#2F4F7F">Introduction to Regular Expressions</text>
    <g id="section-1-narration">
      <animateTransform attributeName="transform" type="translate" from="0,40" to="0,60" begin="0s" dur="2s" repeatCount="indefinite"/>
      <text x="30" y="50" font-size="14" font-family="Arial" fill="#2F4F7F">Regular expressions are a way to describe patterns in strings.</text>
    </g>
  </g>
  <g id="section-2">
    <rect x="20" y="80" width="360" height="20" fill="#F7F7F7"/>
    <text x="30" y="10" font-size="16" font-family="Arial" fill="#2F4F7F">Basic Concepts</text>
    <g id="section-2-narration">
      <animateTransform attributeName="transform" type="translate" from="0,80" to="0,100" begin="0s" dur="2s" repeatCount="indefinite"/>
      <text x="30" y="50" font-size="14" font-family="Arial" fill="#2F4F7F">Regular expressions use the following concepts:</text>
      <text x="30" y="70" font-size="14" font-family="Arial" fill="#2F4F7F">Union, concatenation, and Kleene closure.</text>
      <text x="30" y="90" font-size="14" font-family="Arial" fill="#2F4F7F">Union is the OR operator, concatenation is the AND operator, and Kleene closure is the star operator.</text>
    </g>
  </g>
  <g id="section-3">
    <rect x="20" y="120" width="360" height="20" fill="#F7F7F7"/>
    <text x="30" y="10" font-size="16" font-family="Arial" fill="#2F4F7F">DFA vs NFA</text>
    <g id="section-3-narration">
      <animateTransform attributeName="transform" type="translate" from="0,120" to="0,140" begin="0s" dur="2s" repeatCount="indefinite"/>
      <text x="30" y="50" font-size="14" font-family="Arial" fill="#2F4F7F">DFA and NFA are two types of finite automata.</text>
      <text x="30" y="70" font-size="14" font-family="Arial" fill="#2F4F7F">DFA is deterministic, meaning the next state is always unique.</text>
      <text x="30" y="90" font-size="14" font-family="Arial" fill="#2F4F7F">NFA is nondeterministic, meaning the next state is not always unique.</text>
    </g>
  </g>
  <g id="section-4">
    <rect x="20" y="160" width="360" height="20" fill="#F7F7F7"/>
    <text x="30" y="10" font-size="16" font-family="Arial" fill="#2F4F7F">Regular Expression Syntax</text>
    <g id="section-4-narration">
      <animateTransform attributeName="transform" type="translate" from="0,160" to="0,180" begin="0s" dur="2s" repeatCount="indefinite"/>
      <text x="30" y="50" font-size="14" font-family="Arial" fill="#2F4F7F">Regular expressions use the following syntax:</text>
      <text x="30" y="70" font-size="14" font-family="Arial" fill="#2F4F7F">. ^ $ \w \s \d</text>
      <text x="30" y="90" font-size="14" font-family="Arial" fill="#2F4F7F">. \\ ^ $ \w \s \d</text>
    </g>
  </g>
  <g id="section-5">
    <rect x="20" y="200" width="360" height="20" fill="#F7F7F7"/>
    <text x="30" y="10" font-size="16" font-family="Arial" fill="#2F4F7F">Kleene Closure</text>
    <g id="section-5-narration">
      <animateTransform attributeName="transform" type="translate" from="0,200" to="0,220" begin="0s" dur="2s" repeatCount="indefinite"/>
      <text x="30" y="50" font-size="14" font-family="Arial" fill="#2F4F7F">Kleene closure is the star operator.</text>
      <text x="30" y="70" font-size="14" font-family="Arial" fill="#2F4F7F"> Kleene closure can be used to match zero or more occurrences of a pattern.</text>
    </g>
  </g>
  <g id="section-6">
    <rect x="20" y="240" width="360" height="20" fill="#F7F7F7"/>
    <text x="30" y="10" font-size="16" font-family="Arial" fill="#2F4F7F">Conclusion</text>
    <g id="section-6-narration">
      <animateTransform attributeName="transform" type="translate" from="0,240" to="0,260" begin="0s" dur="2s" repeatCount="indefinite"/>
      <text x="30" y="50" font-size="14" font-family="Arial" fill="#2F4F7F">Regular expressions are a powerful tool for pattern matching in strings.</text>
      <text x="30" y="70" font-size="14" font-family="Arial" fill="#2F4F7F">Understanding the basics of regular expressions is essential for working with text data.</text>
    </g>
  </g>
  <footer>Learn more about regular expressions at <a href="#">https://www.example.com</a></footer>
</svg>