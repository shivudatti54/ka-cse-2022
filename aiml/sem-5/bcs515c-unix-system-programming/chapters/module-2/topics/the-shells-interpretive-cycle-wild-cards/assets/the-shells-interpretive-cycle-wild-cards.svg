<svg width="420" height="400" data-topic-id="shells-interpretive-cycle-wild-cards" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C7B8EA"/>
      <stop offset="100%" stop-color="#9BC9E5"/>
    </linearGradient>
    <style>
      .text {
        font-size: 14px;
        fill: #333;
      }
      .title {
        font-size: 24px;
        font-weight: bold;
        fill: #C7B8EA;
      }
      .footer {
        font-size: 14px;
        fill: #333;
      }
    </style>
  </defs>

  <!-- Gradient Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Title -->
  <g transform="translate(10, 10)">
    <text class="title" x="0" y="20" text-anchor="middle">The Shells Interpretive Cycle: Wild Cards</text>
  </g>

  <!-- Section 1: Introduction -->
  <g transform="translate(10, 50)">
    <rect x="0" y="0" width="300" height="30" fill="#F7F7F7"/>
    <text class="text" x="10" y="10" text-anchor="start">Introduction</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="10 50" begin="0s" dur="2s"/>
  </g>

  <!-- Section 2: What are Wild Cards? -->
  <g transform="translate(10, 90)">
    <rect x="0" y="0" width="300" height="30" fill="#F7F7F7"/>
    <text class="text" x="10" y="10" text-anchor="start">What are Wild Cards?</text>
    <rect x="10" y="40" width="20" height="10" fill="#C7B8EA" rx="2"/>
    <text class="text" x="35" y="40" text-anchor="start">Special characters used in file names or paths to match any characters, including none.</text>
    <animateTransform attributeName="transform" type="translate" from="0 90" to="10 90" begin="0s" dur="2s"/>
  </g>

  <!-- Section 3: Types of Wild Cards -->
  <g transform="translate(10, 130)">
    <rect x="0" y="0" width="300" height="30" fill="#F7F7F7"/>
    <text class="text" x="10" y="10" text-anchor="start">Types of Wild Cards</text>
    <rect x="10" y="40" width="20" height="10" fill="#C7B8EA" rx="2"/>
    <text class="text" x="35" y="40" text-anchor="start">Asterisk (*) matches any sequence of characters, including none.</text>
    <rect x="10" y="60" width="20" height="10" fill="#9BC9E5" rx="2"/>
    <text class="text" x="35" y="60" text-anchor="start">Question mark (?) matches a single character.</text>
    <rect x="10" y="80" width="20" height="10" fill="#F7F7F7" rx="2"/>
    <text class="text" x="35" y="80" text-anchor="start">Globbing characters are used to match characters in a file name.</text>
    <animateTransform attributeName="transform" type="translate" from="0 130" to="10 130" begin="0s" dur="2s"/>
  </g>

  <!-- Section 4: Using Wild Cards with the ls Command -->
  <g transform="translate(10, 170)">
    <rect x="0" y="0" width="300" height="30" fill="#F7F7F7"/>
    <text class="text" x="10" y="10" text-anchor="start">Using Wild Cards with the ls Command</text>
    <rect x="10" y="40" width="20" height="10" fill="#C7B8EA" rx="2"/>
    <text class="text" x="35" y="40" text-anchor="start">The ls command is often used with wild cards to list files that match a pattern.</text>
    <rect x="10" y="60" width="20" height="10" fill="#9BC9E5" rx="2"/>
    <text class="text" x="35" y="60" text-anchor="start">Examples: ls *.txt lists all files with the .txt extension.</text>
    <rect x="10" y="80" width="20" height="10" fill="#F7F7F7" rx="2"/>
    <text class="text" x="35" y="80" text-anchor="start">Examples: ls *.* lists all files, regardless of extension.</text>
    <animateTransform attributeName="transform" type="translate" from="0 170" to="10 170" begin="0s" dur="2s"/>
  </g>

  <!-- Section 5: Conclusion -->
  <g transform="translate(10, 210)">
    <rect x="0" y="0" width="300" height="30" fill="#F7F7F7"/>
    <text class="text" x="10" y="10" text-anchor="start">Conclusion</text>
    <rect x="10" y="40" width="20" height="10" fill="#C7B8EA" rx="2"/>
    <text class="text" x="35" y="40" text-anchor="start">The Shells Interpretive Cycle: Wild Cards is an essential concept to understand when working with shells in Unix-based systems.</text>
    <animateTransform attributeName="transform" type="translate" from="0 210" to="10 210" begin="0s" dur="2s"/>
  </g>

  <!-- Footer -->
  <g transform="translate(10, 250)">
    <rect x="0" y="0" width="300" height="30" fill="#F7F7F7"/>
    <text class="footer" x="10" y="10" text-anchor="start">2023</text>
  </g>

  <!-- Arrow Markers for Connections -->
  <g transform="translate(10, 10)">
    <line x1="0" y1="10" x2="20" y2="10" stroke="#C7B8EA" stroke-width="2"/>
  </g>
  <g transform="translate(10, 90)">
    <line x1="0" y1="90" x2="20" y2="90" stroke="#C7B8EA" stroke-width="2"/>
  </g>
  <g transform="translate(10, 130)">
    <line x1="0" y1="130" x2="20" y2="130" stroke="#C7B8EA" stroke-width="2"/>
  </g>
  <g transform="translate(10, 170)">
    <line x1="0" y1="170" x2="20" y2="170" stroke="#C7B8EA" stroke-width="2"/>
  </g>
  <g transform="translate(10, 210)">
    <line x1="0" y1="210" x2="20" y2="210" stroke="#C7B8EA" stroke-width="2"/>
  </g>

</svg>