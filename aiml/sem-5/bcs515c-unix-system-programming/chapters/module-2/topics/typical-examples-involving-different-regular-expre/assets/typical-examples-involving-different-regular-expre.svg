<svg width="420" height="400" data-topic-id="typical-examples-involving-different-regular-expressions">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2A8FF" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="indigo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B3F54" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4C5154" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="orange-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFC107" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Typical Examples Involving Different Regular Expressions</title>
  <rect x="10" y="10" width="400" height="380" style="fill:url(#pastel-gradient)"/>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="100" height="40" style="fill:#4C5154;stroke:#3B3F54;stroke-width:2"/>
    <text x="10" y="15" style="font-size:16px;fill:#fff" transform="rotate(90 10 15)">Character Classes</text>
    <path d="M10,15 L100,15" style="stroke:#3B3F54;stroke-width:2"/>
    <rect x="10" y="50" width="100" height="40" style="fill:#C7B8EA;stroke:#B2A8FF;stroke-width:2"/>
    <text x="10" y="65" style="font-size:16px;fill:#fff">[abc]</text>
    <path d="M10,65 L100,65" style="stroke:#B2A8FF;stroke-width:2"/>
    <rect x="10" y="100" width="100" height="40" style="fill:#C7B8EA;stroke:#B2A8FF;stroke-width:2"/>
    <text x="10" y="115" style="font-size:16px;fill:#fff">[a-zA-Z]</text>
    <path d="M10,115 L100,115" style="stroke:#B2A8FF;stroke-width:2"/>
    <rect x="10" y="150" width="100" height="40" style="fill:#4C5154;stroke:#3B3F54;stroke-width:2"/>
    <text x="10" y="165" style="font-size:16px;fill:#fff">[0-9]</text>
    <path d="M10,165 L100,165" style="stroke:#3B3F54;stroke-width:2"/>
    <animate transform="translate(0, 185) rotate(90 0 195)" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(130, 20)">
    <rect x="0" y="0" width="100" height="40" style="fill:#4C5154;stroke:#3B3F54;stroke-width:2"/>
    <text x="10" y="15" style="font-size:16px;fill:#fff" transform="rotate(90 10 15)">Quantifiers</text>
    <path d="M10,15 L100,15" style="stroke:#3B3F54;stroke-width:2"/>
    <rect x="10" y="50" width="100" height="40" style="fill:#C7B8EA;stroke:#B2A8FF;stroke-width:2"/>
    <text x="10" y="65" style="font-size:16px;fill:#fff">* (0 or more)</text>
    <path d="M10,65 L100,65" style="stroke:#B2A8FF;stroke-width:2"/>
    <rect x="10" y="100" width="100" height="40" style="fill:#C7B8EA;stroke:#B2A8FF;stroke-width:2"/>
    <text x="10" y="115" style="font-size:16px;fill:#fff">+ (1 or more)</text>
    <path d="M10,115 L100,115" style="stroke:#B2A8FF;stroke-width:2"/>
    <rect x="10" y="150" width="100" height="40" style="fill:#C7B8EA;stroke:#B2A8FF;stroke-width:2"/>
    <text x="10" y="165" style="font-size:16px;fill:#fff">? (0 or 1)</text>
    <path d="M10,165 L100,165" style="stroke:#B2A8FF;stroke-width:2"/>
    <animate transform="translate(0, 185) rotate(90 0 195)" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(250, 20)">
    <rect x="0" y="0" width="100" height="40" style="fill:#4C5154;stroke:#3B3F54;stroke-width:2"/>
    <text x="10" y="15" style="font-size:16px;fill:#fff" transform="rotate(90 10 15)">Anchors</text>
    <path d="M10,15 L100,15" style="stroke:#3B3F54;stroke-width:2"/>
    <rect x="10" y="50" width="100" height="40" style="fill:#C7B8EA;stroke:#B2A8FF;stroke-width:2"/>
    <text x="10" y="65" style="font-size:16px;fill:#fff">^ (start of string)</text>
    <path d="M10,65 L100,65" style="stroke:#B2A8FF;stroke-width:2"/>
    <rect x="10" y="100" width="100" height="40" style="fill:#C7B8EA;stroke:#B2A8FF;stroke-width:2"/>
    <text x="10" y="115" style="font-size:16px;fill:#fff">$ (end of string)</text>
    <path d="M10,115 L100,115" style="stroke:#B2A8FF;stroke-width:2"/>
    <animate transform="translate(0, 185) rotate(90 0 195)" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(370, 20)">
    <rect x="0" y="0" width="100" height="40" style="fill:#4C5154;stroke:#3B3F54;stroke-width:2"/>
    <text x="10" y="15" style="font-size:16px;fill:#fff" transform="rotate(90 10 15)">Examples</text>
    <path d="M10,15 L100,15" style="stroke:#3B3F54;stroke-width:2"/>
    <rect x="10" y="50" width="100" height="40" style="fill:#C7B8EA;stroke:#B2A8FF;stroke-width:2">
      <text x="10" y="65" style="font-size:16px;fill:#fff">/a\w*$/</text>
      <text x="10" y="80" style="font-size:16px;fill:#fff">Match any word that starts with 'a'</text>
    </rect>
    <rect x="10" y="120" width="100" height="40" style="fill:#C7B8EA;stroke:#B2A8FF;stroke-width:2">
      <text x="10" y="135" style="font-size:16px;fill:#fff">/e\w*$/</text>
      <text x="10" y="160" style="font-size:16px;fill:#fff">Match any word that contains the letter 'e'</text>
    </rect>
    <rect x="10" y="200" width="100" height="40" style="fill:#C7B8EA;stroke:#B2A8FF;stroke-width:2">
      <text x="10" y="215" style="font-size:16px;fill:#fff">/ing$/</text>
      <text x="10" y="240" style="font-size:16px;fill:#fff">Match any word that ends with 'ing'</text>
    </rect>
    <animate transform="translate(0, 280) rotate(90 0 290)" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <footer>
    <text x="10" y="395" style="font-size:16px;fill:#333">Typical Examples Involving Different Regular Expressions</text>
  </footer>
</svg>