<svg width="420" height="400" data-topic-id="three-standard-files-redirection">
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4f4f7f" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="title-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a3c54" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2c4155" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <title>
    <text x="15" y="20" text-anchor="start" fill="#3a3c54" font-size="24" font-family="Arial, sans-serif">
      Three Standard Files and Redirection
    </text>
  </title>

  <rect x="10" y="50" width="400" height="300" fill="url(#background-gradient)"/>
  <g transform="translate(10, 70)">
    <text x="0" y="0" text-anchor="start" fill="#4f4f7f" font-size="16" font-family="Arial, sans-serif">
      Introduction
    </text>
    <text x="0" y="20" text-anchor="start" fill="#4f4f7f" font-size="14" font-family="Arial, sans-serif" data-narration="In UNIX system programming, three standard files and redirection are essential concepts that help you interact with files and execute commands efficiently. Understanding these concepts will enable you to write effective shell scripts and automate tasks.">
    </text>
  </g>

  <g transform="translate(10, 100)">
    <text x="0" y="0" text-anchor="start" fill="#6c5ce7" font-size="16" font-family="Arial, sans-serif">
      Standard Files
    </text>
    <rect x="0" y="20" width="100" height="50" fill="#fff" rx="5" stroke="#3a3c54" stroke-width="2"/>
    <text x="10" y="25" text-anchor="start" fill="#4f4f7f" font-size="14" font-family="Arial, sans-serif">
      Standard Input (stdin)
    </text>
    <text x="10" y="40" text-anchor="start" fill="#4f4f7f" font-size="14" font-family="Arial, sans-serif" data-narration="The standard input (stdin) is the file descriptor for the keyboard. It is designated by the file descriptor 0. Data is sent to the standard input when a user types commands or input data.">
    </text>
    <rect x="120" y="20" width="100" height="50" fill="#fff" rx="5" stroke="#3a3c54" stroke-width="2"/>
    <text x="130" y="25" text-anchor="start" fill="#4f4f7f" font-size="14" font-family="Arial, sans-serif">
      Standard Output (stdout)
    </text>
    <text x="130" y="40" text-anchor="start" fill="#4f4f7f" font-size="14" font-family="Arial, sans-serif" data-narration="The standard output (stdout) is the file descriptor for the display. It is designated by the file descriptor 1. Data is sent to the standard output when a command is executed.">
    </text>
    <rect x="240" y="20" width="100" height="50" fill="#fff" rx="5" stroke="#3a3c54" stroke-width="2"/>
    <text x="250" y="25" text-anchor="start" fill="#4f4f7f" font-size="14" font-family="Arial, sans-serif">
      Standard Error (stderr)
    </text>
    <text x="250" y="40" text-anchor="start" fill="#4f4f7f" font-size="14" font-family="Arial, sans-serif" data-narration="The standard error (stderr) is the file descriptor for any error messages. It is designated by the file descriptor 2. Data is sent to the standard error when a command encounters errors.">
    </text>
  </g>

  <g transform="translate(10, 250)">
    <text x="0" y="0" text-anchor="start" fill="#4f4f7f" font-size="16" font-family="Arial, sans-serif">
      Redirection
    </text>
    <rect x="0" y="20" width="400" height="50" fill="#fff" rx="5" stroke="#3a3c54" stroke-width="2"/>
    <text x="10" y="25" text-anchor="start" fill="#4f4f7f" font-size="14" font-family="Arial, sans-serif">
      Redirecting Input
    </text>
    <text x="10" y="40" text-anchor="start" fill="#4f4f7f" font-size="14" font-family="Arial, sans-serif" data-narration="Redirecting input with the < symbol: cat file.txt">
    </text>
    <rect x="120" y="20" width="100" height="50" fill="#fff" rx="5" stroke="#3a3c54" stroke-width="2"/>
    <text x="130" y="25" text-anchor="start" fill="#4f4f7f" font-size="14" font-family="Arial, sans-serif">
      Redirecting Output
    </text>
    <text x="130" y="40" text-anchor="start" fill="#4f4f7f" font-size="14" font-family="Arial, sans-serif" data-narration="Redirecting output with the > symbol: echo Hello, World! > hello.txt">
    </text>
    <rect x="240" y="20" width="100" height="50" fill="#fff" rx="5" stroke="#3a3c54" stroke-width="2"/>
    <text x="250" y="25" text-anchor="start" fill="#4f4f7f" font-size="14" font-family="Arial, sans-serif">
      Appending to a File
    </text>
    <text x="250" y="40" text-anchor="start" fill="#4f4f7f" font-size="14" font-family="Arial, sans-serif" data-narration="Redirecting output with the >> symbol: echo Hello, World! >> hello.txt">
    </text>
  </g>

  <g transform="translate(10, 350)">
    <text x="0" y="0" text-anchor="start" fill="#3a3c54" font-size="16" font-family="Arial, sans-serif">
      Conclusion
    </text>
    <text x="10" y="20" text-anchor="start" fill="#4f4f7f" font-size="14" font-family="Arial, sans-serif" data-narration="Understanding three standard files and redirection will enable you to write effective shell scripts and automate tasks.">
    </text>
  </g>

  <footer>
    <text x="10" y="380" text-anchor="start" fill="#3a3c54" font-size="16" font-family="Arial, sans-serif">
      Learn more about UNIX system programming at <a href="https://www.example.com">example.com</a>
    </text>
  </footer>

  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 380" dur="2s" begin="0s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 380" dur="2s" begin="2s" repeatCount="indefinite"/>
</svg>