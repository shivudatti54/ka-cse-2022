<svg width="420" height="400" data-topic-id="The-Grep" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C2E4F5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Title at top -->
  <text x="10" y="20" font-size="24" font-family="Arial" fill="#3498DB" text-anchor="start" data-narration="Title">
    <tspan>grep</tspan>
    <tspan> A Powerful Text Search Utility</tspan>
  </text>

  <!-- Section 1: What is grep? -->
  <rect x="10" y="50" width="400" height="80" fill="#F9F9F9" rx="10" data-narration="What is grep?">
    <text x="20" y="40" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      What is grep?
    </text>
    <text x="20" y="60" font-size="16" font-family="Arial" fill="#666666" text-anchor="start">
      grep is a powerful command-line utility in UNIX-based systems that allows you to search for patterns in text files.
    </text>
  </rect>

  <!-- Section 2: Syntax -->
  <rect x="10" y="140" width="400" height="80" fill="#F9F9F9" rx="10" data-narration="Syntax">
    <text x="20" y="40" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Syntax
    </text>
    <text x="20" y="60" font-size="16" font-family="Arial" fill="#666666" text-anchor="start">
      The basic syntax of the grep command is as follows:
    </text>
    <text x="20" y="80" font-size="16" font-family="Arial" fill="#666666" text-anchor="start">
      <tspan>grep [options] pattern file</tspan>
    </text>
  </rect>

  <!-- Section 3: Options -->
  <rect x="10" y="220" width="400" height="80" fill="#F9F9F9" rx="10" data-narration="Options">
    <text x="20" y="40" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Options
    </text>
    <text x="20" y="60" font-size="16" font-family="Arial" fill="#666666" text-anchor="start">
      Here are some common options used with grep:
    </text>
    <text x="20" y="80" font-size="16" font-family="Arial" fill="#666666" text-anchor="start">
      <tspan>-i or --ignore-case: ignore case sensitivity when searching for the pattern</tspan>
    </text>
  </rect>

  <!-- Section 4: Examples -->
  <rect x="10" y="310" width="400" height="80" fill="#F9F9F9" rx="10" data-narration="Examples">
    <text x="20" y="40" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Examples
    </text>
    <text x="20" y="60" font-size="16" font-family="Arial" fill="#666666" text-anchor="start">
      <tspan>grep "hello world" file.txt</tspan>
    </text>
  </rect>

  <!-- Section 5: Regular Expressions -->
  <rect x="10" y="390" width="400" height="80" fill="#F9F9F9" rx="10" data-narration="Regular Expressions">
    <text x="20" y="40" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Regular Expressions
    </text>
    <text x="20" y="60" font-size="16" font-family="Arial" fill="#666666" text-anchor="start">
      grep uses regular expressions to match patterns in the text files.
    </text>
  </rect>

  <!-- Arrow markers for connections -->
  <path d="M 100 10 L 200 10" stroke="#2F4F7F" stroke-width="2" fill="none"/>
  <path d="M 100 20 L 200 20" stroke="#2F4F7F" stroke-width="2" fill="none"/>
  <path d="M 100 30 L 200 30" stroke="#2F4F7F" stroke-width="2" fill="none"/>

  <!-- Footer at bottom -->
  <text x="10" y="410" font-size="18" font-family="Arial" fill="#3498DB" text-anchor="start" data-narration="Footer">
    <tspan>grep is a powerful command-line utility in UNIX-based systems that allows you to search for patterns in text files.</tspan>
  </text>

  <!-- Smooth animations using <animate> elements with sequential begin times -->
  <animate attributeName="opacity" begin="0s" dur="2s" fill="freeze"/>
  <animate attributeName="opacity" begin="2s" dur="2s" fill="freeze"/>
  <animate attributeName="opacity" begin="4s" dur="2s" fill="freeze"/>
  <animate attributeName="opacity" begin="6s" dur="2s" fill="freeze"/>

</svg>