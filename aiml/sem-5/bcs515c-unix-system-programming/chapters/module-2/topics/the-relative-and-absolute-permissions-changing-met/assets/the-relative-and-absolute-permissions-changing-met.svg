<svg 
  width="420" 
  height="400" 
  data-topic-id="The Relative and Absolute Permissions Changing Methods"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 420 400"
  style="overflowHidden">
  
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A98FF" stop-opacity="1"/>
      <stop offset="50%" stop-color="#6495ED" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00BFFF" stop-opacity="1"/>
    </linearGradient>
  </defs>
  
  <title style="font-size:24px; font-weight:bold; text-align:center;">The Relative and Absolute Permissions Changing Methods</title>
  
  <rect x="0" y="0" width="420" height="40" fill="url(#grad)"/>
  
  <text x="10" y="15" font-size="18px" font-weight="bold">What are Permissions?</text>
  
  <rect x="0" y="50" width="420" height="100" fill="white"/>
  
  <g transform="translate(10,60)">
    <rect x="0" y="0" width="30" height="20" fill="#6495ED" rx="2"/>
    <rect x="30" y="0" width="30" height="20" fill="#6495ED" rx="2"/>
    <rect x="0" y="20" width="30" height="20" fill="#6495ED" rx="2"/>
    <text x="40" y="60" font-size="16px" color="#6495ED">Read (r)</text>
    <text x="40" y="80" font-size="16px" color="#6495ED">Write (w)</text>
    <text x="40" y="100" font-size="16px" color="#6495ED">Execute (x)</text>
  </g>
  
  <rect x="0" y="170" width="420" height="100" fill="white"/>
  
  <g transform="translate(10,190)">
    <rect x="0" y="0" width="30" height="20" fill="#7A98FF" rx="2"/>
    <rect x="30" y="0" width="30" height="20" fill="#7A98FF" rx="2"/>
    <rect x="0" y="20" width="30" height="20" fill="#7A98FF" rx="2"/>
    <text x="40" y="60" font-size="16px" color="#7A98FF">Relative Permissions</text>
    <text x="40" y="80" font-size="16px" color="#7A98FF">Use relative paths or symbolic links</text>
    <text x="40" y="100" font-size="16px" color="#7A98FF">Use chmod -R</text>
  </g>
  
  <rect x="0" y="280" width="420" height="100" fill="white"/>
  
  <g transform="translate(10,300)">
    <rect x="0" y="0" width="30" height="20" fill="#7A98FF" rx="2"/>
    <rect x="30" y="0" width="30" height="20" fill="#7A98FF" rx="2"/>
    <rect x="0" y="20" width="30" height="20" fill="#7A98FF" rx="2"/>
    <text x="40" y="60" font-size="16px" color="#7A98FF">Absolute Permissions</text>
    <text x="40" y="80" font-size="16px" color="#7A98FF">Use absolute paths or symbolic links</text>
    <text x="40" y="100" font-size="16px" color="#7A98FF">Use chmod</text>
    <text x="40" y="120" font-size="16px" color="#7A98FF">Example: chmod 755 /path/to/file</text>
    <text x="40" y="140" font-size="16px" color="#7A98FF">Read (7), Write (5), Execute (5)</text>
  </g>
  
  <rect x="0" y="380" width="420" height="40" fill="url(#grad)"/>
  
  <text x="10" y="395" font-size="18px" font-weight="bold">Animations</text>
  
  <animate transform="translateX(20)" begin="0s" dur="2s" repeatCount="indefinite"/>
  <animate transform="translateX(60)" begin="1s" dur="2s" repeatCount="indefinite"/>
  <animate transform="translateX(100)" begin="2s" dur="2s" repeatCount="indefinite"/>
  
  <g transform="translate(10,15)">
    <line x1="10" y1="35" x2="30" y2="55" stroke="#6495ED" stroke-width="2"/>
    <line x1="30" y1="35" x2="50" y2="55" stroke="#6495ED" stroke-width="2"/>
    <line x1="10" y1="55" x2="30" y2="75" stroke="#6495ED" stroke-width="2"/>
    <line x1="30" y1="55" x2="50" y2="75" stroke="#6495ED" stroke-width="2"/>
    <line x1="10" y1="75" x2="30" y2="95" stroke="#6495ED" stroke-width="2"/>
    <line x1="30" y1="75" x2="50" y2="95" stroke="#6495ED" stroke-width="2"/>
  </g>
  
  <g transform="translate(10,190)">
    <line x1="10" y1="210" x2="30" y2="230" stroke="#7A98FF" stroke-width="2"/>
    <line x1="30" y1="210" x2="50" y2="230" stroke="#7A98FF" stroke-width="2"/>
    <line x1="10" y1="230" x2="30" y2="250" stroke="#7A98FF" stroke-width="2"/>
    <line x1="30" y1="230" x2="50" y2="250" stroke="#7A98FF" stroke-width="2"/>
    <line x1="10" y1="250" x2="30" y2="270" stroke="#7A98FF" stroke-width="2"/>
    <line x1="30" y1="250" x2="50" y2="270" stroke="#7A98FF" stroke-width="2"/>
  </g>
  
  <g transform="translate(10,300)">
    <line x1="10" y1="320" x2="30" y2="340" stroke="#7A98FF" stroke-width="2"/>
    <line x1="30" y1="320" x2="50" y2="340" stroke="#7A98FF" stroke-width="2"/>
    <line x1="10" y1="340" x2="30" y2="360" stroke="#7A98FF" stroke-width="2"/>
    <line x1="30" y1="340" x2="50" y2="360" stroke="#7A98FF" stroke-width="2"/>
    <line x1="10" y1="360" x2="30" y2="380" stroke="#7A98FF" stroke-width="2"/>
    <line x1="30" y1="360" x2="50" y2="380" stroke="#7A98FF" stroke-width="2"/>
  </g>
  
  <rect x="0" y="390" width="420" height="10" fill="#6495ED"/>
  <text x="10" y="395" font-size="18px" font-weight="bold">Footer</text>
</svg>