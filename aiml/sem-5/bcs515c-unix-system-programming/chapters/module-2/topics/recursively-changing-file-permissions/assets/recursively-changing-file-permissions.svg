<svg
  width="420"
  height="400"
  data-topic-id="recursively-changing-file-permissions"
  viewBox="0 0 420 400"
  style="background-image: linear-gradient(to bottom, #C5E1F5, #ADD8E6);">

  <!-- Header -->
  <rect x="10" y="10" width="400" height="40" style="fill: #2F4F7F;">
    <text x="15" y="25" style="font-size: 18px; color: #fff;">Recursively Changing File Permissions</text>
  </rect>

  <!-- Section 1: Introduction -->
  <section id="section-1" class="section">
    <rect x="10" y="60" width="400" height="100" style="fill: #F0F0F0;background-image: linear-gradient(to bottom, #FFC5C5, #FF99CC);"></rect>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 200 200"
      to="360 200 200"
      dur="10s"
      repeatCount="indefinite"
      begin="0s"
      class="rotate"
    />
    <data-narration class="data-narration">
      In UNIX systems, file permissions are a critical aspect of file management.
      They determine the level of access that users and groups have to a file or directory.
    </data-narration>
  </section>

  <!-- Section 2: File Permissions -->
  <section id="section-2" class="section">
    <rect x="10" y="170" width="400" height="100" style="fill: #C5E1F5;background-image: linear-gradient(to bottom, #B2FFFC, #A1C9F2);"></rect>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 200 200"
      to="360 200 200"
      dur="10s"
      repeatCount="indefinite"
      begin="10s"
      class="rotate"
    />
    <data-narration class="data-narration">
      File permissions refer to the rights granted to users or groups to access and modify a file or directory.
      Each file or directory has three types of permissions:
    </data-narration>
    <ul>
      <li><span class="icon"></span> <span class="text">Read (r):</span> The ability to view the contents of the file or directory.</li>
      <li><span class="icon"></span> <span class="text">Write (w):</span> The ability to modify the contents of the file or directory.</li>
      <li><span class="icon"></span> <span class="text">Execute (x):</span> The ability to execute the file or run commands within it.</li>
    </ul>
  </section>

  <!-- Section 3: Using the `chmod` Command -->
  <section id="section-3" class="section">
    <rect x="10" y="300" width="400" height="100" style="fill: #FFC5C5;background-image: linear-gradient(to bottom, #FF99CC, #FF66CC);"></rect>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 200 200"
      to="360 200 200"
      dur="10s"
      repeatCount="indefinite"
      begin="20s"
      class="rotate"
    />
    <data-narration class="data-narration">
      The `chmod` command is used to change the file permissions of a file or directory.
      The syntax is as follows:
    </data-narration>
    <pre>
      <code>
        chmod [permissions] [file_name]
      </code>
    </pre>
  </section>

  <!-- Section 4: Recursively Changing File Permissions -->
  <section id="section-4" class="section">
    <rect x="10" y="390" width="400" height="100" style="fill: #C5E1F5;background-image: linear-gradient(to bottom, #B2FFFC, #A1C9F2);"></rect>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 200 200"
      to="360 200 200"
      dur="10s"
      repeatCount="indefinite"
      begin="30s"
      class="rotate"
    />
    <data-narration class="data-narration">
      When recursively changing file permissions, you need to use the `-R` or `--recursive` option.
      This option tells the `chmod` command to change the permissions of all files and directories within the specified directory and its subdirectories.
    </data-narration>
    <pre>
      <code>
        chmod -R [permissions] [directory_name]
      </code>
    </pre>
  </section>

  <!-- Section 5: Changing Permissions Using Symbolic Notation -->
  <section id="section-5" class="section">
    <rect x="10" y="490" width="400" height="100" style="fill: #FFC5C5;background-image: linear-gradient(to bottom, #FF99CC, #FF66CC);"></rect>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 200 200"
      to="360 200 200"
      dur="10s"
      repeatCount="indefinite"
      begin="40s"
      class="rotate"
    />
    <data-narration class="data-narration">
      Symbolic notation is a shorthand way of specifying file permissions.
      It uses letters and numbers to represent the permissions.
    </data-narration>
    <ul>
      <li><span class="icon"></span> <span class="text">u:</span> Represents the user's permissions.</li>
      <li><span class="icon"></span> <span class="text">g:</span> Represents the group's permissions.</li>
      <li><span class="icon"></span> <span class="text">o:</span> Represents the permissions for others.</li>
    </ul>
  </section>

  <!-- Footer -->
  <rect x="10" y="440" width="400" height="40" style="fill: #2F4F7F;">
    <text x="15" y="455" style="font-size: 18px; color: #fff;">Learn UNIX Systems Programming</text>
  </rect>

</svg>