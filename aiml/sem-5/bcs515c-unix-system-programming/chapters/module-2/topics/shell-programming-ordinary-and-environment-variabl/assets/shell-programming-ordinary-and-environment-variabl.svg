<svg width="420" height="400" data-topic-id="shell-programming-ordinary-environment-variables">
  <defs>
    <style>
      .text {
        font-size: 14px;
        font-weight: bold;
        color: #2F4F7F;
      }
      
      .section {
        margin-bottom: 20px;
      }
      
      .grad {
        height: 100%;
      }
      
      .rect {
        fill: #C7E5F0;
      }
      
      .circle {
        fill: #1ABC9C;
        stroke: #2F4F7F;
        stroke-width: 2;
      }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="380" class="grad" style="fill: linear-gradient(to bottom, #C7E5F0, #83B8F2)"/>
  <g transform="translate(10, 50)">
    <title>Shell Programming Ordinary and Environment Variables</title>
    <rect x="10" y="10" width="380" height="30" class="rect"/>
    <text class="text" x="15" y="15" text-anchor="middle">Introduction</text>
    <path d="M 50,30 L 50,70 Z" class="circle"/>
  </g>
  <g transform="translate(10, 80)">
    <rect x="10" y="10" width="380" height="150" class="rect"/>
    <g transform="rotate(90) translate(20, 10)">
      <text class="text" x="10" y="30" text-anchor="middle">Ordinary Variables</text>
      <rect x="10" y="100" width="300" height="50" class="rect"/>
      <text class="text" x="10" y="120" text-anchor="middle">Definition</text>
      <animateTransform attributeName="transform" type="rotate" from="0 30 30" to="360 30 30" dur="10s" begin="0s"/>
      <text class="text" x="10" y="150" text-anchor="middle">Characteristics</text>
      <rect x="10" y="170" width="300" height="50" class="rect"/>
      <text class="text" x="10" y="190" text-anchor="middle">Operations</text>
      <path d="M 30,120 L 30,250 Z" class="circle"/>
      <path d="M 70,120 L 70,250 Z" class="circle"/>
      <text class="text" x="10" y="220" text-anchor="middle">Examples</text>
      <rect x="10" y="250" width="300" height="50" class="rect"/>
      <text class="text" x="10" y="270" text-anchor="middle">Assignment: var_name=value</text>
      <text class="text" x="10" y="290" text-anchor="middle">Print: echo $var_name</text>
      <text class="text" x="10" y="310" text-anchor="middle">Modification: var_name=new_value</text>
    </g>
  </g>
  <g transform="translate(10, 240)">
    <rect x="10" y="10" width="380" height="150" class="rect"/>
    <g transform="rotate(90) translate(20, 10)">
      <text class="text" x="10" y="30" text-anchor="middle">Environment Variables</text>
      <rect x="10" y="100" width="300" height="50" class="rect"/>
      <text class="text" x="10" y="120" text-anchor="middle">Definition</text>
      <animateTransform attributeName="transform" type="rotate" from="0 30 30" to="360 30 30" dur="10s" begin="2s"/>
      <text class="text" x="10" y="150" text-anchor="middle">Characteristics</text>
      <rect x="10" y="170" width="300" height="50" class="rect"/>
      <text class="text" x="10" y="190" text-anchor="middle">Operations</text>
      <path d="M 30,120 L 30,250 Z" class="circle"/>
      <path d="M 70,120 L 70,250 Z" class="circle"/>
      <text class="text" x="10" y="220" text-anchor="middle">Examples</text>
      <rect x="10" y="250" width="300" height="50" class="rect"/>
      <text class="text" x="10" y="270" text-anchor="middle">Assignment: var_name=value</text>
      <text class="text" x="10" y="290" text-anchor="middle">Print: echo $var_name</text>
      <text class="text" x="10" y="310" text-anchor="middle">Modification: export var_name=new_value</text>
    </g>
  </g>
  <g transform="translate(10, 380)">
    <rect x="10" y="10" width="380" height="30" class="rect"/>
    <text class="text" x="15" y="15" text-anchor="middle">Differences</text>
    <rect x="10" y="40" width="350" height="10" class="rect"/>
    <text class="text" x="10" y="50" text-anchor="middle">Ordinary Variables</text>
    <text class="text" x="10" y="60" text-anchor="middle">Environment Variables</text>
    <rect x="10" y="80" width="350" height="10" class="rect"/>
    <text class="text" x="10" y="90" text-anchor="middle">Shared among all processes</text>
    <text class="text" x="10" y="100" text-anchor="middle">Shared among all processes</text>
    <rect x="10" y="120" width="350" height="10" class="rect"/>
    <text class="text" x="10" y="130" text-anchor="middle">Modified by user</text>
    <text class="text" x="10" y="140" text-anchor="middle">Modified by user</text>
  </g>
  <g transform="translate(10, 410)">
    <rect x="10" y="10" width="380" height="30" class="rect"/>
    <text class="text" x="15" y="15" text-anchor="middle">Conclusion</text>
    <rect x="10" y="40" width="350" height="10" class="rect"/>
  </g>
</svg>