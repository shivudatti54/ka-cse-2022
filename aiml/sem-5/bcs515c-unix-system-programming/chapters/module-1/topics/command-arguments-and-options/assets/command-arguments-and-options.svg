<svg width="420" height="400" data-topic-id="command-arguments-and-options" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background-color: #66CCCC; color: #2F4F7F;">
  <title>Command Arguments and Options</title>
  <footer style="text-align: center; margin-top: 20px;">Learn Unix</footer>
  <rect x="0" y="0" width="100%" height="100%" rx="10" fill="#66CCCC" />
  <g transform="translate(60, 50)">
    <rect x="10" y="10" width="300" height="60" rx="10" fill="#FFFFFF" />
    <text x="15" y="25" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; opacity: 0.8;">Command Arguments and Options</text>
    <animate transform="translateX(50) rotate(45)" begin="0s" dur="2s" repeat="indefinite" />
  </g>
  <g transform="translate(60, 150)">
    <rect x="10" y="10" width="300" height="60" rx="10" fill="#FFFFFF" />
    <text x="15" y="25" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; opacity: 0.8;">Introduction</text>
    <ellipse cx="150" cy="40" rx="20" ry="10" fill="#FFFFFF" />
    <text x="140" y="50" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; opacity: 0.8;">Command arguments are values passed to a command to modify its behavior or provide additional information.</text>
    <animate transform="translateX(50) rotate(45)" begin="0s" dur="2s" repeat="indefinite" />
  </g>
  <g transform="translate(60, 280)">
    <rect x="10" y="10" width="300" height="60" rx="10" fill="#FFFFFF" />
    <text x="15" y="25" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; opacity: 0.8;">Types of Command Arguments</text>
    <rect x="10" y="60" width="200" height="20" rx="10" fill="#FFFFFF" />
    <text x="20" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; opacity: 0.8;">Input Arguments: values passed to the command to provide input data.</text>
    <rect x="230" y="60" width="70" height="20" rx="10" fill="#FFFFFF" />
    <text x="240" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; opacity: 0.8;">Output Arguments: values passed to the command to specify output files or directories.</text>
    <animate transform="translateX(50) rotate(45)" begin="0.2s" dur="2s" repeat="indefinite" />
  </g>
  <g transform="translate(60, 410)">
    <rect x="10" y="10" width="300" height="60" rx="10" fill="#FFFFFF" />
    <text x="15" y="25" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; opacity: 0.8;">Using Command Arguments and Options</text>
    <rect x="10" y="60" width="200" height="20" rx="10" fill="#FFFFFF" />
    <text x="20" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; opacity: 0.8;">Example 1: ls Command with Arguments</text>
    <text x="230" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; opacity: 0.8;">ls -l /path/to/directory</text>
    <rect x="10" y="90" width="200" height="20" rx="10" fill="#FFFFFF" />
    <text x="20" y="100" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; opacity: 0.8;">Example 2: echo Command with Arguments</text>
    <text x="230" y="100" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; opacity: 0.8;">echo "Hello World!" > output.txt</text>
    <animate transform="translateX(50) rotate(45)" begin="0.4s" dur="2s" repeat="indefinite" />
  </g>
  <g transform="translate(60, 150)">
    <rect x="10" y="10" width="300" height="60" rx="10" fill="#FFFFFF" />
    <text x="15" y="25" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; opacity: 0.8;">Types of Command Options</text>
    <rect x="10" y="60" width="200" height="20" rx="10" fill="#FFFFFF" />
    <text x="20" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; opacity: 0.8;">Short Options: single characters (e.g., -l for long option)</text>
    <rect x="230" y="60" width="70" height="20" rx="10" fill="#FFFFFF" />
    <text x="240" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; opacity: 0.8;">Long Options: options represented by a dash followed by a name (e.g., -long-option)</text>
    <rect x="10" y="90" width="200" height="20" rx="10" fill="#FFFFFF" />
    <text x="20" y="100" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; opacity: 0.8;">Switch Options: short options preceded by a dash (e.g., -l for length)</text>
    <animate transform="translateX(50) rotate(45)" begin="0.6s" dur="2s" repeat="indefinite" />
  </g>
  <g transform="translate(60, 410)">
    <rect x="10" y="10" width="300" height="60" rx="10" fill="#FFFFFF" />
    <text x="15" y="25" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; opacity: 0.8;">Conclusion</text>
    <ellipse cx="150" cy="40" rx="20" ry="10" fill="#FFFFFF" />
    <text x="140" y="50" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; opacity: 0.8;">Command arguments and options are essential tools for customizing Unix commands and providing flexibility.</text>
    <animate transform="translateX(50) rotate(45)" begin="0.8s" dur="2s" repeat="indefinite" />
  </g>
</svg>