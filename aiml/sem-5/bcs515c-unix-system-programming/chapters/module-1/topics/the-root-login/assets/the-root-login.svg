<svg width="420" height="400" data-topic-id="root-login" viewBox="0 0 420 400">
  <rect x="0" y="0" width="420" height="400" fill="#ADD8E6" style="stroke:rgb(0,0,0);stroke-width:2"/>
  <text x="10" y="20" fill="#4B0082" font-size="24" text-anchor="start">The Root Login</text>
  <text x="10" y="60" fill="#4B0082" font-size="18" text-anchor="start">Introduction</text>
  <rect x="50" y="80" width="320" height="150" fill="#C5E1F5" style="stroke:rgb(0,0,0);stroke-width:2"/>
  <animate transform="translate(50,80) rotate(0) scale(1,1)" attributeName="transform" dur="2s" begin="0s"/>
  <text x="90" y="120" fill="#2E4053" font-size="16" text-anchor="start" data-narration="The root login is a type of login that grants the user administrative privileges and access to the entire system. It is the highest level of access and is typically used for system administration tasks, maintenance, and troubleshooting." style="opacity:0;transition:opacity 0.5s ease-in-out;"/>
  <animate transform="translate(90,120) rotate(0) scale(1,1)" attributeName="transform" dur="2s" begin="0s"/>
  <text x="90" y="160" fill="#2E4053" font-size="16" text-anchor="start" data-narration="The root user is also known as the superuser or the administrator. The root login is used to access the system's administrative tools and commands." style="opacity:1;transition:opacity 0.5s ease-in-out;"/>
  <rect x="50" y="240" width="320" height="150" fill="#C5E1F5" style="stroke:rgb(0,0,0);stroke-width:2"/>
  <animate transform="translate(50,240) rotate(0) scale(1,1)" attributeName="transform" dur="2s" begin="2s"/>
  <text x="90" y="280" fill="#2E4053" font-size="16" text-anchor="start" data-narration="Superuser privileges include changing system settings and configuration files, installing and uninstalling software packages, managing users and groups, and changing file ownership and permissions." style="opacity:0;transition:opacity 0.5s ease-in-out;"/>
  <animate transform="translate(90,280) rotate(0) scale(1,1)" attributeName="transform" dur="2s" begin="2s"/>
  <text x="90" y="320" fill="#2E4053" font-size="16" text-anchor="start" data-narration="Access to administrative tools such as shell commands, system monitoring tools, and system configuration tools is also provided." style="opacity:1;transition:opacity 0.5s ease-in-out;"/>
  <rect x="50" y="400" width="320" height="50" fill="#FFA07A" style="stroke:rgb(0,0,0);stroke-width:2"/>
  <animate transform="translate(50,400) rotate(0) scale(1,1)" attributeName="transform" dur="2s" begin="4s"/>
  <text x="10" y="410" fill="#FFA07A" font-size="18" text-anchor="start">Conclusion</text>
  <rect x="50" y="410" width="320" height="50" fill="#4B0082" style="stroke:rgb(0,0,0);stroke-width:2"/>
  <text x="90" y="440" fill="#4B0082" font-size="18" text-anchor="start" data-narration="The root login should only be used when necessary, as it provides the highest level of access to the system. Regularly monitoring system activity is recommended to detect potential security issues." style="opacity:0;transition:opacity 0.5s ease-in-out;"/>
  <animate transform="translate(90,440) rotate(0) scale(1,1)" attributeName="transform" dur="2s" begin="4s"/>
  <rect x="50" y="410" width="320" height="50" fill="#2E4053" style="stroke:rgb(0,0,0);stroke-width:2"/>
  <line x1="50" y1="410" x2="370" y2="410" stroke="#2E4053" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <line x1="50" y1="430" x2="370" y2="430" stroke="#2E4053" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <line x1="50" y1="450" x2="370" y2="450" stroke="#2E4053" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#2E4053" stop-opacity="1"/>
    <stop offset="100%" stop-color="#2E4053" stop-opacity="1"/>
  </linearGradient>
  <linearGradient id="arrow-end" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2E4053" stop-opacity="1"/>
    <stop offset="100%" stop-color="#2E4053" stop-opacity="1"/>
  </linearGradient>
  <text x="10" y="50" fill="#FFA07A" font-size="16" text-anchor="start" style="opacity:0;transition:opacity 0.5s ease-in-out;">Best Practices for Root Login</text>
  <animate transform="translate(10,50) rotate(0) scale(1,1)" attributeName="transform" dur="2s" begin="0s"/>
  <text x="10" y="60" fill="#FFA07A" font-size="16" text-anchor="start" style="opacity:1;transition:opacity 0.5s ease-in-out;">Use the root login only when necessary</text>
  <line x1="10" y1="70" x2="90" y2="70" stroke="#FFA07A" stroke-width="2" marker-end="url(#arrow-end)" marker-start="url(#arrow-end)"/>
  <text x="10" y="90" fill="#FFA07A" font-size="16" text-anchor="start" style="opacity:0;transition:opacity 0.5s ease-in-out;">Use a secure password</text>
  <animate transform="translate(10,90) rotate(0) scale(1,1)" attributeName="transform" dur="2s" begin="0s"/>
  <text x="10" y="100" fill="#FFA07A" font-size="16" text-anchor="start" style="opacity:1;transition:opacity 0.5s ease-in-out;">Monitor system activity</text>
  <line x1="10" y1="110" x2="90" y2="110" stroke="#FFA07A" stroke-width="2" marker-end="url(#arrow-end)" marker-start="url(#arrow-end)"/>
  <rect x="50" y="0" width="320" height="400" fill="#ADD8E6" style="stroke:rgb(0,0,0);stroke-width:2"/>
</svg>