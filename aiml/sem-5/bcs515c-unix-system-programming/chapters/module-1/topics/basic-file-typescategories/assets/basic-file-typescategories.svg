<svg width="420" height="400" data-topic-id="basic-file-types-and-categories" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="pastel Gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5E1F5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7E5F4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Basic File Types and Categories</title>
  <rect x="0" y="20" width="100%" height="30" fill="url(#pastel Gradient)"/>
  <g transform="translate(30, 50)">
    <rect x="0" y="0" width="60" height="30" fill="#3498db" rx="5"/>
    <text x="15" y="15" fill="#fff" font-size="16">Regular Files</text>
    <section data-narration="Regular files are the most common type of file in UNIX. They contain data that can be read and written.">
      <rect x="0" y="0" width="100%" height="150" fill="#fff" rx="5"/>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-150" begin="0s" dur="2s"/>
      <g transform="translate(0, -150)">
        <rect x="0" y="0" width="60" height="50" fill="#3498db" rx="5"/>
        <text x="15" y="15" fill="#fff" font-size="14">Contain data (e.g., text, images, executable programs)</text>
        <rect x="0" y="50" width="60" height="50" fill="#3498db" rx="5"/>
        <text x="15" y="65" fill="#fff" font-size="14">Can be read and written by the owner, group, and others</text>
      </g>
    </section>
    <path d="M 0,0 L 100,0 L 100,100 L 0,100 Z" stroke="#3498db" stroke-width="2" fill="none"/>
    <path d="M 0,50 L 100,50 L 100,100 L 0,100 Z" stroke="#3498db" stroke-width="2" fill="none"/>
    <path d="M 0,0 L 60,0 L 60,30 L 0,30 Z" stroke="#3498db" stroke-width="2" fill="none" fill-opacity="0.3"/>
    <text x="10" y="20" fill="#fff" font-size="14">example.txt (a text file)</text>
    <text x="10" y="60" fill="#fff" font-size="14">image.jpg (an image file)</text>
  </g>
  <g transform="translate(150, 50)">
    <rect x="0" y="0" width="60" height="30" fill="#2ecc71" rx="5"/>
    <text x="15" y="15" fill="#fff" font-size="16">Directory Files</text>
    <section data-narration="Directory files are used to store and organize other files. They contain metadata about other files (e.g., file names, permissions).">
      <rect x="0" y="0" width="100%" height="150" fill="#fff" rx="5"/>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-150" begin="2s" dur="2s"/>
      <g transform="translate(0, -150)">
        <rect x="0" y="0" width="60" height="50" fill="#2ecc71" rx="5"/>
        <text x="15" y="15" fill="#fff" font-size="14">Contain metadata about other files (e.g., file names, permissions)</text>
        <rect x="0" y="50" width="60" height="50" fill="#2ecc71" rx="5"/>
        <text x="15" y="65" fill="#fff" font-size="14">Used to create new directories and files</text>
      </g>
    </section>
    <path d="M 0,0 L 100,0 L 100,100 L 0,100 Z" stroke="#2ecc71" stroke-width="2" fill="none"/>
    <path d="M 0,50 L 100,50 L 100,100 L 0,100 Z" stroke="#2ecc71" stroke-width="2" fill="none"/>
    <path d="M 0,0 L 60,0 L 60,30 L 0,30 Z" stroke="#2ecc71" stroke-width="2" fill="none" fill-opacity="0.3"/>
    <text x="10" y="20" fill="#fff" font-size="14">/home/user/documents (a directory)</text>
    <text x="10" y="60" fill="#fff" font-size="14">/var/log (a log directory)</text>
  </g>
  <g transform="translate(300, 50)">
    <rect x="0" y="0" width="60" height="30" fill="#e74c3c" rx="5"/>
    <text x="15" y="15" fill="#fff" font-size="16">Symbolic Links</text>
    <section data-narration="Symbolic links are pointers to other files or directories. They can be used to create shortcuts or aliases. They can be changed or deleted.">
      <rect x="0" y="0" width="100%" height="150" fill="#fff" rx="5"/>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-150" begin="4s" dur="2s"/>
      <g transform="translate(0, -150)">
        <rect x="0" y="0" width="60" height="50" fill="#e74c3c" rx="5"/>
        <text x="15" y="15" fill="#fff" font-size="14">Point to a file or directory</text>
        <rect x="0" y="50" width="60" height="50" fill="#e74c3c" rx="5"/>
        <text x="15" y="65" fill="#fff" font-size="14">Can be used to create shortcuts or aliases</text>
      </g>
    </section>
    <path d="M 0,0 L 100,0 L 100,100 L 0,100 Z" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <path d="M 0,50 L 100,50 L 100,100 L 0,100 Z" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <path d="M 0,0 L 60,0 L 60,30 L 0,30 Z" stroke="#e74c3c" stroke-width="2" fill="none" fill-opacity="0.3"/>
    <text x="10" y="20" fill="#fff" font-size="14">ln -s /usr/bin/ls /usr/bin/linked_ls (a symbolic link)</text>
    <text x="10" y="60" fill="#fff" font-size="14">ln -s /home/user/documents /usr/local/documents (a symbolic link)</text>
  </g>
  <g transform="translate(450, 50)">
    <rect x="0" y="0" width="60" height="30" fill="#1abc9c" rx="5"/>
    <text x="15" y="15" fill="#fff" font-size="16">Special Files</text>
    <section data-narration="Special files are system files that perform special actions when accessed. They represent a device or a process.">
      <rect x="0" y="0" width="100%" height="150" fill="#fff" rx="5"/>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-150" begin="6s" dur="2s"/>
      <g transform="translate(0, -150)">
        <rect x="0" y="0" width="60" height="50" fill="#1abc9c" rx="5"/>
        <text x="15" y="15" fill="#fff" font-size="14">Represent a device or a process</text>
        <rect x="0" y="50" width="60" height="50" fill="#1abc9c" rx="5"/>
        <text x="15" y="65" fill="#fff" font-size="14">Used to interact with devices (e.g., disk, network)</text>
      </g>
    </section>
    <path d="M 0,0 L 100,0 L 100,100 L 0,100 Z" stroke="#1abc9c" stroke-width="2" fill="none"/>
    <path d="M 0,50 L 100,50 L 100,100 L 0,100 Z" stroke="#1abc9c" stroke-width="2" fill="none"/>
    <path d="M 0,0 L 60,0 L 60,30 L 0,30 Z" stroke="#1abc9c" stroke-width="2" fill="none" fill-opacity="0.3"/>
    <text x="10" y="20" fill="#fff" font-size="14">/dev/sda1 (a partition device)</text>
    <text x="10" y="60" fill="#fff" font-size="14">/proc/cpuinfo (process information file)</text>
  </g>
  <footer>
    <text x="20" y="380" fill="#fff" font-size="14">Learn more about file types and categories</text>
  </footer>
</svg>