<svg width="420" height="400" data-topic-id="meaning-of-internal-and-external-commands" xmlns="http://www.w3.org/2000/svg" xml:space="preserve">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>

  <!-- Title -->
  <text x="10" y="20" font-size="24" font-family="Arial" text-anchor="start" fill="#2E4053">Meaning of Internal and External Commands</text>

  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="10" y="50" width="400" height="50" fill="#F7F7F7" rx="10">
      <animate transform="translate(0, 0) rotate(0)" begin="0s" dur="2s" repeat="forever"/>
    </rect>
    <text x="15" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">In the UNIX operating system, commands are executed to perform various tasks.</text>
  </section>

  <!-- Section 2: Internal Commands -->
  <section data-narration="Internal Commands">
    <rect x="10" y="120" width="400" height="50" fill="#F7F7F7" rx="10">
      <animate transform="translate(0, 0) rotate(0)" begin="0s" dur="2s" repeat="forever"/>
    </rect>
    <rect x="10" y="180" width="100" height="20" fill="#E5E5EA" rx="5">
      <animate transform="translate(0, 0) rotate(0)" begin="0s" dur="2s" repeat="forever"/>
    </rect>
    <text x="15" y="190" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Internal commands are programs that are built into the UNIX operating system.</text>
  </section>

  <!-- Section 3: Characteristics of Internal Commands -->
  <section data-narration="Characteristics of Internal Commands">
    <rect x="10" y="240" width="400" height="50" fill="#F7F7F7" rx="10">
      <animate transform="translate(0, 0) rotate(0)" begin="0s" dur="2s" repeat="forever"/>
    </rect>
    <rect x="10" y="300" width="100" height="20" fill="#E5E5EA" rx="5">
      <animate transform="translate(0, 0) rotate(0)" begin="0s" dur="2s" repeat="forever"/>
    </rect>
    <text x="15" y="310" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Internal commands are executed directly by the operating system.</text>
  </section>

  <!-- Section 4: Examples of Internal Commands -->
  <section data-narration="Examples of Internal Commands">
    <rect x="10" y="360" width="400" height="50" fill="#F7F7F7" rx="10">
      <animate transform="translate(0, 0) rotate(0)" begin="0s" dur="2s" repeat="forever"/>
    </rect>
    <rect x="10" y="420" width="100" height="20" fill="#E5E5EA" rx="5">
      <animate transform="translate(0, 0) rotate(0)" begin="0s" dur="2s" repeat="forever"/>
    </rect>
    <text x="15" y="430" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      <tspan x="15" y="430">cd (change directory): changes the current working directory</tspan>
      <tspan x="15" y="450">pwd (print working directory): displays the current working directory</tspan>
      <tspan x="15" y="470">date: displays the current date and time</tspan>
    </text>
  </section>

  <!-- Section 5: Advantages of Internal Commands -->
  <section data-narration="Advantages of Internal Commands">
    <rect x="10" y="500" width="400" height="50" fill="#F7F7F7" rx="10">
      <animate transform="translate(0, 0) rotate(0)" begin="0s" dur="2s" repeat="forever"/>
    </rect>
    <rect x="10" y="560" width="100" height="20" fill="#E5E5EA" rx="5">
      <animate transform="translate(0, 0) rotate(0)" begin="0s" dur="2s" repeat="forever"/>
    </rect>
    <text x="15" y="570" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Internal commands are faster to execute and use less memory.</text>
  </section>

  <!-- Section 6: Disadvantages of Internal Commands -->
  <section data-narration="Disadvantages of Internal Commands">
    <rect x="10" y="620" width="400" height="50" fill="#F7F7F7" rx="10">
      <animate transform="translate(0, 0) rotate(0)" begin="0s" dur="2s" repeat="forever"/>
    </rect>
    <rect x="10" y="680" width="100" height="20" fill="#E5E5EA" rx="5">
      <animate transform="translate(0, 0) rotate(0)" begin="0s" dur="2s" repeat="forever"/>
    </rect>
    <text x="15" y="690" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Internal commands have limited functionality and cannot be customized.</text>
  </section>

  <!-- External Commands Section -->
  <section data-narration="External Commands">
    <rect x="10" y="740" width="400" height="50" fill="#F7F7F7" rx="10">
      <animate transform="translate(0, 0) rotate(0)" begin="0s" dur="2s" repeat="forever"/>
    </rect>
    <rect x="10" y="800" width="100" height="20" fill="#E5E5EA" rx="5">
      <animate transform="translate(0, 0) rotate(0)" begin="0s" dur="2s" repeat="forever"/>
    </rect>
    <text x="15" y="810" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      <tspan x="15" y="810">External commands are programs that are stored on the user's disk and executed by the operating system.</tspan>
    </text>
  </section>

  <!-- Section 7: Examples of External Commands -->
  <section data-narration="Examples of External Commands">
    <rect x="10" y="860" width="400" height="50" fill="#F7F7F7" rx="10">
      <animate transform="translate(0, 0) rotate(0)" begin="0s" dur="2s" repeat="forever"/>
    </rect>
    <rect x="10" y="920" width="100" height="20" fill="#E5E5EA" rx="5">
      <animate transform="translate(0, 0) rotate(0)" begin="0s" dur="2s" repeat="forever"/>
    </rect>
    <text x="15" y="930" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      <tspan x="15" y="930">grep (global regular expression print): searches for a pattern in a file</tspan>
      <tspan x="15" y="950">sed (stream editor): edits and manipulates text in a file</tspan>
      <tspan x="15" y="970">bash (Bourne-Again SHell): a command-line interface and scripting language</tspan>
    </text>
  </section>

  <!-- Section 8: Advantages of External Commands -->
  <section data-narration="Advantages of External Commands">
    <rect x="10" y="1000" width="400" height="50" fill="#F7F7F7" rx="10">
      <animate transform="translate(0, 0) rotate(0)" begin="0.2s" dur="2s" repeat="forever"/>
    </rect>
    <rect x="10" y="1060" width="100" height="20" fill="#E5E5EA" rx="5">
      <animate transform="translate(0, 0) rotate(0)" begin="0.2s" dur="2s" repeat="forever"/>
    </rect>
    <text x="15" y="1070" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      <tspan x="15" y="1070">External commands can perform complex tasks and are reusable.</tspan>
    </text>
  </section>

  <!-- Section 9: Disadvantages of External Commands -->
  <section data-narration="Disadvantages of External Commands">
    <rect x="10" y="1120" width="400" height="50" fill="#F7F7F7" rx="10">
      <animate transform="translate(0, 0) rotate(0)" begin="0.4s" dur="2s" repeat="forever"/>
    </rect>
    <rect x="10" y="1180" width="100" height="20" fill="#E5E5EA" rx="5">
      <animate transform="translate(0, 0) rotate(0)" begin="0.4s" dur="2s" repeat="forever"/>
    </rect>
    <text x="15" y="1190" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      <tspan x="15" y="1190">External commands are slower to execute and consume more memory.</tspan>
    </text>
  </section>

  <!-- Section 10: Key Concepts -->
  <section data-narration="Key Concepts">
    <rect x="10" y="1240" width="400" height="50" fill="#F7F7F7" rx="10">
      <animate transform="translate(0, 0) rotate(0)" begin="0.6s" dur="2s" repeat="forever"/>
    </rect>
    <rect x="10" y="1300" width="100" height="20" fill="#E5E5EA" rx="5">
      <animate transform="translate(0, 0) rotate(0)" begin="0.6s" dur="2s" repeat="forever"/>
    </rect>
    <text x="15" y="1310" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      <tspan x="15" y="1310">Internal commands are built into the operating system and executed directly.</tspan>
      <tspan x="15" y="1330">External commands are stored on the user's disk and executed by the operating system.</tspan>
    </text>
  </section>

  <!-- Footer -->
  <text x="20" y="390" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">By [Your Name]</text>
</svg>