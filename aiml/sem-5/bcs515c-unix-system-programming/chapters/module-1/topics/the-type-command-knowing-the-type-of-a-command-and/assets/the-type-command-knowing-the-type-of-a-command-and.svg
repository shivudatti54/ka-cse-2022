<svg width="420" height="400" data-topic-id="type-command-knowing-type-command-and" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="mix-blend-mode: multiply;">

  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="parallax-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#parallax-gradient)"/>

  <!-- Title at top -->
  <rect x="10" y="10" width="400" height="30" fill="#333333" rx="10">
    <text x="15" y="15" fill="#FFFFFF" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">The Type Command: Knowing the Type of a Command and</text>
  </rect>

  <!-- Section 1: Introduction -->
  <rect x="10" y="50" width="400" height="100" fill="#F7F7F7" rx="10">
    <animateTransform attributeName="transform" type="scale" from="1 1" to="0.9 0.9" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="15" y="25" fill="#333333" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="The type command is a fundamental tool in Unix system programming that helps users understand the type of a command, its location, and its behavior.">
      <tspan x="15" y="45">What is the Type Command?</tspan>
    </text>
  </rect>

  <!-- Section 2: What is the Type Command? -->
  <rect x="10" y="160" width="400" height="100" fill="#F7F7F7" rx="10">
    <animateTransform attributeName="transform" type="scale" from="1 1" to="0.9 0.9" begin="2s" dur="2s" repeatCount="indefinite"/>
    <text x="15" y="25" fill="#333333" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="The type command is used to determine the type of a command, which can be one of the following:
      <tspan x="15" y="45">File: The command is a file that can be executed as a program.
      <tspan x="15" y="60">Directory: The command is a directory that contains executable scripts.
      <tspan x="15" y="75">Link: The command is a symbolic link to another command.
      <tspan x="15" y="90">Builtin: The command is a built-in command that is defined within the shell."></tspan>
  </rect>

  <!-- Section 3: Key Concepts -->
  <rect x="10" y="280" width="400" height="100" fill="#F7F7F7" rx="10">
    <animateTransform attributeName="transform" type="scale" from="1 1" to="0.9 0.9" begin="4s" dur="2s" repeatCount="indefinite"/>
    <text x="15" y="25" fill="#333333" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="Key Concepts:
      <tspan x="15" y="45">Type: The category to which a command belongs (file, directory, link, or builtin).
      <tspan x="15" y="60">Location: The path to the command, if it exists.
      <tspan x="15" y="75">Behavior: The behavior of the command, if it is a file or link."></tspan>
  </rect>

  <!-- Section 4: Using the Type Command -->
  <rect x="10" y="400" width="400" height="100" fill="#F7F7F7" rx="10">
    <animateTransform attributeName="transform" type="scale" from="1 1" to="0.9 0.9" begin="6s" dur="2s" repeatCount="indefinite"/>
    <text x="15" y="25" fill="#333333" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="The type command is used with the following syntax:
      <tspan x="15" y="45">type [command]</tspan>
  </rect>

  <!-- Section 5: Output of the Type Command -->
  <rect x="10" y="520" width="400" height="100" fill="#F7F7F7" rx="10">
    <animateTransform attributeName="transform" type="scale" from="1 1" to="0.9 0.9" begin="8s" dur="2s" repeatCount="indefinite"/>
    <text x="15" y="25" fill="#333333" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="The type command produces the following output:
      <tspan x="15" y="45">file: The path to the command if it is a file.
      <tspan x="15" y="60">directory: The path to the command if it is a directory.
      <tspan x="15" y="75">link: The path to the command if it is a symbolic link.
      <tspan x="15" y="90">builtin: No path is displayed if the type command is a builtin.</tspan>
  </rect>

  <!-- Section 6: Examples -->
  <rect x="10" y="640" width="400" height="100" fill="#F7F7F7" rx="10">
    <animateTransform attributeName="transform" type="scale" from="1 1" to="0.9 0.9" begin="10s" dur="2s" repeatCount="indefinite"/>
    <text x="15" y="25" fill="#333333" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="Here are some examples of using the type command:
      <tspan x="15" y="45">type -t ls → file (returns the path to the ls command)
      <tspan x="15" y="60">type cd → directory (returns the path to the cd command)
      <tspan x="15" y="75">type rm → link (returns the path to the rm command, which is a symbolic link)</tspan>
  </rect>

  <!-- Footer -->
  <rect x="10" y="760" width="400" height="30" fill="#333333" rx="10">
    <text x="15" y="25" fill="#FFFFFF" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Learn more about Unix system programming at <a href="https://www.example.com">example.com</a></text>
  </rect>

  <!-- Arrow markers for connections -->
  <line x1="50" y1="20" x2="70" y2="60" stroke="#33CCCC" stroke-width="2" fill="none"/>
  <line x1="50" y1="60" x2="70" y2="80" stroke="#33CCCC" stroke-width="2" fill="none"/>
  <line x1="50" y1="80" x2="70" y2="100" stroke="#33CCCC" stroke-width="2" fill="none"/>
  <line x1="50" y1="100" x2="70" y2="120" stroke="#33CCCC" stroke-width="2" fill="none"/>
  <line x1="50" y1="120" x2="70" y2="140" stroke="#33CCCC" stroke-width="2" fill="none"/>
  <line x1="50" y1="140" x2="70" y2="160" stroke="#33CCCC" stroke-width="2" fill="none"/>
  <line x1="50" y1="160" x2="70" y2="180" stroke="#33CCCC" stroke-width="2" fill="none"/>
  <line x1="50" y1="180" x2="70" y2="200" stroke="#33CCCC" stroke-width="2" fill="none"/>
  <line x1="50" y1="200" x2="70" y2="220" stroke="#33CCCC" stroke-width="2" fill="none"/>
  <line x1="50" y1="220" x2="70" y2="240" stroke="#33CCCC" stroke-width="2" fill="none"/>
  <line x1="50" y1="240" x2="70" y2="260" stroke="#33CCCC" stroke-width="2" fill="none"/>
  <line x1="50" y1="260" x2="70" y2="280" stroke="#33CCCC" stroke-width="2" fill="none"/>
  <line x1="50" y1="280" x2="70" y2="300" stroke="#33CCCC" stroke-width="2" fill="none"/>
  <line x1="50" y1="300" x2="70" y2="320" stroke="#33CCCC" stroke-width="2" fill="none"/>
  <line x1="50" y1="320" x2="70" y2="340" stroke="#33CCCC" stroke-width="2" fill="none"/>
  <line x1="50" y1="340" x2="70" y2="360" stroke="#33CCCC" stroke-width="2" fill="none"/>
  <line x1="50" y1="360" x2="70" y2="380" stroke="#33CCCC" stroke-width="2" fill="none"/>
  <line x1="50" y1="380" x2="70" y2="400" stroke="#33CCCC" stroke-width="2" fill="none"/>

</svg>