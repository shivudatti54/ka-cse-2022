<svg width="420" height="400" data-topic-id="posix-and-single-unix-specification" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4567b7"/>
      <stop offset="100%" stop-color="#6495ed"/>
    </linearGradient>
  </defs>
  <title>POSIX and Single UNIX Specification</title>
  <rect x="0" y="20" width="400" height="350" fill="url(#gradient)"/>
  <g transform="translate(30, 20)">
    <text x="20" y="20" text-anchor="start" font-size="18">Introduction to Standardization</text>
    <rect x="80" y="50" width="200" height="20" fill="#4567b7" rx="5"/>
    <text x="80" y="50" text-anchor="start" font-size="16" fill="#fff">Need for Standardization</text>
    <g data-narration="The need for standardization became apparent to ensure consistency and interoperability across different Unix systems." transform="translate(30, 60)">
      <animateTransform attribute-name="x" type="translate" begin="0s" duration="2000" repeatCount="indefinite"/>
      <line x1="30" y1="60" x2="30" y2="80" stroke="#6495ed" stroke-width="2"/>
      <text x="30" y="80" text-anchor="start" font-size="14" fill="#fff">Portability problems arose from different Unix variants.</text>
    </g>
    <g data-narration="Two major standardization efforts emerged to address this fragmentation: POSIX and the Single UNIX Specification." transform="translate(30, 100)">
      <animateTransform attribute-name="x" type="translate" begin="0s" duration="2000" repeatCount="indefinite"/>
      <line x1="30" y1="100" x2="30" y2="130" stroke="#6495ed" stroke-width="2"/>
      <text x="30" y="130" text-anchor="start" font-size="14" fill="#fff">POSIX and Single UNIX Specification</text>
    </g>
    <g data-narration="POSIX is a family of standards specified by the IEEE (Institute of Electrical and Electronics Engineers) for maintaining compatibility between operating systems." transform="translate(30, 150)">
      <animateTransform attribute-name="x" type="translate" begin="0s" duration="2000" repeatCount="indefinite"/>
      <line x1="30" y1="150" x2="30" y2="180" stroke="#6495ed" stroke-width="2"/>
      <text x="30" y="180" text-anchor="start" font-size="14" fill="#fff">Defining the application programming interface (API), along with command line shells and utility interfaces.</text>
    </g>
    <g data-narration="The Single UNIX Specification (SUS) is a set of standards that ensures a Unix system provides a consistent API and behavior." transform="translate(30, 200)">
      <animateTransform attribute-name="x" type="translate" begin="0s" duration="2000" repeatCount="indefinite"/>
      <line x1="30" y1="200" x2="30" y2="230" stroke="#6495ed" stroke-width="2"/>
      <text x="30" y="230" text-anchor="start" font-size="14" fill="#fff">Ensuring a consistent API and behavior across different Unix systems.</text>
    </g>
    <g data-narration="The Single UNIX Specification (SUS) is based on the POSIX standard and adds additional requirements for real-time systems." transform="translate(30, 260)">
      <animateTransform attribute-name="x" type="translate" begin="0s" duration="2000" repeatCount="indefinite"/>
      <line x1="30" y1="260" x2="30" y2="290" stroke="#6495ed" stroke-width="2"/>
      <text x="30" y="290" text-anchor="start" font-size="14" fill="#fff">Real-time extensions and threads extensions.</text>
    </g>
    <g data-narration="The Single UNIX Specification (SUS) also includes additional requirements for security and error handling." transform="translate(30, 320)">
      <animateTransform attribute-name="x" type="translate" begin="0s" duration="2000" repeatCount="indefinite"/>
      <line x1="30" y1="320" x2="30" y2="350" stroke="#6495ed" stroke-width="2"/>
      <text x="30" y="350" text-anchor="start" font-size="14" fill="#fff">Security and error handling.</text>
    </g>
    <g data-narration="In conclusion, the POSIX and Single UNIX Specification are essential standards for maintaining compatibility and interoperability across different Unix systems." transform="translate(30, 380)">
      <animateTransform attribute-name="x" type="translate" begin="0s" duration="2000" repeatCount="indefinite"/>
      <line x1="30" y1="380" x2="30" y2="400" stroke="#6495ed" stroke-width="2"/>
      <text x="30" y="400" text-anchor="start" font-size="14" fill="#fff">Ensuring consistency and interoperability.</text>
    </g>
  </g>
  <rect x="0" y="400" width="400" height="20" fill="#4567b7" rx="5"/>
  <text x="20" y="400" text-anchor="start" font-size="18" fill="#fff">Footer</text>
</svg>