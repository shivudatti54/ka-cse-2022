<svg width="420" height="400" data-topic-id="becoming-the-super-user-su-command">
  <desc>Becoming the Super User: su Command</desc>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6e8eef" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ed" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <style>
    text {
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    .section {
      margin-bottom: 20px;
    }
    .sectionheader {
      font-weight: bold;
    }
    .arrow {
      fill: #f0ad4e;
      stroke: #333;
      stroke-width: 2;
    }
  </style>
  <g fill="url(#gradient)">
    <rect x="10" y="10" width="400" height="380"/>
  </g>
  <text x="10" y="20" text-anchor="begin">Becoming the Super User: su Command</text>
  <section class="section" data-narration="Introduction">
    <rect x="10" y="50" width="300" height="20" rx="5" fill="#f2f2f2"/>
    <text x="15" y="55" class="sectionheader">Introduction</text>
    <text x="15" y="65" fill="#333">As a beginner in UNIX system programming, it's essential to understand the concept of super user and how to become one.</text>
  </section>
  <section class="section" data-narration="What is Super User">
    <rect x="10" y="100" width="300" height="20" rx="5" fill="#f2f2f2"/>
    <text x="15" y="105" class="sectionheader">What is Super User?</text>
    <text x="15" y="115" fill="#333">The super user, also known as the root user, has the highest level of access and privileges on a system.</text>
    <text x="15" y="125" fill="#333">The root user has the ability to:</text>
    <text x="15" y="135" fill="#333">- Modify system settings</text>
    <text x="15" y="145" fill="#333">- Install software</text>
    <text x="15" y="155" fill="#333">- Create and manage user accounts</text>
  </section>
  <section class="section" data-narration="What is su Command">
    <rect x="10" y="220" width="300" height="20" rx="5" fill="#f2f2f2"/>
    <text x="15" y="225" class="sectionheader">What is su Command?</text>
    <text x="15" y="235" fill="#333">The su command is a utility that allows users to switch to another user account.</text>
    <text x="15" y="245" fill="#333">The su command can be used to become the super user, giving the user administrative privileges.</text>
    <text x="15" y="255" fill="#333">The general syntax of the su command is:</text>
    <text x="15" y="265" fill="#333">su [options] [username]</text>
  </section>
  <section class="section" data-narration="Options">
    <rect x="10" y="330" width="300" height="20" rx="5" fill="#f2f2f2"/>
    <text x="15" y="335" class="sectionheader">Options</text>
    <text x="15" y="345" fill="#333">Here are the common options used with the su command:</text>
    <text x="15" y="355" fill="#333">- - (become super user)</text>
    <text x="15" y="365" fill="#333">- -c (execute command as super user)</text>
    <text x="15" y="375" fill="#333">- -p (use default shell of super user)</text>
    <text x="15" y="385" fill="#333">- -s (specify shell to use as super user)</text>
  </section>
  <section class="section" data-narration="Usage">
    <rect x="10" y="410" width="300" height="20" rx="5" fill="#f2f2f2"/>
    <text x="15" y="415" class="sectionheader">Usage</text>
    <text x="15" y="425" fill="#333">To become the super user using the su command, follow these steps:</text>
    <text x="15" y="435" fill="#333">1. Type su and press Enter.</text>
    <text x="15" y="445" fill="#333">2. Enter the password of the super user account.</text>
    <text x="15" y="455" fill="#333">3. The super user account will be activated.</text>
  </section>
  <g fill="#f0ad4e">
    <path d="M 10,10 L 30,30 L 50,10 Z"/>
  </g>
  <g fill="#333">
    <path d="M 40,100 L 60,120 L 80,100 Z"/>
    <path d="M 40,220 L 60,240 L 80,220 Z"/>
    <path d="M 40,330 L 60,350 L 80,330 Z"/>
  </g>
  <g fill="#f0ad4e" class="arrow">
    <path d="M 120,50 L 140,70 Z"/>
  </g>
  <g fill="#f0ad4e" class="arrow">
    <path d="M 120,150 L 140,170 Z"/>
  </g>
  <g fill="#f0ad4e" class="arrow">
    <path d="M 120,250 L 140,270 Z"/>
  </g>
  <g fill="#f0ad4e" class="arrow">
    <path d="M 120,350 L 140,370 Z"/>
  </g>
  <g fill="#333">
    <text x="10" y="380" fill="#333">Footer</text>
  </g>
</svg>