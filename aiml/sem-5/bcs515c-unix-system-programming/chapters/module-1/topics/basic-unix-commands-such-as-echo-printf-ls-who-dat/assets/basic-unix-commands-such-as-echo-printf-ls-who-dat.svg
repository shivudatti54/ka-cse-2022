<svg width="420" height="400" data-topic-id="unix-commands" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ACC7F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10"/>
  
  <!-- Title at top -->
  <text x="50%" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    Unix Commands
  </text>
  
  <!-- Section 1: Echo Command -->
  <section id="echo-command" data-narration="The echo command is used to display text or commands on the screen. It is one of the most commonly used commands in Unix.">
    <rect x="20" y="60" width="380" height="100" fill="#f9f9f9" rx="10"/>
    <text x="20" y="80" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2ecc71">
    <tspan>echo [options] [arguments]</tspan>
    </text>
    <text x="20" y="110" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2ecc71">
    <tspan>Example:</tspan>
    <tspan>echo "Hello World"</tspan>
    <tspan>echo -n "Hello World"</tspan>
    <tspan>echo -e "Hello\ World"</tspan>
    <tspan>echo -e "Hello\ World" > output.txt</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 120" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 2: Printf Command -->
  <section id="printf-command" data-narration="The printf command is used to format and print data. It is similar to the echo command but provides more formatting options.">
    <rect x="20" y="160" width="380" height="100" fill="#f9f9f9" rx="10"/>
    <text x="20" y="180" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2ecc71">
    <tspan>printf [options] format_string [arguments]</tspan>
    </text>
    <text x="20" y="210" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2ecc71">
    <tspan>Example:</tspan>
    <tspan>printf "The answer is %d\n" 42</tspan>
    <tspan>printf "%s is 42\n" "The answer"</tspan>
    <tspan>printf "The answer is %d\n" "42"</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 120" to="0 140" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 3: Ls Command -->
  <section id="ls-command" data-narration="The ls command is used to display a list of files and directories in the current directory.">
    <rect x="20" y="310" width="380" height="100" fill="#f9f9f9" rx="10"/>
    <text x="20" y="330" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2ecc71">
    <tspan>ls [options] [arguments]</tspan>
    </text>
    <text x="20" y="360" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2ecc71">
    <tspan>Example:</tspan>
    <tspan>ls -l</tspan>
    <tspan>ls -a</tspan>
    <tspan>ls -r</tspan>
    <tspan>ls -d .</tspan>
    <tspan>ls -d ..</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 140" to="0 160" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 4: Who Command -->
  <section id="who-command" data-narration="The who command is used to display information about the system.">
    <rect x="20" y="380" width="380" height="100" fill="#f9f9f9" rx="10"/>
    <text x="20" y="400" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2ecc71">
    <tspan>who [options]</tspan>
    </text>
    <text x="20" y="430" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2ecc71">
    <tspan>Example:</tspan>
    <tspan>who</tspan>
    <tspan>who -u username</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 160" to="0 180" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 5: Date Command -->
  <section id="date-command" data-narration="The date command is used to display the current date and time.">
    <rect x="20" y="200" width="380" height="100" fill="#f9f9f9" rx="10"/>
    <text x="20" y="220" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2ecc71">
    <tspan>date [options]</tspan>
    </text>
    <text x="20" y="250" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2ecc71">
    <tspan>Example:</tspan>
    <tspan>date</tspan>
    <tspan>date +"%Y-%m-%d %H:%M:%S"</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 140" to="0 160" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 6: Passwd Command -->
  <section id="passwd-command" data-narration="The passwd command is used to display information about a user.">
    <rect x="20" y="280" width="380" height="100" fill="#f9f9f9" rx="10"/>
    <text x="20" y="300" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2ecc71">
    <tspan>passwd [options]</tspan>
    </text>
    <text x="20" y="330" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2ecc71">
    <tspan>Example:</tspan>
    <tspan>passwd username</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 160" to="0 180" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 7: Cal Command -->
  <section id="cal-command" data-narration="The cal command is used to display a calendar.">
    <rect x="20" y="360" width="380" height="100" fill="#f9f9f9" rx="10"/>
    <text x="20" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2ecc71">
    <tspan>cal [options]</tspan>
    </text>
    <text x="20" y="410" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2ecc71">
    <tspan>Example:</tspan>
    <tspan>cal -m March 2022</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 180" to="0 200" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Connections -->
  <line x1="50%" y1="20" x2="50%" y2="20" stroke="#3498db" stroke-width="2"/>
  <line x1="50%" y1="120" x2="50%" y2="120" stroke="#3498db" stroke-width="2"/>
  <line x1="50%" y1="140" x2="50%" y2="140" stroke="#3498db" stroke-width="2"/>
  <line x1="50%" y1="160" x2="50%" y2="160" stroke="#3498db" stroke-width="2"/>
  <line x1="50%" y1="180" x2="50%" y2="180" stroke="#3498db" stroke-width="2"/>
  <line x1="50%" y1="200" x2="50%" y2="200" stroke="#3498db" stroke-width="2"/>
  <line x1="50%" y1="220" x2="50%" y2="220" stroke="#3498db" stroke-width="2"/>
  <line x1="50%" y1="240" x2="50%" y2="240" stroke="#3498db" stroke-width="2"/>
  <line x1="50%" y1="260" x2="50%" y2="260" stroke="#3498db" stroke-width="2"/>
  <line x1="50%" y1="280" x2="50%" y2="280" stroke="#3498db" stroke-width="2"/>
  <line x1="50%" y1="300" x2="50%" y2="300" stroke="#3498db" stroke-width="2"/>
  <line x1="50%" y1="320" x2="50%" y2="320" stroke="#3498db" stroke-width="2"/>
  <line x1="50%" y1="340" x2="50%" y2="340" stroke="#3498db" stroke-width="2"/>
  
  <!-- Footer -->
  <text x="50%" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    Created by [Your Name]
  </text>
</svg>