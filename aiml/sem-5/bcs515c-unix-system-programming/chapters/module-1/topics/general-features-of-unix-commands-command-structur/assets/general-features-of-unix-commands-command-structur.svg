<svg width="420" height="400" data-topic-id="unix-commands-structure">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#6495ED" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF9900" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>General Features of Unix Commands/ Command Structure</title>
  <metadata>
    <desc>Animated educational diagram for Unix commands command structure</desc>
    <content-type>application/svg+xml</content-type>
  </metadata>
  <g transform="rotate(45 210 20)">
    <rect x="10" y="10" width="400" height="380" style="fill: url(#grad)"/>
    <text x="20" y="20" font-size="18" font-family="Arial" text-anchor="middle">Unix Commands</text>
    <text x="20" y="50" font-size="14" font-family="Arial" text-anchor="middle">Command Structure</text>
    <text x="20" y="80" font-size="14" font-family="Arial" text-anchor="middle" data-narration="Command Structure Introduction">
      Introduction to Unix commands and their structure
    </text>
    <rect x="60" y="80" width="100" height="20" style="fill:#6495ED;stroke:#000;stroke-width:2"/>
    <text x="80" y="90" font-size="16" font-family="Arial" text-anchor="middle">command [options] [arguments]</text>
    <text x="80" y="120" font-size="14" font-family="Arial" text-anchor="middle" data-narration="Command Structure">
      The general structure of a Unix command
    </text>
    <g transform="translate(150 80)">
      <rect x="0" y="0" width="40" height="20" style="fill:#C7B8EA;stroke:#000;stroke-width:2"/>
      <text x="10" y="10" font-size="16" font-family="Arial" text-anchor="middle">command</text>
      <rect x="50" y="0" width="40" height="20" style="fill:#6495ED;stroke:#000;stroke-width:2"/>
      <text x="60" y="10" font-size="16" font-family="Arial" text-anchor="middle">options</text>
      <rect x="100" y="0" width="40" height="20" style="fill:#C7B8EA;stroke:#000;stroke-width:2"/>
      <text x="110" y="10" font-size="16" font-family="Arial" text-anchor="middle">arguments</text>
    </g>
    <g transform="translate(150 120)">
      <rect x="0" y="0" width="200" height="20" style="fill:#6495ED;stroke:#000;stroke-width:2"/>
      <text x="10" y="10" font-size="16" font-family="Arial" text-anchor="middle">Built-in commands</text>
      <rect x="50" y="0" width="100" height="20" style="fill:#C7B8EA;stroke:#000;stroke-width:2"/>
      <text x="60" y="10" font-size="16" font-family="Arial" text-anchor="middle">External commands</text>
      <rect x="150" y="0" width="100" height="20" style="fill:#6495ED;stroke:#000;stroke-width:2"/>
      <text x="160" y="10" font-size="16" font-family="Arial" text-anchor="middle">Key Features</text>
    </g>
    <g transform="translate(250 120)">
      <rect x="0" y="0" width="150" height="20" style="fill:#6495ED;stroke:#000;stroke-width:2"/>
      <text x="10" y="10" font-size="16" font-family="Arial" text-anchor="middle">Case sensitivity</text>
      <rect x="50" y="0" width="100" height="20" style="fill:#C7B8EA;stroke:#000;stroke-width:2"/>
      <text x="60" y="10" font-size="16" font-family="Arial" text-anchor="middle">Piping</text>
      <rect x="150" y="0" width="100" height="20" style="fill:#6495ED;stroke:#000;stroke-width:2"/>
      <text x="160" y="10" font-size="16" font-family="Arial" text-anchor="middle">Redirection</text>
    </g>
    <g transform="translate(350 120)">
      <rect x="0" y="0" width="150" height="20" style="fill:#6495ED;stroke:#000;stroke-width:2"/>
      <text x="10" y="10" font-size="16" font-family="Arial" text-anchor="middle">Arguments</text>
      <rect x="50" y="0" width="100" height="20" style="fill:#C7B8EA;stroke:#000;stroke-width:2"/>
      <text x="60" y="10" font-size="16" font-family="Arial" text-anchor="middle">Common commands</text>
    </g>
    <a href="#footnote-1" style="text-decoration:underline;cursor:help">1</a>
    <g transform="rotate(-45 210 20)">
      <rect x="10" y="10" width="400" height="380" style="fill: url(#grad)"/>
      <text x="20" y="20" font-size="18" font-family="Arial" text-anchor="middle">Footnote</text>
    </g>
  </g>
  <footer>
    <g transform="rotate(-45 210 20)">
      <text x="20" y="380" font-size="14" font-family="Arial" text-anchor="middle">Diagram created using SVG and animated with <animate> elements</text>
    </g>
  </footer>
</svg>