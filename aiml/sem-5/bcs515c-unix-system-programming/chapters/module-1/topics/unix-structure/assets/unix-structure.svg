<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="Unix Structure">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a288a" stop-opacity="1"/>
      <stop offset="50%" stop-color="#1d4059" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2196f3" stop-opacity="1"/>
    </linearGradient>
    <marker markerName="arrow"
            mark="url(#arrow-mark)" refX="10" refY="5" xAdvance="10" yAdvance="5"/>
  </defs>

  <style>
    .section {
      padding: 20px;
      border-bottom: 1px solid #333;
    }
  </style>

  <rect x="10" y="10" width="400" height="180" fill="url(#gradient)"/>

  <text x="20" y="20" font-size="24" text-anchor="middle">Unix Structure</text>

  <section class="section" data-narration="What is Unix?">
    <rect x="10" y="50" width="350" height="30" fill="#f7f7f7"/>
    <text x="20" y="60" font-size="18" text-anchor="middle">Unix</text>
    <path d="M 20, 50 L 100, 50" stroke="#333" stroke-width="2" fill="none"/>
    <animate transform="rotate(360 20 50)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>

  <section class="section" data-narration="History of Unix">
    <rect x="10" y="120" width="350" height="30" fill="#f7f7f7"/>
    <text x="20" y="130" font-size="18" text-anchor="middle">History</text>
    <path d="M 20, 120 L 100, 120" stroke="#333" stroke-width="2" fill="none"/>
    <animate transform="rotate(360 20 120)" begin="2s" dur="2s" repeatCount="indefinite"/>
  </section>

  <section class="section" data-narration="Key Components">
    <rect x="10" y="190" width="350" height="30" fill="#f7f7f7"/>
    <text x="20" y="200" font-size="18" text-anchor="middle">Components</text>
    <path d="M 20, 190 L 100, 190" stroke="#333" stroke-width="2" fill="none"/>
    <animate transform="rotate(360 20 190)" begin="4s" dur="2s" repeatCount="indefinite"/>
  </section>

  <section class="section" data-narration="File System Structure">
    <rect x="10" y="270" width="350" height="30" fill="#f7f7f7"/>
    <text x="20" y="280" font-size="18" text-anchor="middle">File System</text>
    <path d="M 20, 270 L 100, 270" stroke="#333" stroke-width="2" fill="none"/>
    <animate transform="rotate(360 20 270)" begin="6s" dur="2s" repeatCount="indefinite"/>
  </section>

  <g transform="translate(10, 360)">
    <text x="20" y="20" font-size="24" text-anchor="middle">Unix Structure</text>
    <text x="10" y="150" font-size="18" text-anchor="middle">Android Development</text>
    <path d="M 20, 150 L 100, 150" stroke="#333" stroke-width="2" fill="none"/>
    <animate transform="rotate(360 20 150)" begin="8s" dur="2s" repeatCount="indefinite"/>
  </g>

  <rect x="10" y="10" width="400" height="40" fill="#2196f3" stroke="#2196f3" stroke-width="2"/>
  <text x="20" y="30" font-size="24" text-anchor="middle">Unix Structure</text>
  <path d="M 20, 10 L 100, 10" stroke="#2196f3" stroke-width="2" fill="none"/>
  <animate transform="rotate(360 20 10)" begin="0s" dur="2s" repeatCount="indefinite"/>
</svg>