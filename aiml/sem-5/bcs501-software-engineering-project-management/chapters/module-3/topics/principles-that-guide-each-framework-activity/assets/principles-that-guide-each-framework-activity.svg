<svg width="420" height="400" data-topic-id="principles-that-guide-each-framework-activity">
  <defs>
    <linearGradient id="Gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCFF" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#Gradient)"/>
  <text x="20" y="20" font-size="24" font-family="Arial" fill="#000000" text-anchor="start">Principles That Guide Each Framework Activity</text>
  <rect x="20" y="60" width="380" height="120" fill="#FFFFFF" rx="10">
    <animate attributeName="opacity" dur="1000ms" begin="0s" repeatCount="indefinite"/>
    <text x="20" y="80" font-size="16" font-family="Arial" fill="#000000" text-anchor="start" data-narration="Agile Framework">
      <tspan x="20" y="100">Agile is a iterative and incremental software development framework</tspan>
      <tspan x="20" y="120">that emphasizes flexibility, collaboration, and continuous improvement.</tspan>
    </text>
  </rect>
  <rect x="20" y="200" width="380" height="120" fill="#FFFFFF" rx="10">
    <animate attributeName="opacity" dur="1000ms" begin="1s" repeatCount="indefinite"/>
    <text x="20" y="220" font-size="16" font-family="Arial" fill="#000000" text-anchor="start" data-narration="Waterfall Framework">
      <tspan x="20" y="240">Waterfall is a linear software development framework that involves developing software in a sequential manner</tspan>
      <tspan x="20" y="260">with each phase building on the previous one.</tspan>
    </text>
  </rect>
  <rect x="20" y="300" width="380" height="120" fill="#FFFFFF" rx="10">
    <animate attributeName="opacity" dur="1000ms" begin="2s" repeatCount="indefinite"/>
    <text x="20" y="320" font-size="16" font-family="Arial" fill="#000000" text-anchor="start" data-narration="Iterative Development">
      <tspan x="20" y="340">Iterative development breaks down work into small, manageable chunks</tspan>
      <tspan x="20" y="360">and develops each chunk in a short cycle of planning, coding, testing, and review.</tspan>
    </text>
  </rect>
  <rect x="20" y="380" width="380" height="120" fill="#FFFFFF" rx="10">
    <animate attributeName="opacity" dur="1000ms" begin="3s" repeatCount="indefinite"/>
    <text x="20" y="400" font-size="16" font-family="Arial" fill="#000000" text-anchor="start" data-narration="Flexibility">
      <tspan x="20" y="420">Flexibility involves being prepared to change direction or adjust scope</tspan>
      <tspan x="20" y="440">as circumstances change.</tspan>
    </text>
  </rect>
  <rect x="20" y="460" width="380" height="120" fill="#FFFFFF" rx="10">
    <animate attributeName="opacity" dur="1000ms" begin="4s" repeatCount="indefinite"/>
    <text x="20" y="480" font-size="16" font-family="Arial" fill="#000000" text-anchor="start" data-narration="Collaboration">
      <tspan x="20" y="500">Collaboration involves involving team members, stakeholders, and customers</tspan>
      <tspan x="20" y="520">in the development process to ensure everyone is aligned and informed.</tspan>
    </text>
  </rect>
  <rect x="20" y="540" width="380" height="120" fill="#FFFFFF" rx="10">
    <animate attributeName="opacity" dur="1000ms" begin="5s" repeatCount="indefinite"/>
    <text x="20" y="560" font-size="16" font-family="Arial" fill="#000000" text-anchor="start" data-narration="Continuous Improvement">
      <tspan x="20" y="580">Continuous improvement involves regularly reflecting on the development process</tspan>
      <tspan x="20" y="600">and identifying opportunities for improvement.</tspan>
    </text>
  </rect>
  <g transform="translate(20, 60)">
    <rect x="0" y="0" width="10" height="120" fill="#000000"/>
    <text x="5" y="10" font-size="12" font-family="Arial" fill="#FFFFFF" text-anchor="start">Agile Framework</text>
  </g>
  <g transform="translate(20, 200)">
    <rect x="0" y="0" width="10" height="120" fill="#000000"/>
    <text x="5" y="10" font-size="12" font-family="Arial" fill="#FFFFFF" text-anchor="start">Waterfall Framework</text>
  </g>
  <g transform="translate(20, 300)">
    <rect x="0" y="0" width="10" height="120" fill="#000000"/>
    <text x="5" y="10" font-size="12" font-family="Arial" fill="#FFFFFF" text-anchor="start">Iterative Development</text>
  </g>
  <g transform="translate(20, 380)">
    <rect x="0" y="0" width="10" height="120" fill="#000000"/>
    <text x="5" y="10" font-size="12" font-family="Arial" fill="#FFFFFF" text-anchor="start">Flexibility</text>
  </g>
  <g transform="translate(20, 460)">
    <rect x="0" y="0" width="10" height="120" fill="#000000"/>
    <text x="5" y="10" font-size="12" font-family="Arial" fill="#FFFFFF" text-anchor="start">Collaboration</text>
  </g>
  <g transform="translate(20, 540)">
    <rect x="0" y="0" width="10" height="120" fill="#000000"/>
    <text x="5" y="10" font-size="12" font-family="Arial" fill="#FFFFFF" text-anchor="start">Continuous Improvement</text>
  </g>
  <line x1="20" y1="60" x2="20" y2="380" stroke="#000000" stroke-width="2"/>
</svg>