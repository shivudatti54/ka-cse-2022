<svg width="420" height="400" data-topic-id="agility" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1" />
      <stop offset="50%" stop-color="#33CC66" stop-opacity="1" />
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <title>Agile Development: What is Agility?</title>
  <rect x="10" y="10" width="400" height="300" fill="url(#gradient)" rx="10" />
  <g opacity="0.8" transform="translate(20, 50)">
