      <text x="10" y="360" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#FFFFFF" font-weight="bold">
        <tspan data-narration="Stay Updated on Agile Development" font-weight="bold">Stay Updated on Agile Development</tspan>
      </text>
