    <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#FFFFFF">
      <tspan data-narration="What is Agility?" font-weight="bold">What is Agility?</tspan>
    </text>
  </g>
  <g opacity="0.6" transform="translate(150, 50)">
