<svg 
  width="420" 
  height="400" 
  data-topic-id="principles-that-guide-practice-software-engineering" 
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 420 400"
  style="background-color: #68b7d2">

  <!-- Header Section -->
  <rect 
    x="10" 
    y="10" 
    width="400" 
    height="30" 
    style="fill: #56b3fa; opacity: 0.8;">

  <animateTransform 
    attributeName="transform" 
    type="rotate" 
    from="0, 200, 180" 
    to="0, 200, 200" 
    dur="5s" 
    repeatCount="indefinite" 
    begin="0s" 
    fill="freeze">

  </animateTransform>
  </rect>

  <!-- Title Section -->
  <rect 
    x="20" 
    y="40" 
    width="80" 
    height="20" 
    style="fill: #56b3fa; opacity: 0.8;">

  <text 
    x="50" 
    y="60" 
    font-size="14" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="middle" 
    style="opacity: 1;">

    Principles That Guide Practice Software Engineering
  </text>
  </rect>

  <!-- Section 1: Abstraction -->
  <rect 
    x="10" 
    y="80" 
    width="400" 
    height="120" 
    style="fill: #f7f7f7; opacity: 0.9;">

  <animate 
    attributeName="opacity" 
    from="0.9" 
    to="1" 
    dur="2s" 
    begin="0s" 
    repeatCount="indefinite" 
    fill="freeze">

  </animate>

  <text 
    x="20" 
    y="90" 
    font-size="12" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="start" 
    style="opacity: 1;">

    Abstraction
  </text>

  <text 
    x="20" 
    y="110" 
    font-size="12" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="start" 
    style="opacity: 1;">

    Definition: Abstraction is the process of hiding the implementation details of a system and showing only the necessary information to the outside world.
  </text>

  <rect 
    x="50" 
    y="120" 
    width="20" 
    height="20" 
    style="fill: #56b3fa; opacity: 0.8;">

  <animate 
    attributeName="opacity" 
    from="0.8" 
    to="1" 
    dur="1s" 
    begin="0s" 
    repeatCount="indefinite" 
    fill="freeze">

  </animate>

  </rect>

  <path 
    d="M 120,140 L 120,170" 
    style="stroke: #56b3fa; stroke-width: 2; stroke-dasharray: 5,5; fill: none; opacity: 0.8;">

  </path>

  <text 
    x="150" 
    y="150" 
    font-size="12" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="middle" 
    style="opacity: 1;">

    Example: A car's air conditioning system can be abstracted as a simple control unit that provides a convenient way to control the temperature inside the car.
  </text>
  </rect>

  <!-- Section 2: Encapsulation -->
  <rect 
    x="10" 
    y="210" 
    width="400" 
    height="120" 
    style="fill: #f7f7f7; opacity: 0.9;">

  <animate 
    attributeName="opacity" 
    from="0.9" 
    to="1" 
    dur="2s" 
    begin="0s" 
    repeatCount="indefinite" 
    fill="freeze">

  </animate>

  <text 
    x="20" 
    y="220" 
    font-size="12" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="start" 
    style="opacity: 1;">

    Encapsulation
  </text>

  <text 
    x="20" 
    y="240" 
    font-size="12" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="start" 
    style="opacity: 1;">

    Definition: Encapsulation is the process of bundling data and methods that operate on that data within a single unit, such as a class or module.
  </text>

  <rect 
    x="50" 
    y="250" 
    width="20" 
    height="20" 
    style="fill: #56b3fa; opacity: 0.8;">

  <animate 
    attributeName="opacity" 
    from="0.8" 
    to="1" 
    dur="1s" 
    begin="0s" 
    repeatCount="indefinite" 
    fill="freeze">

  </animate>

  </rect>

  <path 
    d="M 120,260 L 120,290" 
    style="stroke: #56b3fa; stroke-width: 2; stroke-dasharray: 5,5; fill: none; opacity: 0.8;">

  </path>

  <text 
    x="150" 
    y="270" 
    font-size="12" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="middle" 
    style="opacity: 1;">

    Example: A bank account class encapsulates the account balance and provides methods to deposit, withdraw, and check the balance.
  </text>
  </rect>

  <!-- Section 3: Separation of Concerns -->
  <rect 
    x="10" 
    y="310" 
    width="400" 
    height="120" 
    style="fill: #f7f7f7; opacity: 0.9;">

  <animate 
    attributeName="opacity" 
    from="0.9" 
    to="1" 
    dur="2s" 
    begin="0s" 
    repeatCount="indefinite" 
    fill="freeze">

  </animate>

  <text 
    x="20" 
    y="320" 
    font-size="12" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="start" 
    style="opacity: 1;">

    Separation of Concerns
  </text>

  <text 
    x="20" 
    y="340" 
    font-size="12" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="start" 
    style="opacity: 1;">

    Definition: Separation of Concerns is the practice of dividing a system into smaller, independent components that are easier to understand, maintain, and test.
  </text>

  <rect 
    x="50" 
    y="350" 
    width="20" 
    height="20" 
    style="fill: #56b3fa; opacity: 0.8;">

  <animate 
    attributeName="opacity" 
    from="0.8" 
    to="1" 
    dur="1s" 
    begin="0s" 
    repeatCount="indefinite" 
    fill="freeze">

  </animate>

  </rect>

  <path 
    d="M 120,360 L 120,390" 
    style="stroke: #56b3fa; stroke-width: 2; stroke-dasharray: 5,5; fill: none; opacity: 0.8;">

  </path>

  <text 
    x="150" 
    y="370" 
    font-size="12" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="middle" 
    style="opacity: 1;">

    Example: A web application can be separated into independent modules for user authentication, payment processing, and content management.
  </text>
  </rect>

  <!-- Section 4: Test-Driven Development -->
  <rect 
    x="10" 
    y="410" 
    width="400" 
    height="120" 
    style="fill: #f7f7f7; opacity: 0.9;">

  <animate 
    attributeName="opacity" 
    from="0.9" 
    to="1" 
    dur="2s" 
    begin="0s" 
    repeatCount="indefinite" 
    fill="freeze">

  </animate>

  <text 
    x="20" 
    y="420" 
    font-size="12" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="start" 
    style="opacity: 1;">

    Test-Driven Development
  </text>

  <text 
    x="20" 
    y="440" 
    font-size="12" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="start" 
    style="opacity: 1;">

    Definition: Test-Driven Development (TDD) is a software development process in which software is developed from a set of test cases before the actual software is written.
  </text>

  <rect 
    x="50" 
    y="450" 
    width="20" 
    height="20" 
    style="fill: #56b3fa; opacity: 0.8;">

  <animate 
    attributeName="opacity" 
    from="0.8" 
    to="1" 
    dur="1s" 
    begin="0s" 
    repeatCount="indefinite" 
    fill="freeze">

  </animate>

  </rect>

  <path 
    d="M 120,460 L 120,490" 
    style="stroke: #56b3fa; stroke-width: 2; stroke-dasharray: 5,5; fill: none; opacity: 0.8;">

  </path>

  <text 
    x="150" 
    y="470" 
    font-size="12" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="middle" 
    style="opacity: 1;">

    Example: A developer writes test cases for a new feature before writing the actual code.
  </text>
  </rect>

  <!-- Section 5: Continuous Integration -->
  <rect 
    x="10" 
    y="510" 
    width="400" 
    height="120" 
    style="fill: #f7f7f7; opacity: 0.9;">

  <animate 
    attributeName="opacity" 
    from="0.9" 
    to="1" 
    dur="2s" 
    begin="0s" 
    repeatCount="indefinite" 
    fill="freeze">

  </animate>

  <text 
    x="20" 
    y="520" 
    font-size="12" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="start" 
    style="opacity: 1;">

    Continuous Integration
  </text>

  <text 
    x="20" 
    y="540" 
    font-size="12" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="start" 
    style="opacity: 1;">

    Definition: Continuous Integration is the practice of integrating code changes into a central repository frequently, usually through automated builds and tests.
  </text>

  <rect 
    x="50" 
    y="550" 
    width="20" 
    height="20" 
    style="fill: #56b3fa; opacity: 0.8;">

  <animate 
    attributeName="opacity" 
    from="0.8" 
    to="1" 
    dur="1s" 
    begin="0s" 
    repeatCount="indefinite" 
    fill="freeze">

  </animate>

  </rect>

  <path 
    d="M 120,560 L 120,590" 
    style="stroke: #56b3fa; stroke-width: 2; stroke-dasharray: 5,5; fill: none; opacity: 0.8;">

  </path>

  <text 
    x="150" 
    y="570" 
    font-size="12" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="middle" 
    style="opacity: 1;">

    Example: A developer writes code changes and pushes them to a central repository, which triggers an automated build and test process.
  </text>
  </rect>

  <!-- Section 6: Code Reviews -->
  <rect 
    x="10" 
    y="610" 
    width="400" 
    height="120" 
    style="fill: #f7f7f7; opacity: 0.9;">

  <animate 
    attributeName="opacity" 
    from="0.9" 
    to="1" 
    dur="2s" 
    begin="0s" 
    repeatCount="indefinite" 
    fill="freeze">

  </animate>

  <text 
    x="20" 
    y="620" 
    font-size="12" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="start" 
    style="opacity: 1;">

    Code Reviews
  </text>

  <text 
    x="20" 
    y="640" 
    font-size="12" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="start" 
    style="opacity: 1;">

    Definition: Code Reviews are peer evaluations of code that are conducted to ensure that the code meets quality standards and is maintainable.
  </text>

  <rect 
    x="50" 
    y="650" 
    width="20" 
    height="20" 
    style="fill: #56b3fa; opacity: 0.8;">

  <animate 
    attributeName="opacity" 
    from="0.8" 
    to="1" 
    dur="1s" 
    begin="0s" 
    repeatCount="indefinite" 
    fill="freeze">

  </animate>

  </rect>

  <path 
    d="M 120,660 L 120,690" 
    style="stroke: #56b3fa; stroke-width: 2; stroke-dasharray: 5,5; fill: none; opacity: 0.8;">

  </path>

  <text 
    x="150" 
    y="670" 
    font-size="12" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="middle" 
    style="opacity: 1;">

    Example: A team of developers reviews the code written by another developer before it is merged into the main repository.
  </text>
  </rect>

  <!-- Footer Section -->
  <rect 
    x="10" 
    y="710" 
    width="400" 
    height="30" 
    style="fill: #56b3fa; opacity: 0.8;">

  <animate 
    attributeName="opacity" 
    from="0.8" 
    to="1" 
    dur="1s" 
    begin="0s" 
    repeatCount="indefinite" 
    fill="freeze">

  </animate>

  </rect>

  <rect 
    x="20" 
    y="720" 
    width="80" 
    height="20" 
    style="fill: #56b3fa; opacity: 0.8;">

  <animate 
    attributeName="opacity" 
    from="0.8" 
    to="1" 
    dur="1s" 
    begin="0s" 
    repeatCount="indefinite" 
    fill="freeze">

  </animate>

  </rect>

  <text 
    x="50" 
    y="730" 
    font-size="14" 
    font-family="Arial, sans-serif" 
    fill="#000" 
    text-anchor="middle" 
    style="opacity: 1;">

    Learn More
  </text>

  </svg>