<svg width="420" height="400" data-topic-id="Core Principles-Greedy Algorithm Principles" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="fill:rgb(73, 109, 137);opacity: 1;">
    <!-- Gradient background -->
    <defs>
        <linearGradient id="greedy-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="hsl(240, 80%, 50%)" stop-opacity="1"/>
            <stop offset="100%" stop-color="hsl(210, 80%, 50%)" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect fill="url(#greedy-gradient)" rx="10" x="10" y="10" width="400" height="380"/>
    
    <!-- Header -->
    <g id="header">
        <rect x="10" y="10" width="400" height="30" rx="10" fill="white"/>
        <text text-anchor="start" x="15" y="15" font-size="24" fill="white">Core Principles</text>
        <text text-anchor="end" x="395" y="15" font-size="24" fill="white">Greedy Algorithm Principles</text>
    </g>
    
    <!-- Section 1: Introduction to Greedy Algorithms -->
    <g id="section-1">
        <rect x="10" y="40" width="400" height="100" rx="10" fill="white"/>
        <text text-anchor="start" x="15" y="50" font-size="18" fill="black">Introduction to Greedy Algorithms</text>
        <text data-narration="Introduction to Greedy Algorithms" x="15" y="70" font-size="16" fill="black" opacity="0.8"/>
        <rect x="10" y="100" width="400" height="200" rx="10" fill="white"/>
        <text text-anchor="start" x="10" y="110" font-size="18" fill="black">Greedy algorithms are a class of algorithmic techniques that make locally optimal choices at each step with the hope of finding a global optimum.</text>
        <animate begin="1s" dur="2s" attributeName="opacity" from="1" to="0" repeatCount="indefinite"/>
    </g>
    
    <!-- Section 2: Key Properties of Greedy Algorithms -->
    <g id="section-2">
        <rect x="10" y="250" width="400" height="150" rx="10" fill="white"/>
        <text text-anchor="start" x="15" y="260" font-size="18" fill="black">Key Properties of Greedy Algorithms</text>
        <text data-narration="The greedy choice property states that a globally optimal solution can be arrived at by making a locally optimal (greedy) choice." x="15" y="280" font-size="16" fill="black" opacity="0.8"/>
        <rect x="10" y="350" width="400" height="50" rx="10" fill="white"/>
        <text text-anchor="start" x="10" y="360" font-size="18" fill="black">Greedy algorithms are particularly effective for problems that exhibit the following two key properties: the greedy choice property and optimal substructure.</text>
        <text data-narration="The greedy choice property states that a globally optimal solution can be arrived at by making a locally optimal (greedy) choice." x="10" y="380" font-size="16" fill="black" opacity="0.8"/>
        <text data-narration="A problem exhibits optimal substructure if an optimal solution to the problem contains optimal solutions to its subproblems." x="10" y="400" font-size="16" fill="black" opacity="0.8"/>
        <animate begin="2s" dur="2s" attributeName="opacity" from="1" to="0" repeatCount="indefinite"/>
    </g>
    
    <!-- Section 3: Comparison with Other Paradigms -->
    <g id="section-3">
        <rect x="10" y="510" width="400" height="150" rx="10" fill="white"/>
        <text text-anchor="start" x="15" y="520" font-size="18" fill="black">Comparison with Other Paradigms</text>
        <text data-narration="| Feature        | Greedy Algorithms            | Dynamic Programming |" x="15" y="540" font-size="16" fill="black" opacity="0.8"/>
        <text data-narration="| Greedy Choice Property | Yes                        | No                     |" x="15" y="560" font-size="16" fill="black" opacity="0.8"/>
        <text data-narration="| Optimal Substructure | Yes                        | Yes                     |" x="15" y="580" font-size="16" fill="black" opacity="0.8"/>
        <rect x="10" y="680" width="400" height="50" rx="10" fill="white"/>
        <text text-anchor="start" x="10" y="690" font-size="18" fill="black">Greedy algorithms are often simpler and faster than dynamic programming, but may not always find the optimal solution.</text>
        <animate begin="4s" dur="2s" attributeName="opacity" from="1" to="0" repeatCount="indefinite"/>
    </g>
    
    <!-- Footer -->
    <g id="footer">
        <text text-anchor="start" x="10" y="390" font-size="18" fill="white">2023</text>
    </g>
</svg>