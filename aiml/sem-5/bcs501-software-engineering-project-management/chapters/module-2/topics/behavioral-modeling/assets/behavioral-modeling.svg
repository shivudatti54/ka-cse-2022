<svg width="420" height="400" data-topic-id="behavioral-modeling" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Add some basic styling */
    * {
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    /* Define colors */
    .pastel-purple { background-color: #C7B8EA; }
    .pastel-teal { background-color: #66CCCC; }
    .orange-accent { color: #FF9900; }
  </style>

  <!-- Background gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Gradient background -->
  <rect width="100%" height="100%" fill="url(#gradient)" rx="10" />

  <!-- Title -->
  <text x="50%" y="20%" font-size="24px" font-weight="bold" text-anchor="middle" fill="#333333">
    Behavioral Modeling
  </text>

  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="10%" y="50%" width="80%" height="30%" fill="#F7F7F7" rx="5" />
    <text x="15%" y="60%" font-size="18px" text-anchor="middle" fill="#666666">
      Behavior Monitoring Tools
    </text>
    <rect x="10%" y="70%" width="80%" height="20%" fill="#F7F7F7" rx="5" />
    <text x="15%" y="80%" font-size="18px" text-anchor="middle" fill="#666666">
      Capture runtime behavior of malware
    </text>
  </section>

  <!-- Section 2: Principle of Execution Monitoring -->
  <section data-narration="The Principle of Execution Monitoring">
    <rect x="10%" y="100%" width="80%" height="30%" fill="#F7F7F7" rx="5" />
    <text x="15%" y="110%" font-size="18px" text-anchor="middle" fill="#666666">
      Run malware and observe its behavior
    </text>
    <rect x="10%" y="120%" width="80%" height="20%" fill="#F7F7F7" rx="5" />
    <text x="15%" y="130%" font-size="18px" text-anchor="middle" fill="#666666">
      Capture system calls and interactions
    </text>
  </section>

  <!-- Section 3: System Call Interception -->
  <section data-narration="System Call Interception">
    <rect x="10%" y="150%" width="80%" height="30%" fill="#F7F7F7" rx="5" />
    <text x="15%" y="160%" font-size="18px" text-anchor="middle" fill="#666666">
      In-line Hooking and SSDT Hooking
    </text>
    <rect x="10%" y="170%" width="80%" height="20%" fill="#F7F7F7" rx="5" />
    <text x="15%" y="180%" font-size="18px" text-anchor="middle" fill="#666666">
      Modify system call functions and kernel structures
    </text>
  </section>

  <!-- Section 4: Analysis Environment -->
  <section data-narration="Analysis Environment: Sandbox">
    <rect x="10%" y="200%" width="80%" height="30%" fill="#F7F7F7" rx="5" />
    <text x="15%" y="210%" font-size="18px" text-anchor="middle" fill="#666666">
      Controlled environment for safe analysis
    </text>
    <rect x="10%" y="220%" width="80%" height="20%" fill="#F7F7F7" rx="5" />
    <text x="15%" y="230%" font-size="18px" text-anchor="middle" fill="#666666">
      Prevent harm to the analysis system
    </text>
  </section>

  <!-- Section 5: Connections -->
  <section data-narration="Connections and Interactions">
    <rect x="10%" y="260%" width="80%" height="30%" fill="#F7F7F7" rx="5" />
    <text x="15%" y="270%" font-size="18px" text-anchor="middle" fill="#666666">
      Capture and log system calls and interactions
    </text>
    <rect x="10%" y="280%" width="80%" height="20%" fill="#F7F7F7" rx="5" />
    <text x="15%" y="290%" font-size="18px" text-anchor="middle" fill="#666666">
      Visualize and analyze malware behavior
    </text>
  </section>

  <!-- Section 6: Conclusion -->
  <section data-narration="Conclusion">
    <rect x="10%" y="320%" width="80%" height="30%" fill="#F7F7F7" rx="5" />
    <text x="15%" y="330%" font-size="18px" text-anchor="middle" fill="#666666">
      Behavior Modeling for effective malware analysis
    </text>
  </section>

  <!-- Animation -->
  <animate xmlns="http://www.w3.org/2000/svg"dur="10000">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 400" begin="0s" dur="5000" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="translate" from="0 400" to="0 0" begin="5000s" dur="5000" repeatCount="indefinite" />
  </animate>

  <!-- Arrow markers -->
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="10">
    <path d="M5 5 L10 10 L15 5" fill="#FF9900" />
  </svg>