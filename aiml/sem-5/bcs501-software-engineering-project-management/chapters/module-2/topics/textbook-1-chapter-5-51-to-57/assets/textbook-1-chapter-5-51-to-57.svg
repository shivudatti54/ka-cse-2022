<svg width="420" height="400"
     data-topic-id="topic1"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     style="background-color: #C7B8EA;">

  <!--Title Section-->
  <rect x="50" y="20" width="320" height="40" fill="#3498DB" rx="5"/>
  <text x="100" y="35" font-size="24" font-family="Arial" fill="#fff">Chapter 5: Requirements Engineering</text>

  <!--Section 1: Stakeholder Analysis-->
  <section data-narration="This is the first section" x="50" y="70" width="320" height="120" fill="#F1E6F2" rx="5" style="opacity: 0.8;">
    <animate begin="0s" dur="2s" fill="freeze" attributeName="opacity" from="0.8" to="1"/>
    <g transform="rotate(0 170 90)">
      <rect x="100" y="50" width="120" height="60" fill="#F1E6F2" rx="5"/>
      <text x="140" y="75" font-size="16" font-family="Arial" fill="#666" text-anchor="end">Identify stakeholders and their interests</text>
      <line x1="170" y1="90" x2="170" y2="120" stroke="#666" stroke-width="2"/>
    </g>
  </section>

  <!--Section 2: Requirements Gathering-->
  <section data-narration="This is the second section" x="50" y="200" width="320" height="120" fill="#F1E6F2" rx="5" style="opacity: 0.8;">
    <animate begin="2s" dur="2s" fill="freeze" attributeName="opacity" from="0.8" to="1"/>
    <g transform="rotate(0 170 90)">
      <rect x="100" y="50" width="120" height="60" fill="#F1E6F2" rx="5"/>
      <text x="140" y="75" font-size="16" font-family="Arial" fill="#666" text-anchor="end">Gather requirements through interviews, surveys, and reviews</text>
      <line x1="170" y1="90" x2="170" y2="120" stroke="#666" stroke-width="2"/>
    </g>
  </section>

  <!--Section 3: Requirements Documentation-->
  <section data-narration="This is the third section" x="50" y="330" width="320" height="120" fill="#F1E6F2" rx="5" style="opacity: 0.8;">
    <animate begin="4s" dur="2s" fill="freeze" attributeName="opacity" from="0.8" to="1"/>
    <g transform="rotate(0 170 90)">
      <rect x="100" y="50" width="120" height="60" fill="#F1E6F2" rx="5"/>
      <text x="140" y="75" font-size="16" font-family="Arial" fill="#666" text-anchor="end">Document requirements in a clear and unambiguous manner</text>
      <line x1="170" y1="90" x2="170" y2="120" stroke="#666" stroke-width="2"/>
    </g>
  </section>

  <!--Section 4: Requirements Validation-->
  <section data-narration="This is the fourth section" x="50" y="470" width="320" height="120" fill="#F1E6F2" rx="5" style="opacity: 0.8;">
    <animate begin="6s" dur="2s" fill="freeze" attributeName="opacity" from="0.8" to="1"/>
    <g transform="rotate(0 170 90)">
      <rect x="100" y="50" width="120" height="60" fill="#F1E6F2" rx="5"/>
      <text x="140" y="75" font-size="16" font-family="Arial" fill="#666" text-anchor="end">Validate requirements with stakeholders</text>
      <line x1="170" y1="90" x2="170" y2="120" stroke="#666" stroke-width="2"/>
    </g>
  </section>

  <!--Footer Section-->
  <rect x="50" y="510" width="320" height="40" fill="#3498DB" rx="5"/>
  <text x="100" y="525" font-size="24" font-family="Arial" fill="#fff">Chapter 5: Requirements Engineering</text>

</svg>