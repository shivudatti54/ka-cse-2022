<svg width="420" height="400" data-topic-id="software-testing-methods-and-agile-methodology">
  <style>
    /* Add a gradient background with pastel colors */
    background-color: #C7B8EA;
    background-image: linear-gradient(to bottom, #C7B8EA, #87CEEB);
  </style>
  <!-- Title -->
  <title>Software Testing Methods and Agile Methodology</title>
  <!-- Footer -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" style="fill: rgba(255, 255, 255, 0.8);"/>
  <rect x="10" y="10" width="400" height="1" style="fill: #87CEEB;"/>
  <rect x="10" y="320" width="400" height="1" style="fill: #87CEEB;"/>
  <!-- Section 1 -->
  <rect x="10" y="30" width="400" height="100" style="fill: #F7F7F7;"/>
  <g transform="translate(10, 30)">
    <text data-narration="What is Software Testing?" x="10" y="20" font-size="18" font-family="Arial" fill="#333333">What is Software Testing?</text>
    <text x="10" y="50" font-size="14" font-family="Arial" fill="#666666">Software testing is the process of evaluating software products to ensure they meet the required standards and specifications.</text>
  </g>
  <animate transform="translate(10, 30) rotate(90)" begin="0s" dur="2s" repeat="forever"/>
  <!-- Section 2 -->
  <rect x="10" y="140" width="400" height="100" style="fill: #F7F7F7;"/>
  <g transform="translate(10, 140)">
    <text data-narration="Black Box Testing" x="10" y="130" font-size="18" font-family="Arial" fill="#333333">Black Box Testing</text>
    <text x="10" y="160" font-size="14" font-family="Arial" fill="#666666">Definition: This type of testing focuses on the input and output of the software without knowing the internal workings.</text>
    <rect x="20" y="150" width="30" height="30" style="fill: #87CEEB; fill-opacity: 0.5;"/>
    <animate transform="translate(20, 150) rotate(90)" begin="1s" dur="2s" repeat="forever"/>
  </g>
  <rect x="10" y="140" width="400" height="1" style="fill: #87CEEB;"/>
  <!-- Section 3 -->
  <rect x="10" y="240" width="400" height="100" style="fill: #F7F7F7;"/>
  <g transform="translate(10, 240)">
    <text data-narration="White Box Testing" x="10" y="230" font-size="18" font-family="Arial" fill="#333333">White Box Testing</text>
    <text x="10" y="260" font-size="14" font-family="Arial" fill="#666666">Definition: This type of testing involves examining the internal workings of the software to identify defects.</text>
    <rect x="20" y="250" width="30" height="30" style="fill: #87CEEB; fill-opacity: 0.5;"/>
    <animate transform="translate(20, 250) rotate(90)" begin="3s" dur="2s" repeat="forever"/>
  </g>
  <rect x="10" y="240" width="400" height="1" style="fill: #87CEEB;"/>
  <!-- Section 4 -->
  <rect x="10" y="340" width="400" height="100" style="fill: #F7F7F7;"/>
  <g transform="translate(10, 340)">
    <text data-narration="Gray Box Testing" x="10" y="330" font-size="18" font-family="Arial" fill="#333333">Gray Box Testing</text>
    <text x="10" y="360" font-size="14" font-family="Arial" fill="#666666">Definition: This type of testing involves a combination of black box and white box testing.</text>
    <rect x="20" y="350" width="30" height="30" style="fill: #87CEEB; fill-opacity: 0.5;"/>
    <animate transform="translate(20, 350) rotate(90)" begin="5s" dur="2s" repeat="forever"/>
  </g>
  <rect x="10" y="340" width="400" height="1" style="fill: #87CEEB;"/>
  <!-- Annotation -->
  <rect x="10" y="10" width="400" height="1" style="fill: #87CEEB;"/>
  <path d="M 10,10 L 20,5 L 30,10" style="stroke: #87CEEB; stroke-width: 2; fill: none"/>
  <path d="M 10,35 L 20,40 L 30,35" style="stroke: #87CEEB; stroke-width: 2; fill: none"/>
  <path d="M 150,10 L 160,5 L 170,10" style="stroke: #87CEEB; stroke-width: 2; fill: none"/>
  <path d="M 150,35 L 160,40 L 170,35" style="stroke: #87CEEB; stroke-width: 2; fill: none"/>
</svg>