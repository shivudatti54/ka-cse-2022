<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1" />
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="380" height="300" fill="url(#gradient)" rx="10" />
  <text x="20" y="10" font-size="24" font-family="Arial" text-anchor="middle" fill="#000000">Functional and Nonfunctional Requirements</text>
  <rect x="20" y="50" width="340" height="50" fill="#F0F0F0" rx="10" />
  <text x="20" y="50" font-size="18" font-family="Arial" text-anchor="middle" fill="#000000">Functional Requirements</text>
  <rect x="60" y="50" width="280" height="50" fill="#F0F0F0" rx="10" />
  <text x="70" y="50" font-size="18" font-family="Arial" text-anchor="middle" fill="#000000">Nonfunctional Requirements</text>
  <rect x="20" y="110" width="380" height="50" fill="#F0F0F0" rx="10" />
  <text x="20" y="110" font-size="18" font-family="Arial" text-anchor="middle" fill="#000000">Primary Functional Requirements</text>
  <rect x="60" y="110" width="280" height="50" fill="#F0F0F0" rx="10" />
  <text x="70" y="110" font-size="18" font-family="Arial" text-anchor="middle" fill="#000000">Secondary Functional Requirements</text>
  <rect x="20" y="170" width="380" height="50" fill="#F0F0F0" rx="10" />
  <text x="20" y="170" font-size="18" font-family="Arial" text-anchor="middle" fill="#000000">Enhancement Functional Requirements</text>
  <rect x="20" y="230" width="380" height="50" fill="#F0F0F0" rx="10" />
  <text x="20" y="230" font-size="18" font-family="Arial" text-anchor="middle" fill="#000000">Data Topic ID</text>
  <rect x="20" y="280" width="380" height="50" fill="#F0F0F0" rx="10" />
  <text x="20" y="280" font-size="18" font-family="Arial" text-anchor="middle" fill="#000000">Narration</text>
  <animate xlink:href="#title" begin="0s" dur="2s" repeatCount="indefinite" />
  <animate xlink:href="#footer" begin="2s" dur="2s" repeatCount="indefinite" />
  <path id="title" d="M 20 10 L 380 10 Z" fill="#000000" stroke="#000000" stroke-width="2" />
  <path id="footer" d="M 20 390 L 380 390 Z" fill="#000000" stroke="#000000" stroke-width="2" />
  <rect x="20" y="20" width="380" height="350" fill="white" rx="10" />
  <rect x="20" y="20" width="380" height="350" stroke="#000000" stroke-width="2" rx="10" />
  <rect x="20" y="20" width="380" height="350" fill="#F0F0F0" rx="10" />
  <rect x="290" y="20" width="120" height="350" fill="#F0F0F0" rx="10" />
  <path d="M 30,50 L 90,70 L 110,70 L 150,50 L 180,50 Z" fill="#000000" stroke="#000000" stroke-width="2" />
  <path d="M 30,100 L 90,120 L 110,120 L 150,100 L 180,100 Z" fill="#000000" stroke="#000000" stroke-width="2" />
  <path d="M 30,150 L 90,170 L 110,170 L 150,150 L 180,150 Z" fill="#000000" stroke="#000000" stroke-width="2" />
  <path d="M 30,200 L 90,220 L 110,220 L 150,200 L 180,200 Z" fill="#000000" stroke="#000000" stroke-width="2" />
  <g transform="translate(40, 40)">
    <rect x="0" y="0" width="100" height="50" fill="#F0F0F0" rx="10" />
    <text x="5" y="5" font-size="12" font-family="Arial" text-anchor="middle" fill="#000000">Functional Requirements</text>
    <rect x="120" y="0" width="100" height="50" fill="#F0F0F0" rx="10" />
    <text x="125" y="5" font-size="12" font-family="Arial" text-anchor="middle" fill="#000000">Nonfunctional Requirements</text>
    <rect x="240" y="0" width="100" height="50" fill="#F0F0F0" rx="10" />
    <text x="245" y="5" font-size="12" font-family="Arial" text-anchor="middle" fill="#000000">Data Topic ID</text>
    <rect x="360" y="0" width="100" height="50" fill="#F0F0F0" rx="10" />
    <text x="365" y="5" font-size="12" font-family="Arial" text-anchor="middle" fill="#000000">Narration</text>
  </g>
</svg>