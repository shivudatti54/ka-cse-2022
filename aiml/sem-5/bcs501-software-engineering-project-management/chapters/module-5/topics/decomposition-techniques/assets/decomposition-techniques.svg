<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="decomposition-techniques" data-slugified-name="decomposition-techniques">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A2D9F5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title at top -->
  <text x="20" y="20" font-size="24" font-family="Arial, sans-serif" font-weight="bold" text-anchor="start">
    Decomposition Techniques
  </text>
  
  <!-- Section 1: What is Decomposition? -->
  <section id="what-is-decomposition" data-narration="This is where the concept of decomposition is explained">
    <rect x="20" y="80" width="380" height="120" fill="#F0F0F0" rx="10"/>
    <text x="20" y="100" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      What is Decomposition?
    </text>
    <text x="20" y="130" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      Decomposition is the process of breaking down a relation into smaller relations to eliminate redundancy and anomalies while preserving data integrity.
    </text>
  </section>
  
  <!-- Section 2: Goals of Decomposition -->
  <section id="goals-of-decomposition" data-narration="This is where the goals of decomposition are explained">
    <rect x="20" y="220" width="380" height="120" fill="#F0F0F0" rx="10"/>
    <text x="20" y="240" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      Goals of Decomposition
    </text>
    <text x="20" y="270" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      1. Eliminate redundancy - Remove duplicate data
      2. Prevent anomalies - Avoid insert, update, delete anomalies
      3. Preserve information - No data loss (lossless join)
      4. Preserve dependencies - Maintain all functional dependencies
    </text>
  </section>
  
  <!-- Section 3: Types of Decomposition -->
  <section id="types-of-decomposition" data-narration="This is where the types of decomposition are explained">
    <rect x="20" y="320" width="380" height="120" fill="#F0F0F0" rx="10"/>
    <text x="20" y="340" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      Types of Decomposition
    </text>
    <text x="20" y="370" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      1. Lossless-Join Decomposition
      2. Dependency-Preserving Decomposition
    </text>
    <text x="20" y="400" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      <animate transform="rotate(360 20 400)" begin="400ms" dur="4000ms" repeatCount="indefinite"/>
    </text>
  </section>
  
  <!-- Section 4: BCNF Decomposition Algorithm -->
  <section id="bcnf-decomposition-algorithm" data-narration="This is where the BCNF decomposition algorithm is explained">
    <rect x="20" y="440" width="380" height="120" fill="#F0F0F0" rx="10"/>
    <text x="20" y="460" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    BCNF Decomposition Algorithm
  </text>
  <text x="20" y="490" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    1. If R is in BCNF, return {R}
    2. Find violating FD: X → Y where X is not a superkey
    3. Decompose R into:
      - R1 = X ∪ Y
      - R2 = R - (Y - X)
    4. Recursively decompose R1 and R2
  </text>
  <text x="20" y="520" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    <animate transform="rotate(360 20 520)" begin="800ms" dur="4000ms" repeatCount="indefinite"/>
  </text>
  </section>
  
  <!-- Section 5: Example: BCNF Decomposition -->
  <section id="example-bcnf-decomposition" data-narration="This is where the example of BCNF decomposition is explained">
    <rect x="20" y="620" width="380" height="120" fill="#F0F0F0" rx="10"/>
    <text x="20" y="640" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      Example: BCNF Decomposition
  </text>
  <text x="20" y="670" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    Original: Student(SID, Name, DeptID, DeptName, HOD)
    FDs: 
      - SID → Name, DeptID
      - DeptID → DeptName, HOD
    Problem: DeptID → DeptName, HOD violates BCNF (DeptID is not a superkey)
    Decomposition: 
      - R1 = Department(DeptID, DeptName, HOD)
      - R2 = Student(SID, Name, DeptID)
  </text>
  <text x="20" y="700" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    <animate transform="rotate(360 20 700)" begin="1200ms" dur="4000ms" repeatCount="indefinite"/>
  </text>
  </section>
  
  <!-- Section 6: Conclusion -->
  <section id="conclusion" data-narration="This is where the conclusion is explained">
    <rect x="20" y="800" width="380" height="120" fill="#F0F0F0" rx="10"/>
    <text x="20" y="820" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      Conclusion
    </text>
    <text x="20" y="850" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      Decomposition techniques are essential in database normalization to eliminate redundancy and anomalies while preserving data integrity.
    </text>
  </section>
  
  <!-- Arrow markers for connections -->
  <path d="M 20 50 L 60 40" stroke="#0097A7" stroke-width="2"/>
  <path d="M 80 40 L 120 80" stroke="#0097A7" stroke-width="2"/>
  <path d="M 200 80 L 240 120" stroke="#0097A7" stroke-width="2"/>
  <path d="M 320 120 L 360 200" stroke="#0097A7" stroke-width="2"/>
  
  <!-- Clear labels and annotations -->
  <text x="20" y="510" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    <tspan>BCNF Decomposition Algorithm</tspan>
    <tspan>Sequence 1</tspan>
  </text>
  <text x="20" y="540" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    <tspan>Example: BCNF Decomposition</tspan>
    <tspan>Sequence 2</tspan>
  </text>
  <text x="20" y="570" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    <tspan>Conclusion</tspan>
    <tspan>Sequence 3</tspan>
  </text>
  
  <!-- Title at bottom -->
  <text x="20" y="380" font-size="18" font-family="Arial, sans-serif" font-weight="bold" text-anchor="start">
    Decomposition Techniques
  </text>
</svg>