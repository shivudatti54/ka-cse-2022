<svg width="420" height="400" data-topic-id="empirical-estimation-models" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xml:space="preserve">
  <style>
    /* add some basic styling */
    .title {
      font-family: Arial, sans-serif;
      font-size: 24px;
      font-weight: bold;
      color: #2f4f7f;
      margin-bottom: 10px;
    }

    .footer {
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: #666;
      margin-top: 20px;
      text-align: center;
    }

    .section {
      margin-bottom: 20px;
    }

    .section .title {
      font-size: 18px;
      margin-bottom: 5px;
    }

    .section .data-narration {
      font-size: 16px;
      color: #666;
    }

    .section .estimate {
      font-size: 14px;
      color: #666;
    }

    .section .connection {
      stroke: #2f4f7f;
      stroke-width: 2;
      fill: none;
    }

    .section .connection .end {
      stroke: #ff9900;
    }

    .section .connection .start {
      stroke: #2f4f7f;
    }

    .section .arrow {
      stroke: #2f4f7f;
      stroke-width: 2;
      fill: none;
    }

    .section .arrow .head {
      stroke: #ff9900;
    }

    .section .arrow .tail {
      stroke: #ff9900;
    }
  </style>

  <!-- Title -->
  <g class="title">Empirical Estimation Models</g>

  <!-- Background Gradient -->
  <rect x="0" y="0" width="420" height="400" style="fill: #c7e5f5; gradient: linear-gradient(90deg, #a7d8f2, #c7e5f5);"></rect>

  <!-- Planning Poker -->
  <g class="section">
    <g class="title">Planning Poker</g>
    <g class="data-narration">
      Planning Poker is a team-based estimation technique where team members make verbal estimates of the effort required to complete a task.
    </g>
    <g class="estimate">
      Example:
      <g class="connection">
        <circle cx="50" cy="50" r="20" class="end" />
        <line x1="50" y1="50" x2="120" y2="50" class="start" />
        <line x1="50" y1="50" x2="50" y2="120" class="start" />
      </g>
      <g class="data-narration">
        A team member estimates the effort required to fix a bug as "3" (e.g., 1-5 scale).
        <g class="connection">
          <circle cx="120" cy="50" r="20" class="end" />
          <line x1="120" y1="50" x2="210" y2="50" class="start" />
          <line x1="120" y1="50" x2="120" y2="210" class="start" />
        </g>
        Another team member estimates the same effort as "4".
        <g class="connection">
          <circle cx="210" cy="50" r="20" class="end" />
          <line x1="210" y1="50" x2="310" y2="50" class="start" />
          <line x1="210" y1="50" x2="210" y2="310" class="start" />
        </g>
      </g>
  </g>

  <!-- Story Points -->
  <g class="section">
    <g class="title">Story Points</g>
    <g class="data-narration">
      Story Points is a relative estimation technique where estimators assign a relative value to a user story or task based on its complexity.
    </g>
    <g class="estimate">
      Example:
      <g class="connection">
        <circle cx="50" cy="50" r="20" class="end" />
        <line x1="50" y1="50" x2="120" y2="50" class="start" />
        <line x1="50" y1="50" x2="50" y2="120" class="start" />
      </g>
      <g class="data-narration">
        A user story has three acceptance criteria.
        <g class="connection">
          <circle cx="120" cy="50" r="20" class="end" />
          <line x1="120" y1="50" x2="210" y2="50" class="start" />
          <line x1="120" y1="50" x2="120" y2="210" class="start" />
        </g>
        The estimator assigns a story point value of 5 (e.g., 1-13 scale).
      </g>
    </g>
  </g>

  <!-- Six Thinking Hats -->
  <g class="section">
    <g class="title">Six Thinking Hats</g>
    <g class="data-narration">
      Six Thinking Hats is a mental model that encourages team members to consider different perspectives when estimating effort.
    </g>
    <g class="estimate">
      Example:
      <g class="connection">
        <circle cx="50" cy="50" r="20" class="end" />
        <line x1="50" y1="50" x2="120" y2="50" class="start" />
        <line x1="50" y1="50" x2="50" y2="120" class="start" />
      </g>
      <g class="data-narration">
        The team considers different perspectives, such as white hat, red hat, etc.
        <g class="connection">
          <circle cx="120" cy="50" r="20" class="end" />
          <line x1="120" y1="50" x2="210" y2="50" class="start" />
          <line x1="120" y1="50" x2="120" y2="210" class="start" />
        </g>
      </g>
    </g>
  </g>

  <!-- Footer -->
  <g class="footer">
    &copy; 2023 Empirical Estimation Models
  </g>
</svg>