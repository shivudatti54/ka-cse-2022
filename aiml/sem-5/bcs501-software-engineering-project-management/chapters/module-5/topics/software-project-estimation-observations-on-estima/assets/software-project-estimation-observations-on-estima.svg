<svg width="420" height="400" data-topic-id="Software-Project-Estimation-Observations-On-Estima" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xml:space="preserve">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title -->
  <g transform="translate(50, 50)">
    <text x="0" y="100" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#3498db">
      Software Project Estimation: Observations on Estimation
    </text>
  </g>
  
  <!-- Introduction -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="300" height="50" fill="#f9f9f9" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start" fill="#666666">
      Introduction
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,150" to="0,180" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  
  <!-- What is Software Project Estimation? -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="300" height="50" fill="#f9f9f9" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start" fill="#666666">
      What is Software Project Estimation?
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,250" to="0,280" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  
  <!-- Types of Estimation -->
  <g transform="translate(50, 350)">
    <rect x="0" y="0" width="300" height="50" fill="#f9f9f9" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start" fill="#666666">
      Types of Estimation
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,350" to="0,380" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  
  <!-- Estimation Techniques -->
  <g transform="translate(50, 450)">
    <rect x="0" y="0" width="300" height="50" fill="#f9f9f9" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start" fill="#666666">
      Estimation Techniques
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,450" to="0,480" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  
  <!-- Observations on Estimation -->
  <g transform="translate(50, 550)">
    <rect x="0" y="0" width="300" height="50" fill="#f9f9f9" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start" fill="#666666">
      Observations on Estimation
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,550" to="0,580" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  
  <!-- Requirements -->
  <g transform="translate(50, 650)">
    <rect x="0" y="0" width="300" height="50" fill="#f9f9f9" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start" fill="#666666">
      Requirements
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,650" to="0,680" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  
  <!-- Arrow markers for connections -->
  <g transform="translate(100, 700)">
    <path d="M 0 0 L 100 0" stroke="#ccc" stroke-width="2" fill="none"/>
    <path d="M 100 0 L 200 0" stroke="#ccc" stroke-width="2" fill="none"/>
    <path d="M 200 0 L 300 0" stroke="#ccc" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Footer -->
  <g transform="translate(50, 750)">
    <rect x="0" y="0" width="300" height="50" fill="#f9f9f9" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start" fill="#666666">
      Footer
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,750" to="0,780" dur="2s" begin="0s" repeatCount="indefinite"/>
