<svg width="420" height="400" data-topic-id="software-engineering-project-management">
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4567b7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ed" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <body>
    <g>
      <rect x="0" y="0" width="100%" height="100%" style="fill: url(#background-gradient)"/>
      <text x="50%" y="80%" font-size="24" font-family="Arial" fill="#fff" text-anchor="middle">Project Planning and Quality Management</text>
      <animateTransform attributeName="transform" type="rotate" from="0,50%,50%" to="360,50%,50%" dur="10s" repeatCount="indefinite"/>
    </g>
    <g id="project-planning">
      <rect x="50" y="150" width="200" height="100" style="fill:#f7f7f7" rx="20"/>
      <text x="60%" y="180%" font-size="18" font-family="Arial" fill="#333" text-anchor="middle" data-narration="Project Planning is the process of defining, organizing, and controlling the tasks and resources required to complete a software project." style="opacity:0"/>
      <text x="60%" y="200%" font-size="18" font-family="Arial" fill="#333" text-anchor="middle" data-narration="It ensures that software projects are completed on time, within budget, and meet the required quality standards." style="opacity:0"/>
      <animate duration="1s" begin="0s" repeatCount="1" attributeName="opacity" from="0" to="1"/>
      <animate duration="2s" begin="1s" repeatCount="1" attributeName="opacity" from="1" to="0"/>
    </g>
    <g id="quality-management">
      <rect x="50" y="300" width="200" height="100" style="fill:#f7f7f7" rx="20"/>
      <text x="60%" y="330%" font-size="18" font-family="Arial" fill="#333" text-anchor="middle" data-narration="Quality management is the process of planning, organizing, and controlling the tasks and resources required to deliver high-quality software products." style="opacity:0"/>
      <text x="60%" y="350%" font-size="18" font-family="Arial" fill="#333" text-anchor="middle" data-narration="It ensures that software products meet the required quality standards and are delivered on time." style="opacity:0"/>
      <animate duration="1s" begin="0s" repeatCount="1" attributeName="opacity" from="0" to="1"/>
      <animate duration="2s" begin="1s" repeatCount="1" attributeName="opacity" from="1" to="0"/>
      <line x1="70" y1="250" x2="110" y2="250" style="stroke:#0f0; stroke-width:2; stroke-dasharray:2,2; marker-end:url(#arrow-end)"/>
      <line x1="110" y1="250" x2="70" y2="250" style="stroke:#0f0; stroke-width:2; stroke-dasharray:2,2; marker-end:url(#arrow-end)"/>
      <defs>
        <marker id="arrow-end" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="90">
          <path d="M 0 0 L 10 0 L 5 10 Z"/>
        </marker>
      </defs>
    </g>
  </body>
</svg>