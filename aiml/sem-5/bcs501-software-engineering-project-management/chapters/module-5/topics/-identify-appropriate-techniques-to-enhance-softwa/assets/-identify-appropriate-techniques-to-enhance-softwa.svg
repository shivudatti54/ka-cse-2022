<svg width="420" height="400" data-topic-id="Identifying-Appropriate-Techniques-to-Enhance-Software-Quality">
  <rect x="0" y="0" width="100%" height="100%" fill="#C7B8EA" />
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5CAE9" />
      <stop offset="100%" stop-color="#C7B8EA" />
    </linearGradient>
  </defs>
  <g transform="translate(10, 10)">
    <title>Identifying Appropriate Techniques to Enhance Software Quality</title>
    <rect x="0" y="0" width="400" height="40" fill="#3498DB" />
    <text x="10" y="15" font-size="18" font-weight="bold" fill="#FFFFFF">Introduction</text>
    <rect x="0" y="45" width="400" height="40" fill="#2ECC71" />
    <text x="10" y="50" font-size="18" font-weight="bold" fill="#FFFFFF">Definition of Software Quality</text>
    <section data-narration="Software quality refers to the degree to which a software system satisfies the requirements and expectations of its users, stakeholders, or customers.">
      <rect x="0" y="90" width="400" height="40" fill="#E74C3C" />
      <text x="10" y="95" font-size="18" font-weight="bold" fill="#FFFFFF">Software quality</text>
      <rect x="0" y="125" width="400" height="40" fill="#2ECC71" />
      <text x="10" y="130" font-size="18" font-weight="bold" fill="#FFFFFF">Requirements and expectations</text>
    </section>
    <section data-narration="Test-Driven Development (TDD) is a software development process where tests are written before the actual code is written.">
      <rect x="0" y="180" width="400" height="40" fill="#E74C3C" />
      <text x="10" y="185" font-size="18" font-weight="bold" fill="#FFFFFF">TDD</text>
      <rect x="10" y="215" width="350" height="40" fill="#3498DB" />
      <text x="10" y="220" font-size="18" font-weight="normal" fill="#FFFFFF">Write a test for a specific feature or requirement</text>
      <rect x="10" y="250" width="350" height="40" fill="#2ECC71" />
      <text x="10" y="255" font-size="18" font-weight="normal" fill="#FFFFFF">Write the minimum amount of code required to pass the test</text>
    </section>
    <section data-narration="Continuous Integration and Continuous Deployment (CI/CD) is a software development practice that involves integrating code changes and deploying them to production quickly and reliably.">
      <rect x="0" y="270" width="400" height="40" fill="#E74C3C" />
      <text x="10" y="275" font-size="18" font-weight="bold" fill="#FFFFFF">CI/CD</text>
      <rect x="10" y="305" width="350" height="40" fill="#3498DB" />
      <text x="10" y="310" font-size="18" font-weight="normal" fill="#FFFFFF">Use a CI tool to automate testing and building of code changes</text>
      <rect x="10" y="340" width="350" height="40" fill="#2ECC71" />
      <text x="10" y="345" font-size="18" font-weight="normal" fill="#FFFFFF">Use a CD tool to automate deployment of code changes to production</text>
    </section>
    <section data-narration="Pair programming is a software development practice where two developers work together on the same code, sharing their screens and expertise.">
      <rect x="0" y="370" width="400" height="40" fill="#E74C3C" />
      <text x="10" y="375" font-size="18" font-weight="bold" fill="#FFFFFF">Pair programming</text>
      <rect x="10" y="405" width="350" height="40" fill="#3498DB" />
      <text x="10" y="410" font-size="18" font-weight="normal" fill="#FFFFFF">Two developers work together on the same code</text>
      <rect x="10" y="440" width="350" height="40" fill="#2ECC71" />
      <text x="10" y="445" font-size="18" font-weight="normal" fill="#FFFFFF">Sharing screens and expertise</text>
    </section>
    <footer>
      <rect x="0" y="480" width="400" height="40" fill="#3498DB" />
      <text x="10" y="485" font-size="18" font-weight="bold" fill="#FFFFFF">Footer</text>
    </footer>
    <animate attributeName="opacity" from="1" to="0" dur="5s" repeatCount="indefinite" begin="2s" />
    <animate attributeName="opacity" from="0" to="1" dur="2s" repeatCount="indefinite" begin="6s" />
    <animate attributeName="opacity" from="1" to="0" dur="3s" repeatCount="indefinite" begin="10s" />
  </g>
</svg>