<svg width="420" height="400" data-topic-id="personal-and-team-process-models-textbook-1-chapter">
  <!-- Title Section -->
  <section data-narration="Introduction to Process Models">
    <rect x="10" y="10" width="400" height="20" fill="#3498db" rx="5"/>
    <text x="20" y="25" font-size="18" font-family="Arial" fill="#ffffff">Personal and Team Process Models</text>
  </section>

  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9e4ca"/>
      <stop offset="100%" stop-color="#6594c1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="30" width="420" height="350" fill="url(#pastel-gradient)"/>

  <!-- Types of Process Models Section -->
  <section data-narration="Types of Process Models">
    <rect x="10" y="40" width="400" height="80" fill="#f1c40f" rx="5"/>
    <text x="20" y="55" font-size="14" font-family="Arial" fill="#000000">Waterfall Model</text>
    <animate attributeName="opacity" dur="5s" begin="0s" repeatCount="indefinite" />
    <rect x="150" y="40" width="200" height="80" fill="#e74c3c" rx="5"/>
    <text x="170" y="55" font-size="14" font-family="Arial" fill="#000000">Agile Model</text>
    <animate attributeName="opacity" dur="5s" begin="5s" repeatCount="indefinite" />
    <rect x="370" y="40" width="200" height="80" fill="#2ecc71" rx="5"/>
    <text x="390" y="55" font-size="14" font-family="Arial" fill="#000000">V-Model</text>
    <animate attributeName="opacity" dur="5s" begin="10s" repeatCount="indefinite" />
  </section>

  <!-- Advantages of Process Models Section -->
  <section data-narration="Advantages of Process Models">
    <rect x="10" y="130" width="400" height="80" fill="#2ecc71" rx="5"/>
    <text x="20" y="145" font-size="14" font-family="Arial" fill="#000000">Improved Communication</text>
    <animate attributeName="opacity" dur="5s" begin="0s" repeatCount="indefinite" />
    <rect x="150" y="130" width="200" height="80" fill="#e74c3c" rx="5"/>
    <text x="170" y="145" font-size="14" font-family="Arial" fill="#000000">Increased Efficiency</text>
    <animate attributeName="opacity" dur="5s" begin="5s" repeatCount="indefinite" />
    <rect x="370" y="130" width="200" height="80" fill="#3498db" rx="5"/>
    <text x="390" y="145" font-size="14" font-family="Arial" fill="#000000">Better Risk Management</text>
    <animate attributeName="opacity" dur="5s" begin="10s" repeatCount="indefinite" />
  </section>

  <!-- Disadvantages of Process Models Section -->
  <section data-narration="Disadvantages of Process Models">
    <rect x="10" y="220" width="400" height="80" fill="#e74c3c" rx="5"/>
    <text x="20" y="235" font-size="14" font-family="Arial" fill="#000000">Inflexibility</text>
    <animate attributeName="opacity" dur="5s" begin="0s" repeatCount="indefinite" />
    <rect x="150" y="220" width="200" height="80" fill="#2ecc71" rx="5"/>
    <text x="170" y="235" font-size="14" font-family="Arial" fill="#000000">Over-Engineering</text>
    <animate attributeName="opacity" dur="5s" begin="5s" repeatCount="indefinite" />
    <rect x="370" y="220" width="200" height="80" fill="#3498db" rx="5"/>
    <text x="390" y="235" font-size="14" font-family="Arial" fill="#000000">Higher Upfront Costs</text>
    <animate attributeName="opacity" dur="5s" begin="10s" repeatCount="indefinite" />
  </section>

  <!-- Title and Footer -->
  <rect x="10" y="380" width="400" height="10" fill="#3498db" rx="5"/>
  <text x="20" y="390" font-size="14" font-family="Arial" fill="#ffffff">Personal and Team Process Models</text>
</svg>