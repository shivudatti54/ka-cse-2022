<svg width="420" height="400" data-topic-id="software-and-software-engineering-the-nature-of-so" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="25%" stop-color="#A1C9F2" stop-opacity="1"/>
      <stop offset="50%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="75%" stop-color="#4682B4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3498DB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="10" y="20" font-size="24" font-family="Arial" text-anchor="start" fill="#3498DB">
    Software and Software Engineering: The Nature of Software
  </text>
  
  <!-- Gradient Background -->
  <rect x="0" y="40" width="420" height="340" fill="url(#pastel-gradient)"/>
  
  <!-- Section 1: Definition of Software -->
  <rect x="10" y="50" width="400" height="50" rx="10" fill="#F9F9F9" stroke="#ccc" stroke-width="2"/>
  <text x="15" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#666" data-narration="Definition of Software">
    Software refers to any set of instructions or programs that tell a computer what to do.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 20 20" to="360 20 20" dur="10s" repeatCount="indefinite"/>
  
  <!-- Section 2: Characteristics of Software -->
  <rect x="10" y="120" width="400" height="50" rx="10" fill="#F9F9F9" stroke="#ccc" stroke-width="2"/>
  <text x="15" y="130" font-size="18" font-family="Arial" text-anchor="start" fill="#666" data-narration="Characteristics of Software">
    An intangible product, created by humans, created using various programming languages, and can be modified and updated.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 20 20" to="360 20 20" dur="10s" repeatCount="indefinite"/>
  
  <!-- Section 3: Types of Software -->
  <rect x="10" y="190" width="400" height="50" rx="10" fill="#F9F9F9" stroke="#ccc" stroke-width="2"/>
  <text x="15" y="200" font-size="18" font-family="Arial" text-anchor="start" fill="#666" data-narration="Types of Software">
    System Software, Application Software, and Firmware are the three main types of software.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 20 20" to="360 20 20" dur="10s" repeatCount="indefinite"/>
  
  <!-- Section 4: Unique Nature of WebApps -->
  <rect x="10" y="270" width="400" height="50" rx="10" fill="#F9F9F9" stroke="#ccc" stroke-width="2"/>
  <text x="15" y="280" font-size="18" font-family="Arial" text-anchor="start" fill="#666" data-narration="Unique Nature of WebApps">
    WebApps are software applications that run on the web, using a client-server architecture, dynamic content, and multimedia support.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 20 20" to="360 20 20" dur="10s" repeatCount="indefinite"/>
  
  <!-- Section 5: Advantages of WebApps -->
  <rect x="10" y="340" width="400" height="50" rx="10" fill="#F9F9F9" stroke="#ccc" stroke-width="2"/>
  <text x="15" y="350" font-size="18" font-family="Arial" text-anchor="start" fill="#666" data-narration="Advantages of WebApps">
    WebApps offer accessibility, scalability, and cost-effectiveness.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 20 20" to="360 20 20" dur="10s" repeatCount="indefinite"/>
  
  <!-- Footer -->
  <text x="10" y="390" font-size="18" font-family="Arial" text-anchor="start" fill="#666">
    Created by [Your Name]
  </text>
</svg>