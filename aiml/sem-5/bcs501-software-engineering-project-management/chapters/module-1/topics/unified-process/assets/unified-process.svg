<svg width="420" height="400" data-topic-id="unified-process" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5c6bc0"/>
      <stop offset="100%" stop-color="#45a0e6"/>
    </linearGradient>
    <style>
      .section {
        position: relative;
        margin-bottom: 20px;
      }
      .section rect {
        fill: none;
        stroke: #fff;
        stroke-width: 1px;
      }
      .section rect:nth-child(1) {
        stroke-dasharray: 5, 5;
        stroke-dashoffset: 5;
      }
      .section rect:nth-child(2) {
        stroke-dashoffset: -5;
      }
      .section text {
        fill: #fff;
      }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="380" rx="10" fill="url(#grad)"/>
  <title>Unified Process</title>
  <rect x="15" y="20" width="370" height="30" rx="5" fill="#45a0e6"/>
  <text x="20" y="25" font-size="16" font-family="Arial" text-anchor="middle" fill="#fff">Incident Response Process</text>
  <rect x="15" y="50" width="370" height="150" rx="5" fill="#5c6bc0"/>
  <div class="section">
    <rect x="20" y="55" width="320" height="40" rx="5" fill="#fff"/>
    <text x="25" y="60" font-size="14" font-family="Arial" text-anchor="middle" fill="#fff">Preparation</text>
    <rect x="20" y="75" width="320" height="40" rx="5" fill="#fff"/>
    <text x="25" y="80" font-size="14" font-family="Arial" text-anchor="middle" fill="#fff">Detecting and analyzing the incident</text>
    <rect x="20" y="100" width="320" height="40" rx="5" fill="#fff"/>
    <text x="25" y="105" font-size="14" font-family="Arial" text-anchor="middle" fill="#fff">Identifying the scope and resources required</text>
    <animate transform="rotate(360 20 120)" begin="1s"/>
    <animate transform="rotate(360 20 240)" begin="2s"/>
  </div>
  <div class="section">
    <rect x="20" y="155" width="320" height="40" rx="5" fill="#fff"/>
    <text x="25" y="160" font-size="14" font-family="Arial" text-anchor="middle" fill="#fff">Containment, eradication, and recovery</text>
    <rect x="20" y="180" width="320" height="40" rx="5" fill="#fff"/>
    <text x="25" y="185" font-size="14" font-family="Arial" text-anchor="middle" fill="#fff">Restoring systems and data to a known good state</text>
    <rect x="20" y="200" width="320" height="40" rx="5" fill="#fff"/>
    <text x="25" y="205" font-size="14" font-family="Arial" text-anchor="middle" fill="#fff">Verifying the incident has been fully contained and recovered</text>
    <animate transform="rotate(360 20 280)" begin="3s"/>
  </div>
  <div class="section">
    <rect x="20" y="255" width="320" height="40" rx="5" fill="#fff"/>
    <text x="25" y="260" font-size="14" font-family="Arial" text-anchor="middle" fill="#fff">Post-incident activity</text>
    <rect x="20" y="280" width="320" height="40" rx="5" fill="#fff"/>
    <text x="25" y="285" font-size="14" font-family="Arial" text-anchor="middle" fill="#fff">Reviewing lessons learned and updating incident response plans</text>
    <rect x="20" y="305" width="320" height="40" rx="5" fill="#fff"/>
    <text x="25" y="310" font-size="14" font-family="Arial" text-anchor="middle" fill="#fff">Maintaining incident response documentation and training</text>
    <animate transform="rotate(360 20 320)" begin="4s"/>
  </div>
  <div class="section">
    <rect x="20" y="365" width="320" height="40" rx="5" fill="#fff"/>
    <text x="25" y="370" font-size="14" font-family="Arial" text-anchor="middle" fill="#fff">Continuous improvement</text>
    <rect x="20" y="390" width="320" height="40" rx="5" fill="#fff"/>
    <text x="25" y="395" font-size="14" font-family="Arial" text-anchor="middle" fill="#fff">Reviewing and refining incident response plans</text>
    <rect x="20" y="415" width="320" height="40" rx="5" fill="#fff"/>
    <text x="25" y="420" font-size="14" font-family="Arial" text-anchor="middle" fill="#fff">Ensuring incident response is integrated with business continuity and disaster recovery plans</text>
  </div>
  <footer>
    <rect x="15" y="390" width="370" height="10" rx="5" fill="#45a0e6"/>
    <text x="20" y="395" font-size="14" font-family="Arial" text-anchor="middle" fill="#fff">SANS Institute</text>
  </footer>
</svg>