    <text x="10" y="20" font-size="24" font-family="Arial" font-weight="bold">Software Engineering & Project Management</text>
    <text x="10" y="50" font-size="18" font-family="Arial" font-weight="normal">Chapter 2: Software Engineering</text>
    <animate transform="rotate(360 190 180)" dur="10s" repeatCount="indefinite"/>
    <animate transform="rotate(360 190 180)" dur="10s" repeatCount="indefinite"/>
    <animate transform="rotate(360 190 180)" dur="10s" repeatCount="indefinite"/>
    <animate transform="rotate(360 190 180)" dur="10s" repeatCount="indefinite"/>
    <path d="M 10 100 L 110 100" stroke="#0099CC" stroke-width="2" fill="none"/>
    <text x="10" y="120" font-size="16" font-family="Arial" font-weight="normal" data-narration="Introduction to Software Engineering">Software engineering is a systematic approach to designing, developing, testing, and maintaining software systems.</text>
    <rect x="120" y="100" width="200" height="200" fill="#FFFFFF" rx="10"/>
    <text x="130" y="120" font-size="18" font-family="Arial" font-weight="normal" data-narration="Types of Software Engineering">There are several types of software engineering, including the waterfall model and agile model.</text>
    <path d="M 130 150 L 240 150" stroke="#0099CC" stroke-width="2" fill="none"/>
    <rect x="130" y="170" width="200" height="200" fill="#FFFFFF" rx="10"/>
    <text x="130" y="190" font-size="18" font-family="Arial" font-weight="normal" data-narration="Waterfall Model">The waterfall model is a linear approach to software development where each phase is completed before moving on to the next one.</text>
    <rect x="130" y="230" width="200" height="200" fill="#FFFFFF" rx="10"/>
    <text x="130" y="250" font-size="18" font-family="Arial" font-weight="normal" data-narration="Agile Model">The agile model is an iterative approach to software development where requirements and solutions evolve through collaboration between self-organizing teams.</text>
    <path d="M 130 280 L 240 280" stroke="#0099CC" stroke-width="2" fill="none"/>
    <rect x="130" y="310" width="200" height="200" fill="#FFFFFF" rx="10"/>
    <text x="130" y="330" font-size="18" font-family="Arial" font-weight="normal" data-narration="Comparison of Waterfall and Agile Models">The waterfall model and agile model have different approaches to software development and require different skills and knowledge.</text>
    <path d="M 130 360 L 240 360" stroke="#0099CC" stroke-width="2" fill="none"/>
    <rect x="130" y="390" width="200" height="200" fill="#FFFFFF" rx="10"/>
    <text x="130" y="410" font-size="18" font-family="Arial" font-weight="normal" data-narration="Conclusion">Software engineering is an important field that requires a systematic approach to designing, developing, testing, and maintaining software systems.</text>
