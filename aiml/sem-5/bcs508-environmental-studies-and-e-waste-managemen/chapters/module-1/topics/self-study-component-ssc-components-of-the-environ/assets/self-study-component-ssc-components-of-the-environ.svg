<svg width="420" height="400" data-topic-id="self-study-component-ssc-components-of-the-environment">
  <title>Components of the Environment</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C2E5F3" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="20" width="400" height="360" fill="url(#pastel-gradient)"/>
  
  <g id="environment-components">
    <text x="10" y="100" font-size="24" font-family="Arial" font-weight="bold" text-anchor="start">Components of the Environment</text>
    <rect x="20" y="120" width="350" height="20" fill="#F0F0F0" rx="5"/>
    <rect x="20" y="150" width="350" height="20" fill="#F0F0F0" rx="5">
      <animate transform="rotate(0 25 100)" begin="100ms" dur="2000" repeatCount="indefinite"/>
      <animate transform="rotate(360 25 100)" begin="1000ms" dur="2000" repeatCount="indefinite"/>
      <text x="25" y="115" font-size="16" font-family="Arial" text-anchor="middle" fill="#333">Atmosphere</text>
      <text x="25" y="145" font-size="16" font-family="Arial" text-anchor="middle" fill="#333" data-narration="The atmosphere is composed of gases that surround the Earth, protecting it from harmful radiation and regulating temperature. Examples include the ozone layer and greenhouse gases." />
      <animate transform="rotate(0 25 100)" begin="1500ms" dur="2000" repeatCount="indefinite"/>
      <animate transform="rotate(360 25 100)" begin="2500ms" dur="2000" repeatCount="indefinite"/>
      <line x1="50" y1="115" x2="50" y2="145" stroke="#333" stroke-width="2" stroke-linecap="round"/>
      <line x1="20" y1="145" x2="330" y2="145" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    </rect>
    
    <rect x="20" y="190" width="350" height="20" fill="#F0F0F0" rx="5">
      <animate transform="rotate(0 25 200)" begin="100ms" dur="2000" repeatCount="indefinite"/>
      <animate transform="rotate(360 25 200)" begin="1000ms" dur="2000" repeatCount="indefinite"/>
      <text x="25" y="195" font-size="16" font-family="Arial" text-anchor="middle" fill="#333">Hydrosphere</text>
      <text x="25" y="225" font-size="16" font-family="Arial" text-anchor="middle" fill="#333" data-narration="The hydrosphere includes all the Earth's water sources, supporting aquatic life and regulating climate. Examples include the Great Barrier Reef and the oceans." />
      <animate transform="rotate(0 25 200)" begin="1500ms" dur="2000" repeatCount="indefinite"/>
      <animate transform="rotate(360 25 200)" begin="2500ms" dur="2000" repeatCount="indefinite"/>
      <line x1="50" y1="195" x2="50" y2="225" stroke="#333" stroke-width="2" stroke-linecap="round"/>
      <line x1="20" y1="225" x2="330" y2="225" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    </rect>
    
    <rect x="20" y="260" width="350" height="20" fill="#F0F0F0" rx="5">
      <animate transform="rotate(0 25 260)" begin="100ms" dur="2000" repeatCount="indefinite"/>
      <animate transform="rotate(360 25 260)" begin="1000ms" dur="2000" repeatCount="indefinite"/>
      <text x="25" y="255" font-size="16" font-family="Arial" text-anchor="middle" fill="#333">Lithosphere</text>
      <text x="25" y="285" font-size="16" font-family="Arial" text-anchor="middle" fill="#333" data-narration="The lithosphere includes the solid outer layer of the Earth, supporting land-based ecosystems and human settlements. Examples include the Grand Canyon and mountain ranges." />
      <animate transform="rotate(0 25 260)" begin="1500ms" dur="2000" repeatCount="indefinite"/>
      <animate transform="rotate(360 25 260)" begin="2500ms" dur="2000" repeatCount="indefinite"/>
      <line x1="50" y1="255" x2="50" y2="285" stroke="#333" stroke-width="2" stroke-linecap="round"/>
      <line x1="20" y1="285" x2="330" y2="285" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    </rect>
    
    <rect x="20" y="310" width="350" height="20" fill="#F0F0F0" rx="5">
      <animate transform="rotate(0 25 310)" begin="100ms" dur="2000" repeatCount="indefinite"/>
      <animate transform="rotate(360 25 310)" begin="1000ms" dur="2000" repeatCount="indefinite"/>
      <text x="25" y="305" font-size="16" font-family="Arial" text-anchor="middle" fill="#333">Biosphere</text>
      <text x="25" y="335" font-size="16" font-family="Arial" text-anchor="middle" fill="#333" data-narration="The biosphere includes all living organisms and their interactions with the environment, supporting biodiversity and ecosystem services. Examples include forests, oceans, and human settlements." />
      <animate transform="rotate(0 25 310)" begin="1500ms" dur="2000" repeatCount="indefinite"/>
      <animate transform="rotate(360 25 310)" begin="2500ms" dur="2000" repeatCount="indefinite"/>
      <line x1="50" y1="305" x2="50" y2="335" stroke="#333" stroke-width="2" stroke-linecap="round"/>
      <line x1="20" y1="335" x2="330" y2="335" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    </rect>
  </g>
  <g id="arrow-markers">
    <line x1="40" y1="150" x2="40" y2="190" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="40" y1="190" x2="40" y2="230" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="40" y1="230" x2="40" y2="270" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="40" y1="270" x2="40" y2="310" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="40" y1="310" x2="40" y2="350" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="150" x2="20" y2="190" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="190" x2="20" y2="230" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="230" x2="20" y2="270" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="270" x2="20" y2="310" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="310" x2="20" y2="350" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="330" y1="150" x2="330" y2="190" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="330" y1="190" x2="330" y2="230" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="330" y1="230" x2="330" y2="270" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="330" y1="270" x2="330" y2="310" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="330" y1="310" x2="330" y2="350" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  </g>
  <footer>Components of the Environment</footer>
</svg>