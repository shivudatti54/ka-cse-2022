<svg width="420" height="400" data-topic-id="e-resource-1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9e4ca" stop-opacity="1"/>
      <stop offset="100%" stop-color="#add8e6" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Section 1: Definition of E-resources -->
  <rect x="10" y="10" width="400" height="50" fill="url(#pastel-gradient)" rx="10">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,50" dur="1s" begin="0s" delay="0s"/>
  </rect>
  <g transform="translate(10,10)">
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2f4f7f">
      Definition of E-resources
    </text>
    <text x="10" y="40" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2f4f7f">
      E-resources are digital materials that can be accessed and used over digital platforms.
    </text>
  </g>

  <!-- Section 2: Types of E-resources -->
  <rect x="10" y="70" width="400" height="50" fill="url(#pastel-gradient)" rx="10">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,120" dur="1s" begin="0s" delay="0.5s"/>
  </rect>
  <g transform="translate(10,70)">
    <text x="10" y="80" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2f4f7f">
      Types of E-resources
    </text>
    <text x="10" y="100" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2f4f7f">
      Primary, Secondary and Tertiary E-resources
    </text>
  </g>

  <!-- Section 3: Characteristics of E-resources -->
  <rect x="10" y="130" width="400" height="50" fill="url(#pastel-gradient)" rx="10">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,170" dur="1s" begin="1s" delay="0s"/>
  </rect>
  <g transform="translate(10,130)">
    <text x="10" y="140" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2f4f7f">
      Characteristics of E-resources
    </text>
    <text x="10" y="160" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2f4f7f">
      Digital, Accessible, Dynamic and Multi-media
    </text>
  </g>

  <!-- Section 4: Benefits of E-resources -->
  <rect x="10" y="200" width="400" height="50" fill="url(#pastel-gradient)" rx="10">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,250" dur="1s" begin="1.5s" delay="0s"/>
  </rect>
  <g transform="translate(10,200)">
    <text x="10" y="210" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2f4f7f">
      Benefits of E-resources
    </text>
    <text x="10" y="230" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2f4f7f">
      Convenience and Accessibility
    </text>
  </g>

  <!-- Section 5: Interactive E-resources -->
  <rect x="10" y="290" width="400" height="50" fill="url(#pastel-gradient)" rx="10">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,350" dur="1s" begin="2s" delay="0s"/>
  </rect>
  <g transform="translate(10,290)">
    <text x="10" y="300" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2f4f7f">
      Interactive E-resources
    </text>
    <text x="10" y="320" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2f4f7f">
      Online courses, Educational videos and Podcasts
    </text>
  </g>

  <!-- Footer and Title -->
  <text x="10" y="380" font-size="24" font-family="Arial, sans-serif" text-anchor="start" fill="#2f4f7f">
    E Resource 1
  </text>
  <text x="10" y="390" font-size="14" font-family="Arial, sans-serif" text-anchor="end" fill="#2f4f7f">
    Sustainability and E-waste Management
  </text>
</svg>