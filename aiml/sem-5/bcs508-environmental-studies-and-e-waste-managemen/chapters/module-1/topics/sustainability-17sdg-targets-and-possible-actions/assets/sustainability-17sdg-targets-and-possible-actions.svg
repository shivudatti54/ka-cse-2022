<svg width="420" height="400" data-topic-id="sustainability-17sdg-targets-and-possible-actions">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1" />
      <stop offset="50%" stop-color="#33CCCC" stop-opacity="1" />
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="50" y="50" width="320" height="300" fill="url(#gradient)" rx="10" />
  
  <!-- Title -->
  <g transform="translate(50, 20)">
    <text x="0" y="0" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
      Sustainability: 17 SDG Targets and Possible Actions
    </text>
  </g>
  
  <!-- Section 1: SDG 1 - No Poverty -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="320" height="50" fill="#F7F7F7" rx="10" />
    <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666666" data-narration="Target 1.1: End poverty in all its forms. Possible actions: Implement policies to reduce income inequality, provide access to education and job training, increase minimum wage and social security benefits." />
    <line x1="10" y1="20" x2="100" y2="20" stroke="#666666" stroke-width="2" />
    <line x1="10" y1="40" x2="100" y2="40" stroke="#666666" stroke-width="2" />
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,60" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Section 2: SDG 2 - Zero Hunger -->
  <g transform="translate(50, 120)">
    <rect x="0" y="0" width="320" height="50" fill="#F7F7F7" rx="10" />
    <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666666" data-narration="Target 2.1: End hunger, achieve food security and improved nutrition, and promote sustainable agriculture. Possible actions: Invest in sustainable agriculture and rural development, implement policies to reduce food waste, improve access to nutritious food, especially for vulnerable groups." />
    <line x1="10" y1="20" x2="100" y2="20" stroke="#666666" stroke-width="2" />
    <line x1="10" y1="40" x2="100" y2="40" stroke="#666666" stroke-width="2" />
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,120" begin="2s" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Section 3: SDG 3 - Good Health and Well-being -->
  <g transform="translate(50, 180)">
    <rect x="0" y="0" width="320" height="50" fill="#F7F7F7" rx="10" />
    <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666666" data-narration="Target 3.1: Ensure healthy lives and promote well-being for all. Possible actions: Invest in healthcare infrastructure and personnel, implement policies to reduce air and water pollution, promote healthy lifestyles and disease prevention." />
    <line x1="10" y1="20" x2="100" y2="20" stroke="#666666" stroke-width="2" />
    <line x1="10" y1="40" x2="100" y2="40" stroke="#666666" stroke-width="2" />
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,180" begin="4s" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Section 4: SDG 6 - Clean Water and Sanitation -->
  <g transform="translate(50, 240)">
    <rect x="0" y="0" width="320" height="50" fill="#F7F7F7" rx="10" />
    <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666666" data-narration="Target 6.1: Ensure universal and equitable access to clean water and sanitation. Possible actions: Invest in water infrastructure and treatment, implement policies to reduce water waste, improve access to sanitation facilities, especially for vulnerable groups." />
    <line x1="10" y1="20" x2="100" y2="20" stroke="#666666" stroke-width="2" />
    <line x1="10" y1="40" x2="100" y2="40" stroke="#666666" stroke-width="2" />
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,240" begin="6s" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Section 5: SDG 13 - Climate Action -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="320" height="50" fill="#F7F7F7" rx="10" />
    <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666666" data-narration="Target 13.1: Take urgent action to combat climate change and its impacts. Possible actions: Invest in renewable energy, implement policies to reduce greenhouse gas emissions, promote sustainable land use and forestry." />
    <line x1="10" y1="20" x2="100" y2="20" stroke="#666666" stroke-width="2" />
    <line x1="10" y1="40" x2="100" y2="40" stroke="#666666" stroke-width="2" />
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,300" begin="8s" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Footer -->
  <g transform="translate(50, 360)">
    <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
      Learn more about the Sustainable Development Goals and how to achieve them.
    </text>
  </g>
</svg>