<svg width="420" height="400" data-topic-id="forest-ecosystem" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7F464" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Forest Ecosystem Structure</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <g transform="translate(20, 20)">
    <text x="0" y="0" font-size="24" font-family="Arial" fill="#2F4F7F">Ecosystem Structure of Forest Deserts</text>
  </g>
  <g transform="translate(50, 60)">
    <section data-narration="Biological Components">
      <rect x="0" y="0" width="100" height="50" fill="#F7F7F7"/>
      <text x="10" y="15" font-size="18" font-family="Arial" fill="#2F4F7F">Living Organisms</text>
      <text x="10" y="30" font-size="18" font-family="Arial" fill="#2F4F7F">Plants, Animals, Microorganisms</text>
    </section>
    <animate begin="0s" dur="1s" fill="freeze" attributeName="opacity">
      <rect x="0" y="0" width="100" height="50" fill="#F7F7F7"/>
    </animate>
    <g transform="translate(150, 60)">
      <section data-narration="Physical Components">
        <rect x="0" y="0" width="100" height="50" fill="#F7F7F7"/>
        <text x="10" y="15" font-size="18" font-family="Arial" fill="#2F4F7F">Non-Living Components</text>
        <text x="10" y="30" font-size="18" font-family="Arial" fill="#2F4F7F">Soil, Water, Air, Sunlight</text>
      </section>
      <animate begin="1s" dur="1s" fill="freeze" attributeName="opacity">
        <rect x="0" y="0" width="100" height="50" fill="#F7F7F7"/>
      </animate>
    </g>
    <g transform="translate(250, 60)">
      <section data-narration="Interactions">
        <rect x="0" y="0" width="100" height="50" fill="#F7F7F7"/>
        <text x="10" y="15" font-size="18" font-family="Arial" fill="#2F4F7F">Interactions</text>
        <text x="10" y="30" font-size="18" font-family="Arial" fill="#2F4F7F">Nutrient Cycling, Energy Flow, Predation</text>
      </section>
      <animate begin="2s" dur="1s" fill="freeze" attributeName="opacity">
        <rect x="0" y="0" width="100" height="50" fill="#F7F7F7"/>
      </animate>
      <g transform="translate(350, 60)">
        <section data-narration="Abiotic Interactions">
          <rect x="0" y="0" width="100" height="50" fill="#F7F7F7"/>
          <text x="10" y="15" font-size="18" font-family="Arial" fill="#2F4F7F">Physical Interactions</text>
          <text x="10" y="30" font-size="18" font-family="Arial" fill="#2F4F7F">Radiation, Temperature, Precipitation</text>
        </section>
        <animate begin="3s" dur="1s" fill="freeze" attributeName="opacity">
          <rect x="0" y="0" width="100" height="50" fill="#F7F7F7"/>
        </animate>
        <g transform="translate(450, 60)">
          <section data-narration="Biotic Interactions">
            <rect x="0" y="0" width="100" height="50" fill="#F7F7F7"/>
            <text x="10" y="15" font-size="18" font-family="Arial" fill="#2F4F7F">Living Organism Interactions</text>
            <text x="10" y="30" font-size="18" font-family="Arial" fill="#2F4F7F">Predation, Competition, Symbiosis</text>
          </section>
          <animate begin="4s" dur="1s" fill="freeze" attributeName="opacity">
            <rect x="0" y="0" width="100" height="50" fill="#F7F7F7"/>
          </animate>
        </g>
      </g>
  </g>
  <g transform="translate(50, 380)">
    <text x="0" y="0" font-size="18" font-family="Arial" fill="#2F4F7F">Conclusion</text>
  </g>
  <g transform="translate(50, 400)">
    <text x="0" y="0" font-size="18" font-family="Arial" fill="#2F4F7F">Footer</text>
  </g>
</svg>