<svg width="420" height="400" data-topic-id="Textbook 1-Ch-3" xmlns="http://www.w3.org/2000/svg">
  <title>Ecosystems and Sustainability</title>
  <rect x="0" y="0" width="100%" height="100%" fill="#66cccc" />
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#add8e6" stop-opacity="1" />
      <stop offset="50%" stop-color="#66cccc" stop-opacity="1" />
      <stop offset="100%" stop-color="#8bc34a" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8bc34a" stop-opacity="1" />
      <stop offset="50%" stop-color="#66cccc" stop-opacity="1" />
      <stop offset="100%" stop-color="#add8e6" stop-opacity="1" />
    </linearGradient>
  </defs>
  <g transform="rotate(0 210 210)">
    <rect x="20" y="20" width="380" height="360" fill="url(#gradient)" rx="10" />
    <text x="10" y="20" text-anchor="middle" font-size="24" font-family="Arial" fill="#000000">
      <tspan data-narration="section-1">Textbook 1: CH- 3</tspan>
    </text>
    <rect x="20" y="50" width="380" height="60" fill="url(#gradient2)" rx="10" />
    <text x="10" y="55" text-anchor="middle" font-size="18" font-family="Arial" fill="#000000">
      <tspan data-narration="section-1-2">Ecosystems and Sustainability</tspan>
    </text>
    <rect x="20" y="70" width="380" height="60" fill="url(#gradient)" rx="10" />
    <text x="10" y="75" text-anchor="middle" font-size="18" font-family="Arial" fill="#000000">
      <tspan data-narration="section-2">Definition of Ecosystem</tspan>
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" dur="3000" begin="0s" delay="0s" />
    <g>
      <rect x="150" y="80" width="100" height="20" fill="#66cccc" rx="5" />
      <text x="160" y="85" text-anchor="middle" font-size="12" font-family="Arial" fill="#000000">
        <tspan data-narration="section-2-1">Biotic factors:</tspan>
        <tspan data-narration="section-2-2">living organisms</tspan>
      </text>
      <animateTransform attributeName="transform" type="translate" from="150 80" to="150 100" dur="3000" begin="0s" delay="0s" />
      <g>
        <rect x="150" y="100" width="100" height="20" fill="#66cccc" rx="5" />
        <text x="160" y="105" text-anchor="middle" font-size="12" font-family="Arial" fill="#000000">
          <tspan data-narration="section-2-3">Abiotic factors:</tspan>
          <tspan data-narration="section-2-4">non-living components</tspan>
        </text>
        <animateTransform attributeName="transform" type="translate" from="150 100" to="150 120" dur="3000" begin="0s" delay="0s" />
      </g>
      <g>
        <rect x="250" y="80" width="100" height="20" fill="#66cccc" rx="5" />
        <text x="260" y="85" text-anchor="middle" font-size="12" font-family="Arial" fill="#000000">
          <tspan data-narration="section-3">Terrestrial ecosystems</tspan>
          <tspan data-narration="section-4">Freshwater ecosystems</tspan>
          <tspan data-narration="section-5">Marine ecosystems</tspan>
        </text>
        <animateTransform attributeName="transform" type="translate" from="250 80" to="250 100" dur="3000" begin="0s" delay="0s" />
        <animateTransform attributeName="transform" type="translate" from="250 100" to="250 120" dur="3000" begin="0s" delay="0s" />
        <animateTransform attributeName="transform" type="translate" from="250 120" to="250 140" dur="3000" begin="0s" delay="0s" />
        <g>
          <line x1="280" y1="120" x2="280" y2="130" stroke="#000000" stroke-width="2" />
          <line x1="280" y1="130" x2="260" y2="130" stroke="#000000" stroke-width="2" />
          <line x1="260" y1="130" x2="260" y2="120" stroke="#000000" stroke-width="2" />
          <line x1="260" y1="120" x2="280" y2="120" stroke="#000000" stroke-width="2" />
        </g>
        <animateTransform attributeName="transform" type="translate" from="250 140" to="250 160" dur="3000" begin="0s" delay="0s" />
      </g>
      <g>
        <rect x="350" y="80" width="100" height="20" fill="#66cccc" rx="5" />
        <text x="360" y="85" text-anchor="middle" font-size="12" font-family="Arial" fill="#000000">
          <tspan data-narration="section-6">Human impact</tspan>
          <tspan data-narration="section-7">Sustainability</tspan>
        </text>
        <animateTransform attributeName="transform" type="translate" from="350 80" to="350 100" dur="3000" begin="0s" delay="0s" />
        <animateTransform attributeName="transform" type="translate" from="350 100" to="350 120" dur="3000" begin="0s" delay="0s" />
        <animateTransform attributeName="transform" type="translate" from="350 120" to="350 140" dur="3000" begin="0s" delay="0s" />
        <g>
          <line x1="380" y1="120" x2="380" y2="130" stroke="#000000" stroke-width="2" />
          <line x1="380" y1="130" x2="360" y2="130" stroke="#000000" stroke-width="2" />
          <line x1="360" y1="130" x2="360" y2="120" stroke="#000000" stroke-width="2" />
          <line x1="360" y1="120" x2="380" y2="120" stroke="#000000" stroke-width="2" />
        </g>
        <animateTransform attributeName="transform" type="translate" from="350 140" to="350 160" dur="3000" begin="0s" delay="0s" />
      </g>
    </g>
    <rect x="20" y="220" width="380" height="120" fill="url(#gradient)" rx="10" />
    <text x="10" y="220" text-anchor="middle" font-size="18" font-family="Arial" fill="#000000">
      <tspan data-narration="section-8">Ecosystems are interconnected and interdependent, meaning that the health and well-being of one component can affect the others.</tspan>
    </text>
    <rect x="20" y="250" width="380" height="120" fill="url(#gradient2)" rx="10" />
    <text x="10" y="250" text-anchor="middle" font-size="18" font-family="Arial" fill="#000000">
      <tspan data-narration="section-9">Sustainability refers to the ability of ecosystems to maintain their structure and function over time, while supporting the needs of humans and other organisms.</tspan>
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" dur="3000" begin="0s" delay="0s" />
  </g>
</svg>