<svg width="420" height="400" data-topic-id="E Resource2: Water Resources Management">
  <desc>A diagram illustrating the hydrological cycle and types of water resources.</desc>
  <style>
    /* Set the style for the SVG document */
    body {
      background-color: #f7f7f7;
    }
    /* Add a gradient background with pastel colors */
    rect {
      stroke: #87CEEB;
      stroke-width: 3;
      fill: linear-gradient(to bottom, #87CEEB, #ADD8E6);
    }
    /* Define a color scheme with indigo, teal, and orange accents */
    .colorScheme {
      fill: #4B0082;
      stroke: #0097A7;
      stroke-width: 3;
    }
    .orangeAccent {
      fill: #FF9900;
      stroke: #FF9900;
      stroke-width: 3;
    }
  </style>
  <!-- Title -->
  <title>Water Resources Management</title>
  <!-- Footer -->
  <text x="50%" y="400" font-size="24" text-anchor="middle">Footer</text>
  <!-- The hydrological cycle -->
  <rect x="20" y="20" width="380" height="360">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,360" dur="10s" begin="0s" repeatCount="indefinite"/>
    <!-- Evaporation -->
    <rect x="20" y="20" width="50" height="50" class="colorScheme" rx="10" data-narration="Evaporation: Water evaporates from oceans, lakes, and rivers." />
    <line x1="70" y1="70" x2="70" y2="150" class="arrow" />
    <text x="50" y="130" font-size="18" text-anchor="middle" class="colorScheme">Water</text>
    <animateTransform attributeName="transform" type="translate" from="0,130" to="0,150" dur="2s" begin="0s" repeatCount="indefinite"/>
    <!-- Transpiration -->
    <rect x="120" y="20" width="50" height="50" class="colorScheme" rx="10" data-narration="Transpiration: Water is absorbed by plants." />
    <line x1="170" y1="70" x2="170" y2="150" class="arrow" />
    <text x="140" y="130" font-size="18" text-anchor="middle" class="colorScheme">Water</text>
    <animateTransform attributeName="transform" type="translate" from="0,130" to="0,150" dur="2s" begin="2s" repeatCount="indefinite"/>
    <!-- Condensation -->
    <rect x="220" y="20" width="50" height="50" class="colorScheme" rx="10" data-narration="Condensation: Water vapor in the air cools and condenses into clouds." />
    <line x1="270" y1="70" x2="270" y2="150" class="arrow" />
    <text x="240" y="130" font-size="18" text-anchor="middle" class="colorScheme">Water</text>
    <animateTransform attributeName="transform" type="translate" from="0,130" to="0,150" dur="2s" begin="4s" repeatCount="indefinite"/>
    <!-- Precipitation -->
    <rect x="320" y="20" width="50" height="50" class="colorScheme" rx="10" data-narration="Precipitation: Water falls to the Earth as rain, snow, or hail." />
    <line x1="370" y1="70" x2="370" y2="150" class="arrow" />
    <text x="340" y="130" font-size="18" text-anchor="middle" class="colorScheme">Water</text>
    <animateTransform attributeName="transform" type="translate" from="0,130" to="0,150" dur="2s" begin="6s" repeatCount="indefinite"/>
    <!-- Surface Runoff -->
    <rect x="20" y="220" width="50" height="50" class="orangeAccent" rx="10" data-narration="Surface Runoff: Water flows over the surface of the Earth and into rivers, lakes, and oceans." />
    <line x1="70" y1="270" x2="70" y2="350" class="arrow" />
    <text x="50" y="320" font-size="18" text-anchor="middle" class="orangeAccent">Water</text>
    <animateTransform attributeName="transform" type="translate" from="0,320" to="0,350" dur="2s" begin="8s" repeatCount="indefinite"/>
    <!-- Infiltration -->
    <rect x="120" y="220" width="50" height="50" class="colorScheme" rx="10" data-narration="Infiltration: Water seeps into the soil and becomes groundwater." />
    <line x1="170" y1="270" x2="170" y2="350" class="arrow" />
    <text x="140" y="320" font-size="18" text-anchor="middle" class="colorScheme">Water</text>
    <animateTransform attributeName="transform" type="translate" from="0,320" to="0,350" dur="2s" begin="10s" repeatCount="indefinite"/>
  </rect>
</svg>