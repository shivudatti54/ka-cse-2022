<svg width="420" height="400" data-topic-id="fluoride-problem-in-drinking-water">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9e4ca" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a1c9f2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">
    Fluoride Problem in Drinking Water
  </text>
  
  <!-- Section 1: What is Fluoride? -->
  <rect x="10" y="60" width="400" height="100" fill="#ffffff" rx="10">
    <animateTransform attributeName="transform" type="translateX" from="0" to="-10" dur="1s" begin="1s"/>
    <animateTransform attributeName="transform" type="translateX" from="-10" to="0" dur="1s" begin="2s"/>
    <animateTransform attributeName="transform" type="translateX" from="0" to="10" dur="1s" begin="3s"/>
    <animateTransform attributeName="transform" type="translateX" from="10" to="0" dur="1s" begin="4s"/>
    <text x="20%" y="50%" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">
      Fluoride is a naturally occurring compound of fluorine and oxygen (CaF2).
    </text>
  </rect>
  
  <!-- Section 2: Sources of Fluoride in Drinking Water -->
  <rect x="10" y="170" width="400" height="100" fill="#ffffff" rx="10">
    <animateTransform attributeName="transform" type="translateX" from="0" to="-10" dur="1s" begin="1s"/>
    <animateTransform attributeName="transform" type="translateX" from="-10" to="0" dur="1s" begin="2s"/>
    <animateTransform attributeName="transform" type="translateX" from="0" to="10" dur="1s" begin="3s"/>
    <animateTransform attributeName="transform" type="translateX" from="10" to="0" dur="1s" begin="4s"/>
    <text x="20%" y="50%" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">
      Fluoride can be found in natural sources like groundwater, rainwater, and surface water.
    </text>
    <rect x="10" y="80" width="60" height="20" fill="#f2f2f2" rx="5">
      <animateTransform attributeName="transform" type="translateX" from="0" to="-10" dur="0.5s" begin="1s"/>
      <animateTransform attributeName="transform" type="translateX" from="-10" to="0" dur="0.5s" begin="1.5s"/>
      <text x="20%" y="70%" font-size="10" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">
        Anthropogenic sources like industrial waste, agricultural runoff, and sewage systems also contribute to fluoride levels.
      </text>
    </rect>
  </rect>
  
  <!-- Section 3: Health Effects of Fluoride in Drinking Water -->
  <rect x="10" y="280" width="400" height="100" fill="#ffffff" rx="10">
    <animateTransform attributeName="transform" type="translateX" from="0" to="-10" dur="1s" begin="1s"/>
    <animateTransform attributeName="transform" type="translateX" from="-10" to="0" dur="1s" begin="2s"/>
    <animateTransform attributeName="transform" type="translateX" from="0" to="10" dur="1s" begin="3s"/>
    <animateTransform attributeName="transform" type="translateX" from="10" to="0" dur="1s" begin="4s"/>
    <text x="20%" y="50%" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">
      Acute fluoride poisoning can cause nausea, vomiting, diarrhea, and abdominal pain.
    </text>
    <rect x="10" y="80" width="60" height="20" fill="#f2f2f2" rx="5">
      <animateTransform attributeName="transform" type="translateX" from="0" to="-10" dur="0.5s" begin="1s"/>
      <animateTransform attributeName="transform" type="translateX" from="-10" to="0" dur="0.5s" begin="1.5s"/>
      <text x="20%" y="70%" font-size="10" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">
        Chronic fluoride exposure can lead to dental fluorosis, skeletal fluorosis, and increased cancer risk.
      </text>
    </rect>
  </rect>
  
  <!-- Section 4: Impact on Human Health -->
  <rect x="10" y="380" width="400" height="100" fill="#ffffff" rx="10">
    <animateTransform attributeName="transform" type="translateX" from="0" to="-10" dur="1s" begin="1s"/>
    <animateTransform attributeName="transform" type="translateX" from="-10" to="0" dur="1s" begin="2s"/>
    <animateTransform attributeName="transform" type="translateX" from="0" to="10" dur="1s" begin="3s"/>
    <animateTransform attributeName="transform" type="translateX" from="10" to="0" dur="1s" begin="4s"/>
    <text x="20%" y="50%" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">
      Children and adolescents are more susceptible to fluoride toxicity due to their smaller body size and developing teeth and bones.
    </text>
    <rect x="10" y="80" width="60" height="20" fill="#f2f2f2" rx="5">
      <animateTransform attributeName="transform" type="translateX" from="0" to="-10" dur="0.5s" begin="1s"/>
      <animateTransform attributeName="transform" type="translateX" from="-10" to="0" dur="0.5s" begin="1.5s"/>
      <text x="20%" y="70%" font-size="10" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">
        Pregnant women and people with pre-existing medical conditions are also more vulnerable to fluoride toxicity.
      </text>
    </rect>
  </rect>
  
  <!-- Section 5: Prevention and Mitigation Measures -->
  <rect x="10" y="480" width="400" height="100" fill="#ffffff" rx="10">
    <animateTransform attributeName="transform" type="translateX" from="0" to="-10" dur="1s" begin="1s"/>
    <animateTransform attributeName="transform" type="translateX" from="-10" to="0" dur="1s" begin="2s"/>
    <animateTransform attributeName="transform" type="translateX" from="0" to="10" dur="1s" begin="3s"/>
    <animateTransform attributeName="transform" type="translateX" from="10" to="0" dur="1s" begin="4s"/>
    <text x="20%" y="50%" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">
      Regular water testing and education campaigns can help mitigate fluoride toxicity.
    </text>
    <rect x="10" y="80" width="60" height="20" fill="#f2f2f2" rx="5">
      <animateTransform attributeName="transform" type="translateX" from="0" to="-10" dur="0.5s" begin="1s"/>
      <animateTransform attributeName="transform" type="translateX" from="-10" to="0" dur="0.5s" begin="1.5s"/>
      <text x="20%" y="70%" font-size="10" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">
        Alternative sources of drinking water, such as rainwater harvesting systems, can also be used.
      </text>
    </rect>
  </rect>
  
  <!-- Footer -->
  <rect x="10" y="380" width="400" height="20" fill="#f2f2f2" rx="5">
    <animateTransform attributeName="transform" type="translateX" from="0" to="-10" dur="0.5s" begin="5s"/>
    <animateTransform attributeName="transform" type="translateX" from="-10" to="0" dur="0.5s" begin="5.5s"/>
  </rect>
  <text x="20%" y="390%" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">
    Learn more about the fluoride problem in drinking water.
  </text>
</svg>