<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="water-borne-diseases-water-induced-diseases">
  <!-- Title -->
  <text x="50%" y="10%" font-size="30" font-family="Arial" text-anchor="middle">Water Borne Diseases & Water Induced Diseases</text>
  
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="20" width="100%" height="60%" fill="url(#gradient)"/>
  
  <!-- Section 1: Introduction -->
  <section data-narration="Water is essential for human life, but contaminated water can cause various diseases and health problems.">
    <rect x="20" y="80" width="380" height="20" fill="#FFFFFF" rx="10"/>
    <text x="50%" y="90" font-size="18" font-family="Arial" text-anchor="middle">What are Water Borne Diseases?</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 90" to="360 200 90" dur="10s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 2: Symptoms and Prevention -->
  <section data-narration="Waterborne diseases can cause severe diarrhea, dehydration, fever, headache, and abdominal pain. Proper precautions can prevent the spread of disease.">
    <rect x="20" y="120" width="380" height="20" fill="#FFFFFF" rx="10"/>
    <text x="50%" y="130" font-size="18" font-family="Arial" text-anchor="middle">Prevention Strategies</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="10s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 3: Examples of Water Borne Diseases -->
  <section data-narration="Examples of waterborne diseases include cholera, typhoid fever, and dysentery. These diseases can spread rapidly if proper precautions are not taken.">
    <rect x="20" y="160" width="380" height="20" fill="#FFFFFF" rx="10"/>
    <text x="50%" y="170" font-size="18" font-family="Arial" text-anchor="middle">Cholera, Typhoid Fever, and Dysentery</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 190" to="360 200 190" dur="10s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 4: Causes of Water Borne Diseases -->
  <section data-narration="Poor water treatment, improper storage and distribution, and surrounding environment can all contribute to the spread of waterborne diseases.">
    <rect x="20" y="200" width="380" height="20" fill="#FFFFFF" rx="10"/>
    <text x="50%" y="210" font-size="18" font-family="Arial" text-anchor="middle">Causes of Water Borne Diseases</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 220" to="360 200 220" dur="10s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 5: Water Induced Diseases -->
  <section data-narration="Water-induced diseases are illnesses caused by exposure to contaminated water, but not necessarily through direct consumption. Examples include chemical contamination and exposure to pollutants.">
    <rect x="20" y="240" width="380" height="20" fill="#FFFFFF" rx="10"/>
    <text x="50%" y="250" font-size="18" font-family="Arial" text-anchor="middle">Water Induced Diseases</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 260" to="360 200 260" dur="10s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 6: Conclusion -->
  <section data-narration="In conclusion, waterborne diseases and water-induced diseases are serious health concerns that can have severe consequences. It is essential to take proper precautions to prevent the spread of disease and protect public health.">
    <rect x="20" y="280" width="380" height="20" fill="#FFFFFF" rx="10"/>
    <text x="50%" y="290" font-size="18" font-family="Arial" text-anchor="middle">Conclusion</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 310" to="360 200 310" dur="10s" repeatCount="indefinite"/>
  </section>
  
  <!-- Footer -->
  <text x="50%" y="380%" font-size="18" font-family="Arial" text-anchor="middle">Learn more about waterborne diseases and water-induced diseases.</text>
</svg>