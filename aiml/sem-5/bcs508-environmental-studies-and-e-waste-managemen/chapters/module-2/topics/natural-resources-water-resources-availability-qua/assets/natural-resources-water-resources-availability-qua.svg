<svg width="420" height="400" data-topic-id="water-resources-availability-quality-aspects">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6"/>
      <stop offset="100%" stop-color="#C9E4CA"/>
    </linearGradient>
  </defs>
  <title>Water Resources: Availability and Quality</title>
  <!-- Introduction Section -->
  <section data-narration="Introduction">
    <rect x="10" y="20" width="400" height="50" fill="url(#pastel-gradient)"/>
    <text x="15" y="40" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">Water Resources: Availability and Quality</text>
  </section>

  <!-- Definition and Importance of Water Section -->
  <section data-narration="Definition and Importance of Water">
    <rect x="10" y="100" width="400" height="50" fill="url(#pastel-gradient)" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2s" begin="0s" repeatCount="indefinite"/>
    <text x="15" y="120" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Water</text>
    <text x="15" y="160" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">is a clear, colorless, odorless, and tasteless liquid chemical substance composed of hydrogen and oxygen atoms (H2O).</text>
  </section>

  <!-- Types of Water Resources Section -->
  <section data-narration="Types of Water Resources">
    <rect x="10" y="220" width="400" height="150" fill="url(#pastel-gradient)" rx="10"/>
    <animateTransform attributeName="transform" type="translateX" from="0" to="-400" dur="2s" begin="0s" repeatCount="indefinite"/>
    <text x="15" y="240" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Types of Water Resources</text>
    <rect x="-130" y="20" width="60" height="30" fill="#ADD8E6" rx="5"/>
    <text x="-130" y="50" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">Surface Water Resources</text>
    <rect x="-80" y="20" width="60" height="30" fill="#ADD8E6" rx="5"/>
    <text x="-80" y="50" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">Groundwater Resources</text>
    <rect x="-130" y="100" width="60" height="30" fill="#ADD8E6" rx="5"/>
    <text x="-130" y="130" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">Freshwater Resources</text>
    <rect x="-80" y="100" width="60" height="30" fill="#ADD8E6" rx="5"/>
    <text x="-80" y="130" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">Non-Freshwater Resources</text>
  </section>

  <!-- Availability of Water Resources Section -->
  <section data-narration="Availability of Water Resources">
    <rect x="10" y="380" width="400" height="150" fill="url(#pastel-gradient)" rx="10"/>
    <animateTransform attributeName="transform" type="translateX" from="0" to="-400" dur="2s" begin="0s" repeatCount="indefinite"/>
    <text x="15" y="400" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Availability of Water Resources</text>
    <rect x="-130" y="320" width="60" height="30" fill="#ADD8E6" rx="5"/>
    <text x="-130" y="350" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">Limited distribution around the world</text>
    <rect x="-80" y="320" width="60" height="30" fill="#ADD8E6" rx="5"/>
    <text x="-80" y="350" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">Factors affecting availability include climate, geology, and population growth</text>
  </section>

  <!-- Footer Section -->
  <footer>
    <rect x="10" y="430" width="400" height="30" fill="#2F4F7F"/>
    <text x="15" y="450" font-size="14" font-family="Arial, sans-serif" fill="#ADD8E6">Learn more about water resources and their importance</text>
  </footer>
</svg>