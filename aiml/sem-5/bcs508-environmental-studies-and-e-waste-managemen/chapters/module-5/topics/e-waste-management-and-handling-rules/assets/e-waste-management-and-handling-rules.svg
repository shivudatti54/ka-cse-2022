<svg width="420" height="400" data-topic-id="E-Waste-Management-And-Handling-Rules">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10" />
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="100" height="30" fill="#3498db" rx="5" />
    <text x="10" y="10" fill="#fff" font-size="18" font-family="Arial" text-anchor="middle">E-Waste Management and Handling Rules</text>
  </g>
  <g transform="translate(140, 20)">
    <section data-narration="Definition of E-waste">
      <rect x="0" y="0" width="200" height="150" fill="#f9f9f9" rx="10" />
      <rect x="0" y="0" width="200" height="150" fill="#f9f9f9" rx="10" />
      <text x="10" y="10" fill="#333" font-size="14" font-family="Arial" text-anchor="middle">E-waste is defined as any electronic product that is discarded or intended to be discarded</text>
      <text x="10" y="60" fill="#333" font-size="14" font-family="Arial" text-anchor="middle">including electronic equipment, components, and batteries</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-150" dur="2s" begin="1s" />
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-150" dur="2s" begin="3s" />
    </section>
    <section data-narration="Producers' Responsibility">
      <rect x="0" y="0" width="200" height="150" fill="#f9f9f9" rx="10" />
      <rect x="0" y="0" width="200" height="150" fill="#f9f9f9" rx="10" />
      <text x="10" y="10" fill="#333" font-size="14" font-family="Arial" text-anchor="middle">Producers are required to design and manufacture products with recyclability and reusability in mind</text>
      <text x="10" y="60" fill="#333" font-size="14" font-family="Arial" text-anchor="middle">and ensure that products are sold with a minimum of 70% recyclable content</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-150" dur="2s" begin="1s" />
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-150" dur="2s" begin="3s" />
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150" dur="2s" begin="5s" />
    </section>
    <section data-narration="Collectors and Transporters' Responsibility">
      <rect x="0" y="0" width="200" height="150" fill="#f9f9f9" rx="10" />
      <rect x="0" y="0" width="200" height="150" fill="#f9f9f9" rx="10" />
      <text x="10" y="10" fill="#333" font-size="14" font-family="Arial" text-anchor="middle">Collectors and transporters are required to ensure that collected e-waste is disposed of in an environmentally sound manner</text>
      <text x="10" y="60" fill="#333" font-size="14" font-family="Arial" text-anchor="middle">and label and transport e-waste in a manner that prevents any leakage or spillage</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-150" dur="2s" begin="1s" />
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-150" dur="2s" begin="3s" />
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150" dur="2s" begin="5s" />
    </section>
    <section data-narration="Treatment and Disposal Facilities">
      <rect x="0" y="0" width="200" height="150" fill="#f9f9f9" rx="10" />
      <rect x="0" y="0" width="200" height="150" fill="#f9f9f9" rx="10" />
      <text x="10" y="10" fill="#333" font-size="14" font-family="Arial" text-anchor="middle">Treatment and disposal facilities must ensure that e-waste is handled and disposed of in an environmentally sound manner</text>
      <text x="10" y="60" fill="#333" font-size="14" font-family="Arial" text-anchor="middle">and is not mixed with household waste</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-150" dur="2s" begin="1s" />
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-150" dur="2s" begin="3s" />
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150" dur="2s" begin="5s" />
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="2s" begin="7s" />
    </section>
  </g>
  <g transform="translate(20, 380)">
    <text x="10" y="10" fill="#333" font-size="18" font-family="Arial" text-anchor="middle">Remember: Reduce, Reuse, Recycle</text>
  </g>
</svg>