<svg width="420" height="400" data-topic-id="E-Waste" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="420" height="400" fill="#C5C3C8"/>
  <g id="gradient-layer">
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="0"/>
    </linearGradient>
    <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  </g>
  <g id="root">
    <text x="20" y="70" font-size="24" fill="#1A1D23" text-anchor="start" stroke="#4682B4" stroke-width="2">
      E-Waste
    </text>
    <rect x="30" y="120" width="340" height="100" fill="#F7F7F7" rx="10" data-narration="Definition and Characteristics"/>
    <text x="35" y="130" font-size="18" fill="#1A1D23" text-anchor="start" stroke="#4682B4" stroke-width="2">
      Definition and Characteristics
    </text>
    <animateTransform attributes="x" begin="0s" dur="3s" type="translate" attributeName="x" from="30" to="90"/>
    <animateTransform attributes="y" begin="0s" dur="3s" type="translate" attributeName="y" from="130" to="220"/>
    <rect x="90" y="150" width="230" height="100" fill="#F7F7F7" rx="10" data-narration="Causes of E-Waste"/>
    <text x="95" y="160" font-size="18" fill="#1A1D23" text-anchor="start" stroke="#4682B4" stroke-width="2">
      Causes of E-Waste
    </text>
    <animateTransform attributes="x" begin="3s" dur="3s" type="translate" attributeName="x" from="90" to="180"/>
    <animateTransform attributes="y" begin="3s" dur="3s" type="translate" attributeName="y" from="160" to="250"/>
    <rect x="180" y="200" width="230" height="100" fill="#F7F7F7" rx="10" data-narration="Effects of E-Waste"/>
    <text x="185" y="210" font-size="18" fill="#1A1D23" text-anchor="start" stroke="#4682B4" stroke-width="2">
      Effects of E-Waste
    </text>
    <animateTransform attributes="x" begin="6s" dur="3s" type="translate" attributeName="x" from="180" to="270"/>
    <animateTransform attributes="y" begin="6s" dur="3s" type="translate" attributeName="y" from="210" to="300"/>
    <rect x="270" y="230" width="230" height="100" fill="#F7F7F7" rx="10" data-narration="Management Strategies"/>
    <text x="275" y="240" font-size="18" fill="#1A1D23" text-anchor="start" stroke="#4682B4" stroke-width="2">
      Management Strategies
    </text>
    <animateTransform attributes="x" begin="9s" dur="3s" type="translate" attributeName="x" from="270" to="360"/>
    <animateTransform attributes="y" begin="9s" dur="3s" type="translate" attributeName="y" from="240" to="340"/>
    <rect x="0" y="150" width="420" height="200" fill="#F7F7F7" rx="10"/>
    <text x="10" y="350" font-size="18" fill="#1A1D23" text-anchor="start" stroke="#4682B4" stroke-width="2">
      Footer
    </text>
  </g>
</svg>