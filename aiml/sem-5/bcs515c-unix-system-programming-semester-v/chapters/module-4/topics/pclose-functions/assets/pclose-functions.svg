    </marker>
  </defs>

  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="Loss Functions">
    <text x="400" y="50" class="title" text-anchor="middle">Loss Functions</text>
  </g>

  <!-- Step 1: What are Loss Functions? -->
  <g id="step1" class="step" data-narration="What are Loss Functions?: A loss function (also called cost function or objective func">
    <rect x="150" y="120" width="280" height="80" rx="8" fill="#3B82F6" opacity="0.1" class="box" />
