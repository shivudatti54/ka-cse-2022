    <text x="290" y="370" class="label" text-anchor="middle" font-weight="bold">Loss vs Cost</text>
    <text x="290" y="395" class="description" text-anchor="middle">- **Loss**: Error for a single training example - </text>
  </g>

  <g id="step3a" class="step" data-narration="Moving to the next concept">
    <path d="M 290 420 L 590 450" class="arrow" />
  </g>

  <!-- Step 4: Desirable Properties -->
  <g id="step4" class="step" data-narration="Desirable Properties: 1. **Differentiable**: Enables gradient-based optimization 2">
    <rect x="450" y="450" width="280" height="80" rx="8" fill="#EC4899" opacity="0.1" class="box" />
    <text x="590" y="480" class="label" text-anchor="middle" font-weight="bold">Desirable Properties</text>
    <text x="590" y="505" class="description" text-anchor="middle">1. **Differentiable**: Enables gradient-based opti</text>
  </g>

  <g id="step4a" class="step" data-narration="Moving to the next concept">
    <path d="M 590 530 L 290 560" class="arrow" />
  </g>

  <!-- Step 5: Regression Loss Functions -->
  <g id="step5" class="step" data-narration="Regression Loss Functions: ">
    <rect x="150" y="560" width="280" height="80" rx="8" fill="#F97316" opacity="0.1" class="box" />
    <text x="290" y="590" class="label" text-anchor="middle" font-weight="bold">Regression Loss Functions</text>
