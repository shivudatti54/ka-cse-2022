    <text x="590" y="700" class="label" text-anchor="middle" font-weight="bold">Mean Squared Error (MSE)</text>
    <text x="590" y="725" class="description" text-anchor="middle">``` MSE = (1/n) * Σ(y_i - ŷ_i)² ``` - **Properties</text>
