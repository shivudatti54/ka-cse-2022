    <text x="590" y="260" class="label" text-anchor="middle" font-weight="bold">The 7 Layers (Top to Bottom)</text>
    <text x="590" y="285" class="description" text-anchor="middle"></text>
  </g>

  <g id="step2a" class="step" data-narration="Moving to the next concept">
    <path d="M 590 310 L 290 340" class="arrow" />
  </g>

  <!-- Step 3: Layer 7: Application -->
  <g id="step3" class="step" data-narration="Layer 7: Application: - User interface to network - Protocols: HTTP, FTP, SMTP, DN">
    <rect x="150" y="340" width="280" height="80" rx="8" fill="#F97316" opacity="0.1" class="box" />
    <text x="290" y="370" class="label" text-anchor="middle" font-weight="bold">Layer 7: Application</text>
    <text x="290" y="395" class="description" text-anchor="middle">- User interface to network - Protocols: HTTP, FTP</text>
  </g>

  <g id="step3a" class="step" data-narration="Moving to the next concept">
    <path d="M 290 420 L 590 450" class="arrow" />
  </g>

