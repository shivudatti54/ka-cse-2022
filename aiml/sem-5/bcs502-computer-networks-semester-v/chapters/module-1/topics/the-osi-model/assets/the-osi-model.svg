  <g id="step4" class="step" data-narration="Layer 6: Presentation: - Data translation, encryption, compression - Formats: JPEG,">
    <rect x="450" y="450" width="280" height="80" rx="8" fill="#EC4899" opacity="0.1" class="box" />
    <text x="590" y="480" class="label" text-anchor="middle" font-weight="bold">Layer 6: Presentation</text>
    <text x="590" y="505" class="description" text-anchor="middle">- Data translation, encryption, compression - Form</text>
  </g>

  <g id="step4a" class="step" data-narration="Moving to the next concept">
    <path d="M 590 530 L 290 560" class="arrow" />
  </g>

  <!-- Step 5: Layer 5: Session -->
  <g id="step5" class="step" data-narration="Layer 5: Session: - Session establishment, maintenance, termination - Manages ">
    <rect x="150" y="560" width="280" height="80" rx="8" fill="#F97316" opacity="0.1" class="box" />
    <text x="290" y="590" class="label" text-anchor="middle" font-weight="bold">Layer 5: Session</text>
    <text x="290" y="615" class="description" text-anchor="middle">- Session establishment, maintenance, termination </text>
  </g>

  <g id="step5a" class="step" data-narration="Moving to the next concept">
