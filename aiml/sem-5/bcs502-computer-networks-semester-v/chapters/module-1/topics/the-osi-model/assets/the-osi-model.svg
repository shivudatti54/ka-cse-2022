  </g>

  <!-- Step 6: Layer 4: Transport -->
  <g id="step6" class="step" data-narration="Layer 4: Transport: - End-to-end delivery, reliability - Protocols: TCP (reliabl">
    <rect x="450" y="670" width="280" height="80" rx="8" fill="#EC4899" opacity="0.1" class="box" />
    <text x="590" y="700" class="label" text-anchor="middle" font-weight="bold">Layer 4: Transport</text>
    <text x="590" y="725" class="description" text-anchor="middle">- End-to-end delivery, reliability - Protocols: TC</text>
  </g>

  <g id="step6a" class="step" data-narration="Moving to the next concept">
    <path d="M 590 750 L 290 780" class="arrow" />
  </g>

  <!-- Step 7: Layer 3: Network -->
  <g id="step7" class="step" data-narration="Layer 3: Network: - Logical addressing, routing - Protocols: IP, ICMP, OSPF, B">
    <rect x="150" y="780" width="280" height="80" rx="8" fill="#F97316" opacity="0.1" class="box" />
    <text x="290" y="810" class="label" text-anchor="middle" font-weight="bold">Layer 3: Network</text>
    <text x="290" y="835" class="description" text-anchor="middle">- Logical addressing, routing - Protocols: IP, ICM</text>
  </g>
</svg>