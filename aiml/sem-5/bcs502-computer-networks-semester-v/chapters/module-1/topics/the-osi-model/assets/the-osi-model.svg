<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; fill: #1F2937; }
      .label { font-size: 14px; fill: #374151; }
      .description { font-size: 12px; fill: #6B7280; }
      .box { stroke: #E5E7EB; stroke-width: 2; }
      .arrow { fill: none; stroke: #9CA3AF; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#9CA3AF" />
    </marker>
  </defs>

  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="OSI Reference Model">
    <text x="400" y="50" class="title" text-anchor="middle">OSI Reference Model</text>
  </g>

  <!-- Step 1: Overview -->
  <g id="step1" class="step" data-narration="Overview: Open Systems Interconnection model - 7 layers defining netwo">
    <rect x="150" y="120" width="280" height="80" rx="8" fill="#3B82F6" opacity="0.1" class="box" />
    <text x="290" y="150" class="label" text-anchor="middle" font-weight="bold">Overview</text>
    <text x="290" y="175" class="description" text-anchor="middle">Open Systems Interconnection model - 7 layers defi</text>
  </g>

  <g id="step1a" class="step" data-narration="Moving to the next concept">
    <path d="M 290 200 L 590 230" class="arrow" />
  </g>

  <!-- Step 2: The 7 Layers (Top to Bottom) -->
  <g id="step2" class="step" data-narration="The 7 Layers (Top to Bottom): ">
