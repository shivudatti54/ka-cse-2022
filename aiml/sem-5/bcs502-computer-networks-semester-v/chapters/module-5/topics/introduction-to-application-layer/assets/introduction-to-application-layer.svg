<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; fill: #1F2937; }
      .label { font-size: 14px; fill: #374151; }
      .description { font-size: 12px; fill: #6B7280; }
      .box { stroke: #E5E7EB; stroke-width: 2; }
      .arrow { fill: none; stroke: #9CA3AF; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#9CA3AF" />
    </marker>
  </defs>

  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="Application Deployment in PaaS">
    <text x="400" y="50" class="title" text-anchor="middle">Application Deployment in PaaS</text>
  </g>

  <!-- Step 1: Deployment Models -->
  <g id="step1" class="step" data-narration="Deployment Models: ">
    <rect x="150" y="120" width="280" height="80" rx="8" fill="#3B82F6" opacity="0.1" class="box" />
    <text x="290" y="150" class="label" text-anchor="middle" font-weight="bold">Deployment Models</text>
    <text x="290" y="175" class="description" text-anchor="middle"></text>
  </g>

  <g id="step1a" class="step" data-narration="Moving to the next concept">
    <path d="M 290 200 L 590 230" class="arrow" />
  </g>

  <!-- Step 2: 1. Git-based Deployment -->
  <g id="step2" class="step" data-narration="1. Git-based Deployment: - Push code to Git repository - Platform automatically build">
    <rect x="450" y="230" width="280" height="80" rx="8" fill="#EC4899" opacity="0.1" class="box" />
    <text x="590" y="260" class="label" text-anchor="middle" font-weight="bold">1. Git-based Deployment</text>
    <text x="590" y="285" class="description" text-anchor="middle">- Push code to Git repository - Platform automatic</text>
  </g>

  <g id="step2a" class="step" data-narration="Moving to the next concept">
    <path d="M 590 310 L 290 340" class="arrow" />
  </g>

  <!-- Step 3: 2. Container-based Deployment -->
  <g id="step3" class="step" data-narration="2. Container-based Deployment: - Push Docker images - Platform runs containers - Examples: ">
    <rect x="150" y="340" width="280" height="80" rx="8" fill="#F97316" opacity="0.1" class="box" />
    <text x="290" y="370" class="label" text-anchor="middle" font-weight="bold">2. Container-based Deployment</text>
    <text x="290" y="395" class="description" text-anchor="middle">- Push Docker images - Platform runs containers - </text>
  </g>

  <g id="step3a" class="step" data-narration="Moving to the next concept">
    <path d="M 290 420 L 590 450" class="arrow" />
  </g>

  <!-- Step 4: 3. Source Code Upload -->
  <g id="step4" class="step" data-narration="3. Source Code Upload: - Upload code archive (ZIP) - Platform builds from source - ">
    <rect x="450" y="450" width="280" height="80" rx="8" fill="#EC4899" opacity="0.1" class="box" />
    <text x="590" y="480" class="label" text-anchor="middle" font-weight="bold">3. Source Code Upload</text>
    <text x="590" y="505" class="description" text-anchor="middle">- Upload code archive (ZIP) - Platform builds from</text>
  </g>

  <g id="step4a" class="step" data-narration="Moving to the next concept">
    <path d="M 590 530 L 290 560" class="arrow" />
  </g>

  <!-- Step 5: Deployment Workflow -->
  <g id="step5" class="step" data-narration="Deployment Workflow: ``` ┌──────────┐    ┌──────────┐    ┌──────────┐    ┌───────">
    <rect x="150" y="560" width="280" height="80" rx="8" fill="#F97316" opacity="0.1" class="box" />
    <text x="290" y="590" class="label" text-anchor="middle" font-weight="bold">Deployment Workflow</text>
    <text x="290" y="615" class="description" text-anchor="middle">``` ┌──────────┐    ┌──────────┐    ┌──────────┐  </text>
  </g>

  <g id="step5a" class="step" data-narration="Moving to the next concept">
    <path d="M 290 640 L 590 670" class="arrow" />
  </g>

  <!-- Step 6: Deployment Strategies -->
  <g id="step6" class="step" data-narration="Deployment Strategies: | Strategy | Description | Downtime | Risk | |----------|---">
    <rect x="450" y="670" width="280" height="80" rx="8" fill="#EC4899" opacity="0.1" class="box" />
    <text x="590" y="700" class="label" text-anchor="middle" font-weight="bold">Deployment Strategies</text>
    <text x="590" y="725" class="description" text-anchor="middle">| Strategy | Description | Downtime | Risk | |----</text>
  </g>

  <g id="step6a" class="step" data-narration="Moving to the next concept">
    <path d="M 590 750 L 290 780" class="arrow" />
  </g>

  <!-- Step 7: Blue-Green Deployment -->
  <g id="step7" class="step" data-narration="Blue-Green Deployment: ``` Load Balancer │ ┌────────┴────────┐ │                 │ ">
    <rect x="150" y="780" width="280" height="80" rx="8" fill="#F97316" opacity="0.1" class="box" />
    <text x="290" y="810" class="label" text-anchor="middle" font-weight="bold">Blue-Green Deployment</text>
    <text x="290" y="835" class="description" text-anchor="middle">``` Load Balancer │ ┌────────┴────────┐ │         </text>
  </g>
</svg>