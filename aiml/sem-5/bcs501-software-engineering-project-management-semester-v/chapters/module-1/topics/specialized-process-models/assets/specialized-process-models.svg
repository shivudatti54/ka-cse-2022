    <rect x="450" y="450" width="280" height="80" rx="8" fill="#EC4899" opacity="0.1" class="box" />
    <text x="590" y="480" class="label" text-anchor="middle" font-weight="bold">Aspect-Oriented Software Development (AO</text>
    <text x="590" y="505" class="description" text-anchor="middle">Addresses cross-cutting concerns separately. **Cro</text>
  </g>

