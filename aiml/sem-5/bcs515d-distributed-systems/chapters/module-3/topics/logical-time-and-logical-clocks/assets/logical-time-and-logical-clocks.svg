<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" data-topic-id="logical-time-and-logical-clocks">
  <style>
    * {
      font-family: Arial, sans-serif;
      font-size: 16px;
    }
    
    .background {
      fill: #E0E0FF;
    }
    
    .section {
      margin-bottom: 20px;
    }
    
    .title {
      font-size: 24px;
      font-weight: bold;
    }
    
    .narration {
      font-size: 18px;
      font-style: italic;
    }
  </style>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7E5F5" stop-opacity="1" />
      <stop offset="100%" stop-color="#ADD8E8" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect class="background" fill="url(#gradient)" width="100%" height="100%" />
  <g transform="translate(10, 10)">
    <text class="title" x="20" y="30" text-anchor="middle">Logical Time and Logical Clocks</text>
    <rect x="20" y="60" width="380" height="80" rx="10" fill="#ADD8E8" />
    <div class="section" data-narration="Introduction">
      <text x="20" y="100" class="narration">In distributed systems, time plays a crucial role in synchronizing the behavior of multiple processes and nodes.</text>
      <text x="20" y="130" class="narration">Logical time refers to the concept of time in a distributed system, where all nodes have a synchronized view of the time.</text>
    </div>
    <div class="section" data-narration="Definitions">
      <text x="20" y="180" class="narration">Logical time is a concept that is relative to a specific node in a distributed system.</text>
      <text x="20" y="210" class="narration">Each node has its own notion of time, which is not necessarily synchronized with other nodes.</text>
    </div>
    <div class="section" data-narration="Clock Skew">
      <text x="20" y="260" class="narration">Clock skew occurs when two or more nodes have different views of the time.</text>
      <text x="20" y="290" class="narration">This can lead to inconsistencies in the ordering of events and make it difficult to synchronize the behavior of nodes.</text>
    </div>
    <div class="section" data-narration="Event Ordering">
      <text x="20" y="340" class="narration">Event ordering refers to the relative order in which events occur within a distributed system.</text>
      <text x="20" y="370" class="narration">Logical clocks are used to ensure that events are ordered correctly across different nodes.</text>
    </div>
    <div class="section" data-narration="Synchronization">
      <text x="20" y="410" class="narration">Synchronization occurs when all nodes in a distributed system agree on a common state of the system.</text>
    </div>
    <svg>
      <circle cx="200" cy="200" r="100" fill="#4CAF50" />
      <rect x="50" y="150" width="120" height="50" rx="10" fill="#8BC34A" />
      <rect x="300" y="150" width="120" height="50" rx="10" fill="#4CAF50" />
      <path d="M 150, 50 L 250, 50 L 250, 150 L 150, 150 Z" stroke="#4CAF50" stroke-width="2" />
    </svg>