<svg width="420" height="400" data-topic-id="global-states-1-12082024-annexure-ii-2-textbook-ch" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9e4ca" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <style>
    .section {
      margin-bottom: 20px;
    }
    .section:after {
      content: attr(data-narration);
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #ffffff;
      padding: 5px;
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
  </style>
  <g transform="translate(10, 20)">
    <rect x="10" y="10" width="400" height="360" fill="url(#pastel-gradient)"/>
    <path d="M 10 20 C 30 20 30 50 10 50" stroke="#3498db" stroke-width="2" fill="none"/>
    <text x="20" y="50" font-size="24" font-family="Arial, sans-serif" fill="#2c3e50">Global States</text>
    <rect x="20" y="70" width="340" height="50" fill="#ffffff" rx="5"/>
    <text x="20" y="80" font-size="18" font-family="Arial, sans-serif" fill="#2c3e50">Definition</text>
    <section class="section" data-narration="A global state is a shared state that is accessible to all processes or threads in the system. It represents the current status of the system, including the state of each resource, the status of each process, and any other relevant information.">
      <rect x="20" y="90" width="300" height="30" fill="#ffffff" rx="5"/>
      <text x="20" y="100" font-size="14" font-family="Arial, sans-serif" fill="#2c3e50" data-topic-id="global-states-1-12082024-annexure-ii-2-textbook-ch">Definition</text>
      <rect x="20" y="120" width="340" height="30" fill="#ffffff" rx="5"/>
      <text x="20" y="130" font-size="14" font-family="Arial, sans-serif" fill="#2c3e50" data-topic-id="global-states-1-12082024-annexure-ii-2-textbook-ch">Types of Global States</text>
      <rect x="20" y="160" width="300" height="30" fill="#ffffff" rx="5"/>
      <text x="20" y="170" font-size="14" font-family="Arial, sans-serif" fill="#2c3e50" data-topic-id="global-states-1-12082024-annexure-ii-2-textbook-ch">Characteristics of Global States</text>
    </section>
    <section class="section" data-narration="A local state is the state of a process or thread, which is unique to that process. A global state is the shared state of all processes in a distributed system.">
      <rect x="20" y="190" width="300" height="30" fill="#ffffff" rx="5"/>
      <text x="20" y="200" font-size="14" font-family="Arial, sans-serif" fill="#2c3e50" data-topic-id="global-states-1-12082024-annexure-ii-2-textbook-ch">Local State vs Global State</text>
      <rect x="20" y="230" width="340" height="30" fill="#ffffff" rx="5"/>
      <text x="20" y="240" font-size="14" font-family="Arial, sans-serif" fill="#2c3e50" data-topic-id="global-states-1-12082024-annexure-ii-2-textbook-ch">Clocks and Global States</text>
    </section>
    <section class="section" data-narration="Timestamps are the timestamps generated by a clock. Clock order is determined by the timestamps.">
      <rect x="20" y="270" width="300" height="30" fill="#ffffff" rx="5"/>
      <text x="20" y="280" font-size="14" font-family="Arial, sans-serif" fill="#2c3e50" data-topic-id="global-states-1-12082024-annexure-ii-2-textbook-ch">Clock Order</text>
      <rect x="20" y="310" width="340" height="30" fill="#ffffff" rx="5"/>
      <text x="20" y="320" font-size="14" font-family="Arial, sans-serif" fill="#2c3e50" data-topic-id="global-states-1-12082024-annexure-ii-2-textbook-ch">An Example</text>
    </section>
    <rect x="20" y="350" width="340" height="30" fill="#ffffff" rx="5"/>
    <text x="20" y="360" font-size="14" font-family="Arial, sans-serif" fill="#2c3e50" data-topic-id="global-states-1-12082024-annexure-ii-2-textbook-ch">Conclusion</text>
    <g transform="translate(10, 380)">
      <rect x="10" y="400" width="400" height="10" fill="#ffffff" rx="5"/>
      <text x="20" y="410" font-size="18" font-family="Arial, sans-serif" fill="#2c3e50" data-topic-id="global-states-1-12082024-annexure-ii-2-textbook-ch">Global States 1</text>
    </g>
  </g>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" dur="0.5s" begin="0s" repeatCount="indefinite"/>
