<svg width="420" height="400" data-topic-id="directory-services" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7E2F5"/>
      <stop offset="50%" stop-color="#E0F0FF"/>
      <stop offset="100%" stop-color="#C7E2F5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Section 1: Introduction to Directory Services -->
  <section data-narration="Introduction">
    <rect x="10" y="10" width="400" height="50" fill="#E0F0FF"/>
    <g transform="translate(10, 20)">
      <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" fill="#333">Directory Services</text>
    </g>
    <animate attributeName="opacity" dur="2s" begin="0s" fill="freeze"/>
    <animate attributeName="y" dur="2s" begin="0s" fill="freeze"/>
  </section>
  
  <!-- Section 2: Key Concepts and Terminology -->
  <section data-narration="Key Concepts and Terminology">
    <rect x="10" y="70" width="400" height="200" fill="#C7E2F5"/>
    <g transform="translate(10, 80)">
      <text x="10" y="90" font-size="18" font-family="Arial, sans-serif" fill="#333">Directory Information Base (DIB)</text>
      <line x1="50" y1="100" x2="50" y2="150" stroke="#666" stroke-width="2" stroke-dasharray="3,3"/>
      <g transform="translate(60, 110)">
        <text x="10" y="120" font-size="16" font-family="Arial, sans-serif" fill="#666">Directory Entry</text>
        <animate attributeName="y" dur="2s" begin="0s" fill="freeze"/>
      </g>
      <g transform="translate(60, 130)">
        <text x="10" y="150" font-size="16" font-family="Arial, sans-serif" fill="#666">Attribute</text>
        <animate attributeName="y" dur="2s" begin="0s" fill="freeze"/>
      </g>
    </g>
    <animate attributeName="opacity" dur="2s" begin="0.5s" fill="freeze"/>
    <animate attributeName="y" dur="2s" begin="0.5s" fill="freeze"/>
  </section>
  
  <!-- Section 3: Directory Entry -->
  <section data-narration="Directory Entry">
    <rect x="10" y="270" width="400" height="150" fill="#E0F0FF"/>
    <g transform="translate(10, 280)">
      <text x="10" y="290" font-size="18" font-family="Arial, sans-serif" fill="#333">Directory Entry</text>
      <line x1="50" y1="310" x2="50" y2="370" stroke="#666" stroke-width="2" stroke-dasharray="3,3"/>
      <g transform="translate(60, 330)">
        <text x="10" y="350" font-size="16" font-family="Arial, sans-serif" fill="#666">Attributes</text>
        <animate attributeName="y" dur="2s" begin="0s" fill="freeze"/>
      </g>
    </g>
    <animate attributeName="opacity" dur="2s" begin="1s" fill="freeze"/>
    <animate attributeName="y" dur="2s" begin="1s" fill="freeze"/>
  </section>
  
  <!-- Section 4: Attribute -->
  <section data-narration="Attribute">
    <rect x="10" y="430" width="400" height="100" fill="#C7E2F5"/>
    <g transform="translate(10, 440)">
      <text x="10" y="460" font-size="18" font-family="Arial, sans-serif" fill="#333">Attribute</text>
      <line x1="50" y1="480" x2="50" y2="530" stroke="#666" stroke-width="2" stroke-dasharray="3,3"/>
      <g transform="translate(60, 580)">
        <text x="10" y="600" font-size="16" font-family="Arial, sans-serif" fill="#666">Type</text>
        <animate attributeName="y" dur="2s" begin="0s" fill="freeze"/>
      </g>
    </g>
    <animate attributeName="opacity" dur="2s" begin="1.5s" fill="freeze"/>
    <animate attributeName="y" dur="2s" begin="1.5s" fill="freeze"/>
  </section>
  
  <!-- Section 5: Distinguished Name (DN) -->
  <section data-narration="Distinguished Name (DN)">
    <rect x="10" y="590" width="400" height="80" fill="#E0F0FF"/>
    <g transform="translate(10, 600)">
      <text x="10" y="620" font-size="18" font-family="Arial, sans-serif" fill="#333">Distinguished Name (DN)</text>
      <line x1="50" y1="640" x2="50" y2="690" stroke="#666" stroke-width="2" stroke-dasharray="3,3"/>
      <g transform="translate(60, 690)">
        <text x="10" y="710" font-size="16" font-family="Arial, sans-serif" fill="#666">Combines RDN with parent DNs</text>
        <animate attributeName="y" dur="2s" begin="0s" fill="freeze"/>
      </g>
    </g>
    <animate attributeName="opacity" dur="2s" begin="2s" fill="freeze"/>
    <animate attributeName="y" dur="2s" begin="2s" fill="freeze"/>
  </section>
  
  <!-- Footer -->
  <rect x="0" y="370" width="420" height="30" fill="#E0F0FF"/>
  <g transform="translate(10, 380)">
    <text x="10" y="400" font-size="18" font-family="Arial, sans-serif" fill="#333">Directory Services</text>
  </g>
</svg>