<svg
  width="420"
  height="400"
  data-topic-id="distributed-systems-distributed-file-systems-introduction-and-file-service-architecture"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 420 400"
  color-scheme="indigo,teal,orange"
>
  <title>Textbook Chapter 121: Distributed File Systems - Introduction and File Service Architecture</title>
  <footer>
    <!-- Footer content goes here -->
  </footer>
  
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Section 1: Overview -->
  <section data-narration="Overview">
    <rect x="0" y="50" width="420" height="100" fill="#C7B8EA" rx="10"/>
    <g transform="translate(10, 10)">
      <circle cx="0" cy="0" r="10" fill="#fff" stroke="#000" stroke-width="2"/>
      <text x="20" y="25" fill="#000" font-size="16">Distributed File Systems</text>
      <text x="20" y="40" fill="#000" font-size="14">Overview</text>
    </g>
  </section>
  
  <!-- Section 2: Key Characteristics -->
  <section data-narration="Key Characteristics">
    <rect x="0" y="150" width="420" height="100" fill="#C5CAE9" rx="10"/>
    <g transform="translate(10, 10)">
      <circle cx="0" cy="0" r="10" fill="#fff" stroke="#000" stroke-width="2"/>
      <text x="20" y="25" fill="#000" font-size="16">Characteristics</text>
      <text x="20" y="40" fill="#000" font-size="14">Scalability, Flexibility, High Availability</text>
    </g>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 250" dur="2000" begin="0s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 3: Types of Distributed File Systems -->
  <section data-narration="Types of Distributed File Systems">
    <rect x="0" y="250" width="420" height="100" fill="#C7B8EA" rx="10"/>
    <g transform="translate(10, 10)">
      <circle cx="0" cy="0" r="10" fill="#fff" stroke="#000" stroke-width="2"/>
      <text x="20" y="25" fill="#000" font-size="16">Types</text>
      <text x="20" y="40" fill="#000" font-size="14">Client-Server Model, P2P Model</text>
    </g>
    <animateTransform attributeName="transform" type="translate" from="0 300" to="0 400" dur="2000" begin="0s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 4: File Service Architecture -->
  <section data-narration="File Service Architecture">
    <rect x="0" y="350" width="420" height="100" fill="#C5CAE9" rx="10"/>
    <g transform="translate(10, 10)">
      <circle cx="0" cy="0" r="10" fill="#fff" stroke="#000" stroke-width="2"/>
      <text x="20" y="25" fill="#000" font-size="16">Architecture</text>
      <text x="20" y="40" fill="#000" font-size="14">File System Namespace, File System Objects, File System Services</text>
    </g>
    <animateTransform attributeName="transform" type="translate" from="0 350" to="0 450" dur="2000" begin="0s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 5: File Service Services -->
  <section data-narration="File Service Services">
    <rect x="0" y="50" width="420" height="100" fill="#C7B8EA" rx="10"/>
    <g transform="translate(10, 10)">
      <circle cx="0" cy="0" r="10" fill="#fff" stroke="#000" stroke-width="2"/>
      <text x="20" y="25" fill="#000" font-size="16">Services</text>
      <text x="20" y="40" fill="#000" font-size="14">File Creation, File Deletion, File Access, File Sharing</text>
    </g>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 150" dur="2000" begin="0s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 6: Example of File Service Architecture -->
  <section data-narration="Example of File Service Architecture">
    <rect x="0" y="150" width="420" height="100" fill="#C5CAE9" rx="10"/>
    <g transform="translate(10, 10)">
      <circle cx="0" cy="0" r="10" fill="#fff" stroke="#000" stroke-width="2"/>
      <text x="20" y="25" fill="#000" font-size="16">Example</text>
      <text x="20" y="40" fill="#000" font-size="14">Client requests access to shared file</text>
    </g>
    <animateTransform attributeName="transform" type="translate" from="0 200" to="0 250" dur="2000" begin="0s" repeatCount="indefinite"/>
  </section>
  
  <!-- Footer -->
  <footer>
    <!-- Footer content goes here -->
  </footer>
</svg>