<svg width="420" height="400" data-topic-id="name-services-and-the-domain-name-system" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>
  <g id="title">
    <text x="10" y="10" font-size="24" fill="#2E4053">Name Services and the Domain Name System</text>
  </g>
  <g id="introduction">
    <rect x="20" y="30" width="360" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="40" font-size="18" fill="#2E4053" data-narration="Introduction to Name Services and the Domain Name System">Introduction</text>
    <animateTransform attributeName="transform" type="translate" from="0 30" to="0 120" dur="2s" begin="0s"/>
  </g>
  <g id="what-is-a-name-service">
    <rect x="20" y="120" width="360" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="130" font-size="18" fill="#2E4053" data-narration="What is a Name Service?">What is a Name Service?</text>
    <animateTransform attributeName="transform" type="translate" from="0 120" to="0 240" dur="2s" begin="0s"/>
  </g>
  <g id="types-of-name-services">
    <rect x="20" y="240" width="360" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="250" font-size="18" fill="#2E4053" data-narration="Types of Name Services">Types of Name Services</text>
    <animateTransform attributeName="transform" type="translate" from="0 240" to="0 360" dur="2s" begin="0s"/>
    <g>
      <path d="M 100 250 L 150 250" stroke="#3498DB" stroke-width="2" fill="none"/>
      <path d="M 150 250 L 200 250" stroke="#F1C40F" stroke-width="2" fill="none"/>
    </g>
  </g>
  <g id="how-dns-works">
    <rect x="20" y="360" width="360" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="370" font-size="18" fill="#2E4053" data-narration="How DNS Works">How DNS Works</text>
    <animateTransform attributeName="transform" type="translate" from="0 360" to="0 480" dur="4s" begin="0s"/>
    <g>
      <circle cx="200" cy="200" r="50" fill="#3498DB" stroke="#3498DB" stroke-width="2"/>
      <line x1="200" y1="200" x2="200" y2="300" stroke="#3498DB" stroke-width="2"/>
      <line x1="200" y1="300" x2="400" y2="300" stroke="#3498DB" stroke-width="2"/>
      <line x1="400" y1="300" x2="400" y2="200" stroke="#3498DB" stroke-width="2"/>
      <text x="200" y="200" font-size="18" fill="#3498DB">Root Server</text>
      <text x="200" y="300" font-size="18" fill="#3498DB">Authoritative Server</text>
    </g>
  </g>
  <g id="conclusion">
    <rect x="20" y="480" width="360" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="490" font-size="18" fill="#2E4053" data-narration="Conclusion">Conclusion</text>
    <animateTransform attributeName="transform" type="translate" from="0 480" to="0 600" dur="2s" begin="0s"/>
  </g>
  <g id="footer">
    <text x="10" y="590" font-size="18" fill="#2E4053">Copyright 2024</text>
  </g>
</svg>