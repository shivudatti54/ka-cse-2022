<svg width="420" height="400" data-topic-id="name-services-introduction">
  <defs>
    <linearGradient id="name-services-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A288A" stop-opacity="1"/>
      <stop offset="50%" stop-color="#4682B4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFC107" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Introduction to Name Services</title>
  <text x="10" y="20" font-size="24" font-family="Arial" fill="#fff">
    <tspan x="10" y="20">Name Services Introduction</tspan>
    <tspan x="10" y="40" font-weight="bold">Explore the fundamental component that provides a mapping between human-readable names and low-level addresses or identifiers that systems use to locate resources.</tspan>
  </text>
  <rect x="10" y="60" width="400" height="30" fill="url(#name-services-grad)"/>
  <g transform="translate(10, 80)">
    <rect x="0" y="0" width="100" height="30" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#000">
      <tspan x="10" y="10">What are Name Services?</tspan>
      <tspan x="10" y="30" font-weight="bold">Decouple the logical name of a resource from its physical location.</tspan>
      <data-narration id="name-services-definition" x="10" y="50" font-size="14" font-family="Arial" fill="#000">
        Name services provide a mapping between human-readable names and low-level addresses or identifiers that systems use to locate resources.
      </data-narration>
    </text>
    <animate begin="0s" dur="2s" repeatCount="indefinite">
      <path d="M 0,0 L 100,0 L 100,30 L 0,30 Z" fill="#fff" stroke="#000" stroke-width="2"/>
    </animate>
  </g>
  <g transform="translate(10, 120)">
    <rect x="0" y="0" width="100" height="30" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#000">
      <tspan x="10" y="10">The Need for Name Services in Distributed Systems</tspan>
      <tspan x="10" y="30" font-weight="bold">Scalability, transparency, replication management, and dynamic updates.</tspan>
      <data-narration id="name-services-need" x="10" y="50" font-size="14" font-family="Arial" fill="#000">
        Distributed systems present several challenges that name services are designed to solve.
      </data-narration>
    </text>
    <animate begin="0s" dur="2s" repeatCount="indefinite">
      <path d="M 0,0 L 100,0 L 100,30 L 0,30 Z" fill="#fff" stroke="#000" stroke-width="2"/>
    </animate>
  </g>
  <g transform="translate(10, 250)">
    <rect x="0" y="0" width="100" height="30" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#000">
      <tspan x="10" y="10">Key Concept: Decoupling Logical Name from Physical Location</tspan>
      <tspan x="10" y="30" font-weight="bold">Allows resources to be moved, replicated, or migrated without affecting applications.</tspan>
      <data-narration id="name-services-key-concept" x="10" y="50" font-size="14" font-family="Arial" fill="#000">
        Name services decouple the logical name of a resource from its physical location. This allows resources to be moved, replicated, or migrated without affecting applications.
      </data-narration>
    </text>
    <animate begin="0s" dur="2s" repeatCount="indefinite">
      <path d="M 0,0 L 100,0 L 100,30 L 0,30 Z" fill="#fff" stroke="#000" stroke-width="2"/>
    </animate>
  </g>
  <g transform="translate(10, 340)">
    <rect x="0" y="0" width="100" height="30" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#000">
      <tspan x="10" y="10">Benefits of Name Services</tspan>
      <tspan x="10" y="30" font-weight="bold">Scalability, transparency, replication management, and dynamic updates.</tspan>
      <data-narration id="name-services-benefits" x="10" y="50" font-size="14" font-family="Arial" fill="#000">
        Name services provide several benefits in distributed systems.
      </data-narration>
    </text>
    <animate begin="0s" dur="2s" repeatCount="indefinite">
      <path d="M 0,0 L 100,0 L 100,30 L 0,30 Z" fill="#fff" stroke="#000" stroke-width="2"/>
    </animate>
  </g>
  <footer>
    <text x="10" y="380" font-size="18" font-family="Arial" fill="#fff">
      <tspan x="10" y="380">Name Services Introduction</tspan>
      <tspan x="10" y="400" font-size="14" font-family="Arial" fill="#fff">Learn more about the fundamental component that provides a mapping between human-readable names and low-level addresses or identifiers that systems use to locate resources.</tspan>
    </text>
  </footer>
</svg>