<svg width="420" height="400" data-topic-id="distributed-systems-chapter-17-76" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title -->
  <text x="10" y="10" font-size="24" font-weight="bold" text-anchor="middle" fill="#2196F3">
    Distributed Systems: Chapter 17-76
  </text>
  
  <!-- Section 1: Introduction to Distributed Transactions -->
  <rect x="20" y="40" width="360" height="80" fill="#fff" rx="10" data-narration="Introduction to Distributed Transactions">
    <animateTransform attributeName="transform" type="translate" from="0,40" to="-10,40" dur="2s" begin="-1s" />
    <text x="20" y="40" font-size="18" font-weight="bold" text-anchor="middle" fill="#2196F3">
      Introduction to Distributed Transactions
    </text>
    <text x="20" y="60" font-size="14" font-weight="normal" text-anchor="middle" fill="#666666">
      A distributed transaction is a sequence of operations that are executed as a single, all-or-nothing unit of work across multiple resources in different locations.
    </text>
  </rect>
  
  <!-- Section 2: Types of Distributed Transactions -->
  <rect x="20" y="120" width="360" height="160" fill="#fff" rx="10" data-narration="Types of Distributed Transactions">
    <animateTransform attributeName="transform" type="translate" from="0,120" to="-10,120" dur="2s" begin="0s" />
    <text x="20" y="120" font-size="18" font-weight="bold" text-anchor="middle" fill="#2196F3">
      Types of Distributed Transactions
    </text>
    <text x="20" y="140" font-size="14" font-weight="normal" text-anchor="middle" fill="#666666">
      A flat distributed transaction is one in which all the resources involved in the transaction are at the same level of autonomy.
    </text>
    <rect x="20" y="160" width="300" height="10" fill="#fff" rx="5" data-narration="Characteristics of Flat Distributed Transactions" />
    <text x="20" y="165" font-size="14" font-weight="normal" text-anchor="middle" fill="#666666">
      Characteristics of Flat Distributed Transactions:
      <tspan x="20" y="168" font-size="14" font-weight="normal" text-anchor="middle">All resources involved are at the same level of autonomy.</tspan>
      <tspan x="20" y="175" font-size="14" font-weight="normal" text-anchor="middle">All resources are subject to the same recovery rules.</tspan>
      <tspan x="20" y="182" font-size="14" font-weight="normal" text-anchor="middle">Failure of any resource will result in failure of the entire transaction.</tspan>
    </text>
    <text x="20" y="190" font-size="14" font-weight="normal" text-anchor="middle" fill="#666666">
      Nested Distributed Transactions:
      <tspan x="20" y="198" font-size="14" font-weight="normal" text-anchor="middle">Some resources are at one level of autonomy, while others are at a higher or lower level.</tspan>
      <tspan x="20" y="205" font-size="14" font-weight="normal" text-anchor="middle">Each resource is subject to its own recovery rules.</tspan>
      <tspan x="20" y="212" font-size="14" font-weight="normal" text-anchor="middle">Failure of any resource will result in the failure of the entire transaction, but some resources may be recovered.</tspan>
    </text>
  </rect>
  
  <!-- Section 3: Characteristics of Flat Distributed Transactions -->
  <rect x="20" y="280" width="360" height="80" fill="#fff" rx="10" data-narration="Characteristics of Flat Distributed Transactions">
    <animateTransform attributeName="transform" type="translate" from="0,280" to="-10,280" dur="2s" begin="1s" />
    <text x="20" y="280" font-size="18" font-weight="bold" text-anchor="middle" fill="#2196F3">
      Characteristics of Flat Distributed Transactions
    </text>
    <text x="20" y="300" font-size="14" font-weight="normal" text-anchor="middle" fill="#666666">
      All resources involved are at the same level of autonomy.
    </text>
    <rect x="20" y="320" width="300" height="10" fill="#fff" rx="5" data-narration="Recovery Rules" />
    <text x="20" y="325" font-size="14" font-weight="normal" text-anchor="middle" fill="#666666">
      All resources are subject to the same recovery rules.
    </text>
    <text x="20" y="340" font-size="14" font-weight="normal" text-anchor="middle" fill="#666666">
      Failure of any resource will result in failure of the entire transaction.
    </text>
  </rect>
  
  <!-- Section 4: Example of Flat Distributed Transaction -->
  <rect x="20" y="400" width="360" height="160" fill="#fff" rx="10" data-narration="Example of Flat Distributed Transaction">
    <animateTransform attributeName="transform" type="translate" from="0,400" to="-10,400" dur="2s" begin="2s" />
    <text x="20" y="400" font-size="18" font-weight="bold" text-anchor="middle" fill="#2196F3">
      Example of Flat Distributed Transaction
    </text>
    <rect x="20" y="420" width="300" height="10" fill="#fff" rx="5" data-narration="Transaction ID" />
    <text x="20" y="425" font-size="14" font-weight="normal" text-anchor="middle" fill="#666666">
      Transaction ID
    </text>
    <rect x="20" y="445" width="300" height="10" fill="#fff" rx="5" data-narration="Resources" />
    <text x="20" y="450" font-size="14" font-weight="normal" text-anchor="middle" fill="#666666">
      Resources
    </text>
    <rect x="20" y="470" width="300" height="10" fill="#fff" rx="5" data-narration="Operations" />
    <text x="20" y="475" font-size="14" font-weight="normal" text-anchor="middle" fill="#666666">
      Operations
    </text>
  </rect>
  
  <!-- Section 5: Example of Nested Distributed Transaction -->
  <rect x="20" y="560" width="360" height="160" fill="#fff" rx="10" data-narration="Example of Nested Distributed Transaction">
    <animateTransform attributeName="transform" type="translate" from="0,560" to="-10,560" dur="2s" begin="3s" />
    <text x="20" y="560" font-size="18" font-weight="bold" text-anchor="middle" fill="#2196F3">
      Example of Nested Distributed Transaction
    </text>
    <rect x="20" y="580" width="300" height="10" fill="#fff" rx="5" data-narration="Level of Autonomy" />
    <text x="20" y="585" font-size="14" font-weight="normal" text-anchor="middle" fill="#666666">
      Level of Autonomy
    </text>
    <rect x="20" y="605" width="300" height="10" fill="#fff" rx="5" data-narration="Recovery Rules" />
    <text x="20" y="610" font-size="14" font-weight="normal" text-anchor="middle" fill="#666666">
      Recovery Rules
    </text>
  </rect>
  
  <!-- Footer -->
  <text x="10" y="390" font-size="14" font-weight="normal" text-anchor="middle" fill="#666666">
    Distributed Systems: Chapter 17-76
  </text>
</svg>