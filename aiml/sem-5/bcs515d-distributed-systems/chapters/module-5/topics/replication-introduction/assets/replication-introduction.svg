<svg width="420" height="400" data-topic-id="replication-introduction">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#79C9E5" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7E6F8" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" rx="10" />

  <!-- Title -->
  <g transform="translate(50, 20)">
    <text x="0" y="0" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#34495E">
      Replication Introduction
    </text>
  </g>

  <!-- Section 1: Introduction to Sorting -->
  <g transform="translate(50, 100)" data-narration="Sorting is a fundamental concept in computer science that involves arranging a list of elements in a specific order, either ascending or descending.">
    <rect x="0" y="0" width="100%" height="50" fill="#E6F7E6" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#3E8E41">
      Sorting
    </text>
    <text x="10" y="40" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#3E8E41">
      Arranging elements in a specific order
    </text>
  </g>

  <!-- Section 2: Importance of Sorting -->
  <g transform="translate(50, 160)" data-narration="Sorting is essential in many real-world applications, such as data analysis, database management, and file systems.">
    <rect x="0" y="0" width="100%" height="50" fill="#E6F7E6" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#3E8E41">
      Importance of Sorting
    </text>
    <text x="10" y="40" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#3E8E41">
      Data analysis, database management, and file systems
    </text>
  </g>

  <!-- Section 3: Types of Sorting -->
  <g transform="translate(50, 220)" data-narration="There are two primary types of sorting: internal sorting and external sorting.">
    <rect x="0" y="0" width="100%" height="50" fill="#E6F7E6" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#3E8E41">
      Types of Sorting
    </text>
    <text x="10" y="40" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#3E8E41">
      Internal and External Sorting
    </text>
  </g>

  <!-- Section 4: Bubble Sort -->
  <g transform="translate(50, 280)" data-narration="Bubble sort is a simple sorting algorithm that works by repeatedly iterating through the list and swapping adjacent elements if they are in the wrong order.">
    <rect x="0" y="0" width="100%" height="50" fill="#E6F7E6" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#3E8E41">
      Bubble Sort
    </text>
    <text x="10" y="40" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#3E8E41">
      Repeatedly iterating through the list and swapping adjacent elements
    </text>
  </g>

  <!-- Section 5: Selection Sort -->
  <g transform="translate(50, 340)" data-narration="Selection sort is a sorting algorithm that works by selecting the smallest (or largest) element from the unsorted portion of the list and swapping it with the first element of the unsorted portion.">
    <rect x="0" y="0" width="100%" height="50" fill="#E6F7E6" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#3E8E41">
      Selection Sort
    </text>
    <text x="10" y="40" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#3E8E41">
      Selecting the smallest (or largest) element and swapping
    </text>
  </g>

  <!-- Section 6: Insertion Sort -->
  <g transform="translate(50, 400)" data-narration="Insertion sort is a sorting algorithm that works by iterating through the list one element at a time, inserting each element into its proper position in the sorted portion of the list.">
    <rect x="0" y="0" width="100%" height="50" fill="#E6F7E6" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#3E8E41">
      Insertion Sort
    </text>
    <text x="10" y="40" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#3E8E41">
      Iterating through the list one element at a time
    </text>
  </g>

  <!-- Animated arrow markers -->
  <path d="M 50 200 L 70 250" fill="#34A85A" stroke="#34A85A" stroke-width="2" />
  <path d="M 50 200 L 30 250" fill="#34A85A" stroke="#34A85A" stroke-width="2" />
  <path d="M 50 200 L 70 250" fill="#34A85A" stroke="#34A85A" stroke-width="2" />
  <path d="M 50 350 L 70 400" fill="#34A85A" stroke="#34A85A" stroke-width="2" />
  <path d="M 50 350 L 30 400" fill="#34A85A" stroke="#34A85A" stroke-width="2" />

  <!-- Footer -->
  <g transform="translate(50, 420)">
    <rect x="0" y="0" width="100%" height="50" fill="#E6F7E6" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#34495E">
      Replication Introduction
    </text>
  </g>
</svg>