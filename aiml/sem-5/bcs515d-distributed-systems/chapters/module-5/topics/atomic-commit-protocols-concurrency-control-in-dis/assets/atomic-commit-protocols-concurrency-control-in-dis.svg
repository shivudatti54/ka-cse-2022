<svg width="420" height="400" data-topic-id="atomic-commit-protocols-concurrency-control-in-distributed-dis">
  <style>
    /* Add some basic styling to our SVG */
    text {
      font-family: Arial, sans-serif;
      font-size: 16px;
      font-weight: bold;
      line-height: 1.5;
      color: #333;
    }
    rect {
      stroke: #fff;
      fill: #8f9cd6;
    }
    path {
      stroke: #333;
      stroke-width: 2;
    }
  </style>

  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9e4ca" stop-opacity="1" />
      <stop offset="100%" stop-color="#b2fffc" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="10" y="10" text-anchor="start" font-size="24" font-weight="bold" fill="#2f4f7f">Atomic Commit Protocols Concurrency Control in Distributed Systems</text>

  <!-- Section 1: Two-Phase Commit (2PC) Protocol -->
  <rect x="20" y="50" width="380" height="100" rx="10" fill="url(#pastel-gradient)" data-narration="The 2PC protocol involves two phases: Prepare and Commit. If all resources prepare successfully, the coordinated commit phase is executed to finalize the transaction." />
  <path d="M 20 50 L 40 70 L 60 70 L 80 50 Z" fill="none" stroke="#333" stroke-width="2" />
  <animateTransform attributeName="transform" type="translate" from="0,50" to="20,50" dur="2s" begin="0s" />
  <text x="100" y="80" text-anchor="start" font-size="16" fill="#2f4f7f">Prepare Phase</text>
  <text x="100" y="120" text-anchor="start" font-size="16" fill="#2f4f7f">Commit Phase</text>

  <!-- Section 2: Three-Phase Commit (3PC) Protocol -->
  <rect x="20" y="160" width="380" height="100" rx="10" fill="url(#pastel-gradient)" data-narration="The 3PC protocol includes a pre-prepare phase, where each resource can either accept or reject the transaction. If all resources accept, the transaction proceeds to the prepare phase." />
  <path d="M 20 160 L 40 180 L 60 180 L 80 160 Z" fill="none" stroke="#333" stroke-width="2" />
  <animateTransform attributeName="transform" type="translate" from="0,160" to="20,160" dur="2s" begin="2s" />
  <text x="100" y="190" text-anchor="start" font-size="16" fill="#2f4f7f">Pre-Prepare Phase</text>
  <text x="100" y="220" text-anchor="start" font-size="16" fill="#2f4f7f">Prepare Phase</text>

  <!-- Section 3: Pessimistic Two-Phase Commit (2PC) Protocol -->
  <rect x="20" y="280" width="380" height="100" rx="10" fill="url(#pastel-gradient)" data-narration="The pessimistic 2PC protocol assumes that a resource will always commit if it is prepared in the prepare phase." />
  <path d="M 20 280 L 40 300 L 60 300 L 80 280 Z" fill="none" stroke="#333" stroke-width="2" />
  <animateTransform attributeName="transform" type="translate" from="0,280" to="20,280" dur="2s" begin="4s" />
  <text x="100" y="310" text-anchor="start" font-size="16" fill="#2f4f7f">Prepare Phase</text>
  <text x="100" y="340" text-anchor="start" font-size="16" fill="#2f4f7f">Commit Phase</text>

  <!-- Section 4: Optimistic Two-Phase Commit (2PC) Protocol -->
  <rect x="20" y="360" width="380" height="100" rx="10" fill="url(#pastel-gradient)" data-narration="The optimistic 2PC protocol assumes that a resource will always commit if it is not prepared in the prepare phase." />
  <path d="M 20 360 L 40 380 L 60 380 L 80 360 Z" fill="none" stroke="#333" stroke-width="2" />
  <animateTransform attributeName="transform" type="translate" from="0,360" to="20,360" dur="2s" begin="6s" />
  <text x="100" y="380" text-anchor="start" font-size="16" fill="#2f4f7f">Prepare Phase</text>
  <text x="100" y="400" text-anchor="start" font-size="16" fill="#2f4f7f">Commit Phase</text>

  <!-- Section 5: Concurrency Control -->
  <rect x="20" y="160" width="380" height="100" rx="10" fill="url(#pastel-gradient)" data-narration="Concurrency control is the process of managing multiple transactions that access shared data in a distributed system. The goal is to prevent conflicts between transactions." />
  <path d="M 20 160 L 40 180 L 60 180 L 80 160 Z" fill="none" stroke="#333" stroke-width="2" />
  <animateTransform attributeName="transform" type="translate" from="0,160" to="20,160" dur="2s" begin="8s" />
  <text x="100" y="190" text-anchor="start" font-size="16" fill="#2f4f7f">Serial Consistency Model</text>
  <text x="100" y="220" text-anchor="start" font-size="16" fill="#2f4f7f">Concurrent Read and Write Model</text>

  <!-- Section 6: Distributed Deadlocks -->
  <rect x="20" y="280" width="380" height="100" rx="10" fill="url(#pastel-gradient)" data-narration="A distributed deadlock is a situation where two or more transactions are blocked indefinitely, each waiting for the other to release resources." />
  <path d="M 20 280 L 40 300 L 60 300 L 80 280 Z" fill="none" stroke="#333" stroke-width="2" />
  <animateTransform attributeName="transform" type="translate" from="0,280" to="20,280" dur="2s" begin="10s" />
  <text x="100" y="310" text-anchor="start" font-size="16" fill="#2f4f7f">Resource Deadlock</text>
  <text x="100" y="340" text-anchor="start" font-size="16" fill="#2f4f7f">Transaction Deadlock</text>

  <!-- Footer -->
  <text x="10" y="390" text-anchor="start" font-size="16" fill="#333">Atomic Commit Protocols Concurrency Control in Distributed Systems</text>
</svg>