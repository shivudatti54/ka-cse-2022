<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="coordination-and-agreement-in-group-communication" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    /* Add some basic styling to the SVG */
    svg {
      margin: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      background-color: #f0f0f0; /* Light gray background */
    }

    /* Gradient background */
    .gradient {
      background-image: linear-gradient(to bottom, #c7d2ff, #87ceeb);
      background-size: 100% 100%;
      height: 100%;
      width: 100%;
    }

    /* Indigo color scheme */
    .indigo {
      color: #3b5998;
    }

    /* Teal color scheme */
    .teal {
      color: #0097a7;
    }

    /* Orange accents */
    .orange {
      color: #f7dc6f;
    }
  </style>

  <!-- Title -->
  <rect x="10" y="10" width="400" height="50" class="gradient" style="fill-opacity: 0.5;"></rect>
  <text x="20" y="30" class="indigo" style="font-size: 24px; font-weight: bold;">Coordination and Agreement in Group Communication</text>

  <!-- Section 1: Introduction -->
  <rect x="10" y="80" width="400" height="50" class="gradient" style="fill-opacity: 0.5;"></rect>
  <text x="20" y="100" class="teal" data-narration="Introduction">Introduction</text>
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" repeatCount="indefinite">
    <circle cx="200" cy="150" r="20" class="orange" style="visibility: visible; opacity: 0; transform: rotate(0deg) scale(1, 1);"/>
    <text x="200" y="180" class="indigo" style="font-size: 18px;">Coordination and agreement are essential components of group communication.</text>
  </animate>

  <!-- Section 2: Definition of Coordination and Agreement -->
  <rect x="10" y="150" width="400" height="50" class="gradient" style="fill-opacity: 0.5;"></rect>
  <text x="20" y="170" class="indigo" data-narration="Definition of Coordination and Agreement">Definition of Coordination and Agreement</text>
  <animate xmlns="http://www.w3.org/2000/svg" begin="2s" dur="2s" repeatCount="indefinite">
    <circle cx="200" cy="220" r="20" class="orange" style="visibility: visible; opacity: 0; transform: rotate(0deg) scale(1, 1);"/>
    <text x="200" y="250" class="teal" style="font-size: 18px;">Coordination is the process of managing the activities of multiple agents or individuals to achieve a common goal.</text>
  </animate>

  <!-- Section 3: Types of Coordination -->
  <rect x="10" y="230" width="400" height="50" class="gradient" style="fill-opacity: 0.5;"></rect>
  <text x="20" y="250" class="orange" data-narration="Types of Coordination">Types of Coordination</text>
  <animate xmlns="http://www.w3.org/2000/svg" begin="4s" dur="2s" repeatCount="indefinite">
    <circle cx="200" cy="300" r="20" class="teal" style="visibility: visible; opacity: 0; transform: rotate(0deg) scale(1, 1);"/>
    <text x="200" y="320" class="indigo" style="font-size: 18px;">Synchronous coordination is when all agents or individuals perform their tasks in a specific order and at the same time.</text>
  </animate>

  <!-- Section 4: Distributed Mutual Exclusion -->
  <rect x="10" y="310" width="400" height="50" class="gradient" style="fill-opacity: 0.5;"></rect>
  <text x="20" y="330" class="orange" data-narration="Distributed Mutual Exclusion">Distributed Mutual Exclusion</text>
  <animate xmlns="http://www.w3.org/2000/svg" begin="6s" dur="2s" repeatCount="indefinite">
    <circle cx="200" cy="370" r="20" class="indigo" style="visibility: visible; opacity: 0; transform: rotate(0deg) scale(1, 1);"/>
    <text x="200" y="390" class="teal" style="font-size: 18px;">Distributed mutual exclusion is a coordination mechanism that ensures only one agent or individual can perform a task at a time.</text>
  </animate>

  <!-- Section 5: Coordination Protocols -->
  <rect x="10" y="390" width="400" height="50" class="gradient" style="fill-opacity: 0.5;"></rect>
  <text x="20" y="410" class="orange" data-narration="Coordination Protocols">Coordination Protocols</text>
  <animate xmlns="http://www.w3.org/2000/svg" begin="8s" dur="2s" repeatCount="indefinite">
    <circle cx="200" cy="460" r="20" class="teal" style="visibility: visible; opacity: 0; transform: rotate(0deg) scale(1, 1);"/>
    <text x="200" y="480" class="indigo" style="font-size: 18px;">A coordination protocol is a set of rules and procedures that govern the behavior of agents or individuals in a distributed system.</text>
  </animate>

  <!-- Footer -->
  <rect x="10" y="470" width="400" height="30" class="gradient" style="fill-opacity: 0.5;"></rect>
  <text x="20" y="490" class="orange" style="font-size: 18px; font-weight: bold;">Learn more about coordination and agreement in group communication.</text>
</svg>