<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="election-algorithms-in-distributed-systems">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#4567b7" stop-opacity="1"/>
            <stop offset="100%" stop-color="#3498db" stop-opacity="1"/>
            <stop offset="100%" stop-color="#2ecc71" stop-opacity="1"/>
            <stop offset="100%" stop-color="#1abc9c" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <title>Election Algorithms in Distributed Systems</title>
    <rect x="10" y="20" width="400" height="350" fill="url(#gradient)"/>
    <text x="20" y="60" font-size="20" font-family="Arial" text-anchor="start">Introduction to Election Algorithms</text>
    <g transform="translate(50, 100)">
        <section data-narration="Election Algorithms are used in distributed systems to choose a coordinator or leader">
            <rect x="0" y="0" width="200" height="50" fill="#fff" rx="10"/>
            <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">Safety: At most one leader is elected at any time</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="200,0" begin="0s" dur="2s" repeatCount="indefinite"/>
        </section>
        <section data-narration="The Bully Algorithm is used when each process knows every other process in the system">
            <rect x="0" y="0" width="200" height="50" fill="#fff" rx="10"/>
            <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">How it works:</text>
            <rect x="0" y="30" width="200" height="50" fill="#fff" rx="10"/>
            <text x="10" y="45" font-size="16" font-family="Arial" text-anchor="start">1. When a process detects that the coordinator has failed, it initiates an election</text>
            <text x="10" y="60" font-size="16" font-family="Arial" text-anchor="start">2. It sends ELECTION messages to all processes with higher IDs</text>
            <text x="10" y="75" font-size="16" font-family="Arial" text-anchor="start">3. If no response is received, it declares itself as leader</text>
            <text x="10" y="90" font-size="16" font-family="Arial" text-anchor="start">4. If responses are received, it waits for the new coordinator message</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="200,0" begin="0s" dur="2s" repeatCount="indefinite"/>
        </section>
        <section data-narration="The Bully Algorithm is simple to implement but generates many messages">
            <rect x="0" y="0" width="200" height="50" fill="#fff" rx="10"/>
            <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">Advantages:</text>
            <text x="10" y="30" font-size="16" font-family="Arial" text-anchor="start">1. Simple to implement</text>
            <text x="10" y="45" font-size="16" font-family="Arial" text-anchor="start">2. Guarantees election of highest priority process</text>
            <text x="10" y="60" font-size="16" font-family="Arial" text-anchor="start">Disadvantages:</text>
            <text x="10" y="75" font-size="16" font-family="Arial" text-anchor="start">1. Generates many messages (O(n²) in worst case)</text>
            <text x="10" y="90" font-size="16" font-family="Arial" text-anchor="start">2. Not efficient</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="200,0" begin="0s" dur="2s" repeatCount="indefinite"/>
        </section>
        <g transform="translate(350, 100)">
            <section data-narration="The Bully Algorithm has been widely used in various distributed systems">
                <rect x="0" y="0" width="200" height="50" fill="#fff" rx="10"/>
                <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">Advantages:</text>
                <text x="10" y="30" font-size="16" font-family="Arial" text-anchor="start">1. Simple to implement</text>
                <text x="10" y="45" font-size="16" font-family="Arial" text-anchor="start">2. Guarantees election of highest priority process</text>
                <text x="10" y="60" font-size="16" font-family="Arial" text-anchor="start">Disadvantages:</text>
                <text x="10" y="75" font-size="16" font-family="Arial" text-anchor="start">1. Generates many messages (O(n²) in worst case)</text>
                <text x="10" y="90" font-size="16" font-family="Arial" text-anchor="start">2. Not efficient</text>
            </section>
            <section data-narration="The Bully Algorithm is widely used in various distributed systems">
                <rect x="0" y="0" width="200" height="50" fill="#fff" rx="10"/>
                <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">Advantages:</text>
                <text x="10" y="30" font-size="16" font-family="Arial" text-anchor="start">1. Simple to implement</text>
                <text x="10" y="45" font-size="16" font-family="Arial" text-anchor="start">2. Guarantees election of highest priority process</text>
                <text x="10" y="60" font-size="16" font-family="Arial" text-anchor="start">Disadvantages:</text>
                <text x="10" y="75" font-size="16" font-family="Arial" text-anchor="start">1. Generates many messages (O(n²) in worst case)</text>
                <text x="10" y="90" font-size="16" font-family="Arial" text-anchor="start">2. Not efficient</text>
            </section>
            <g transform="translate(450, 100)">
                <section data-narration="Alternative algorithms like Paxos, Raft, and PBFT are also used">
                    <rect x="0" y="0" width="200" height="50" fill="#fff" rx="10"/>
                    <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">Advantages:</text>
                    <text x="10" y="30" font-size="16" font-family="Arial" text-anchor="start">1. More efficient</text>
                    <text x="10" y="45" font-size="16" font-family="Arial" text-anchor="start">2. Fault-tolerant</text>
                    <text x="10" y="60" font-size="16" font-family="Arial" text-anchor="start">Disadvantages:</text>
                    <text x="10" y="75" font-size="16" font-family="Arial" text-anchor="start">1. More complex to implement</text>
                    <text x="10" y="90" font-size="16" font-family="Arial" text-anchor="start">2. Higher overhead</text>
            </section>
            <g transform="translate(550, 100)">
                <section data-narration="In conclusion, election algorithms are crucial in distributed systems">
                    <rect x="0" y="0" width="200" height="50" fill="#fff" rx="10"/>
                    <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">At most one leader is elected at any time</text>
                    <text x="10" y="30" font-size="16" font-family="Arial" text-anchor="start">Liveness: Eventually a leader is elected</text>
                    <text x="10" y="45" font-size="16" font-family="Arial" text-anchor="start">Fault Tolerance: The algorithm should work correctly despite process failures</text>
                    <text x="10" y="60" font-size="16" font-family="Arial" text-anchor="start">Efficiency: The algorithm should use minimal messages and time</text>
                    <animateTransform attributeName="transform" type="translate" from="0,0" to="200,0" begin="0s" dur="2s" repeatCount="indefinite"/>
                </section>
            </g>
        </g>
        <g transform="translate(50, 370)">
            <text x="20" y="400" font-size="20" font-family="Arial" text-anchor="start">Election Algorithms in Distributed Systems</text>
            <text x="20" y="420" font-size="14" font-family="Arial" text-anchor="start"> Footer</text>
        </g>
    </svg>