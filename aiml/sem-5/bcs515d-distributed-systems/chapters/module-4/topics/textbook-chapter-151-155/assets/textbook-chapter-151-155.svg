<svg width="420" height="400" data-topic-id="coordination-agreement-in-distributed-systems-155">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7E9F2" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="5" />
  <circle cx="210" cy="20" r="10" fill="#3498DB" />
  <text x="20" y="30" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle">Coordination and Agreement in Distributed Systems</text>
  <rect x="10" y="60" width="400" height="100" fill="#FFF" rx="5" />
  <animate attributeName="opacity" begin="0s" dur="2s" fill="freeze" from="0" to="1" />
  <text x="20" y="70" font-size="18" font-family="Arial" font-weight="normal" text-anchor="middle" data-narration="Coordination and Agreement is a crucial aspect of Distributed Systems, where multiple processes or nodes work together to achieve a common goal." />
  <rect x="10" y="130" width="400" height="100" fill="#FFF" rx="5" />
  <animate attributeName="opacity" begin="2s" dur="2s" fill="freeze" from="0" to="1" />
  <text x="20" y="140" font-size="18" font-family="Arial" font-weight="normal" text-anchor="middle" data-narration="Coordination and Agreement refer to the process of ensuring that multiple processes or nodes in a distributed system work together seamlessly to achieve a common goal." />
  <rect x="10" y="190" width="400" height="100" fill="#FFF" rx="5" />
  <animate attributeName="opacity" begin="4s" dur="2s" fill="freeze" from="0" to="1" />
  <text x="20" y="200" font-size="18" font-family="Arial" font-weight="normal" text-anchor="middle" data-narration="There are two primary types of coordination and agreement: synchronization and conflict resolution." />
  <rect x="10" y="260" width="400" height="100" fill="#FFF" rx="5" />
  <animate attributeName="opacity" begin="6s" dur="2s" fill="freeze" from="0" to="1" />
  <text x="20" y="270" font-size="18" font-family="Arial" font-weight="normal" text-anchor="middle" data-narration="Synchronization ensures that multiple processes or nodes access shared resources in a consistent manner, while conflict resolution resolves disputes or conflicts between nodes." />
  <rect x="10" y="320" width="400" height="50" fill="#FFF" rx="5" />
  <animate attributeName="opacity" begin="8s" dur="2s" fill="freeze" from="0" to="1" />
  <text x="20" y="330" font-size="18" font-family="Arial" font-weight="normal" text-anchor="middle" data-narration="Coordination and Agreement are essential components of Distributed Systems, enabling nodes to work together seamlessly." />
  <rect x="10" y="380" width="400" height="20" fill="#FFF" rx="5" />
  <animate attributeName="opacity" begin="10s" dur="2s" fill="freeze" from="0" to="1" />
  <text x="20" y="390" font-size="18" font-family="Arial" font-weight="normal" text-anchor="middle" data-narration="Improved Fault Tolerance, Increased Scalability, and Better Resource Utilization are some of the advantages of Coordination and Agreement in Distributed Systems." />
  <g transform="translate(20, 20)">
