<svg width="420" height="400" data-topic-id="consensus-and-related-problems">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#C5C3C8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A2C3F2" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="400" height="350" style="fill: url(#pastel-gradient)"/>
    <g id="consensus-definition">
      <rect x="10" y="10" width="150" height="20" style="fill: #2F4F7F; stroke: #000; stroke-width: 2"/>
      <text x="15" y="15" style="font-size: 14px; fill: #fff">Consensus Definition</text>
      <g data-narration="Termination">
        <rect x="30" y="10" width="70" height="20" style="fill: #000; stroke: #007bff; stroke-width: 2"/>
        <text x="40" y="15" style="font-size: 14px; fill: #fff">Termination</text>
        <animateTransform attributeName="transform" type="rotate" from="0 70 10" to="360 70 10" dur="10s" begin="0s"/>
      </g>
      <g data-narration="Integrity">
        <rect x="30" y="50" width="70" height="20" style="fill: #000; stroke: #007bff; stroke-width: 2"/>
        <text x="40" y="55" style="font-size: 14px; fill: #fff">Integrity</text>
        <animateTransform attributeName="transform" type="rotate" from="0 70 50" to="360 70 50" dur="10s" begin="0s"/>
      </g>
      <g data-narration="Agreement">
        <rect x="30" y="90" width="70" height="20" style="fill: #000; stroke: #007bff; stroke-width: 2"/>
        <text x="40" y="95" style="font-size: 14px; fill: #fff">Agreement</text>
        <animateTransform attributeName="transform" type="rotate" from="0 70 90" to="360 70 90" dur="10s" begin="0s"/>
      </g>
      <g data-narration="Validity">
        <rect x="30" y="130" width="70" height="20" style="fill: #000; stroke: #007bff; stroke-width: 2"/>
        <text x="40" y="135" style="font-size: 14px; fill: #fff">Validity</text>
        <animateTransform attributeName="transform" type="rotate" from="0 70 130" to="360 70 130" dur="10s" begin="0s"/>
      </g>
    </g>
    <g id="system-models">
      <rect x="10" y="150" width="200" height="100" style="fill: #F7F7F7; stroke: #000; stroke-width: 2"/>
      <g data-narration="Synchronous Systems">
        <rect x="15" y="155" width="40" height="20" style="fill: #000; stroke: #2F4F7F; stroke-width: 2"/>
        <text x="20" y="160" style="font-size: 14px; fill: #fff">Synchronous</text>
        <animateTransform attributeName="transform" type="rotate" from="0 40 155" to="360 40 155" dur="10s" begin="0s"/>
      </g>
      <g data-narration="Asynchronous Systems">
        <rect x="60" y="155" width="40" height="20" style="fill: #000; stroke: #2F4F7F; stroke-width: 2"/>
        <text x="65" y="160" style="font-size: 14px; fill: #fff">Asynchronous</text>
        <animateTransform attributeName="transform" type="rotate" from="0 60 155" to="360 60 155" dur="10s" begin="0s"/>
      </g>
      <g data-narration="Failure Models">
        <rect x="10" y="200" width="200" height="100" style="fill: #F7F7F7; stroke: #000; stroke-width: 2"/>
        <g data-narration="Crash Failures">
          <rect x="15" y="205" width="40" height="20" style="fill: #000; stroke: #2F4F7F; stroke-width: 2"/>
          <text x="20" y="210" style="font-size: 14px; fill: #fff">Crash Failures</text>
          <animateTransform attributeName="transform" type="rotate" from="0 40 205" to="360 40 205" dur="10s" begin="0s"/>
        </g>
        <g data-narration="Byzantine Failures">
          <rect x="60" y="205" width="40" height="20" style="fill: #000; stroke: #2F4F7F; stroke-width: 2"/>
          <text x="65" y="210" style="font-size: 14px; fill: #fff">Byzantine Failures</text>
          <animateTransform attributeName="transform" type="rotate" from="0 60 205" to="360 60 205" dur="10s" begin="0s"/>
        </g>
      </g>
      <g id="flp-impossibility-result">
        <rect x="10" y="300" width="200" height="100" style="fill: #F7F7F7; stroke: #000; stroke-width: 2"/>
        <text x="15" y="305" style="font-size: 14px; fill: #000">FLP Impossibility Result</text>
        <g data-narration="In an asynchronous distributed system with at least one process that may">
          <rect x="15" y="310" width="150" height="20" style="fill: #000; stroke: #2F4F7F; stroke-width: 2"/>
          <text x="25" y="315" style="font-size: 14px; fill: #fff">In an asynchronous distributed system with at least one process that may</text>
          <animateTransform attributeName="transform" type="rotate" from="0 150 310" to="360 150 310" dur="10s" begin="0s"/>
        </g>
      </g>
    </g>
    <g id="title">
      <rect x="10" y="20" width="400" height="40" style="fill: #2F4F7F; stroke: #000; stroke-width: 2"/>
      <text x="15" y="25" style="font-size: 24px; fill: #fff">Consensus and Related Problems</text>
    </g>
    <g id="footer">
      <rect x="10" y="370" width="400" height="30" style="fill: #2F4F7F; stroke: #000; stroke-width: 2"/>
      <text x="15" y="375" style="font-size: 14px; fill: #fff">2023 Educational Diagram</text>
    </g>
  </g>
</svg>