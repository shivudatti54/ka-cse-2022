      <animate transform="rotate(360 50 240)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g data-narration="Software Resources" data-topic-id="resource-sharing-in-distributed-systems">
      <rect x="20" y="290" width="80%" height="50" fill="#fff" rx="10"/>
