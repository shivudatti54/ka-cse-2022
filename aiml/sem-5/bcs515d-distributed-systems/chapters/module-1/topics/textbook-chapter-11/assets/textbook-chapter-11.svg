<svg width="420" height="400" data-topic-id="characterization-of-distributed-systems">
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3498db"/>
      <stop offset="25%" stop-color="#4682b4"/>
      <stop offset="50%" stop-color="#4CAF50"/>
      <stop offset="75%" stop-color="#8e44ad"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
  </defs>
  <rect x="0" y="20" width="410" height="360" fill="#ffffff"/>
  <title>Textbook Chapter 11: Characterization of Distributed Systems</title>
  <text x="215" y="30" font-size="24" font-family="Arial" fill="#333333">Characterization of Distributed Systems</text>
  <g id="section1">
    <rect x="20" y="50" width="350" height="100" fill="#ff9800"/>
    <rect x="20" y="50" width="30" height="100" fill="#ffffff" rx="5"/>
    <text x="40" y="70" font-size="18" font-family="Arial" fill="#333333" data-narration="Introduction to Distributed Systems">
      A distributed system is a collection of independent computers that work together to achieve a common goal.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0,30,90" to="360,30,90" dur="4s" begin="1s"/>
  </g>
  <g id="section2">
    <rect x="20" y="170" width="350" height="100" fill="#4CAF50"/>
    <rect x="20" y="170" width="30" height="100" fill="#ffffff" rx="5"/>
    <text x="40" y="190" font-size="18" font-family="Arial" fill="#333333" data-narration="Key Characteristics of Distributed Systems">
      The key characteristics of distributed systems are autonomy, distribution, organization, and interconnection.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0,30,90" to="360,30,90" dur="4s" begin="2s"/>
  </g>
  <g id="section3">
    <rect x="20" y="310" width="350" height="100" fill="#e74c3c"/>
    <rect x="20" y="310" width="30" height="100" fill="#ffffff" rx="5"/>
    <text x="40" y="330" font-size="18" font-family="Arial" fill="#333333" data-narration="Types of Distributed Systems">
      There are client-server systems, peer-to-peer systems, and clustered systems.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0,30,90" to="360,30,90" dur="4s" begin="3s"/>
  </g>
  <g id="section4">
    <rect x="20" y="150" width="350" height="100" fill="#4682b4"/>
    <rect x="20" y="150" width="30" height="100" fill="#ffffff" rx="5"/>
    <text x="40" y="170" font-size="18" font-family="Arial" fill="#333333" data-narration="Advantages of Distributed Systems">
      Distributed systems offer scalability, fault tolerance, and flexibility.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0,30,90" to="360,30,90" dur="4s" begin="4s"/>
  </g>
  <g id="section5">
    <rect x="20" y="220" width="350" height="100" fill="#8e44ad"/>
    <rect x="20" y="220" width="30" height="100" fill="#ffffff" rx="5"/>
    <text x="40" y="240" font-size="18" font-family="Arial" fill="#333333" data-narration="Disadvantages of Distributed Systems">
      Distributed systems can be complex and difficult to manage.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0,30,90" to="360,30,90" dur="4s" begin="5s"/>
  </g>
  <rect x="0" y="370" width="420" height="30" fill="#3498db"/>
  <text x="215" y="380" font-size="18" font-family="Arial" fill="#333333">Footer</text>
</svg>