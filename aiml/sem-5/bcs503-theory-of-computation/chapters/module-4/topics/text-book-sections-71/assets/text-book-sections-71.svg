<svg width="420" height="400" data-topic-id="text-book-sections-71">
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  <title>Theory of Computation</title>
  <g transform="translate(10, 20)">
    <section data-narration="Finite State Machines (FSMs)">
      <rect x="0" y="0" width="400" height="80" fill="#3498DB" rx="10"/>
      <text x="20" y="30" font-size="18" font-family="Arial" fill="#fff">Finite State Machines (FSMs)</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,80" dur="2000" begin="0s"/>
      <rect x="10" y="60" width="380" height="20" fill="#fff" rx="5" opacity=".5"/>
      <text x="20" y="70" font-size="14" font-family="Arial" fill="#000">Key Concepts:</text>
      <text x="50" y="70" font-size="14" font-family="Arial" fill="#000">States:</text>
      <text x="120" y="70" font-size="14" font-family="Arial" fill="#000">Transitions:</text>
      <text x="200" y="70" font-size="14" font-family="Arial" fill="#000">Initial State:</text>
    </section>
    <section data-narration="Pushdown Automata (PDAs)">
      <rect x="0" y="90" width="400" height="80" fill="#2ECC71" rx="10"/>
      <text x="20" y="110" font-size="18" font-family="Arial" fill="#fff">Pushdown Automata (PDAs)</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,170" dur="2000" begin="0s"/>
      <rect x="10" y="140" width="380" height="20" fill="#fff" rx="5" opacity=".5"/>
      <text x="20" y="150" font-size="14" font-family="Arial" fill="#000">Key Concepts:</text>
      <text x="50" y="150" font-size="14" font-family="Arial" fill="#000">Stack:</text>
      <text x="120" y="150" font-size="14" font-family="Arial" fill="#000">Push:</text>
      <text x="200" y="150" font-size="14" font-family="Arial" fill="#000">Pop:</text>
    </section>
    <section data-narration="Example: Finite State Machines">
      <rect x="0" y="220" width="400" height="80" fill="#E74C3C" rx="10"/>
      <text x="20" y="240" font-size="18" font-family="Arial" fill="#fff">Example: Finite State Machines</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,300" dur="2000" begin="0s"/>
      <rect x="10" y="280" width="380" height="20" fill="#fff" rx="5" opacity=".5"/>
      <text x="20" y="290" font-size="14" font-family="Arial" fill="#000">States:</text>
      <text x="120" y="290" font-size="14" font-family="Arial" fill="#000">Transitions:</text>
      <text x="200" y="290" font-size="14" font-family="Arial" fill="#000">Initial State:</text>
    </section>
    <section data-narration="Example: Pushdown Automata">
      <rect x="0" y="330" width="400" height="80" fill="#2ECC71" rx="10"/>
      <text x="20" y="350" font-size="18" font-family="Arial" fill="#fff">Example: Pushdown Automata</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,410" dur="2000" begin="0s"/>
      <rect x="10" y="380" width="380" height="20" fill="#fff" rx="5" opacity=".5"/>
      <text x="20" y="390" font-size="14" font-family="Arial" fill="#000">Stack:</text>
      <text x="120" y="390" font-size="14" font-family="Arial" fill="#000">Push:</text>
      <text x="200" y="390" font-size="14" font-family="Arial" fill="#000">Pop:</text>
    </section>
    <footer>
      <text x="20" y="420" font-size="18" font-family="Arial" fill="#333">Theory of Computation</text>
    </footer>
  </g>
</svg>