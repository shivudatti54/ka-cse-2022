<svg width="420" height="400" data-topic-id="The-Pumping-Lemma-For-Context-Free-Languages" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="overflow: visible;">
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
            <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1" />
        </linearGradient>
    </defs>
    <title style="position: absolute; top: 0; left: 0; font-size: 24px; font-weight: bold; color: #3498db;">The Pumping Lemma for Context Free Languages</title>
    <rect x="0" y="0" width="420" height="400" style="fill: url(#pastel-gradient);"/>
    <g transform="translate(20, 20)">
        <rect width="300" height="250" style="stroke: #3498db; stroke-width: 2; fill: none;"/>
        <text x="10" y="10" style="font-size: 18px; font-weight: bold; color: #3498db;">Context Free Languages</text>
        <text x="10" y="50" style="font-size: 14px; color: #666; ">A language that can be recognized by a pushdown automaton.</text>
        <text x="10" y="80" style="font-size: 14px; color: #666; ">The Pumping Lemma states that if L is a context-free language, then there exists a pumping length p...</text>
        <rect x="10" y="110" width="300" height="50" style="stroke: #3498db; stroke-width: 2; fill: none;"/>
        <text x="10" y="120" style="font-size: 14px; color: #666; ">The Pumping Lemma states that if L is a context-free language, then there exists a pumping length p...</text>
        <text x="10" y="150" style="font-size: 14px; color: #666; ">...such that any string in the language with length greater than or equal to the pumping length can be divided into three substrings...</text>
        <rect x="10" y="180" width="300" height="50" style="stroke: #3498db; stroke-width: 2; fill: none;"/>
        <text x="10" y="190" style="font-size: 14px; color: #666; ">...in such a way that:</text>
        <g transform="translate(10, 200)">
            <rect x="0" y="0" width="100" height="100" style="fill: #C5CAE9; stroke: #3498db; stroke-width: 2;"/>
            <text x="5" y="5" style="font-size: 14px; color: #3498db; ">Pumping substring: aj = b</text>
            <text x="5" y="70" style="font-size: 14px; color: #666; ">Slack substrings: a1...ai and b(b)...+bk</text>
            <text x="5" y="130" style="font-size: 14px; color: #666; ">Pumping: Repeating the pumping substring any number of times</text>
        </g>
        <rect x="10" y="220" width="300" height="50" style="stroke: #3498db; stroke-width: 2; fill: none;"/>
        <text x="10" y="230" style="font-size: 14px; color: #666; ">Example:</text>
        <g transform="translate(10, 240)">
            <rect x="0" y="0" width="100" height="100" style="fill: #C7B8EA; stroke: #3498db; stroke-width: 2;"/>
            <text x="5" y="5" style="font-size: 14px; color: #3498db; ">Suppose we have a context-free language L</text>
            <text x="5" y="70" style="font-size: 14px; color: #666; ">Suppose we have a context-free language L</text>
            <text x="5" y="130" style="font-size: 14px; color: #666; ">Suppose we have a context-free language L</text>
        </g>
        <rect x="10" y="260" width="300" height="50" style="stroke: #3498db; stroke-width: 2; fill: none;"/>
        <text x="10" y="270" style="font-size: 14px; color: #666; ">Conclusion:</text>
        <g transform="translate(10, 280)">
            <rect x="0" y="0" width="100" height="100" style="fill: #C5CAE9; stroke: #3498db; stroke-width: 2;"/>
            <text x="5" y="5" style="font-size: 14px; color: #3498db; ">The Pumping Lemma is a powerful tool for proving that a language is not context-free.</text>
            <text x="5" y="70" style="font-size: 14px; color: #666; ">The Pumping Lemma states that if L is a context-free language, then there exists a pumping length p...</text>
        </g>
    </g>
    <g transform="translate(20, 400)">
        <text x="10" y="410" style="font-size: 18px; font-weight: bold; color: #3498db; ">References</text>
    </g>
    <animate transform="translate(30, 420) rotate(360)" begin="2s" dur="1s" repeatCount="indefinite"/>
</svg>