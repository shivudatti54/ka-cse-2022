<svg width="420" height="400" data-topic-id="Closure Properties Of Context Free Languages">
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C5E1F5" stop-opacity="1" />
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" opacity="0.8" />
  <text x="20" y="20" font-size="24" font-family="Arial" fill="#2E4053">Closure Properties of Context Free Languages</text>

  <section data-narration="Introduction">
    <rect x="150" y="150" width="200" height="100" fill="#F7D2C4" opacity="0.8" />
    <text x="170" y="170" font-size="18" font-family="Arial" fill="#2E4053">Regular languages are a fundamental concept in the theory of computation, and understanding their closure properties is essential for working with them.</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="1" />
  </section>

  <section data-narration="Union of Regular Languages">
    <rect x="360" y="150" width="200" height="100" fill="#F7D2C4" opacity="0.8" />
    <text x="380" y="170" font-size="18" font-family="Arial" fill="#2E4053">The union of two regular languages is also a regular language.</text>
    <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="1" />
    <line x1="360" y1="170" x2="460" y2="170" stroke="#2E4053" stroke-width="2" />
  </section>

  <section data-narration="Intersection of Regular Languages">
    <rect x="150" y="260" width="200" height="100" fill="#F7D2C4" opacity="0.8" />
    <text x="170" y="280" font-size="18" font-family="Arial" fill="#2E4053">The intersection of two regular languages is also a regular language.</text>
    <animate attributeName="opacity" begin="4s" dur="2s" repeatCount="1" />
    <line x1="150" y1="280" x2="150" y2="380" stroke="#2E4053" stroke-width="2" />
  </section>

  <section data-narration="Complement of Regular Languages">
    <rect x="360" y="260" width="200" height="100" fill="#F7D2C4" opacity="0.8" />
    <text x="380" y="280" font-size="18" font-family="Arial" fill="#2E4053">The complement of a regular language is also a regular language.</text>
    <animate attributeName="opacity" begin="6s" dur="2s" repeatCount="1" />
    <line x1="360" y1="280" x2="460" y2="280" stroke="#2E4053" stroke-width="2" />
  </section>

  <section data-narration="Concatenation of Regular Languages">
    <rect x="150" y="350" width="200" height="100" fill="#F7D2C4" opacity="0.8" />
    <text x="170" y="370" font-size="18" font-family="Arial" fill="#2E4053">The concatenation of two regular languages is also a regular language.</text>
    <animate attributeName="opacity" begin="8s" dur="2s" repeatCount="1" />
    <line x1="150" y1="370" x2="150" y2="470" stroke="#2E4053" stroke-width="2" />
  </section>

  <section data-narration="Kleene Closure of Regular Languages">
    <rect x="360" y="350" width="200" height="100" fill="#F7D2C4" opacity="0.8" />
    <text x="380" y="370" font-size="18" font-family="Arial" fill="#2E4053">The Kleene closure of a regular language is also a regular language.</text>
    <animate attributeName="opacity" begin="10s" dur="2s" repeatCount="1" />
    <line x1="360" y1="370" x2="460" y2="370" stroke="#2E4053" stroke-width="2" />
  </section>

  <footer>
    <text x="20" y="380" font-size="18" font-family="Arial" fill="#2E4053">Animated Educational Diagram: Closure Properties of Context Free Languages</text>
  </footer>
</svg>