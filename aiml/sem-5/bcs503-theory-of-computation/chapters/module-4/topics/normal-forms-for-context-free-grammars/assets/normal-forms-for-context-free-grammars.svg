<svg width="420" height="400" data-topic-id="NormalFormsForContextFreeGrammars">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background with gradient -->
  <rect x="0" y="0" width="100%" height="100%" style="fill: linear-gradient(to bottom, #C7B8EA, #C5CAE9)"/>
  <!-- Title -->
  <text x="50%" y="20%" font-size="36" font-family="Arial" text-anchor="middle" stroke-width="2" stroke="#3498db" fill="#fff">
    <tspan data-narration="Introduction to Context-Free Grammars">Context-Free Grammars (CFGs)</tspan>
  </text>
  <!-- Section 1: Introduction -->
  <g transform="translate(50, 100)">
    <rect x="0" y="-20" width="100%" height="40" style="fill: #fff; stroke-width: 1; stroke: #3498db"/>
    <text x="10%" y="10%" font-size="18" font-family="Arial" text-anchor="middle" stroke-width="2" stroke="#3498db" fill="#666">
      <tspan data-narration="In the previous chapter on Lexical Analysis, we used Regular Expressions to define the structure of tokens (keywords, identifiers, operators, etc.). However, regular expressions are insufficient to describe the nested, recursive structures inherent in programming languages, such as balanced parentheses, nested if-else statements, or the hierarchical structure of arithmetic expressions.">Previous Chapter</tspan>
    </text>
    <text x="10%" y="50%" font-size="18" font-family="Arial" text-anchor="middle" stroke-width="2" stroke="#3498db" fill="#666">
      <tspan data-narration="A Context-Free Grammar (CFG) is a formal grammar that is powerful enough to describe the syntax of most programming languages. It provides a set of recursive rules to define the structure of a language, making it the fundamental tool for Syntax Analysis (or Parsing)." >Context-Free Grammar</tspan>
    </text>
  </g>
  <!-- Section 2: Formal Definition -->
  <g transform="translate(50, 200)">
    <rect x="0" y="-20" width="100%" height="40" style="fill: #fff; stroke-width: 1; stroke: #3498db"/>
    <text x="10%" y="10%" font-size="18" font-family="Arial" text-anchor="middle" stroke-width="2" stroke="#3498db" fill="#666">
      <tspan data-narration="A Context-Free Grammar G is a 4-tuple, (&lt;V, T, P, S&gt;) where:">Definition</tspan>
    </text>
    <text x="10%" y="40%" font-size="18" font-family="Arial" text-anchor="middle" stroke-width="2" stroke="#3498db" fill="#666">
      <tspan data-narration="1. V is a finite set of Non-terminal Symbols (or variables). These represent syntactic categories, e.g., &lt;expression&gt;, &lt;statement&gt;." >Non-Terminals</tspan>
    </text>
    <text x="10%" y="70%" font-size="18" font-family="Arial" text-anchor="middle" stroke-width="2" stroke="#3498db" fill="#666">
      <tspan data-narration="2. T is a finite set of Terminal Symbols (tokens). These are the basic symbols from which strings are formed, e.g., id, +, if." >Terminals</tspan>
    </text>
    <text x="10%" y="100%" font-size="18" font-family="Arial" text-anchor="middle" stroke-width="2" stroke="#3498db" fill="#666">
      <tspan data-narration="3. P is a finite set of Production Rules (or productions). Each production is of the form: A -> β" >Production Rules</tspan>
    </text>
    <text x="10%" y="130%" font-size="18" font-family="Arial" text-anchor="middle" stroke-width="2" stroke="#3498db" fill="#666">
      <tspan data-narration="where: A is a non-terminal (A ∈ V), β is a string of symbols from (V ∪ T)* (a string of terminals and/or non-terminals)." >Production Rule</tspan>
    </text>
    <text x="10%" y="160%" font-size="18" font-family="Arial" text-anchor="middle" stroke-width="2" stroke="#3498db" fill="#666">
      <tspan data-narration="4. S is a special non-terminal called the Start Symbol (S ∈ V). It represents the main syntactic category of the language, e.g., &lt;program&gt;." >Start Symbol</tspan>
    </text>
  </g>
  <!-- Section 3: Components of a CFG -->
  <g transform="translate(50, 300)">
    <rect x="0" y="-20" width="100%" height="40" style="fill: #fff; stroke-width: 1; stroke: #3498db"/>
    <text x="10%" y="10%" font-size="18" font-family="Arial" text-anchor="middle" stroke-width="2" stroke="#3498db" fill="#666">
      <tspan data-narration="The components of a CFG are:">Components</tspan>
    </text>
    <text x="10%" y="40%" font-size="18" font-family="Arial" text-anchor="middle" stroke-width="2" stroke="#3498db" fill="#666">
      <tspan data-narration="1. Terminals and Non-Terminals" >Terminals and Non-Terminals</tspan>
    </text>
    <text x="10%" y="70%" font-size="18" font-family="Arial" text-anchor="middle" stroke-width="2" stroke="#3498db" fill="#666">
      <tspan data-narration="2. Production Rules" >Production Rules</tspan>
    </text>
    <text x="10%" y="100%" font-size="18" font-family="Arial" text-anchor="middle" stroke-width="2" stroke="#3498db" fill="#666">
      <tspan data-narration="3. Start Symbol" >Start Symbol</tspan>
    </text>
  </g>
  <!-- Section 4: Animation -->
  <g transform="translate(50, 400)">
    <rect x="0" y="-20" width="100%" height="40" style="fill: #fff; stroke-width: 1; stroke: #3498db"/>
    <text x="10%" y="10%" font-size="18" font-family="Arial" text-anchor="middle" stroke-width="2" stroke="#3498db" fill="#666">
      <tspan data-narration="An animation will be applied to the diagram to make it more engaging and educational." >Animation</tspan>
    </text>
    <animate xmlns="http://www.w3.org/2000/svg" xlink:href="#pastel-gradient" begin="1s" dur="5s" repeatCount="indefinite" display="block">
      <animateTransform transform="rotate(360 50 50)" dur="5s" repeatCount="indefinite"/>
    </animate>
  </g>
  <!-- Footer -->
  <text x="50%" y="380%" font-size="24" font-family="Arial" text-anchor="middle" stroke-width="2" stroke="#3498db" fill="#666">
    <tspan data-narration="Normal Forms For Context Free Grammars">Normal Forms For Context Free Grammars</tspan>
  </text>
</svg>