<svg width="420" height="400" data-topic-id="Deterministic Finite Automata-Nondeterministic Finite Automata-Nondeterministic-Finite-Automata">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#C7F464" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7F464" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>

  <!-- Title Section -->
  <section data-narration="Introduction">
    <text x="50%" y="20%" font-size="24" font-family="Arial" fill="#3498db" text-anchor="middle">
      <tspan>Theory of Computation</tspan>
      <tspan> Deterministic Finite Automata, Nondeterministic Finite Automata</tspan>
    </text>
  </section>

  <!-- DFA Section -->
  <section data-narration="Deterministic Finite Automata (DFA)">
    <text x="50%" y="100%" font-size="18" font-family="Arial" fill="#2ecc71" text-anchor="middle">
      <tspan>Deterministic Finite Automata (DFA)</tspan>
      <tspan> is a mathematical model that can be in one of a finite number of states.</tspan>
    </text>
    <rect x="50%" y="150%" width="200" height="50" fill="#3498db" rx="10"/>
    <text x="70%" y="170%" font-size="16" font-family="Arial" fill="#2ecc71" text-anchor="middle">
      <tspan>Properties:</tspan>
      <tspan>Each state in a DFA is a distinct entity.</tspan>
      <tspan> The transition function determines the next state based on the current state and input symbol.</tspan>
      <tspan> The DFA can only be in one state at a time.</tspan>
    </text>
    <animate attribute="opacity" begin="0s" dur="2s" repeatCount="indefinite" from="1" to="0" fill="freeze"/>
  </section>

  <!-- NFA Section -->
  <section data-narration="Nondeterministic Finite Automata (NFA)">
    <text x="50%" y="250%" font-size="18" font-family="Arial" fill="#2ecc71" text-anchor="middle">
      <tspan>Nondeterministic Finite Automata (NFA)</tspan>
      <tspan> is a mathematical model that can be in one of a finite number of states.</tspan>
    </text>
    <rect x="50%" y="300%" width="200" height="50" fill="#3498db" rx="10"/>
    <text x="70%" y="320%" font-size="16" font-family="Arial" fill="#2ecc71" text-anchor="middle">
      <tspan>Properties:</tspan>
      <tspan> An NFA can be in multiple states simultaneously.</tspan>
      <tspan> The transition function determines the next states based on the current state and input symbol.</tspan>
    </text>
    <animate attribute="opacity" begin="2s" dur="2s" repeatCount="indefinite" from="0" to="1" fill="freeze"/>
  </section>

  <!-- Comparison Section -->
  <section data-narration="Comparison of DFA and NFA">
    <text x="50%" y="400%" font-size="18" font-family="Arial" fill="#2ecc71" text-anchor="middle">
      <tspan>Comparison of DFA and NFA:</tspan>
      <tspan> DFA is more predictable and efficient.</tspan>
      <tspan> NFA is more powerful and flexible.</tspan>
    </text>
    <animate attribute="opacity" begin="4s" dur="2s" repeatCount="indefinite" from="0" to="1" fill="freeze"/>
  </section>

  <!-- Transition Section -->
  <section data-narration="Transition Function">
    <text x="50%" y="500%" font-size="18" font-family="Arial" fill="#2ecc71" text-anchor="middle">
      <tspan>Transition Function:</tspan>
      <tspan> Determines the next state based on the current state and input symbol.</tspan>
    </text>
    <rect x="50%" y="550%" width="200" height="50" fill="#3498db" rx="10"/>
    <text x="70%" y="570%" font-size="16" font-family="Arial" fill="#2ecc71" text-anchor="middle">
      <tspan>Example:</tspan>
      <tspan> DFA: s1 -> s2 (a), s1 -> s3 (b)</tspan>
      <tspan> NFA: s1 -> s2, s1 -> s3</tspan>
    </text>
    <animate attribute="opacity" begin="6s" dur="2s" repeatCount="indefinite" from="0" to="1" fill="freeze"/>
  </section>

  <!-- Conclusion Section -->
  <section data-narration="Conclusion">
    <text x="50%" y="600%" font-size="18" font-family="Arial" fill="#2ecc71" text-anchor="middle">
      <tspan>Conclusion:</tspan>
      <tspan> DFA and NFA are essential concepts in the theory of computation.</tspan>
      <tspan> Understanding the differences between them is crucial.</tspan>
    </text>
    <rect x="50%" y="650%" width="200" height="50" fill="#3498db" rx="10"/>
    <text x="70%" y="670%" font-size="16" font-family="Arial" fill="#2ecc71" text-anchor="middle">
      <tspan>References:</tspan>
      <tspan> [insert references]</tspan>
    </text>
    <animate attribute="opacity" begin="8s" dur="2s" repeatCount="indefinite" from="0" to="1" fill="freeze"/>
  </section>

  <!-- Footer Section -->
  <footer>
    <text x="50%" y="700%" font-size="14" font-family="Arial" fill="#3498db" text-anchor="middle">
      <tspan>Data: </tspan>
      <tspan> [insert data]</tspan>
    </text>
  </footer>
</svg>