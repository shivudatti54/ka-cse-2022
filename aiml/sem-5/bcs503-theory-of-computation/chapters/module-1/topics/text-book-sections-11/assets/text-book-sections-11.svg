<svg width="420" height="400" data-topic-id="theory-of-computation">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Title at top -->
  <rect x="10" y="10" width="400" height="40" fill="#2F4F7F"/>
  <text x="15" y="35" font-size="24" font-family="Arial" fill="#ADD8E6">Theory of Computation</text>

  <!-- Section 1.1: Introduction -->
  <section data-narration="Introduction" style="background-color: #f0f0f0;">
    <rect x="10" y="55" width="380" height="150" fill="none"/>
    <path d="M 10 55 Q 20 65 40 80 Q 60 90 80 100 Q 100 110 120 120 Q 140 110 160 90 Q 180 80 200 65 Z" stroke="#4C5154" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="10 0" dur="2s"/>
    <text x="15" y="120" font-size="18" font-family="Arial" fill="#2F4F7F">What is Theory of Computation?</text>
    <text x="15" y="150" font-size="18" font-family="Arial" fill="#2F4F7F">The theory of computation is the study of the fundamental limits of computation and the design of algorithms.</text>
  </section>

  <!-- Section 1.1: Importance -->
  <section data-narration="Importance" style="background-color: #f0f0f0;">
    <rect x="10" y="55" width="380" height="150" fill="none"/>
    <path d="M 10 55 Q 20 65 40 80 Q 60 90 80 100 Q 100 110 120 120 Q 140 110 160 90 Q 180 80 200 65 Z" stroke="#4C5154" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="30 0" dur="2s"/>
    <text x="15" y="120" font-size="18" font-family="Arial" fill="#2F4F7F">Importance of Theory of Computation</text>
    <text x="15" y="150" font-size="18" font-family="Arial" fill="#2F4F7F">It provides a foundation for designing algorithms and data structures, and is used in various fields.</text>
  </section>

  <!-- Section 1.1: Key Concepts -->
  <section data-narration="Key Concepts" style="background-color: #f0f0f0;">
    <rect x="10" y="55" width="380" height="150" fill="none"/>
    <path d="M 10 55 Q 20 65 40 80 Q 60 90 80 100 Q 100 110 120 120 Q 140 110 160 90 Q 180 80 200 65 Z" stroke="#4C5154" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="60 0" dur="2s"/>
    <text x="15" y="120" font-size="18" font-family="Arial" fill="#2F4F7F">Key Concepts</text>
    <text x="15" y="150" font-size="18" font-family="Arial" fill="#2F4F7F">Computation, algorithms, and computational complexity are the main concepts.</text>
  </section>

  <!-- Section 1.1: Definition of Computation -->
  <section data-narration="Definition of Computation" style="background-color: #f0f0f0;">
    <rect x="10" y="55" width="380" height="150" fill="none"/>
    <path d="M 10 55 Q 20 65 40 80 Q 60 90 80 100 Q 100 110 120 120 Q 140 110 160 90 Q 180 80 200 65 Z" stroke="#4C5154" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="90 0" dur="2s"/>
    <text x="15" y="120" font-size="18" font-family="Arial" fill="#2F4F7F">Definition of Computation</text>
    <text x="15" y="150" font-size="18" font-family="Arial" fill="#2F4F7F">Computation is the process of performing tasks using a computer.</text>
  </section>

  <!-- Section 1.1: Types of Computation -->
  <section data-narration="Types of Computation" style="background-color: #f0f0f0;">
    <rect x="10" y="55" width="380" height="150" fill="none"/>
    <path d="M 10 55 Q 20 65 40 80 Q 60 90 80 100 Q 100 110 120 120 Q 140 110 160 90 Q 180 80 200 65 Z" stroke="#4C5154" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="120 0" dur="2s"/>
    <text x="15" y="120" font-size="18" font-family="Arial" fill="#2F4F7F">Types of Computation</text>
    <text x="15" y="150" font-size="18" font-family="Arial" fill="#2F4F7F">Sequential and parallel computation are the two main types.</text>
  </section>

  <!-- Section 1.1: Definition of Algorithm -->
  <section data-narration="Definition of Algorithm" style="background-color: #f0f0f0;">
    <rect x="10" y="55" width="380" height="150" fill="none"/>
    <path d="M 10 55 Q 20 65 40 80 Q 60 90 80 100 Q 100 110 120 120 Q 140 110 160 90 Q 180 80 200 65 Z" stroke="#4C5154" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="150 0" dur="2s"/>
    <text x="15" y="120" font-size="18" font-family="Arial" fill="#2F4F7F">Definition of Algorithm</text>
    <text x="15" y="150" font-size="18" font-family="Arial" fill="#2F4F7F">An algorithm is a step-by-step procedure for solving a problem.</text>
  </section>

  <!-- Footer -->
  <rect x="10" y="320" width="400" height="40" fill="#2F4F7F"/>
  <text x="15" y="335" font-size="18" font-family="Arial" fill="#ADD8E6">Theory of Computation</text>
</svg>