<svg width="420" height="400" data-topic-id="introduction-to-finite-automata">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7b8ea" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87ceeb" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" rx="10"/>
  
  <!-- Title section -->
  <section data-narration="Introduction to Finite Automata">
    <rect x="20" y="20" width="380" height="50" fill="#8f0a1a" rx="10"/>
    <text x="25" y="35" fill="#ffffff" font-size="24">Finite Automata</text>
  </section>
  
  <!-- States section -->
  <section data-narration="Components of a Finite Automaton">
    <rect x="20" y="100" width="380" height="50" fill="#2f4f7f" rx="10"/>
    <text x="25" y="115" fill="#ffffff" font-size="18">States</text>
    <rect x="20" y="140" width="380" height="20" fill="#2f4f7f" rx="10"/>
    <text x="25" y="155" fill="#ffffff" font-size="18">A set of states, denoted by Q</text>
  </section>
  
  <!-- Alphabet section -->
  <section data-narration="Alphabet">
    <rect x="20" y="190" width="380" height="50" fill="#2f4f7f" rx="10"/>
    <text x="25" y="205" fill="#ffffff" font-size="18">Alphabet</text>
    <rect x="20" y="235" width="380" height="20" fill="#2f4f7f" rx="10"/>
    <text x="25" y="250" fill="#ffffff" font-size="18">A set of input symbols, denoted by Σ</text>
  </section>
  
  <!-- Transition Function section -->
  <section data-narration="Transition Function">
    <rect x="20" y="280" width="380" height="50" fill="#2f4f7f" rx="10"/>
    <text x="25" y="295" fill="#ffffff" font-size="18">Transition Function</text>
    <rect x="20" y="325" width="380" height="20" fill="#2f4f7f" rx="10"/>
    <text x="25" y="340" fill="#ffffff" font-size="18">A function, denoted by δ, which maps each state and input symbol to a next state</text>
  </section>
  
  <!-- Initial State and Final States section -->
  <section data-narration="Initial State and Final States">
    <rect x="20" y="370" width="380" height="50" fill="#2f4f7f" rx="10"/>
    <text x="25" y="385" fill="#ffffff" font-size="18">Initial State and Final States</text>
    <rect x="20" y="415" width="380" height="20" fill="#2f4f7f" rx="10"/>
    <text x="25" y="430" fill="#ffffff" font-size="18">A special state, denoted by q0, which represents the starting state of the machine</text>
    <rect x="20" y="460" width="380" height="20" fill="#2f4f7f" rx="10"/>
    <text x="25" y="475" fill="#ffffff" font-size="18">A set of states, denoted by F, which represents the accepting states of the machine</text>
  </section>
  
  <!-- DFA and NFA sections -->
  <section data-narration="Types of Finite Automata">
    <rect x="20" y="50" width="380" height="50" fill="#87ceeb" rx="10"/>
    <text x="25" y="65" fill="#000000" font-size="18">Deterministic Finite Automaton (DFA)</text>
    <rect x="20" y="100" width="380" height="50" fill="#87ceeb" rx="10"/>
    <text x="25" y="115" fill="#000000" font-size="18">Nondeterministic Finite Automaton (NFA)</text>
  </section>
  
  <!-- DFA and NFA examples -->
  <section data-narration="Example of a DFA">
    <rect x="20" y="170" width="380" height="50" fill="#87ceeb" rx="10"/>
    <text x="25" y="185" fill="#000000" font-size="18">Q = {q0, q1}</text>
    <rect x="20" y="215" width="380" height="20" fill="#87ceeb" rx="10"/>
    <text x="25" y="230" fill="#000000" font-size="18">Σ = {0, 1}</text>
    <rect x="20" y="260" width="380" height="20" fill="#87ceeb" rx="10"/>
    <text x="25" y="275" fill="#000000" font-size="18">δ(q0, 0) = q0</text>
    <rect x="20" y="305" width="380" height="20" fill="#87ceeb" rx="10"/>
    <text x="25" y="320" fill="#000000" font-size="18">q0 = initial state</text>
    <rect x="20" y="350" width="380" height="20" fill="#87ceeb" rx="10"/>
    <text x="25" y="365" fill="#000000" font-size="18">F = {q1}</text>
  </section>
  
  <section data-narration="Example of an NFA">
    <rect x="20" y="410" width="380" height="50" fill="#87ceeb" rx="10"/>
    <text x="25" y="425" fill="#000000" font-size="18">NFA that accepts all strings of 0s and 1s that end with a 1</text>
  </section>
  
  <!-- Animation for transitions -->
  <animate id="transition" attributeName="opacity" begin="00:00:00" dur="10s" repeatCount="indefinite">
    <animateTransform attributeName="transform" begin="00:00:00" dur="10s" repeatCount="indefinite">
      <animate transform="rotate(360 100 100)" begin="00:00:00" dur="5s" repeatCount="indefinite"/>
      <animate transform="rotate(720 100 100)" begin="00:05:00" dur="5s" repeatCount="indefinite"/>
    </animateTransform>
  </animate>
</svg>