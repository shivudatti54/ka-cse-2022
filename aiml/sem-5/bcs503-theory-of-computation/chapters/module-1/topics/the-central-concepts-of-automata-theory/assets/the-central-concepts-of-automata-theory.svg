<svg width="420" height="400" data-topic-id="automata-theory">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#6495ED" stop-opacity="1" />
      <stop offset="100%" stop-color="#FFC107" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect fill="url(#gradient)" width="420" height="400" rx="10" />
  
  <!-- Title section -->
  <section data-narration="title">
    <g transform="translate(10, 20)">
      <text fill="#6495ED" font-size="24" font-family="Arial, sans-serif">Central Concepts of Automata Theory</text>
    </g>
  </section>
  
  <!-- Introduction to Finite Automata section -->
  <section data-narration="introduction-to-finite-automata">
    <g transform="translate(10, 60)">
      <text fill="#6495ED" font-size="18" font-family="Arial, sans-serif">Introduction to Finite Automata</text>
      <animate transform="translateX(10px)" begin="0s" duration="2s" repeat="forever" />
    </g>
    <g transform="translate(50, 60)">
      <text fill="#6495ED" font-size="16" font-family="Arial, sans-serif">A finite automaton is a simple mathematical model used to recognize patterns in strings of symbols.</text>
      <animate transform="translateX(10px)" begin="0.5s" duration="2s" repeat="forever" />
    </g>
    <g transform="translate(100, 60)">
      <text fill="#6495ED" font-size="16" font-family="Arial, sans-serif">It consists of a set of states, an alphabet of input symbols, and a transition function that determines the next state based on the current state and input symbol.</text>
      <animate transform="translateX(10px)" begin="1s" duration="2s" repeat="forever" />
    </g>
  </section>
  
  <!-- Structural Representations section -->
  <section data-narration="structural-representations">
    <g transform="translate(10, 120)">
      <text fill="#6495ED" font-size="18" font-family="Arial, sans-serif">Structural Representations</text>
      <animate transform="translateX(10px)" begin="0s" duration="2s" repeat="forever" />
    </g>
    <g transform="translate(50, 120)">
      <text fill="#6495ED" font-size="16" font-family="Arial, sans-serif">There are two primary structural representations of finite automata:</text>
      <animate transform="translateX(10px)" begin="0.5s" duration="2s" repeat="forever" />
    </g>
    <g transform="translate(100, 120)">
      <text fill="#6495ED" font-size="16" font-family="Arial, sans-serif">Transition Diagram and Transition Table.</text>
      <animate transform="translateX(10px)" begin="1s" duration="2s" repeat="forever" />
    </g>
  </section>
  
  <!-- Deterministic Finite Automata section -->
  <section data-narration="deterministic-finite-automata">
    <g transform="translate(10, 180)">
      <text fill="#6495ED" font-size="18" font-family="Arial, sans-serif">Deterministic Finite Automata (DFA)</text>
      <animate transform="translateX(10px)" begin="0s" duration="2s" repeat="forever" />
    </g>
    <g transform="translate(50, 180)">
      <text fill="#6495ED" font-size="16" font-family="Arial, sans-serif">A DFA is a type of FA where the next state is uniquely determined by the current state and input symbol.</text>
      <animate transform="translateX(10px)" begin="0.5s" duration="2s" repeat="forever" />
    </g>
    <g transform="translate(100, 180)">
      <text fill="#6495ED" font-size="16" font-family="Arial, sans-serif">For each state and input symbol, there is only one possible next state.</text>
      <animate transform="translateX(10px)" begin="1s" duration="2s" repeat="forever" />
    </g>
  </section>
  
  <!-- Nondeterministic Finite Automata section -->
  <section data-narration="nondeterministic-finite-automata">
    <g transform="translate(10, 240)">
      <text fill="#6495ED" font-size="18" font-family="Arial, sans-serif">Nondeterministic Finite Automata (NFA)</text>
      <animate transform="translateX(10px)" begin="0s" duration="2s" repeat="forever" />
    </g>
    <g transform="translate(50, 240)">
      <text fill="#6495ED" font-size="16" font-family="Arial, sans-serif">An NFA is a type of FA where the next state is not uniquely determined by the current state and input symbol.</text>
      <animate transform="translateX(10px)" begin="0.5s" duration="2s" repeat="forever" />
    </g>
    <g transform="translate(100, 240)">
      <text fill="#6495ED" font-size="16" font-family="Arial, sans-serif">For each state and input symbol, there can be multiple possible next states.</text>
      <animate transform="translateX(10px)" begin="1s" duration="2s" repeat="forever" />
    </g>
  </section>
  
  <!-- Transition Diagram section -->
  <section data-narration="transition-diagram">
    <g transform="translate(10, 300)">
      <text fill="#6495ED" font-size="18" font-family="Arial, sans-serif">Transition Diagram</text>
      <animate transform="translateX(10px)" begin="0s" duration="2s" repeat="forever" />
    </g>
    <g transform="translate(50, 300)">
      <rect x="50" y="50" width="20" height="20" fill="#FFC107" rx="5" />
      <text fill="#6495ED" font-size="16" font-family="Arial, sans-serif">q0</text>
      <text fill="#6495ED" font-size="16" font-family="Arial, sans-serif">q1</text>
    </g>
    <g transform="translate(100, 300)">
      <rect x="100" y="50" width="20" height="20" fill="#FFC107" rx="5" />
      <text fill="#6495ED" font-size="16" font-family="Arial, sans-serif">q0</text>
      <text fill="#6495ED" font-size="16" font-family="Arial, sans-serif">q0</text>
      <text fill="#6495ED" font-size="16" font-family="Arial, sans-serif">q1</text>
    </g>
  </section>
  
  <!-- Transition Table section -->
  <section data-narration="transition-table">
    <g transform="translate(10, 360)">
      <text fill="#6495ED" font-size="18" font-family="Arial, sans-serif">Transition Table</text>
      <animate transform="translateX(10px)" begin="0s" duration="2s" repeat="forever" />
    </g>
    <g transform="translate(50, 360)">
      <table>
        <tr>
          <th>State</th>
          <th>Input</th>
          <th>Next State</th>
        </tr>
        <tr>
          <td>q0</td>
          <td>0</td>
          <td>q0</td>
        </tr>
        <tr>
          <td>q0</td>
          <td>1</td>
          <td>q1</td>
        </tr>
      </table>
    </g>
  </section>
  
  <!-- Footer section -->
  <footer data-narration="footer">
    <g transform="translate(10, 420)">
      <text fill="#6495ED" font-size="18" font-family="Arial, sans-serif">Automata Theory</text>
    </g>
  </footer>
</svg>