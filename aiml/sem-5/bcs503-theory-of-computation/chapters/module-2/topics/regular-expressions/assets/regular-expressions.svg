<svg width="420" height="400" data-topic-id="regular-expressions-with-grep">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" opacity="0.5"/>
  
  <!-- Title -->
  <g transform="translate(20, 20)">
    <text x="0" y="0" font-size="24" fill="#0097A7" opacity="1">Regular Expressions</text>
  </g>
  
  <!-- Introduction to Regular Expressions -->
  <g transform="translate(20, 50)">
    <rect x="0" y="0" width="80%" height="20" fill="#F2F2F2" opacity="0.5"/>
    <text x="10" y="10" font-size="18" fill="#666666" opacity="1">Introduction to Regular Expressions</text>
  </g>
  <animateTransform attributeName="transform" type="translate" from="0 50" to="0 200" dur="2000" begin="0s"/>
  
  <!-- Basic Concept -->
  <g transform="translate(20, 150)">
    <rect x="0" y="0" width="80%" height="20" fill="#F2F2F2" opacity="0.5"/>
    <text x="10" y="10" font-size="18" fill="#666666" opacity="1">Basic Concept</text>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 250" dur="2000" begin="1s"/>
  </g>
  <rect x="150" y="150" width="100%" height="200" fill="#F2F2F2" opacity="0.5"/>
  <rect x="150" y="350" width="100%" height="200" fill="#F2F2F2" opacity="0.5"/>
  
  <!-- The grep Command -->
  <g transform="translate(20, 350)">
    <rect x="0" y="0" width="80%" height="20" fill="#F2F2F2" opacity="0.5"/>
    <text x="10" y="10" font-size="18" fill="#666666" opacity="1">The grep Command</text>
    <animateTransform attributeName="transform" type="translate" from="0 350" to="0 450" dur="2000" begin="2s"/>
  </g>
  <rect x="150" y="450" width="100%" height="200" fill="#F2F2F2" opacity="0.5"/>
  
  <!-- Basic Regular Expressions (BRE) -->
  <g transform="translate(20, 650)">
    <rect x="0" y="0" width="80%" height="20" fill="#F2F2F2" opacity="0.5"/>
    <text x="10" y="10" font-size="18" fill="#666666" opacity="1">Basic Regular Expressions (BRE)</text>
    <animateTransform attributeName="transform" type="translate" from="0 650" to="0 750" dur="2000" begin="3s"/>
  </g>
  <rect x="150" y="750" width="100%" height="200" fill="#F2F2F2" opacity="0.5"/>
  
  <!-- Common BRE Patterns -->
  <g transform="translate(20, 950)">
    <rect x="0" y="0" width="80%" height="20" fill="#F2F2F2" opacity="0.5"/>
    <text x="10" y="10" font-size="18" fill="#666666" opacity="1">Common BRE Patterns</text>
    <animateTransform attributeName="transform" type="translate" from="0 950" to="0 1050" dur="2000" begin="4s"/>
  </g>
  <rect x="150" y="1050" width="100%" height="200" fill="#F2F2F2" opacity="0.5"/>
  
  <!-- Negated Character Class -->
  <g transform="translate(20, 1250)">
    <rect x="0" y="0" width="80%" height="20" fill="#F2F2F2" opacity="0.5"/>
    <text x="10" y="10" font-size="18" fill="#666666" opacity="1">Negated Character Class</text>
    <animateTransform attributeName="transform" type="translate" from="0 1250" to="0 1275" dur="2000" begin="5s"/>
  </g>
  <rect x="150" y="1275" width="100%" height="200" fill="#F2F2F2" opacity="0.5"/>
  
  <!-- Anchors -->
  <g transform="translate(20, 1375)">
    <rect x="0" y="0" width="80%" height="20" fill="#F2F2F2" opacity="0.5"/>
    <text x="10" y="10" font-size="18" fill="#666666" opacity="1">Anchors</text>
    <animateTransform attributeName="transform" type="translate" from="0 1375" to="0 1400" dur="2000" begin="6s"/>
  </g>
  <rect x="150" y="1400" width="100%" height="200" fill="#F2F2F2" opacity="0.5"/>
  
  <!-- Footer -->
  <g transform="translate(20, 1700)">
    <rect x="0" y="0" width="100%" height="20" fill="#F2F2F2" opacity="0.5"/>
    <text x="10" y="10" font-size="18" fill="#666666" opacity="1">Regular Expressions with grep</text>
  </g>
</svg>