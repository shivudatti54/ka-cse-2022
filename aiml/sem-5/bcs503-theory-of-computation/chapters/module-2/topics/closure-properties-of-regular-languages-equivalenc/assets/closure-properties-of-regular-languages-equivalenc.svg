<svg width="420" height="400" data-topic-id="Closure-Properties-Of-Regular-Languages-Equivalence">
  <defs>
    <_LINEARGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </LinearGradient>
  </defs>

  <title>Closure Properties of Regular Languages Equivalence</title>

  <rect width="100%" height="20" fill="url(#gradient)" rx="10" />
  <text x="50%" y="30%" font-size="16" font-family="Arial" fill="#4E5338">Closure Properties of Regular Languages Equivalence</text>

  <section data-narration="Closure under Union">
    <rect x="20" y="60" width="80" height="100" fill="#F7F7F7" rx="10" />
    <text x="20%" y="70%" font-size="14" font-family="Arial" fill="#4E5338">Closure under Union</text>
    <animateTransform attributeName="transform" type="translate" from="-50% -50%" to="0% 0%" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="100" y="60" width="80" height="100" fill="#F7F7F7" rx="10" />
    <text x="100%" y="70%" font-size="14" font-family="Arial" fill="#4E5338">A ∪ B = {ab, bc, cd}</text>
    <animateTransform attributeName="transform" type="translate" from="100% -50%" to="0% 0%" begin="0s" dur="2s" repeatCount="indefinite" />
  </section>

  <section data-narration="Closure under Concatenation">
    <rect x="20" y="170" width="80" height="100" fill="#F7F7F7" rx="10" />
    <text x="20%" y="180%" font-size="14" font-family="Arial" fill="#4E5338">Closure under Concatenation</text>
    <animateTransform attributeName="transform" type="translate" from="-50% -50%" to="0% 0%" begin="2s" dur="2s" repeatCount="indefinite" />
    <rect x="100" y="170" width="80" height="100" fill="#F7F7F7" rx="10" />
    <text x="100%" y="180%" font-size="14" font-family="Arial" fill="#4E5338">AB = {abc}</text>
    <animateTransform attributeName="transform" type="translate" from="100% -50%" to="0% 0%" begin="2s" dur="2s" repeatCount="indefinite" />
  </section>

  <section data-narration="Closure under Kleene Star">
    <rect x="20" y="280" width="80" height="100" fill="#F7F7F7" rx="10" />
    <text x="20%" y="290%" font-size="14" font-family="Arial" fill="#4E5338">Closure under Kleene Star</text>
    <animateTransform attributeName="transform" type="translate" from="-50% -50%" to="0% 0%" begin="4s" dur="2s" repeatCount="indefinite" />
    <rect x="100" y="280" width="80" height="100" fill="#F7F7F7" rx="10" />
    <text x="100%" y="290%" font-size="14" font-family="Arial" fill="#4E5338">A* = {ε, ab, abb, ...}</text>
    <animateTransform attributeName="transform" type="translate" from="100% -50%" to="0% 0%" begin="4s" dur="2s" repeatCount="indefinite" />
  </section>

  <section data-narration="Closure under Complementation">
    <rect x="20" y="390" width="80" height="100" fill="#F7F7F7" rx="10" />
    <text x="20%" y="400%" font-size="14" font-family="Arial" fill="#4E5338">Closure under Complementation</text>
    <animateTransform attributeName="transform" type="translate" from="-50% -50%" to="0% 0%" begin="6s" dur="2s" repeatCount="indefinite" />
    <rect x="100" y="390" width="80" height="100" fill="#F7F7F7" rx="10" />
    <text x="100%" y="400%" font-size="14" font-family="Arial" fill="#4E5338">A* = {ε, bc}</text>
    <animateTransform attributeName="transform" type="translate" from="100% -50%" to="0% 0%" begin="6s" dur="2s" repeatCount="indefinite" />
  </section>

  <footer>
    <text x="50%" y="400%" font-size="14" font-family="Arial" fill="#4E5338">Regular Languages Equivalence: A Visual Guide</text>
  </footer>
</svg>