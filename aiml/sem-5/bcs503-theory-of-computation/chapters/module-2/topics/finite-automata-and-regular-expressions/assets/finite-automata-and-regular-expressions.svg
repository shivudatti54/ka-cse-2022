<svg width="420" height="400" data-topic-id="finite-automata-and-regular-expressions">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Finite Automata and Regular Expressions</title>
  <rect x="10" y="10" width="400" height="50" fill="url(#pastel-gradient)" rx="10"/>
  <g transform="translate(10, 70)" fill="#fff">
    <rect x="10" y="20" width="200" height="20" fill="#fff" rx="5"/>
    <text x="15" y="25" font-size="18" font-family="Arial" font-weight="bold">Introduction</text>
    <text x="15" y="45" font-size="14" font-family="Arial">Finite automata and regular expressions are fundamental concepts in the theory of computation.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 20" to="360 200 20" dur="10s" begin="0s"/>
  </g>
  <g transform="translate(220, 70)" fill="#fff">
    <rect x="10" y="20" width="200" height="20" fill="#fff" rx="5"/>
    <text x="15" y="25" font-size="18" font-family="Arial" font-weight="bold">Finite Automata</text>
    <section data-narration="Finite Automata is a simple machine that can be in one of a finite number of states. It can read input from a tape and move to a new state based on the current state and the input symbol.">
      <path d="M 100, 100 L 150, 100" stroke="#3B5998" stroke-width="2" fill="none"/>
      <path d="M 100, 150 L 150, 150" stroke="#3B5998" stroke-width="2" fill="none"/>
      <animate-transform attributeName="transform" type="translate" from="100 100" to="150 150" dur="5s" begin="0s"/>
    </section>
    <section data-narration="A DFA is a finite automaton that can be in one of a finite number of states. It can read input from a tape and move to a new state based on the current state and the input symbol. The next state is uniquely determined by the current state and the input symbol.">
      <path d="M 150, 150 L 200, 150" stroke="#3B5998" stroke-width="2" fill="none"/>
      <path d="M 150, 200 L 200, 200" stroke="#3B5998" stroke-width="2" fill="none"/>
      <animate-transform attributeName="transform" type="translate" from="150 150" to="200 200" dur="5s" begin="0s"/>
    </section>
    <section data-narration="An NFA is a finite automaton that can be in one of a finite number of states. It can read input from a tape and move to a new state based on the current state and the input symbol. The next state is not uniquely determined by the current state and the input symbol.">
      <path d="M 200, 150 L 250, 150" stroke="#3B5998" stroke-width="2" fill="none"/>
      <path d="M 200, 200 L 250, 200" stroke="#3B5998" stroke-width="2" fill="none"/>
      <animate-transform attributeName="transform" type="translate" from="200 150" to="250 150" dur="5s" begin="0s"/>
    </section>
    <section data-narration="The next state of an NFA is determined by the current state and the input symbol using a transition function. The transition function maps each current state and input symbol to a set of possible next states.">
      <path d="M 250, 150 L 250, 200" stroke="#3B5998" stroke-width="2" fill="none"/>
      <path d="M 250, 200 L 300, 200" stroke="#3B5998" stroke-width="2" fill="none"/>
      <animate-transform attributeName="transform" type="translate" from="250 150" to="250 200" dur="5s" begin="0s"/>
    </section>
    <section data-narration="Regular expressions are used to specify a pattern in a string. They can be used for text search, data validation, and compiler design.">
      <path d="M 300, 150 L 350, 150" stroke="#3B5998" stroke-width="2" fill="none"/>
      <path d="M 300, 200 L 350, 200" stroke="#3B5998" stroke-width="2" fill="none"/>
      <animate-transform attributeName="transform" type="translate" from="300 150" to="350 150" dur="5s" begin="0s"/>
    </section>
    <section data-narration="Regular expressions can be combined using union, concatenation, and Kleene closure to match more complex patterns.">
      <path d="M 350, 150 L 400, 150" stroke="#3B5998" stroke-width="2" fill="none"/>
      <path d="M 350, 200 L 400, 200" stroke="#3B5998" stroke-width="2" fill="none"/>
      <animate-transform attributeName="transform" type="translate" from="350 150" to="400 150" dur="5s" begin="0s"/>
    </section>
  </g>
  <g transform="translate(220, 230)" fill="#fff">
    <rect x="10" y="20" width="200" height="20" fill="#fff" rx="5"/>
    <text x="15" y="25" font-size="18" font-family="Arial" font-weight="bold">Conclusion</text>
    <text x="15" y="45" font-size="14" font-family="Arial">Finite automata and regular expressions are fundamental concepts in the theory of computation, used to describe and analyze the behavior of simple machines and languages.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 20" to="360 200 20" dur="10s" begin="0s"/>
  </g>
  <footer> Finite Automata and Regular Expressions </footer>
</svg>