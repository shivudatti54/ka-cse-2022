<svg width="420" height="400" data-topic-id="Recurrent Neural Networks 101 103" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background: #2f4f7f; gradient: linear, stop-color (#4f8ff9 0%), stop-color (#6495ed 100%);">

  <!-- Title -->
  <title>Recurrent Neural Networks (RNNs)</title>
  <desc>Animated Educational Diagram for RNNs</desc>

  <!-- Section 1: Introduction -->
  <section data-narration>
    <rect x="10" y="10" width="400" height="50" style="fill: #fff;"/>
    <text x="20" y="25" style="font-size: 18px; font-family: Arial, sans-serif; color: #2f4f7f;">Recurrent Neural Networks (RNNs)</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 100" to="360 200 100" dur="10s" repeatCount="indefinite"/>
  </section>

  <!-- Section 2: Key Components -->
  <section data-narration>
    <rect x="10" y="70" width="400" height="100" style="fill: #fff;"/>
    <text x="20" y="85" style="font-size: 18px; font-family: Arial, sans-serif; color: #2f4f7f;">Recurrent Units</text>
    <circle cx="200" cy="150" r="20" style="fill: #4f8ff9; fill-opacity: 0.5;"/>
    <line x1="180" y1="120" x2="220" y2="180" style="stroke: #2f4f7f; stroke-width: 2; stroke-dasharray: 5,2;"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="5s" repeatCount="indefinite"/>
    <text x="20" y="120" style="font-size: 14px; font-family: Arial, sans-serif; color: #2f4f7f;">Process sequential data</text>
  </section>

  <!-- Section 3: Feedback Connections -->
  <section data-narration>
    <rect x="10" y="170" width="400" height="100" style="fill: #fff;"/>
    <text x="20" y="185" style="font-size: 18px; font-family: Arial, sans-serif; color: #2f4f7f;">Feedback Connections</text>
    <line x1="180" y1="160" x2="220" y2="220" style="stroke: #4f8ff9; stroke-width: 2; stroke-dasharray: 5,2;"/>
    <line x1="180" y1="220" x2="220" y2="160" style="stroke: #4f8ff9; stroke-width: 2; stroke-dasharray: 5,2;"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="5s" repeatCount="indefinite"/>
    <text x="20" y="180" style="font-size: 14px; font-family: Arial, sans-serif; color: #2f4f7f;">Use output from previous time steps</text>
  </section>

  <!-- Section 4: Weight Matrices -->
  <section data-narration>
    <rect x="10" y="230" width="400" height="100" style="fill: #fff;"/>
    <text x="20" y="245" style="font-size: 18px; font-family: Arial, sans-serif; color: #2f4f7f;">Weight Matrices</text>
    <rect x="180" y="200" width="40" height="20" style="fill: #6495ed; fill-opacity: 0.5;"/>
    <rect x="220" y="200" width="40" height="20" style="fill: #6495ed; fill-opacity: 0.5;"/>
    <animateTransform attributeName="transform" type="translate" from="0 250" to="0 200" dur="5s" repeatCount="infinite"/>
    <text x="20" y="210" style="font-size: 14px; font-family: Arial, sans-serif; color: #2f4f7f;">Learn relationships between time steps</text>
  </section>

  <!-- Section 5: Types of RNNs -->
  <section data-narration>
    <rect x="10" y="280" width="400" height="100" style="fill: #fff;"/>
    <text x="20" y="295" style="font-size: 18px; font-family: Arial, sans-serif; color: #2f4f7f;">Types of RNNs</text>
    <rect x="180" y="255" width="40" height="20" style="fill: #4f8ff9; fill-opacity: 0.5;"/>
    <rect x="220" y="255" width="40" height="20" style="fill: #6495ed; fill-opacity: 0.5;"/>
    <rect x="260" y="255" width="40" height="20" style="fill: #4f8ff9; fill-opacity: 0.5;"/>
    <animateTransform attributeName="transform" type="translate" from="0 300" to="0 260" dur="5s" repeatCount="infinite"/>
    <text x="20" y="265" style="font-size: 14px; font-family: Arial, sans-serif; color: #2f4f7f;">Simple RNN, LSTM, GRU</text>
  </section>

  <!-- Section 6: Applications -->
  <section data-narration>
    <rect x="10" y="330" width="400" height="100" style="fill: #fff;"/>
    <text x="20" y="345" style="font-size: 18px; font-family: Arial, sans-serif; color: #2f4f7f;">Applications</text>
    <rect x="180" y="310" width="40" height="20" style="fill: #4f8ff9; fill-opacity: 0.5;"/>
    <rect x="220" y="310" width="40" height="20" style="fill: #6495ed; fill-opacity: 0.5;"/>
    <rect x="260" y="310" width="40" height="20" style="fill: #4f8ff9; fill-opacity: 0.5;"/>
    <animateTransform attributeName="transform" type="translate" from="0 320" to="0 280" dur="5s" repeatCount="infinite"/>
    <text x="20" y="330" style="font-size: 14px; font-family: Arial, sans-serif; color: #2f4f7f;">Language Modeling, Machine Translation, Speech Recognition</text>
  </section>

  <!-- Footer -->
  <footer>
    <text x="10" y="380" style="font-size: 14px; font-family: Arial, sans-serif; color: #2f4f7f;">Recurrent Neural Networks 101 103</text>
  </footer>

</svg>