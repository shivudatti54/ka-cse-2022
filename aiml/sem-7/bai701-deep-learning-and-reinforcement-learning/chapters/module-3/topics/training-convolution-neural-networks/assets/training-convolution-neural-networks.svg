<svg width="420" height="400" data-topic-id="training-convolution-neural-networks">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7A498A" stop-opacity="1"/>
            <stop offset="100%" stop-color="#44A0E5" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <title>Training Convolution Neural Networks</title>
    <rect fill="url(#gradient)" width="100%" height="100%"/>
    <g transform="translate(10, 10)">
        <rect x="0" y="0" width="400" height="350" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
        <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="start">Convolutional Neural Networks</text>
        <rect x="0" y="50" width="100%" height="200" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
        <g>
            <animate attributeName="opacity" begin="0s" dur="2s" fill="freeze" repeatCount="indefinite"/>
            <animate transform="rotate(360 190 190)" begin="0s" dur="2s" fill="freeze" repeatCount="indefinite"/>
        </g>
        <text x="10" y="260" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Convolutional Layers</text>
        <section data-narration="Convolutional Layers explain the core of CNNs. They apply filters to small regions of the input data, scanning in both horizontal and vertical directions.">
            <g>
                <rect x="20" y="280" width="60" height="20" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
                <text x="40" y="290" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Filters</text>
                <text x="40" y="295" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Region scanning</text>
            </g>
            <animate transform="rotate(360 220 220)" begin="0s" dur="2s" fill="freeze" repeatCount="indefinite"/>
        </section>
        <section data-narration="Activation Functions introduce non-linearity into the network, enabling it to learn features from the input data. They are crucial for CNNs, as they allow the network to represent complex data patterns.">
            <g>
                <rect x="20" y="320" width="60" height="20" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
                <text x="40" y="330" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Non-linearity</text>
                <text x="40" y="325" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Data representation</text>
            </g>
            <animate transform="rotate(360 260 260)" begin="0s" dur="2s" fill="freeze" repeatCount="indefinite"/>
        </section>
        <section data-narration="Pooling Layers down-sample the feature maps generated by the convolutional layers, reducing the spatial dimensions of the data. This helps the network to capture larger features.">
            <g>
                <rect x="20" y="380" width="60" height="20" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
                <text x="40" y="390" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Down-sampling</text>
                <text x="40" y="385" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Feature capture</text>
            </g>
            <animate transform="rotate(360 300 300)" begin="0s" dur="2s" fill="freeze" repeatCount="indefinite"/>
        </section>
        <section data-narration="Fully Connected Layers allow the network to make predictions or classify new data. They are used for tasks such as image classification, object detection, and more.">
            <g>
                <rect x="20" y="440" width="60" height="20" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
                <text x="40" y="450" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Classification</text>
                <text x="40" y="445" font-size="14" font-family="Arial, sans-serif" text-anchor="start">New data prediction</text>
            </g>
            <animate transform="rotate(360 340 340)" begin="0s" dur="2s" fill="freeze" repeatCount="indefinite"/>
        </section>
        <footer>
            <text x="10" y="490" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Training Convolution Neural Networks</text>
        </footer>
    </g>
</svg>