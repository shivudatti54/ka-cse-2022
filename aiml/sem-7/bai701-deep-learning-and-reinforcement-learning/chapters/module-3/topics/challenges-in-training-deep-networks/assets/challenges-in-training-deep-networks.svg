<svg width="420" height="400" data-topic-id="challenges-in-training-deep-networks">
  <title>Challenges in Training Deep Networks</title>
  <footer>
    <!-- footer content here -->
  </footer>
  <defs>
    <style>
      .rect {
        fill: rgba(0, 0, 255, 0.5);
      }
      .line {
        stroke: #36b4ff;
        stroke-width: 2;
      }
      .text {
        font-size: 16px;
        font-weight: bold;
        color: #2f4f7f;
      }
    </style>
  </defs>
  <g id="root">
    <rect x="50" y="50" width="320" height="300" class="rect" rx="10" data-narration="Introduction to Deep Networks" />
    <g class="line">
      <path d="M 50 50 L 120 50" data-narration="Vanishing Gradients" />
      <rect x="100" y="100" width="100" height="100" class="rect" rx="10" data-narration="Causes of Vanishing Gradients: Backpropagation and Activation Functions" />
      <text x="200" y="150" class="text">Vanishing Gradients</text>
      <animateTransform attributeName="transform" type="translate" from="50 50" to="100 150" dur="2000" begin="0s" delay="0s" />
    </g>
    <g>
      <path d="M 200 50 L 220 50" data-narration="Solutions to Vanishing Gradients: ReLU Activation Function" class="line" />
      <rect x="250" y="100" width="100" height="100" class="rect" rx="10" data-narration="Benefits of ReLU Activation Function" />
      <text x="350" y="150" class="text">ReLU Activation Function</text>
      <animateTransform attributeName="transform" type="translate" from="200 50" to="250 150" dur="2000" begin="0s" delay="0s" />
    </g>
    <g>
      <path d="M 350 50 L 380 50" data-narration="Solutions to Vanishing Gradients: Gradient Clipping" class="line" />
      <rect x="400" y="100" width="100" height="100" class="rect" rx="10" data-narration="Benefits of Gradient Clipping" />
      <text x="500" y="150" class="text">Gradient Clipping</text>
      <animateTransform attributeName="transform" type="translate" from="350 50" to="400 150" dur="2000" begin="0s" delay="0s" />
    </g>
    <g>
      <path d="M 450 50 L 480 50" data-narration="Solutions to Vanishing Gradients: Batch Normalization" class="line" />
      <rect x="500" y="100" width="100" height="100" class="rect" rx="10" data-narration="Benefits of Batch Normalization" />
      <text x="600" y="150" class="text">Batch Normalization</text>
      <animateTransform attributeName="transform" type="translate" from="450 50" to="500 150" dur="2000" begin="0s" delay="0s" />
    </g>
    <g>
      <path d="M 550 50 L 580 50" data-narration="Exploding Gradients" class="line" />
      <rect x="600" y="100" width="100" height="100" class="rect" rx="10" data-narration="Causes of Exploding Gradients: Weight Initialization and Neural Network Depth" />
      <text x="700" y="150" class="text">Exploding Gradients</text>
      <animateTransform attributeName="transform" type="translate" from="550 50" to="600 150" dur="2000" begin="0s" delay="0s" />
    </g>
    <g>
      <path d="M 650 50 L 680 50" data-narration="Solutions to Exploding Gradients: Weight Initialization" class="line" />
      <rect x="700" y="100" width="100" height="100" class="rect" rx="10" data-narration="Benefits of Weight Initialization" />
      <text x="800" y="150" class="text">Weight Initialization</text>
      <animateTransform attributeName="transform" type="translate" from="650 50" to="700 150" dur="2000" begin="0s" delay="0s" />
    </g>
    <g>
      <path d="M 750 50 L 780 50" data-narration="Solutions to Exploding Gradients: Neural Network Depth" class="line" />
      <rect x="800" y="100" width="100" height="100" class="rect" rx="10" data-narration="Benefits of Neural Network Depth" />
      <text x="900" y="150" class="text">Neural Network Depth</text>
      <animateTransform attributeName="transform" type="translate" from="750 50" to="800 150" dur="2000" begin="0s" delay="0s" />
    </g>
    <g>
      <path d="M 850 50 L 880 50" data-narration="Exploding Gradients are Devastating" class="line" />
      <rect x="900" y="100" width="100" height="100" class="rect" rx="10" data-narration="Conclusion: Exploding Gradients are Devastating" />
      <text x="1000" y="150" class="text">Exploding Gradients are Devastating</text>
      <animateTransform attributeName="transform" type="translate" from="850 50" to="900 150" dur="2000" begin="0s" delay="0s" />
    </g>
  </g>
  <defs>
    <style>
      .topic-title {
        font-size: 24px;
        font-weight: bold;
        color: #2f4f7f;
      }
      .topic-subtitle {
        font-size: 18px;
        color: #666;
      }
    </style>
  </defs>
  <g id="footer">
    <!-- footer content here -->
  </g>
</svg>