<svg width="420" height="400" data-topic-id="Ch 42" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Gradient background */
    .background {
      fill: #C7B8EA;
      stroke: #87CEEB;
      stroke-width: 0;
    }
    /* Text styles */
    .title {
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      color: #3498db;
    }
    .section {
      margin-bottom: 20px;
    }
    .section .data-narration {
      font-size: 16px;
      color: #666;
    }
  </style>
  <rect x="10" y="10" width="400" height="380" class="background"></rect>
  <g id="title">
    <text class="title" x="20" y="20" transform="rotate(90, 20, 20)">Training Supervised Deep Learning Networks</text>
  </g>
  <g id="sections">
    <g class="section" data-narration="Supervised Learning Objectives">
      <rect x="10" y="50" width="300" height="80" class="section-background"></rect>
      <text x="20" y="60" class="section-headline">Objective</text>
      <text x="20" y="80" class="data-narration">The objective of supervised learning is to train a model to make predictions on new, unseen data based on the patterns learned from the labeled training data.</text>
      <animate x="20" y="60" attributeName="x" begin="100ms" dur="500ms" repeatCount="indefinite" repeat="indefinite" />
      <animate y="60" attributeName="y" begin="100ms" dur="500ms" repeatCount="indefinite" repeat="indefinite" />
    </g>
    <g class="section" data-narration="Types of Supervised Learning Algorithms">
      <rect x="10" y="150" width="300" height="80" class="section-background"></rect>
      <text x="20" y="160" class="section-headline">Types of Supervised Learning Algorithms</text>
      <text x="20" y="180" class="data-narration">There are several types of supervised learning algorithms, including linear regression, logistic regression, decision trees, random forests, and support vector machines.</text>
      <animate x="20" y="160" attributeName="x" begin="200ms" dur="500ms" repeatCount="indefinite" repeat="indefinite" />
      <animate y="160" attributeName="y" begin="200ms" dur="500ms" repeatCount="indefinite" repeat="indefinite" />
    </g>
    <g class="section" data-narration="Training a Supervised Deep Learning Network">
      <rect x="10" y="250" width="300" height="80" class="section-background"></rect>
      <text x="20" y="260" class="section-headline">Training a Supervised Deep Learning Network</text>
      <text x="20" y="280" class="data-narration">Training a supervised deep learning network involves data preparation, model selection, model training, and model evaluation.</text>
      <animate x="20" y="260" attributeName="x" begin="300ms" dur="500ms" repeatCount="indefinite" repeat="indefinite" />
      <animate y="260" attributeName="y" begin="300ms" dur="500ms" repeatCount="indefinite" repeat="indefinite" />
    </g>
    <g class="section" data-narration="Linear Regression">
      <rect x="10" y="350" width="300" height="80" class="section-background"></rect>
      <text x="20" y="360" class="section-headline">Linear Regression</text>
      <text x="20" y="380" class="data-narration">A linear regression model predicts a continuous output variable based on one or more input features.</text>
      <animate x="20" y="360" attributeName="x" begin="400ms" dur="500ms" repeatCount="indefinite" repeat="indefinite" />
      <animate y="360" attributeName="y" begin="400ms" dur="500ms" repeatCount="indefinite" repeat="indefinite" />
    </g>
    <g class="section" data-narration="Logistic Regression">
      <rect x="10" y="450" width="300" height="80" class="section-background"></rect>
      <text x="20" y="460" class="section-headline">Logistic Regression</text>
      <text x="20" y="480" class="data-narration">A logistic regression model predicts a binary output variable based on one or more input features.</text>
      <animate x="20" y="460" attributeName="x" begin="500ms" dur="500ms" repeatCount="indefinite" repeat="indefinite" />
      <animate y="460" attributeName="y" begin="500ms" dur="500ms" repeatCount="indefinite" repeat="indefinite" />
    </g>
  </g>
  <g id="footer">
    <text x="20" y="380" class="footer-text">Ch 42</text>
  </g>
</svg>