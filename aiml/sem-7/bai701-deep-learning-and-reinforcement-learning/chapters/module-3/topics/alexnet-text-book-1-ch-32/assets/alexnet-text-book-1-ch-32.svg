<svg width="420" height="400" data-topic-id="alexnet-text-book-1-ch-32">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="1" />
      <stop offset="50%" stop-color="#6495ed" stop-opacity="1" />
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" />
  <title>Convolutional Neural Networks (CNNs)</title>
  <g transform="translate(10, 20)">
    <text x="0" y="20" font-size="24" font-family="Arial" fill="#4c5154">Convolutional Neural Networks (CNNs)</text>
    <text x="0" y="50" font-size="18" font-family="Arial" fill="#4c5154">Introduction</text>
    <rect x="10" y="60" width="400" height="30" fill="#f7f7f7" rx="10" />
    <text x="15" y="70" font-size="16" font-family="Arial" fill="#4c5154" data-narration="Convolutional layers are the core of a CNN. They operate by scanning the input data with a filter (kernel), applying a dot product to each region of the data. This process generates feature maps that contain the key elements of the input data." />
    <g transform="translate(30, 100)">
      <text x="0" y="50" font-size="18" font-family="Arial" fill="#4c5154">Key Components of CNNs</text>
      <rect x="10" y="60" width="400" height="30" fill="#f7f7f7" rx="10" />
      <text x="15" y="70" font-size="16" font-family="Arial" fill="#4c5154" data-narration="Convolutional layers, activation functions, pooling layers, and flatten layers are the key components of a CNN." />
    </g>
    <g transform="translate(30, 150)">
      <text x="0" y="50" font-size="18" font-family="Arial" fill="#4c5154">Convolutional Layers</text>
      <rect x="10" y="60" width="400" height="30" fill="#f7f7f7" rx="10" />
      <text x="15" y="70" font-size="16" font-family="Arial" fill="#4c5154" data-narration="Convolutional layers apply filters (kernels) to small regions of the input data, scanning the entire image, and generating feature maps." />
      <animate attributeName="opacity" from="1" to="0.5" dur="2000" begin="script#1" />
      <animate attributeName="opacity" from="0.5" to="1" dur="2000" begin="script#2" />
    </g>
    <g transform="translate(30, 220)">
      <text x="0" y="50" font-size="18" font-family="Arial" fill="#4c5154">Filter (Kernel) Size</text>
      <rect x="10" y="60" width="400" height="30" fill="#f7f7f7" rx="10" />
      <text x="15" y="70" font-size="16" font-family="Arial" fill="#4c5154" data-narration="The size of the filter determines the spatial resolution of the feature maps." />
      <animate attributeName="opacity" from="1" to="0.5" dur="2000" begin="script#3" />
      <animate attributeName="opacity" from="0.5" to="1" dur="2000" begin="script#4" />
    </g>
    <g transform="translate(30, 290)">
      <text x="0" y="50" font-size="18" font-family="Arial" fill="#4c5154">Stride Size</text>
      <rect x="10" y="60" width="400" height="30" fill="#f7f7f7" rx="10" />
      <text x="15" y="70" font-size="16" font-family="Arial" fill="#4c5154" data-narration="The stride size determines the amount of spatial overlap between filters." />
      <animate attributeName="opacity" from="1" to="0.5" dur="2000" begin="script#5" />
      <animate attributeName="opacity" from="0.5" to="1" dur="2000" begin="script#6" />
    </g>
    <g transform="translate(10, 350)">
      <text x="0" y="20" font-size="18" font-family="Arial" fill="#4c5154">Footer</text>
      <rect x="10" y="30" width="400" height="30" fill="#f7f7f7" rx="10" />
      <text x="15" y="40" font-size="16" font-family="Arial" fill="#4c5154" data-narration="This concludes the introduction to Convolutional Neural Networks (CNNs)." />
    </g>
  </g>
</svg>