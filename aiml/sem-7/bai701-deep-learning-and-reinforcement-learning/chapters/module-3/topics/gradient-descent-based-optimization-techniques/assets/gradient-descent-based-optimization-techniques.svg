<svg width="420" height="400" data-topic-id="Gradient-Descent-Based-Optimization-Techniques">
  <title>Gradient Descent Based Optimization Techniques</title>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1" />
      <stop offset="100%" stop-color="#66B3FF" stop-opacity="1" />
    </linearGradient>
  </defs>
  <style>
    text {
      font-family: Arial, sans-serif;
      font-size: 16px;
    }
    .section {
      margin-bottom: 20px;
    }
    .section h2 {
      margin-top: 0;
    }
  </style>
  <rect x="10" y="10" width="400" height="350" fill="url(#gradient)" rx="10"/>
  <g id="background">
    <rect x="10" y="10" width="400" height="350" fill="#f0f2f6"/>
  </g>
  <g id="foreground">
    <rect x="10" y="10" width="400" height="350" fill="#fff"/>
  </g>
  <animate xmlns="http://www.w3.org/2000/svg" dur="5s" begin="0s" repeatCount="indefinite">
    <g id="foreground">
      <rect x="10" y="10" width="400" height="350" fill="#fff"/>
      <g class="section" data-narration="Gradient Descent is an optimization algorithm that uses the concept of gradients to minimize the loss function.">
        <h2>Gradient Descent</h2>
        <text x="50%" y="150" class="section-text">Gradient Descent is an optimization algorithm that uses the concept of gradients to minimize the loss function.</text>
        <line x1="20%" y1="20%" x2="80%" y2="20%" stroke="#66CCCC" stroke-width="2" vector-effect="non-scaling-stroke"/>
        <line x1="20%" y1="80%" x2="80%" y2="80%" stroke="#66CCCC" stroke-width="2" vector-effect="non-scaling-stroke"/>
      </g>
      <g class="section" data-narration="Key Concepts">
        <h2>Key Concepts</h2>
        <g>
          <rect x="10" y="10" width="50" height="30" fill="#fff" rx="5"/>
          <text x="20%" y="15" class="section-text">Loss Function</text>
          <line x1="10%" y1="10%" x2="60%" y2="10%" stroke="#66CCCC" stroke-width="2" vector-effect="non-scaling-stroke"/>
        </g>
        <g>
          <rect x="70" y="10" width="50" height="30" fill="#fff" rx="5"/>
          <text x="80%" y="15" class="section-text">Gradient</text>
          <line x1="70%" y1="10%" x2="120%" y2="10%" stroke="#66CCCC" stroke-width="2" vector-effect="non-scaling-stroke"/>
        </g>
        <g>
          <rect x="130" y="10" width="50" height="30" fill="#fff" rx="5"/>
          <text x="140%" y="15" class="section-text">Optimization Algorithm</text>
          <line x1="130%" y1="10%" x2="180%" y2="10%" stroke="#66CCCC" stroke-width="2" vector-effect="non-scaling-stroke"/>
        </g>
      </g>
      <g class="section" data-narration="Types of Gradient Descent-Based Optimization Techniques">
        <h2>Types of Gradient Descent-Based Optimization Techniques</h2>
        <g>
          <rect x="10" y="10" width="50" height="30" fill="#fff" rx="5"/>
          <text x="20%" y="15" class="section-text">Stochastic Gradient Descent (SGD)</text>
          <line x1="10%" y1="10%" x2="60%" y2="10%" stroke="#66CCCC" stroke-width="2" vector-effect="non-scaling-stroke"/>
        </g>
        <g>
          <rect x="70" y="10" width="50" height="30" fill="#fff" rx="5"/>
          <text x="80%" y="15" class="section-text">Mini-Batch Gradient Descent (MBGD)</text>
          <line x1="70%" y1="10%" x2="120%" y2="10%" stroke="#66CCCC" stroke-width="2" vector-effect="non-scaling-stroke"/>
        </g>
        <g>
          <rect x="130" y="10" width="50" height="30" fill="#fff" rx="5"/>
          <text x="140%" y="15" class="section-text">Adam (Adam Optimizer)</text>
          <line x1="130%" y1="10%" x2="180%" y2="10%" stroke="#66CCCC" stroke-width="2" vector-effect="non-scaling-stroke"/>
        </g>
      </g>
      <g class="section" data-narration="Example">
        <h2>Example</h2>
        <g>
          <rect x="10" y="10" width="50" height="30" fill="#fff" rx="5"/>
          <text x="20%" y="15" class="section-text">In a neural network, SGD updates the model's weights using a single training example.</text>
          <line x1="10%" y1="10%" x2="60%" y2="10%" stroke="#66CCCC" stroke-width="2" vector-effect="non-scaling-stroke"/>
        </g>
        <g>
          <rect x="70" y="10" width="50" height="30" fill="#fff" rx="5"/>
          <text x="80%" y="15" class="section-text">In a neural network, MBGD updates the model's weights using a mini-batch of 32 training examples.</text>
          <line x1="70%" y1="10%" x2="120%" y2="10%" stroke="#66CCCC" stroke-width="2" vector-effect="non-scaling-stroke"/>
        </g>
        <g>
          <rect x="130" y="10" width="50" height="30" fill="#fff" rx="5"/>
          <text x="140%" y="15" class="section-text">In a neural network, Adam updates the model's weights using an adaptive learning rate that adjusts based on the magnitude of the gradient.</text>
          <line x1="130%" y1="10%" x2="180%" y2="10%" stroke="#66CCCC" stroke-width="2" vector-effect="non-scaling-stroke"/>
        </g>
      </g>
    </g>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="5s" repeatCount="indefinite"/>
  </animate>
  <g id="footer">
    <text x="50%" y="350" class="footer-text">Gradient Descent Based Optimization Techniques</text>
  </g>
</svg>