<svg width="420" height="400" data-topic-id="iot-case-studies-smart-home-automation" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6495ED" stop-opacity="1" />
      <stop offset="100%" stop-color="#4682B4" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" opacity="0.5" />
  <title>Smart Home Automation System</title>
  <text x="20" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="start" fill="#4F516E">Smart Home Automation System</text>
  <section id="physical-design-components" data-narration="Physical Design Components">
    <rect x="50" y="50" width="200" height="100" fill="#C7E2F4" rx="10" />
    <text x="65" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#4F516E">Sensors:</text>
    <animate transform="translateX(10) rotate(45)" begin="0s" duration="2s" delay="0s" fill="freeze" />
    <rect x="180" y="50" width="20" height="20" fill="#4F516E" rx="5" />
    <text x="190" y="60" font-size="12" font-family="Arial, sans-serif" text-anchor="start" fill="#4F516E">DHT22</text>
    <rect x="240" y="50" width="20" height="20" fill="#4F516E" rx="5" />
    <text x="250" y="60" font-size="12" font-family="Arial, sans-serif" text-anchor="start" fill="#4F516E">PIR</text>
  </section>
  <section id="actuators" data-narration="Actuators">
    <rect x="50" y="180" width="200" height="150" fill="#F2C464" rx="10" />
    <text x="65" y="200" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#4F516E">Actuators:</text>
    <animate transform="translateX(10) rotate(45)" begin="2s" duration="2s" delay="2s" fill="freeze" />
    <rect x="180" y="180" width="20" height="20" fill="#4F516E" rx="5" />
    <text x="190" y="190" font-size="12" font-family="Arial, sans-serif" text-anchor="start" fill="#4F516E">Smart Light Bulb</text>
    <rect x="240" y="180" width="20" height="20" fill="#4F516E" rx="5" />
    <text x="250" y="190" font-size="12" font-family="Arial, sans-serif" text-anchor="start" fill="#4F516E">Smart Plug</text>
  </section>
  <section id="controller" data-narration="Controller">
    <rect x="50" y="320" width="200" height="100" fill="#C7E2F4" rx="10" />
    <text x="65" y="340" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#4F516E">Controller:</text>
    <animate transform="translateX(10) rotate(45)" begin="4s" duration="2s" delay="4s" fill="freeze" />
    <rect x="180" y="320" width="20" height="20" fill="#4F516E" rx="5" />
    <text x="190" y="330" font-size="12" font-family="Arial, sans-serif" text-anchor="start" fill="#4F516E">Raspberry Pi</text>
  </section>
  <section id="communication-protocols" data-narration="Communication Protocols">
    <rect x="50" y="450" width="200" height="100" fill="#F2C464" rx="10" />
    <text x="65" y="470" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#4F516E">Communication Protocols:</text>
    <animate transform="translateX(10) rotate(45)" begin="6s" duration="2s" delay="6s" fill="freeze" />
    <rect x="180" y="450" width="20" height="20" fill="#4F516E" rx="5" />
    <text x="190" y="460" font-size="12" font-family="Arial, sans-serif" text-anchor="start" fill="#4F516E">Wi-Fi, Zigbee, Z-Wave, BLE</text>
  </section>
  <footer>
    <text x="20" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#4F516E">Example of Smart Home Automation System</text>
  </footer>
</svg>