<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400">
  <title>Deep Learning Networks for Textual Document Classification</title>
  <metadata>
    <data-topic-id topic="Convolutional Neural Networks (CNNs)"></data-topic-id>
  </metadata>
  <style>
    /* Gradient background */
    body {
      background: linear-gradient(to bottom, #3B82F6, #3498DB, #1ABC9C);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
  <rect x="10" y="20" width="400" height="350" fill="#fff" rx="10" />
  <g transform="translate(10, 20)">
    <section data-narration="Embedding layer">
      <rect x="0" y="0" width="200" height="50" fill="#fff" rx="5" />
      <text x="10" y="25" font-size="16" font-family="Arial" fill="#000">Embedding layer</text>
      <animate transform="rotate(360 150 25)" dur="1s" begin="0s" repeat="indefinite" />
    </section>
    <a href="#" class="link"><text x="230" y="25" font-size="16" font-family="Arial" fill="#000">View</text></a>
    <section data-narration="Convolutional layer">
      <rect x="0" y="70" width="200" height="50" fill="#fff" rx="5" />
      <text x="10" y="75" font-size="16" font-family="Arial" fill="#000">Convolutional layer</text>
      <animate transform="rotate(360 150 75)" dur="1s" begin="0.5s" repeat="indefinite" />
    </section>
    <a href="#" class="link"><text x="230" y="75" font-size="16" font-family="Arial" fill="#000">View</text></a>
    <section data-narration="Pooling layer">
      <rect x="0" y="130" width="200" height="50" fill="#fff" rx="5" />
      <text x="10" y="135" font-size="16" font-family="Arial" fill="#000">Pooling layer</text>
      <animate transform="rotate(360 150 135)" dur="1s" begin="1s" repeat="indefinite" />
    </section>
    <a href="#" class="link"><text x="230" y="135" font-size="16" font-family="Arial" fill="#000">View</text></a>
    <section data-narration="Fully connected layer">
      <rect x="0" y="190" width="200" height="50" fill="#fff" rx="5" />
      <text x="10" y="195" font-size="16" font-family="Arial" fill="#000">Fully connected layer</text>
      <animate transform="rotate(360 150 195)" dur="1s" begin="1.5s" repeat="indefinite" />
    </section>
    <a href="#" class="link"><text x="230" y="195" font-size="16" font-family="Arial" fill="#000">View</text></a>
  </g>
  <footer>
    <text x="10" y="370" font-size="16" font-family="Arial" fill="#000">Deep Learning Networks for Textual Document Classification</text>
  </footer>
</svg>