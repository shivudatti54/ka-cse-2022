<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
        <style>
            .gradient {
                fill: #383495;
                transition: 0.2s;
            }
            .gradient:hover {
                filter: brightness(0.8);
            }
            .pastel {
                fill: #c9e4ca;
                transition: 0.2s;
            }
            .pastel:hover {
                filter: brightness(0.8);
            }
        </style>
    </defs>
    <g transform="translate(20, 20)">
        <rect class="gradient" x="0" y="0" width="380" height="360" rx="10" />
        <rect class="pastel" x="0" y="0" width="380" height="360" rx="10" opacity="0" />
        <rect class="gradient" x="0" y="0" width="380" height="360" rx="10" />
        <g id="background">
            <rect fill="#383495" x="0" y="0" width="380" height="360" rx="10" />
            <animateTransform attributeName="transform" type="scale" from="1 1" to="1.1 1.1" dur="0.5s" begin="0s" />
        </g>
        <g id="title">
            <text x="50%" y="20%" font-size="36" font-family="Arial Black" text-anchor="middle" fill="#66b3ff">
                <tspan id="title-text">Time Series Forecasting with Deep Learning</tspan>
            </text>
        </g>
        <g id="footer">
            <text x="50%" y="80%" font-size="24" font-family="Arial Black" text-anchor="middle" fill="#66b3ff">
                <tspan id="footer-text">Learn more about time series forecasting and deep learning</tspan>
            </text>
        </g>
        <g id="sections">
            <g id="section-1">
                <rect x="10" y="60" width="60" height="60" rx="10" class="pastel" />
                <rect x="60" y="60" width="60" height="60" rx="10" class="pastel" />
                <line x1="60" y1="60" x2="60" y2="60" marker-end="url(#arrow)" />
                <rect x="10" y="10" width="120" height="360" rx="10" class="gradient" />
                <animateTransform attributeName="transform" type="translateY" from="0" to="60" dur="0.5s" begin="0s" />
                <text x="190" y="50" font-size="18" font-family="Arial" text-anchor="middle" fill="#66b3ff" class="data-narration">
                    <tspan id="section-1-text">Data Preprocessing</tspan>
                </text>
            </g>
            <g id="section-2">
                <rect x="10" y="60" width="60" height="60" rx="10" class="pastel" />
                <rect x="60" y="60" width="60" height="60" rx="10" class="pastel" />
                <line x1="60" y1="60" x2="60" y2="60" marker-end="url(#arrow)" />
                <rect x="10" y="10" width="120" height="360" rx="10" class="gradient" />
                <animateTransform attributeName="transform" type="translateY" from="0" to="-60" dur="0.5s" begin="0.5s" />
                <text x="190" y="50" font-size="18" font-family="Arial" text-anchor="middle" fill="#66b3ff" class="data-narration">
                    <tspan id="section-2-text">Model Selection</tspan>
                </text>
            </g>
            <g id="section-3">
                <rect x="10" y="60" width="60" height="60" rx="10" class="pastel" />
                <rect x="60" y="60" width="60" height="60" rx="10" class="pastel" />
                <line x1="60" y1="60" x2="60" y2="60" marker-end="url(#arrow)" />
                <rect x="10" y="10" width="120" height="360" rx="10" class="gradient" />
                <animateTransform attributeName="transform" type="translateY" from="0" to="60" dur="0.5s" begin="1s" />
                <text x="190" y="50" font-size="18" font-family="Arial" text-anchor="middle" fill="#66b3ff" class="data-narration">
                    <tspan id="section-3-text">Hyperparameter Tuning</tspan>
                </text>
            </g>
            <g id="section-4">
                <rect x="10" y="60" width="60" height="60" rx="10" class="pastel" />
                <rect x="60" y="60" width="60" height="60" rx="10" class="pastel" />
                <line x1="60" y1="60" x2="60" y2="60" marker-end="url(#arrow)" />
                <rect x="10" y="10" width="120" height="360" rx="10" class="gradient" />
                <animateTransform attributeName="transform" type="translateY" from="0" to="-60" dur="0.5s" begin="1.5s" />
                <text x="190" y="50" font-size="18" font-family="Arial" text-anchor="middle" fill="#66b3ff" class="data-narration">
                    <tspan id="section-4-text">Evaluating Models</tspan>
                </text>
            </g>
            <g id="section-5">
                <rect x="10" y="60" width="60" height="60" rx="10" class="pastel" />
                <rect x="60" y="60" width="60" height="60" rx="10" class="pastel" />
                <line x1="60" y1="60" x2="60" y2="60" marker-end="url(#arrow)" />
                <rect x="10" y="10" width="120" height="360" rx="10" class="gradient" />
                <animateTransform attributeName="transform" type="translateY" from="0" to="60" dur="0.5s" begin="2s" />
                <text x="190" y="50" font-size="18" font-family="Arial" text-anchor="middle" fill="#66b3ff" class="data-narration">
                    <tspan id="section-5-text">Deployment</tspan>
                </text>
            </g>
            <g id="section-6">
                <rect x="10" y="60" width="60" height="60" rx="10" class="pastel" />
                <rect x="60" y="60" width="60" height="60" rx="10" class="pastel" />
                <line x1="60" y1="60" x2="60" y2="60" marker-end="url(#arrow)" />
                <rect x="10" y="10" width="120" height="360" rx="10" class="gradient" />
                <animateTransform attributeName="transform" type="translateY" from="0" to="-60" dur="0.5s" begin="2.5s" />
                <text x="190" y="50" font-size="18" font-family="Arial" text-anchor="middle" fill="#66b3ff" class="data-narration">
                    <tspan id="section-6-text">Conclusion</tspan>
                </text>
            </g>
        </g>
        <g id="arrow">
            <marker id="arrow" markerWidth="5" markerHeight="5" refX="2.5" refY="2.5" orient="auto" markerUnits="userSpaceOnUse">
                <svg width="10" height="10">
                    <path d="M 0 0 L 10 10 Z" fill="#66b3ff" />
                </svg>