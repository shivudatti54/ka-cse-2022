<svg width="420" height="400" data-topic-id="framework-of-reinforcement-learning">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title -->
  <g transform="translate(20, 20)">
    <text x="0" y="0" font-size="24" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7">Framework of Reinforcement Learning</text>
  </g>
  
  <!-- Section 1: Agent -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="The agent is the entity that perceives the environment and takes actions to achieve a goal.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="500" begin="-2000"/>
      <rect x="10" y="10" width="80" height="30" fill="#66CCCC" rx="5"/>
      <text x="15" y="25" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Agent</text>
    </g>
    <g transform="translate(50, 150)">
      <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="The agent can take one of a finite number of actions. The agent can take one of an infinite number of actions.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,70" dur="500" begin="-1500"/>
      <rect x="10" y="10" width="80" height="30" fill="#66CCCC" rx="5"/>
      <text x="15" y="25" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Discrete Actions</text>
      <rect x="150" y="10" width="80" height="30" fill="#66CCCC" rx="5"/>
      <text x="155" y="25" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Continuous Actions</text>
    </g>
    <g transform="translate(50, 200)">
      <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="The agent receives a reward when it takes an action that leads to a better outcome. The agent receives a reward when it takes an action that leads to a worse outcome.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,90" dur="500" begin="-1000"/>
      <rect x="10" y="10" width="80" height="30" fill="#66CCCC" rx="5"/>
      <text x="15" y="25" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Positive Reward</text>
      <rect x="150" y="10" width="80" height="30" fill="#66CCCC" rx="5"/>
      <text x="155" y="25" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Negative Reward</text>
    </g>
  </g>
  
  <!-- Section 2: Environment -->
  <g transform="translate(250, 100)">
    <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="The environment is the external world that the agent interacts with.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="500" begin="-2000"/>
      <rect x="10" y="10" width="80" height="30" fill="#66CCCC" rx="5"/>
      <text x="15" y="25" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Environment</text>
    </g>
    <g transform="translate(250, 150)">
      <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="The environment can be in one of a finite number of states. The environment can be in an infinite number of states.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,70" dur="500" begin="-1500"/>
      <rect x="10" y="10" width="80" height="30" fill="#66CCCC" rx="5"/>
      <text x="15" y="25" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Discrete States</text>
      <rect x="150" y="10" width="80" height="30" fill="#66CCCC" rx="5"/>
      <text x="155" y="25" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Continuous States</text>
    </g>
    <g transform="translate(250, 200)">
      <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="The agent receives feedback in the form of rewards or penalties.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,90" dur="500" begin="-1000"/>
      <rect x="10" y="10" width="80" height="30" fill="#66CCCC" rx="5"/>
      <text x="15" y="25" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Rewards</text>
      <rect x="150" y="10" width="80" height="30" fill="#66CCCC" rx="5"/>
      <text x="155" y="25" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Penalties</text>
    </g>
  </g>
  
  <!-- Section 3: Policy -->
  <g transform="translate(150, 100)">
    <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="A policy is a mapping from states to actions, which specifies the action taken by the agent in response to a given state.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="500" begin="-2000"/>
      <rect x="10" y="10" width="80" height="30" fill="#66CCCC" rx="5"/>
      <text x="15" y="25" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Policy</text>
    </g>
    <g transform="translate(150, 150)">
      <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="The policy provides a strategy for the agent to follow.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,70" dur="500" begin="-1500"/>
      <rect x="10" y="10" width="80" height="30" fill="#66CCCC" rx="5"/>
      <text x="15" y="25" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Strategy</text>
    </g>
    <g transform="translate(150, 200)">
      <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="The policy is used to select actions in response to the environment.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,90" dur="500" begin="-1000"/>
      <rect x="10" y="10" width="80" height="30" fill="#66CCCC" rx="5"/>
      <text x="15" y="25" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Action Selection</text>
    </g>
  </g>
  
  <!-- Section 4: Value Function -->
  <g transform="translate(250, 100)">
    <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="A value function is a mapping from states to expected rewards, which provides the agent with an estimate of the expected reward for taking an action in a given state.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="500" begin="-2000"/>
      <rect x="10" y="10" width="80" height="30" fill="#66CCCC" rx="5"/>
      <text x="15" y="25" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Value Function</text>
    </g>
    <g transform="translate(250, 150)">
      <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="The value function provides the agent with information about the expected rewards.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,70" dur="500" begin="-1500"/>
      <rect x="10" y="10" width="80" height="30" fill="#66CCCC" rx="5"/>
      <text x="15" y="25" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Expected Rewards</text>
    </g>
    <g transform="translate(250, 200)">
      <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="The value function is used to estimate the expected rewards.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,90" dur="500" begin="-1000"/>
      <rect x="10" y="10" width="80" height="30" fill="#66CCCC" rx="5"/>
      <text x="15" y="25" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Reward Estimation</text>
    </g>
  </g>
  
  <!-- Section 5: Q-Function -->
  <g transform="translate(150, 100)">
    <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="A Q-function is a mapping from states and actions to the expected rewards, which provides the agent with an estimate of the expected reward for taking an action in a given state.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="500" begin="-2000"/>
      <rect x="10" y="10" width="80" height="30" fill="#66CCCC" rx="5"/>
      <text x="15" y="25" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Q-Function</text>
    </g>
    <g transform="translate(150, 150)">
      <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="The Q-function provides the agent with information about the expected rewards for taking a specific action in a given state.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,70" dur="500" begin="-1500"/>
      <rect x="10" y="10" width="80" height="30" fill="#66CCCC" rx="5"/>
      <text x="15" y="25" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Action-Dependent Rewards</text>
    </g>
    <g transform="translate(150, 200)">
      <rect x="0" y="0" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="The Q-function is used to estimate the expected rewards for taking a specific action in a given state.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,90" dur="500" begin="-1000"/>
      <rect x="10" y="10" width="80" height="30" fill="#66CCCC" rx="5"/>
      <text x="15" y="25" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">Reward Estimation</text>
    </g>
  </g>
  
  <!-- Footer -->
  <g transform="translate(20, 380)">
    <text x="0" y="0" font-size="18" font-family="Arial" fill="#FFFFFF" fill-opacity="0.7">Reinforcement Learning Framework</text>
  </g>
</svg>