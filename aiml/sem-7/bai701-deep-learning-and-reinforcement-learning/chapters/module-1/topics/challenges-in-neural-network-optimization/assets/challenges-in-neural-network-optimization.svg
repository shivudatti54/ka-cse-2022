<svg width="420" height="400" data-topic-id="challenges-in-neural-network-optimization">
  <title>Challenges in Neural Network Optimization</title>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a68fd" stop-opacity="1"/>
      <stop offset="100%" stop-color="#44a0e6" stop-opacity="1"/>
    </linearGradient>
    <style>
      .section {
        margin-bottom: 20px;
      }
      .section[data-narration="overfitting"] {
        background-color: #f7f7f7;
      }
      .section[data-narration="underfitting"] {
        background-color: #f7f7f7;
      }
      .section[data-narration="vanishing-gradients"] {
        background-color: #f7f7f7;
      }
      .section[data-narration="local-minima"] {
        background-color: #f7f7f7;
      }
      .section[data-narration="non-convex-optimization"] {
        background-color: #f7f7f7;
      }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <g transform="translate(15, 15)">
    <text x="10" y="5" font-size="24" font-family="Arial, sans-serif" fill="#2f4f7f">Challenges in Neural Network Optimization</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-350" dur="10s" begin="0s" repeatCount="indefinite"/>
    <g>
      <rect x="10" y="20" width="390" height="60" fill="#f7f7f7"/>
      <text x="25" y="40" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">Overfitting</text>
      <text x="10" y="65" font-size="16" font-family="Arial, sans-serif" fill="#666666" data-narration="overfitting">
        Overfitting occurs when a neural network is too complex and fits the training data too closely, resulting in poor generalization performance on unseen data.
      </text>
      <rect x="10" y="90" width="80" height="30" fill="#44a0e6" rx="5"/>
      <rect x="10" y="120" width="80" height="30" fill="#f7f7f7" rx="5"/>
      <animate-transform attributeName="transform" type="translate" from="0,0" to="0,140" dur="2s" begin="0s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="10" y="20" width="390" height="60" fill="#f7f7f7"/>
      <text x="25" y="40" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">Underfitting</text>
      <text x="10" y="65" font-size="16" font-family="Arial, sans-serif" fill="#666666" data-narration="underfitting">
        Underfitting occurs when a neural network is too simple and fails to capture the underlying patterns in the data, resulting in poor performance on both training and test data.
      </text>
      <rect x="10" y="90" width="80" height="30" fill="#44a0e6" rx="5"/>
      <rect x="10" y="120" width="80" height="30" fill="#f7f7f7" rx="5"/>
      <animate-transform attributeName="transform" type="translate" from="0,0" to="0,140" dur="2s" begin="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="10" y="20" width="390" height="60" fill="#f7f7f7"/>
      <text x="25" y="40" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">Vanishing Gradients</text>
      <text x="10" y="65" font-size="16" font-family="Arial, sans-serif" fill="#666666" data-narration="vanishing-gradients">
        Vanishing gradients occur when the gradients of the loss function with respect to the model's parameters become very small during backpropagation, making it difficult to update the parameters.
      </text>
      <rect x="10" y="90" width="80" height="30" fill="#44a0e6" rx="5"/>
      <rect x="10" y="120" width="80" height="30" fill="#f7f7f7" rx="5"/>
      <animate-transform attributeName="transform" type="translate" from="0,0" to="0,140" dur="2s" begin="4s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="10" y="20" width="390" height="60" fill="#f7f7f7"/>
      <text x="25" y="40" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">Local Minima</text>
      <text x="10" y="65" font-size="16" font-family="Arial, sans-serif" fill="#666666" data-narration="local-minima">
        Local minima occur when a neural network converges to a local optimum, resulting in suboptimal performance.
      </text>
      <rect x="10" y="90" width="80" height="30" fill="#44a0e6" rx="5"/>
      <rect x="10" y="120" width="80" height="30" fill="#f7f7f7" rx="5"/>
      <animate-transform attributeName="transform" type="translate" from="0,0" to="0,140" dur="2s" begin="6s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="10" y="20" width="390" height="60" fill="#f7f7f7"/>
      <text x="25" y="40" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">Non-Convex Optimization</text>
      <text x="10" y="65" font-size="16" font-family="Arial, sans-serif" fill="#666666" data-narration="non-convex-optimization">
        Non-convex optimization occurs when the loss function is non-convex, resulting in multiple local minima and making it difficult to converge.
      </text>
      <rect x="10" y="90" width="80" height="30" fill="#44a0e6" rx="5"/>
      <rect x="10" y="120" width="80" height="30" fill="#f7f7f7" rx="5"/>
      <animate-transform attributeName="transform" type="translate" from="0,0" to="0,140" dur="2s" begin="8s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="10" y="20" width="390" height="60" fill="#f7f7f7"/>
      <text x="25" y="40" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">Regularization Techniques</text>
      <text x="10" y="65" font-size="16" font-family="Arial, sans-serif" fill="#666666" data-narration="regularization-techniques">
        Regularization techniques, such as L1 and L2 regularization, dropout, and early stopping, can help prevent overfitting and improve generalization.
      </text>
      <rect x="10" y="90" width="80" height="30" fill="#44a0e6" rx="5"/>
      <rect x="10" y="120" width="80" height="30" fill="#f7f7f7" rx="5"/>
      <animate-transform attributeName="transform" type="translate" from="0,0" to="0,140" dur="2s" begin="10s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="10" y="20" width="390" height="60" fill="#f7f7f7"/>
      <text x="25" y="40" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">Data Augmentation</text>
      <text x="10" y="65" font-size="16" font-family="Arial, sans-serif" fill="#666666" data-narration="data-augmentation">
        Data augmentation techniques, such as rotation, flipping, and cropping, can help increase the size of the training dataset and improve generalization.
      </text>
      <rect x="10" y="90" width="80" height="30" fill="#44a0e6" rx="5"/>
      <rect x="10" y="120" width="80" height="30" fill="#f7f7f7" rx="5"/>
      <animate-transform attributeName="transform" type="translate" from="0,0" to="0,140" dur="2s" begin="12s" repeatCount="indefinite"/>
    </g>
    <text x="10" y="370" font-size="24" font-family="Arial, sans-serif" fill="#2f4f7f">Best Practices for Optimization</text>
  </g>
</svg>