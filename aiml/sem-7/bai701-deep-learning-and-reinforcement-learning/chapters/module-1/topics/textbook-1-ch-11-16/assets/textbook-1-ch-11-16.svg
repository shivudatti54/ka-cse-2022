<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="420" height="400" data-topic-id="textbook-1-ch-11-16" xml:space="preserve">
  <defs>
    <mask id="background-mask">
      <rect x="0" y="0" width="100%" height="100%" fill="#87CEEB" opacity=".3" />
    </mask>
  </defs>
  <title>Textbook 1 Ch 11 16</title>
  <rect x="10" y="10" width="400" height="380" fill="none" rx="10" />
  <circle cx="20" cy="20" r="15" stroke="#2196F3" stroke-width="2" fill="none" />
  <defs>
    <clipPath id="clip-path">
      <rect x="10" y="10" width="380" height="360" rx="10" />
    </clipPath>
  </defs>
  <rect x="10" y="10" width="380" height="360" rx="10" fill="url(#background-mask)" clip-path="url(#clip-path)" />
  <g fill="#87CEEB" opacity=".3">
    <rect x="10" y="10" width="100%" height="100%" rx="10" />
  </g>
  <g id="section-1">
    <rect x="10" y="20" width="380" height="100" rx="10" fill="#87CEEB" />
    <g transform="translate(20, 20)">
      <text x="0" y="0" fill="#000" font-size="24" font-family="Arial, sans-serif">Definition of Deep Learning</text>
      <text x="0" y="50" fill="#000" font-size="18" font-family="Arial, sans-serif">Deep learning is a subfield of machine learning that involves the use of artificial neural networks with multiple layers to analyze data.</text>
    </g>
  </g>
  <g id="section-2">
    <rect x="10" y="130" width="380" height="100" rx="10" fill="#87CEEB" />
    <g transform="translate(20, 130)">
      <text x="0" y="0" fill="#000" font-size="24" font-family="Arial, sans-serif">History of Deep Learning</text>
      <text x="0" y="50" fill="#000" font-size="18" font-family="Arial, sans-serif">The concept of deep learning dates back to the 1940s, when Warren McCulloch and Walter Pitts proposed the first artificial neural network.</text>
    </g>
  </g>
  <g id="section-3">
    <rect x="10" y="240" width="380" height="100" rx="10" fill="#87CEEB" />
    <g transform="translate(20, 240)">
      <text x="0" y="0" fill="#000" font-size="24" font-family="Arial, sans-serif">Key Concepts</text>
      <text x="0" y="50" fill="#000" font-size="18" font-family="Arial, sans-serif">Artificial neural networks, multilayer perceptrons, and backpropagation are key concepts in deep learning.</text>
    </g>
  </g>
  <g id="section-4">
    <rect x="10" y="350" width="380" height="100" rx="10" fill="#87CEEB" />
    <g transform="translate(20, 350)">
      <text x="0" y="0" fill="#000" font-size="24" font-family="Arial, sans-serif">Activation Functions</text>
      <text x="0" y="50" fill="#000" font-size="18" font-family="Arial, sans-serif">Sigmoid, ReLU, and Tanh are common activation functions used in deep learning.</text>
    </g>
  </g>
  <g id="section-5">
    <rect x="10" y="450" width="380" height="100" rx="10" fill="#87CEEB" />
    <g transform="translate(20, 450)">
      <text x="0" y="0" fill="#000" font-size="24" font-family="Arial, sans-serif">Example</text>
      <text x="0" y="50" fill="#000" font-size="18" font-family="Arial, sans-serif">A neural network can recognize handwritten digits by learning patterns in the images.</text>
    </g>
  </g>
  <g id="footer">
    <rect x="10" y="460" width="380" height="50" rx="10" fill="#87CEEB" />
    <g transform="translate(20, 460)">
      <text x="0" y="0" fill="#000" font-size="18" font-family="Arial, sans-serif">&copy; 2023</text>
    </g>
  </g>
  <g id=" arrows">
    <line x1="20" y1="20" x2="380" y2="20" stroke="#2196F3" stroke-width="2" />
    <line x1="20" y1="20" x2="20" y2="380" stroke="#2196F3" stroke-width="2" />
    <line x1="380" y1="20" x2="380" y2="380" stroke="#2196F3" stroke-width="2" />
    <line x1="20" y1="380" x2="20" y2="380" stroke="#2196F3" stroke-width="2" />
  </g>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="20 20" dur="1s" begin="0s" repeatCount="indefinite" />
  <animateTransform attributeName="transform" type="translate" from="0 0" to="20 20" dur="1s" begin="1s" repeatCount="indefinite" />
  <animateTransform attributeName="transform" type="translate" from="0 0" to="20 20" dur="1s" begin="2s" repeatCount="indefinite" />
  <animateTransform attributeName="transform" type="translate" from="0 0" to="20 20" dur="1s" begin="3s" repeatCount="indefinite" />
  <animateTransform attributeName="transform" type="translate" from="0 0" to="20 20" dur="1s" begin="4s" repeatCount="indefinite" />
  <animateTransform attributeName="transform" type="translate" from="0 0" to="20 20" dur="1s" begin="5s" repeatCount="indefinite" />
  <animateTransform attributeName="transform" type="translate" from="0 0" to="20 20" dur="1s" begin="6s" repeatCount="indefinite" />
  <animateTransform attributeName="transform" type="translate" from="0 0" to="20 20" dur="1s" begin="7s" repeatCount="indefinite" />
</svg>