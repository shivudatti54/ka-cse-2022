<svg width="420" height="400" data-topic-id="introduction-to-deep-learning" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background-color: #c7b8ea;">

  <!-- Title -->
  <title style="font-size: 24px; font-weight: bold; text-align: center; margin-top: 20px;">Introduction to Deep Learning</title>

  <!-- Header -->
  <g transform="translate(10, 20)">
    <rect x="0" y="0" width="400" height="40" style="stroke: #0097a7; stroke-width: 2; fill: none;" />
    <text x="20" y="15" style="font-size: 18px; font-weight: bold; fill: #0097a7;">Why Deep Learning?</text>
    <animateTransform attributeName="transform" type="translate" from="-10 20" to="10 20" dur="0.5s" begin="0s" delay="0.5s" />
  </g>

  <!-- Section 1 -->
  <g transform="translate(10, 60)">
    <rect x="0" y="0" width="380" height="40" style="stroke: #0097a7; stroke-width: 2; fill: none;" />
    <text x="20" y="15" style="font-size: 18px; font-weight: bold; fill: #0097a7;">What is Deep Learning?</text>
    <text x="20" y="50" style="font-size: 12px; fill: #333333;">Deep learning is a subset of machine learning that uses artificial neural networks with multiple layers to analyze and interpret data.</text>
    <animateTransform attributeName="transform" type="translate" from="-10 60" to="10 60" dur="0.5s" begin="0s" delay="1s" />
  </g>

  <!-- Section 2 -->
  <g transform="translate(10, 110)">
    <rect x="0" y="0" width="380" height="40" style="stroke: #0097a7; stroke-width: 2; fill: none;" />
    <text x="20" y="15" style="font-size: 18px; font-weight: bold; fill: #0097a7;">Shallow Learning</text>
    <text x="20" y="50" style="font-size: 12px; fill: #333333;">Shallow learning, also known as shallow neural networks, refer to the simplest type of neural network.</text>
    <rect x="20" y="80" width="60" height="40" style="stroke: #0097a7; stroke-width: 2; fill: none;" />
    <text x="80" y="80" style="font-size: 12px; fill: #333333;">It consists of only one or two layers and is typically used for simple tasks such as classification and regression.</text>
    <animateTransform attributeName="transform" type="translate" from="-10 110" to="10 110" dur="0.5s" begin="1.5s" delay="2s" />
  </g>

  <!-- Section 3 -->
  <g transform="translate(10, 160)">
    <rect x="0" y="0" width="380" height="40" style="stroke: #0097a7; stroke-width: 2; fill: none;" />
    <text x="20" y="15" style="font-size: 18px; font-weight: bold; fill: #0097a7;">Deep Learning</text>
    <text x="20" y="50" style="font-size: 12px; fill: #333333;">Deep learning is a more complex type of neural network that consists of multiple layers.</text>
    <rect x="20" y="80" width="60" height="40" style="stroke: #0097a7; stroke-width: 2; fill: none;" />
    <text x="80" y="80" style="font-size: 12px; fill: #333333;">This allows for the analysis of complex data, such as images and speech, and has enabled the development of applications such as self-driving cars and virtual assistants.</text>
    <animateTransform attributeName="transform" type="translate" from="-10 160" to="10 160" dur="0.5s" begin="2.5s" delay="3s" />
  </g>

  <!-- Section 4 -->
  <g transform="translate(10, 210)">
    <rect x="0" y="0" width="380" height="40" style="stroke: #0097a7; stroke-width: 2; fill: none;" />
    <text x="20" y="15" style="font-size: 18px; font-weight: bold; fill: #0097a7;">Advantages of Deep Learning</text>
    <text x="20" y="50" style="font-size: 12px; fill: #333333;">Deep learning can learn complex patterns, be trained on large datasets, and analyze complex data.</text>
    <rect x="20" y="80" width="60" height="40" style="stroke: #0097a7; stroke-width: 2; fill: none;" />
    <text x="80" y="80" style="font-size: 12px; fill: #333333;">This enables the development of applications such as image recognition, natural language processing, and speech recognition.</text>
    <animateTransform attributeName="transform" type="translate" from="-10 210" to="10 210" dur="0.5s" begin="3.5s" delay="4s" />
  </g>

  <!-- Section 5 -->
  <g transform="translate(10, 270)">
    <rect x="0" y="0" width="380" height="40" style="stroke: #0097a7; stroke-width: 2; fill: none;" />
    <text x="20" y="15" style="font-size: 18px; font-weight: bold; fill: #0097a7;">Conclusion</text>
    <text x="20" y="50" style="font-size: 12px; fill: #333333;">In conclusion, deep learning is a powerful tool for analyzing complex data and developing applications such as self-driving cars and virtual assistants.</text>
    <animateTransform attributeName="transform" type="translate" from="-10 270" to="10 270" dur="0.5s" begin="4.5s" delay="5s" />
  </g>

  <!-- Footer -->
  <g transform="translate(10, 320)">
    <rect x="0" y="0" width="400" height="40" style="stroke: #0097a7; stroke-width: 2; fill: none;" />
    <text x="20" y="15" style="font-size: 18px; font-weight: bold; fill: #0097a7;">Why Deep Learning?</text>
  </g>

</svg>