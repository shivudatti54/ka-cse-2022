<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="introduction-convolution-neural-network-evolution">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A8BC6" stop-opacity="1" />
      <stop offset="100%" stop-color="#8C97CE" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <rect x="50" y="20" width="320" height="40" fill="#F7F7F7" rx="5" />
  <text x="50" y="60" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">
    Introduction to Convolutional Neural Networks Evolution
  </text>

  <!-- Section 1: Definition and Purpose -->
  <rect x="50" y="100" width="320" height="80" fill="#F7F7F7" rx="5" />
  <text x="50" y="130" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
    Definition and Purpose
  </text>
  <animateTransform
    attributeName="transform"
    type="rotate"
    from="0 50 50"
    to="360 50 50"
    dur="10s"
    repeatCount="indefinite"
  />
  <rect x="50" y="150" width="200" height="20" fill="#8BC34A" rx="5" />
  <text x="50" y="170" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
    Convolutional Neural Networks (CNNs) are a type of Deep Learning model designed to process data with grid-like topology, such as images.
  </text>

  <!-- Section 2: Key Characteristics -->
  <rect x="50" y="200" width="320" height="100" fill="#F7F7F7" rx="5" />
  <text x="50" y="230" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
    Key Characteristics
  </text>
  <g transform="rotate(45 50 250)">
    <rect x="50" y="260" width="150" height="20" fill="#2196F3" rx="5" />
    <text x="50" y="280" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      Local Connectivity: Each neuron in the network only connects to a small region of the input data.
    </text>
    <rect x="220" y="260" width="50" height="20" fill="#FF9800" rx="5" />
    <text x="220" y="280" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      Shared Weights: Weights are shared across the entire image, allowing the network to learn features that are present in multiple locations.
    </text>
    <rect x="350" y="260" width="50" height="20" fill="#03A9F4" rx="5" />
    <text x="350" y="280" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      Translation Invariance: The network is invariant to the location of the features in the input data.
    </text>
  </g>

  <!-- Section 3: Evolution of Convolutional Neural Networks -->
  <rect x="50" y="300" width="320" height="80" fill="#F7F7F7" rx="5" />
  <text x="50" y="330" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
    Evolution of Convolutional Neural Networks
  </text>
  <animateTransform
    attributeName="transform"
    type="rotate"
    from="0 50 350"
    to="360 50 350"
    dur="10s"
    repeatCount="indefinite"
  />
  <rect x="50" y="370" width="100" height="20" fill="#FF9800" rx="5" />
  <text x="50" y="390" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
    Early Work: The concept of Convolutional Neural Networks was first introduced in the 1990s by Yann LeCun and colleagues.
  </text>
  <rect x="170" y="370" width="100" height="20" fill="#03A9F4" rx="5" />
  <text x="170" y="390" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
    AlexNet: The AlexNet model, published in 2012, was a significant improvement over early CNNs and achieved state-of-the-art results on the ImageNet dataset.
  </text>
  <rect x="290" y="370" width="100" height="20" fill="#8BC34A" rx="5" />
  <text x="290" y="390" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
    Residual Network: The Residual Network (ResNet) model, published in 2015, introduced residual connections to alleviate the vanishing gradient problem in deep networks.
  </text>
  <rect x="410" y="370" width="100" height="20" fill="#2196F3" rx="5" />
  <text x="410" y="390" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
    Inception Network: The Inception Network model, published in 2014, introduced multiple parallel branches with different filter sizes to increase the model's capacity.
  </text>

  <!-- Section 4: Architecture of Convolutional Neural Networks -->
  <rect x="50" y="400" width="320" height="120" fill="#F7F7F7" rx="5" />
  <text x="50" y="430" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
    Architecture of Convolutional Neural Networks
  </text>
  <g transform="rotate(45 50 450)">
    <rect x="50" y="470" width="150" height="20" fill="#FF9800" rx="5" />
    <text x="50" y="490" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      Convolution Operation: The convolution operation is the core component of a CNN. It scans the input data and applies a set of filters to extract features.
    </text>
    <rect x="220" y="470" width="50" height="20" fill="#03A9F4" rx="5" />
    <text x="220" y="490" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      Pooling Operation: Pooling operations reduce the spatial dimensions of the feature maps while retaining important information.
    </text>
    <rect x="350" y="470" width="50" height="20" fill="#8BC34A" rx="5" />
    <text x="350" y="490" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      Convolutional Layer: A convolutional layer consists of multiple filters that slide over the input data, applying a dot product at each position.
    </text>
  </g>

  <!-- Footer -->
  <rect x="50" y="520" width="320" height="40" fill="#F7F7F7" rx="5" />
  <text x="50" y="550" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">
    Data: <a href="https://www.example.com">Learn More</a>
  </text>
</svg>