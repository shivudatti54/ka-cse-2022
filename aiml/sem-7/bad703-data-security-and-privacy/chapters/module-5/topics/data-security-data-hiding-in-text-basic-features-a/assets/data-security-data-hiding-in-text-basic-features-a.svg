<svg width="420" height="400" data-topic-id="data-security-data-hiding-in-text-basic-features-a"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400"
     style="background: linear-gradient(to bottom, #9C65E7 0%, #4C6CDE 50%, #7E8BE1 100%);">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A2C4F5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8C95E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <rect x="10" y="10" width="400" height="40" fill="none" rx="10" style="background: #4C6CDE;"/>
  <text x="20" y="30" font-size="24" font-family="Arial" fill="#fff" text-anchor="left">Data Security: Data Hiding in Text-Basic Features, Applications of Data Hiding, Watermarking, Intuitive Methods, Simple Digital Methods</text>
  
  <!-- Section 1 -->
  <rect x="10" y="60" width="400" height="100" fill="none" rx="10" style="background: #F7D2C4;"/>
  <animateTransform attributeName="transform" type="rotate" from="0 200 100" to="360 200 100" dur="10s" begin="0s" repeatCount="indefinite"/>
  <text x="20" y="80" font-size="18" font-family="Arial" fill="#000" text-anchor="middle" data-narration="Data Hiding in Text-Basic Features">
    <tspan x="20" y="100">Steganography</tspan>
    <tspan x="150" y="100">is the practice of hiding secret data within non-secret data</tspan>
    <tspan x="20" y="120">LSB substitution is a method of data hiding where the least significant bit of each pixel or sample is replaced with the secret data</tspan>
  </text>
  
  <!-- Section 2 -->
  <rect x="10" y="170" width="400" height="100" fill="none" rx="10" style="background: #A2C4F5;"/>
  <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="10s" begin="1s" repeatCount="indefinite"/>
  <text x="20" y="180" font-size="18" font-family="Arial" fill="#000" text-anchor="middle" data-narration="Applications of Data Hiding">
    <tspan x="20" y="200">Data hiding has numerous applications in various fields, including digital forensics, intellectual property protection, and copyright protection</tspan>
  </text>
  
  <!-- Section 3 -->
  <rect x="10" y="260" width="400" height="100" fill="none" rx="10" style="background: #8C95E6;"/>
  <animateTransform attributeName="transform" type="rotate" from="0 200 250" to="360 200 250" dur="10s" begin="2s" repeatCount="indefinite"/>
  <text x="20" y="270" font-size="18" font-family="Arial" fill="#000" text-anchor="middle" data-narration="Watermarking">
    <tspan x="20" y="290">Watermarking is a technique used to embed a secret message or data within an image or text</tspan>
  </text>
  
  <!-- Section 4 -->
  <rect x="10" y="340" width="400" height="100" fill="none" rx="10" style="background: #F7D2C4;"/>
  <animateTransform attributeName="transform" type="rotate" from="0 200 300" to="360 200 300" dur="10s" begin="3s" repeatCount="indefinite"/>
  <text x="20" y="350" font-size="18" font-family="Arial" fill="#000" text-anchor="middle" data-narration="Intuitive Methods">
    <tspan x="20" y="370">Intuitive methods are used to make data hiding more accessible and user-friendly</tspan>
  </text>
  
  <!-- Section 5 -->
  <rect x="10" y="420" width="400" height="100" fill="none" rx="10" style="background: #A2C4F5;"/>
  <animateTransform attributeName="transform" type="rotate" from="0 200 400" to="360 200 400" dur="10s" begin="4s" repeatCount="indefinite"/>
  <text x="20" y="430" font-size="18" font-family="Arial" fill="#000" text-anchor="middle" data-narration="Simple Digital Methods">
    <tspan x="20" y="450">Simple digital methods are used to make data hiding more efficient and effective</tspan>
  </text>
  
  <!-- Footer -->
  <rect x="10" y="500" width="400" height="40" fill="none" rx="10" style="background: #4C6CDE;"/>
  <text x="20" y="510" font-size="18" font-family="Arial" fill="#fff" text-anchor="left">Data Security: Data Hiding in Text-Basic Features, Applications of Data Hiding, Watermarking, Intuitive Methods, Simple Digital Methods</text>
</svg>