<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="data-security-and-privacy">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient-background" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient-background)"/>

  <!-- Title Section -->
  <section data-narration="What is Data Security?">
    <rect x="10" y="10" width="400" height="50" fill="#87CEEB" rx="10"/>
    <text x="20" y="30" font-size="24" font-family="Arial, sans-serif" fill="#000">Data Security</text>
    <text x="20" y="60" font-size="18" font-family="Arial, sans-serif" fill="#000">Protecting sensitive information from unauthorized access</text>
  </section>

  <!-- Confidentiality Section -->
  <section data-narration="Confidentiality: Protecting sensitive information from unauthorized access">
    <rect x="10" y="70" width="400" height="50" fill="#87CEEB" rx="10"/>
    <text x="20" y="90" font-size="18" font-family="Arial, sans-serif" fill="#000">Confidentiality</text>
    <text x="20" y="120" font-size="16" font-family="Arial, sans-serif" fill="#000">Preventing unauthorized access to sensitive information</text>
  </section>

  <!-- Integrity Section -->
  <section data-narration="Integrity: Ensuring data accuracy and prevention of modification">
    <rect x="10" y="120" width="400" height="50" fill="#87CEEB" rx="10"/>
    <text x="20" y="140" font-size="18" font-family="Arial, sans-serif" fill="#000">Integrity</text>
    <text x="20" y="170" font-size="16" font-family="Arial, sans-serif" fill="#000">Ensuring data accuracy and preventing unauthorized modification</text>
  </section>

  <!-- Availability Section -->
  <section data-narration="Availability: Ensuring access to data when needed">
    <rect x="10" y="170" width="400" height="50" fill="#87CEEB" rx="10"/>
    <text x="20" y="190" font-size="18" font-family="Arial, sans-serif" fill="#000">Availability</text>
    <text x="20" y="220" font-size="16" font-family="Arial, sans-serif" fill="#000">Ensuring data accessibility and usability</text>
  </section>

  <!-- Data Privacy Section -->
  <section data-narration="Data Privacy: Protecting personal information and sensitive data">
    <rect x="10" y="220" width="400" height="50" fill="#87CEEB" rx="10"/>
    <text x="20" y="240" font-size="18" font-family="Arial, sans-serif" fill="#000">Data Privacy</text>
    <text x="20" y="270" font-size="16" font-family="Arial, sans-serif" fill="#000">Protecting personal and sensitive information</text>
  </section>

  <!-- Importance Section -->
  <section data-narration="Importance of Data Security and Privacy">
    <rect x="10" y="270" width="400" height="50" fill="#87CEEB" rx="10"/>
    <text x="20" y="290" font-size="18" font-family="Arial, sans-serif" fill="#000">Importance</text>
    <text x="20" y="320" font-size="16" font-family="Arial, sans-serif" fill="#000">Protecting sensitive information, maintaining trust, and complying with regulations</text>
  </section>

  <!-- Animations -->
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" from="1" to="0" dur="2s" begin="1s"/>
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" from="0" to="1" dur="2s" begin="2s"/>
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" from="1" to="0" dur="2s" begin="3s"/>
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" from="0" to="1" dur="2s" begin="4s"/>
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" from="1" to="0" dur="2s" begin="5s"/>
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" from="0" to="1" dur="2s" begin="6s"/>

  <!-- Footer -->
  <rect x="10" y="320" width="400" height="50" fill="#87CEEB" rx="10"/>
  <text x="20" y="330" font-size="18" font-family="Arial, sans-serif" fill="#000">Maintaining trust through data security and privacy</text>
</svg>