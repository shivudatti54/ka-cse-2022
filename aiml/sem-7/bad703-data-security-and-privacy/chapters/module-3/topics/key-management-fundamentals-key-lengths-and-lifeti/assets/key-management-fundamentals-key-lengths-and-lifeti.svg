<svg width="420" height="400" data-topic-id="Key-Management-Fundamentals-Key-Lengths-And-Lifetimes">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#B2A5FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>

  <!-- Title and footer -->
  <text x="10" y="20" font-size="24" text-anchor="start">Key Management Fundamentals: Key Lengths and Lifetimes</text>
  <text x="10" y="380" font-size="18" text-anchor="start">Learn about key management, key lengths, and lifetimes</text>

  <!-- Section 1: Key Management Phases -->
  <section data-narration="Key management process involves several phases">
    <rect x="10" y="50" width="400" height="50" fill="#3470B7" rx="10"/>
    <text x="15" y="60" font-size="18" text-anchor="start">Key generation</text>
    <text x="15" y="80" font-size="18" text-anchor="start">Key distribution</text>
    <text x="15" y="100" font-size="18" text-anchor="start">Key storage</text>
    <text x="15" y="120" font-size="18" text-anchor="start">Key usage</text>
    <text x="15" y="140" font-size="18" text-anchor="start">Key revocation</text>
    <animate begin="1s" dur="2s" repeat="forever">
      <circle cx="20" cy="70" r="10" fill="#F7F7F7"/>
      <animate transform="rotate(360 20 70)" dur="2s" repeat="forever"/>
    </animate>
  </section>

  <!-- Section 2: Key Management Principles -->
  <section data-narration="Key management principles are crucial for securing keys">
    <rect x="10" y="150" width="400" height="50" fill="#2E9DFF" rx="10"/>
    <text x="15" y="160" font-size="18" text-anchor="start">Confidentiality</text>
    <text x="15" y="180" font-size="18" text-anchor="start">Integrity</text>
    <text x="15" y="200" font-size="18" text-anchor="start">Authenticity</text>
    <animate begin="1s" dur="2s" repeat="forever">
      <circle cx="20" cy="170" r="10" fill="#F7F7F7"/>
      <animate transform="rotate(360 20 170)" dur="2s" repeat="forever"/>
    </animate>
  </section>

  <!-- Section 3: Key Length -->
  <section data-narration="Key length determines security">
    <rect x="10" y="250" width="400" height="50" fill="#3498DB" rx="10"/>
    <text x="15" y="260" font-size="18" text-anchor="start">Key length</text>
    <text x="15" y="280" font-size="18" text-anchor="start">Determines security</text>
    <animate begin="1s" dur="2s" repeat="forever">
      <circle cx="20" cy="290" r="10" fill="#F7F7F7"/>
      <animate transform="rotate(360 20 290)" dur="2s" repeat="forever"/>
    </animate>
  </section>

  <!-- Section 4: Key Lifetime -->
  <section data-narration="Key lifetime determines validity">
    <rect x="10" y="350" width="400" height="50" fill="#8BC34A" rx="10"/>
    <text x="15" y="360" font-size="18" text-anchor="start">Key lifetime</text>
    <text x="15" y="380" font-size="18" text-anchor="start">Determines validity</text>
    <animate begin="1s" dur="2s" repeat="forever">
      <circle cx="20" cy="400" r="10" fill="#F7F7F7"/>
      <animate transform="rotate(360 20 400)" dur="2s" repeat="forever"/>
    </animate>
  </section>

  <!-- Section 5: Key Generation Algorithms -->
  <section data-narration="Symmetric key generation generates the same key for encryption and decryption">
    <rect x="10" y="450" width="400" height="50" fill="#F44336" rx="10"/>
    <text x="15" y="460" font-size="18" text-anchor="start">Symmetric key generation</text>
    <text x="15" y="480" font-size="18" text-anchor="start">Generates the same key for encryption and decryption</text>
    <animate begin="1s" dur="2s" repeat="forever">
      <circle cx="20" cy="510" r="10" fill="#F7F7F7"/>
      <animate transform="rotate(360 20 510)" dur="2s" repeat="forever"/>
    </animate>
  </section>

  <!-- Section 6: Arrow markers for connections -->
  <line x1="50" y1="70" x2="350" y2="70" stroke="#2E9DFF" stroke-width="2"/>
  <line x1="50" y1="160" x2="350" y2="160" stroke="#2E9DFF" stroke-width="2"/>
  <line x1="50" y1="290" x2="350" y2="290" stroke="#2E9DFF" stroke-width="2"/>
  <line x1="50" y1="400" x2="350" y2="400" stroke="#2E9DFF" stroke-width="2"/>

  <!-- Footer -->
  <text x="10" y="390" font-size="18" text-anchor="start">Learn more about key management and cryptography</text>
</svg>