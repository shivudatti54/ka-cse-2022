<svg width="420" height="400" data-topic-id="chapter-11-data-security-privacy">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Data Security and Privacy</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  
  <section data-narration="Introduction">
    <rect x="10" y="50" width="380" height="20" fill="#2E4053"/>
    <text x="15" y="55" fill="#FFFFFF" font-size="20px" font-family="Arial, sans-serif">Introduction</text>
  </section>
  
  <section data-narration="Data Security Concepts">
    <rect x="10" y="80" width="380" height="20" fill="#2E4053"/>
    <animateTransform attributeName="transform" type="rotate" from="0 190 50" to="360 190 50" dur="10s" begin="1s"/>
    <path d="M 190 50 L 190 120 Z" fill="#2E4053" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <text x="20" y="60" fill="#FFFFFF" font-size="16px" font-family="Arial, sans-serif">Data Security</text>
    <text x="150" y="60" fill="#FFFFFF" font-size="16px" font-family="Arial, sans-serif">Protection of Digital Data</text>
    <animate attribute="opacity" from="1" to="0" dur="2s" begin="1s"/>
  </section>
  
  <section data-narration="Types of Data Security Threats">
    <rect x="10" y="110" width="380" height="20" fill="#2E4053"/>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 250" dur="10s" begin="2s"/>
    <path d="M 190 150 L 190 250 Z" fill="#2E4053" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <text x="20" y="160" fill="#FFFFFF" font-size="16px" font-family="Arial, sans-serif">Malware</text>
    <text x="150" y="160" fill="#FFFFFF" font-size="16px" font-family="Arial, sans-serif">Phishing</text>
    <text x="20" y="220" fill="#FFFFFF" font-size="16px" font-family="Arial, sans-serif">Denial of Service (DoS) and Distributed Denial of Service (DDoS)</text>
    <animate attribute="opacity" from="1" to="0" dur="2s" begin="2s"/>
  </section>
  
  <section data-narration="Data Privacy Concepts">
    <rect x="10" y="150" width="380" height="20" fill="#2E4053"/>
    <animateTransform attributeName="transform" type="translate" from="0 300" to="0 400" dur="10s" begin="3s"/>
    <path d="M 190 300 L 190 400 Z" fill="#2E4053" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <text x="20" y="310" fill="#FFFFFF" font-size="16px" font-family="Arial, sans-serif">Data Privacy</text>
    <text x="150" y="310" fill="#FFFFFF" font-size="16px" font-family="Arial, sans-serif">Protection of Personal Data</text>
    <text x="20" y="370" fill="#FFFFFF" font-size="16px" font-family="Arial, sans-serif">Confidentiality</text>
    <text x="20" y="420" fill="#FFFFFF" font-size="16px" font-family="Arial, sans-serif">Integrity</text>
    <text x="20" y="470" fill="#FFFFFF" font-size="16px" font-family="Arial, sans-serif">Availability</text>
    <animate attribute="opacity" from="1" to="0" dur="2s" begin="3s"/>
  </section>
  
  <footer>
    <text x="10" y="380" fill="#2E4053" font-size="18px" font-family="Arial, sans-serif">Data Security and Privacy</text>
  </footer>
</svg>