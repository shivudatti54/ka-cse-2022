<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="public-key-management-certification-of-public-keys">
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
    <style>
      .section {
        background-color: var(--primary-color);
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }
      .section .title {
        font-weight: bold;
        font-size: 18px;
        color: #fff;
      }
      .section .description {
        font-size: 14px;
        color: #fff;
      }
      .arrow-marker {
        stroke: #fff;
        stroke-width: 2;
        fill: none;
      }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="380" style="fill: var(--pastel-gradient)"/>
  <g transform="translate(20, 20)">
    <text class="title" x="50%" y="20" dominant-baseline="hanging" text-anchor="middle">Certification of Public Keys</text>
    <rect x="20" y="50" width="340" height="60" style="fill: rgba(0, 0, 0, 0.2)"/>
    <g transform="translate(20, 100)">
      <text class="section" x="50%" y="40" data-narration="Definition of Certification of Public Keys">Certification of Public Keys is the process of verifying the authenticity and ownership of a public key.</text>
      <text class="description" x="50%" y="60">This involves checking the identity of the key's owner and ensuring that the key has not been compromised.</text>
      <animate-transform attributeName="transform" attributeName="transform" type="rotate" from="0 50% 50%" to="360 50% 50%" dur="4s" begin="-1s"/>
    </g>
    <g transform="translate(20, 200)">
      <rect x="20" y="50" width="340" height="60" style="fill: rgba(0, 0, 0, 0.2)"/>
      <g transform="translate(20, 120)">
        <text class="section" x="50%" y="40" data-narration="Process of Certification of Public Keys">The process of certification of public keys involves four main steps:</text>
        <text class="description" x="50%" y="60">1. Registration: The key's owner registers with a trusted third party, such as a Certificate Authority (CA).</text>
        <text class="description" x="50%" y="80">2. Key Generation: The CA generates a digital certificate, which includes the public key and the owner's identity information.</text>
        <animate-transform attributeName="transform" attributeName="transform" type="rotate" from="0 50% 50%" to="360 50% 50%" dur="4s" begin="-2s"/>
        <path class="arrow-marker" d="M 50 60 L 50 80 Z"/>
      </g>
      <g transform="translate(20, 300)">
        <rect x="20" y="50" width="340" height="60" style="fill: rgba(0, 0, 0, 0.2)"/>
        <g transform="translate(20, 220)">
          <text class="section" x="50%" y="40" data-narration="Example of Certification of Public Keys">Suppose we want to establish a secure communication channel with a website (www.example.com).</text>
          <text class="description" x="50%" y="60">We generate a public-private key pair and share our public key with the website.</text>
          <text class="description" x="50%" y="80">The website generates a digital certificate, which includes our public key and its identity information.</text>
          <animate-transform attributeName="transform" attributeName="transform" type="rotate" from="0 50% 50%" to="360 50% 50%" dur="4s" begin="-3s"/>
          <path class="arrow-marker" d="M 50 60 L 50 80 Z"/>
        </g>
        <g transform="translate(20, 380)">
          <rect x="20" y="50" width="340" height="60" style="fill: rgba(0, 0, 0, 0.2)"/>
          <text class="description" x="50%" y="40">The digital certificate is signed by a trusted CA, such as VeriSign.</text>
          <text class="description" x="50%" y="60">When we want to retrieve data from the website, our browser verifies the digital certificate by checking the CA's signature and ensuring that the key has not been compromised.</text>
          <animate-transform attributeName="transform" attributeName="transform" type="rotate" from="0 50% 50%" to="360 50% 50%" dur="4s" begin="-4s"/>
          <path class="arrow-marker" d="M 50 60 L 50 80 Z"/>
        </g>
      </g>
    </g>
    <g transform="translate(20, 400)">
      <rect x="20" y="50" width="340" height="60" style="fill: rgba(0, 0, 0, 0.2)"/>
      <text class="section" x="50%" y="40" data-narration="Key Concepts">Key concepts in public key management include:</text>
      <text class="description" x="50%" y="60">1. Digital certificate: A record that contains the public key and the owner's identity information.</text>
      <text class="description" x="50%" y="80">2. Certificate Authority (CA): A trusted third party that issues and verifies digital certificates.</text>
      <animate-transform attributeName="transform" attributeName="transform" type="rotate" from="0 50% 50%" to="360 50% 50%" dur="4s" begin="-5s"/>
      <path class="arrow-marker" d="M 50 60 L 50 80 Z"/>
    </g>
  </g>
  <g transform="translate(10, 10)">
    <text class="title" x="50%" y="20" dominant-baseline="hanging" text-anchor="middle">Footer</text>
    <rect x="10" y="380" width="400" height="20" style="fill: var(--primary-color)"/>
  </g>
</svg>