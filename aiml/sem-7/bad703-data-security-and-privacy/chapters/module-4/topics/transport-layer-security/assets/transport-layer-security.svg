<svg width="420" height="400" data-topic-id="transport-layer-security" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">

  <!-- gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#66B3FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>

  <!-- title -->
  <g transform="translate(20, 10)">
    <text font-size="24" font-family="Arial" fill="#2E4053">Transport Layer Security</text>
  </g>

  <!-- section 1: Introduction to Transport Layer -->
  <g transform="translate(20, 60)">
    <rect width="380" height="40" fill="#F7F7F7" rx="10" data-narration="The transport layer is the fourth layer of the OSI model and is responsible for providing reliable data transfer between devices. It acts as an interface between the network layer and the session layer, ensuring that data is delivered efficiently and accurately.">
      <text font-size="16" font-family="Arial" fill="#2E4053">Introduction to Transport Layer</text>
    </rect>
    <animate transform="translate(20, 50)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>

  <!-- section 2: Key Functions of Transport Layer -->
  <g transform="translate(20, 110)">
    <rect width="380" height="40" fill="#F7F7F7" rx="10" data-narration="The transport layer provides reliable data transfer between devices, establishes and terminates connections, regulates the amount of data that can be sent at one time, and allows multiple applications to share the same connection.">
      <text font-size="16" font-family="Arial" fill="#2E4053">Key Functions of Transport Layer</text>
    </rect>
    <animate transform="translate(20, 90)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>

  <!-- section 3: User Datagram Protocol (UDP) -->
  <g transform="translate(20, 170)">
    <rect width="380" height="40" fill="#F7F7F7" rx="10" data-narration="UDP is a connectionless transport layer protocol that provides best-effort delivery of data. It is commonly used in applications that require fast transmission of data, such as online gaming, video streaming, and VoIP.">
      <text font-size="16" font-family="Arial" fill="#2E4053">User Datagram Protocol (UDP)</text>
    </rect>
    <animate transform="translate(20, 150)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>

  <!-- section 4: Key Features of UDP -->
  <g transform="translate(20, 230)">
    <rect width="380" height="40" fill="#F7F7F7" rx="10" data-narration="UDP is a connectionless protocol that does not establish a connection before sending data, does not guarantee delivery of data, and does not provide error correction mechanisms.">
      <text font-size="16" font-family="Arial" fill="#2E4053">Key Features of UDP</text>
    </rect>
    <animate transform="translate(20, 210)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>

  <!-- section 5: UDP Header Format -->
  <g transform="translate(20, 290)">
    <rect width="380" height="40" fill="#F7F7F7" rx="10" data-narration="The UDP header format consists of the source port, destination port, length, checksum, and data.">
      <text font-size="16" font-family="Arial" fill="#2E4053">UDP Header Format</text>
    </rect>
    <animate transform="translate(20, 270)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>

  <!-- footer -->
  <g transform="translate(20, 350)">
    <rect width="380" height="40" fill="#F7F7F7" rx="10">
      <text font-size="16" font-family="Arial" fill="#2E4053">Transport Layer Security</text>
    </rect>
  </g>

</svg>