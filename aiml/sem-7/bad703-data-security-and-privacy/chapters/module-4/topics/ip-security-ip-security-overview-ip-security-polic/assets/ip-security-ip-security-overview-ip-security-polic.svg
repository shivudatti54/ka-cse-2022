<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="ip-security-ip-security-overview-ip-security-policy" xmlns:xlink="http://www.w3.org/1999/xlink">
  <g transform="translate(0, 0)">
    <rect x="0" y="0" width="100%" height="100%" fill="#66CCCC"/>
    <text x="50%" y="20%" font-size="24" text-anchor="middle" font-family="Arial" fill="#3498DB">IP Security Overview</text>
    <path x="50%" y="50%" stroke="#E74C3C" stroke-width="4" fill="none" d="M 200, 100 L 200, 300"/>
    <text x="50%" y="60%" font-size="18" text-anchor="middle" font-family="Arial" fill="#E74C3C" data-narration="ESP is used to encrypt and authenticate data">ESP</text>
    <rect x="50%" y="150" width="80" height="60" rx="10" fill="#E74C3C" data-narration="Identifies the specific security needs of the organization, such as confidentiality, integrity, and authentication"/>
    <text x="50%" y="170%" font-size="18" text-anchor="middle" font-family="Arial" fill="#E74C3C">Security Requirements</text>
    <rect x="50%" y="250" width="80" height="60" rx="10" fill="#E74C3C" data-narration="Outlines the steps to be taken to implement and maintain the security measures, including procedures for key management and access control"/>
    <text x="50%" y="270%" font-size="18" text-anchor="middle" font-family="Arial" fill="#E74C3C">Security Procedures</text>
    <rect x="50%" y="350" width="80" height="60" rx="10" fill="#E74C3C" data-narration=" Specifies the protocols to be used for securing IP communications, such as IPSec and SSL/TLS"/>
    <text x="50%" y="370%" font-size="18" text-anchor="middle" font-family="Arial" fill="#E74C3C">Security Protocols</text>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="1.5 1.5" begin="0s" dur="2s"/>
    <animateTransform attributeName="transform" type="translate" from="50% 150" to="50% 350" begin="0s" dur="2s"/>
    <animateTransform attributeName="transform" type="rotate" from="0deg" to="360deg" begin="0s" dur="2s"/>
    <path x="50%" y="100%" stroke="#3498DB" stroke-width="4" fill="none" d="M 160, 120 L 220, 200"/>
    <path x="50%" y="220%" stroke="#66CCCC" stroke-width="4" fill="none" d="M 160, 240 L 220, 320"/>
  </g>
</svg>