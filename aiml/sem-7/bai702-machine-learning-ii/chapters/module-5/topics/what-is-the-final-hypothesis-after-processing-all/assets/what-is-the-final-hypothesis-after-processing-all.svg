<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" data-topic-id="final-hypothesis-after-processing-positive-examples">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7a288a" stop-opacity="1"/>
            <stop offset="50%" stop-color="#44a0e5" stop-opacity="1"/>
            <stop offset="100%" stop-color="#fd7e5f" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <!-- Header -->
    <g id="header" transform="translate(10, 10)">
        <text x="10" y="20" font-size="24" font-family="Arial" fill="#44a0e5" text-anchor="start">Final Hypothesis after Processing Positive Examples</text>
    </g>

    <!-- Background Gradient -->
    <rect x="0" y="40" width="410" height="320" fill="url(#grad)"/>

    <!-- Section 1: Introduction -->
    <g id="section1" transform="translate(20, 50)">
        <rect x="0" y="0" width="390" height="100" rx="10" fill="#f7f7f7"/>
        <text x="10" y="20" font-size="18" font-family="Arial" fill="#666" text-anchor="start">Introduction</text>
        <text x="10" y="60" font-size="16" font-family="Arial" fill="#999" text-anchor="start">In Machine Learning II, we have been exploring Graphical Models, specifically Bayesian Networks.</text>
    </g>
    <animate path="M 10 20 L 10 100" attributes="x smidthey" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate path="M 10 100 L 100 100" attributes="x smidthey" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate path="M 100 100 L 100 20" attributes="x smidthey" begin="2s" dur="2s" repeatCount="indefinite"/>

    <!-- Section 2: Definition of Final Hypothesis -->
    <g id="section2" transform="translate(20, 150)">
        <rect x="0" y="0" width="390" height="100" rx="10" fill="#f7f7f7"/>
        <text x="10" y="20" font-size="18" font-family="Arial" fill="#666" text-anchor="start">Definition of Final Hypothesis</text>
        <text x="10" y="60" font-size="16" font-family="Arial" fill="#999" text-anchor="start">The final hypothesis, also known as the posterior distribution, is the probability distribution over all possible hypotheses given the observed data.</text>
    </g>
    <animate path="M 10 20 L 10 100" attributes="x smidthey" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate path="M 10 100 L 100 100" attributes="x smidthey" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate path="M 100 100 L 100 20" attributes="x smidthey" begin="2s" dur="2s" repeatCount="indefinite"/>

    <!-- Section 3: Posterior Distribution -->
    <g id="section3" transform="translate(20, 200)">
        <rect x="0" y="0" width="390" height="100" rx="10" fill="#f7f7f7"/>
        <text x="10" y="20" font-size="18" font-family="Arial" fill="#666" text-anchor="start">Posterior Distribution</text>
        <text x="10" y="60" font-size="16" font-family="Arial" fill="#999" text-anchor="start">The posterior distribution is calculated using Bayes' theorem, which updates the prior distribution with the observed data.</text>
    </g>
    <animate path="M 10 20 L 10 100" attributes="x smidthey" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate path="M 10 100 L 100 100" attributes="x smidthey" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate path="M 100 100 L 100 20" attributes="x smidthey" begin="2s" dur="2s" repeatCount="indefinite"/>

    <!-- Section 4: Final Hypothesis after Processing Positive Examples -->
    <g id="section4" transform="translate(20, 250)">
        <rect x="0" y="0" width="390" height="100" rx="10" fill="#f7f7f7"/>
        <text x="10" y="20" font-size="18" font-family="Arial" fill="#666" text-anchor="start">Final Hypothesis after Processing Positive Examples</text>
        <text x="10" y="60" font-size="16" font-family="Arial" fill="#999" text-anchor="start">After processing all the positive examples, the final hypothesis is the hypothesis that is most likely to have generated the observed data.</text>
    </g>
    <animate path="M 10 20 L 10 100" attributes="x smidthey" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate path="M 10 100 L 100 100" attributes="x smidthey" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate path="M 100 100 L 100 20" attributes="x smidthey" begin="2s" dur="2s" repeatCount="indefinite"/>

    <!-- Section 5: Example -->
    <g id="section5" transform="translate(20, 300)">
        <rect x="0" y="0" width="390" height="100" rx="10" fill="#f7f7f7"/>
        <text x="10" y="20" font-size="18" font-family="Arial" fill="#666" text-anchor="start">Example</text>
        <text x="10" y="60" font-size="16" font-family="Arial" fill="#999" text-anchor="start">Suppose we have a Bayesian Network with two variables, A and B, and three possible hypotheses: H1, H2, and H3.</text>
    </g>
    <animate path="M 10 20 L 10 100" attributes="x smidthey" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate path="M 10 100 L 100 100" attributes="x smidthey" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate path="M 100 100 L 100 20" attributes="x smidthey" begin="2s" dur="2s" repeatCount="indefinite"/>

    <!-- Footer -->
    <g id="footer" transform="translate(20, 350)">
        <rect x="0" y="0" width="390" height="50" rx="10" fill="#f7f7f7"/>
        <text x="10" y="20" font-size="18" font-family="Arial" fill="#666" text-anchor="start">Data Topic ID: final-hypothesis-after-processing-positive-examples</text>
    </g>
    <animate path="M 10 20 L 10 100" attributes="x smidthey" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate path="M 10 100 L 100 100" attributes="x smidthey" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate path="M 100 100 L 100 20" attributes="x smidthey" begin="2s" dur="2s" repeatCount="indefinite"/>
</svg>