<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" data-topic-id="candidate-elimination-algorithm">
    <title>Candidate Elimination Algorithm</title>
    <defs>
        <style>
            .gradient {
                background: linear-gradient(to bottom, #5565bb, #4682b4, #2196f3, #03a9f4);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            .header {
                text-align: center;
                margin-bottom: 20px;
            }
            .footer {
                text-align: center;
                margin-top: 20px;
                font-weight: bold;
            }
        </style>
    </defs>
    <g class="gradient">
        <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" />
    </g>
    <g class="header">
        <text class="title" x="210" y="20" font-size="24" font-family="Arial, sans-serif">
            Apply The Candidate Elimination Algorithm
        </text>
    </g>
    <section data-narration="Introduction">
        <g transform="translate(20, 50)">
            <text class="section-title" x="0" y="0" font-size="18" font-family="Arial, sans-serif">
                Introduction
            </text>
            <rect x="0" y="20" width="400" height="20" fill="#f7f7f7" rx="5" />
            <rect x="0" y="50" width="400" height="20" fill="#f7f7f7" rx="5" />
            <g>
                <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite" begin="0s" />
                <circle cx="200" cy="200" r="100" fill="#2196f3" />
            </g>
            <g>
                <animateTransform attributeName="transform" type="scale" from="1 1" to="2 2" dur="10s" repeatCount="indefinite" begin="0s" />
                <rect x="0" y="0" width="120" height="120" fill="#2196f3" rx="5" />
            </g>
        </g>
    </section>
    <section data-narration="Definitions and Background">
        <g transform="translate(20, 130)">
            <text class="section-title" x="0" y="0" font-size="18" font-family="Arial, sans-serif">
                Definitions and Background
            </text>
            <rect x="0" y="20" width="400" height="20" fill="#f7f7f7" rx="5" />
            <rect x="0" y="50" width="400" height="20" fill="#f7f7f7" rx="5" />
            <g>
                <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite" begin="0s" />
                <circle cx="200" cy="200" r="100" fill="#03a9f4" />
            </g>
            <g>
                <animateTransform attributeName="transform" type="scale" from="1 1" to="2 2" dur="10s" repeatCount="indefinite" begin="0s" />
                <rect x="0" y="0" width="120" height="120" fill="#03a9f4" rx="5" />
            </g>
        </g>
    </section>
    <section data-narration="Candidate Elimination Algorithm">
        <g transform="translate(20, 250)">
            <text class="section-title" x="0" y="0" font-size="18" font-family="Arial, sans-serif">
                Candidate Elimination Algorithm
            </text>
            <rect x="0" y="20" width="400" height="20" fill="#f7f7f7" rx="5" />
            <rect x="0" y="50" width="400" height="20" fill="#f7f7f7" rx="5" />
            <g>
                <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite" begin="0s" />
                <circle cx="200" cy="200" r="100" fill="#2196f3" />
            </g>
            <g>
                <animateTransform attributeName="transform" type="scale" from="1 1" to="2 2" dur="10s" repeatCount="indefinite" begin="0s" />
                <rect x="0" y="0" width="120" height="120" fill="#2196f3" rx="5" />
            </g>
            <g>
                <animateTransform attributeName="transform" type="translate" from="200 200" to="200 250" dur="10s" repeatCount="indefinite" begin="0s" />
                <path d="M 200 200 L 250 240" stroke="#2196f3" stroke-width="2" fill="none" />
            </g>
        </g>
    </section>
    <section data-narration="Example">
        <g transform="translate(20, 360)">
            <text class="section-title" x="0" y="0" font-size="18" font-family="Arial, sans-serif">
                Example
            </text>
            <rect x="0" y="20" width="400" height="20" fill="#f7f7f7" rx="5" />
            <rect x="0" y="50" width="400" height="20" fill="#f7f7f7" rx="5" />
            <g>
                <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite" begin="0s" />
                <circle cx="200" cy="200" r="100" fill="#03a9f4" />
            </g>
            <g>
                <animateTransform attributeName="transform" type="scale" from="1 1" to="2 2" dur="10s" repeatCount="indefinite" begin="0s" />
                <rect x="0" y="0" width="120" height="120" fill="#03a9f4" rx="5" />
            </g>
            <g>
                <animateTransform attributeName="transform" type="translate" from="200 200" to="200 360" dur="10s" repeatCount="indefinite" begin="0s" />
                <line x1="250" y1="330" x2="300" y2="360" stroke="#03a9f4" stroke-width="2" />
            </g>
        </g>
    </section>
    <footer>
        <text class="footer" x="210" y="380" font-size="18" font-family="Arial, sans-serif">
            Candidate Elimination Algorithm
        </text>
    </footer>
    <g transform="translate(20, 400)">
        <text class="title" x="0" y="0" font-size="24" font-family="Arial, sans-serif">
            Apply The Candidate Elimination Algorithm
        </text>
