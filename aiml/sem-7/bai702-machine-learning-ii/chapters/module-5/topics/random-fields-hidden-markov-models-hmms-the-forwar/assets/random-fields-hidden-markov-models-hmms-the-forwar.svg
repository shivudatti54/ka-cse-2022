            <circle cx="240" cy="340" r="20" fill="#FF9E26" rx="5"/>
            <circle cx="360" cy="340" r="20" fill="#FFC107" rx="5"/>
            <circle cx="480" cy="340" r="20" fill="#4CAF50" rx="5"/>
        </g>
        <g id="forward-equation">
            <circle cx="120" cy="370" r="20" fill="#E91E63" rx="5"/>
            <circle cx="240" cy="370" r="20" fill="#FF9E26" rx="5"/>
            <circle cx="360" cy="370" r="20" fill="#FFC107" rx="5"/>
            <circle cx="480" cy="370" r="20" fill="#4CAF50" rx="5"/>
