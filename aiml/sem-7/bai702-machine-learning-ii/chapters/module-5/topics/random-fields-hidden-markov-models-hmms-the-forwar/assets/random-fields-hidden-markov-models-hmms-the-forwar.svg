        <rect x="340" y="290" width="100" height="100" fill="#4CAF50" rx="10"/>
        <rect x="10" y="360" width="400" height="30" fill="#333333" text-anchor="middle"/>
        <text x="210" y="370" font-size="16px" font-family="Arial" fill="white" text-anchor="middle">
            Random Fields Hidden Markov Models HMM The Forwards
        </text>
        <rect x="10" y="10" width="400" height="380" fill="white"/>
        <rect x="10" y="10" width="360" height="380" fill="white"/>
        <rect x="50" y="70" width="100" height="30" fill="#FFC107" rx="10" transform="rotate(45 60 75)"/>
        <rect x="150" y="70" width="100" height="30" fill="#FF9D9D" rx="10" transform="rotate(45 165 75)"/>
        <rect x="250" y="70" width="100" height="30" fill="#4CAF50" rx="10" transform="rotate(45 270 75)"/>
