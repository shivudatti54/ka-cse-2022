            <circle cx="240" cy="220" r="20" fill="#E91E63" rx="5"/>
            <circle cx="360" cy="220" r="20" fill="#FFC107" rx="5"/>
            <circle cx="480" cy="220" r="20" fill="#4CAF50" rx="5"/>
        </g>
        <g id="hmm-transitions">
            <line x1="120" y1="150" x2="240" y2="150" stroke="#4CAF50" stroke-width="2"/>
            <line x1="240" y1="150" x2="360" y2="150" stroke="#FF63B4" stroke-width="2"/>
            <line x1="360" y1="150" x2="480" y2="150" stroke="#FF9D9D" stroke-width="2"/>
