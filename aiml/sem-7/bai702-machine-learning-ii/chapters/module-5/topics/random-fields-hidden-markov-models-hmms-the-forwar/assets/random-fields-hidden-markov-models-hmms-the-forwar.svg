            <circle cx="240" cy="150" r="20" fill="#4CAF50" rx="5"/>
            <circle cx="360" cy="150" r="20" fill="#FF63B4" rx="5"/>
            <circle cx="480" cy="150" r="20" fill="#FF9D9D" rx="5"/>
        </g>
        <g id="hmm-observations">
