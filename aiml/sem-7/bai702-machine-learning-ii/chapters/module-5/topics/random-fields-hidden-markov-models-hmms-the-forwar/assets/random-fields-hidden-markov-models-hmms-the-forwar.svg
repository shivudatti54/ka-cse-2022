<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400"
     xml:space="preserve">
    <style>
        /* Add some basic styling for our SVG */
        * {
            font-family: Arial, sans-serif;
        }
        .topic {
            fill-opacity: 0.8;
            fill: #2F4F7F;
            font-size: 14px;
        }
        .section {
            padding: 20px;
            border-bottom: 1px solid #ccc;
            margin-bottom: 20px;
        }
        .animate {
            animation: fadeIn 1s;
        }
        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
    </style>
    <title>Random Fields Hidden Markov Models</title>
    <body>
        <style>
            /* Add some basic styling for our body */
            * {
                font-family: Arial, sans-serif;
            }
        </style>
        <section class="section data-narration" data-topic-id="random-fields" data-slug="random-fields">
            <div class="topic" data-topic-slug="random-fields">Random Fields</div>
            <div class="topic" data-topic-slug="hidden-markov-models">Hidden Markov Models</div>
            <div class="topic" data-topic-slug="forwards">Forwards</div>
            <div class="topic" data-topic-slug="forwards-continued">Forwards (continued)</div>
            <div class="topic" data-topic-slug="forward-algos">Forwards Algorithms</div>
            <div class="topic" data-topic-slug="viterbi-algorithm">Viterbi Algorithm</div>
            <div class="topic" data-topic-slug="forward-vectors">Forward Vectors</div>
            <div class="topic" data-topic-slug="transition-probabilities">Transition Probabilities</div>
        </section>
        <section class="section data-narration" data-topic-id="random-fields-hmm" data-slug="random-fields-hmm">
            <div class="topic" data-topic-slug="random-fields-hmm">Random Fields Hidden Markov Models</div>
            <div class="topic" data-topic-slug="hmm-states">HMM States</div>
            <div class="topic" data-topic-slug="hmm-observations">HMM Observations</div>
            <div class="topic" data-topic-slug="hmm-transitions">HMM Transitions</div>
            <div class="topic" data-topic-slug="hmm-emissions">HMM Emissions</div>
        </section>
        <section class="section data-narration" data-topic-id="hmm-forwards" data-slug="hmm-forwards">
            <div class="topic" data-topic-slug="hmm-forwards">Forwards in HMMs</div>
            <div class="topic" data-topic-slug="forward-algorithm">Forward Algorithm</div>
            <div class="topic" data-topic-slug="forward-equation">Forward Equation</div>
            <div class="topic" data-topic-slug="forward-solution">Forward Solution</div>
        </section>
        <section class="section data-narration" data-topic-id="hmm-viterbi" data-slug="hmm-viterbi">
            <div class="topic" data-topic-slug="hmm-viterbi">Viterbi Algorithm</div>
            <div class="topic" data-topic-slug="viterbi-algorithm-continued">Viterbi Algorithm (continued)</div>
            <div class="topic" data-topic-slug="viterbi-decomposition">Viterbi Decomposition</div>
        </section>
        <footer>
            <div class="topic" data-topic-slug="footer">Footer</div>
        </footer>
        <defs>
            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
                <stop offset="100%" stop-color="#C3C3C3" stop-opacity="1"/>
            </linearGradient>
            <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#25CDB8" stop-opacity="1"/>
                <stop offset="100%" stop-color="#CCD9D9" stop-opacity="1"/>
            </linearGradient>
        </defs>
        <rect x="10" y="10" width="400" height="380" fill="url(#grad1)"/>
        <animate xlink:href="#grad1" begin="0s" dur="10s" repeatCount="indefinite"/>
        <rect x="10" y="10" width="400" height="380" fill="url(#grad2)"/>
        <animate xlink:href="#grad2" begin="10s" dur="10s" repeatCount="indefinite"/>
