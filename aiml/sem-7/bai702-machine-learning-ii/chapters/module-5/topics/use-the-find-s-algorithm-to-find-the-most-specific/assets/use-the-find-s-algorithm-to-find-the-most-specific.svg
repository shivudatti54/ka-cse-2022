<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" data-topic-id="use-the-find-s-algorithm-to-find-the-most-specific" xmlns:dc="http://purl.org/dc/elements/1.1/">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7E5F4" stop-opacity="1" />
      <stop offset="50%" stop-color="#A6C9F7" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
    <style>
      .node {
        fill: #87CEEB;
        stroke: #333;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .edge {
        stroke: #333;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>
  <title>Use the Find-S Algorithm to Find the Most Specific</title>
  <g transform="translate(10, 10)">
    <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10" data-narration="Find-S Algorithm Introduction" />
    <g id="find-s-algorithm">
      <text x="20" y="50" text-anchor="middle" font-size="18" fill="#333">Find-S Algorithm</text>
      <animateTransform attribute-name="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" />
      <g transform="rotate(90 150 20)">
        <text x="150" y="20" text-anchor="middle" font-size="18" fill="#333">What is a Hypothesis?</text>
        <animateTransform attribute-name="transform" type="rotate" begin="0s" dur="2s" repeatCount="indefinite" />
        <path d="M 150 20 L 180 50" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-narration="A hypothesis is a set of parents for a node." />
        <g transform="translate(190, 50)">
          <text x="190" y="20" text-anchor="middle" font-size="18" fill="#333">What are Positive Examples?</text>
          <animateTransform attribute-name="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" />
          <path d="M 190 20 L 220 50" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-narration="Positive examples are observations that are consistent with the hypothesis." />
        </g>
        <g transform="translate(120, 50)">
          <text x="120" y="20" text-anchor="middle" font-size="18" fill="#333">Find-S Algorithm Steps</text>
          <animateTransform attribute-name="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" />
          <g transform="rotate(90 160 20)">
            <text x="160" y="20" text-anchor="middle" font-size="18" fill="#333">Initialize Hypothesis Set</text>
            <animateTransform attribute-name="transform" type="rotate" begin="0s" dur="2s" repeatCount="indefinite" />
            <path d="M 160 20 L 180 50" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-narration="Initialize an empty hypothesis set." />
          </g>
          <g transform="rotate(90 220, 20)">
            <text x="220" y="20" text-anchor="middle" font-size="18" fill="#333">Iterate Through All Combinations</text>
            <animateTransform attribute-name="transform" type="rotate" begin="0s" dur="2s" repeatCount="indefinite" />
            <path d="M 220 20 L 250 50" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-narration="Iterate through all possible combinations of parents for each node." />
          </g>
          <g transform="rotate(90 280, 20)">
            <text x="280" y="20" text-anchor="middle" font-size="18" fill="#333">Check Consistency</text>
            <animateTransform attribute-name="transform" type="rotate" begin="0s" dur="2s" repeatCount="indefinite" />
            <path d="M 280 20 L 300 50" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-narration="Check if the hypothesis is consistent with the positive examples." />
          </g>
          <g transform="rotate(90 340, 20)">
            <text x="340" y="20" text-anchor="middle" font-size="18" fill="#333">Select Most Specific Hypothesis</text>
            <animateTransform attribute-name="transform" type="rotate" begin="0s" dur="2s" repeatCount="indefinite" />
            <path d="M 340 20 L 360 50" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-narration="Select the most specific hypothesis from the hypothesis set." />
          </g>
        </g>
        <g transform="translate(110, 50)">
          <text x="110" y="20" text-anchor="middle" font-size="18" fill="#333">Example</text>
          <animateTransform attribute-name="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" />
          <g transform="rotate(90 170 20)">
            <text x="170" y="20" text-anchor="middle" font-size="18" fill="#333">Two nodes, A and B</text>
            <animateTransform attribute-name="transform" type="rotate" begin="0s" dur="2s" repeatCount="indefinite" />
            <path d="M 170 20 L 200 50" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-narration="We have a Bayesian network with two nodes, A and B, and two possible parents for node B." />
            <g transform="translate(210, 50)">
              <text x="210" y="20" text-anchor="middle" font-size="18" fill="#333">Two positive examples</text>
              <animateTransform attribute-name="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" />
              <path d="M 210 20 L 240 50" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-narration="We have two positive examples." />
            </g>
          </g>
        </g>
      </g>
    </g>
    <g transform="rotate(90 10 380)">
      <text x="10" y="380" text-anchor="middle" font-size="18" fill="#333">Footer</text>
      <animateTransform attribute-name="transform" type="rotate" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>
  </g>
</svg>