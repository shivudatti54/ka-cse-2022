<svg width="420" height="400" data-topic-id="self-organizing-maps" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" background-gradient="indigo, teal, orange, indigo, teal, orange">
    <defs>
        <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="indigo" stop-opacity="1"/>
            <stop offset="50%" stop-color="teal" stop-opacity="1"/>
            <stop offset="100%" stop-color="orange" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <title>Unsupervised Learning with SOM</title>
    <rect x="0" y="0" width="420" height="400" fill="url(#backgroundGradient)"/>
    <g transform="translate(10, 10)">
        <rect x="0" y="0" width="400" height="370" stroke="#000" stroke-width="2"/>
        <text x="20" y="30" font-size="24" font-family="Arial" fill="#fff">SOM Algorithm Overview</text>
        <rect x="10" y="60" width="80" height="30" fill="#fff" stroke="#000" stroke-width="2"/>
        <text x="15" y="75" font-size="18" font-family="Arial" fill="#000">Introduction</text>
        <text x="15" y="90" font-size="18" font-family="Arial" fill="#000">SOM is a type of neural network that is used for dimensionality reduction, pattern recognition, and clustering.</text>
        <rect x="10" y="120" width="80" height="30" fill="#fff" stroke="#000" stroke-width="2"/>
        <text x="15" y="135" font-size="18" font-family="Arial" fill="#000">How SOM Works</text>
        <rect x="10" y="165" width="80" height="30" fill="#fff" stroke="#000" stroke-width="2"/>
        <text x="15" y="180" font-size="18" font-family="Arial" fill="#000">Training Steps</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 370" dur="3s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="410 0" dur="3s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 370" dur="3s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="410 0" dur="3s" repeatCount="indefinite"/>
        <rect x="10" y="210" width="80" height="30" fill="#fff" stroke="#000" stroke-width="2"/>
        <text x="15" y="225" font-size="18" font-family="Arial" fill="#000">Advantages</text>
        <rect x="10" y="255" width="80" height="30" fill="#fff" stroke="#000" stroke-width="2"/>
        <text x="15" y="270" font-size="18" font-family="Arial" fill="#000">SOM can be used to reduce the dimensionality of high-dimensional data, recognize patterns, and cluster similar data points together.</text>
        <rect x="10" y="305" width="80" height="30" fill="#fff" stroke="#000" stroke-width="2"/>
        <text x="15" y="320" font-size="18" font-family="Arial" fill="#000">Disadvantages</text>
        <rect x="10" y="350" width="80" height="30" fill="#fff" stroke="#000" stroke-width="2"/>
        <text x="15" y="365" font-size="18" font-family="Arial" fill="#000">SOM can be slow to train, especially for large datasets.</text>
        <path d="M 20 100 L 100 200 L 180 100" stroke="#000" stroke-width="2" fill="none"/>
        <path d="M 130 100 L 200 200 L 180 100" stroke="#000" stroke-width="2" fill="none"/>
        <text x="50" y="250" font-size="18" font-family="Arial" fill="#000">Connections between neurons</text>
        <rect x="10" y="400" width="400" height="20" fill="#fff" stroke="#000" stroke-width="2"/>
        <text x="15" y="415" font-size="18" font-family="Arial" fill="#000"> Footer</text>
    </g>
</svg>