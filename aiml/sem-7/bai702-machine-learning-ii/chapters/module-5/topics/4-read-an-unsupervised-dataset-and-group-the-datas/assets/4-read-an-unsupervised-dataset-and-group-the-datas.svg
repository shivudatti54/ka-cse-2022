<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" data-topic-id="k-means-clustering">
  <defs>
    <linearGradient id="color-1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7A8BD2" stop-opacity="1"/>
      <stop offset="1" stop-color="#BECCFF" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="color-2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFC107" stop-opacity="1"/>
      <stop offset="1" stop-color="#FF9800" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>4. Read an Unsupervised Dataset and Group the Dataset based on Similarity using K-Means Clustering</title>
  <style>
    text {
      font-size: 18px;
      color: #333;
    }
    rect {
      fill: url(#color-1);
    }
    circle {
      fill: #BECCFF;
      stroke: #333;
      stroke-width: 2;
    }
  </style>
  <rect x="10" y="10" width="400" height="380" fill="none"/>
  <g id="cluster-1">
    <circle cx="100" cy="100" r="20" fill="#7A8BD2"/>
    <text x="120" y="110" text-anchor="middle" font-size="18px">Cluster 1: Similar Data Points</text>
  </g>
  <g id="cluster-2">
    <circle cx="200" cy="150" r="20" fill="#BECCFF"/>
    <text x="220" y="160" text-anchor="middle" font-size="18px">Cluster 2: Different Data Points</text>
  </g>
  <g id="cluster-3">
    <circle cx="300" cy="100" r="20" fill="#FFC107"/>
    <text x="320" y="110" text-anchor="middle" font-size="18px">Cluster 3: More Similar Data Points</text>
  </g>
  <g id="cluster-4">
    <circle cx="100" cy="250" r="20" fill="#FF9800"/>
    <text x="120" y="260" text-anchor="middle" font-size="18px">Cluster 4: Dissimilar Data Points</text>
  </g>
  <g id="legend">
    <rect x="10" y="10" width="50" height="50" fill="#7A8BD2"/>
    <text x="20" y="20" text-anchor="middle" font-size="18px">Cluster 1</text>
    <rect x="80" y="10" width="50" height="50" fill="#BECCFF"/>
    <text x="90" y="20" text-anchor="middle" font-size="18px">Cluster 2</text>
    <rect x="150" y="10" width="50" height="50" fill="#FFC107"/>
    <text x="160" y="20" text-anchor="middle" font-size="18px">Cluster 3</text>
    <rect x="220" y="10" width="50" height="50" fill="#FF9800"/>
    <text x="230" y="20" text-anchor="middle" font-size="18px">Cluster 4</text>
  </g>
  <g id="graph">
    <circle cx="150" cy="120" r="10" fill="none"/>
    <circle cx="220" cy="120" r="10" fill="none"/>
    <circle cx="290" cy="120" r="10" fill="none"/>
    <line x1="150" y1="120" x2="150" y2="150"/>
    <line x1="220" y1="120" x2="220" y2="150"/>
    <line x1="290" y1="120" x2="290" y2="150"/>
    <line x1="150" y1="120" x2="220" y2="120"/>
    <line x1="220" y1="120" x2="290" y2="120"/>
    <line x1="150" y1="120" x2="290" y2="120"/>
    <line x1="150" y1="120" x2="220" y2="290"/>
    <line x1="220" y1="120" x2="290" y2="290"/>
    <line x1="150" y1="120" x2="290" y2="290"/>
  </g>
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" begin="0s" dur="2s" fill="freeze"/>
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" begin="2s" dur="2s" fill="freeze"/>
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" begin="4s" dur="2s" fill="freeze"/>
</svg>