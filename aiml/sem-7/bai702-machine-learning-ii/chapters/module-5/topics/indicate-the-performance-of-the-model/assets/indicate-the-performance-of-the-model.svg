<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background: radial-gradient(to bottom, #C7B8EA, #87CEEB);">

    <!-- Header -->
    <defs>
        <linearGradient id="header-gradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FFC5C5"/>
            <stop offset="100%" stop-color="#FF99CC"/>
        </linearGradient>
        <linearGradient id="footer-gradient" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0%" stop-color="#FF99CC"/>
            <stop offset="100%" stop-color="#FFC5C5"/>
        </linearGradient>
    </defs>

    <!-- Header section -->
    <rect x="10" y="10" width="400" height="30" rx="5" style="fill: url(#header-gradient);"/>
    <text x="20" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="start" fill="#fff">Indicate The Performance Of The Model</text>
    <rect x="10" y="50" width="100%" height="3" rx="5" style="fill: #fff; opacity: 0.5; animation: header-1 2s forwards;" data-narration="Accuracy measures the proportion of correctly classified instances in a dataset.">
        <animateTransform attributeName="transform" type="translateX" from="0" to="-100%" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="10" y="70" width="100%" height="3" rx="5" style="fill: #fff; opacity: 0.5; animation: header-2 2s forwards;" data-narration="Precision measures the ratio of true positives to the sum of true positives and false positives.">
        <animateTransform attributeName="transform" type="translateX" from="0" to="-100%" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="10" y="90" width="100%" height="3" rx="5" style="fill: #fff; opacity: 0.5; animation: header-3 2s forwards;" data-narration="Recall measures the ratio of true positives to the sum of true positives and false negatives.">
        <animateTransform attributeName="transform" type="translateX" from="0" to="-100%" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="10" y="110" width="100%" height="3" rx="5" style="fill: #fff; opacity: 0.5; animation: header-4 2s forwards;" data-narration="The F1-score is the weighted average of precision and recall.">
        <animateTransform attributeName="transform" type="translateX" from="0" to="-100%" dur="2s" repeatCount="indefinite"/>
    </rect>

    <!-- Body -->
    <g transform="translate(10, 150)">
        <rect width="100%" height="200" rx="5" style="fill: #f7f7f7;"/>
        <rect x="10" y="20" width="300" height="150" rx="5" style="fill: #87CEEB;"/>
        <rect x="10" y="190" width="300" height="150" rx="5" style="fill: #C7B8EA;"/>
        <text x="15" y="210" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#333">Indicate The Performance Of The Model</text>

        <g transform="translate(10, 60)">
            <rect width="100%" height="50" rx="5" style="fill: #fff; opacity: 0.5; animation: body-1 2s forwards;" data-narration="Accuracy measures the proportion of correctly classified instances in a dataset.">
                <animateTransform attributeName="transform" type="translateX" from="0" to="-100%" dur="2s" repeatCount="indefinite"/>
            </rect>
            <rect x="10" y="120" width="100%" height="30" rx="5" style="fill: #fff; opacity: 0.5; animation: body-2 2s forwards;" data-narration="Precision measures the ratio of true positives to the sum of true positives and false positives.">
                <animateTransform attributeName="transform" type="translateX" from="0" to="-100%" dur="2s" repeatCount="indefinite"/>
            </rect>
            <rect x="10" y="150" width="100%" height="30" rx="5" style="fill: #fff; opacity: 0.5; animation: body-3 2s forwards;" data-narration="Recall measures the ratio of true positives to the sum of true positives and false negatives.">
                <animateTransform attributeName="transform" type="translateX" from="0" to="-100%" dur="2s" repeatCount="indefinite"/>
            </rect>
            <rect x="10" y="180" width="100%" height="30" rx="5" style="fill: #fff; opacity: 0.5; animation: body-4 2s forwards;" data-narration="The F1-score is the weighted average of precision and recall.">
                <animateTransform attributeName="transform" type="translateX" from="0" to="-100%" dur="2s" repeatCount="indefinite"/>
            </rect>
        </g>

        <g transform="translate(10, 280)">
            <rect width="100%" height="50" rx="5" style="fill: #fff; opacity: 0.5; animation: footer-1 2s forwards;" data-narration="A higher accuracy indicates that the model is more effective in classifying instances correctly.">
                <animateTransform attributeName="transform" type="translateX" from="0" to="-100%" dur="2s" repeatCount="indefinite"/>
            </rect>
            <rect x="10" y="330" width="100%" height="30" rx="5" style="fill: #fff; opacity: 0.5; animation: footer-2 2s forwards;" data-narration="A higher precision indicates that the model is more effective in detecting true positives.">
                <animateTransform attributeName="transform" type="translateX" from="0" to="-100%" dur="2s" repeatCount="indefinite"/>
            </rect>
            <rect x="10" y="360" width="100%" height="30" rx="5" style="fill: #fff; opacity: 0.5; animation: footer-3 2s forwards;" data-narration="A higher recall indicates that the model is more effective in detecting true positives.">
                <animateTransform attributeName="transform" type="translateX" from="0" to="-100%" dur="2s" repeatCount="indefinite"/>
            </rect>
            <rect x="10" y="390" width="100%" height="30" rx="5" style="fill: #fff; opacity: 0.5; animation: footer-4 2s forwards;" data-narration="A higher F1-score indicates that the model is more effective in both precision and recall.">
                <animateTransform attributeName="transform" type="translateX" from="0" to="-100%" dur="2s" repeatCount="indefinite"/>
            </rect>
        </g>
    </g>

    <!-- Footers -->
    <rect x="10" y="390" width="400" height="10" rx="5" style="fill: #ff99cc;"/>
    <text x="20" y="400" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#fff">Indicate The Performance Of The Model</text>

    <!-- Arrows -->
    <line x1="10" y1="140" x2="10" y2="140" style="stroke: #333; stroke-width: 2;" data-topic-id="topic-1"/>
    <line x1="10" y1="100" x2="10" y2="100" style="stroke: #333; stroke-width: 2;" data-topic-id="topic-2"/>
    <line x1="10" y1="170" x2="10" y2="170" style="stroke: #333; stroke-width: 2;" data-topic-id="topic-3"/>
    <line x1="10" y1="210" x2="10" y2="210" style="stroke: #333; stroke-width: 2;" data-topic-id="topic-4"/>
    <line x1="10" y1="230" x2="10" y2="230" style="stroke: #333; stroke-width: 2;" data-topic-id="topic-5"/>
    <line x1="10" y1="250" x2="10" y2="250" style="stroke: #333; stroke-width: 2;" data-topic-id="topic-6"/>
    <line x1="310" y1="140" x2="310" y2="140" style="stroke: #333; stroke-width: 2;" data-topic-id="topic-1"/>
    <line x1="310" y1="100" x2="310" y2="100" style="stroke: #333; stroke-width: 2;" data-topic-id="topic-2"/>
    <line x1="310" y1="170" x2="310" y2="170" style="stroke: #333; stroke-width: 2;" data-topic-id="topic-3"/>
    <line x1="310" y1="210" x2="310" y2="210" style="stroke: #333; stroke-width: 2;" data-topic-id="topic-4"/>
    <line x1="310" y1="230" x2="310" y2="230" style="stroke: #333; stroke-width: 2;" data-topic-id="topic-5"/>
    <line x1="310" y1="250" x2="310" y2="250" style="stroke: #333; stroke-width: 2;" data-topic-id="topic-6"/>

    <!-- Animations -->
    <animate id="header-1" begin="0s" dur="2s" fill="freeze"/>
    <animate id="header-2" begin="2s" dur="2s" fill="freeze"/>
    <animate id="header-3" begin="4s" dur="2s" fill="freeze"/>
    <animate id="header-4" begin="6s" dur="2s" fill="freeze"/>
    <animate id="body-1" begin="0s" dur="2s" fill="freeze"/>
    <animate id="body-2" begin="2s" dur="2s" fill="freeze"/>
    <animate id="body-3" begin="4s" dur="2s" fill="freeze"/>
    <animate id="body-4" begin="6s" dur="2s" fill="freeze"/>
    <animate id="footer-1" begin="0s" dur="2s" fill="freeze"/>
    <animate id="footer-2" begin="2s" dur="2s" fill="freeze"/>
    <animate id="footer-3" begin="4s" dur="2s" fill="freeze"/>
    <animate id="footer-4" begin="6s" dur="2s" fill="freeze"/>

</svg>