<svg width="420" height="400" data-topic-id="text-book-2-chap-16-practical-component-of-ipcc-ma">
  <title>Text Book 2 Chap 16 Practical Component Of IPCC (May Cover All/Major Modules)</title>
  <metadata>
    <meta name="description" content="Animated Educational SVG Diagram for Text Book 2 Chap 16 Practical Component Of IPCC (May Cover All/Major Modules)">
    <meta name="keywords" content="IPCC, Bayesian Networks, Markov Chains, Data Analysis, Graphical Models">
  </metadata>
  <style>
    /* Add pastel colors */
    * {
      -webkit-filter: brightness(0.5);
      filter: brightness(0.5);
    }

    /* Gradient background */
    body {
      background-image: linear-gradient(to bottom, #C7B8EA, #87CEEB);
      min-height: 100vh;
      margin: 0;
    }

    /* Smooth animations */
    <animate
      xmlns="http://www.w3.org/2000/svg"
      attributeName="opacity"
      begin="0s"
      dur="3s"
      repeatCount="indefinite"
      repeatBehavior="removePrevious"
      from="1"
      to="0"
    />
  </style>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFC5C5" stop-opacity="1"/>
      <stop offset="50%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#pastel-gradient)" rx="10px"/>
  <g transform="translate(10, 20)">
    <rect width="80%" height="70%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="40%" font-size="24px" font-family="Arial, sans-serif" text-anchor="middle">Bayesian Networks</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="50%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">What is a Bayesian Network?</text>
    <rect width="80%" height="30%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="70%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Key Concepts:</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="90%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Node: A node in a Bayesian network represents a variable.</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="110%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Edge: An edge in a Bayesian network represents the conditional dependence between two variables.</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="130%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Conditional Probability Table (CPT): A CPT is a table that specifies the conditional probabilities of a node given its parents.</text>
    <rect width="80%" height="30%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="160%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">How to Create a Bayesian Network from Scratch:</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="180%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">1. Define the variables and their domains.</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="200%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">2. Define the conditional dependencies between the variables.</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="220%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">3. Create a directed acyclic graph (DAG) to represent the Bayesian network.</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="240%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">4. Assign conditional probability tables (CPTs) to each node.</text>
    <rect width="80%" height="40%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="270%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Example:</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="290%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Suppose we want to model the relationship between the weather (W), the temperature (T), and the precipitation (P).</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="310%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">We can create a Bayesian network as follows:</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="330%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">- Variables: W, T, P</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="350%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">- Domains: W (good, bad), T (hot, cold), P (rain, no rain)</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="370%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">- Conditional Dependencies:</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="390%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">- W -> T (good weather implies hot temperature)</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="410%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">- W -> P (good weather implies rain)</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="430%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">- T -> P (hot temperature implies rain)</text>
    <rect width="80%" height="30%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="460%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">- DAG:</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="480%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">- W -> T</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="500%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">- W -> P</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="520%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">- T -> P</text>
  </g>
  <g transform="translate(10, 500)">
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="520%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Make Bayesian Networks</text>
    <rect width="80%" height="40%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="560%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Once you have a dataset, you can make Bayesian networks to analyze and visualize the data.</text>
  </g>
  <g transform="translate(10, 600)">
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="620%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Data Analysis</text>
    <rect width="80%" height="30%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="650%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Data analysis is a crucial step in making Bayesian networks. It involves collecting and cleaning the data, identifying patterns and relationships, and selecting the most relevant variables to include in the network.</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="670%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Graphical Models</text>
    <rect width="80%" height="30%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="700%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Graphical models are a type of probabilistic graphical model that represent the relationships between different variables.</text>
  </g>
  <g transform="translate(10, 800)">
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="820%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Markov Chains</text>
    <rect width="80%" height="30%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="850%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Markov chains are a type of graphical model that represent the relationships between different variables.</text>
  </g>
  <g transform="translate(10, 1000)">
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="1020%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Example</text>
    <rect width="80%" height="40%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="1060%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Suppose we want to model the relationship between the weather (W), the temperature (T), and the precipitation (P).</text>
  </g>
  <g transform="translate(10, 1200)">
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="1220%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">We can create a Bayesian network as follows:</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="1240%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">- Variables: W, T, P</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="1260%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">- Domains: W (good, bad), T (hot, cold), P (rain, no rain)</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="1280%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">- Conditional Dependencies:</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="1300%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">- W -> T (good weather implies hot temperature)</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="1320%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">- W -> P (good weather implies rain)</text>
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="1340%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">- T -> P (hot temperature implies rain)</text>
  </g>
  <g transform="translate(10, 1400)">
    <rect width="80%" height="20%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="1420%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Conclusion</text>
    <rect width="80%" height="30%" fill="#F0F4F6" rx="10px"/>
    <text x="50%" y="1450%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">In conclusion, Bayesian networks are a powerful tool for analyzing and visualizing complex relationships between different variables.</text>
  </g>
</svg>