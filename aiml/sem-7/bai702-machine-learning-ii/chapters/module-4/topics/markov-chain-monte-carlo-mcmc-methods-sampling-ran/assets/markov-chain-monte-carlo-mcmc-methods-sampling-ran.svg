<svg width="420" height="400" data-topic-id="markov-chain-monte-carlo-mcmc-methods-sampling-ran" xmlns="http://www.w3.org/2000/svg">
  <title>Markov Chain Monte Carlo Methods: Sampling</title>
  <rect x="0" y="0" width="100%" height="20" fill="#7289e7" />
  <rect x="0" y="20" width="100%" height="80" fill="#87ceeb" />
  <g transform="translate(10, 30)">
    <rect x="0" y="0" width="100%" height="20" fill="#f7dc6f" />
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#000" text-anchor="start">Random Numbers</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100% 50%" to="360 100% 50%" dur="2000" begin="0s" />
    <animate x="10" y="30" attributeName="x" type="linear" from="10" to="30" dur="2000" begin="0.5s" />
    <animate y="10" attributeName="y" type="linear" from="10" to="30" dur="2000" begin="1s" />
    <rect x="60" y="0" width="40" height="20" fill="#f0c74c" rx="5" />
    <text x="80" y="10" font-size="14" font-family="Arial" fill="#000" text-anchor="start">Pseudorandom numbers</text>
    <text x="120" y="10" font-size="14" font-family="Arial" fill="#000" text-anchor="start">Quasi-Monte Carlo methods</text>
  </g>
  <g transform="translate(10, 80)">
    <rect x="0" y="0" width="100%" height="20" fill="#8bc34a" />
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#000" text-anchor="start">Gaussian Random Numbers</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100% 50%" to="360 100% 50%" dur="2000" begin="0.5s" />
    <animate x="10" y="30" attributeName="x" type="linear" from="10" to="30" dur="2000" begin="1s" />
    <animate y="10" attributeName="y" type="linear" from="10" to="30" dur="2000" begin="1.5s" />
    <rect x="60" y="0" width="40" height="20" fill="#f7dc6f" rx="5" />
    <text x="80" y="10" font-size="14" font-family="Arial" fill="#000" text-anchor="start">Mean and variance</text>
    <text x="120" y="10" font-size="14" font-family="Arial" fill="#000" text-anchor="start">Standard deviation</text>
  </g>
  <g transform="translate(10, 150)">
    <rect x="0" y="0" width="100%" height="20" fill="#2196f3" />
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#000" text-anchor="start">Monte Carlo or Bust</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100% 50%" to="360 100% 50%" dur="2000" begin="2s" />
    <animate x="10" y="30" attributeName="x" type="linear" from="10" to="30" dur="2000" begin="2.5s" />
    <animate y="10" attributeName="y" type="linear" from="10" to="30" dur="2000" begin="3s" />
    <rect x="60" y="0" width="40" height="20" fill="#f0c74c" rx="5" />
    <text x="80" y="10" font-size="14" font-family="Arial" fill="#000" text-anchor="start">Importance sampling</text>
    <text x="120" y="10" font-size="14" font-family="Arial" fill="#000" text-anchor="start">Control variates</text>
  </g>
  <g transform="translate(10, 230)">
    <rect x="0" y="0" width="100%" height="20" fill="#9c27b0" />
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#000" text-anchor="start">The Proposal Distribution</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100% 50%" to="360 100% 50%" dur="2000" begin="3.5s" />
    <animate x="10" y="30" attributeName="x" type="linear" from="10" to="30" dur="2000" begin="4s" />
    <animate y="10" attributeName="y" type="linear" from="10" to="30" dur="2000" begin="4.5s" />
    <rect x="60" y="0" width="40" height="20" fill="#f7dc6f" rx="5" />
    <text x="80" y="10" font-size="14" font-family="Arial" fill="#000" text-anchor="start">Single-chain MCMC</text>
    <text x="120" y="10" font-size="14" font-family="Arial" fill="#000" text-anchor="start">Multi-chain MCMC</text>
  </g>
  <rect x="0" y="330" width="100%" height="20" fill="#2196f3" />
  <text x="10" y="340" font-size="16" font-family="Arial" fill="#000" text-anchor="start">Conclusion</text>
  <rect x="0" y="360" width="100%" height="20" fill="#87ceeb" />
  <text x="10" y="370" font-size="14" font-family="Arial" fill="#000" text-anchor="start">Next Topic</text>
</svg>