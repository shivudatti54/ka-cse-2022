<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#gradient)" width="100%" height="100%"/>
  
  <!-- Title -->
  <text x="50%" y="20" text-anchor="middle" font-size="24" font-family="Arial" fill="#3498DB">
    Unsupervised Learning
  </text>
  
  <!-- Section 1: Introduction -->
  <section data-narration="Introduction" data-topic-id="unsupervised-learning-142">
    <rect x="10" y="50" width="400" height="150" fill="#F7F7F7" rx="10"/>
    <text x="20" y="70" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
      Unsupervised learning is a type of machine learning where the algorithm is trained on a dataset without any prior knowledge of the desired output.
    </text>
  </section>
  
  <!-- Section 2: Types of Unsupervised Learning -->
  <section data-narration="Types of Unsupervised Learning" data-topic-id="unsupervised-learning-142">
    <rect x="10" y="200" width="400" height="150" fill="#F7F7F7" rx="10"/>
    <text x="20" y="220" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
      Unsupervised learning can be categorized into three main types: clustering, dimensionality reduction, and anomaly detection.
    </text>
  </section>
  
  <!-- Section 3: Clustering -->
  <section data-narration="Clustering" data-topic-id="k-means-clustering-142">
    <rect x="10" y="350" width="400" height="150" fill="#F7F7F7" rx="10"/>
    <text x="20" y="370" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
      K-means clustering is a popular unsupervised learning algorithm that groups data points into K clusters based on their features.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="200,0" dur="1000" begin="0s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 4: Dimensionality Reduction -->
  <section data-narration="Dimensionality Reduction" data-topic-id="dimensionality-reduction-142">
    <rect x="10" y="500" width="400" height="150" fill="#F7F7F7" rx="10"/>
    <text x="20" y="520" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
      Dimensionality reduction is a technique used to reduce the number of features in a dataset while preserving the most important information.
    </text>
  </section>
  
  <!-- Section 5: Anomaly Detection -->
  <section data-narration="Anomaly Detection" data-topic-id="anomaly-detection-142">
    <rect x="10" y="650" width="400" height="150" fill="#F7F7F7" rx="10"/>
    <text x="20" y="670" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
      Anomaly detection is a type of unsupervised learning that identifies data points that do not fit a expected pattern or distribution.
    </text>
  </section>
  
  <!-- Section 6: Hierarchical Clustering -->
  <section data-narration="Hierarchical Clustering" data-topic-id="hierarchical-clustering-142">
    <rect x="10" y="800" width="400" height="150" fill="#F7F7F7" rx="10"/>
    <text x="20" y="820" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
      Hierarchical clustering is a technique used to build a hierarchy of clusters by merging or splitting existing clusters.
    </text>
  </section>
  
  <!-- Footer -->
  <text x="50%" y="380" text-anchor="middle" font-size="18" font-family="Arial" fill="#666">
    &copy; 2023 Educational Diagram
  </text>
</svg>