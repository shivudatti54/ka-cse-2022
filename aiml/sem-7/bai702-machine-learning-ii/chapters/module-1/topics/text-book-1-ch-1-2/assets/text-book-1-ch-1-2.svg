<svg width="420" height="400" data-topic-id="machine-learning-ii-introduction">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a7c2ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87ceeb" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -160" begin="0s" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Section 1: Well-Posed Learning Problems -->
  <g data-narration="Well-Posed Learning Problems">
    <!-- Title -->
    <text x="20" y="20" font-size="24" font-family="Arial" fill="#2f4f7f">Key Characteristics</text>
    <!-- Description -->
    <text x="20" y="60" font-size="18" font-family="Arial" fill="#2f4f7f">A well-posed learning problem is a problem where the goal is to learn a mapping from input data to output data, such that the mapping is accurate and generalizable.</text>
    <!-- Bullet points -->
    <circle cx="20" cy="100" r="10" fill="#a7c2ff"/>
    <text x="40" y="100" font-size="18" font-family="Arial" fill="#2f4f7f">• Clear definition of the goal</text>
    <circle cx="20" cy="120" r="10" fill="#a7c2ff"/>
    <text x="40" y="120" font-size="18" font-family="Arial" fill="#2f4f7f">• Large enough training set</text>
    <circle cx="20" cy="140" r="10" fill="#a7c2ff"/>
    <text x="40" y="140" font-size="18" font-family="Arial" fill="#2f4f7f">• Unambiguous evaluation metric</text>
    <circle cx="20" cy="160" r="10" fill="#a7c2ff"/>
    <text x="40" y="160" font-size="18" font-family="Arial" fill="#2f4f7f">• No significant concept drift</text>
  </g>

  <!-- Section 2: Example -->
  <g data-narration="Example">
    <!-- Title -->
    <text x="20" y="20" font-size="24" font-family="Arial" fill="#2f4f7f">Classifier for Buying a Car</text>
    <!-- Description -->
    <text x="20" y="60" font-size="18" font-family="Arial" fill="#2f4f7f">Suppose we want to build a classifier to predict whether a person will buy a car based on their age and income.</text>
    <!-- Bullet points -->
    <circle cx="20" cy="100" r="10" fill="#a7c2ff"/>
    <text x="40" y="100" font-size="18" font-family="Arial" fill="#2f4f7f">• Clear definition of the goal (predicting whether someone will buy a car)</text>
    <circle cx="20" cy="120" r="10" fill="#a7c2ff"/>
    <text x="40" y="120" font-size="18" font-family="Arial" fill="#2f4f7f">• Large enough training set (a representative sample of people)</text>
    <circle cx="20" cy="140" r="10" fill="#a7c2ff"/>
    <text x="40" y="140" font-size="18" font-family="Arial" fill="#2f4f7f">• Unambiguous evaluation metric (accuracy)</text>
    <circle cx="20" cy="160" r="10" fill="#a7c2ff"/>
    <text x="40" y="160" font-size="18" font-family="Arial" fill="#2f4f7f">• No significant concept drift (the relationship between age, income, and buying a car is likely to remain stable)</text>
  </g>

  <!-- Section 3: Designing a Learning System -->
  <g data-narration="Designing a Learning System">
    <!-- Title -->
    <text x="20" y="20" font-size="24" font-family="Arial" fill="#2f4f7f">Steps to Design a Learning System</text>
    <!-- Bullet points -->
    <circle cx="20" cy="100" r="10" fill="#a7c2ff"/>
    <text x="40" y="100" font-size="18" font-family="Arial" fill="#2f4f7f">• Problem formulation</text>
    <circle cx="20" cy="120" r="10" fill="#a7c2ff"/>
    <text x="40" y="120" font-size="18" font-family="Arial" fill="#2f4f7f">• Data collection</text>
    <circle cx="20" cy="140" r="10" fill="#a7c2ff"/>
    <text x="40" y="140" font-size="18" font-family="Arial" fill="#2f4f7f">• Data preprocessing</text>
    <circle cx="20" cy="160" r="10" fill="#a7c2ff"/>
    <text x="40" y="160" font-size="18" font-family="Arial" fill="#2f4f7f">• Model selection</text>
    <circle cx="20" cy="180" r="10" fill="#a7c2ff"/>
    <text x="40" y="180" font-size="18" font-family="Arial" fill="#2f4f7f">• Training</text>
    <circle cx="20" cy="200" r="10" fill="#a7c2ff"/>
    <text x="40" y="200" font-size="18" font-family="Arial" fill="#2f4f7f">• Evaluation</text>
    <circle cx="20" cy="220" r="10" fill="#a7c2ff"/>
    <text x="40" y="220" font-size="18" font-family="Arial" fill="#2f4f7f">• Deployment</text>
  </g>

  <!-- Section 4: Model Selection -->
  <g data-narration="Model Selection">
    <!-- Title -->
    <text x="20" y="20" font-size="24" font-family="Arial" fill="#2f4f7f">Choosing a Suitable Model</text>
    <!-- Bullet points -->
    <circle cx="20" cy="100" r="10" fill="#a7c2ff"/>
    <text x="40" y="100" font-size="18" font-family="Arial" fill="#2f4f7f">• Based on problem formulation</text>
    <circle cx="20" cy="120" r="10" fill="#a7c2ff"/>
    <text x="40" y="120" font-size="18" font-family="Arial" fill="#2f4f7f">• Data characteristics</text>
    <circle cx="20" cy="140" r="10" fill="#a7c2ff"/>
    <text x="40" y="140" font-size="18" font-family="Arial" fill="#2f4f7f">• Evaluation metric</text>
  </g>

  <!-- Title -->
  <text x="20" y="20" font-size="36" font-family="Arial" fill="#2f4f7f">Machine Learning II: Introduction</text>

  <!-- Footer -->
  <text x="20" y="380" font-size="18" font-family="Arial" fill="#2f4f7f">Page 1 of 2</text>
</svg>