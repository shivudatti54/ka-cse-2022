<svg width="420" height="400" data-topic-id="learning-q-learning" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .section {
                margin-bottom: 20px;
            }

            .section[data-narration="update-rule"] {
                background-color: #87CEEB;
            }

            .section[data-narration="key-properties"] {
                background-color: #8BC34A;
            }

            .section[data-narration="convergence-guarantees"] {
                background-color: #2196F3;
            }

            .section[data-narration="algorithm"] {
                background-color: #FF9800;
            }
        </style>
    </defs>

    <!-- Introduction Section -->
    <section class="section" data-narration="introduction">
        <rect x="10" y="10" width="400" height="40" fill="#87CEEB" rx="10"></rect>
        <text x="20" y="30" font-size="24" font-family="Arial" fill="#000">Q-Learning</text>
        <text x="20" y="60" font-size="18" font-family="Arial" fill="#000">A Model-Free, Off-Policy Temporal Difference Learning Algorithm</text>
    </section>

    <!-- The Q-Learning Update Rule Section -->
    <section class="section update-rule" data-narration="update-rule">
        <rect x="10" y="50" width="400" height="40" fill="#87CEEB" rx="10"></rect>
        <text x="20" y="70" font-size="18" font-family="Arial" fill="#000">Q(S_t, A_t) <- Q(S_t, A_t) + alpha * [R_{t+1} + gamma * max_a Q(S_{t+1}, a) - Q(S_t, A_t)]</text>
        <animate begin="0s" duration="2s" fill="freeze" attributeName="fill" from="#87CEEB" to="#C7B8EA" repeatCount="indefinite" />
    </section>

    <!-- Key Properties Section -->
    <section class="section key-properties" data-narration="key-properties">
        <rect x="10" y="50" width="400" height="40" fill="#8BC34A" rx="10"></rect>
        <text x="20" y="70" font-size="18" font-family="Arial" fill="#000">Off-Policy Learning</text>
        <text x="20" y="90" font-size="18" font-family="Arial" fill="#000">Model-Free Learning</text>
        <animate begin="2s" duration="2s" fill="freeze" attributeName="fill" from="#8BC34A" to="#C5CAE9" repeatCount="indefinite" />
    </section>

    <!-- Convergence Guarantees Section -->
    <section class="section convergence-guarantees" data-narration="convergence-guarantees">
        <rect x="10" y="50" width="400" height="40" fill="#2196F3" rx="10"></rect>
        <text x="20" y="70" font-size="18" font-family="Arial" fill="#000">Convergence Guarantees</text>
        <text x="20" y="90" font-size="18" font-family="Arial" fill="#000">Under certain conditions, Q-learning converges to Q*</text>
        <animate begin="4s" duration="2s" fill="freeze" attributeName="fill" from="#2196F3" to="#C3E6F5" repeatCount="indefinite" />
    </section>

    <!-- Q-Learning Algorithm Section -->
    <section class="section algorithm" data-narration="algorithm">
        <rect x="10" y="50" width="400" height="40" fill="#FF9800" rx="10"></rect>
        <text x="20" y="70" font-size="18" font-family="Arial" fill="#000">Q-Learning Algorithm</text>
        <text x="20" y="90" font-size="18" font-family="Arial" fill="#000">Initialize Q(s,a) arbitrarily for all s,a</text>
        <animate begin="6s" duration="2s" fill="freeze" attributeName="fill" from="#FF9800" to="#FFC400" repeatCount="indefinite" />
    </section>

    <!-- Comparison with Dynamic Programming Section -->
    <section class="section comparison" data-narration="comparison">
        <rect x="10" y="50" width="400" height="40" fill="#87CEEB" rx="10"></rect>
        <text x="20" y="70" font-size="18" font-family="Arial" fill="#000">Comparison with Dynamic Programming</text>
        <text x="20" y="90" font-size="18" font-family="Arial" fill="#000">| Aspect         | Dynamic Programming    | Q-Learning               |</text>
        <text x="20" y="110" font-size="18" font-family="Arial" fill="#000">| Model Required | Yes                    | No           |</text>
        <text x="20" y="130" font-size="18" font-family="Arial" fill="#000">|</text>
        <animate begin="8s" duration="2s" fill="freeze" attributeName="fill" from="#87CEEB" to="#C7B8EA" repeatCount="indefinite" />
    </section>

    <!-- Footer Section -->
    <footer>
        <rect x="10" y="350" width="400" height="50" fill="#87CEEB" rx="10"></rect>
        <text x="20" y="370" font-size="18" font-family="Arial" fill="#000">Learning</text>
    </footer>
</svg>