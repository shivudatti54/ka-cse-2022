<svg width="420" height="400" data-topic-id="comparison-with-boosting">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A288A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2E4053" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <style>
    text {
      fill: #fff;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
  </style>

  <title>Comparison Sorting Algorithms</title>

  <rect x="10" y="10" width="400" height="80" fill="url(#gradient)"/>

  <g transform="translate(10, 120)">
    <rect x="10" y="10" width="350" height="50" fill="#2E4053" rx="5"/>
    <text x="10" y="30" text-anchor="start" data-narration="Overview" fill="#fff">Overview</text>
    <animateTransform attributeName="transform" type="translate" from="0 120" to="0 140" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(10, 170)">
    <rect x="10" y="10" width="350" height="50" fill="#2E4053" rx="5"/>
    <text x="10" y="30" text-anchor="start" data-narration="Quick Sort Algorithm" fill="#fff">Quick Sort Algorithm</text>
    <rect x="10" y="60" width="300" height="30" fill="#7A288A" rx="5"/>
    <rect x="10" y="90" width="300" height="30" fill="#7A288A" rx="5"/>
    <text x="10" y="110" text-anchor="start" data-narration="Choose pivot. Partition: elements < pivot left, > pivot right. Recursively sort partitions" fill="#fff"/>
    <animateTransform attributeName="transform" type="translate" from="0 130" to="0 150" dur="2s" begin="0s"/>
  </g>

  <g transform="translate(10, 210)">
    <rect x="10" y="10" width="350" height="50" fill="#2E4053" rx="5"/>
    <text x="10" y="30" text-anchor="start" data-narration="Quick Sort Complexity" fill="#fff">Quick Sort Complexity</text>
    <rect x="10" y="60" width="300" height="30" fill="#7A288A" rx="5"/>
    <rect x="10" y="90" width="300" height="30" fill="#7A288A" rx="5"/>
    <text x="10" y="110" text-anchor="start" data-narration="Best/Average: O(n log n). Worst: O(n²)" fill="#fff"/>
    <text x="10" y="130" text-anchor="start" data-narration="Space: O(log n) stack" fill="#fff"/>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 170" dur="2s" begin="0s"/>
  </g>

  <g transform="translate(10, 250)">
    <rect x="10" y="10" width="350" height="50" fill="#2E4053" rx="5"/>
    <text x="10" y="30" text-anchor="start" data-narration="Merge Sort Algorithm" fill="#fff">Merge Sort Algorithm</text>
    <rect x="10" y="60" width="300" height="30" fill="#7A288A" rx="5"/>
    <rect x="10" y="90" width="300" height="30" fill="#7A288A" rx="5"/>
    <text x="10" y="110" text-anchor="start" data-narration="Divide array into halves. Recursively sort halves. Merge sorted halves" fill="#fff"/>
    <text x="10" y="130" text-anchor="start" data-narration="All cases: O(n log n). Space: O(n) for merging" fill="#fff"/>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 170" dur="2s" begin="0s"/>
  </g>

  <g transform="translate(10, 290)">
    <rect x="10" y="10" width="350" height="50" fill="#2E4053" rx="5"/>
    <text x="10" y="30" text-anchor="start" data-narration="Heap Sort Algorithm" fill="#fff">Heap Sort Algorithm</text>
    <rect x="10" y="60" width="300" height="30" fill="#7A288A" rx="5"/>
    <rect x="10" y="90" width="300" height="30" fill="#7A288A" rx="5"/>
    <text x="10" y="110" text-anchor="start" data-narration="Build max-heap. Extract max repeatedly" fill="#fff"/>
    <text x="10" y="130" text-anchor="start" data-narration="All cases: O(n log n). Space: O(1) in-place" fill="#fff"/>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 170" dur="2s" begin="0s"/>
  </g>

  <g transform="translate(10, 330)">
    <rect x="10" y="10" width="350" height="50" fill="#2E4053" rx="5"/>
    <text x="10" y="30" text-anchor="start" data-narration="Comparison Table" fill="#fff">Comparison Table</text>
    <rect x="10" y="60" width="300" height="30" fill="#7A288A" rx="5"/>
    <rect x="10" y="90" width="300" height="30" fill="#7A288A" rx="5"/>
    <text x="10" y="110" text-anchor="start" data-narration="| Sort  | Best       | Average    | Worst      | Space    | Stable |" fill="#fff"/>
    <text x="10" y="130" text-anchor="start" data-narration="| Quick | O(n log n) | O(n log n) | O(n²)      | O(log n) | No     |" fill="#fff"/>
    <text x="10" y="150" text-anchor="start" data-narration="| Merge | O(n log n) | O(n log n) | O(n log n) | O(n)     | Yes    |" fill="#fff"/>
    <text x="10" y="170" text-anchor="start" data-narration="| Heap  | O(n log n) | O(n log n) | O(n log n) | O(1)     | No     |" fill="#fff"/>
    <animateTransform attributeName="transform" type="translate" from="0 170" to="0 190" dur="2s" begin="0s"/>
  </g>

  <footer>
    <text x="10" y="370" text-anchor="start" fill="#fff">Comparison With Boosting</text>
  </footer>
</svg>