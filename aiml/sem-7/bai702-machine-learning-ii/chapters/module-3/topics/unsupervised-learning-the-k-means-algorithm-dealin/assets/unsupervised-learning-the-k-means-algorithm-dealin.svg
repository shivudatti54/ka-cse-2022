<svg width="420" height="400" data-topic-id="unsupervised-learning-k-means-algorithm">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6c5ce7" stop-opacity="1"></stop>
            <stop offset="100%" stop-color="#3b5998" stop-opacity="1"></stop>
        </linearGradient>
    </defs>

    <!-- Introduction Section -->
    <section data-narration="Introduction to K-MEANS">
        <rect x="10" y="10" width="400" height="50" fill="#fff" rx="5"></rect>
        <text x="20" y="25" font-size="24" font-family="Arial" fill="#333" text-anchor="left">Unsupervised Learning: The K-MEANS Algorithm</text>
        <rect x="10" y="60" width="400" height="50" fill="#fff" rx="5"></rect>
        <text x="20" y="75" font-size="18" font-family="Arial" fill="#333" text-anchor="left">In this study material, we will delve into the K-MEANS algorithm, dealing with noise, building a k-MEANS neural network, normalization, and a better weight update rule.</text>
    </section>

    <!-- What is K-MEANS? Section -->
    <section data-narration="What is K-MEANS?">
        <rect x="10" y="120" width="400" height="50" fill="#fff" rx="5"></rect>
        <text x="20" y="135" font-size="18" font-family="Arial" fill="#333" text-anchor="left">K-MEANS is an unsupervised learning algorithm that groups similar data points into K clusters based on their features.</text>
        <rect x="10" y="170" width="400" height="50" fill="#fff" rx="5"></rect>
        <text x="20" y="185" font-size="18" font-family="Arial" fill="#333" text-anchor="left">The algorithm iteratively updates the cluster centroids until convergence.</text>
    </section>

    <!-- How K-MEANS Works Section -->
    <section data-narration="How K-MEANS Works">
        <rect x="10" y="220" width="400" height="50" fill="#fff" rx="5"></rect>
        <text x="20" y="235" font-size="18" font-family="Arial" fill="#333" text-anchor="left">1. Initialize K centroids randomly.</text>
        <rect x="10" y="270" width="400" height="50" fill="#fff" rx="5"></rect>
        <text x="20" y="285" font-size="18" font-family="Arial" fill="#333" text-anchor="left">2. Assign each data point to the closest centroid.</text>
        <rect x="10" y="320" width="400" height="50" fill="#fff" rx="5"></rect>
        <text x="20" y="335" font-size="18" font-family="Arial" fill="#333" text-anchor="left">3. Update the centroid of each cluster by taking the mean of all data points assigned to it.</text>
    </section>

    <!-- Key Concepts Section -->
    <section data-narration="Key Concepts">
        <rect x="10" y="370" width="400" height="50" fill="#fff" rx="5"></rect>
        <text x="20" y="385" font-size="18" font-family="Arial" fill="#333" text-anchor="left">- **Centroids**: The central point of each cluster.</text>
        <rect x="10" y="430" width="400" height="50" fill="#fff" rx="5"></rect>
        <text x="20" y="445" font-size="18" font-family="Arial" fill="#333" text-anchor="left">- **Distance**: The measure of how close a data point is to a centroid.</text>
        <rect x="10" y="480" width="400" height="50" fill="#fff" rx="5"></rect>
        <text x="20" y="495" font-size="18" font-family="Arial" fill="#333" text-anchor="left">- **Assignment**: The process of assigning a data point to a cluster based on its distance to the centroid.</text>
    </section>

    <!-- Dealing with Noise Section -->
    <section data-narration="Dealing with Noise">
        <rect x="10" y="530" width="400" height="50" fill="#fff" rx="5"></rect>
        <text x="20" y="545" font-size="18" font-family="Arial" fill="#333" text-anchor="left">- **Robust initialization**: Initialize the centroids using a robust method such as the median or interquartile range.</text>
    </section>

    <!-- Visualization Section -->
    <section data-narration="Visualization">
        <rect x="10" y="600" width="400" height="200" fill="#3b5998" rx="5"></rect>
        <rect x="10" y="130" width="400" height="100" fill="#6c5ce7" rx="5"></rect>
        <rect x="10" y="260" width="400" height="100" fill="#3b5998" rx="5"></rect>
        <rect x="10" y="390" width="400" height="100" fill="#6c5ce7" rx="5"></rect>
        <g transform="rotate(45 200 100)">
            <line x1="200" y1="100" x2="150" y2="50" stroke="#fff" stroke-width="2"></line>
            <line x1="200" y1="150" x2="250" y2="100" stroke="#fff" stroke-width="2"></line>
        </g>
    </section>

    <!-- Footer Section -->
    <footer>
        <rect x="10" y="380" width="400" height="30" fill="#fff" rx="5"></rect>
        <text x="20" y="395" font-size="18" font-family="Arial" fill="#333" text-anchor="left">Unsupervised Learning: The K-MEANS Algorithm</text>
    </footer>
</svg>