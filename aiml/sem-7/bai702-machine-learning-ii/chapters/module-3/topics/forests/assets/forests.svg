<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <text x="10" y="20" font-size="24" fill="#3498db" text-anchor="start">Forests</text>
  <rect x="15" y="50" width="380" height="300" fill="url(#pastel-gradient)"/>
  <g id="forest-structure">
    <g id="bootstrapping" data-topic-id="Forests in Machine Learning">
      <text x="10" y="70" font-size="18" fill="#2ecc71" text-anchor="start">Bootstrap Aggregating (Bagging)</text>
      <rect x="10" y="90" width="350" height="20" fill="#2ecc71" rx="5"/>
    </g>
    <g id="decision-trees" data-topic-id="Forests in Machine Learning">
      <text x="10" y="110" font-size="18" fill="#2ecc71" text-anchor="start">Decision Trees</text>
      <rect x="10" y="130" width="350" height="20" fill="#2ecc71" rx="5"/>
    </g>
    <g id="random-forest" data-topic-id="Forests in Machine Learning">
      <text x="10" y="150" font-size="18" fill="#2ecc71" text-anchor="start">Random Forest</text>
      <rect x="10" y="170" width="350" height="20" fill="#2ecc71" rx="5"/>
    </g>
    <g id="stumping" data-topic-id="Forests in Machine Learning">
      <text x="10" y="190" font-size="18" fill="#2ecc71" text-anchor="start">Stumping</text>
      <rect x="10" y="210" width="350" height="20" fill="#2ecc71" rx="5"/>
    </g>
    <g id="final-prediction" data-topic-id="Forests in Machine Learning">
      <text x="10" y="230" font-size="18" fill="#2ecc71" text-anchor="start">Final Prediction</text>
      <rect x="10" y="250" width="350" height="20" fill="#2ecc71" rx="5"/>
    </g>
    <g id="animation-forest-structure">
      <animate id="animation-forest-structure" attributeName="opacity" from="1" to="0" dur="2s" repeatCount="indefinite"/>
    </g>
    <g id="animation-bootstrapping">
      <animate id="animation-bootstrapping" attributeName="opacity" from="0" to="1" begin="0s" dur="1s"/>
      <animate id="animation-bootstrapping-2" attributeName="opacity" from="1" to="0" begin="1s" dur="1s"/>
    </g>
    <g id="animation-decision-trees">
      <animate id="animation-decision-trees" attributeName="opacity" from="0" to="1" begin="2s" dur="1s"/>
      <animate id="animation-decision-trees-2" attributeName="opacity" from="1" to="0" begin="2s" dur="1s"/>
    </g>
    <g id="animation-random-forest">
      <animate id="animation-random-forest" attributeName="opacity" from="0" to="1" begin="3s" dur="1s"/>
      <animate id="animation-random-forest-2" attributeName="opacity" from="1" to="0" begin="3s" dur="1s"/>
    </g>
    <g id="animation-stumping">
      <animate id="animation-stumping" attributeName="opacity" from="0" to="1" begin="4s" dur="1s"/>
      <animate id="animation-stumping-2" attributeName="opacity" from="1" to="0" begin="4s" dur="1s"/>
    </g>
    <g id="animation-final-prediction">
      <animate id="animation-final-prediction" attributeName="opacity" from="0" to="1" begin="5s" dur="1s"/>
      <animate id="animation-final-prediction-2" attributeName="opacity" from="1" to="0" begin="5s" dur="1s"/>
    </g>
  </g>
  <g id="footer">
    <text x="10" y="380" font-size="18" fill="#3498db" text-anchor="start">Data: Forests</text>
  </g>
</svg>