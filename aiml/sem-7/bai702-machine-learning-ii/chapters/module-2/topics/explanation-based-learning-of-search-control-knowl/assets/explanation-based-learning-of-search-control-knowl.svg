<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C2E4F4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title Section -->
  <g transform="translate(10, 20)">
    <text data-narration="Explanation-Based Learning of Search Control Knowledge" x="50" y="20" font-size="24" font-family="Arial, sans-serif" fill="#3498db">
      <tspan>Explanation-Based Learning of Search Control Knowledge</tspan>
    </text>
    <line x1="10" y1="40" x2="10" y2="60" stroke="#3498db" stroke-width="2" opacity="0.5"/>
    <line x1="410" y1="40" x2="410" y2="60" stroke="#3498db" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Section 1: Overview -->
  <g transform="translate(10, 70)">
    <rect x="0" y="0" width="400" height="100" fill="#f7f7f7" rx="10"/>
    <text data-topic-id="overview" data-narration="Overview" x="20" y="20" font-size="18" font-family="Arial, sans-serif" fill="#666">
      Overview
    </text>
    <line x1="10" y1="40" x2="10" y2="60" stroke="#3498db" stroke-width="2" opacity="0.5"/>
    <line x1="410" y1="40" x2="410" y2="60" stroke="#3498db" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Section 2: Motivation -->
  <g transform="translate(10, 170)">
    <rect x="0" y="0" width="400" height="100" fill="#f7f7f7" rx="10"/>
    <text data-topic-id="motivation" data-narration="Motivation" x="20" y="20" font-size="18" font-family="Arial, sans-serif" fill="#666">
      Motivation
    </text>
    <line x1="10" y1="40" x2="10" y2="60" stroke="#3498db" stroke-width="2" opacity="0.5"/>
    <line x1="410" y1="40" x2="410" y2="60" stroke="#3498db" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Section 3: Key Concepts -->
  <g transform="translate(10, 270)">
    <rect x="0" y="0" width="400" height="100" fill="#f7f7f7" rx="10"/>
    <text data-topic-id="key-concepts" data-narration="Key Concepts" x="20" y="20" font-size="18" font-family="Arial, sans-serif" fill="#666">
      Key Concepts
    </text>
    <line x1="10" y1="40" x2="10" y2="60" stroke="#3498db" stroke-width="2" opacity="0.5"/>
    <line x1="410" y1="40" x2="410" y2="60" stroke="#3498db" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Section 4: Sequential Covering Algorithm -->
  <g transform="translate(10, 370)">
    <rect x="0" y="0" width="400" height="100" fill="#f7f7f7" rx="10"/>
    <text data-topic-id="sequential-covering" data-narration="Sequential Covering Algorithm" x="20" y="20" font-size="18" font-family="Arial, sans-serif" fill="#666">
      Sequential Covering Algorithm
    </text>
    <line x1="10" y1="40" x2="10" y2="60" stroke="#3498db" stroke-width="2" opacity="0.5"/>
    <line x1="410" y1="40" x2="410" y2="60" stroke="#3498db" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Section 5: Example-Based Methods -->
  <g transform="translate(10, 470)">
    <rect x="0" y="0" width="400" height="100" fill="#f7f7f7" rx="10"/>
    <text data-topic-id="example-based-methods" data-narration="Example-Based Methods" x="20" y="20" font-size="18" font-family="Arial, sans-serif" fill="#666">
      Example-Based Methods
    </text>
    <line x1="10" y1="40" x2="10" y2="60" stroke="#3498db" stroke-width="2" opacity="0.5"/>
    <line x1="410" y1="40" x2="410" y2="60" stroke="#3498db" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Footer -->
  <g transform="translate(10, 570)">
    <rect x="0" y="0" width="400" height="50" fill="#f7f7f7" rx="10"/>
    <text x="20" y="20" font-size="18" font-family="Arial, sans-serif" fill="#666">
      Explanation-Based Learning of Search Control Knowledge
    </text>
    <line x1="10" y1="40" x2="10" y2="60" stroke="#3498db" stroke-width="2" opacity="0.5"/>
    <line x1="410" y1="40" x2="410" y2="60" stroke="#3498db" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Animation -->
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 200" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 300" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 400" dur="2s" repeatCount="indefinite"/>
</svg>