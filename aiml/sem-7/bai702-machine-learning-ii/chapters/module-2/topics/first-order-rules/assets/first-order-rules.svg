<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <defs>
    <linearGradient id="color-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A288A" stop-opacity="1"/>
      <stop offset="50%" stop-color="#3367D6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F7DC6F" stop-opacity="1"/>
    </linearGradient>
    <style>
      .topic-desc {
        font-size: 16px;
        color: #3367D6;
        font-family: Arial, sans-serif;
        margin-bottom: 10px;
      }
      .topic-desc strong {
        font-weight: bold;
      }
      .topic-desc em {
        font-style: italic;
      }
      .rule-desc {
        font-size: 14px;
        color: #F7DC6F;
        font-family: Arial, sans-serif;
        margin-bottom: 10px;
      }
      .rule-desc strong {
        font-weight: bold;
      }
    </style>
  </defs>
  <title>
    <text x="10" y="10" font-size="24" font-family="Arial, sans-serif" fill="#7A288A">First-Order Rules</text>
  </title>
  <rect x="10" y="40" width="400" height="300" fill="url(#color-gradient)"/>
  <g transform="translate(10, 40)">
    <text y="20" font-size="18" font-family="Arial, sans-serif" fill="#3367D6">What are First-Order Rules?</text>
    <text y="60" font-size="16" font-family="Arial, sans-serif" fill="#3367D6" class="topic-desc">First-order rules are a fundamental concept in machine learning and artificial intelligence.</text>
    <text y="100" font-size="18" font-family="Arial, sans-serif" fill="#3367D6">Definition:</text>
    <text y="120" font-size="16" font-family="Arial, sans-serif" fill="#3367D6" class="topic-desc">A first-order rule is a simple rule that consists of a condition and an action.</text>
    <text y="160" font-size="18" font-family="Arial, sans-serif" fill="#3367D6">Types of First-Order Rules:</text>
    <text y="180" font-size="16" font-family="Arial, sans-serif" fill="#3367D6" class="topic-desc">Simple First-Order Rules: single condition and action.</text>
    <text y="220" font-size="18" font-family="Arial, sans-serif" fill="#3367D6">Compound First-Order Rules: multiple conditions and actions.</text>
    <text y="240" font-size="16" font-family="Arial, sans-serif" fill="#3367D6" class="topic-desc">Examples of First-Order Rules:</text>
    <text y="260" font-size="18" font-family="Arial, sans-serif" fill="#3367D6">
      <animate attributeName="x" begin="0s" dur="2s" from="250" to="320"/>
      Temperature Rule: If it is hot outside, then wear a jacket.
    </text>
    <text y="280" font-size="18" font-family="Arial, sans-serif" fill="#3367D6">
      <animate attributeName="x" begin="2s" dur="2s" from="320" to="390"/>
      Recommendation Rule: If you like reading books, then recommend "To Kill a Mockingbird" to a friend.
    </text>
    <text y="300" font-size="18" font-family="Arial, sans-serif" fill="#3367D6">Applications of First-Order Rules:</text>
    <text y="320" font-size="16" font-family="Arial, sans-serif" fill="#3367D6" class="topic-desc">Inductive Learning, Decision Trees, Rule-based Systems.</text>
    <text y="360" font-size="18" font-family="Arial, sans-serif" fill="#3367D6">Conclusion:</text>
    <text y="380" font-size="16" font-family="Arial, sans-serif" fill="#3367D6" class="topic-desc">First-order rules are a fundamental concept in machine learning and artificial intelligence.</text>
    <rect x="10" y="400" width="400" height="10" fill="#F7DC6F"/>
    <text y="410" font-size="18" font-family="Arial, sans-serif" fill="#7A288A">Data-Topic-Id: first-order-rules</text>
  </g>
