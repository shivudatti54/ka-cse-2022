<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="inductive-analytical-approaches-to-learning" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <!-- Title -->
    <title>Inductive-Analytical Approaches to Learning</title>
    <!-- Gradient Background -->
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
            <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect fill="url(#gradient)" width="400" height="400" rx="10"/>
    <!-- Section 1: Introduction -->
    <g data-narration="Introduction">
        <rect x="10" y="50" width="400" height="100" fill="#FFFFFF" rx="10"/>
        <text x="20" y="70" font-size="24" font-family="Arial, sans-serif" fill="#333333">Introduction</text>
        <animateTransform attributeName="transform" type="translate" from="0,50" to="0,100" dur="2s" begin="0s"/>
    </g>
    <g data-narration="What are Inductive-Analytical Approaches to Learning?">
        <rect x="10" y="150" width="400" height="150" fill="#FFFFFF" rx="10"/>
        <text x="20" y="170" font-size="24" font-family="Arial, sans-serif" fill="#333333">What are Inductive-Analytical Approaches to Learning?</text>
        <animateTransform attributeName="transform" type="translate" from="0,150" to="0,200" dur="2s" begin="0s"/>
    </g>
    <!-- Section 2: Definitions -->
    <g data-narration="Inductive Reasoning">
        <rect x="10" y="300" width="400" height="150" fill="#FFFFFF" rx="10"/>
        <text x="20" y="320" font-size="24" font-family="Arial, sans-serif" fill="#333333">Inductive Reasoning</text>
        <animateTransform attributeName="transform" type="translate" from="0,300" to="0,350" dur="2s" begin="0s"/>
    </g>
    <g data-narration="Analytical Techniques">
        <rect x="10" y="450" width="400" height="150" fill="#FFFFFF" rx="10"/>
        <text x="20" y="470" font-size="24" font-family="Arial, sans-serif" fill="#333333">Analytical Techniques</text>
        <animateTransform attributeName="transform" type="translate" from="0,450" to="0,500" dur="2s" begin="0s"/>
    </g>
    <!-- Section 3: Example-Based Methods -->
    <g data-narration="Supervised Learning">
        <rect x="10" y="50" width="400" height="150" fill="#FFFFFF" rx="10"/>
        <text x="20" y="70" font-size="24" font-family="Arial, sans-serif" fill="#333333">Supervised Learning</text>
        <animateTransform attributeName="transform" type="translate" from="0,50" to="0,100" dur="2s" begin="0s"/>
    </g>
    <g data-narration="Unsupervised Learning">
        <rect x="10" y="250" width="400" height="150" fill="#FFFFFF" rx="10"/>
        <text x="20" y="270" font-size="24" font-family="Arial, sans-serif" fill="#333333">Unsupervised Learning</text>
        <animateTransform attributeName="transform" type="translate" from="0,250" to="0,300" dur="2s" begin="0.5s"/>
    </g>
    <g data-narration="Reinforcement Learning">
        <rect x="10" y="450" width="400" height="150" fill="#FFFFFF" rx="10"/>
        <text x="20" y="470" font-size="24" font-family="Arial, sans-serif" fill="#333333">Reinforcement Learning</text>
        <animateTransform attributeName="transform" type="translate" from="0,450" to="0,500" dur="2s" begin="1s"/>
    </g>
    <!-- Section 4: Sequential Covering Algorithms -->
    <g data-narration="Rule Induction">
        <rect x="10" y="50" width="400" height="150" fill="#FFFFFF" rx="10"/>
        <text x="20" y="70" font-size="24" font-family="Arial, sans-serif" fill="#333333">Rule Induction</text>
        <animateTransform attributeName="transform" type="translate" from="0,50" to="0,100" dur="2s" begin="0.5s"/>
    </g>
    <g data-narration="Decision Trees">
        <rect x="10" y="250" width="400" height="150" fill="#FFFFFF" rx="10"/>
        <text x="20" y="270" font-size="24" font-family="Arial, sans-serif" fill="#333333">Decision Trees</text>
        <animateTransform attributeName="transform" type="translate" from="0,250" to="0,300" dur="2s" begin="1s"/>
    </g>
    <!-- Footer -->
    <text x="20" y="380" font-size="24" font-family="Arial, sans-serif" fill="#333333">Inductive-Analytical Approaches to Learning</text>
</svg>