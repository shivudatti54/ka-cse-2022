<svg width="420" height="400" data-topic-id="Analytical-Learning-PERFECT-DOMAIN-THEORIES-Explan">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title and background rectangles -->
  <rect x="10" y="10" width="400" height="20" fill="#3498DB" stroke="#3498DB" stroke-width="2"/>
  <rect x="10" y="40" width="400" height="20" fill="#E74C3C" stroke="#E74C3C" stroke-width="2"/>
  <rect x="10" y="70" width="400" height="20" fill="#2ecc71" stroke="#2ecc71" stroke-width="2"/>
  <rect x="10" y="100" width="400" height="20" fill="#1abc9c" stroke="#1abc9c" stroke-width="2"/>
  <rect x="10" y="130" width="400" height="20" fill="#16a085" stroke="#16a085" stroke-width="2"/>
  <rect x="10" y="160" width="400" height="20" fill="#2c3e50" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- Title text -->
  <text x="15" y="15" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#fff">
    Analytical Learning
  </text>
  
  <!-- Section 1 -->
  <rect x="10" y="150" width="400" height="150" fill="#fff" stroke="#ddd" stroke-width="2">
    <animateTransform attributeName="transform" type="translate" from="0,150" to="0,220" dur="1s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="1" to="0" dur="0.5s" begin="0s" repeatCount="indefinite"/>
    <data-narration data="section1">Perfect Domain Theories (PDTs): A theoretical framework that represents a set of rules and explanations that describe the underlying structure of a domain.</data-narration>
  </rect>
  <text x="15" y="185" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">Perfect Domain Theories (PDTs)</text>
  <text x="15" y="215" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">A theoretical framework that represents a set of rules and explanations that describe the underlying structure of a domain.</text>
  <text x="15" y="245" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">Key Features:</text>
  <text x="15" y="265" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">- Compositional:</text>
  <text x="15" y="285" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">- Exhaustive:</text>
  <text x="15" y="305" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">- Logical:</text>
  <text x="15" y="325" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">Example:</text>
  <text x="15" y="345" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">- If the appliance is a refrigerator, then it is used for cooling.</text>
  <text x="15" y="365" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">- If the appliance is a vacuum cleaner, then it is used for cleaning.</text>
  <text x="150" y="295" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">Arrow marker for connections.</text>
  
  <!-- Section 2 -->
  <rect x="10" y="320" width="400" height="150" fill="#fff" stroke="#ddd" stroke-width="2">
    <animateTransform attributeName="transform" type="translate" from="0,320" to="0,470" dur="1s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="1" to="0" dur="0.5s" begin="0s" repeatCount="indefinite"/>
    <data-narration data="section2">Explanation-Based Learning (EBL): A machine learning approach that learns from explicit explanations and rules, rather than relying solely on data.</data-narration>
  </rect>
  <text x="15" y="355" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">Explanation-Based Learning (EBL)</text>
  <text x="15" y="375" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">A machine learning approach that learns from explicit explanations and rules, rather than relying solely on data.</text>
  <text x="15" y="395" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">Key Features:</text>
  <text x="15" y="415" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">- Rule-based:</text>
  <text x="15" y="435" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">- Explanatory:</text>
  <text x="15" y="455" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">- Analytical:</text>
  <text x="15" y="475" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">Example:</text>
  <text x="15" y="495" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">A EBL system for a domain of "medical diagnosis" might use a PDT to explain the diagnosis of a patient.</text>
  <text x="15" y="515" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">Arrow marker for connections.</text>
  
  <!-- Section 3 -->
  <rect x="10" y="680" width="400" height="150" fill="#fff" stroke="#ddd" stroke-width="2">
    <animateTransform attributeName="transform" type="translate" from="0,680" to="0,830" dur="1s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="1" to="0" dur="0.5s" begin="1s" repeatCount="indefinite"/>
    <data-narration data="section3">Types of Explanation-Based Learning:</data-narration>
  </rect>
  <text x="15" y="715" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">Types of Explanation-Based Learning</text>
  <text x="15" y="735" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">A EBL system for a domain of "medical diagnosis" might use a PDT to explain the diagnosis of a patient.</text>
  <text x="15" y="755" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">Arrow marker for connections.</text>
  <text x="15" y="775" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">Arrow marker for connections.</text>
  <text x="15" y="795" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">Arrow marker for connections.</text>
  
  <!-- Footer -->
  <rect x="10" y="835" width="400" height="20" fill="#3498DB" stroke="#3498DB" stroke-width="2"/>
  <text x="15" y="850" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#fff"> footer </text>
</svg>