  <line x1="20" y1="1180" x2="20" y2="1180" stroke="#3498db" stroke-width="2" arrowhead="none"/>
  <line x1="20" y1="1180" x2="20" y2="1180" stroke="#3498db" stroke-width="2" arrowhead="none"/>
  <line x1="20" y1="1180" x2="20" y2="1180" stroke="#3498db" stroke-width="2" arrowhead="none"/>
  <line x1="20" y1="1180" x2="20" y2="1180" stroke="#3498db" stroke-width="2" arrowhead="none"/>
  <line x1="20" y1="1180" x2="20" y2="1180" stroke="#3498db" stroke-width="2" arrowhead="none"/>

  <!-- Footer at bottom -->
  <rect x="10" y="3740" width="400" height="30" fill="#3498db" rx="5"/>
  <text x="20" y="3750" font-size="14" font-weight="normal" text-anchor="middle" fill="#ffffff">Made with love</text>
