  <text x="20" y="750" font-size="12" font-weight="normal" text-anchor="middle" fill="#666666" data-narration="Equivalence-based methods learn a set of rules by identifying equivalence classes in the learning data.">Equivalence-based methods learn a set of rules by identifying equivalence classes in the learning data.</text>
  <animateTransform attributeName="transform" type="translate" from="0 720" to="0 770" dur="500" begin="0s"/>
  <animateTransform attributeName="transform" type="translate" from="0 720" to="0 770" dur="500" begin="500ms"/>
  <animateTransform attributeName="transform" type="translate" from="0 720" to="0 820" dur="500" begin="1000ms"/>
  <animateTransform attributeName="transform" type="translate" from="0 720" to="0 870" dur="500" begin="1500ms"/>
  <animateTransform attributeName="transform" type="translate" from="0 720" to="0 920" dur="500" begin="2000ms"/>
