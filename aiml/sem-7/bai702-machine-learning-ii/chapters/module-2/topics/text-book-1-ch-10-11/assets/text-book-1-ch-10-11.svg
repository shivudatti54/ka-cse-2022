  <line x1="20" y1="770" x2="20" y2="820" stroke="#3498db" stroke-width="2" arrowhead="none"/>
  <line x1="20" y1="820" x2="20" y2="870" stroke="#3498db" stroke-width="2" arrowhead="none"/>
  <line x1="20" y1="870" x2="20" y2="920" stroke="#3498db" stroke-width="2" arrowhead="none"/>
  <line x1="20" y1="920" x2="20" y2="970" stroke="#3498db" stroke-width="2" arrowhead="none"/>
  <line x1="20" y1="970" x2="20" y2="1020" stroke="#3498db" stroke-width="2" arrowhead="none"/>

  <!-- Section 5: Cover-based Methods -->
  <rect x="10" y="1130" width="400" height="60" fill="#f7f7f7" rx="5"/>
  <rect x="10" y="1130" width="350" height="50" fill="#3498db" rx="5"/>
  <text x="20" y="1145" font-size="14" font-weight="normal" text-anchor="middle" fill="#666666">Cover-based Methods</text>
  <text x="20" y="1160" font-size="12" font-weight="normal" text-anchor="middle" fill="#666666" data-narration="Cover-based methods learn a set of rules by identifying the minimal number of rules to cover the learning data.">Cover-based methods learn a set of rules by identifying the minimal number of rules to cover the learning data.</text>
  <animateTransform attributeName="transform" type="translate" from="0 1130" to="0 1190" dur="500" begin="0s"/>
  <animateTransform attributeName="transform" type="translate" from="0 1130" to="0 1190" dur="500" begin="500ms"/>
  <animateTransform attributeName="transform" type="translate" from="0 1130" to="0 1190" dur="500" begin="1000ms"/>
  <animateTransform attributeName="transform" type="translate" from="0 1130" to="0 1190" dur="500" begin="1500ms"/>
  <animateTransform attributeName="transform" type="translate" from="0 1130" to="0 1190" dur="500" begin="2000ms"/>
  <animateTransform attributeName="transform" type="translate" from="0 1130" to="0 1190" dur="500" begin="2500ms"/>
  <animateTransform attributeName="transform" type="translate" from="0 1130" to="0 1190" dur="500" begin="3000ms"/>
