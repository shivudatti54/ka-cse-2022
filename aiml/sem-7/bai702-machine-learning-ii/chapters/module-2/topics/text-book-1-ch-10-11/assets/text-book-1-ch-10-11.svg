  <animateTransform attributeName="transform" type="translate" from="0 380" to="0 560" dur="500" begin="2000ms"/>
  <animateTransform attributeName="transform" type="translate" from="0 380" to="0 600" dur="500" begin="2500ms"/>
  <animateTransform attributeName="transform" type="translate" from="0 380" to="0 640" dur="500" begin="3000ms"/>
