<svg width="420" height="400" data-topic-id="machine-learning-ii-learning-sets-of-rules">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Title at top -->
  <rect x="10" y="10" width="400" height="20" fill="#3498db" rx="5"/>
  <text x="20" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffffff">Text Book 1 Ch 10 & 11</text>

  <!-- Section 1: Sequential Covering Algorithms -->
  <rect x="10" y="60" width="400" height="60" fill="#f7f7f7" rx="5"/>
  <rect x="10" y="60" width="350" height="50" fill="#3498db" rx="5"/>
  <text x="20" y="75" font-size="14" font-weight="normal" text-anchor="middle" fill="#666666">Sequential Covering Algorithms</text>
  <text x="20" y="90" font-size="12" font-weight="normal" text-anchor="middle" fill="#666666" data-narration="A sequential covering algorithm is a type of learning algorithm that generates a set of rules by sequentially adding rules to cover the learning data.">A sequential covering algorithm is a type of learning algorithm that generates a set of rules by sequentially adding rules to cover the learning data.</text>
  <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" dur="500" begin="0s"/>
  <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" dur="500" begin="500ms"/>
  <animateTransform attributeName="transform" type="translate" from="0 50" to="0 150" dur="500" begin="1000ms"/>
  <animateTransform attributeName="transform" type="translate" from="0 50" to="0 200" dur="500" begin="1500ms"/>
  <animateTransform attributeName="transform" type="translate" from="0 50" to="0 250" dur="500" begin="2000ms"/>
  <animateTransform attributeName="transform" type="translate" from="0 50" to="0 300" dur="500" begin="2500ms"/>
  <animateTransform attributeName="transform" type="translate" from="0 50" to="0 350" dur="500" begin="3000ms"/>
  <line x1="20" y1="60" x2="20" y2="110" stroke="#3498db" stroke-width="2" arrowhead="none"/>
  <line x1="20" y1="110" x2="20" y2="160" stroke="#3498db" stroke-width="2" arrowhead="none"/>

