  <text x="20" y="250" font-size="12" font-weight="normal" text-anchor="middle" fill="#666666" data-narration="There are two types of sequential covering algorithms: Ride and Quinlan.">There are two types of sequential covering algorithms: Ride and Quinlan.</text>
  <animateTransform attributeName="transform" type="translate" from="0 220" to="0 280" dur="500" begin="0s"/>
  <animateTransform attributeName="transform" type="translate" from="0 220" to="0 280" dur="500" begin="500ms"/>
  <animateTransform attributeName="transform" type="translate" from="0 220" to="0 340" dur="500" begin="1000ms"/>
