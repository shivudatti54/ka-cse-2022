  <text x="20" y="410" font-size="12" font-weight="normal" text-anchor="middle" fill="#666666" data-narration="Example-based methods learn a set of rules by analyzing a set of examples.">Example-based methods learn a set of rules by analyzing a set of examples.</text>
  <animateTransform attributeName="transform" type="translate" from="0 380" to="0 440" dur="500" begin="0s"/>
  <animateTransform attributeName="transform" type="translate" from="0 380" to="0 440" dur="500" begin="500ms"/>
