<svg width="420" height="400" data-topic-id="Foil-A-First-Order-Inductive-Learner">
    <defs>
        <style>
            .title {
                font-size: 24px;
                font-weight: bold;
                color: #3498db;
            }
            .footer {
                font-size: 14px;
                color: #666;
            }
            .section {
                margin-bottom: 20px;
            }
            .data-narration {
                font-size: 18px;
                font-weight: bold;
                color: #2ecc71;
            }
            .example {
                background-color: #f7f7f7;
                padding: 20px;
                border: 1px solid #ddd;
                border-radius: 10px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            .rule {
                background-color: #2ecc71;
                color: #fff;
                padding: 10px;
                border-radius: 10px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            .transition {
                transition: all 0.5s ease-in-out;
            }
        </style>
    </defs>
    <title class="title">FOIL: A First-Order Inductive Learner</title>
    <g transform="translate(10, 10)">
        <rect x="0" y="0" width="400" height="380" fill="#d9d9d9"/>
        <rect x="0" y="0" width="400" height="10" fill="#3498db" class="transition"/>
        <text x="20" y="50" class="data-narration">What is FOIL?</text>
        <animateTransform attributeName="x" from="20" to="20" dur="1.5s" begin="0s"/>
        <animateTransform attributeName="y" from="50" to="70" dur="1.5s" begin="0s"/>
        <rect x="100" y="60" width="200" height="20" fill="#3498db" class="transition"/>
        <text x="120" y="80" class="data-narration">FOIL is a type of inductive learning algorithm.</text>
        <animateTransform attributeName="x" from="120" to="120" dur="1.5s" begin="1.5s"/>
        <animateTransform attributeName="y" from="80" to="100" dur="1.5s" begin="1.5s"/>
        <rect x="100" y="120" width="200" height="150" fill="#3498db" class="transition"/>
        <text x="120" y="140" class="data-narration">It is particularly effective for learning first-order logic rules.</text>
        <animateTransform attributeName="x" from="120" to="120" dur="1.5s" begin="3s"/>
        <animateTransform attributeName="y" from="140" to="160" dur="1.5s" begin="3s"/>
        <rect x="100" y="170" width="200" height="50" fill="#3498db" class="transition"/>
        <text x="120" y="190" class="data-narration">Here's how FOIL works:</text>
        <animateTransform attributeName="x" from="120" to="120" dur="1.5s" begin="4.5s"/>
        <animateTransform attributeName="y" from="190" to="210" dur="1.5s" begin="4.5s"/>
        <rect x="100" y="220" width="200" height="50" fill="#3498db" class="transition"/>
        <text x="120" y="240" class="data-narration">Initialization, example generation, rule generation, rule evaluation, and rule refining.</text>
        <animateTransform attributeName="x" from="120" to="120" dur="1.5s" begin="6s"/>
        <animateTransform attributeName="y" from="240" to="260" dur="1.5s" begin="6s"/>
        <rect x="100" y="280" width="200" height="50" fill="#3498db" class="transition"/>
        <text x="120" y="300" class="data-narration">Suppose we want to learn a rule for identifying positive and negative reviews.</text>
        <animateTransform attributeName="x" from="120" to="120" dur="1.5s" begin="7.5s"/>
        <animateTransform attributeName="y" from="300" to="320" dur="1.5s" begin="7.5s"/>
        <rect x="100" y="340" width="200" height="50" fill="#3498db" class="transition"/>
        <text x="120" y="360" class="data-narration">We have the following examples:</text>
        <animateTransform attributeName="x" from="120" to="120" dur="1.5s" begin="9s"/>
        <animateTransform attributeName="y" from="360" to="380" dur="1.5s" begin="9s"/>
        <rect x="100" y="400" width="200" height="50" fill="#2ecc71" class="rule transition"/>
        <text x="120" y="420" class="data-narration">We can use FOIL to learn a rule as follows:</text>
        <animateTransform attributeName="x" from="120" to="120" dur="1.5s" begin="10.5s"/>
        <animateTransform attributeName="y" from="420" to="440" dur="1.5s" begin="10.5s"/>
        <rect x="100" y="460" width="200" height="50" fill="#2ecc71" class="rule transition"/>
        <text x="120" y="480" class="data-narration">FOIL is a powerful tool for learning first-order logic rules.</text>
        <animateTransform attributeName="x" from="120" to="120" dur="1.5s" begin="12s"/>
        <animateTransform attributeName="y" from="480" to="500" dur="1.5s" begin="12s"/>
        <rect x="0" y="530" width="400" height="30" fill="#3498db" class="transition"/>
        <text x="20" y="550" class="data-narration">Conclusion.</text>
        <animateTransform attributeName="x" from="20" to="20" dur="1.5s" begin="13.5s"/>
        <animateTransform attributeName="y" from="550" to="570" dur="1.5s" begin="13.5s"/>
        <rect x="0" y="610" width="400" height="10" fill="#3498db" class="transition"/>
    </g>
    <footer class="footer">FOIL: A First-Order Inductive Learner</footer>
</svg>