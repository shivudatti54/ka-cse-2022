<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to the main thread in Java">
    <text x="50" y="50" font-size="24" fill="#2563eb">Main Thread in Java</text>
    <rect x="50" y="100" width="200" height="50" fill="#2563eb" rx="10"/>
    <text x="60" y="135" font-size="18" fill="#ffffff">Thread</text>
  </g>
  <g id="step1" data-narration="Getting a reference to the main thread">
    <use href="#step0" x="0" y="0"/>
    <rect x="300" y="100" width="200" height="50" fill="#10b981" rx="10"/>
    <text x="310" y="135" font-size="18" fill="#ffffff">Thread.currentThread()</text>
    <line x1="250" y1="125" x2="300" y2="125" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <g id="step2" data-narration="Displaying thread information">
    <use href="#step1" x="0" y="0"/>
    <rect x="550" y="100" width="200" height="50" fill="#f59e0b" rx="10"/>
    <text x="560" y="135" font-size="18" fill="#ffffff">System.out.println()</text>
    <line x1="500" y1="125" x2="550" y2="125" stroke="#8b5cf6" stroke-width="2"/>
    <text x="300" y="200" font-size="18" fill="#2563eb">Thread Name: main</text>
    <text x="300" y="250" font-size="18" fill="#2563eb">Priority: 5</text>
    <text x="300" y="300" font-size="18" fill="#2563eb">Thread ID: 1</text>
  </g>
  <g id="step3" data-narration="Changing the name of the main thread">
    <use href="#step2" x="0" y="0"/>
    <rect x="50" y="350" width="200" height="50" fill="#10b981" rx="10"/>
    <text x="60" y="385" font-size="18" fill="#ffffff">mainThread.setName()</text>
    <line x1="250" y1="375" x2="300" y2="375" stroke="#8b5cf6" stroke-width="2"/>
    <text x="300" y="450" font-size="18" fill="#2563eb">Thread Name: MyMainThread</text>
  </g>
  <g id="step4" data-narration="Putting the main thread to sleep">
    <use href="#step3" x="0" y="0"/>
    <rect x="500" y="350" width="200" height="50" fill="#f59e0b" rx="10"/>
    <text x="510" y="385" font-size="18" fill="#ffffff">Thread.sleep()</text>
    <line x1="450" y1="375" x2="500" y2="375" stroke="#8b5cf6" stroke-width="2"/>
    <text x="500" y="450" font-size="18" fill="#2563eb">Slept for 2 seconds</text>
  </g>
  <g id="step5" data-narration="Handling thread interruption">
    <use href="#step4" x="0" y="0"/>
    <rect x="300" y="500" width="200" height="50" fill="#2563eb" rx="10"/>
    <text x="310" y="535" font-size="18" fill="#ffffff">catch (InterruptedException)</text>
    <line x1="250" y1="525" x2="300" y2="525" stroke="#8b5cf6" stroke-width="2"/>
    <text x="300" y="600" font-size="18" fill="#2563eb">Main thread interrupted</text>
  </g>
</svg>