<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="blue-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1e40ff" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="green-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="1"/>
      <stop offset="100%" stop-color="#14da5e" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="orange-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffc107" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="purple-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Synchronization">
    <rect x="50" y="50" width="700" height="100" fill="#2563eb" rx="10"/>
    <text x="100" y="120" font-size="24" font-family="Arial" fill="#ffffff">Synchronization</text>
    <text x="100" y="160" font-size="18" font-family="Arial" fill="#ffffff">Introduction to the concept of synchronization in operating systems</text>
  </g>
  <g id="step1" data-narration="The Need for Synchronization">
    <rect x="50" y="200" width="700" height="100" fill="#10b981" rx="10"/>
    <text x="100" y="270" font-size="24" font-family="Arial" fill="#ffffff">The Need for Synchronization</text>
    <text x="100" y="310" font-size="18" font-family="Arial" fill="#ffffff">Concurrent execution of processes/threads accessing shared resources can lead to race conditions</text>
    <line x1="100" y1="250" x2="100" y2="200" stroke="#10b981" stroke-width="2"/>
  </g>
  <g id="step2" data-narration="Critical Section Problem">
    <rect x="50" y="350" width="700" height="100" fill="#f59e0b" rx="10"/>
    <text x="100" y="420" font-size="24" font-family="Arial" fill="#ffffff">Critical Section Problem</text>
    <text x="100" y="460" font-size="18" font-family="Arial" fill="#ffffff">The segment of code where a shared resource is accessed is called the critical section</text>
    <line x1="100" y1="400" x2="100" y2="350" stroke="#f59e0b" stroke-width="2"/>
    <line x1="100" y1="300" x2="100" y2="250" stroke="#10b981" stroke-width="2"/>
  </g>
  <g id="step3" data-narration="Conditions for Synchronization">
    <rect x="50" y="500" width="700" height="100" fill="#8b5cf6" rx="10"/>
    <text x="100" y="570" font-size="24" font-family="Arial" fill="#ffffff">Conditions for Synchronization</text>
    <text x="100" y="610" font-size="18" font-family="Arial" fill="#ffffff">Mutual Exclusion, Progress, and Bounded Waiting</text>
    <line x1="100" y1="550" x2="100" y2="500" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="100" y1="450" x2="100" y2="400" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <g id="step4" data-narration="Semaphore Introduction">
    <rect x="50" y="50" width="200" height="50" fill="#2563eb" rx="10" transform="translate(0, 50)"/>
    <text x="100" y="120" font-size="24" font-family="Arial" fill="#ffffff">Semaphore</text>
    <text x="100" y="160" font-size="18" font-family="Arial" fill="#ffffff">A synchronization tool for controlling access to a common resource</text>
    <line x1="150" y1="100" x2="250" y2="100" stroke="#2563eb" stroke-width="2"/>
  </g>
  <g id="step5" data-narration="Wait and Signal Operations">
    <rect x="250" y="50" width="200" height="50" fill="#10b981" rx="10" transform="translate(0, 50)"/>
    <text x="300" y="120" font-size="24" font-family="Arial" fill="#ffffff">Wait and Signal</text>
    <text x="300" y="160" font-size="18" font-family="Arial" fill="#ffffff">Atomic operations for decrementing and incrementing the semaphore value</text>
    <line x1="300" y1="100" x2="400" y2="100" stroke="#10b981" stroke-width="2"/>
    <line x1="250" y1="100" x2="150" y2="100" stroke="#2563eb" stroke-width="2"/>
  </g>
  <g id="step6" data-narration="Example Use Case">
    <rect x="450" y="50" width="200" height="50" fill="#f59e0b" rx="10" transform="translate(0, 50)"/>
    <text x="500" y="120" font-size="24" font-family="Arial" fill="#ffffff">Example Use Case</text>
    <text x="500" y="160" font-size="18" font-family="Arial" fill="#ffffff">Multiple processes accessing a shared resource using semaphores for synchronization</text>
    <line x1="500" y1="100" x2="600" y2="100" stroke="#f59e0b" stroke-width="2"/>
    <line x1="450" y1="100" x2="300" y2="100" stroke="#10b981" stroke-width="2"/>
  </g>
  <g id="step7" data-narration="Benefits of Semaphores">
    <rect x="650" y="50" width="200" height="50" fill="#8b5cf6" rx="10" transform="translate(0, 50)"/>
    <text x="700" y="120" font-size="24" font-family="Arial" fill="#ffffff">Benefits of Semaphores</text>
    <text x="700" y="160" font-size="18" font-family="Arial" fill="#ffffff">Efficient synchronization, mutual exclusion, and bounded waiting</text>
    <line x1="700" y1="100" x2="550" y2="100" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="650" y1="100" x2="500" y2="100" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <g id="step8" data-narration="Conclusion">
    <rect x="375" y="250" width="200" height="50" fill="#2563eb" rx="10"/>
    <text x="425" y="280" font-size="24" font-family="Arial" fill="#ffffff">Conclusion</text>
    <text x="425" y="310" font-size="18" font-family="Arial" fill="#ffffff">Semaphores provide a powerful mechanism for synchronization in operating systems</text>
    <line x1="425" y1="260" x2="425" y2="210" stroke="#2563eb" stroke-width="2"/>
    <line x1="425" y1="260" x2="700" y2="100" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="425" y1="260" x2="500" y2="100" stroke="#f59e0b" stroke-width="2"/>
    <line x1="425" y1="260" x2="300" y2="100" stroke="#10b981" stroke-width="2"/>
    <line x1="425" y1="260" x2="150" y2="100" stroke="#2563eb" stroke-width="2"/>
  </g>
</svg>