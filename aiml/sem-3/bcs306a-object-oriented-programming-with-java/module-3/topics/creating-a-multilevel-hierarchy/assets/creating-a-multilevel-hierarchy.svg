<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to the concept of multilevel hierarchy">
    <rect x="50" y="50" width="200" height="100" fill="#2563eb" rx="10"/>
    <text x="60" y="120" font-size="24" fill="#ffffff" font-family="Arial">Grandparent Class</text>
  </g>
  <g id="step1" data-narration="Creating the Grandparent Class as the superclass">
    <rect x="50" y="50" width="200" height="100" fill="#2563eb" rx="10"/>
    <text x="60" y="120" font-size="24" fill="#ffffff" font-family="Arial">Grandparent Class</text>
    <rect x="300" y="50" width="200" height="100" fill="#10b981" rx="10"/>
    <text x="310" y="120" font-size="24" fill="#ffffff" font-family="Arial">Parent Class</text>
    <line x1="250" y1="75" x2="300" y2="75" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step2" data-narration="Extending the Parent Class from the Grandparent Class">
    <rect x="50" y="50" width="200" height="100" fill="#2563eb" rx="10"/>
    <text x="60" y="120" font-size="24" fill="#ffffff" font-family="Arial">Grandparent Class</text>
    <rect x="300" y="50" width="200" height="100" fill="#10b981" rx="10"/>
    <text x="310" y="120" font-size="24" fill="#ffffff" font-family="Arial">Parent Class</text>
    <line x1="250" y1="75" x2="300" y2="75" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="275" y="90" font-size="18" fill="#8b5cf6" font-family="Arial">Inheritance</text>
  </g>
  <g id="step3" data-narration="Creating the Child Class as a subclass of the Parent Class">
    <rect x="50" y="50" width="200" height="100" fill="#2563eb" rx="10"/>
    <text x="60" y="120" font-size="24" fill="#ffffff" font-family="Arial">Grandparent Class</text>
    <rect x="300" y="50" width="200" height="100" fill="#10b981" rx="10"/>
    <text x="310" y="120" font-size="24" fill="#ffffff" font-family="Arial">Parent Class</text>
    <line x1="250" y1="75" x2="300" y2="75" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="275" y="90" font-size="18" fill="#8b5cf6" font-family="Arial">Inheritance</text>
    <rect x="550" y="50" width="200" height="100" fill="#f59e0b" rx="10"/>
    <text x="560" y="120" font-size="24" fill="#ffffff" font-family="Arial">Child Class</text>
    <line x1="500" y1="75" x2="550" y2="75" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step4" data-narration="Establishing the multilevel hierarchy">
    <rect x="50" y="50" width="200" height="100" fill="#2563eb" rx="10"/>
    <text x="60" y="120" font-size="24" fill="#ffffff" font-family="Arial">Grandparent Class</text>
    <rect x="300" y="50" width="200" height="100" fill="#10b981" rx="10"/>
    <text x="310" y="120" font-size="24" fill="#ffffff" font-family="Arial">Parent Class</text>
    <line x1="250" y1="75" x2="300" y2="75" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="275" y="90" font-size="18" fill="#8b5cf6" font-family="Arial">Inheritance</text>
    <rect x="550" y="50" width="200" height="100" fill="#f59e0b" rx="10"/>
    <text x="560" y="120" font-size="24" fill="#ffffff" font-family="Arial">Child Class</text>
    <line x1="500" y1="75" x2="550" y2="75" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="400" y="150" font-size="24" fill="#8b5cf6" font-family="Arial">Multilevel Hierarchy</text>
  </g>
  <g id="step5" data-narration="Understanding the relationships between classes">
    <rect x="50" y="50" width="200" height="100" fill="#2563eb" rx="10"/>
    <text x="60" y="120" font-size="24" fill="#ffffff" font-family="Arial">Grandparent Class</text>
    <rect x="300" y="50" width="200" height="100" fill="#10b981" rx="10"/>
    <text x="310" y="120" font-size="24" fill="#ffffff" font-family="Arial">Parent Class</text>
    <line x1="250" y1="75" x2="300" y2="75" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="275" y="90" font-size="18" fill="#8b5cf6" font-family="Arial">Inheritance</text>
    <rect x="550" y="50" width="200" height="100" fill="#f59e0b" rx="10"/>
    <text x="560" y="120" font-size="24" fill="#ffffff" font-family="Arial">Child Class</text>
    <line x1="500" y1="75" x2="550" y2="75" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="400" y="150" font-size="24" fill="#8b5cf6" font-family="Arial">Multilevel Hierarchy</text>
    <text x="100" y="250" font-size="18" fill="#2563eb" font-family="Arial">Grandparent -> Parent -> Child</text>
  </g>
</svg>