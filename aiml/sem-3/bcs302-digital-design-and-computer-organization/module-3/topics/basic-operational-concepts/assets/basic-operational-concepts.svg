<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="basic-operational-concepts">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#26c6da"/>
      <stop offset="100%" stop-color="#0097a7"/>
    </linearGradient>
  </defs>

  <g data-narration="During the fetch phase, the Program Counter provides the memory address of the next instruction. That instruction is then loaded from main memory into the Instruction Register for processing.">
    <rect x="20" y="20" width="180" height="80" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="42" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Fetch Phase</text>
    <text x="110" y="58" text-anchor="middle" fill="#e0e0ff" font-size="9">Program Counter provides address</text>
    <text x="110" y="70" text-anchor="middle" fill="#e0e0ff" font-size="9">Instruction loaded from memory</text>
    <text x="110" y="82" text-anchor="middle" fill="#e0e0ff" font-size="9">into Instruction Register</text>
    <polygon points="35,44 45,38 45,50" fill="#e0e0ff" stroke="none"/>
    <line x1="45" y1="44" x2="58" y2="44" stroke="#e0e0ff" stroke-width="1.5"/>
  </g>

  <g data-narration="In the decode phase, the Control Unit examines the opcode field of the fetched instruction. It determines which operation to perform and identifies the operands or memory addresses involved.">
    <rect x="220" y="20" width="180" height="80" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1b5e20" stroke-width="2"/>
    <text x="310" y="42" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Decode Phase</text>
    <text x="310" y="58" text-anchor="middle" fill="#e0ffe0" font-size="9">Control Unit interprets opcode</text>
    <text x="310" y="70" text-anchor="middle" fill="#e0ffe0" font-size="9">Determines operation type</text>
    <text x="310" y="82" text-anchor="middle" fill="#e0ffe0" font-size="9">and identifies operands</text>
    <circle cx="242" cy="45" r="7" fill="none" stroke="#e0ffe0" stroke-width="1.5"/>
    <line x1="242" y1="40" x2="242" y2="50" stroke="#e0ffe0" stroke-width="1.2"/>
    <line x1="242" y1="45" x2="247" y2="48" stroke="#e0ffe0" stroke-width="1.2"/>
  </g>

  <g data-narration="During the execute phase, the Arithmetic Logic Unit carries out the specified operation on the data. The result is then stored back into a designated register or written to a memory location.">
    <rect x="20" y="120" width="180" height="80" rx="10" ry="10" fill="url(#redGrad)" stroke="#880e4f" stroke-width="2"/>
    <text x="110" y="142" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Execute Phase</text>
    <text x="110" y="158" text-anchor="middle" fill="#ffe0e0" font-size="9">ALU performs the operation</text>
    <text x="110" y="170" text-anchor="middle" fill="#ffe0e0" font-size="9">Result stored in register</text>
    <text x="110" y="182" text-anchor="middle" fill="#ffe0e0" font-size="9">or written to memory</text>
    <polygon points="35,150 50,142 50,158" fill="none" stroke="#ffe0e0" stroke-width="1.3"/>
    <line x1="50" y1="150" x2="62" y2="150" stroke="#ffe0e0" stroke-width="1.5"/>
  </g>

  <g data-narration="Four key registers drive instruction processing. The Program Counter holds the next instruction address, the Instruction Register stores the current instruction, the Memory Address Register holds the target address, and the Memory Buffer Register holds data being transferred.">
    <rect x="220" y="120" width="180" height="80" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#bf360c" stroke-width="2"/>
    <text x="310" y="140" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Key Registers</text>
    <text x="248" y="155" text-anchor="start" fill="#fff3e0" font-size="8">PC - Next instruction address</text>
    <text x="248" y="166" text-anchor="start" fill="#fff3e0" font-size="8">IR - Current instruction held</text>
    <text x="248" y="177" text-anchor="start" fill="#fff3e0" font-size="8">MAR - Memory address target</text>
    <text x="248" y="188" text-anchor="start" fill="#fff3e0" font-size="8">MBR - Data transfer buffer</text>
    <rect x="232" y="152" width="12" height="8" rx="2" ry="2" fill="none" stroke="#fff3e0" stroke-width="1"/>
    <rect x="232" y="163" width="12" height="8" rx="2" ry="2" fill="none" stroke="#fff3e0" stroke-width="1"/>
    <rect x="232" y="174" width="12" height="8" rx="2" ry="2" fill="none" stroke="#fff3e0" stroke-width="1"/>
    <rect x="232" y="185" width="12" height="8" rx="2" ry="2" fill="none" stroke="#fff3e0" stroke-width="1"/>
  </g>

  <text x="210" y="225" text-anchor="middle" fill="#1a237e" font-size="15" font-weight="bold">Fetch-Decode-Execute Cycle</text>

  <g data-narration="The complete fetch-decode-execute cycle repeats continuously. The Program Counter sends an address to memory, the instruction is fetched and decoded, the ALU executes it, and the Program Counter increments to point to the next instruction.">
    <rect x="20" y="260" width="380" height="120" rx="10" ry="10" fill="url(#tealGrad)" stroke="#006064" stroke-width="2"/>
    <text x="210" y="278" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Complete Instruction Cycle Flow</text>

    <rect x="40" y="290" width="65" height="30" rx="6" ry="6" fill="#80deea" stroke="white" stroke-width="1"/>
    <text x="72" y="303" text-anchor="middle" fill="#006064" font-size="8" font-weight="bold">Program</text>
    <text x="72" y="313" text-anchor="middle" fill="#006064" font-size="8" font-weight="bold">Counter</text>

    <line x1="105" y1="305" x2="125" y2="305" stroke="white" stroke-width="2"/>
    <polygon points="122,301 130,305 122,309" fill="white"/>

    <rect x="130" y="290" width="55" height="30" rx="6" ry="6" fill="#80deea" stroke="white" stroke-width="1"/>
    <text x="157" y="308" text-anchor="middle" fill="#006064" font-size="8" font-weight="bold">Fetch</text>

    <line x1="185" y1="305" x2="205" y2="305" stroke="white" stroke-width="2"/>
    <polygon points="202,301 210,305 202,309" fill="white"/>

    <rect x="210" y="290" width="55" height="30" rx="6" ry="6" fill="#80deea" stroke="white" stroke-width="1"/>
    <text x="237" y="308" text-anchor="middle" fill="#006064" font-size="8" font-weight="bold">Decode</text>

    <line x1="265" y1="305" x2="285" y2="305" stroke="white" stroke-width="2"/>
    <polygon points="282,301 290,305 282,309" fill="white"/>

    <rect x="290" y="290" width="55" height="30" rx="6" ry="6" fill="#80deea" stroke="white" stroke-width="1"/>
    <text x="317" y="308" text-anchor="middle" fill="#006064" font-size="8" font-weight="bold">Execute</text>

    <path d="M 345 310 Q 370 340 210 355 Q 50 340 50 320" fill="none" stroke="#ffcc80" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="50,323 46,316 54,316" fill="#ffcc80"/>
    <text x="210" y="348" text-anchor="middle" fill="#ffcc80" font-size="8">Cycle repeats - PC increments automatically</text>

    <rect x="135" y="355" width="50" height="18" rx="4" ry="4" fill="#80deea" stroke="white" stroke-width="1"/>
    <text x="160" y="367" text-anchor="middle" fill="#006064" font-size="7" font-weight="bold">Memory</text>

    <rect x="235" y="355" width="50" height="18" rx="4" ry="4" fill="#80deea" stroke="white" stroke-width="1"/>
    <text x="260" y="367" text-anchor="middle" fill="#006064" font-size="7" font-weight="bold">ALU</text>

    <line x1="157" y1="320" x2="157" y2="355" stroke="white" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="260" y1="320" x2="260" y2="355" stroke="white" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
</svg>