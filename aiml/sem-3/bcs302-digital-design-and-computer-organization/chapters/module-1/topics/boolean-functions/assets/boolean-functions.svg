<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Static Background -->
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">Boolean Functions</text>

  <!-- Step 0: Introduction -->
  <g id="step0" class="step" data-narration="Boolean functions are mathematical expressions operating on binary variables to produce binary output.">
    <rect x="200" y="60" width="400" height="50" fill="#e1f5fe" stroke="#0277bd" stroke-width="2" rx="8"/>
    <text x="400" y="85" text-anchor="middle" font-size="14" fill="#01579b">Mathematical foundation of digital circuits</text>
    <text x="400" y="102" text-anchor="middle" font-size="12" fill="#0277bd">Binary variables (0,1) with logical operators</text>
  </g>

  <!-- Step 1: Three Basic Operators -->
  <g id="step1" class="step" data-narration="Three fundamental Boolean operators are AND, OR, and NOT gates.">
    <rect x="80" y="130" width="190" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="175" y="155" text-anchor="middle" font-size="15" font-weight="bold" fill="#1976d2">AND (·)</text>
    <text x="175" y="175" text-anchor="middle" font-size="11" fill="#1565c0">Logical multiplication</text>
    <text x="175" y="192" text-anchor="middle" font-size="11" fill="#1565c0">Output 1 if ALL 1</text>

    <rect x="305" y="130" width="190" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="400" y="155" text-anchor="middle" font-size="15" font-weight="bold" fill="#ff9800">OR (+)</text>
    <text x="400" y="175" text-anchor="middle" font-size="11" fill="#f57c00">Logical addition</text>
    <text x="400" y="192" text-anchor="middle" font-size="11" fill="#f57c00">Output 1 if ANY 1</text>

    <rect x="530" y="130" width="190" height="80" fill="#fce4ec" stroke="#e91e63" stroke-width="2" rx="8"/>
    <text x="625" y="155" text-anchor="middle" font-size="15" font-weight="bold" fill="#e91e63">NOT (')</text>
    <text x="625" y="175" text-anchor="middle" font-size="11" fill="#c2185b">Logical inversion</text>
    <text x="625" y="192" text-anchor="middle" font-size="11" fill="#c2185b">Complements input</text>
  </g>

  <!-- Step 2: Function Definition -->
  <g id="step2" class="step" data-narration="A Boolean function defines relationships between binary inputs and output using algebraic expressions.">
    <rect x="150" y="230" width="500" height="70" fill="#fff8e1" stroke="#ffa000" stroke-width="2" rx="8"/>
    <text x="400" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#f57f17">Function Format</text>
    <text x="400" y="278" text-anchor="middle" font-size="13" fill="#f57f17">F(A, B, C, ...) = Boolean Expression</text>
    <text x="400" y="294" text-anchor="middle" font-size="11" fill="#f57f17">Example: F = A·B' (Output 1 when A=1 and B=0)</text>
  </g>

  <!-- Step 3: Truth Table Representation -->
  <g id="step3" class="step" data-narration="Truth tables list all possible input combinations and corresponding outputs for complete function specification.">
    <rect x="100" y="320" width="280" height="120" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="8"/>
    <text x="240" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">Truth Table</text>
    <text x="130" y="368" font-size="11" fill="#7b1fa2">Shows output for every</text>
    <text x="130" y="385" font-size="11" fill="#7b1fa2">input combination</text>
    <text x="130" y="405" font-size="11" fill="#7b1fa2">Complete specification</text>
    <text x="130" y="425" font-size="11" fill="#7b1fa2">of function behavior</text>
  </g>

  <!-- Step 4: Canonical Forms -->
  <g id="step4" class="step" data-narration="Boolean functions have two standard forms: Sum of Products and Product of Sums.">
    <rect x="420" y="320" width="330" height="120" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="585" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Canonical Forms</text>
    <text x="450" y="370" font-size="12" font-weight="bold" fill="#f57c00">1. Sum-of-Products (SOP):</text>
    <text x="460" y="388" font-size="11" fill="#f57c00">OR of AND terms (minterms)</text>
    <text x="450" y="410" font-size="12" font-weight="bold" fill="#f57c00">2. Product-of-Sums (POS):</text>
    <text x="460" y="428" font-size="11" fill="#f57c00">AND of OR terms (maxterms)</text>
  </g>

  <!-- Step 5: SOP Form -->
  <g id="step5" class="step" data-narration="Sum of Products form combines minterms from rows where output is one using OR operations.">
    <rect x="100" y="460" width="300" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="250" y="485" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">SOP: Minterms</text>
    <text x="130" y="505" font-size="11" fill="#1565c0">From rows where F = 1</text>
    <text x="130" y="522" font-size="11" fill="#1565c0">Each minterm = product</text>
    <text x="130" y="536" font-size="11" fill="#1565c0">Sum all with OR</text>
  </g>

  <!-- Step 6: POS Form -->
  <g id="step6" class="step" data-narration="Product of Sums form combines maxterms from rows where output is zero using AND operations.">
    <rect x="440" y="460" width="300" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="590" y="485" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">POS: Maxterms</text>
    <text x="470" y="505" font-size="11" fill="#2e7d32">From rows where F = 0</text>
    <text x="470" y="522" font-size="11" fill="#2e7d32">Each maxterm = sum</text>
    <text x="470" y="536" font-size="11" fill="#2e7d32">Product all with AND</text>
  </g>

  <!-- Step 7: Foundation -->
  <g id="step7" class="step" data-narration="Boolean functions are the mathematical backbone enabling all digital computation and circuit design.">
    <rect x="150" y="560" width="500" height="30" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="6"/>
    <text x="400" y="580" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Foundation of all digital systems and computer operations</text>
  </g>

  <!-- Arrow markers in defs -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
</svg>