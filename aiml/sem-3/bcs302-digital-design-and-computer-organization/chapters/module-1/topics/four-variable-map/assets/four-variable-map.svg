<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Static Background -->
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">Four-Variable K-Map</text>

  <!-- Step 0: Introduction -->
  <g id="step0" class="step" data-narration="The Karnaugh Map is a graphical method to simplify Boolean expressions using adjacent cell grouping.">
    <rect x="200" y="60" width="400" height="50" fill="#e1f5fe" stroke="#0277bd" stroke-width="2" rx="8"/>
    <text x="400" y="85" text-anchor="middle" font-size="14" fill="#01579b">Visual technique for minimizing Boolean functions</text>
    <text x="400" y="102" text-anchor="middle" font-size="12" fill="#0277bd">Reduces circuit complexity and cost</text>
  </g>

  <!-- Step 1: K-Map Structure -->
  <g id="step1" class="step" data-narration="A K-Map is a grid where each cell represents a minterm, arranged so adjacent cells differ by one variable.">
    <rect x="50" y="130" width="700" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="400" y="155" text-anchor="middle" font-size="15" font-weight="bold" fill="#1976d2">K-Map Structure</text>
    <text x="120" y="180" font-size="12" fill="#1565c0">• 2-Variable: 2×2 grid (4 cells)</text>
    <text x="120" y="200" font-size="12" fill="#1565c0">• 3-Variable: 2×4 grid (8 cells)</text>
    <text x="450" y="180" font-size="12" fill="#1565c0">• 4-Variable: 4×4 grid (16 cells)</text>
    <text x="450" y="200" font-size="12" fill="#1565c0">• Gray code ordering ensures adjacency</text>
  </g>

  <!-- Step 2: Gray Code Adjacency -->
  <g id="step2" class="step" data-narration="Gray code ordering ensures adjacent cells differ by only one bit, enabling variable elimination.">
    <rect x="100" y="240" width="250" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="225" y="265" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Gray Code Order</text>
    <text x="140" y="290" font-size="12" fill="#f57c00">00 → 01 → 11 → 10</text>
    <text x="140" y="310" font-size="11" fill="#f57c00">Adjacent: differ by 1 bit</text>
    <text x="140" y="328" font-size="11" fill="#f57c00">Enables simplification</text>
  </g>

  <!-- Step 3: Grouping Rules -->
  <g id="step3" class="step" data-narration="Groups must be rectangular, sized in powers of two, and as large as possible to maximize simplification.">
    <rect x="400" y="240" width="320" height="100" fill="#fce4ec" stroke="#e91e63" stroke-width="2" rx="8"/>
    <text x="560" y="265" text-anchor="middle" font-size="14" font-weight="bold" fill="#e91e63">Grouping Rules</text>
    <text x="420" y="285" font-size="11" fill="#c2185b">1. Size: 1, 2, 4, 8, 16 cells (powers of 2)</text>
    <text x="420" y="302" font-size="11" fill="#c2185b">2. Shape: Rectangular only</text>
    <text x="420" y="319" font-size="11" fill="#c2185b">3. Maximize size to eliminate variables</text>
    <text x="420" y="336" font-size="11" fill="#c2185b">4. Overlap allowed, cover all 1s</text>
  </g>

  <!-- Step 4: Wrap-around Property -->
  <g id="step4" class="step" data-narration="The K-Map has wrap-around property where edges are adjacent, forming a toroidal topology.">
    <rect x="100" y="360" width="600" height="70" fill="#fff8e1" stroke="#ffa000" stroke-width="2" rx="8"/>
    <text x="400" y="385" text-anchor="middle" font-size="14" font-weight="bold" fill="#f57f17">Wrap-Around Adjacency</text>
    <text x="400" y="405" text-anchor="middle" font-size="12" fill="#f57f17">Top row adjacent to bottom row</text>
    <text x="400" y="420" text-anchor="middle" font-size="12" fill="#f57f17">Leftmost column adjacent to rightmost column</text>
  </g>

  <!-- Step 5: Simplification Process -->
  <g id="step5" class="step" data-narration="Form groups of adjacent ones, eliminate changing variables, keep constant variables for each term.">
    <rect x="50" y="450" width="330" height="90" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="215" y="475" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Simplification Steps</text>
    <text x="80" y="495" font-size="11" fill="#f57c00">1. Plot minterms as 1s</text>
    <text x="80" y="512" font-size="11" fill="#f57c00">2. Form largest groups</text>
    <text x="80" y="529" font-size="11" fill="#f57c00">3. Eliminate changing variables</text>
  </g>

  <!-- Step 6: Result -->
  <g id="step6" class="step" data-narration="The simplified expression is the sum of product terms from each group, minimizing circuit gates.">
    <rect x="420" y="450" width="330" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="585" y="475" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Final SOP Expression</text>
    <text x="450" y="495" font-size="11" fill="#2e7d32">Each group → product term</text>
    <text x="450" y="512" font-size="11" fill="#2e7d32">OR all terms together</text>
    <text x="450" y="529" font-size="11" fill="#2e7d32">Minimal gate implementation</text>
  </g>

  <!-- Step 7: Benefits -->
  <g id="step7" class="step" data-narration="K-Maps provide intuitive visual simplification, reducing cost, power consumption, and improving circuit performance.">
    <rect x="150" y="555" width="500" height="35" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="6"/>
    <text x="400" y="578" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Benefits: Fewer gates, lower cost, faster circuits, reduced power</text>
  </g>

  <!-- Arrow markers in defs -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
</svg>