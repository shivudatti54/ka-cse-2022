<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">Digital Design Textbook Reference</text>

  <g id="step0" class="step" data-narration="This reference covers fundamental concepts in digital design from the primary textbook chapter nineteen.">
    <rect x="200" y="70" width="400" height="50" fill="#e1f5fe" stroke="#0277bd" stroke-width="2" rx="8"/>
    <text x="400" y="95" text-anchor="middle" font-size="15" fill="#01579b">Textbook Chapter Overview</text>
    <text x="400" y="113" text-anchor="middle" font-size="12" fill="#0277bd">Comprehensive study material and examples</text>
  </g>

  <g id="step1" class="step" data-narration="Sequential logic circuits maintain state and use memory elements like flip-flops for data storage.">
    <rect x="80" y="140" width="300" height="110" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="230" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Sequential Logic</text>
    <text x="100" y="195" font-size="11" fill="#1976d2">• State-dependent circuits</text>
    <text x="100" y="213" font-size="11" fill="#1976d2">• Memory elements (flip-flops)</text>
    <text x="100" y="231" font-size="11" fill="#1976d2">• Clock-driven operations</text>
  </g>

  <g id="step2" class="step" data-narration="Combinatorial logic produces outputs directly from current inputs without memory or state retention.">
    <rect x="440" y="140" width="300" height="110" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="590" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Combinatorial Logic</text>
    <text x="460" y="195" font-size="11" fill="#ff9800">• No memory elements</text>
    <text x="460" y="213" font-size="11" fill="#ff9800">• Output depends only on inputs</text>
    <text x="460" y="231" font-size="11" fill="#ff9800">• Logic gates and circuits</text>
  </g>

  <g id="step3" class="step" data-narration="Microprocessor design integrates logic circuits to create programmable processing units for computation.">
    <rect x="80" y="280" width="300" height="110" fill="#fce4ec" stroke="#e91e63" stroke-width="2" rx="8"/>
    <text x="230" y="308" text-anchor="middle" font-size="14" font-weight="bold" fill="#e91e63">Microprocessor Design</text>
    <text x="100" y="335" font-size="11" fill="#e91e63">• CPU architecture</text>
    <text x="100" y="353" font-size="11" fill="#e91e63">• Instruction execution</text>
    <text x="100" y="371" font-size="11" fill="#e91e63">• Control and data paths</text>
  </g>

  <g id="step4" class="step" data-narration="Logic gates are the fundamental building blocks implementing Boolean operations in digital circuits.">
    <rect x="440" y="280" width="300" height="110" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="8"/>
    <text x="590" y="308" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">Logic Gates</text>
    <text x="460" y="335" font-size="11" fill="#9c27b0">• AND, OR, NOT gates</text>
    <text x="460" y="353" font-size="11" fill="#9c27b0">• NAND, NOR universal gates</text>
    <text x="460" y="371" font-size="11" fill="#9c27b0">• XOR for comparisons</text>
  </g>

  <g id="step5" class="step" data-narration="Digital circuits combine gates and components to implement complex functions and computational tasks.">
    <rect x="80" y="420" width="300" height="110" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="230" y="448" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Digital Circuits</text>
    <text x="100" y="475" font-size="11" fill="#388e3c">• Adders and multipliers</text>
    <text x="100" y="493" font-size="11" fill="#388e3c">• Multiplexers and decoders</text>
    <text x="100" y="511" font-size="11" fill="#388e3c">• Memory and registers</text>
  </g>

  <g id="step6" class="step" data-narration="This chapter provides comprehensive coverage of digital design principles essential for computer organization.">
    <rect x="440" y="420" width="300" height="110" fill="#fff8e1" stroke="#ffa000" stroke-width="2" rx="8"/>
    <text x="590" y="448" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffa000">Chapter Summary</text>
    <text x="460" y="475" font-size="11" fill="#ffa000">• Core design principles</text>
    <text x="460" y="493" font-size="11" fill="#ffa000">• Practical examples</text>
    <text x="460" y="511" font-size="11" fill="#ffa000">• Exercise problems</text>
  </g>

  <g id="step7" class="step" data-narration="Understanding these fundamentals enables students to design and analyze complex digital systems effectively.">
    <rect x="100" y="550" width="600" height="35" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="6"/>
    <text x="400" y="573" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Master these concepts for digital design proficiency</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
</svg>
