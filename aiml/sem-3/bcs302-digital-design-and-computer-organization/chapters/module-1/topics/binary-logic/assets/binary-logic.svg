<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Static Background -->
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a1a1a">Binary Logic: Foundation of Digital Systems</text>

  <!-- Step 0: Introduction -->
  <g id="step0" class="step" data-narration="Binary logic is a two-state system using one and zero, representing true or false values in digital circuits.">
    <rect x="250" y="80" width="300" height="60" fill="#e1f5fe" stroke="#0277bd" stroke-width="2" rx="8"/>
    <text x="400" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="#01579b">Binary System</text>
    <text x="400" y="128" text-anchor="middle" font-size="14" fill="#0277bd">Two States: 1 (TRUE) and 0 (FALSE)</text>
  </g>

  <!-- Step 1: Three Basic Operations -->
  <g id="step1" class="step" data-narration="Binary logic has three fundamental operations: AND, OR, and NOT gates.">
    <rect x="80" y="160" width="180" height="70" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="170" y="185" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">AND</text>
    <text x="170" y="205" text-anchor="middle" font-size="12" fill="#1565c0">Symbol: A · B</text>
    <text x="170" y="220" text-anchor="middle" font-size="11" fill="#1565c0">Output 1 if ALL are 1</text>

    <rect x="310" y="160" width="180" height="70" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="400" y="185" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff9800">OR</text>
    <text x="400" y="205" text-anchor="middle" font-size="12" fill="#f57c00">Symbol: A + B</text>
    <text x="400" y="220" text-anchor="middle" font-size="11" fill="#f57c00">Output 1 if ANY is 1</text>

    <rect x="540" y="160" width="180" height="70" fill="#fce4ec" stroke="#e91e63" stroke-width="2" rx="8"/>
    <text x="630" y="185" text-anchor="middle" font-size="16" font-weight="bold" fill="#e91e63">NOT</text>
    <text x="630" y="205" text-anchor="middle" font-size="12" fill="#c2185b">Symbol: A'</text>
    <text x="630" y="220" text-anchor="middle" font-size="11" fill="#c2185b">Output is INVERTED</text>
  </g>

  <!-- Step 2: AND Gate Truth Table -->
  <g id="step2" class="step" data-narration="The AND gate outputs one only when both inputs A and B are one, otherwise it outputs zero.">
    <rect x="80" y="250" width="180" height="120" fill="#e3f2fd" stroke="#1976d2" stroke-width="3" rx="8"/>
    <text x="170" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">AND Truth Table</text>
    <line x1="100" y1="285" x2="240" y2="285" stroke="#1976d2" stroke-width="1"/>
    <text x="110" y="300" font-size="11" fill="#1565c0">A  B  │  A·B</text>
    <text x="110" y="320" font-size="11" fill="#1565c0">0  0  │   0</text>
    <text x="110" y="335" font-size="11" fill="#1565c0">0  1  │   0</text>
    <text x="110" y="350" font-size="11" fill="#1565c0">1  0  │   0</text>
    <text x="110" y="365" font-size="11" font-weight="bold" fill="#1976d2">1  1  │   1</text>
  </g>

  <!-- Step 3: OR Gate Truth Table -->
  <g id="step3" class="step" data-narration="The OR gate outputs one if at least one input is one, and outputs zero only when all inputs are zero.">
    <rect x="310" y="250" width="180" height="120" fill="#fff3e0" stroke="#ff9800" stroke-width="3" rx="8"/>
    <text x="400" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">OR Truth Table</text>
    <line x1="330" y1="285" x2="470" y2="285" stroke="#ff9800" stroke-width="1"/>
    <text x="340" y="300" font-size="11" fill="#f57c00">A  B  │  A+B</text>
    <text x="340" y="320" font-size="11" font-weight="bold" fill="#ff9800">0  0  │   0</text>
    <text x="340" y="335" font-size="11" fill="#f57c00">0  1  │   1</text>
    <text x="340" y="350" font-size="11" fill="#f57c00">1  0  │   1</text>
    <text x="340" y="365" font-size="11" fill="#f57c00">1  1  │   1</text>
  </g>

  <!-- Step 4: NOT Gate Truth Table -->
  <g id="step4" class="step" data-narration="The NOT gate inverts the input, outputting one when input is zero and zero when input is one.">
    <rect x="540" y="250" width="180" height="120" fill="#fce4ec" stroke="#e91e63" stroke-width="3" rx="8"/>
    <text x="630" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#e91e63">NOT Truth Table</text>
    <line x1="560" y1="285" x2="700" y2="285" stroke="#e91e63" stroke-width="1"/>
    <text x="580" y="300" font-size="11" fill="#c2185b">A  │  A'</text>
    <text x="580" y="325" font-size="11" fill="#c2185b">0  │   1</text>
    <text x="580" y="350" font-size="11" fill="#c2185b">1  │   0</text>
  </g>

  <!-- Step 5: Universal Gates -->
  <g id="step5" class="step" data-narration="NAND and NOR are universal gates that can implement any logic function, making them crucial for circuit design.">
    <rect x="150" y="390" width="220" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="8"/>
    <text x="260" y="415" text-anchor="middle" font-size="16" font-weight="bold" fill="#9c27b0">NAND Gate</text>
    <text x="260" y="435" text-anchor="middle" font-size="12" fill="#7b1fa2">Function: (A·B)'</text>
    <text x="260" y="455" text-anchor="middle" font-size="11" fill="#7b1fa2">Output 0 only if all 1</text>

    <rect x="430" y="390" width="220" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="540" y="415" text-anchor="middle" font-size="16" font-weight="bold" fill="#388e3c">NOR Gate</text>
    <text x="540" y="435" text-anchor="middle" font-size="12" fill="#2e7d32">Function: (A+B)'</text>
    <text x="540" y="455" text-anchor="middle" font-size="11" fill="#2e7d32">Output 1 only if all 0</text>
  </g>

  <!-- Step 6: Universal Gate Property -->
  <g id="step6" class="step" data-narration="Universal gates can create any other gate, making them the most versatile building blocks in digital design.">
    <rect x="200" y="490" width="400" height="60" fill="#fff8e1" stroke="#ffa000" stroke-width="2" rx="8"/>
    <text x="400" y="515" text-anchor="middle" font-size="14" font-weight="bold" fill="#f57f17">Universal Gate Property</text>
    <text x="400" y="535" text-anchor="middle" font-size="12" fill="#f57f17">Can implement ANY logic function (AND, OR, NOT)</text>
  </g>

  <!-- Step 7: Summary -->
  <g id="step7" class="step" data-narration="Binary logic forms the foundation of all digital systems, from simple circuits to complex processors.">
    <circle cx="400" cy="575" r="20" fill="#4caf50" stroke="#2e7d32" stroke-width="2"/>
    <text x="400" y="581" text-anchor="middle" font-size="12" fill="white" font-weight="bold">✓</text>
    <text x="440" y="580" text-anchor="start" font-size="13" fill="#2e7d32" font-weight="bold">Foundation of Digital Design</text>
  </g>

  <!-- Arrow markers in defs -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
</svg>
