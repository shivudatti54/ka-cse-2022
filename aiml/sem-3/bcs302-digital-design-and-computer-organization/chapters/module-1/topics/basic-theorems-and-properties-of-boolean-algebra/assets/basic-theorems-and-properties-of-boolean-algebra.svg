<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Static Background -->
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">Boolean Algebra Theorems</text>

  <!-- Step 0: Introduction -->
  <g id="step0" class="step" data-narration="Boolean algebra is the mathematical foundation for digital circuits, operating on binary values one and zero.">
    <rect x="200" y="60" width="400" height="50" fill="#e1f5fe" stroke="#0277bd" stroke-width="2" rx="8"/>
    <text x="400" y="85" text-anchor="middle" font-size="14" fill="#01579b">Binary System: Variables can be 1 (TRUE) or 0 (FALSE)</text>
    <text x="400" y="102" text-anchor="middle" font-size="12" fill="#0277bd">Basic Operations: AND (·), OR (+), NOT (')</text>
  </g>

  <!-- Step 1: Single Variable Theorems -->
  <g id="step1" class="step" data-narration="Single variable theorems include identity, null, idempotency, complement, and involution laws.">
    <rect x="50" y="130" width="330" height="140" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="215" y="155" text-anchor="middle" font-size="15" font-weight="bold" fill="#1976d2">Single Variable Theorems</text>
    <text x="80" y="180" font-size="12" fill="#1565c0">Identity: A·1 = A, A+0 = A</text>
    <text x="80" y="200" font-size="12" fill="#1565c0">Null: A·0 = 0, A+1 = 1</text>
    <text x="80" y="220" font-size="12" fill="#1565c0">Idempotency: A·A = A, A+A = A</text>
    <text x="80" y="240" font-size="12" fill="#1565c0">Complement: A·A' = 0, A+A' = 1</text>
    <text x="80" y="260" font-size="12" fill="#1565c0">Involution: (A')' = A</text>
  </g>

  <!-- Step 2: Commutative and Associative Laws -->
  <g id="step2" class="step" data-narration="Commutative law states order does not matter, while associative law states grouping does not matter.">
    <rect x="420" y="130" width="330" height="140" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="585" y="155" text-anchor="middle" font-size="15" font-weight="bold" fill="#ff9800">Multi-Variable Laws</text>
    <text x="450" y="180" font-size="12" fill="#f57c00">Commutative:</text>
    <text x="460" y="200" font-size="11" fill="#f57c00">A·B = B·A, A+B = B+A</text>
    <text x="450" y="225" font-size="12" fill="#f57c00">Associative:</text>
    <text x="460" y="245" font-size="11" fill="#f57c00">A·(B·C) = (A·B)·C</text>
    <text x="460" y="260" font-size="11" fill="#f57c00">A+(B+C) = (A+B)+C</text>
  </g>

  <!-- Step 3: Distributive Law -->
  <g id="step3" class="step" data-narration="Distributive law shows how AND distributes over OR and OR distributes over AND in Boolean algebra.">
    <rect x="50" y="290" width="330" height="90" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="8"/>
    <text x="215" y="315" text-anchor="middle" font-size="15" font-weight="bold" fill="#9c27b0">Distributive Law</text>
    <text x="80" y="340" font-size="12" fill="#7b1fa2">AND over OR: A·(B+C) = (A·B)+(A·C)</text>
    <text x="80" y="365" font-size="12" fill="#7b1fa2">OR over AND: A+(B·C) = (A+B)·(A+C)</text>
  </g>

  <!-- Step 4: Absorption Theorem -->
  <g id="step4" class="step" data-narration="Absorption theorem eliminates redundant terms, simplifying A plus A times B to just A.">
    <rect x="420" y="290" width="330" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="585" y="315" text-anchor="middle" font-size="15" font-weight="bold" fill="#388e3c">Absorption Theorem</text>
    <text x="450" y="340" font-size="12" fill="#2e7d32">A + (A·B) = A</text>
    <text x="450" y="365" font-size="12" fill="#2e7d32">A · (A+B) = A</text>
  </g>

  <!-- Step 5: De Morgan's Theorems -->
  <g id="step5" class="step" data-narration="De Morgan's theorems are crucial for complementing expressions, converting between AND and OR operations.">
    <rect x="100" y="400" width="600" height="80" fill="#fce4ec" stroke="#e91e63" stroke-width="3" rx="8"/>
    <text x="400" y="425" text-anchor="middle" font-size="16" font-weight="bold" fill="#e91e63">De Morgan's Theorems</text>
    <text x="400" y="450" text-anchor="middle" font-size="13" fill="#c2185b">Theorem 1: (A·B)' = A' + B'</text>
    <text x="400" y="470" text-anchor="middle" font-size="13" fill="#c2185b">Theorem 2: (A+B)' = A' · B'</text>
  </g>

  <!-- Step 6: De Morgan's Rule -->
  <g id="step6" class="step" data-narration="To apply De Morgan's theorem, break the complement bar and change the operator from AND to OR or vice versa.">
    <rect x="150" y="495" width="500" height="50" fill="#fff8e1" stroke="#ffa000" stroke-width="2" rx="8"/>
    <text x="400" y="518" text-anchor="middle" font-size="13" font-weight="bold" fill="#f57f17">Rule: Break the bar, change the sign</text>
    <text x="400" y="535" text-anchor="middle" font-size="11" fill="#f57f17">(AND becomes OR, OR becomes AND, complement each variable)</text>
  </g>

  <!-- Step 7: Importance -->
  <g id="step7" class="step" data-narration="These theorems simplify logic expressions, leading to efficient digital circuits with fewer gates and lower cost.">
    <rect x="50" y="560" width="700" height="30" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="6"/>
    <text x="400" y="580" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Key Goal: Simplify circuits for efficiency, speed, and cost reduction</text>
  </g>

  <!-- Arrow markers in defs -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
</svg>
