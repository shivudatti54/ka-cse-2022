<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Static Background -->
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a1a1a">IoT Logical Design</text>

  <!-- Step 0: Introduction -->
  <g id="step0" class="step" data-narration="IoT logical design focuses on how the system operates, describing data flow and component interactions.">
    <text x="400" y="100" text-anchor="middle" font-size="16" fill="#333">Logical Design defines the functional architecture of IoT systems</text>
    <text x="400" y="130" text-anchor="middle" font-size="14" fill="#666">Focus: How the system works, not what hardware is used</text>
  </g>

  <!-- Step 1: Four Core Functional Blocks -->
  <g id="step1" class="step" data-narration="An IoT system consists of four main functional blocks that work together in sequence.">
    <rect x="50" y="160" width="150" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="125" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Device &amp;</text>
    <text x="125" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Sensing Layer</text>

    <rect x="230" y="160" width="150" height="60" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="305" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Communication</text>
    <text x="305" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Block</text>

    <rect x="410" y="160" width="150" height="60" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="8"/>
    <text x="485" y="182" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Data Storage &amp;</text>
    <text x="485" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Processing</text>
    <text x="485" y="215" text-anchor="middle" font-size="12" fill="#9c27b0">(Cloud)</text>

    <rect x="590" y="160" width="150" height="60" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="665" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Application &amp;</text>
    <text x="665" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Interface</text>
  </g>

  <!-- Step 2: Device and Sensing Block Details -->
  <g id="step2" class="step" data-narration="The device layer contains sensors that collect data, actuators that perform actions, and microcontrollers that manage everything.">
    <rect x="50" y="250" width="150" height="100" fill="#e3f2fd" stroke="#1976d2" stroke-width="3" rx="8"/>
    <text x="125" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Device Layer</text>
    <text x="125" y="295" text-anchor="middle" font-size="12" fill="#1565c0">• Sensors (input)</text>
    <text x="125" y="315" text-anchor="middle" font-size="12" fill="#1565c0">• Actuators (output)</text>
    <text x="125" y="335" text-anchor="middle" font-size="12" fill="#1565c0">• Microcontrollers</text>
  </g>

  <!-- Step 3: Communication Block Details -->
  <g id="step3" class="step" data-narration="Communication protocols like Bluetooth, WiFi, and LoRaWAN transfer data between devices, gateways, and the cloud.">
    <rect x="230" y="250" width="150" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="3" rx="8"/>
    <text x="305" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Communication</text>
    <text x="305" y="295" text-anchor="middle" font-size="12" fill="#f57c00">• WiFi, Bluetooth</text>
    <text x="305" y="315" text-anchor="middle" font-size="12" fill="#f57c00">• LoRaWAN, Zigbee</text>
    <text x="305" y="335" text-anchor="middle" font-size="12" fill="#f57c00">• IoT Gateways</text>
  </g>

  <!-- Step 4: Data Storage and Processing -->
  <g id="step4" class="step" data-narration="The cloud handles data ingestion, stores information in databases, and processes data for real-time or batch analysis.">
    <rect x="410" y="250" width="150" height="100" fill="#f3e5f5" stroke="#9c27b0" stroke-width="3" rx="8"/>
    <text x="485" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">Cloud Backend</text>
    <text x="485" y="295" text-anchor="middle" font-size="12" fill="#7b1fa2">• Data Ingestion</text>
    <text x="485" y="315" text-anchor="middle" font-size="12" fill="#7b1fa2">• Database Storage</text>
    <text x="485" y="335" text-anchor="middle" font-size="12" fill="#7b1fa2">• Real-time Analysis</text>
  </g>

  <!-- Step 5: Application and Interface -->
  <g id="step5" class="step" data-narration="The application layer provides user dashboards, mobile apps, and APIs for monitoring and controlling IoT devices.">
    <rect x="590" y="250" width="150" height="100" fill="#e8f5e9" stroke="#388e3c" stroke-width="3" rx="8"/>
    <text x="665" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">User Interface</text>
    <text x="665" y="295" text-anchor="middle" font-size="12" fill="#2e7d32">• Dashboards</text>
    <text x="665" y="315" text-anchor="middle" font-size="12" fill="#2e7d32">• Mobile Apps</text>
    <text x="665" y="335" text-anchor="middle" font-size="12" fill="#2e7d32">• APIs</text>
  </g>

  <!-- Step 6: Data Flow with Arrows -->
  <g id="step6" class="step" data-narration="Data flows sequentially from sensors through communication networks to cloud processing and finally to user applications.">
    <line x1="200" y1="190" x2="230" y2="190" stroke="#1976d2" stroke-width="3" marker-end="url(#arrowhead)"/>
    <line x1="380" y1="190" x2="410" y2="190" stroke="#ff9800" stroke-width="3" marker-end="url(#arrowhead)"/>
    <line x1="560" y1="190" x2="590" y2="190" stroke="#9c27b0" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="400" y="245" text-anchor="middle" font-size="12" fill="#666" font-style="italic">Continuous Data Flow →</text>
  </g>

  <!-- Step 7: MQTT Protocol -->
  <g id="step7" class="step" data-narration="MQTT is the standard IoT protocol using a publish-subscribe model with publishers, subscribers, and a central broker.">
    <rect x="100" y="380" width="600" height="80" fill="#fff8e1" stroke="#ffa000" stroke-width="2" rx="8"/>
    <text x="400" y="405" text-anchor="middle" font-size="16" font-weight="bold" fill="#f57f17">MQTT Protocol</text>
    <circle cx="200" cy="435" r="20" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="200" y="440" text-anchor="middle" font-size="11" fill="#1976d2">Publisher</text>

    <circle cx="400" cy="435" r="20" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="440" text-anchor="middle" font-size="11" fill="#ff9800">Broker</text>

    <circle cx="600" cy="435" r="20" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="600" y="440" text-anchor="middle" font-size="11" fill="#388e3c">Subscriber</text>

    <line x1="220" y1="435" x2="380" y2="435" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="420" y1="435" x2="580" y2="435" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Step 8: IoT Levels -->
  <g id="step8" class="step" data-narration="IoT systems are categorized into six levels based on complexity, from single-node devices to large-scale multi-node deployments.">
    <rect x="50" y="480" width="700" height="90" fill="#e1f5fe" stroke="#0277bd" stroke-width="2" rx="8"/>
    <text x="400" y="505" text-anchor="middle" font-size="16" font-weight="bold" fill="#01579b">IoT System Levels (1-6)</text>
    <text x="100" y="530" text-anchor="start" font-size="12" fill="#0277bd">Level 1: Single node</text>
    <text x="250" y="530" text-anchor="start" font-size="12" fill="#0277bd">Level 2: Cloud processing</text>
    <text x="430" y="530" text-anchor="start" font-size="12" fill="#0277bd">Level 3: With gateway</text>
    <text x="100" y="550" text-anchor="start" font-size="12" fill="#0277bd">Level 4: Multiple nodes</text>
    <text x="270" y="550" text-anchor="start" font-size="12" fill="#0277bd">Level 5: Coordinator node</text>
    <text x="450" y="550" text-anchor="start" font-size="12" fill="#0277bd">Level 6: Smart city scale</text>
  </g>

  <!-- Arrow markers in defs -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
</svg>
