<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">Digital Logic Gates</text>

  <g id="step0" class="step" data-narration="Logic gates are electronic circuits implementing Boolean operations, the building blocks of digital systems.">
    <rect x="200" y="70" width="400" height="50" fill="#e1f5fe" stroke="#0277bd" stroke-width="2" rx="8"/>
    <text x="400" y="95" text-anchor="middle" font-size="15" fill="#01579b">Physical Implementation of Boolean Logic</text>
    <text x="400" y="113" text-anchor="middle" font-size="12" fill="#0277bd">Seven fundamental gates for digital design</text>
  </g>
  <g id="step1" class="step" data-narration="Three basic gates are AND, OR, and NOT, forming the foundation of all digital logic.">
    <rect x="80" y="140" width="300" height="110" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="230" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Basic Gates</text>
    <text x="100" y="195" font-size="11" fill="#1976d2">• AND: Output 1 if ALL inputs 1</text>
    <text x="100" y="213" font-size="11" fill="#1976d2">• OR: Output 1 if ANY input 1</text>
    <text x="100" y="231" font-size="11" fill="#1976d2">• NOT: Inverts the input</text>
  </g>
  <g id="step2" class="step" data-narration="NAND and NOR are universal gates, capable of implementing any Boolean function.">
    <rect x="440" y="140" width="300" height="110" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="590" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Universal Gates</text>
    <text x="460" y="195" font-size="11" fill="#ff9800">• NAND: NOT-AND operation</text>
    <text x="460" y="213" font-size="11" fill="#ff9800">• NOR: NOT-OR operation</text>
    <text x="460" y="231" font-size="11" fill="#ff9800">• Can implement any function</text>
  </g>
  <g id="step3" class="step" data-narration="XOR and XNOR gates compare inputs, outputting based on equality or difference.">
    <rect x="80" y="280" width="300" height="110" fill="#fce4ec" stroke="#e91e63" stroke-width="2" rx="8"/>
    <text x="230" y="308" text-anchor="middle" font-size="14" font-weight="bold" fill="#e91e63">XOR Gates</text>
    <text x="100" y="335" font-size="11" fill="#e91e63">• XOR: Output 1 if different</text>
    <text x="100" y="353" font-size="11" fill="#e91e63">• XNOR: Output 1 if same</text>
    <text x="100" y="371" font-size="11" fill="#e91e63">• Used in comparisons</text>
  </g>
  <g id="step4" class="step" data-narration="Gates have important characteristics like fan-in, fan-out, and propagation delay for design.">
    <rect x="440" y="280" width="300" height="110" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="8"/>
    <text x="590" y="308" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">Gate Characteristics</text>
    <text x="460" y="335" font-size="11" fill="#9c27b0">• Fan-in: Number of inputs</text>
    <text x="460" y="353" font-size="11" fill="#9c27b0">• Fan-out: Drive capability</text>
    <text x="460" y="371" font-size="11" fill="#9c27b0">• Propagation delay (ns)</text>
  </g>
  <g id="step5" class="step" data-narration="Truth tables provide complete specifications showing outputs for all input combinations.">
    <rect x="80" y="420" width="300" height="110" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="230" y="448" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Truth Tables</text>
    <text x="100" y="475" font-size="11" fill="#388e3c">• Complete specification</text>
    <text x="100" y="493" font-size="11" fill="#388e3c">• All input combinations</text>
    <text x="100" y="511" font-size="11" fill="#388e3c">• Corresponding outputs</text>
  </g>
  <g id="step6" class="step" data-narration="Gates are packaged in integrated circuits, with multiple gates in single chips for efficiency.">
    <rect x="440" y="420" width="300" height="110" fill="#fff8e1" stroke="#ffa000" stroke-width="2" rx="8"/>
    <text x="590" y="448" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffa000">IC Implementation</text>
    <text x="460" y="475" font-size="11" fill="#ffa000">• 74xx series (TTL)</text>
    <text x="460" y="493" font-size="11" fill="#ffa000">• 74HCxx (CMOS)</text>
    <text x="460" y="511" font-size="11" fill="#ffa000">• Multiple gates per chip</text>
  </g>
  <g id="step7" class="step" data-narration="Logic gates convert Boolean algebra into physical circuits enabling all digital computation.">
    <rect x="100" y="550" width="600" height="35" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="6"/>
    <text x="400" y="573" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Seven main gates: AND, OR, NOT, NAND, NOR, XOR, XNOR - Foundation of digital design</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
</svg>