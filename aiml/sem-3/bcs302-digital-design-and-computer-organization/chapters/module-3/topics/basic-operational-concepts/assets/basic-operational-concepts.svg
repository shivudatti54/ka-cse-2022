<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">Basic Operational Concepts</text>

  <g id="step0" class="step" data-narration="The fetch-decode-execute cycle is the fundamental operation sequence of all computer processors.">
    <rect x="200" y="70" width="400" height="50" fill="#e1f5fe" stroke="#0277bd" stroke-width="2" rx="8"/>
    <text x="400" y="95" text-anchor="middle" font-size="15" fill="#01579b">CPU Instruction Execution Cycle</text>
    <text x="400" y="113" text-anchor="middle" font-size="12" fill="#0277bd">How computers process instructions</text>
  </g>
  <g id="step1" class="step" data-narration="CPU components like Program Counter, Instruction Register, and memory registers coordinate instruction execution.">
    <rect x="80" y="140" width="300" height="110" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="230" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Key CPU Components</text>
    <text x="100" y="195" font-size="11" fill="#1976d2">• PC: Program Counter</text>
    <text x="100" y="213" font-size="11" fill="#1976d2">• IR: Instruction Register</text>
    <text x="100" y="231" font-size="11" fill="#1976d2">• MAR, MDR: Memory registers</text>
  </g>
  <g id="step2" class="step" data-narration="The fetch phase retrieves the next instruction from memory using the program counter address.">
    <rect x="440" y="140" width="300" height="110" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="590" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Fetch Phase</text>
    <text x="460" y="195" font-size="11" fill="#ff9800">• Read instruction from memory</text>
    <text x="460" y="213" font-size="11" fill="#ff9800">• Use PC address in MAR</text>
    <text x="460" y="231" font-size="11" fill="#ff9800">• Transfer to IR, increment PC</text>
  </g>
  <g id="step3" class="step" data-narration="The decode phase interprets the instruction, determining what operation to perform and which operands to use.">
    <rect x="80" y="280" width="300" height="110" fill="#fce4ec" stroke="#e91e63" stroke-width="2" rx="8"/>
    <text x="230" y="308" text-anchor="middle" font-size="14" font-weight="bold" fill="#e91e63">Decode Phase</text>
    <text x="100" y="335" font-size="11" fill="#e91e63">• Interpret instruction in IR</text>
    <text x="100" y="353" font-size="11" fill="#e91e63">• Identify operation type</text>
    <text x="100" y="371" font-size="11" fill="#e91e63">• Determine operands needed</text>
  </g>
  <g id="step4" class="step" data-narration="The execute phase performs the operation using the ALU and stores results in registers or memory.">
    <rect x="440" y="280" width="300" height="110" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="8"/>
    <text x="590" y="308" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">Execute Phase</text>
    <text x="460" y="335" font-size="11" fill="#9c27b0">• Perform the operation</text>
    <text x="460" y="353" font-size="11" fill="#9c27b0">• Activate ALU if needed</text>
    <text x="460" y="371" font-size="11" fill="#9c27b0">• Store result in register</text>
  </g>
  <g id="step5" class="step" data-narration="The system bus enables communication between CPU and memory through address, data, and control lines.">
    <rect x="80" y="420" width="300" height="110" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="230" y="448" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">System Bus</text>
    <text x="100" y="475" font-size="11" fill="#388e3c">• Address bus: Carries addresses</text>
    <text x="100" y="493" font-size="11" fill="#388e3c">• Data bus: Carries data</text>
    <text x="100" y="511" font-size="11" fill="#388e3c">• Control bus: Carries signals</text>
  </g>
  <g id="step6" class="step" data-narration="This cycle repeats continuously, automatically advancing through program instructions for complete execution.">
    <rect x="440" y="420" width="300" height="110" fill="#fff8e1" stroke="#ffa000" stroke-width="2" rx="8"/>
    <text x="590" y="448" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffa000">Continuous Cycle</text>
    <text x="460" y="475" font-size="11" fill="#ffa000">• Repeats for each instruction</text>
    <text x="460" y="493" font-size="11" fill="#ffa000">• PC advances automatically</text>
    <text x="460" y="511" font-size="11" fill="#ffa000">• Enables program execution</text>
  </g>
  <g id="step7" class="step" data-narration="The fetch-decode-execute cycle is the heartbeat of computation, enabling all program execution.">
    <rect x="100" y="550" width="600" height="35" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="6"/>
    <text x="400" y="573" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Fetch-Decode-Execute: The fundamental cycle driving all computer operations</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
</svg>