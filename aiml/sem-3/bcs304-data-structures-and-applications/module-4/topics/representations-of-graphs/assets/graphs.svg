<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" data-topic-id="representations-of-graphs">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4a90e2"/><stop offset="100%" stop-color="#2c5aa0"/></linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#50c878"/><stop offset="100%" stop-color="#2e8b57"/></linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="100%" stop-color="#d32f2f"/></linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ffa726"/><stop offset="100%" stop-color="#f57c00"/></linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#9c27b0"/><stop offset="100%" stop-color="#6a1b9a"/></linearGradient>
  </defs>

  <g data-narration="Adjacency matrix is a two dimensional array of size V times V where each cell indicates whether an edge exists between vertices. It uses space order V squared and provides constant time edge lookup.">
    <rect x="20" y="20" width="180" height="80" rx="8" fill="url(#grad1)" opacity="0.9"/>
    <text x="110" y="45" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Adjacency Matrix</text>
    <text x="110" y="65" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">2D Array V x V</text>
    <text x="110" y="80" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Space: O(V squared)</text>
    <text x="110" y="95" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Edge Lookup: O(1)</text>
  </g>

  <g data-narration="Adjacency list uses an array of linked lists where each vertex maintains a list of its neighbors. This representation requires space order V plus E and is ideal for sparse graphs with few edges.">
    <rect x="220" y="20" width="180" height="80" rx="8" fill="url(#grad2)" opacity="0.9"/>
    <text x="310" y="45" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Adjacency List</text>
    <text x="310" y="65" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Array of Linked Lists</text>
    <text x="310" y="80" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Space: O(V + E)</text>
    <text x="310" y="95" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Good for Sparse Graphs</text>
  </g>

  <g data-narration="Adjacency multilist stores each edge only once with pointers linking to the next edge for both endpoints. This structure is particularly useful for marking and processing edges in undirected graphs efficiently.">
    <rect x="20" y="120" width="180" height="80" rx="8" fill="url(#grad3)" opacity="0.9"/>
    <text x="110" y="145" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Adjacency Multilist</text>
    <text x="110" y="165" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Edge Stored Once</text>
    <text x="110" y="180" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Pointers to Next Edge</text>
    <text x="110" y="195" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">For Undirected Graphs</text>
  </g>

  <g data-narration="Weighted graph representations extend the basic structures by storing edge weights. In adjacency matrices cells contain weights instead of one or zero, while in adjacency lists each node includes a weight field.">
    <rect x="220" y="120" width="180" height="80" rx="8" fill="url(#grad4)" opacity="0.9"/>
    <text x="310" y="145" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Weighted Graphs</text>
    <text x="310" y="165" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Matrix: Store Weights</text>
    <text x="310" y="180" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">List: Weight in Node</text>
    <text x="310" y="195" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Extends Both Methods</text>
  </g>

  <g data-narration="Graph representations have different properties based on graph type. Undirected graphs produce symmetric adjacency matrices since edges work both ways, while directed graphs may have asymmetric matrices reflecting one way connections between vertices.">
    <text x="210" y="230" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">Graph Representations</text>

    <rect x="20" y="260" width="380" height="120" rx="8" fill="url(#grad5)" opacity="0.15" stroke="#9c27b0" stroke-width="2"/>
    <text x="210" y="285" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">Key Characteristics</text>

    <text x="30" y="305" font-family="Arial, sans-serif" font-size="11" fill="#333">Matrix: Dense graphs, constant edge lookup, symmetric for undirected</text>
    <text x="30" y="325" font-family="Arial, sans-serif" font-size="11" fill="#333">List: Sparse graphs, efficient space, fast neighbor iteration</text>
    <text x="30" y="345" font-family="Arial, sans-serif" font-size="11" fill="#333">Multilist: Edge processing, undirected graph operations</text>
    <text x="30" y="365" font-family="Arial, sans-serif" font-size="11" fill="#333">Choice depends on graph density and required operations</text>
  </g>
</svg>
