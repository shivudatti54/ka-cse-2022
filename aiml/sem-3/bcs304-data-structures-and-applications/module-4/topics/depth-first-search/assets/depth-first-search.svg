<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes highlight {
      0%, 100% { fill: #00d4ff; }
      50% { fill: #ffe66d; }
    }

    @keyframes visitNode {
      from { fill: #00d4ff; stroke-width: 2; }
      to { fill: #4ecdc4; stroke-width: 3; }
    }

    @keyframes edgePulse {
      from { stroke: #555; stroke-width: 2; }
      to { stroke: #ffe66d; stroke-width: 4; }
    }

    @keyframes stackPush {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes stackPop {
      from { opacity: 1; }
      to { opacity: 0.3; }
    }

    .title {
      font-family: sans-serif;
      font-size: 24px;
      font-weight: bold;
      fill: #e0e0e0;
    }

    .section-title {
      font-family: sans-serif;
      font-size: 16px;
      font-weight: bold;
      fill: #00d4ff;
    }

    .label {
      font-family: sans-serif;
      font-size: 12px;
      fill: #e0e0e0;
    }

    .code {
      font-family: monospace;
      font-size: 10px;
      fill: #ffe66d;
    }

    .vertex {
      fill: #00d4ff;
      stroke: #e0e0e0;
      stroke-width: 2;
    }

    .vertex-text {
      font-family: sans-serif;
      font-size: 14px;
      font-weight: bold;
      fill: #1a1a2e;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .edge {
      stroke: #555;
      stroke-width: 2;
      fill: none;
    }

    /* Step-by-step animations */
    .step0 { animation: fadeIn 0.5s ease-out 0.5s backwards; }

    /* Step 1: Visit A */
    .visit-A { animation: visitNode 0.5s ease-out 1.5s forwards; }
    .edge-A { animation: edgePulse 0.3s ease-out 1.5s forwards; }
    .stack-A { animation: stackPush 0.5s ease-out 1.5s backwards; }

    /* Step 2: Visit B */
    .visit-B { animation: visitNode 0.5s ease-out 2.5s forwards; }
    .edge-B { animation: edgePulse 0.3s ease-out 2.5s forwards; }
    .stack-B { animation: stackPush 0.5s ease-out 2.5s backwards; }

    /* Step 3: Visit D */
    .visit-D { animation: visitNode 0.5s ease-out 3.5s forwards; }
    .edge-D { animation: edgePulse 0.3s ease-out 3.5s forwards; }
    .stack-D { animation: stackPush 0.5s ease-out 3.5s backwards; }

    /* Step 4: Visit E */
    .visit-E { animation: visitNode 0.5s ease-out 4.5s forwards; }
    .edge-E { animation: edgePulse 0.3s ease-out 4.5s forwards; }
    .stack-E { animation: stackPush 0.5s ease-out 4.5s backwards; }

    /* Step 5: Backtrack to D, then visit F */
    .stack-E-pop { animation: stackPop 0.5s ease-out 5.5s forwards; }
    .visit-F { animation: visitNode 0.5s ease-out 6s forwards; }
    .edge-F { animation: edgePulse 0.3s ease-out 6s forwards; }
    .stack-F { animation: stackPush 0.5s ease-out 6s backwards; }

    /* Step 6: Backtrack and visit C */
    .visit-C { animation: visitNode 0.5s ease-out 7s forwards; }
    .edge-C { animation: edgePulse 0.3s ease-out 7s forwards; }
    .stack-C { animation: stackPush 0.5s ease-out 7s backwards; }

    /* Step 7: Visit G */
    .visit-G { animation: visitNode 0.5s ease-out 8s forwards; }
    .edge-G { animation: edgePulse 0.3s ease-out 8s forwards; }
    .stack-G { animation: stackPush 0.5s ease-out 8s backwards; }

    .order-text {
      font-family: monospace;
      font-size: 11px;
      fill: #4ecdc4;
      font-weight: bold;
    }

    .stack-box {
      fill: #2a2a3e;
      stroke: #ff6b6b;
      stroke-width: 2;
    }

    .stack-item {
      fill: #ff6b6b;
      stroke: #e0e0e0;
      stroke-width: 1.5;
    }

    .stack-text {
      font-family: monospace;
      font-size: 12px;
      fill: #1a1a2e;
      font-weight: bold;
      text-anchor: middle;
      dominant-baseline: middle;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Main Title -->
  <text x="400" y="30" class="title" text-anchor="middle">Depth-First Search (DFS)</text>
  <text x="400" y="55" class="label" text-anchor="middle">Explores as deep as possible before backtracking</text>

  <!-- Graph Structure -->
  <g class="step0">
    <text x="50" y="90" class="section-title">Graph Traversal</text>

    <!-- Vertices -->
    <circle cx="200" cy="150" r="18" class="vertex visit-A" id="node-A"/>
    <text x="200" y="150" class="vertex-text">A</text>
    <text x="200" y="180" class="order-text">1st</text>

    <circle cx="150" cy="230" r="18" class="vertex visit-B" id="node-B"/>
    <text x="150" y="230" class="vertex-text">B</text>
    <text x="150" y="260" class="order-text">2nd</text>

    <circle cx="250" cy="230" r="18" class="vertex visit-C" id="node-C"/>
    <text x="250" y="230" class="vertex-text">C</text>
    <text x="250" y="260" class="order-text">6th</text>

    <circle cx="100" cy="310" r="18" class="vertex visit-D" id="node-D"/>
    <text x="100" y="310" class="vertex-text">D</text>
    <text x="100" y="340" class="order-text">3rd</text>

    <circle cx="200" cy="310" r="18" class="vertex visit-F" id="node-F"/>
    <text x="200" y="310" class="vertex-text">F</text>
    <text x="200" y="340" class="order-text">5th</text>

    <circle cx="300" cy="310" r="18" class="vertex visit-G" id="node-G"/>
    <text x="300" y="310" class="vertex-text">G</text>
    <text x="300" y="340" class="order-text">7th</text>

    <circle cx="50" cy="390" r="18" class="vertex visit-E" id="node-E"/>
    <text x="50" y="390" class="vertex-text">E</text>
    <text x="50" y="420" class="order-text">4th</text>

    <!-- Edges -->
    <line x1="192" y1="165" x2="158" y2="215" class="edge edge-A"/>
    <line x1="208" y1="165" x2="242" y2="215" class="edge edge-C"/>
    <line x1="142" y1="245" x2="108" y2="295" class="edge edge-B"/>
    <line x1="158" y1="245" x2="192" y2="295" class="edge edge-F"/>
    <line x1="258" y1="245" x2="292" y2="295" class="edge edge-G"/>
    <line x1="87" y1="322" x2="63" y2="375" class="edge edge-D"/>
    <line x1="108" y1="328" x2="192" y2="328" class="edge"/>
    <line x1="200" y1="328" x2="300" y2="328" class="edge"/>
  </g>

  <!-- DFS Stack Visualization -->
  <g>
    <rect x="420" y="100" width="340" height="380" class="stack-box" rx="5"/>
    <text x="590" y="125" class="section-title" text-anchor="middle">Stack State (LIFO)</text>
    <text x="590" y="145" class="label" text-anchor="middle">Top of stack at bottom</text>

    <!-- Stack visualization at different steps -->
    <!-- Initial: A -->
    <g class="stack-A">
      <rect x="500" y="430" width="180" height="35" class="stack-item"/>
      <text x="590" y="447.5" class="stack-text">A - Start</text>
    </g>

    <!-- Push B -->
    <g class="stack-B">
      <rect x="500" y="390" width="180" height="35" class="stack-item"/>
      <text x="590" y="407.5" class="stack-text">B - Child of A</text>
    </g>

    <!-- Push D -->
    <g class="stack-D">
      <rect x="500" y="350" width="180" height="35" class="stack-item"/>
      <text x="590" y="367.5" class="stack-text">D - Child of B</text>
    </g>

    <!-- Push E -->
    <g class="stack-E">
      <rect x="500" y="310" width="180" height="35" class="stack-item"/>
      <text x="590" y="327.5" class="stack-text">E - Child of D</text>
    </g>

    <!-- Pop E (dead end), then Push F -->
    <g class="stack-F">
      <rect x="500" y="270" width="180" height="35" class="stack-item"/>
      <text x="590" y="287.5" class="stack-text">F - Backtrack</text>
    </g>

    <!-- Push C -->
    <g class="stack-C">
      <rect x="500" y="230" width="180" height="35" class="stack-item"/>
      <text x="590" y="247.5" class="stack-text">C - Child of A</text>
    </g>

    <!-- Push G -->
    <g class="stack-G">
      <rect x="500" y="190" width="180" height="35" class="stack-item"/>
      <text x="590" y="207.5" class="stack-text">G - Child of C</text>
    </g>
  </g>

  <!-- Algorithm Steps -->
  <rect x="40" y="450" width="360" height="140" fill="#2a2a3e" stroke="#00d4ff" stroke-width="2" rx="5"/>
  <text x="220" y="475" class="section-title" text-anchor="middle">DFS Algorithm</text>

  <text x="55" y="495" class="code">1. Push start vertex onto stack</text>
  <text x="55" y="510" class="code">2. Pop vertex, mark as visited</text>
  <text x="55" y="525" class="code">3. Push all unvisited neighbors</text>
  <text x="55" y="540" class="code">4. Repeat until stack is empty</text>
  <text x="55" y="555" class="code">5. Backtrack when no unvisited neighbors</text>
  <text x="55" y="575" class="label">Traversal Order: A → B → D → E → F → C → G</text>

  <!-- Properties Box -->
  <rect x="420" y="490" width="340" height="100" fill="#2a2a3e" stroke="#4ecdc4" stroke-width="2" rx="5"/>
  <text x="590" y="515" class="section-title" text-anchor="middle">Properties</text>

  <text x="440" y="535" class="label">Time Complexity:</text>
  <text x="560" y="535" class="code">O(V + E)</text>

  <text x="440" y="555" class="label">Space Complexity:</text>
  <text x="560" y="555" class="code">O(V) for stack</text>

  <text x="440" y="575" class="label">Applications:</text>
  <text x="440" y="590" class="code">Cycle detection, topological sort,</text>
  <text x="440" y="605" class="code">pathfinding, maze solving</text>
</svg>
