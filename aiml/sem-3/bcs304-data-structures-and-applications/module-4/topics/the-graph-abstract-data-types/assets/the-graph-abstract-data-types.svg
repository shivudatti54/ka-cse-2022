<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    @keyframes drawEdge {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }

    .title {
      font-family: sans-serif;
      font-size: 24px;
      font-weight: bold;
      fill: #e0e0e0;
      animation: slideIn 1s ease-out;
    }

    .section-title {
      font-family: sans-serif;
      font-size: 16px;
      font-weight: bold;
      fill: #00d4ff;
    }

    .label {
      font-family: sans-serif;
      font-size: 12px;
      fill: #e0e0e0;
    }

    .code {
      font-family: monospace;
      font-size: 11px;
      fill: #ffe66d;
    }

    .vertex {
      fill: #00d4ff;
      stroke: #e0e0e0;
      stroke-width: 2;
    }

    .vertex-text {
      font-family: sans-serif;
      font-size: 14px;
      font-weight: bold;
      fill: #1a1a2e;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .edge {
      stroke: #4ecdc4;
      stroke-width: 2;
      fill: none;
    }

    .directed-edge {
      stroke: #ff6b6b;
      stroke-width: 2;
      fill: none;
    }

    .weighted-edge {
      stroke: #ffe66d;
      stroke-width: 2;
      fill: none;
    }

    .weight {
      font-family: sans-serif;
      font-size: 12px;
      font-weight: bold;
      fill: #ffe66d;
      text-anchor: middle;
    }

    /* Graph Type 1: Undirected Graph */
    .graph1 { animation: fadeIn 1s ease-out 0.5s backwards; }

    /* Graph Type 2: Directed Graph */
    .graph2 { animation: fadeIn 1s ease-out 2s backwards; }

    /* Graph Type 3: Weighted Graph */
    .graph3 { animation: fadeIn 1s ease-out 3.5s backwards; }

    /* Graph Type 4: Complete Graph */
    .graph4 { animation: fadeIn 1s ease-out 5s backwards; }

    /* Graph Type 5: Bipartite Graph */
    .graph5 { animation: fadeIn 1s ease-out 6.5s backwards; }

    .terminology {
      animation: fadeIn 1s ease-out 8s backwards;
    }

    .property {
      font-family: sans-serif;
      font-size: 10px;
      fill: #4ecdc4;
      font-style: italic;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Main Title -->
  <text x="400" y="30" class="title" text-anchor="middle">Graph Abstract Data Types</text>

  <!-- Graph Type 1: Undirected Graph -->
  <g class="graph1">
    <text x="130" y="80" class="section-title">1. Undirected Graph</text>
    <text x="130" y="100" class="property">Edges have no direction</text>

    <!-- Vertices -->
    <circle cx="100" cy="150" r="15" class="vertex"/>
    <text x="100" y="150" class="vertex-text">A</text>

    <circle cx="160" cy="150" r="15" class="vertex"/>
    <text x="160" y="150" class="vertex-text">B</text>

    <circle cx="130" cy="210" r="15" class="vertex"/>
    <text x="130" y="210" class="vertex-text">C</text>

    <!-- Edges -->
    <line x1="112" y1="157" x2="148" y2="157" class="edge"/>
    <line x1="108" y1="163" x2="122" y2="197" class="edge"/>
    <line x1="152" y1="163" x2="138" y2="197" class="edge"/>

    <text x="130" y="235" class="code">V = {A, B, C}</text>
    <text x="130" y="250" class="code">E = {AB, AC, BC}</text>
  </g>

  <!-- Graph Type 2: Directed Graph (Digraph) -->
  <g class="graph2">
    <text x="330" y="80" class="section-title">2. Directed Graph</text>
    <text x="330" y="100" class="property">Edges have direction (arrows)</text>

    <!-- Vertices -->
    <circle cx="300" cy="150" r="15" class="vertex"/>
    <text x="300" y="150" class="vertex-text">A</text>

    <circle cx="360" cy="150" r="15" class="vertex"/>
    <text x="360" y="150" class="vertex-text">B</text>

    <circle cx="330" cy="210" r="15" class="vertex"/>
    <text x="330" y="210" class="vertex-text">C</text>

    <!-- Directed Edges with Arrows -->
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b6b"/>
      </marker>
    </defs>

    <line x1="312" y1="157" x2="348" y2="157" class="directed-edge" marker-end="url(#arrowhead)"/>
    <line x1="308" y1="163" x2="322" y2="197" class="directed-edge" marker-end="url(#arrowhead)"/>
    <line x1="344" y1="204" x2="354" y2="163" class="directed-edge" marker-end="url(#arrowhead)"/>

    <text x="330" y="235" class="code">A → B → C → B</text>
    <text x="330" y="250" class="code">A → C</text>
  </g>

  <!-- Graph Type 3: Weighted Graph -->
  <g class="graph3">
    <text x="530" y="80" class="section-title">3. Weighted Graph</text>
    <text x="530" y="100" class="property">Edges have weights/costs</text>

    <!-- Vertices -->
    <circle cx="500" cy="150" r="15" class="vertex"/>
    <text x="500" y="150" class="vertex-text">A</text>

    <circle cx="560" cy="150" r="15" class="vertex"/>
    <text x="560" y="150" class="vertex-text">B</text>

    <circle cx="530" cy="210" r="15" class="vertex"/>
    <text x="530" y="210" class="vertex-text">C</text>

    <!-- Weighted Edges -->
    <line x1="512" y1="157" x2="548" y2="157" class="weighted-edge"/>
    <text x="530" y="145" class="weight">5</text>

    <line x1="508" y1="163" x2="522" y2="197" class="weighted-edge"/>
    <text x="505" y="180" class="weight">3</text>

    <line x1="552" y1="163" x2="538" y2="197" class="weighted-edge"/>
    <text x="555" y="180" class="weight">7</text>

    <text x="530" y="235" class="code">W(AB) = 5</text>
    <text x="530" y="250" class="code">W(AC) = 3, W(BC) = 7</text>
  </g>

  <!-- Graph Type 4: Complete Graph -->
  <g class="graph4">
    <text x="130" y="300" class="section-title">4. Complete Graph K₄</text>
    <text x="130" y="320" class="property">Every vertex connected to all others</text>

    <!-- Vertices -->
    <circle cx="100" cy="370" r="15" class="vertex"/>
    <text x="100" y="370" class="vertex-text">A</text>

    <circle cx="160" cy="370" r="15" class="vertex"/>
    <text x="160" y="370" class="vertex-text">B</text>

    <circle cx="100" cy="430" r="15" class="vertex"/>
    <text x="100" y="430" class="vertex-text">D</text>

    <circle cx="160" cy="430" r="15" class="vertex"/>
    <text x="160" y="430" class="vertex-text">C</text>

    <!-- All possible edges -->
    <line x1="112" y1="377" x2="148" y2="377" class="edge"/>
    <line x1="112" y1="423" x2="148" y2="423" class="edge"/>
    <line x1="107" y1="382" x2="107" y2="418" class="edge"/>
    <line x1="153" y1="382" x2="153" y2="418" class="edge"/>
    <line x1="112" y1="377" x2="148" y2="423" class="edge"/>
    <line x1="148" y1="377" x2="112" y2="423" class="edge"/>

    <text x="130" y="460" class="code">|E| = n(n-1)/2 = 6</text>
    <text x="130" y="475" class="code">Every pair connected</text>
  </g>

  <!-- Graph Type 5: Bipartite Graph -->
  <g class="graph5">
    <text x="380" y="300" class="section-title">5. Bipartite Graph</text>
    <text x="380" y="320" class="property">Two disjoint vertex sets</text>

    <!-- Set U -->
    <text x="310" y="350" class="label">Set U:</text>
    <circle cx="320" cy="380" r="15" class="vertex"/>
    <text x="320" y="380" class="vertex-text">U1</text>

    <circle cx="320" cy="430" r="15" class="vertex"/>
    <text x="320" y="430" class="vertex-text">U2</text>

    <!-- Set V -->
    <text x="430" y="350" class="label">Set V:</text>
    <circle cx="440" cy="370" r="15" class="vertex"/>
    <text x="440" y="370" class="vertex-text">V1</text>

    <circle cx="440" cy="410" r="15" class="vertex"/>
    <text x="440" y="410" class="vertex-text">V2</text>

    <circle cx="440" cy="450" r="15" class="vertex"/>
    <text x="440" y="450" class="vertex-text">V3</text>

    <!-- Cross edges only -->
    <line x1="333" y1="383" x2="427" y2="373" class="edge"/>
    <line x1="333" y1="387" x2="427" y2="407" class="edge"/>
    <line x1="333" y1="427" x2="427" y2="413" class="edge"/>
    <line x1="333" y1="433" x2="427" y2="447" class="edge"/>

    <text x="380" y="480" class="code">No edges within sets</text>
  </g>

  <!-- Graph Terminology Box -->
  <g class="terminology">
    <rect x="520" y="310" width="260" height="270" fill="#2a2a3e" stroke="#00d4ff" stroke-width="2" rx="5"/>
    <text x="650" y="335" class="section-title" text-anchor="middle">Graph Terminology</text>

    <text x="535" y="360" class="label">Vertex/Node:</text>
    <text x="535" y="378" class="code">Fundamental unit (points)</text>

    <text x="535" y="403" class="label">Edge/Arc:</text>
    <text x="535" y="421" class="code">Connection between vertices</text>

    <text x="535" y="446" class="label">Degree:</text>
    <text x="535" y="464" class="code">Number of edges at vertex</text>

    <text x="535" y="489" class="label">Path:</text>
    <text x="535" y="507" class="code">Sequence of connected vertices</text>

    <text x="535" y="532" class="label">Cycle:</text>
    <text x="535" y="550" class="code">Path starting and ending at</text>
    <text x="535" y="565" class="code">same vertex</text>
  </g>

  <!-- ADT Operations -->
  <text x="50" y="520" class="section-title">Common Graph ADT Operations:</text>
  <text x="50" y="540" class="code">• insertVertex(v) - Add new vertex</text>
  <text x="50" y="555" class="code">• insertEdge(u, v, w) - Add edge with weight</text>
  <text x="50" y="570" class="code">• removeVertex(v) - Delete vertex and edges</text>
  <text x="50" y="585" class="code">• adjacent(u, v) - Check if edge exists</text>
</svg>
