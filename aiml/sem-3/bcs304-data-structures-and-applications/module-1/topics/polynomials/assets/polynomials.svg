<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }

      @keyframes slideDown {
        0% { transform: translateY(-20px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }

      @keyframes highlight {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }

      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 5px #00d4ff); }
        50% { filter: drop-shadow(0 0 15px #00d4ff); }
      }

      @keyframes buildResult {
        0% { opacity: 0; transform: scale(0.5); }
        100% { opacity: 1; transform: scale(1); }
      }

      .title {
        font-family: Arial, sans-serif;
        font-size: 28px;
        font-weight: bold;
        fill: #e0e0e0;
        animation: fadeIn 1s ease-in;
      }

      .label {
        font-family: Arial, sans-serif;
        font-size: 16px;
        fill: #e0e0e0;
      }

      .node-text {
        font-family: 'Courier New', monospace;
        font-size: 14px;
        fill: #1a1a2e;
        font-weight: bold;
      }

      .coeff-text {
        font-family: Arial, sans-serif;
        font-size: 12px;
        fill: #e0e0e0;
      }

      .arrow-text {
        font-family: Arial, sans-serif;
        font-size: 24px;
        fill: #ffe66d;
        font-weight: bold;
      }

      .node-p1 {
        animation: slideDown 0.8s ease-out;
      }

      .node-p2 {
        animation: slideDown 0.8s ease-out 0.3s backwards;
      }

      .node-result {
        animation: buildResult 0.6s ease-out backwards;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="title">Polynomial Addition Using Linked Lists</text>

  <!-- P1 Polynomial -->
  <g id="p1">
    <text x="50" y="90" class="label" font-weight="bold" fill="#00d4ff">P1 = 3x⁴ + 2x² + 1</text>

    <!-- Node 1: 3x^4 -->
    <g class="node-p1">
      <rect x="50" y="100" width="80" height="60" fill="#00d4ff" stroke="#00d4ff" stroke-width="2" rx="5"/>
      <text x="90" y="125" text-anchor="middle" class="node-text">3</text>
      <line x1="70" y1="135" x2="110" y2="135" stroke="#1a1a2e" stroke-width="2"/>
      <text x="90" y="152" text-anchor="middle" class="node-text">4</text>
      <text x="68" y="118" class="coeff-text" font-size="10" fill="#1a1a2e">coef</text>
      <text x="68" y="148" class="coeff-text" font-size="10" fill="#1a1a2e">exp</text>
    </g>

    <!-- Arrow 1 -->
    <path d="M 130 130 L 165 130" stroke="#4ecdc4" stroke-width="3" fill="none" marker-end="url(#arrowhead1)"/>

    <!-- Node 2: 2x^2 -->
    <g class="node-p1" style="animation-delay: 0.2s">
      <rect x="175" y="100" width="80" height="60" fill="#00d4ff" stroke="#00d4ff" stroke-width="2" rx="5"/>
      <text x="215" y="125" text-anchor="middle" class="node-text">2</text>
      <line x1="195" y1="135" x2="235" y2="135" stroke="#1a1a2e" stroke-width="2"/>
      <text x="215" y="152" text-anchor="middle" class="node-text">2</text>
    </g>

    <!-- Arrow 2 -->
    <path d="M 255 130 L 290 130" stroke="#4ecdc4" stroke-width="3" fill="none" marker-end="url(#arrowhead1)"/>

    <!-- Node 3: 1x^0 -->
    <g class="node-p1" style="animation-delay: 0.4s">
      <rect x="300" y="100" width="80" height="60" fill="#00d4ff" stroke="#00d4ff" stroke-width="2" rx="5"/>
      <text x="340" y="125" text-anchor="middle" class="node-text">1</text>
      <line x1="320" y1="135" x2="360" y2="135" stroke="#1a1a2e" stroke-width="2"/>
      <text x="340" y="152" text-anchor="middle" class="node-text">0</text>
    </g>

    <!-- NULL -->
    <text x="400" y="135" class="label" fill="#ff6b6b">NULL</text>
  </g>

  <!-- P2 Polynomial -->
  <g id="p2">
    <text x="50" y="220" class="label" font-weight="bold" fill="#4ecdc4">P2 = 5x³ + 2x² + 4</text>

    <!-- Node 1: 5x^3 -->
    <g class="node-p2">
      <rect x="50" y="230" width="80" height="60" fill="#4ecdc4" stroke="#4ecdc4" stroke-width="2" rx="5"/>
      <text x="90" y="255" text-anchor="middle" class="node-text">5</text>
      <line x1="70" y1="265" x2="110" y2="265" stroke="#1a1a2e" stroke-width="2"/>
      <text x="90" y="282" text-anchor="middle" class="node-text">3</text>
    </g>

    <!-- Arrow -->
    <path d="M 130 260 L 165 260" stroke="#ffe66d" stroke-width="3" fill="none" marker-end="url(#arrowhead2)"/>

    <!-- Node 2: 2x^2 -->
    <g class="node-p2" style="animation-delay: 0.2s">
      <rect x="175" y="230" width="80" height="60" fill="#4ecdc4" stroke="#4ecdc4" stroke-width="2" rx="5"/>
      <text x="215" y="255" text-anchor="middle" class="node-text">2</text>
      <line x1="195" y1="265" x2="235" y2="265" stroke="#1a1a2e" stroke-width="2"/>
      <text x="215" y="282" text-anchor="middle" class="node-text">2</text>
    </g>

    <!-- Arrow -->
    <path d="M 255 260 L 290 260" stroke="#ffe66d" stroke-width="3" fill="none" marker-end="url(#arrowhead2)"/>

    <!-- Node 3: 4x^0 -->
    <g class="node-p2" style="animation-delay: 0.4s">
      <rect x="300" y="230" width="80" height="60" fill="#4ecdc4" stroke="#4ecdc4" stroke-width="2" rx="5"/>
      <text x="340" y="255" text-anchor="middle" class="node-text">4</text>
      <line x1="320" y1="265" x2="360" y2="265" stroke="#1a1a2e" stroke-width="2"/>
      <text x="340" y="282" text-anchor="middle" class="node-text">0</text>
    </g>

    <!-- NULL -->
    <text x="400" y="265" class="label" fill="#ff6b6b">NULL</text>
  </g>

  <!-- Addition Arrow -->
  <text x="400" y="340" text-anchor="middle" class="arrow-text">+</text>
  <path d="M 400 345 L 400 375" stroke="#ffe66d" stroke-width="3" fill="none" marker-end="url(#arrowhead3)"/>

  <!-- Result Polynomial -->
  <g id="result">
    <text x="50" y="405" class="label" font-weight="bold" fill="#ffe66d">Result = 3x⁴ + 5x³ + 4x² + 5</text>

    <!-- Node 1: 3x^4 -->
    <g class="node-result" style="animation-delay: 1.5s">
      <rect x="50" y="415" width="70" height="55" fill="#ffe66d" stroke="#ffe66d" stroke-width="2" rx="5"/>
      <text x="85" y="438" text-anchor="middle" class="node-text">3</text>
      <line x1="65" y1="447" x2="105" y2="447" stroke="#1a1a2e" stroke-width="2"/>
      <text x="85" y="462" text-anchor="middle" class="node-text">4</text>
    </g>

    <!-- Arrow -->
    <path d="M 120 442 L 145 442" stroke="#ff6b6b" stroke-width="2.5" fill="none" marker-end="url(#arrowhead4)">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2s" fill="freeze"/>
    </path>

    <!-- Node 2: 5x^3 -->
    <g class="node-result" style="animation-delay: 2s">
      <rect x="155" y="415" width="70" height="55" fill="#ffe66d" stroke="#ffe66d" stroke-width="2" rx="5"/>
      <text x="190" y="438" text-anchor="middle" class="node-text">5</text>
      <line x1="170" y1="447" x2="210" y2="447" stroke="#1a1a2e" stroke-width="2"/>
      <text x="190" y="462" text-anchor="middle" class="node-text">3</text>
    </g>

    <!-- Arrow -->
    <path d="M 225 442 L 250 442" stroke="#ff6b6b" stroke-width="2.5" fill="none" marker-end="url(#arrowhead4)">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.5s" fill="freeze"/>
    </path>

    <!-- Node 3: 4x^2 (2+2) -->
    <g class="node-result" style="animation-delay: 2.5s">
      <rect x="260" y="415" width="70" height="55" fill="#ffe66d" stroke="#ffe66d" stroke-width="2" rx="5"/>
      <text x="295" y="438" text-anchor="middle" class="node-text">4</text>
      <line x1="275" y1="447" x2="315" y2="447" stroke="#1a1a2e" stroke-width="2"/>
      <text x="295" y="462" text-anchor="middle" class="node-text">2</text>
    </g>

    <!-- Arrow -->
    <path d="M 330 442 L 355 442" stroke="#ff6b6b" stroke-width="2.5" fill="none" marker-end="url(#arrowhead4)">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="3s" fill="freeze"/>
    </path>

    <!-- Node 4: 5x^0 (1+4) -->
    <g class="node-result" style="animation-delay: 3s">
      <rect x="365" y="415" width="70" height="55" fill="#ffe66d" stroke="#ffe66d" stroke-width="2" rx="5"/>
      <text x="400" y="438" text-anchor="middle" class="node-text">5</text>
      <line x1="380" y1="447" x2="420" y2="447" stroke="#1a1a2e" stroke-width="2"/>
      <text x="400" y="462" text-anchor="middle" class="node-text">0</text>
    </g>

    <!-- NULL -->
    <text x="455" y="447" class="label" fill="#ff6b6b">NULL</text>
  </g>

  <!-- Process explanation -->
  <rect x="50" y="510" width="700" height="75" fill="#2a2a4e" stroke="#00d4ff" stroke-width="2" rx="8"/>
  <text x="400" y="535" text-anchor="middle" class="label" font-weight="bold" fill="#00d4ff">Addition Process:</text>
  <text x="60" y="560" class="label" font-size="14">1. Compare exponents of current nodes from both lists</text>
  <text x="60" y="580" class="label" font-size="14">2. If equal: add coefficients • If different: copy larger exponent node to result</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead1" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#4ecdc4"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#ffe66d"/>
    </marker>
    <marker id="arrowhead3" markerWidth="10" markerHeight="10" refX="5" refY="8" orient="auto">
      <polygon points="0 0, 10 0, 5 10" fill="#ffe66d"/>
    </marker>
    <marker id="arrowhead4" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#ff6b6b"/>
    </marker>
  </defs>
</svg>