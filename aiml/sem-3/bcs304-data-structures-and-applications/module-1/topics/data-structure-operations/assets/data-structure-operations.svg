<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" data-topic-id="data-structure-operations">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4a90e2"/><stop offset="100%" stop-color="#2c5aa0"/></linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#50c878"/><stop offset="100%" stop-color="#2e8b57"/></linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="100%" stop-color="#d32f2f"/></linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ffa726"/><stop offset="100%" stop-color="#f57c00"/></linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#9c27b0"/><stop offset="100%" stop-color="#6a1b9a"/></linearGradient>
  </defs>

  <!-- Top-left: Traversal and Searching -->
  <g data-narration="Traversal and searching are fundamental read operations. Traversal accesses each element exactly once with order n complexity. Searching finds element locations using linear search with order n or binary search with order log n complexity.">
    <rect x="20" y="20" width="180" height="80" fill="url(#grad1)" rx="8"/>
    <text x="110" y="40" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Traversal &amp; Searching</text>
    <text x="110" y="58" text-anchor="middle" fill="white" font-size="11">Traversal: O(n)</text>
    <text x="110" y="74" text-anchor="middle" fill="white" font-size="11">Linear: O(n)</text>
    <text x="110" y="90" text-anchor="middle" fill="white" font-size="11">Binary: O(log n)</text>
  </g>

  <!-- Top-right: Insertion -->
  <g data-narration="Insertion adds new elements to a data structure. In arrays, insertion requires shifting existing elements to the right to make space. This shifting operation results in order n time complexity for array insertions.">
    <rect x="220" y="20" width="180" height="80" fill="url(#grad2)" rx="8"/>
    <text x="310" y="40" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Insertion</text>
    <text x="310" y="58" text-anchor="middle" fill="white" font-size="11">Add new element</text>
    <text x="310" y="74" text-anchor="middle" fill="white" font-size="11">Shift right in arrays</text>
    <text x="310" y="90" text-anchor="middle" fill="white" font-size="11">Complexity: O(n)</text>
  </g>

  <!-- Bottom-left: Deletion -->
  <g data-narration="Deletion removes elements from a data structure. In arrays, deletion requires shifting remaining elements to the left to fill the gap created by removal. This shifting operation results in order n time complexity for array deletions.">
    <rect x="20" y="120" width="180" height="80" fill="url(#grad3)" rx="8"/>
    <text x="110" y="140" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Deletion</text>
    <text x="110" y="158" text-anchor="middle" fill="white" font-size="11">Remove element</text>
    <text x="110" y="174" text-anchor="middle" fill="white" font-size="11">Shift left in arrays</text>
    <text x="110" y="190" text-anchor="middle" fill="white" font-size="11">Complexity: O(n)</text>
  </g>

  <!-- Bottom-right: Sorting and Merging -->
  <g data-narration="Sorting arranges elements in a specific order. Bubble sort has order n squared complexity while merge sort achieves order n log n. Merging combines two sorted structures into one sorted structure with order m plus n complexity.">
    <rect x="220" y="120" width="180" height="80" fill="url(#grad4)" rx="8"/>
    <text x="310" y="140" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Sorting &amp; Merging</text>
    <text x="310" y="158" text-anchor="middle" fill="white" font-size="11">Bubble: O(n^2)</text>
    <text x="310" y="174" text-anchor="middle" fill="white" font-size="11">Merge: O(n log n)</text>
    <text x="310" y="190" text-anchor="middle" fill="white" font-size="11">Merging: O(m+n)</text>
  </g>

  <!-- Center title -->
  <text x="210" y="230" text-anchor="middle" fill="#333" font-size="18" font-weight="bold">Data Structure Operations</text>

  <!-- Summary box -->
  <g data-narration="Data structures support six fundamental operations including traversal, searching, insertion, deletion, sorting, and merging. Understanding time complexity is crucial, as operations range from efficient order log n for binary search to order n squared for bubble sort. Proper operation selection optimizes program performance.">
    <rect x="20" y="260" width="380" height="120" fill="url(#grad5)" rx="8"/>
    <text x="210" y="280" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Six Fundamental Operations</text>
    <text x="210" y="300" text-anchor="middle" fill="white" font-size="11">1. Traversal: Access each element once</text>
    <text x="210" y="316" text-anchor="middle" fill="white" font-size="11">2. Searching: Find element location (Linear/Binary)</text>
    <text x="210" y="332" text-anchor="middle" fill="white" font-size="11">3. Insertion: Add new element with shifting</text>
    <text x="210" y="348" text-anchor="middle" fill="white" font-size="11">4. Deletion: Remove element with shifting</text>
    <text x="210" y="364" text-anchor="middle" fill="white" font-size="11">5. Sorting: Arrange in order (Bubble/Merge)</text>
  </g>
</svg>
