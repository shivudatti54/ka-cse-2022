<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes highlight {
        0%, 100% { fill: #00d4ff; }
        50% { fill: #ffe66d; }
      }
      @keyframes highlightStroke {
        0%, 100% { stroke: #4ecdc4; stroke-width: 2; }
        50% { stroke: #ff6b6b; stroke-width: 4; }
      }
      @keyframes searchSuccess {
        0% { fill: #00d4ff; }
        100% { fill: #4ecdc4; }
      }

      .title { animation: fadeIn 1s ease-out; }
      .array-setup { animation: fadeIn 1s ease-out 0.5s both; }

      /* Binary search animation sequence */
      .search-step1 { animation: highlight 1s ease-in-out 2s 2; }
      .search-step1-stroke { animation: highlightStroke 1s ease-in-out 2s 2; }

      .search-step2 { animation: highlight 1s ease-in-out 4.5s 2; }
      .search-step2-stroke { animation: highlightStroke 1s ease-in-out 4.5s 2; }

      .search-step3 { animation: searchSuccess 1s ease-in-out 7s both; }
      .search-step3-stroke { animation: highlightStroke 1s ease-in-out 7s 3; }

      .label { animation: fadeIn 0.5s ease-out; }
      .label1 { animation-delay: 2s; animation-fill-mode: both; opacity: 0; }
      .label2 { animation-delay: 4.5s; animation-fill-mode: both; opacity: 0; }
      .label3 { animation-delay: 7s; animation-fill-mode: both; opacity: 0; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#e0e0e0" text-anchor="middle" class="title">
    Arrays: Contiguous Memory and Binary Search
  </text>

  <!-- Subtitle -->
  <text x="400" y="70" font-family="Arial, sans-serif" font-size="16" fill="#4ecdc4" text-anchor="middle" class="title">
    Searching for value 16 in a sorted array
  </text>

  <!-- Array Section Label -->
  <text x="50" y="120" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffe66d" class="array-setup">
    Array Elements:
  </text>

  <!-- Index Labels -->
  <g class="array-setup">
    <text x="135" y="150" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">0</text>
    <text x="235" y="150" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">1</text>
    <text x="335" y="150" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">2</text>
    <text x="435" y="150" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">3</text>
    <text x="535" y="150" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">4</text>
    <text x="635" y="150" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">5</text>
  </g>

  <!-- Array Elements with contiguous blocks -->
  <g class="array-setup">
    <!-- Element 0: 4 -->
    <rect x="85" y="160" width="100" height="70" fill="#00d4ff" stroke="#4ecdc4" stroke-width="2" rx="5" class="search-step1"/>
    <text x="135" y="205" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1a1a2e" text-anchor="middle">4</text>

    <!-- Element 1: 8 -->
    <rect x="185" y="160" width="100" height="70" fill="#00d4ff" stroke="#4ecdc4" stroke-width="2" rx="5" class="search-step1"/>
    <text x="235" y="205" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1a1a2e" text-anchor="middle">8</text>

    <!-- Element 2: 15 (middle element - first check) -->
    <rect x="285" y="160" width="100" height="70" fill="#00d4ff" stroke="#4ecdc4" stroke-width="2" rx="5" class="search-step1 search-step1-stroke"/>
    <text x="335" y="205" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1a1a2e" text-anchor="middle">15</text>

    <!-- Element 3: 16 (target - found in step 3) -->
    <rect x="385" y="160" width="100" height="70" fill="#00d4ff" stroke="#4ecdc4" stroke-width="2" rx="5" class="search-step2 search-step2-stroke search-step3 search-step3-stroke"/>
    <text x="435" y="205" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1a1a2e" text-anchor="middle">16</text>

    <!-- Element 4: 23 -->
    <rect x="485" y="160" width="100" height="70" fill="#00d4ff" stroke="#4ecdc4" stroke-width="2" rx="5" class="search-step2"/>
    <text x="535" y="205" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1a1a2e" text-anchor="middle">23</text>

    <!-- Element 5: 42 -->
    <rect x="585" y="160" width="100" height="70" fill="#00d4ff" stroke="#4ecdc4" stroke-width="2" rx="5" class="search-step2"/>
    <text x="635" y="205" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1a1a2e" text-anchor="middle">42</text>
  </g>

  <!-- Memory Address Labels -->
  <g class="array-setup">
    <text x="135" y="250" font-family="Courier New, monospace" font-size="12" fill="#4ecdc4" text-anchor="middle">1000</text>
    <text x="235" y="250" font-family="Courier New, monospace" font-size="12" fill="#4ecdc4" text-anchor="middle">1004</text>
    <text x="335" y="250" font-family="Courier New, monospace" font-size="12" fill="#4ecdc4" text-anchor="middle">1008</text>
    <text x="435" y="250" font-family="Courier New, monospace" font-size="12" fill="#4ecdc4" text-anchor="middle">1012</text>
    <text x="535" y="250" font-family="Courier New, monospace" font-size="12" fill="#4ecdc4" text-anchor="middle">1016</text>
    <text x="635" y="250" font-family="Courier New, monospace" font-size="12" fill="#4ecdc4" text-anchor="middle">1020</text>
  </g>

  <text x="400" y="270" font-family="Arial, sans-serif" font-size="13" fill="#e0e0e0" text-anchor="middle" class="array-setup">
    Memory addresses (each int = 4 bytes)
  </text>

  <!-- Binary Search Steps -->
  <text x="50" y="320" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffe66d" class="array-setup">
    Binary Search for value 16:
  </text>

  <!-- Step 1 -->
  <g class="label label1">
    <rect x="50" y="340" width="700" height="60" fill="#2a2a3e" stroke="#ff6b6b" stroke-width="2" rx="5"/>
    <text x="70" y="365" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffe66d">
      Step 1: Check middle (index 2)
    </text>
    <text x="70" y="385" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0">
      Middle element = 15. Since 16 &gt; 15, search right half [3, 4, 5]
    </text>
  </g>

  <!-- Step 2 -->
  <g class="label label2">
    <rect x="50" y="410" width="700" height="60" fill="#2a2a3e" stroke="#ff6b6b" stroke-width="2" rx="5"/>
    <text x="70" y="435" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffe66d">
      Step 2: Check middle of right half (index 4)
    </text>
    <text x="70" y="455" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0">
      Middle element = 23. Since 16 &lt; 23, search left of this range [3]
    </text>
  </g>

  <!-- Step 3 -->
  <g class="label label3">
    <rect x="50" y="480" width="700" height="60" fill="#2a2a3e" stroke="#4ecdc4" stroke-width="3" rx="5"/>
    <text x="70" y="505" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4ecdc4">
      Step 3: Found! Element 16 at index 3
    </text>
    <text x="70" y="525" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0">
      Binary search completed in 3 steps (O(log n) time complexity)
    </text>
  </g>

  <!-- Info Box -->
  <g class="array-setup">
    <rect x="50" y="550" width="700" height="35" fill="#2a2a3e" stroke="#ffe66d" stroke-width="2" rx="5"/>
    <text x="400" y="573" font-family="Arial, sans-serif" font-size="13" fill="#e0e0e0" text-anchor="middle">
      Arrays store elements in contiguous memory locations, enabling efficient random access O(1) and binary search O(log n)
    </text>
  </g>
</svg>