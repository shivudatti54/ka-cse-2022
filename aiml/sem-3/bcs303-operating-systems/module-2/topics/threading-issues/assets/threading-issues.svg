<svg viewBox="0 0 800 1260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2f1"/>
      <stop offset="100%" style="stop-color:#b2dfdb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes fillIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .title-text { animation: fadeInSlide 0.8s ease-out; }
    .highlight { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <rect x="0" y="0" width="800" height="1260" fill="#f8f9fa"/>

  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to our exploration of threading issues in operating systems, a critical topic for building robust concurrent applications.">
    <rect x="150" y="15" width="500" height="45" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1565c0">Threading Issues in Operating Systems</text>
    <text x="400" y="65" text-anchor="middle" font-size="11" fill="#666">Understanding Challenges in Multithreaded Programming</text>
  </g>

  <!-- Step 1: Why Threads Matter -->
  <g class="step" id="step1" data-narration="Threads enable concurrent execution within a process, dramatically improving performance and responsiveness of modern applications.">
    <rect x="40" y="75" width="720" height="85" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="60" y="100" font-size="13" font-weight="bold" fill="#2e7d32">Why Threads Matter</text>
    <text x="60" y="120" font-size="10" fill="#388e3c">Threads are lightweight execution units that share process resources while enabling</text>
    <text x="60" y="135" font-size="10" fill="#388e3c">parallelism. They improve CPU utilization and application responsiveness significantly.</text>
    <circle cx="680" cy="118" r="25" fill="#388e3c" opacity="0.2"/>
    <text x="680" y="123" text-anchor="middle" font-size="24" fill="#2e7d32">⚡</text>
  </g>

  <!-- Step 2: The Problem Overview -->
  <g class="step" id="step2" data-narration="However, concurrent thread execution introduces complex issues: data corruption, race conditions, and unpredictable system behavior.">
    <rect x="40" y="175" width="720" height="85" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="60" y="200" font-size="13" font-weight="bold" fill="#e65100">The Core Challenge</text>
    <text x="60" y="220" font-size="10" fill="#ef6c00">Shared memory between threads creates potential for conflicts. Without proper</text>
    <text x="60" y="235" font-size="10" fill="#ef6c00">synchronization, threads can corrupt data, cause deadlocks, and crash systems.</text>
    <rect x="580" y="195" width="160" height="50" rx="8" fill="#fff" stroke="#ff9800" stroke-width="2"/>
    <text x="660" y="215" text-anchor="middle" font-size="9" fill="#e65100">6 Key Issues</text>
    <text x="660" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">We'll Explore</text>
  </g>

  <!-- Step 3: fork() and exec() -->
  <g class="step" id="step3" data-narration="In multithreaded programs, fork() and exec() semantics become ambiguous. Which threads get duplicated or replaced?">
    <rect x="40" y="275" width="720" height="90" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="60" y="300" font-size="13" font-weight="bold" fill="#1565c0">1. fork() and exec() System Calls</text>
    <text x="60" y="322" font-size="10" fill="#1976d2">Problem: Does fork() duplicate all threads or only the calling thread? Does exec() replace</text>
    <text x="60" y="337" font-size="10" fill="#1976d2">all threads? UNIX provides fork() for single thread and fork_all() for all threads.</text>
    <rect x="520" y="288" width="220" height="65" rx="8" fill="#fff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="630" y="310" text-anchor="middle" font-size="9" fill="#1565c0" font-weight="bold">Solutions</text>
    <line x1="540" y1="320" x2="720" y2="320" stroke="#bbdefb" stroke-width="1"/>
    <text x="545" y="335" font-size="8" fill="#1976d2">• fork() - single thread</text>
    <text x="630" y="335" font-size="8" fill="#1976d2">• fork_all() - all threads</text>
    <text x="700" y="335" font-size="8" fill="#1976d2">• exec() - replaces all</text>
  </g>

  <!-- Step 4: Thread Cancellation -->
  <g class="step" id="step4" data-narration="Thread cancellation must be handled carefully. Abrupt termination can leave shared data in an inconsistent state.">
    <rect x="40" y="380" width="720" height="90" rx="10" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="60" y="405" font-size="13" font-weight="bold" fill="#c62828">2. Thread Cancellation</text>
    <text x="60" y="427" font-size="10" fill="#d32f2f">Problem: Asynchronous cancellation can corrupt shared data, leave locks held, or leak</text>
    <text x="60" y="442" font-size="10" fill="#d32f2f">resources. Deferred cancellation is safer with periodic cancellation points.</text>
    <rect x="520" y="395" width="220" height="60" rx="8" fill="#fff" stroke="#f44336" stroke-width="1.5"/>
    <text x="630" y="415" text-anchor="middle" font-size="9" fill="#c62828" font-weight="bold">Deferred Cancellation</text>
    <path d="M545,430 Q585,420 630,430 Q675,440 715,430" stroke="#f44336" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <circle cx="545" cy="430" r="4" fill="#f44336"/>
    <circle cx="715" cy="430" r="4" fill="#f44336"/>
    <text x="555" y="445" font-size="7" fill="#d32f2f">Check point</text>
    <text x="695" y="445" font-size="7" fill="#d32f2f">Check point</text>
  </g>

  <!-- Step 5: Signal Handling -->
  <g class="step" id="step5" data-narration="Signal handling in multithreaded processes is complex. Which thread should handle a process-level signal?">
    <rect x="40" y="485" width="720" height="90" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="60" y="510" font-size="13" font-weight="bold" fill="#6a1b9a">3. Signal Handling</text>
    <text x="60" y="532" font-size="10" fill="#7b1fa2">Problem: In multithreaded processes, signals can be directed to specific threads or the whole</text>
    <text x="60" y="547" font-size="10" fill="#7b1fa2">process. The OS must define clear routing semantics for effective handling.</text>
    <rect x="520" y="500" width="220" height="65" rx="8" fill="#fff" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="630" y="520" text-anchor="middle" font-size="9" fill="#6a1b9a" font-weight="bold">Signal Delivery Options</text>
    <text x="545" y="538" font-size="8" fill="#7b1fa2">• To specific thread</text>
    <text x="630" y="538" font-size="8" fill="#7b1fa2">• To designated thread</text>
    <text x="705" y="538" font-size="8" fill="#7b1fa2">• To all threads</text>
  </g>

  <!-- Step 6: Thread Pools -->
  <g class="step" id="step6" data-narration="Thread pools solve the overhead problem by pre-creating threads that await work, limiting active threads and improving efficiency.">
    <rect x="40" y="590" width="720" height="95" rx="10" fill="url(#tealGrad)" filter="url(#shadow)"/>
    <text x="60" y="615" font-size="13" font-weight="bold" fill="#00695c">4. Thread Pools</text>
    <text x="60" y="637" font-size="10" fill="#00796b">Problem: Creating threads on demand is inefficient. Thread pools pre-create worker threads</text>
    <text x="60" y="652" font-size="10" fill="#00796b">at startup, saving overhead and allowing applications to tune parallelism levels.</text>
    <rect x="250" y="618" width="300" height="55" rx="8" fill="#fff" stroke="#00897b" stroke-width="1.5"/>
    <text x="400" y="635" text-anchor="middle" font-size="9" fill="#00695c" font-weight="bold">Thread Pool Architecture</text>
    <rect x="270" y="645" width="30" height="20" rx="3" fill="#26a69a"/>
    <rect x="310" y="645" width="30" height="20" rx="3" fill="#26a69a"/>
    <rect x="350" y="645" width="30" height="20" rx="3" fill="#26a69a"/>
    <rect x="390" y="645" width="30" height="20" rx="3" fill="#26a69a"/>
    <rect x="430" y="645" width="30" height="20" rx="3" fill="#26a69a"/>
    <rect x="470" y="645" width="30" height="20" rx="3" fill="#26a69a"/>
    <text x="400" y="658" text-anchor="middle" font-size="7" fill="#fff">Pool</text>
    <path d="M520,645 Q580,635 600,655" stroke="#00897b" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
    <text x="560" y="640" font-size="8" fill="#00796b">Task Queue</text>
  </g>

  <!-- Step 7: Thread-Specific Data -->
  <g class="step" id="step7" data-narration="Thread-specific data allows each thread to have private copies of variables, essential for transaction processing and thread-local storage.">
    <rect x="40" y="700" width="720" height="90" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="60" y="725" font-size="13" font-weight="bold" fill="#2e7d32">5. Thread-Specific Data (TSD)</text>
    <text x="60" y="747" font-size="10" fill="#388e3c">Problem: Global variables are shared. Applications need thread-private data like transaction IDs.</text>
    <text x="60" y="762" font-size="10" fill="#388e3c">Solution: Use pthread_key_create(), pthread_setspecific(), and pthread_getspecific().</text>
    <rect x="480" y="720" width="260" height="60" rx="8" fill="#fff" stroke="#388e3c" stroke-width="1.5"/>
    <text x="610" y="740" text-anchor="middle" font-size="9" fill="#2e7d32" font-weight="bold">TSD API Functions</text>
    <text x="495" y="758" font-size="8" fill="#388e3c">pthread_key_create()</text>
    <text x="580" y="758" font-size="8" fill="#388e3c">pthread_setspecific()</text>
    <text x="695" y="758" font-size="8" fill="#388e3c">pthread_getspecific()</text>
  </g>

  <!-- Step 8: Scheduler Activations -->
  <g class="step" id="step8" data-narration="Scheduler activations enable the kernel to inform the user-level thread library about thread events, maintaining concurrency in many-to-many models.">
    <rect x="40" y="805" width="720" height="90" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="60" y="830" font-size="13" font-weight="bold" fill="#e65100">6. Scheduler Activations</text>
    <text x="60" y="852" font-size="10" fill="#ef6c00">Problem: In many-to-many models, if a kernel thread blocks, all its user threads block too.</text>
    <text x="60" y="867" font-size="10" fill="#ef6c00">Solution: Kernel provides upcalls to notify the thread library about blocking events.</text>
    <rect x="490" y="820" width="250" height="65" rx="8" fill="#fff" stroke="#ff9800" stroke-width="1.5"/>
    <text x="615" y="840" text-anchor="middle" font-size="9" fill="#e65100" font-weight="bold">Upcall Mechanism</text>
    <rect x="510" y="855" width="30" height="20" rx="3" fill="#ffcc80"/>
    <rect x="555" y="855" width="30" height="20" rx="3" fill="#ffcc80"/>
    <rect x="600" y="855" width="30" height="20" rx="3" fill="#ffcc80"/>
    <text x="525" y="870" text-anchor="middle" font-size="7" fill="#e65100">User</text>
    <text x="640" y="870" text-anchor="middle" font-size="7" fill="#e65100">↑ Upcall</text>
    <text x="700" y="870" text-anchor="middle" font-size="7" fill="#e65100">Kernel</text>
  </g>

  <!-- Step 9: Visual Summary Diagram -->
  <g class="step" id="step9" data-narration="These six threading issues form the foundation of multithreaded programming challenges that every OS developer must understand.">
    <rect x="40" y="910" width="720" height="85" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="60" y="935" font-size="13" font-weight="bold" fill="#1565c0">Visual Summary: The Six Threading Issues</text>
    <rect x="60" y="948" width="95" height="35" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="107" y="962" text-anchor="middle" font-size="8" fill="#1565c0">fork/exec</text>
    <rect x="165" y="948" width="95" height="35" rx="5" fill="#ffebee" stroke="#f44336"/>
    <text x="212" y="962" text-anchor="middle" font-size="8" fill="#c62828">Cancellation</text>
    <rect x="270" y="948" width="95" height="35" rx="5" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="317" y="962" text-anchor="middle" font-size="8" fill="#6a1b9a">Signals</text>
    <rect x="375" y="948" width="95" height="35" rx="5" fill="#e0f2f1" stroke="#00897b"/>
    <text x="422" y="962" text-anchor="middle" font-size="8" fill="#00695c">Thread Pool</text>
    <rect x="480" y="948" width="95" height="35" rx="5" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="527" y="962" text-anchor="middle" font-size="8" fill="#2e7d32">TSD</text>
    <rect x="585" y="948" width="95" height="35" rx="5" fill="#fff3e0" stroke="#ff9800"/>
    <text x="632" y="962" text-anchor="middle" font-size="8" fill="#e65100">Scheduler</text>
    <rect x="690" y="948" width="50" height="35" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="715" y="970" text-anchor="middle" font-size="16" fill="#1565c0">=</text>
  </g>

  <!-- Step 10: Key Takeaways -->
  <g class="step" id="step10" data-narration="Understanding these issues is crucial for building thread-safe applications, preventing data corruption, and ensuring system stability.">
    <rect x="40" y="1010" width="720" height="85" rx="10" fill="url(#tealGrad)" filter="url(#shadow)"/>
    <text x="60" y="1035" font-size="13" font-weight="bold" fill="#00695c">Key Takeaways</text>
    <text x="60" y="1057" font-size="10" fill="#00796b">• Threading issues arise from shared memory and concurrent execution</text>
    <text x="60" y="1072" font-size="10" fill="#00796b">• Proper synchronization and design patterns prevent data corruption</text>
    <text x="320" y="1057" font-size="10" fill="#00796b">• Thread pools optimize resource usage and performance</text>
    <text x="320" y="1072" font-size="10" fill="#00796b">• Deferred cancellation ensures clean thread termination</text>
  </g>

  <!-- Step 11: Real-World Applications -->
  <g class="step" id="step11" data-narration="Threading issues apply to web servers, databases, game engines, and scientific computing where concurrent execution is essential.">
    <rect x="40" y="1110" width="720" height="70" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="60" y="1135" font-size="13" font-weight="bold" fill="#6a1b9a">Real-World Applications</text>
    <circle cx="180" cy="1155" r="18" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="180" y="1160" text-anchor="middle" font-size="8" fill="#6a1b9a">Web</text>
    <text x="180" y="1169" text-anchor="middle" font-size="8" fill="#6a1b9a">Servers</text>
    <circle cx="280" cy="1155" r="18" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="280" y="1160" text-anchor="middle" font-size="8" fill="#6a1b9a">Database</text>
    <text x="280" y="1169" text-anchor="middle" font-size="8" fill="#6a1b9a">Systems</text>
    <circle cx="380" cy="1155" r="18" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="380" y="1160" text-anchor="middle" font-size="8" fill="#6a1b9a">Game</text>
    <text x="380" y="1169" text-anchor="middle" font-size="8" fill="#6a1b9a">Engines</text>
    <circle cx="480" cy="1155" r="18" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="480" y="1160" text-anchor="middle" font-size="8" fill="#6a1b9a">Scientific</text>
    <text x="480" y="1169" text-anchor="middle" font-size="8" fill="#6a1b9a">Computing</text>
    <circle cx="580" cy="1155" r="18" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="580" y="1160" text-anchor="middle" font-size="8" fill="#6a1b9a">UI</text>
    <text x="580" y="1169" text-anchor="middle" font-size="8" fill="#6a1b9a">Apps</text>
    <circle cx="680" cy="1155" r="18" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="680" y="1160" text-anchor="middle" font-size="8" fill="#6a1b9a">Cloud</text>
    <text x="680" y="1169" text-anchor="middle" font-size="8" fill="#6a1b9a">Services</text>
  </g>

  <!-- Step 12: Conclusion -->
  <g class="step" id="step12" data-narration="Master these threading issues to build robust, efficient, and scalable concurrent applications in any modern software system.">
    <rect x="200" y="1195" width="400" height="50" rx="12" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="400" y="1218" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">Thank You for Learning!</text>
    <text x="400" y="1235" text-anchor="middle" font-size="10" fill="#1976d2">Master threading issues to build robust concurrent applications</text>
  </g>
</svg>