<svg width="420" height="400" data-topic-id="64-ch" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7b8ea" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8c9eff" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#grad)"/>
  <title>Model Identification</title>
  <g transform="translate(20, 20)">
    <rect width="100" height="20" fill="#3498db" rx="5"/>
    <text x="5" y="5" text-anchor="start" font-size="18" font-family="Arial" fill="#ffffff">Objectives of Identification</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100 20" to="360 100 20" dur="3000" begin="0s" repeatCount="indefinite"/>
    <g data-narration="Accuracy is the primary objective of model identification as it determines how well the model can forecast future values.">
      <rect width="100" height="20" fill="#e74c3c" rx="5"/>
      <text x="5" y="5" text-anchor="start" font-size="18" font-family="Arial" fill="#ffffff">Accuracy</text>
      <animateTransform attributeName="transform" type="rotate" from="0 100 40" to="360 100 40" dur="3000" begin="0s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(140, 20)">
      <rect width="100" height="20" fill="#2ecc71" rx="5"/>
      <text x="5" y="5" text-anchor="start" font-size="18" font-family="Arial" fill="#ffffff">Simplicity is another key objective of model identification</text>
      <animateTransform attributeName="transform" type="rotate" from="0 140 40" to="360 140 40" dur="3000" begin="0s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(280, 20)">
      <rect width="100" height="20" fill="#1abc9c" rx="5"/>
      <text x="5" y="5" text-anchor="start" font-size="18" font-family="Arial" fill="#ffffff">Generalizability is also an important objective of model identification</text>
      <animateTransform attributeName="transform" type="rotate" from="0 280 40" to="360 280 40" dur="3000" begin="0s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(20, 80)">
      <rect width="100" height="20" fill="#e74c3c" rx="5"/>
      <text x="5" y="5" text-anchor="start" font-size="18" font-family="Arial" fill="#ffffff">Identification techniques include Autocorrelation Function (ACF) and Partial Autocorrelation Function (PACF)</text>
      <animateTransform attributeName="transform" type="rotate" from="0 100 120" to="360 100 120" dur="3000" begin="0s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(140, 80)">
      <rect width="100" height="20" fill="#2ecc71" rx="5"/>
      <text x="5" y="5" text-anchor="start" font-size="18" font-family="Arial" fill="#ffffff">Information Criteria such as Akaike Information Criterion (AIC) and Bayesian Information Criterion (BIC) can also be used</text>
      <animateTransform attributeName="transform" type="rotate" from="0 140 120" to="360 140 120" dur="3000" begin="0s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(280, 80)">
      <rect width="100" height="20" fill="#1abc9c" rx="5"/>
      <text x="5" y="5" text-anchor="start" font-size="18" font-family="Arial" fill="#ffffff">Cross-validation is a method of evaluating the performance of a model</text>
      <animateTransform attributeName="transform" type="rotate" from="0 280 120" to="360 280 120" dur="3000" begin="0s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(20, 160)">
      <rect width="100" height="20" fill="#e74c3c" rx="5"/>
      <text x="5" y="5" text-anchor="start" font-size="18" font-family="Arial" fill="#ffffff">Before selecting a model, consider the data quality and model assumptions</text>
      <animateTransform attributeName="transform" type="rotate" from="0 100 180" to="360 100 180" dur="3000" begin="0s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(140, 160)">
      <rect width="100" height="20" fill="#2ecc71" rx="5"/>
      <text x="5" y="5" text-anchor="start" font-size="18" font-family="Arial" fill="#ffffff">Model complexity should also be considered</text>
      <animateTransform attributeName="transform" type="rotate" from="0 140 180" to="360 140 180" dur="3000" begin="0s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(280, 160)">
      <rect width="100" height="20" fill="#1abc9c" rx="5"/>
      <text x="5" y="5" text-anchor="start" font-size="18" font-family="Arial" fill="#ffffff">Finally, consider the model's potential impact on the forecast</text>
      <animateTransform attributeName="transform" type="rotate" from="0 280 180" to="360 280 180" dur="3000" begin="0s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(20, 200)">
      <rect width="420" height="20" fill="#3498db" rx="5"/>
      <text x="5" y="5" text-anchor="start" font-size="18" font-family="Arial" fill="#ffffff">Title: Model Identification</text>
      <animateTransform attributeName="transform" type="rotate" from="0 100 220" to="360 100 220" dur="3000" begin="0s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(20, 320)">
      <rect width="420" height="20" fill="#3498db" rx="5"/>
      <text x="5" y="5" text-anchor="start" font-size="18" font-family="Arial" fill="#ffffff">Footer: Model Identification</text>
      <animateTransform attributeName="transform" type="rotate" from="0 100 340" to="360 100 340" dur="3000" begin="0s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(20, 340)">
      <rect width="420" height="20" fill="#3498db" rx="5"/>
      <text x="5" y="5" text-anchor="start" font-size="18" font-family="Arial" fill="#ffffff">Arrow markers for connections</text>
      <animateTransform attributeName="transform" type="rotate" from="0 100 360" to="360 100 360" dur="3000" begin="0s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>