<svg width="420" height="400" data-topic-id="stochastic-model-checking-83-ch">
  <title>Checking the Stochastic Model (8.3 Ch)</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C2C5F5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  <g id="diagnostic-tests">
    <rect x="20" y="20" width="100" height="30" fill="#45A0E6" rx="5"/>
    <text x="50" y="40" text-anchor="middle" font-size="24" fill="#fff" data-narration="White Noise Test: checks for white noise in residuals"/>
    <animate transform="rotate(360 50 40)" dur="2000" begin="0s"/>
    <path d="M 50 40 L 30 60 Q 40 70 50 80" stroke="#fff" stroke-width="2" fill="none"/>
    <text x="50" y="80" text-anchor="middle" font-size="18" fill="#fff" data-narration="Null Hypothesis: residuals are white noise. Alternative Hypothesis: residuals are not white noise."/>
  </g>
  <g id="autocorrelation-function">
    <rect x="140" y="20" width="100" height="30" fill="#45A0E6" rx="5"/>
    <text x="170" y="40" text-anchor="middle" font-size="24" fill="#fff" data-narration="Autocorrelation Function (ACF) Test: checks for autocorrelation in residuals"/>
    <animate transform="rotate(360 170 40)" dur="2000" begin="0s"/>
    <path d="M 170 40 L 150 60 Q 160 70 170 80" stroke="#fff" stroke-width="2" fill="none"/>
    <text x="170" y="80" text-anchor="middle" font-size="18" fill="#fff" data-narration="Null Hypothesis: residuals are uncorrelated with past values. Alternative Hypothesis: residuals are correlated with past values."/>
  </g>
  <g id="partial-autocorrelation-function">
    <rect x="220" y="20" width="100" height="30" fill="#45A0E6" rx="5"/>
    <text x="250" y="40" text-anchor="middle" font-size="24" fill="#fff" data-narration="Partial Autocorrelation Function (PACF) Test: checks for partial autocorrelation in residuals"/>
    <animate transform="rotate(360 250 40)" dur="2000" begin="250ms"/>
    <path d="M 250 40 L 230 60 Q 240 70 250 80" stroke="#fff" stroke-width="2" fill="none"/>
    <text x="250" y="80" text-anchor="middle" font-size="18" fill="#fff" data-narration="Null Hypothesis: residuals are uncorrelated with distant past values. Alternative Hypothesis: residuals are correlated with distant past values."/>
  </g>
  <g id="overfitting">
    <rect x="300" y="20" width="100" height="30" fill="#45A0E6" rx="5"/>
    <text x="330" y="40" text-anchor="middle" font-size="24" fill="#fff" data-narration="Overfitting: when model is too complex and fits training data too well"/>
    <animate transform="rotate(360 330 40)" dur="2000" begin="500ms"/>
    <path d="M 330 40 L 310 60 Q 320 70 330 80" stroke="#fff" stroke-width="2" fill="none"/>
    <text x="330" y="80" text-anchor="middle" font-size="18" fill="#fff" data-narration="Cross-Validation: trains and tests model on separate subsets of data. Recursive Feature Elimination (RFE): recursively removes features until model stops improving."/>
  </g>
  <g id=" arrows">
    <line x1="50" y1="40" x2="30" y2="60" stroke="#fff" stroke-width="2" fill="none"/>
    <line x1="70" y1="40" x2="60" y2="60" stroke="#fff" stroke-width="2" fill="none"/>
    <line x1="90" y1="40" x2="80" y2="60" stroke="#fff" stroke-width="2" fill="none"/>
    <line x1="110" y1="40" x2="100" y2="60" stroke="#fff" stroke-width="2" fill="none"/>
  </g>
  <g id="footer">
    <rect x="0" y="350" width="420" height="50" fill="#45A0E6" rx="5"/>
    <text x="50" y="370" text-anchor="middle" font-size="18" fill="#fff" data-narration="Stochastic Model Checking (8.3 Ch)"/>
  </g>
</svg>