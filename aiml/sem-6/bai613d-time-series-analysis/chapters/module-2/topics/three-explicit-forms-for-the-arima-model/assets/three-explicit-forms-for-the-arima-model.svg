<svg width="420" height="400" data-topic-id="Three Explicit Forms For The Arima Model">
  <defs>
    <style>
      /* Gradient for background */
      .gradient {
        background-image: linear-gradient(to bottom, #C7B8EA, #87CEEB);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
  </defs>
  <title>Three Explicit Forms for the ARIMA Model</title>
  <footer>Learn ARIMA Model</footer>
  <g class="gradient">
    <rect x="0" y="0" width="420" height="400" style="fill-opacity: 0.5;"></rect>
    <text x="15" y="20" class="title">ARIMA Model</text>
    <text x="15" y="60" class="sub-title">Exploring the Three Explicit Forms</text>
    <section data-narration="ARIMA(p, d, q)" x="15" y="100">
      <rect x="0" y="0" width="400" height="50" style="fill-opacity: 0.8;"></rect>
      <text x="10" y="10" class="section-title">ARIMA(p, d, q)</text>
      <text x="10" y="30" class="description">Autoregressive (AR), Integrated (I), and Moving Average (MA) terms.</text>
      <text x="10" y="50" class="description">p: number of autoregressive terms.</text>
      <text x="10" y="70" class="description">d: degree of differencing.</text>
      <text x="10" y="90" class="description">q: number of moving average terms.</text>
      <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" x="10" y="120" />
    </section>
    <section data-narration="ARIMA(p, d, q, s)" x="15" y="170">
      <rect x="0" y="0" width="400" height="50" style="fill-opacity: 0.8;"></rect>
      <text x="10" y="10" class="section-title">ARIMA(p, d, q, s)</text>
      <text x="10" y="30" class="description">Add seasonality term (s).</text>
      <text x="10" y="50" class="description">p: number of autoregressive terms.</text>
      <text x="10" y="70" class="description">d: degree of differencing.</text>
      <text x="10" y="90" class="description">q: number of moving average terms.</text>
      <text x="10" y="110" class="description">s: number of seasonality terms.</text>
      <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" x="10" y="130" />
    </section>
    <section data-narration="ARIMA(p, d, q, s, r)" x="15" y="240">
      <rect x="0" y="0" width="400" height="50" style="fill-opacity: 0.8;"></rect>
      <text x="10" y="10" class="section-title">ARIMA(p, d, q, s, r)</text>
      <text x="10" y="30" class="description">Add random term (r).</text>
      <text x="10" y="50" class="description">p: number of autoregressive terms.</text>
      <text x="10" y="70" class="description">d: degree of differencing.</text>
      <text x="10" y="90" class="description">q: number of moving average terms.</text>
      <text x="10" y="110" class="description">s: number of seasonality terms.</text>
      <text x="10" y="130" class="description">r: number of random terms.</text>
      <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" x="10" y="150" />
    </section>
    <section data-narration="Key Concepts" x="15" y="310">
      <rect x="0" y="0" width="400" height="50" style="fill-opacity: 0.8;"></rect>
      <text x="10" y="10" class="section-title">Key Concepts</text>
      <text x="10" y="30" class="description">Autoregressive terms capture past values.</text>
      <text x="10" y="50" class="description">Differencing term accounts for nonstationarity.</text>
      <text x="10" y="70" class="description">Moving average terms capture past errors.</text>
    </section>
  </g>
</svg>