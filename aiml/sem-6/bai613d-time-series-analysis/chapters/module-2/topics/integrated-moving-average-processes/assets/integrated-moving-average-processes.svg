<svg width="420" height="400" data-topic-id="integrated-moving-average-processes">
  <defs>
    <style>
      .section {
        margin: 20px;
      }
    </style>
  </defs>
  <title>Integrated Moving Average Processes</title>
  <rect x="0" y="0" width="420" height="400" style="fill: #66CCCC;" />
  <rect x="50" y="50" width="320" height="300" style="fill: #C7E5F4;" />
  <text x="20" y="20" font-size="24" font-family="Arial" fill="#2E4053">Integrated Moving Average Processes</text>
  <text x="20" y="60" font-size="18" font-family="Arial" fill="#2E4053">Definition</text>
  <section data-narration="An IMA process is defined as: Y_t = μ + φ ∑_{i=1}^p (Y_{t-i}) + ε_t">
    <rect x="50" y="100" width="320" height="150" style="fill: #B2FFFC;" />
    <text x="75" y="130" font-size="16" font-family="Arial" fill="#2E4053" dominant-baseline="hanging">Y_t = μ + φ ∑_{i=1}^p (Y_{t-i}) + ε_t</text>
    <animate transform="rotate(360 180 180)" begin="0s" dur="2s" repeat="1" />
  </section>
  <section data-narration="The IMA process includes a moving average component, which captures the short-term relationships between consecutive values of the time series.">
    <rect x="50" y="270" width="320" height="130" style="fill: #A7FFC9;" />
    <text x="75" y="290" font-size="16" font-family="Arial" fill="#2E4053" dominant-baseline="hanging">Moving Average Component</text>
    <animate transform="rotate(0 180 180)" begin="2s" dur="2s" repeat="1" />
  </section>
  <section data-narration="The autoregressive component, represented by the coefficient φ, accounts for the long-term relationships between values of the time series.">
    <rect x="50" y="350" width="320" height="130" style="fill: #8FFFCC;" />
    <text x="75" y="370" font-size="16" font-family="Arial" fill="#2E4053" dominant-baseline="hanging">Autoregressive Component</text>
    <animate transform="rotate(0 180 180)" begin="4s" dur="2s" repeat="1" />
  </section>
  <section data-narration="The order of the moving average process, p, determines the number of past values of the time series that are used in the forecasting calculation.">
    <rect x="50" y="420" width="320" height="70" style="fill: #C6E2FF;" />
    <text x="75" y="440" font-size="16" font-family="Arial" fill="#2E4053" dominant-baseline="hanging">Order of the Moving Average Process</text>
    <animate transform="rotate(0 180 180)" begin="6s" dur="2s" repeat="1" />
  </section>
  <section data-narration="The autoregressive parameter, φ, determines the strength of the long-term relationships between values of the time series.">
    <rect x="50" y="500" width="320" height="70" style="fill: #FFC6E2;" />
    <text x="75" y="520" font-size="16" font-family="Arial" fill="#2E4053" dominant-baseline="hanging">Autoregressive Parameter</text>
    <animate transform="rotate(0 180 180)" begin="8s" dur="2s" repeat="1" />
  </section>
  <footer>Author: [Your Name]</footer>
</svg>