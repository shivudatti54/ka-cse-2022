<svg width="420" height="400" data-topic-id="binary-search">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#B2FFFC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7E7BD" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <title Binayr Search</title>

  <rect x="50" y="50" width="320" height="300" fill="url(#pastel-gradient)"/>

  <g transform="translate(60, 60)">
    <rect width="200" height="20" fill="#3498DB" rx="5"/>
    <text x="10" y="5" fill="#FFFFFF" font-size="18" font-family="Arial" text-anchor="start">Binary Search</text>
  </g>

  <g transform="translate(60, 120)">
    <rect width="200" height="20" fill="#2ECC71" rx="5"/>
    <text x="10" y="5" fill="#FFFFFF" font-size="18" font-family="Arial" text-anchor="start">Introduction</text>
    <text x="10" y="25" fill="#FFFFFF" font-size="14" font-family="Arial" text-anchor="start" data-narration="Start with a sorted list: Binary search requires the list to be sorted. If the list is not sorted, the results will be incorrect." />
  </g>

  <g transform="translate(60, 200)">
    <rect width="200" height="20" fill="#F1C40F" rx="5"/>
    <text x="10" y="5" fill="#FFFFFF" font-size="18" font-family="Arial" text-anchor="start">How Binary Search Works</text>
    <text x="10" y="25" fill="#FFFFFF" font-size="14" font-family="Arial" text-anchor="start" data-narration="Find the middle element: Find the middle element of the list." />
    <text x="10" y="50" fill="#FFFFFF" font-size="14" font-family="Arial" text-anchor="start" data-narration="Compare the target element with the middle element: Compare the target element with the middle element." />
    <text x="10" y="75" fill="#FFFFFF" font-size="14" font-family="Arial" text-anchor="start" data-narration="Repeat the process until the target element is found or the list is exhausted: Repeat the process until the target element is found or the list is exhausted." />
  </g>

  <g transform="translate(60, 280)">
    <rect width="200" height="20" fill="#E74C3C" rx="5"/>
    <text x="10" y="5" fill="#FFFFFF" font-size="18" font-family="Arial" text-anchor="start">Example</text>
    <text x="10" y="25" fill="#FFFFFF" font-size="14" font-family="Arial" text-anchor="start" data-narration="Suppose we have a sorted list of integers: \[1, 2, 3, 4, 5, 6, 7, 8, 9\]. We want to find the index of the element 5 using binary search:"/>
    <rect x="10" y="50" width="150" height="5" fill="#2ECC71" rx="2.5"/>
    <text x="10" y="60" fill="#FFFFFF" font-size="14" font-family="Arial" text-anchor="start" data-narration="Find the middle element: 5"/>
    <text x="10" y="70" fill="#FFFFFF" font-size="14" font-family="Arial" text-anchor="start" data-narration="Compare the target element with the middle element: 5 is equal to 5, so we return the index 4:"/>
  </g>

  <g transform="translate(60, 340)">
    <rect width="200" height="20" fill="#F1C40F" rx="5"/>
    <text x="10" y="5" fill="#FFFFFF" font-size="18" font-family="Arial" text-anchor="start">Time Complexity</text>
    <text x="10" y="25" fill="#FFFFFF" font-size="14" font-family="Arial" text-anchor="start" data-narration="The time complexity of binary search is O(log n), where n is the number of elements in the list:"/>
    <text x="10" y="45" fill="#FFFFFF" font-size="14" font-family="Arial" text-anchor="start" data-narration="This is because with each iteration, the search space is halved:"/>
    <g transform="translate(130, 70)">
      <path fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2" d="M 50, 50 L 100, 50"/>
      <text x="50" y="60" fill="#000" font-size="12" font-family="Arial" text-anchor="start">n/2</text>
      <text x="100" y="60" fill="#000" font-size="12" font-family="Arial" text-anchor="start">n/2 - 1</text>
    </g>
  </g>

  <footer>
    <g transform="translate(60, 380)">
      <rect width="200" height="20" fill="#F1C40F" rx="5"/>
      <text x="10" y="5" fill="#FFFFFF" font-size="18" font-family="Arial" text-anchor="start">Copyright 2024</text>
    </g>
  </footer>
</svg>