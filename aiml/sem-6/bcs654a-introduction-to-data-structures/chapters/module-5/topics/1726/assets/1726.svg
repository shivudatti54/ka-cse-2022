<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="insertion-sort-1726">
  <desc>Insertion Sort Algorithm</desc>
  <title>Insertion Sort</title>
  <metadata>
    <title>Insertion Sort Algorithm</title>
    <description>Insertion sort is a simple sorting algorithm that works by dividing the input into a sorted and an unsorted region.</description>
  </metadata>
  <rect x="10" y="10" width="400" height="380" fill="#C7B8EA" rx="10"/>
  <rect x="10" y="10" width="40" height="40" fill="#3498DB" rx="10"/>
  <symbol id="arrow" viewBox="0 0 24 24" fill="none" stroke="#3498DB" stroke-width="2">
    <path d="M12 12v-3h-3l-1.5 2h3l-1.5-2zm0-9l-3 5L6 6h6l5 3z"/>
  </symbol>
  <g id="animation-container">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="420,0" dur="2s" begin="0s" repeatCount="indefinite"/>
    <text x="50" y="120" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498DB" data-narration="Start with the first element of the unsorted region.">Start with the first element.</text>
    <animate attribute="opacity" from="1" to="0" dur="0.5s" begin="0s"/>
    <g opacity="1">
      <rect x="30" y="150" width="40" height="40" fill="#3498DB" rx="10"/>
      <text x="50" y="170" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498DB" data-narration="Compare the current element with the elements in the sorted region.">Compare with sorted region.</text>
      <animate attribute="opacity" from="1" to="0" dur="0.5s" begin="0.5s"/>
    </g>
    <g opacity="1">
      <rect x="30" y="200" width="40" height="40" fill="#3498DB" rx="10"/>
      <text x="50" y="220" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498DB" data-narration="Insert the current element into the sorted region at its correct position.">Insert into sorted region.</text>
      <animate attribute="opacity" from="1" to="0" dur="0.5s" begin="1s"/>
    </g>
    <g opacity="1">
      <rect x="30" y="250" width="40" height="40" fill="#3498DB" rx="10"/>
      <text x="50" y="270" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498DB" data-narration="Move to the next element in the unsorted region and repeat the process.">Repeat process.</text>
      <animate attribute="opacity" from="1" to="0" dur="0.5s" begin="1.5s"/>
    </g>
    <g opacity="1">
      <rect x="30" y="300" width="40" height="40" fill="#3498DB" rx="10"/>
      <text x="50" y="320" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498DB" data-narration="The final sorted array is [1, 2, 3, 5, 6, 8].">Final sorted array.</text>
      <animate attribute="opacity" from="1" to="0" dur="0.5s" begin="2s"/>
    </g>
  </g>
  <circle cx="210" cy="220" r="10" fill="#8BC34A" data-narration="Best-case: O(n)"/>
  <circle cx="210" cy="220" r="10" fill="#8BC34A" data-narration="Average-case: O(n^2)"/>
  <circle cx="210" cy="220" r="10" fill="#8BC34A" data-narration="Worst-case: O(n^2)"/>
  <rect x="10" y="350" width="400" height="50" fill="#8BC34A" rx="10" data-narration="Space complexity: O(1)"/>
  <text x="50" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498DB">Insertion Sort</text>
  <symbol id="arrow-2" viewBox="0 0 24 24" fill="none" stroke="#3498DB" stroke-width="2">
    <path d="M12 12v-3h-3l-1.5 2h3l-1.5-2zm0-9l-3 5L6 6h6l5 3z"/>
  </symbol>
</svg>