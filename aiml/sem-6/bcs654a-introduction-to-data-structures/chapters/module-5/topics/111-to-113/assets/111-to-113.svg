<svg width="420" height="400" data-topic-id="sorting-11-1-1" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastelGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B2FFFC"/>
      <stop offset="100%" stop-color="#C9E4CA"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastelGradient)"/>

  <!-- Title and footer -->
  <text x="50%" y="10%" font-size="24" text-anchor="middle" fill="#1A1D23" font-family="Arial">
    Sorting Algorithms
  </text>
  <text x="50%" y="380%" font-size="18" text-anchor="middle" fill="#1A1D23" font-family="Arial">
    111 To 113
  </text>

  <!-- Section 1: Introduction to Sorting -->
  <rect x="50" y="60" width="320" height="100" fill="#F7F7F7" data-narration="What is Sorting?">
    <text x="60" y="80" font-size="18" text-anchor="middle" fill="#35495E" font-family="Arial">
      Sorting
    </text>
    <text x="60" y="100" font-size="16" text-anchor="middle" fill="#35495E" font-family="Arial">
      is the process of arranging data in a specific order, usually in ascending or descending order, to make it easier to analyze or use.
    </text>
  </rect>
  <animate transform="rotate(45 60 80)" begin="0s" dur="2s" repeat-count="indefinite"/>

  <!-- Section 2: Reasons for Sorting -->
  <rect x="50" y="170" width="320" height="100" fill="#F7F7F7" data-narration="Why is Sorting Important?">
    <text x="60" y="90" font-size="18" text-anchor="middle" fill="#35495E" font-family="Arial">
      Benefits of Sorting
    </text>
    <text x="60" y="110" font-size="16" text-anchor="middle" fill="#35495E" font-family="Arial">
      Easy to read and understand data, fast data retrieval and manipulation, improved data organization and management, and simplified data analysis and visualization.
    </text>
  </rect>
  <animate transform="rotate(90 60 90)" begin="0.5s" dur="2s" repeat-count="indefinite"/>

  <!-- Section 3: Types of Sorting -->
  <rect x="50" y="270" width="320" height="100" fill="#F7F7F7" data-narration="Types of Sorting Algorithms">
    <text x="60" y="90" font-size="18" text-anchor="middle" fill="#35495E" font-family="Arial">
      Sorting Algorithms
    </text>
    <text x="60" y="110" font-size="16" text-anchor="middle" fill="#35495E" font-family="Arial">
      In-place sorting: sorting data without using extra memory, external sorting: sorting data using extra memory, usually for large datasets.
    </text>
  </rect>
  <animate transform="rotate(135 60 90)" begin="1s" dur="2s" repeat-count="indefinite"/>

  <!-- Section 4: Common Sorting Algorithms -->
  <rect x="50" y="370" width="320" height="100" fill="#F7F7F7" data-narration="Common Sorting Algorithms">
    <text x="60" y="90" font-size="18" text-anchor="middle" fill="#35495E" font-family="Arial">
    Sorting Algorithms
  </text>
    <text x="60" y="110" font-size="16" text-anchor="middle" fill="#35495E" font-family="Arial">
      Bubble Sort, Selection Sort, Insertion Sort.
    </text>
  </rect>
  <animate transform="rotate(180 60 90)" begin="1.5s" dur="2s" repeat-count="indefinite"/>

  <!-- Section 5: Bubble Sort -->
  <rect x="50" y="470" width="320" height="100" fill="#F7F7F7" data-narration="How Bubble Sort Works">
    <text x="60" y="90" font-size="18" text-anchor="middle" fill="#35495E" font-family="Arial">
    Bubble Sort
  </text>
    <text x="60" y="110" font-size="16" text-anchor="middle" fill="#35495E" font-family="Arial">
      Start at the beginning of the array, compare adjacent elements and swap them if they are in the wrong order, repeat until no more swaps are needed.
    </text>
  </rect>
  <animate transform="rotate(45 60 80)" begin="2s" dur="2s" repeat-count="indefinite"/>

  <!-- Section 6: Bubble Sort Example -->
  <rect x="50" y="570" width="320" height="100" fill="#F7F7F7" data-narration="Bubble Sort Example">
    <text x="60" y="90" font-size="18" text-anchor="middle" fill="#35495E" font-family="Arial">
    Example of Bubble Sort
  </text>
    <text x="60" y="110" font-size="16" text-anchor="middle" fill="#35495E" font-family="Arial">
      Suppose we want to sort the array [5, 2, 8, 3, 1] using bubble sort, start at the beginning of the array, compare adjacent elements and swap them if they are in the wrong order, repeat until the end of the array is reached.
    </text>
  </rect>
  <animate transform="rotate(90 60 90)" begin="3s" dur="2s" repeat-count="indefinite"/>
</svg>