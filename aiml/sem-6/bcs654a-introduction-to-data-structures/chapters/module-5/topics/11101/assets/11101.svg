<svg width="420" height="400" data-topic-id="11101">
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#C9E4CA"/>
            <stop offset="50%" stop-color="#C7F464"/>
            <stop offset="100%" stop-color="#C2E4B5"/>
        </linearGradient>
        <style>
            .text {
                font-size: 16px;
                font-weight: bold;
            }
            .arrow {
                stroke: #6495ED;
                stroke-width: 2;
            }
        </style>
    </defs>
    < rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>
    <g transform="translate(20, 20)">
        <rect x="0" y="0" width="100%" height="200"/>
    </g>
    <g transform="translate(20, 220)">
        <path d="M 20,200 L 150,200 L 150,220 L 20,220 Z"/>
        <text x="50" y="210" class="text">Sorting Algorithms</text>
        <text x="50" y="240" class="text">Introduction to Sorting Algorithms</text>
    </g>
    <g transform="translate(20, 240)">
        <rect x="0" y="0" width="100%" height="100"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" begin="0s"/>
        <text x="50" y="50" class="text">What is Sorting?</text>
        <text x="50" y="80" class="text">Sorting is the process of arranging elements in a specific order, usually in ascending or descending order, within a collection of data.</text>
        <animateTransform attributeName="transform" type="translate" from="0 100" to="0 0" dur="2s" begin="1.5s"/>
    </g>
    <g transform="translate(20, 340)">
        <rect x="0" y="0" width="100%" height="100"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" dur="2s" begin="3s"/>
        <path d="M 20,50 L 150,50 L 150,60 L 20,60 Z"/>
        <rect x="0" y="50" width="100%" height="50"/>
        <animateTransform attributeName="transform" type="translate" from="0 50" to="0 0" dur="2s" begin="4.5s"/>
        <text x="50" y="70" class="text">Types of Sorting Algorithms</text>
        <text x="50" y="100" class="text">There are several sorting algorithms, each with its own strengths and weaknesses.</text>
        <path d="M 20,30 L 150,30 L 150,40 L 20,40 Z"/>
        <rect x="0" y="30" width="100%" height="20"/>
        <animateTransform attributeName="transform" type="translate" from="0 30" to="0 0" dur="2s" begin="6s"/>
    </g>
    <g transform="translate(20, 450)">
        <rect x="0" y="0" width="100%" height="100"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" begin="7.5s"/>
        <path d="M 20,100 L 150,100 L 150,110 L 20,110 Z"/>
        <text x="50" y="120" class="text">Bubble Sort</text>
        <text x="50" y="150" class="text">Bubble sort is a simple sorting algorithm that repeatedly steps through the list, compares adjacent elements, and swaps them if they are in the wrong order.</text>
        <animateTransform attributeName="transform" type="translate" from="0 100" to="0 0" dur="2s" begin="8.5s"/>
    </g>
    <g transform="translate(20, 560)">
        <rect x="0" y="0" width="100%" height="100"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" dur="2s" begin="9.5s"/>
        <path d="M 20,50 L 150,50 L 150,60 L 20,60 Z"/>
        <rect x="0" y="50" width="100%" height="50"/>
        <animateTransform attributeName="transform" type="translate" from="0 50" to="0 0" dur="2s" begin="10.5s"/>
        <text x="50" y="70" class="text">How Bubble Sort Works</text>
        <text x="50" y="100" class="text">Start at the beginning of the list. Compare the first two elements. If they are in the wrong order, swap them.</text>
        <path d="M 20,30 L 150,30 L 150,40 L 20,40 Z"/>
        <rect x="0" y="30" width="100%" height="20"/>
        <animateTransform attributeName="transform" type="translate" from="0 30" to="0 0" dur="2s" begin="11.5s"/>
    </g>
    <g transform="translate(20, 670)">
        <rect x="0" y="0" width="100%" height="100"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" begin="12.5s"/>
        <path d="M 20,100 L 150,100 L 150,110 L 20,110 Z"/>
        <text x="50" y="120" class="text">Example of Bubble Sort</text>
        <text x="50" y="150" class="text">Suppose we have the following list of integers: [5, 2, 8, 3, 1, 6, 4]</text>
        <animateTransform attributeName="transform" type="translate" from="0 100" to="0 0" dur="2s" begin="13.5s"/>
    </g>
    <g transform="translate(20, 780)">
        <rect x="0" y="0" width="100%" height="100"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" dur="2s" begin="14.5s"/>
        <path d="M 20,50 L 150,50 L 150,60 L 20,60 Z"/>
        <rect x="0" y="50" width="100%" height="50"/>
        <animateTransform attributeName="transform" type="translate" from="0 50" to="0 0" dur="2s" begin="15.5s"/>
        <text x="50" y="70" class="text">Time Complexity of Bubble Sort</text>
        <text x="50" y="100" class="text">The time complexity of bubble sort is O(n^2), where n is the number of elements in the list.</text>
        <path d="M 20,30 L 150,30 L 150,40 L 20,40 Z"/>
        <rect x="0" y="30" width="100%" height="20"/>
        <animateTransform attributeName="transform" type="translate" from="0 30" to="0 0" dur="2s" begin="16.5s"/>
    </g>
</svg>