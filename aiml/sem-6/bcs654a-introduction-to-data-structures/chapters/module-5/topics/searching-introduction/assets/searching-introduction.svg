<svg width="420" height="400" data-topic-id="Searching-Introduction">
  <style>
    /* Add style to the SVG */
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    .container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    .section {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      text-align: center;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
      background-color: #f7f7f7;
    }
    .section[data-narration="What is Parsing?"] {
      background-color: #ADD8E6;
    }
    .section[data-narration="The Role of Parser in Compilation Process"] {
      background-color: #C6E2B5;
    }
    .section[data-narration="Context-Free Grammars (CFG)"] {
      background-color: #C5CAE9;
    }
    .section[data-narration="Parse Trees and Abstract Syntax Trees"] {
      background-color: #B2E6CE;
    }
    .section[data-narration="Parsing relies on context-free grammars, which formally define the syntax of programming languages"] {
      background-color: #B2E6CE;
    }
    .section[data-narration="A CFG consists of: Terminals, Nonterminals, Productions, and Start symbol"] {
      background-color: #B2E6CE;
    }
    .section[data-narration="A Parse Tree is a tree representation of the syntactic structure of a program that shows all the details of the grammar rules used"] {
      background-color: #B2E6CE;
    }
    .section[data-narration="An Abstract Syntax Tree is a tree representation of the syntactic structure of a program that shows only the syntactic relationships between the tokens"] {
      background-color: #B2E6CE;
    }
    .section[data-narration="A Parse Tree has a root node, which is the start symbol, and child nodes, which are the nonterminals and terminals"] {
      background-color: #B2E6CE;
    }
    .section[data-narration="An Abstract Syntax Tree has a root node, which is the start symbol, and child nodes, which are the nonterminals and terminals, but the relationships between them are not shown"] {
      background-color: #B2E6CE;
    }
    .section[data-narration="Parse Trees and Abstract Syntax Trees are used to visually represent the syntactic structure of a program"] {
      background-color: #B2E6CE;
    }
    .section[data-narration="Smooth animations are added to the Parse Tree and Abstract Syntax Tree to make them more engaging and easy to understand"] {
      background-color: #B2E6CE;
    }
  </style>
