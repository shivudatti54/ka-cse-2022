<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="introduction-to-data-structures">
  <rect x="0" y="0" width="420" height="400" fill="#ADD8E6" style="stroke:rgb(0,0,0);stroke-width:1;stroke-linecap:round;stroke-linejoin:round"/>
