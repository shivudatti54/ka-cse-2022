    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#Gradient1)" style="stroke:rgb(0,0,0);stroke-width:1;stroke-linecap:round;stroke-linejoin:round"/>
  <text x="15" y="50" style="font-size:24px;fill:rgb(0,0,0);font-family:Arial, sans-serif;" data-narration="What is Sorting?">
    Sorting
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 210 50" to="360 210 50" dur="2s" begin="0s"/>
  <rect x="20" y="80" width="80" height="40" fill="#ADD8E6" style="stroke:rgb(0,0,0);stroke-width:1;stroke-linecap:round;stroke-linejoin:round"/>
  <text x="120" y="80" style="font-size:18px;fill:rgb(0,0,0);font-family:Arial, sans-serif;" data-narration="What is Sorting?">
    Sorting is the process of arranging elements of a collection in a specific order, such as ascending or descending order.
  </text>
  <animateTransform attributeName="transform" type="translate" from="0 150" to="0 200" dur="2s" begin="0s"/>
  <rect x="20" y="200" width="80" height="40" fill="#ADD8E6" style="stroke:rgb(0,0,0);stroke-width:1;stroke-linecap:round;stroke-linejoin:round"/>
  <text x="120" y="200" style="font-size:18px;fill:rgb(0,0,0);font-family:Arial, sans-serif;" data-narration="Types of Sorting">
    Sorting is an essential operation in various applications, including data processing, searching, and database management.
  </text>
  <animateTransform attributeName="transform" type="translate" from="0 250" to="0 300" dur="2s" begin="0s"/>
  <rect x="20" y="300" width="80" height="40" fill="#ADD8E6" style="stroke:rgb(0,0,0);stroke-width:1;stroke-linecap:round;stroke-linejoin:round"/>
  <text x="120" y="300" style="font-size:18px;fill:rgb(0,0,0);font-family:Arial, sans-serif;" data-narration="Importance of Sorting">
    Bubble Sort is a simple sorting algorithm that works by repeatedly iterating through the collection and swapping adjacent elements if they are in the wrong order.
  </text>
  <animateTransform attributeName="transform" type="translate" from="0 350" to="0 400" dur="2s" begin="0s"/>
  <rect x="20" y="400" width="80" height="40" fill="#ADD8E6" style="stroke:rgb(0,0,0);stroke-width:1;stroke-linecap:round;stroke-linejoin:round"/>
  <text x="120" y="400" style="font-size:18px;fill:rgb(0,0,0);font-family:Arial, sans-serif;" data-narration="How Bubble Sort Works">
