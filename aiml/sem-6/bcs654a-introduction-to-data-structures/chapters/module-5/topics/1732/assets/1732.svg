<svg width="420" height="400" data-topic-id="insertion-sort">
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2A5CF" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="acents-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3498DB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E74C3C" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Insertion Sort</title>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  <text x="20" y="20" font-size="24" font-family="Arial" fill="#fff">Insertion Sort</text>
  <g id="intro">
    <rect x="50" y="100" width="320" height="150" fill="none" stroke="#fff" stroke-width="2"/>
    <text x="60" y="120" font-size="18" font-family="Arial" fill="#333">Introduction</text>
    <text x="60" y="150" font-size="18" font-family="Arial" fill="#333">Insertion sort is a simple sorting algorithm.</text>
    <text x="60" y="180" font-size="18" font-family="Arial" fill="#333">It works by dividing the input into a sorted and unsorted region.</text>
  </g>
  <g id="algorithm">
    <rect x="50" y="250" width="320" height="150" fill="none" stroke="#fff" stroke-width="2"/>
    <text x="60" y="270" font-size="18" font-family="Arial" fill="#333">Algorithm</text>
    <animateTransform attributeName="transform" type="translate" from="0 250" to="0 300" dur="2s" begin="-1s"/>
    <animateTransform attributeName="transform" type="translate" from="0 300" to="0 350" dur="2s" begin="s"/>
    <g data-narration="Start with the first element">
      <rect x="100" y="300" width="20" height="20" fill="#3498DB" rx="2"/>
      <text x="120" y="320" font-size="14" font-family="Arial" fill="#333">5</text>
    </g>
    <g data-narration="Compare with previous elements">
      <rect x="150" y="300" width="20" height="20" fill="#E74C3C" rx="2"/>
      <text x="170" y="320" font-size="14" font-family="Arial" fill="#333">2</text>
    </g>
    <g data-narration="Shift elements to make room">
      <rect x="200" y="300" width="20" height="20" fill="#E74C3C" rx="2"/>
      <text x="220" y="320" font-size="14" font-family="Arial" fill="#333">8</text>
    </g>
    <g data-narration="Insert the current element">
      <rect x="250" y="300" width="20" height="20" fill="#E74C3C" rx="2"/>
      <text x="270" y="320" font-size="14" font-family="Arial" fill="#333">3</text>
    </g>
    <g data-narration="Repeat the process">
      <rect x="300" y="300" width="20" height="20" fill="#E74C3C" rx="2"/>
      <text x="320" y="320" font-size="14" font-family="Arial" fill="#333">1</text>
    </g>
    <g data-narration="Repeat the process">
      <rect x="350" y="300" width="20" height="20" fill="#E74C3C" rx="2"/>
      <text x="370" y="320" font-size="14" font-family="Arial" fill="#333">6</text>
    </g>
    <g data-narration="Repeat the process">
      <rect x="400" y="300" width="20" height="20" fill="#E74C3C" rx="2"/>
      <text x="420" y="320" font-size="14" font-family="Arial" fill="#333">4</text>
    </g>
  </g>
  <g id="example">
    <rect x="50" y="400" width="320" height="150" fill="none" stroke="#fff" stroke-width="2"/>
    <text x="60" y="420" font-size="18" font-family="Arial" fill="#333">Example</text>
    <g data-narration="Suppose we want to sort the following list of integers using insertion sort:">
      <rect x="100" y="430" width="20" height="20" fill="#E74C3C" rx="2"/>
      <text x="120" y="450" font-size="14" font-family="Arial" fill="#333">5</text>
      <rect x="150" y="430" width="20" height="20" fill="#E74C3C" rx="2"/>
      <text x="170" y="450" font-size="14" font-family="Arial" fill="#333">2</text>
      <rect x="200" y="430" width="20" height="20" fill="#E74C3C" rx="2"/>
      <text x="220" y="450" font-size="14" font-family="Arial" fill="#333">8</text>
      <rect x="250" y="430" width="20" height="20" fill="#E74C3C" rx="2"/>
      <text x="270" y="450" font-size="14" font-family="Arial" fill="#333">3</text>
      <rect x="300" y="430" width="20" height="20" fill="#E74C3C" rx="2"/>
      <text x="320" y="450" font-size="14" font-family="Arial" fill="#333">1</text>
      <rect x="350" y="430" width="20" height="20" fill="#E74C3C" rx="2"/>
      <text x="370" y="450" font-size="14" font-family="Arial" fill="#333">6</text>
      <rect x="400" y="430" width="20" height="20" fill="#E74C3C" rx="2"/>
      <text x="420" y="450" font-size="14" font-family="Arial" fill="#333">4</text>
    </g>
    <g data-narration="Here's how the insertion sort algorithm would work:">
      <rect x="100" y="460" width="20" height="20" fill="#3498DB" rx="2"/>
      <text x="120" y="480" font-size="14" font-family="Arial" fill="#333">5</text>
      <rect x="150" y="460" width="20" height="20" fill="#3498DB" rx="2"/>
      <text x="170" y="480" font-size="14" font-family="Arial" fill="#333">2</text>
      <rect x="200" y="460" width="20" height="20" fill="#3498DB" rx="2"/>
      <text x="220" y="480" font-size="14" font-family="Arial" fill="#333">8</text>
      <rect x="250" y="460" width="20" height="20" fill="#3498DB" rx="2"/>
      <text x="270" y="480" font-size="14" font-family="Arial" fill="#333">3</text>
      <rect x="300" y="460" width="20" height="20" fill="#3498DB" rx="2"/>
      <text x="320" y="480" font-size="14" font-family="Arial" fill="#333">1</text>
      <rect x="350" y="460" width="20" height="20" fill="#3498DB" rx="2"/>
      <text x="370" y="480" font-size="14" font-family="Arial" fill="#333">6</text>
      <rect x="400" y="460" width="20" height="20" fill="#3498DB" rx="2"/>
      <text x="420" y="480" font-size="14" font-family="Arial" fill="#333">4</text>
    </g>
    <g data-narration="Here's the updated list after each step:">
      <rect x="100" y="500" width="20" height="20" fill="#3498DB" rx="2"/>
      <text x="120" y="520" font-size="14" font-family="Arial" fill="#333">5</text>
      <rect x="150" y="500" width="20" height="20" fill="#3498DB" rx="2"/>
      <text x="170" y="520" font-size="14" font-family="Arial" fill="#333">2 5</text>
      <rect x="200" y="500" width="20" height="20" fill="#3498DB" rx="2"/>
      <text x="220" y="520" font-size="14" font-family="Arial" fill="#333">8 5</text>
      <rect x="250" y="500" width="20" height="20" fill="#3498DB" rx="2"/>
      <text x="270" y="520" font-size="14" font-family="Arial" fill="#333">3 5</text>
      <rect x="300" y="500" width="20" height="20" fill="#3498DB" rx="2"/>
      <text x="320" y="520" font-size="14" font-family="Arial" fill="#333">1 5</text>
      <rect x="350" y="500" width="20" height="20" fill="#3498DB" rx="2"/>
      <text x="370" y="520" font-size="14" font-family="Arial" fill="#333">6 5</text>
      <rect x="400" y="500" width="20" height="20" fill="#3498DB" rx="2"/>
      <text x="420" y="520" font-size="14" font-family="Arial" fill="#333">4 5</text>
    </g>
  </g>
  <g id="conclusion">
    <rect x="50" y="550" width="320" height="50" fill="none" stroke="#fff" stroke-width="2"/>
    <text x="60" y="570" font-size="18" font-family="Arial" fill="#333">Conclusion</text>
    <g data-narration="Insertion sort is a simple and efficient sorting algorithm">
      <rect x="100" y="580" width="20" height="20" fill="#3498DB" rx="2"/>
      <text x="120" y="600" font-size="14" font-family="Arial" fill="#333">It is a stable sorting algorithm.</text>
      <rect x="150" y="580" width="20" height="20" fill="#3498DB" rx="2"/>
      <text x="170" y="600" font-size="14" font-family="Arial" fill="#333">It has a time complexity of O(n^2).</text>
    </g>
  </g>
  <g id="arrowmarkers">
    <line x1="20" y1="20" x2="40" y2="40" stroke="#fff" stroke-width="2"/>
    <line x1="100" y1="100" x2="120" y2="120" stroke="#fff" stroke-width="2"/>
    <line x1="150" y1="150" x2="170" y2="170" stroke="#fff" stroke-width="2"/>
    <line x1="200" y1="200" x2="220" y2="220" stroke="#fff" stroke-width="2"/>
    <line x1="250" y1="250" x2="270" y2="270" stroke="#fff" stroke-width="2"/>
    <line x1="300" y1="300" x2="320" y2="320" stroke="#fff" stroke-width="2"/>
  </g>
</svg>