<svg width="420" height="400" data-topic-id="linear-search">
  <desc>Linear Search Algorithm</desc>
  <style>
    /* Add some basic styling */
    body {
      background: radial-gradient(to bottom, #C7B8EA, #B0B3CE, #A1C9F2);
      font-family: Arial, sans-serif;
    }
    .section {
      position: absolute;
      top: 100px;
      left: 0;
      width: 420px;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    .data-narration {
      font-size: 18px;
      color: #333;
    }
    .highlight {
      background-color: #FFC107;
      padding: 10px;
      border-radius: 10px;
    }
    .arrow {
      fill: #007bff;
      stroke: #fff;
      stroke-width: 2;
      shape-rendering: crispEdges;
    }
  </style>
  <defs>
    <linearGradient id="linear-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7b8ea" stop-opacity="1" />
      <stop offset="100%" stop-color="#b0b3ce" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#linear-gradient)" rx="10" />
  <rect x="0" y="20" width="420" height="360" fill="#fff" rx="10" />
  <g id="initial-state">
    <rect x="10" y="10" width="80" height="20" fill="#fff" rx="5" />
    <text x="15" y="20" font-size="18" font-family="Arial" fill="#333">Initial State:</text>
    <rect x="150" y="10" width="80" height="20" fill="#fff" rx="5" />
    <text x="155" y="20" font-size="18" font-family="Arial" fill="#333">Array:</text>
    <text x="250" y="20" font-size="18" font-family="Arial" fill="#333">Target:</text>
    <rect x="320" y="10" width="80" height="20" fill="#fff" rx="5" />
    <text x="325" y="20" font-size="18" font-family="Arial" fill="#333">Pointer:</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="400 20" dur="2s" begin="0s" />
  </g>
  <g id="iteration-1">
    <rect x="10" y="50" width="80" height="20" fill="#fff" rx="5" />
    <text x="15" y="60" font-size="18" font-family="Arial" fill="#333">Iteration 1:</text>
    <rect x="150" y="50" width="80" height="20" fill="#fff" rx="5" />
    <text x="155" y="60" font-size="18" font-family="Arial" fill="#333">Compare 10 with 86:</text>
    <rect x="220" y="50" width="80" height="20" fill="#fff" rx="5" />
    <text x="225" y="60" font-size="18" font-family="Arial" fill="#333">10 ≠ 86</text>
    <animateTransform attributeName="transform" type="translate" from="80 50" to="200 60" dur="2s" begin="0s" />
  </g>
  <g id="iteration-2">
    <rect x="10" y="80" width="80" height="20" fill="#fff" rx="5" />
    <text x="15" y="90" font-size="18" font-family="Arial" fill="#333">Iteration 2:</text>
    <rect x="150" y="80" width="80" height="20" fill="#fff" rx="5" />
    <text x="155" y="90" font-size="18" font-family="Arial" fill="#333">Compare 23 with 86:</text>
    <rect x="220" y="80" width="80" height="20" fill="#fff" rx="5" />
    <text x="225" y="90" font-size="18" font-family="Arial" fill="#333">23 ≠ 86</text>
    <animateTransform attributeName="transform" type="translate" from="200 80" to="320 90" dur="2s" begin="2s" />
  </g>
  <g id="iteration-3">
    <rect x="10" y="110" width="80" height="20" fill="#fff" rx="5" />
    <text x="15" y="120" font-size="18" font-family="Arial" fill="#333">Iteration 3:</text>
    <rect x="150" y="110" width="80" height="20" fill="#fff" rx="5" />
    <text x="155" y="120" font-size="18" font-family="Arial" fill="#333">Compare 45 with 86:</text>
    <rect x="220" y="110" width="80" height="20" fill="#fff" rx="5" />
    <text x="225" y="120" font-size="18" font-family="Arial" fill="#333">45 ≠ 86</text>
    <animateTransform attributeName="transform" type="translate" from="320 110" to="440 120" dur="2s" begin="4s" />
  </g>
  <g id="iteration-4">
    <rect x="10" y="140" width="80" height="20" fill="#fff" rx="5" />
    <text x="15" y="150" font-size="18" font-family="Arial" fill="#333">Iteration 4:</text>
    <rect x="150" y="140" width="80" height="20" fill="#fff" rx="5" />
    <text x="155" y="150" font-size="18" font-family="Arial" fill="#333">Compare 72 with 86:</text>
    <rect x="220" y="140" width="80" height="20" fill="#fff" rx="5" />
    <text x="225" y="150" font-size="18" font-family="Arial" fill="#333">72 ≠ 86</text>
    <rect x="250" y="140" width="80" height="20" fill="#FFC107" rx="5" />
    <text x="255" y="150" font-size="18" font-family="Arial" fill="#333">Match found at index 4!</text>
    <animateTransform attributeName="transform" type="translate" from="440 140" to="500 150" dur="2s" begin="6s" />
  </g>
  <g id="footer">
    <text x="50%" y="390" font-size="24" font-family="Arial" fill="#333">Linear Search Algorithm</text>
  </g>
  <path id="arrow-1" d="M 100 200 L 150 210" fill="none" stroke="#007bff" stroke-width="2" />
  <path id="arrow-2" d="M 240 200 L 290 210" fill="none" stroke="#007bff" stroke-width="2" />
  <path id="arrow-3" d="M 380 200 L 430 210" fill="none" stroke="#007bff" stroke-width="2" />
  <path id="arrow-4" d="M 520 200 L 570 210" fill="none" stroke="#007bff" stroke-width="2" />
  <path id="arrow-5" d="M 100 250 L 150 260" fill="none" stroke="#007bff" stroke-width="2" />
  <path id="arrow-6" d="M 240 250 L 290 260" fill="none" stroke="#007bff" stroke-width="2" />
  <path id="arrow-7" d="M 380 250 L 430 260" fill="none" stroke="#007bff" stroke-width="2" />
  <path id="arrow-8" d="M 520 250 L 570 260" fill="none" stroke="#007bff" stroke-width="2" />
</svg>