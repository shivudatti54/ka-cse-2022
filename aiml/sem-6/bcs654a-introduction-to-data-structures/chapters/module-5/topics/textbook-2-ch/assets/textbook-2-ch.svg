<svg width="420" height="400" data-topic-id="textbook-2-ch">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>

  <!-- Title at top -->
  <text x="50%" y="20" text-anchor="middle" font-size="24" fill="#6495ED">
    Textbook 2: Ch
  </text>

  <!-- Introduction to Data Structures -->
  <section data-narration="Introduction to Data Structures">
    <rect x="0" y="100" width="420" height="50" fill="#F5F5F5" rx="10"/>
    <text x="20" y="150" text-anchor="start" font-size="18" fill="#333">
      Data structures are the way we organize and store data in a computer program.
    </text>
  </section>

  <!-- Types of Data Structures -->
  <section data-narration="Types of Data Structures">
    <rect x="0" y="160" width="420" height="50" fill="#F5F5F5" rx="10"/>
    <text x="20" y="210" text-anchor="start" font-size="18" fill="#333">
      Sequential data structures store data in a linear sequence, such as arrays and linked lists.
    </text>
  </section>

  <!-- Non-Sequential Data Structures -->
  <section data-narration="Non-Sequential Data Structures">
    <rect x="0" y="220" width="420" height="50" fill="#F5F5F5" rx="10"/>
    <text x="20" y="270" text-anchor="start" font-size="18" fill="#333">
      Non-sequential data structures store data in a non-linear sequence, such as trees and graphs.
    </text>
  </section>

  <!-- Sorting: Introduction -->
  <section data-narration="Sorting: Introduction">
    <rect x="0" y="280" width="420" height="50" fill="#F5F5F5" rx="10"/>
    <text x="20" y="330" text-anchor="start" font-size="18" fill="#333">
      Sorting is the process of arranging data in a specific order, such as ascending or descending.
    </text>
  </section>

  <!-- Why is Sorting Important? -->
  <section data-narration="Why is Sorting Important?">
    <rect x="0" y="320" width="420" height="50" fill="#F5F5F5" rx="10"/>
    <text x="20" y="370" text-anchor="start" font-size="18" fill="#333">
      Sorting is essential in many applications, such as data analysis, machine learning, and database management.
    </text>
  </section>

  <!-- Sorting Algorithms -->
  <section data-narration="Sorting Algorithms">
    <rect x="0" y="380" width="420" height="50" fill="#F5F5F5" rx="10"/>
    <text x="20" y="430" text-anchor="start" font-size="18" fill="#333">
      Bubble sort is a simple sorting algorithm that works by repeatedly swapping adjacent elements if they are in the wrong order.
    </text>
  </section>

  <!-- Bubble Sort -->
  <section data-narration="Bubble Sort">
    <rect x="0" y="420" width="420" height="100" fill="#F5F5F5" rx="10"/>
    <text x="20" y="470" text-anchor="start" font-size="18" fill="#333">
      <animate transform="rotate(360 210 470)" begin="0s" dur="10s" repeatCount="indefinite"/>
    </text>
    <g>
      <line x1="20" y1="100" x2="400" y2="200" stroke="#333" stroke-width="2"/>
      <line x1="20" y1="120" x2="400" y2="220" stroke="#333" stroke-width="2"/>
      <line x1="20" y1="140" x2="400" y2="240" stroke="#333" stroke-width="2"/>
      <line x1="20" y1="160" x2="400" y2="260" stroke="#333" stroke-width="2"/>
    </g>
  </section>

  <!-- Arrow markers for connections -->
  <line x1="20" y1="500" x2="400" y2="600" stroke="#333" stroke-width="2"/>
  <line x1="20" y1="520" x2="400" y2="620" stroke="#333" stroke-width="2"/>
  <line x1="20" y1="540" x2="400" y2="620" stroke="#333" stroke-width="2"/>
  <line x1="20" y1="560" x2="400" y2="600" stroke="#333" stroke-width="2"/>

  <!-- Footer at bottom -->
  <text x="50%" y="450" text-anchor="middle" font-size="18" fill="#333">
    Created with love and care
  </text>
</svg>