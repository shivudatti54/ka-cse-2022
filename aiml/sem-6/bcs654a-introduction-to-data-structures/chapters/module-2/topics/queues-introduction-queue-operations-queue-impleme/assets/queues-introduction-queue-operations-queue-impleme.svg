<svg width="420" height="400" data-topic-id="queues-introduction-queue-operations-queue-implementation" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="mix-blend-mode: multiply; opacity: 1;">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="gradient-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#gradient-1)" width="100%" height="100%" style="opacity: 0.5;"/>
  <!-- Title Section -->
  <g data-narration="Introduction to Queues" transform="translate(20, 20)">
    <text x="0" y="30" font-size="24" font-family="Arial, sans-serif" font-weight="bold" fill="#2F4F7F">Queues Introduction</text>
  </g>
  <!-- Characteristics Section -->
  <g data-narration="Characteristics of Queues" transform="translate(20, 60)">
    <rect width="360" height="20" style="fill: #E0E4EA; border: 1px solid #87CEEB; border-radius: 5px;"/>
    <g transform="translate(10, 10)">
      <path d="M 10 10 L 20 10 L 20 20 L 10 20 Z" style="fill: #87CEEB; stroke: #87CEEB; stroke-width: 2;"/>
      <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" font-weight="bold" fill="#2F4F7F">FIFO (First-In-First-Out) principle</text>
      <text x="10" y="40" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">Elements are added and removed from the end of the queue</text>
      <text x="10" y="60" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">Elements are removed in the order they were added</text>
    </g>
  </g>
  <!-- Operations Section -->
  <g data-narration="Queue Operations" transform="translate(20, 120)">
    <rect width="360" height="20" style="fill: #E0E4EA; border: 1px solid #87CEEB; border-radius: 5px;"/>
    <g transform="translate(10, 10)">
      <path d="M 10 10 L 20 10 L 20 20 L 10 20 Z" style="fill: #87CEEB; stroke: #87CEEB; stroke-width: 2;"/>
      <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" font-weight="bold" fill="#2F4F7F">Enqueue Operation</text>
      <text x="10" y="40" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">Adds an element to the end of the queue</text>
      <text x="10" y="60" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">Dequeue Operation</text>
      <text x="10" y="80" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">Removes an element from the front of the queue</text>
    </g>
  </g>
  <!-- Example Section -->
  <g data-narration="Example of Enqueue and Dequeue Operations" transform="translate(20, 200)">
    <rect width="360" height="50" style="fill: #E0E4EA; border: 1px solid #87CEEB; border-radius: 5px;"/>
    <g transform="translate(10, 10)">
      <rect width="30" height="30" style="fill: #87CEEB; border: 1px solid #87CEEB; border-radius: 5px;"/>
      <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">Initial Queue</text>
    </g>
    <g transform="translate(40, 10)">
      <rect width="30" height="30" style="fill: #87CEEB; border: 1px solid #87CEEB; border-radius: 5px;"/>
      <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">Enqueue 1</text>
    </g>
    <g transform="translate(70, 10)">
      <rect width="30" height="30" style="fill: #87CEEB; border: 1px solid #87CEEB; border-radius: 5px;"/>
      <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">Enqueue 2</text>
    </g>
    <g transform="translate(100, 10)">
      <rect width="30" height="30" style="fill: #87CEEB; border: 1px solid #87CEEB; border-radius: 5px;"/>
      <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">Enqueue 3</text>
    </g>
    <g transform="translate(130, 10)">
      <rect width="30" height="30" style="fill: #87CEEB; border: 1px solid #87CEEB; border-radius: 5px;"/>
      <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">Dequeue 1</text>
    </g>
  </g>
  <!-- Footer Section -->
  <g data-narration="Footer" transform="translate(20, 340)">
    <rect width="360" height="50" style="fill: #E0E4EA; border: 1px solid #87CEEB; border-radius: 5px;"/>
    <g transform="translate(10, 10)">
      <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" font-weight="bold" fill="#2F4F7F">Queues Introduction</text>
    </g>
  </g>
</svg>