<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="textbook-2-ch" xmlns="http://www.w3.org/2000/svg">
  <!-- Title and background -->
  <title>Data Structures Overview</title>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6d98c7" stop-opacity="1" />
      <stop offset="100%" stop-color="#6d98c7" stop-opacity="0.5" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" rx="10" />
  <!-- Header and title -->
  <text x="20" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="start" fill="#2f4f7f">
    Data Structures Overview
  </text>
  <!-- Section 1: Types of Data Structures -->
  <section id="section-1" data-narration="Types of Data Structures">
    <rect x="10" y="60" width="400" height="150" fill="#f7f7f7" rx="10" />
    <text x="20" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2f4f7f">
      Types of Data Structures
    </text>
    <text x="20" y="100" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#666666">
      <tspan>Arrays</tspan><tspan> Linked Lists</tspan><tspan> Stacks</tspan><tspan> Queues</tspan><tspan> Trees</tspan><tspan> Graphics</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 60" to="0 120" begin="0s" duration="2s" repeatCount="indefinite" />
  </section>
  <!-- Section 2: Characteristics of Data Structures -->
  <section id="section-2" data-narration="Characteristics of Data Structures">
    <rect x="10" y="220" width="400" height="150" fill="#f7f7f7" rx="10" />
    <text x="20" y="230" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2f4f7f">
      Characteristics of Data Structures
    </text>
    <text x="20" y="260" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#666666">
      <tspan>Time Complexity</tspan><tspan> Space Complexity</tspan><tspan> Scalability</tspan><tspan> Efficiency</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 220" to="0 270" begin="2s" duration="2s" repeatCount="indefinite" />
  </section>
  <!-- Section 3: Example Use Cases -->
  <section id="section-3" data-narration="Example Use Cases">
    <rect x="10" y="320" width="400" height="150" fill="#f7f7f7" rx="10" />
    <text x="20" y="330" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2f4f7f">
      Example Use Cases
    </text>
    <text x="20" y="360" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#666666">
      <tspan>Arrays</tspan><tspan> Linked Lists</tspan><tspan> Stacks</tspan><tspan> Queues</tspan><tspan> Trees</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 320" to="0 370" begin="4s" duration="2s" repeatCount="indefinite" />
  </section>
  <!-- Section 4: Conclusion -->
  <section id="section-4" data-narration="Conclusion">
    <rect x="10" y="410" width="400" height="150" fill="#f7f7f7" rx="10" />
    <text x="20" y="420" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2f4f7f">
      Conclusion
    </text>
    <text x="20" y="450" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#666666">
      Data structures are the building blocks of computer science, and they play a crucial role in solving problems in a wide range of fields.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 410" to="0 460" begin="6s" duration="2s" repeatCount="indefinite" />
  </section>
  <!-- Footer -->
  <text x="20" y="480" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2f4f7f">
    Data Structures Overview
  </text>
</svg>