<svg width="420" height="400" data-topic-id="61-63" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#E0F0F0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title -->
  <text x="180" y="30" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    Introduction to Data Structures
  </text>
  
  <!-- Section 1: Introduction to Data Structures -->
  <rect x="50" y="100" width="320" height="50" fill="#f9f9f9" rx="10" data-narration="A data structure is a way to organize and store data in a computer so that it can be efficiently accessed, modified, and managed.">
    <animateTransform attributeName="transform" type="rotate" from="0 190 50" to="360 190 50" dur="10s" repeatCount="indefinite"/>
  </rect>
  <text x="150" y="120" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    Definition
  </text>
  <text x="150" y="140" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    A data structure is a way to organize and store data in a computer so that it can be efficiently accessed, modified, and managed.
  </text>
  
  <!-- Section 2: Types of Data Structures -->
  <rect x="50" y="200" width="320" height="50" fill="#f9f9f9" rx="10" data-narration="Linear data structures include arrays and linked lists, while non-linear data structures include trees and graphs.">
    <animateTransform attributeName="transform" type="rotate" from="0 190 200" to="360 190 200" dur="10s" repeatCount="indefinite"/>
  </rect>
  <text x="150" y="210" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    Types of Data Structures
  </text>
  <text x="150" y="230" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    Linear data structures include arrays and linked lists, while non-linear data structures include trees and graphs.
  </text>
  
  <!-- Section 3: Advantages and Disadvantages -->
  <rect x="50" y="270" width="320" height="100" fill="#f9f9f9" rx="10" data-narration="The advantages of data structures include efficient storage, access, and modification. The disadvantages include complexity, space complexity, and time complexity.">
    <animateTransform attributeName="transform" type="rotate" from="0 190 270" to="360 190 270" dur="10s" repeatCount="indefinite"/>
  </rect>
  <text x="150" y="280" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    Advantages
  </text>
  <text x="150" y="300" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    The advantages of data structures include efficient storage, access, and modification.
  </text>
  <text x="150" y="320" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    The disadvantages include complexity, space complexity, and time complexity.
  </text>
  
  <!-- Section 4: Real-World Applications -->
  <rect x="50" y="370" width="320" height="100" fill="#f9f9f9" rx="10" data-narration="Data structures are used in a variety of applications, including databases, web browsers, and operating systems.">
    <animateTransform attributeName="transform" type="rotate" from="0 190 370" to="360 190 370" dur="10s" repeatCount="indefinite"/>
  </rect>
  <text x="150" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    Real-World Applications
  </text>
  <text x="150" y="400" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    Data structures are used in a variety of applications, including databases, web browsers, and operating systems.
  </text>
  
  <!-- Footer -->
  <text x="180" y="430" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    Created by [Your Name]
  </text>
</svg>