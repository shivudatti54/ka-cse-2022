<svg width="420" height="400" data-topic-id="trees-insertion-traversals-searching-copying-a-tree"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400"
     style="overflow:visible;overflow-wrap:break-word;">

    <!--Title Section-->
    <rect x="10" y="10" width="400" height="50" rx="10" style="fill:rgb(53, 109, 121);stroke-width:2;stroke:rgb(255,255,255);stroke-dasharray:8,8;stroke-linecap:square;fill-opacity:0.7">
        <animateTransform attributeName="transform" type="rotate" from="0 200 50" to="360 200 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
        <text x="200" y="30" font-size="24" font-family="Arial" fill="#ffffff" opacity="0.8">Trees: Insertion Traversals Searching Copying a Tree</text>
    </rect>

    <!--Introduction Section-->
    <rect x="10" y="70" width="400" height="50" rx="10" style="fill:rgb(53, 109, 121);stroke-width:2;stroke:rgb(255,255,255);stroke-dasharray:8,8;stroke-linecap:square;fill-opacity:0.7">
        <animateTransform attributeName="transform" type="rotate" from="0 200 50" to="360 200 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
        <text x="200" y="90" font-size="18" font-family="Arial" fill="#ffffff" opacity="0.8">Introduction</text>
    </rect>
    <rect x="10" y="130" width="400" height="100" rx="10" style="fill:rgb(43, 94, 155);stroke-width:2;stroke:rgb(255,255,255);stroke-dasharray:8,8;stroke-linecap:square;fill-opacity:0.7">
        <animateTransform attributeName="transform" type="rotate" from="0 200 50" to="360 200 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
        <text x="200" y="140" font-size="18" font-family="Arial" fill="#ffffff" opacity="0.8">A tree is a non-linear data structure consisting of nodes, where each node has a value and zero or more child nodes. Trees are used to represent hierarchical relationships between data elements.</text>
    </rect>

    <!--Insertion into a Tree Section-->
    <rect x="10" y="230" width="400" height="50" rx="10" style="fill:rgb(43, 94, 155);stroke-width:2;stroke:rgb(255,255,255);stroke-dasharray:8,8;stroke-linecap:square;fill-opacity:0.7">
        <animateTransform attributeName="transform" type="rotate" from="0 200 50" to="360 200 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
        <text x="200" y="250" font-size="18" font-family="Arial" fill="#ffffff" opacity="0.8">Insertion into a tree involves adding a new node to the existing tree. There are two types of insertion:</text>
    </rect>
    <rect x="10" y="290" width="400" height="100" rx="10" style="fill:rgb(96, 158, 169);stroke-width:2;stroke:rgb(255,255,255);stroke-dasharray:8,8;stroke-linecap:square;fill-opacity:0.7">
        <animateTransform attributeName="transform" type="rotate" from="0 200 50" to="360 200 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
        <text x="200" y="300" font-size="18" font-family="Arial" fill="#ffffff" opacity="0.8">Balanced Insertion: When a new node is inserted into a balanced tree, the tree remains balanced after insertion. Balanced Insertion ensures that the tree remains roughly balanced and search operations are efficient.</text>
        <text x="200" y="320" font-size="18" font-family="Arial" fill="#ffffff" opacity="0.8">Unbalanced Insertion: When a new node is inserted into an unbalanced tree, the tree becomes unbalanced after insertion. Unbalanced Insertion can lead to inefficient search operations.</text>
    </rect>

    <!--Traversals of a Tree Section-->
    <rect x="10" y="400" width="400" height="50" rx="10" style="fill:rgb(96, 158, 169);stroke-width:2;stroke:rgb(255,255,255);stroke-dasharray:8,8;stroke-linecap:square;fill-opacity:0.7">
        <animateTransform attributeName="transform" type="rotate" from="0 200 50" to="360 200 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
        <text x="200" y="410" font-size="18" font-family="Arial" fill="#ffffff" opacity="0.8">Traversals of a tree involve visiting each node in the tree in a specific order. There are three types of traversals:</text>
    </rect>
    <rect x="10" y="460" width="400" height="100" rx="10" style="fill:rgb(230, 245, 220);stroke-width:2;stroke:rgb(255,255,255);stroke-dasharray:8,8;stroke-linecap:square;fill-opacity:0.7">
        <animateTransform attributeName="transform" type="rotate" from="0 200 50" to="360 200 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
        <text x="200" y="470" font-size="18" font-family="Arial" fill="#ffffff" opacity="0.8">Inorder Traversal: Inorder traversal visits the left subtree, the current node, and then the right subtree. Inorder traversal ensures that the nodes are visited in ascending order.</text>
        <text x="200" y="490" font-size="18" font-family="Arial" fill="#ffffff" opacity="0.8">Preorder Traversal: Preorder traversal visits the current node, the left subtree, and then the right subtree. Preorder traversal is useful for creating a copy of the tree.</text>
        <text x="200" y="510" font-size="18" font-family="Arial" fill="#ffffff" opacity="0.8">Postorder Traversal: Postorder traversal visits the left subtree, the right subtree, and then the current node. Postorder traversal is useful for deleting a tree.</text>
    </rect>

    <!--Searching in a Tree Section-->
    <rect x="10" y="600" width="400" height="50" rx="10" style="fill:rgb(230, 245, 220);stroke-width:2;stroke:rgb(255,255,255);stroke-dasharray:8,8;stroke-linecap:square;fill-opacity:0.7">
        <animateTransform attributeName="transform" type="rotate" from="0 200 50" to="360 200 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
        <text x="200" y="610" font-size="18" font-family="Arial" fill="#ffffff" opacity="0.8">Searching in a tree involves finding a specific node in the tree. There are two types of searching:</text>
    </rect>
    <rect x="10" y="660" width="400" height="100" rx="10" style="fill:rgb(150, 205, 170);stroke-width:2;stroke:rgb(255,255,255);stroke-dasharray:8,8;stroke-linecap:square;fill-opacity:0.7">
        <animateTransform attributeName="transform" type="rotate" from="0 200 50" to="360 200 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
        <text x="200" y="670" font-size="18" font-family="Arial" fill="#ffffff" opacity="0.8">Balanced Searching: When a new node is searched in a balanced tree, the tree remains balanced after searching. Balanced Searching ensures that the tree remains roughly balanced and search operations are efficient.</text>
        <text x="200" y="690" font-size="18" font-family="Arial" fill="#ffffff" opacity="0.8">Unbalanced Searching: When a new node is searched in an unbalanced tree, the tree becomes unbalanced after searching. Unbalanced Searching can lead to inefficient search operations.</text>
    </rect>

    <!--Copying a Tree Section-->
    <rect x="10" y="770" width="400" height="50" rx="10" style="fill:rgb(150, 205, 170);stroke-width:2;stroke:rgb(255,255,255);stroke-dasharray:8,8;stroke-linecap:square;fill-opacity:0.7">
        <animateTransform attributeName="transform" type="rotate" from="0 200 50" to="360 200 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
        <text x="200" y="780" font-size="18" font-family="Arial" fill="#ffffff" opacity="0.8">Copying a tree involves creating a new tree that is a copy of the original tree.</text>
    </rect>
    <rect x="10" y="830" width="400" height="100" rx="10" style="fill:rgb(240, 230, 200);stroke-width:2;stroke:rgb(255,255,255);stroke-dasharray:8,8;stroke-linecap:square;fill-opacity:0.7">
        <animateTransform attributeName="transform" type="rotate" from="0 200 50" to="360 200 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
        <text x="200" y="840" font-size="18" font-family="Arial" fill="#ffffff" opacity="0.8">Preorder Traversal is useful for creating a copy of a tree because it visits the current node before visiting its child nodes.</text>
        <text x="200" y="860" font-size="18" font-family="Arial" fill="#ffffff" opacity="0.8">Inorder Traversal and Postorder Traversal are not suitable for creating a copy of a tree because they visit the child nodes before visiting the current node.</text>
    </rect>

    <!--Footer Section-->
    <rect x="10" y="390" width="400" height="50" rx="10" style="fill:rgb(240, 230, 200);stroke-width:2;stroke:rgb(255,255,255);stroke-dasharray:8,8;stroke-linecap:square;fill-opacity:0.7">
        <animateTransform attributeName="transform" type="rotate" from="0 200 50" to="360 200 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
        <text x="200" y="400" font-size="18" font-family="Arial" fill="#ffffff" opacity="0.8">Conclusion</text>
    </rect>

</svg>