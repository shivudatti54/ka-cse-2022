<svg width="420" height="400" data-topic-id="linked-lists-91-to-92-93">
    <!-- Gradient background -->
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="50%" stop-color="#C5CAE9" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

    <!-- Title -->
    <text x="50%" y="20" font-size="24" font-family="Arial" text-anchor="middle" fill="#3498db">
        Linked Lists
    </text>

    <!-- Section 1: Definition and Basic Concept -->
    <section>
        <rect x="0" y="50" width="420" height="100" fill="#3498db" rx="10"/>
        <text x="20" y="70" font-size="18" font-family="Arial" text-anchor="start" fill="#fff">
            Definition and Basic Concept
        </text>
        <animate transform="rotate(0 50% 50%)" begin="0s" dur="2s" repeatCount="indefinite"/>
        <text x="20" y="110" font-size="18" font-family="Arial" text-anchor="start" fill="#fff" data-narration>
            A linked list is a linear collection of data elements whose order is not given by their physical placement in memory. Instead, each element points to the next element.
        </text>
    </section>

    <!-- Section 2: Advantages of Linked Lists -->
    <section>
        <rect x="0" y="150" width="420" height="100" fill="#2ecc71" rx="10"/>
        <text x="20" y="170" font-size="18" font-family="Arial" text-anchor="start" fill="#fff">
            Advantages of Linked Lists
        </text>
        <animate transform="rotate(0 50% 50%)" begin="2s" dur="2s" repeatCount="indefinite"/>
        <text x="20" y="200" font-size="18" font-family="Arial" text-anchor="start" fill="#fff" data-narration>
            • Efficient Insertion and Deletion: Linked lists allow for efficient insertion and deletion of elements at any position, without having to shift all the elements after the insertion or deletion point.
        </text>
    </section>

    <!-- Section 3: Disadvantages of Linked Lists -->
    <section>
        <rect x="0" y="250" width="420" height="100" fill="#e74c3c" rx="10"/>
        <text x="20" y="270" font-size="18" font-family="Arial" text-anchor="start" fill="#fff">
            Disadvantages of Linked Lists
        </text>
        <animate transform="rotate(0 50% 50%)" begin="4s" dur="2s" repeatCount="indefinite"/>
        <text x="20" y="300" font-size="18" font-family="Arial" text-anchor="start" fill="#fff" data-narration>
            • Extra Memory Required: Each element in a linked list requires extra memory to store the pointer to the next element.
        </text>
    </section>

    <!-- Section 4: Terminology -->
    <section>
        <rect x="0" y="350" width="420" height="100" fill="#2ecc71" rx="10"/>
        <text x="20" y="370" font-size="18" font-family="Arial" text-anchor="start" fill="#fff">
            Terminology
        </text>
        <animate transform="rotate(0 50% 50%)" begin="6s" dur="2s" repeatCount="indefinite"/>
        <text x="20" y="400" font-size="18" font-family="Arial" text-anchor="start" fill="#fff" data-narration>
            • Node: A node is the basic unit of a linked list, consisting of data and a pointer to the next node.
        </text>
    </section>

    <!-- Section 5: Example of a Linked List -->
    <section>
        <rect x="0" y="450" width="420" height="150" fill="#3498db" rx="10"/>
        <text x="20" y="470" font-size="18" font-family="Arial" text-anchor="start" fill="#fff">
            Example of a Linked List
        </text>
        <animate transform="rotate(0 50% 50%)" begin="8s" dur="2s" repeatCount="indefinite"/>
        <text x="20" y="500" font-size="18" font-family="Arial" text-anchor="start" fill="#fff" data-narration>
            Suppose we have a linked list with the following nodes:
            <br />
            1 -> 2 -> 3 -> 4 -> 5
        </text>
    </section>

    <!-- Section 6: Operations on Linked Lists -->
    <section>
        <rect x="0" y="600" width="420" height="100" fill="#2ecc71" rx="10"/>
        <text x="20" y="620" font-size="18" font-family="Arial" text-anchor="start" fill="#fff">
            Operations on Linked Lists
        </text>
        <animate transform="rotate(0 50% 50%)" begin="10s" dur="2s" repeatCount="indefinite"/>
        <text x="20" y="650" font-size="18" font-family="Arial" text-anchor="start" fill="#fff" data-narration>
            • Insertion: Insertion in a linked list involves adding a new node at a specific position in the list.
        </text>
    </section>

    <!-- Footer -->
    <rect x="0" y="700" width="420" height="50" fill="#3498db" rx="10"/>
    <text x="20" y="720" font-size="18" font-family="Arial" text-anchor="start" fill="#fff">
        Learn more about linked lists and data structures
    </text>
</svg>