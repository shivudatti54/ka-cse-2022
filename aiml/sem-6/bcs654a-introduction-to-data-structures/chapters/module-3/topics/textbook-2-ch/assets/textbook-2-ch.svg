<svg width="420" height="400" data-topic-id="introduction-to-linked-lists">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="50%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#DCE5F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title -->
  <g transform="translate(20, 20)">
    <text x="0" y="30" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Introduction to Linked Lists</text>
  </g>
  
  <!-- Section 1: What are Linked Lists? -->
  <g transform="translate(20, 60)">
    <rect x="0" y="0" width="380" height="150" fill="#F7F7F7" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="What are Linked Lists?">What are Linked Lists?</text>
    <animate transform="translateX(50)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="50" y="50" width="80" height="80" fill="#87CEEB" rx="10"/>
    <line x1="50" y1="50" x2="150" y2="50" stroke="#000" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="50" y1="50" x2="50" y2="150" stroke="#000" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="120" y="100" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">A linked list is a linear collection of data elements, where each element is a separate object and each object points to the next element in the sequence.</text>
  </g>
  
  <!-- Section 2: Advantages of Linked Lists -->
  <g transform="translate(20, 220)">
    <rect x="0" y="0" width="380" height="150" fill="#F7F7F7" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="Advantages of Linked Lists">Advantages of Linked Lists</text>
    <animate transform="translateX(50)" begin="2s" dur="2s" repeatCount="indefinite"/>
    <rect x="50" y="50" width="80" height="80" fill="#87CEEB" rx="10"/>
    <line x1="50" y1="50" x2="150" y2="50" stroke="#000" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="50" y1="50" x2="50" y2="150" stroke="#000" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="120" y="100" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Efficient use of memory, efficient insertion and deletion, and dynamic size make linked lists suitable for applications where these operations are frequent.</text>
  </g>
  
  <!-- Section 3: Disadvantages of Linked Lists -->
  <g transform="translate(20, 350)">
    <rect x="0" y="0" width="380" height="150" fill="#F7F7F7" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="Disadvantages of Linked Lists">Disadvantages of Linked Lists</text>
    <animate transform="translateX(50)" begin="4s" dur="2s" repeatCount="indefinite"/>
    <rect x="50" y="50" width="80" height="80" fill="#87CEEB" rx="10"/>
    <line x1="50" y1="50" x2="150" y2="50" stroke="#000" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="50" y1="50" x2="50" y2="150" stroke="#000" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="120" y="100" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Slow search and higher memory usage are disadvantages of linked lists.</text>
  </g>
  
  <!-- Section 4: Types of Linked Lists -->
  <g transform="translate(20, 490)">
    <rect x="0" y="0" width="380" height="150" fill="#F7F7F7" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="Types of Linked Lists">Types of Linked Lists</text>
    <animate transform="translateX(50)" begin="6s" dur="2s" repeatCount="indefinite"/>
    <rect x="50" y="50" width="80" height="80" fill="#87CEEB" rx="10"/>
    <line x1="50" y1="50" x2="150" y2="50" stroke="#000" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="50" y1="50" x2="50" y2="150" stroke="#000" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="120" y="100" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Singly linked lists, doubly linked lists, and self-referential structures are types of linked lists.</text>
  </g>
  
  <!-- Section 5: Operations on Linked Lists -->
  <g transform="translate(20, 630)">
    <rect x="0" y="0" width="380" height="150" fill="#F7F7F7" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="Operations on Linked Lists">Operations on Linked Lists</text>
    <animate transform="translateX(50)" begin="8s" dur="2s" repeatCount="indefinite"/>
    <rect x="50" y="50" width="80" height="80" fill="#87CEEB" rx="10"/>
    <line x1="50" y1="50" x2="150" y2="50" stroke="#000" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="50" y1="50" x2="50" y2="150" stroke="#000" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="120" y="100" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Insertion, deletion, and search operations can be performed efficiently on linked lists.</text>
  </g>
  
  <!-- Footer -->
  <g transform="translate(20, 790)">
    <rect x="0" y="0" width="380" height="50" fill="#F7F7F7" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Data Topic ID: introduction-to-linked-lists</text>
  </g>
</svg>