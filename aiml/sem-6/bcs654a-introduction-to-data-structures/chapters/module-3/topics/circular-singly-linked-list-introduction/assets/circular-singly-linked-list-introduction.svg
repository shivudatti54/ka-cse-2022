<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="circular-singly-linked-list-introduction">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <title>Circular Singly Linked List Introduction</title>

  <!-- Gradient background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Header section -->
  <section id="what-is-a-linked-list">
    <data-narration>What is a Linked List?</data-narration>
    <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">A Linked List is a Linear data structure where elements are stored in a non-contiguous manner.</text>
    <rect x="10" y="40" width="300" height="50" fill="#C5CAE9" rx="5"/>
    <text x="20" y="55" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Each element, called a node, contains two parts: Data and Pointer/Reference.</text>
    <rect x="10" y="80" width="300" height="50" fill="#C7B8EA" rx="5"/>
    <text x="20" y="95" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">The first node is called the head, and the last node (which points to NULL/nothing) is called the tail.</text>
  </section>

  <!-- Why Linked Lists Over Arrays section -->
  <section id="why-linked-lists-over-arrays">
    <data-narration>Why Linked Lists Over Arrays?</data-narration>
    <table>
      <tr>
        <th>Aspect</th>
        <th>Arrays</th>
        <th>Linked Lists</th>
      </tr>
      <tr>
        <td>Memory Allocation</td>
        <td>Static (compile-time)</td>
        <td>Dynamic (run-time)</td>
      </tr>
      <tr>
        <td>Memory Efficiency</td>
        <td>May have unused allocated space</td>
        <td>Efficient - allocates as needed</td>
      </tr>
      <tr>
        <td>Insertion/Deletion</td>
        <td>Expensive (shifting required)</td>
        <td>Efficient (pointer manipulation)</td>
      </tr>
      <tr>
        <td>Access</td>
        <td>Random access (O(1))</td>
        <td>Sequential access (O(n))</td>
      </tr>
      <tr>
        <td>Memory Usage</td>
        <td>Contiguous block</td>
        <td>Non-contiguous (scattered)</td>
      </tr>
    </table>
  </section>

  <!-- Self-Referential Structures section -->
  <section id="self-referential-structures">
    <data-narration>Self-Referential Structures</data-narration>
    <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">In C, linked lists are implemented using self-referential structures - structures that contain pointers to instances of themselves.</text>
    <rect x="10" y="40" width="300" height="50" fill="#C5CAE9" rx="5"/>
    <text x="20" y="55" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">This structure contains:</text>
    <ul>
      <li><text x="20" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">data:</text> stores the actual value</li>
      <li><text x="20" y="95" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">next:</text> a pointer to another structure of the same type</li>
    </ul>
  </section>

  <!-- Types of Linked Lists section -->
  <section id="types-of-linked-lists">
    <data-narration>Types of Linked Lists</data-narration>
    <ul>
      <li><text x="20" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Singly Linked List:</text> Each node points only to the next node</li>
      <li><text x="20" y="50" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Doubly Linked List:</text> Each node points to both next and previous nodes</li>
      <li><text x="20" y="80" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Circular Linked List:</text> The last node points back to the first node</li>
    </ul>
  </section>

  <!-- Animation -->
  <animate id="animate" attributeName="opacity" begin="1s" dur="3s" from="1" to="0"/>
  <animate id="animate-2" attributeName="x" begin="4s" dur="2s" from="10" to="350"/>
  <animate id="animate-3" attributeName="y" begin="6s" dur="3s" from="20" to="380"/>
</svg>