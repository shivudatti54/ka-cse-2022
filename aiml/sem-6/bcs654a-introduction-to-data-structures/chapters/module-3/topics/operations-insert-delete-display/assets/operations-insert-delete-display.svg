<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="operations-insert-delete-display" viewBox="0 0 420 400" style="background-image: linear-gradient(to bottom, #6495ed, #87ceeb);" data-narration="Operations Insert Delete Display Introduction">
    <title>Operations Insert Delete Display</title>
    <rect x="10" y="10" width="400" height="380" fill="#87ceeb" rx="10" style="filter: brightness(0.8);">
        <animate attributeName="opacity" begin="0s" dur="1s" repeatCount="indefinite" />
    </rect>
    <g transform="translate(10, 20)">
        <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
            <animate attributeName="opacity" begin="0s" dur="1s" repeatCount="indefinite" />
        </rect>
        <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#ffffff">
            Introduction
        </text>
        <g transform="translate(150, 20)">
            <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                <animate attributeName="opacity" begin="0.5s" dur="1s" repeatCount="indefinite" />
            </rect>
            <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#ffffff">
                In the context of linked lists, operations are essential to maintain and manipulate the data stored in the list.
            </text>
            <g transform="translate(300, 20)">
                <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                    <animate attributeName="opacity" begin="1s" dur="1s" repeatCount="indefinite" />
                </rect>
                <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#ffffff">
                These operations enable us to add, remove, and display elements in the list efficiently.
                </text>
            </g>
            <g transform="translate(450, 20)">
                <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                    <animate attributeName="opacity" begin="1.5s" dur="1s" repeatCount="indefinite" />
                </rect>
                <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#ffffff">
                    In this section, we will delve into the three primary operations: insert, delete, and display.
                </text>
            </g>
        </g>
        <g transform="translate(10, 60)">
            <rect x="0" y="0" width="100" height="40" fill="#87ceeb" rx="5" style="filter: brightness(0.8);">
                <animate attributeName="opacity" begin="0s" dur="1s" repeatCount="indefinite" />
            </rect>
            <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                Insert Operation
            </text>
            <g transform="translate(150, 20)">
                <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                    <animate attributeName="opacity" begin="0.5s" dur="1s" repeatCount="indefinite" />
                </rect>
                <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                    The insert operation is used to add a new node to the linked list.
                </text>
                <g transform="translate(300, 20)">
                    <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                        <animate attributeName="opacity" begin="1s" dur="1s" repeatCount="indefinite" />
                    </rect>
                    <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                    This operation can be performed at the beginning, middle, or end of the list.
                    </text>
                </g>
                <g transform="translate(450, 20)">
                    <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                        <animate attributeName="opacity" begin="1.5s" dur="1s" repeatCount="indefinite" />
                    </rect>
                    <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                    Types of Insertion
                    </text>
                </g>
            </g>
            <g transform="translate(10, 120)">
                <rect x="0" y="0" width="100" height="40" fill="#87ceeb" rx="5" style="filter: brightness(0.8);">
                    <animate attributeName="opacity" begin="0s" dur="1s" repeatCount="indefinite" />
                </rect>
                <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                Insertion at the beginning
                </text>
                <g transform="translate(150, 20)">
                    <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                        <animate attributeName="opacity" begin="0.5s" dur="1s" repeatCount="indefinite" />
                    </rect>
                    <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                    Suppose we have a singly linked list with the following nodes:
                        </text>
                    <g transform="translate(300, 20)">
                        <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                            <animate attributeName="opacity" begin="1s" dur="1s" repeatCount="indefinite" />
                        </rect>
                        <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                        - A -> B -> C -> D
                        </text>
                        <g transform="translate(450, 20)">
                            <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                                <animate attributeName="opacity" begin="1.5s" dur="1s" repeatCount="indefinite" />
                            </rect>
                            <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                        Where A is the head of the list and D is the tail.
                        </text>
                        <g transform="translate(600, 20)">
                            <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                                <animate attributeName="opacity" begin="2s" dur="1s" repeatCount="indefinite" />
                            </rect>
                            <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                        To insert a new node E at the beginning, we update the head of the list:
                        </text>
                        <g transform="translate(800, 20)">
                            <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                                <animate attributeName="opacity" begin="2.5s" dur="1s" repeatCount="indefinite" />
                            </rect>
                            <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                        - E -> A -> B -> C -> D
                        </text>
                    </g>
                </g>
                <g transform="translate(10, 200)">
                    <rect x="0" y="0" width="100" height="40" fill="#87ceeb" rx="5" style="filter: brightness(0.8);">
                        <animate attributeName="opacity" begin="0s" dur="1s" repeatCount="indefinite" />
                    </rect>
                    <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                Delete Operation
                </text>
                <g transform="translate(150, 20)">
                    <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                        <animate attributeName="opacity" begin="0.5s" dur="1s" repeatCount="indefinite" />
                    </rect>
                    <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                    The delete operation is used to remove a node from the linked list.
                </text>
                <g transform="translate(300, 20)">
                    <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                        <animate attributeName="opacity" begin="1s" dur="1s" repeatCount="indefinite" />
                    </rect>
                    <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                    This operation can be performed at any position in the list.
                    </text>
                </g>
                <g transform="translate(450, 20)">
                    <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                        <animate attributeName="opacity" begin="1.5s" dur="1s" repeatCount="indefinite" />
                    </rect>
                    <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                    Types of Deletion
                    </text>
                </g>
            </g>
            <g transform="translate(10, 280)">
                <rect x="0" y="0" width="100" height="40" fill="#87ceeb" rx="5" style="filter: brightness(0.8);">
                    <animate attributeName="opacity" begin="0s" dur="1s" repeatCount="indefinite" />
                </rect>
                <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                Deletion at a specific position
                </text>
                <g transform="translate(150, 20)">
                    <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                        <animate attributeName="opacity" begin="0.5s" dur="1s" repeatCount="indefinite" />
                    </rect>
                    <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                    Suppose we have a singly linked list with the following nodes:
                        </text>
                    <g transform="translate(300, 20)">
                        <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                            <animate attributeName="opacity" begin="1s" dur="1s" repeatCount="indefinite" />
                        </rect>
                        <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                        - A -> B -> C -> D
                        </text>
                        <g transform="translate(450, 20)">
                            <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                                <animate attributeName="opacity" begin="1.5s" dur="1s" repeatCount="indefinite" />
                            </rect>
                            <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                        To remove a node from the list, we need to set the next pointer of the previous node to null.
                        </text>
                            <g transform="translate(600, 20)">
                                <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                                    <animate attributeName="opacity" begin="2s" dur="1s" repeatCount="indefinite" />
                                </rect>
                                <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                        After removal, the list becomes:
                        </text>
                                <g transform="translate(800, 20)">
                                    <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                                        <animate attributeName="opacity" begin="2.5s" dur="1s" repeatCount="indefinite" />
                                    </rect>
                                    <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                        - A -> B -> D
                        </text>
                            </g>
                        </g>
                    </g>
                </g>
                <g transform="translate(10, 360)">
                    <rect x="0" y="0" width="100" height="40" fill="#87ceeb" rx="5" style="filter: brightness(0.8);">
                        <animate attributeName="opacity" begin="0s" dur="1s" repeatCount="indefinite" />
                    </rect>
                    <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                Display Operation
                </text>
                <g transform="translate(150, 20)">
                    <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                        <animate attributeName="opacity" begin="0.5s" dur="1s" repeatCount="indefinite" />
                    </rect>
                    <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                    The display operation is used to print the elements of the linked list.
                </text>
                <g transform="translate(300, 20)">
                    <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                        <animate attributeName="opacity" begin="1s" dur="1s" repeatCount="indefinite" />
                    </rect>
                    <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                    This operation can be performed at any position in the list.
                    </text>
                </g>
                <g transform="translate(450, 20)">
                    <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                        <animate attributeName="opacity" begin="1.5s" dur="1s" repeatCount="indefinite" />
                    </rect>
                    <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
                    Types of Display
                    </text>
                </g>
            </g>
        </g>
        <g transform="translate(10, 430)">
            <rect x="0" y="0" width="100" height="40" fill="#87ceeb" rx="5" style="filter: brightness(0.8);">
                <animate attributeName="opacity" begin="0s" dur="1s" repeatCount="indefinite" />
            </rect>
            <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
            Conclusion
            </text>
        </g>
        <g transform="translate(10, 500)">
            <rect x="0" y="0" width="100" height="40" fill="#6495ed" rx="5" style="filter: brightness(0.9);">
                <animate attributeName="opacity" begin="0s" dur="1s" repeatCount="indefinite" />
            </rect>
            <text x="10" y="20" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
            In conclusion, linked lists are a fundamental data structure in computer science that provides efficient insertion, deletion, and display operations.
            </text>
        </g>
    </svg>