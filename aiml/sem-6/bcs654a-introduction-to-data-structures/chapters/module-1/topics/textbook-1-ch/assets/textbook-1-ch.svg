<svg width="420" height="400" data-topic-id="data-structures-ch1" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="0%" y2="100%" color-stop="0%" color="#C7D2F2" color-stop="20%" color="#B2E6CE" color-stop="50%" color="#AED8F5" color-stop="80%" color="#8FC0E9" color-stop="100%" color="#76B9FF" />
  </defs>
  <rect x="0" y="0" width="420" height="400" style="fill: url(#pastel-gradient)" rx="10" />
  <!-- Title at top -->
  <text x="50%" y="20" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="What are Arrays?">
    One Dimensional Arrays
  </text>
  <!-- Section 1: What are Arrays? -->
  <section x="50%" y="60" width="300" height="150" style="background-color: #F7F7F7; padding: 20px; border-radius: 10px;">
    <text x="50%" y="10" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Definition">
      A single-dimensional array is a collection of elements of the same data type stored in contiguous memory locations.
    </text>
    <text x="50%" y="30" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Characteristics">
      Each element in the array is identified by an index or subscript.
      The elements are stored in a single dimension.
    </text>
  </section>
  <!-- Animation 1: What are Arrays? -->
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 200" begin="0s" dur="2s" repeatCount="indefinite" />
  <!-- Section 2: One-Dimensional Arrays -->
  <section x="50%" y="220" width="300" height="150" style="background-color: #F7F7F7; padding: 20px; border-radius: 10px;">
    <text x="50%" y="10" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Example">
      ```c
int arr1[5];
arr1[0] = 10;
arr1[1] = 20;
arr1[2] = 30;
arr1[3] = 40;
arr1[4] = 50;
```
    </text>
    <text x="50%" y="30" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Key Concepts">
      `int arr1[5];` declares a one-dimensional array with 5 elements of type `int`.
      `arr1[0] = 10;` assigns the value 10 to the first element.
      `arr1[1] = 20;` assigns the value 20 to the second element.
    </text>
  </section>
  <!-- Animation 2: One-Dimensional Arrays -->
  <animateTransform attributeName="transform" type="translate" from="0 200" to="0 220" begin="2s" dur="2s" repeatCount="indefinite" />
  <!-- Section 3: Two-Dimensional Arrays -->
  <section x="50%" y="340" width="300" height="150" style="background-color: #F7F7F7; padding: 20px; border-radius: 10px;">
    <text x="50%" y="10" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Definition">
      Two-dimensional arrays are an extension of one-dimensional arrays.
      They consist of multiple rows and columns of elements.
    </text>
    <text x="50%" y="30" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Key Concepts">
      `int arr2[2][3];` declares a two-dimensional array with 2 rows and 3 columns of elements of type `int`.
      `arr2[0][0] = 10;` assigns the value 10 to the top-left element.
      `arr2[1][1] = 50;` assigns the value 50 to the bottom-right element.
    </text>
  </section>
  <!-- Animation 3: Two-Dimensional Arrays -->
  <animateTransform attributeName="transform" type="translate" from="0 220" to="0 340" begin="4s" dur="2s" repeatCount="indefinite" />
  <!-- Section 4: Initializing Two-Dimensional Arrays -->
  <section x="50%" y="380" width="300" height="150" style="background-color: #F7F7F7; padding: 20px; border-radius: 10px;">
    <text x="50%" y="10" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Example">
      ```c
int arr3[2][3];
arr3[0][0] = 10;
arr3[0][1] = 20;
arr3[0][2] = 30;
arr3[1][0] = 40;
arr3[1][1] = 50;
arr3[1][2] = 60;
```
    </text>
    <text x="50%" y="30" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Key Concepts">
      Two-dimensional arrays can be initialized using a single statement that specifies the 
      number of rows and columns.
    </text>
  </section>
  <!-- Animation 4: Initializing Two-Dimensional Arrays -->
  <animateTransform attributeName="transform" type="translate" from="0 340" to="0 380" begin="6s" dur="2s" repeatCount="indefinite" />
  <!-- Footer -->
  <text x="50%" y="400" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Next Page">
    Next Page
  </text>
</svg>