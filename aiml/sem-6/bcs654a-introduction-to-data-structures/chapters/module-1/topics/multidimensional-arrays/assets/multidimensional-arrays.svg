<svg width="420" height="400" data-topic-id="multidimensional-arrays" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA"/>
      <stop offset="50%" stop-color="#A1C9F2"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
    <linearGradient id="indigo-orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="50%" stop-color="#8f0a1a"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel)" width="100%" height="100%"/>
  <text x="50%" y="10%" font-size="24" text-anchor="middle" fill="#fff">
    Multidimensional Arrays
  </text>
  <text x="50%" y="150%" font-size="18" text-anchor="middle" fill="#fff">
    Introduction to Multidimensional Arrays
  </text>
  <section data-narration="description">
    <rect x="50%" y="250%" width="200%" height="50%" fill="#fff" rx="10"/>
    <text x="25%" y="250%" font-size="18" text-anchor="middle" fill="#000">
      A multidimensional array is an array of arrays.
    </text>
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      from="0,250%" 
      to="0,300%" 
      dur="2s" 
      begin="0s" 
      repeatCount="indefinite" 
      fill="freeze"/>
  </section>
  <section data-narration="declaredata">
    <rect x="50%" y="300%" width="200%" height="50%" fill="#fff" rx="10"/>
    <text x="25%" y="300%" font-size="18" text-anchor="middle" fill="#000">
      Declaration Syntax: data_type array_name[rows][columns];
    </text>
    <text x="25%" y="320%" font-size="18" text-anchor="middle" fill="#000">
      Example:
    </text>
    <text x="25%" y="340%" font-size="18" text-anchor="middle" fill="#000">
      int matrix[3][4]; // A 3x4 integer matrix
    </text>
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      from="0,300%" 
      to="0,350%" 
      dur="2s" 
      begin="1s" 
      repeatCount="indefinite" 
      fill="freeze"/>
  </section>
  <section data-narration="memoryrepresentation">
    <rect x="50%" y="350%" width="200%" height="50%" fill="#fff" rx="10"/>
    <text x="25%" y="350%" font-size="18" text-anchor="middle" fill="#000">
      In C, multidimensional arrays are stored in row-major order,
      meaning elements are stored row by row in contiguous memory locations.
    </text>
    <rect x="25%" y="380%" width="200%" height="20%" fill="#fff" rx="10"/>
    <text x="25%" y="390%" font-size="18" text-anchor="middle" fill="#000">
      Memory layout for int arr[2][3]:
    </text>
    <rect x="25%" y="410%" width="100%" height="10%" fill="#fff" rx="5"/>
    <text x="25%" y="410%" font-size="14" text-anchor="middle" fill="#000">
      +-------+-------+-------+-------+-------+-------+
    </text>
    <rect x="25%" y="420%" width="100%" height="10%" fill="#fff" rx="5"/>
    <text x="25%" y="430%" font-size="14" text-anchor="middle" fill="#000">
      | [0][0]| [0][1]| [0][2]| [1][0]| [1][1]| [1][2]|
    </text>
    <rect x="25%" y="440%" width="100%" height="10%" fill="#fff" rx="5"/>
    <text x="25%" y="450%" font-size="14" text-anchor="middle" fill="#000">
      +-------+-------+-------+-------+-------+-------+
      Address: 1000   1004   1008   1012   1016   1020
    </text>
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      from="0,350%" 
      to="0,400%" 
      dur="2s" 
      begin="2s" 
      repeatCount="indefinite" 
      fill="freeze"/>
  </section>
  <section data-narration="accessingelements">
    <rect x="50%" y="400%" width="200%" height="50%" fill="#fff" rx="10"/>
    <text x="25%" y="400%" font-size="18" text-anchor="middle" fill="#000">
      Elements are accessed using two indices: row index and column index.
    </text>
    <rect x="25%" y="430%" width="200%" height="20%" fill="#fff" rx="10"/>
    <text x="25%" y="440%" font-size="18" text-anchor="middle" fill="#000">
      Example:
    </text>
    <rect x="25%" y="460%" width="100%" height="10%" fill="#fff" rx="5"/>
    <text x="25%" y="460%" font-size="14" text-anchor="middle" fill="#000">
      int value = matrix[1][2]; // Access element at row 1, column 2
    </text>
    <rect x="25%" y="480%" width="100%" height="10%" fill="#fff" rx="5"/>
    <text x="25%" y="490%" font-size="14" text-anchor="middle" fill="#000">
      matrix[0][3] = 42; // Set element at row 0, column 3 to 42
    </text>
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      from="0,400%" 
      to="0,450%" 
      dur="2s" 
      begin="4s" 
      repeatCount="indefinite" 
      fill="freeze"/>
  </section>
  <section data-narration="initialization">
    <rect x="50%" y="450%" width="200%" height="50%" fill="#fff" rx="10"/>
    <text x="25%" y="450%" font-size="18" text-anchor="middle" fill="#000">
      Two-dimensional arrays can be initialized during declaration
      in several ways:
    </text>
    <rect x="25%" y="480%" width="200%" height="20%" fill="#fff" rx="10"/>
    <text x="25%" y="490%" font-size="18" text-anchor="middle" fill="#000">
      Method 1: Full Initialization
    </text>
    <rect x="25%" y="520%" width="200%" height="20%" fill="#fff" rx="10"/>
    <text x="25%" y="530%" font-size="18" text-anchor="middle" fill="#000">
      int matrix[2][3] = {
        {1, 2, 3},  // Row 0
        {4, 5, 6}   // Row 1
      };
    </text>
    <rect x="25%" y="560%" width="200%" height="20%" fill="#fff" rx="10"/>
    <text x="25%" y="570%" font-size="18" text-anchor="middle" fill="#000">
      Method 2: Partial Initialization
    </text>
    <rect x="25%" y="600%" width="200%" height="20%" fill="#fff" rx="10"/>
    <text x="25%" y="610%" font-size="18" text-anchor="middle" fill="#000">
      int matrix[2][3] = {
        {1, 2},     // Row 0: [1, 2, 0]
        {4, 5, 6}   // Row 1: [4, 5, 6]
      };
    </text>
    <rect x="25%" y="650%" width="200%" height="20%" fill="#fff" rx="10"/>
    <text x="25%" y="660%" font-size="18" text-anchor="middle" fill="#000">
      Method 3: Flattened Initialization
    </text>
    <rect x="25%" y="690%" width="200%" height="20%" fill="#fff" rx="10"/>
    <text x="25%" y="700%" font-size="18" text-anchor="middle" fill="#000">
      int matrix[2][3] = {1, 2, 3, 4, 5, 6};
    </text>
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      from="0,450%" 
      to="0,500%" 
      dur="2s" 
      begin="6s" 
      repeatCount="indefinite" 
      fill="freeze"/>
  </section>
  <footer>
    <rect x="50%" y="550%" width="200%" height="50%" fill="#fff" rx="10"/>
    <text x="50%" y="550%" font-size="18" text-anchor="middle" fill="#000">
      Developed with love for programming education
    </text>
  </footer>
</svg>