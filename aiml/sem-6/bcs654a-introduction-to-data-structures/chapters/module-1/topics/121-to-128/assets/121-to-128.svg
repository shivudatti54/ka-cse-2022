<svg width="420" height="400" data-topic-id="121-128">
    <style>
        .container {
            background: linear-gradient(to bottom, #C7B8EA, #C7B8EA 10%, #B2A9FF 10%, #B2A9FF 80%, #C5CAE9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .section {
            margin-bottom: 20px;
        }
        
        .title {
            font-size: 24px;
            font-weight: bold;
            color: #3498DB;
        }
        
        .description {
            font-size: 18px;
            color: #333;
        }
        
        .animation {
            animation: slide 2s forwards;
        }
        
        @keyframes slide {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(0);
            }
        }
    </style>
    <div class="container">
        <div class="title">Introduction to Arrays</div>
        <div class="section" data-narration="12.1-12.8: Introduction to Arrays">
            <div class="description">
                An array is a collection of elements of the same data type stored in contiguous memory locations.
            </div>
        </div>
        <div class="section" data-narration="12.1: One-Dimensional Arrays">
            <div class="title">One-Dimensional Arrays</div>
            <div class="description">
                A one-dimensional array is an array that stores elements in a single row or column.
                Each element is identified by a unique index.
                All elements are of the same data type.
            </div>
            <div class="animation" style="animation-delay: 0s;">
                <rect x="10" y="20" width="100" height="50" fill="#B2A9FF" rx="10" />
            </div>
        </div>
        <div class="section" data-narration="12.2: Two-Dimensional Arrays">
            <div class="title">Two-Dimensional Arrays</div>
            <div class="description">
                A two-dimensional array is an array that stores elements in multiple rows and columns.
                Each element is identified by a pair of indices, one for rows and one for columns.
                All elements are of the same data type.
            </div>
            <div class="animation" style="animation-delay: 2s;">
                <rect x="10" y="20" width="100" height="50" fill="#C5CAE9" rx="10" />
            </div>
        </div>
        <div class="section" data-narration="12.3: Initializing Two-Dimensional Arrays">
            <div class="title">Initializing Two-Dimensional Arrays</div>
            <div class="description">
                You can initialize a two-dimensional array using the following methods:
                <ul>
                    <li>Row-wise Initialization</li>
                    <li>Column-wise Initialization</li>
                </ul>
            </div>
            <div class="animation" style="animation-delay: 4s;">
                <rect x="10" y="20" width="100" height="50" fill="#C7B8EA" rx="10" />
            </div>
        </div>
        <div class="section" data-narration="12.4: Accessing Elements in a Two-Dimensional Array">
            <div class="title">Accessing Elements in a Two-Dimensional Array</div>
            <div class="description">
                You can access elements in a two-dimensional array using two subscripts.
            </div>
            <div class="animation" style="animation-delay: 6s;">
                <rect x="10" y="20" width="100" height="50" fill="#B2A9FF" rx="10" />
            </div>
        </div>
        <div class="footer">
            <ul>
                <li>Arrow marker for connections:</li>
            </ul>
        </div>
    </div>
</svg>