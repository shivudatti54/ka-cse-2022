<svg width="420" height="400" data-topic-id="textbook-2-ch">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" opacity="0.5" />
  
  <!-- Title -->
  <text x="50%" y="20%" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">
    Introduction to Data Structures
  </text>
  
  <!-- Section 1: What are Arrays? -->
  <section id="section-1" data-narration="What are Arrays?">
    <rect x="0" y="100" width="420" height="80" fill="#F7F7F7" opacity="1" />
    <text x="20%" y="20%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      An array is a collection of elements of the same data type stored in contiguous memory locations.
    </text>
    <text x="20%" y="50%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Arrays allow us to store and manipulate large amounts of data in a single variable.
    </text>
    <animate transform="rotate(360 20% 40%)" begin="0s" duration="2s" repeatCount="indefinite" />
  </section>
  
  <!-- Section 2: Key Characteristics of Arrays -->
  <section id="section-2" data-narration="Key Characteristics of Arrays">
    <rect x="0" y="200" width="420" height="120" fill="#F7F7F7" opacity="1" />
    <text x="20%" y="20%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      A fixed number of elements
    </text>
    <text x="20%" y="50%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Elements are stored in contiguous memory locations
    </text>
    <text x="20%" y="80%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      All elements of an array are of the same data type
    </text>
    <animate transform="rotate(360 20% 60%)" begin="0s" duration="2s" repeatCount="indefinite" />
  </section>
  
  <!-- Section 3: Types of Arrays -->
  <section id="section-3" data-narration="Types of Arrays">
    <rect x="0" y="300" width="420" height="80" fill="#F7F7F7" opacity="1" />
    <text x="20%" y="20%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      One-Dimensional Arrays
    </text>
    <text x="20%" y="50%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Two-Dimensional Arrays
    </text>
    <animate transform="rotate(360 20% 80%)" begin="0s" duration="2s" repeatCount="indefinite" />
  </section>
  
  <!-- Section 4: Initializing Arrays -->
  <section id="section-4" data-narration="Initializing Arrays">
    <rect x="0" y="380" width="420" height="80" fill="#F7F7F7" opacity="1" />
    <text x="20%" y="20%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Initializing with a specific value
    </text>
    <text x="20%" y="50%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Initializing with a range of values
    </text>
    <animate transform="rotate(360 20% 100%)" begin="0s" duration="2s" repeatCount="indefinite" />
  </section>
  
  <!-- Footer -->
  <text x="50%" y="380%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
    Data Structures
  </text>
</svg>