<svg width="420" height="400" data-topic-id="81-to-85">
    <Defs>
        <LinearGradient id="pastel" x1="0" y1="0" x2="0" y2="1" spread="270">
            <Stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <Stop offset="100%" stop-color="#A6C2EA" stop-opacity="1"/>
        </LinearGradient>
        <Gradient id="indigo" x1="0" y1="0" x2="0" y2="1" spread="270">
            <Stop offset="0%" stop-color="#4B0082" stop-opacity="1"/>
            <Stop offset="100%" stop-color="#6c5ce7" stop-opacity="1"/>
        </Gradient>
        <Gradient id="teal" x1="0" y1="0" x2="0" y2="1" spread="270">
            <Stop offset="0%" stop-color="#0097A7" stop-opacity="1"/>
            <Stop offset="100%" stop-color="#1ABC9C" stop-opacity="1"/>
        </Gradient>
    </Defs>

    <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel)"/>

    <g transform="translate(20, 20)">

        <!-- Section 1: Introduction to Arrays -->
        <rect x="0" y="0" width="100%" height="40" fill="#E0E0E0" rx="5" data-narration="Introduction to Arrays"/>
        <text x="20" y="15" fill="#333333" font-size="18">What is an array?</text>
        <text x="20" y="25" fill="#666666" font-size="16">Definition:</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 40" begin="-0.5s" dur="1.5s" repeatCount="1"/>
        <rect x="20" y="30" width="80" height="10" fill="#4B0082" rx="5" data-narration="Elements are stored in contiguous memory locations." style="opacity: 0;ANIMATION-START: 0s;ANIMATION-END: 1.5s;"/>
        <rect x="120" y="30" width="80" height="10" fill="#A6C2EA" rx="5" data-narration="Elements are of the same data type." style="opacity: 0;ANIMATION-START: 0.5s;ANIMATION-END: 1.5s;"/>
        <rect x="220" y="30" width="80" height="10" fill="#1ABC9C" rx="5" data-narration="Elements are accessed using an index or subscript." style="opacity: 0;ANIMATION-START: 1s;ANIMATION-END: 1.5s;"/>
        <rect x="320" y="30" width="80" height="10" fill="#C7B8EA" rx="5" data-narration="Arrays can be initialized using various methods." style="opacity: 0;ANIMATION-START: 1.5s;ANIMATION-END: 1.5s;"/>

        <!-- Section 2: Characteristics of Arrays -->
        <rect x="0" y="50" width="100%" height="40" fill="#E0E0E0" rx="5" data-narration="Characteristics of Arrays"/>
        <text x="20" y="25" fill="#333333" font-size="18">What are the characteristics of arrays?</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 90" begin="-0.5s" dur="1.5s" repeatCount="1"/>
        <rect x="20" y="45" width="80" height="10" fill="#4B0082" rx="5" data-narration="Elements are stored in a fixed layout." style="opacity: 0;ANIMATION-START: 0s;ANIMATION-END: 1.5s;"/>
        <rect x="120" y="45" width="80" height="10" fill="#A6C2EA" rx="5" data-narration="Elements are of the same data type." style="opacity: 0;ANIMATION-START: 0.5s;ANIMATION-END: 1.5s;"/>
        <rect x="220" y="45" width="80" height="10" fill="#1ABC9C" rx="5" data-narration="Elements are accessed using an index or subscript." style="opacity: 0;ANIMATION-START: 1s;ANIMATION-END: 1.5s;"/>
        <rect x="320" y="45" width="80" height="10" fill="#C7B8EA" rx="5" data-narration="Elements are stored in contiguous memory locations." style="opacity: 0;ANIMATION-START: 1.5s;ANIMATION-END: 1.5s;"/>

        <!-- Section 3: One-Dimensional Arrays -->
        <rect x="0" y="90" width="100%" height="40" fill="#E0E0E0" rx="5" data-narration="One-Dimensional Arrays"/>
        <text x="20" y="25" fill="#333333" font-size="18">What are one-dimensional arrays?</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 130" begin="-0.5s" dur="1.5s" repeatCount="1"/>
        <rect x="20" y="105" width="80" height="10" fill="#4B0082" rx="5" data-narration="Elements are accessed using a single index or subscript." style="opacity: 0;ANIMATION-START: 0s;ANIMATION-END: 1.5s;"/>
        <rect x="120" y="105" width="80" height="10" fill="#A6C2EA" rx="5" data-narration="Elements are of the same data type." style="opacity: 0;ANIMATION-START: 0.5s;ANIMATION-END: 1.5s;"/>
        <rect x="220" y="105" width="80" height="10" fill="#1ABC9C" rx="5" data-narration="Elements are stored in contiguous memory locations." style="opacity: 0;ANIMATION-START: 1s;ANIMATION-END: 1.5s;"/>
        <rect x="320" y="105" width="80" height="10" fill="#C7B8EA" rx="5" data-narration="One-dimensional arrays can be used to store values of any data type." style="opacity: 0;ANIMATION-START: 1.5s;ANIMATION-END: 1.5s;"/>

        <!-- Section 4: Two-Dimensional Arrays -->
        <rect x="0" y="160" width="100%" height="40" fill="#E0E0E0" rx="5" data-narration="Two-Dimensional Arrays"/>
        <text x="20" y="25" fill="#333333" font-size="18">What are two-dimensional arrays?</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 190" begin="-0.5s" dur="1.5s" repeatCount="1"/>
        <rect x="20" y="165" width="80" height="10" fill="#4B0082" rx="5" data-narration="Elements are accessed using two indices or subscripts." style="opacity: 0;ANIMATION-START: 0s;ANIMATION-END: 1.5s;"/>
        <rect x="120" y="165" width="80" height="10" fill="#A6C2EA" rx="5" data-narration="Elements are of the same data type." style="opacity: 0;ANIMATION-START: 0.5s;ANIMATION-END: 1.5s;"/>
        <rect x="220" y="165" width="80" height="10" fill="#1ABC9C" rx="5" data-narration="Elements are stored in non-contiguous memory locations." style="opacity: 0;ANIMATION-START: 1s;ANIMATION-END: 1.5s;"/>
        <rect x="320" y="165" width="80" height="10" fill="#C7B8EA" rx="5" data-narration="Two-dimensional arrays can be used to store matrices, tables, or any other rectangular data structure." style="opacity: 0;ANIMATION-START: 1.5s;ANIMATION-END: 1.5s;"/>

        <!-- Section 5: Initializing Two-Dimensional Arrays -->
        <rect x="0" y="240" width="100%" height="40" fill="#E0E0E0" rx="5" data-narration="Initializing Two-Dimensional Arrays"/>
        <text x="20" y="25" fill="#333333" font-size="18">How to initialize two-dimensional arrays?</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 270" begin="-0.5s" dur="1.5s" repeatCount="1"/>
        <rect x="20" y="265" width="80" height="10" fill="#4B0082" rx="5" data-narration="Row-wise initialization method." style="opacity: 0;ANIMATION-START: 0s;ANIMATION-END: 1.5s;"/>
        <rect x="120" y="265" width="80" height="10" fill="#A6C2EA" rx="5" data-narration="Column-wise initialization method." style="opacity: 0;ANIMATION-START: 0.5s;ANIMATION-END: 1.5s;"/>
        <rect x="220" y="265" width="80" height="10" fill="#1ABC9C" rx="5" data-narration="Using the array initializer syntax." style="opacity: 0;ANIMATION-START: 1s;ANIMATION-END: 1.5s;"/>
        <rect x="320" y="265" width="80" height="10" fill="#C7B8EA" rx="5" data-narration="Using the array initializer syntax with initial values." style="opacity: 0;ANIMATION-START: 1.5s;ANIMATION-END: 1.5s;"/>

        <!-- Footer -->
        <rect x="0" y="340" width="100%" height="20" fill="#E0E0E0" rx="5"/>
        <text x="20" y="15" fill="#333333" font-size="14">81 to 85</text>
    </g>
</svg>