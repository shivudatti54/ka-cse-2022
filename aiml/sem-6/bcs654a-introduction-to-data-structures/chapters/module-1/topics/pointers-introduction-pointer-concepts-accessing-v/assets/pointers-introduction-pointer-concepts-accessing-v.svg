<svg width="420" height="400" data-topic-id="pointers-introduction-pointer-concepts-accessing-v"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400"
     style="background-image: linear-gradient(to bottom, #C7D2F4, #C5CAFF);">
  <!-- Header -->
  <rect x="0" y="0" width="420" height="40" rx="10" style="fill: #2F4F7F"/>
  <text x="10" y="15" text-anchor="start" transform="rotate(45 20 15)" fill="#fff" font-size="18">
    Pointers Introduction Pointer Concepts Accessing V
  </text>

  <!-- Gradient and Bars -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7D2F4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAFF" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="40" width="420" height="160" rx="10" style="fill: url(#gradient)"/>
  <rect x="0" y="200" width="420" height="120" rx="10" style="fill: #2F4F7F"/>

  <!-- Sections -->
  <section data-narration="Introduction to Pointers" style="display: block;">
    <rect x="0" y="40" width="420" height="60" rx="10" style="fill: #C7D2F4"/>
    <text x="10" y="25" text-anchor="start" transform="rotate(45 20 25)" fill="#fff" font-size="14">
      Pointers are a fundamental concept in programming, particularly in languages like C and C++.
    </text>
    <text x="10" y="45" text-anchor="start" transform="rotate(45 20 45)" fill="#fff" font-size="14">
      A pointer is a variable that stores the memory address of another variable.
    </text>
  </section>
  <section data-narration="Pointer Concepts" style="display: none;">
    <rect x="0" y="40" width="420" height="60" rx="10" style="fill: #C5CAFF"/>
    <text x="10" y="25" text-anchor="start" transform="rotate(45 20 25)" fill="#fff" font-size="14">
      Types of Pointers
    </text>
    <text x="10" y="45" text-anchor="start" transform="rotate(45 20 45)" fill="#fff" font-size="14">
      Dereferencing a Pointer: The process of using a pointer to access the value it points to.
    </text>
    <text x="10" y="55" text-anchor="start" transform="rotate(45 20 55)" fill="#fff" font-size="14">
      Address of a Pointer: The memory address where a pointer is stored.
    </text>
    <text x="10" y="65" text-anchor="start" transform="rotate(45 20 65)" fill="#fff" font-size="14">
      Null Pointer: A pointer that doesn't point to a valid memory address.
    </text>
  </section>
  <section data-narration="Accessing Variables through Pointers" style="display: none;">
    <rect x="0" y="40" width="420" height="60" rx="10" style="fill: #C7D2F4"/>
    <text x="10" y="25" text-anchor="start" transform="rotate(45 20 25)" fill="#fff" font-size="14">
      Basic Pointer Operations
    </text>
    <text x="10" y="45" text-anchor="start" transform="rotate(45 20 45)" fill="#fff" font-size="14">
      Dereferencing: To access the value of a variable using a pointer, you need to dereference the pointer using the unary * operator.
    </text>
    <text x="10" y="55" text-anchor="start" transform="rotate(45 20 55)" fill="#fff" font-size="14">
      Address of: To get the memory address of a variable, use the unary & operator.
    </text>
  </section>
  <section data-narration="Pointer Arithmetic" style="display: none;">
    <rect x="0" y="40" width="420" height="60" rx="10" style="fill: #C5CAFF"/>
    <text x="10" y="25" text-anchor="start" transform="rotate(45 20 25)" fill="#fff" font-size="14">
      Pointer Arithmetic
    </text>
    <text x="10" y="45" text-anchor="start" transform="rotate(45 20 45)" fill="#fff" font-size="14">
      Incrementing a Pointer: To move the pointer to the next element, use the unary ++ operator.
    </text>
    <text x="10" y="55" text-anchor="start" transform="rotate(45 20 55)" fill="#fff" font-size="14">
      Decrementing a Pointer: To move the pointer to the previous element, use the unary -- operator.
    </text>
  </section>

  <!-- Footer -->
  <rect x="0" y="260" width="420" height="40" rx="10" style="fill: #2F4F7F"/>
  <text x="10" y="325" text-anchor="start" transform="rotate(45 20 320)" fill="#fff" font-size="14">
    Pointers Introduction Pointer Concepts Accessing V
  </text>
</svg>