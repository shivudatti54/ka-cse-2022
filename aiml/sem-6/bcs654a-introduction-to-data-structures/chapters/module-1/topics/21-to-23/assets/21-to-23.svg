<svg width="420" height="400" data-topic-id="21-23">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A4C3E1" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>
  
  <!-- Title -->
  <text text-anchor="middle" x="50%" y="20%" font-size="24" fill="#2E4053">
    <tspan font-weight="bold">21-23: Introduction to Arrays</tspan>
  </text>
  
  <!-- Section 1: Definition -->
  <section data-narration="Definition">
    <rect x="10" y="100" width="380" height="50" fill="#F0F4F7"/>
    <text text-anchor="start" x="15" y="20" font-size="18" fill="#2E4053">
      <tspan font-weight="bold">Definition</tspan>
      An array is a collection of elements of the same data type stored in contiguous memory locations.
    </text>
    <rect x="10" y="150" width="380" height="50" fill="#F0F4F7"/>
    <text text-anchor="start" x="15" y="160" font-size="18" fill="#2E4053">
      <tspan font-weight="bold">Example</tspan>
      <tspan>int scores[5];</tspan>
    </text>
  </section>
  
  <!-- Section 2: Characteristics -->
  <section data-narration="Characteristics">
    <rect x="10" y="230" width="380" height="50" fill="#F0F4F7"/>
    <text text-anchor="start" x="15" y="240" font-size="18" fill="#2E4053">
      <tspan font-weight="bold">Characteristics</tspan>
      Arrays are used to store multiple values in a single variable.
    </text>
    <rect x="10" y="280" width="380" height="50" fill="#F0F4F7"/>
    <text text-anchor="start" x="15" y="290" font-size="18" fill="#2E4053">
      <tspan font-weight="bold">Example</tspan>
      char colors[4] = {'R', 'G', 'B', 'Y'};
    </text>
  </section>
  
  <!-- Section 3: Benefits -->
  <section data-narration="Benefits">
    <rect x="10" y="330" width="380" height="50" fill="#F0F4F7"/>
    <text text-anchor="start" x="15" y="340" font-size="18" fill="#2E4053">
      <tspan font-weight="bold">Benefits</tspan>
      Arrays provide efficient storage and retrieval of data.
    </text>
    <rect x="10" y="380" width="380" height="50" fill="#F0F4F7"/>
    <text text-anchor="start" x="15" y="390" font-size="18" fill="#2E4053">
      <tspan font-weight="bold">Example</tspan>
      char colors[4] = {'R', 'G', 'B', 'Y'};
    </text>
  </section>
  
  <!-- Section 4: One-Dimensional Arrays -->
  <section data-narration="One-Dimensional Arrays">
    <rect x="10" y="470" width="380" height="50" fill="#F0F4F7"/>
    <text text-anchor="start" x="15" y="480" font-size="18" fill="#2E4053">
      <tspan font-weight="bold">One-Dimensional Arrays</tspan>
      One-dimensional arrays are denoted by square brackets [] and are of the form arrayName[arraySize].
    </text>
    <rect x="10" y="530" width="380" height="50" fill="#F0F4F7"/>
    <text text-anchor="start" x="15" y="540" font-size="18" fill="#2E4053">
      <tspan font-weight="bold">Example</tspan>
      int scores[5];
    </text>
  </section>
  
  <!-- Section 5: Two-Dimensional Arrays -->
  <section data-narration="Two-Dimensional Arrays">
    <rect x="10" y="610" width="380" height="50" fill="#F0F4F7"/>
    <text text-anchor="start" x="15" y="620" font-size="18" fill="#2E4053">
      <tspan font-weight="bold">Two-Dimensional Arrays</tspan>
      Two-dimensional arrays are denoted by double square brackets [][] and are of the form arrayName[rowSize][columnSize].
    </text>
    <rect x="10" y="670" width="380" height="50" fill="#F0F4F7"/>
    <text text-anchor="start" x="15" y="680" font-size="18" fill="#2E4053">
      <tspan font-weight="bold">Example</tspan>
      char colors[4][4] = {{'R', 'G', 'B', 'Y'}, {'P', 'O', 'I', 'T'}, {'L', 'E', 'A', 'S'}, {'Y', 'T', 'O', 'S'}};
    </text>
  </section>
  
  <!-- Section 6: Conclusion -->
  <section data-narration="Conclusion">
    <rect x="10" y="750" width="380" height="50" fill="#F0F4F7"/>
    <text text-anchor="start" x="15" y="760" font-size="18" fill="#2E4053">
      <tspan font-weight="bold">Conclusion</tspan>
      Arrays are a fundamental data structure in programming that allows for efficient storage and manipulation of large amounts of data.
    </text>
  </section>
  
  <!-- Footer -->
  <text text-anchor="middle" x="50%" y="380" font-size="12" fill="#2E4053">
    Developed by [Your Name]
  </text>
</svg>