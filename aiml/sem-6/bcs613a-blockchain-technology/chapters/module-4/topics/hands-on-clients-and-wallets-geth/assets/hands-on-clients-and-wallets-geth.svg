<svg width="420" height="400" data-topic-id="clients-and-wallets-geth">
  <!-- Introduction Section -->
  <section data-narration="Introduction">
    <rect x="50" y="50" width="320" height="50" style="fill: #3B5998;"/>
    <text x="150" y="70" font-size="24" font-family="Arial" fill="#fff">Introduction to Clients and Wallets</text>
  </section>

  <!-- What is a Client Section -->
  <section data-narration="What is a Client">
    <rect x="50" y="120" width="320" height="50" style="fill: #4CAF50;"/>
    <text x="150" y="140" font-size="18" font-family="Arial" fill="#fff">A client is a software application that interacts with the Ethereum blockchain</text>
    <animate attributeName="opacity" begin="1s" dur="2s" from="1" to="0" repeatCount="indefinite"/>
  </section>

  <!-- Full Nodes Section -->
  <section data-narration="Full Nodes">
    <rect x="50" y="180" width="320" height="50" style="fill: #3B5998;"/>
    <text x="150" y="200" font-size="18" font-family="Arial" fill="#fff">Full nodes store a complete copy of the Ethereum blockchain</text>
    <animate attributeName="opacity" begin="2s" dur="2s" from="1" to="0" repeatCount="indefinite"/>
  </section>

  <!-- Lightweight Clients Section -->
  <section data-narration="Lightweight Clients">
    <rect x="50" y="230" width="320" height="50" style="fill: #4CAF50;"/>
    <text x="150" y="250" font-size="18" font-family="Arial" fill="#fff">Lightweight clients do not store a complete copy of the blockchain</text>
    <animate attributeName="opacity" begin="3s" dur="2s" from="1" to="0" repeatCount="indefinite"/>
  </section>

  <!-- What is a Wallet Section -->
  <section data-narration="What is a Wallet">
    <rect x="50" y="280" width="320" height="50" style="fill: #3B5998;"/>
    <text x="150" y="300" font-size="18" font-family="Arial" fill="#fff">A wallet is a software application that securely stores and manages private keys</text>
    <animate attributeName="opacity" begin="4s" dur="2s" from="1" to="0" repeatCount="indefinite"/>
  </section>

  <!-- Types of Wallets Section -->
  <section data-narration="Types of Wallets">
    <rect x="50" y="330" width="320" height="50" style="fill: #4CAF50;"/>
    <text x="150" y="350" font-size="18" font-family="Arial" fill="#fff">Hardware wallets, software wallets, and web wallets are the main types of wallets</text>
    <animate attributeName="opacity" begin="5s" dur="2s" from="1" to="0" repeatCount="indefinite"/>
  </section>

  <!-- Geth Wallet Section -->
  <section data-narration="Geth Wallet">
    <rect x="50" y="380" width="320" height="50" style="fill: #3B5998;"/>
    <text x="150" y="400" font-size="18" font-family="Arial" fill="#fff">Geth is a popular Ethereum client that includes a built-in wallet</text>
    <animate attributeName="opacity" begin="6s" dur="2s" from="1" to="0" repeatCount="indefinite"/>
  </section>

  <!-- Footer Section -->
  <footer>
    <rect x="50" y="400" width="320" height="20" style="fill: #4CAF50;"/>
    <text x="150" y="420" font-size="14" font-family="Arial" fill="#fff">Clients and Wallets - Geth</text>
  </footer>
</svg>