<svg width="420" height="400" data-topic-id="chapter-1" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c7e8f8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#dce7f2" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66d9ef" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff99cc" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <rect x="10" y="10" width="400" height="20" fill="#2f4f7f"/>
  <text x="15" y="35" font-size="18" fill="#fff">Blockchain Technology: Chapter 1</text>

  <!-- Background -->
  <rect x="0" y="45" width="420" height="300" fill="url(#pastel-gradient)"/>

  <!-- Section 1: Introduction -->
  <rect x="10" y="50" width="400" height="50" fill="#fff" data-narration="Introduction to Blockchain Technology"/>
  <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="10s" begin="0s"/>
  <text x="15" y="70" font-size="14" fill="#333">A decentralized digital ledger</text>
  <rect x="10" y="70" width="40" height="40" fill="#66d9ef" rx="10"/>
  <text x="15" y="85" font-size="14" fill="#333">Recording transactions across a network</text>

  <!-- Section 2: History of Blockchain -->
  <rect x="10" y="130" width="400" height="50" fill="#fff" data-narration="History of Blockchain Technology"/>
  <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="10s" begin="1s"/>
  <text x="15" y="150" font-size="14" fill="#333">Satoshi Nakamoto's whitepaper</text>
  <rect x="10" y="150" width="40" height="40" fill="#dce7f2" rx="10"/>
  <text x="15" y="165" font-size="14" fill="#333">January 2009: First blockchain creation</text>

  <!-- Section 3: Distributed Systems -->
  <rect x="10" y="210" width="400" height="50" fill="#fff" data-narration="Distributed Systems in Blockchain Technology"/>
  <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="10s" begin="2s"/>
  <text x="15" y="230" font-size="14" fill="#333">Decentralized networks</text>
  <rect x="10" y="230" width="40" height="40" fill="#66d9ef" rx="10"/>
  <text x="15" y="245" font-size="14" fill="#333">Autonomy and decentralization</text>

  <!-- Section 4: CAP Theorem -->
  <rect x="10" y="290" width="400" height="50" fill="#fff" data-narration="CAP Theorem in Blockchain Technology"/>
  <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="10s" begin="3s"/>
  <text x="15" y="310" font-size="14" fill="#333">Consistency, Availability, and Partition Tolerance</text>
  <rect x="10" y="310" width="40" height="40" fill="#dce7f2" rx="10"/>
  <text x="15" y="325" font-size="14" fill="#333">Trade-offs in distributed systems</text>

  <!-- Footer -->
  <rect x="10" y="350" width="400" height="50" fill="#2f4f7f"/>
  <text x="15" y="365" font-size="14" fill="#fff">Blockchain Technology: Chapter 1</text>
</svg>