<svg width="420" height="400" data-topic-id="smart-contracts-education"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     style="fill-rule:nonzero;mix-blend-mode:source-over;stroke-linecap:round;stroke-miterlimit:4;stroke-linejoin:round;stroke-width:1;font-family:'Arial', sans-serif;">
  <!-- Title Section -->
  <rect x="10" y="10" width="400" height="30" fill="#F7F7F7"></rect>
  <text x="15" y="35" font-size="24" font-family="Arial, sans-serif"
        style="fill:#000;stroke:#000;stroke-width:1;stroke-linecap:round;stroke-linejoin:round;"
        renderhint="hinting:always;">Chapter 4: Smart Contracts (pg: 111-148)</text>
  
  <!-- Introduction Section -->
  <rect x="10" y="65" width="400" height="60" fill="#F7F7F7"></rect>
  <text x="15" y="90" font-size="18" font-family="Arial, sans-serif"
        style="fill:#000;stroke:#000;stroke-width:1;stroke-linecap:round;stroke-linejoin:round;"
        renderhint="hinting:always;">Introduction</text>
  <animate xmlns="http://www.w3.org/2000/svg" attributes="opacity" begin="0s"
           duration="1s" repeat="forever" from="1" to="0.5"
           direction="forward" style="fill-opacity:0.5;fill-opacity:1;fill-opacity:0.5;fill-opacity:0.2;fill-opacity:0.5;fill-opacity:1;fill-opacity:0.5;fill-opacity:0.2;fill-opacity:0.5;"></animate>
  <rect x="15" y="100" width="380" height="20" fill="#66CCFF" rx="5"></rect>
  <text x="15" y="125" font-size="18" font-family="Arial, sans-serif"
        style="fill:#000;stroke:#000;stroke-width:1;stroke-linecap:round;stroke-linejoin:round;"
        renderhint="hinting:always;">A smart contract is a self-executing contract with the terms of the agreement written directly into lines of code.</text>
  
  <!-- What are Smart Contracts Section -->
  <rect x="10" y="155" width="400" height="60" fill="#F7F7F7"></rect>
  <text x="15" y="180" font-size="18" font-family="Arial, sans-serif"
        style="fill:#000;stroke:#000;stroke-width:1;stroke-linecap:round;stroke-linejoin:round;"
        renderhint="hinting:always;">What are Smart Contracts?</text>
  <animate xmlns="http://www.w3.org/2000/svg" attributes="opacity" begin="0s"
           duration="1s" repeat="forever" from="1" to="0.5"
           direction="forward" style="fill-opacity:0.5;fill-opacity:1;fill-opacity:0.5;fill-opacity:0.2;fill-opacity:0.5;fill-opacity:1;fill-opacity:0.5;fill-opacity:0.2;fill-opacity:0.5;"></animate>
  <rect x="15" y="190" width="380" height="20" fill="#66CCFF" rx="5"></rect>
  <text x="15" y="215" font-size="18" font-family="Arial, sans-serif"
        style="fill:#000;stroke:#000;stroke-width:1;stroke-linecap:round;stroke-linejoin:round;"
        renderhint="hinting:always;">A smart contract is a program that automates the enforcement and execution of a contract.</text>
  
  <!-- How Smart Contracts Work Section -->
  <rect x="10" y="245" width="400" height="60" fill="#F7F7F7"></rect>
  <text x="15" y="270" font-size="18" font-family="Arial, sans-serif"
        style="fill:#000;stroke:#000;stroke-width:1;stroke-linecap:round;stroke-linejoin:round;"
        renderhint="hinting:always;">How Smart Contracts Work</text>
  <animate xmlns="http://www.w3.org/2000/svg" attributes="opacity" begin="0s"
           duration="1s" repeat="forever" from="1" to="0.5"
           direction="forward" style="fill-opacity:0.5;fill-opacity:1;fill-opacity:0.5;fill-opacity:0.2;fill-opacity:0.5;fill-opacity:1;fill-opacity:0.5;fill-opacity:0.2;fill-opacity:0.5;"></animate>
  <rect x="15" y="280" width="380" height="20" fill="#66CCFF" rx="5"></rect>
  <text x="15" y="295" font-size="18" font-family="Arial, sans-serif"
        style="fill:#000;stroke:#000;stroke-width:1;stroke-linecap:round;stroke-linejoin:round;"
        renderhint="hinting:always;">A smart contract is created by writing code that outlines the terms and conditions of a contract.</text>
  
  <!-- Types of Smart Contracts Section -->
  <rect x="10" y="325" width="400" height="60" fill="#F7F7F7"></rect>
  <text x="15" y="350" font-size="18" font-family="Arial, sans-serif"
        style="fill:#000;stroke:#000;stroke-width:1;stroke-linecap:round;stroke-linejoin:round;"
        renderhint="hinting:always;">Types of Smart Contracts</text>
  <animate xmlns="http://www.w3.org/2000/svg" attributes="opacity" begin="0s"
           duration="1s" repeat="forever" from="1" to="0.5"
           direction="forward" style="fill-opacity:0.5;fill-opacity:1;fill-opacity:0.5;fill-opacity:0.2;fill-opacity:0.5;fill-opacity:1;fill-opacity:0.5;fill-opacity:0.2;fill-opacity:0.5;"></animate>
  <rect x="15" y="360" width="380" height="20" fill="#66CCFF" rx="5"></rect>
  <text x="15" y="375" font-size="18" font-family="Arial, sans-serif"
        style="fill:#000;stroke:#000;stroke-width:1;stroke-linecap:round;stroke-linejoin:round;"
        renderhint="hinting:always;">Basic Smart Contracts automate simple processes, such as the transfer of assets.</text>
  
  <!-- Benefits of Smart Contracts Section -->
  <rect x="10" y="405" width="400" height="60" fill="#F7F7F7"></rect>
  <text x="15" y="430" font-size="18" font-family="Arial, sans-serif"
        style="fill:#000;stroke:#000;stroke-width:1;stroke-linecap:round;stroke-linejoin:round;"
        renderhint="hinting:always;">Benefits of Smart Contracts</text>
  <animate xmlns="http://www.w3.org/2000/svg" attributes="opacity" begin="0s"
           duration="1s" repeat="forever" from="1" to="0.5"
           direction="forward" style="fill-opacity:0.5;fill-opacity:1;fill-opacity:0.5;fill-opacity:0.2;fill-opacity:0.5;fill-opacity:1;fill-opacity:0.5;fill-opacity:0.2;fill-opacity:0.5;"></animate>
  <rect x="15" y="445" width="380" height="20" fill="#66CCFF" rx="5"></rect>
  <text x="15" y="460" font-size="18" font-family="Arial, sans-serif"
        style="fill:#000;stroke:#000;stroke-width:1;stroke-linecap:round;stroke-linejoin:round;"
        renderhint="hinting:always;">Smart contracts offer increased efficiency and improved security.</text>
  
  <!-- Footer Section -->
  <rect x="10" y="490" width="400" height="30" fill="#F7F7F7"></rect>
  <text x="15" y="515" font-size="18" font-family="Arial, sans-serif"
        style="fill:#000;stroke:#000;stroke-width:1;stroke-linecap:round;stroke-linejoin:round;"
        renderhint="hinting:always;">Chapter 4: Smart Contracts (pg: 111-148)</text>
</svg>