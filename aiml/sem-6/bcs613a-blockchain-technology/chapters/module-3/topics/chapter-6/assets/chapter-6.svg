<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="smart-contracts" viewBox="0 0 420 400" data-background-image="https://example.com/background.jpg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title Section -->
  <g id="title-section" transform="translate(20 20)">
    <text x="20" y="50" font-size="24" font-family="Arial, sans-serif" text-anchor="start" fill="#3498db">
      <tspan>Chapter 6: Smart Contracts</tspan>
    </text>
  </g>
  
  <!-- Section 1: Introduction -->
  <g id="section-1" transform="translate(20 100)">
    <rect width="380" height="50" fill="#f9f9f9" rx="10" data-narration="Smart contracts are self-executing contracts with the terms of the agreement written directly into lines of code.">
      <animateTransform attributeName="transform" type="rotate" from="0,20,20" to="360,20,20" dur="10s" repeatCount="indefinite"/>
    </rect>
    <text x="20" y="60" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#666666">Introduction to Smart Contracts</text>
    <text x="20" y="80" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#666666">Smart contracts are self-executing contracts with the terms of the agreement written directly into lines of code.</text>
  </g>
  
  <!-- Section 2: Definition and Characteristics -->
  <g id="section-2" transform="translate(20 160)">
    <rect width="380" height="50" fill="#f9f9f9" rx="10" data-narration="Smart contracts are decentralized, autonomous, and trustless applications.">
      <animateTransform attributeName="transform" type="rotate" from="0,20,20" to="360,20,20" dur="10s" repeatCount="indefinite"/>
    </rect>
    <text x="20" y="60" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#666666">Definition and Characteristics</text>
    <text x="20" y="80" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#666666">Smart contracts are decentralized, autonomous, and trustless applications.</text>
    <line x1="20" y1="150" x2="20" y2="220" stroke="#3498db" stroke-width="2" fill="none"/>
    <line x1="20" y1="220" x2="20" y2="150" stroke="#3498db" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Section 3: How Smart Contracts Work -->
  <g id="section-3" transform="translate(20 220)">
    <rect width="380" height="50" fill="#f9f9f9" rx="10" data-narration="Smart contracts work by creating a self-executing contract that automatically executes the terms of the agreement when certain conditions are met.">
      <animateTransform attributeName="transform" type="rotate" from="0,20,20" to="360,20,20" dur="10s" repeatCount="indefinite"/>
    </rect>
    <text x="20" y="60" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#666666">How Smart Contracts Work</text>
    <text x="20" y="80" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#666666">Smart contracts work by creating a self-executing contract that automatically executes the terms of the agreement when certain conditions are met.</text>
    <line x1="20" y1="160" x2="20" y2="250" stroke="#3498db" stroke-width="2" fill="none"/>
    <line x1="20" y1="250" x2="20" y2="160" stroke="#3498db" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Section 4: Types of Smart Contracts -->
  <g id="section-4" transform="translate(20 280)">
    <rect width="380" height="50" fill="#f9f9f9" rx="10" data-narration="There are two main types of smart contracts: reputation-based and commodity-based smart contracts.">
      <animateTransform attributeName="transform" type="rotate" from="0,20,20" to="360,20,20" dur="10s" repeatCount="indefinite"/>
    </rect>
    <text x="20" y="60" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#666666">Types of Smart Contracts</text>
    <text x="20" y="80" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#666666">There are two main types of smart contracts: reputation-based and commodity-based smart contracts.</text>
    <line x1="20" y1="180" x2="20" y2="270" stroke="#3498db" stroke-width="2" fill="none"/>
    <line x1="20" y1="270" x2="20" y2="180" stroke="#3498db" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Section 5: Benefits of Smart Contracts -->
  <g id="section-5" transform="translate(20 340)">
    <rect width="380" height="50" fill="#f9f9f9" rx="10" data-narration="Smart contracts offer several benefits, including increased efficiency, improved security, and increased transparency.">
      <animateTransform attributeName="transform" type="rotate" from="0,20,20" to="360,20,20" dur="10s" repeatCount="indefinite"/>
    </rect>
    <text x="20" y="60" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#666666">Benefits of Smart Contracts</text>
    <text x="20" y="80" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#666666">Smart contracts offer several benefits, including increased efficiency, improved security, and increased transparency.</text>
    <line x1="20" y1="200" x2="20" y2="290" stroke="#3498db" stroke-width="2" fill="none"/>
    <line x1="20" y1="290" x2="20" y2="200" stroke="#3498db" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Footer -->
  <g id="footer" transform="translate(20 380)">
    <rect width="380" height="50" fill="#f9f9f9" rx="10"/>
    <text x="20" y="60" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#666666">Chapter 6: Smart Contracts</text>
  </g>
</svg>