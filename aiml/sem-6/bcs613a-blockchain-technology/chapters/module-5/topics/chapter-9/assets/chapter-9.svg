<svg width="420" height="400" data-topic-id="hyperledger-fabric">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
    <style>
      .section {
        background: url(#pastel-gradient) no-repeat;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      .title {
        text-align: center;
        font-size: 24px;
        margin-bottom: 10px;
      }
      .footnote {
        text-align: center;
        font-size: 14px;
        color: #666;
      }
    </style>
  </defs>
  <g id="hyperledger-fabric-diagram">
    <!-- Introduction to Hyperledger Fabric -->
    <rect x="20" y="20" width="380" height="100" class="section" data-narration="Introduction to Hyperledger Fabric" />
    <text x="50%" y="50%" text-anchor="middle" class="title">Hyperledger Fabric</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" dur="2s" begin="0s" />
    <text x="50%" y="80%" text-anchor="middle" class="footnote">Distributed ledger technology for business applications</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" dur="2s" begin="2s" />
    <!-- Key Features of Hyperledger Fabric -->
    <rect x="20" y="150" width="380" height="150" class="section" data-narration="Key Features of Hyperledger Fabric" />
    <text x="50%" y="150" text-anchor="middle" class="title">Key Features</text>
    <line x1="50%" y1="50%" x2="50%" y2="200" stroke="#3498db" stroke-width="2" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150" dur="2s" begin="0s" />
    <text x="50%" y="200" text-anchor="middle" class="footnote">Distributed ledger, private network, CAs, and smart contracts</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150" dur="2s" begin="2s" />
    <!-- Hyperledger Fabric Architecture -->
    <rect x="20" y="300" width="380" height="200" class="section" data-narration="Hyperledger Fabric Architecture" />
    <text x="50%" y="300" text-anchor="middle" class="title">Architecture</text>
    <path d="M 50,60 C 70,60 80,80 80,100 C 80,120 70,140 50,160" stroke="#2ecc71" stroke-width="2" fill="none" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,300" dur="2s" begin="0s" />
    <text x="50%" y="180" text-anchor="middle" class="footnote">Peer, Tx, Block, CA, Client, Node</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,300" dur="2s" begin="2s" />
    <!-- Hyperledger Sawtooth Lake -->
    <rect x="20" y="500" width="380" height="150" class="section" data-narration="Hyperledger Sawtooth Lake" />
    <text x="50%" y="500" text-anchor="middle" class="title">Hyperledger Sawtooth Lake</text>
    <line x1="50%" y1="50%" x2="50%" y2="550" stroke="#e74c3c" stroke-width="2" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,500" dur="2s" begin="0s" />
    <text x="50%" y="550" text-anchor="middle" class="footnote">Scalable and secure distributed ledger technology</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,500" dur="2s" begin="2s" />
  </g>
</svg>