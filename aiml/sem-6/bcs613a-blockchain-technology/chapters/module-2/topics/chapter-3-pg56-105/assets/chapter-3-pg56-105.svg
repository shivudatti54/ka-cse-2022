<svg width="420" height="400" data-topic-id="blockchain-and-full-ecosystem">
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
            <stop offset="100%" stop-color="#6495ED" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="50" y="50" width="320" height="300" fill="url(#pastel-gradient)"/>
    <g transform="translate(50,50)">
        <rect width="120" height="50" fill="#6495ED" rx="10"/>

        <text x="10" y="10" font-size="16" font-family="Arial" fill="#6495ED" text-anchor="start">Blockchain Technology</text>
        <animate transform="rotate(360 190 25)" begin="0s" dur="10s" repeatCount="indefinite"/>

        <text x="10" y="70" font-size="14" font-family="Arial" fill="#ADD8E6" text-anchor="start" data-narration="Definition: Blockchain is a distributed digital ledger technology that allows multiple parties to record and verify transactions without the need for a central authority." effect="underline">Definition:</text>

        <rect width="120" height="50" fill="#ADD8E6" rx="10"/>
        <animate transform="rotate(720 190 25)" begin="0.1s" dur="10s" repeatCount="indefinite"/>

        <text x="10" y="70" font-size="14" font-family="Arial" fill="#6495ED" text-anchor="start" data-narration="Key Characteristics: Decentralized, Distributed, Immutable, Transparent" effect="underline">Key Characteristics:</text>

        <rect width="120" height="50" fill="#6495ED" rx="10"/>
        <animate transform="rotate(1080 190 25)" begin="0.2s" dur="10s" repeatCount="indefinite"/>

        <text x="10" y="70" font-size="14" font-family="Arial" fill="#ADD8E6" text-anchor="start" data-narration="Public Blockchain: Decentralized, Open-source. Private Blockchain: Centralized, Proprietary. Consortium Blockchain: Centralized, Private." effect="underline">Types of Blockchain:</text>

        <rect width="120" height="50" fill="#ADD8E6" rx="10"/>
        <animate transform="rotate(1290 190 25)" begin="0.3s" dur="10s" repeatCount="indefinite"/>

        <text x="10" y="70" font-size="14" font-family="Arial" fill="#6495ED" text-anchor="start" data-narration="Blockchain Architecture: Network, Nodes, Blockchain, Consensus Mechanism. Consensus Mechanisms: Proof of Work, Proof of Stake, Byzantine Fault Tolerance." effect="underline">Blockchain Architecture:</text>

        <rect width="120" height="50" fill="#ADD8E6" rx="10"/>
        <animate transform="rotate(1500 190 25)" begin="0.4s" dur="10s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(50,50)">
        <text x="10" y="20" font-size="16" font-family="Arial" fill="#6495ED" text-anchor="start">Examples:</text>
        <rect x="10" y="40" width="120" height="50" fill="#6495ED" rx="10"/>
        <animate transform="translate(190, 40) rotate(360 190 25)" begin="0.5s" dur="5s" repeatCount="indefinite"/>
        <text x="10" y="60" font-size="14" font-family="Arial" fill="#ADD8E6" text-anchor="start" data-narration="Bitcoin, Ethereum. Enterprise Blockchains, Consortium Blockchains." effect="underline">Public Blockchains:</text>
        <rect x="10" y="80" width="120" height="50" fill="#ADD8E6" rx="10"/>
        <animate transform="translate(190, 80) rotate(720 190 25)" begin="0.6s" dur="5s" repeatCount="indefinite"/>
        <text x="10" y="100" font-size="14" font-family="Arial" fill="#6495ED" text-anchor="start" data-narration="Enterprise Blockchains, Consortium Blockchains." effect="underline">Private Blockchains:</text>
        <rect x="10" y="120" width="120" height="50" fill="#ADD8E6" rx="10"/>
        <animate transform="translate(190, 120) rotate(1080 190 25)" begin="0.7s" dur="5s" repeatCount="indefinite"/>
        <text x="10" y="140" font-size="14" font-family="Arial" fill="#6495ED" text-anchor="start" data-narration="R3's Corda, Hyperledger Fabric." effect="underline">Consortium Blockchains:</text>
        <rect x="10" y="160" width="120" height="50" fill="#ADD8E6" rx="10"/>
        <animate transform="translate(190, 160) rotate(1290 190 25)" begin="0.8s" dur="5s" repeatCount="indefinite"/>
        <text x="10" y="180" font-size="14" font-family="Arial" fill="#6495ED" text-anchor="start" data-narration="Network, Nodes, Blockchain, Consensus Mechanism." effect="underline">Blockchain Architecture:</text>
    </g>
    <g transform="translate(50,50)">
        <rect width="120" height="50" fill="#6495ED" rx="10"/>
        <animate transform="rotate(1500 190 25)" begin="0.9s" dur="5s" repeatCount="indefinite"/>
