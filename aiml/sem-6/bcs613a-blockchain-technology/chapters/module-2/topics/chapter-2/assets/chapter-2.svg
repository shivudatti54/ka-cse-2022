<svg width="420" height="400" data-topic-id="chapter-2-decentralization-using-blockchain">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7d2ff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#87ceeb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  <!-- Title -->
  <text x="50%" y="20" font-size="24" font-family="Arial" text-anchor="middle" fill="#2ecc71">Decentralization using Blockchain</text>
  <!-- Section 1 -->
  <rect x="50" y="100" width="320" height="50" stroke="#87ceeb" stroke-width="2" fill="none"/>
  <animateTransform attributeName="transform" type="translate" from="0,100" to="0,150" dur="500" begin="0s" repeatCount="indefinite"/>
  <text x="50" y="110" font-size="18" font-family="Arial" text-anchor="middle" fill="#2ecc71">What is Decentralization?</text>
  <text x="50" y="130" font-size="14" font-family="Arial" text-anchor="middle" fill="#2ecc71" data-narration="Decentralization is a system in which no single entity or individual has control or authority over the data or the network. Instead, decision-making power is distributed among a network of nodes, each with its own copy of the data." style="opacity:0; animation-delay:0s; animation-fill-mode:forwards; animation-name:animate-text-1;" />
  <!-- Section 2 -->
  <rect x="50" y="200" width="320" height="50" stroke="#2ecc71" stroke-width="2" fill="none"/>
  <animateTransform attributeName="transform" type="translate" from="0,200" to="0,250" dur="500" begin="500ms" repeatCount="indefinite"/>
  <text x="50" y="210" font-size="18" font-family="Arial" text-anchor="middle" fill="#2ecc71">Methods of Decentralization</text>
  <text x="50" y="230" font-size="14" font-family="Arial" text-anchor="middle" fill="#2ecc71" data-narration="Cryptocurrencies, Blockchains, Consensus Mechanisms, and Smart Contracts are methods of decentralization used in blockchain technology." style="opacity:0; animation-delay:500ms; animation-fill-mode:forwards; animation-name:animate-text-2;" />
  <!-- Section 3 -->
  <rect x="50" y="300" width="320" height="50" stroke="#87ceeb" stroke-width="2" fill="none"/>
  <animateTransform attributeName="transform" type="translate" from="0,300" to="0,350" dur="500" begin="1000ms" repeatCount="indefinite"/>
  <text x="50" y="310" font-size="18" font-family="Arial" text-anchor="middle" fill="#2ecc71">Blockchain</text>
  <text x="50" y="330" font-size="14" font-family="Arial" text-anchor="middle" fill="#2ecc71" data-narration="A blockchain is a decentralized, digital ledger that records transactions across a network of nodes. It is a chain of blocks, each containing a list of transactions, which are linked together through cryptographic hashes." style="opacity:0; animation-delay:1000ms; animation-fill-mode:forwards; animation-name:animate-text-3;" />
  <!-- Section 4 -->
  <rect x="50" y="400" width="320" height="50" stroke="#87ceeb" stroke-width="2" fill="none"/>
  <animateTransform attributeName="transform" type="translate" from="0,400" to="0,450" dur="500" begin="1500ms" repeatCount="indefinite"/>
  <text x="50" y="410" font-size="18" font-family="Arial" text-anchor="middle" fill="#2ecc71">Components of a Blockchain</text>
  <text x="50" y="430" font-size="14" font-family="Arial" text-anchor="middle" fill="#2ecc71" data-narration="Blocks, Chains, Transactions, and Consensus Mechanisms are the components of a blockchain." style="opacity:0; animation-delay:1500ms; animation-fill-mode:forwards; animation-name:animate-text-4;" />
  <!-- Section 5 -->
  <rect x="50" y="500" width="320" height="50" stroke="#2ecc71" stroke-width="2" fill="none"/>
  <animateTransform attributeName="transform" type="translate" from="0,500" to="0,550" dur="500" begin="2000ms" repeatCount="indefinite"/>
  <text x="50" y="510" font-size="18" font-family="Arial" text-anchor="middle" fill="#2ecc71">Smart Contracts</text>
  <text x="50" y="530" font-size="14" font-family="Arial" text-anchor="middle" fill="#2ecc71" data-narration="Smart contracts are self-executing contracts with the terms of the agreement written directly into lines of code." style="opacity:0; animation-delay:2000ms; animation-fill-mode:forwards; animation-name:animate-text-5;" />
  <!-- Section 6 -->
  <rect x="50" y="600" width="320" height="50" stroke="#87ceeb" stroke-width="2" fill="none"/>
  <animateTransform attributeName="transform" type="translate" from="0,600" to="0,650" dur="500" begin="2500ms" repeatCount="indefinite"/>
  <text x="50" y="610" font-size="18" font-family="Arial" text-anchor="middle" fill="#2ecc71">Consensus Mechanisms</text>
  <text x="50" y="630" font-size="14" font-family="Arial" text-anchor="middle" fill="#2ecc71" data-narration="Consensus mechanisms such as proof-of-work (PoW) and proof-of-stake (PoS) ensure that nodes on the network agree on the state of the blockchain." style="opacity:0; animation-delay:2500ms; animation-fill-mode:forwards; animation-name:animate-text-6;" />
  <!-- Footer -->
  <text x="50%" y="380" font-size="18" font-family="Arial" text-anchor="middle" fill="#2ecc71">Chapter 2: Decentralization using Blockchain</text>
</svg>