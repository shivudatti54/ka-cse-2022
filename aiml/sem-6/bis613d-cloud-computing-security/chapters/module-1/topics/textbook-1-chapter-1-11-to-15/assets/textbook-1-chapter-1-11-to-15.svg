<svg width="420" height="400" data-topic-id="cloud-computing-security-1-1">
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7D2C4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Cloud Computing & Security</title>
  <text x="10" y="20" font-size="24" font-family="Arial" fill="#1A1D23" text-anchor="start">Cloud Computing & Security</text>
  <rect x="10" y="40" width="400" height="100" fill="url(#pastel-gradient)"/>
  <g transform="translate(10, 150)">
    <rect x="0" y="0" width="100" height="30" fill="#1A1D23" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start">Definition:</text>
    <text x="10" y="40" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start">Cloud computing is a model of delivering computing services over the internet, where resources such as servers, storage, databases, software, and applications are provided as a service to users on-demand.</text>
    <animate x="0" attributeName="x" from="0" to="100" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(120, 150)">
    <rect x="0" y="0" width="100" height="30" fill="#1A1D23" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start">Key Characteristics:</text>
    <text x="10" y="40" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start">- On-demand self-service: users can provision and de-provision resources without human intervention</text>
    <text x="10" y="60" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start">- Broad network access: resources are accessible over the internet or a private network</text>
    <text x="10" y="80" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start">- Resource pooling: resources are pooled together to provide a multi-tenant environment</text>
    <text x="10" y="100" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start">- Rapid elasticity: resources can be quickly scaled up or down to match changing business needs</text>
    <animate x="0" attributeName="x" from="0" to="100" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(220, 150)">
    <rect x="0" y="0" width="100" height="30" fill="#1A1D23" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start">Benefits:</text>
    <text x="10" y="40" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start">- Scalability: easily scale up or down to match changing business needs</text>
    <text x="10" y="60" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start">- Cost-effectiveness: reduce capital and operational expenses</text>
    <text x="10" y="80" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start">- Increased agility: quickly deploy new applications and services</text>
    <text x="10" y="100" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start">- Improved reliability: reduce downtime and improve overall system availability</text>
    <animate x="0" attributeName="x" from="0" to="100" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(320, 150)">
    <rect x="0" y="0" width="100" height="30" fill="#1A1D23" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start">Service Models:</text>
    <text x="10" y="40" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start">- IaaS (Infrastructure as a Service): provides virtualized computing resources</text>
    <text x="10" y="60" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start">- PaaS (Platform as a Service): provides a complete platform for developing, running, and managing applications</text>
    <text x="10" y="80" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start">- SaaS (Software as a Service): provides software applications over the internet</text>
    <animate x="0" attributeName="x" from="0" to="100" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 280)">
    <rect x="0" y="0" width="400" height="20" fill="#1A1D23" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#66CCCC" text-anchor="start">References:</text>
  </g>
</svg>