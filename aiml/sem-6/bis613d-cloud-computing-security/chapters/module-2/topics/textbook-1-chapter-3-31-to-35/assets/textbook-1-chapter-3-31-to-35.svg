<svg width="420" height="400" data-topic-id="chapter-3-31-to-35">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" />
      <stop offset="100%" stop-color="#FFC5C5" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" style="fill: url(#grad)" />
  <title>Virtualization</title>
  <defs>
    <style>.text { font-family: Arial, sans-serif; font-size: 14px; }</style>
  </defs>
  <g id="section-3-1">
    <rect x="10" y="50" width="380" height="50" style="fill: #87CEEB;" />
    <animate transform="rotate(45 20 20)" begin="0s" dur="2s" repeat="1" />
    <text x="20" y="60" style="text-anchor: middle; .text { fill: #000; }">Introduction to Virtualization</text>
    <g id="section-3-1-1">
      <rect x="10" y="60" width="320" height="30" style="fill: #C7D9F7;" />
      <animate transform="translate(10, 70)" begin="0s" dur="2s" repeat="1" />
      <g id="section-3-1-1-1">
        <rect x="15" y="70" width="300" height="20" style="fill: #87CEEB;" />
        <animate transform="translate(15, 80)" begin="0s" dur="2s" repeat="1" />
        <text x="25" y="90" style="text-anchor: middle; .text { fill: #000; }">Definition</text>
        <line x1="40" y1="80" x2="140" y2="80" style="stroke: #3F7F4F; stroke-width: 2px;" />
        <text x="60" y="100" style="text-anchor: middle; .text { fill: #000; }">Virtualization is the process of creating a virtual environment that mimics the physical environment, allowing multiple virtual machines (VMs) to run on a single physical host.</text>
      </g>
    </g>
    <g id="section-3-2">
      <rect x="10" y="120" width="380" height="50" style="fill: #87CEEB;" />
      <animate transform="rotate(45 20 20)" begin="0s" dur="2s" repeat="1" />
      <text x="20" y="130" style="text-anchor: middle; .text { fill: #000; }">Virtual Machine (VM) Architecture</text>
      <g id="section-3-2-1">
        <rect x="10" y="130" width="320" height="30" style="fill: #C7D9F7;" />
        <animate transform="translate(10, 140)" begin="0s" dur="2s" repeat="1" />
        <g id="section-3-2-1-1">
          <rect x="15" y="140" width="300" height="20" style="fill: #87CEEB;" />
          <animate transform="translate(15, 150)" begin="0s" dur="2s" repeat="1" />
          <text x="25" y="160" style="text-anchor: middle; .text { fill: #000; }">Components of a VM</text>
          <line x1="40" y1="150" x2="140" y2="150" style="stroke: #3F7F4F; stroke-width: 2px;" />
          <text x="60" y="170" style="text-anchor: middle; .text { fill: #000; }">Hypervisor, VM Monitor, Guest Operating System, and Device Drivers</text>
          <line x1="60" y1="170" x2="60" y2="170" style="stroke: #3F7F4F; stroke-width: 2px;" />
          <line x1="140" y1="170" x2="140" y2="170" style="stroke: #3F7F4F; stroke-width: 2px;" />
        </g>
      </g>
    </g>
    <g id="section-3-3">
      <rect x="10" y="190" width="380" height="50" style="fill: #87CEEB;" />
      <animate transform="rotate(45 20 20)" begin="0s" dur="2s" repeat="1" />
      <text x="20" y="200" style="text-anchor: middle; .text { fill: #000; }">Virtual Machine (VM) Migration</text>
      <g id="section-3-3-1">
        <rect x="10" y="200" width="320" height="30" style="fill: #C7D9F7;" />
        <animate transform="translate(10, 210)" begin="0s" dur="2s" repeat="1" />
        <g id="section-3-3-1-1">
          <rect x="15" y="210" width="300" height="20" style="fill: #87CEEB;" />
          <animate transform="translate(15, 220)" begin="0s" dur="2s" repeat="1" />
          <text x="25" y="230" style="text-anchor: middle; .text { fill: #000; }">Types of VM Migration</text>
          <line x1="40" y1="220" x2="140" y2="220" style="stroke: #3F7F4F; stroke-width: 2px;" />
          <text x="60" y="240" style="text-anchor: middle; .text { fill: #000; }">Live Migration, Cold Migration</text>
        </g>
      </g>
    </g>
  </g>
  <footer>Footer</footer>
</svg>