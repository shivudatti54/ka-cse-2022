<svg width="420" height="400" data-topic-id="cloud-security-of-database-services-os-securi" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Encryption Security of Database Services in OS Securi</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>
  <g id="encryption-security">
    <rect x="20" y="50" width="300" height="200" fill="#E0F0F0" rx="10"/>
    <g id="symmetric-key-encryption">
      <rect x="50" y="50" width="150" height="50" fill="#CCFFCC" rx="10"/>
      <text x="40" y="60" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Symmetric Key Encryption</text>
      <animate transform="scale(0.8, 0.8)" begin="0s" dur="2s" repeat="indefinite"/>
      <line x1="60" y1="60" x2="60" y2="150" stroke="#2F4F7F" stroke-width="2" marker-end="url(#arrow-end)"/>
      <animate transform="scale(1, 1)" begin="1s" dur="2s" repeat="indefinite"/>
      <text x="80" y="120" font-size="14" font-family="Arial" fill="#2F4F7F">Uses the same key for encryption and decryption</text>
    </g>
    <g id="asymmetric-key-encryption">
      <rect x="200" y="50" width="150" height="50" fill="#CCFFCC" rx="10"/>
      <text x="210" y="60" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Asymmetric Key Encryption</text>
      <animate transform="scale(0.8, 0.8)" begin="2.5s" dur="2s" repeat="indefinite"/>
      <line x1="280" y1="60" x2="280" y2="150" stroke="#2F4F7F" stroke-width="2" marker-end="url(#arrow-end)"/>
      <animate transform="scale(1, 1)" begin="3.5s" dur="2s" repeat="indefinite"/>
      <text x="220" y="120" font-size="14" font-family="Arial" fill="#2F4F7F">Uses a pair of keys: a public key for encryption and a private key for decryption</text>
    </g>
    <g id="cloud-data-encryption">
      <rect x="20" y="250" width="300" height="200" fill="#E0F0F0" rx="10"/>
      <text x="40" y="260" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Cloud Data Encryption</text>
      <animate transform="scale(0.8, 0.8)" begin="4.5s" dur="2s" repeat="indefinite"/>
      <line x1="60" y1="260" x2="60" y2="360" stroke="#2F4F7F" stroke-width="2" marker-end="url(#arrow-end)"/>
      <animate transform="scale(1, 1)" begin="6s" dur="2s" repeat="indefinite"/>
      <text x="80" y="310" font-size="14" font-family="Arial" fill="#2F4F7F">Protects data from unauthorized access</text>
    </g>
    <g id="cloud-data-security">
      <rect x="20" y="350" width="300" height="200" fill="#E0F0F0" rx="10"/>
      <text x="40" y="360" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Cloud Data Security</text>
      <animate transform="scale(0.8, 0.8)" begin="7.5s" dur="2s" repeat="indefinite"/>
      <line x1="60" y1="360" x2="60" y2="460" stroke="#2F4F7F" stroke-width="2" marker-end="url(#arrow-end)"/>
      <animate transform="scale(1, 1)" begin="9s" dur="2s" repeat="indefinite"/>
      <text x="80" y="410" font-size="14" font-family="Arial" fill="#2F4F7F">Safeguards data from unauthorized access, use, disclosure, modification, or destruction</text>
    </g>
    <g id="cloud-data-backup">
      <rect x="20" y="400" width="300" height="200" fill="#E0F0F0" rx="10"/>
      <text x="40" y="410" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Cloud Data Backup</text>
      <animate transform="scale(0.8, 0.8)" begin="10.5s" dur="2s" repeat="indefinite"/>
      <line x1="60" y1="410" x2="60" y2="510" stroke="#2F4F7F" stroke-width="2" marker-end="url(#arrow-end)"/>
      <animate transform="scale(1, 1)" begin="12s" dur="2s" repeat="indefinite"/>
      <text x="80" y="460" font-size="14" font-family="Arial" fill="#2F4F7F">Ensures data availability in case of loss or corruption</text>
    </g>
  </g>
  <g id="security-of-database-services">
    <rect x="20" y="50" width="300" height="200" fill="#E0F0F0" rx="10"/>
    <text x="40" y="60" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Security of Database Services</text>
    <animate transform="scale(0.8, 0.8)" begin="0s" dur="2s" repeat="indefinite"/>
    <line x1="60" y1="60" x2="60" y2="150" stroke="#2F4F7F" stroke-width="2" marker-end="url(#arrow-end)"/>
    <animate transform="scale(1, 1)" begin="1s" dur="2s" repeat="indefinite"/>
    <text x="80" y="120" font-size="14" font-family="Arial" fill="#2F4F7F">Provides a range of features to ensure data security</text>
    <g id="relational-databases">
      <rect x="50" y="250" width="150" height="50" fill="#CCFFCC" rx="10"/>
      <text x="60" y="260" font-size="14" font-family="Arial" fill="#2F4F7F">Relational Databases</text>
      <animate transform="scale(0.8, 0.8)" begin="2.5s" dur="2s" repeat="indefinite"/>
      <line x1="170" y1="260" x2="170" y2="350" stroke="#2F4F7F" stroke-width="2" marker-end="url(#arrow-end)"/>
      <animate transform="scale(1, 1)" begin="4s" dur="2s" repeat="indefinite"/>
      <text x="90" y="310" font-size="14" font-family="Arial" fill="#2F4F7F">Stores data in tables with well-defined relationships</text>
    </g>
    <g id="database-security-features">
      <rect x="200" y="250" width="150" height="50" fill="#CCFFCC" rx="10"/>
      <text x="210" y="260" font-size="14" font-family="Arial" fill="#2F4F7F">Database Security Features</text>
      <animate transform="scale(0.8, 0.8)" begin="5s" dur="2s" repeat="indefinite"/>
      <line x1="320" y1="260" x2="320" y2="350" stroke="#2F4F7F" stroke-width="2" marker-end="url(#arrow-end)"/>
      <animate transform="scale(1, 1)" begin="6.5s" dur="2s" repeat="indefinite"/>
      <text x="230" y="310" font-size="14" font-family="Arial" fill="#2F4F7F">Ensures data security through features such as encryption and access control</text>
    </g>
  </g>
  <g id="database-security-requirements">
    <rect x="20" y="50" width="300" height="200" fill="#E0F0F0" rx="10"/>
    <text x="40" y="60" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Database Security Requirements</text>
    <animate transform="scale(0.8, 0.8)" begin="0s" dur="2s" repeat="indefinite"/>
    <line x1="60" y1="60" x2="60" y2="150" stroke="#2F4F7F" stroke-width="2" marker-end="url(#arrow-end)"/>
    <animate transform="scale(1, 1)" begin="1s" dur="2s" repeat="indefinite"/>
    <text x="80" y="120" font-size="14" font-family="Arial" fill="#2F4F7F">Ensures data security through requirements such as encryption and access control</text>
    <g id="database-security-standards">
      <rect x="50" y="250" width="150" height="50" fill="#CCFFCC" rx="10"/>
      <text x="60" y="260" font-size="14" font-family="Arial" fill="#2F4F7F">Database Security Standards</text>
      <animate transform="scale(0.8, 0.8)" begin="2.5s" dur="2s" repeat="indefinite"/>
      <line x1="170" y1="260" x2="170" y2="350" stroke="#2F4F7F" stroke-width="2" marker-end="url(#arrow-end)"/>
      <animate transform="scale(1, 1)" begin="4s" dur="2s" repeat="indefinite"/>
      <text x="90" y="310" font-size="14" font-family="Arial" fill="#2F4F7F">Ensures data security through standards such as ISO 27001 and PCI-DSS</text>
    </g>
  </g>
  <g id="footer">
    <rect x="20" y="400" width="100%" height="20" fill="#E0F0F0"/>
    <text x="40" y="410" font-size="14" font-family="Arial" fill="#2F4F7F">Image Credits</text>
    <text x="80" y="410" font-size="14" font-family="Arial" fill="#2F4F7F">Copyright 2023</text>
  </g>
</svg>