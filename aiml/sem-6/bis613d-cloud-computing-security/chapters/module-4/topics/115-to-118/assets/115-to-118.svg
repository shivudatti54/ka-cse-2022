<svg width="420" height="400" data-topic-id="cloud-computing-security-115-118">
  <!-- Title Section -->
  <rect x="10" y="10" width="400" height="30" fill="#ADD8E6" rx="5" data-narration="Cloud Security Challenges and Risks">
    <text x="15" y="25" font-size="18" font-family="Arial" fill="#4567b7">Cloud Security Challenges and Risks</text>
  </rect>

  <!-- Gradient Background -->
  <defs>
    <linearGradient id="cloud-security-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1" />
      <stop offset="50%" stop-color="#C7D2F5" stop-opacity="1" />
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="40" width="400" height="300" fill="url(#cloud-security-gradient)" rx="5" data-narration="Types of Security Challenges">
    <!-- Data Security Section -->
    <rect x="10" y="10" width="100" height="50" fill="#FFC107" rx="5" data-narration="Protecting sensitive data from unauthorized access, theft, or loss">
      <text x="15" y="25" font-size="14" font-family="Arial" fill="#FFD700" data-narration="Data Security">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" begin="0s" repeatCount="indefinite" />
      </text>
    </rect>
    <rect x="120" y="10" width="100" height="50" fill="#FF9800" rx="5" data-narration="Verifying the identity of users, devices, or systems accessing cloud resources">
      <text x="15" y="25" font-size="14" font-family="Arial" fill="#FF8700" data-narration="Authentication">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" begin="0s" repeatCount="indefinite" />
      </text>
    </rect>
    <rect x="230" y="10" width="100" height="50" fill="#2196F3" rx="5" data-narration="Ensuring that only authorized users or systems can access or modify cloud resources">
      <text x="15" y="25" font-size="14" font-family="Arial" fill="#2196F3" data-narration="Authorization">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" begin="0s" repeatCount="indefinite" />
      </text>
    </rect>
    <rect x="340" y="10" width="100" height="50" fill="#8BC34A" rx="5" data-narration="Maintaining the accuracy, completeness, and consistency of data stored in the cloud">
      <text x="15" y="25" font-size="14" font-family="Arial" fill="#8BC34A" data-narration="Data Integrity">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" begin="0s" repeatCount="indefinite" />
      </text>
    </rect>
    <rect x="10" y="70" width="100" height="50" fill="#FF9800" rx="5" data-narration="Ensuring that cloud resources are accessible and usable when needed">
      <text x="15" y="85" font-size="14" font-family="Arial" fill="#FF8700" data-narration="Availability">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" begin="0s" repeatCount="indefinite" />
      </text>
    </rect>
    <rect x="120" y="70" width="100" height="50" fill="#2196F3" rx="5" data-narration="Restoring cloud resources and data in the event of a disaster or failure">
      <text x="15" y="85" font-size="14" font-family="Arial" fill="#2196F3" data-narration="Recovery">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" begin="0s" repeatCount="indefinite" />
      </text>
    </rect>
    <rect x="230" y="70" width="100" height="50" fill="#8BC34A" rx="5" data-narration="Adhering to regulatory requirements and industry standards for cloud security">
      <text x="15" y="85" font-size="14" font-family="Arial" fill="#8BC34A" data-narration="Compliance">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" begin="0s" repeatCount="indefinite" />
      </text>
    </rect>

    <!-- Risks in Cloud Computing Section -->
    <rect x="10" y="120" width="100" height="50" fill="#FF9800" rx="5" data-narration="Data breaches, unauthorized access, and system downtime">
      <text x="15" y="135" font-size="14" font-family="Arial" fill="#FF8700" data-narration="Risks in Cloud Computing">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" begin="0s" repeatCount="indefinite" />
      </text>
    </rect>
    <rect x="120" y="120" width="100" height="50" fill="#2196F3" rx="5" data-narration="Natural disasters, power outages, or equipment failures that can impact cloud infrastructure">
      <text x="15" y="135" font-size="14" font-family="Arial" fill="#2196F3" data-narration="Physical Risks">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" begin="0s" repeatCount="indefinite" />
      </text>
    </rect>
    <rect x="230" y="120" width="100" height="50" fill="#8BC34A" rx="5" data-narration="Employee errors, insider threats, or social engineering attacks">
      <text x="15" y="135" font-size="14" font-family="Arial" fill="#8BC34A" data-narration="Human-Related Risks">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" begin="0s" repeatCount="indefinite" />
      </text>
    </rect>
    <rect x="340" y="120" width="100" height="50" fill="#FF9800" rx="5" data-narration="Cyberattacks, malware, or vulnerabilities in cloud applications or infrastructure">
      <text x="15" y="135" font-size="14" font-family="Arial" fill="#FF8700" data-narration="Technological Risks">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" begin="0s" repeatCount="indefinite" />
      </text>
    </rect>
    <rect x="10" y="170" width="100" height="50" fill="#FF9800" rx="5" data-narration="Non-compliance with regulatory requirements or industry standards">
      <text x="15" y="185" font-size="14" font-family="Arial" fill="#FF8700" data-narration="Regulatory Risks">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" begin="0s" repeatCount="indefinite" />
      </text>
    </rect>

    <!-- Privacy Impact Assessment Section -->
    <rect x="10" y="220" width="400" height="50" fill="#ADD8E6" rx="5" data-narration="Privacy Impact Assessment">
      <text x="15" y="235" font-size="18" font-family="Arial" fill="#4567b7" data-narration="Privacy Impact Assessment">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" begin="0s" repeatCount="indefinite" />
      </text>
    </rect>

    <!-- Arrow Markers -->
    <line x1="10" y1="70" x2="120" y2="70" stroke="#FF9800" stroke-width="2" data-narration="Types of Security Challenges" style="stroke-dasharray: 5, 5;" />
    <line x1="120" y1="70" x2="230" y2="70" stroke="#FF9800" stroke-width="2" data-narration="Types of Risks" style="stroke-dasharray: 5, 5;" />
    <line x1="230" y1="70" x2="340" y2="70" stroke="#FF9800" stroke-width="2" data-narration="Types of Risks" style="stroke-dasharray: 5, 5;" />
    <line x1="10" y1="120" x2="120" y2="120" stroke="#FF9800" stroke-width="2" data-narration="Types of Risks" style="stroke-dasharray: 5, 5;" />
    <line x1="120" y1="120" x2="230" y2="120" stroke="#FF9800" stroke-width="2" data-narration="Types of Risks" style="stroke-dasharray: 5, 5;" />
    <line x1="230" y1="120" x2="340" y2="120" stroke="#FF9800" stroke-width="2" data-narration="Types of Risks" style="stroke-dasharray: 5, 5;" />
    <line x1="10" y1="220" x2="120" y2="220" stroke="#FF9800" stroke-width="2" data-narration="Privacy Impact Assessment" style="stroke-dasharray: 5, 5;" />
    <line x1="120" y1="220" x2="230" y2="220" stroke="#FF9800" stroke-width="2" data-narration="Privacy Impact Assessment" style="stroke-dasharray: 5, 5;" />
    <line x1="230" y1="220" x2="340" y2="220" stroke="#FF9800" stroke-width="2" data-narration="Privacy Impact Assessment" style="stroke-dasharray: 5, 5;" />

    <!-- Footer Section -->
    <rect x="10" y="370" width="400" height="30" fill="#ADD8E6" rx="5" data-narration="Cloud Security Challenges and Risks">
      <text x="15" y="385" font-size="18" font-family="Arial" fill="#4567b7">Cloud Security Challenges and Risks</text>
    </rect>
</svg>