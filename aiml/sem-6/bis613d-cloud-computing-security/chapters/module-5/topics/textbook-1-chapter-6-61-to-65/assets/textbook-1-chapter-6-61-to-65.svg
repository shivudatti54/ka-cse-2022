      <rect x="0" y="380" width="100" height="100" fill="#FF9800" rx="10"/>
      <rect x="140" y="380" width="100" height="100" fill="#2196F3" rx="10"/>
      <g transform="translate(90, 330)">
        <animate duration="2000" begin="0s" fill="freeze">
          <circle cx="50" cy="50" r="20" fill="#FF9800"/>
