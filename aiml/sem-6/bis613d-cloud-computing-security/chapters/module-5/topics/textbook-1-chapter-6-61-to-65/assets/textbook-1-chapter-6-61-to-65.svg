    </section>
    <section data-narration="Cloud Security Governance">
      <rect x="0" y="220" width="100" height="100" fill="#2196F3" rx="10"/>
      <rect x="140" y="220" width="100" height="100" fill="#FF9800" rx="10"/>
      <g transform="translate(90, 170)">
        <animate duration="2000" begin="0s" fill="freeze">
          <circle cx="50" cy="50" r="20" fill="#2196F3"/>
        </animate>
        <animate duration="2000" begin="2s" fill="freeze">
          <circle cx="50" cy="50" r="20" fill="#FF9800"/>
        </animate>
        <text x="50" y="200" font-size="16" fill="#fff">Cloud Security Governance</text>
      </g>
    </section>
    <section data-narration="Cloud Security Threats">
      <rect x="0" y="300" width="100" height="100" fill="#8BC34A" rx="10"/>
