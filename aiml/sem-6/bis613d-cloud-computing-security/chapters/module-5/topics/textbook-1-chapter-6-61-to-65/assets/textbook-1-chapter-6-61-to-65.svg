<svg width="420" height="400" data-topic-id="cloud-security-overview">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <title>Cloud Security Overview</title>
  <g transform="translate(20, 20)">
    <section data-narration="Cloud Security Architecture">
      <rect x="0" y="0" width="100" height="100" fill="#2196F3" rx="10"/>
      <rect x="120" y="0" width="100" height="100" fill="#FF9800" rx="10"/>
      <g transform="translate(60, 60)">
        <animate duration="2000" begin="0s" fill="freeze">
          <circle cx="50" cy="50" r="20" fill="#2196F3"/>
