        <animate duration="2000" begin="2s" fill="freeze">
          <circle cx="50" cy="50" r="20" fill="#FF9800"/>
        </animate>
        <text x="50" y="80" font-size="16" fill="#fff">Cloud Security Architecture</text>
      </g>
    </section>
    <section data-narration="Security Controls">
      <rect x="0" y="140" width="100" height="100" fill="#87CEEB" rx="10"/>
      <rect x="140" y="140" width="100" height="100" fill="#8BC34A" rx="10"/>
      <g transform="translate(90, 90)">
        <animate duration="2000" begin="0s" fill="freeze">
