<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <text x="400" y="30" font-size="22" fill="#2563eb" text-anchor="middle" font-weight="bold">Directory Structure</text>
  <g id="step0" class="step" data-narration="Introduction to Directory Structure">
    <rect x="200" y="80" width="400" height="100" fill="#10b981" rx="10"/>
    <text x="400" y="120" font-size="20" fill="#ffffff" text-anchor="middle">Directory Structure</text>
    <text x="400" y="150" font-size="16" fill="#ffffff" text-anchor="middle">Organizes files hierarchically</text>
  </g>
  <g id="step1" class="step" data-narration="Single-Level Directory Structure">
    <rect x="50" y="60" width="700" height="140" fill="#8b5cf6" rx="10"/>
    <text x="400" y="90" font-size="20" fill="#ffffff" text-anchor="middle">Single-Level Directory</text>
    <rect x="150" y="120" width="150" height="60" fill="#2563eb" rx="5"/>
    <text x="225" y="155" font-size="14" fill="#ffffff" text-anchor="middle">Root Directory</text>
    <rect x="350" y="120" width="120" height="30" fill="#f59e0b" rx="5"/>
    <text x="410" y="140" font-size="12" fill="#ffffff" text-anchor="middle">file1.txt</text>
    <rect x="500" y="120" width="120" height="30" fill="#f59e0b" rx="5"/>
    <text x="560" y="140" font-size="12" fill="#ffffff" text-anchor="middle">file2.txt</text>
    <text x="60" y="195" font-size="12" fill="#ffffff">Simple but all files in one directory - naming conflicts!</text>
  </g>
  <g id="step2" class="step" data-narration="Two-Level Directory Structure">
    <rect x="50" y="60" width="700" height="180" fill="#10b981" rx="10"/>
    <text x="400" y="90" font-size="20" fill="#ffffff" text-anchor="middle">Two-Level Directory</text>
    <rect x="300" y="120" width="200" height="40" fill="#2563eb" rx="5"/>
    <text x="400" y="145" font-size="14" fill="#ffffff" text-anchor="middle">Root Directory</text>
    <rect x="100" y="180" width="150" height="40" fill="#f59e0b" rx="5"/>
    <text x="175" y="205" font-size="12" fill="#ffffff" text-anchor="middle">User1 Directory</text>
    <rect x="325" y="180" width="150" height="40" fill="#f59e0b" rx="5"/>
    <text x="400" y="205" font-size="12" fill="#ffffff" text-anchor="middle">User2 Directory</text>
    <rect x="550" y="180" width="150" height="40" fill="#f59e0b" rx="5"/>
    <text x="625" y="205" font-size="12" fill="#ffffff" text-anchor="middle">User3 Directory</text>
  </g>
  <g id="step3" class="step" data-narration="Tree-Structured Directory">
    <rect x="50" y="60" width="700" height="200" fill="#f59e0b" rx="10"/>
    <text x="400" y="90" font-size="20" fill="#ffffff" text-anchor="middle">Tree-Structured Directory (Most Common)</text>
    <rect x="325" y="120" width="150" height="40" fill="#2563eb" rx="5"/>
    <text x="400" y="145" font-size="14" fill="#ffffff" text-anchor="middle">Root /</text>
    <rect x="100" y="180" width="100" height="30" fill="#10b981" rx="5"/>
    <text x="150" y="200" font-size="12" fill="#ffffff" text-anchor="middle">/bin</text>
    <rect x="250" y="180" width="100" height="30" fill="#10b981" rx="5"/>
    <text x="300" y="200" font-size="12" fill="#ffffff" text-anchor="middle">/home</text>
    <rect x="400" y="180" width="100" height="30" fill="#10b981" rx="5"/>
    <text x="450" y="200" font-size="12" fill="#ffffff" text-anchor="middle">/etc</text>
    <rect x="550" y="180" width="100" height="30" fill="#10b981" rx="5"/>
    <text x="600" y="200" font-size="12" fill="#ffffff" text-anchor="middle">/var</text>
    <text x="60" y="240" font-size="12" fill="#ffffff">Allows hierarchical organization with subdirectories</text>
  </g>
  <g id="step4" class="step" data-narration="Acyclic Graph Directory Structure">
    <rect x="50" y="60" width="700" height="180" fill="#8b5cf6" rx="10"/>
    <text x="400" y="90" font-size="20" fill="#ffffff" text-anchor="middle">Acyclic Graph Directory</text>
    <text x="400" y="125" font-size="16" fill="#ffffff" text-anchor="middle">Allows sharing through links</text>
    <rect x="150" y="150" width="150" height="50" fill="#2563eb" rx="5"/>
    <text x="225" y="180" font-size="14" fill="#ffffff" text-anchor="middle">/home/user1</text>
    <rect x="500" y="150" width="150" height="50" fill="#10b981" rx="5"/>
    <text x="575" y="180" font-size="14" fill="#ffffff" text-anchor="middle">/home/user2</text>
    <rect x="325" y="210" width="150" height="40" fill="#f59e0b" rx="5"/>
    <text x="400" y="235" font-size="12" fill="#ffffff" text-anchor="middle">shared_project</text>
    <line x1="300" y1="180" x2="350" y2="210" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="500" y1="180" x2="450" y2="210" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step5" class="step" data-narration="Path Names">
    <rect x="50" y="60" width="700" height="160" fill="#2563eb" rx="10"/>
    <text x="400" y="90" font-size="20" fill="#ffffff" text-anchor="middle">Path Names</text>
    <rect x="100" y="120" width="600" height="40" fill="#10b981" rx="5"/>
    <text x="110" y="145" font-size="14" fill="#ffffff">Absolute Path: /home/user/documents/file.txt</text>
    <rect x="100" y="170" width="600" height="40" fill="#f59e0b" rx="5"/>
    <text x="110" y="195" font-size="14" fill="#ffffff">Relative Path: ./documents/file.txt or ../shared/data.txt</text>
  </g>
  <g id="step6" class="step" data-narration="Directory Implementation">
    <rect x="50" y="60" width="330" height="140" fill="#10b981" rx="10"/>
    <text x="215" y="90" font-size="18" fill="#ffffff" text-anchor="middle">Linear List</text>
    <text x="215" y="120" font-size="14" fill="#ffffff" text-anchor="middle">Simple implementation</text>
    <text x="215" y="145" font-size="12" fill="#ffffff" text-anchor="middle">Linear search - O(n)</text>
    <text x="215" y="170" font-size="12" fill="#ffffff" text-anchor="middle">Slow for large directories</text>
    <rect x="420" y="60" width="330" height="140" fill="#8b5cf6" rx="10"/>
    <text x="585" y="90" font-size="18" fill="#ffffff" text-anchor="middle">Hash Table</text>
    <text x="585" y="120" font-size="14" fill="#ffffff" text-anchor="middle">Faster lookup</text>
    <text x="585" y="145" font-size="12" fill="#ffffff" text-anchor="middle">Average O(1)</text>
    <text x="585" y="170" font-size="12" fill="#ffffff" text-anchor="middle">More complex</text>
  </g>
  <g id="step7" class="step" data-narration="Hard Link vs Soft Link">
    <rect x="50" y="60" width="700" height="200" fill="#f59e0b" rx="10"/>
    <text x="400" y="90" font-size="20" fill="#ffffff" text-anchor="middle">Hard Link vs Soft Link (Symbolic Link)</text>
    <rect x="100" y="120" width="300" height="120" fill="#2563eb" rx="5"/>
    <text x="250" y="145" font-size="16" fill="#ffffff" text-anchor="middle">Hard Link</text>
    <text x="110" y="170" font-size="12" fill="#ffffff">• Multiple names for same inode</text>
    <text x="110" y="190" font-size="12" fill="#ffffff">• Cannot span file systems</text>
    <text x="110" y="210" font-size="12" fill="#ffffff">• File exists till all links deleted</text>
    <rect x="450" y="120" width="300" height="120" fill="#10b981" rx="5"/>
    <text x="600" y="145" font-size="16" fill="#ffffff" text-anchor="middle">Soft Link (Symlink)</text>
    <text x="460" y="170" font-size="12" fill="#ffffff">• File contains path to another file</text>
    <text x="460" y="190" font-size="12" fill="#ffffff">• Can span file systems</text>
    <text x="460" y="210" font-size="12" fill="#ffffff">• Broken if target deleted</text>
  </g>
</svg>
