<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="blue-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="green-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="orange-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="purple-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <text x="400" y="30" font-size="22" fill="#2563eb" text-anchor="middle" font-weight="bold">Critical Section Problem</text>
  <g id="step0" class="step" data-narration="Introduction to the Critical Section Problem">
    <rect x="150" y="80" width="500" height="100" fill="#2563eb" rx="10"/>
    <text x="400" y="120" font-size="24" fill="#ffffff" text-anchor="middle">Critical Section Problem</text>
    <text x="400" y="155" font-size="16" fill="#ffffff" text-anchor="middle">Synchronization issue in concurrent programming</text>
  </g>
  <g id="step1" class="step" data-narration="Multiple processes accessing shared resources concurrently">
    <rect x="50" y="60" width="700" height="140" fill="#10b981" rx="10"/>
    <text x="400" y="95" font-size="20" fill="#ffffff" text-anchor="middle">Multiple Processes Accessing Shared Resources</text>
    <rect x="100" y="120" width="150" height="60" fill="#2563eb" rx="5"/>
    <text x="175" y="155" font-size="16" fill="#ffffff" text-anchor="middle">Process P1</text>
    <rect x="325" y="120" width="150" height="60" fill="#f59e0b" rx="5"/>
    <text x="400" y="155" font-size="16" fill="#ffffff" text-anchor="middle">Shared Data</text>
    <rect x="550" y="120" width="150" height="60" fill="#8b5cf6" rx="5"/>
    <text x="625" y="155" font-size="16" fill="#ffffff" text-anchor="middle">Process P2</text>
  </g>
  <g id="step2" class="step" data-narration="Race condition example">
    <rect x="50" y="60" width="700" height="140" fill="#f59e0b" rx="10"/>
    <text x="400" y="95" font-size="20" fill="#ffffff" text-anchor="middle">Race Condition Example</text>
    <text x="60" y="130" font-size="16" fill="#ffffff">counter = 5</text>
    <text x="60" y="160" font-size="16" fill="#ffffff">P1: counter++ → reads 5, writes 6</text>
    <text x="60" y="190" font-size="16" fill="#ffffff">P2: counter-- → reads 5, writes 4</text>
    <text x="450" y="160" font-size="14" fill="#ffffff">Final value depends on timing!</text>
  </g>
  <g id="step3" class="step" data-narration="Critical section definition">
    <rect x="50" y="60" width="700" height="140" fill="#8b5cf6" rx="10"/>
    <text x="400" y="95" font-size="20" fill="#ffffff" text-anchor="middle">Critical Section Definition</text>
    <text x="400" y="130" font-size="16" fill="#ffffff" text-anchor="middle">Code segment where shared resources are accessed</text>
    <text x="400" y="160" font-size="14" fill="#ffffff" text-anchor="middle">Only one process should execute in critical section at a time</text>
  </g>
  <g id="step4" class="step" data-narration="Structure of a process">
    <rect x="50" y="60" width="700" height="180" fill="#2563eb" rx="10"/>
    <text x="400" y="90" font-size="20" fill="#ffffff" text-anchor="middle">Structure of a Process</text>
    <rect x="100" y="110" width="150" height="50" fill="#10b981" rx="5"/>
    <text x="175" y="140" font-size="14" fill="#ffffff" text-anchor="middle">Entry Section</text>
    <rect x="280" y="110" width="150" height="50" fill="#f59e0b" rx="5"/>
    <text x="355" y="140" font-size="14" fill="#ffffff" text-anchor="middle">Critical Section</text>
    <rect x="460" y="110" width="150" height="50" fill="#8b5cf6" rx="5"/>
    <text x="535" y="140" font-size="14" fill="#ffffff" text-anchor="middle">Exit Section</text>
    <rect x="190" y="180" width="240" height="50" fill="#10b981" rx="5"/>
    <text x="310" y="210" font-size="14" fill="#ffffff" text-anchor="middle">Remainder Section</text>
  </g>
  <g id="step5" class="step" data-narration="Requirements for a solution">
    <rect x="50" y="60" width="700" height="180" fill="#10b981" rx="10"/>
    <text x="400" y="90" font-size="20" fill="#ffffff" text-anchor="middle">Requirements for a Solution</text>
    <rect x="100" y="110" width="200" height="50" fill="#2563eb" rx="5"/>
    <text x="200" y="140" font-size="14" fill="#ffffff" text-anchor="middle">1. Mutual Exclusion</text>
    <rect x="325" y="110" width="200" height="50" fill="#f59e0b" rx="5"/>
    <text x="425" y="140" font-size="14" fill="#ffffff" text-anchor="middle">2. Progress</text>
    <rect x="550" y="110" width="150" height="50" fill="#8b5cf6" rx="5"/>
    <text x="625" y="140" font-size="14" fill="#ffffff" text-anchor="middle">3. Bounded Waiting</text>
    <text x="60" y="190" font-size="12" fill="#ffffff">Only one in CS</text>
    <text x="325" y="190" font-size="12" fill="#ffffff">No deadlock</text>
    <text x="550" y="190" font-size="12" fill="#ffffff">Limit on waiting</text>
  </g>
  <g id="step6" class="step" data-narration="Peterson's solution">
    <rect x="50" y="60" width="700" height="140" fill="#f59e0b" rx="10"/>
    <text x="400" y="90" font-size="20" fill="#ffffff" text-anchor="middle">Peterson's Solution</text>
    <text x="60" y="120" font-size="14" fill="#ffffff">Software-based solution for two processes</text>
    <text x="60" y="145" font-size="14" fill="#ffffff">flag[i] = true;  // I want to enter</text>
    <text x="60" y="170" font-size="14" fill="#ffffff">turn = j;       // Give priority to other process</text>
    <text x="400" y="145" font-size="12" fill="#ffffff">Uses flag array and turn variable</text>
  </g>
  <g id="step7" class="step" data-narration="Bakery algorithm">
    <rect x="50" y="60" width="700" height="140" fill="#8b5cf6" rx="10"/>
    <text x="400" y="90" font-size="20" fill="#ffffff" text-anchor="middle">Bakery Algorithm</text>
    <text x="400" y="125" font-size="16" fill="#ffffff" text-anchor="middle">Each process takes a ticket number</text>
    <text x="400" y="155" font-size="14" fill="#ffffff" text-anchor="middle">Process with smallest ticket number enters critical section</text>
    <text x="400" y="180" font-size="12" fill="#ffffff" text-anchor="middle">Works for n processes, like a bakery queue system</text>
  </g>
  <g id="step8" class="step" data-narration="Test-and-set hardware solution">
    <rect x="50" y="60" width="700" height="140" fill="#2563eb" rx="10"/>
    <text x="400" y="90" font-size="20" fill="#ffffff" text-anchor="middle">Test-and-Set Instruction</text>
    <text x="60" y="125" font-size="14" fill="#ffffff">bool TestAndSet(bool *target) {</text>
    <text x="80" y="150" font-size="14" fill="#ffffff">bool rv = *target;</text>
    <text x="80" y="175" font-size="14" fill="#ffffff">*target = true;</text>
    <text x="80" y="200" font-size="14" fill="#ffffff">return rv;</text>
    <text x="60" y="225" font-size="14" fill="#ffffff">}</text>
    <text x="450" y="150" font-size="12" fill="#ffffff">Atomic hardware instruction</text>
    <text x="450" y="175" font-size="12" fill="#ffffff">Cannot be interrupted</text>
  </g>
  <g id="step9" class="step" data-narration="Compare-and-swap hardware solution">
    <rect x="50" y="60" width="700" height="140" fill="#10b981" rx="10"/>
    <text x="400" y="90" font-size="20" fill="#ffffff" text-anchor="middle">Compare-and-Swap Instruction</text>
    <text x="60" y="120" font-size="12" fill="#ffffff">int CompareAndSwap(int *value, int expected, int new_value) {</text>
    <text x="80" y="145" font-size="12" fill="#ffffff">int temp = *value;</text>
    <text x="80" y="170" font-size="12" fill="#ffffff">if (*value == expected) *value = new_value;</text>
    <text x="80" y="195" font-size="12" fill="#ffffff">return temp;</text>
    <text x="60" y="220" font-size="12" fill="#ffffff">}</text>
    <text x="500" y="150" font-size="12" fill="#ffffff">Also atomic</text>
  </g>
  <g id="step10" class="step" data-narration="Comparison of solutions">
    <rect x="50" y="60" width="700" height="140" fill="#f59e0b" rx="10"/>
    <text x="400" y="90" font-size="20" fill="#ffffff" text-anchor="middle">Comparison of Solutions</text>
    <text x="60" y="125" font-size="14" fill="#ffffff">Software: Peterson's, Bakery - No special hardware</text>
    <text x="60" y="155" font-size="14" fill="#ffffff">Hardware: Test-and-Set, Compare-and-Swap - Faster, simpler</text>
    <text x="60" y="185" font-size="14" fill="#ffffff">Modern: Mutex, Semaphores - Higher-level abstractions</text>
  </g>
</svg>
