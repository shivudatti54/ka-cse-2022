<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Operating System Operations</text>
  <g id="step0" class="step" data-narration="The OS is interrupt-driven. It waits for events like hardware interrupts or software traps. Dual-mode operation protects the system.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Interrupt-driven design with dual-mode protection mechanism</text>
  </g>
  <g id="step1" class="step" data-narration="Dual-mode operation: user mode and kernel mode. Mode bit distinguishes them. User programs run in user mode, OS runs in kernel mode.">
    <rect x="50" y="80" width="330" height="90" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="215" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">User Mode (bit = 1)</text>
    <text x="70" y="122" font-size="11" fill="#424242">User applications execute here</text>
    <text x="70" y="139" font-size="11" fill="#424242">Limited hardware access</text>
    <text x="70" y="156" font-size="11" fill="#1976d2">Cannot execute privileged ops</text>
    <rect x="420" y="80" width="330" height="90" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="585" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#f44336">Kernel Mode (bit = 0)</text>
    <text x="440" y="122" font-size="11" fill="#424242">OS kernel executes here</text>
    <text x="440" y="139" font-size="11" fill="#424242">Full hardware access</text>
    <text x="440" y="156" font-size="11" fill="#f44336">Can execute privileged ops</text>
  </g>
  <g id="step2" class="step" data-narration="System call transitions from user mode to kernel mode. The OS validates the request, performs the operation, then returns to user mode.">
    <rect x="50" y="185" width="700" height="45" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Mode Transition via System Call</text>
    <text x="70" y="223" font-size="11" fill="#424242">User Mode -> System Call (trap) -> Kernel Mode -> Execute -> Return to User Mode</text>
  </g>
  <g id="step3" class="step" data-narration="Timer interrupt prevents infinite loops. OS sets a timer before giving control to user. When timer fires, control returns to OS.">
    <rect x="50" y="245" width="340" height="75" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="220" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">Timer Interrupt</text>
    <text x="70" y="287" font-size="11" fill="#424242">Prevents user program from</text>
    <text x="70" y="304" font-size="11" fill="#424242">hogging CPU indefinitely</text>
    <text x="70" y="315" font-size="11" fill="#ff9800">Timer expires -> OS regains control</text>
  </g>
  <g id="step4" class="step" data-narration="Trap is a software-generated interrupt caused by an error or a system call. Errors like division by zero trigger traps that the OS handles.">
    <rect x="420" y="245" width="340" height="75" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="590" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">Traps (Software Interrupts)</text>
    <text x="440" y="287" font-size="11" fill="#424242">Error: divide by zero, segfault</text>
    <text x="440" y="304" font-size="11" fill="#424242">System call: request OS service</text>
    <text x="440" y="315" font-size="11" fill="#9c27b0">OS determines cause and action</text>
  </g>
  <g id="step5" class="step" data-narration="Multiprogramming keeps CPU busy by organizing jobs so CPU always has one to execute. When one job waits for IO, CPU switches to another.">
    <rect x="50" y="335" width="340" height="65" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="355" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Multiprogramming</text>
    <text x="70" y="377" font-size="11" fill="#424242">Multiple jobs in memory</text>
    <text x="70" y="394" font-size="11" fill="#1976d2">CPU switches when job waits for I/O</text>
  </g>
  <g id="step6" class="step" data-narration="Multitasking or timesharing extends multiprogramming. CPU switches between jobs so frequently that users interact with each job while running.">
    <rect x="420" y="335" width="340" height="65" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="590" y="355" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Multitasking (Timesharing)</text>
    <text x="440" y="377" font-size="11" fill="#424242">Rapid CPU switching among jobs</text>
    <text x="440" y="394" font-size="11" fill="#388e3c">Interactive: user sees responses</text>
  </g>
  <g id="step7" class="step" data-narration="Dual-mode, timer, and interrupts are essential OS mechanisms. They ensure protection, fairness, and proper resource management.">
    <rect x="50" y="415" width="700" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="440" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Dual-mode + Timer + Interrupts = OS protection and control foundation</text>
  </g>
</svg>