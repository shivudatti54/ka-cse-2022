<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Computer System Architecture</text>
  <g id="step0" class="step" data-narration="Computer systems are classified by the number of processors: single processor, multiprocessor, and clustered systems.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Classification based on number and arrangement of processors</text>
  </g>
  <g id="step1" class="step" data-narration="Single processor systems have one main CPU. Most general-purpose computers until recently were single processor. Limited by one core.">
    <rect x="50" y="80" width="220" height="110" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="160" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Single Processor</text>
    <rect x="130" y="115" width="60" height="30" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="2"/>
    <text x="160" y="135" text-anchor="middle" font-size="10" font-weight="bold">CPU</text>
    <text x="70" y="165" font-size="10" fill="#424242">One main CPU core</text>
    <text x="70" y="180" font-size="10" fill="#1976d2">Simple, limited throughput</text>
  </g>
  <g id="step2" class="step" data-narration="Multiprocessor systems have two or more CPUs sharing memory and bus. They provide increased throughput, economy of scale, and reliability.">
    <rect x="290" y="80" width="220" height="110" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Multiprocessor</text>
    <rect x="330" y="115" width="40" height="25" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="350" y="132" text-anchor="middle" font-size="9">CPU1</text>
    <rect x="380" y="115" width="40" height="25" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="132" text-anchor="middle" font-size="9">CPU2</text>
    <rect x="430" y="115" width="40" height="25" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="450" y="132" text-anchor="middle" font-size="9">CPU3</text>
    <text x="310" y="165" font-size="10" fill="#424242">Shared memory and bus</text>
    <text x="310" y="180" font-size="10" fill="#388e3c">Higher throughput, reliable</text>
  </g>
  <g id="step3" class="step" data-narration="Clustered systems are multiple computers connected via a network working together. Used for high availability and high-performance computing.">
    <rect x="530" y="80" width="220" height="110" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="640" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Clustered System</text>
    <rect x="560" y="115" width="35" height="25" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="577" y="132" text-anchor="middle" font-size="8">PC1</text>
    <rect x="605" y="115" width="35" height="25" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="622" y="132" text-anchor="middle" font-size="8">PC2</text>
    <rect x="650" y="115" width="35" height="25" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="667" y="132" text-anchor="middle" font-size="8">PC3</text>
    <rect x="695" y="115" width="35" height="25" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="712" y="132" text-anchor="middle" font-size="8">PC4</text>
    <text x="550" y="165" font-size="10" fill="#424242">Network-connected computers</text>
    <text x="550" y="180" font-size="10" fill="#ff9800">High availability, HPC</text>
  </g>
  <g id="step4" class="step" data-narration="Symmetric multiprocessing: all processors are peers, each running OS and user processes. Most common architecture today.">
    <rect x="50" y="205" width="340" height="70" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="220" y="225" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">SMP (Symmetric Multiprocessing)</text>
    <text x="70" y="247" font-size="11" fill="#424242">All CPUs are equal peers</text>
    <text x="70" y="264" font-size="11" fill="#388e3c">Each runs OS + user processes</text>
  </g>
  <g id="step5" class="step" data-narration="Asymmetric multiprocessing: one master CPU controls the system. Other processors follow master instructions. Less common today.">
    <rect x="420" y="205" width="340" height="70" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="590" y="225" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">AMP (Asymmetric)</text>
    <text x="440" y="247" font-size="11" fill="#424242">One master CPU controls others</text>
    <text x="440" y="264" font-size="11" fill="#9c27b0">Slave CPUs follow instructions</text>
  </g>
  <g id="step6" class="step" data-narration="Multi-core processors have multiple cores on a single chip. Each core is a separate processor. Modern CPUs have 4 to 64 plus cores.">
    <rect x="50" y="290" width="700" height="50" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="310" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Multi-Core Processors (Modern Standard)</text>
    <text x="70" y="332" font-size="11" fill="#424242">Multiple cores on single chip | Shared L2/L3 cache | On-chip communication faster than bus</text>
  </g>
  <g id="step7" class="step" data-narration="Modern systems combine multi-core CPUs with multiprocessing. The OS must handle scheduling, synchronization, and memory across all cores.">
    <rect x="50" y="355" width="700" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="380" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Single -> Multi-processor -> Multi-core: OS complexity grows with architecture</text>
  </g>
</svg>