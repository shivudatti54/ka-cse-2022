<svg width="420" height="400" data-topic-id="system-calls-and-api" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#65A5E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#44A0E6" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- SVG Container -->
  <g transform="translate(20, 20) scale(1)">
    <!-- Gradient Background -->
    <rect width="400" height="360" fill="url(#background-gradient)"/>
    
    <!-- Top Title -->
    <text x="10" y="10" font-size="36" font-family="Arial, sans-serif" fill="#33C9E6">
      System Calls
    </text>
    
    <!-- Section 1: Introduction -->
    <g data-narration="Introduction">
      <rect x="10" y="60" width="350" height="20" fill="#FFFFFF" rx="5"/>
      <text x="10" y="80" font-size="18" font-family="Arial, sans-serif" fill="#666666">
        Introduction
      </text>
      <animateTransform attributeName="transform" type="translate" from="0 60" to="0 80" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
    
    <!-- Section 2: User Mode -->
    <g data-narration="User Mode">
      <rect x="10" y="120" width="350" height="50" fill="#FFFFFF" rx="5"/>
      <text x="10" y="140" font-size="18" font-family="Arial, sans-serif" fill="#666666">
        User Mode
      </text>
      <animateTransform attributeName="transform" type="translate" from="0 140" to="0 110" begin="0s" dur="2s" repeatCount="indefinite"/>
      <rect x="20" y="110" width="20" height="20" fill="#33C9E6" rx="5"/>
      <text x="45" y="130" font-size="14" font-family="Arial, sans-serif" fill="#FFFFFF">
        Restricted mode
      </text>
    </g>
    
    <!-- Section 3: Kernel Mode -->
    <g data-narration="Kernel Mode">
      <rect x="10" y="180" width="350" height="50" fill="#FFFFFF" rx="5"/>
      <text x="10" y="200" font-size="18" font-family="Arial, sans-serif" fill="#666666">
        Kernel Mode
      </text>
      <animateTransform attributeName="transform" type="translate" from="0 200" to="0 190" begin="0s" dur="2s" repeatCount="indefinite"/>
      <rect x="20" y="180" width="20" height="20" fill="#33C9E6" rx="5"/>
      <text x="45" y="200" font-size="14" font-family="Arial, sans-serif" fill="#FFFFFF">
        Privileged mode
      </text>
    </g>
    
    <!-- Section 4: System Calls -->
    <g data-narration="System Calls">
      <rect x="10" y="240" width="350" height="50" fill="#FFFFFF" rx="5"/>
      <text x="10" y="260" font-size="18" font-family="Arial, sans-serif" fill="#666666">
        System Calls
      </text>
      <animateTransform attributeName="transform" type="translate" from="0 260" to="0 250" begin="0s" dur="2s" repeatCount="indefinite"/>
      <rect x="20" y="230" width="20" height="20" fill="#33C9E6" rx="5"/>
      <text x="45" y="250" font-size="14" font-family="Arial, sans-serif" fill="#FFFFFF">
        Request for OS services
      </text>
    </g>
    
    <!-- Section 5: Key Characteristics -->
    <g data-narration="Key Characteristics">
      <rect x="10" y="310" width="350" height="50" fill="#FFFFFF" rx="5"/>
      <text x="10" y="330" font-size="18" font-family="Arial, sans-serif" fill="#666666">
        Key Characteristics
      </text>
      <animateTransform attributeName="transform" type="translate" from="0 330" to="0 320" begin="0s" dur="2s" repeatCount="indefinite"/>
      <rect x="20" y="300" width="20" height="20" fill="#33C9E6" rx="5"/>
      <text x="45" y="320" font-size="14" font-family="Arial, sans-serif" fill="#FFFFFF">
        Only entry points into the kernel
      </text>
      <rect x="70" y="300" width="20" height="20" fill="#33C9E6" rx="5"/>
      <text x="100" y="320" font-size="14" font-family="Arial, sans-serif" fill="#FFFFFF">
        Trigger hardware-assisted switch from user mode to kernel mode
      </text>
    </g>
    
    <!-- Section 6: Conclusion -->
    <g data-narration="Conclusion">
      <rect x="10" y="370" width="350" height="50" fill="#FFFFFF" rx="5"/>
      <text x="10" y="390" font-size="18" font-family="Arial, sans-serif" fill="#666666">
        Conclusion
      </text>
      <animateTransform attributeName="transform" type="translate" from="0 390" to="0 400" begin="0s" dur="2s" repeatCount="indefinite"/>
      <rect x="20" y="370" width="20" height="20" fill="#33C9E6" rx="5"/>
      <text x="45" y="390" font-size="14" font-family="Arial, sans-serif" fill="#FFFFFF">
        System calls bridge user and system modes
      </text>
    </g>
  </g>
  
  <!-- Footer -->
  <g transform="translate(20, 400)">
    <text x="10" y="410" font-size="24" font-family="Arial, sans-serif" fill="#33C9E6">
      Powered by Open Educational Resources
    </text>
  </g>
</svg>