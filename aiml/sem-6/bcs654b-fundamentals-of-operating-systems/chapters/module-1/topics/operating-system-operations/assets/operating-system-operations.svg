<svg width="420" height="400" data-topic-id="operating-system-operations">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2A9FF" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />

  <!-- Title at top -->
  <text x="50%" y="20" font-size="24" font-family="Montserrat" text-anchor="middle" fill="#1A1D23">Operating System Operations</text>
  <text x="50%" y="40" font-size="18" font-family="Montserrat" text-anchor="middle" fill="#1A1D23">Explore the world of Boolean Algebra</text>

  <!-- Section 1: Boolean Algebra -->
  <rect x="20" y="80" width="380" height="100" fill="#F7F7F7" rx="10" />
  <text x="50%" y="100" font-size="18" font-family="Montserrat" text-anchor="middle" fill="#1A1D23">Boolean Algebra</text>
  <text x="50%" y="120" font-size="16" font-family="Montserrat" text-anchor="middle" fill="#1A1D23">A branch of mathematics that deals with variables having two possible values: true (1) and false (0)</text>
  <text x="50%" y="140" font-size="16" font-family="Montserrat" text-anchor="middle" fill="#1A1D23">Developed by George Boole in 1854</text>
  <animate transform="rotate(360 50% 150)" begin="0s" dur="2s" repeat="indefinite" />

  <!-- Section 2: Fundamental Boolean Operations -->
  <rect x="20" y="220" width="380" height="120" fill="#F7F7F7" rx="10" />
  <text x="50%" y="240" font-size="18" font-family="Montserrat" text-anchor="middle" fill="#1A1D23">AND Operation (Conjunction)</text>
  <text x="50%" y="260" font-size="16" font-family="Montserrat" text-anchor="middle" fill="#1A1D23">Outputs 1 only when all inputs are 1</text>
  <rect x="10" y="300" width="100" height="20" fill="#FFC107" rx="5" />
  <rect x="230" y="300" width="100" height="20" fill="#FFC107" rx="5" />
  <rect x="10" y="250" width="100" height="20" fill="#FFC107" rx="5" />
  <rect x="230" y="250" width="100" height="20" fill="#FFC107" rx="5" />
  <animate transform="rotate(360 50% 200)" begin="1s" dur="2s" repeat="indefinite" />
  <animate transform="rotate(360 50% 300)" begin="3s" dur="2s" repeat="indefinite" />

  <!-- Section 3: OR Operation -->
  <rect x="20" y="350" width="380" height="120" fill="#F7F7F7" rx="10" />
  <text x="50%" y="370" font-size="18" font-family="Montserrat" text-anchor="middle" fill="#1A1D23">OR Operation (Disjunction)</text>
  <text x="50%" y="390" font-size="16" font-family="Montserrat" text-anchor="middle" fill="#1A1D23">Outputs 1 when at least one input is 1</text>
  <rect x="10" y="420" width="100" height="20" fill="#FFC107" rx="5" />
  <rect x="230" y="420" width="100" height="20" fill="#FFC107" rx="5" />
  <animate transform="rotate(360 50% 450)" begin="4s" dur="2s" repeat="indefinite" />

  <!-- Section 4: NOT Operation -->
  <rect x="20" y="500" width="380" height="120" fill="#F7F7F7" rx="10" />
  <text x="50%" y="520" font-size="18" font-family="Montserrat" text-anchor="middle" fill="#1A1D23">NOT Operation (Negation/Complement)</text>
  <text x="50%" y="540" font-size="16" font-family="Montserrat" text-anchor="middle" fill="#1A1D23">Inverts the input</text>
  <rect x="10" y="580" width="100" height="20" fill="#FFC107" rx="5" />
  <rect x="230" y="580" width="100" height="20" fill="#FFC107" rx="5" />
  <animate transform="rotate(360 50% 620)" begin="5s" dur="2s" repeat="indefinite" />
  <animate transform="rotate(360 50% 720)" begin="7s" dur="2s" repeat="indefinite" />

  <!-- Section 5: XOR Operation -->
  <rect x="20" y="680" width="380" height="120" fill="#F7F7F7" rx="10" />
  <text x="50%" y="700" font-size="18" font-family="Montserrat" text-anchor="middle" fill="#1A1D23">XOR Operation (Exclusive OR)</text>
  <text x="50%" y="720" font-size="16" font-family="Montserrat" text-anchor="middle" fill="#1A1D23">Outputs 1 when inputs are different</text>
  <rect x="10" y="760" width="100" height="20" fill="#FFC107" rx="5" />
  <rect x="230" y="760" width="100" height="20" fill="#FFC107" rx="5" />
  <animate transform="rotate(360 50% 820)" begin="8s" dur="2s" repeat="indefinite" />
  <animate transform="rotate(360 50% 920)" begin="10s" dur="2s" repeat="indefinite" />

  <!-- Section 6: XNOR Operation -->
  <rect x="20" y="900" width="380" height="120" fill="#F7F7F7" rx="10" />
  <text x="50%" y="920" font-size="18" font-family="Montserrat" text-anchor="middle" fill="#1A1D23">XNOR Operation (Exclusive NOR)</text>
  <text x="50%" y="940" font-size="16" font-family="Montserrat" text-anchor="middle" fill="#1A1D23">Outputs 1 when inputs are the same</text>
  <rect x="10" y="980" width="100" height="20" fill="#FFC107" rx="5" />
  <rect x="230" y="980" width="100" height="20" fill="#FFC107" rx="5" />
  <animate transform="rotate(360 50% 1020)" begin="11s" dur="2s" repeat="indefinite" />
  <animate transform="rotate(360 50% 1120)" begin="13s" dur="2s" repeat="indefinite" />

  <!-- Footer at bottom -->
  <text x="50%" y="380" font-size="18" font-family="Montserrat" text-anchor="middle" fill="#1A1D23">Animated Educational Diagram for Operating System Operations</text>
</svg>