<svg width="420" height="400" data-topic-id="ethereum-architecture">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1" />
    </linearGradient>
  </defs>

  <title>Ethereum Architecture Diagram</title>

  <rect x="10" y="10" width="400" height="80" fill="url(#pastel-gradient)" rx="10"/>

  <g data-narration="Ethereum is a decentralized, open-source blockchain platform">
    <text x="20" y="120" font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F">Ethereum</text>
    <animate transform="rotate(360 20 120)" begin="0s" dur="10s" repeat="indefinite"/>
  </g>

  <g data-narration="Core Components of Ethereum Architecture">
    <rect x="10" y="150" width="400" height="100" fill="#87CEEB" rx="10"/>
    <g transform="translate(10, 150)">
      <text x="20" y="180" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">Ethereum Network</text>
      <line x1="20" y1="200" x2="20" y2="250" stroke="#2F4F7F" stroke-width="2" />
      <g data-narration="Full Nodes: Store the complete blockchain and validate all transactions">
        <rect x="10" y="220" width="80" height="20" fill="#87CEEB" rx="5"/>
        <text x="20" y="240" font-size="12" font-family="Arial, sans-serif" fill="#2F4F7F">Full Nodes</text>
      </g>
      <g data-narration="Light Nodes: Store only headers and request data when needed">
        <rect x="110" y="220" width="80" height="20" fill="#87CEEB" rx="5"/>
        <text x="120" y="240" font-size="12" font-family="Arial, sans-serif" fill="#2F4F7F">Light Nodes</text>
      </g>
      <g data-narration="Archive Nodes: Store all historical states (require significant storage)">
        <rect x="210" y="220" width="80" height="20" fill="#87CEEB" rx="5"/>
        <text x="220" y="240" font-size="12" font-family="Arial, sans-serif" fill="#2F4F7F">Archive Nodes</text>
      </g>
      <g data-narration="Validator Nodes: Participate in consensus (Proof of Stake)">
        <rect x="310" y="220" width="80" height="20" fill="#87CEEB" rx="5"/>
        <text x="320" y="240" font-size="12" font-family="Arial, sans-serif" fill="#2F4F7F">Validator Nodes</text>
      </g>
    </g>

    <g transform="translate(10, 250)">
      <rect x="10" y="270" width="400" height="100" fill="#C7B8EA" rx="10"/>
      <g data-narration="Ethereum State: Maintains a global state">
        <rect x="10" y="290" width="80" height="20" fill="#87CEEB" rx="5"/>
        <text x="20" y="310" font-size="12" font-family="Arial, sans-serif" fill="#2F4F7F">Account State</text>
        <rect x="110" y="290" width="80" height="20" fill="#87CEEB" rx="5"/>
        <text x="120" y="310" font-size="12" font-family="Arial, sans-serif" fill="#2F4F7F">World State</text>
        <rect x="210" y="290" width="80" height="20" fill="#87CEEB" rx="5"/>
        <text x="220" y="310" font-size="12" font-family="Arial, sans-serif" fill="#2F4F7F">Storage</text>
        <rect x="310" y="290" width="80" height="20" fill="#87CEEB" rx="5"/>
        <text x="320" y="310" font-size="12" font-family="Arial, sans-serif" fill="#2F4F7F">Code</text>
      </g>

      <g data-narration="Block Structure: Each block contains a header, state root, transactions root, receipts root, block number, gas limit, gas used, timestamp, and base fee">
        <rect x="10" y="330" width="400" height="100" fill="#87CEEB" rx="10"/>
        <g transform="translate(10, 350)">
          <text x="20" y="380" font-size="12" font-family="Arial, sans-serif" fill="#2F4F7F">Block Header</text>
          <line x1="20" y1="400" x2="20" y2="450" stroke="#2F4F7F" stroke-width="2" />
          <text x="20" y="420" font-size="10" font-family="Arial, sans-serif" fill="#2F4F7F">Parent Hash</text>
          <text x="20" y="440" font-size="10" font-family="Arial, sans-serif" fill="#2F4F7F">State Root</text>
          <text x="20" y="460" font-size="10" font-family="Arial, sans-serif" fill="#2F4F7F">Transactions Root</text>
          <text x="20" y="480" font-size="10" font-family="Arial, sans-serif" fill="#2F4F7F">Receipts Root</text>
          <text x="20" y="500" font-size="10" font-family="Arial, sans-serif" fill="#2F4F7F">Block Number</text>
          <text x="20" y="520" font-size="10" font-family="Arial, sans-serif" fill="#2F4F7F">Gas Limit</text>
          <text x="20" y="540" font-size="10" font-family="Arial, sans-serif" fill="#2F4F7F">Gas Used</text>
          <text x="20" y="560" font-size="10" font-family="Arial, sans-serif" fill="#2F4F7F">Timestamp</text>
          <text x="20" y="580" font-size="10" font-family="Arial, sans-serif" fill="#2F4F7F">Base Fee</text>
        </g>
      </g>

      <g data-narration="Consensus Mechanism: After The Merge, Ethereum uses Proof of Stake (PoS)">
        <rect x="10" y="410" width="400" height="100" fill="#87CEEB" rx="10"/>
        <g transform="translate(10, 420)">
          <text x="20" y="460" font-size="12" font-family="Arial, sans-serif" fill="#2F4F7F">Proof of Stake (PoS)</text>
          <line x1="20" y1="480" x2="20" y2="530" stroke="#2F4F7F" stroke-width="2" />
          <text x="20" y="500" font-size="10" font-family="Arial, sans-serif" fill="#2F4F7F">Validators Stake 32 ETH</text>
          <text x="20" y="520" font-size="10" font-family="Arial, sans-serif" fill="#2F4F7F">Random Selection for Block Proposal</text>
          <text x="20" y="540" font-size="10" font-family="Arial, sans-serif" fill="#2F4F7F">Attestations from other Validators</text>
          <text x="20" y="560" font-size="10" font-family="Arial, sans-serif" fill="#2F4F7F">Finality achieved through Casper FFG</text>
        </g>
      </g>

      <g data-narration="Ethereum Protocol Layers">
        <rect x="10" y="510" width="400" height="100" fill="#C7B8EA" rx="10"/>
        <g transform="translate(10, 520)">
          <text x="20" y="560" font-size="12" font-family="Arial, sans-serif" fill="#2F4F7F">Ethereum Protocol Layers</text>
          <line x1="20" y1="580" x2="20" y2="630" stroke="#2F4F7F" stroke-width="2" />
          <text x="20" y="600" font-size="10" font-family="Arial, sans-serif" fill="#2F4F7F">1. Network</text>
          <text x="20" y="620" font-size="10" font-family="Arial, sans-serif" fill="#2F4F7F">2. State</text>
          <text x="20" y="640" font-size="10" font-family="Arial, sans-serif" fill="#2F4F7F">3. Block Structure</text>
          <text x="20" y="660" font-size="10" font-family="Arial, sans-serif" fill="#2F4F7F">4. Consensus Mechanism</text>
        </g>
      </g>

      <g transform="translate(10, 700)">
        <rect x="10" y="730" width="400" height="50" fill="#87CEEB" rx="10"/>
        <text x="20" y="760" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">Ethereum Architecture Diagram</text>
      </g>
    </g>

    <g data-narration="Ethereum Architecture Diagram">
      <rect x="10" y="0" width="400" height="40" fill="#2F4F7F" rx="10"/>
      <text x="20" y="30" font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F">Ethereum Architecture Diagram</text>
      <animate transform="translateX(360 0)" begin="0s" dur="10s" repeat="indefinite"/>
    </g>
  </g>

  <g transform="translate(10, 0)">
    <rect x="10" y="400" width="400" height="50" fill="#87CEEB" rx="10"/>
    <text x="20" y="430" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">Footer</text>
  </g>
</svg>