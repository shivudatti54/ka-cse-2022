<svg width="420" height="400" data-topic-id="fundamentals-of-operating-systems-1-1-what-is-an-operating-system">
  <defs>
    <linearGradient id=".gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7d2f7" stop-opacity="1"/>
      <stop offset="50%" stop-color="#87ceeb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c7d2f7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="300" fill="url(#gradient)"/>
  <text x="20" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Textbook 1 Chapter 1</text>
  <rect x="10" y="50" width="400" height="50" fill="#ffcc00"/>
  <text x="20" y="60" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">11</text>
  <rect x="10" y="110" width="400" height="50" fill="#ffcc00"/>
  <text x="20" y="120" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">12</text>
  <rect x="10" y="170" width="400" height="50" fill="#ffcc00"/>
  <text x="20" y="180" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">1314</text>
  <rect x="10" y="230" width="400" height="50" fill="#ffcc00"/>
  <text x="20" y="240" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">15</text>
  <rect x="10" y="290" width="400" height="50" fill="#ffcc00"/>
  <text x="20" y="300" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Chapter 2</text>
  <rect x="10" y="350" width="400" height="50" fill="#ffcc00"/>
  <text x="20" y="360" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">21</text>
  <rect x="10" y="410" width="400" height="50" fill="#ffcc00"/>
  <text x="20" y="420" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">22</text>
  <g id="section-1-1-what-is-an-operating-system">
    <rect x="10" y="10" width="400" height="100" fill="#87ceeb"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="0s"/>
    <text x="20" y="120" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="An operating system (OS) is a software that manages computer hardware resources and provides a platform for running application software.">
      <animateTransform attributeName="x" type="translate" from="100 200" to="200 200" dur="5s" begin="0s"/>
    </text>
    <rect x="10" y="170" width="400" height="100" fill="#87ceeb"/>
    < animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="5s"/>
    <text x="20" y="280" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="Key functions of an operating system include managing computer hardware resources, providing a platform for running application software, offering a user interface, providing security and protection for data, managing input/output operations, offering file management and storage, and providing process management and scheduling.">
      <animateTransform attributeName="x" type="translate" from="100 200" to="200 200" dur="5s" begin="5s"/>
    </text>
  </g>
  <g id="section-1-1-importance-of-operating-systems">
    <rect x="10" y="210" width="400" height="100" fill="#87ceeb"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="10s"/>
    <text x="20" y="320" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="Operating systems play a crucial role in the functioning of modern computers. They provide a platform for running application software, offer a user interface, manage computer hardware resources efficiently, provide security and protection for data, offer file management and storage, and increase productivity, improve user experience, enhance security, increase reliability, and reduce costs.">
      <animateTransform attributeName="x" type="translate" from="100 200" to="200 200" dur="5s" begin="10s"/>
    </text>
  </g>
  <g id="section-1-1-types-of-operating-systems">
    <rect x="10" y="430" width="400" height="100" fill="#87ceeb"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="15s"/>
    <text x="20" y="550" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="There are several types of operating systems, including single-user operating systems, multi-user operating systems, real-time operating systems, and mobile operating systems. Each type is designed for specific applications and use cases.">
      <animateTransform attributeName="x" type="translate" from="100 200" to="200 200" dur="5s" begin="15s"/>
    </text>
  </g>
  <g id="section-1-1-operating-system-development">
    <rect x="10" y="580" width="400" height="100" fill="#87ceeb"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="20s"/>
    <text x="20" y="700" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="Operating systems are developed using a variety of programming languages and technologies. The development process involves designing, testing, and refining the operating system to ensure that it meets the required specifications and standards.">
      <animateTransform attributeName="x" type="translate" from="100 200" to="200 200" dur="5s" begin="20s"/>
    </text>
  </g>
</svg>