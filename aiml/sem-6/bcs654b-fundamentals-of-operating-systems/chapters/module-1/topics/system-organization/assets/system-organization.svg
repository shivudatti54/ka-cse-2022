<svg width="420" height="400" data-topic-id="system-organization-memory-organization">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#96A9C9" stop-opacity="1" />
    </linearGradient>
  </defs>
  
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10"/>
  <text x="20" y="30" font-size="24" font-family="Arial" text-anchor="middle" fill="#333">System Organization</text>
  
  <section data-narration="Introduction to Memory Organization">
    <rect x="10" y="60" width="400" height="20" fill="#F7F7F7" rx="5"/>
    <text x="15" y="70" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">Memory Organization</text>
    <rect x="10" y="90" width="400" height="100" fill="#F7F7F7" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 0" dur="1000" begin="0s" delay="0s"/> 
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 0" dur="1000" begin="1000s" delay="0s"/> 
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 0" dur="1000" begin="2000s" delay="0s"/> 
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 0" dur="1000" begin="3000s" delay="0s"/> 
    <text x="15" y="110" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">Separates program memory and data memory</text>
  </section>
  
  <section data-narration="CPU Registers">
    <rect x="10" y="220" width="400" height="20" fill="#F7F7F7" rx="5"/>
    <text x="15" y="230" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">CPU Registers</text>
    <rect x="10" y="250" width="400" height="50" fill="#F7F7F7" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 75" to="0 50" dur="1000" begin="0s" delay="0s"/> 
    <animateTransform attributeName="transform" type="translate" from="0 75" to="0 50" dur="1000" begin="1000s" delay="0s"/> 
    <animateTransform attributeName="transform" type="translate" from="0 75" to="0 50" dur="1000" begin="2000s" delay="0s"/> 
    <animateTransform attributeName="transform" type="translate" from="0 75" to="0 50" dur="1000" begin="3000s" delay="0s"/> 
    <text x="15" y="270" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">Fastest accessible memory elements</text>
  </section>
  
  <section data-narration="Cache Memory">
    <rect x="10" y="320" width="400" height="20" fill="#F7F7F7" rx="5"/>
    <text x="15" y="330" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">Cache Memory</text>
    <rect x="10" y="350" width="400" height="50" fill="#F7F7F7" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 105" to="0 50" dur="1000" begin="0s" delay="0s"/> 
    <animateTransform attributeName="transform" type="translate" from="0 105" to="0 50" dur="1000" begin="1000s" delay="0s"/> 
    <animateTransform attributeName="transform" type="translate" from="0 105" to="0 50" dur="1000" begin="2000s" delay="0s"/> 
    <animateTransform attributeName="transform" type="translate" from="0 105" to="0 50" dur="1000" begin="3000s" delay="0s"/> 
    <text x="15" y="390" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">Stores frequently accessed instructions and data</text>
  </section>
  
  <section data-narration="Main Memory">
    <rect x="10" y="420" width="400" height="20" fill="#F7F7F7" rx="5"/>
    <text x="15" y="430" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">Main Memory</text>
    <rect x="10" y="450" width="400" height="50" fill="#F7F7F7" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 115" to="0 50" dur="1000" begin="0s" delay="0s"/> 
    <animateTransform attributeName="transform" type="translate" from="0 115" to="0 50" dur="1000" begin="1000s" delay="0s"/> 
    <animateTransform attributeName="transform" type="translate" from="0 115" to="0 50" dur="1000" begin="2000s" delay="0s"/> 
    <animateTransform attributeName="transform" type="translate" from="0 115" to="0 50" dur="1000" begin="3000s" delay="0s"/> 
    <text x="15" y="490" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">Divided into program memory and data memory</text>
  </section>
  
  <section data-narration="Secondary Storage">
    <rect x="10" y="520" width="400" height="20" fill="#F7F7F7" rx="5"/>
    <text x="15" y="530" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">Secondary Storage</text>
    <rect x="10" y="550" width="400" height="50" fill="#F7F7F7" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 135" to="0 50" dur="1000" begin="0s" delay="0s"/> 
    <animateTransform attributeName="transform" type="translate" from="0 135" to="0 50" dur="1000" begin="1000s" delay="0s"/> 
    <animateTransform attributeName="transform" type="translate" from="0 135" to="0 50" dur="1000" begin="2000s" delay="0s"/> 
    <animateTransform attributeName="transform" type="translate" from="0 135" to="0 50" dur="1000" begin="3000s" delay="0s"/> 
    <text x="15" y="600" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">Slowest, largest, and cheapest</text>
  </section>
  
  <footer>
    <rect x="10" y="630" width="400" height="20" fill="#F7F7F7" rx="5"/>
    <text x="15" y="640" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">System Organization</text>
  </footer>
</svg>