<svg width="420" height="400" data-topic-id="application-program-interface">
  <style>
    /* Set styles for the diagram */
    path {
      fill: none;
      stroke: #2F4F7F;
      stroke-width: 2;
    }
    .section {
      margin-bottom: 20px;
      background-color: #C9E4CA;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .title span {
      color: #34A85A;
    }
    .footer {
      font-size: 14px;
      color: #666;
      text-align: center;
      margin-top: 20px;
    }
  </style>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#A5D9F5" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%" rx="10" />
  <g transform="translate(10, 10)">
    <!-- Title -->
    <text class="title" x="50%" y="20%" font-size="24px" font-weight="bold">
      Application Program Interface
      <span>API</span>
    </text>
    <!-- Gradient background -->
    <rect fill="url(#pastel-gradient)" width="400" height="350" rx="10" />
    <!-- Graphics Library -->
    <rect x="10" y="70" width="100%" height="60" rx="10" class="section" data-narration="The Graphics Library is a collection of pre-written code that provides a set of functions for performing common graphics tasks, such as drawing lines, rendering polygons, and manipulating images.">
      <rect x="10" y="10" width="30%" height="30%" rx="5" fill="#2F4F7F" />
      <path d="M 20 20 L 50 50 L 80 20" stroke="#34A85A" stroke-width="2" />
    </rect>
    <!-- Device Driver -->
    <rect x="10" y="140" width="100%" height="60" rx="10" class="section" data-narration="The Device Driver is a piece of software that manages the interaction between the graphics hardware and the operating system. It provides a set of APIs that allow the graphics library to access the graphics hardware.">
      <rect x="10" y="10" width="30%" height="30%" rx="5" fill="#2F4F7F" />
      <path d="M 20 20 L 50 50 L 80 20" stroke="#34A85A" stroke-width="2" />
    </rect>
    <!-- Graphics API -->
    <rect x="10" y="210" width="100%" height="60" rx="10" class="section" data-narration="The Graphics API (Application Programming Interface) is a set of functions that provide a way for programmers to access the graphics hardware and create graphical applications.">
      <rect x="10" y="10" width="30%" height="30%" rx="5" fill="#2F4F7F" />
      <path d="M 20 20 L 50 50 L 80 20" stroke="#34A85A" stroke-width="2" />
    </rect>
    <!-- Vertex Processing -->
    <rect x="10" y="280" width="100%" height="60" rx="10" class="section" data-narration="The Programmer's Interface provides functions for processing vertices, which are the points that make up a 3D model.">
      <rect x="10" y="10" width="30%" height="30%" rx="5" fill="#2F4F7F" />
      <path d="M 20 20 L 50 50 L 80 20" stroke="#34A85A" stroke-width="2" />
    </rect>
    <!-- Geometry Transformation -->
    <rect x="10" y="350" width="100%" height="60" rx="10" class="section" data-narration="The Programmer's Interface provides functions for transforming geometry, which enables 3D models to be displayed correctly in the graphics window.">
      <rect x="10" y="10" width="30%" height="30%" rx="5" fill="#2F4F7F" />
      <path d="M 20 20 L 50 50 L 80 20" stroke="#34A85A" stroke-width="2" />
    </rect>
    <!-- Animation -->
    <animate id="animation" attributeName="opacity" from="1" to="0.5" begin="100ms" dur="2000" repeatCount="indefinite" />
    <animate id="animation2" attributeName="transform" from="translate(10, 10)" to="translate(200, 200)" begin="300ms" dur="2000" repeatCount="indefinite" />
  </g>
  <!-- Footer -->
  <text class="footer" x="50%" y="100%" font-size="14px" text-anchor="middle">
    Created by [Your Name]
  </text>
</svg>