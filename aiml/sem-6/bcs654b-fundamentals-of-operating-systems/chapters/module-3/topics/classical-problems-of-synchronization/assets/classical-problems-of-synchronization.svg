<svg width="420" height="400" data-topic-id="classical-problems-of-synchronization">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5E73B3" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1ABC9C" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)"/>
  
  <!-- Title section -->
  <section data-narration="Introduction to Classical Synchronization Problems">
    <g transform="translate(10, 10)">
      <text font-size="24" font-family="Arial" fill="#333333">Classical Synchronization Problems</text>
    </g>
  </section>
  
  <!-- Critical Section Problem section -->
  <section data-narration="The Critical Section Problem Revisited">
    <g transform="translate(10, 50)">
      <rect width="300" height="20" fill="#F7F7F7" rx="5"/>
      <text font-size="18" font-family="Arial" fill="#333333">Critical Section</text>
      <text font-size="14" font-family="Arial" fill="#666666">Only one process can be in its critical section at a time</text>
    </g>
    <g transform="translate(340, 50)">
      <rect width="20" height="20" fill="#1ABC9C"/>
      <text font-size="14" font-family="Arial" fill="#333333">Mutual Exclusion</text>
    </g>
    <g transform="translate(340, 30)">
      <rect width="20" height="20" fill="#5E73B3"/>
      <text font-size="14" font-family="Arial" fill="#333333">Progress</text>
    </g>
    <g transform="translate(340, 10)">
      <rect width="20" height="20" fill="#1ABC9C"/>
      <text font-size="14" font-family="Arial" fill="#333333">Bounded Waiting</text>
    </g>
  </section>
  
  <!-- Semaphore Recap section -->
  <section data-narration="Semaphore Recap">
    <g transform="translate(10, 100)">
      <rect width="300" height="20" fill="#F7F7F7" rx="5"/>
      <text font-size="18" font-family="Arial" fill="#333333">Semaphores</text>
      <text font-size="14" font-family="Arial" fill="#666666">Integer variables used to control access to shared resources</text>
    </g>
    <g transform="translate(340, 100)">
      <rect width="20" height="20" fill="#1ABC9C"/>
      <text font-size="14" font-family="Arial" fill="#333333">Wait</text>
    </g>
    <g transform="translate(340, 80)">
      <rect width="20" height="20" fill="#5E73B3"/>
      <text font-size="14" font-family="Arial" fill="#333333">Signal</text>
    </g>
  </section>
  
  <!-- The Producer-Consumer Problem section -->
  <section data-narration="The Producer-Consumer Problem">
    <g transform="translate(10, 150)">
      <rect width="300" height="200" fill="#F7F7F7" rx="5"/>
      <text font-size="18" font-family="Arial" fill="#333333">Producer-Consumer Problem</text>
      <text font-size="14" font-family="Arial" fill="#666666">Two types of processes: Producers and Consumers</text>
    </g>
    <g transform="translate(10, 110)">
      <rect width="20" height="20" fill="#1ABC9C"/>
      <text font-size="14" font-family="Arial" fill="#333333">Producers</text>
    </g>
    <g transform="translate(10, 90)">
      <rect width="20" height="20" fill="#5E73B3"/>
      <text font-size="14" font-family="Arial" fill="#333333">Consumers</text>
    </g>
    <g transform="translate(10, 70)">
      <rect width="20" height="20" fill="#1ABC9C"/>
      <text font-size="14" font-family="Arial" fill="#333333">Buffer</text>
    </g>
  </section>
  
  <!-- Animation section -->
  <section data-narration="Animation">
    <g transform="translate(10, 220)">
      <rect width="300" height="20" fill="#F7F7F7" rx="5"/>
      <text font-size="18" font-family="Arial" fill="#333333">Animation</text>
      <animate transform="scale(0.9) rotate(360 180 180)" begin="100ms" dur="2000"/>
      <animate transform="scale(1) rotate(0 180 180)" begin="1500ms" dur="1000"/>
    </g>
  </section>
  
  <!-- Footer section -->
  <footer>
    <g transform="translate(10, 360)">
      <text font-size="18" font-family="Arial" fill="#333333">Classical Synchronization Problems</text>
    </g>
  </footer>
</svg>