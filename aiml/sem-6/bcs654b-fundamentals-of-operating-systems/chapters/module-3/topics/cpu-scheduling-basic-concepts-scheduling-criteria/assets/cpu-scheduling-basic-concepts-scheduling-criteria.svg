<svg width="420" height="400" data-topic-id="cpu-scheduling-basic-concepts-scheduling-criteria">
  <desc>Animated Educational SVG Diagram for CPU Scheduling Basic Concepts</desc>
  <define>

    <!-- Colors -->
    <style>
      * {
        fill: none;
        stroke: #2C4053; /* Indigo */
        stroke-width: 2;
        stroke-dasharray: 3,3;
        stroke-linearlight: #87CEEB; /* Pastel Blue */
        stroke-opacity: 0.5;
      }
      text {
        fill: white;
        font-size: 12;
        font-family: Arial, sans-serif;
        text-anchor: middle;
        stroke: #87CEEB; /* Pastel Blue */
      }
    </style>

    <!-- Gradient Background -->
    <defs>
      <linearGradient id="pastelGradient" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
        <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
      </linearGradient>
    </defs>
    <rect x="0" y="0" width="420" height="400" fill="url(#pastelGradient)" opacity="0.5" />

  </define>

  <!-- Title -->
  <g transform="translate(20, 20)">
    <text data-narration="Title" x="50%" y="0.95" text-anchor="middle">CPU Scheduling Basic Concepts</text>
  </g>

  <!-- CPU Scheduling -->
  <g transform="translate(20, 50)">
    <rect x="0" y="0" width="80" height="30" fill="#87CEEB" />
    <text data-narration="CPU Scheduling" x="50%" y="0.95" text-anchor="middle">CPU Scheduling</text>
    <animate transform="rotate(45 50% 0)" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>

  <!-- Time-Shared Scheduling -->
  <g transform="translate(20, 90)">
    <rect x="0" y="0" width="80" height="30" fill="#87CEEB" />
    <text data-narration="Time-Shared Scheduling" x="50%" y="0.95" text-anchor="middle">Time-Shared Scheduling</text>
    <animate transform="rotate(90 50% 0)" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>

  <!-- Interrupt-Driven Scheduling -->
  <g transform="translate(20, 130)">
    <rect x="0" y="0" width="80" height="30" fill="#87CEEB" />
    <text data-narration="Interrupt-Driven Scheduling" x="50%" y="0.95" text-anchor="middle">Interrupt-Driven Scheduling</text>
    <animate transform="rotate(135 50% 0)" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>

  <!-- Scheduling Criteria -->
  <g transform="translate(20, 170)">
    <rect x="0" y="0" width="200" height="30" fill="#87CEEB" />
    <text data-narration="Scheduling Criteria" x="50%" y="0.95" text-anchor="middle">Scheduling Criteria</text>
    <animate transform="rotate(180 50% 0)" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>

  <g transform="translate(220, 170)">
    <rect x="0" y="0" width="100" height="30" fill="#87CEEB" />
    <text data-narration="Response Time" x="50%" y="0.95" text-anchor="middle">Response Time</text>
    <animate transform="rotate(190 50% 0)" begin="1s" dur="1s" repeatCount="indefinite" />
  </g>

  <g transform="translate(320, 170)">
    <rect x="0" y="0" width="100" height="30" fill="#87CEEB" />
    <text data-narration="Throughput" x="50%" y="0.95" text-anchor="middle">Throughput</text>
    <animate transform="rotate(170 50% 0)" begin="2s" dur="1s" repeatCount="indefinite" />
  </g>

  <g transform="translate(220, 200)">
    <rect x="0" y="0" width="100" height="30" fill="#87CEEB" />
    <text data-narration="Turnaround Time" x="50%" y="0.95" text-anchor="middle">Turnaround Time</text>
    <animate transform="rotate(160 50% 0)" begin="3s" dur="1s" repeatCount="indefinite" />
  </g>

  <g transform="translate(320, 200)">
    <rect x="0" y="0" width="100" height="30" fill="#87CEEB" />
    <text data-narration="Wait Time" x="50%" y="0.95" text-anchor="middle">Wait Time</text>
    <animate transform="rotate(150 50% 0)" begin="4s" dur="1s" repeatCount="indefinite" />
  </g>

  <g transform="translate(220, 230)">
    <rect x="0" y="0" width="100" height="30" fill="#87CEEB" />
    <text data-narration="CPU Utilization" x="50%" y="0.95" text-anchor="middle">CPU Utilization</text>
    <animate transform="rotate(140 50% 0)" begin="5s" dur="1s" repeatCount="indefinite" />
  </g>

  <!-- Scheduling Algorithms -->
  <g transform="translate(20, 260)">
    <rect x="0" y="0" width="300" height="30" fill="#87CEEB" />
    <text data-narration="Scheduling Algorithms" x="50%" y="0.95" text-anchor="middle">Scheduling Algorithms</text>
    <animate transform="rotate(120 50% 0)" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>

  <g transform="translate(20, 300)">
    <rect x="0" y="0" width="80" height="30" fill="#FFC107" />
    <text data-narration="First-Come-First-Served (FCFS) Algorithm" x="50%" y="0.95" text-anchor="middle">First-Come-First-Served (FCFS) Algorithm</text>
    <animate transform="rotate(105 50% 0)" begin="0s" dur="1s" repeatCount="indefinite" />
  </g>

  <g transform="translate(110, 300)">
    <rect x="0" y="0" width="80" height="30" fill="#FFC107" />
    <text data-narration="Shortest Job First (SJF) Algorithm" x="50%" y="0.95" text-anchor="middle">Shortest Job First (SJF) Algorithm</text>
    <animate transform="rotate(90 50% 0)" begin="1s" dur="1s" repeatCount="indefinite" />
  </g>

  <g transform="translate(210, 300)">
    <rect x="0" y="0" width="80" height="30" fill="#FFC107" />
    <text data-narration="Priority Scheduling Algorithm" x="50%" y="0.95" text-anchor="middle">Priority Scheduling Algorithm</text>
    <animate transform="rotate(75 50% 0)" begin="2s" dur="1s" repeatCount="indefinite" />
  </g>

  <g transform="translate(310, 300)">
    <rect x="0" y="0" width="80" height="30" fill="#FFC107" />
    <text data-narration="Round Robin (RR) Algorithm" x="50%" y="0.95" text-anchor="middle">Round Robin (RR) Algorithm</text>
    <animate transform="rotate(60 50% 0)" begin="3s" dur="1s" repeatCount="indefinite" />
  </g>

  <!-- Footer -->
  <g transform="translate(20, 370)">
    <text data-narration="Animated Educational Diagram for CPU Scheduling Basic Concepts" x="50%" y="0.95" text-anchor="middle">Animated Educational Diagram for CPU Scheduling Basic Concepts</text>
  </g>
</svg>