<svg width="420" height="400" data-topic-id="fundamentals-of-operating-systems-module-1-introduction-to-operating-systems-chapter-5-process-management-51">
  <title>Process Scheduling</title>
  <style>
    /* Add some basic styling */
    body {
      margin: 0;
      padding: 0;
      background: #C7E9F2; /* Pastel blue */
      color: #2F4F7F; /* Indigo */
      font-family: Arial, sans-serif;
    }
    .section {
      margin-bottom: 20px;
    }
    .data-narration {
      font-size: 1.2em;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .text {
      font-size: 1em;
    }
  </style>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#grad)" rx="10" />
  <rect x="10" y="10" width="400" height="380" fill="#FFFFFF" rx="10" />
  <g id="section-1">
    <rect x="20" y="20" width="380" height="150" fill="#FFFFFF" rx="10" />
    <rect x="20" y="20" width="380" height="20" fill="#FFFFFF" rx="10" />
    <rect x="20" y="40" width="340" height="20" fill="#FFFFFF" rx="10" />
    <g data-narration="Process Scheduling is the process of assigning a set of processes to a set of available resources, allocating required resources, and scheduling the processing of each process.">
      <text x="10" y="60" text-anchor="start" fill="#2F4F7F">Process Scheduling</text>
      <text x="10" y="70" text-anchor="start" fill="#2F4F7F">Definition</text>
      <text x="10" y="80" text-anchor="start" fill="#2F4F7F">Process Scheduling</text>
    </g>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" dur="2s" begin="0s" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,200" dur="2s" begin="0.5s" />
  </g>
  <g id="section-2">
    <rect x="20" y="170" width="340" height="150" fill="#FFFFFF" rx="10" />
