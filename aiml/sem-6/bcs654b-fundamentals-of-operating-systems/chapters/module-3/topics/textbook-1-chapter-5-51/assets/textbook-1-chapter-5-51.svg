    <rect x="20" y="190" width="320" height="20" fill="#FFFFFF" rx="10" />
    <g data-narration="There are four main types of process scheduling algorithms: SJF, SRTF, RR, and Priority Scheduling. Each has its own advantages and disadvantages.">
      <text x="10" y="210" text-anchor="start" fill="#2F4F7F">Types of Process Scheduling</text>
      <text x="10" y="220" text-anchor="start" fill="#2F4F7F">SJF</text>
      <text x="10" y="230" text-anchor="start" fill="#2F4F7F">SRTF</text>
      <text x="10" y="240" text-anchor="start" fill="#2F4F7F">RR</text>
      <text x="10" y="250" text-anchor="start" fill="#2F4F7F">Priority Scheduling</text>
    </g>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,250" dur="2s" begin="0s" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,350" dur="2s" begin="0.5s" />
  </g>
  <g id="section-3">
    <rect x="20" y="370" width="340" height="150" fill="#FFFFFF" rx="10" />
    <rect x="20" y="370" width="340" height="20" fill="#FFFFFF" rx="10" />
    <rect x="20" y="390" width="320" height="20" fill="#FFFFFF" rx="10" />
    <g data-narration="Process Scheduling is a critical component of Operating System as it determines how the system manages and schedules processes to achieve optimal system performance and resource utilization.">
      <text x="10" y="410" text-anchor="start" fill="#2F4F7F">Advantages of Process Scheduling</text>
      <text x="10" y="420" text-anchor="start" fill="#2F4F7F">Improved System Performance</text>
      <text x="10" y="430" text-anchor="start" fill="#2F4F7F">Resource Utilization</text>
      <text x="10" y="440" text-anchor="start" fill="#2F4F7F">Reduced Wait Time</text>
    </g>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,450" dur="2s" begin="0s" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,550" dur="2s" begin="0.5s" />
