<svg width="420" height="400" data-topic-id="semaphore">
  <!-- Title Section -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="20" fill="url(#pastel-gradient)" transparency="0.5" rx="5" />
  <text x="20" y="30" font-size="24" fill="#2F4F7F" font-family="Arial" text-anchor="start">Semaphores</text>

  <!-- Introduction Section -->
  <g transform="translate(20, 50)">
    <rect x="0" y="0" width="100" height="20" fill="#FFC107" rx="5" />
    <text x="5" y="15" font-size="16" fill="#2F4F7F" font-family="Arial" text-anchor="start">What is a Semaphore?</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  <text x="150" y="50" font-size="16" fill="#2F4F7F" font-family="Arial" text-anchor="start">A semaphore is a synchronization tool that provides a simple mechanism for controlling access to a common resource by multiple processes or threads.</text>

  <!-- Mutual Exclusion Section -->
  <g transform="translate(20, 100)">
    <rect x="0" y="0" width="100" height="20" fill="#2F4F7F" rx="5" />
    <text x="5" y="15" font-size="16" fill="#FFC107" font-family="Arial" text-anchor="start">Mutual Exclusion</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(150, 100)">
    <rect x="0" y="0" width="100" height="20" fill="#2F4F7F" rx="5" />
    <text x="5" y="15" font-size="16" fill="#FFC107" font-family="Arial" text-anchor="start">Only one process can be in its critical section at a time.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="2s" dur="2s" repeatCount="indefinite" />
  </g>
  <text x="150" y="150" font-size="16" fill="#2F4F7F" font-family="Arial" text-anchor="start">This ensures that only one process can access the shared resource at a time.</text>

  <!-- Progress Section -->
  <g transform="translate(20, 200)">
    <rect x="0" y="0" width="100" height="20" fill="#4CAF50" rx="5" />
    <text x="5" y="15" font-size="16" fill="#2F4F7F" font-family="Arial" text-anchor="start">Progress</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="4s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(150, 200)">
    <rect x="0" y="0" width="100" height="20" fill="#2F4F7F" rx="5" />
    <text x="5" y="15" font-size="16" fill="#4CAF50" font-family="Arial" text-anchor="start">If no process is in its critical section, a process that wishes to enter must be allowed to do so without delay.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="6s" dur="2s" repeatCount="indefinite" />
  </g>
  <text x="150" y="250" font-size="16" fill="#2F4F7F" font-family="Arial" text-anchor="start">This ensures that a process that wants to access the shared resource is not blocked by other processes.</text>

  <!-- Bounded Waiting Section -->
  <g transform="translate(20, 300)">
    <rect x="0" y="0" width="100" height="20" fill="#FF9800" rx="5" />
    <text x="5" y="15" font-size="16" fill="#2F4F7F" font-family="Arial" text-anchor="start">Bounded Waiting</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="8s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(150, 300)">
    <rect x="0" y="0" width="100" height="20" fill="#2F4F7F" rx="5" />
    <text x="5" y="15" font-size="16" fill="#FF9800" font-family="Arial" text-anchor="start">A process must only wait a finite amount of time before it is granted entry to its critical section.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="10s" dur="2s" repeatCount="indefinite" />
  </g>
  <text x="150" y="350" font-size="16" fill="#2F4F7F" font-family="Arial" text-anchor="start">This ensures that a process that wants to access the shared resource will not be blocked indefinitely.</text>

  <!-- Foot Section -->
  <g transform="translate(20, 380)">
    <rect x="0" y="0" width="100" height="20" fill="#FF9800" rx="5" />
    <text x="5" y="15" font-size="16" fill="#2F4F7F" font-family="Arial" text-anchor="start">Conclusion</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="12s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(150, 380)">
    <rect x="0" y="0" width="100" height="20" fill="#2F4F7F" rx="5" />
    <text x="5" y="15" font-size="16" fill="#FF9800" font-family="Arial" text-anchor="start">In conclusion, semaphores are an essential tool for controlling access to shared resources in concurrent systems.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="14s" dur="2s" repeatCount="indefinite" />
  </g>
  <text x="150" y="400" font-size="16" fill="#2F4F7F" font-family="Arial" text-anchor="start">Thank you for learning about semaphores!</text>
</svg>