  <rect x="340" y="220" width="40%" height="50" style="fill: #7A288A; border: 1px solid #E0E0E0;" id="SJF-rect-2" />
  <rect x="180" y="250" width="40%" height="50" style="fill: #7A288A; border: 1px solid #E0E0E0;" id="Priority-rect-2" />

  <animate xmlns="http://www.w3.org/1999/xlink" xlink:href="#FCFS-rect" begin="0s" dur="2s" fill="freeze" />
  <animate xmlns="http://www.w3.org/1999/xlink" xlink:href="#FCFS-circle" begin="1s" dur="2s" fill="freeze" />
  <animate xmlns="http://www.w3.org/1999/xlink" xlink:href="#FCFS-rect-2" begin="2s" dur="2s" fill="freeze" />
  <animate xmlns="http://www.w3.org/1999/xlink" xlink:href="#FCFS-circle-2" begin="3s" dur="2s" fill="freeze" />

