  <circle cx="100" cy="240" r="10" style="fill: #7A288A;" />
  <circle cx="180" cy="240" r="10" style="fill: #7A288A;" />
  <circle cx="260" cy="240" r="10" style="fill: #7A288A;" />
  <text x="0" y="30" style="font-size: 16px; font-weight: bold;" fill="#333333">Process Scheduling Algorithms</text>
  <text x="0" y="160" style="font-size: 14px;" fill="#666666">Chapter 6: 6.1</text>
  <text x="0" y="390" style="font-size: 14px;" fill="#666666">Back to Top</text>

  <section data-narration="First-Come-First-Served (FCFS) Scheduling Algorithm">
    <rect x="20" y="220" width="40%" height="50" style="fill: #7A288A; border: 1px solid #E0E0E0;" />
    <animate xlink:href="#FCFS-rect" begin="0s" dur="2s" fill="freeze" />
    <animate xlink:href="#FCFS-circle" begin="1s" dur="2s" fill="freeze" />
    <text x="20" y="260" style="font-size: 14px;" fill="#666666">First-come-first-served: processes are executed in the order they arrive at the ready queue.</text>
  </section>

  <section data-narration="Shortest Job First (SJF) Scheduling Algorithm">
    <rect x="100" y="250" width="40%" height="50" style="fill: #7A288A; border: 1px solid #E0E0E0;" />
    <animate xlink:href="#SJF-rect" begin="0s" dur="2s" fill="freeze" />
    <animate xlink:href="#SJF-circle" begin="1s" dur="2s" fill="freeze" />
    <text x="100" y="290" style="font-size: 14px;" fill="#666666">Shortest job first: processes with shorter burst times are executed first.</text>
  </section>

  <section data-narration="Priority Scheduling Algorithm">
    <rect x="180" y="250" width="40%" height="50" style="fill: #7A288A; border: 1px solid #E0E0E0;" />
    <animate xlink:href="#Priority-rect" begin="0s" dur="2s" fill="freeze" />
    <animate xlink:href="#Priority-circle" begin="1s" dur="2s" fill="freeze" />
    <text x="180" y="290" style="font-size: 14px;" fill="#666666">Priority-based scheduling: processes are executed based on their priority.</text>
  </section>

  <section data-narration="FCFS Scheduling Algorithm Example">
    <rect x="340" y="220" width="40%" height="50" style="fill: #7A288A; border: 1px solid #E0E0E0;" />
    <animate xlink:href="#FCFS-rect-2" begin="0s" dur="2s" fill="freeze" />
    <animate xlink:href="#FCFS-circle-2" begin="1s" dur="2s" fill="freeze" />
    <text x="340" y="260" style="font-size: 14px;" fill="#666666">Using FCFS scheduling, the order of execution will be P3, P2, P1.</text>
  </section>

  <section data-narration="SJF Scheduling Algorithm Example">
    <rect x="260" y="250" width="40%" height="50" style="fill: #7A288A; border: 1px solid #E0E0E0;" />
    <animate xlink:href="#SJF-rect-2" begin="0s" dur="2s" fill="freeze" />
    <animate xlink:href="#SJF-circle-2" begin="1s" dur="2s" fill="freeze" />
    <text x="260" y="290" style="font-size: 14px;" fill="#666666">Using SJF scheduling, the order of execution will be P3, P2, P1.</text>
  </section>

  <section data-narration="Priority Scheduling Algorithm Example">
    <rect x="180" y="250" width="40%" height="50" style="fill: #7A288A; border: 1px solid #E0E0E0;" />
    <animate xlink:href="#Priority-rect-2" begin="0s" dur="2s" fill="freeze" />
    <animate xlink:href="#Priority-circle-2" begin="1s" dur="2s" fill="freeze" />
    <text x="180" y="290" style="font-size: 14px;" fill="#666666">Using priority scheduling, the order of execution will be P3, P2, P1.</text>
  </section>

  <circle cx="20" cy="240" r="10" style="fill: #7A288A;" id="FCFS-circle" />
  <circle cx="100" cy="240" r="10" style="fill: #7A288A;" id="SJF-circle" />
  <circle cx="180" cy="240" r="10" style="fill: #7A288A;" id="Priority-circle" />
