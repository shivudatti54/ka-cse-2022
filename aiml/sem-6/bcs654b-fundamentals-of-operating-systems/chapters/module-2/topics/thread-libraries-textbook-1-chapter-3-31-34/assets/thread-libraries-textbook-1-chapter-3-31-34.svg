<svg width="420" height="400" data-topic-id="Thread-Libraries-Textbook-1-Chapter-3-31-34" xmlns="http://www.w3.org/2000/svg">
  <title>Thread Libraries Textbook 1: Chapter 3: 3.1-3.4</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="20" width="400" height="350" fill="url(#pastel-gradient)"/>
  <text x="20" y="50" font-size="24" font-family="Arial" text-anchor="middle">Process vs Thread</text>
  <g id="section-1">
    <rect x="10" y="80" width="380" height="80" fill="#F7F7F7" rx="10"/>
    <text x="55" y="110" font-size="18" font-family="Arial" text-anchor="middle" data-narration="A process is an independent unit of execution that runs in its own memory space." fill="#2F4F7F"/>
    <rect x="55" y="130" width="100" height="20" fill="#F7F7F7" rx="5"/>
    <text x="55" y="150" font-size="18" font-family="Arial" text-anchor="middle" data-narration="A process has its own memory space, files, and resources." fill="#2F4F7F"/>
    <animateTransform attributeName="transform" type="rotate" from="0 190 150" to="360 190 150" dur="10000" begin="0s"/>
  </g>
  <g id="section-2">
    <rect x="10" y="220" width="380" height="80" fill="#F7F7F7" rx="10"/>
    <text x="55" y="250" font-size="18" font-family="Arial" text-anchor="middle" data-narration="A thread is a lightweight process that shares the same memory space as other threads in the same process." fill="#2F4F7F"/>
    <rect x="55" y="270" width="100" height="20" fill="#F7F7F7" rx="5"/>
    <text x="55" y="290" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Threads are lightweight and have a smaller memory footprint than processes." fill="#2F4F7F"/>
    <animateTransform attributeName="transform" type="rotate" from="0 190 250" to="360 190 250" dur="10000" begin="1000s"/>
  </g>
  <g id="section-3">
    <rect x="10" y="320" width="380" height="80" fill="#F7F7F7" rx="10"/>
    <text x="55" y="350" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Process scheduling is the allocation of time slices to each process." fill="#2F4F7F"/>
    <rect x="55" y="370" width="100" height="20" fill="#F7F7F7" rx="5"/>
    <text x="55" y="390" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Scheduling algorithms determine which process should be executed next." fill="#2F4F7F"/>
    <animateTransform attributeName="transform" type="rotate" from="0 190 350" to="360 190 350" dur="10000" begin="2000s"/>
  </g>
  <g id="section-4">
    <rect x="10" y="400" width="380" height="80" fill="#F7F7F7" rx="10"/>
    <text x="55" y="420" font-size="18" font-family="Arial" text-anchor="middle" data-narration="FCFS is a simple scheduling algorithm that executes processes in the order they arrive." fill="#2F4F7F"/>
    <rect x="55" y="440" width="100" height="20" fill="#F7F7F7" rx="5"/>
    <text x="55" y="460" font-size="18" font-family="Arial" text-anchor="middle" data-narration="SJF and Priority Scheduling algorithms are more efficient than FCFS." fill="#2F4F7F"/>
    <rect x="55" y="480" width="100" height="20" fill="#F7F7F7" rx="5"/>
    <text x="55" y="500" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Round Robin is a fair scheduling algorithm that executes processes for a fixed time slice." fill="#2F4F7F"/>
    <animateTransform attributeName="transform" type="rotate" from="0 190 420" to="360 190 420" dur="10000" begin="3000s"/>
  </g>
  <g id="section-5">
    <rect x="10" y="500" width="380" height="80" fill="#F7F7F7" rx="10"/>
    <text x="55" y="520" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Context switching is the time and resources required to switch from one process to another." fill="#2F4F7F"/>
    <rect x="55" y="540" width="100" height="20" fill="#F7F7F7" rx="5"/>
    <text x="55" y="560" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Process yield is the voluntary relinquishment of control to another process." fill="#2F4F7F"/>
    <animateTransform attributeName="transform" type="rotate" from="0 190 520" to="360 190 520" dur="10000" begin="4000s"/>
  </g>
  <g id="section-6">
    <rect x="10" y="620" width="380" height="80" fill="#F7F7F7" rx="10"/>
    <text x="55" y="640" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Operations on processes include process creation, execution, and termination." fill="#2F4F7F"/>
    <rect x="55" y="660" width="100" height="20" fill="#F7F7F7" rx="5"/>
    <text x="55" y="680" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Threads can be created, executed, and terminated within a process." fill="#2F4F7F"/>
    <animateTransform attributeName="transform" type="rotate" from="0 190 640" to="360 190 640" dur="10000" begin="5000s"/>
  </g>
  <g id="arrow-1">
    <path d="M 200 240 L 220 260" stroke="#2F4F7F" stroke-width="2" fill="none"/>
  </g>
  <g id="arrow-2">
    <path d="M 250 290 L 270 310" stroke="#2F4F7F" stroke-width="2" fill="none"/>
  </g>
  <g id="arrow-3">
    <path d="M 300 340 L 320 360" stroke="#2F4F7F" stroke-width="2" fill="none"/>
  </g>
  <g id="arrow-4">
    <path d="M 350 380 L 370 400" stroke="#2F4F7F" stroke-width="2" fill="none"/>
  </g>
  <g id="arrow-5">
    <path d="M 400 420 L 420 440" stroke="#2F4F7F" stroke-width="2" fill="none"/>
  </g>
  <g id="arrow-6">
    <path d="M 450 460 L 470 480" stroke="#2F4F7F" stroke-width="2" fill="none"/>
  </g>
  <g id="title">
    <text x="20" y="10" font-size="36" font-family="Arial" text-anchor="middle" fill="#2F4F7F" data-topic-title>Thread Libraries Textbook 1: Chapter 3: 3.1-3.4</text>
  </g>
  <g id="footer">
    <text x="20" y="390" font-size="18" font-family="Arial" text-anchor="middle" fill="#2F4F7F" data-topic-footer>Learn more about processes and threads</text>
  </g>
</svg>