<svg width="420" height="400" data-topic-id="deadlocks-system-model">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10"/>
  
  <!-- Title section -->
  <section data-narration="Introduction">
    <rect x="10" y="10" width="400" height="40" fill="#2F4F7F" rx="10"/>
    <text x="20" y="25" font-size="18" font-family="Arial" fill="#FFFFFF">Deadlocks</text>
  </section>
  
  <!-- Deadlock characterization section -->
  <section data-narration="Deadlock Characterization">
    <rect x="10" y="60" width="400" height="240" fill="#F7F7F7" rx="10"/>
    <rect x="15" y="70" width="380" height="20" fill="#2F4F7F" rx="10"/>
    <text x="20" y="90" font-size="14" font-family="Arial" fill="#333">Mutual Exclusion</text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="-170 100" dur="1000" begin="-500"/>
    <rect x="-150" y="100" width="300" height="15" fill="#C7B8EA" rx="5"/>
    <text x="-145" y="115" font-size="12" font-family="Arial" fill="#333">Each process requires exclusive access to a common resource.</text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="170 100" dur="1000" begin="-400"/>
    <rect x="170" y="100" width="300" height="15" fill="#C5CAE9" rx="5"/>
    <text x="175" y="115" font-size="12" font-family="Arial" fill="#333">Hold and Wait: A process is holding a resource and waiting for another resource it needs to complete its execution.</text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 100" dur="1000" begin="-300"/>
    <rect x="0" y="100" width="300" height="15" fill="#C7B8EA" rx="5"/>
    <text x="-5" y="115" font-size="12" font-family="Arial" fill="#333">No Preemption: The operating system does not preempt one process to give the resource to another process.</text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 100" dur="1000" begin="-200"/>
    <rect x="0" y="100" width="300" height="15" fill="#C5CAE9" rx="5"/>
    <text x="-5" y="115" font-size="12" font-family="Arial" fill="#333">Circular Wait: Each process is waiting for a resource held by another process.</text>
  </section>
  
  <!-- Example of deadlock section -->
  <section data-narration="Example of Deadlock">
    <rect x="10" y="310" width="400" height="60" fill="#F7F7F7" rx="10"/>
    <rect x="15" y="320" width="380" height="20" fill="#2F4F7F" rx="10"/>
    <text x="20" y="340" font-size="14" font-family="Arial" fill="#333">If P1 requests R1, P2 requests R2, and P3 requests R1, a deadlock can occur:</text>
    <animateTransform attributeName="transform" type="translate" from="0 350" to="-170 350" dur="1000" begin="-500"/>
    <rect x="-150" y="360" width="300" height="15" fill="#C7B8EA" rx="5"/>
    <text x="-145" y="375" font-size="12" font-family="Arial" fill="#333">P1 holds R1 and waits for R2.</text>
    <animateTransform attributeName="transform" type="translate" from="0 350" to="170 350" dur="1000" begin="-400"/>
    <rect x="170" y="360" width="300" height="15" fill="#C5CAE9" rx="5"/>
    <text x="175" y="375" font-size="12" font-family="Arial" fill="#333">P2 holds R2 and waits for R1.</text>
    <animateTransform attributeName="transform" type="translate" from="0 350" to="0 350" dur="1000" begin="-300"/>
    <rect x="0" y="360" width="300" height="15" fill="#C7B8EA" rx="5"/>
    <text x="-5" y="375" font-size="12" font-family="Arial" fill="#333">P3 holds R1 and waits for R2.</text>
  </section>
  
  <!-- Deadlock detection algorithms section -->
  <section data-narration="Deadlock Detection Algorithms">
    <rect x="10" y="380" width="400" height="60" fill="#F7F7F7" rx="10"/>
    <rect x="15" y="390" width="380" height="20" fill="#2F4F7F" rx="10"/>
    <text x="20" y="410" font-size="14" font-family="Arial" fill="#333">Banker's Algorithm: This algorithm uses a resource allocation matrix to detect deadlocks.</text>
    <animateTransform attributeName="transform" type="translate" from="0 430" to="-170 430" dur="1000" begin="-500"/>
    <rect x="-150" y="450" width="300" height="15" fill="#C7B8EA" rx="5"/>
    <text x="-145" y="465" font-size="12" font-family="Arial" fill="#333">Dining Philosophers Problem: This algorithm uses a circular wait to detect deadlocks.</text>
    <animateTransform attributeName="transform" type="translate" from="0 430" to="170 430" dur="1000" begin="-400"/>
    <rect x="170" y="450" width="300" height="15" fill="#C5CAE9" rx="5"/>
    <text x="175" y="465" font-size="12" font-family="Arial" fill="#333">Round-Robin Scheduling: This algorithm uses a round-robin scheduling algorithm to detect deadlocks.</text>
  </section>
  
  <!-- Deadlock prevention algorithms section -->
  <section data-narration="Deadlock Prevention Algorithms">
    <rect x="10" y="480" width="400" height="60" fill="#F7F7F7" rx="10"/>
    <rect x="15" y="490" width="380" height="20" fill="#2F4F7F" rx="10"/>
    <text x="20" y="510" font-size="14" font-family="Arial" fill="#333">Resource Allocation Graph: This algorithm uses a graph to model the resources and processes.</text>
    <animateTransform attributeName="transform" type="translate" from="0 540" to="-170 540" dur="1000" begin="-500"/>
    <rect x="-150" y="560" width="300" height="15" fill="#C7B8EA" rx="5"/>
    <text x="-145" y="575" font-size="12" font-family="Arial" fill="#333">Round-Robin Scheduling: This algorithm uses a round-robin scheduling algorithm to prevent deadlocks.</text>
  </section>
  
  <!-- Deadlock recovery algorithms section -->
  <section data-narration="Deadlock Recovery Algorithms">
    <rect x="10" y="600" width="400" height="60" fill="#F7F7F7" rx="10"/>
    <rect x="15" y="610" width="380" height="20" fill="#2F4F7F" rx="10"/>
    <text x="20" y="630" font-size="14" font-family="Arial" fill="#333">Deadlock Recovery Algorithm: This algorithm is used to recover from deadlocks.</text>
    <animateTransform attributeName="transform" type="translate" from="0 680" to="-170 680" dur="1000" begin="-500"/>
    <rect x="-150" y="700" width="300" height="15" fill="#C7B8EA" rx="5"/>
    <text x="-145" y="715" font-size="12" font-family="Arial" fill="#333">Deadlock Detection Algorithm: This algorithm is used to detect deadlocks.</text>
  </section>
  
  <!-- Footer section -->
  <footer>
    <rect x="10" y="740" width="400" height="40" fill="#2F4F7F" rx="10"/>
    <text x="20" y="755" font-size="14" font-family="Arial" fill="#FFFFFF">Educational Resource</text>
  </footer>
</svg>