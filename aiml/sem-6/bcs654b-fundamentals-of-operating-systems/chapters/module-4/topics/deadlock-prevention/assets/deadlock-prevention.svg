<svg width="420" height="400" data-topic-id="deadlock-prevention">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E6F5E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#grad)"/>
  <text x="20" y="20" font-size="24" fill="#2F4F7F">Deadlock Prevention</text>
  <text x="20" y="60" font-size="18" fill="#2F4F7F">Ensure at least ONE of the four necessary conditions cannot hold.</text>
  <section id="mutual-exclusion" x="10" y="100" width="380" height="100">
    <text x="20" y="30" font-size="18" fill="#2F4F7F" data-narration="Cannot break for non-shareable resources">Mutual Exclusion</text>
    <rect x="20" y="60" width="60" height="30" fill="#66D9EF"/>
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
    <text x="120" y="60" font-size="18" fill="#2F4F7F" data-narration="Can use spooling to make resource appear shareable">Spooling to make resource appear shareable.</text>
  </section>
  <section id="hold-and-wait" x="10" y="220" width="380" height="100">
    <text x="20" y="30" font-size="18" fill="#2F4F7F" data-narration="Request all resources at once before execution">Request all resources at once</text>
    <rect x="20" y="60" width="60" height="30" fill="#F7DC6F"/>
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
    <text x="120" y="60" font-size="18" fill="#2F4F7F" data-narration="Solution A: Request all resources at once before execution">Solution A: Request all resources at once before execution</text>
  </section>
  <section id="no-preemption" x="10" y="320" width="380" height="100">
    <text x="20" y="30" font-size="18" fill="#2F4F7F" data-narration="If request fails, release all held resources">No Preemption</text>
    <rect x="20" y="60" width="60" height="30" fill="#C9E4CA"/>
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
    <text x="120" y="60" font-size="18" fill="#2F4F7F" data-narration="Solution: If request fails, release all held resources">Solution: If request fails, release all held resources</text>
  </section>
  <section id="circular-wait" x="10" y="420" width="380" height="100">
    <text x="20" y="30" font-size="18" fill="#2F4F7F" data-narration="Impose ordering on resources. Request in increasing order">Circular Wait</text>
    <rect x="20" y="60" width="60" height="30" fill="#F7DC6F"/>
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
    <text x="120" y="60" font-size="18" fill="#2F4F7F" data-narration="Resource ordering is practical and widely used">Resource ordering is practical and widely used</text>
  </section>
  <footer x="10" y="490" width="400" height="10" fill="#4B5154">
    <text x="20" y="8" font-size="18" fill="#2F4F7F">Most Common: Circular Wait Prevention</text>
  </footer>
</svg>