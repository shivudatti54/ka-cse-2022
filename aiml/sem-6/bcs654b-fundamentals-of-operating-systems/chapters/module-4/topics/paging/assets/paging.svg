<svg width="420" height="400" data-topic-id="paging">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A8BD2" />
      <stop offset="100%" stop-color="#3498DB" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" />
  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498DB">
    Paging
  </text>
  <!-- Section 1: Concept -->
  <section data-narration="Paging Concept">
    <rect x="10" y="50" width="400" height="100" fill="#F9F9F9" rx="10" />
    <text x="50%" y="60%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      Physical memory divided into fixed-size blocks called **frames**
    </text>
    <text x="50%" y="80%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      Logical memory divided into same-size blocks called **pages**
    </text>
    <text x="50%" y="100%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      Page size = Frame size (typically 4KB)
    </text>
    <text x="50%" y="120%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      Eliminates external fragmentation
    </text>
  </section>
  <!-- Section 2: Address Translation -->
  <section data-narration="Address Translation">
    <rect x="10" y="220" width="400" height="100" fill="#F9F9F9" rx="10" />
    <text x="50%" y="230%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      Logical Address Structure:
    </text>
    <text x="50%" y="250%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      | Page Number (p) | Page Offset (d) |
    </text>
    <text x="50%" y="270%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      For page size = 2^m bytes, offset has m bits.
    </text>
  </section>
  <!-- Section 3: Translation Process -->
  <section data-narration="Translation Process">
    <rect x="10" y="320" width="400" height="100" fill="#F9F9F9" rx="10" />
    <text x="50%" y="330%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      Translation Process:
    </text>
    <text x="50%" y="350%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      1. Extract page number (p) from logical address
    </text>
    <text x="50%" y="370%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      2. Look up frame number (f) in page table
    </text>
    <text x="50%" y="390%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      3. Physical address = f × page_size + d
    </text>
  </section>
  <!-- Section 4: Page Table -->
  <section data-narration="Page Table">
    <rect x="10" y="410" width="400" height="100" fill="#F9F9F9" rx="10" />
    <text x="50%" y="420%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      Page Table:
    </text>
    <text x="50%" y="440%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      Each process has its own page table mapping pages to frames.
    </text>
    <text x="50%" y="460%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      Page Table Entry (PTE) Contents:
    </text>
    <text x="50%" y="480%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      | Field             | Purpose                 |
    </text>
    <text x="50%" y="500%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      | Frame number      | Physical frame location |
    </text>
    <text x="50%" y="520%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      | Valid/Invalid bit | Is page in memory?      |
    </text>
    <text x="50%" y="540%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      | Protection bits   | Read/Write/Execute      |
    </text>
    <text x="50%" y="560%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      | Dirty bit         | Page modified?          |
    </text>
    <text x="50%" y="580%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      | Reference bit     | Page accessed recently? |
    </text>
  </section>
  <!-- Section 5: Page Table Implementation -->
  <section data-narration="Page Table Implementation">
    <rect x="10" y="620" width="400" height="100" fill="#F9F9F9" rx="10" />
    <text x="50%" y="630%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      Page Table Implementation:
    </text>
    <text x="50%" y="650%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      1. Page Table Base Register (PTBR)
    </text>
    <text x="50%" y="670%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      2. Translation Lookaside Buffer (TLB)
    </text>
    <text x="50%" y="690%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      TLB Performance:
    </text>
    <text x="50%" y="710%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      Effective Access Time =
    </text>
    <text x="50%" y="730%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      hit_rate × (TLB_time + memory_time) +
    </text>
    <text x="50%" y="750%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      (1 - hit_rate) × (TLB_time + 2 × memory_time)
    </text>
  </section>
  <!-- Section 6: Multi-Level Paging -->
  <section data-narration="Multi-Level Paging">
    <rect x="10" y="850" width="400" height="100" fill="#F9F9F9" rx="10" />
    <text x="50%" y="860%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      Multi-Level Paging:
    </text>
    <text x="50%" y="880%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      Large address space → huge page table
    </text>
    <text x="50%" y="900%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      Solution: Hierarchical paging
    </text>
    <text x="50%" y="920%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      Two-Level:
    </text>
    <text x="50%" y="940%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      | Outer Page | Inner Page | Offset |
    </text>
    <text x="50%" y="960%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      Outer table points to inner tables
    </text>
    <text x="50%" y="980%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      Inner tables point to frames
    </text>
  </section>
  <!-- Section 7: Inverted Page Table -->
  <section data-narration="Inverted Page Table">
    <rect x="10" y="1030" width="400" height="100" fill="#F9F9F9" rx="10" />
    <text x="50%" y="1040%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      Inverted Page Table:
    </text>
    <text x="50%" y="1060%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      One entry per frame (not per page)
    </text>
    <text x="50%" y="1080%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
      Entry contains: process ID + page number
    </text>
  </section>
  <!-- Animations -->
  <animate id="animate1" begin="100ms" dur="2000" repeatCount="indefinite">
    <circle cx="50%" cy="20%" r="20" fill="#3498DB" />
  </animate>
  <animate id="animate2" begin="300ms" dur="2000" repeatCount="indefinite">
    <text x="50%" y="60%" fill="#666" fill-opacity="0.8" />
  </animate>
  <animate id="animate3" begin="500ms" dur="2000" repeatCount="indefinite">
    <rect x="10" y="50" width="400" height="100" fill="#F9F9F9" rx="10" />
  </animate>
  <!-- Footer -->
  <text x="50%" y="380%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" fill-opacity="0.8">
    Paging
  </text>
</svg>