<svg width="420" height="400" data-topic-id="deadlock-avoidance-bankers-algorithm">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" opacity="0.5" />
  
  <!-- Title at top -->
  <text x="50%" y="20%" font-size="36" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2F4F7F">
    Deadlock Avoidance using Banker's Algorithm
  </text>
  
  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="50%" y="100%" width="60%" height="50%" fill="#E0E4CC" rx="10" />
    <text x="50%" y="110%" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2F4F7F">
      What is Deadlock Avoidance?
    </text>
    <text x="50%" y="130%" font-size="18" font-family="Arial" text-anchor="middle" fill="#2F4F7F">
      Deadlock Avoidance is a technique to prevent resource deadlocks by checking if a request would lead to a safe state.
    </text>
  </section>
  
  <!-- Section 2: Banker's Algorithm Data Structures -->
  <section data-narration="Banker's Algorithm Data Structures">
    <rect x="50%" y="160%" width="60%" height="50%" fill="#E0E4CC" rx="10" />
    <text x="50%" y="170%" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2F4F7F">
      Banker's Algorithm Data Structures
    </text>
    <table width="80%" height="50%" border="1" cellpadding="10" cellspacing="0">
      <tr>
        <th>Available</th>
        <th>Max</th>
        <th>Allocation</th>
        <th>Need</th>
      </tr>
      <tr>
        <td>Available</td>
        <td>Max</td>
        <td>Allocation</td>
        <td>Need</td>
      </tr>
      <tr>
        <td>3</td>
        <td>9 5 3</td>
        <td>0 2 1</td>
        <td>7 4 3</td>
      </tr>
      <tr>
        <td>3</td>
        <td>3 2 2</td>
        <td>2 0 0</td>
        <td>1 2 2</td>
      </tr>
      <tr>
        <td>2</td>
        <td>4 3 3</td>
        <td>0 2 2</td>
        <td>4 3 1</td>
      </tr>
    </table>
  </section>
  
  <!-- Section 3: Safety Algorithm -->
  <section data-narration="Safety Algorithm">
    <rect x="50%" y="230%" width="60%" height="50%" fill="#E0E4CC" rx="10" />
    <text x="50%" y="240%" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2F4F7F">
      Safety Algorithm
    </text>
    <ol>
      <li>Work = Available</li>
      <li>Find i such that:</li>
      <li>Finish[i] = false</li>
      <li>Need[i] <= Work</li>
      <li>If no such i, go to step 4</li>
      <li>Work = Work + Allocation[i]</li>
      <li>Finish[i] = true</li>
      <li>Go to step 2</li>
      <li>If Finish[i] = true for all i:</li>
      <li>System is in SAFE state</li>
      <li>Else: UNSAFE</li>
    </ol>
  </section>
  
  <!-- Section 4: Resource Request Algorithm -->
  <section data-narration="Resource Request Algorithm">
    <rect x="50%" y="310%" width="60%" height="50%" fill="#E0E4CC" rx="10" />
    <text x="50%" y="320%" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2F4F7F">
      Resource Request Algorithm
    </text>
    <table width="80%" height="50%" border="1" cellpadding="10" cellspacing="0">
      <tr>
        <th>Request</th>
        <th>Available</th>
        <th>Allocation</th>
        <th>Need</th>
      </tr>
      <tr>
        <td>P1</td>
        <td>3</td>
        <td>2</td>
        <td>1</td>
      </tr>
      <tr>
        <td>P3</td>
        <td>3</td>
        <td>2</td>
        <td>0</td>
      </tr>
      <tr>
        <td>P4</td>
        <td>2</td>
        <td>2</td>
        <td>4</td>
      </tr>
    </table>
  </section>
  
  <!-- Section 5: Example -->
  <section data-narration="Example">
    <rect x="50%" y="380%" width="60%" height="50%" fill="#E0E4CC" rx="10" />
    <text x="50%" y="390%" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2F4F7F">
      Example
    </text>
    <table width="80%" height="50%" border="1" cellpadding="10" cellspacing="0">
      <tr>
        <th>Processes</th>
        <th>Resources</th>
        <th>Allocation</th>
        <th>Max</th>
        <th>Need</th>
      </tr>
      <tr>
        <td>P0</td>
        <td>A B C</td>
        <td>0 1 0</td>
        <td>7 5 3</td>
        <td>7 4 3</td>
      </tr>
      <tr>
        <td>P1</td>
        <td>A C</td>
        <td>2 0 0</td>
        <td>3 2 2</td>
        <td>1 2 2</td>
      </tr>
      <tr>
        <td>P2</td>
        <td>B C</td>
        <td>3 0 2</td>
        <td>9 0 2</td>
        <td>6 0 0</td>
      </tr>
      <tr>
        <td>P3</td>
        <td>A B</td>
        <td>2 1 1</td>
        <td>2 2 2</td>
        <td>0 1 1</td>
      </tr>
      <tr>
        <td>P4</td>
        <td>A C</td>
        <td>0 0 2</td>
        <td>4 3 3</td>
        <td>4 3 1</td>
      </tr>
    </table>
  </section>
  
  <!-- Section 6: Limitations -->
  <section data-narration="Limitations">
    <rect x="50%" y="450%" width="60%" height="50%" fill="#E0E4CC" rx="10" />
    <text x="50%" y="460%" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2F4F7F">
      Limitations
    </text>
    <ul>
      <li>Processes must declare max needs in advance</li>
      <li>Number of resources fixed</li>
      <li>Overhead of safety check for each request</li>
    </ul>
  </section>
  
  <!-- Animation: Safety Algorithm -->
  <animate xmlns="http://www.w3.org/2000/svg" begin="1s" dur="10s" repeatCount="indefinite">
    <animateTransform transform-origin="50% 50%" attributeName="x" from="50%" to="70%" type="translate" />
    <animateTransform transform-origin="50% 50%" attributeName="x" from="70%" to="90%" type="translate" />
  </animate>
  
  <!-- Footer -->
  <text x="50%" y="480%" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2F4F7F">
    Created by [Your Name]
  </text>
</svg>