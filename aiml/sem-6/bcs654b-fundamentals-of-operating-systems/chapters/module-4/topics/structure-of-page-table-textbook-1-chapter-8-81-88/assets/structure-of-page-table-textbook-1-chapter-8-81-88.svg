<svg width="420" height="400" data-topic-id="structure-of-page-table-textbook-1-chapter-8-81-88">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
    <style>.title { font-size: 36px; font-weight: bold; fill: #0097A7; }
    .section { margin-bottom: 20px; }
    .annotation { font-size: 16px; color: #666; }
    .arrow { fill: #0097A7; stroke: #000; stroke-width: 2; }
    .connect { stroke: #000; stroke-width: 2; } 
    </style>
  </defs>
  <rect x="0" y="0" width="420" height="400" style="fill: url(#gradient)"/> 
  <text x="50" y="20" class="title">Structure of Page Table</text>
  <section data-narration="Introduction">
    <text x="50" y="70" class="annotation">In this chapter, we will explore the concept of page tables and their structure.</text>
    <rect x="50" y="100" width="320" height="20" style="stroke: #000; stroke-width: 2; fill: none"/>
    <text x="100" y="120" class="annotation">Page tables are a fundamental data structure used in operating systems to manage memory.</text>
    <animate xmlns="http://www.w3.org/1999/09/svg" begin="100ms" dur="500ms" repeatCount="indefinite" attributeName="fill-opacity">
      <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
        <stop offset="100%" stop-color="#87CEEB" stop-opacity="0.5"/>
      </linearGradient>
    </animate>
  </section>
  <section data-narration="Page Table Structure">
    <rect x="50" y="140" width="320" height="50" style="stroke: #000; stroke-width: 2; fill: none"/>
    <text x="100" y="150" class="annotation">A page table is a data structure that contains a set of entries, known as page table entries (PTEs), which describe the mapping of virtual pages to physical pages.</text>
    <text x="50" y="200" class="annotation">Each PTE contains the following information:</text>
    <rect x="50" y="220" width="320" height="20" style="stroke: #000; stroke-width: 2; fill: none"/>
    <text x="100" y="230" class="annotation">- Page Number: The virtual page number being mapped.</text>
    <rect x="50" y="250" width="320" height="20" style="stroke: #000; stroke-width: 2; fill: none"/>
    <text x="100" y="260" class="annotation">- Page Frame Number: The physical page frame number where the page is located.</text>
    <rect x="50" y="280" width="320" height="20" style="stroke: #000; stroke-width: 2; fill: none"/>
    <text x="100" y="290" class="annotation">- Read/Write Permissions: The read and write permissions for the page.</text>
    <animate xmlns="http://www.w3.org/1999/09/svg" begin="200ms" dur="500ms" repeatCount="indefinite" attributeName="fill-opacity">
      <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
        <stop offset="100%" stop-color="#87CEEB" stop-opacity="0.5"/>
      </linearGradient>
    </animate>
  </section>
  <section data-narration="Page Table Types">
    <rect x="50" y="320" width="320" height="40" style="stroke: #000; stroke-width: 2; fill: none"/>
    <text x="100" y="330" class="annotation">There are two main types of page tables:</text>
    <rect x="50" y="350" width="320" height="20" style="stroke: #000; stroke-width: 2; fill: none"/>
    <text x="100" y="360" class="annotation">- Explicit Page Table: An explicit page table is a page table that contains all the necessary information to map virtual pages to physical pages.</text>
    <rect x="50" y="380" width="320" height="20" style="stroke: #000; stroke-width: 2; fill: none"/>
    <text x="100" y="390" class="annotation">- Implicit Page Table: An implicit page table is a page table that contains only the necessary information to map virtual pages to physical pages.</text>
    <animate xmlns="http://www.w3.org/1999/09/svg" begin="300ms" dur="500ms" repeatCount="indefinite" attributeName="fill-opacity">
      <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
        <stop offset="100%" stop-color="#87CEEB" stop-opacity="0.5"/>
      </linearGradient>
    </animate>
  </section>
  <section data-narration="Page Table Entry Format">
    <rect x="50" y="420" width="320" height="40" style="stroke: #000; stroke-width: 2; fill: none"/>
    <text x="100" y="430" class="annotation">A page table entry (PTE) typically contains the following format:</text>
    <rect x="50" y="450" width="320" height="20" style="stroke: #000; stroke-width: 2; fill: none"/>
    <text x="100" y="460" class="annotation">| Bit Field  | Meaning |</text>
    <rect x="50" y="480" width="320" height="20" style="stroke: #000; stroke-width: 2; fill: none"/>
    <text x="100" y="490" class="annotation">- P  | Present bit |</text>
    <rect x="50" y="510" width="320" height="20" style="stroke: #000; stroke-width: 2; fill: none"/>
    <text x="100" y="520" class="annotation">- R/W | Read and write permissions |</text>
    <rect x="50" y="540" width="320" height="20" style="stroke: #000; stroke-width: 2; fill: none"/>
    <text x="100" y="550" class="annotation">- PPN  | Page number |</text>
    <rect x="50" y="570" width="320" height="20" style="stroke: #000; stroke-width: 2; fill: none"/>
    <text x="100" y="580" class="annotation">- PPN  | Frame number |</text>
    <animate xmlns="http://www.w3.org/1999/09/svg" begin="400ms" dur="500ms" repeatCount="indefinite" attributeName="fill-opacity">
      <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
        <stop offset="100%" stop-color="#87CEEB" stop-opacity="0.5"/>
      </linearGradient>
    </animate>
  </section>
  <footer>
    <text x="50" y="450" class="annotation">Key Concepts:</text>
    <text x="100" y="460" class="annotation">- Page Table Entry (PTE)</text>
    <text x="100" y="470" class="annotation">- Page Number</text>
    <text x="100" y="480" class="annotation">- Page Frame Number</text>
    <text x="100" y="490" class="annotation">- Read/Write Permissions</text>
  </footer>
</svg>