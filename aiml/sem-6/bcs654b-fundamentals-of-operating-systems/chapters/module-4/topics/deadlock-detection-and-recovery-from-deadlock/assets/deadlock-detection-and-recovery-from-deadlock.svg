    <div class="title">Deadlock Detection and Recovery from Deadlock</div>

    <!-- Section 1: Introduction -->
    <div class="section" data-narration="Introduction">
      <div class="text">A deadlock is a situation where two or more processes are blocked indefinitely, each waiting for the other to release a resource.</div>
      <svg width="100%" height="100%">
        <circle cx="50%" cy="50%" r="40" fill="#5B5B5B" />
