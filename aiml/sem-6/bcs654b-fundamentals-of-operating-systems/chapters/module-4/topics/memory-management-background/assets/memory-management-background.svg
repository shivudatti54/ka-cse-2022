<svg width="420" height="400" data-topic-id="memory-management-background" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" />
      <stop offset="100%" stop-color="#ACC0F2" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title and background -->
  <g transform="translate(10, 10)">
    <text x="0" y="20" font-size="24" font-family="Arial" fill="#2F4F7F">Memory Management Background</text>
  </g>
  <rect x="0" y="50" width="400" height="300" rx="10" fill="#F7F7F7" />
  
  <!-- Section 1: What is Key Management? -->
  <g transform="translate(20, 60)">
    <rect x="0" y="0" width="380" height="30" rx="5" fill="#E9E9E9" />
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#2F4F7F">What is Key Management?</text>
    <animate xlink:href="#arrow-1" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="10" y="40" width="350" height="20" rx="5" fill="#C7B8EA" opacity=".5" />
    <text x="120" y="40" font-size="18" font-family="Arial" fill="#2F4F7F" data-narration="Key management encompasses the comprehensive set of processes and mechanisms for the generation, creation, distribution, storage, use, rotation, and eventual destruction of cryptographic keys." />
  </g>
  
  <!-- Section 2: Importance of Key Management -->
  <g transform="translate(20, 90)">
    <rect x="0" y="0" width="380" height="30" rx="5" fill="#E9E9E9" />
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#2F4F7F">The Critical Importance of Key Management</text>
    <animate xlink:href="#arrow-2" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="10" y="40" width="350" height="20" rx="5" fill="#C7B8EA" opacity=".5" />
    <text x="120" y="40" font-size="18" font-family="Arial" fill="#2F4F7F" data-narration="Proper key management ensures that only authorized entities can access encrypted data. Non-repudiation, compliance, and system integrity are also directly affected by the quality of key management." />
  </g>
  
  <!-- Section 3: Key Lifecycle -->
  <g transform="translate(20, 130)">
    <rect x="0" y="0" width="380" height="30" rx="5" fill="#E9E9E9" />
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#2F4F7F">The Key Lifecycle: A Comprehensive Overview</text>
    <animate xlink:href="#arrow-3" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="10" y="40" width="350" height="20" rx="5" fill="#C7B8EA" opacity=".5" />
    <text x="120" y="40" font-size="18" font-family="Arial" fill="#2F4F7F" data-narration="A cryptographic key is not a static entity; it has a lifespan. Key management governs this entire lifecycle, which can be broken down into the following phases: key generation, key distribution, key storage, key use, key rotation, and key destruction." />
  </g>
  
  <!-- Section 4: Key Generation -->
  <g transform="translate(20, 170)">
    <rect x="0" y="0" width="380" height="30" rx="5" fill="#E9E9E9" />
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#2F4F7F">Key Generation</text>
    <animate xlink:href="#arrow-4" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="10" y="40" width="350" height="20" rx="5" fill="#C7B8EA" opacity=".5" />
    <text x="120" y="40" font-size="18" font-family="Arial" fill="#2F4F7F" data-narration="The quality of this step is critical. A cryptographically strong key is required to ensure the security of the entire cryptographic infrastructure." />
  </g>
  
  <!-- Section 5: Key Distribution -->
  <g transform="translate(20, 210)">
    <rect x="0" y="0" width="380" height="30" rx="5" fill="#E9E9E9" />
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#2F4F7F">Key Distribution</text>
    <animate xlink:href="#arrow-5" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="10" y="40" width="350" height="20" rx="5" fill="#C7B8EA" opacity=".5" />
    <text x="120" y="40" font-size="18" font-family="Arial" fill="#2F4F7F" data-narration="Key distribution is the process of securely sharing the generated key with the intended recipient(s)." />
  </g>
  
  <!-- Section 6: Key Storage -->
  <g transform="translate(20, 250)">
    <rect x="0" y="0" width="380" height="30" rx="5" fill="#E9E9E9" />
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#2F4F7F">Key Storage</text>
    <animate xlink:href="#arrow-6" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="10" y="40" width="350" height="20" rx="5" fill="#C7B8EA" opacity=".5" />
    <text x="120" y="40" font-size="18" font-family="Arial" fill="#2F4F7F" data-narration="Key storage refers to the secure storage of the key, either in a physical device or a digital repository." />
  </g>
  
  <!-- Section 7: Key Use -->
  <g transform="translate(20, 290)">
    <rect x="0" y="0" width="380" height="30" rx="5" fill="#E9E9E9" />
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#2F4F7F">Key Use</text>
    <animate xlink:href="#arrow-7" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="10" y="40" width="350" height="20" rx="5" fill="#C7B8EA" opacity=".5" />
    <text x="120" y="40" font-size="18" font-family="Arial" fill="#2F4F7F" data-narration="The key is used to encrypt and decrypt data, ensuring the confidentiality and integrity of the information." />
  </g>
  
  <!-- Section 8: Key Rotation -->
  <g transform="translate(20, 330)">
    <rect x="0" y="0" width="380" height="30" rx="5" fill="#E9E9E9" />
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#2F4F7F">Key Rotation</text>
    <animate xlink:href="#arrow-8" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="10" y="40" width="350" height="20" rx="5" fill="#C7B8EA" opacity=".5" />
    <text x="120" y="40" font-size="18" font-family="Arial" fill="#2F4F7F" data-narration="Regular key rotation ensures that the key remains secure and prevents potential weaknesses from being exploited." />
  </g>
  
  <!-- Section 9: Key Destruction -->
  <g transform="translate(20, 370)">
    <rect x="0" y="0" width="380" height="30" rx="5" fill="#E9E9E9" />
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#2F4F7F">Key Destruction</text>
    <animate xlink:href="#arrow-9" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="10" y="40" width="350" height="20" rx="5" fill="#C7B8EA" opacity=".5" />
    <text x="120" y="40" font-size="18" font-family="Arial" fill="#2F4F7F" data-narration="Proper key destruction ensures that the key is securely erased and cannot be recovered or reused." />
  </g>
  
  <!-- Footers and arrows -->
  <g transform="translate(20, 410)">
    <rect x="0" y="0" width="380" height="30" rx="5" fill="#E9E9E9" />
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#2F4F7F">Data Topic: Memory Management Background</text>
    <rect x="10" y="40" width="350" height="20" rx="5" fill="#C7B8EA" opacity=".5" />
    <text x="120" y="40" font-size="18" font-family="Arial" fill="#2F4F7F">Arrow: ↑</text>
  </g>
  <g transform="translate(80, 410)">
    <rect x="0" y="0" width="340" height="30" rx="5" fill="#E9E9E9" />
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#2F4F7F">References</text>
    <rect x="10" y="40" width="320" height="20" rx="5" fill="#C7B8EA" opacity=".5" />
    <text x="120" y="40" font-size="18" font-family="Arial" fill="#2F4F7F" data-narration="For more information on key management, please visit the official documentation." />
  </g>
</svg>