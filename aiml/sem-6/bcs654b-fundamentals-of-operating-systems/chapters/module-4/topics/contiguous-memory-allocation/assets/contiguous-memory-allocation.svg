<svg width="420" height="400" data-topic-id="Contiguous Memory Allocation">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10"/>
  
  <!-- Section 1: Introduction -->
  <section id="section-1" data-narration="Introduction">
    <rect x="10" y="40" width="380" height="80" fill="#F7D2C4" rx="10"/>
    <g transform="translate(15,50)">
      <text x="0" y="0" font-size="24" font-family="Arial" fill="#333">
        Dynamic Memory Allocation
      </text>
      <text x="0" y="30" font-size="18" font-family="Arial" fill="#666">
        is a process that allows programs to request memory from the operating system at runtime.
      </text>
    </g>
  </section>
  
  <!-- Section 2: Functions for Dynamic Memory Allocation -->
  <section id="section-2" data-narration="Functions for Dynamic Memory Allocation">
    <rect x="10" y="130" width="380" height="120" fill="#C9E4CA" rx="10"/>
    <g transform="translate(15,150)">
      <text x="0" y="0" font-size="24" font-family="Arial" fill="#333">
        malloc(), calloc(), realloc(), and free() are four library functions for dynamic memory management.
      </text>
      <rect x="0" y="-20" width="100" height="40" fill="#F7D2C4" rx="10"/>
      <rect x="110" y="-20" width="100" height="40" fill="#F7D2C4" rx="10"/>
      <rect x="220" y="-20" width="100" height="40" fill="#F7D2C4" rx="10"/>
      <rect x="330" y="-20" width="100" height="40" fill="#F7D2C4" rx="10"/>
    </g>
    <g transform="translate(15,170)">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#666">
        malloc() allocates a block of memory of specified size and returns a pointer to the first byte.
      </text>
      <text x="0" y="40" font-size="18" font-family="Arial" fill="#666">
        calloc() allocates multiple blocks of memory and initializes all bytes to zero.
      </text>
      <text x="0" y="80" font-size="18" font-family="Arial" fill="#666">
        realloc() changes the size of previously allocated memory.
      </text>
      <text x="0" y="120" font-size="18" font-family="Arial" fill="#666">
        free() deallocates previously allocated memory.
      </text>
    </g>
  </section>
  
  <!-- Section 3: Differences between Static and Dynamic Memory Allocation -->
  <section id="section-3" data-narration="Differences between Static and Dynamic Memory Allocation">
    <rect x="10" y="240" width="380" height="80" fill="#C9E4CA" rx="10"/>
    <g transform="translate(15,260)">
      <text x="0" y="0" font-size="24" font-family="Arial" fill="#333">
        | Feature     | Static Allocation        | Dynamic Allocation             |
      </text>
      <rect x="0" y="-20" width="150" height="40" fill="#F7D2C4" rx="10"/>
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#666">Memory Size</text>
      <text x="0" y="40" font-size="18" font-family="Arial" fill="#666">Fixed at compile time</text>
      <rect x="150" y="-20" width="150" height="40" fill="#F7D2C4" rx="10"/>
      <text x="150" y="0" font-size="18" font-family="Arial" fill="#666">Lifetime</text>
      <text x="150" y="40" font-size="18" font-family="Arial" fill="#666">Entire program execution</text>
      <rect x="300" y="-20" width="150" height="40" fill="#F7D2C4" rx="10"/>
      <text x="300" y="0" font-size="18" font-family="Arial" fill="#666">Flexibility</text>
      <text x="300" y="40" font-size="18" font-family="Arial" fill="#666">Limited</text>
    </g>
  </section>
  
  <!-- Section 4: Conclusion -->
  <section id="section-4" data-narration="Conclusion">
    <rect x="10" y="340" width="380" height="80" fill="#C9E4CA" rx="10"/>
    <g transform="translate(15,350)">
      <text x="0" y="0" font-size="24" font-family="Arial" fill="#333">
        Dynamic memory allocation is an essential process in programming.
      </text>
    </g>
  </section>
  
  <!-- Animation for section transitions -->
  <animate xmlns="http://www.w3.org/2000/10/animation/">
    <style>
      .animate {
        opacity: 0;
        transform: scale(1.2);
        transition: opacity 0.5s, transform 0.5s;
      }
    </style>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="1.2 1.2" begin="0s" dur="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translateX" from="0px" to="10px" begin="0s" dur="1s" repeatCount="indefinite"/>
  </animate>
  
  <!-- Footer -->
  <footer>
    <rect x="10" y="370" width="380" height="30" fill="#F7D2C4" rx="10"/>
    <g transform="translate(15,380)">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#666">Learn more about memory allocation</text>
    </g>
  </footer>
</svg>