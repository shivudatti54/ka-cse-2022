<svg width="420" height="400" data-topic-id="directory-structure-protection-file-system-implementation">
  <!-- Title and Footer -->
  <defs>
    <linearGradient id="title-footer-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4C88FF" stop-opacity="1" />
      <stop offset="100%" stop-color="#5C98FF" stop-opacity="1" />
    </linearGradient>
    <rect x="10" y="10" width="400" height="40" fill="url(#title-footer-gradient)" rx="5" />
    <text x="20" y="25" font-size="24" font-family="Arial" font-weight="bold" fill="#fff">Directory Structure, Protection, File System Implementation</text>
    <rect x="10" y="75" width="400" height="40" fill="url(#title-footer-gradient)" rx="5" />
    <text x="20" y="90" font-size="18" font-family="Arial" fill="#fff">File System Structure, File System Operations, File System Internals: File Systems, Files</text>
  </defs>

  <!-- Gradient Background -->
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7EFFF" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#C7EFFF" stop-opacity="0" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#background-gradient)" rx="5" />

  <!-- Section 1: Directory Structure -->
  <g data-narration="Section 1: Directory Structure">
    <rect x="20" y="50" width="380" height="150" fill="#fff" rx="5" />
    <rect x="20" y="50" width="380" height="150" fill="#fff" rx="5" stroke="#ccc" stroke-width="2" />
    <text x="25" y="70" font-size="18" font-family="Arial" font-weight="bold" fill="#333">Directory Structure</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="10s" begin="0s" dur="10s" repeatCount="indefinite" />
    <g fill="#333">
      <ellipse cx="200" cy="100" rx="30" ry="20" fill="#fff" stroke="#ccc" stroke-width="2" />
      <text x="200" y="120" font-size="16" font-family="Arial" fill="#333">Root Directory</text>
      <line x1="150" y1="100" x2="250" y2="100" stroke="#ccc" stroke-width="2" />
      <line x1="150" y1="120" x2="250" y2="120" stroke="#ccc" stroke-width="2" />
      <text x="200" y="150" font-size="16" font-family="Arial" fill="#333">Subdirectories</text>
      <text x="200" y="180" font-size="16" font-family="Arial" fill="#333">Files</text>
    </g>
  </g>

  <!-- Section 2: Protection -->
  <g data-narration="Section 2: Protection">
    <rect x="20" y="230" width="380" height="150" fill="#fff" rx="5" />
    <rect x="20" y="230" width="380" height="150" fill="#fff" rx="5" stroke="#ccc" stroke-width="2" />
    <text x="25" y="250" font-size="18" font-family="Arial" font-weight="bold" fill="#333">Protection</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="0s" dur="10s" repeatCount="indefinite" />
    <g fill="#333">
      <ellipse cx="200" cy="110" rx="30" ry="20" fill="#fff" stroke="#ccc" stroke-width="2" />
      <text x="200" y="130" font-size="16" font-family="Arial" fill="#333">Access Control</text>
      <line x1="150" y1="110" x2="250" y2="110" stroke="#ccc" stroke-width="2" />
      <line x1="150" y1="130" x2="250" y2="130" stroke="#ccc" stroke-width="2" />
      <text x="200" y="150" font-size="16" font-family="Arial" fill="#333">Mandatory Access Control</text>
    </g>
  </g>

  <!-- Section 3: File System Implementation -->
  <g data-narration="Section 3: File System Implementation">
    <rect x="20" y="450" width="380" height="150" fill="#fff" rx="5" />
    <rect x="20" y="450" width="380" height="150" fill="#fff" rx="5" stroke="#ccc" stroke-width="2" />
    <text x="25" y="470" font-size="18" font-family="Arial" font-weight="bold" fill="#333">File System Implementation</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 300" to="360 200 300" dur="10s" begin="0s" dur="10s" repeatCount="indefinite" />
    <g fill="#333">
      <ellipse cx="200" cy="220" rx="30" ry="20" fill="#fff" stroke="#ccc" stroke-width="2" />
      <text x="200" y="240" font-size="16" font-family="Arial" fill="#333">File System Structure</text>
      <line x1="150" y1="220" x2="250" y2="220" stroke="#ccc" stroke-width="2" />
      <line x1="150" y1="240" x2="250" y2="240" stroke="#ccc" stroke-width="2" />
      <text x="200" y="260" font-size="16" font-family="Arial" fill="#333">File System Operations</text>
    </g>
  </g>

  <!-- Section 4: File System Internals -->
  <g data-narration="Section 4: File System Internals">
    <rect x="20" y="610" width="380" height="150" fill="#fff" rx="5" />
    <rect x="20" y="610" width="380" height="150" fill="#fff" rx="5" stroke="#ccc" stroke-width="2" />
    <text x="25" y="630" font-size="18" font-family="Arial" font-weight="bold" fill="#333">File System Internals</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 400" to="360 200 400" dur="10s" begin="0s" dur="10s" repeatCount="indefinite" />
    <g fill="#333">
      <ellipse cx="200" cy="330" rx="30" ry="20" fill="#fff" stroke="#ccc" stroke-width="2" />
      <text x="200" y="350" font-size="16" font-family="Arial" fill="#333">File Systems</text>
      <line x1="150" y1="330" x2="250" y2="330" stroke="#ccc" stroke-width="2" />
      <line x1="150" y1="350" x2="250" y2="350" stroke="#ccc" stroke-width="2" />
      <text x="200" y="370" font-size="16" font-family="Arial" fill="#333">Files</text>
    </g>
  </g>

  <!-- Section 5: Files -->
  <g data-narration="Section 5: Files">
    <rect x="20" y="770" width="380" height="150" fill="#fff" rx="5" />
    <rect x="20" y="770" width="380" height="150" fill="#fff" rx="5" stroke="#ccc" stroke-width="2" />
    <text x="25" y="790" font-size="18" font-family="Arial" font-weight="bold" fill="#333">Files</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 500" to="360 200 500" dur="10s" begin="0s" dur="10s" repeatCount="indefinite" />
    <g fill="#333">
      <ellipse cx="200" cy="420" rx="30" ry="20" fill="#fff" stroke="#ccc" stroke-width="2" />
      <text x="200" y="440" font-size="16" font-family="Arial" fill="#333">File Properties</text>
      <line x1="150" y1="420" x2="250" y2="420" stroke="#ccc" stroke-width="2" />
      <line x1="150" y1="440" x2="250" y2="440" stroke="#ccc" stroke-width="2" />
      <text x="200" y="460" font-size="16" font-family="Arial" fill="#333">File Operations</text>
    </g>
  </g>

  <!-- Arrow Markers for Connections -->
  <path id="arrow-1" d="M 150 100 L 250 100" stroke="#ccc" stroke-width="2" fill="none" />
  <path id="arrow-2" d="M 150 120 L 250 120" stroke="#ccc" stroke-width="2" fill="none" />
  <path id="arrow-3" d="M 150 100 L 200 300" stroke="#ccc" stroke-width="2" fill="none" />
  <path id="arrow-4" d="M 150 220 L 250 220" stroke="#ccc" stroke-width="2" fill="none" />
  <path id="arrow-5" d="M 150 330 L 200 500" stroke="#ccc" stroke-width="2" fill="none" />
  <path id="arrow-6" d="M 150 420 L 250 420" stroke="#ccc" stroke-width="2" fill="none" />

  <!-- Smooth Animations -->
  <animateTransform id="animation-1" attributeName="transform" type="rotate" from="0 200 100" to="360 200 100" dur="10s" begin="0s" dur="10s" repeatCount="indefinite" />
  <animateTransform id="animation-2" attributeName="transform" type="rotate" from="0 200 120" to="360 200 120" dur="10s" begin="0s" dur="10s" repeatCount="indefinite" />
  <animateTransform id="animation-3" attributeName="transform" type="rotate" from="0 200 300" to="360 200 300" dur="10s" begin="0s" dur="10s" repeatCount="indefinite" />
  <animateTransform id="animation-4" attributeName="transform" type="rotate" from="0 200 220" to="360 200 220" dur="10s" begin="0s" dur="10s" repeatCount="indefinite" />
  <animateTransform id="animation-5" attributeName="transform" type="rotate" from="0 200 500" to="360 200 500" dur="10s" begin="0s" dur="10s" repeatCount="indefinite" />
  <animateTransform id="animation-6" attributeName="transform" type="rotate" from="0 200 420" to="360 200 420" dur="10s" begin="0s" dur="10s" repeatCount="indefinite" />
</svg>