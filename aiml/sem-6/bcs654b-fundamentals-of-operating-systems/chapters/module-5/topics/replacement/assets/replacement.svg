<svg width="420" height="400" data-topic-id="replacement-algorithms">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A8DFF"/>
      <stop offset="50%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#8BC34A"/>
    </linearGradient>
  </defs>

  <rect fill="url(#gradient)" x="0" y="0" width="420" height="400" rx="20"/>

  <g transform="translate(20, 20)">
    <rect fill="#87CEEB" x="0" y="0" width="200" height="40" rx="10"/>
    <g transform="translate(10, 10)">
      <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Page Fault</text>
      <animate transform="translate(0, 40)" begin="0s" dur="1s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(10, 70)">
      <text x="10" y="85" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Check if Page is in Memory</text>
      <animate transform="translate(0, 110)" begin="0.5s" dur="1s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(10, 110)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#8BC34A" stroke-width="2"/>
      <animate transform="translate(0, 30)" begin="1s" dur="1s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(10, 150)">
      <text x="10" y="165" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Is there a Free Frame?</text>
      <animate transform="translate(0, 195)" begin="1.5s" dur="1s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(10, 195)">
      <rect fill="#8BC34A" x="0" y="0" width="200" height="40" rx="10"/>
      <g transform="translate(10, 205)">
        <text x="10" y="220" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Select a Victim Frame</text>
        <animate transform="translate(0, 250)" begin="2.5s" dur="1s" repeatCount="indefinite"/>
      </g>
    </g>
    <g transform="translate(220, 20)">
      <rect fill="#87CEEB" x="0" y="0" width="200" height="40" rx="10"/>
      <g transform="translate(10, 10)">
        <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Bring Desired Page into Memory</text>
        <animate transform="translate(0, 40)" begin="0s" dur="1s" repeatCount="indefinite"/>
      </g>
      <g transform="translate(10, 70)">
        <text x="10" y="85" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Update Page Table and Frame Table</text>
        <animate transform="translate(0, 110)" begin="0.5s" dur="1s" repeatCount="indefinite"/>
      </g>
      <g transform="translate(10, 110)">
        <line x1="0" y1="0" x2="0" y2="10" stroke="#8BC34A" stroke-width="2"/>
        <animate transform="translate(0, 30)" begin="1s" dur="1s" repeatCount="indefinite"/>
      </g>
      <g transform="translate(10, 150)">
        <text x="10" y="165" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Restart Instruction</text>
        <animate transform="translate(0, 195)" begin="1.5s" dur="1s" repeatCount="indefinite"/>
      </g>
    </g>
  </g>

  <g transform="translate(20, 350)">
    <text x="0" y="375" font-size="24" font-family="Arial, sans-serif" text-anchor="start">Replacement Algorithms</text>
    <animate transform="translate(0, 400)" begin="0s" dur="1s" repeatCount="indefinite"/>
  </g>
</svg>