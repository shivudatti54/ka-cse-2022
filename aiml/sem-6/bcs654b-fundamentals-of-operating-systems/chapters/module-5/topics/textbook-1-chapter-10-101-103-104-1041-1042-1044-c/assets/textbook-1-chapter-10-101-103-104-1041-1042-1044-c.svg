<svg width="420" height="400" data-topic-id="virtual-memory-management-background-101-103-104-1041-1042-1044">
  <style>
    /* Gradient background */
    .background {
      fill: #66CCCC;
      stroke: #FFFFFF;
      stroke-width: 2;
    }

    /* Section styles */
    .section {
      stroke: #2F4F7F;
      stroke-width: 2;
      margin: 10;
    }

    /* Annotation styles */
    .annotation {
      fill: #2F4F7F;
      font-size: 12;
    }

    /* Arrow marker styles */
    .arrow {
      fill: #2F4F7F;
      stroke: #666666;
      stroke-width: 2;
    }

    /* Title and footer styles */
    .title {
      fill: #666666;
      font-size: 18;
      position: absolute;
      top: 10;
      left: 10;
      right: 10;
      bottom: 10;
    }

    .footer {
      fill: #666666;
      font-size: 12;
      position: absolute;
      bottom: 10;
      left: 10;
      right: 10;
    }
  </style>

  <rect class="background" x="0" y="0" width="420" height="400" rx="10"></rect>

  <!-- Title -->
  <g class="title">
    <text x="150" y="40" font-size="18">Virtual Memory Management</text>
  </g>

  <!-- Section 1 -->
  <g class="section" data-narration="10.1 Introduction to Virtual Memory">
    <rect x="10" y="60" width="400" height="100" rx="10"></rect>
    <text x="20" y="80" font-size="14">Virtual memory is a memory management technique that allows a computer to use more memory than is physically available in the system's RAM.</text>
    <text x="20" y="120" font-size="14">It does this by temporarily transferring pages of memory to a storage device, such as a hard drive, when the RAM is full.</text>
    <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" fill="freeze">
      <rect x="20" y="150" width="80" height="30" fill="#66CCCC" rx="10"></rect>
      <animateTransform transform="rotate(90 20 150)" begin="0s" dur="2s" fill="freeze"></animateTransform>
    </animate>
    <g class="arrow">
      <line x1="100" y1="150" x2="220" y2="150"></line>
    </g>
  </g>

  <!-- Section 2 -->
  <g class="section" data-narration="10.2 Demand Paging">
    <rect x="10" y="200" width="400" height="150" rx="10"></rect>
    <text x="20" y="220" font-size="14">Demand paging is a technique used in virtual memory management to minimize the number of pages that need to be transferred to disk.</text>
    <text x="20" y="250" font-size="14">It works by loading pages into RAM as needed, replacing pages in RAM with new pages when the RAM is full, and transferring pages from disk to RAM only when they are needed.</text>
    <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" fill="freeze">
      <rect x="20" y="280" width="80" height="30" fill="#66CCCC" rx="10"></rect>
      <animateTransform transform="rotate(90 20 280)" begin="0s" dur="2s" fill="freeze"></animateTransform>
    </animate>
    <g class="arrow">
      <line x1="100" y1="280" x2="220" y2="280"></line>
    </g>
  </g>

  <!-- Section 3 -->
  <g class="section" data-narration="10.3 Page Replacement Algorithms">
    <rect x="10" y="350" width="400" height="150" rx="10"></rect>
    <text x="20" y="370" font-size="14">Page replacement algorithms are used to decide which pages to replace in RAM when the RAM is full.</text>
    <text x="20" y="400" font-size="14">There are several algorithms, including FIFO, LRU, and Optimal.</text>
    <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" fill="freeze">
      <rect x="20" y="420" width="80" height="30" fill="#66CCCC" rx="10"></rect>
      <animateTransform transform="rotate(90 20 420)" begin="0s" dur="2s" fill="freeze"></animateTransform>
    </animate>
    <g class="arrow">
      <line x1="100" y1="420" x2="220" y2="420"></line>
    </g>
  </g>

  <!-- Section 4 -->
  <g class="section" data-narration="10.4 Copy-on-Write">
    <rect x="10" y="470" width="400" height="150" rx="10"></rect>
    <text x="20" y="490" font-size="14">Copy-on-write is a technique used to minimize the number of pages that need to be transferred to disk.</text>
    <text x="20" y="520" font-size="14">It works by creating a copy of a page in RAM when it is modified.</text>
    <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" fill="freeze">
      <rect x="20" y="550" width="80" height="30" fill="#66CCCC" rx="10"></rect>
      <animateTransform transform="rotate(90 20 550)" begin="0s" dur="2s" fill="freeze"></animateTransform>
    </animate>
    <g class="arrow">
      <line x1="100" y1="550" x2="220" y2="550"></line>
    </g>
  </g>

  <!-- Footer -->
  <g class="footer">
    <text x="150" y="380" font-size="12">Virtual Memory Management</text>
  </g>
</svg>