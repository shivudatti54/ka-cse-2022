<svg width="420" height="400" data-topic-id="file-sharing" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="background-image:-linear-gradient(to bottom, #C7E4FA, #87CEEB);">
  <title>File Sharing</title>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7E4FA" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" style="fill:linear-gradient(to bottom, #87CEEB, #C7E4FA);" rx="10" />
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="400" height="350" style="fill:rgba(0, 0, 0, 0.2);" rx="10" />
    <rect x="0" y="0" width="400" height="30" style="fill:rgba(0, 0, 0, 0.2);" rx="10" />
    <g transform="scale(1.1)">
      <g data-narration="Threat Intelligence Sharing">
        <rect x="0" y="0" width="100" height="30" style="fill:rgba(0, 0, 0, 0.2);" rx="10" />
        <text x="15" y="10" font-size="14" font-family="Arial" font-style="normal" font-weight="normal" text-anchor="middle" fill="#000">
          Threat Intelligence Sharing
        </text>
      </g>
      <g>
        <rect x="110" y="0" width="100" height="30" style="fill:rgba(0, 0, 0, 0.2);" rx="10" />
        <text x="115" y="10" font-size="14" font-family="Arial" font-style="normal" font-weight="normal" text-anchor="middle" fill="#000">
          What is Threat Intelligence Sharing?
        </text>
        <animate transform="translate(0, 10) scale(1.1)" begin="100ms" dur="500ms" fill="freeze" />
      </g>
      <g>
        <rect x="220" y="0" width="100" height="30" style="fill:rgba(0, 0, 0, 0.2);" rx="10" />
        <text x="225" y="10" font-size="14" font-family="Arial" font-style="normal" font-weight="normal" text-anchor="middle" fill="#000">
          Benefits of Threat Intelligence Sharing
        </text>
        <animate transform="translate(0, 10) scale(1.1)" begin="200ms" dur="500ms" fill="freeze" />
      </g>
      <g>
        <rect x="330" y="0" width="100" height="30" style="fill:rgba(0, 0, 0, 0.2);" rx="10" />
        <text x="335" y="10" font-size="14" font-family="Arial" font-style="normal" font-weight="normal" text-anchor="middle" fill="#000">
          Examples of Threat Intelligence Sharing
        </text>
        <animate transform="translate(0, 10) scale(1.1)" begin="300ms" dur="500ms" fill="freeze" />
      </g>
      <g>
        <rect x="0" y="140" width="100" height="30" style="fill:rgba(0, 0, 0, 0.2);" rx="10" />
        <text x="5" y="150" font-size="14" font-family="Arial" font-style="normal" font-weight="normal" text-anchor="middle" fill="#000">
          Sharing Models and Communities
        </text>
        <animate transform="translate(0, 20) scale(1.1)" begin="400ms" dur="500ms" fill="freeze" />
      </g>
      <g>
        <rect x="110" y="140" width="100" height="30" style="fill:rgba(0, 0, 0, 0.2);" rx="10" />
        <text x="115" y="150" font-size="14" font-family="Arial" font-style="normal" font-weight="normal" text-anchor="middle" fill="#000">
          Types of Sharing
        </text>
        <animate transform="translate(0, 20) scale(1.1)" begin="500ms" dur="500ms" fill="freeze" />
      </g>
      <g>
        <rect x="220" y="140" width="100" height="30" style="fill:rgba(0, 0, 0, 0.2);" rx="10" />
        <text x="225" y="150" font-size="14" font-family="Arial" font-style="normal" font-weight="normal" text-anchor="middle" fill="#000">
          Sharing Models
        </text>
        <animate transform="translate(0, 20) scale(1.1)" begin="600ms" dur="500ms" fill="freeze" />
      </g>
      <g>
        <rect x="330" y="140" width="100" height="30" style="fill:rgba(0, 0, 0, 0.2);" rx="10" />
        <text x="335" y="150" font-size="14" font-family="Arial" font-style="normal" font-weight="normal" text-anchor="middle" fill="#000">
          Benefits of Sharing
        </text>
        <animate transform="translate(0, 20) scale(1.1)" begin="700ms" dur="500ms" fill="freeze" />
      </g>
      <g>
        <rect x="0" y="280" width="100" height="30" style="fill:rgba(0, 0, 0, 0.2);" rx="10" />
        <text x="5" y="290" font-size="14" font-family="Arial" font-style="normal" font-weight="normal" text-anchor="middle" fill="#000">
          Cost Efficiency
        </text>
        <animate transform="translate(0, 30) scale(1.1)" begin="800ms" dur="500ms" fill="freeze" />
      </g>
      <g>
        <rect x="110" y="280" width="100" height="30" style="fill:rgba(0, 0, 0, 0.2);" rx="10" />
        <text x="115" y="290" font-size="14" font-family="Arial" font-style="normal" font-weight="normal" text-anchor="middle" fill="#000">
          Speed and Scale
        </text>
        <animate transform="translate(0, 30) scale(1.1)" begin="900ms" dur="500ms" fill="freeze" />
      </g>
      <g>
        <rect x="220" y="280" width="100" height="30" style="fill:rgba(0, 0, 0, 0.2);" rx="10" />
        <text x="225" y="290" font-size="14" font-family="Arial" font-style="normal" font-weight="normal" text-anchor="middle" fill="#000">
          Context is King
        </text>
        <animate transform="translate(0, 30) scale(1.1)" begin="1000ms" dur="500ms" fill="freeze" />
      </g>
      <g>
        <rect x="330" y="280" width="100" height="30" style="fill:rgba(0, 0, 0, 0.2);" rx="10" />
        <text x="335" y="290" font-size="14" font-family="Arial" font-style="normal" font-weight="normal" text-anchor="middle" fill="#000">
          Conclusion
        </text>
        <animate transform="translate(0, 30) scale(1.1)" begin="1100ms" dur="500ms" fill="freeze" />
      </g>
      <line x1="200" y1="350" x2="220" y2="360" style="stroke:rgba(0, 0, 0, 0.2);" stroke-width="2" />
      <line x1="200" y1="360" x2="220" y2="350" style="stroke:rgba(0, 0, 0, 0.2);" stroke-width="2" />
      <line x1="200" y1="370" x2="220" y2="380" style="stroke:rgba(0, 0, 0, 0.2);" stroke-width="2" />
      <line x1="200" y1="380" x2="220" y2="370" style="stroke:rgba(0, 0, 0, 0.2);" stroke-width="2" />
    </g>
  </svg>