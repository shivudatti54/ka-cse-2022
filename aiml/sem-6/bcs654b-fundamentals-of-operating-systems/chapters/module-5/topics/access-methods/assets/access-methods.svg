<svg width="420" height="400" data-topic-id="access-methods" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="access-methods-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7d9f7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a1c9f2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#access-methods-gradient)" rx="10"/>
  
  <!-- Section 1: Introduction -->
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="380" height="100" fill="#f7f7f7" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#333" text-anchor="start">
      Introduction to Access Methods
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 20" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 2: Empathize -->
  <g transform="translate(20, 140)">
    <rect x="0" y="0" width="380" height="100" fill="#f7f7f7" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#333" text-anchor="start">
      Empathize: Understanding User Needs
    </text>
    <rect x="10" y="40" width="30" height="30" fill="#c7d9f7" rx="10" stroke="#333" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0 140" to="0 120" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 3: Define -->
  <g transform="translate(20, 180)">
    <rect x="0" y="0" width="380" height="100" fill="#f7f7f7" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#333" text-anchor="start">
      Define: Synthesizing Research Findings
    </text>
    <rect x="10" y="40" width="30" height="30" fill="#a1c9f2" rx="10" stroke="#333" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0 180" to="0 160" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 4: Ideate -->
  <g transform="translate(20, 220)">
    <rect x="0" y="0" width="380" height="100" fill="#f7f7f7" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#333" text-anchor="start">
      Ideate: Brainstorming Potential Solutions
    </text>
    <rect x="10" y="40" width="30" height="30" fill="#f7f7f7" rx="10" stroke="#333" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0 220" to="0 200" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 5: Prototype -->
  <g transform="translate(20, 260)">
    <rect x="0" y="0" width="380" height="100" fill="#f7f7f7" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#333" text-anchor="start">
      Prototype: Creating Tangible Representations
    </text>
    <rect x="10" y="40" width="30" height="30" fill="#f7f7f7" rx="10" stroke="#333" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0 260" to="0 240" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 6: Test -->
  <g transform="translate(20, 300)">
    <rect x="0" y="0" width="380" height="100" fill="#f7f7f7" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#333" text-anchor="start">
      Test: Validating Solutions with Real Users
    </text>
    <rect x="10" y="40" width="30" height="30" fill="#f7f7f7" rx="10" stroke="#333" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0 300" to="0 280" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Footer -->
  <g transform="translate(20, 340)">
    <rect x="0" y="0" width="380" height="60" fill="#f7f7f7" rx="10"/>
    <text x="10" y="30" font-size="18" font-family="Arial" fill="#333" text-anchor="start">
      This Diagram Illustrates the Access Methods in User Research
    </text>
  </g>
</svg>