<svg width="420" height="400" data-topic-id="partition-and-mounting">
  <style>
    /* Add styles to the SVG element */
    body {
      background-image: linear-gradient(to bottom, #7A8FCE, #5C7EB8, #96BCE3);
      font-family: Arial, sans-serif;
    }
  </style>
  <title>Partitional Clustering and K-Means</title>
  <desc>
    Partitional Clustering and K-Means Algorithm
  </desc>
  <defs>
    <!-- Add definitions for shapes and colors -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A8FCE" stop-opacity="1"/>
      <stop offset="50%" stop-color="#5C7EB8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#96BCE3" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <!-- Background shape -->
  <rect x="10" y="10" width="400" height="380" fill="url(#grad)"/>
  <!-- Section 1: Introduction to Clustering -->
  <rect x="10" y="40" width="380" height="80" style="background-color: #F7F7F7; border: 1px solid #CCC;">
    <title>Introduction to Clustering</title>
    <text x="160" y="30" font-size="18" font-family="Arial" fill="#333">Clustering is an unsupervised learning technique used to group similar objects.</text>
  </rect>
  <animate transform="rotate(360 180 180)" begin="0s" dur="2s" repeat="indefinite"/>
  <!-- Section 2: Types of Clustering Approaches -->
  <rect x="10" y="140" width="380" height="80" style="background-color: #F7F7F7; border: 1px solid #CCC;">
    <title>Types of Clustering Approaches</title>
    <text x="160" y="130" font-size="18" font-family="Arial" fill="#333">There are four main types of clustering approaches: Hierarchical, Partitional, Density-based, and Grid-based.</text>
  </rect>
  <animate transform="rotate(360 180 180)" begin="2s" dur="2s" repeat="indefinite"/>
  <!-- Section 3: Partitional Clustering -->
  <rect x="10" y="240" width="380" height="80" style="background-color: #F7F7F7; border: 1px solid #CCC;">
    <title>Partitional Clustering</title>
    <text x="160" y="230" font-size="18" font-family="Arial" fill="#333">Partitional clustering divides data into non-overlapping subsets (clusters) without any hierarchical structure.</text>
  </rect>
  <animate transform="rotate(360 180 180)" begin="4s" dur="2s" repeat="indefinite"/>
  <!-- Section 4: K-Means Algorithm -->
  <rect x="10" y="340" width="380" height="80" style="background-color: #F7F7F7; border: 1px solid #CCC;">
    <title>K-Means Algorithm</title>
    <text x="160" y="330" font-size="18" font-family="Arial" fill="#333">K-Means is the most popular partitional clustering algorithm, which is an iterative, centroid-based technique.</text>
  </rect>
  <animate transform="rotate(360 180 180)" begin="6s" dur="2s" repeat="indefinite"/>
  <!-- Section 5: Centroid and Within-Cluster Sum of Squares -->
  <rect x="10" y="440" width="380" height="80" style="background-color: #F7F7F7; border: 1px solid #CCC;">
    <title>Centroid and Within-Cluster Sum of Squares</title>
    <text x="160" y="430" font-size="18" font-family="Arial" fill="#333">The centroid is the mean position of all points in the cluster, and the within-cluster sum of squares (WCSS) measures the quality of a partition.</text>
  </rect>
  <animate transform="rotate(360 180 180)" begin="8s" dur="2s" repeat="indefinite"/>
  <!-- Section 6: Applications and Advantages -->
  <rect x="10" y="540" width="380" height="80" style="background-color: #F7F7F7; border: 1px solid #CCC;">
    <title>Applications and Advantages</title>
    <text x="160" y="530" font-size="18" font-family="Arial" fill="#333">K-Means has various applications in data analysis, pattern recognition, and machine learning, and it is also highly efficient.</text>
  </rect>
  <animate transform="rotate(360 180 180)" begin="10s" dur="2s" repeat="indefinite"/>
  <!-- Footer -->
  <text x="10" y="380" font-size="18" font-family="Arial" fill="#333">Partition and Mounting</text>
  <text x="10" y="400" font-size="18" font-family="Arial" fill="#333">Data-Topic-Id: partition-and-mounting</text>
</svg>