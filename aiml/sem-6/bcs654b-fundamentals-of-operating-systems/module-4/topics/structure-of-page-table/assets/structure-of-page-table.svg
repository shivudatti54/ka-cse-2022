<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="1" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to the Structure of Page Table">
    <text x="50" y="50" font-size="24" fill="#2563eb">Structure of Page Table</text>
    <rect x="50" y="100" width="200" height="50" fill="#10b981" rx="10"/>
    <text x="60" y="135" font-size="18" fill="#ffffff">Page Table</text>
  </g>
  <g id="step1" data-narration="Page Table Entry (PTE)">
    <use href="#step0" />
    <rect x="300" y="100" width="200" height="50" fill="#f59e0b" rx="10"/>
    <text x="310" y="135" font-size="18" fill="#ffffff">Page Table Entry (PTE)</text>
    <line x1="250" y1="125" x2="300" y2="125" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <g id="step2" data-narration="Page Frame">
    <use href="#step1" />
    <rect x="550" y="100" width="200" height="50" fill="#2563eb" rx="10"/>
    <text x="560" y="135" font-size="18" fill="#ffffff">Page Frame</text>
    <line x1="500" y1="125" x2="550" y2="125" stroke="#10b981" stroke-width="2"/>
  </g>
  <g id="step3" data-narration="Page Table Structure">
    <use href="#step2" />
    <rect x="50" y="250" width="200" height="50" fill="#f59e0b" rx="10"/>
    <text x="60" y="285" font-size="18" fill="#ffffff">Page Directory</text>
    <line x1="250" y1="275" x2="300" y2="275" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="300" y="250" width="200" height="50" fill="#10b981" rx="10"/>
    <text x="310" y="285" font-size="18" fill="#ffffff">Page Table</text>
  </g>
  <g id="step4" data-narration="Page Fault">
    <use href="#step3" />
    <rect x="550" y="250" width="200" height="50" fill="#2563eb" rx="10"/>
    <text x="560" y="285" font-size="18" fill="#ffffff">Page Fault</text>
    <line x1="500" y1="275" x2="550" y2="275" stroke="#10b981" stroke-width="2"/>
  </g>
  <g id="step5" data-narration="Page Replacement Algorithms">
    <use href="#step4" />
    <rect x="50" y="400" width="200" height="50" fill="#f59e0b" rx="10"/>
    <text x="60" y="435" font-size="18" fill="#ffffff">Optimal Algorithm</text>
    <rect x="300" y="400" width="200" height="50" fill="#10b981" rx="10"/>
    <text x="310" y="435" font-size="18" fill="#ffffff">LRU Algorithm</text>
    <rect x="550" y="400" width="200" height="50" fill="#2563eb" rx="10"/>
    <text x="560" y="435" font-size="18" fill="#ffffff">FIFO Algorithm</text>
  </g>
</svg>