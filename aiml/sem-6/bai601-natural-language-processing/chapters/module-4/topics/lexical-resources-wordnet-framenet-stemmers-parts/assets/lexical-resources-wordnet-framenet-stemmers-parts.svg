<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400">
    <!-- Gradient Background -->
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#c7d2f2" stop-opacity="1" />
            <stop offset="50%" stop-color="#b2e6ce" stop-opacity="1" />
            <stop offset="100%" stop-color="#a1c9f2" stop-opacity="1" />
        </linearGradient>
    </defs>
    <rect fill="url(#pastel-gradient)" width="420" height="400" rx="10" />

    <!-- Title -->
    <g transform="translate(20, 20)">
        <text data-narration="Title" fill="#2f4f7f" font-size="24" font-family="Arial, sans-serif" text-anchor="start">
            Lexical Resources Wordnet Framenet Stemmers Parts
        </text>
    </g>

    <!-- Section 1: WordNet -->
    <g transform="translate(50, 80)">
        <rect width="300" height="40" rx="5" fill="#f7f7f7" />
        <text data-narration="WordNet" fill="#2f4f7f" font-size="18" font-family="Arial, sans-serif" text-anchor="start" x="10">
            WordNet is a large lexical database for the English language that provides a network of synonyms, antonyms, hyponyms, and other semantic relationships between words.
        </text>
        <animate transform="rotate(360 300 20)" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>

    <!-- Section 2: FrameNet -->
    <g transform="translate(50, 140)">
        <rect width="300" height="40" rx="5" fill="#f7f7f7" />
        <text data-narration="FrameNet" fill="#2f4f7f" font-size="18" font-family="Arial, sans-serif" text-anchor="start" x="10">
            FrameNet is a lexical database that represents the meaning of words in terms of frames, which are conceptual structures that capture the relationships between entities and actions.
        </text>
        <animate transform="rotate(360 300 140)" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>

    <!-- Section 3: Stemmers -->
    <g transform="translate(50, 200)">
        <rect width="300" height="40" rx="5" fill="#f7f7f7" />
        <text data-narration="Stemmers" fill="#2f4f7f" font-size="18" font-family="Arial, sans-serif" text-anchor="start" x="10">
            Stemmers are algorithms that reduce words to their base form, known as stems, to facilitate word analysis and comparison.
        </text>
        <animate transform="rotate(360 300 200)" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>

    <!-- Section 4: Parts-of-Speech Tagger -->
    <g transform="translate(50, 260)">
        <rect width="300" height="40" rx="5" fill="#f7f7f7" />
        <text data-narration="Parts-of-Speech Tagger" fill="#2f4f7f" font-size="18" font-family="Arial, sans-serif" text-anchor="start" x="10">
            A Parts-of-Speech Tagger is a tool that identifies the grammatical category of each word in a sentence, such as noun, verb, adjective, etc.
        </text>
        <animate transform="rotate(360 300 260)" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>

    <!-- Section 5: Research Corpora -->
    <g transform="translate(50, 320)">
        <rect width="300" height="40" rx="5" fill="#f7f7f7" />
        <text data-narration="Research Corpora" fill="#2f4f7f" font-size="18" font-family="Arial, sans-serif" text-anchor="start" x="10">
            Research Corpora are collections of texts that are used to train and evaluate NLP models, such as language models and sentiment analyzers.
        </text>
        <animate transform="rotate(360 300 320)" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>

    <!-- Footer -->
    <g transform="translate(20, 380)">
        <text data-narration="Footer" fill="#2f4f7f" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
            Created with love for educational purposes.
        </text>
    </g>
</svg>