<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      .step.active { opacity: 1; transition: opacity 0.5s; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; fill: #2C3E50; }
      .label { font-size: 16px; fill: #34495E; }
      .sublabel { font-size: 13px; fill: #7F8C8D; }
    </style>
  </defs>

  <g class="step" data-step="1" data-narration="This diagram illustrates the key concepts of custer model of information retrieval.">
    <text x="400" y="40" class="title" text-anchor="middle">Custer Model of Information Retrieval</text>
  </g>
  <g class="step" data-step="2" data-narration="Understanding Query Input as the foundational component of this concept.">
    <rect x="200" y="120" width="400" height="60" fill="#F4E8F8" stroke="#9B59B6" stroke-width="2" rx="5"/>
    <text x="400" y="158" class="label" text-anchor="middle">Query Input</text>
  </g>
  <g class="step" data-step="3" data-narration="The next step involves Term Weighting, which builds upon the previous components.">
    <rect x="200" y="200" width="400" height="60" fill="#F4E8F8" stroke="#9B59B6" stroke-width="2" rx="5"/>
    <text x="400" y="238" class="label" text-anchor="middle">Term Weighting</text>
    <path d="M 400 180 L 400 200" stroke="#6B3A86" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g class="step" data-step="4" data-narration="The next step involves Similarity Calculation, which builds upon the previous components.">
    <rect x="200" y="280" width="400" height="60" fill="#F4E8F8" stroke="#9B59B6" stroke-width="2" rx="5"/>
    <text x="400" y="318" class="label" text-anchor="middle">Similarity Calculation</text>
    <path d="M 400 260 L 400 280" stroke="#6B3A86" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g class="step" data-step="5" data-narration="The next step involves Relevance Probability Estimation, which builds upon the previous components.">
    <rect x="200" y="360" width="400" height="60" fill="#F4E8F8" stroke="#9B59B6" stroke-width="2" rx="5"/>
    <text x="400" y="398" class="label" text-anchor="middle">Relevance Probability Estimation</text>
    <path d="M 400 340 L 400 360" stroke="#6B3A86" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g class="step" data-step="6" data-narration="Finally, Ranked Document Output completes the overall process and delivers the result.">
    <rect x="200" y="440" width="400" height="60" fill="#F4E8F8" stroke="#9B59B6" stroke-width="2" rx="5"/>
    <text x="400" y="478" class="label" text-anchor="middle">Ranked Document Output</text>
    <path d="M 400 420 L 400 440" stroke="#6B3A86" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2E5C8A"/>
    </marker>
  </defs>
</svg>