<svg width="420" height="400" data-topic-id="textbook-1-ch">
  <title>Natural Language Processing</title>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="100" height="40" fill="#2E4053" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin=".0s"/>
    <text x="50" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#86C9E7">What is Natural Language Processing?</text>
    <animate attributeName="opacity" from="1" to="0" dur="2s" begin=".0s"/>
  </g>
  <g transform="translate(120, 10)">
    <rect x="0" y="0" width="100" height="40" fill="#2E4053" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin=".0s"/>
    <text x="50" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#86C9E7">Definition</text>
    <animate attributeName="opacity" from="1" to="0" dur="2s" begin=".0s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin=".2s"/>
    <text x="50" y="50" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#86C9E7" data-narration="NLP is a field of artificial intelligence that deals with the interaction between computers and humans in natural language.">
      <tspan x="50" y="70">NLP is a field of artificial intelligence</tspan>
      <tspan x="50" y="90">that deals with the interaction</tspan>
      <tspan x="50" y="110">between computers and humans</tspan>
      <tspan x="50" y="130">in natural language.</tspan>
    </text>
  </g>
  <g transform="translate(240, 10)">
    <rect x="0" y="0" width="100" height="40" fill="#2E4053" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin=".0s"/>
    <text x="50" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#86C9E7">Language and Knowledge</text>
    <animate attributeName="opacity" from="1" to="0" dur="2s" begin=".0s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin=".2s"/>
    <text x="50" y="50" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#86C9E7" data-narration="Language is a fundamental aspect of human communication, and it is closely tied to knowledge. NLP is concerned with the relationship between language and knowledge, and how computers can be used to acquire and process knowledge.">
      <tspan x="50" y="70">Language is a fundamental</tspan>
      <tspan x="50" y="90">aspect of human</tspan>
      <tspan x="50" y="110">communication,</tspan>
      <tspan x="50" y="130">and it is</tspan>
      <tspan x="50" y="150">closely tied to</tspan>
      <tspan x="50" y="170">knowledge.</tspan>
      <tspan x="50" y="190">NLP is concerned with</tspan>
      <tspan x="50" y="210">the relationship</tspan>
      <tspan x="50" y="230">between language</tspan>
      <tspan x="50" y="250">and knowledge,</tspan>
      <tspan x="50" y="270">and how computers</tspan>
      <tspan x="50" y="290">can be used</tspan>
      <tspan x="50" y="310">to acquire and</tspan>
      <tspan x="50" y="330">process knowledge.</tspan>
    </text>
  </g>
  <g transform="translate(420, 10)">
    <rect x="0" y="0" width="100" height="40" fill="#2E4053" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin=".0s"/>
    <text x="50" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#86C9E7">Key Concepts</text>
    <animate attributeName="opacity" from="1" to="0" dur="2s" begin=".0s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin=".2s"/>
    <text x="50" y="50" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#86C9E7" data-narration="- Natural Language: Human language, including spoken and written language.
- Artificial Intelligence: The development of computer systems that can perform tasks that would typically require human intelligence.
- Knowledge Representation: The way in which knowledge is represented and organized in a computer system.
- Language Understanding: The ability of a computer system to understand the meaning of natural language.">
      <tspan x="50" y="70">- Natural</tspan>
      <tspan x="50" y="90">Language:</tspan>
      <tspan x="50" y="110">human language, including spoken and written language.</tspan>
      <tspan x="50" y="130">- Artificial</tspan>
      <tspan x="50" y="150">Intelligence:</tspan>
      <tspan x="50" y="170">The development of computer systems that can perform tasks that would typically require human intelligence.</tspan>
      <tspan x="50" y="190">- Knowledge</tspan>
      <tspan x="50" y="210">Representation:</tspan>
      <tspan x="50" y="230">The way in which knowledge is represented and organized in a computer system.</tspan>
      <tspan x="50" y="250">- Language</tspan>
      <tspan x="50" y="270">Understanding:</tspan>
      <tspan x="50" y="290">The ability of a computer system to understand the meaning of natural language.</tspan>
    </text>
  </g>
  <path d="M 200, 150 L 200, 250" stroke="#2E4053" stroke-width="1" fill="none"/>
  <path d="M 200, 250 L 300, 250" stroke="#2E4053" stroke-width="1" fill="none"/>
  <path d="M 300, 250 L 300, 350" stroke="#2E4053" stroke-width="1" fill="none"/>
  <path d="M 300, 350 L 400, 350" stroke="#2E4053" stroke-width="1" fill="none"/>
  <path d="M 400, 350 L 400, 450" stroke="#2E4053" stroke-width="1" fill="none"/>
  <path d="M 400, 450 L 500, 450" stroke="#2E4053" stroke-width="1" fill="none"/>
  <a href="#" target="_blank">
    <text x="400" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#86C9E7">Learn More</text>
  </a>
  <g transform="translate(10, 10)">
    <path d="M 10, 10 L 10, 400" stroke="#2E4053" stroke-width="1" fill="none"/>
    <path d="M 10, 400 L 420, 400" stroke="#2E4053" stroke-width="1" fill="none"/>
    <path d="M 10, 400 L 10, 10" stroke="#2E4053" stroke-width="1" fill="none"/>
    <g transform="rotate(90 10 10)">
      <path d="M 10, 10 L 10, 400" stroke="#2E4053" stroke-width="1" fill="none"/>
      <path d="M 10, 400 L 420, 400" stroke="#2E4053" stroke-width="1" fill="none"/>
      <path d="M 10, 400 L 10, 10" stroke="#2E4053" stroke-width="1" fill="none"/>
    </g>
  </g>
</svg>