<svg width="420" height="400">
  <!-- Header -->
  <rect x="10" y="10" width="400" height="50" fill="#3498db" rx="10"/>
  <text x="20" y="25" font-size="24" font-family="Arial" fill="#ffffff" text-anchor="middle">Language Modeling: Statistical Language Model</text>
  <text x="20" y="40" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="middle">N-gram Model (unigram, bigram)</text>

  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87ceeb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4682b4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="60" width="420" height="280" fill="url(#gradient)" rx="10"/>
  <rect x="0" y="60" width="420" height="280" fill="#f9f9f9" opacity="0.5" rx="10"/>

  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="10" y="70" width="400" height="50" fill="#87ceeb" rx="10"/>
    <text x="20" y="85" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="middle">Language Modeling: Statistical Language Model</text>
    <animateTransform attributeName="transform" type="translate" from="0 70" to="0 130" dur="2s" begin="0s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0 70" to="0 130" dur="2s" begin="2s" repeatCount="indefinite"/>
  </section>

  <!-- Section 2: Unigram Model -->
  <section data-narration="Unigram Model">
    <rect x="10" y="130" width="400" height="50" fill="#87ceeb" rx="10"/>
    <text x="20" y="145" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="middle">Unigram Model: Probability of each word is independent</text>
    <animateTransform attributeName="transform" type="translate" from="0 130" to="0 180" dur="2s" begin="0s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0 130" to="0 180" dur="2s" begin="2s" repeatCount="indefinite"/>
  </section>

  <!-- Section 3: Bigram Model -->
  <section data-narration="Bigram Model">
    <rect x="10" y="180" width="400" height="50" fill="#87ceeb" rx="10"/>
    <text x="20" y="195" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="middle">Bigram Model: Probability of each word is dependent on the previous word</text>
    <animateTransform attributeName="transform" type="translate" from="0 180" to="0 240" dur="2s" begin="0s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0 180" to="0 240" dur="2s" begin="2s" repeatCount="indefinite"/>
  </section>

  <!-- Section 4: Example -->
  <section data-narration="Example">
    <rect x="10" y="240" width="400" height="50" fill="#87ceeb" rx="10"/>
    <text x="20" y="255" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="middle">Example: Predicting the next word in a sequence</text>
    <animateTransform attributeName="transform" type="translate" from="0 240" to="0 300" dur="2s" begin="0s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0 240" to="0 300" dur="2s" begin="2s" repeatCount="indefinite"/>
  </section>

  <!-- Footer -->
  <rect x="10" y="350" width="400" height="50" fill="#4682b4" rx="10"/>
  <text x="20" y="365" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="middle">Language Modeling: Statistical Language Model</text>
</svg>