<svg width="420" height="400" data-topic-id="the-challenges-of-nlp-language-and-grammar-process" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" version="1.1" xml:space="preserve">
  <!-- Title Section -->
  <defs>
    <linearGradient id="title-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5A68CE" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8C9CE3" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="80" fill="url(#title-gradient)"/>
  <text x="50%" y="40%" font-size="24" font-weight="bold" text-anchor="middle" fill="#8C9CE3">The Challenges of NLP: Language and Grammar</text>
  <text x="50%" y="60%" font-size="18" text-anchor="middle" fill="#8C9CE3">Processing Indian Languages and NLP Applications</text>

  <!-- Section 1: Language and Grammar -->
  <rect x="10" y="120" width="400" height="80" fill="#F7F7F7"/>
  <animate duration="1000" begin="1000ms" attributeName="opacity" from="1" to="0.5"/>
  <text x="20" y="150" font-size="18" data-narration="Language and grammar are complex and dynamic, making it difficult for computers to understand and process natural language." fill="#8C9CE3"/>
  <text x="20" y="170" font-size="18" data-narration="Some of the challenges associated with language and grammar include ambiguity, contextual dependence, homophony, and neologisms." fill="#8C9CE3"/>
  <line x1="200" y1="150" x2="200" y2="170" stroke="#8C9CE3" stroke-width="2" marker-end="url(#arrow-markers)"/>
  <line x1="250" y1="150" x2="250" y2="170" stroke="#8C9CE3" stroke-width="2" marker-end="url(#arrow-markers)"/>
  <animate duration="1000" begin="1500ms" attributeName="opacity" from="0.5" to="1"/>

  <!-- Section 2: Processing Indian Languages -->
  <rect x="10" y="220" width="400" height="80" fill="#F7F7F7"/>
  <animate duration="1000" begin="2000ms" attributeName="opacity" from="1" to="0.5"/>
  <text x="20" y="250" font-size="18" data-narration="Indian languages are known for their complexity and diversity, making it challenging for computers to process them." fill="#8C9CE3"/>
  <text x="20" y="270" font-size="18" data-narration="Some of the challenges associated with processing Indian languages include script and orthography, grammar and syntax, and vocabulary." fill="#8C9CE3"/>
  <line x1="200" y1="250" x2="200" y2="270" stroke="#8C9CE3" stroke-width="2" marker-end="url(#arrow-markers)"/>
  <line x1="250" y1="250" x2="250" y2="270" stroke="#8C9CE3" stroke-width="2" marker-end="url(#arrow-markers)"/>
  <animate duration="1000" begin="2500ms" attributeName="opacity" from="0.5" to="1"/>

  <!-- Section 3: NLP Applications -->
  <rect x="10" y="300" width="400" height="80" fill="#F7F7F7"/>
  <animate duration="1000" begin="3000ms" attributeName="opacity" from="1" to="0.5"/>
  <text x="20" y="330" font-size="18" data-narration="NLP applications are diverse and widespread, but they also face several challenges." fill="#8C9CE3"/>
  <text x="20" y="350" font-size="18" data-narration="Some of the challenges associated with NLP applications include accuracy, context understanding, and handling out-of-vocabulary words." fill="#8C9CE3"/>
  <line x1="200" y1="330" x2="200" y2="350" stroke="#8C9CE3" stroke-width="2" marker-end="url(#arrow-markers)"/>
  <line x1="250" y1="330" x2="250" y2="350" stroke="#8C9CE3" stroke-width="2" marker-end="url(#arrow-markers)"/>
  <animate duration="1000" begin="3500ms" attributeName="opacity" from="0.5" to="1"/>

  <!-- Footer -->
  <rect x="10" y="380" width="400" height="20" fill="#F7F7F7"/>
  <text x="50%" y="395" font-size="18" text-anchor="middle" fill="#8C9CE3">Learn more about NLP and its applications</text>
</svg>