<svg width="420" height="400" data-topic-id="decoder-details-of-the-encoder-decoder-model-trans" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastelGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ACC7F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
    <style>
      .topic-title {
        font-size: 24px;
        font-weight: bold;
        color: #2F4F7F;
      }
      .topic-paragraph {
        font-size: 16px;
        color: #5C6BC0;
      }
      .animation {
        fill: none;
        stroke-width: 2;
