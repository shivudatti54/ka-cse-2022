  </defs>
  <rect width="100%" height="100%" fill="url(#pastelGradient)"/>
  <g transform="translate(10, 10)">
    <text class="topic-title" x="10" y="20">Decoder Details Of The Encoder Decoder Model Trans</text>
    <text class="topic-paragraph" x="10" y="60">A decoder is a crucial component of the encoder-decoder model in machine translation (MT). It is responsible for generating the translated output from the encoded input.</text>
    <rect x="100" y="100" width="200" height="100" fill="#F5F5F5" rx="10" data-narration="What is a Decoder?"/>
    <text x="120" y="120" class="animation" transform="rotate(0) rotateX(0)" fill="#2F4F7F">Decoder Architecture</text>
    <animateTransform attributeName="transform" type="rotate" from="0 120 120" to="360 120 120" dur="5s" begin="0s" repeatCount="indefinite"/>
    <text x="120" y="220" class="animation" transform="rotate(0) rotateX(0)" fill="#2F4F7F">Decoder Weights</text>
    <animateTransform attributeName="transform" type="rotate" from="0 120 220" to="360 120 220" dur="5s" begin="1s" repeatCount="indefinite"/>
    <rect x="100" y="300" width="200" height="100" fill="#F5F5F5" rx="10" data-narration="How Does a Decoder Work?"/>
    <text x="120" y="320" class="animation" transform="rotate(0) rotateX(0)" fill="#2F4F7F">Key Components of a Decoder</text>
    <animateTransform attributeName="transform" type="rotate" from="0 120 320" to="360 120 320" dur="5s" begin="2s" repeatCount="indefinite"/>
    <rect x="100" y="400" width="200" height="100" fill="#F5F5F5" rx="10" data-narration="Details of the Encoder-Decoder Model"/>
    <text x="120" y="420" class="animation" transform="rotate(0) rotateX(0)" fill="#2F4F7F">Encoder-Decoder Model Architecture</text>
    <animateTransform attributeName="transform" type="rotate" from="0 120 420" to="360 120 420" dur="5s" begin="3s" repeatCount="indefinite"/>
    <g transform="translate(10, 10)">
      <text x="10" y="20" class="topic-title">Decoder Details Of The Encoder Decoder Model Trans</text>
      <text x="10" y="60" class="topic-paragraph">A decoder is a crucial component of the encoder-decoder model in machine translation (MT). It is responsible for generating the translated output from the encoded input.</text>
