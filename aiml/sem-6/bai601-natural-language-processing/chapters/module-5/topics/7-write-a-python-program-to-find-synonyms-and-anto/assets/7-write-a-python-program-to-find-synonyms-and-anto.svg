<svg
  width="420"
  height="400"
  data-topic-id="find-synonyms-antonyms-python"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 420 400"
  style="overflow:visible;">
  
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3B5C8B" stop-opacity="1"/>
    </linearGradient>
  </defs>
  
  <!-- Gradient Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title Section -->
  <section data-narration="Introduction">
    <text x="50" y="20" font-size="24" font-family="Arial, sans-serif" fill="#3B5C8B" text-anchor="middle">
      Finding Synonyms and Antonyms using WordNet
    </text>
  </section>
  
  <!-- Step 1: Install required libraries -->
  <section data-narration="Step 1: Install required libraries">
    <rect x="50" y="80" width="320" height="50" fill="#F7F7F7" rx="5"/>
    <text x="55" y="90" font-size="18" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">
      pip install nltk wordnet
    </text>
  </section>
  
  <!-- Step 2: Download WordNet data -->
  <section data-narration="Step 2: Download WordNet data">
    <rect x="50" y="140" width="320" height="50" fill="#F7F7F7" rx="5"/>
    <text x="55" y="150" font-size="18" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">
      nltk.download('wordnet')
    </text>
  </section>
  
  <!-- Step 3: Import required libraries and load WordNet data -->
  <section data-narration="Step 3: Import required libraries and load WordNet data">
    <rect x="50" y="200" width="320" height="50" fill="#F7F7F7" rx="5"/>
    <text x="55" y="210" font-size="18" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">
      from nltk.corpus import wordnet
      import nltk
      nltk.download('wordnet')
    </text>
  </section>
  
  <!-- Function to find synonyms and antonyms -->
  <section data-narration="Function to find synonyms and antonyms">
    <rect x="50" y="260" width="320" height="50" fill="#F7F7F7" rx="5"/>
    <text x="55" y="270" font-size="18" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">
      def find_synonyms_and_antonyms(word):
        synonyms = set()
        antonyms = set()
        for synset in wordnet.synsets(word):
          for lemma in synset.lemmas():
            if lemma.name() != word:
              synonyms.add(lemma.name())
              antonyms
    </text>
  </section>
  
  <!-- Example usage -->
  <section data-narration="Example usage">
    <rect x="50" y="320" width="320" height="50" fill="#F7F7F7" rx="5"/>
    <text x="55" y="330" font-size="18" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">
      print(find_synonyms_and_antonyms('active'))
    </text>
  </section>
  
  <!-- Footer -->
  <footer>
    <rect x="0" y="380" width="420" height="20" fill="#F7F7F7" rx="5"/>
    <text x="10" y="390" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="start">
      &copy; 2023
    </text>
  </footer>
  
  <!-- Animate sections -->
  <animateTransform
    attributeName="transform"
    type="translate"
    from="0 0"
    to="0 400"
    dur="2s"
    begin="1s"
    repeatCount="indefinite"/>
  
  <animateTransform
    attributeName="transform"
    type="translate"
    from="0 400"
    to="0 0"
    dur="2s"
    begin="3s"
    repeatCount="indefinite"/>
  
  <animateTransform
    attributeName="transform"
    type="translate"
    from="0 0"
    to="320 0"
    dur="2s"
    begin="5s"
    repeatCount="indefinite"/>
  
  <animateTransform
    attributeName="transform"
    type="translate"
    from="320 0"
    to="0 0"
    dur="2s"
    begin="7s"
    repeatCount="indefinite"/>
  
</svg>