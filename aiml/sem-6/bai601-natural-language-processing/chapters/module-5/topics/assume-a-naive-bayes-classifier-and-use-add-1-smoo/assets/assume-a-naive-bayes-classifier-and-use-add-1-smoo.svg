<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg">
    <title>Naive Bayes Classifier and Add-1 Smoothing</title>
    <style>
        .gradient {
            background: #6c5ce7;
            background: linear-gradient(to bottom, #6495ed, #6495ed, #6495ed);
        }
        .section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f1f1f1;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            animation: animate 5s linear infinite;
        }
        @keyframes animate {
            0% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(50px);
            }
            50% {
                transform: translateX(100px);
            }
            75% {
                transform: translateX(150px);
            }
            100% {
                transform: translateX(0);
            }
        }
    </style>
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ffc5c5" stop-opacity="1" />
            <stop offset="100%" stop-color="#e5e5e5" stop-opacity="1" />
        </linearGradient>
    </defs>
    <rect class="gradient" x="0" y="0" width="100%" height="100%" rx="10" />
    <g transform="translate(20, 20)">
        <rect x="0" y="0" width="400" height="350" rx="10" />
        <text x="20" y="20" text-anchor="middle" font-size="24" font-family="Arial, sans-serif">Naive Bayes Classifier and Add-1 Smoothing</text>
    </g>
    <g transform="translate(20, 60)">
        <section data-topic-id="conditional-independence" data-narration="Conditional Independence">
            <rect x="0" y="0" width="100%" height="100%" rx="10" />
            <text x="20" y="20" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">Conditional Independence</text>
            <text x="20" y="50" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">The features of the data are conditionally independent of each other, given the class label.</text>
            <rect x="0" y="80" width="100%" height="20" rx="10" />
        </section>
        <section data-topic-id="uniform-prior-distribution" data-narration="Uniform Prior Distribution">
            <rect x="0" y="0" width="100%" height="100%" rx="10" />
            <text x="20" y="20" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">Uniform Prior Distribution</text>
            <text x="20" y="50" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">The class labels have a uniform prior distribution.</text>
            <rect x="0" y="80" width="100%" height="20" rx="10" />
        </section>
        <section data-topic-id="add-1-smoothing" data-narration="Add-1 Smoothing">
            <rect x="0" y="0" width="100%" height="100%" rx="10" />
            <text x="20" y="20" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">Add-1 Smoothing</text>
            <text x="20" y="50" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">Add-1 smoothing is a technique used to regularize the likelihoods and avoid zero probability.</text>
            <rect x="0" y="80" width="100%" height="20" rx="10" />
        </section>
        <section data-topic-id="naive-bayes-classifier" data-narration="Naive Bayes Classifier">
            <rect x="0" y="0" width="100%" height="100%" rx="10" />
            <text x="20" y="20" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">Naive Bayes Classifier</text>
            <text x="20" y="50" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">The classifier assumes that the features of the data are conditionally independent of each other, given the class label.</text>
            <rect x="0" y="80" width="100%" height="20" rx="10" />
        </section>
        <section data-topic-id="likelihoods" data-narration="Likelihoods">
            <rect x="0" y="0" width="100%" height="100%" rx="10" />
            <text x="20" y="20" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">Likelihoods</text>
            <text x="20" y="50" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">The likelihoods can be simplified using the following equations:</text>
            <text x="20" y="80" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">P(X|Y=y) = P(X_1|Y=y) \* P(X_2|Y=y) \* ... \* P(X_n|Y=y)</text>
        </section>
        <section data-topic-id="add-1-smoothing-likelihoods" data-narration="Add-1 Smoothing Likelihoods">
            <rect x="0" y="0" width="100%" height="100%" rx="10" />
            <text x="20" y="20" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">Add-1 Smoothing Likelihoods</text>
            <text x="20" y="50" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">Using add-1 smoothing, we can simplify the likelihoods as follows:</text>
            <text x="20" y="80" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">P(X|Y=y) = (P(X|Y=y) + 1) / (V + m)</text>
        </section>
        <section data-topic-id="example" data-narration="Example">
            <rect x="0" y="0" width="100%" height="100%" rx="10" />
            <text x="20" y="20" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">Example</text>
            <text x="20" y="50" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">Suppose we have a binary classification problem with two classes: 0 and 1</text>
            <rect x="0" y="80" width="100%" height="20" rx="10" />
        </section>
        <g transform="translate(20, 400)">
            <rect x="0" y="0" width="400" height="100" rx="10" />
            <text x="20" y="20" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">Footer</text>
        </g>
    </g>
</svg>