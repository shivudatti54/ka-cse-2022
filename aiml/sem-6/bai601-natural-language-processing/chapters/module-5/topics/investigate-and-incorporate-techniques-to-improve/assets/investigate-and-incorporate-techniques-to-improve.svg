<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="investigate-and-incorporate-techniques-to-improve">
  <style>
    /* Set styles for the background gradient */
    .gradient-background {
      background-image: linear-gradient(to bottom, #7A88FF, #2E4053);
      margin: 0;
      padding: 0;
    }
  </style>
  <!-- Create a linear gradient for the background -->
  <defs>
    <linearGradient id="gradient-background" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7A88FF" stop-opacity="1" />
      <stop offset="100%" stop-color="#2E4053" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect class="gradient-background" x="0" y="0" width="420" height="400" fill="url(#gradient-background)" />
  
  <!-- Create the title section -->
  <g transform="translate(10 20)">
    <rect x="0" y="0" width="400" height="50" fill="#fff" rx="10">
      <text x="15" y="25" font-size="18" font-weight="bold" text-anchor="left">Investigate and Incorporate Techniques to Improve</text>
    </rect>
  </g>
  
  <!-- Create the data augmentation section -->
  <g transform="translate(50 70)">
    <rect x="0" y="0" width="200" height="50" fill="#fff" rx="10">
      <text x="10" y="25" font-size="16" font-weight="normal" text-anchor="left">Data Augmentation</text>
      <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
    </rect>
    <g>
      <circle cx="120" cy="30" r="10" fill="#7A88FF" opacity="0" />
      <animate attributeName="opacity" begin="0.5s" dur="1s" repeatCount="indefinite" />
      <text x="130" y="35" font-size="14" text-anchor="middle">Back-translation</text>
    </g>
    <g>
      <circle cx="120" cy="60" r="10" fill="#2E4053" opacity="0" />
      <animate attributeName="opacity" begin="1.5s" dur="1s" repeatCount="indefinite" />
      <text x="130" y="65" font-size="14" text-anchor="middle">Data Paraphrasing</text>
    </g>
    <g>
      <circle cx="120" cy="90" r="10" fill="#7A88FF" opacity="0" />
      <animate attributeName="opacity" begin="2.5s" dur="1s" repeatCount="indefinite" />
      <text x="130" y="95" font-size="14" text-anchor="middle">Word Substitution</text>
    </g>
  </g>
  
  <!-- Create the limited training data section -->
  <g transform="translate(250 70)">
    <rect x="0" y="0" width="200" height="50" fill="#fff" rx="10">
      <text x="10" y="25" font-size="16" font-weight="normal" text-anchor="left">Limited Training Data</text>
      <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
    </rect>
    <g>
      <circle cx="120" cy="30" r="10" fill="#2E4053" opacity="0" />
      <animate attributeName="opacity" begin="0.5s" dur="1s" repeatCount="indefinite" />
      <text x="130" y="35" font-size="14" text-anchor="middle">Insufficient data for the language</text>
    </g>
    <g>
      <circle cx="120" cy="60" r="10" fill="#7A88FF" opacity="0" />
      <animate attributeName="opacity" begin="1.5s" dur="1s" repeatCount="indefinite" />
      <text x="130" y="65" font-size="14" text-anchor="middle">Making it challenging for the model to learn contextual relationships and linguistic patterns</text>
    </g>
  </g>
  
  <!-- Create the limited parallel data section -->
  <g transform="translate(250 140)">
    <rect x="0" y="0" width="200" height="50" fill="#fff" rx="10">
      <text x="10" y="25" font-size="16" font-weight="normal" text-anchor="left">Limited Parallel Data</text>
      <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
    </rect>
    <g>
      <circle cx="120" cy="30" r="10" fill="#2E4053" opacity="0" />
      <animate attributeName="opacity" begin="0.5s" dur="1s" repeatCount="indefinite" />
      <text x="130" y="35" font-size="14" text-anchor="middle">Parallel data is essential for machine translation tasks</text>
    </g>
    <g>
      <circle cx="120" cy="60" r="10" fill="#7A88FF" opacity="0" />
      <animate attributeName="opacity" begin="1.5s" dur="1s" repeatCount="indefinite" />
      <text x="130" y="65" font-size="14" text-anchor="middle">Low-resource languages often lack parallel data</text>
    </g>
  </g>
  
  <!-- Create the limited resources section -->
  <g transform="translate(250 230)">
    <rect x="0" y="0" width="200" height="50" fill="#fff" rx="10">
      <text x="10" y="25" font-size="16" font-weight="normal" text-anchor="left">Limited Resources</text>
      <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
    </rect>
    <g>
      <circle cx="120" cy="30" r="10" fill="#2E4053" opacity="0" />
      <animate attributeName="opacity" begin="0.5s" dur="1s" repeatCount="indefinite" />
      <text x="130" y="35" font-size="14" text-anchor="middle">Low-resource languages often have limited access to computing resources</text>
    </g>
    <g>
      <circle cx="120" cy="60" r="10" fill="#7A88FF" opacity="0" />
      <animate attributeName="opacity" begin="1.5s" dur="1s" repeatCount="indefinite" />
      <text x="130" y="65" font-size="14" text-anchor="middle">Making it challenging to train and deploy large-scale models</text>
    </g>
  </g>
  
  <!-- Create the footer section -->
  <g transform="translate(10 350)">
    <rect x="0" y="0" width="400" height="50" fill="#fff" rx="10">
      <text x="15" y="25" font-size="14" font-weight="normal" text-anchor="left">Stay up-to-date with the latest advancements in NLP and machine learning</text>
    </rect>
  </g>
</svg>