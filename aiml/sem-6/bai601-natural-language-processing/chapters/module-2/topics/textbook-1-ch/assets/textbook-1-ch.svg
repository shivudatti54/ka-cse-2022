<svg width="420" height="400" data-topic-id="textbook-1-ch">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" style="fill: url(#grad); opacity: 0.5"/>
  
  <!-- Title -->
  <text x="50%" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; stroke: #2F4F7F; stroke-width: 2; stroke-linecap: round;">
    Textbook 1: Ch
  </text>
  
  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="50%" y="80" width="220" height="80" style="fill: #F0F5F8; stroke: #2F4F7F; stroke-width: 2; stroke-linecap: round;"/>
    <animate transform="rotate(45 50% 80%" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="60%" y="75" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; stroke: #2F4F7F; stroke-width: 2; stroke-linecap: round;">
      Word level analysis is a crucial aspect of natural language processing (NLP) 
      that involves analyzing words as the fundamental units of language.
    </text>
  </section>
  
  <!-- Section 2: Regular Expressions -->
  <section data-narration="Regular Expressions">
    <rect x="50%" y="160" width="220" height="80" style="fill: #F0F5F8; stroke: #2F4F7F; stroke-width: 2; stroke-linecap: round;"/>
    <animate transform="rotate(90 50% 160%" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="60%" y="145" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; stroke: #2F4F7F; stroke-width: 2; stroke-linecap: round;">
      Regular expressions (regex) are patterns used to match character combinations in strings.
    </text>
    <rect x="70%" y="130" width="50" height="30" style="fill: #FF9900; stroke: #2F4F7F; stroke-width: 2; stroke-linecap: round;"/>
    <text x="75%" y="125" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; stroke: #2F4F7F; stroke-width: 2; stroke-linecap: round;">
      Pattern: A sequence of characters that defines a search pattern.
    </text>
  </section>
  
  <!-- Section 3: Finite-State Automata -->
  <section data-narration="Finite-State Automata">
    <rect x="50%" y="240" width="220" height="80" style="fill: #F0F5F8; stroke: #2F4F7F; stroke-width: 2; stroke-linecap: round;"/>
    <animate transform="rotate(135 50% 240%" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="60%" y="235" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; stroke: #2F4F7F; stroke-width: 2; stroke-linecap: round;">
      Finite-state automata (FSA) is a mathematical model that can be used to recognize patterns in strings.
    </text>
    <rect x="70%" y="215" width="50" height="30" style="fill: #FF9900; stroke: #2F4F7F; stroke-width: 2; stroke-linecap: round;"/>
    <text x="75%" y="210" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; stroke: #2F4F7F; stroke-width: 2; stroke-linecap: round;">
      States: The set of possible states that the automaton can be in.
    </text>
  </section>
  
  <!-- Section 4: Morphological Parsing -->
  <section data-narration="Morphological Parsing">
    <rect x="50%" y="320" width="220" height="80" style="fill: #F0F5F8; stroke: #2F4F7F; stroke-width: 2; stroke-linecap: round;"/>
    <animate transform="rotate(180 50% 320%" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="60%" y="315" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; stroke: #2F4F7F; stroke-width: 2; stroke-linecap: round;">
      Morphological parsing is a technique used to analyze the grammatical structure of words.
    </text>
  </section>
  
  <!-- Section 5: Spelling -->
  <section data-narration="Spelling">
    <rect x="50%" y="400" width="220" height="80" style="fill: #F0F5F8; stroke: #2F4F7F; stroke-width: 2; stroke-linecap: round;"/>
    <animate transform="rotate(225 50% 400%" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="60%" y="395" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; stroke: #2F4F7F; stroke-width: 2; stroke-linecap: round;">
      Spelling is the process of checking the correctness of written words.
    </text>
  </section>
  
  <!-- Footer -->
  <text x="50%" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2F4F7F; stroke: #2F4F7F; stroke-width: 2; stroke-linecap: round;">
    Education is the key to unlocking the potential of individuals and society.
  </text>
</svg>