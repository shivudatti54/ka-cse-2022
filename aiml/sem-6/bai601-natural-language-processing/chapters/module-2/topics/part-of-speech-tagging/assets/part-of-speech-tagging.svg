<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="Part-of-Speech-Tagging">
  <rect x="0" y="0" width="420" height="400" fill="#C7B8EA" rx="10">
    <animate xlink:href="#title" begin="0s" dur="2s"/>
  </rect>
  <g id="title">
    <text x="10" y="30" font-size="24" font-family="Arial, sans-serif" fill="#2E4053" id="title">Part-of-Speech Tagging</text>
  </g>
  <rect x="0" y="60" width="420" height="100" fill="#87CEEB" rx="10">
    <animate xlink:href="#section1" begin="0.5s" dur="2s"/>
  </rect>
  <g id="section1">
    <text x="10" y="80" font-size="18" font-family="Arial, sans-serif" fill="#2E4053" data-narration="Introduction to Part-of-Speech Tagging">Introduction to Part-of-Speech Tagging</text>
    <rect x="10" y="120" width="100" height="50" fill="#C5CAE9" rx="5">
      <animate xlink:href="#arrow1" begin="0.5s" dur="1s"/>
    </rect>
    <text x="120" y="120" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">Words are categorized into classes based on their grammatical function, meaning, and form.</text>
  </g>
  <rect x="0" y="190" width="420" height="100" fill="#FFC107" rx="10">
    <animate xlink:href="#section2" begin="1.5s" dur="2s"/>
  </rect>
  <g id="section2">
    <text x="10" y="210" font-size="18" font-family="Arial, sans-serif" fill="#2E4053" data-narration="Major Word Classes">Major Word Classes</text>
    <rect x="10" y="250" width="100" height="50" fill="#C5CAE9" rx="5">
      <animate xlink:href="#arrow2" begin="1.5s" dur="1s"/>
    </rect>
    <text x="120" y="250" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      <tspan x="120" y="250" font-size="18">| Class                | Description                                               | Examples                   |
| :------------------- | :-------------------------------------------------------- | :------------------------- |
| **Noun (N)**         | Names a person, place, thing, or idea                     | `cat`, `London`, `freedom` |
| **Verb (V)**         | Expresses an action, occurrence, or state of being        | `run`, `is`, `think`       |
| **Adjective (J)**    | Modifies a noun, describing qualities                     | `red`, `happy`, `tall`     |
| **Adverb (R)**       | Modifies a verb, adjective, or other adverb               | `quickly`, `very`, `well`  |
| **Pronoun (P)**      | Takes the place of a noun                                 | `he`, `she`, `it`          </tspan>
    </g>
  </rect>
  <rect x="0" y="290" width="420" height="100" fill="#21BDE9" rx="10">
    <animate xlink:href="#section3" begin="2.5s" dur="2s"/>
  </rect>
  <g id="section3">
    <text x="10" y="310" font-size="18" font-family="Arial, sans-serif" fill="#2E4053" data-narration="Why is POS Tagging Important?">Why is POS Tagging Important?</text>
    <rect x="10" y="350" width="100" height="50" fill="#C5CAE9" rx="5">
      <animate xlink:href="#arrow3" begin="2.5s" dur="1s"/>
    </rect>
    <text x="120" y="350" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      POS tags provide a shallow level of syntactic understanding that is crucial for many downstream NLP applications.</text>
  </g>
  <rect x="0" y="380" width="420" height="20" fill="#2E4053" rx="10">
    <animate xlink:href="#footer" begin="3s" dur="1s"/>
  </rect>
  <g id="footer">
    <text x="10" y="400" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">Created with love</text>
  </g>
  <rect x="0" y="0" width="420" height="10" fill="#C7B8EA" rx="5">
    <animate xlink:href="#arrow4" begin="3s" dur="0.5s"/>
  </rect>
  <g id="arrow1">
    <path d="M 20 20 L 150 20" fill="#2E4053" stroke="#2E4053" stroke-width="2"/>
  </g>
  <g id="arrow2">
    <path d="M 200 250 L 320 250" fill="#2E4053" stroke="#2E4053" stroke-width="2"/>
  </g>
  <g id="arrow3">
    <path d="M 250 350 L 370 350" fill="#2E4053" stroke="#2E4053" stroke-width="2"/>
  </g>
  <g id="arrow4">
    <path d="M 10 10 L 30 10" fill="#2E4053" stroke="#2E4053" stroke-width="2"/>
  </g>
  <rect x="0" y="0" width="420" height="400" fill="#C7B8EA" rx="10">
    <animate xlink:href="#arrow5" begin="4s" dur="0.5s"/>
  </rect>
  <g id="arrow5">
    <path d="M 20 20 L 150 20" fill="#2E4053" stroke="#2E4053" stroke-width="2"/>
  </g>
</svg>