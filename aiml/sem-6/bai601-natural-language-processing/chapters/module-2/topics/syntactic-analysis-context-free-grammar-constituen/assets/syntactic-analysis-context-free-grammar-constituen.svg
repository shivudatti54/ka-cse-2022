<svg width="420" height="400" data-topic-id="Syntactic-Analysis-Context-Free-Grammar-constituen" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA"/>
      <stop offset="100%" stop-color="#A1C9F2"/>
    </linearGradient>
  </defs>
  <title>Syntactic Analysis Context Free Grammar Constituen</title>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  <rect x="0" y="0" width="100%" height="20" fill="#2E4053"/>
  <text x="10" y="10" font-size="24" font-family="Arial, sans-serif" fill="#fff" text-anchor="start">Syntactic Analysis</text>
  <rect x="0" y="40" width="100%" height="120" fill="#2E4053"/>
  <section data-narration="1">
    <rect x="0" y="40" width="100%" height="40" fill="#C7B8EA"/>
    <text x="10" y="70" font-size="18" font-family="Arial, sans-serif" fill="#fff" text-anchor="start">Context-Free Grammar</text>
    <text x="10" y="90" font-size="18" font-family="Arial, sans-serif" fill="#fff" text-anchor="start">Definition</text>
    <rect x="10" y="120" width="80%" height="40" fill="#C7B8EA"/>
    <text x="10" y="160" font-size="18" font-family="Arial, sans-serif" fill="#fff" text-anchor="start">A context-free grammar is a formal grammar system that uses non-terminals and terminal symbols to generate an infinite number of strings.</text>
    <animateTransform attributeName="transform" type="translate" from="0 120" to="0 180" begin="0s" dur="2s"/>
  </section>
  <section data-narration="2">
    <rect x="0" y="190" width="100%" height="40" fill="#C7B8EA"/>
    <text x="10" y="230" font-size="18" font-family="Arial, sans-serif" fill="#fff" text-anchor="start">Components</text>
    <rect x="10" y="270" width="80%" height="40" fill="#C7B8EA"/>
    <text x="10" y="310" font-size="18" font-family="Arial, sans-serif" fill="#fff" text-anchor="start">Non-terminals and terminals are the basic components of a context-free grammar.</text>
    <rect x="10" y="360" width="80%" height="40" fill="#C7B8EA"/>
    <text x="10" y="400" font-size="18" font-family="Arial, sans-serif" fill="#fff" text-anchor="start">Production rules specify how to combine non-terminals and terminals to form new strings.</text>
    <animateTransform attributeName="transform" type="translate" from="0 300" to="0 360" begin="2s" dur="2s"/>
  </section>
  <section data-narration="3">
    <rect x="0" y="470" width="100%" height="40" fill="#C7B8EA"/>
    <text x="10" y="510" font-size="18" font-family="Arial, sans-serif" fill="#fff" text-anchor="start">Constituency</text>
    <rect x="10" y="560" width="80%" height="40" fill="#C7B8EA"/>
    <text x="10" y="600" font-size="18" font-family="Arial, sans-serif" fill="#fff" text-anchor="start">Constituency refers to the way in which words are grouped together to form a phrase or sentence.</text>
    <rect x="10" y="690" width="80%" height="40" fill="#C7B8EA"/>
    <text x="10" y="740" font-size="18" font-family="Arial, sans-serif" fill="#fff" text-anchor="start">A phrase structure grammar (PSG) is a grammar system that describes the structure of a phrase or sentence.</text>
    <animateTransform attributeName="transform" type="translate" from="0 700" to="0 760" begin="4s" dur="2s"/>
  </section>
  <section data-narration="4">
    <rect x="0" y="830" width="100%" height="40" fill="#C7B8EA"/>
    <text x="10" y="870" font-size="18" font-family="Arial, sans-serif" fill="#fff" text-anchor="start">Top-Down and Bottom-Up Parsing</text>
    <rect x="10" y="950" width="80%" height="40" fill="#C7B8EA"/>
    <text x="10" y="990" font-size="18" font-family="Arial, sans-serif" fill="#fff" text-anchor="start">Top-down and bottom-up parsing are two approaches to parsing a sentence.</text>
    <rect x="10" y="1090" width="80%" height="40" fill="#C7B8EA"/>
    <text x="10" y="1130" font-size="18" font-family="Arial, sans-serif" fill="#fff" text-anchor="start">CYK parsing is a bottom-up parsing algorithm that uses a table to parse a sentence.</text>
    <animateTransform attributeName="transform" type="translate" from="0 1100" to="0 1170" begin="6s" dur="2s"/>
  </section>
  <footer>Created with love for educational purposes only.</footer>
</svg>