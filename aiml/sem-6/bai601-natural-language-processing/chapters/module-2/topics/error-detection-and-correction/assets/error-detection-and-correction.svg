<svg width="420" height="400" data-topic-id="error-detection-and-correction" xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background-image: url('error-detection-and-correction-bg.png');">
  <style>
    /* Add some basic styling to the SVG */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
  </style>
  <title>Error Detection and Correction</title>
  <footer>Page loaded in {{elapsed}} ms</footer>
  <g>
    <rect x="10" y="10" width="400" height="380" style="fill: #87CEEB;"/>
    <text x="20" y="30" font-size="24" font-family="Arial" text-anchor="middle">Error Detection and Correction</text>
    < defs>
      <style>
        .title {
          font-size: 18;
          font-weight: bold;
          fill: #0097A7;
          text-anchor: middle;
        }
        .section {
          margin-bottom: 20;
        }
      </style>
      <circle cx="50%" cy="50%" r="10" fill="white" stroke="#0097A7" stroke-width="2" />
    </defs>
    <g id="section-1">
      <rect x="20" y="50" width="380" height="150" style="fill: #C9E4CA;"/>
      <animateTransform attributeName="transform" type="scale" from="1 1" to="0.5 0.5" begin="0s" dur="1s" repeatCount="indefinite"/>
      <circle cx="50%" cy="50%" r="20" fill="white" stroke="#0097A7" stroke-width="2" />
      <text x="50%" y="80" font-size="18" font-family="Arial" text-anchor="middle" class="title">Error Detection Techniques</text>
      <text id="error-detection-text" x="50%" y="110" font-size="16" font-family="Arial" text-anchor="middle" class="section" data-narration="Error detection is the process of identifying errors that occur during data transmission. There are several techniques used for error detection, including parity check, checksum, and cyclic redundancy check (CRC).">
      </text>
    </g>
    <g id="section-2">
      <rect x="20" y="200" width="380" height="150" style="fill: #87CEEB;"/>
      <animateTransform attributeName="transform" type="scale" from="1 1" to="0.5 0.5" begin="1s" dur="1s" repeatCount="indefinite"/>
      <circle cx="50%" cy="50%" r="20" fill="white" stroke="#0097A7" stroke-width="2" />
      <text x="50%" y="80" font-size="18" font-family="Arial" text-anchor="middle" class="title">Block Coding</text>
      <text id="block-coding-text" x="50%" y="110" font-size="16" font-family="Arial" text-anchor="middle" class="section" data-narration="Block coding is a technique used for error detection and correction. It involves dividing the data into blocks and appending redundant bits to each block. The redundant bits are calculated using a generator polynomial.">
      </text>
    </g>
    <g id="section-3">
      <rect x="20" y="350" width="380" height="150" style="fill: #87CEEB;"/>
      <animateTransform attributeName="transform" type="scale" from="1 1" to="0.5 0.5" begin="2s" dur="1s" repeatCount="indefinite"/>
      <circle cx="50%" cy="50%" r="20" fill="white" stroke="#0097A7" stroke-width="2" />
      <text x="50%" y="80" font-size="18" font-family="Arial" text-anchor="middle" class="title">Types of Block Codes</text>
      <text id="block-code-text" x="50%" y="110" font-size="16" font-family="Arial" text-anchor="middle" class="section" data-narration="There are two types of block codes: linear block codes and cyclic codes. Linear block codes are used for error detection, while cyclic codes are used for both error detection and correction.">
      </text>
    </g>
    <g id="section-4">
      <rect x="20" y="250" width="380" height="150" style="fill: #C9E4CA;"/>
      <animateTransform attributeName="transform" type="scale" from="1 1" to="0.5 0.5" begin="3s" dur="1s" repeatCount="indefinite"/>
      <circle cx="50%" cy="50%" r="20" fill="white" stroke="#0097A7" stroke-width="2" />
      <text x="50%" y="80" font-size="18" font-family="Arial" text-anchor="middle" class="title">Cyclic Codes</text>
      <text id="cyclic-code-text" x="50%" y="110" font-size="16" font-family="Arial" text-anchor="middle" class="section" data-narration="Cyclic codes are a type of block code where the redundant bits are calculated using a cyclic shift of the data bits. They are widely used in digital communication systems due to their simplicity and efficiency.">
      </text>
    </g>
  </g>
  <g id="section-5">
    <rect x="20" y="50" width="380" height="150" style="fill: #87CEEB;"/>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="0.5 0.5" begin="4s" dur="1s" repeatCount="indefinite"/>
    <circle cx="50%" cy="50%" r="20" fill="white" stroke="#0097A7" stroke-width="2" />
    <text x="50%" y="80" font-size="18" font-family="Arial" text-anchor="middle" class="title">Check Sum</text>
    <text id="checksum-text" x="50%" y="110" font-size="16" font-family="Arial" text-anchor="middle" class="section" data-narration="A checksum is a value calculated from the data to be transmitted. It is appended to the data and transmitted. The receiver calculates the checksum value again and compares it with the received checksum value to detect errors.">
    </text>
  </g>
  <g id="section-6">
    <rect x="20" y="200" width="380" height="150" style="fill: #87CEEB;"/>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="0.5 0.5" begin="5s" dur="1s" repeatCount="indefinite"/>
    <circle cx="50%" cy="50%" r="20" fill="white" stroke="#0097A7" stroke-width="2" />
    <text x="50%" y="80" font-size="18" font-family="Arial" text-anchor="middle" class="title">Parity Check</text>
    <text id="parity-check-text" x="50%" y="110" font-size="16" font-family="Arial" text-anchor="middle" class="section" data-narration="Parity check is a technique used for error detection. It involves adding a parity bit to the data to ensure that the total number of 1s in the data is even or odd.">
    </text>
  </g>
</svg>