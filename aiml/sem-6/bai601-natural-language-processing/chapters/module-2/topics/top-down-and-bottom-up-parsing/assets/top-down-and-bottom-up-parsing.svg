<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      .step.active { opacity: 1; transition: opacity 0.5s; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; fill: #2C3E50; }
      .label { font-size: 16px; fill: #34495E; }
      .sublabel { font-size: 13px; fill: #7F8C8D; }
    </style>
  </defs>

  <g class="step" data-step="1" data-narration="This diagram illustrates the key concepts of comparison of top-down and bottom-up parsing strategies.">
    <text x="400" y="40" class="title" text-anchor="middle">Comparison of Top-Down and Bottom-Up Parsing Strategies</text>
  </g>
  <g class="step" data-step="2" data-narration="Understanding Start (Input Sentence) as the foundational component of this concept.">
    <rect x="200" y="120" width="400" height="60" fill="#E8F4FF" stroke="#4A90E2" stroke-width="2" rx="5"/>
    <text x="400" y="158" class="label" text-anchor="middle">Start (Input Sentence)</text>
  </g>
  <g class="step" data-step="3" data-narration="The next step involves Top-Down Parser, which builds upon the previous components.">
    <rect x="200" y="200" width="400" height="60" fill="#E8F4FF" stroke="#4A90E2" stroke-width="2" rx="5"/>
    <text x="400" y="238" class="label" text-anchor="middle">Top-Down Parser</text>
    <path d="M 400 180 L 400 200" stroke="#2E5C8A" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g class="step" data-step="4" data-narration="The next step involves Bottom-Up Parser, which builds upon the previous components.">
    <rect x="200" y="280" width="400" height="60" fill="#E8F4FF" stroke="#4A90E2" stroke-width="2" rx="5"/>
    <text x="400" y="318" class="label" text-anchor="middle">Bottom-Up Parser</text>
    <path d="M 400 260 L 400 280" stroke="#2E5C8A" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g class="step" data-step="5" data-narration="The next step involves Root Symbol (S), which builds upon the previous components.">
    <rect x="200" y="360" width="400" height="60" fill="#E8F4FF" stroke="#4A90E2" stroke-width="2" rx="5"/>
    <text x="400" y="398" class="label" text-anchor="middle">Root Symbol (S)</text>
    <path d="M 400 340 L 400 360" stroke="#2E5C8A" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g class="step" data-step="6" data-narration="The next step involves Terminal Symbols (Words), which builds upon the previous components.">
    <rect x="200" y="440" width="400" height="60" fill="#E8F4FF" stroke="#4A90E2" stroke-width="2" rx="5"/>
    <text x="400" y="478" class="label" text-anchor="middle">Terminal Symbols (Words)</text>
    <path d="M 400 420 L 400 440" stroke="#2E5C8A" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g class="step" data-step="7" data-narration="The next step involves Parse Tree, which builds upon the previous components.">
    <rect x="200" y="520" width="400" height="60" fill="#E8F4FF" stroke="#4A90E2" stroke-width="2" rx="5"/>
    <text x="400" y="558" class="label" text-anchor="middle">Parse Tree</text>
    <path d="M 400 500 L 400 520" stroke="#2E5C8A" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g class="step" data-step="8" data-narration="Finally, Goal: Match Input completes the overall process and delivers the result.">
    <rect x="200" y="600" width="400" height="60" fill="#E8F4FF" stroke="#4A90E2" stroke-width="2" rx="5"/>
    <text x="400" y="638" class="label" text-anchor="middle">Goal: Match Input</text>
    <path d="M 400 580 L 400 600" stroke="#2E5C8A" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2E5C8A"/>
    </marker>
  </defs>
</svg>