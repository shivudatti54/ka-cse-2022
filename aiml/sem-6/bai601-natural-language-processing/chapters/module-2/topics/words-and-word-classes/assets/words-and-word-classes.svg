<svg width="420" height="400" data-topic-id="words-and-word-classes" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <style>
    /* Add styles to make the SVG look more visually appealing */
    body {
      background-color: #f5f5f5;
    }
    .container {
      width: 100%;
      height: 100%;
      position: relative;
      background-color: #e0e0e0;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }
    .section {
      position: absolute;
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
      animation: animate 3s infinite;
    }
    @keyframes animate { 
      0% { transform: translateX(-100%); }
      50% { transform: translateX(0); }
      100% { transform: translateX(100%); }
    }
    .title {
      font-size: 24px;
      font-weight: bold;
      color: #333;
      text-align: center;
      margin-bottom: 20px;
    }
    .footer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: #fff;
      padding: 10px;
      text-align: center;
      color: #333;
    }
    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .section-description {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }
    .arrow {
      fill: #333;
      stroke: #ccc;
      stroke-width: 2;
    }
  </style>
  <div class="container">
    <div class="footer">
      <span>Words and Word Classes</span>
    </div>
    <div class="title">
      <span>Words and Word Classes</span>
    </div>
    <div class="section" data-narration="Introduction to Word Classes">
      <div class="section-title">Introduction</div>
      <div class="section-description">
        Words and word classes are essential concepts in Natural Language Processing.
      </div>
      <div class="arrow">
        <line x1="10" y1="20" x2="30" y2="20" style="stroke-width: 2;" />
      </div>
    </div>
    <div class="section" data-narration="Word Classes">
      <div class="section-title">Word Classes</div>
      <div class="section-description">
        Word classes are categories of words based on their part of speech and function.
      </div>
      <div class="arrow">
        <line x1="10" y1="30" x2="30" y2="30" style="stroke-width: 2;" />
      </div>
    </div>
    <div class="section" data-narration="Properties of Word Classes">
      <div class="section-title">Properties</div>
      <div class="section-description">
        Words within the same word class may have similar meanings or functions.
      </div>
      <div class="arrow">
        <line x1="10" y1="50" x2="30" y2="50" style="stroke-width: 2;" />
      </div>
    </div>
    <div class="section" data-narration="Types of Word Classes">
      <div class="section-title">Types</div>
      <div class="section-description">
        Nouns, verbs, adjectives, and adverbs are common word classes in English.
      </div>
      <div class="arrow">
        <line x1="10" y1="70" x2="30" y2="70" style="stroke-width: 2;" />
      </div>
    </div>
    <div class="section" data-narration="Nouns (N)">
      <div class="section-title">Nouns</div>
      <div class="section-description">
        Nouns are words that function as head, subject, object, or complement.
      </div>
      <div class="arrow">
        <line x1="10" y1="90" x2="30" y2="90" style="stroke-width: 2;" />
      </div>
    </div>
    <div class="section" data-narration="Verbs (V)">
      <div class="section-title">Verbs</div>
      <div class="section-description">
        Verbs are words that function as action, state, or occurrence.
      </div>
      <div class="arrow">
        <line x1="10" y1="110" x2="30" y2="110" style="stroke-width: 2;" />
      </div>
    </div>
    <div class="section" data-narration="Adjectives (Adj)">
      <div class="section-title">Adjectives</div>
      <div class="section-description">
        Adjectives are words that modify nouns or pronouns.
      </div>
      <div class="arrow">
        <line x1="10" y1="130" x2="30" y2="130" style="stroke-width: 2;" />
      </div>
    </div>
    <div class="section" data-narration="Adverbs (Adv)">
      <div class="section-title">Adverbs</div>
      <div class="section-description">
        Adverbs are words that modify verbs, adjectives, or other adverbs.
      </div>
      <div class="arrow">
        <line x1="10" y1="150" x2="30" y2="150" style="stroke-width: 2;" />
      </div>
    </div>
    <div class="section" data-narration="Pronouns (Pron)">
      <div class="section-title">Pronouns</div>
      <div class="section-description">
        Pronouns are words that replace nouns in a sentence.
      </div>
      <div class="arrow">
        <line x1="10" y1="170" x2="30" y2="170" style="stroke-width: 2;" />
      </div>
    </div>
    <div class="section" data-narration="Prepositions (P)">
      <div class="section-title">Prepositions</div>
      <div class="section-description">
        Prepositions are words that show relationships between words or phrases.
      </div>
      <div class="arrow">
        <line x1="10" y1="190" x2="30" y2="190" style="stroke-width: 2;" />
      </div>
    </div>
    <div class="section" data-narration="Conjunctions (C)">
      <div class="section-title">Conjunctions</div>
      <div class="section-description">
        Conjunctions are words that connect words or phrases.
      </div>
      <div class="arrow">
        <line x1="10" y1="210" x2="30" y2="210" style="stroke-width: 2;" />
      </div>
    </div>
    <div class="section" data-narration="Interjections (Int)">
      <div class="section-title">Interjections</div>
      <div class="section-description">
        Interjections are words that express emotion.
      </div>
      <div class="arrow">
        <line x1="10" y1="230" x2="30" y2="230" style="stroke-width: 2;" />
      </div>
    </div>
    <div class="footer">
      <span>Words and Word Classes</span>
    </div>
  </div>
</svg>