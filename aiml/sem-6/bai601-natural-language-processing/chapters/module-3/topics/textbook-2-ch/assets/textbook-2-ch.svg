<svg width="420" height="400">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title and header -->
  <rect x="10" y="10" width="400" height="50" fill="#2E4053" rx="10">
    <text x="15" y="30" font-size="24" font-family="Arial" fill="#fff">Textbook 2: Ch</text>
  </rect>
  
  <!-- Section 1: Definition -->
  <rect x="10" y="70" width="400" height="150" fill="#2E4053" rx="10">
    <rect x="10" y="70" width="90" height="30" fill="#2E4053" rx="5" fill-opacity=".5"/>
    <text x="120" y="90" font-size="18" font-family="Arial" fill="#fff">Naive Bayes is a family of probabilistic machine learning models...</text>
    <text x="120" y="110" font-size="18" font-family="Arial" fill="#fff">used for classification and regression tasks.</text>
  </rect>
  
  <!-- Section 2: Overview -->
  <rect x="10" y="230" width="400" height="150" fill="#2E4053" rx="10">
    <rect x="10" y="230" width="90" height="30" fill="#2E4053" rx="5" fill-opacity=".5"/>
    <text x="120" y="250" font-size="18" font-family="Arial" fill="#fff">Naive Bayes classifiers are based on Bayes' theorem...</text>
    <text x="120" y="270" font-size="18" font-family="Arial" fill="#fff">which describes the probability of an event occurring...</text>
  </rect>
  
  <!-- Section 3: Advantages -->
  <rect x="10" y="360" width="400" height="150" fill="#2E4053" rx="10">
    <rect x="10" y="360" width="90" height="30" fill="#2E4053" rx="5" fill-opacity=".5"/>
    <text x="120" y="370" font-size="18" font-family="Arial" fill="#fff">Advantages include:</text>
    <text x="120" y="390" font-size="18" font-family="Arial" fill="#fff">fast and efficient, simple to train...</text>
  </rect>
  
  <!-- Section 4: Disadvantages -->
  <rect x="10" y="470" width="400" height="150" fill="#2E4053" rx="10">
    <rect x="10" y="470" width="90" height="30" fill="#2E4053" rx="5" fill-opacity=".5"/>
    <text x="120" y="480" font-size="18" font-family="Arial" fill="#fff">Disadvantages include:</text>
    <text x="120" y="500" font-size="18" font-family="Arial" fill="#fff">assumes independence of features...</text>
  </rect>
  
  <!-- Section 5: Types of Naive Bayes Classifiers -->
  <rect x="10" y="590" width="400" height="150" fill="#2E4053" rx="10">
    <rect x="10" y="590" width="90" height="30" fill="#2E4053" rx="5" fill-opacity=".5"/>
    <text x="120" y="600" font-size="18" font-family="Arial" fill="#fff">Types of Naive Bayes classifiers include:</text>
    <text x="120" y="620" font-size="18" font-family="Arial" fill="#fff">multinomial Naive Bayes...</text>
    <text x="120" y="640" font-size="18" font-family="Arial" fill="#fff">bernoulli Naive Bayes...</text>
  </rect>
  
  <!-- Section 6: Training the Naive Bayes Classifier -->
  <rect x="10" y="740" width="400" height="150" fill="#2E4053" rx="10">
    <rect x="10" y="740" width="90" height="30" fill="#2E4053" rx="5" fill-opacity=".5"/>
    <text x="120" y="750" font-size="18" font-family="Arial" fill="#fff">Training a Naive Bayes classifier...</text>
    <text x="120" y="770" font-size="18" font-family="Arial" fill="#fff">involves estimating...</text>
    <text x="120" y="790" font-size="18" font-family="Arial" fill="#fff">the parameters...</text>
  </rect>
  
  <!-- Data-topic-id attribute with slugified topic name -->
  <rect x="10" y="930" width="400" height="30" fill="#2E4053" rx="5" fill-opacity=".5"/>
  <text x="120" y="950" font-size="14" font-family="Arial" fill="#fff" data-topic-id="Naive-Bayes-Classifiers">Naive Bayes Classifiers</text>
  
  <!-- Data-narration attribute -->
  <rect x="10" y="970" width="400" height="30" fill="#2E4053" rx="5" fill-opacity=".5"/>
  <text x="120" y="990" font-size="14" font-family="Arial" fill="#fff" data-narration="This section explains the definition of Naive Bayes classifiers and their types.">Definition and Types</text>
  
  <!-- Animation -->
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" fill="freeze">
    <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  </animate>
</svg>