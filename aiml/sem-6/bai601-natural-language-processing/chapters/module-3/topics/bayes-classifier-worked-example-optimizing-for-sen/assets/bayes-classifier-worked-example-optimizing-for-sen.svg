<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg">
  <title>Natural Language Processing with Naive Bayes</title>
  <footer>Copyright 2023</footer>

  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ACC8F7" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>
  <rect x="0" y="0" width="420" height="40" fill="#1A1D23"/>
  <rect x="0" y="360" width="420" height="40" fill="#1A1D23"/>

  <!-- Section 1: Bayes Classifier Introduction -->
  <section data-topic-id="bayes-classifier-introduction" data-narration="This is an introduction to Bayes classifiers and their application in Natural Language Processing.">
    <rect x="20" y="60" width="380" height="200" fill="#F7F7F7" stroke="#808080" stroke-width="2"/>
    <text x="20" y="30" fill="#333333" font-size="24">Bayes Classifier</text>
    <text x="20" y="150" fill="#333333" font-size="18">Introduction to Bayes Classifiers</text>
  </section>

  <!-- Section 2: Bayes Theorem -->
  <section data-topic-id="bayes-theorem" data-narration="This section explains Bayes' theorem and its application in probability theory.">
    <rect x="20" y="250" width="380" height="200" fill="#F7F7F7" stroke="#808080" stroke-width="2"/>
    <animate attributeName="y" from="250" to="300" dur="1s" begin="1s"/>
    <text x="20" y="220" fill="#333333" font-size="24">Bayes' Theorem</text>
    <text x="20" y="330" fill="#333333" font-size="18">Calculating Posterior Probabilities</text>
  </section>

  <!-- Section 3: Naive Bayes Classifier -->
  <section data-topic-id="naive-bayes-classifier" data-narration="This section introduces the Naive Bayes classifier and its application in Natural Language Processing.">
    <rect x="20" y="350" width="380" height="200" fill="#F7F7F7" stroke="#808080" stroke-width="2"/>
    <animate attributeName="y" from="350" to="400" dur="1s" begin="2s"/>
    <text x="20" y="320" fill="#333333" font-size="24">Naive Bayes Classifier</text>
    <text x="20" y="390" fill="#333333" font-size="18">Assuming Independence</text>
  </section>

  <!-- Section 4: Conditional Probability -->
  <section data-topic-id="conditional-probability" data-narration="This section explains conditional probability and its application in probability theory.">
    <rect x="20" y="450" width="380" height="200" fill="#F7F7F7" stroke="#808080" stroke-width="2"/>
    <animate attributeName="y" from="450" to="500" dur="1s" begin="3s"/>
    <text x="20" y="480" fill="#333333" font-size="24">Conditional Probability</text>
    <text x="20" y="490" fill="#333333" font-size="18">Calculating Probabilities</text>
  </section>

  <!-- Section 5: Likelihood -->
  <section data-topic-id="likelihood" data-narration="This section introduces likelihood and its application in probability theory.">
    <rect x="20" y="550" width="380" height="200" fill="#F7F7F7" stroke="#808080" stroke-width="2"/>
    <animate attributeName="y" from="550" to="600" dur="1s" begin="4s"/>
    <text x="20" y="580" fill="#333333" font-size="24">Likelihood</text>
    <text x="20" y="590" fill="#333333" font-size="18">Calculating Evidence</text>
  </section>

  <!-- Section 6: Prior Probabilities -->
  <section data-topic-id="prior-probabilities" data-narration="This section explains prior probabilities and their application in probability theory.">
    <rect x="20" y="650" width="380" height="200" fill="#F7F7F7" stroke="#808080" stroke-width="2"/>
    <animate attributeName="y" from="650" to="700" dur="1s" begin="5s"/>
    <text x="20" y="680" fill="#333333" font-size="24">Prior Probabilities</text>
    <text x="20" y="690" fill="#333333" font-size="18">Calculating Class Probabilities</text>
  </section>

  <!-- Data-topic-id and topic names -->
  <text x="20" y="20" fill="#333333" font-size="24">Data Topic ID: bayes-classifier-introduction</text>
  <text x="20" y="80" fill="#333333" font-size="18">Topic: Bayes Classifier Introduction</text>
  <text x="20" y="140" fill="#333333" font-size="18">Topic: Bayes Theorem</text>
  <text x="20" y="200" fill="#333333" font-size="18">Topic: Naive Bayes Classifier</text>
  <text x="20" y="260" fill="#333333" font-size="18">Topic: Conditional Probability</text>
  <text x="20" y="320" fill="#333333" font-size="18">Topic: Likelihood</text>
  <text x="20" y="380" fill="#333333" font-size="18">Topic: Prior Probabilities</text>

  <!-- Arrow markers -->
  <polygon points="100,200 150,200 100,300" fill="#808080" stroke="#808080" stroke-width="2"/>
  <polygon points="150,200 200,200 150,300" fill="#808080" stroke="#808080" stroke-width="2"/>
  <polygon points="200,200 250,200 200,300" fill="#808080" stroke="#808080" stroke-width="2"/>
  <polygon points="300,200 350,200 300,300" fill="#808080" stroke="#808080" stroke-width="2"/>
</svg>