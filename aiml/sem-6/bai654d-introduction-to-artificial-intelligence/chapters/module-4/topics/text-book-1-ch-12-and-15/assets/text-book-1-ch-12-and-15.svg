<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="introduction-to-artificial-intelligence-game-playing-12-and-15">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9e4ca" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e5e8f6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Title Section -->
  <section id="title-section" data-narration="Introduction to Artificial Intelligence">
    <rect x="50" y="20" width="320" height="50" fill="#1a1d23" opacity="0.7"/>
    <text x="160" y="40" font-size="24" font-family="Arial" fill="#e5e8f6">Game Playing</text>
    <text x="160" y="60" font-size="18" font-family="Arial" fill="#1a1d23">Chapters 12 and 15</text>
  </section>

  <!-- Minimax Algorithm Section -->
  <section id="minimax-section" data-narration="Minimax Algorithm">
    <rect x="50" y="100" width="320" height="150" fill="#1a1d23" opacity="0.7"/>
    <rect x="60" y="120" width="300" height="20" fill="#3d8ef7" opacity="0.7"/>
    <text x="140" y="140" font-size="18" font-family="Arial" fill="#3d8ef7">Minimax Algorithm</text>
    <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="360 150 150" dur="2s" repeatCount="indefinite"/>
    <circle cx="150" cy="150" r="10" fill="#3d8ef7" stroke="#1a1d23" stroke-width="2"/>
  </section>

  <!-- Tik-Tac-Toe Section -->
  <section id="tic-tac-toe-section" data-narration="Tic-Tac-Toe Example">
    <rect x="50" y="250" width="320" height="150" fill="#1a1d23" opacity="0.7"/>
    <rect x="60" y="270" width="300" height="20" fill="#3d8ef7" opacity="0.7"/>
    <text x="140" y="290" font-size="18" font-family="Arial" fill="#3d8ef7">Tic-Tac-Toe</text>
    <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="360 150 150" dur="2s" repeatCount="indefinite"/>
    <circle cx="150" cy="150" r="10" fill="#3d8ef7" stroke="#1a1d23" stroke-width="2"/>
  </section>

  <!-- Code Implementation Section -->
  <section id="code-implementation-section" data-narration="Code Implementation">
    <rect x="50" y="350" width="320" height="150" fill="#1a1d23" opacity="0.7"/>
    <rect x="60" y="370" width="300" height="20" fill="#3d8ef7" opacity="0.7"/>
    <text x="140" y="390" font-size="18" font-family="Arial" fill="#3d8ef7">Code Implementation</text>
    <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="360 150 150" dur="2s" repeatCount="indefinite"/>
    <circle cx="150" cy="150" r="10" fill="#3d8ef7" stroke="#1a1d23" stroke-width="2"/>
  </section>

  <!-- Animate Arrows -->
  <animate xmlns="http://www.w3.org/2000/svg" fill="freeze" dur="2s" repeatCount="indefinite">
    <line x1="150" y1="120" x2="180" y2="120" stroke="#3d8ef7" stroke-width="2" opacity="0.7"/>
    <line x1="150" y1="120" x2="120" y2="120" stroke="#3d8ef7" stroke-width="2" opacity="0.7"/>
    <line x1="150" y1="120" x2="180" y2="180" stroke="#3d8ef7" stroke-width="2" opacity="0.7"/>
    <line x1="150" y1="120" x2="120" y2="180" stroke="#3d8ef7" stroke-width="2" opacity="0.7"/>
  </animate>

  <!-- Footer Section -->
  <footer>
    <rect x="50" y="380" width="320" height="30" fill="#3d8ef7" opacity="0.7"/>
    <text x="160" y="400" font-size="18" font-family="Arial" fill="#1a1d23">Game Playing</text>
  </footer>
</svg>