<svg width="420" height="400" data-topic-id="text-book-1-ch-4" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-family="Arial" fill="#2E4053">
    Introduction to Artificial Intelligence: Knowledge Representation Issues
  </text>
  
  <!-- Section 1: Introduction -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="300" height="50" fill="#4CAF50" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#2E4053" data-narration="This is the introduction to knowledge representation issues in artificial intelligence">
      Introduction
    </text>
    <animateTransform dur="2000" begin="0s" value="translate(300, 100)" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 2: Definitions -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="300" height="50" fill="#87CEEB" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#2E4053" data-narration="Knowledge representation is the process of representing knowledge in a computer program using a formal language or syntax. Predicate logic is a formal language used to represent knowledge in a logical and systematic way.">
      Definitions
    </text>
    <animateTransform dur="2000" begin="0.5s" value="translate(300, 250)" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 3: Predicate Logic Basics -->
  <g transform="translate(50, 400)">
    <rect x="0" y="0" width="300" height="50" fill="#FF9800" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#2E4053" data-narration="Predicates are statements that are true or false, such as 'John is a student' or 'The sky is blue'. Variables symbolize unknown values, such as 'x' or 'y'. Statements are composed of predicates, variables, and logical operators.">
      Predicate Logic Basics
    </text>
    <animateTransform dur="2000" begin="1s" value="translate(300, 400)" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 4: Types of Predicate Logic Statements -->
  <g transform="translate(50, 550)">
    <rect x="0" y="0" width="300" height="50" fill="#0097A7" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#2E4053" data-narration="Atomic statements are composed of a single predicate, such as 'John is a student'. Compound statements are composed of multiple predicates and logical operators, such as 'John is a student and the sky is blue'. Negated statements are negated, such as 'John is not a student'.">
      Types of Predicate Logic Statements
    </text>
    <animateTransform dur="2000" begin="1.5s" value="translate(300, 550)" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 5: Logical Operators -->
  <g transform="translate(50, 700)">
    <rect x="0" y="0" width="300" height="50" fill="#CDDC39" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#2E4053" data-narration="Conjunction represents 'and', disjunction represents 'or', and negation represents 'not'.">
      Logical Operators
    </text>
    <animateTransform dur="2000" begin="2.5s" value="translate(300, 700)" repeatCount="indefinite"/>
  </g>
  
  <!-- Footer -->
  <text x="50%" y="380%" font-size="18" font-family="Arial" fill="#2E4053">
    Created with love for education
  </text>
</svg>