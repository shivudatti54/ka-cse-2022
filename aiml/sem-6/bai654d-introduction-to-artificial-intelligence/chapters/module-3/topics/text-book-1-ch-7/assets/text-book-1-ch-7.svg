<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="introduction-to-artificial-intelligence-ch-7" xmlns="http://www.w3.org/2000/svg">
    <!-- Gradient Background -->
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

    <!-- Title Section -->
    <section data-narration="Introduction to Symbolic Reasoning under Uncertainty">
        <text x="10" y="50" font-size="24" font-family="Arial, sans-serif" fill="#2196F3">Text Book 1 Ch 7</text>
    </section>

    <!-- Types of Uncertainty Section -->
    <section data-narration="Types of Uncertainty">
        <rect x="10" y="100" width="400" height="50" fill="#F7F7F7" rx="10"/>
        <text x="20" y="120" font-size="18" font-family="Arial, sans-serif" fill="#666" fill opacity="0.8">Epistemic Uncertainty</text>
        <animateTransform attributeName="transform" type="translate" from="0,120" to="0,140" begin="0s" dur="1s"/>
        <text x="20" y="150" font-size="18" font-family="Arial, sans-serif" fill="#666" fill opacity="0.8">Aleatoric Uncertainty</text>
        <animateTransform attributeName="transform" type="translate" from="0,150" to="0,170" begin="0s" dur="1s"/>
        <text x="20" y="180" font-size="18" font-family="Arial, sans-serif" fill="#666" fill opacity="0.8">Ambiguity</text>
        <animateTransform attributeName="transform" type="translate" from="0,180" to="0,200" begin="0s" dur="1s"/>
    </section>

    <!-- Representing Uncertainty Section -->
    <section data-narration="Representing Uncertainty">
        <rect x="10" y="250" width="400" height="50" fill="#F7F7F7" rx="10"/>
        <text x="20" y="270" font-size="18" font-family="Arial, sans-serif" fill="#666" fill opacity="0.8">Probability Theory</text>
        <animateTransform attributeName="transform" type="translate" from="0,270" to="0,290" begin="0s" dur="1s"/>
        <text x="20" y="300" font-size="18" font-family="Arial, sans-serif" fill="#666" fill opacity="0.8">Dempster-Shafer Theory</text>
        <animateTransform attributeName="transform" type="translate" from="0,300" to="0,320" begin="0s" dur="1s"/>
        <text x="20" y="340" font-size="18" font-family="Arial, sans-serif" fill="#666" fill opacity="0.8">Fuzzy Logic</text>
        <animateTransform attributeName="transform" type="translate" from="0,340" to="0,360" begin="0s" dur="1s"/>
    </section>

    <!-- Reasoning under Uncertainty Section -->
    <section data-narration="Reasoning under Uncertainty">
        <rect x="10" y="400" width="400" height="50" fill="#F7F7F7" rx="10"/>
        <text x="20" y="420" font-size="18" font-family="Arial, sans-serif" fill="#666" fill opacity="0.8">Bayesian Networks</text>
        <animateTransform attributeName="transform" type="translate" from="0,420" to="0,440" begin="0s" dur="1s"/>
        <text x="20" y="460" font-size="18" font-family="Arial, sans-serif" fill="#666" fill opacity="0.8">Decision Trees</text>
        <animateTransform attributeName="transform" type="translate" from="0,460" to="0,480" begin="0s" dur="1s"/>
        <text x="20" y="500" font-size="18" font-family="Arial, sans-serif" fill="#666" fill opacity="0.8">Rule-Based Systems</text>
        <animateTransform attributeName="transform" type="translate" from="0,500" to="0,520" begin="0s" dur="1s"/>
    </section>

    <!-- Statistical Reasoning Section -->
    <section data-narration="Statistical Reasoning">
        <rect x="10" y="550" width="400" height="50" fill="#F7F7F7" rx="10"/>
        <text x="20" y="570" font-size="18" font-family="Arial, sans-serif" fill="#666" fill opacity="0.8">Introduction to Statistical Reasoning</text>
        <animateTransform attributeName="transform" type="translate" from="0,570" to="0,590" begin="0s" dur="1s"/>
        <text x="20" y="620" font-size="18" font-family="Arial, sans-serif" fill="#666" fill opacity="0.8">Methods for Statistical Reasoning</text>
        <animateTransform attributeName="transform" type="translate" from="0,620" to="0,640" begin="0s" dur="1s"/>
        <text x="20" y="660" font-size="18" font-family="Arial, sans-serif" fill="#666" fill opacity="0.8">Applications of Statistical Reasoning</text>
        <animateTransform attributeName="transform" type="translate" from="0,660" to="0,680" begin="0s" dur="1s"/>
    </section>

    <!-- Footer Section -->
    <footer>
        <text x="10" y="390" font-size="18" font-family="Arial, sans-serif" fill="#666" fill opacity="0.8"> <a href="#">Back</a></text>
    </footer>
</svg>