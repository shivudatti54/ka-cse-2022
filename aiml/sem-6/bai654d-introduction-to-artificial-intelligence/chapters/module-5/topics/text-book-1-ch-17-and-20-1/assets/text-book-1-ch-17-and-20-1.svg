<svg width="420" height="400" data-topic-id="text-book-1-ch-17-and-20-1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xml:space="preserve">
  <!-- Title Section -->
  <rect x="50" y="20" width="300" height="40" fill="#3498db" rx="10" data-narration="Introduction to Learning"/>
  <text x="170" y="35" font-size="24" font-family="Arial" fill="#ffffff" text-anchor="middle">Learning</text>
  <animate transform="rotate(360 170 35)" dur="2000" begin="0s" repeatCount="indefinite"/>
  
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87ceeb"/>
      <stop offset="50%" stop-color="#6495ed"/>
      <stop offset="100%" stop-color="#87ceeb"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Section 1: Supervised Learning -->
  <rect x="50" y="80" width="300" height="120" fill="#f1c40f" rx="10" data-narration="Supervised Learning: Learning from labeled data"/>
  <rect x="50" y="80" width="300" height="20" fill="#fff" rx="5" data-narration="The machine learns to map inputs to outputs based on the labeled data"/>
  <rect x="50" y="100" width="300" height="20" fill="#fff" rx="5" data-narration="Example: Image recognition"/>
  <animate transform="translateX(30) rotate(360 50 100)" dur="2000" begin="0s" repeatCount="indefinite"/>
  
  <!-- Section 2: Unsupervised Learning -->
  <rect x="50" y="220" width="300" height="120" fill="#f7dc6f" rx="10" data-narration="Unsupervised Learning: Learning from unlabeled data"/>
  <rect x="50" y="220" width="300" height="20" fill="#fff" rx="5" data-narration="The machine must find patterns or structure in the data on its own"/>
  <rect x="50" y="240" width="300" height="20" fill="#fff" rx="5" data-narration="Example: Speech recognition"/>
  <animate transform="translateX(30) rotate(360 50 240)" dur="2000" begin="0s" repeatCount="indefinite"/>
  
  <!-- Section 3: Training Data -->
  <rect x="50" y="340" width="300" height="80" fill="#2ecc71" rx="10" data-narration="Training Data: Data used to train a machine learning model"/>
  <rect x="50" y="340" width="300" height="20" fill="#fff" rx="5" data-narration="Example: Image recognition"/>
  <animate transform="translateX(30) rotate(360 50 340)" dur="2000" begin="0s" repeatCount="indefinite"/>
  
  <!-- Section 4: Test Data -->
  <rect x="50" y="420" width="300" height="80" fill="#e74c3c" rx="10" data-narration="Test Data: Data used to evaluate a machine learning model"/>
  <rect x="50" y="420" width="300" height="20" fill="#fff" rx="5" data-narration="Example: Speech recognition"/>
  <animate transform="translateX(30) rotate(360 50 420)" dur="2000" begin="0s" repeatCount="indefinite"/>
  
  <!-- Footer Section -->
  <text x="170" y="450" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="middle">AI Learning</text>
</svg>