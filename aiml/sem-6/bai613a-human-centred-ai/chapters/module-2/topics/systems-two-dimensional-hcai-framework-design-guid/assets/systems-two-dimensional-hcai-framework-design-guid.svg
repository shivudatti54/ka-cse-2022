<svg width="420" height="400" data-topic-id="systems-two-dimensional-hcai-framework-design-guidelines-and-examples" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#C5CAE9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Title at top -->
  <text x="20" y="20" fill="#2E4053" font-size="24" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#C7B8EA">Two-Dimensional HCAI Framework Design Guidelines and Examples</tspan>
  </text>

  <!-- Gradient background with pastel colors -->
  <rect x="0" y="40" width="420" height="300" fill="url(#background-gradient)"/>

  <!-- Section 1: Systems -->
  <rect x="10" y="50" width="400" height="100" fill="#F7F7F7" rx="10" data-narration="A system in the context of Human-Centred AI (HCAI) refers to a collection of components, processes, and interactions that work together to achieve a specific goal or function. In HCAI, systems are designed to be reliable, safe, and trustworthy.">
    <animate transform="translate(10px, 50px)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </rect>

  <text x="15" y="70" fill="#2E4053" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#C7B8EA">Systems</tspan>
  </text>

  <text x="15" y="90" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#666666">Interconnected components, complexity, and scalability</tspan>
  </text>

  <circle cx="50" cy="150" r="5" fill="#2E4053" stroke="#666666" stroke-width="2" data-topic-id="systems-interconnectedness"/>

  <text x="15" y="170" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#C7B8EA">Interconnectedness</tspan>
  </text>

  <text x="15" y="190" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#666666">Complexity, scalability, and maintainability</tspan>
  </text>

  <circle cx="150" cy="150" r="5" fill="#2E4053" stroke="#666666" stroke-width="2" data-topic-id="systems-complexity"/>

  <text x="15" y="170" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#C7B8EA">Complexity</tspan>
  </text>

  <text x="15" y="190" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#666666">Scalability, maintainability, and adaptability</tspan>
  </text>

  <circle cx="250" cy="150" r="5" fill="#2E4053" stroke="#666666" stroke-width="2" data-topic-id="systems-scalability"/>

  <text x="15" y="170" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#C7B8EA">Scalability</tspan>
  </text>

  <!-- Section 2: Two-Dimensional HCAI Framework -->
  <rect x="10" y="250" width="400" height="100" fill="#F7F7F7" rx="10" data-narration="The Two-Dimensional HCAI Framework is a holistic approach that combines two key dimensions to ensure human-centered design: Human Factors and Technological Factors.">
    <animate transform="translate(10px, 250px)" begin="2s" dur="2s" repeatCount="indefinite"/>
  </rect>

  <text x="15" y="270" fill="#2E4053" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#C7B8EA">Two-Dimensional HCAI Framework</tspan>
  </text>

  <text x="15" y="290" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#666666">Human Factors, Technological Factors, and Human-Technology Interaction</tspan>
  </text>

  <circle cx="50" cy="340" r="5" fill="#2E4053" stroke="#666666" stroke-width="2" data-topic-id="two-dimensional-hcai-framework-human-factors"/>

  <text x="15" y="360" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#C7B8EA">Human Factors</tspan>
  </text>

  <text x="15" y="380" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#666666">User needs, capabilities, and limitations</tspan>
  </text>

  <circle cx="150" cy="340" r="5" fill="#2E4053" stroke="#666666" stroke-width="2" data-topic-id="two-dimensional-hcai-framework-technological-factors"/>

  <text x="15" y="360" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#C7B8EA">Technological Factors</tspan>
  </text>

  <text x="15" y="380" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#666666">AI and technological capabilities, limitations, and biases</tspan>
  </text>

  <circle cx="250" cy="340" r="5" fill="#2E4053" stroke="#666666" stroke-width="2" data-topic-id="two-dimensional-hcai-framework-human-technology-interaction"/>

  <text x="15" y="360" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#C7B8EA">Human-Technology Interaction</tspan>
  </text>

  <text x="15" y="380" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#666666">Designing for usability, accessibility, and user experience</tspan>
  </text>

  <!-- Section 3: Best Practices -->
  <rect x="10" y="350" width="400" height="100" fill="#F7F7F7" rx="10" data-narration="To design effective systems, follow these best practices:">
    <animate transform="translate(10px, 350px)" begin="4s" dur="2s" repeatCount="indefinite"/>
  </rect>

  <text x="15" y="370" fill="#2E4053" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#C7B8EA">Best Practices</tspan>
  </text>

  <text x="15" y="390" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#666666">Modularity, testing and validation, and continuous improvement</tspan>
  </text>

  <text x="15" y="410" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#666666">Ensuring reliability, safety, and trustworthiness</tspan>
  </text>

  <text x="15" y="430" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#666666">Adapting to emerging threats and opportunities</tspan>
  </text>

  <!-- Section 4: Examples -->
  <rect x="10" y="220" width="400" height="100" fill="#F7F7F7" rx="10" data-narration="Here are some examples of systems that demonstrate the Two-Dimensional HCAI Framework in practice:">
    <animate transform="translate(10px, 220px)" begin="6s" dur="2s" repeatCount="indefinite"/>
  </rect>

  <text x="15" y="240" fill="#2E4053" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#C7B8EA">Examples</tspan>
  </text>

  <text x="15" y="260" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#666666">Smart home systems, healthcare systems, financial systems</tspan>
  </text>

  <text x="15" y="280" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#666666">Integrating human-centered design with technological capabilities</tspan>
  </text>

  <text x="15" y="300" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#666666">Ensuring reliability, safety, and trustworthiness</tspan>
  </text>

  <!-- Footer -->
  <text x="20" y="400" fill="#2E4053" font-size="12" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#666666">2023</tspan>
  </text>
</svg>