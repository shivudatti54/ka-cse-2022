<svg width="420" height="400" data-topic-id="Practice-Safety-Culture-Through-Business-Management-Strategies">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-grad)" width="100%" height="100%"/>

  <!-- Title -->
  <text x="10%" y="10%" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#0288D1">
    Practice Safety Culture Through Business Management Strategies
  </text>

  <!-- Section 1: Value-based approach -->
  <g transform="translate(10%, 20%)">
    <rect width="80%" height="40%" fill="#F7F7F7" rx="10"/>
    <text x="10%" y="15%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#3B5998">
      Value-based approach
    </text>
    <animate transform="translate(10%, 20%) rotate(0) scale(1)" begin="0s" dur="2s" repeat="forever"/>
    <text x="10%" y="30%" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#3B5998" data-narration>
        Organizations that prioritize safety as a core value are more likely to foster a safety culture.
      </text>
  </g>

  <!-- Section 2: Employee engagement -->
  <g transform="translate(10%, 60%)">
    <rect width="80%" height="40%" fill="#F7F7F7" rx="10"/>
    <text x="10%" y="15%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#34C759">
      Employee engagement
    </text>
    <animate transform="translate(10%, 60%) rotate(0) scale(1)" begin="2s" dur="2s" repeat="forever"/>
    <text x="10%" y="30%" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#34C759" data-narration>
        Employees who feel empowered to report incidents and near-misses are more likely to contribute to a safety culture.
      </text>
  </g>

  <!-- Section 3: Leadership commitment -->
  <g transform="translate(10%, 100%)">
    <rect width="80%" height="40%" fill="#F7F7F7" rx="10"/>
    <text x="10%" y="15%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#FFC107">
      Leadership commitment
    </text>
    <animate transform="translate(10%, 100%) rotate(0) scale(1)" begin="4s" dur="2s" repeat="forever"/>
    <text x="10%" y="30%" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#FFC107" data-narration>
        Leaders must demonstrate a commitment to safety and lead by example.
      </text>
  </g>

  <!-- Section 4: Training and development -->
  <g transform="translate(10%, 140%)">
    <rect width="80%" height="40%" fill="#F7F7F7" rx="10"/>
    <text x="10%" y="15%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2196F3">
      Training and development
    </text>
    <animate transform="translate(10%, 140%) rotate(0) scale(1)" begin="6s" dur="2s" repeat="forever"/>
    <text x="10%" y="30%" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#2196F3" data-narration>
        Regular training and development opportunities can help employees understand and apply safety procedures.
      </text>
  </g>

  <!-- Section 5: Reporting mechanism -->
  <g transform="translate(10%, 180%)">
    <rect width="80%" height="40%" fill="#F7F7F7" rx="10"/>
    <text x="10%" y="15%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#03A9F4">
      Reporting mechanism
    </text>
    <animate transform="translate(10%, 180%) rotate(0) scale(1)" begin="8s" dur="2s" repeat="forever"/>
    <text x="10%" y="30%" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#03A9F4" data-narration>
        Establish a confidential reporting mechanism for employees to report incidents and near-misses.
      </text>
  </g>

  <!-- Section 6: Recognition and reward -->
  <g transform="translate(10%, 220%)">
    <rect width="80%" height="40%" fill="#F7F7F7" rx="10"/>
    <text x="10%" y="15%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#FF9801">
      Recognition and reward
    </text>
    <animate transform="translate(10%, 220%) rotate(0) scale(1)" begin="10s" dur="2s" repeat="forever"/>
    <text x="10%" y="30%" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#FF9801" data-narration>
        Recognize and reward employees who demonstrate safe behavior.
      </text>
  </g>

  <!-- Footer -->
  <text x="10%" y="380%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#0288D1">
    Created by [Your Name]
  </text>
</svg>