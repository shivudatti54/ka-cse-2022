<svg width="420" height="400" data-topic-id="automation-ai-robots" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
    <style>
      .section {
        background: linear-gradient(to bottom, #A1C9F2, #C9E4CA);
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      .section[data-narration="Introduction"] {
        margin-bottom: 20px;
      }
      .section[data-narration="Key Concepts"] {
        margin-bottom: 40px;
      }
      .section[data-narration="The Impact of Automation, AI, and Robots on Unemployment"] {
        margin-bottom: 60px;
      }
      .section[data-narration="Mitigating the Risks of Unemployment"] {
        margin-bottom: 40px;
      }
      .title {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .footer {
        font-size: 14px;
        color: #666;
        text-align: center;
        margin-top: 20px;
      }
    </style>
  </defs>
  <g id="diagram">
    <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
    <text x="20" y="30" font-size="24" font-weight="bold" text-anchor="middle" class="title">In the Same Category: Will Automation, AI, and Robots?</text>
    <text x="20" y="60" font-size="18" text-anchor="middle" class="footer">Developed by [Your Name]</text>
    <section data-narration="Introduction" class="section">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="10,-10" dur="2s" begin="0s"/>
      <animateTransform attributeName="transform" type="translate" from="20,20" to="10,-10" dur="2s" begin="2s"/>
      <text x="10" y="-10" font-size="18" text-anchor="middle" class="section-title">Introduction</text>
      <text x="10" y="30" font-size="16" text-anchor="middle" class="section-text">The increasing use of automation, AI, and robots in various industries has raised concerns about the potential for widespread unemployment.</text>
    </section>
    <section data-narration="Key Concepts" class="section">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="2s" begin="4s"/>
      <animateTransform attributeName="transform" type="translate" from="20,20" to="10,-10" dur="2s" begin="6s"/>
      <text x="10" y="30" font-size="18" text-anchor="middle" class="section-title">Key Concepts</text>
      <text x="10" y="60" font-size="16" text-anchor="middle" class="section-text">Automation, AI, and robots involve the use of technology to perform tasks or processes that were previously done by humans.</text>
    </section>
    <section data-narration="The Impact of Automation, AI, and Robots on Unemployment" class="section">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="-10,10" dur="2s" begin="8s"/>
      <animateTransform attributeName="transform" type="translate" from="20,20" to="0,0" dur="2s" begin="10s"/>
      <text x="-10" y="10" font-size="18" text-anchor="middle" class="section-title">The Impact of Automation, AI, and Robots on Unemployment</text>
      <text x="-10" y="50" font-size="16" text-anchor="middle" class="section-text">According to a report by the McKinsey Global Institute, up to 800 million jobs could be lost worldwide due to automation by 2030.</text>
    </section>
    <section data-narration="Mitigating the Risks of Unemployment" class="section">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-20" dur="2s" begin="12s"/>
      <animateTransform attributeName="transform" type="translate" from="20,20" to="-10,10" dur="2s" begin="14s"/>
      <text x="0" y="30" font-size="18" text-anchor="middle" class="section-title">Mitigating the Risks of Unemployment</text>
      <text x="0" y="60" font-size="16" text-anchor="middle" class="section-text">To mitigate the risks of unemployment, it is essential to develop new skills and adapt to changing job requirements.</text>
    </section>
    <g id="arrow">
      <path d="M 10 20 L 30 50" stroke="#666" stroke-width="2" fill="none"/>
      <path d="M 30 50 L 50 70" stroke="#666" stroke-width="2" fill="none"/>
    </g>
  </g>
</svg>