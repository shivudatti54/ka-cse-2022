    <text x="10" y="65" font-size="18" font-family="Arial" fill="#ffffff">Assessing trustworthiness, caring for, and learning from older adults are crucial aspects of HCAI.</text>
    <data-narration xml:id="conclusion-value">These aspects are essential for developing AI systems that can provide compassionate and personalized support to older adults.</data-narration>
  </g>
  
  <g id="footer">
    <rect x="0" y="370" width="420" height="30" fill="#3498db" rx="10"/>
    <text x="10" y="385" font-size="18" font-family="Arial" fill="#ffffff">HCAI Forward</text>
    <text x="10" y="405" font-size="18" font-family="Arial" fill="#ffffff">Assessing Trustworthiness, Caring for, and Learning from Older Adults</text>
  </g>
