    <text x="10" y="25" font-size="18" font-family="Arial" fill="#ffffff">Reliability</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -20" dur="0.5s" repeatCount="indefinite"/>
    <text x="10" y="65" font-size="18" font-family="Arial" fill="#ffffff">Prediction</text>
    <data-narration xml:id="reliability-prediction">The ability of AI systems to make accurate and consistent predictions.</data-narration>
  </g>
  
  <g id="accountability" transform="translate(240, 140)">
    <title>Accountability</title>
    <rect x="0" y="0" width="200" height="50" fill="#e67e65" rx="10"/>
    <text x="10" y="25" font-size="18" font-family="Arial" fill="#ffffff">Accountability</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -20" dur="0.5s" repeatCount="indefinite"/>
    <text x="10" y="65" font-size="18" font-family="Arial" fill="#ffffff">Responsibility</text>
    <data-narration xml:id="accountability-responsibility">The ability of AI systems to take responsibility for their actions.</data-narration>
  </g>
  
  <g id="caring-for" transform="translate(20, 220)">
