    <rect x="0" y="0" width="200" height="50" fill="#2ecc71" rx="10"/>
    <text x="10" y="25" font-size="18" font-family="Arial" fill="#ffffff">Caring for Older Adults</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -20" dur="0.5s" repeatCount="indefinite"/>
    <text x="10" y="65" font-size="18" font-family="Arial" fill="#ffffff">Definition</text>
    <data-narration xml:id="caring-for-definition">Caring for older adults in the context of HCAI refers to the development of AI systems that can provide compassionate and personalized support.</data-narration>
  </g>
  
  <g id="companion-care" transform="translate(240, 220)">
    <title>Companion Care</title>
    <rect x="0" y="0" width="200" height="50" fill="#e74c3c" rx="10"/>
    <text x="10" y="25" font-size="18" font-family="Arial" fill="#ffffff">Companion Care</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -20" dur="0.5s" repeatCount="indefinite"/>
    <text x="10" y="65" font-size="18" font-family="Arial" fill="#ffffff">Personalized Support</text>
    <data-narration xml:id="companion-care-support">Personalized AI systems that can provide compassionate and supportive care to older adults.</data-narration>
  </g>
  
  <g id="learning-from" transform="translate(240, 280)">
