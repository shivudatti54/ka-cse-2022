    <rect x="0" y="0" width="200" height="50" fill="#e67e65" rx="10"/>
    <text x="10" y="25" font-size="18" font-family="Arial" fill="#ffffff">Learning from Older Adults</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -20" dur="0.5s" repeatCount="indefinite"/>
    <text x="10" y="65" font-size="18" font-family="Arial" fill="#ffffff">Experiences and Insights</text>
    <data-narration xml:id="learning-from-experiences">The value of learning from the experiences and insights of older adults in the development of AI systems.</data-narration>
  </g>
  
  <g id="conclusion" transform="translate(20, 360)">
