<svg width="420" height="400" data-topic-id="hcai-forward-assessing-trustworthiness-caring-for">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F7F7F7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <g id="trustworthiness" transform="translate(20, 20)">
    <title>Assessing Trustworthiness</title>
    <rect x="0" y="0" width="200" height="50" fill="#3498db" rx="10"/>
    <text x="10" y="25" font-size="18" font-family="Arial" fill="#ffffff">Trustworthiness</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -20" dur="0.5s" repeatCount="indefinite"/>
    <text x="10" y="65" font-size="18" font-family="Arial" fill="#ffffff">Definition</text>
    <data-narration xml:id="trustworthiness-definition">Trustworthiness refers to the ability of AI systems to demonstrate reliability, transparency, and accountability in their decision-making processes.</data-narration>
  </g>
  
  <g id="transparency" transform="translate(240, 20)">
    <title>Transparency</title>
    <rect x="0" y="0" width="200" height="50" fill="#2ecc71" rx="10"/>
    <text x="10" y="25" font-size="18" font-family="Arial" fill="#ffffff">Transparency</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -20" dur="0.5s" repeatCount="indefinite"/>
    <text x="10" y="65" font-size="18" font-family="Arial" fill="#ffffff">Explanation</text>
    <data-narration xml:id="transparency-explanation">The ability of AI systems to provide clear explanations of their decision-making processes.</data-narration>
  </g>
  
  <g id="reliability" transform="translate(240, 80)">
