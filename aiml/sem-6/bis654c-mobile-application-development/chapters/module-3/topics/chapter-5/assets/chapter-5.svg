<svg width="420" height="400" data-topic-id="chapter-5-user-experience-and-ui-design">
  <!-- Title Section -->
  <rect x="10" y="10" width="400" height="40" fill="#3498db" rx="10"/>
  <text x="20" y="25" font-size="18" font-family="Arial" fill="#ffffff">Chapter 5: User Experience (UX) and User Interface (UI) Design</text>
  
  <!-- Introduction Section -->
  <rect x="10" y="60" width="400" height="40" fill="#ecf0f1" rx="10"/>
  <text x="20" y="75" font-size="16" font-family="Arial" fill="#333333">Introduction</text>
  <animate xmlns="http://www.w3.org/2000/svg" dur="2000" fill="freeze">
    <animateTransform attributeName="x" type="translate" from="10" to="10" begin="0s" sequential="true"/>
  </animate>
  <section data-narration="Section 1">
    <rect x="10" y="110" width="400" height="120" fill="#f9f9f9" rx="10"/>
    <text x="20" y="130" font-size="14" font-family="Arial" fill="#333333">User Experience (UX) Design</text>
    <rect x="10" y="150" width="350" height="30" fill="#3498db" rx="5"/>
    <text x="20" y="170" font-size="14" font-family="Arial" fill="#ffffff">A design approach that focuses on understanding the user's needs and designing the product to meet those needs.</text>
    <rect x="10" y="200" width="350" height="30" fill="#ecf0f1" rx="5"/>
    <text x="20" y="220" font-size="14" font-family="Arial" fill="#333333">User-centered design, user research, user testing, wireframing, and prototyping are key concepts in UX design.</text>
  </section>
  
  <!-- Key Concepts Section -->
  <rect x="10" y="350" width="400" height="40" fill="#3498db" rx="10"/>
  <text x="20" y="365" font-size="16" font-family="Arial" fill="#ffffff">Key Concepts in UX Design</text>
  <animate xmlns="http://www.w3.org/2000/svg" dur="2000" fill="freeze">
    <animateTransform attributeName="x" type="translate" from="10" to="10" begin="0s" sequential="true"/>
  </animate>
  <section data-narration="Section 2">
    <rect x="10" y="400" width="350" height="120" fill="#f9f9f9" rx="10"/>
    <text x="20" y="420" font-size="14" font-family="Arial" fill="#333333">Visual Hierarchy</text>
    <rect x="10" y="450" width="350" height="30" fill="#ecf0f1" rx="5"/>
    <text x="20" y="470" font-size="14" font-family="Arial" fill="#333333">The arrangement of visual elements to guide the user's attention.</text>
    <rect x="10" y="500" width="350" height="30" fill="#ecf0f1" rx="5"/>
    <text x="20" y="520" font-size="14" font-family="Arial" fill="#333333">Typography, color scheme, imagery, and iconography are key elements in UI design.</text>
  </section>
  
  <!-- Design Principles Section -->
  <rect x="10" y="650" width="400" height="40" fill="#3498db" rx="10"/>
  <text x="20" y="665" font-size="16" font-family="Arial" fill="#ffffff">Design Principles</text>
  <animate xmlns="http://www.w3.org/2000/svg" dur="2000" fill="freeze">
    <animateTransform attributeName="x" type="translate" from="10" to="10" begin="0s" sequential="true"/>
  </animate>
  <section data-narration="Section 3">
    <rect x="10" y="700" width="350" height="120" fill="#f9f9f9" rx="10"/>
    <text x="20" y="720" font-size="14" font-family="Arial" fill="#333333">Consistency</text>
    <rect x="10" y="750" width="350" height="30" fill="#ecf0f1" rx="5"/>
    <text x="20" y="770" font-size="14" font-family="Arial" fill="#333333">The use of consistent design elements throughout the application.</text>
    <rect x="10" y="800" width="350" height="30" fill="#ecf0f1" rx="5"/>
    <text x="20" y="820" font-size="14" font-family="Arial" fill="#333333">Reusability is another key principle in UX design.</text>
  </section>
  
  <!-- Footer Section -->
  <rect x="10" y="950" width="400" height="40" fill="#3498db" rx="10"/>
  <text x="20" y="965" font-size="16" font-family="Arial" fill="#ffffff">Footer</text>
</svg>