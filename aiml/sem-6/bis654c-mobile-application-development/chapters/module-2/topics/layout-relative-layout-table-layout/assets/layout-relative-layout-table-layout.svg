  <text x="400" y="15" font-size="14" font-family="Arial" fill="#444444">Anchors and Connections</text>
  <text x="400" y="60" font-size="14" font-family="Arial" fill="#444444">Table Layouts provide a flexible and efficient way to arrange multiple views.</text>
  <text x="400" y="100" font-size="14" font-family="Arial" fill="#444444">Anchors can be used to create connections between views.</text>
  <text x="400" y="140" font-size="14" font-family="Arial" fill="#444444">The TableLayout can be used to create complex, relative layouts.</text>
  <text x="400" y="180" font-size="14" font-family="Arial" fill="#444444">A TableLayout can be used to arrange multiple views in a table structure.</text>
  <text x="400" y="220" font-size="14" font-family="Arial" fill="#444444">TableLayouts can be used to create flexible and efficient layouts.</text>
  <text x="400" y="260" font-size="14" font-family="Arial" fill="#444444">A TableLayout provides a flexible and efficient way to manage complex layouts.</text>
