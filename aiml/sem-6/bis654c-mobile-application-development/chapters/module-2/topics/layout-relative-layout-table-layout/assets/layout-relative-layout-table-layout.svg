  <title>Layout Relative Layout Table Layout</title>
  <rect x="10" y="10" width="400" height="30" fill="url(#linear-gradient)" rx="5" />
  <text x="15" y="40" font-size="20" font-family="Arial" fill="#333333">Layout Relative Layout Table Layout</text>
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" repeatCount="indefinite">
    <rect x="10" y="10" width="400" height="30" fill="url(#linear-gradient)" rx="5" />
  </animate>
  <g>
    <rect x="10" y="50" width="350" height="200" fill="#ffffff" rx="5" />
    <rect x="10" y="250" width="350" height="50" fill="#ffffff" rx="5" />
  </g>
  <text x="15" y="60" font-size="16" font-family="Arial" fill="#444444">Table Layout</text>
  <text x="15" y="280" font-size="16" font-family="Arial" fill="#444444">Row and Column</text>
  <text x="15" y="110" font-size="16" font-family="Arial" fill="#444444">Cell</text>
  <text x="15" y="190" font-size="16" font-family="Arial" fill="#444444">Weight and Orientation</text>
  <text x="15" y="270" font-size="16" font-family="Arial" fill="#444444">Animation</text>
  <text x="15" y="120" font-size="14" font-family="Arial" fill="#666666">A Layout Relative Layout is a type of layout that allows designers to create complex, relative layouts using a combination of Absolute and Relative layouts.</text>
  <text x="15" y="200" font-size="14" font-family="Arial" fill="#666666">A Table Layout is a Layout Relative Layout that uses a table structure to arrange multiple views.</text>
  <text x="15" y="280" font-size="14" font-family="Arial" fill="#666666">The TableLayout is a view that defines a table layout.</text>
  <text x="15" y="120" font-size="14" font-family="Arial" fill="#666666">A row and column is a unit of layout that can hold multiple views.</text>
  <text x="15" y="200" font-size="14" font-family="Arial" fill="#666666">A cell is a rectangular area that contains multiple views.</text>
  <text x="15" y="280" font-size="14" font-family="Arial" fill="#666666">The weight attribute determines the proportion of the available space that a row or column will occupy.</text>
  <text x="15" y="120" font-size="14" font-family="Arial" fill="#666666">The orientation attribute determines whether a row or column should be vertical or horizontal.</text>
  <text x="15" y="200" font-size="14" font-family="Arial" fill="#666666">Animations can be used to animate the position, size, and opacity of views.</text>
  <path d="M 20 20 L 100 100 L 180 20" stroke="#33cc33" stroke-width="2" fill="none" />
  <g>
