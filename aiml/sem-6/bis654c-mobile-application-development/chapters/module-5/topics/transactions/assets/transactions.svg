<svg width="420" height="400" data-topic-id="transactions">
  <!-- Title -->
  <rect x="50" y="20" width="320" height="40" fill="#3498db" rx="10">
    <text x="130" y="30" fill="#ffffff" font-size="24" font-family="Arial" text-anchor="middle">Transactions</text>
  </rect>

  <!-- Background Gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#4682b4"/>
    </linearGradient>
  </defs>
  <rect x="0" y="50" width="420" height="300" fill="url(#gradient)" rx="10"/>

  <!-- Section 1: Introduction to Transactions -->
  <section data-narration="Introduction to Transactions">
    <rect x="50" y="120" width="320" height="40" fill="#f1c40f" rx="10">
      <text x="130" y="130" fill="#000000" font-size="18" font-family="Arial" text-anchor="middle">Atomicity, Consistency, Isolation, Durability</text>
    </rect>
    <animateTransform attributeName="transform" type="translateX" from="0" to="-320" dur="2s" begin="0s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translateX" from="-320" to="0" dur="2s" begin="0s" repeatCount="indefinite"/>
  </section>

  <!-- Section 2: Auto-Commit Mode -->
  <section data-narration="Auto-Commit Mode">
    <rect x="50" y="180" width="320" height="40" fill="#2ecc71" rx="10">
      <text x="130" y="190" fill="#000000" font-size="18" font-family="Arial" text-anchor="middle">Default, each SQL statement is treated as an individual transaction</text>
    </rect>
    <animateTransform attributeName="transform" type="translateX" from="0" to="-320" dur="2s" begin="0s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translateX" from="-320" to="0" dur="2s" begin="0s" repeatCount="indefinite"/>
  </section>

  <!-- Section 3: Manual Transaction Control -->
  <section data-narration="Manual Transaction Control">
    <rect x="50" y="240" width="320" height="40" fill="#e74c3c" rx="10">
      <text x="130" y="250" fill="#000000" font-size="18" font-family="Arial" text-anchor="middle">Disable auto-commit, execute SQL statements, commit or rollback</text>
    </rect>
    <animateTransform attributeName="transform" type="translateX" from="0" to="-320" dur="2s" begin="0s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translateX" from="-320" to="0" dur="2s" begin="0s" repeatCount="indefinite"/>
  </section>

  <!-- Section 4: Transaction Isolation Levels -->
  <section data-narration="Transaction Isolation Levels">
    <rect x="50" y="300" width="320" height="40" fill="#1abc9c" rx="10">
      <text x="130" y="310" fill="#000000" font-size="18" font-family="Arial" text-anchor="middle">Different levels control how transactions interact with each other</text>
    </rect>
    <animateTransform attributeName="transform" type="translateX" from="0" to="-320" dur="2s" begin="0s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translateX" from="-320" to="0" dur="2s" begin="0s" repeatCount="indefinite"/>
  </section>

  <!-- Footer -->
  <rect x="50" y="360" width="320" height="40" fill="#e74c3c" rx="10">
    <text x="130" y="370" fill="#ffffff" font-size="18" font-family="Arial" text-anchor="middle">Transactions</text>
  </rect>
</svg>