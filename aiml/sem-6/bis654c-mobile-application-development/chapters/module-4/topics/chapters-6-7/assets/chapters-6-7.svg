<svg width="420" height="400" data-topic-id="mobile-application-development-chapters-6-7"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" 
     viewBox="0 0 420 400" style="overflow: visible;">
 <defs>
  <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
   <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
   <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
  </linearGradient>
  <linearGradient id="footerGradient" x1="0%" y1="100%" x2="100%" y2="100%">
   <stop offset="0%" stop-color="#CC6633" stop-opacity="1"/>
   <stop offset="100%" stop-color="#FF9900" stop-opacity="1"/>
  </linearGradient>
 </defs>
 <title style="font-family: Arial, sans-serif; font-size: 24px; text-align: center; margin-top: 10px; color: #66CCCC; transform: rotate(5deg);">
  Mobile Application Development: Chapters 6 & 7
 </title>
 <rect x="10" y="10" width="400" height="30" rx="5" style="fill: #66CCCC; transform: rotate(5deg);">
 </rect>
 <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="5 200 200" dur="3s" begin="0s"/>
 <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="10 200 200" dur="3s" begin="3s"/>
 <rect x="10" y="40" width="300" height="50" style="fill: #DDFFFA; border-radius: 5px;"/>
 <rect x="15" y="50" width="280" height="40" style="fill: none; stroke: #33CCCC; stroke-width: 2;"/>
 <animateTransform attributeName="transform" type="rotate" from="0 175 175" to="0 175 175" dur="3s" begin="0s"/>
 <rect x="10" y="100" width="300" height="50" style="fill: #DDFFFA; border-radius: 5px;"/>
 <rect x="15" y="110" width="280" height="40" style="fill: none; stroke: #33CCCC; stroke-width: 2;"/>
 <rect x="10" y="160" width="300" height="30" style="fill: #DDFFFA; border-radius: 5px;"/>
 <rect x="15" y="170" width="280" height="40" style="fill: none; stroke: #33CCCC; stroke-width: 2;"/>
 <animateTransform attributeName="transform" type="rotate" from="0 175 175" to="0 175 175" dur="3s" begin="3s"/>
 <rect x="10" y="210" width="300" height="50" style="fill: #DDFFFA; border-radius: 5px;"/>
 <rect x="15" y="220" width="280" height="40" style="fill: none; stroke: #33CCCC; stroke-width: 2;"/>
 <rect x="10" y="270" width="300" height="30" style="fill: #DDFFFA; border-radius: 5px;"/>
 <rect x="15" y="280" width="280" height="40" style="fill: none; stroke: #33CCCC; stroke-width: 2;"/>
 <animateTransform attributeName="transform" type="rotate" from="0 175 175" to="0 175 175" dur="3s" begin="6s"/>
 <g transform="translate(10, 150)">
  <rect x="15" y="10" width="200" height="40" style="fill: none; stroke: #66CCCC; stroke-width: 2;"/>
  <text x="20" y="20" style="font-family: Arial, sans-serif; font-size: 16px; fill: #66CCCC;">
   Intent System
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 175 175" to="0 175 175" dur="3s" begin="0s"/>
  <rect x="15" y="50" width="180" height="20" style="fill: none; stroke: #66CCCC; stroke-width: 2;"/>
  <text x="20" y="60" style="font-family: Arial, sans-serif; font-size: 14px; fill: #66CCCC;">
   <data-narration>An intent is a message that Android sends to an application component (such as an Activity, Service, or BroadcastReceiver) to perform a specific action.</data-narration>
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 175 175" to="0 175 175" dur="3s" begin="3s"/>
  <rect x="15" y="80" width="180" height="20" style="fill: none; stroke: #66CCCC; stroke-width: 2;"/>
  <text x="20" y="90" style="font-family: Arial, sans-serif; font-size: 14px; fill: #66CCCC;">
   <data-narration>Intents are used to communicate between different components of an app, as well as between different apps.</data-narration>
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 175 175" to="0 175 175" dur="3s" begin="6s"/>
 </g>
 <g transform="translate(10, 220)">
  <rect x="15" y="10" width="200" height="40" style="fill: none; stroke: #66CCCC; stroke-width: 2;"/>
  <text x="20" y="20" style="font-family: Arial, sans-serif; font-size: 16px; fill: #66CCCC;">
   Intent Filters
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 175 175" to="0 175 175" dur="3s" begin="0s"/>
  <rect x="15" y="50" width="180" height="20" style="fill: none; stroke: #66CCCC; stroke-width: 2;"/>
  <text x="20" y="60" style="font-family: Arial, sans-serif; font-size: 14px; fill: #66CCCC;">
   <data-narration>An intent filter is a declaration in the manifest file of an app that specifies which intent actions the app can handle.</data-narration>
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 175 175" to="0 175 175" dur="3s" begin="3s"/>
  <rect x="15" y="80" width="180" height="20" style="fill: none; stroke: #66CCCC; stroke-width: 2;"/>
  <text x="20" y="90" style="font-family: Arial, sans-serif; font-size: 14px; fill: #66CCCC;">
   <data-narration>When an intent is sent to the system, the system will match it with the first intent filter that matches.</data-narration>
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 175 175" to="0 175 175" dur="3s" begin="6s"/>
 </g>
 <g transform="translate(10, 280)">
  <rect x="15" y="10" width="200" height="40" style="fill: none; stroke: #66CCCC; stroke-width: 2;"/>
  <text x="20" y="20" style="font-family: Arial, sans-serif; font-size: 16px; fill: #66CCCC;">
   Activity Life Cycle
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 175 175" to="0 175 175" dur="3s" begin="0s"/>
  <rect x="15" y="50" width="180" height="20" style="fill: none; stroke: #66CCCC; stroke-width: 2;"/>
  <text x="20" y="60" style="font-family: Arial, sans-serif; font-size: 14px; fill: #66CCCC;">
   <data-narration>An activity is a component of an Android app that is responsible for displaying user interface (UI) elements and handling user input.</data-narration>
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 175 175" to="0 175 175" dur="3s" begin="3s"/>
  <rect x="15" y="80" width="180" height="20" style="fill: none; stroke: #66CCCC; stroke-width: 2;"/>
  <text x="20" y="90" style="font-family: Arial, sans-serif; font-size: 14px; fill: #66CCCC;">
   <data-narration>The activity life cycle consists of several states:</data-narration>
  </text>
  <rect x="15" y="110" width="180" height="20" style="fill: none; stroke: #66CCCC; stroke-width: 2;"/>
  <text x="20" y="120" style="font-family: Arial, sans-serif; font-size: 14px; fill: #66CCCC;">
   <data-narration>
    <data-narration> - New: The activity is created but has not been started yet.</data-narration>
    <data-narration> - Created: The activity has been started and is now running.</data-narration>
    <data-narration> - Resume: The activity is running and is visible to the user.</data-narration>
    <data-narration> - Pause: The activity is running but the user has paused it (e.g., to switch to another app).</data-narration>
    <data-narration> - Stopped: The activity has been stopped and will not be resumed.</data-narration>
    <data-narration> - Destroyed: The activity has been destroyed</data-narration>
   </data-narration>
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 175 175" to="0 175 175" dur="3s" begin="6s"/>
 </g>
 <rect x="10" y="320" width="400" height="30" rx="5" style="fill: #66CCCC; transform: rotate(5deg);">
 </rect>
 <rect x="10" y="350" width="400" height="30" rx="5" style="fill: #DDFFFA; border-radius: 5px;"/>
 <rect x="15" y="360" width="380" height="40" style="fill: none; stroke: #66CCCC; stroke-width: 2;">
 </rect>
 <animateTransform attributeName="transform" type="rotate" from="0 190 370" to="0 190 370" dur="3s" begin="0s"/>
 <rect x="10" y="390" width="400" height="30" rx="5" style="fill: #66CCCC; transform: rotate(5deg);">
 </rect>
 <title style="font-family: Arial, sans-serif; font-size: 24px; text-align: center; margin-top: 10px; color: #CC6633; transform: rotate(-5deg);">
  Conclusion
 </title>
 <rect x="10" y="410" width="400" height="30" rx="5" style="fill: #66CCCC; transform: rotate(5deg);">
 </svg>