<svg width="420" height="400" data-topic-id="Multimedia-Android-System-Architecture-Play-Audio" xmlns="http://www.w3.org/2000/svg">
  <title>Android System Architecture - Play Audio and Video</title>
  <desc>Multimedia - Android System Architecture - Play Audio and Video</desc>

  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  <g transform="translate(10, 20)">
    <!-- Section 1: Audio Files -->
    <rect x="0" y="0" width="200" height="100" fill="#E0E0E0">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-100" dur="500ms" begin="0s"/>
      <text x="50%" y="50%" font-size="24" font-weight="bold" fill="#2F4F7F">Audio Files</text>
      <text x="50%" y="70%" font-size="18" fill="#666666">Android supports various audio file formats such as MP3, AAC, and WAV.</text>
    </rect>
    <!-- Connection arrow -->
    <line x1="50%" y1="0" x2="50%" y2="100" stroke="#2F4F7F" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="200" y2="0" stroke="#2F4F7F" stroke-width="2" stroke-linecap="round"/>

    <!-- Section 2: Playing Audio -->
    <rect x="0" y="110" width="200" height="100" fill="#E0E0E0">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-100" dur="500ms" begin="1s"/>
      <text x="50%" y="50%" font-size="24" font-weight="bold" fill="#2F4F7F">Playing Audio</text>
      <text x="50%" y="70%" font-size="18" fill="#666666">To play an audio file, you need to create a MediaPlayer object, specify the audio file path, set the audio file type, and start playing the audio.</text>
    </rect>
    <!-- Connection arrow -->
    <line x1="50%" y1="0" x2="50%" y2="100" stroke="#2F4F7F" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="100" x2="200" y2="100" stroke="#2F4F7F" stroke-width="2" stroke-linecap="round"/>

    <!-- Section 3: Video Playback -->
    <rect x="0" y="220" width="200" height="100" fill="#E0E0E0">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-100" dur="500ms" begin="2s"/>
      <text x="50%" y="50%" font-size="24" font-weight="bold" fill="#2F4F7F">Video Playback</text>
      <text x="50%" y="70%" font-size="18" fill="#666666">Android supports various video file formats such as MP4, AVI, and FLV. Video playback can be achieved using the MediaPlayer class or the VideoView widget.</text>
    </rect>
    <!-- Connection arrow -->
    <line x1="50%" y1="0" x2="50%" y2="100" stroke="#2F4F7F" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="100" x2="200" y2="100" stroke="#2F4F7F" stroke-width="2" stroke-linecap="round"/>

    <!-- Section 4: Text to Speech -->
    <rect x="0" y="330" width="200" height="100" fill="#E0E0E0">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-100" dur="500ms" begin="3s"/>
      <text x="50%" y="50%" font-size="24" font-weight="bold" fill="#2F4F7F">Text to Speech</text>
      <text x="50%" y="70%" font-size="18" fill="#666666">Android provides the textToSpeech method in the SpeechRecognizer class to convert text into speech.</text>
    </rect>
    <!-- Connection arrow -->
    <line x1="50%" y1="0" x2="50%" y2="100" stroke="#2F4F7F" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="100" x2="200" y2="100" stroke="#2F4F7F" stroke-width="2" stroke-linecap="round"/>

    <!-- Footer -->
    <rect x="0" y="380" width="420" height="20" fill="#2F4F7F"/>
    <text x="50%" y="50%" font-size="18" fill="#FFFFFF">Android System Architecture - Play Audio and Video</text>
  </g>
</svg>