<svg width="420" height="400" data-topic-id="service" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="overflow:visible;">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Operating System Services</title>
  <rect x="10" y="10" width="400" height="30" fill="url(#pastel-gradient)" rx="5"/>
  <g transform="translate(15, 40)">
    <rect x="0" y="0" width="100" height="30" fill="#E5E5EA" rx="5"/>
    <text x="5" y="10" text-anchor="middle" font-size="16" font-family="Arial" fill="#4B5154">Program Execution</text>
    <animateTransform attributeName="x" type="translate" from="0" to="100" dur="2s" begin="-0.5s"/>
    <animateTransform attributeName="y" type="translate" from="0" to="0" dur="2s" begin="-0.5s"/>
    <rect x="110" y="0" width="100" height="30" fill="#E5E5EA" rx="5"/>
    <text x="115" y="10" text-anchor="middle" font-size="16" font-family="Arial" fill="#4B5154">Input/Output Operations</text>
    <animateTransform attributeName="x" type="translate" from="110" to="210" dur="2s" begin="-0.5s"/>
    <animateTransform attributeName="y" type="translate" from="0" to="0" dur="2s" begin="-0.5s"/>
    <rect x="220" y="0" width="100" height="30" fill="#E5E5EA" rx="5"/>
    <text x="225" y="10" text-anchor="middle" font-size="16" font-family="Arial" fill="#4B5154">File System Manipulation</text>
    <animateTransform attributeName="x" type="translate" from="220" to="320" dur="2s" begin="-0.5s"/>
    <animateTransform attributeName="y" type="translate" from="0" to="0" dur="2s" begin="-0.5s"/>
    <rect x="330" y="0" width="100" height="30" fill="#E5E5EA" rx="5"/>
    <text x="335" y="10" text-anchor="middle" font-size="16" font-family="Arial" fill="#4B5154">Communication Services</text>
    <animateTransform attributeName="x" type="translate" from="330" to="420" dur="2s" begin="-0.5s"/>
    <animateTransform attributeName="y" type="translate" from="0" to="0" dur="2s" begin="-0.5s"/>
    <rect x="10" y="40" width="400" height="260" fill="#E5E5EA" rx="5"/>
    <g transform="translate(0, 60)">
      <text x="10" y="10" text-anchor="start" font-size="14" font-family="Arial" fill="#4B5154">Program Execution</text>
      <text x="10" y="30" text-anchor="start" font-size="14" font-family="Arial" fill="#4B5154" data-narration="The OS loads programs into memory and executes them, handling complexities such as allocating memory, loading instructions, and managing program termination.">
        <animateTransform attributeName="x" type="translate" from="0" to="100" dur="2s" begin="-0.5s"/>
        <animateTransform attributeName="y" type="translate" from="30" to="0" dur="2s" begin="-0.5s"/>
      </text>
      <rect x="110" y="40" width="100" height="260" fill="#E5E5EA" rx="5"/>
      <text x="115" y="50" text-anchor="start" font-size="14" font-family="Arial" fill="#4B5154" data-narration="Input/Output Operations. User programs cannot execute I/O operations directly; the OS provides standardized interfaces for reading from input devices, writing to output devices, and accessing storage devices.">
        <animateTransform attributeName="x" type="translate" from="110" to="210" dur="2s" begin="-0.5s"/>
        <animateTransform attributeName="y" type="translate" from="50" to="0" dur="2s" begin="-0.5s"/>
      </text>
      <rect x="220" y="40" width="100" height="260" fill="#E5E5EA" rx="5"/>
      <text x="225" y="50" text-anchor="start" font-size="14" font-family="Arial" fill="#4B5154" data-narration="File System Manipulation. The OS manages files and directories through services such as creating, deleting, and renaming files, organizing files into directories, and setting file permissions and attributes.">
        <animateTransform attributeName="x" type="translate" from="220" to="320" dur="2s" begin="-0.5s"/>
        <animateTransform attributeName="y" type="translate" from="50" to="0" dur="2s" begin="-0.5s"/>
      </text>
      <rect x="330" y="40" width="100" height="260" fill="#E5E5EA" rx="5"/>
      <text x="335" y="50" text-anchor="start" font-size="14" font-family="Arial" fill="#4B5154" data-narration="Communication Services. Modern OSs provide mechanisms for processes to communicate with each other, either on the same system or across networks.">
        <animateTransform attributeName="x" type="translate" from="330" to="420" dur="2s" begin="-0.5s"/>
        <animateTransform attributeName="y" type="translate" from="50" to="0" dur="2s" begin="-0.5s"/>
      </text>
    </g>
    <g transform="translate(0, 310)">
      <rect x="10" y="0" width="400" height="90" fill="#E5E5EA" rx="5"/>
      <text x="10" y="10" text-anchor="start" font-size="14" font-family="Arial" fill="#4B5154">Footer</text>
      <line x1="10" y1="20" x2="10" y2="80" stroke="#4B5154" stroke-width="2"/>
    </g>
  </g>
</svg>