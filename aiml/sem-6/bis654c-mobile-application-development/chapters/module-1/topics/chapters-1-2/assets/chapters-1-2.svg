<svg width="420" height="400" data-topic-id="android-os-introduction" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="50%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  <title>Introduction to Android OS</title>
  <g transform="translate(0,10)">
    <rect x="0" y="0" width="420" height="30" fill="#3498db" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#ffffff" text-anchor="start">Chapter 1: Introduction to Android OS</text>
  </g>
  <g transform="translate(0,50)">
    <rect x="0" y="0" width="420" height="150" fill="#ffffff" rx="5"/>
    <text x="10" y="10" font-size="14" font-family="Arial" fill="#666666" text-anchor="start">What is Android OS?</text>
    <section data-narration="Android is an open-source mobile operating system developed by the Open Handset Alliance (OHA)">
      <rect x="0" y="0" width="420" height="80" fill="#ffffff" rx="5"/>
      <text x="10" y="20" font-size="12" font-family="Arial" fill="#666666" text-anchor="start">Android is an open-source mobile operating system developed by the Open Handset Alliance (OHA)</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,80" begin="url(#animation-1)" dur="2s" repeatCount="indefinite"/>
    </section>
    <section data-narration="Key Features of Android OS">
      <rect x="0" y="0" width="420" height="80" fill="#ffffff" rx="5"/>
      <text x="10" y="20" font-size="12" font-family="Arial" fill="#666666" text-anchor="start">Key Features of Android OS</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,80" begin="url(#animation-2)" dur="2s" repeatCount="indefinite"/>
      <text x="50" y="40" font-size="12" font-family="Arial" fill="#666666" text-anchor="start">Open-source and customizable, based on the Linux kernel, supports a wide range of devices, provides a flexible and modular architecture, and offers a variety of user interfaces and experiences</text>
    </section>
    <section data-narration="History of Android OS">
      <rect x="0" y="0" width="420" height="80" fill="#ffffff" rx="5"/>
      <text x="10" y="20" font-size="12" font-family="Arial" fill="#666666" text-anchor="start">History of Android OS</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,80" begin="url(#animation-3)" dur="2s" repeatCount="indefinite"/>
      <text x="50" y="40" font-size="12" font-family="Arial" fill="#666666" text-anchor="start">Founded in 2003, acquired by Google in 2005, released first device in 2008, and updated versions in 2010 and 2011</text>
    </section>
    <section data-narration="Android OS Architecture">
      <rect x="0" y="0" width="420" height="80" fill="#ffffff" rx="5"/>
      <text x="10" y="20" font-size="12" font-family="Arial" fill="#666666" text-anchor="start">Android OS Architecture</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,80" begin="url(#animation-4)" dur="2s" repeatCount="indefinite"/>
      <text x="50" y="40" font-size="12" font-family="Arial" fill="#666666" text-anchor="start">Kernel mode, user mode, and Dalvik virtual machine</text>
    </section>
    <section data-narration="Open Handset Alliance (OHA)">
      <rect x="0" y="0" width="420" height="80" fill="#ffffff" rx="5"/>
      <text x="10" y="20" font-size="12" font-family="Arial" fill="#666666" text-anchor="start">Open Handset Alliance (OHA)</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,80" begin="url(#animation-5)" dur="2s" repeatCount="indefinite"/>
      <text x="50" y="40" font-size="12" font-family="Arial" fill="#666666" text-anchor="start">Google and several leading technology companies collaborate to develop and promote the Android operating system</text>
    </section>
  </g>
  <g transform="translate(0,250)">
    <rect x="0" y="0" width="420" height="50" fill="#ffffff" rx="5"/>
    <text x="10" y="10" font-size="14" font-family="Arial" fill="#666666" text-anchor="start">Chapter 2: Open Handset Alliance (OHA)</text>
  </g>
  <g transform="translate(0,300)">
    <rect x="0" y="0" width="420" height="50" fill="#ffffff" rx="5"/>
    <text x="10" y="10" font-size="14" font-family="Arial" fill="#666666" text-anchor="start">What is OHA?</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,50" begin="url(#animation-6)" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(0,350)">
    <rect x="0" y="0" width="420" height="50" fill="#ffffff" rx="5"/>
    <text x="10" y="10" font-size="14" font-family="Arial" fill="#666666" text-anchor="start">Key Partners of OHA</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,50" begin="url(#animation-7)" dur="2s" repeatCount="indefinite"/>
    <text x="50" y="20" font-size="12" font-family="Arial" fill="#666666" text-anchor="start">Google, Samsung, HTC, Motorola, Sony Ericsson, LG, and OnePlus</text>
  </g>
  <g transform="translate(0,400)">
    <rect x="0" y="0" width="420" height="50" fill="#ffffff" rx="5"/>
    <text x="10" y="10" font-size="14" font-family="Arial" fill="#666666" text-anchor="start">Benefits of OHA</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,50" begin="url(#animation-8)" dur="2s" repeatCount="indefinite"/>
    <text x="50" y="20" font-size="12" font-family="Arial" fill="#666666" text-anchor="start">Open-source, flexible, and modular architecture</text>
  </g>
  <footer>
    <text x="10" y="390" font-size="14" font-family="Arial" fill="#666666" text-anchor="start">Educational Resource</text>
  </footer>
</svg>