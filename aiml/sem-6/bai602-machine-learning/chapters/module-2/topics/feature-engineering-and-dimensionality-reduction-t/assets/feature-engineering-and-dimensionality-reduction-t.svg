<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" version="1.1">
  <!-- Title Section -->
  <g transform="translate(10, 10)">
    <text data-narration="Introduction to Feature Engineering and Dimensionality Reduction" x="10" y="30" fill="#3498db" font-size="24" font-family="Arial, sans-serif">Feature Engineering and Dimensionality Reduction</text>
  </g>
  <!-- Gradient Background -->
  <rect x="0" y="40" width="420" height="330" fill="linear-gradient(to bottom, #c7e4f5, #f7f7f7)" opacity="0.5" rx="10" />
  
  <!-- Section 1: Introduction to Feature Engineering -->
  <g transform="translate(10, 60)">
    <rect x="0" y="0" width="400" height="50" fill="#f7f7f7" rx="10" />
    <text data-narration="Feature engineering is the process of transforming raw data into more useful and meaningful features" x="10" y="20" fill="#2ecc71" font-size="18" font-family="Arial, sans-serif">Feature Engineering</text>
    <animate transform="translate(0, 20)" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  <!-- Section 2: Types of Feature Engineering -->
  <g transform="translate(10, 120)">
    <rect x="0" y="0" width="400" height="50" fill="#f7f7f7" rx="10" />
    <text data-narration="Scaling involves normalizing the data to a common range, usually between 0 and 1" x="10" y="20" fill="#2ecc71" font-size="18" font-family="Arial, sans-serif">Scaling</text>
    <rect x="100" y="0" width="300" height="50" fill="#3498db" rx="10" />
    <text data-narration="Encoding categorical variables involves encoding them into numerical values" x="110" y="20" fill="#2ecc71" font-size="18" font-family="Arial, sans-serif">Encoding</text>
    <animate transform="translate(0, 20)" begin="0.5s" dur="2s" repeatCount="indefinite" />
  </g>
  <!-- Section 3: Handling Missing Values -->
  <g transform="translate(10, 200)">
    <rect x="0" y="0" width="400" height="50" fill="#f7f7f7" rx="10" />
    <text data-narration="Missing values need to be handled to avoid data loss and to ensure that the data is complete and consistent" x="10" y="20" fill="#2ecc71" font-size="18" font-family="Arial, sans-serif">Handling Missing Values</text>
    <animate transform="translate(0, 20)" begin="1s" dur="2s" repeatCount="indefinite" />
  </g>
  <!-- Section 4: Best Practices -->
  <g transform="translate(10, 280)">
    <rect x="0" y="0" width="400" height="50" fill="#f7f7f7" rx="10" />
    <text data-narration="Keep it simple and use domain knowledge to identify the most relevant features" x="10" y="20" fill="#2ecc71" font-size="18" font-family="Arial, sans-serif">Best Practices</text>
    <animate transform="translate(0, 20)" begin="1.5s" dur="2s" repeatCount="indefinite" />
  </g>
  <!-- Section 5: Dimensionality Reduction -->
  <g transform="translate(10, 360)">
    <rect x="0" y="0" width="400" height="50" fill="#f7f7f7" rx="10" />
    <text data-narration="Dimensionality reduction techniques are used to reduce the number of features in a dataset while preserving the most important information" x="10" y="20" fill="#2ecc71" font-size="18" font-family="Arial, sans-serif">Dimensionality Reduction</text>
    <animate transform="translate(0, 20)" begin="2s" dur="2s" repeatCount="indefinite" />
  </g>
  <!-- Title and Footer -->
  <g transform="translate(10, 10)">
    <text x="10" y="30" fill="#3498db" font-size="24" font-family="Arial, sans-serif">Feature Engineering and Dimensionality Reduction</text>
  </g>
  <g transform="translate(10, 390)">
    <text x="10" y="410" fill="#3498db" font-size="24" font-family="Arial, sans-serif">Copyright 2023</text>
  </g>
</svg>