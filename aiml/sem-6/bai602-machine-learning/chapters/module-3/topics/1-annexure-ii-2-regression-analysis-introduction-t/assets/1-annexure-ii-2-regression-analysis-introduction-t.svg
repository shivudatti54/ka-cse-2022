<svg width="420" height="400" data-topic-id="Regression Analysis Introduction">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#79B3FF" stop-opacity="1"/>
            <stop offset="100%" stop-color="#5C7AAF" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <title>Regression Analysis Introduction</title>
    <g transform="translate(20, 20)">
        <rect fill="url(#gradient)" width="380" height="360"/>
        <text x="50%" y="50%" font-size="24" font-family="Arial" fill="#3498DB">Regression Analysis Introduction</text>
        <text x="50%" y="80%" font-size="18" font-family="Arial" fill="#5C7AAF">What is Regression Analysis?</text>
        <section data-narration="Regression Analysis is a statistical method that aims to establish a mathematical relationship between a dependent variable and one or more independent variables.">
            <rect x="20" y="120" width="340" height="100" fill="#FFFFFF" rx="10"/>
            <text x="20" y="150" font-size="18" font-family="Arial" fill="#3498DB">Regression Analysis can be broadly classified into two types:</text>
            <text x="20" y="180" font-size="18" font-family="Arial" fill="#3498DB">Simple Regression and Multiple Regression.</text>
            <animateTransform attributeName="transform" type="rotate" from="0 190 150" to="360 190 150" dur="2000" begin="-2000" repeatCount="indefinite"/>
        </section>
        <section data-narration="Linear Regression is a type of regression analysis that assumes a linear relationship between the independent variable(s) and the dependent variable.">
            <rect x="20" y="240" width="340" height="100" fill="#FFFFFF" rx="10"/>
            <text x="20" y="270" font-size="18" font-family="Arial" fill="#3498DB">Key Concepts:</text>
            <text x="20" y="300" font-size="18" font-family="Arial" fill="#3498DB">Slope (β1), Intercept (β0), and Residuals.</text>
            <animateTransform attributeName="transform" type="rotate" from="0 190 270" to="360 190 270" dur="2000" begin="-2000" repeatCount="indefinite"/>
        </section>
        <section data-narration="Multiple Linear Regression is an extension of linear regression that involves predicting a single continuous outcome variable based on multiple predictor variables.">
            <rect x="20" y="300" width="340" height="100" fill="#FFFFFF" rx="10"/>
            <text x="20" y="330" font-size="18" font-family="Arial" fill="#3498DB">Key Concepts:</text>
            <text x="20" y="360" font-size="18" font-family="Arial" fill="#3498DB">Slope (β1), Intercept (β0), and Residuals.</text>
            <animateTransform attributeName="transform" type="rotate" from="0 190 330" to="360 190 330" dur="2000" begin="-2000" repeatCount="indefinite"/>
        </section>
        <section data-narration="Regression Analysis can be used to predict continuous outcomes, such as stock prices or exam scores.">
            <rect x="20" y="360" width="340" height="100" fill="#FFFFFF" rx="10"/>
            <text x="20" y="390" font-size="18" font-family="Arial" fill="#3498DB">Applications:</text>
            <text x="20" y="420" font-size="18" font-family="Arial" fill="#3498DB">Predicting continuous outcomes, such as stock prices or exam scores.</text>
            <animateTransform attributeName="transform" type="rotate" from="0 190 390" to="360 190 390" dur="2000" begin="-2000" repeatCount="indefinite"/>
        </section>
        <footer>Regression Analysis Introduction</footer>
    </g>
</svg>