<svg 
    width="420" 
    height="400" 
    viewBox="0 0 420 400" 
    xmlns="http://www.w3.org/2000/svg" 
    xmlns:xlink="http://www.w3.org/1999/xlink" 
    xmlns:feather="http://www.feverbird.org/feathericons" 
    data-topic-id="nearest-centroid-classifier" 
    style="background:linear-gradient(to bottom, #c7d4ff, #c7d4ff),linear-gradient(to right, #2c4fbf, #2c4fbf);background-size:100% 100%;background-position:0% 100%;background-repeat:no-repeat;transition:all 1s ease-in-out;">
    <title>Nearest Centroid Classifier</title>
    <!-- Header Section -->
    <rect x="10" y="10" width="400" height="60" rx="10" fill="#f0f2f5"/>
    <text x="20" y="30" font-size="24" font-family="Open Sans" text-anchor="start" fill="#2c4fbf">Nearest Centroid Classifier</text>
    <rect x="10" y="80" width="400" height="60" rx="10" fill="#f0f2f5"/>
    <text x="20" y="100" font-size="18" font-family="Open Sans" text-anchor="start" fill="#2c4fbf">What is Nearest Centroid Classifier?</text>

    <!-- Section 1: Introduction -->
    <section id="introduction" data-narration="This is the nearest centroid classifier, a type of supervised learning algorithm used for classification problems. It is based on the concept of finding the closest class centroid to the new, unseen data point.">
        <rect x="10" y="150" width="380" height="80" rx="10" fill="#f0f2f5"/>
        <text x="20" y="170" font-size="18" font-family="Open Sans" text-anchor="start" fill="#2c4fbf">Centroid-based classifier</text>
        <text x="20" y="200" font-size="14" font-family="Open Sans" text-anchor="start" fill="#666666">Supervised learning algorithm</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="10 0" dur="2s" begin="0s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="10 0" dur="2s" begin="2s" repeatCount="indefinite"/>
    </section>

    <!-- Section 2: How it works -->
    <section id="how-it-works" data-narration="The nearest centroid classifier works by first training on a labeled dataset, then extracting features from the data points, calculating the centroid of each class, and finally classifying new data points based on the closest centroid.">
        <rect x="10" y="230" width="380" height="80" rx="10" fill="#f0f2f5"/>
        <text x="20" y="250" font-size="18" font-family="Open Sans" text-anchor="start" fill="#2c4fbf">Training and feature extraction</text>
        <text x="20" y="280" font-size="14" font-family="Open Sans" text-anchor="start" fill="#666666">Centroid calculation and distance measurement</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="20 0" dur="2s" begin="0s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="20 0" dur="2s" begin="2s" repeatCount="indefinite"/>
    </section>

    <!-- Section 3: Advantages and Disadvantages -->
    <section id="advantages-and-disadvantages" data-narration="The nearest centroid classifier has several advantages, including simplicity, fast computation, and ability to handle high-dimensional data. However, it also has some disadvantages, such as sensitivity to noise in the data and potential performance issues with non-linear relationships.">
        <rect x="10" y="310" width="380" height="80" rx="10" fill="#f0f2f5"/>
        <text x="20" y="330" font-size="18" font-family="Open Sans" text-anchor="start" fill="#2c4fbf">Advantages and disadvantages</text>
        <text x="20" y="360" font-size="14" font-family="Open Sans" text-anchor="start" fill="#666666">Simplicity and fast computation</text>
        <text x="20" y="390" font-size="14" font-family="Open Sans" text-anchor="start" fill="#666666">Sensitivity to noise and non-linear relationships</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="30 0" dur="2s" begin="0s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="30 0" dur="2s" begin="2s" repeatCount="indefinite"/>
    </section>

    <!-- Section 4: Types of Nearest Centroid Classifiers -->
    <section id="types-of-classifiers" data-narration="There are two main types of nearest centroid classifiers: soft nearest centroid and hard nearest centroid. The soft nearest centroid classifier assigns a probability to each class based on the distance to the class centroid, while the hard nearest centroid classifier assigns a class label based on the closest class centroid.">
        <rect x="10" y="390" width="380" height="80" rx="10" fill="#f0f2f5"/>
        <text x="20" y="410" font-size="18" font-family="Open Sans" text-anchor="start" fill="#2c4fbf">Types of classifiers</text>
        <text x="20" y="440" font-size="14" font-family="Open Sans" text-anchor="start" fill="#666666">Soft nearest centroid</text>
        <text x="20" y="470" font-size="14" font-family="Open Sans" text-anchor="start" fill="#666666">Hard nearest centroid</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="40 0" dur="2s" begin="0s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="40 0" dur="2s" begin="2s" repeatCount="indefinite"/>
    </section>

    <!-- Footer Section -->
    <rect x="10" y="500" width="400" height="60" rx="10" fill="#f0f2f5"/>
    <text x="20" y="520" font-size="18" font-family="Open Sans" text-anchor="start" fill="#2c4fbf">Stay tuned for more educational content!</text>
</svg>