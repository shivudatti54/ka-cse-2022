<svg width="420" height="400" data-topic-id="chapter-5-51-53">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1" />
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" rx="10" />
  
  <!-- Section 1: Definition -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="300" height="100" fill="#F2F2F2" rx="10" />
    <text x="10" y="30" fill="#333" font-size="18" font-weight="bold">Nearest-Neighbor Learning</text>
    <text x="10" y="60" fill="#666" font-size="14">Definition</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" begin="0s" type="rotate" from="0 150 100" to="360 150 100" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Section 2: How it Works -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="300" height="150" fill="#F2F2F2" rx="10" />
    <text x="10" y="30" fill="#333" font-size="18" font-weight="bold">How it Works</text>
    <text x="10" y="60" fill="#666" font-size="14">Step 1: Distance Metric</text>
    <text x="10" y="90" fill="#666" font-size="14">Step 2: Nearest Neighbor Search</text>
    <text x="10" y="130" fill="#666" font-size="14">Step 3: Class Label Prediction</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" begin="0s" type="rotate" from="0 150 150" to="360 150 150" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Section 3: Advantages -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="300" height="150" fill="#F2F2F2" rx="10" />
    <text x="10" y="30" fill="#333" font-size="18" font-weight="bold">Advantages</text>
    <text x="10" y="60" fill="#666" font-size="14">Simple to Implement</text>
    <text x="10" y="90" fill="#666" font-size="14">Handles Non-Linear Relationships</text>
    <text x="10" y="130" fill="#666" font-size="14">Can be Used for Classification and Regression</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" begin="0s" type="rotate" from="0 150 250" to="360 150 250" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Section 4: Disadvantages -->
  <g transform="translate(50, 350)">
    <rect x="0" y="0" width="300" height="150" fill="#F2F2F2" rx="10" />
    <text x="10" y="30" fill="#333" font-size="18" font-weight="bold">Disadvantages</text>
    <text x="10" y="60" fill="#666" font-size="14">Can be Sensitive to Noise</text>
    <text x="10" y="90" fill="#666" font-size="14">Can be Computationally Expensive</text>
    <text x="10" y="130" fill="#666" font-size="14">Can only be used for Classification</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" begin="0s" type="rotate" from="0 150 350" to="360 150 350" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Section 5: Example -->
  <g transform="translate(50, 450)">
    <rect x="0" y="0" width="300" height="150" fill="#F2F2F2" rx="10" />
    <text x="10" y="30" fill="#333" font-size="18" font-weight="bold">Example</text>
    <text x="10" y="60" fill="#666" font-size="14">Suppose we have a dataset of images of cats and dogs...</text>
    <text x="10" y="90" fill="#666" font-size="14">...</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" begin="0s" type="rotate" from="0 150 450" to="360 150 450" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Section 6: Weighted K-Nearest-Neighbor Algorithm -->
  <g transform="translate(50, 550)">
    <rect x="0" y="0" width="300" height="150" fill="#F2F2F2" rx="10" />
    <text x="10" y="30" fill="#333" font-size="18" font-weight="bold">Weighted K-Nearest-Neighbor Algorithm</text>
    <text x="10" y="60" fill="#666" font-size="14">Assigns weights to the nearest neighbors based on their distance...</text>
    <text x="10" y="90" fill="#666" font-size="14">...</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" begin="0s" type="rotate" from="0 150 550" to="360 150 550" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Title and Footer -->
  <g transform="translate(50, 20)">
    <rect x="0" y="0" width="300" height="20" fill="#F2F2F2" rx="10" />
    <text x="10" y="5" fill="#333" font-size="18" font-weight="bold">Chapter 5: Similarity-based Learning</text>
  </g>
  <g transform="translate(50, 380)">
    <rect x="0" y="0" width="300" height="20" fill="#F2F2F2" rx="10" />
    <text x="10" y="5" fill="#333" font-size="18" font-weight="bold">Copyright 2023</text>
  </g>
</svg>