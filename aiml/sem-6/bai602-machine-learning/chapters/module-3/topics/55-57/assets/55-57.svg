  <rect x="0" y="40" width="100%" height="40" style="fill: #f7f7f7" />
  <rect x="0" y="100" width="100%" height="40" style="fill: #f7f7f7" />
  <rect x="0" y="160" width="100%" height="40" style="fill: #f7f7f7" />
  <rect x="0" y="220" width="100%" height="40" style="fill: #f7f7f7" />

  <rect x="10" y="50" width="200" height="30" style="fill: #fff" class="header">
    <text x="50%" y="50%" font-size="24px" font-family="Arial, sans-serif" text-anchor="middle">Similarity-based Learning</text>
  </rect>

  <rect x="10" y="120" width="200" height="30" style="fill: #fff" class="footer">
    <text x="50%" y="50%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Educational Diagram</text>
  </rect>

  <rect x="10" y="50" width="200" height="30" style="fill: #fff" class="section">
    <text x="10%" y="10%" font-size="18px" font-family="Arial, sans-serif" text-anchor="start" class="data-narration">What is Similarity-based Learning?</text>
    <rect x="10" y="50%" width="100%" height="20" style="fill: #ccc" />
    <text x="10%" y="50%" font-size="18px" font-family="Arial, sans-serif" text-anchor="start" class="data-narration">Similarity-based learning is a type of machine learning that focuses on finding the closest neighbors to a new instance in a dataset.</text>
  </rect>

  <rect x="10" y="120" width="200" height="30" style="fill: #fff" class="section">
    <text x="10%" y="10%" font-size="18px" font-family="Arial, sans-serif" text-anchor="start" class="data-narration">How does Nearest-Neighbor Learning Work?</text>
    <rect x="10" y="50%" width="100%" height="20" style="fill: #ccc" />
    <text x="10%" y="50%" font-size="18px" font-family="Arial, sans-serif" text-anchor="start" class="data-narration">The nearest-neighbor learning algorithm finds the closest instance to a new instance in a dataset. The closest instance is then used to make predictions.</text>
  </rect>

  <rect x="10" y="190" width="200" height="30" style="fill: #fff" class="section">
    <text x="10%" y="10%" font-size="18px" font-family="Arial, sans-serif" text-anchor="start" class="data-narration">How does Weighted K-Nearest-Neighbor Algorithm Work?</text>
    <rect x="10" y="50%" width="100%" height="20" style="fill: #ccc" />
    <text x="10%" y="50%" font-size="18px" font-family="Arial, sans-serif" text-anchor="start" class="data-narration">The weighted k-nearest-neighbor algorithm assigns different weights to each nearest neighbor based on their similarity.</text>
  </rect>

  <rect x="10" y="270" width="200" height="30" style="fill: #fff" class="section">
    <text x="10%" y="10%" font-size="18px" font-family="Arial, sans-serif" text-anchor="start" class="data-narration">What are the Advantages and Disadvantages?</text>
    <rect x="10" y="50%" width="100%" height="20" style="fill: #ccc" />
    <text x="10%" y="50%" font-size="18px" font-family="Arial, sans-serif" text-anchor="start" class="data-narration">The advantages of similarity-based learning include its ability to handle high-dimensional data and its interpretability. The disadvantages include its computational complexity and its sensitivity to outliers.</text>
  </rect>

  <rect x="10" y="350" width="200" height="30" style="fill: #fff" class="footer">
    <text x="50%" y="50%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Educational Diagram</text>
  </rect>

