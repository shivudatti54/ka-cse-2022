  <line x1="180" y1="10" x2="180" y2="30" style="stroke: #333; stroke-width: 2" />

  <rect x="10" y="50" width="200" height="30" style="fill: #fff" class="section" data-narration="What is Similarity-based Learning?">
    <text x="10%" y="10%" font-size="18px" font-family="Arial, sans-serif" text-anchor="start">Similarity-based learning is a type of machine learning that focuses on finding the closest neighbors to a new instance in a dataset.</text>
  </rect>

  <rect x="10" y="120" width="200" height="30" style="fill: #fff" class="section" data-narration="How does Nearest-Neighbor Learning Work?">
    <text x="10%" y="10%" font-size="18px" font-family="Arial, sans-serif" text-anchor="start">The nearest-neighbor learning algorithm finds the closest instance to a new instance in a dataset. The closest instance is then used to make predictions.</text>
  </rect>

  <rect x="10" y="190" width="200" height="30" style="fill: #fff" class="section" data-narration="How does Weighted K-Nearest-Neighbor Algorithm Work?">
    <text x="10%" y="10%" font-size="18px" font-family="Arial, sans-serif" text-anchor="start">The weighted k-nearest-neighbor algorithm assigns different weights to each nearest neighbor based on their similarity.</text>
  </rect>

  <rect x="10" y="270" width="200" height="30" style="fill: #fff" class="section" data-narration="What are the Advantages and Disadvantages?">
    <text x="10%" y="10%" font-size="18px" font-family="Arial, sans-serif" text-anchor="start">The advantages of similarity-based learning include its ability to handle high-dimensional data and its interpretability. The disadvantages include its computational complexity and its sensitivity to outliers.</text>
  </rect>

  <rect x="10" y="350" width="200" height="30" style="fill: #fff" class="footer" data-narration="Educational Diagram">
    <text x="50%" y="50%" font-size="18px" font-family="Arial, sans-serif" text-anchor="middle">Similarity-based Learning</text>
