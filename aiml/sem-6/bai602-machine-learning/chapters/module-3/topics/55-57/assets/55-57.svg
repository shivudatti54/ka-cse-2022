  <rect x="0" y="0" width="100%" height="100%" style="fill: #c9e4ca; gradient: #c9e4ca 0%, #a5e1e6 0%, #a5e1e6 100%, #c9e4ca 100%" />
  <animate xmlns="http://www.w3.org/1999/11/svg" begin="0s" dur="2s" fill="freeze">
    <rect x="0" y="0" width="100%" height="100%" style="fill: #a5e1e6" />
