<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="chapter-13-131-136">
  <style>
    /* Add some basic styling */
    body {
      background-color: #3498db; /* light blue */
      font-family: Arial, sans-serif;
    }
    
    /* Add some pastel colors */
    .pastel {
      color: #e6f5ff; /* light blue */
      font-size: 18px;
    }
    
    /* Add some indigo accent */
    .indigo-accent {
      color: #3b3f54; /* dark indigo */
    }
  </style>
  
  <!-- Title -->
  <rect x="50" y="20" width="320" height="40" style="fill: #3498db; stroke: #3b3f54; stroke-width: 2;"/>
  <text x="160" y="30" style="font-size: 24px; font-weight: bold; fill: #3b3f54;">Artificial Neural Networks</text>
  
  <!-- Introduction -->
  <rect x="50" y="70" width="320" height="100" style="fill: #f9f9f9; stroke: #3b3f54; stroke-width: 2;"/>
  <text x="50" y="80" style="font-size: 18px; fill: #3b3f54;">An Artificial Neural Network (ANN) is a computational model inspired by the structure and function of biological neurons.</text>
  <rect x="50" y="110" width="320" height="30" style="fill: #3498db; stroke: #3b3f54; stroke-width: 2;"/>
  <text x="50" y="120" style="font-size: 18px; font-weight: bold; fill: #3b3f54;">Key Characteristics:</text>
  <data-narration>
    <p>ANNs represent data as a distributed representation of features, where each node represents a feature.</p>
    <p>ANNs process information in parallel, making them efficient for large datasets.</p>
    <p>ANNs can learn non-linear relationships between inputs and outputs.</p>
  </data-narration>
  
  <!-- Applications -->
  <rect x="50" y="160" width="320" height="100" style="fill: #f9f9f9; stroke: #3b3f54; stroke-width: 2;"/>
  <text x="50" y="170" style="font-size: 18px; fill: #3b3f54;">Applications include:</text>
  <data-narration>
    <p>Image recognition, such as self-driving cars and facial recognition.</p>
    <p>Natural Language Processing, such as language translation and sentiment analysis.</p>
  </data-narration>
  
  <!-- Example -->
  <rect x="50" y="310" width="320" height="100" style="fill: #f9f9f9; stroke: #3b3f54; stroke-width: 2;"/>
  <text x="50" y="320" style="font-size: 18px; fill: #3b3f54;">Example:</text>
  <rect x="50" y="350" width="320" height="30" style="fill: #3498db; stroke: #3b3f54; stroke-width: 2;"/>
  <text x="50" y="360" style="font-size: 18px; font-weight: bold; fill: #3b3f54;">Node 1:</text>
  <rect x="50" y="390" width="100" height="20" style="fill: #f9f9f9; stroke: #3b3f54; stroke-width: 2;"/>
  <text x="50" y="400" style="font-size: 14px; fill: #3b3f54;">x1 = 1, w1 = 0.5, b1 = 0.1, output = z1 = 0.6</text>
  <rect x="160" y="390" width="100" height="20" style="fill: #f9f9f9; stroke: #3b3f54; stroke-width: 2;"/>
  <text x="160" y="400" style="font-size: 14px; fill: #3b3f54;">x2 = 2, w2 = 0.2, b2 = 0.3, output = z2 = 0.4</text>
  
  <!-- Animation -->
  <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
  <animate attributeName="transform" begin="0s" dur="2s" repeatCount="indefinite">
    <animate-transform attributeName="translate" begin="0s" dur="1s" repeatCount="indefinite"/>
    <animate-transform attributeName="rotate" begin="1s" dur="1s" repeatCount="indefinite"/>
  </animate-transform>
</svg>