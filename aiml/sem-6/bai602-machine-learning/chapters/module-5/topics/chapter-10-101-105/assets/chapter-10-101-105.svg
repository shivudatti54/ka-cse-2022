<svg width="420" height="400" data-topic-id="chapter-10-101-105" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A288A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4169E1" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#grad)"/>
  <!-- Title -->
  <g transform="translate(10, 20)">
    <text x="0" y="0" font-size="24" font-family="Arial" font-weight="bold" fill="#2E4053">
      Artificial Neural Networks
    </text>
  </g>
  <!-- Section 1: Introduction to Artificial Neural Networks -->
  <g transform="translate(10, 50)">
    <rect x="0" y="0" width="400" height="100" fill="#F7F7F7" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 150" dur="1000" begin="0s" delay="0s" repeatCount="indefinite"/>
    <g fill="#2E4053">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#2E4053" data-narration="Artificial Neural Networks (ANNs) are computational models inspired by the structure and function of biological neurons.">
        Artificial Neural Networks (ANNs)
      </text>
      <text x="0" y="30" font-size="18" font-family="Arial" fill="#2E4053" data-narration="are computational models that mimic the structure and function of biological neurons.">
        are computational models
      </text>
      <line x1="0" y1="0" x2="50" y2="0" stroke-width="2" stroke="#2E4053" stroke-linecap="round"/>
    </g>
  </g>
  <!-- Section 2: Biological Neurons -->
  <g transform="translate(10, 200)">
    <rect x="0" y="0" width="400" height="100" fill="#F7F7F7" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0 200" to="0 300" dur="1000" begin="0s" delay="0s" repeatCount="indefinite"/>
    <g fill="#2E4053">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#2E4053" data-narration="Biological neurons are the basic building blocks of the human brain. They process and transmit information through electrical and chemical signals.">
        Biological Neurons
      </text>
      <text x="0" y="30" font-size="18" font-family="Arial" fill="#2E4053" data-narration="are the basic building blocks of the human brain.">
        are the basic building blocks
      </text>
      <line x1="0" y1="0" x2="50" y2="0" stroke-width="2" stroke="#2E4053" stroke-linecap="round"/>
      <line x1="20" y1="20" x2="30" y2="30" stroke-width="2" stroke="#2E4053" stroke-linecap="round"/>
    </g>
  </g>
  <!-- Section 3: Artificial Neurons -->
  <g transform="translate(10, 350)">
    <rect x="0" y="0" width="400" height="100" fill="#F7F7F7" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0 350" to="0 450" dur="1000" begin="0s" delay="0s" repeatCount="indefinite"/>
    <g fill="#2E4053">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#2E4053" data-narration="Artificial neurons are the basic building blocks of ANNs. They process and transmit information through electrical and digital signals.">
        Artificial Neurons
      </text>
      <text x="0" y="30" font-size="18" font-family="Arial" fill="#2E4053" data-narration="are the basic building blocks of ANNs.">
        are the basic building blocks
      </text>
      <line x1="0" y1="0" x2="50" y2="0" stroke-width="2" stroke="#2E4053" stroke-linecap="round"/>
      <line x1="20" y1="20" x2="30" y2="30" stroke-width="2" stroke="#2E4053" stroke-linecap="round"/>
      <line x1="0" y1="20" x2="50" y2="40" stroke-width="2" stroke="#2E4053" stroke-linecap="round"/>
    </g>
  </g>
  <!-- Section 4: Perceptron -->
  <g transform="translate(10, 400)">
    <rect x="0" y="0" width="400" height="100" fill="#F7F7F7" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0 400" to="0 500" dur="1000" begin="0s" delay="0s" repeatCount="indefinite"/>
    <g fill="#2E4053">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#2E4053" data-narration="The Perceptron is a type of artificial neuron that can recognize and classify patterns.">
        Perceptron
      </text>
      <text x="0" y="30" font-size="18" font-family="Arial" fill="#2E4053" data-narration="is a type of artificial neuron that can recognize and classify patterns.">
        is a type of artificial neuron
      </text>
      <line x1="0" y1="0" x2="50" y2="0" stroke-width="2" stroke="#2E4053" stroke-linecap="round"/>
      <line x1="20" y1="20" x2="30" y2="30" stroke-width="2" stroke="#2E4053" stroke-linecap="round"/>
      <line x1="0" y1="20" x2="50" y2="40" stroke-width="2" stroke="#2E4053" stroke-linecap="round"/>
    </g>
  </g>
  <!-- Footer -->
  <g transform="translate(10, 450)">
    <rect x="0" y="0" width="400" height="50" fill="#F7F7F7" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0 450" to="0 500" dur="1000" begin="0s" delay="0s" repeatCount="indefinite"/>
    <text x="0" y="0" font-size="18" font-family="Arial" fill="#2E4053">
      Chapter 10: Artificial Neural Networks
    </text>
  </g>
</svg>