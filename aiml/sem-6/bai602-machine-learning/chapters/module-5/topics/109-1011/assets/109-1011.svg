<svg width="420" height="400" data-topic-id="109-1011" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="mix-blend-mode: soft-light;">

    <!-- Background Gradient -->
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
            <stop offset="50%" stop-color="#D9E4CA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#FFC107" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <!-- Gradient Background -->
    <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

    <!-- Title Section -->
    <g transform="translate(10, 10)">
        <text data-narration="Title" x="10" y="30" font-size="24" font-family="Arial, sans-serif">
            Artificial Neural Networks
        </text>
    </g>

    <!-- Biological Neurons Section -->
    <g transform="translate(10, 60)">
        <rect x="0" y="0" width="100" height="30" fill="#87CEEB" stroke="#000" stroke-width="2"/>
        <circle cx="25" cy="15" r="5" fill="#87CEEB"/>
        <text data-narration="Biological Neurons" x="10" y="40" font-size="18" font-family="Arial, sans-serif">
            Biological neurons are specialized cells that process and transmit information
        </text>
        <line x1="15" y1="45" x2="90" y2="45" stroke="#000" stroke-width="2"/>
        <line x1="15" y1="45" x2="15" y2="45" stroke="#000" stroke-width="2"/>
        <line x1="15" y1="45" x2="90" y2="45" stroke="#000" stroke-width="2"/>
        <animate transform="rotate(360 25 15)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>

    <!-- Artificial Neurons Section -->
    <g transform="translate(150, 60)">
        <rect x="0" y="0" width="100" height="30" fill="#87CEEB" stroke="#000" stroke-width="2"/>
        <circle cx="25" cy="15" r="5" fill="#87CEEB"/>
        <text data-narration="Artificial Neurons" x="10" y="40" font-size="18" font-family="Arial, sans-serif">
            Artificial neurons are mathematical models of biological neurons
        </text>
        <line x1="15" y1="45" x2="90" y2="45" stroke="#000" stroke-width="2"/>
        <line x1="15" y1="45" x2="15" y2="45" stroke="#000" stroke-width="2"/>
        <line x1="15" y1="45" x2="90" y2="45" stroke="#000" stroke-width="2"/>
        <animate transform="rotate(360 25 15)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>

    <!-- Perceptron Section -->
    <g transform="translate(290, 60)">
        <rect x="0" y="0" width="100" height="30" fill="#87CEEB" stroke="#000" stroke-width="2"/>
        <circle cx="25" cy="15" r="5" fill="#87CEEB"/>
        <text data-narration="Perceptron" x="10" y="40" font-size="18" font-family="Arial, sans-serif">
            The perceptron is a type of artificial neuron that can learn and adapt
        </text>
        <line x1="15" y1="45" x2="90" y2="45" stroke="#000" stroke-width="2"/>
        <line x1="15" y1="45" x2="15" y2="45" stroke="#000" stroke-width="2"/>
        <line x1="15" y1="45" x2="90" y2="45" stroke="#000" stroke-width="2"/>
        <animate transform="rotate(360 25 15)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>

    <!-- Connections Section -->
    <g transform="translate(10, 180)">
        <line x1="50" y1="200" x2="50" y2="250" stroke="#03A9F4" stroke-width="2"/>
        <line x1="50" y1="200" x2="100" y2="250" stroke="#03A9F4" stroke-width="2"/>
        <line x1="50" y1="200" x2="50" y2="200" stroke="#03A9F4" stroke-width="2"/>
        <line x1="50" y1="225" x2="100" y2="225" stroke="#03A9F4" stroke-width="2"/>
        <animate transform="rotate(360 50 200)" begin="0s" dur="2s" repeatCount="indefinite"/>
        <animate transform="rotate(360 50 200)" begin="2s" dur="2s" repeatCount="indefinite"/>
        <animate transform="rotate(360 50 225)" begin="4s" dur="2s" repeatCount="indefinite"/>
    </g>

    <!-- Arrow Markers -->
    <g transform="translate(0, 220)">
        <path data-narration="Input Signals" d="M 50 250 L 100 250 L 50 250 Z" stroke="#63D1F4" stroke-width="2"/>
        <path data-narration="Processed Signals" d="M 50 225 L 100 225 L 50 225 Z" stroke="#63D1F4" stroke-width="2"/>
        <path data-narration="Output Signals" d="M 50 200 L 100 200 L 50 200 Z" stroke="#63D1F4" stroke-width="2"/>
    </g>

    <!-- Title and Footer -->
    <text x="10" y="390" font-size="24" font-family="Arial, sans-serif">
        <tspan data-narration="109-1011" x="10" y="390">Artificial Neural Networks</tspan>
    </text>
    <text x="10" y="400" font-size="18" font-family="Arial, sans-serif">
        <tspan data-narration="Learn More" x="10" y="400">Learn More</tspan>
    </text>
</svg>