<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400"
     xmlns:xlink="http://www.w3.org/1999/xlink" style="overflow:visible; overflow-wrap:break-word;">
    <rect x="0" y="0" width="420" height="400" fill="linear-gradient(to bottom, #b0c9ff 0%, #48a4ff 100%)" opacity="0.5"/>
    <rect x="0" y="0" width="420" height="40" fill="#1a1d23"/>
    <rect x="0" y="40" width="420" height="300" fill="#f5f5f5"/>
    <g id="layer1" transform="scale(0.5)">
        <rect x="0" y="0" width="210" height="300" fill="#f5f5f5"/>
        <g id="layer2">
            <rect x="10" y="10" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <rect x="60" y="10" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <rect x="110" y="10" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <rect x="160" y="10" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <rect x="210" y="10" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <rect x="10" y="60" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <rect x="60" y="60" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <rect x="110" y="60" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <rect x="160" y="60" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <rect x="210" y="60" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <rect x="10" y="110" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <rect x="60" y="110" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <rect x="110" y="110" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <rect x="160" y="110" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <rect x="210" y="110" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <rect x="10" y="160" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <rect x="60" y="160" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <rect x="110" y="160" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <rect x="160" y="160" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <rect x="210" y="160" width="40" height="40" stroke="#0a0a0a" stroke-width="2" fill="none" rx="5"/>
            <path d="M 10, 50 L 60, 50 L 110, 50 L 160, 50 L 210, 50 L 10, 100 L 60, 100 L 110, 100 L 160, 100 L 210, 100 Z" fill="none" stroke="#0a0a0a" stroke-width="2"/>
            <path d="M 10, 150 L 60, 150 L 110, 150 L 160, 150 L 210, 150 L 10, 200 L 60, 200 L 110, 200 L 160, 200 L 210, 200 Z" fill="none" stroke="#0a0a0a" stroke-width="2"/>
        </g>
        <g id="layer3">
            <text x="10" y="30" font-size="16" font-family="Arial, sans-serif" text-anchor="start" stroke="#1a1d23" stroke-width="2" fill="#fff">Clustering Algorithms Introduction</text>
            <text x="10" y="70" font-size="16" font-family="Arial, sans-serif" text-anchor="start" stroke="#1a1d23" stroke-width="2" fill="#fff">Clustering Approaches</text>
            <text x="10" y="110" font-size="16" font-family="Arial, sans-serif" text-anchor="start" stroke="#1a1d23" stroke-width="2" fill="#fff">Types of Clustering Approaches</text>
            <text x="10" y="150" font-size="16" font-family="Arial, sans-serif" text-anchor="start" stroke="#1a1d23" stroke-width="2" fill="#fff">Hierarchical Clustering</text>
            <text x="10" y="190" font-size="16" font-family="Arial, sans-serif" text-anchor="start" stroke="#1a1d23" stroke-width="2" fill="#fff">Agglomerative Clustering</text>
            <text x="10" y="230" font-size="16" font-family="Arial, sans-serif" text-anchor="start" stroke="#1a1d23" stroke-width="2" fill="#fff">Divisive Clustering</text>
            <text x="10" y="270" font-size="16" font-family="Arial, sans-serif" text-anchor="start" stroke="#1a1d23" stroke-width="2" fill="#fff">Proximity Measures</text>
            <text x="10" y="310" font-size="16" font-family="Arial, sans-serif" text-anchor="start" stroke="#1a1d23" stroke-width="2" fill="#fff">Euclidean Distance</text>
            <text x="10" y="350" font-size="16" font-family="Arial, sans-serif" text-anchor="start" stroke="#1a1d23" stroke-width="2" fill="#fff">Manhattan Distance</text>
            <text x="10" y="390" font-size="16" font-family="Arial, sans-serif" text-anchor="start" stroke="#1a1d23" stroke-width="2" fill="#fff">Minkowski Distance</text>
            <text x="10" y="430" font-size="16" font-family="Arial, sans-serif" text-anchor="start" stroke="#1a1d23" stroke-width="2" fill="#fff">Cosine Similarity</text>
        </g>
        <g id="layer4">
            <rect x="10" y="400" width="400" height="40" fill="#1a1d23"/>
            <text x="10" y="410" font-size="16" font-family="Arial, sans-serif" text-anchor="start" stroke="#fff" stroke-width="2" fill="#fff">Data Topic ID: clustering-algorithms</text>
        </g>
        <animate xmlns="http://www.w3.org/1999/xlink" xlink:href="#layer1" begin="0s" dur="10s" repeatCount="indefinite"/>
        <animate xmlns="http://www.w3.org/1999/xlink" xlink:href="#layer2" begin="0s" dur="5s" repeatCount="indefinite"/>
        <animate xmlns="http://www.w3.org/1999/xlink" xlink:href="#layer3" begin="0s" dur="5s" repeatCount="indefinite"/>
        <animate xmlns="http://www.w3.org/1999/xlink" xlink:href="#layer4" begin="0s" dur="5s" repeatCount="indefinite"/>
    </svg>