<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="#data-topic-id">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F7F2C4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title -->
  <g transform="translate(10, 10)">
    <text font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="start" fill="#2F4F7F">
      Validating and Pruning of Decision Trees
    </text>
  </g>
  
  <!-- Section 1: Validating Decision Trees -->
  <g transform="translate(10, 50)">
    <rect width="400" height="100" fill="#F7F2C4" rx="10"/>
    <g transform="translate(10, 10)">
      <text font-family="Arial, sans-serif" font-size="18" font-weight="normal" text-anchor="start" fill="#2F4F7F">
        Validating Decision Trees
      </text>
    </g>
    <g data-narration="This involves evaluating the model's performance on a test dataset to determine its accuracy and reliability.">
      <animate transform="rotate(360 20 20)" begin="0s" dur="2s" repeatCount="indefinite"/>
      <rect x="20" y="20" width="300" height="60" fill="#F7F2C4" rx="10"/>
      <text font-family="Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" fill="#2F4F7F">
        Cross-validation, Accuracy, Precision, Recall
      </text>
    </g>
  </g>
  
  <!-- Section 2: Pruning Decision Trees -->
  <g transform="translate(10, 170)">
    <rect width="400" height="100" fill="#F7F2C4" rx="10"/>
    <g transform="translate(10, 10)">
      <text font-family="Arial, sans-serif" font-size="18" font-weight="normal" text-anchor="start" fill="#2F4F7F">
        Pruning Decision Trees
      </text>
    </g>
    <g data-narration="This involves removing branches or nodes that do not contribute to the model's accuracy.">
      <animate transform="rotate(360 20 20)" begin="0s" dur="2s" repeatCount="indefinite"/>
      <rect x="20" y="20" width="300" height="60" fill="#F7F2C4" rx="10"/>
      <text font-family="Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" fill="#2F4F7F">
        Cost complexity pruning, CART pruning, Breiman's pruning
      </text>
    </g>
  </g>
  
  <!-- Section 3: Types of Pruning -->
  <g transform="translate(10, 310)">
    <rect width="400" height="100" fill="#F7F2C4" rx="10"/>
    <g transform="translate(10, 10)">
      <text font-family="Arial, sans-serif" font-size="18" font-weight="normal" text-anchor="start" fill="#2F4F7F">
        Types of Pruning
      </text>
    </g>
    <g data-narration="There are several types of pruning, including early pruning, late pruning, and post-pruning.">
      <animate transform="rotate(360 20 20)" begin="0s" dur="2s" repeatCount="indefinite"/>
      <rect x="20" y="20" width="300" height="60" fill="#F7F2C4" rx="10"/>
      <text font-family="Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" fill="#2F4F7F">
        Early pruning, late pruning, post-pruning
      </text>
    </g>
  </g>
  
  <!-- Footer -->
  <g transform="translate(10, 360)">
    <text font-family="Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" fill="#2F4F7F">
      &copy; 2023 Data-Topic-Id
    </text>
  </g>
</svg>