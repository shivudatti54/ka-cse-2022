<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step { opacity: 0; }
      .step.active { opacity: 1; transition: opacity 0.5s; }
      text { font-family: Arial, sans-serif; }
      .title { font-size: 24px; font-weight: bold; fill: #2C3E50; }
      .label { font-size: 16px; fill: #34495E; }
      .sublabel { font-size: 13px; fill: #7F8C8D; }
    </style>
  </defs>

  <g class="step" data-step="1" data-narration="This diagram illustrates the key concepts of probability-based learning process flow.">
    <text x="400" y="40" class="title" text-anchor="middle">Probability-based Learning Process Flow</text>
  </g>
  <g class="step" data-step="2" data-narration="Understanding Prior Probability (Initial Belief) as the foundational component of this concept.">
    <rect x="200" y="120" width="400" height="60" fill="#FDF2E7" stroke="#E67E22" stroke-width="2" rx="5"/>
    <text x="400" y="158" class="label" text-anchor="middle">Prior Probability (Initial Belief)</text>
  </g>
  <g class="step" data-step="3" data-narration="The next step involves Observed Data (Evidence), which builds upon the previous components.">
    <rect x="200" y="200" width="400" height="60" fill="#FDF2E7" stroke="#E67E22" stroke-width="2" rx="5"/>
    <text x="400" y="238" class="label" text-anchor="middle">Observed Data (Evidence)</text>
    <path d="M 400 180 L 400 200" stroke="#B85E16" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g class="step" data-step="4" data-narration="The next step involves Likelihood (P(Evidence|Hypothesis)), which builds upon the previous components.">
    <rect x="200" y="280" width="400" height="60" fill="#FDF2E7" stroke="#E67E22" stroke-width="2" rx="5"/>
    <text x="400" y="318" class="label" text-anchor="middle">Likelihood (P(Evidence|Hypothesis))</text>
    <path d="M 400 260 L 400 280" stroke="#B85E16" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g class="step" data-step="5" data-narration="The next step involves Marginal Likelihood (P(Evidence)), which builds upon the previous components.">
    <rect x="200" y="360" width="400" height="60" fill="#FDF2E7" stroke="#E67E22" stroke-width="2" rx="5"/>
    <text x="400" y="398" class="label" text-anchor="middle">Marginal Likelihood (P(Evidence))</text>
    <path d="M 400 340 L 400 360" stroke="#B85E16" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g class="step" data-step="6" data-narration="Finally, Posterior Probability (Updated Belief) completes the overall process and delivers the result.">
    <rect x="200" y="440" width="400" height="60" fill="#FDF2E7" stroke="#E67E22" stroke-width="2" rx="5"/>
    <text x="400" y="478" class="label" text-anchor="middle">Posterior Probability (Updated Belief)</text>
    <path d="M 400 420 L 400 440" stroke="#B85E16" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2E5C8A"/>
    </marker>
  </defs>
</svg>