<svg
  width="420"
  height="400"
  viewBox="0 0 420 400"
  data-topic-id="bayesian-learning-introduction-to-probability-base"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  style="background: linear-gradient(to bottom, rgb(240, 240, 255), rgb(245, 245, 250));">
  <title>Bayesian Learning: Introduction to Probability-based Learning</title>

  <rect x="10" y="20" width="400" height="350" fill="#ADD8E6" rx="10" />
  <text x="10" y="30" font-size="24" font-family="Arial" fill="#4377B4">Bayesian Learning: Introduction to Probability-based Learning</text>

  <section data-narration=" Bayes' Theorem " x="20" y="100" width="350" height="50">
    <rect x="20" y="110" width="330" height="40" fill="#F7DC6F" rx="10" />
    <animate begin="0s" dur="2s" attributeName="opacity" from="1" to="0" fill="freeze" />
    <text x="20" y="120" font-size="18" font-family="Arial" fill="#4377B4">Bayes' Theorem</text>
    <text x="20" y="140" font-size="14" font-family="Arial" fill="#4377B4">P(A|B) = P(B|A) \* P(A) / P(B)</text>
    <path d="M 50, 150 L 70, 180" stroke="#4377B4" stroke-width="2" stroke-linecap="round" />
    <path d="M 50, 150 L 30, 210" stroke="#4377B4" stroke-width="2" stroke-linecap="round" />
  </section>

  <section data-narration=" Prior Probabilities " x="20" y="200" width="350" height="50">
    <rect x="20" y="210" width="330" height="40" fill="#C6E2B5" rx="10" />
    <animate begin="2s" dur="2s" attributeName="opacity" from="1" to="0" fill="freeze" />
    <text x="20" y="220" font-size="18" font-family="Arial" fill="#4377B4">Prior Probabilities</text>
    <text x="20" y="240" font-size="14" font-family="Arial" fill="#4377B4">P(A) and P(B)</text>
    <path d="M 50, 250 L 70, 280" stroke="#4377B4" stroke-width="2" stroke-linecap="round" />
    <path d="M 50, 250 L 30, 310" stroke="#4377B4" stroke-width="2" stroke-linecap="round" />
  </section>

  <section data-narration=" Conditional Probabilities " x="20" y="300" width="350" height="50">
    <rect x="20" y="310" width="330" height="40" fill="#C6E2B5" rx="10" />
    <animate begin="4s" dur="2s" attributeName="opacity" from="1" to="0" fill="freeze" />
    <text x="20" y="320" font-size="18" font-family="Arial" fill="#4377B4">Conditional Probabilities</text>
    <text x="20" y="340" font-size="14" font-family="Arial" fill="#4377B4">P(B|A) and P(A|B)</text>
    <path d="M 50, 350 L 70, 380" stroke="#4377B4" stroke-width="2" stroke-linecap="round" />
    <path d="M 50, 350 L 30, 400" stroke="#4377B4" stroke-width="2" stroke-linecap="round" />
  </section>

  <section data-narration=" Bayes' Theorem in Action " x="20" y="400" width="350" height="50">
    <rect x="20" y="410" width="330" height="40" fill="#F7DC6F" rx="10" />
    <animate begin="6s" dur="2s" attributeName="opacity" from="1" to="0" fill="freeze" />
    <text x="20" y="420" font-size="18" font-family="Arial" fill="#4377B4">Bayes' Theorem in Action</text>
    <text x="20" y="440" font-size="14" font-family="Arial" fill="#4377B4">Example: Coin Flip</text>
    <path d="M 50, 450 L 70, 480" stroke="#4377B4" stroke-width="2" stroke-linecap="round" />
    <path d="M 50, 450 L 30, 510" stroke="#4377B4" stroke-width="2" stroke-linecap="round" />
  </section>

  <footer>
    <text x="10" y="450" font-size="18" font-family="Arial" fill="#4377B4">Created with love</text>
  </footer>
</svg>