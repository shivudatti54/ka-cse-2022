<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="Decision Tree Learning" class="topic-diagram">
  <!-- Title -->
  <rect x="10" y="10" width="400" height="30" fill="#2E4053" rx="5"/>
  <text x="15" y="25" font-size="18" font-family="Arial" fill="#66CCCC">Decision Tree Learning</text>
  
  <!-- Section 1: Introduction -->
  <rect x="10" y="60" width="400" height="40" fill="#C9E4CA" rx="5"/>
  <text x="15" y="70" font-size="16" font-family="Arial" fill="#2E4053">Introduction to Decision Trees</text>
  <animate xlink:href="#section1" begin="0s" dur="2s" repeatCount="indefinite"/>
  <animate xlink:href="#section1-arrow" begin="0.5s" dur="2s" repeatCount="indefinite"/>
  <rect x="15" y="90" width="10" height="20" fill="#66CCCC" rx="2"/>
  <text x="25" y="105" font-size="14" font-family="Arial" fill="#2E4053">A tree-like model that splits data into smaller subsets based on features.</text>
  
  <!-- Section 2: Root Node -->
  <rect x="10" y="140" width="400" height="40" fill="#66CCCC" rx="5"/>
  <animate xlink:href="#section2" begin="2s" dur="2s" repeatCount="indefinite"/>
  <animate xlink:href="#section2-arrow" begin="2.5s" dur="2s" repeatCount="indefinite"/>
  <rect x="15" y="160" width="10" height="20" fill="#2E4053" rx="2"/>
  <text x="25" y="175" font-size="14" font-family="Arial" fill="#2E4053">The root node is the topmost node in the decision tree.</text>
  <text x="25" y="190" font-size="14" font-family="Arial" fill="#2E4053">Chosen based on the feature with the highest variance in the training data.</text>
  
  <!-- Section 3: Splitting -->
  <rect x="10" y="230" width="400" height="40" fill="#C9E4CA" rx="5"/>
  <animate xlink:href="#section3" begin="4s" dur="2s" repeatCount="indefinite"/>
  <animate xlink:href="#section3-arrow" begin="4.5s" dur="2s" repeatCount="indefinite"/>
  <rect x="15" y="250" width="10" height="20" fill="#66CCCC" rx="2"/>
  <text x="25" y="265" font-size="14" font-family="Arial" fill="#2E4053">The algorithm splits the data into two subsets based on the feature at the root node.</text>
  <text x="25" y="280" font-size="14" font-family="Arial" fill="#2E4053">The split is chosen such that the two subsets have approximately equal number of samples.</text>
  
  <!-- Section 4: Recursion -->
  <rect x="10" y="310" width="400" height="40" fill="#66CCCC" rx="5"/>
  <animate xlink:href="#section4" begin="6s" dur="2s" repeatCount="indefinite"/>
  <animate xlink:href="#section4-arrow" begin="6.5s" dur="2s" repeatCount="indefinite"/>
  <rect x="15" y="330" width="10" height="20" fill="#2E4053" rx="2"/>
  <text x="25" y="345" font-size="14" font-family="Arial" fill="#2E4053">The algorithm repeats the process of splitting and recursion until a stopping criterion is met.</text>
  
  <!-- Section 5: Types of Decision Trees -->
  <rect x="10" y="370" width="400" height="40" fill="#C9E4CA" rx="5"/>
  <animate xlink:href="#section5" begin="8s" dur="2s" repeatCount="indefinite"/>
  <animate xlink:href="#section5-arrow" begin="8.5s" dur="2s" repeatCount="indefinite"/>
  <rect x="15" y="390" width="10" height="20" fill="#66CCCC" rx="2"/>
  <text x="25" y="405" font-size="14" font-family="Arial" fill="#2E4053">Classification Trees: Used for binary classification tasks.</text>
  <text x="25" y="420" font-size="14" font-family="Arial" fill="#2E4053">Regression Trees: Used for regression tasks.</text>
  
  <!-- Footer -->
  <rect x="10" y="450" width="400" height="30" fill="#2E4053" rx="5"/>
  <text x="15" y="460" font-size="16" font-family="Arial" fill="#66CCCC">Decision Tree Learning</text>
</svg>