<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="big-data-analysis">
  <style>
    /* Style for the circle */
    .circle {
      fill: none;
      stroke: #0097A7;
      stroke-width: 2;
      stroke-miterlimit: 10;
    }
    /* Style for the line */
    .line {
      fill: none;
      stroke: #0097A7;
      stroke-width: 2;
      stroke-miterlimit: 10;
    }
    /* Style for the text */
    .text {
      font-size: 14px;
      font-weight: bold;
      fill: #0097A7;
    }
    /* Style for the annotation */
    .annotation {
      font-size: 12px;
      fill: #0097A7;
    }
  </style>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7E5F5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E5C9F5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <title>Understanding Data 1: Introduction, Big Data Analysis Framework, Descriptive Statistics, Univariate Data Analysis and Visualization</title>
  <g transform="translate(20, 60)">
    <!-- Section 1: Introduction -->
    <circle cx="200" cy="200" r="150" class="circle"/>
    <animateTransform attributeName="transform" type="rotate" from="0,200,200" to="360,200,200" dur="10s" begin="0s"/>
    <text x="200" y="250" class="text">Introduction to Big Data</text>
    <animate xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="#animation-1" begin="1s"/>
    <annotation x="200" y="220" class="annotation">Data is the lifeblood of any machine learning model.</annotation>
  </g>
  <g transform="translate(10, 100)">
    <!-- Section 2: Data Collection -->
    <circle cx="200" cy="200" r="150" class="circle"/>
    <animateTransform attributeName="transform" type="rotate" from="0,200,200" to="360,200,200" dur="10s" begin="5s"/>
    <text x="200" y="250" class="text">Data Collection</text>
    <animate xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="#animation-2" begin="6s"/>
    <line x1="180" y1="180" x2="220" y2="180" class="line"/>
    <annotation x="200" y="220" class="annotation">Gathering data from various sources.</annotation>
  </g>
  <g transform="translate(10, 200)">
    <!-- Section 3: Big Data Analysis Framework -->
    <circle cx="200" cy="200" r="150" class="circle"/>
    <animateTransform attributeName="transform" type="rotate" from="0,200,200" to="360,200,200" dur="10s" begin="10s"/>
    <text x="200" y="250" class="text">Big Data Analysis Framework</text>
    <animate xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="#animation-3" begin="11s"/>
    <line x1="170" y1="170" x2="230" y2="170" class="line"/>
    <line x1="170" y1="170" x2="170" y2="230" class="line"/>
    <annotation x="200" y="220" class="annotation">Collecting, storing, processing, and analyzing large amounts of data.</annotation>
  </g>
  <g transform="translate(10, 300)">
    <!-- Section 4: Descriptive Statistics -->
    <circle cx="200" cy="200" r="150" class="circle"/>
    <animateTransform attributeName="transform" type="rotate" from="0,200,200" to="360,200,200" dur="10s" begin="15s"/>
    <text x="200" y="250" class="text">Descriptive Statistics</text>
    <animate xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="#animation-4" begin="16s"/>
    <line x1="170" y1="170" x2="230" y2="170" class="line"/>
    <line x1="170" y1="170" x2="170" y2="230" class="line"/>
    <line x1="180" y1="200" x2="220" y2="200" class="line"/>
    <annotation x="200" y="220" class="annotation">Summarizing and describing the main features of a dataset.</annotation>
  </g>
  <g transform="translate(10, 400)">
    <!-- Section 5: Univariate Data Analysis -->
    <circle cx="200" cy="200" r="150" class="circle"/>
    <animateTransform attributeName="transform" type="rotate" from="0,200,200" to="360,200,200" dur="10s" begin="20s"/>
    <text x="200" y="250" class="text">Univariate Data Analysis</text>
    <animate xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="#animation-5" begin="21s"/>
    <line x1="170" y1="170" x2="230" y2="170" class="line"/>
    <line x1="170" y1="170" x2="170" y2="230" class="line"/>
    <line x1="180" y1="200" x2="220" y2="200" class="line"/>
    <line x1="180" y1="180" x2="220" y2="180" class="line"/>
    <annotation x="200" y="220" class="annotation">Analyzing and visualizing data using univariate techniques.</annotation>
  </g>
  <footer>Page 1 of 5</footer>
</svg>