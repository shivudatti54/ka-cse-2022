<svg width="420" height="400" data-topic-id="machine-learning-explained">
  <title>Machine Learning Explained</title>
  <rect x="0" y="0" width="420" height="400" fill="#ada9e4" rx="10" />
  <text x="50%" y="20%" font-size="24" font-weight="bold" text-anchor="middle" fill="#2f4f7f">Machine Learning Explained</text>
  <rect x="50%" y="70%" width="300" height="100" fill="#c7e5f4" rx="10" />
  <text x="50%" y="80%" font-size="18" font-weight="normal" text-anchor="middle" fill="#2f4f7f">Definition of Machine Learning</text>
  <section data-narration="Learning is the process of improving the performance of a model on a given task by exposing it to data and adjusting its parameters accordingly.">
    <rect x="50%" y="120%" width="220" height="50" fill="#f7d2c4" rx="10" />
    <animate transform="translateX(10%)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="150%" font-size="14" font-weight="normal" text-anchor="middle" fill="#2f4f7f">Learning</text>
    <text x="50%" y="170%" font-size="14" font-weight="normal" text-anchor="middle" fill="#2f4f7f">Improving performance through data and parameter adjustments</text>
  </section>
  <section data-narration="Data is the input used to train and test machine learning models, which can be in the form of images, text, audio, or other types of data.">
    <rect x="50%" y="190%" width="220" height="50" fill="#f7d2c4" rx="10" />
    <animate transform="translateX(10%)" begin="2s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="220%" font-size="14" font-weight="normal" text-anchor="middle" fill="#2f4f7f">Data</text>
    <text x="50%" y="240%" font-size="14" font-weight="normal" text-anchor="middle" fill="#2f4f7f">Input for training and testing machine learning models</text>
  </section>
  <section data-narration="A model is a mathematical representation of a system or process, which can be trained on data to make predictions or decisions.">
    <rect x="50%" y="260%" width="220" height="50" fill="#f7d2c4" rx="10" />
    <animate transform="translateX(10%)" begin="4s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="290%" font-size="14" font-weight="normal" text-anchor="middle" fill="#2f4f7f">Model</text>
    <text x="50%" y="310%" font-size="14" font-weight="normal" text-anchor="middle" fill="#2f4f7f">Mathematical representation for making predictions or decisions</text>
  </section>
  <section data-narration="There are three main types of machine learning: Supervised Learning, Unsupervised Learning, and Reinforcement Learning.">
    <rect x="50%" y="340%" width="220" height="50" fill="#f7d2c4" rx="10" />
    <animate transform="translateX(10%)" begin="6s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="370%" font-size="14" font-weight="normal" text-anchor="middle" fill="#2f4f7f">Types of Machine Learning</text>
    <text x="50%" y="390%" font-size="14" font-weight="normal" text-anchor="middle" fill="#2f4f7f">Supervised, Unsupervised, and Reinforcement Learning</text>
  </section>
  <section data-narration="Supervised Learning is the algorithm is trained on labeled data, where the correct output is already known.">
    <rect x="50%" y="410%" width="220" height="50" fill="#f7d2c4" rx="10" />
    <animate transform="translateX(10%)" begin="8s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="440%" font-size="14" font-weight="normal" text-anchor="middle" fill="#2f4f7f">Supervised Learning</text>
    <text x="50%" y="460%" font-size="14" font-weight="normal" text-anchor="middle" fill="#2f4f7f">Trained on labeled data</text>
  </section>
  <section data-narration="Unsupervised Learning is the algorithm is trained on unlabeled data, and the goal is to identify patterns or structure in the data.">
    <rect x="50%" y="470%" width="220" height="50" fill="#f7d2c4" rx="10" />
    <animate transform="translateX(10%)" begin="10s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="500%" font-size="14" font-weight="normal" text-anchor="middle" fill="#2f4f7f">Unsupervised Learning</text>
    <text x="50%" y="520%" font-size="14" font-weight="normal" text-anchor="middle" fill="#2f4f7f">Identify patterns or structure in data</text>
  </section>
  <section data-narration="Reinforcement Learning is the algorithm learns through trial and error by interacting with an environment and receiving feedback in the form of rewards or penalties.">
    <rect x="50%" y="530%" width="220" height="50" fill="#f7d2c4" rx="10" />
    <animate transform="translateX(10%)" begin="12s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="560%" font-size="14" font-weight="normal" text-anchor="middle" fill="#2f4f7f">Reinforcement Learning</text>
    <text x="50%" y="580%" font-size="14" font-weight="normal" text-anchor="middle" fill="#2f4f7f">Learns through trial and error</text>
  </section>
  <rect x="0" y="380" width="420" height="20" fill="#2f4f7f" rx="10" />
  <text x="50%" y="390%" font-size="14" font-weight="normal" text-anchor="middle" fill="#2f4f7f">Arrow markers for connections</text>
  <rect x="0" y="400" width="420" height="20" fill="#2f4f7f" rx="10" />
  <text x="50%" y="410%" font-size="14" font-weight="normal" text-anchor="middle" fill="#2f4f7f">Footer</text>
</svg>