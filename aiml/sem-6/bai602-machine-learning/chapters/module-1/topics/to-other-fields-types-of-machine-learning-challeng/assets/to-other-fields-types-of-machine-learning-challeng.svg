<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" data-topic-id="machine-learning">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#A7C9F2" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2F4F7F">Machine Learning</text>
  <!-- Section 1 -->
  <rect x="10" y="60" width="400" height="80" fill="#FFFFFF" rx="10" />
  <text x="20%" y="10%" font-size="18" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2F4F7F">Need for Machine Learning</text>
  <text x="20%" y="30%" font-size="16" font-family="Arial" font-weight="normal" text-anchor="middle" fill="#2F4F7F" data-narration="Machine learning is a crucial aspect of modern technology, with applications in various fields such as image and speech recognition, natural language processing, and predictive analytics." />
  <animate transform="rotate(45deg)" begin="0s" dur="2s" fill="freeze" />
  <!-- Section 2 -->
  <rect x="10" y="150" width="400" height="80" fill="#FFFFFF" rx="10" />
  <text x="20%" y="10%" font-size="18" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2F4F7F">Machine Learning Explained</text>
  <text x="20%" y="30%" font-size="16" font-family="Arial" font-weight="normal" text-anchor="middle" fill="#2F4F7F" data-narration="Machine learning is a subset of artificial intelligence (AI) that involves training algorithms to learn from data and make predictions or decisions without being explicitly programmed." />
  <animate transform="rotate(90deg)" begin="2s" dur="2s" fill="freeze" />
  <!-- Section 3 -->
  <rect x="10" y="240" width="400" height="80" fill="#FFFFFF" rx="10" />
  <text x="20%" y="10%" font-size="18" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2F4F7F">Machine Learning in Relation to Other Fields</text>
  <text x="20%" y="30%" font-size="16" font-family="Arial" font-weight="normal" text-anchor="middle" fill="#2F4F7F" data-narration="Machine learning has far-reaching implications in various fields, including computer vision, natural language processing, robotics, and healthcare." />
  <animate transform="rotate(135deg)" begin="4s" dur="2s" fill="freeze" />
  <!-- Section 4 -->
  <rect x="10" y="330" width="400" height="80" fill="#FFFFFF" rx="10" />
  <text x="20%" y="10%" font-size="18" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2F4F7F">Types of Machine Learning</text>
  <text x="20%" y="30%" font-size="16" font-family="Arial" font-weight="normal" text-anchor="middle" fill="#2F4F7F" data-narration="There are three primary types of machine learning: supervised learning, unsupervised learning, and reinforcement learning." />
  <animate transform="rotate(180deg)" begin="6s" dur="2s" fill="freeze" />
  <!-- Section 5 -->
  <rect x="10" y="410" width="400" height="80" fill="#FFFFFF" rx="10" />
  <text x="20%" y="10%" font-size="18" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2F4F7F">Applications of Machine Learning</text>
  <text x="20%" y="30%" font-size="16" font-family="Arial" font-weight="normal" text-anchor="middle" fill="#2F4F7F" data-narration="Machine learning has numerous applications in various fields, including computer vision, natural language processing, and predictive analytics." />
  <animate transform="rotate(225deg)" begin="8s" dur="2s" fill="freeze" />
  <!-- Section 6 -->
  <rect x="10" y="490" width="400" height="80" fill="#FFFFFF" rx="10" />
  <text x="20%" y="10%" font-size="18" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2F4F7F">Conclusion</text>
  <text x="20%" y="30%" font-size="16" font-family="Arial" font-weight="normal" text-anchor="middle" fill="#2F4F7F" data-narration="In conclusion, machine learning is a crucial aspect of modern technology with numerous applications in various fields." />
  <animate transform="rotate(270deg)" begin="10s" dur="2s" fill="freeze" />
  <!-- Arrow markers -->
  <line x1="50%" y1="60%" x2="120%" y2="60%" stroke="#2F4F7F" stroke-width="2" />
  <line x1="50%" y1="120%" x2="120%" y2="120%" stroke="#2F4F7F" stroke-width="2" />
  <line x1="50%" y1="180%" x2="120%" y2="180%" stroke="#2F4F7F" stroke-width="2" />
  <line x1="50%" y1="240%" x2="120%" y2="240%" stroke="#2F4F7F" stroke-width="2" />
  <line x1="50%" y1="300%" x2="120%" y2="300%" stroke="#2F4F7F" stroke-width="2" />
  <line x1="50%" y1="360%" x2="120%" y2="360%" stroke="#2F4F7F" stroke-width="2" />
  <!-- Footer -->
  <text x="50%" y="380%" font-size="18" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2F4F7F">Machine Learning</text>
</svg>